body:
  text: 卷第三十二面膏面脂兼療面病方一十三首千金翼論曰面脂手膏衣香澡豆士人貴勝皆是所要然今之醫門極為祕惜不許子弟泄漏一法至於父子之間亦不傳示然聖人立法欲使家家悉解人人自知豈使愚於天下令至道不行壅蔽聖人之意甚可怪也又面脂方主面及皴皺靨黑皯凡是面上之病皆悉主之丁香十一分零陵香桃仁去皮土瓜根白蘞白芨防風當歸沉香辛夷商陸麝香研梔子花芎藭各十二分蜀水花青木香各八分白芷葳蕤菟絲子藿香甘松香各十五分木蘭皮白殭蠶藁本各十分茯苓十八分冬瓜仁十六分鵝脂羊髓各一升半羊腎脂一升豬胰六具清酒五升生豬肪脂二大升上三十二味挼生豬胰汁漬藥一宿於脂中煎三上三下以白芷色黃去滓以上件酒五升挼豬胰以炭火微微煎膏成貯器中以塗面又面膏方杜蘅杜若防風藁本細辛白附子木蘭皮當歸白朮獨活白茯苓葳蕤白芷天門冬玉屑各一兩菟絲子防己商陸梔子花橘仁冬瓜仁蘼蕪花各三兩藿香丁香零陵香甘松香青木香各二兩麝香半兩白鵝脂如無半升白羊脂牛髓各一升羊胰三具上三十二味先以水浸膏髓等五日日滿別再易水又五日日別一易水又五日二日一易水凡二十日止以酒一升挼羊胰令消盡去脈乃細切香於垍器中浸之密封一宿曉以諸脂等合煎三上三下以酒水氣盡為候郎以綿布絞去滓研之千遍待凝乃止使白如雪每夜塗面晝則洗卻更塗新者十日以後色等桃花本方白蘞人參各三兩無蘼蕪花冬瓜仁此皆是面膏藥疑更有此二味又方香附子十枚大者白芷二兩零陵香二兩茯苓一兩並以大兩蔓菁油二升無以豬膏充牛髓羊髓各一升水漬白臘八兩麝香二分上九味以油髓微火煎五物令色變去滓納麝香研千遍凝用澡豆洗面後塗敷之又方杏仁二升去皮白附子三兩密陀僧二兩研如粉白羊髓二升半真珠十四枚搗研如粉白蘚皮一兩雞子白七枚胡粉二兩以石米下又方防風白芨芎藭各三兩白朮八分甘松白蘞木蘭皮栝蔞白芷藁本桃花蜀水花商陸密陀僧白殭蠶零陵香杜蘅鷹屎白葳蕤土瓜根各三分麝香丁香各二兩白附子玉屑各四分鵝脂五合鹿髓一升羊髓一升白臘四兩豬膏二升上二十九味細切酢漬密封一宿明旦以豬膏煎三上三下白芷色黃為藥成去滓攪數萬遍令色白以敷面慎風日良又方防風芎藭白芷白殭蠶蜀水花白蘞細辛茯苓藁本葳蕤青木香辛夷仁當歸土瓜根栝蔞仁各三分桃仁去皮尖豬脂二升鵝脂一升羊腎脂一升上十九味細切綿裹酒二升浸一日一夜便納脂中急火煎之三上三下然後緩火一夜藥成去滓以寒水石粉三分內脂中以柳木篦熟攪任用之並出第五卷中千金面膏去風寒令面光悅耐老去皺方青木香白附子芎藭白蠟零陵香白芷香附子各二兩茯苓甘松各一兩羊髓一升半煉之上十味以酒水各半升漬藥經宿煎三上三下候酒水氣盡膏成去滓收貯任用塗面作妝皯𪒟皆落又方玉屑芎藭土瓜根白芷冬瓜仁木蘭皮葳蕤桃仁去皮白附子各四兩商陸根五分辛夷菟絲子藁本白殭蠶當歸黃耆藿香細辛防風麝香青木香各三分豬胰三具蜀水花一合鷹屎白一合白狗脂一升鵝脂一升熊脂二升上二十七味細切以清酒漬一宿微火煎一日以新布絞去滓以塗面切慎風任用之出第六卷中崔氏蠟脂方白蠟十兩煉令白桃花菟絲子白芷木蘭皮細辛辛夷仁白茯苓土瓜根栝蔞根白附子杜蘅桃仁去皮杏仁去皮各三分蔓菁子油二升半羊髓牛髓鹿髓脂各合上十八味並細切以苦酒漬一宿用上件臘油髓脂等煎如面脂法其蔓菁油酒在前煎令煙出後始下蠟髓訖納諸藥候白芷色黃膏成任用每以澡豆洗面後以塗之又常用臘脂方蔓菁油三升甘松香一兩零陵香一兩辛夷仁五分白朮二升細辛五分竹茹一升竹葉切五合白茯苓三分蘼蕪花三分羊髓半升以水浸去赤脈煉之麝香任炙上十二味切以綿裹酒浸經再宿絞去酒以脂中煎緩火令沸三日許香氣極盛膏成乃煉蠟令白看臨熟下臘調瓷硬得所貯用之出第九卷中文仲療人面無光潤黑及皺常敷面脂方細辛葳蕤黃耆白附子薯蕷辛夷芎藭白芷各一分栝蔞木蘭皮各二分豬脂二十煉成上十一味切以綿裹用少酒漬一宿納脂膏煎之七上七下別出一斤白芷煎色黃藥成去滓攪凝以敷面任用之亦主金瘡止血良延年面脂方白朮茯苓杜蘅各六分葳蕤藁本芎藭土瓜根栝蔞各五分木蘭皮白殭蠶蜀水花辛夷仁零陵香藿香各四兩菟絲子八分梔子花麝香酒浸綿裹鷹屎白各三分冬瓜仁五分桃仁五合併令碎白蠟三兩羊脂腎邊者一升豬脂三升水浸七日日別易水豬胰一具白附子四分上二十五味並細切酒二升取豬胰桃仁冬瓜仁綿裹納酒中挼令消絞取汁用漬藥一宿別煎豬脂令消去滓以鵝脂羊脂白蠟於鐺中用綿裹內鐺微火煎三上三下藥黃色去滓待澄候凝納鷹屎末攪令勻以塗面妙又方防風葳蕤芎藭白芷藁本桃仁去皮白附子各六分茯苓八分細辛甘松香零陵香各二分當歸栝蔞研各四分蜀椒五十粒鸕鷀屎冬瓜仁研各三分麝香一分上十七味酒浸淹潤一夕明日以綿薄寬裹之以白鵝脂三升羊脂三升並煉成者以煎之於銅器中微火上煎使之沸勿使焦也乃下之三上看白附子色黃膏成去滓又入鐺中上火納麝香氣出仍麝香更以綿濾度之乃納栝蔞仁桃仁冬瓜仁等脂並鷹屎鸕鷀屎粉等攪令調膏成待凝以瓷器貯柳木作槌子於鉢中研使輕虛得所生光研之無度數二三日研之方始好唯多則光滑任用洗面藥方二首千金翼面藥方硃砂研雄黃水銀霜各半兩胡粉二兩黃鷹屎一升上五味合和洗淨面夜塗以一兩霜和麵脂令稠如泥先於夜欲臥時以澡豆淨極洗面並手干拭以藥塗面厚薄如尋常塗面厚薄乃以指細細熟摩之令藥與肉相入乃臥一上經五日五夜勿洗面止就上作粉即得要不洗面至第六夜洗面塗一如前法滿三度塗洗更不塗也一如常洗面也其色光淨與未塗時百倍佳出第五卷中延年洗面藥方葳蕤商陸根栝蔞杜若滑石各八兩土瓜根芎藭辛夷仁甘松香各三兩黃瓜蔞五枚去皮白茯苓白芷一斤木蘭皮零陵香各三兩麝香二兩蓽豆二升冬瓜仁二升去皮豬蹄三具上十八味搗為散和蓽豆以水桃仁冬瓜仁黃瓜蔞子揉之令碎豬蹄汁中挼令散和藥作餅子曝乾搗篩更和豬蹄汁又捻作餅更曝乾汁盡乃止搗篩為散稍稍以洗手面妙面色光悅方五首千金療人令面悅澤好顏色方豬胰三具蕪菁子二兩栝蔞子五兩桃仁三兩去皮上四味以酒和之搗如膏以敷面慎風日妙又方酒漬三月三日桃花服之好顏色治百病又方採三株桃花陰乾為散以酒飲服方寸匕日三令面光悅如紅出第六卷中千金翼令面生光方密陀僧以乳煎塗面郎生光出第五卷中延年去風令光潤桃仁洗面方桃仁五合去皮上一味用粳米飯漿水研之令細以漿水搗取汁令桃仁盡即休微溫用洗面時長用極妙令面色白方四首千金療面黑不白淨方白蘚皮白殭蠶芎藭白附子鷹屎白白芷青木香甘松香白朮白檀香丁子香各三分冬瓜仁五合白梅二七枚去核瓜子一兩杏仁三十枚去皮雞子白七枚大棗三十枚去核豬胰三具面三升麝香二分研上二十味先以豬胰和麵曝令乾然後合諸藥搗篩又以白豆屑二升為散旦用洗面手十日以上太白神驗出第六卷中文仲令人面白似玉色光潤方羊脂狗脂各一升白芷半升烏喙十四枚大棗十枚麝香少許桃仁十四枚甘草一尺炙半夏半兩洗上九味合煎以白芷色黃去滓塗面二十日即變五十日如玉光潤妙又隱居效驗面黑令白去黯方烏賊魚骨細辛栝蔞乾薑蜀椒各三兩上五味切以苦酒漬三日以成煉牛髓二斤煎之以酒氣盡藥成作粉以塗面醜人亦變鮮妙光華近效則天大聖皇后煉益母草留顏方用此草每朝將以洗手面如用澡豆法面上皯䵴及老人皮膚兼皺等並展落浮皮皮落著手上如白垢再洗再有效淳用此藥已後欲和澡豆洗亦得以意斟酌用之初將此藥洗面覺麵皮手滑潤顏色光澤經十日許特異於女面經月餘生血色紅鮮光澤異於尋常如經年久用之朝暮不絶年四五十婦人如十五女子俗名郁臭此方仙人祕之千金不傳即用藥亦一無不效世人亦有聞說此草者為之皆不得真法令録真法如後可勿傳之五月五日收取益母草曝令乾燒作灰取草時勿令根上有土有土即無效燒之時預以水灑一所地或泥一爐燒益母草良久燼無取鬥羅篩此灰干以水熟攪和溲之令極熟團之如雞子大作丸於日裡曝令極干訖取黃土泥泥作小爐子於地四邊各開一小孔子生剛炭上下俱著炭中央著藥丸多火經一炊久即微微著火燒之勿令火氣絶絶即不好經一復時藥熟切不得猛火若藥熔變為瓷巴黃用之無驗火微即藥白色細膩一復時出之於白瓷器中以玉捶研絹篩又研三日不絶收取藥以干器中盛深藏旋旋取洗手面令白如玉女項頸上黑但用此藥揩洗並如玉色祕之不可傳如無玉捶以鹿角捶亦得神驗面皯方十三首廣濟療面皯方雄黃七分雌黃五分並以綿裹於漿水中煮一日光明砂密陀僧五分納豬脂中煮數沸煮訖洗用真珠三分研末硝粉三分白殭蠶三分白芨三分茯苓五分水銀五分和藥末研令消盡上十味各研如粉訖相和又研之令勻少減取和豬脂面脂攪令調每夜用澡豆漿水洗去妝勿衝風及火千金療面皯方李子仁和雞子白塗上則落又方真白羊乳三升羊𦚠兩具以水漬去皮細擘甘草二兩炙末上三味相和一宿先以酢漿水洗面以生布拭之夜塗藥明旦以豬蹄湯洗卻又依前為之即盡又方白附子末以水和塗上頻頻用即落盡又方桂心石薑末蜜和塗之又方杏仁酒浸皮脫搗如泥以絹囊裹夜則拭之效又方水和丹砂術服方寸匕男女七日皆色白也又方美酒浸雞子三枚蜜封四七日成塗面淨好無比又方枸杞根一百斤生地黃三十斤上二味先下篩枸杞又搗碎地黃曝乾合下篩空腹服方寸匕日三效文仲療皯令人面皮薄如蕣萆方鹿角尖取實白處於平石上以水磨之稍濃取一升二合乾薑一兩上二味搗篩乾薑以和鹿角汁攪使調每夜先以暖漿水洗面軟帛拭乾取上白蜜塗面以手摩使蜜盡手指不黏為候後塗藥平明還以暖漿水洗之二三日顏色驚人塗藥不用過見風日妙救急療面皯方芍藥茯苓杏仁去皮防風細辛白芷各一兩白蜜一合上七味搗為散先以水銀霜敷面三日方始取前件白蜜以和散藥敷面夜中敷之不得見風日向曉任意作粉能常用大佳每夜先須漿水洗面後敷藥古今録驗療面皯方取白蜜和茯苓粉敷面七日愈又療面皯黯蘇合煎方蘇合香麝香白附子炮女菀蜀水花各二兩青木香三兩雞舌香鸕鷀屎各兩上八味先取糯米二升淅硬炊一斗生用一斗合醇酢用水一斛五斗稍稍澄取汁合得一斛煮並令沸以綿裹諸藥納著沸漿中煎得三升藥熟以澡豆洗皯處令燥以藥敷皯上日再欲敷藥常以酢漿水洗面後塗藥塗藥至三四合皯處當小急痛皯處微微剝去便白以漿三洗三敷玉屑膏訖白粉之若急痛勿怪癢勿搔之但以粉粉上面按抑癢處滿百日可用脂胡粉取瘥面皯黯方二十一首肘後療面多皯黯如雀卵色者方以苦酒漬白朮以拭面上即漸漸除之又方以羚羊膽酒二升合煮三沸以塗拭之日三瘥又方羊膽豬頭細辛末煎三沸塗面平旦以醋漿水洗之又方茯苓白石脂等分末和蜜塗之日三除去文仲療皯黯方杏仁去皮搗末雞子白和塗經宿拭之又方桃花瓜子各等分搗以敷面又方茯苓末以蜜和敷之備急療皯黯方雞子一枚去黃硃砂末一兩上二味硃砂末納雞子中封固口與雞同令伏雛候雞雛出即取之以塗面立去也又方七月七日取露蜂房子於漆杯中漬取汁重濾絞之以和胡粉塗又去黯黑志方桑灰艾灰各三升上二味以水三升淋之又重淋三遍以五色帛納中合煎令可丸以敷黯上則爛脫乃以膏塗之並滅瘢痕甚妙小品療面黯滅瘢痕除皯去黑黑志方薺苨二分桂心一分上二味搗篩以酢漿水服方寸匕日一止即脫又服梔子散瘥千金治面靤千金療面皯黯令悅白潤好及手方豬蹄二具治如食法白梁米一升汰令淨以水五升煮蹄爛澄取清汁三升白茯苓商陸各五兩葳蕤藁本白芷各三兩上六味以豬蹄汁並桃仁一升合煮取二升去滓以白瓷器中貯之納甘松零陵香各一兩以綿裹漬以敷之又澡豆方豬胰五具干之白茯苓藁本白芷各四兩甘松香零陵香各三兩白商陸五兩大豆末二升絹篩藋灰一斗火煉上九味搗篩調和訖收貯稍稍取前瓷中汁和以洗手面只用暖酢漿洗淨後任意水洗如常八月九月則合冷處貯之至三月以後勿用神良又䵴皯面方沉香牛黃薰陸香雌黃鷹屎各三分丁香一分末水銀一兩玉屑三分上八味作粉以蜜和塗之又䵴面內外療方以成煉松脂為末溫酒服二合日三服盡二升即瘥又方白芷白蠟各八兩白附子辛夷烏頭炮防風藿香商陸各二分藁本葳蕤各四兩零陵香三分麝香一分牛脂一升鵝脂一升羊脂五合麻油二合上十六味細銼以酢漬浹浹然一宿以諸脂油煎白芷色黃膏成以皂莢湯洗面敷之日三瘥又療面䵴方白礬燒汁盡硫黃白附子各一分上三味搗篩以酢一盞漬之一宿夜淨洗面塗之勿見風白如雪也翼同又方雞子三枚丁香一兩醋一升上三味漬七日取雞子白研丁香胡粉一兩和之洗面夜以藥塗之甚妙又方羚羊膽牛膽上二味以醋二升合煮三沸塗之瘥千金翼面藥方療皯䵴及㾦瘰並皮膚皴劈方防風藁本辛夷芍藥商陸根白芷牛膝當歸細辛密陀僧芎藭獨活葳蕤木蘭皮零陵香雞舌香丁香麝香真珠各一兩蕤仁杏仁二兩去皮臘月豬脂三升煉油一升獐鹿腦各一具無以羊腦充牛髓五升上二十五味先以浸腦髓使白藿香以上㕮咀如麥豆乃於腦髓脂油中煎三上三下以綿絞濾去滓入麝香及真珠末等研攪千遍凝即塗面上謹按千金翼云二十九味遂以諸本並千金翼數之但二十五味上云藿香以上㕮咀恐並藿香更有三味必效療䵴皯令面白悅澤白附子膏方白附子青木香丁香各一兩商陸根一兩細辛三兩酥半升羊脂三兩密陀僧一兩研金牙三兩上九味以酒三升漬一宿煮取一升去滓納酥煎一升膏夜塗面上旦起溫水洗不得見大風日瘥面皯皰方一十五首劉涓子療面皯皰麝香膏方麝香三分附子一兩炮當歸芎藭細辛杜蘅白芷芍藥各四分上八味切以臘月豬膏一升半煎三上三下去滓下香膏以敷疱上日三瘥肘後療年少氣盛面生皯皰方冬瓜子冬葵子柏子仁茯苓各等分上四味為散食後服方寸匕日三服又方黃連一斤木蘭皮十兩豬肚一具治如食法上三味㕮咀二味納肚中蒸於二鬥米下以熟切曝乾搗散食前以水服方寸匕日再又方麻黃三兩甘草二兩炙杏仁三兩去尖皮上三味搗篩酒下一錢匕日三服又方黃連二兩蛇床子四合上二味搗末以面脂和塗面日再瘥文仲療面皯皰方胡粉水銀以臘月豬脂和敷之又方熟研水銀向夜塗之平明拭卻三四度瘥又方土瓜根搗以胡粉水銀青羊脂合塗面皯處當瘥備急療面皯皰方糜脂塗拭面上日再又方鷹屎白二分胡粉一分上二味以蜜和敷面上瘥又主少年面上起細疱方挼上浮萍㩉之可飲少許汁良通按疑缺一水字又方以三年苦酒漬雞子三宿當軟破取塗之瘥古今録驗療面皯皰及産婦黑䵴如雀卵色羊膽膏方羊膽一枚豬脂一合細辛一分上三味以羊膽煎三上三下膏成夜塗敷早起洗以漿水洗去驗又療面䵴疱皯玉屑膏方玉屑珊瑚木蘭皮各三兩辛夷去毛白附子芎藭白芷各二兩牛脂五兩冬瓜仁十合桃仁一升豬脂五合白狗脂二斤商陸一升上十三味切煎三上三下白芷色黃其膏成洗面塗膏神驗又療面黑似土皯皰白藍脂方白藍一分白礬一分燒石脂一分杏仁半分去尖皮上四味搗篩雞子和夜塗面明旦以井花水洗之白藍即白蘞也甚妙老與少同面渣疱方一十三首劉涓子療面渣疱木蘭膏方木蘭皮防風白芷青木香牛膝獨活藁本芍藥白附子杜蘅當歸細辛芎藭各一兩麝香二分上十四味銼以臘月豬脂二升微火煎三上三下絞去滓入麝香調以敷面上妙出第五卷中肘後療面及鼻病酒渣方木蘭皮一斤漬酒用三年者百日出曝乾梔子仁一斤上二味合搗為散食前以漿水服方寸一匕日三良千金翼木蘭皮五兩梔子仁六兩又方鸕鷀矢末以臘月豬膏和塗之千金同又方真珠胡粉水銀等分上三味以豬膏研令相和塗之佳又方馬藺子花搗封之佳集驗療面上渣疱皯䵴方蒺藜子梔子仁豉各一升上三味搗合如泥以醶漿和如泥臨臥以塗面上日未出便洗瘥千金有木蘭皮一斤翼云半斤又木蘭散方木蘭皮一斤上一味以三年酢漿漬之百日出於日中曝之搗末服方寸匕日三古今録驗主疱方雄黃硝粉末水銀並等分上三味以臘月豬脂和以敷面疱上瘥止又猝得面皰方土瓜根水銀胡粉青羊脂等分上四味為粉和敷面疱上瘥止又方胡粉二兩水銀二分上二味和豬脂研勻以敷之千金同又男女疱面生瘡方黃連二兩牡礪三兩熬上二味搗篩以粉瘡上頻敷之即瘥又療面皰癢腫白附子散方白附子青木香由跋各二兩麝香二分上四味為散以水和塗面千金翼有細辛二兩又療面皰氣甚如麻豆瘡痛搔之黃汁出及面黑色黯黮不可去之葵子散方冬葵子柏子茯苓等分上三味為散以酒服方寸匕日三瘥千金翼有冬瓜子麵粉滓方四首千金療麵粉滓方礬石熬汁盡上一味以酒和塗之三數度佳甚妙備急療婦人面上粉滓赤膏方光明砂四分研麝香二分牛黃半分水銀四分以面脂和研雄黃三分上五味並精好藥搗篩研如粉以面脂一升納藥中和攪令極稠一如敷面脂法以香漿水洗敷藥避風經宿粉滓落如蔓菁子狀此方祕不傳又主去粉滓皯䵴方白蘞白石脂杏仁各等分上三味搗散以雞子白和以井花水洗敷之三五遍即瘥又方黃耆白朮白蘞葳蕤各十一分商陸蜀水花鷹屎白各一兩防風芎藭白芷細辛白附子炮杏仁去皮尖青木香各六分上十四味搗為粉以雞子白和之作挺子曝乾研之以漿水和塗夜敷朝洗瘥出第六卷中化面方二首張文仲療化面方真珠研光明砂研冬瓜仁各二分水銀四分上四味以四五重絹袋盛於銅鐺中以酢漿水微火煮一宿一日始堪用取水銀和麵脂熟研使消合珠冬瓜子末更和調以敷面取瘥為度備急面上𪿨礧子化面仍令光潤皮急方土瓜根上一味搗末以漿水和令調入夜以漿水洗面塗藥旦洗卻即瘥雜療面方六首肘後療面生㾦瘰如麻子中有粟核方石灰以水漬之才淹以米一把置上令米釋陶取一一置㾦瘰上當漸拭之軟乃爪出粟以膏藥敷之即瘥千金療面上風方玉屑研密陀僧研令如粉珊瑚研各二大兩白附子三兩上四味細研如粉用酥和夜塗面上旦洗瘥出第六卷中千金翼芎藭湯主面上及身體風瘙癢方麻黃十分去節芎藭白朮吳茱萸防風枳實炙羌活各二兩薯蕷四兩蒺藜子六兩烏喙二兩炮甘草二兩炙生薑六分上十二味切以水九升七合煮取二升五合去滓分服甚妙驗又洗方蒴藋根蒺藜景天葉各一兩蛇床子五兩玉屑二兩上五味以水一斗煮取三升稍稍洗之慎風日瘥又急麵皮方火豬蹄一具治如食法上一味以水二升清漿水一升煎成膠以洗面又和澡豆塗面以漿水洗令麵皮急矣出第五卷中蘇澄去面皯及粉渣方取三年大酢二升漬雞子五枚七日雞子當軟如泥去酢瀉著瓷器中以胡粉兩雞子許和研如膏蓋口蒸之於五斗米下熟藥成封之勿泄氣夜欲臥時研塗面皰粉刺上旦以漿水洗面日別如此百日瘥勿見風效頭風白屑方四首廣濟療頭風白屑癢發落生髮主頭腫旋悶蔓荊子膏方蔓荊子一升生附子三十枚羊躑躅花四兩葶藶子四兩零陵香二兩蓮子草一握上六味切以綿裹用油二升漬七日每梳頭常用之若發稀及禿處即以鐵精一兩以此膏油於瓷器中研之摩禿處其發即生也延年松葉膏療頭風鼻塞頭旋發落白屑風癢並主之方松葉切一升天雄去皮松脂杏仁去皮白芷各四分莽草甘松香零陵香甘菊花各一兩秦艽獨活辛夷仁香附子藿香各二兩烏頭去皮蜀椒汗芎藭沉香青木香牛膝合三兩躑躅花一兩半並銼上二十一味㕮咀以苦酒三升浸一宿以生麻油一斗微火煎三上三下苦酒氣盡膏成去滓濾盛貯以塗髮根日三度摩之又療頭癢搔之白屑起方大麻仁三升搗碎秦椒二升上二味搗納泔汁中漬之一宿明旦濾去滓溫以沐發訖用後方白芷一斤雞子三枚芒硝一升三味以水四升煮取三升去滓停小冷納雞子清及硝攪令調更溫令熱分為三度澤頭覺頭癢即作洗之不過三度永除又療頭風發落或頭癢腫白屑方蔓荊子一升碎防風三兩寄生三兩秦椒一兩大麻仁一升白芷四兩上六味切以水一斗五升煮取一斗去滓以洗頭三四度瘥加芒硝一升亦妙沐頭去風方五首集驗療頭風方甘菊花獨活茵芋防風細辛蜀椒皂莢桂心杜蘅莽草上十味分等水煮以沐頭必效又主風頭沐湯方豬椒根三兩麻黃根茵芋防風各一兩細辛上五味切以水二斗煮取一斗以沐頭甚妙又主頭風搔之白屑起雞子沐湯方新生烏雞子三枚上一味以五升沸湯揚之使溫溫破雞子納中攪令勻分為三度沐令發生去白屑風癢瘥必效沐發方取生柏葉細銼一斗煮取湯沐發妙又方取杏仁烏麻子二味搗以水投濾取汁並搗用甚妙頭風白屑兼生髮方八首廣濟療頭風白屑生髮白令黑方浮木子五升未識以九月九日以前採臨時搗末去子鐵精四兩零陵香二兩丁香子二兩上四味細切以絹袋盛用生麻油二升漬經二七日洗頭訖每日塗之方驗集驗療頭風癢白屑風頭長髮膏方蔓荊子附子炮細辛石南草續斷皂莢澤蘭防風杏仁去皮白芷零陵香藿香馬鬐膏熊脂豬脂各二兩松葉切半升莽草上十七味㕮咀以苦酒漬一宿明旦以脂膏等煎微微火三上三下以白芷色黃膏成用以塗頭中甚妙又療頭風癢白屑生髮膏方烏喙莽草石南草細辛皂莢續斷澤蘭白朮辛夷白芷防風各二兩柏葉切二升松葉切二升豬脂四升上十四味以苦酒浸一宿以脂煎三上三下膏成去滓濾收沐發了以塗之妙千金同崔氏松脂膏療頭風鼻塞頭旋發落復生長髮去白屑方松脂白芷各四兩天雄莽草躑躅花各一兩秦艽獨活烏頭辛夷仁甘松香零陵香香附子藿香甘菊花各二兩蜀椒芎藭沉香牛膝青木香各三兩松葉切一升杏仁四兩去皮碎上二十一味切以苦酒二升半漬一宿用生麻油九升微火煎令酒氣盡不吒去滓以摩頂上髮根下一摩之每摩時初夜臥摩時不用當風晝日依常檢校東西不廢以瘥為度又蓮子草膏療頭風白屑長髮令黑方蓮子草汁二升松葉青桐白皮各四兩棗根白皮三兩防風芎藭白芷辛夷仁藁本沉香秦艽商陸根犀角屑青竹皮細辛杜若蔓荊子各二兩零陵香甘松香白朮天雄柏白皮楓香各一兩生地黃汁五升生麻油四升豬鬃脂一升馬鬐膏一升熊脂二升蔓青子油一升上三十味細切以蓮子草汁並生地黃汁浸藥再宿如無蓮子草汁如地黃汁五小升浸藥於微火上納油脂等和煎九上九下以白芷色黃膏成布絞去滓欲塗頭先以好泔沐發後以敷頭髮摩至肌又洗髮取棗根白皮銼一升以水三升煮取一升去滓以沐頭髮塗膏驗出第二卷中延年療頭風白屑風癢長髮膏方蔓荊子附子去皮澤蘭防風杏仁去皮零陵香藿香芎藭天雄辛夷各二兩沉香一兩松脂白芷各二兩馬鬐膏松葉切熊脂各一兩生麻油四升上十七味以苦酒漬一宿以脂等煎緩火三上三下白芷色黃膏成去滓濾收貯塗發及肌中摩之日三兩度瘥又療熱風沖發發落生髮膏方松葉切蓮子草切煉成馬鬐膏棗根皮切各一升韭根切蔓荊子碎各三合竹瀝豬脂各二升防風白芷各二兩辛夷仁吳藍升麻芎藭獨活寄生藿香沉香零陵香各一兩上十九味以棗根煮汁竹瀝等浸一宿以脂等煎之候白芷色黃膏成以塗頭髮及頂上日三五度妙古今録驗生髮及療頭風癢白屑膏方烏喙莽草細辛續斷石南草辛夷仁皂莢澤蘭白朮防風白芷各二兩柏葉竹葉切各一升豬脂五升生麻油七升上十五味以苦酒漬一宿以油脂煎候白芷色黃膏成濾捩收以塗頭髮先沐洗後用之妙生髮膏方一十一首廣濟生髮方蓮子草汁一大升熊白脂一大合豬鬐膏一合生麻油一合柏白皮切三合山韭根切三合瓦衣切三合上七味以桐器煎之候膏成去滓收貯每欲梳頭塗膏令頭肌中發生又黑又生髮膏方細辛防風續斷芎藭皂莢柏葉辛夷仁各一兩八銖寄生二兩九銖澤蘭零陵香各二兩十六銖蔓荊子四兩桑根汁一升韭根汁三合三勺竹葉切六合松葉切六升烏麻油四大升白芷六兩十六銖上十七味以苦酒韭根汁漬一宿以綿裹煎微火三上三下白芷色黃去滓濾以器盛之用塗摩頭髮日三兩度深師療頭風烏喙膏生髮令速長而黑光潤方烏喙莽草石南草續斷皂莢去皮子熬澤蘭白朮各二兩辛夷仁一兩柏葉切半升豬脂三升上十味以苦酒漬一宿以脂煎於東向灶釜中以葦薪煎之先致三堆土每三沸即下致一堆土候沸定卻上至三沸又置上堆上三畢成膏訖去滓置銅器中數北向屋溜從西端至第七溜下埋之三十日藥成小兒當刮頭日三塗大人數沐沐已塗之甚驗千金療脈極虛寒發墮落安發潤方桑根白皮切一升上一味淹漬煮五六沸去滓以洗沐發數數為之不復落也又方麻子三升碎白桐葉切一把上二味以泔汁二升煮取八九沸去滓洗沐頭發不落而長也翼同又生髮膏方胡麻油一升雁脂一合丁子香甘松香各一兩半吳藿香細辛椒各二兩澤蘭白芷牡荊子苜蓿香大麻子各兩芎藭防風莽草杏仁各三兩去皮竹葉切五合上十七味切以酢漬一宿煎之以微火三上三下白芷色黃膏成去滓以塗發及頂尤妙出第十三卷中千金翼生髮膏令發速長黑敷藥時特忌風方烏喙莽草續斷皂莢去皮子澤蘭竹葉細辛白朮各二兩辛夷防風各一兩柏葉切四兩杏仁別搗松葉各三兩豬脂三升上十四味先以米酢漬一宿以脂煎三下三上膏成去滓塗發及頂上又長髮方蔓荊子三升大附子二枚上二味以酒一斗二升漬之以瓷器盛之封頭二十日取雞脂煎以塗之澤以汁櫛發十日長一尺勿近面塗驗又生髮附子松脂膏方附子松脂各二兩蔓荊子四兩搗篩上三味以烏雞脂和瓷器盛密縛頭於屋北陰乾百日藥成馬鬐膏和以敷頭如澤勿近面驗又生髮牆衣散方牆衣五合曝乾搗末鐵精一合合歡木灰二合水萍末三合上四味搗研末以生油和少許如膏以塗發不生處日夜再即生髮效並出第五卷中近效生髮方蔓荊子青葙子蓮子草各一分附子一枚碎頭髮灰二匕上五味以酒漬納瓷器中封閉經二七日藥成以烏雞脂和塗之先以泔洗後敷之數日生長一尺也生眉毛方二首千金生眉毛方爐上青衣鐵生分等上二味以水和塗之即生甚妙又方七月烏麻花陰乾末生烏麻油二味和塗眉即生妙令發黑方八首深師療生髮黑不白澤蘭膏方細辛續斷皂莢石南草澤蘭厚朴烏頭莽草白朮各二兩蜀椒二升杏仁半升去皮上十一味切以酒漬一宿以煉成豬脂四斤銅器中向東炊灶中煎三上三下膏成絞去滓拔白者以辰日塗藥皆出黑髮十日效又生長髮令黑有黃白者皆黑魏文帝用效祕之方黃耆當歸獨活芎藭白芷芍藥莽草防風辛夷仁乾地黃藁本蛇銜各一兩薤白切半升烏麻油四升半馬鬐膏二升上十五味切以微火煎三上三下白芷黃膏成去滓洗髮訖後塗之千金令白髮還黑方隴西白芷升旋覆花秦椒一升桂一尺上四味下篩以井華水服方寸匕日三三十日白髮還黑禁房室又方烏麻九蒸九曝搗末以棗膏和丸久服之翼同又方取黑椹水漬之頻沐發即黑效可塗敷之又方取生麻油浸烏梅塗發良又方以鹽湯洗沐以生麻油和蒲葦灰敷之常用效出第十三卷中千金翼瓜子散主頭髮早白又虛勞腦髓空竭胃氣不和諸臟虛絶血氣不足故令人發早白少而生蒜髮及憂愁早白遠視䀮䀮得風淚出手足煩熱恍惚忘誤連年下痢服之一年後大驗方瓜子一升白芷松子去皮當歸芎藭甘草炙各二兩上六味搗散食後服方寸匕日三酒漿湯飲任性服之忌如常法出第五卷中拔白髮良日並方三首千金翼白髮令黑方八角附子一枚大酢半升上二味於銅器中煎兩沸納好礬石大如碁子許一枚消盡內香脂三兩和令相得攪至凝內竹筒內拔白髮以膏塗拔根即生黑髮也出第五卷中備急拔白毛令黑毛生方拔去白毛以好白蜜敷拔處即生黑毛眉中無毛以鐵挑傷敷蜜亦生眉毛比見諸人以石子研丁香汁拔白毛訖急手以敷孔中即生黑毛此法神驗延年拔白髮良日正月四日二月八日三月十二十三日兩日並得四月十六日五月二十日六月二十四日七月二十八日八月十九日九月十五日十月十日十一月十日十二月十日上並以日正午時拔當日不得飲酒食肉五辛經一拔以後黑者更不變千金同變白髮染髮方五首範汪王子喬服菊增年變白方菊以三月上寅日採名曰五英六月上寅日採名曰容成九月上寅日採名曰金精十二月上寅日採名曰長生者根莖也陰乾百日取等分以成日合搗千杵下篩和以蜜丸如梧桐子日三服七丸百日身體潤一年白髮變黑二年齒落復生三年八十者變童兒又染髮方胡粉一分白灰一分上二味以雞子白和先以泔漿洗令淨後塗之即急以油帛裹之一宿以澡豆洗卻黑軟不絶甚妙必效染白髮方揀細粒烏豆四升上一味以醋漿水四斗煮取四升去卻豆以好灰汁淨洗髮待乾以豆汁熱塗之以油帛裹之經宿開之待乾即以熊脂塗揩還以油帛裹即黑如漆一塗三年不變妙驗又方搗木槿葉以熱湯和汁洗之亦佳近效換白髮及髭方嚴中書處得云驗熊脂二大兩臘月者佳白馬鬐脂一兩細切熬之以綿濾絞汁婆羅勒十顆其狀似尖齊於去皮取汁但以指甲掐之即有汁生薑一兩亦鐺中熬之母丁香半大兩上五味二味搗為末其脂煉濾之以藥末相和令勻取一小槐枝左攪數千遍少傾即凝或似膏即拔白髮以辰日良以槐枝點藥拔一條即以藥令入發眼孔中以措頭熟揩之令藥入十餘日便黑髮生此方妙發黃方三首肘後發黃方臘月豬脂膏和羊矢灰蒲灰等分敷黑也千金並翼同千金發黃方大豆五升醋漿水二斗上二味煮取五升汁淋之頻為之黑翼同千金翼療發黃方熊脂塗髮梳之散頭入床底伏地一食頃郎出便盡黑不過一升脂驗頭髮禿落方一十九首深師療發白芨禿落茯苓朮散方白朮一斤茯苓澤瀉豬苓各四兩桂心半斤上五味搗散服一刀圭日三食後服之三十日發黑又療禿頭方蕪菁子末和酢敷之日一兩度千金同又方麻子二升熬焦末上一味以豬脂和塗之發生為度千金同又方東行棗根長三尺以中央空上一味以甑中心蒸之以器承兩邊汁以敷頭即生髮良千金同肘後作桑根良又方麻子三升上一味搗末研納泔中一宿去滓以沐發便生又方取爛熟黑椹二升上一味於瓷瓶中三七日化為水以塗洗之發生妙千金同又療發禿落生髮膏方馬鬐膏驢鬐膏豬脂熊脂狗脂煉成各半合升麻防風薺苨各二兩蜣螂四枚莽草白芷各兩上十一味以脂煎諸藥三上三下膏成去滓收以塗之千金並翼同又主發落生髮方大黃六分蔓荊子一升白芷防風附子芎藭莽草辛夷細辛椒當歸黃芩各一兩馬鬐膏五合豬膏三升上十四味煎之以白芷色黃先洗後敷之驗又主風頭毛髮落不生方取鐵上生衣研以臘月豬脂塗之並主眉毛落悉生千金云合煎三沸又長髮方麻子一升熬令黑押取油以敷頭長髮鷹脂尤妙千金同又方多取烏麻花瓷甕盛密蓋封之深埋之百日出以塗發易長而黑妙千金療發落不生方取羊糞灰淋汁洗之三日一洗不過十洗大生翼同千金療發落方柏葉一升附子二兩上二味搗以豬脂和作三十丸每洗頭時即納一丸於泔中洗發即不落其藥以布裹密器貯勿令漏泄之又療發落不生方取石灰三升水拌並令濕炒令極熱以絹袋盛之取好酒三升漬之密封冬二七日春秋七日取酒溫服一合常令酒氣相接七日落止百日服終身不落新發旋生又方取桑根白皮一石水一石煮五沸以沐頭三遍即落止並出第五卷中必效療頭一切風發禿落更不生主頭中二十種病頭眩面中風以膏摩之方䕡茹三兩半去皮細辛附子各二兩桂心半兩上四味搗篩以豬膏勿令中水去上膜及赤脈二十兩搗令脂銷盡藥成搗訖仍研恐其中有脂膜不盡以生布絞掠取以密器貯之先用桑柴灰汁洗髮令淨方云桑灰兩日洗待乾以藥摩須令入肉每日須摩如非十二月合則用生烏麻油和極效近效韋慈氏療頭風發落並眼暗方蔓荊實三兩研桑上寄生桑根白皮各二兩韭根切三合白芷二兩甘松香零陵香各一兩馬鬐膏三合烏麻油一升甘棗根白皮汁三升松葉切二合五粒者上十一味細切諸藥納棗根汁中浸一宿數數攪令調濕匝以後旦納油脂中緩火煎之勿令火熱三五日候棗汁竭白芷色黃膏成去滓每日揩摩鬢髮及梳洗其藥浸經宿臨時以綿寬裹煎之膏成去滓綿濾以新瓷瓶盛稠濁者即先用卻不堪久停特勿近手糜壤也又宜服防風蔓荊子丸方防風黃連乾地黃各十六分蔓荊子二十分甘皮六分葳蕤十分甘草八分炙茯神十二分大黃八分錦文者上九味搗篩蜜和丸如桐子飲下二十丸稍稍加之以大腸暢為度盡更合服除眼中黑花令眼目明以瘥為度劉尚書療頭中二十種風發禿落摩之即此療頂如剝似銅盆者若小發落不足為難方蜀椒三兩半莽草二兩乾薑半夏桂心䕡茹附子細辛各一兩並生用上八味細搗篩以生豬脂剝去筋膜稱取二十兩和前件藥合搗令消盡脂其藥成矣先以白米泔沐發令極淨每夜摩之經四五日即毛孔漸漸日生軟細白皮毛十五日後漸漸變作黑髮至一月四十日待發生五寸以上任止若至五日不停彌佳好酥及生油和藥亦得又傷寒鼻塞但以摩之瘥白禿方一十二首集驗療白禿方以羊肉如作脯炙令香及熱以拓上不過三五度即瘥千金同又方以大豆骷髏骨二味各燒末等分以臘月豬脂和如泥塗之立瘥千金松瀝煎療頭瘡及白禿方松瀝七合丹砂研雄黃研取精各二兩水銀研黃連各一兩礬石一兩燒本方無礬有硝粉一兩燒上六味搗散納瀝中攪令調以塗之先以泔洗髮令淨及瘡令無痂後敷藥日三後當作膿膿訖更洗塗藥如此三度作膿訖以甘草湯去藥毒可十度許洗即瘥又療白禿發落生白痂終年不瘥方五味子三分蓯蓉二分松脂二分蛇床子一分遠志三分菟絲子五分雄黃研雌黃研各一分白蜜一分雞屎白半分上十味搗篩以豬膏一升合煎先入雄黃雌黃次雞屎白次蜜次松脂次入諸藥末並先各各別末之候膏成先以桑柴灰洗頭後敷之又療白禿方煮桃皮汁飲並洗頭訖以面豉二味和以敷之妙又方炒大豆令焦黑搗末和臘月豬脂熱暖之以塗敷上可裹勿令見風日並出第六卷中千金翼王不留行湯主白禿及頭面久瘡去蟲止痛方王不留行東引桃皮各五兩蛇床子三升東引茱萸根五兩苦竹葉三升牡荊實蒺藜子各三升大麻子仁一升上八味以水二斗煮取一斗洗瘡日再並療癰疽妒乳月蝕瘡爛千金同又方以桃花末和豬脂敷上瘥為度又松脂膏主白禿及癰疽百種瘡悉治方杜蘅雄黃研木蘭皮礬石燒研附子大黃石南秦艽真珠苦參水銀各一兩松脂六兩上十二味細切諸藥以酢漬一宿豬脂一斤半煎之以附子色黃去滓乃納礬石雄黃水銀更煎三兩沸待凝以敷之並出第五卷中千金同必效主禿瘡方以童子小便暖用洗之揩令血出取白鴿糞五合熬末和釅醋令調塗之即瘥又主禿方取三月三日桃花開口者陰乾與桑椹等分搗末以豬脂和以灰汁洗後塗藥瘥又方柳細枝一握取皮水銀大如小豆皂莢一挺碎上三味以醋煎如餳以塗之赤禿方三首千金療赤禿方搗黑椹三升如泥先灰汁洗後以塗之又服之甚妙又方燒牛羊角灰和豬脂敷之又方馬蹄灰和臘月豬脂塗之令發不生方三首千金令毛髮不生方蚌灰以鱉脂和拔卻毛髮即塗永不生又方取狗乳塗之又方拔毛髮以蟹脂塗之永不復生鬼舐頭方二首千金療鬼舐頭方燒貓屎灰以臘月豬脂和敷之又方取赤磚末以蒜搗和敷之澡豆方八首廣濟療澡豆洗面去皯䵴風癢令光色悅澤方白朮白芷白芨白蘞茯苓藁本葳蕤薯蕷土瓜根天門冬百部根辛夷仁栝蔞藿香零陵香雞舌香各三兩香附子阿膠各四兩炒白麵三斤棟子三百枚蓽豆五升皂莢十挺去皮子上二十二味搗篩以洗面令人光澤若婦人每夜以水和漿塗面至明溫漿水洗之甚去面上諸疾千金療澡豆方丁香沉香桃花青木香木瓜花鍾乳粉各三兩麝香半兩㮏花櫻桃花白蜀葵花白蓮花紅蓮花各四兩李花梨花旋覆花各六兩玉屑真珠各二兩蜀水花一兩上十八味搗末乳等並研以絹下之合和大豆末七合研之千遍密貯勿泄常以洗手面後作妝百日面如玉光潤悅澤去臭氣粉滓咽喉臂膊皆用洗之悉得如意又澡豆方豬胰一具去脂豆末四升細辛土瓜根白朮藁本防風白芷茯苓商陸根白附子杏仁桃仁各四兩去尖皮栝蔞三枚皂莢五挺炙去皮子冬瓜仁半升雀屎半合菟絲子一合搗末上十八味搗末以面一斗用漿水和豬胰研令爛和諸藥及面作餅子曝乾搗絹篩收貯勿令遇風洗手面極妙又澡豆令人洗面光潤方白解皮鷹屎白白芷青木香甘松香白朮桂心麝香白檀香丁子香各三兩冬瓜子五合白梅三七枚雞子白七枚豬胰三具面五升土瓜根一兩杏仁二兩去皮上十七味以豬胰和麵曝令乾然後諸藥搗散和白豆末三升以洗手面十日如雪三十日如凝脂妙無比崔氏澡豆悅面色如桃花光潤如玉急麵皮去皯𪒟粉刺方白芷七兩芎藭五兩皂莢末四兩葳蕤白朮各五兩蔓荊子二合冬瓜仁五兩梔子仁三合栝蔞仁三合蓽豆三升豬腦一合桃仁一升去皮鷹屎三枚商陸三兩細銼上十四味諸藥搗末其冬瓜仁桃仁梔子仁栝蔞仁別搗如泥其豬腦鷹屎合搗令相得然後下諸藥更搗令調以冬瓜瓤汁和為丸每洗面用漿水以此丸當澡豆用訖敷面脂如常妝飾朝夕用之亦不避風日備急蓽豆香澡豆方蓽豆一升白附子芎藭芍藥白朮栝蔞商陸根桃仁去皮冬瓜仁各二兩上九味搗末以洗面如常法此方甚妙延年澡豆洗手面藥豆屑方白茯苓土瓜根商陸根葳蕤白朮芎藭白芷栝蔞藁本桃仁各六兩去皮皂莢五挺去皮子豆屑二升豬胰三具曝乾豬蹄四具治如食法爛煮取汁面一斗上十五味取豬蹄汁拌諸藥等曝乾搗散以作澡豆洗手面妙蘇澄藥澡豆方白芷芎藭栝蔞子各五兩青木香雞舌香各三兩皂莢十兩去皮子炙蓽豆赤小豆各二升上八味搗末和散任用洗手面去皯皰妙手膏方三首千金翼手膏方桃仁杏仁各二兩去皮橘仁一合赤匏十枚辛夷仁芎藭當歸各一兩大棗二十枚牛腦羊腦白狗腦各二兩無白狗各狗亦得上十一味搗先以酒漬腦又別以酒六升煮赤匏以上藥令沸待冷乃和諸腦等勻然後碎辛夷等三味以綿裹之棗去皮核合納酒中以瓷器貯之五日以後先洗手訖取塗手甚光潤而忌火炙手備急作手脂法豬胰一具白芷桃仁去皮細辛各兩辛夷冬瓜仁黃瓜蔞仁各二兩末酒二升上八味煮白芷沸去滓膏成以塗手面光潤妙古今録驗手膏方白芷四兩芎藭藁本葳蕤冬瓜仁棟仁各三兩桃仁一升去皮棗肉二十枚豬胰四具冬瓜瓤汁一升橘肉十枚栝蔞子十枚上十二味以水六升煮取二升酒三升挼豬胰取汁桃仁研入以洗手面口脂方三首千金翼口脂方熟朱二兩紫草末五兩丁香二兩麝香一兩上四味以甲煎和為膏盛於匣內即是甲煎口脂如無甲煎即名唇脂非口脂也備急作唇脂法蠟二分羊脂二分甲煎一合須別作自有方紫草半分硃砂二分上五味於銅鍋中微火煎蠟一沸下羊脂一沸又下甲煎一沸又納紫草一沸次硃砂一沸瀉著筒內候凝任用之古今録驗合口脂法好熟硃砂三兩紫草五兩丁香末二兩麝香末一兩口脂五十挺武德六年十月內供奉尚藥直長蔣合進沉香三升五藥上蘇合四兩半麝香二兩甲香五兩白膠香七兩雀頭香三兩丁香一兩蜜一升上十四味並大稱大兩粗搗碎以蜜揔和分為兩分一分納瓷器瓶內其瓶受大四升內訖以薄綿幕口以竹篾交絡蔽瓶口藿香二兩苜蓿香一兩零陵香四兩茅香一兩甘松香一兩半上五味以水一斗酒一升漬一宿於胡麻油一斗二升納煎之為澤去滓均分著二坩各受一斗掘地著坩令坩口與地平土塞坩四畔令實即以上甲煎瓶器覆中間一尺以糠火燒之常令著火糠作火即散著糠三日三夜燒十石糠即好冷出之綿濾即成甲煎蠟七斤上硃砂一斤五兩研令精細紫草十一兩於蠟內煎紫草令色好綿濾出停冷先於灰火上消蠟納甲煎及攪看色好以甲煎調硬即加煎軟即加蠟取點刀子刃上看硬軟著紫草於銅鐺內消之取竹筒合面紙裹繩纏以熔脂注滿停冷即成口脂模法取干竹徑頭一寸半一尺二寸鋸截下兩頭並不得節堅頭三分破之去中分前兩相著合令蜜先以冷甲煎塗摸中合之以四重紙裹筒底又以紙裹筒令縫上不得漏以繩子牢纏消口脂瀉中令滿停冷解開就模出四分以竹刀子約筒截割令齊整所以約筒者筒口齊故也前有麝香末一兩後又有麝二兩未詳燒甲煎法六首千金翼甲煎法甲香三兩沉香六兩丁香藿香各四兩薰陸香楓香膏麝香各二兩大棗十枚取肉上八味㕮咀如豆片又以蜜二合和攪納瓷坩中以綿裹口將竹篾交絡蔽之又油六升零陵香四兩甘松二兩綿裹納油中銅鐺緩火煎四五沸止去滓更納酒一升半並納煎坩中亦以竹篾蔽之然後剜地為坑置坩於上使出半腹乃將前小香坩合此口上以濕紙纏兩口仍以泥塗上使厚一寸訖灶下暖坩火起從旦至暮暖至四更止明發待冷看上坩香汁半流瀝入下坩內成矣崔氏燒甲煎香澤合口脂方蘭澤香半斤零陵香一斤甘松香五兩吳藿香六兩新壓烏麻油一升上五味並大斤兩揀擇精細暖水淨洗以酒水漬使調勻經一日一夜並著銅鐺中緩火煮之經一宿通前滿兩日兩宿唯須緩火煎訖漉去香滓澄取清以綿濾揔訖納著瓷坩中勿令香氣泄出封閉使如法沉香一斤丁香甲香各一兩麝香薰陸香艾納各半小兩白膠香蘇合香各一兩上八味並大斤兩令別搗如麻子大先煉白蜜去上沫盡即取沉香等於漆盤中和之使調勻若香乾取前件香澤和使勻散納著瓷器中使實看瓶大小取香多少別以綿裹以塞瓶口緩急量之仍用青竹篾三條𢯆之即覆瓶口於前件所燒香澤瓶口上仍使兩口上下相合然後穿地埋著香澤瓶口共地平覆合香瓷瓶令露乃以濕紙纏瓶口相合處然後以麻搗泥瓶口邊厚三寸盛香瓶上亦令遍厚一寸以炭火繞瓶四邊緩炙使薄幹然後始用糠火馬糞火亦佳燒經三宿四日勿得斷火看之必使調勻不得有多少之處香汁即下不勻三宿四日燒訖即住火其香澤火傷多即焦令帶少生氣佳仍停經兩日使香餅冷訖然始開其上瓶揔除卻更取別瓶納一分香於瓶中燒之一依前法若無別瓶還取舊瓶亦得其三分者香並燒訖未得即開仍經三日三夜停除火訖又經兩日其甲煎成訖澄清斟量取依色鑄瀉其沉香少即少著香澤只一遍燒上香瓶亦得好味五升銅鐺一口銅鉢一口黃蠟一大斤上件蠟置於鐺中緩火煎之使沫銷盡然後傾鉢中停經少時使蠟冷凝還取其蠟依前銷之即擇紫草一大斤用長竹著挾取一握置於蠟中煎取紫色然後擢出更著一握紫草以此為度煎紫草盡一斤蠟色即足若作紫口脂不加余色若造肉色口脂著黃蠟紫蠟各少許若硃色口脂凡一兩蠟色中和兩大豆許硃砂即得但搗前件三色口脂法一兩色蠟中著半合甲煎相和著頭點置竹上看堅柔得所瀉著竹筒中斟酌凝冷即解看之又煎甲煎先須造香油方零陵香藿香各一兩並銼之以酒拌微濕用綿裹內烏麻生油二升緩火一宿絞去滓將油安三升瓶中掘地作坑埋瓶於中瓶口向地面平沉香一斤小甲香八兩麝香三兩蘇合香一兩上六味並搗如大豆粒以蜜拌納一小角瓶中用竹篾封其口勿令香漏將此角瓶倒捶土中瓶口內以紙泥泥兩瓶接口處不令土入用泥泥香瓶上厚六七分用糠火一石燒上瓶其火微微不得烈使糠盡煎乃成矣並出第九卷中古今録驗甲煎方沉香甲香各五兩檀香半兩麝香一分香附子甘松香蘇合香白膠香各二兩上八味搗碎以蜜和納小瓷瓶中令滿綿幕口以竹篾十字絡之又生麻油二升零陵香一分半藿香二分茅香二分又相和水一升漬香一宿著油內微火上煎之半日許澤成去滓別一瓷瓶中盛將小香瓶覆著口入下瓶口中以麻泥封並泥瓶厚五分埋土中口與地平泥上瓶訖以糠火微微半日許著瓶上放火燒之欲盡糠勿令絶三日三夜煎成停二日許得冷取澤用之云停二十日轉好云燒不熟即不香須熟燒此方妙又方蠟蜜各十兩紫草一兩半上三味和蠟煎令調紫草和硃砂並澤瀉筒中蔡尼甲煎方沉香六兩丁香𥴈香四兩楓香青木香各二兩麝香一具大棗十枚肉甲香三兩上八味銼以蜜一合和拌著坩內綿裹竹篾絡之油六升零陵香四兩甘松香二兩綿裹著油中煎之緩火可四五沸即止去香草著坩中埋出口將小香坩合大坩濕紙纏口泥封可七分須多著火從旦至午即須緩火至四更即去火至明待冷發看成甲煎矣造胭脂法一首崔氏造胭脂法准紫𨥥一斤別搗白皮八錢別搗碎胡桐淚半兩波斯白石蜜兩磊上四味於銅鐵鐺器中著水八升急火煮水令魚眼沸納紫𨥥又沸納白皮訖攪令調又沸內胡桐淚及石蜜揔經十餘沸紫𨥥並沉向下即熟以生絹濾之漸漸浸疊絮上好淨綿亦得其番餅小大隨情每浸訖以竹夾如干脯獵於炭火上炙之燥復更浸浸經六七遍即成若得十遍以上益濃美好出第九卷中造水銀霜法二首千金翼飛水銀霜法水銀一斤朴硝八兩大醋半升黃礬十兩錫二十兩成煉三遍者玄精六兩鹽花三斤上七味先煉錫訖又溫水銀令熱乃挼錫中又搗玄精黃礬令細以絹下之又搗錫令碎以鹽花並玄精等合和以醋拌令濕以鹽花一斤藉底乃布藥令平以朴硝蓋上訖以盆蓋合以鹽灰為泥泥縫際干之微火三日武火四日凡七日去火一日開之掃取極須勤心守勿使須臾間解慢則大失矣出第五卷中崔氏造水銀霜法水銀石硫黃伏龍肝各十兩細研鹽花一兩鹽末是也上四味以水銀別鐺熬石硫黃碎如豆並別鐺熬之良久水銀當熱石硫黃硝成水即並於一鐺中和之宜急傾並並不急即兩物不相入並訖下火急攪不得停手若停手即水銀別在一邊石硫黃如灰死亦別在一處攪之良久硫黃成灰不見水銀即與伏龍肝和攪令調並和鹽末攪之令相得別取鹽末羅於鐺中令遍底厚一分許乃羅硫黃伏龍肝鹽末等於鐺中如覆蒸餅勿令全遍底羅訖乃更別羅鹽末覆之亦厚一分許即以盆覆鐺以灰鹽和土作泥塗其縫勿令乾裂裂即塗之唯令勿泄炭火氣飛之一復時開之用火先緩後急開訖以老雞羽掃取皆在盆上凡一轉後即分舊土為四分以一分和成霜研之令調又加二兩鹽末准前法飛之訖棄其土又以餘一分土和飛之四分凡得四轉及初飛與五轉每一轉則棄其土五轉而土盡矣若須多轉更用新土依前法飛之七轉而可用之出第九卷中鹿角桃花粉方二首崔氏鹿角粉方取角三四寸截之乃向炊灶底燒一遍去中心虛惡者併除黑皮訖搗作末以絹篩下水和帛練四五重置角末於中絞作團大小任意於炭火中熟燒即將出火令冷又搗碎作末還以水和更以帛練四五重絞作團如此四五遍燒搗碎皆用水和以後更三遍用牛乳和燒搗一依前法更搗碎於瓷器中用玉錘研作末將和桃花粉佳又桃花粉方光明砂雄黃熏黃並研末真珠末鷹糞珊瑚雲母粉麝香用當門子鹿角粉無問多少各等分上九味研以細為佳就中鹿角粉多少許無妨薰衣濕香方五首千金濕香方沉香三分零陵香𥴈香麝香各六分薰陸香一分丁子香二分甲香半分以水洗熬甘松香二分檀香一分藿香二分上十味粗搗下篩蜜和瓦燒之為濕香薰衣出第六卷中千金翼薰衣濕香方薰陸香八兩詹糖香五兩覽探藿香各三兩甲香二兩青桂皮五兩上六味先取硬者黏濕難碎者各別搗或細切㕮咀使如黍粟然後二薄布於盤上自余別搗亦別於其上有頃篩下者以紗不得太細別煎蜜就盤上以手搜搦令勻後乃搗之燥濕必須調適不得過度太燥則難丸太濕則難燒易盡則香氣不發難盡則煙多煙多則唯有焦臭無復芬芳是故香須粗細燥濕合度蜜與香相稱火又須微使香與緑煙共盡出第五卷中備急六味薰衣香方沉香麝香一兩蘇合香一兩半丁香二兩甲香一兩酒洗蜜塗微炙白膠香一兩上六味藥搗沉香令碎如大豆粒丁香亦搗餘香訖蜜丸燒之若薰衣加艾納香半兩佳又方沉香九兩白檀香一兩麝香二兩並和搗丁香一兩二銖蘇合香一兩甲香二兩酒洗准前薰陸香一兩二銖和搗甘松香一兩別搗上八味蜜和用瓶盛埋地底二十日出丸以薰衣又薰衣香方沉水香一斤銼酒漬一宿𥴈香五兩雞骨者甲香二兩酒洗蘇合香一兩如無亦得麝香一兩丁香一兩半白檀香一兩別研上七味搗如小豆大小相和以細羅羅麝香納中令調以密器盛封三日用之七日更佳欲薰衣先於潤地陳令浥浥上籠頻燒三兩大佳火炷籠下安水一碗燒訖止衣於大箱中裛之經三兩宿後復上所經過處去後猶得半日以來香氣不歇正觀年中敕賜此方裛衣干香方五首千金干香方麝香沉香甘松香各二兩丁香𥴈香各一兩藿香四兩上六味合搗下篩用裛衣大佳出第六卷中千金翼裛衣干香方沉香苜蓿香各五兩白檀香三兩丁香藿香青木香一兩甘松香各一兩雞舌香一兩零陵香十兩艾納香二兩雀頭香一兩麝香半兩上十二味各搗如黍粟麩糠勿令細末乃和相得若置衣箱中必須綿裹之不得用紙秋冬猶著盛熱暑之時香速絶凡諸香草不須及時乃佳若欲少作者准此為大率也出第五卷中備急裛衣香方藿香零陵香甘松香各一兩丁香二兩上四味細銼如米粒微搗以絹袋盛衣箱中南平公主方又方澤蘭香甘松香麝香各二兩沉香檀香各四兩苜蓿香五兩零陵香六兩丁香六兩上八味粗搗絹袋盛衣箱中貯之又方麝香研蘇合香鬱金香各一兩沉香十兩甲香四兩酒洗熬丁香四兩吳白膠香詹糖香六兩上八味搗以絹袋盛裛衣中香炒
