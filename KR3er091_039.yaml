如從後觸其心傴僂者腎心痛也厥心痛如錐刺其心心痛甚者脾心痛也胸中寒脈代時不至上重下輕足不能安地少腹脹上搶心胸脅支滿咳唾有血喉痹癃疝石水女子不字陰暴出淋漏男子精溢脛酸不能久立寒熱消渴黃疸足一寒一熱舌縱煩滿小兒臍風口不開善驚痿厥癲疾洞泄太溪在足內踝後骨上動脈陷者中灸三壯主久瘧咳逆心悶不得臥嘔甚熱多寒少欲閉戶而處寒厥足熱腎脹熱病汗不出默默嗜臥溺黃少腹熱嗌中痛腹脹內腫涎下厥心痛如錐刺其心心痛甚者脾心痛也霍亂出泄不自知消疸善噫氣走喉咽而不能言手足清尿黃大便難嗌中腫痛唾血口中熱如膠胞中有大疝瘕積與陰相引如痛苦況泄上下出渥胸中滿痛乳腫潰咳逆上氣喉咽喝有聲厥氣上逆大鐘在足跟後沖中走太陽足少陰絡灸三壯主實則閉癃悽悽腰脊強痛嗜臥口中熱虛則腰痛寒厥煩心悶喘少氣不足以息腹滿大便難時上走胸中鳴脹滿口舌乾口中吸吸善驚咽中痛不可內食善怒驚恐不樂咳喉中鳴咳唾血大腸結照海陰蹺脈所生在足內踝下灸三壯主熱痛頌心足寒清多汗先取然谷後取太溪大趾上動脈皆先補之目痛引脊少腹偏痛嘔瘛瘲視昏嗜臥痓驚善悲不樂如墮狀汗不出面塵黑病飢不欲食卒疝少腹痛病在左取右右取左立已陰暴起疝女子不下月水婦人淋漓陰挺出四肢淫濼心悶久瘧及諸淋目中赤痛偏枯不能得行大風默默不知所痛視如見星尿黃少腹熱咽乾痹水泉足少陰郤去太溪下一寸在內踝下灸五壯主月經不來來而多心下𤸷目䀮䀮不可遠視復溜一名伏白一名昌陽在足內踝上二寸陷者中灸五壯主腰痛引脊內廉嗌乾腹瘛痛坐起目䀮䀮善怒多言瘧熱少氣足胻寒不能自溫腹䐜切痛引心心如懸陰厥腳腨後廉急不可前卻腸澼便膿血足跌上痛舌卷不能言善笑足痿不收病溺青赤白黃黑青取井赤取榮黃取輸白取經黑取合血痔泄後重腹痛如淋狀及火氣涎出鼻孔中痛腹中雷鳴骨寒熱無所安汗出不休心風四肢腫氣在橫骨風逆四肢腫乳難交信穴在內踝上二寸少陰前太陰後廉筋骨間足陰蹺之郤灸三壯主氣癃㿗疝陰急股引腨內廉骨痛築賓在足內踝上腨分中灸五壯主大疝絶子狂癲疾嘔吐陰谷在膝內輔骨之後大筋之下小筋之上按之應手屈膝而得之灸三壯主舌縱涎下煩悶脊內廉痛溺難陰痿不用少腹急引陰及腳內廉痛婦人漏血腹脹滿不得息小便黃男子如蟲女子如阻寒熱腹偏腫輸府在巨骨下去璇璣旁各二寸陷者中足少陰脈氣所發仰臥而取之灸五壯主咳逆土氣喘不得息嘔吐胸滿不得飲食或中在輸府下一寸六分陷者中足少陰脈氣所發仰臥而取之灸五壯主咳逆上氣涎出多唾呼吸喘悸坐不得安神藏在或中下一寸六分陷者中足少陰脈氣所發仰而取之灸五壯主胸滿咳逆喘不得息嘔吐煩滿不得飲食靈墟在神藏下三寸六分陷者中足少陰脈氣所發仰而取之灸五壯主胸脅支滿痛引膺不得息悶亂煩滿不得飲食神封在靈墟下一寸六分陷者中仲而取之灸五壯主胸脅支滿不得息咳逆乳癰灑淅惡寒步郎在神封下一寸六分陷者中足少陰脈氣所發仰而取之灸三壯主胸脅支滿膈逆不通呼吸少氣喘息不得舉臂幽門一名上門在巨闕旁半寸陷者中衝脈足少陰之會灸五壯主胸脅背相引痛心下溷溷嘔吐多唾飲食不下善噦支滿不能食數咳善忘泄有膿血嘔沫吐涎少腹堅善唾女子心痛逆氣善吐食不下通谷在幽門下一寸陷者中衝脈足少陰之會灸五壯主失欠口喎僻不端食飲善嘔不得言一云舌下腫難以言舌縱喎戾不端陰都一名食宮在通谷下一寸衝脈足少陰之會灸五壯主身寒熱痎瘧心滿氣逆石關在陰都下一寸衝脈足少陰之會灸五壯主痓脊強口不可開多唾大便難婦人於臟中有惡血內逆滿痛商曲在石關下一寸衝脈足少陰之會灸五壯主腹中積聚時切痛盲俞在商曲下一寸直臍膀五分衝脈足少陰之會灸五壯主心大堅大腸寒中大便乾腹中切痛中注在盲俞下五分衝脈足少陰之會灸五壯主少腹有熱大便難四滿一名隨府在中注下一寸衝脈足少陰之會灸五壯主臍下積聚疝瘕胞中有血腸澼泄切痛振寒大腹石水腎痛氣穴一名胞門一名子戶在四滿下一寸衝脈足少陰之會灸五壯主月水不通奔氣上下引腰脊痛大赫一名陰維一名陰關在氣穴下一寸衝脈足少陰之會灸五壯主女子赤淫男子精溢陰上縮橫骨一名下極在大赫下一寸衝脈足少陰之會灸五壯主少腹滿小便難陰下縱卵中痛鳩尾一名尾翳一名𩩲骭在臆前蔽骨下五分任脈之別不可灸刺一云灸五壯主心中寒脹滿不得息息賁時唾血血瘀熱病胸中痛不得臥心痛不可按善噦心疝大息面赤心背相引而痛數噫喘息胸滿咳嘔腹痛皮瘙癢喉痹食不下甄權云宜針不宜灸巨闕在鳩尾下一寸任脈氣所發灸五壯主心痛不可按煩心熱病胸中淡淡腹滿暴痛恍惚不知人手清少腹滿瘛瘲病心疝滿不得息息賁時唾血心腹脹滿噫煩熱善嘔膈中不通利霍亂髮狂妄言怒恐惡火善罵詈狐疝驚悸少氣胸脅支滿瘛瘲引少腹痛短氣煩滿嘔吐心脹上管在巨闕下一寸五分去蔽骨三寸足陽明手太陽任脈之會灸五壯主寒中傷飽食飲不化䐜脹心腹胸脅支滿脈虛則生百病甄權云主心風驚悸不能食心下有隔嘔血目眩頭懸眩痛身熱汗不出心痛有三蟲多涎不得反側腹中滿暴痛汗出中管一名太倉在上管下一寸手太陽少陽足陽明所生任脈之會灸七壯主腹脹不通心大堅胃脹霍亂出泄不自知先取太溪後取太倉之原溢飲脅下堅痛腹脹不通寒中傷飽食飲不化頭熱鼽血目黃振寒噫煩滿膈嘔傷憂損思氣積疰甄權云主因讀書得賁豚氣積聚腹中脹暴滿心痛身寒難以俯仰沖疝冒死不知人心腹痛發作腫聚往來上下行痛有休止腹中熱善涎出是蛔咬也鼻聞焦臭大便難小腸有熱尿赤黃病溫汗不出有血溢水建里在中管下一寸灸五壯主心痛上搶心不欲食支痛斥膈甄權云主腹脹逆氣上並霍亂下管在建里下一寸是太陰任脈之會灸五壯主飲食不化入腹還出六腑之穀氣不轉甄權云主小便赤腹堅硬孕婦不可灸水分在下管下一寸臍上一寸任脈氣所發灸三壯主痓脊強裡急腹中拘急痛甄權云主水病腹腫孕婦不可灸臍中神闕穴也一名氣舍灸三壯主水腹大臍平腹無理不治絶子灸令人有子臍疝繞臍痛沖胸不得息甄權云主水腫臌脹腸鳴狀如雷聲時上衝心口灸七壯至四百壯陰交一名少關一名橫戶在臍下一寸任脈衝脈少陰之會灸五壯主水脹水氣行皮中甄權云穴在陰莖下附底宛宛中主驚不得眠善斷水氣上下五藏遊氣也陰疝引睪女子手腳拘攣腹滿疝月水不下乳余疾絶子陰癢賁豚上䐜腹堅痛引陰中不得小便兩丸騫孕婦不可灸氣海一名脖胦一名下肓在臍下一寸半任脈氣所發灸五壯主少腹疝臥善驚甄權云主下熱小便赤氣痛狀如刀攪孕婦不可灸石門一名利機一名精露一名丹田一名命門在臍下二寸任脈氣所發灸三壯女子禁不可灸主臍疝繞臍痛三焦脹水腹大及水氣行皮中心腹中卒痛而汗出氣癃小便黃氣滿虛則遺溺身寒熱吐逆溺難腹滿疝積乳余疾絶子陰癢賁豚上䐜腹痛口強不能言莖腫先引腰後引少腹腰髖少腹堅痛下引陰中不得小便兩丸騫甄權云主婦人因産惡露不止關元一名次門在臍下三寸任脈足三陰之會灸七壯主寒熱石水痛引脅下脹頭眩痛身盡熱氣癃尿黃甄權云主小便處痛狀如散火轉胞不得尿少腹滿引脅下脹頭眩痛身盡熱賁豚寒熱入少腹時欲嘔傷中溺血小便數腰背臍痛下引陰腹中窘急欲湊後泄不止癲暴疝痛少腹大熱身所傷血出多反中風寒若有所墜墮四肢解㑊不收名曰體解女子絶子衃血在內不下中極一名氣原一名玉泉在臍下四寸任會足三陰之會灸三壯女子禁中央腹熱痛婦人子門不端少腹苦寒陰癢及痛經閉不通乳余疾絶子內不足賁豚上搶心甚則不能息忽忽少氣尸厥心煩痛飢不能食善寒中腹脹引脅而痛少腹與脊相控暴痛時窘之後經閉不通小便不利丈夫失精孕婦不可灸曲骨在橫骨上中極下一寸毛際陷者中動應手任脈足厥陰之會灸三壯主膀胱小便難腳屈轉胞不得尿婦人赤白淫陰中干痛惡合陰陽水脹滿尿澀癲疾不嘔沫會陰一名屏翳在大便前小便後兩陰間任脈別絡俠督脈者衝脈之會灸三壯主痹小便難竅中熱實則腹皮痛虛則癢搔痔與陰相通者死陰中諸病前後相引痛不得大小便女子血不通男子陰端寒上衝心中狼狼廉泉一名本池在頷下結喉上舌本下陰維任脈之會灸三壯主舌下腫難以言舌縱涎出咳逆少氣喘息嘔沫噤齗上氣胸滿天突一名玉戶在頸結喉下五寸中央宛宛中陰維任脈之會灸三壯主咳上氣喘暴喑不能言及舌下俠青縫脈頸有大氣喉痹咽中乾急不能息喉中嗚翕翕寒熱頸腫肩痛胸滿腹皮熱衄氣鯁心痛癮疹頭痛麵皮赤熱身肉盡不仁璇璣在天突下一寸中央陷者中任脈氣所發仰頭取之灸五壯主胸滿痛喉痹咽癰水漿不下華蓋在璇璣下一寸陷者中任脈氣所發仰頭取之灸五壯主胸脅支滿痛引胸中咳逆上氣喘不能言紫宮在華蓋下一寸六分陷者中任脈氣所發仰而取之灸五壯主胸脅支滿痹痛骨疼飲食不下嘔逆上氣煩心玉堂一名玉英在紫宮下一寸六分陷者中任脈氣所發灸五壯主胸中滿不得息脅痛骨疼喘逆上氣嘔吐煩心膻中一名元兒在玉堂下一寸六分直兩乳間陷者中任脈氣所發仰而取之灸五壯主胸痹心痛煩滿咳逆喘唾短氣不得息不能言中庭在膻中下一寸六分陷者中任脈氣所發灸三壯主胸脅支滿膈塞飲食不下嘔吐食復還出甄權千金楊操同膀胱人膀胱者腎之腑也兩傍一百二十穴並二十二單穴及膏肓附穴共一百四十四穴甲乙經膀胱出於至陰至陰者金也在足小趾外側去爪甲角如韭葉足太陽脈之所出也為井冬三月宜灸之流於通谷通谷者水也在足小趾外側本節前陷者中足太陽脈之所留也為榮春三月宜灸之注於束骨束骨者木也在足小趾外側本節後陷者中足太陽脈之所注也為輸夏三月宜灸之過於京骨在足外側大骨下赤白肉際陷者中足太陽脈之所過也為原行於崑崙崑崙者火也在足外踝後跟骨上陷者中足太陽脈之所行也為經入於委中委中者土也在膕中央動脈足太陽脈之所入也為合秋三月宜灸之甄權千金楊操同至陰在足小趾外側去爪甲角如韭葉灸三壯主頭重鼻鼽及瘛汗不出心煩足下熱不欲近衣項痛目翳及小便不利痎瘧寒熱疝風寒從足小趾起通谷在足小趾外側本節前陷者中灸三壯主身疼痛喜驚互引鼻鼽癲疾寒熱目䀮䀮喜咳喘逆狂疾不嘔沫痓善唏頭眩項痛煩滿振寒痎瘧束骨在足小趾外側本節後陷者中灸三壯主身痛狂善行癲疾寒熱腰痛如折痓驚互引腳如結踹如裂暴病頭痛身熱痛肌肉動耳聾惡風目眥爛赤項不可顧髀樞痛泄腸澼瘧從䯒起京骨在足外側大骨下赤白際陷者中灸三壯主痎瘧寒熱善唏頭重足寒不欲食腳攣癲疾狂妄善自齧頓偏枯腰髀樞痛善搖頭鼽衄頭痛目白翳跟尻瘛瘲頭腫痛泄注上搶心目赤眥爛無所見痛從內眥始腹滿頸項強腰背不可俯仰眩痿厥身體不仁手足偏小先取京骨後取中封絶骨瀉之厥心痛與肩背相引善瘛如從後觸其心傴僂者腎心痛也痓目反白多鼻不通利涕黃便血申脈陽蹺所出也在足外踝下陷者中容爪甲灸三壯主腰痛不能舉