不可灸傷人神明主瘧寒熱胸背痛腹中彭彭然甚則交兩手而瞀為暴痹喘逆喉痹掌中熱咳逆上氣喘息數欠熱病汗不出心痛欲嘔列缺手太陰絡去腕上一寸半灸五壯甄權云腕後臂側三寸交叉頭兩筋骨罅宛宛中是也主偏風口喎半身不隨腕勞灸三壯主瘧甚熱驚癇如有見者咳喘掌中熱虛則肩背寒栗少氣不足以息寒厥交兩手如瞀為口沫出實則肩背熱痛汗出四肢腫身濕搖時寒熱飢則煩飽則面色變口噤不開惡風泣出喉痹咳上氣數欠四肢厥逆善笑溺白熱病先手臂痛身熱瘛瘲唇口聚鼻張咽下汗出如連珠小便白熱痛兩乳下三寸堅脅下滿悸善忘口中沫出孔最手太陰郤去腕上七寸灸五壯主熱病汗不出此穴可灸五壯汗即出厥頭痛尺澤在肘中約紋上動脈灸三壯甄權云在臂屈橫紋中兩筋骨罅陷者宛宛中不宜灸主陰痹上氣舌乾脅痛心彭彭痛咳逆上氣心煩肩寒少氣不足以息腹脹喘振栗瘛瘲咳嗽吐濁氣膈善嘔鼓頷不得汗煩滿身痛因為縱衄唾血時寒時熱胞中有水疝瘕積與陰相引痛苦冗泄上下出喉痹哽塞熱實則肩背熱痛汗不出四肢暴腫虛則臂背寒短氣癲疾嘔沫手肘不得上頭肘痛俠白在天府下去肘上五寸動脈手太陰之別灸五壯主心痛咳乾嘔煩滿天府在腋下三寸臂臑內廉動脈手太陰脈氣所髮禁不可灸使人逆氣主咳上氣喘不得息暴痹內逆肝肺相搏口鼻出血身脹逆息不得臥風汗出身腫喘喝多睡恍惚善忘嗜臥不覺甄權千金楊操同大腸人大腸者肺之腑也兩傍四十二穴並下三單穴共四十五穴甲乙經大腸出於商陽商陽者金也一名絶陽在手大指次指內側去爪角如韭葉手陽明脈之所出為井冬三月宜灸之流於二間二間者水也一名間谷在手大指次指本節前內側陷者中手陽明脈之所留也為榮春三月宜灸之注於三間三間者木也一名少谷在手大指本節後內側陷者中手陽明脈之所注也為輸夏三月宜灸之過於合谷一名虎口在手大指岐骨間手陽明脈之所過也為原行於陽溪陽溪者火也一名中魁在腕中上側兩筋間陷者中手陽明脈之所出也為經入於曲池曲池者土也在肘外輔骨屈肘曲骨之中手陽明脈之所入也為合秋三月宜灸之出第三卷中甄權千金揚操同商陽一名絶陽在手大指次指內側去爪甲角如韭葉灸三壯右取左左取右如食頃立已主氣滿胸中喘息支脅熱病汗不出耳中生風耳鳴耳聾時不聞熱瘧口乾下齒痛臂瘛引口中惡寒䪼腫肩痛引缺盤喉痹青肓二間一名間谷在手大指次指本節前內節陷者中灸三壯主多臥善唾肩髃痛塞鼻鼽赤多血浸淫起面身熱喉痹如哽眥傷忽振寒背疼齒痛三間一名少谷在手大指本節後內側陷者中灸三壯主喉痹腫如哽齒齲痛惡清多臥善唾胸滿腸鳴痎瘧寒熱唇口乾身熱喘息目眥急痛善驚合谷一名虎口在手大指岐骨間灸三壯主寒熱痎瘧狂易鼻鼽衄熱病汗不出𥌰目目痛暝頭痛齒齲驚喉痹痱痿臂腕不舉唇吻不收耳中不通喑不能言口噤不開陽溪一名中魁在腕中上側兩筋間陷者中灸三壯主熱病煩心𥌰目目痛泣出厥逆頭痛胸滿不得息寒熱癲疾嘔沫善笑見鬼喉痹耳聾鳴齒痛驚掣瘧寒甚熱病腸澼臑肘臂痛虛則氣臑滿肩不舉吐舌戾頸妄言痂疥偏歷手陽明絡在腕後三寸灸三壯主寒熱風瘧汗不出𥌰目目䀮䀮癲疾多言耳鳴口僻頰腫實則聾喉痹不能言齒齲痛鼽衄虛則痹膈溫溜一名逆注一名蛇頭手陽明郤在腕後小士五寸大士六寸灸三壯主腸鳴而痛傷寒寒熱頭痛噦衄肩不舉瘧面赤腫口齒痛癲疾吐舌鼓頷狂言見鬼狂臥喉痹不能言虛氣面腫下廉在輔骨下去上廉一寸輔兌肉其分外斜灸三壯主眼痛弱黃上廉在三里下一寸陽明之會灸三壯主小便黃腸中鳴相逐三里在曲池下二寸按之肉起兌肉之端灸三壯主腹䐜時寒腰痛不得臥齒痛䪼頰腫曲池在肘外輔骨屈肘曲骨之中灸三壯主肩肘中痛難屈伸手不可舉喉痹不能言目不明腕急身熱驚狂躄痿痹重瘛瘲癲疾吐舌胸中滿耳前痛齒痛目赤痛頸腫寒熱渴飲輒汗出不飲則皮乾熱傷寒餘熱不盡肘窖髎窖同在肘大骨外廉陷者中灸三壯主肩肘節戾重痹痛不可屈伸五里在肘上三寸行向里大脈中央灸十壯主風勞驚恐久吐血肘不欲舉風癇嗜臥四肢不欲動搖身黃寒熱頸癧咳嗽呼吸𥌰目目䀮䀮少氣痎瘧心下脹滿痛上氣左取右右取左臂臑在肘上七寸䐃肉端手陽明絡會灸三壯主寒熱頸項拘急肩臂痛不可舉臑會一名臑髎在肩前廉去肩頭三寸手陽明之絡灸五壯主項癭氣瘤臂痛氣腫腠理氣肩髎在肩端臑上陷中針舉臂取之灸三壯主肩重不舉臂痛肩髃在肩端兩骨間陷者宛宛中舉臂取之手陽明蹺脈之會灸三壯主肩中熱指臂痛巨骨在肩尖端上行兩叉骨陷者中灸三壯手陽明蹺脈之會主肩膊痛胸中有瘀血肩臂不得屈伸而痛扶突一名水穴在曲頰下一寸人迎後一寸五分手陽明脈氣所發仰而取之灸三壯主咳逆上氣咽喉鳴喝喘息暴喑氣哽天鼎在頸缺盤直扶突氣舍後一寸半手陽明脈氣所發灸三壯主暴喑氣哽喉痹咽腫不得息飲食不下禾髎一名䪼直鼻孔下俠水溝傍五分手陽明脈氣所發主鼻窒口僻清涕出不可止鼽衄有癰口噤不可開水溝在鼻柱下人中督脈手陽明脈之會直唇取之灸三壯主寒熱頭痛癲疾互引水腫人中盡滿唇反者死振寒手卷前僵鼻鼽不能息不知香臭衄不止口噤喎僻睊目兌端在唇上端手陽明脈氣所發灸三壯主寒熱鼓頷口噤癲疾吐沫寒熱痓互引唇吻強上齒齲澀渴嗜飲目瞑身汗出衄血不止齦交在唇內齒上齦縫灸三壯主痓煩滿寒熱口僻癲疾互引目痛不明齒間出血者有傷酸齒尖落痛口不可開引鼻中鼻中息肉不利鼻頭頷䪼中痛鼻中有蝕瘡甄權千金楊操同肝人肝者臟也兩傍二十二穴甲乙經肝出於大敦大敦者木也在足大趾端去爪甲如韭葉及三毛中足厥陰脈之所出也為井冬三月宜灸之流於行間行間者火也在足大趾間動脈應手陷者中足厥陰脈之所留也為榮春三月宜灸之注於太衝太衝者土也在足大趾本節後二寸或一寸半陷者中足厥陰脈之所注也為輸夏三月宜灸之行於中封中封者金也在足內踝前一寸仰足取之陷者中伸足乃得之足厥陰脈之所行也為經入於曲泉曲泉者水也在膝內輔骨下大筋上小筋下陷者中屈膝而得之足厥陰脈之所入也為合秋三月宜灸之出第三卷中甄權千金楊操同大敦在足大趾端去爪甲如韭葉及三毛中灸三壯主卒心痛汗出陰跳遺溺小便難而痛陰上入腹中寒疝陰挺出偏大腫腹臍痛腹中悒悒不樂小兒癇瘛遺清溺虛則病諸瘕㿗實則閉癃少腹中熱善寐凡厥死不知人脈動如故痓行間在足大趾間動脈應手陷者中灸三壯主咳逆上氣唾沫溺難痛白濁卒疝少腹腫咳逆嘔吐卒陰跳腰痛不可以俯仰面蒼黑熱腹中䐜滿身熱厥痛心痛色蒼蒼如死狀終日不得太息肝心痛也月事不利見赤白而有身皮敗陰寒腹痛上支心心下滿癃莖中痛怒瞋不欲視泣出長太息癲疾短氣嘔血胸背痛善驚悲不樂厥脛足下熱面盡熱嗌乾渴喉痹口喎喉咽如扼狀太衝在足大趾本節後二寸半或一寸半陷者中灸三壯主腰痛少腹滿小便不利如癃狀羸瘦意恐懼氣不足腹中悒悒狐疝環臍痛陰騫兩丸縮腹堅不得臥黃疸熱中善渴女子疝及少腹腫溏泄癃遺溺陰痛面蒼黑目下皆痛暴脹胸脅支滿足寒大便難面唇色白時時嘔血男子精不足女子漏血乳難嘔厥寒時有微熱脅下支滿喉痹痛嗌乾膝外廉痛淫濼脛酸腋下腫馬刀瘍瘻唇腫吻傷痛肝脹心痛色蒼蒼然如死狀終日不得太息者肝心痛也中封在足內踝前一寸仰足而取之陷者中伸足乃得之灸三壯主色蒼蒼然太息如死狀振寒小便白便難痿厥身體不仁手足偏小㿗疝陰暴腫疝癃臍少腹引腰中痛身黃時有微熱不嗜食膝內廉內踝前痛少氣身濕重女子少腹大乳難嗌乾嗜飲俠臍疝蠡溝足厥陰絡在內踝上五寸灸三壯主女子疝少腹腫赤白淫時多時少陰跳腰腹痛實則挺長寒熱攣暴痛遺溺偏大虛則暴癢氣逆睪腫卒疝小便不利如癃狀數噫恐悸氣不足腹中悒悒少腹痛咽中有熱如息肉狀背攣不可俯仰中郤一名中都足厥陰郤在內踝上七寸脛骨中灸五壯主癲疝崩中腹上下痛腸澼亦止精膝開在犢鼻下二寸陷者中足厥陰脈氣所發灸五壯主膝內廉痛引臏不可屈伸連腹引喉咽痛曲泉在膝內輔骨下大筋上小筋下陷者中屈膝乃得之灸三壯主女子疝按之如湯沃兩股中少腹腫陰挺痛歷背來下血陰中腫或癢漉青汁若葵血閉癲疝陰跳痛引臍中不得尿陰痿腹脅下支滿癃閉後時少泄四肢不舉實則身熱頭眩痛汗不出目䀮䀮筋攣膝不可屈伸發狂衄血喘呼少腹痛引喉咽病泄下血陰包在膝上四寸股內廉兩筋間足厥陰別走灸三壯主腰痛少腹痛五里在陰廉下二寸去氣衝三寸陰股中動脈灸二壯主少腹中滿熱閉不得溺陰廉在羊矢下去氣衝二寸動脈主婦人絶産若未曾産灸三壯甄權千金楊操同膽人膽者肝之腑也兩傍一百四穴甲乙經膽出於竅陰竅陰者金也在足小趾次趾之端去爪甲如韭葉足少陽脈之所出也為井冬三月宜灸之流於俠溪俠溪者水也在足小趾次趾岐骨間本節前陷者中足少陽脈之所留也為榮春三月宜灸之注於臨泣臨泣者木也在足小趾次趾間本節後間陷者中去俠溪一寸半足少陽脈之所注也為輸夏三月宜灸之過於丘墟在足外廉踝下如前陷者中去臨泣三寸足少陽脈之所過也行於陽輔陽輔者火也在足外踝上四寸輔骨前絶骨端如前三分許去丘墟七寸足少陽脈之所行也為經入於陽陵泉陽陵泉者土也在膝下一寸外廉陷者中足少陽脈之所入也為合秋三月宜灸之出第三卷中甄權千金楊操同竅陰在足小趾次趾之端去爪甲如韭葉灸三壯主脅痛咳逆不得息手足清煩熱汗不出轉筋頭痛如錐刺之循循然不可以動動益煩心喉痹舌卷口乾臂內廉痛不可及頭痎聾鳴俠溪在足小趾次趾岐骨間本節前陷者中灸三壯主胸中支滿寒如風吹狀寒熱熱病汗不出目外眥赤痛頭眩兩頷痛寒泣出多汗耳鳴聾目癢胸中痛不可反側痛無常處痎瘧狂疾地五會在足小趾次趾本節後陷者中不宜灸灸使人瘦不出三年死主內傷唾血不足外無膏澤乳腫臨泣在足小趾次趾間本節後去俠溪一寸半陷者中灸三壯主厥四逆喘氣滿風身汗出而清髖髀中痛不得行足外皮痛胸中滿腋下腫馬刀瘍瘻喜自齧頰天牖中腫淫濼脛酸頭眩枕骨頷顱痛目澀身痹灑淅振寒季脅下支滿寒熱胸脅腰腹膝外廉痛月水不利見血而有身則敗及乳腫胸痹心下痛不得息痛無常處大風目外眥痛身熱痱缺盤中痛瘧日西發丘墟在足外廉踝下如前陷者中去臨泣三寸灸三壯主目視不明振寒目翳瞳子不見腰脅痛腳痠轉筋胸脅痛善太息胸滿彭彭然瘧振寒腋下腫痿厥寒足腕不收躄坐不能起髀樞腳痛大疝腹堅寒熱頸腫狂疾懸鐘足三陽大絡在外踝上三寸動者中按之陽明脈絶乃取之灸五壯主腸滿胃中有熱不嗜食小兒腹滿不能食飲光明足少陽絡在外踝上五寸灸五壯主身體寒少熱甚噁心惕然此與絶骨穴療病同功主淋瀝脛熱病汗不出狂病虛則痿躄坐不能起實則厥脛熱膝痛身體不仁手足偏小齧頰不能俯仰痓外丘足少陽郤少陽所生在外踝上七寸灸三壯主膚痛痿痹胸脅滿頭痛項內寒熱癲疾嘔沫陽輔在外踝上四寸輔骨前絶骨之端如前三分許去丘墟七寸灸三壯主寒熱腰痛如小錐居其中沸然腫不可以咳咳則筋縮急諸節痛上下無常處寒熱酸痟四肢不舉腋下腫馬刀瘻髀膝脛骨搖酸痹不仁喉痹陽交一名別陽一名足髎陽維郤在外踝上七寸斜屬三陽分肉間灸三壯主寒厥癲疾噤齦瘛瘲驚狂喉痹胸滿面腫寒熱髀脛不收喑不能言陽陵泉在膝下一寸外廉陷者中足少陽脈氣所發灸三壯主太息口苦咽中介介數唾脅下支滿嘔吐逆臏痹引膝股引廉痛不仁筋急嘔宿汁心淡淡如人將捕之膽脹陽關在陽陵泉上三寸犢鼻外陷者中不宜灸主膝外廉痛不可屈伸脛痹不仁中瀆在髀外膝上五寸分肉間陷者中足少陽脈氣所發灸五壯主寒氣在分肉間痛攻上下筋痹不仁環跳在髀樞中側臥伸下足屈上足取之足少陽脈氣所發灸五十壯主樞中痛不可舉腰脅相引急痛痹筋瘛脛痛不可屈伸痹不仁本神在曲差傍一寸半髮際上目直耳上入髮際四分足少陽陽維之會灸五壯主頭目眩痛頸項強急胸脅相引不得傾側癲疾嘔沫小兒驚癇頭維在額角髮際本神傍一寸五分禁不可灸主寒熱頭痛如破目痛如脫喘逆煩滿嘔吐流汗難言臨泣當目上眥直上入髮際五分陷者中足少陽太陽之會灸三壯主頰青不得視口沫泣出兩目眉頭痛小兒驚癇反視目窗一名至營在臨泣後一寸足少陽陽維之會灸三壯主頭痛目螟遠視𥇀𥇀上齒齲腫正營在目窗後一寸足少陽陽維之會灸五壯主牙齒痛唇吻急強齒齲痛惡寒承靈在正營後一寸半足少陽陽維之會灸五壯主腦風頭痛惡見風寒鼽衄鼻窒喘息不通腦空一名顳顬在承靈後一寸半俠玉枕骨下陷者中足少陽陽維之會灸五壯主頭痛身熱引兩頷急腦風目螟頭痛風眩目痛鼻管疽發為厲鼻癲疾大瘦風池在顳顬後髮際陷者中足少陽陽維之會灸三壯主寒熱癲疾僵仆溫熱病汗不出頭眩痛痓瘧頸項痛不得顧目泣出多氣多鼻鼽衄目內眥赤痛氣發耳寒目不明喉痹傴僂引項筋攣不收顱息在耳後青脈間足少陽脈氣所發灸三壯主身熱頭重脅痛不可反側小兒癇喘不得息耳鳴懸顱在曲角顳顬上廉足少陽脈氣所發灸三壯主熱病頭痛引目外眥而急煩滿汗不出引頷齒面赤皮痛頷厭在曲角顳顬上廉足少陽陽明之會灸三壯主善嚏頭痛身熱目眩無所見偏頭痛引目外眥而急耳鳴懸𧈟在曲角顳顬下廉手足少陽陽明之會灸三壯主熱病偏頭痛引目外眥耳鳴善嚏陽白在眉上一寸直瞳子灸三壯主頭目瞳子不可以視頸項強急不可以顧絲竹空一名目窖在眉後陷者中足少陽脈氣所發不可灸不幸使人目小及盲眩頭痛互引目中赤𥇀𥇀臍風目上插痓反目憎風癲疾狂煩滿瞳子窖一名後曲在目外去眥五分手足少陽之會灸三壯主青盲無見遠視𥇀𥇀目中膚翳白膜天衝在耳上如前三寸灸九壯主頭痛癲淚下嘔沫痓互引善驚蟀谷在耳上入髮際一寸五分嚼而取之灸三壯主醉酒風發兩角弦痛一云兩目眩不能飲煩滿嘔吐曲鬢在耳上入髮際曲隅陷者中鼓頷有空足太陽少陽之會灸三壯主頸頷支滿引牙齒口閉不開急痛不能言浮白在耳後入髮際一寸下曲頰後灸三壯主足緩不收痿不能行不能言寒熱喉痹咳逆痰沫胸中滿不得喘息胸痛耳聾嘈嘈無所聞頸項癰腫不能言及癭氣肩背不能舉齒牙齲痛竅陰在完骨上枕骨下手足太陽少陽之會灸五壯主營疽發厲項痛引頸癰腫完骨在耳後入髮際四分足太陽少陽之會灸三壯主風頭耳後痛煩心足痛不收失履口喎僻頭項搖瘛牙車急癲疾僵仆頭面虛腫齒牙齲痛小便赤黃喉痹項腫不可俯仰頰腫引耳痎瘧在易淵腋在腋下三寸宛宛中舉臂取之主胸滿馬刀臂不舉禁不可灸灸之不幸生腫馬瘍內潰者死寒熱生馬瘍可療大包脈出淵腋下三寸脾之大絡布胸脅中九肋間及季脅端灸三壯主腹有大氣不得息息即胸脅中痛實則其身盡寒虛則百節皆縱輒筋在腋下三寸復前行一寸著脅足少陽脈氣所發灸三壯主胸中暴滿不得臥喘息天池一名天會在乳後一寸腋下三寸著脅直腋撅肋間手心主足少陽脈之會灸三壯主寒熱胸滿頸痛四肢不舉腋下腫上氣胸中有聲喉中鳴章門脾募也一名長平一名脅髎在大橫外直臍季肋端足厥陰少陽之會側臥屈上足舉臂取之灸三壯主腹中鳴盈盈然食不化脅痛不得臥煩熱口乾燥不嗜食胸脅支滿喘息而沖膈嘔心痛及傷飽身黃羸瘦腰痛不得反側賁豚腹腫腰清脊強四肢懈墮善怒咳少氣鬱郁然不得息厥逆肩不舉馬刀身瞤石水胃脹帶脈在季肋下一寸八分灸五壯主婦人少腹堅痛月水不通五樞在帶脈下三寸一云在水道下一寸半灸五壯主男子陰疝兩丸上下入腹痛婦人下赤白裡急瘛瘲京門腎募也一名氣府一名氣輸在監骨腰中季肋本俠脊灸三壯主痙脊反折腰痛不可久立俯仰寒熱腹䐜央央然不得息溢飲水道不通溺黃少腹裡急痛洞泄髀痛引背維道一名外樞在章門下五寸三分足少陽帶脈之會灸三壯主咳逆不止三焦有水氣不能食居髎在長平下八寸三分監骨上陷者中陽蹺足少陽之會灸三壯主腰痛引少腹在腋前兩筋間主肩前痛與胸相引臂里攣急手不得上舉至肩甄權千金楊操同後腋在腋後廉際兩筋間主腋外相引而痛手臂拘攣急不得上頭轉谷在傍二骨間陷者中主胸脅支滿不欲食谷入穀不化嘔吐腹出舉腋取之飲郤在食門下一寸骨間陷者中主腹滿臚脹痛引臍傍腹鳴濯濯若中有水聲仰腹取之應突在飲郤下一寸主飲食不入腹中滿大便不得節腹鳴泄注仰腹取之脅堂在腋陰下二骨陷者中主胸脅支滿臚脹豚賁豚噫噦喘逆膽視目黃舉腋取之旁庭在脅堂下二骨間陷者中舉腋取之灸三壯主卒暴中飛尸遁及胸脅支滿時上搶心嘔吐喘逆咽乾脅痛始素在腋脅下廉下二寸骨陷者中主脅下支滿腰痛引腹筋攣陰氣上縮舉臂取之脾人脾者臟也兩傍四十八穴甲乙經脾出於隱白隱白者木也在足大趾端內側去爪甲角如韭葉足太陰脈之所出也為井冬三月宜灸之流於大都大都者火也在足大趾本節後陷者中足太陰脈之所留也為榮春三月宜灸之注於太白太白者土也在足內側核骨下陷者中足太陰脈之所注也為輸夏三月宜灸之行於商丘商丘者金也在足內踝上微前陷者中足太陰脈之所行也為經入於陰陵泉陰陵泉者水也在膝下內側輔骨下陷者中伸足乃得之足太陰脈之所入也為合秋三月宜灸之出第三卷中甄權千金楊操同隱白在足大趾端內側去爪甲角如韭葉灸三壯主腹中有寒氣起則氣喘熱病衄血不止煩心善悲腹脹逆息熱氣足脛中寒不得臥氣滿胸中熱暴泄仰息足下寒膈中悶嘔吐不欲飲食尸厥死不知人脈動如故飲渴身體痛多唾大都在足大趾本節後陷者中灸三壯主熱病汗不出厥手足清暴泄厥心痛腹脹滿心尤痛甚者胃心痛也瘧不知所苦風逆暴四肢腫濕則唏然寒飢則煩心飽則眩太白在足內側核骨下陷者中灸三壯主病先頭重頰痛煩冤身熱腰痛不可以俯仰腹滿兩頷痛甚暴泄善飢而不欲食善噫熱中足清腹脹食不化善嘔泄有膿血苦嘔無所出先取三里後取太白章門厥心痛腹脹滿心尤痛甚者胃心痛也胸脅支滿腹中切痛霍亂逆氣大便難身重骨痿不相知熱病滿悶不得臥脾脹公孫在大趾本節之後一寸別走陽明太陰絡也灸三壯主瘧不嗜食多寒熱汗出實則腹中切痛厥頭面腫煩心狂言多飲不嗜臥虛則鼓脹腹中氣大滿熱痛不嗜飲霍亂商丘在內踝微前陷者中灸三壯主癲疾狂多食善笑不休發於外煩心中渴瘧寒腸中痛已汗出腹滿響響不便心下有寒痛陰股內痛氣逆狐疝走上下腹痛脾虛令人病寒不樂好太息喉痹寒熱善嘔骨痹煩滿癇瘛手足擾癲疾目昏口噤溺黃筋攣痛病善厭夢者絶子厥頭痛面腫起咳而泄不欲食痔疾骨疽蝕漏谷在足內踝上六寸骨下陷者中亦足大陰絡灸三壯主腹中熱若寒腸鳴強欠時內痛心悲氣逆腹滿腹脹而氣快然引肘脅下皆主之少腹脹急小便不利厥氣上頭巔三陰交在內踝上三寸骨下陷者中足太陰厥陰少陰之會灸三壯主足下熱脛疼不能久立濕痹不能行腹中熱若寒膝內痛心悲氣逆腹滿小便不利厥氣上及巔脾病者身重若飢足痿不欲行善瘛腳下痛虛則腹脹腹鳴溏泄食飲不化脾胃肌肉痛此出素問地機一名脾舍足太陰郤別走上一寸空在膝下五寸灸五壯主癲疝溏瘕腹中痛藏痹陰陵泉在膝下內側輔骨下陷者中伸足乃得之灸三壯主溏泄穀不化腹中氣脹嗑嗑脅下滿腹中氣盛腹脹逆不得臥腎腰痛不可俯仰氣癃尿黃寒熱不節女子疝瘕按之如似湯沃其股內至膝飧泄婦人陰痛少腹堅急痛重下不嗜食心下滿寒中小便不利霍亂足痹痛血海在膝下臏上內廉白肉際二寸中足太陰脈氣所發灸五壯主婦人漏下惡血月閉不通逆氣腹脹箕門在魚腹上趙筋間動應手陰市內足太陰脈氣所發云在股上起筋間灸三壯主淋遺溺鼠鼷痛小便難期門期門肝經肝募也在第二肋端不容傍一寸五分上直兩乳足太陰厥陰陰維之會舉臂取之灸五壯主婦人産余疾飲食不下胸脅支滿目眩足寒小便難心切痛善噫間酸臭酸痹腹滿少腹尤大息賁脅下氣上下胸中有熱目青而嘔霍亂泄痢痓腹太堅不得息咳脅下積聚喘逆臥不安席時寒熱心大堅奔肫上下癃遺溺鼠鼷痛小便難而白喑不能言日月日月膽經膽募也在期門下五分灸五壯主太息善悲小腹有熱欲走多唾言語不正四肢不收腹哀在日月下一寸半足太陰陰維之會灸五壯主便膿血寒中食不化腹中痛大橫在腹哀下三寸直臍傍足太陰陰維之會灸五壯主大風逆氣多寒善悲腹結一名腸窟在大橫下一寸三分灸五壯主繞臍痛搶心膝寒泄痢府舍在腹結下三寸足太陰陰維之會灸五壯主疝瘕髀中急痛循脅上下搶心腹滿積聚厥逆霍亂衝門一名慈官去大橫五寸在府舍橫骨兩端約中動脈足太陰陰維之會灸五壯主寒氣腹滿癃淫濼身熱腹中積痛陰疝乳難子上衝心雲門雲門中府肺經在巨骨下氣戶傍各二寸陷者中動脈應手手太陰脈氣所發舉臂取之灸五壯主喉痹胸中暴逆先取衝脈後取三里雲門皆瀉之咳喘不得息坐不得臥呼吸氣索咽不得胸中熱暴心腹痛疝積時發上衝心肩痛不可舉引缺盤脈代不至寸口四逆脈鼓不通中府肺募也一名膺中俞在雲門下一寸一云一寸六分乳上三肋間動脈應手陷者中手太陰之會灸五壯主肺系急胸中痛惡清胸滿悒悒然膽熱嘔逆氣相追逐多濁唾不得息肩背風汗出腹脹食噎不下喉痹肩息肺脹皮膚骨痛寒熱煩滿周榮在中府下一寸六分陷者中足太陰脈氣所發仰而取之灸五壯主胸脅支滿不得俯仰飲食不下咳唾陳膿胸鄉在周榮下一寸六分陷者中足太陰脈氣所發仰而取之灸五壯主胸脅支滿卻引背痛臥不得轉側天溪在胸鄉下一寸六分陷者中足太陰脈氣所發仰而取之灸五壯主胸中滿痛乳腫賁膺咳逆上氣喉鳴有聲食竇在天溪下一寸六分陷者中足太陰脈氣所發舉臂取之灸五壯主胸脅支滿膈間雷鳴滀漉常有小聲甄權千金楊操同胃人胃者脾之腑也兩傍九十三穴去下承漿一單穴共九十二穴甲乙經胃出於厲兌厲兌者金也在足大趾次趾之端去爪甲如韭葉足陽明脈之所出也為井冬三月宜灸之流於內庭內庭者水也在足大趾次趾外間陷者中足陽明脈之所留也為榮春三月宜灸之注於陷谷陷谷者木也在足大趾次趾之間本節後陷者中去內庭二寸足陽明脈之所注也為輸夏三月宜灸之過於衝陽一名會骨在足趺上五寸骨間動脈上去陷谷三寸足陽明脈之所過也為原行於解溪解溪者火也在衝陽後一寸半腕上陷者中陽明脈之所行也為經入於三里三里者土也在膝下三寸胻外廉足陽明脈之所入也為合秋三月宜灸之出第三卷中甄權千金楊操同厲兌在足大趾次趾之端去爪甲如韭葉灸一壯主尸厥口噤氣絶脈動如故其形無知如中惡狀瘧不嗜食腹寒脹滿熱病汗不出鼽衄眩前僕面浮腫足脛寒惡人與木音喉痹齲齒惡風鼻不聞多臥善驚內庭在足大趾次趾外間陷者中灸三壯主四肢厥逆手足悶者使人久持之逆冷脛痛腹脹滿皮膚痛善伸數欠惡人與木音振寒嗌中引痛熱病汗不出下齒痛惡寒目急喘滿寒齦口噤僻不嗜食陷谷在足大趾次趾之間本節後陷者中去內庭二寸灸三壯主熱痢面腫目癰腫善齧唇善噫腹痛脹滿腸鳴熱病汗不出水腫留飲胸脅支滿衝陽一名會原在足跗上五寸骨間動脈上去陷谷三寸灸三壯主皮先寒熱病汗不出口熱痛胃管痛時寒熱皆主之齒齲痛腹大不嗜食振寒而欠狂妄而行登高而歌棄衣而走足下緩失履風水面胕腫解溪在足衝陽後一寸半腕上陷者中灸三壯主熱病汗不出者噫腹脹滿胃熱譫言風水面胕腫顏黑厥氣上支腹脹大下重瘧瘛溪驚股膝重胻轉筋頭眩痛癲疾厥寒熱欠煩滿悲泣出狂易見鬼與火霍亂風從頭至足面目赤腫痛齧痛豐隆足陽明絡也在外踝上八寸下廉骨外廉陷者中灸三壯主厥逆胸痛如刺腹中切痛大小便澀難厥頭痛面浮腫煩心狂見鬼善笑不休發於外有所大喜喉痹不能言巨虛下廉足陽明與小腸合在上廉下二寸灸三壯主少腹痛飧泄出麋次趾間熱若脈陷寒熱身痛唇乾不得汗出毛髮焦脫肉少氣內有熱不欲動搖泄膿血腰引少腹痛暴驚狂言非常女子乳癰驚痹脛腫足跗不收跟痛條口在下廉上一寸足陽明脈所發灸五壯主脛寒不得臥脛疼足緩失履濕痹足下熱不能久立巨虛上廉足陽明與大腸合在三里下三寸灸三壯主飧泄大腸痛狂妄走善欠大腸有熱腸鳴腹滿俠臍痛食不化喘不能行立胸脅支滿惡聞人木音風水面腫甄權云主大氣不足偏風腲腿腳不隨三里在膝下三寸胻外廉灸三壯主陽厥悽悽而寒少腹堅頭痛脛股腹痛消中小便不利善噦痓中有寒腹中寒脹滿善噫聞食臭胃氣不足腸鳴腹痛食不化心下脹熱病汗不出喜嘔吐苦癃痓身反折口噤喉痹不能言寒熱陰氣不足熱中消穀善飢腹熱身煩狂言胸中瘀血胸脅支滿膈痛不能久立膝痿寒水腹脹皮腫乳癰有熱五臟六腑脹狂歌妄言怒恐惡人與火罵詈霍亂遺矢失氣犢鼻在膝臏下胻上骨俠解大筋中足陽明脈氣所發灸三壯主犢鼻腫先尉去之其赤堅勿攻攻者死膝中痛不仁難跪起諸腫節潰者死不潰可療也梁丘足陽明郤在膝上二寸兩筋間灸三壯主火驚乳痛脛苦痹膝不能屈伸不可以行陰市一名陰鼎在膝上三寸伏兔下若拜而取之足陽明脈氣所發不可灸主寒疝下至腹腠膝腰痛如清水大腹諸疝按之下膝上伏兔中寒痛腹脹滿痿厥少氣伏兔在膝上六寸起內足陽明脈氣所髮禁不宜灸髀關在膝上伏兔後袞分中灸三壯主膝寒痹不仁痿不得屈伸承泣一名溪穴一名面髎在目下七分直目瞳子蹺脈任脈足陽明之會甄權云在眼下八分禁不宜灸無問多少三日以後眼下大如拳息肉長桃許大至三十日即定百日都不見物或如升大目不明淚出目眩曹瞳子癢遠視䀮䀮昏夜無所見目瞤動與項口參相引喎僻口不能言四白在目下一寸足陽明脈氣所發灸七壯主目痛口僻淚出目不明迎香一名衝陽在禾髎上鼻下乳傍手足陽明之會主鼻鼽不利窒洞氣寒喎僻多涕鼻衄有齆不宜灸巨髎在俠鼻傍八分直瞳子蹺脈足陽明之會主面目惡風寒䪼腫癰痛招搖視瞻瘛瘲口僻青盲無所見遠視䀮䀮目中淫膚白膜覆瞳子地倉一名胃維俠口傍四分如近下蹺脈手足陽明之會灸三壯主口緩不收不能言語手足痿躄不能行承漿一名天池在頤前下唇之下足陽明任脈之會開口取之灸三壯主寒熱淒厥鼓頷癲疾嘔沫寒熱痓互引口乾小便赤黃或時不禁消渴嗜飲目瞑身汗出衄血不止上齒齲頰車在耳下曲頰端陷者中足陽明脈氣所發灸三壯開口有空主頰腫口急頰車骨痛齒不可用嚼大迎一名髓孔在曲頷前一寸二分骨陷者中動脈足陽明脈氣所發灸三壯主寒熱頸瘰癧癲疾口喎喘痓悸口噤厥口僻失欠下牙痛頰腫惡寒口不收舌不能言不得嚼上關一名客主人在耳前上廉起骨開口有空灸三壯主唇呦強上齒齲痛口僻噤不開耳痛聾齆瘛瘲口沫出寒熱痓青盲𥌰目惡風寒下關在客主人下耳前動脈下空下廉合口有空張口而閉灸三壯主失欠下齒齲下牙痛䪼腫耳聾鳴痓口僻耳中有干底聤耳有膿不可灸之耳門在耳前起肉當耳中缺者灸三壯主耳中有膿及底耳聤耳皆不灸主耳痛鳴聾頭頷痛上齒齲人迎一名天五會在頸大脈動應手俠結喉傍以候五臟之氣足陽明脈氣所髮禁不可灸灸之不幸殺人一云有病可灸三壯主陽逆霍亂陽逆頭痛胸滿不得息胸滿呼吸喘暍窮屈窘不得息刺人迎入四分不幸殺人水突一名水門在頸大筋前直人迎下氣舍上足陽明脈氣所發灸三壯主咳逆上氣咽喉癰腫呼吸短氣喘息不通氣舍在頸直人迎俠天突陷者中足陽明脈氣所發灸三壯主咳逆上氣瘤癭氣咽腫肩腫不得顧喉痹氣戶在巨骨下俞府兩傍各二寸陷者中足陽明脈氣所發仰而取之灸五壯主胸脅支滿喘逆上氣呼吸肩息不知食味庫房在氣戶下一寸六分陷者中足陽明脈氣所發仰而取之灸五壯主胸脅支滿咳逆上氣呼吸多唾濁沫膿血屋翳在庫房下一寸六分陷者中足陽明脈氣所發仰而取之灸五壯主胸脅支滿咳逆上氣呼吸