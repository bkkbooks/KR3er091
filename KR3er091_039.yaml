body:
  text: 卷第三十九明堂序夫明堂者黃帝之正經聖人之遺教所注孔穴靡不指的又皇甫士安晉朝高秀洞明醫術撰次甲乙並取三部為定如此則明堂甲乙是醫人之祕寶後之學者宜遵用之不可苟從異説致乖正理又手足十二經亦皆有俞手足者陰陽之交會血氣之流通外勞肢節內連臟腑是以原明堂之經非自古之神解孰能與於此哉故立經以言疾之所由圖形以表孔穴之名處比來有經而無圖則不能明脈俞之會合有圖而無經則不能論百疾之要也由是觀之書之與圖不可無也又人形不同長短異狀圖象參差差之毫釐則孔穴乖處不可不詳也今依準甲乙正經人長七尺五寸之身千金方云七尺六寸四分今半之以為圖人長三尺七寸五分千金方云三尺八寸二分其孔穴相去亦半之五分為寸其尺用古尺其十二經脈皆以五色作之奇經八脈並以緑色標記諸家並以三人為圖今因十二經而盡圖人十二身也經脈陰陽各隨其類故湯藥攻其內以灸攻其外則病無所逃知火艾之功過半於湯藥矣其針法古來以為深奧今人卒不可解經云針能殺生人不能起死人若欲録之恐傷性命今並不録針經唯取灸法其穴墨點者禁之不宜灸朱點者灸病為良其注於明堂圖人並可覽之黃帝素問擲孔穴原經脈窮萬病之所始九卷甲乙及千金方甄權楊操等諸家灸法雖未能遠窮其理且列流注及旁通終疾病之狀爾論邪入皮毛經絡風冷熱灸法素問岐伯曰夫邪之客於形必先入於皮毛留而不去入於孫絡又留而不去入於經脈內連五臟散於腸胃陰陽俱感五臟乃傷此邪之從皮毛而入於五臟之次也如此則療其經今邪客於皮毛入於孫絡留而不去閉塞不通不得入於經溢於大絡而生奇病焉出第二卷中夫五臟六腑精靈之氣順脈而出附經而入終而復始如環無端若越其數者則傷脈而損經變為異病也岐伯曰凡欲療風則用火灸風性浮輕色或赤或白癢多者風熱也寒性沉重色或青或黑痛多者寒也濕性萎潤色黃鮮瘀痹多者濕也此三種本同而末異也風為百病之長邪賊之根一切衆病悉因風而起也欲灸風者宜從少以至多也灸寒者宜從多以至少也至多者從三壯五壯七壯又從三十五十七十壯名曰從少至多也灸寒濕者宜從多以至少也從七十五十三十又從七百五百三百名曰從多以至少也灸風者不得一頓滿一百若不灸者亦可以蒸藥尉之灸寒濕者不得一頓滿千若不灸亦可蒸藥熏之風性浮輕則易散故從少而至多也寒性沉重則難消故從多而至少也論疾手足腹背灸之多少及補瀉八木火法楊操音義云凡手足內脈皆是五臟之氣所應也手足外脈皆是六腑之氣所應也四肢者身之支幹也其氣繫於五臟六腑出入其灸疾不得過頓多也宜依經數也若頓多血脈絶於火下而火氣不得行隨脈遠去也故云三壯五壯七壯者經曰乃更添灸以瘥為度其手足外皆是陽脈也不得過於二壯腹中者水穀之所盛風寒之所結灸之務欲多也脊者身之梁太陽之所合陰陽動作冷氣成疾背又重厚灸之宜多經脈出入往來之處故灸能引火氣凡灸皆有補寫補者無吹其火須炷自滅寫者疾吹其火傳其艾須其火至滅也其艾炷根下廣三分長三分若減此不覆孔穴不中經脈火氣不行亦不能除病也凡灸忌用松柏桑棗竹柿楓榆八木以用灸人害人肌肉筋脈骨髓可用陽燧火珠映日取火若陰無火鑽槐木以菊莖延火亦可瑎石以艾蒸之取火用灸大良又無此宜以香油布纏及艾莖別引取火則去疾不傷人筋骨皆欲得觸傷其痛根瘡若不壞則病不除也甲乙丙捲雲灸則不發者炙故履底令熱好尉之三日即發也得發則病愈矣不宜灸禁穴及老少加減法甲乙經頭維下關承光腦戶氣衝脊中伏兔乳中地五會風府泉腑喑門天府經渠白環輸鳩尾迎香石門女子絲竹空承泣耳門人迎瘛脈少商尺澤陰市陽關甲乙經少海小海睛明關衝上三十二穴並禁不宜灸千金甄權楊操同出第三卷中凡灸有生熟候人盛衰及老少也衰老者少灸盛壯肥實者多灸凡孔穴皆逐人形大小取手中指頭第一節為寸男左女右又一云三寸者盡一中指也凡人年三十以上若不灸三里令人氣上眼暗所以三里下氣也出第三十七卷中黃帝問曰凡灸大風大雨大陰大寒灸否既不得灸有何損益岐伯答曰大風灸者陰陽交錯大雨灸者諸經絡脈不行大陰灸者令人氣逆大寒灸者血脈蓄滯此等日灸乃更動其病令人短壽大風者所謂一復時不可加火艾大寒者所謂盛冬凌辰也大雨者但雨日即不得雖然有卒得又逢大雨此止可灸之大陰者謂諸雲霧恝合凡人初患卒得終是難下手經云當其盛也慎勿衰傷即是初得重病之狀候年神傍通法論曰此等諸法並散在諸部不可尋究故集之一處造次易知所以省披討也孔穴主對法論曰凡云孔穴主對者穴名在上病狀在下或一病有數穴或數病共一穴皆臨時斟酌作法用之其有須灸者即灸之不宜灸者經穴了注其名併為良法但恨下里間知者鮮爾所以學者深須解之皆須妙解知灸知藥固是良醫通按此款出千金本文言針言灸言藥合治方為良法今刪去針單言灸藥遂覺文理欠順又云經穴注了其灸似誤或是了注其名年一二三四五六七八九十十一十二十三十四十五十六十七十八十九二十二一二二二三二四二五二六二七二八二九三十三一三二三三三四三五三六三七三八三九四十四一四二四三四四四五四六四七四八四九五十五一五二五三五四五五五六五七五八五九六十六一六二六三六四六五六六六七六八六九七十七一七二七三七四七五七六七七七八七九八十八一八二八三八四八五八六八七八八八九九十以上人神所在傍看他皆仿此上件九部人神歲移一部周而復始不可灸凶心喉頭肩背腰腹項足膝陰股年一二三四五六七八九十十一十二十三十四十五十六十七十八十九二十二一二二二三二四二五二六二七二八二九三十三一三二三三三四三五三六三七三八三九四十四一四二四三四四四五四六四七四八四九五十五一五二五三五四五五五六五七五八五九六十六一六二六三六四六五六六六七六八六九七十七一七二七三七四七五七七七八七九八十八一八二八三八四八五八五八六八七八八八九九十九一九二九三九四九五九六上件十二部人神所在並不可灸及損傷慎之推月忌日忌傍通法月忌法正二三四五六七八九十十一十二血忌丑未寅申卯酉辰戌巳亥午子凶月厭戌酉申未午巳辰卯寅醜子亥凶四激戌戌戌醜醜醜辰辰辰未未未凶月殺醜戌未辰醜戌未辰醜戌未辰凶月刑巳子辰申午醜寅酉未亥卯戌凶六害巳辰卯寅醜子亥戌酉申未午凶天醫卯寅醜子亥戌酉申未巳午辰吉上於天醫上取師療病吉余不得灸及取師凶日忌法一日在足大趾二日外踝三日股內及腳腨四日腰及髀五日口齒舌根咽懸癰及足趾六日手小指少陽及臍下七日內踝八日足腕一云在腳九日尻及龜尾手陽明十日腰眼及足拇趾十一鼻柱及眉十二面髮際十三牙齒十四胃脘咽喉足陽明十五遍身十六胸乳十七氣衝及脅十八腹內十九足跌足下及項二十膝以下一云踝及膊二一唇舌足小趾二二伏兔外踝一云胸臆中二三肝俞足跌兩腋二四手陽明兩脅及小腸二五足陽明心腹一云膝足二六手足胸二七膝內踝一雲肩膊膈下及兩足並陰囊中二八陰中及耳頰二九膝頭顳顬兩手足三十足跌上及煩膝頭又云關元下至足心又云遍身上件人神所在上件日並不宜灸十千人神所在法甲日在頭乙日在頂丙日在肩臂丁日胸脅戊日在腹及頷頸巳日在背庚日在膝及髀腰辛日在脾及心肺壬日在腎及手癸日在足十二袛人神所在法子日在目孫氏云在肩口丑日在耳及腰寅日在胸面孫云在口卯日在脾孫云在鼻辰日在腰巳日在頭目孫云在手午日在心腹未日在兩足心孫云在足申日在肩額孫云在頭腰酉日在腰孫云在背戌日在咽喉孫云在頭一作項亥日在臂頸又云在膝孫云在項十二時人神所在法子時在踝丑時在頭寅時在耳孫云在目卯時在面孫云在目辰時在項孫云在口巳時在乳一雲肩午時在胸脅未時在腹申時在心酉時在膝孫云在背脾戌時在腰孫云在陰左右亥時在股十二祗人神所在法建日不治足一作頭禁晡時除日不治眼一作膝禁日人滿日不治腹禁黃昏平日不治腰背禁人定定日不治心禁夜半執日不治手禁雞鳴破日不治口禁平旦危日不治鼻禁日出成日不治唇禁食時收日不治頭一作足禁食時開日不治耳禁目中閉日不治目禁日斜又法甲乙日忌寅時不灸頭丙丁日忌辰時不灸耳戊己日忌午時不灸髮鬢一云不灸膝臏壬癸日忌酉時不灸足又方每月六日十五日十八日二十四日小盡日甲辰庚寅乙卯丙辰辛巳五辰五酉五未八節日前後各一日若遇以上日並凶不宜灸之又法正月醜二月戌三月未四月辰五月醜六月戌七月未八月辰九月醜十月戌十一月未十二月辰又法男忌壬辰甲辰己巳丙午丁未女忌甲寅乙卯乙酉乙巳丁巳又法男忌除日女忌破日又法男忌戌日女忌辰日孫氏方忌巳日又法丙子日天子會壬子日百王會甲子日太子會丁巳日三公會丙辰日諸候會辛卯日大夫會癸卯日人臣會乙亥日以上都會又法木命人行年在木不宜針及服青藥火命人行年在火不宜汗及服赤藥土命人行年在土不宜吐及服黃藥金命人行年在金不宜灸及服白藥水命人行年在水不宜下利及服黑藥凡不知此法下藥若遇命厄會深者下手即死又法立春春分脾立夏夏至肺立秋秋分肝立冬冬至心四季十八日腎又法春左脅秋右脅夏在臍冬在腰以上人神並不宜灸之傷神殺人五臟六腑變化流注出入傍通宜傍看從腎臟至天井三焦出入止凡五臟六腑變化無窮散在諸經其事隱沒難得具知今纂集相附以為傍通令學者少留意推尋則造次可見論曰假令肝心脾肺腎為臟則膽小腸胃大腸膀胱為腑足少陰為腎經足太陽為膀胱經下至五臟五果五菜皆爾觸類長之他皆仿此出千金方第二十九卷中近附二十四條五臟肝心脾肺腎六腑膽小腸胃大腸膀胱三焦五臟經足厥陰手少陰足太陰手太陰足少陰六腑經足少陽手太陽足陽明手陽明足太陽手少陽五行各主一臟木火土金水五臟數五行數配五臟三八二七五十四九一六五行色五臟所象青赤黃白黑五行相生水木火土金五行相剋金木土水火五臟胎月不宜灸吐利八月十一月五月二月五月五臟相月不宜補養冬三月木相春三月火相夏三月土相季夏六月金相秋三月水相五臟旺月有疾可宣泄春三月木旺夏三月火旺季夏土旺秋三月金旺冬三月水旺五臟廢月宜補不宜瀉夏三月木廢季夏火廢秋三月土廢冬三月金廢春三月水廢五臟囚月宜補不宜瀉季夏木囚秋三月火囚冬三月土囚春三月金囚夏三月水囚五臟死月宜補秋三月木死冬三月火死春三月土死夏三月金死季月水死五臟旺日五臟主日不灸不服藥甲乙丙丁戊己庚辛壬癸五臟旺時不灸寅至辰巳至未辰戌丑未申至戌亥至醜五臟困日宜補養戊己土也庚辛金也壬癸水也甲乙木也丙丁火也五臟困時宜補養食時日扶土也晡時日入金也人定夜半水也平旦日出木也禺中日中火也五臟忌日忌此日得疾病庚辛壬癸甲乙丙丁戊己五臟忌時並忌此時得病申至酉亥至子寅至卯巳至午辰戌丑未五時春夏季夏秋冬五音象五行應五臟