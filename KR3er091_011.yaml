body:
  text: 卷第十一消渴方一十七首病源夫消渴者渴而不小便是也由少服五石諸丸散積久經年石勢結於腎中使人下焦虛熱及至年衰血氣減少不能制於石石勢獨盛則腎為之燥故引水而不小便也其病變者多發癰疽此坐熱氣留於經絡經絡不利血氣壅澀故成癰膿也診其脈數大者生細小浮者死又沉小者生實牢大者死有病口甘者名為何何以得之此五氣之溢也名曰脾疸夫五味入於口藏於胃脾為之行其精氣溢在於脾令人口甘此肥美之所發也此人必數食甘美而多肥肥令人內熱甘者令人中滿故其氣上溢為消渴也厥陰之為病消渴氣上衝心中疼熱飢不欲食甚者則欲吐下之不肯止養生法云人睡臥勿張口久成消渴及失血也赤松子云臥閉目不息十二通治飲食不消其湯尉針石別有正方補養宣導今附於後法云解衣倓臥伸腰䐜少腹五息止引腎去消渴利陰陽解衣者使無掛礙倓臥者無外想使氣易行伸腰者使腎無逼蹙䐜者大努使氣滿少腹者攝腹牽氣使五息即止之引腎者引水來咽喉潤上部去消渴枯槁病利陰陽者饒氣力也出第五卷通按後條古人喜石宜消渴今服石者少何有此症緣酒多令中三焦熱臟腑燥亦致消渴不必皆由服石也但治法頗同千金論曰夫消渴者凡積久飲酒無有不成消渴病者然則大寒凝海而酒不凍明其酒性酷熱物無以加脯炙鹽咸此味酒客多嗜不離其口三觴之後制不由己飲啖無度咀嚼鮓醬不擇酸鹹積年長夜酣典不懈遂使三焦猛熱五臟乾燥木石猶且焦枯在人何能不渴療之愈否屬在病者若能如方節慎旬月而瘳不自愛惜死不旋踵方書醫藥實多有效其如不慎者何其所慎者有三一飲酒二房室三鹹食及面能慎此者雖不服藥而自可無他不知此者縱有金丹亦不可救深思慎之深思慎之凡消渴之人愈與未愈常須慮患大癰何者消渴之人必於大骨節間忽發癰疽而卒所以戒在大癰也當預備癰藥以防之宜服麥門冬丸除腸胃熱實兼消渴方麥門冬八分去心茯苓八分堅白者黃連八分石膏八分碎葳蕤八分人參六分龍膽六分黃芩六分升麻四分栝蔞十分枳實五分炙生薑屑十分地骨皮六分茅根切一升粟米三合上十五味以水六升煮茅根及粟米令爛餘十三味搗末蜜和丸如梧子以前茅根粟米汁作飲服十丸日二若渴則與此飲至足大麻亦得忌豬肉酢物又栝蔞湯方栝蔞五兩切麥門冬汁三升生薑五兩切茅根切三升蘆根切二升上五味以水一斗煮取三升分為三服忌如藥法又胃腑實熱引飲常渴茯苓湯泄熱止渴方茯苓五兩一作茯神栝蔞五兩知母四兩小麥二升麥門冬五兩去心大棗二十枚去核生地黃六兩葳蕤四兩淡竹葉三升上九味切以水三斗先煮小麥竹葉取九升去滓納諸藥煮取四升分四服不問早晚隨渴即進非但正治胃渴通治渴病熱即服之忌蕪荑酢物又豬肚丸療消渴方豬肚一枚治如食法黃連五兩去毛栝蔞四兩麥門冬四兩去心知母四兩茯神四兩粱米五兩上七味搗為散納肚中線縫安置甑中蒸之極爛熟接熱及藥木臼中搗可堪丸若硬加少蜜和丸如梧子飲汁下三十丸日再服漸加至四五十丸渴即服之翼同又栝蔞散方栝蔞八分麥門冬六分去心甘草六分炙鉛丹八分上四味搗為散以漿水服方寸匕日三服忌海藻菘菜一方有茯苓六分又黃耆湯方黃耆三兩茯神三兩栝蔞三兩甘草三兩炙麥門冬三兩去心乾地黃五兩上六味切以水八升煮取二升半分三服忌蕪荑酢物海藻菘菜日進一劑服十劑訖服丸藥後腎消門中宣補丸是又方取七家井索近桶口結處燒作灰上一味以井華水服之不過三服又方飲豉汁任性多少瘥止又方濃煮竹根汁飲之取瘥止肘後同又方煮青粱米汁飲之瘥止肘後同又消渴陰脈絶胃反吐食方茯苓八兩澤瀉四兩白朮三兩生薑三兩桂心三兩甘草一兩炙上六味切以水一斗煮小麥三升取五升去滓納茯苓等煮取二升半一服八合日再翼同又方取屋上瓦三十年者破如雀頭三大升以東流水兩石煮取二斗乾地黃八兩生薑八兩橘皮三兩甘草三兩炙人參三兩黃耆三兩桂心二兩遠志三兩去心當歸二兩芍藥二兩大棗二十枚擘白朮八兩上十二味切納瓦汁中煮取三升分溫四服單瓦汁亦佳一方無甘草又療熱病後虛熱渴四肢煩疼方葛根一斤人參一兩甘草一兩炙竹葉一把上四味切以水一斗五升煮取五升渴則飲一升日三夜二忌海藻菘菜又虛熱渴無不效填骨煎方茯苓三兩菟絲子三兩山茱萸三兩當歸三兩大豆黃卷一升石葦二兩去毛牛膝三兩巴戟天三兩麥門冬三兩去心天門冬五兩去心五味子三兩人參二兩遠志三兩去心桂心二兩附子二兩炮石斛三兩上十六味先搗篩別取生地黃十斤生栝蔞十斤舂絞取汁於火上煎之減半便作數分納藥並下白蜜二升牛髓一升微火煎之令如糜食如雞子黃大日三亦可飲服之佳忌酢物鯉魚生蔥豬肉冷水一方有肉蓯蓉四兩又方桃膠如彈丸含之咽津甚佳本方療渴小便利復非淋又方蠟如雞子大酢一升煮兩沸適寒溫頓服之本方療渴小便利復非淋通按小便利而且長不比淋症之滴瀝也故曰復非淋又方水和栝蔞散服方寸匕亦可蜜丸如梧子服三十丸日再服無所忌並出第二十一卷中近效極要消渴方二首近效極要論消渴舊來以為難療古方有黃連湯牛膽丸為勝亦不能好瘥自作此方以來服者皆瘥服多者即吐水豈有更渴之理又療消渴麥門冬丸方麥門冬五兩去心乾地黃三兩蜀升麻五兩黃芩五兩栝蔞七兩苦參八兩人參三兩黃連五兩黃柏五兩上九味末之以牛乳和衆手捻作丸子曝乾以飲服二十丸日二加至五六十丸忌蕪荑獵肉冷水又方黃連五兩苦參一斤知母五兩栝蔞二兩麥門冬五兩去心牡蠣粉五兩熬人參五兩黃耆五兩乾地黃五兩上九味末之以牛乳丸清漿服二十丸日二服加至五十丸忌豬肉冷水蕪荑近效極要熱中小便多漸瘦方四首近效極要論熱中雖能食多小便多漸消瘦方地骨皮切一升麥門冬三兩去心黃連二兩小麥八合人參一兩上五味切以水九升煮取三升八合去滓分為三服間食服之如不能多服分作四五服亦得忌豬肉又方人參五兩麥門冬八分去心牡蠣粉八分乾地黃十分知母八分苦參二十分黃連八分栝蔞八分上八味末之以生牛乳為丸如梧子清漿服十五丸日再加至四十丸食後服忌蕪荑豬肉冷水又療小便多或不禁方菟絲子二兩蒲黃三兩黃連三兩硝石三兩肉蓯蓉二兩上五味兼雞䏶胵中黃皮三兩為散服服方寸匕日三服如行五里久又一服未有不瘥者忌豬肉千金名九房散又療小便數多不足日便一二斗或如血色方麥門冬八兩去心蒺藜子三兩甘草一兩炙乾薑四兩炮桂心二兩乾地黃八兩續斷二兩上七味切以水一斗煮取二升五合分為三服忌海藻菘菜生蔥蕪荑古今録驗療腎消腳瘦細小便數赤色似血虛冷者渴利虛經脈澀成癰膿方一十一首病源夫渴利者隨飲小便是也由少服乳石石熱盛時房室過度致令腎氣虛耗下焦生熱熱則腎燥腎燥則渴然腎虛又不能傳制水液故隨飲小便也其病變多發癰疽以其內熱而小便利故也小便利則津液竭津液竭則經絡澀經絡澀則營衛不行營衛不行則熱氣留滯故成癰膿也出第五卷中千金療下焦虛熱注脾胃從脾注肺好渴利方小麥一升竹葉三升麥門冬四兩去心茯苓四兩甘草三兩炙大棗三十枚去核生薑五兩栝蔞五兩地骨皮一升上九味切先以水三斗煮小麥取一斗去滓澄清取八升去上沫取七升煮藥取三升分三服忌海藻菘菜酢物又療渴利虛熱引飲不止消熱止渴茯神湯方茯神四兩石膏八兩碎地骨皮一升竹葉三升栝蔞五兩葳蕤四兩麥門冬二升去心知母四兩生地黃一升宿姜四兩上十味切以水一斗二升下大棗三十枚擘並藥煮取四升分為四服忌蕪荑又消渴利方生栝蔞根三十斤上一味切以水一石煮取一斗半去滓以牛脂五合煎取水盡以暖酒先食後服如雞子大日三服又方葵根五升盤大兩束切上一味以水五升煮取三升宿不食平旦一服三升又療渴小便利復非淋方榆白皮二斤去黑皮切上一味以水一斗煮取五升一服三合日三服又方小豆藿一把搗取汁頓服日三肘後文仲同又渴利方栝蔞粉和雞子日曝乾更搗水服方寸匕日三丸服亦得又療虛熱四體羸瘦渴熱不止茯神消渴補虛煮散方茯神四兩石斛八兩栝蔞五兩甘草三兩炙五味子三兩蓯蓉四兩知母三兩黃連八兩丹參五兩人參三兩當歸三兩小麥三升葳蕤四兩上十三味搗篩為散取三寸匕以水三升煮取一升絹袋貯煮之日再一煮為一服忌豬肉醋物海藻菘菜出第二十二卷中崔氏療消渴瘦中焦熱渴方苦參一大斤黃連六分栝蔞五兩知母五兩牡蠣粉五兩麥門冬五兩去心上六味各搗篩為散以牛乳和並手捻為丸如梧子大曝乾日再服飽食訖以漿水下之服二十丸如微利減十丸如食熱面酒等即加服五丸忌豬肉出第三卷中廣濟療脾胃中虛熱消渴小便數骨肉日漸消瘦方麥門冬十二分去心苦參八分栝蔞八分知母八分茯神八分土瓜根八分甘草六分炙人參六分上八味搗篩蜜和丸每食少時煮蘆根大麥飲服如梧子二十丸日再漸加至三十丸忌海藻菘菜豬肉大酢一方有黃連十二分出第一卷中肘後療消渴肌膚羸瘦或虛熱轉筋不能自止小便數方栝蔞六分黃連六分漢防己六分鉛丹六分研上四味搗篩為散每食後取酢一合水二合和服方寸匕日三服當強飲水須臾惡水不復飲矣陶氏廣濟文仲同千金翼同分兩小別出第十卷中消渴口乾燥方三首廣濟療口乾數飲水腰腳弱膝冷小便數用心力即煩悶健忘方麥門冬十二分去心牛膝六分龍骨八分土瓜根八分狗脊六分茯神六分人參六分黃連十分牡蠣六分熬碎山茱萸八分菟絲子十二分酒漬一宿鹿茸八分炙上十二味搗篩為末蜜和丸每服食後煮麥飲服如梧子二十丸日二服漸加至三十丸忌生菜熱面豬牛肉蒜黏食陳臭酢物等又療消渴口苦舌乾方麥門冬五兩去心茅根一升栝蔞三兩切烏梅十顆去核小麥三合竹茹一升上六味以水九升煮取三升去滓細細含咽分為四五服忌熱面炙肉並出第一卷中千金口含酸棗丸療口乾方酸棗一升五合去核石榴子五合干之葛根三兩烏梅五十顆去核麥門冬四兩去心茯苓三兩半覆盆子三兩桂心三兩六銖石蜜四兩半栝蔞三兩半上十味搗篩蜜和為丸含如酸棗許大不限晝夜常令口中有津液出為佳忌大酢生蔥翼同出第二十一卷中消中消渴腎消方八首病源內消病者不渴而小便多是也由少服五石熱結於腎內熱之所作也所以服石之人小便利者石性歸腎腎得石則實實則消水漿故利利多則不得潤養五臟臟衰則生諸病焉由腎盛之時不惜真氣恣意快情數使虛耗石熱孤盛則作消中故不渴而小便多也出第五卷中千金論曰夫內消之為病當由熱中所作也小便多於所飲令人虛極短氣又內消者食物皆消作小便而又不渴正觀十年梓州刺史李文博先服白石英久忽然房道強盛經月餘漸患渴經數日小便大利日夜百行以來百方療之漸以增劇四體羸惙不能起止精神惚恍口舌焦乾而卒此病雖稀甚可畏也利時脈沉細微弱服枸杞湯即效若恐不能長愈服鉛丹散立效其間將服除熱宣補丸枸杞湯方枸杞枝葉一斤栝蔞根三兩石膏三兩黃連三兩甘草二兩炙上五味切以水一斗煮取三升去滓分溫五服日三夜二服困重者多合渴即飲之忌海藻菘菜豬肉又鉛丹散主消渴止小便數兼消中悉主之方鉛丹二分熬別研入栝蔞根十分甘草十分炙澤瀉五分胡粉二分熬研入石膏五分研白石脂五分研入赤石脂五分上八味搗研為散水服方寸匕日三服少壯人一匕半患一年者服之一日瘥二年者二日瘥渴甚者夜二服若腹中痛者減之丸服亦佳一服十丸以瘥為度不要傷多令人腹痛此方用之如神已用經今三十餘載矣忌海藻菘菜文仲云腹中痛者宜漿水飲汁下之亦得又備急云不宜酒下用麥汁下之亦得丸服者服十丸日再服合一劑救數人得愈古今録驗云服此藥了經三兩日宜爛煮羊肝肚空腹吃之或作羹亦得宜湯淡食之候小便得鹹苦即宜服後花蓯蓉丸兼煮散將息又療腎消渴小便數宜補丸方黃耆三兩栝蔞三兩麥門冬三兩去心茯神三兩人參三兩甘草三兩炙黃連三兩知母三兩乾地黃六兩石膏六兩研菟絲三兩肉蓯蓉四兩上十二味末之以牛膽汁三合共蜜和丸梧子大以茅根汁服三十丸日漸加至五十丸一名茯神丸集驗同又療腎氣不足虛損消渴小便數腰痛宜服腎瀝湯方羊腎一具去脂膜切遠志二兩去心人參二兩澤瀉二兩乾地黃二兩桂心二兩當歸二兩龍骨二兩甘草二兩炙麥門冬一升去心五味子五合茯苓一兩芎藭二兩黃芩一兩生薑六兩大棗二十枚上十六味切以水一斗五升煮羊腎取一斗二升納藥取三升分三服忌海藻菘菜生蔥酢物蕪荑集驗同又阿膠湯療久虛熱小便利而多或服石散人虛熱多由汗出當風取冷患腳氣喜發動兼消渴腎消脈細弱服此即立減方阿膠三兩乾薑二兩麻子一升遠志四兩去心附子一兩炮人參一兩甘草三兩炙上七味切以水七升煮取二升半去滓納膠令煬分三服說云小便利多白日夜數十行至一石令五日服之甚良忌海藻菘菜豬肉冷水又腎消夜尿七八升方鹿角一具炙令焦上一味搗篩酒服方寸匕漸漸加至一匕半又黃耆湯主消中虛勞少氣小便數方黃耆二兩芍藥二兩生薑二兩當歸二兩桂心二兩甘草二兩大棗三十枚麥門冬一兩去心乾地黃一兩黃芩一兩上十味切以水一斗煮取三升去滓空腹溫分三服忌海藻菘菜生蔥蕪荑古今録驗論消渴病有三一渴而飲水多小便數無脂似麩片甜者皆是消渴病也二吃食多不甚渴小便少似有油而數者此是消中病也三渴飲水不能多但腿腫腳先瘦小陰痿弱數小便者此是腎消病也特忌房勞若消渴者倍黃連消中者倍栝蔞腎消者加芒硝六分服前件鉛丹丸得小便鹹苦如常後恐虛憊者並宜服此花蓯蓉丸方花蓯蓉八分澤瀉四分五味子四分紫巴戟天四分去心地骨皮四分磁石六分研水淘去赤汁干之研入人參六分赤石脂六分研入韭子五分熬龍骨五分研入甘草五分炙牡丹皮五分乾地黃十分禹餘糧三分研入桑螵蛸三十枚炙栝蔞四分上十六味搗篩蜜和丸如梧子以牛乳空腹下二十丸日再服忌海藻菘菜胡荽蕪荑等物又服前丸渴多者不問食前後服煮散方桑根白皮六分薏苡仁六分通草四分紫蘇莖葉四分五味子六分覆盆子八分枸杞子八分乾地黃九分茯苓十二分菝葜十二分黃耆二分上十一味搗以馬尾羅篩之分為五帖每帖用水一升八合煎取七合去滓溫服忌酢物蕪荑出第二十六卷中睡中尿床不自覺方六首病源夫人有於眠睡中不覺尿出者是其稟質陰氣偏盛陽氣偏虛則膀胱腎氣俱冷不能溫制於水則小便多或不禁而遺尿膀胱足太陽也為腎之腑腎者足少陰也為臟與膀胱合俱主水凡人之陰陽日入陽氣盡則陰受氣至夜半陰陽大會氣交則臥睡小便者水液之餘也從膀胱入於胞為小便夜臥則陽氣衰伏不能制於陰所以陰氣獨發水下不禁故於睡眠而不覺尿床也出第十四卷中肘後療少小睡中遺尿不自覺方取鵲巢中蓐燒水服一錢匕即瘥文仲方千金同又方雄雞肝桂心上二味等分搗丸服如小豆一枚日三服又方雄雞屎白熬桂心上二味等分末酒服方寸匕日二亦可除桂心又方礬石燒令汁盡牡蠣熬上二味等分末之以粟米粥飲服方寸匕日三又方雄雞喉嚨及屎白䏶胵裹黃皮燒末麥粥清盡服之亦可以赤雞翅燒末酒服三指撮日三又方薔薇根隨多少銼搗以酒飲之並出第二卷中渴後小便多恐生諸瘡方二首病源渴利之病隨飲小便也此謂服石之人房室過度腎氣虛耗故也下焦生熱熱則腎燥腎燥則渴然腎虛又不能制水故小便利也其渴利雖瘥熱猶未盡發於皮膚皮膚先有風濕濕熱相搏所以生瘡也出第五卷中近效恐腎虛熱渴小便多除風濕理石毒止小便去皮膚瘡調中方升麻四分玄參五分甘草四分炙知母五分茯苓三分牡蠣六分漏蘆五分枳實六分炙菝葜四分黃連六分上十味搗篩飲汁服方寸匕日再服以瘥為度忌豬肉海藻菘菜酢物又方栝蔞八分茯苓八分玄參四分枳實六分炙苦參三分甘草三分炙橘皮三分上七味搗篩每空腹以漿水服方寸匕日再服忌海藻大酢菘菜渴後恐成水病方三首病源五臟六腑皆有津液若腑臟因虛實而生熱者熱氣在內則津液竭少故渴也夫渴數飲其人必眩背寒而嘔者因利虛故也診其脈心脈滑甚為善渴其久病變或發癰疽或為水病出第五卷中近效渴後數飲嘔逆虛羸恐成癰疽水病方茯苓五分栝蔞六分升麻四分麥門冬六分去心桑根白皮八分橘皮三分上六味搗為散清水服一方寸匕日再服忌酢物又方人參三分豬苓三分通草五分黃連六分麥門冬八分去心栝蔞八分上六味搗為散漿水送方寸匕日再服以瘥為度忌豬肉冷水生冷等物又若已覺津液竭身浮氣如水病者方漢防己六分豬苓六分栝蔞八分茯苓四分桑根白皮十二分白朮三分杏仁六分去皮尖熬郁李仁六分葶藶子十二分熬紫色上九味搗篩蜜和丸如梧子空腹漿水服三十丸日一服腫消小便快下為度忌酢物桃李雀肉等又藶丸療消渴成水病浮腫方甜葶藶隔紙炒栝蔞仁杏仁去皮尖雙仁麩炒黃漢防己各一兩上四味為末蜜丸搗二三百杵如梧子大服三十丸食前茯苓煎湯送下日三四服又瞿麥湯療消渴欲成水氣面目並足脛浮腫小便不利方瞿麥穗澤瀉滑石各兩半防己三分黃芩大黃各一分桑螵蛸炒十四枚上七味切每服三錢匕水三升煮一升去滓空心溫服良久再服虛勞小便白濁如脂方四首病源此由勞傷於腎腎氣虛冷故也腎主水而關竅在陰陰為尿便之道脬冷腎損故小便白而如脂或如麩片也出第四卷中崔氏飲水不知休小便中如脂舌乾渴方黃連五兩栝蔞五兩上二味搗末以生地黃汁和丸並手丸每食後牛乳下五十丸日再服之忌豬肉近效消渴肝肺熱焦枯消瘦或寒熱口乾日夜飲水小便如脂不止欲死方水飛鐵粉三兩絶燥者別研入雞膍胵五枚陰乾末入牡蠣二兩熬別研如粉入黃連三兩上四味搗篩三五度煉蜜和丸飲汁下如梧子大五十丸重者不過食時輕者手下瘥勿傳忌豬肉又主消渴口乾方黃連豉曝令乾上二味一處搗令成丸食後飲服四十丸日再丸稍大如常藥丸常服有效忌豬肉又消渴能飲水小便甜有如脂麩片日夜六七十起方冬瓜一枚黃連十兩右截瓜頭去穰入黃連末火中煨之候黃連熟布絞取汁一服一大盞日再服但服兩三枚瓜以瘥為度一方云以瓜汁和黃連末和如梧子大以瓜汁空肚下三十丸日再服不瘥增丸數忌豬肉冷水經驗用大牡蠣不計多少以臘日端午日將黃泥裹煅通赤放冷取出為末用活鯽魚煎湯調下一錢強中生諸病方六首病源夫強中病者莖長興盛不痿精液自出是也由少服五石石熱住於腎中下焦虛熱少壯之時血氣尚豐能制於石及至年衰血氣減少腎虛不能制精液也若精液竭則諸病生矣出第五卷中千金論曰夫人生放恣者衆盛壯之時不自慎惜快情縱欲極意房中稍至年長腎氣虛竭百病滋生又年少慮不能房多服石散真氣既盡石氣孤立唯有虛耗唇口乾焦精液自泄或小便赤黃大便乾實或渴而且利日夜一石以來或渴而不利或不渴而利所食之物皆作小便此皆由房室不節之所致也又強中之病者莖長興盛不痿精液自出也消渴之後即作癰疽皆由石熱凡如此等宜服豬腎薺苨湯制腎中石熱又將服白鴨通丸便瘥豬腎薺苨湯方豬腎一具去脂膜大豆一升薺苨三兩人參二兩茯神二兩磁石二兩碎知母二兩葛根二兩黃芩二兩栝蔞二兩甘草二兩炙石膏三兩上十二味切以水一斗五升先煮豬腎大豆取一斗以下去滓納諸藥煎取三升去滓分溫三服渴乃飲之下焦熱者輒合一劑病勢漸歇即停忌海藻菘菜酢物又平人夏月喜渴者由心旺也心旺便汗出汗出則腎中虛燥故令渴而小便少也冬月不汗出故小便多而數也此皆是平人之候名曰腎渴但小便利而不飲水者名腎實也經曰腎實則消消者不渴而利是也所以服石之人其於小便利者石性歸腎腎得石則實實則能消水漿故利利多則不得潤養五臟臟衰則生諸病也張仲景曰若熱結中焦則為堅熱也熱結下焦則為溺血亦令人淋閉不通明知不必悉患小便利信矣內有熱氣者則喜渴也除其熱則止渴兼虛者須除熱而兼宜補虛則病愈又療嶺南山瘴氣兼風熱毒氣入腎中變成寒熱腳弱虛滿而渴方黃連不限多少生栝蔞汁生地黃汁羊乳無即用牛乳及人乳亦得上四味取三般汁乳和黃連末任多少衆手捻為丸如梧子大麥飲服三十丸漸加至四十丸五十丸日三服輕者三日愈重者五日愈若藥苦難服即煮麥飲汁下亦得文仲云黃連丸一名羊乳丸肘後同忌豬肉蕪荑又療消渴浮萍丸方浮萍栝蔞根等分上二味搗篩以人乳汁和為丸如梧子麥飲服二十丸日三服三年病三日瘥肘後文仲同主虛熱甚佳又療面黃咽中乾燥手足俱黃短氣脈如連珠除熱止渴利補養地黃丸方生地黃汁二升生栝蔞汁二升生羊脂三升牛脂亦得好蜜四升黃連末一斤上五味搗合銀鍋中熬成煎可丸如梧子飲汁送五丸日三服加至十丸若苦冷而渴瘥即令別服溫藥忌豬肉蕪荑肘後同又療渴小便數散方知母六分栝蔞一斤茯苓四分鉛丹一分雞䏶胵中黃皮十四枚上五味為散飲服方寸匕日三禁酒生菜肉瘥後去鉛丹以蜜和之以麥飲長服勿絶良忌酢物肘後同消渴不宜針灸方一十首千金論曰凡消渴病經百日以上者不得灸刺灸刺則於瘡上漏膿水不歇遂成癰疽羸瘦而死亦忌有所誤傷皮肉若作針孔許大瘡者所飲之水皆於瘡中變成膿水而出若水出不止者必死慎之慎之初得消渴者可依後方灸刺之為佳孫氏云消渴病百日外既不許針刺所飲之水皆化為膿水不止者皆死特須慎之又云仍不得誤傷皮肉若有小瘡亦云致死既今亦得消渴且未免飲水水入瘡即損人今初得日豈得令其灸刺致此誤傷之禍輒將未順其理且取百日以上為能未悟初灸之說故不録灸刺凡灸刺則外脫其氣消渴皆是宣疾灸刺特不相宜唯腳氣宜即灸之是以不取灸穴者耳又有人患消渴小便多而數發在於春經一夏專服栝蔞及豉汁得其力渴漸瘥然小便猶數甚晝夜二十餘行常至三四升極差不減二升也轉久便止漸食肥膩日就羸瘦唇口乾燥吸吸少氣不得多語心煩熱兩腳痠食乃兼倍於常而不為氣力者然此病皆由虛熱所為耳療法栝蔞汁可長服以除熱牛乳杏酪善於補此法最有益出第二十一卷中文仲療消渴熱中加減六物丸方栝蔞根八分麥門冬六分去心知母五分人參四分苦參四分土瓜根四分右藥搗篩以牛膽和為丸如小豆服二十丸日三服麥粥汁下未知稍加至三十丸咽乾者加麥門冬舌乾加知母脅下滿加人參小便難加苦參小便數加土瓜根隨患加之一分肘後同又黃連丸主消渴方黃連一斤去毛生地黃十斤上二味搗絞地黃取汁漬黃連出曝之燥復納之令汁盡干搗之下篩蜜和丸如梧子服二十丸日三服亦可散以酒服方寸匕日三服盡更令作即瘥止忌豬肉蕪荑肘後集驗千金廣濟同並出第八卷中千金栝蔞粉散療消渴祕方深掘大栝蔞根厚削皮至白處上一味寸切以水浸一日一易經五日出取爛搗破之以絹袋盛擺之一如出粉法水服方寸匕日三四亦可作粉粥乳酪中食之不限多少取瘥止出第二十一卷中肘後主消渴方秋麻子一升以水三升煮三四沸取汁飲之無限不過五升瘥文仲同出第二卷中廣濟療消渴兼氣散方栝蔞三兩石膏三兩研甘草三兩甘皮二兩上四味搗篩為散食後煮大麥飲服方寸匕日二夜一服漸加至二匕忌熱面海藻菘菜又療消渴麥門冬湯方蘆根切二升苧根切二升石膏六分碎生薑五兩栝蔞五兩小麥二升生麥門冬二升去心上七味切以水二斗煮取六升去滓一服一升渴即任意飲未瘥更作並出第一卷中崔氏療患熱消渴常服有驗方豉心三兩以酸醋拌蒸乾如此者三熬令微黃黃連三兩上二味搗篩訖以蜜和為丸日再空腹服二十五丸食後又服二十丸又取烏梅十顆以水二小升煎之數沸取湯下前件丸藥如無烏梅以小麥子二升煮取汁亦得又方黃連一升去毛麥門冬五兩去心上二味搗篩以生地黃汁栝蔞根汁牛乳各三合和頓為丸如梧子一服二十五丸飲下日再服漸漸加至三十丸若不頓為丸經宿即不相著也消渴及小便多並是虛熱但冷將息即瘥前件三方崔氏本方中此處更有一方用栝蔞黃連者故云前件三方並是冷補空腹服恐少腹下冷常吃少許食服之大好忌豬肉蕪荑又療消渴無比方土瓜根八兩苦參粉三兩黃連五兩去毛鹿茸三兩炙栝蔞三兩雄雞腸三具牡蠣五兩熬白石脂三兩研甘草三兩炙黃耆三兩桑螵蛸三七枚炙白龍骨五兩研雞䏶胵黃皮三十具熬上一十三味搗篩為散一服六方寸匕日再服夜一服以後藥下之竹根十兩麥門冬四兩去心石膏四兩甘李根白皮三兩上四味以水一斗二升煮取三升五合以下前件散藥如難服可取此藥汁和丸一服六十丸仍還用此藥汁下之忌豬肉海藻菘菜並出第四卷中千金加減巴郡太守奏三黃丸療男子五勞七傷酒渴不生肌肉婦人帶下手足寒熱者方春三月黃芩四兩大黃三兩炒黃連四兩夏三月黃芩六兩大黃一兩炒黃連七兩炒秋三月黃芩六兩大黃二兩黃連三兩冬三月黃芩三兩大黃五兩黃連二兩炒上三味隨時合搗下篩以蜜和為丸如大豆服五丸日三不知稍增七丸服一月病愈久服走及奔馬近常試驗忌豬肉出第二十一卷中卒消渴小便多太數方八首肘後卒消渴小便多方多作竹瀝飲之恣口數日瘥忌面炙肉通按恣口者謂多飲竹瀝非恣食也又方酒煎黃柏汁取性飲之通按性飲者若人性畏冷即少飲也又方熬胡麻令變色研淘取汁飲半合日可三四服不過五升即瘥又療日飲水一斛者方桑根白皮新掘入地三尺者佳炙令黃黑色切以水煮之無多少但令濃隨意飲之無多少亦可納少粟米勿與鹽集驗云宜熱飲之又小便卒太數復非淋一日數十過令人瘦方未中水豬脂如雞子一枚炙承取肥汁盡服之不過三劑瘥又方羊肺一具作羹納少肉和鹽豉如食法任意進之不過三具瘥千金同又方豉一升納於鹽中綿裹之以白礬好者半斤置綿上令蒸之三斗米許時即下白礬得消入豉中出曝乾搗末服方寸匕又小便數豬肚黃連丸方豬肚一枚洗去脂膜黃連末三斤納豬肚中蒸之一石米熟即出之曝乾搗丸如梧子服三十丸日再服漸漸加之以瘥為度忌豬肉出第二卷中近效祠部李郎中消渴方一首論曰消渴者原其發動此則腎虛所致每發即小便至甜醫者多不知其疾所以古方論亦闕而不言今略陳其要按洪範稼穡作甘以物理推之淋餳醋酒作脯法須臾即皆能甜也足明人食之後滋味皆甜流在膀胱若腰腎氣盛則上蒸精氣氣則下入骨髓其次以為脂膏其次為血肉也其餘別為小便故小便色黃血之餘也騷氣者五臟之氣咸潤者則下味也腰腎既虛冷則不能蒸於上穀氣則盡下為小便者也故甘味不變其色清冷則肌膚枯槁也猶如乳母穀氣上泄皆為乳汁消渴疾者下泄為小便此皆精氣不實於內則便羸瘦也又肺為五臟之華蓋若下有暖氣蒸即肺潤若下冷極即陽氣不能升故肺干則熱故周易有否卦乾上坤下陽阻陰而不降陰無陽而不升上下不交故成否也譬如釜中有水以火暖之其釜若以板蓋之則暖氣上騰故板能潤也若無火力水氣則不上此板終不可得潤也火力者則為腰腎強盛也常須暖將息其水氣即為食氣食氣若得暖氣即潤上而易消下亦免乾渴也是故張仲景云宜服此八味腎氣丸並不食冷物及飲冷水今亦不復渴比頻得效故録正方於後耳凡此疾與腳氣雖同為腎虛所致其腳氣始發於二三月盛於五六月衰於七八月凡消渴始發於七八月盛於十一月十二月衰於二月三月其故何也夫腳氣者擁疾也消渴者宣疾也春夏陽氣上故擁疾發即宣疾愈也秋冬陽氣下故宣疾發即擁疾愈也審此二者疾可理也又宜食者每間五六日空腹一食餅以精羊肉及黃雌雞為臛此可溫也若取下氣不食肉菜食者宜煮牛膝韭蔓荊又宜食雞子馬肉此物微擁亦可療宣疾也擁之過度便髮腳氣猶如善為政者寬以濟猛猛以濟寬隨事制度使寬猛得所定之於心口不能言也又庸醫或令吃栝蔞粉往往經服之都無一效又每至椹熟之時取爛美者水淘去浮者餐之下候心胸間氣為度此亦甚佳生牛乳暖如人體渴即細細呻之亦佳張仲景云足太陽者是膀胱之經也膀胱者是腎之腑也而小便數此為氣盛氣盛則消穀大便硬衰則為消渴也男子消渴飲一斗水小便亦得一斗宜八味腎氣丸主之神方消渴人宜常服之乾地黃八兩薯蕷四兩茯苓三兩山茱萸五兩澤瀉四兩牡丹皮三兩附子三兩炮桂心三兩右藥搗篩蜜和丸如梧子大酒下十丸少少加以知為度忌豬肉冷水蕪荑胡荽酢物生蔥範汪小品深師古今録驗必效文仲方等並同先服八味腎氣丸訖後服此藥壓之方黃連二十分苦參粉十分乾地黃十分知母七分牡蠣八分麥門冬十二分去心栝蔞七分一方無餘並同上七味搗篩牛乳和為丸如梧子大並手作丸曝乾油袋盛用漿水或牛乳下日再服二十丸一方服十五丸患重者渴瘥後更服一年以來此病特慎獐鹿肉須慎酒炙肉咸物吃索餅五日一頓細切精羊肉勿著脂飽食吃羊肉須著桑根白皮食一方云瘥後須服此丸一載以上即永絶根源此病特忌房室熱面並干脯一切熱肉粳米飯李子等若覺熱渴加至二十五丸亦得定後還依前減其方神效無比余並准前方忌豬肉蕪荑將息禁忌論一首夫人雖嘗服餌而不知養性之術亦難以長生養性之道不欲飽食便臥亦不宜終日久坐皆損壽也人欲小勞但莫久勞疲極也亦不可強所不能堪耳人不得每夜食食畢即須行步令稍暢而坐臥若食氣未消而傷風或醉臥當成積聚百疾或多霍亂令人暴吐又食欲得少而數不欲頓而多多即難消也能善養性者皆先候腹空積飢乃食先渴後飢不欲觸熱而飲飲酒傷多即速吐之為佳亦不可當風臥及得扇之皆令人病也才不逮而思之傷也悲哀憔悴傷也力所不勝而舉之傷也凡人冬不欲極溫夏不欲窮涼亦不欲霧露星月下臥大寒大熱大風皆不用觸胃之五味入口不欲偏多偏多則損人腑臟故曰酸多即傷脾苦多即傷肺辛多即傷肝咸多即傷心甘多即傷腎此是五行自然之理又傷初即不覺久乃損壽耳夫吃生肉鱠必須日午前即良二味之中其膾尤腥而冷也午後陰陽交錯人腹中亦順天時不成症積亦能霍亂矣夫人至酉戌時後不要吃飯若冬月夜長性熱者須少食仍須溫軟吃訖須搖動令食消散即不能成腳氣凡沖熱有汗不用洗手面及漱口令人五臟乾枯少津液又冬夏月不用枕冷物石鐵尤損人木枕亦損人縱不損人及少年之時即眼暗也通按此條雖附消渴後不單言消渴也凡病與不病人俱宜遵之後魚肉菜米豆等仿此敘魚肉等一十五件羊肉甚補虛患風及腳氣不用吃偶食即生薑和煮又豬肉兔肉鶉肉牛肉驢馬肉大鯉鮎魚河肫等並禁不可食之鹿肉微冷少吃獐肉溫不可炙吃令人消渴久吃炙肉令人血不行野雞春月以後不堪吃鯽魚長六七寸以上並益人仍不要生吃生干脯不可吃不消化為蟲敘菜等二十二件凡冬瓜食之下氣唯腳氣相宜令人寒中不可多吃能下積年藥力甚損人久服令人虛壞筋骨萵苣令人寒中久食節骨頭生冷水令人髮鬢白蘭香胡荽蕓薹三物不益人也甘菊枸杞菜發丹石少吃即溫多即冷紫蘇薄荷荏葉水蘇溫中益人首蓿白蒿牛蒡地黃苗甚益人長吃首蓿雖微冷益人堪久服凡菜皆取熟吃不可生吃損人薤雖葷不同五辛溫中補筋骨可食蔥調諸候但少吃無妨多食令人虛冷韭從二月以後青稍長煮吃甚補至四月上旬止不可食從七月二十日後即漸堪吃至九月後冷兼有土氣蘿蔔消食下痰澼甚宜人生熟吃俱善斜蒿不甚益人亦無損蔓荊作齏令黃堪吃芥發熱動風傷筋骨蒜傷血損藥不可食葵性滑夏不堪食冬曝乾熟時煮用蘿蔔作齏下之利大小腸醋咸並傷筋骨尤須節之不可縱性敘米豆等九件茶酒附之通按少吃任意猶云小任意吃也白米甚益人小豆緑豆白豆並動氣仍下津液少吃任意大豆甚下氣益人久服令人身重蕎麥不可食小麥面吃之令人動熱不可頻餐之大麥面甚益人性小冷發癖氣粳米性寒南中溫濕茶不可多吃熱溫煮桑代之酒有熱毒漬地黃丹參大豆即得飲之以上遂是祠部方法亦一家祕寶也
