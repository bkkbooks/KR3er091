body:
  text: 卷第二十三癭病方一十八首病源癭者由憂恚氣結所生亦由飲沙水沙隨氣入於脈搏頸下而成之初作與癭核相似而當頸下也皮寬不急垂捶捶然是也恚氣結成癭者但垂核捶捶然無脈也飲沙水成癭者有核㿔㿔然無根浮動在皮中又云有三種癭有血癭可破之息肉癭可割之有氣癭可具針之養生方云諸山水黑土中出泉流者不可久居常食令人作癭病動氣增患出第三十一卷中肘後療頸下卒結囊漸大欲成癭海藻酒方海藻一斤去咸清酒二升上二味以絹袋盛海藻酒漬春夏二日一服二合稍稍含咽之日三酒盡更以酒二升漬飲之如前滓曝乾末服方寸匕日三盡更作三劑佳崔氏文仲同又方昆布海藻等分末之蜜丸含如杏核大含稍稍咽汁日四五並出中卷深師療癭方桂心昆布洗海藻洗甘草炙白麵熬錢三分龍膽草海蛤研土瓜根半夏洗吳茱萸牡蠣熬各一兩上十一味為散酢漿水服五分匕先食日三十日知盡藥愈節食鹽羊肉餳生蔥菘菜又方海藻二分洗龍膽草二分昆布二分洗土瓜根二分半夏二分洗小麥面二分炒上六味為散先食酒服方寸匕日三二十日知三十日愈忌羊肉餳並出第二十九卷中小品癭病者始作與癭核相似其癭病喜當頸下當中央不偏兩邊也乃不急膇然則是癭也中國人息氣結癭者但垂膇膇無核也長安及襄陽蠻人其飲沙水喜癭有核瘰瘰耳無根浮動在皮中其地婦人患之腎氣實沙石性合於腎則令腎實故病癭也北方婦人飲沙水者産乳其於難非針不出是以比家有不救者良由此也療癭方小麥一升醇苦酒一升漬小麥令釋漉出曝燥復漬使苦酒盡曝麥燥搗篩以海藻三兩別搗以和麥末令調酒服方寸匕日三禁鹽生魚生菜豬肉肘後崔氏備急云療三十年癭疾集驗文仲範汪等同出第十卷中肘後用海藻五兩集驗療癭酒方是水雨經露出柳根三十斤上以水一斛煮得五斗同米三斗釀之酒成先食服一升日三範汪同出第四卷中崔氏海藻散療癭方海藻八兩洗去咸汁貝母二兩土瓜根二分小麥曲二分炒上四味作散酒服方寸匕日三又方秫米三升依酒法炊上一味取圓葉白楊皮十兩去上蒼者慎勿令見風細切以水五升煮取二升濃汁漬曲末五兩用前件秫米依酒法酘之熟訖封塞一七日然後空腹服一大盞日再服三日內即效神驗無比並出第四卷中張文仲隱居效驗療癭方昆布洗松蘿各三分海藻五分上三味搗蜜丸如杏核大含咽津日三夜二大佳備急肘後同又療癭司農揚丞服效第一方昆布六分洗海藻七分松蘿乾薑桂心各四分通草五分上六味搗篩蜜丸如梧子一服吞七丸即住在頸下癭處欲至食時即先飲少酒下卻丸子後進食禁酢蒜鹽酪臭肉倉米等若癭大者加藥令多取瘥又第二方昆布洗海藻洗各一斤上二味細切好酒五升浸七日量力取數服酒盡以酒更浸兩遍藥力盡當以此酒下前丸藥益善備急肘後同又方小麥三升右以三年米酢三升漬麥曝乾干更浸使酢盡又曝乾搗篩為散別搗昆布為散每服取麥散二匕昆布散一匕旦飽食訖清酒和服之若不能飲酒者以水和服亦得服盡即瘥多服彌善無所禁但不用舉重及悲啼煩惱等事肘後備急集驗同又含丸方檳榔三兩馬尾海藻三兩洗昆布三兩洗上三味末之蜜丸如雞子黃大每日空腹含一丸徐徐令津液取汁咽之忌鹽並楊丞方服驗肘後備急同並出第六卷中救急療癭要切方鼠黏草根一升湯洗右細切除皮者一升一物以水三升煮取一升半分溫三服服相去如人行四五里一服宜頓服六劑病即瘥一方削除皮細切取三大升搗篩為散蜜和丸如梧子一服二十丸日再服之稍稍加至三十丸以無灰酒進之出第五卷中古今録驗療氣癭方晉州熙公奏徐公方問荊一兩出海島羯羊靨五具去脂炙白蘞椒目甘草炙各一分小麥曲末二兩熬上六味搗篩為散羊靨一種別搗為末相和好漿浸更搗作丸如小棗大一服五丸無禁又方羊靨一百枚暖湯浸去脂炙大棗二十枚去皮作丸服忌慎如常藥法又方取羊靨一具去脂含汁汁盡去皮日一具七日含便瘥又療癭海藻散方海藻十分洗昆布一兩洗海蛤一兩研通草一兩菘蘿洗乾薑桂心各二兩上七味下篩酒服一錢匕日三出第四十一卷中肘後無干薑有白蘞氣癭方一十首廣濟療氣癭氣胸膈滿塞咽喉項頸漸粗昆布丸方昆布二兩洗去咸汁通草一兩羊靨二具炙海蛤一兩研馬尾海藻一兩洗去咸汁上五味蜜丸如彈子細細含咽汁忌生菜熱面炙肉蒜筍又療冷氣築咽喉噎塞兼癭氣昆布丸方昆布八分洗乾薑六分犀角六分屑吳茱萸四分人參八分馬尾海藻四分洗葶藶子六分熬杏仁八分去皮尖熬上八味搗篩蜜丸如梧子空腹以飲服忌生冷黏食陳臭等余忌同前又療氣妨塞方昆布三兩洗菘蘿通草柳根鬚各三兩近水生者上四味搗篩蜜丸如彈丸大以海藻湯浸細細含之咽盡勿停忌舉重生嗔憂悲等又療癭細氣方昆布十二分洗馬尾海藻十分洗杏仁八分通草麥門冬去心連翹各六分乾薑橘皮各六分茯苓八分松蘿三兩上十味搗末以袋盛含之乃以齒微微嚼藥袋子汁出入咽中日夜勿停有問荊加四分佳忌嗔及勞油膩黏食並出第二卷中深師蘇子膏療氣癭方臘月豬脂一升蘇子桂心大黃當歸乾薑橘皮蜀椒汗各三分上八味切以水六升煮取二升去滓納豬脂消盡服瘥忌生蔥出第二十九卷中崔氏云凡水癭氣癭可瘥石癭不可治療氣癭方平旦手挽癭令離項掐其下根脈斷愈一日一度掐易愈者七日如難瘥者三七日愈又方昆布二兩洗海藻二兩洗龍膽草一兩馬刀半兩炙海蛤半兩研大黃一分熏黃半兩上七味搗蜜丸如梧子大破除日以綿裹一丸含咽津朝暮空腹服忌五辛豬肉又方海藻二兩洗上一味以淳酒四升漬二宿漉去滓細細暖含咽之盡即更造取差為度範汪同並出第四卷中必效主氣癭方白頭翁半兩昆布十分洗海藻七分洗通草七分玄參連翹各八分桂心三分白蘞六分上八味搗篩蜜丸如梧子五丸若冷用酒服禁蒜面豬魚生蔥出第五卷中古今録驗療癭有在咽喉初起遊氣去來陰陽氣相搏遂停住喉中前不去腫起如斛羅諸療不瘥小麥湯方小麥三升昆布二兩洗去咸厚朴炙一兩橘皮附子炮海藻洗各二兩生薑五兩半夏洗五兩白前三兩杏仁一百枚去尖皮上十味切以水一斗煮取三升半分五服相去一炊頃忌豬肉餳羊肉冷水出第四十一卷中五癭方八首深師五癭丸方取塵靨以酒漬炙乾再納酒中更浸炙令香咽汁味盡更易十具愈千金翼同出第二十九卷中範汪療五癭方昆布三兩洗海蛤二兩研松蘿二兩海藻三兩洗通草白蘞桂心各二兩上七味作散酒服方寸匕日三千金翼同出第四十二卷中千金療石癭勞癭泥癭憂癭氣癭方海藻洗龍膽草海蛤研通草昆布洗礜石燒松蘿各三分小麥曲四分熬半夏洗二分上九味作散酒服方寸匕日三禁食魚豬肉五辛生菜羊肉餳十日知二十日愈又方菖蒲二兩海蛤研一兩白蘞一兩海藻洗一兩松蘿一兩桂心一兩椒汗一兩羊靨百枚半夏一兩洗續斷一兩神麯三兩到桂草一兩上十二味搗作散以羊牛髓和為丸如梧子日服三丸忌羊肉生蔥等翼同又方小麥面一升特生礜石一斤燒海藻一斤洗上三味以陳酢一升漬小麥面曝乾更漬令酢盡干各搗下篩每服兩方寸匕日四五服含乃咽之忌同前及大誦大語吹火用氣翼深師用小麥面一斗余同並出第二十五卷中千金翼五癭方海藻一兩洗昆布洗半夏洗細辛土瓜根松蘿各一兩白蘞龍膽草各二兩海蛤二兩通草二兩上十味作散酒服方寸匕日再忌羊肉余忌同前又方昆布二兩洗上一味切如大指酢漬含咽汁盡愈又方海藻一斤小麥面一斤上二味以陳酢一升溲麵曝令乾復漬令酢盡作散酒服方寸匕日三忌怒出第十一卷中灸癭法一十三首千金灸諸癭法灸肩髃左右相宛宛中男左十八壯上十七壯女上十八壯左十七壯再三以瘥止又法灸風池百壯風池夾項兩邊兩穴兩耳上髮際中通按此條千金聖濟作灸風池百壯又灸兩耳後髮際百壯乃是兩條然明堂無髮際穴又法灸大椎百壯兩邊相去各一寸半小下垂各三十壯又法灸頸沖頸沖在伸兩手直向前令臂著頭對鼻所住處灸之各隨年壯凡灸五處九穴翼深師並同通按頸沖即臂臑穴在肘上七寸其灸五處九穴即風池髮際大椎大杼頸沖五處共九穴也又癭上氣並短氣方灸肺俞一百壯又癭上氣胸滿法灸雲門五十壯又癭惡氣方灸胸堂百壯又癭惡氣法灸天府十五壯又癭勞氣法灸衝陽隨年壯在肘外屈橫文頭是據此是曲池穴衝陽在足跌上五寸又療癭法灸天瞿三百壯橫三間寸灸之又癭氣面腫法灸通天五十壯在耳上二寸又灸癭法灸中封隨年壯在兩足跌上曲尺宛宛中並出第二十五卷中又灸癭法灸耳後髮際有一陰骨骨間有一小穴亦有動脈準前灸大效以上穴所在具三十九卷明堂中出第六卷中瘤方三首肘後云皮肉中忽腫起初如梅李漸長大不癢不痛又不堅強按之柔軟此血瘤也不療乃至如盤大則不可復消而非殺人病爾亦慎不可破方乃有大療今如覺但依癭家療療若不消更引別大方出中卷深師療瘤脂細瘤方吳茱萸一分礬石燒芎藭當歸大黃黃連芍藥白蘞黃芩各二分上九味合搗下篩和雞子塗著細故熟布上隨瘤大小薄厚貼之燥輒易之著藥當熟作膿脂細細從孔中出探知膿血盡著生膏若膿不盡復起故也生肉膏方如下又生肉膏療癰瘤潰漏及金瘡百瘡悉療之方真當歸附子炮甘草白芷芎藭各一兩薤白一兩生地黃三兩上七味㕮咀以豬膏三升半合微火煎白芷地黃去滓稍以敷瘡上日三良千金並同出第二十九卷中千金云凡肉瘤勿療療則殺人慎之慎之出第二十五卷中千金翼療瘤病方獐鹿二種肉割如厚脯火炙令熱拓掩可四炙四易痛膿便愈不除更炙新肉用之良出第二十四卷中白瘤及二三十年瘤方三首千金翼白瘤方先極搔刮以繩縛之即愈又取東向木空中水熱刮瘤上洗之日三即愈又方白礬硫黃等分上二味末以酢和封上並出第二十四卷中千金陷腫散主二三十年瘤癭及骨瘤石瘤肉瘤膿瘤血瘤或大如杯盂升斗十年不瘥致有漏潰令人骨消肉盡或堅或耎或漬令人驚惕寐寤不安體中掣縮愈而復發療之方千金翼云陷麥散烏賊魚骨一分白石英二分石硫黃一分紫石英二分鍾乳三分研乾薑一兩丹參三分琥珀一兩研大黃一兩附子一兩炮胡燕屎一兩上十一味為散貯以韋囊勿令泄氣若瘡濕即敷之若瘡干無汁者以豬膏和敷日三四以干為度若汁不盡者至五劑十劑止勿措意不作也著藥令人不疼痛若不消加芒硝二兩益佳忌豬肉出第二十五卷中翼無燕屎喉痹方二十一首病源喉痹者喉里腫塞痹痛水漿不得入也人陰陽之氣出於肺循喉嚨而上下也風毒客於喉間氣結蘊積而生熱故喉腫塞而痹痛脈沉者為陰浮者為陽若右手關上脈陰陽俱實者是喉痹之候也亦令人壯熱而惡寒七八日不治則死其湯尉針石別有正方補養宣導今附於後養生方導引法云兩手拓兩頰手不動摟肘使急腰內亦然住定放兩肋頭向外附膊腰氣散盡勢大悶始起來去七通去喉痹出第三十卷中廣濟療喉痹急疼悶妨不通方馬蘭根切一升升麻三兩瞿麥二兩射干十兩犀角二兩屑通草二兩玄參三兩上七味切以水八升煮取二升去滓細細含咽一日令盡得破膿慎熱面炙肉蒜又療喉痹方馬藺子八分牛蒡子六分上二味搗為散每空腹以暖水服方寸匕漸加至一匕半日再並出第二卷中肘後療喉痹者喉里腫塞痹痛水漿不下入七八日即殺人療之方巴豆一枚開其口上一味以綿裹極堅令有繩出外以巴豆納鼻中隨腫左右時時吸氣半日許即瘥無巴豆用杏仁以塞耳如之文仲範汪同又方熬杏仁熟搗蜜丸如彈子含咽其汁亦可搗杏仁末帛裹含之小品文仲備急範汪同又方礬石一兩水三升漬洗手足又方生地黃汁二升蜜二升合微火煎之取二升稍稍含之又方射干當歸各三兩上二味切以水三升煮取一升稍稍含之吐去更含又方剝葫塞耳鼻孔日再易之有效又方菖蒲根嚼燒稱錘令赤納一杯酒中沸止飲之文仲備急同又療喉痹方射干一片含咽汁又方升麻斷含之喉塞亦然又方桔梗三兩上一味切以水三升煮取一升頓服之忌豬肉又方取芥子搗碎以水及蜜和滓敷喉下燥輒易又敷用神效方桔梗甘草炙各一兩上二味切以水一升煮取服即消有膿即出忌豬肉海藻菘菜備急同又療垂死者方搗馬藺根一握少以水絞取汁稍稍咽之口噤以物拗灌之神良古今録驗雞子湯療喉痹方半夏末方寸匕上一味開雞子頭去中黃白盛淳苦酒令小滿納半夏末著中攪令和雞子著刀子鐶令穩炭上令沸藥成置杯中及暖稍咽之但腫即減忌羊肉餳肘後文仲同此與仲景苦酒湯同半夏不可作末剖之可也又療喉痹塞射干丸方射干二兩豉三合芎藭杏仁去尖皮各一兩犀角一兩屑升麻二兩甘草一兩炙上七味搗下篩蜜和丸含之稍稍咽津日五六忌海藻菘菜又射干湯療喉痹閉不通利而痛不得飲食者若閉喉並諸疾方當歸二兩升麻一兩白芷三兩射干甘草炙犀角屑杏仁去尖皮各一兩上七味切以水八升煮取一升半分服神良忌海藻菘菜出第二十九卷中近效療喉痹方大附子一個刮去皮作四片上一味以蜜塗火上炙稍熱即含咽汁甜盡又取一片準前含如已作頭即膿出如未作頭立消神驗忌豬肉冷水又方朴硝一兩細細含咽汁一食頃瘥又若腫全盛語聲不出者方大附子一枚炮裂削去皮切如豆上一味含一塊咽汁半食間即瘥烏頭亦得忌豬肉冷水咽喉中閉塞方三首廣濟療咽喉中塞鼻中瘡出及乾嘔頭痛食不下方升麻通草黃柏玄參各八分麥門冬十分去心竹茹前胡各六分芒硝十分上八味切以水八升煮取二升五合去滓納硝溫分三服服別如人食頃自利去硝又方生雞子一顆開頭取白去黃著米酢拌煻火燠沸起擎下沸定更三度成就熱飲酢盡不過一二即瘥並出第二卷中近效療喉痹喉咽塞喘息不通須臾欲絶神驗方馬藺根葉二兩上一味切以水一大升半煮取一大盞去滓細細吃須臾即通絡石草亦療煎法分兩亦同喉舌生瘡爛方八首肘後療喉口中及舌生瘡爛方含好淳苦酒即愈文仲備急同又方一酒漬蘘荷根半日含漱其汁又方杏仁二十枚甘草一寸黃連一分上三味末綿裹含之千金同又方礬石二兩燒去汗黃連一分末上二味同研納口中令布瘡上又方黃連一兩上一味切以水三升煮取一升稍稍含冷吐忌豬肉冷水張文仲療口中及舌生瘡爛方取牛膝根酒漬含漱之無酒者但亦取含之肘後同又方銼黃柏含之肘後同並出第七卷中備急療喉中及舌生瘡爛方銼薔薇根濃煮汁含漱之冬用根夏用枝葉文仲肘後同出第四卷中咽喉生瘡方四首廣濟療咽中生瘡吐血不下食方方怡云口此方余用已驗但不大便者先看輕重消息下之後用此方生地黃五兩青竹茹玄參雞蘇各二兩茯苓升麻麥門冬去心各三兩上七味切以水八升煮取二升五合去滓分溫三服服相去如人行七八里不能多服含細細咽亦得忌生冷熱面炙肉油酢出第五卷中千金療口中塞及咽喉不利生瘡口燥膏方豬膏一斤白蜜一斤黃連一兩上三味合煎去滓攪令相得含如半棗日四五度又療熱病口爛咽喉生瘡水漿不得入膏方當歸射干升麻各一兩附子半兩炮二白蜜四兩上五味切以豬膏四兩先煎之成膏下著地勿令大熱納諸藥微火煎附子色黃藥成絞去滓納蜜復上微火煎令相得盛器中令凝取如杏子大含之日四五度稍稍咽之並出第六卷中古今録驗升麻湯療咽喉生瘡方甘草一兩炙升麻石膏碎牡丹皮各一兩上四味切以水七升煮取三升一服七合日三忌海藻菘菜出第二十九卷中咽喉腫方五首肘後咽喉卒癰腫食飲不過方用薤一把搗敷腫上冷復易之用苦酒和亦佳範汪同又方吞薏苡仁子二枚延年療喉中熱腫方鼠黏根切一升上一味以水五升煮取三升去滓分溫三四服忌蒜面出第十九卷中古今録驗羚羊角豉湯療喉痛腫結毒氣衝心胸方豉一升半犀角一兩屑羚羊角屑一兩芍藥三兩升麻四兩杏仁一兩去尖皮梔子七枚甘草炙一兩上八味切以水七升煮取一升半去滓分三服忌海藻菘菜又五香湯療諸惡氣喉腫結核方沉香二兩薰陸香一兩麝香二分研湯成下青木香二兩雞舌香二兩上五味以水五升煮取一升半去滓分三服並出第二十九卷中喉卒塞痛及卒毒攻痛方三首範汪療卒喉中塞痛不得飲食方取敗筆一枚燒屑以漿飲服一方寸匕良驗出第十五卷中文仲療喉中卒毒攻痛方章陸根切炙令熱隔布尉之冷轉易立愈姚云苦酒熱熬敷喉亦療喉痹肘後小品同又方搗艾敷之並出第七卷中懸癰腫方三首肘後療懸癰腫卒長數寸如指隨喉出入不得食方開口捧頭以箸抑舌及燒小鐵於管中灼之令破灼火畢以鹽隨烙處塗之又方搗鹽綿纏箸頭點鹽敷以揩之日六七度文仲備急同千金療懸癰垂暴腫長方乾薑半夏等分洗上二味末之以少少著舌本翼同出第六卷中咽喉雜療方四首範汪療咽喉不利下氣丸方射干附子炮人參杏仁各一分上四味合搗下篩蜜丸如梧子含一丸咽汁日三夜一忌豬肉冷水千金同又療口中咽喉不利當歸含丸方當歸末二兩杏仁一兩上二味搗合下篩以蜜和為丸如梧子二丸含漸漸咽汁日三夜再又療咽喉中痛不利丸方升麻甘草炙鬼臼射干丹砂各一兩雄黃一兩杏仁一十枚麝香半兩上八味搗下篩和以蜜丸如梧子飲服一丸日三漸加之酒下亦得咽痛失聲不利用良忌海藻菘菜千金同出第五十卷中崔氏療口咽咽內瘡痛欲失聲方桂心二兩杏仁熬二兩黃荑一兩上三味搗末合和綿裹含如杏仁許咽汁消盡更含日三夜二忌膩食出第四卷中寒熱瘰癧方一十一首病源此由風邪毒氣客於肌肉隨虛處而停結為瘰癧或如梅李等大小兩三相連在皮間而時發寒熱是也久則變膿潰成瘻也其湯尉針石別有正方補養宣導今附於後養生方導引法云踑踞以兩手從腳入據地曲腳加其上舉尻其可用行氣愈瘰癧乳癰出第三十四卷中甲乙針經寒熱瘰癧論黃帝問曰寒熱瘰癧在於頸腋者皆何氣所生岐伯對曰此皆鼠瘻寒熱之氣也稽留於脈而不去者鼠瘻之本皆在於臟其末上出於頸腋之間其浮於脈中未著於肌肉而外為膿血者去易問曰去之奈何對曰請從其末引其本可使衰去而絶其寒熱審安其道以豫之徐往徐來以去之其小如麥者一刺知三刺而已決其生死法反其人目視之其中有赤脈從上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死此赤脈不下貫瞳子者可療千金同出第八卷中廣濟療瘰癧丸方鸛骨貍骨並炙射干玄參升麻炙青木香沉香犀角屑丁香羚羊角屑丹參甘草炙各四分人參沙參各三兩獺肝六分連翹六分光明砂二分研上十七味搗篩蜜丸以飲服十五丸日二服漸加至三十丸空腹服之忌生冷油膩血食並酢熱肉海藻菘菜黏食陳臭生血物等又療瘰癧方連翹射干玄參芍藥青木香芒硝升麻梔子仁劈前胡當歸甘草炙大黃各二兩上十二味切以水一斗煮取三升分三服服別相去如人行六七里快利忌同前方並出第五卷中劉涓子療寒熱瘰癧散方貍骨五兩炙烏頭七分炮黃連六分上三味搗下篩先食以酒服一錢匕日三良忌豬肉冷水範汪同出第十卷中千金療瘰癧方白殭蠶為散以水服五分匕日三十日瘥深師救急同又方於患人背兩邊腋下後文上隨年壯灸之又方灸耳後髮際七壯又方槲白皮二斤上一味細切以水七升煮取三升去滓真珠砂方寸匕和汁一升旦向日服之強行須臾吐鼠出三朝服良又方貍頭一枚炙搗下篩且白飲服方寸匕日再服之又方狼糞灰封上良又療寒熱瘰癧散方連翹土瓜根龍膽草苦參黃連栝蔞芍藥常山皮各兩貍頭骨一枚炙上九味搗下篩酒服五分匕日三忌豬肉冷水翼集驗古今録驗同一方云無貍頭骨加之名貍頭散余同並出第二十四卷中救急療瘰癧方馬齒莧陰乾燒灰臘月豬膏和之以暖泔清洗瘡拭乾敷之日三出第三卷中瘰癧結核方四首廣濟療瘰癧息肉結硬薄方白蘞甘草炙青木香芍藥大黃各三兩玄參三兩上六味搗為散少減以少酢和如稀糊塗故布貼上干易之勿停忌豬肉五辛熱肉飲酒熱面等又瘰癧結核令消散方黃耆七分玄參八分連翹人參升麻青木香茯苓蒼耳子甘草炙朴硝桂心各四分枳實炙去瓤大黃羚羊角屑麥門冬去心各五分鼠黏子苦參各九分上十七味搗蜜丸如梧子以酒下十丸日三夜四漸加至二三十丸以知為度忌同前方並出第五卷中肘後療頸下生瘡瘰癧如梅李宜使消之方海藻一斤洗上一味以酒三升漬數日稍稍飲之文仲備急等同又方人參甘草炙乾薑白蘞各四分上四味搗篩酒服方寸匕日三忌同劉涓子文仲備急同出第六卷中惡核瘰癧方四首文仲五香連翹湯療惡肉惡脈惡核瘰癧風結腫氣痛方青木香沉香雞舌香各二兩麝香半兩薰陸香一兩射干紫葛升麻桑寄生獨活通草連翹各二兩大黃三兩淡竹瀝二升上十四味切以水九升煮取減半內竹瀝更煮取三升分三服忌五辛千金方無紫葛雞舌香有丁香古今録驗同出第五卷中延年丹參湯療惡肉核瘰癧諸風氣結聚腫氣諸病並主之方蒴藋丹參各二兩甘草炙秦艽獨活烏頭炮牛膝各一兩躑躅花蜀椒各半兩汗上九味切以水八升煮取三升溫服一升忌海藻菘菜豬肉冷水古今録驗有白及余並同又玄參湯主惡核瘰癧風結方玄參升麻獨活連翹各二兩木防己菊花各一兩上六味切以水八升煮取三升分服一升日三文仲同又丹參膏主惡肉結核瘰癧脈腫氣痛方丹參八分白蘞獨活連翹白及各四分升麻蒴藋各六分防己玄參杏仁各五分去皮尖上十味細切以生地黃汁淹漬一宿以煉成豬膏四升微火煎五上五下藥成絞去滓以摩病處日三四癰腫瘰癧核不消方五首經效犀角丸療瘰癧方犀角四分升麻三分大黃六分牛蒡子八分烏蛇十分炙去頭尾玄參八分上六味末之蜜和丸如梧子大每日至午後煎牛蒡湯下三十五丸又方龍骨八分牡蠣八分熬上二味末之酒下三錢匕日三度良又大黃膏方大黃六分附子四分炮細辛三分連翹四分巴豆一分上五味以苦酒浸一宿以臘月豬膏煎三上三下去滓以綿濾之用敷之日三五度塗之良集驗療寒熱瘰癧散方連翹六分土瓜根四分龍膽草五分黃連四分苦參六分栝蔞四分芍藥五分上七味為散食後溫酒下五分匕日三又方鯪鯉甲二十一枚燒搗末敷瘡上效千金同鼠瘻及瘰癧方一十一首文仲療瘰癧方苦參四大兩搗末生牛膝和丸如梧子食後暖水下十丸日三服又方昆布四分海藻四分上二味各洗去咸搗末蜜和丸如杏核許大含之日三度良瘥救急療鼠瘻久不瘥方取狼鼠不限多少常作羹粥任吃之必驗千金經效同範汪療鼠瘻瘰癧方取臘月豬膏正月鼠頭燒令作灰以膏和敷之愈若不差者瘰癧右灸右肩頭三指度以下指灸炷皆如雞子大良若不能堪者可如中黃亦可已試有良驗又療頸鼠瘻纍纍者方貝母乾薑藁本桂心蜀椒各一分汗上五味搗下篩先食吳茱萸一分以酒服一撮忌生蔥又療鼠瘻瘰癧身熱方豬椒二十斤上一味以水淹足煎熟去滓置瓶中覆瓶口以瘡當上熏候熱極乃止痛膿血鼠當從瘡出便愈又寒熱鼠瘻瘰癧散方貍骨炙龍骨各五分躑躅熬半兩鼠黏子當歸王不留行土瓜根各一兩上七味搗合篩先食酒服方寸匕日再夜一並出第四十二卷中集驗療鼠瘻及瘰癧膏方白馬牛羊豬雞等屎屑各一斤漏蘆藁本各一斤上七味並於石上燒作灰研絹篩之以豬脂一升三合煎亂髮一兩半令沸發盡乃納諸藥屑微火上煎五六沸藥成先去瘡上痂以鹽湯洗新綿拭瘡令燥然後敷膏若無痂猶須湯洗日再若著膏當以帛覆無令風冷神驗瘰癧以膏敷上亦日再古今録驗範汪同又療寒熱瘰癧散方白曾青半兩當歸防風栝蔞根芎藭黃耆貍骨炙甘草炙各二兩細辛乾薑露蜂房各一兩炙礜石燒半日大附子炮荏子各半兩斑蝥去首足羽熬芫青去首足羽各五枚熬上十六味搗下篩為散以酒服一錢匕日再忌豬肉冷水海藻菘菜古今録驗範汪同並出第八卷中又療鼠瘻方蛇腹中鼠蝦蟆燒末酒服方寸匕甚效又方以槲葉搗末敷腫上熱炒鹽尉之即消良效並出第五卷中毒腫瘰癧方四首崔氏大五香湯療毒氣苦肌肉中腫痛結脈寒熱如瘰癧痛不可近急者數日殺人苦心煩悶便當急速與湯並以滓敷腫脈上方青木香雞舌香沉香升麻各五分藿香犀角屑吳茱萸桂心麻黃甘草炙各三分薰陸香四分細辛二分上十二味㕮咀以水七升煮取二升分三服不瘥復合若嗇嗇惡寒加附子中形者一枚炮令坼八破用忌生冷菘菜海藻豬肉冷水生菜五辛古今録驗同又五香湯療毒腫瘰癧方麝香研青木香雞舌香藿香薰陸香當歸黃芩升麻芒硝各三分大黃五分上十味㕮咀以水六升煮取二升去滓納硝分二服相去如人行七八里再服諸卒尸注惡氣亦療出第五卷中經心録射干湯療惡毒身強痛瘰癧方射干桂心各二兩麻黃去節生薑甘草炙各四兩杏仁四十個去皮尖上六味切以水四升煮取三升去滓分三服忌同前出第五卷中又升麻湯療風毒咽水不下及療癧腫方升麻芍藥各四兩射干三兩杏仁去尖皮三兩麻黃去節二兩甘草炙二兩楓香葛根各三兩上八味切以水八升煮取半分三服忌同前出第三卷中灸瘰癧法六首千金灸瘰癧法兩腋中患癧處宛宛中百壯上又法搗生章陸根捻作餅子置漏上以艾炷灸餅子上干熟易之灸三四炷又法灸五里大迎各三十壯又法葶藶三合豉一升上二味合搗令極熟作餅如大錢厚二分許取一枚當瘡孔上作艾炷如小指大灸餅上三壯一日易三餅九炷隔三日一灸翼同古今録驗兼主瘻不可灸頭瘡葶藶氣入腦殺人劉涓子同又法一切瘰癧在項上及觸處但有肉結凝以作瘻瘡及癰節者以獨頭蒜截兩頭留心作孔大艾炷稱蒜大小貼癧子上灸之勿令上破肉但取熱而已七炷一易蒜日三易日日灸之取消止翼同又方七月七日日未出時取麻花五月五日取艾等分合搗作炷灸癧子一百壯並出第二十四卷中九瘻方三十一首廣濟療瘻有九種不過此方芫青四足海藻八分洗一昆布八分洗雄黃研八分貍骨炙三分牡蠣四分熬地膽二十枚熬青木香三分上八味搗篩為散酒服一錢匕日二服病從小便出如爛筋忌生冷黏食豬魚肉陳臭物出第五卷中劉涓子療鼠瘻方死蜣螂燒作灰上一味苦酒和塗之數過即愈先以鹽湯洗古今録驗千金同又方五月五日樓桃搗末先鹽湯洗拭之令乾以末敷瘡上樓桃未詳又方烏頭炮附子炮各二兩上二味㕮咀著五升淳苦酒中漬之待乾復納苦酒中燥復內以苦酒盡曝令乾搗末酒服方寸匕日三忌豬肉冷水等又張子仁療鼠瘻要方柞木皮五升上一味以水一斗煮熟去皮煎令汁得二升稍稍服盡當有宿肉出即愈備急文仲古今録同並出第六卷中肘後療苦鼻內肉外查瘤膿並出者是蜂瘻方取蜂房火炙焦末酒服方寸匕日一深師療鼠瘻方鰻鱺魚四兩野豬皮瞿麥一兩巴豆十五枚斑蝥二十枚去頭足羽熬五月五日蟾蜍一枚炙臘月豬脂五分上七味搗野豬皮下篩合諸藥更搗下篩納鰻鱺魚以膏和搗千杵平旦未食服如梧桐子二枚覺者寒熱不覺暮復投明日旦起更服三丸稍稍增之慎勿食熱食煩悶殺人蟲當從小便出以堪盛之尿便視乃有百數耳不可以見亦大便出此方驗忌豬肉蘆筍等又方馬齒礬石燒真珠粉上二味搗下篩為散厚塗瘡上不過三愈又方松脂硫黃狼毒各二兩豬腦一具白蘞二兩上五味熬豬腦取汁狼毒白蘞㕮咀以水三升煮取一升納腦汁中煎令得五合細末硫黃松脂下篩納中攪令相得綿裹內瘡中七日知一七日病除神良集驗凡有九種瘻一曰狼瘻始發於頸頭腫有根起於缺盆上轉連耳本種大此得之因憂恚氣上不得下其根在肺空青主之商陸為佐二曰鼠瘻始發於頸無頭尾如鼷鼠瘻核時上時下使人寒熱脫肉此得之由食大鼠餘毒不去其根在胃貍骨主之知母為佐三曰螻蛄瘻始發於頸項狀如螻蛄腫潰連生瘡其汁赤黃得之食瓜螻蛄餘毒及果實不去核其根在大腸荏子主之桔梗為佐四曰蜂瘻始發於頸瘰癧三四處俱腫起相連潰潰移此得之多飲流水水有蜂餘毒不去其根在脾雄黃主之黃芩為佐五曰蚍蜉瘻始發於頸初得之如傷寒此得之因飲食中有蚍蜉毒不去其根在腎礜石主之防風為佐六曰蠐螬瘻始發於頸上下無頭尾如棗核塊塊多在皮中使人寒熱心痛滿此因喜怒哭泣得之其根在心礬石主之白朮為佐七曰浮疽瘻始發於頸如兩指使人寒熱欲臥此得之因思慮憂憶其根在膽地膽主之甘草為佐八曰瘰癧瘻始發於頸有根初苦痛瘰癧覺之使人寒熱得之新沐頭濕結髮汗流入於頸所致其根在腎雌黃主之芍藥為佐九曰轉脈瘻始發於頸如大豆浮在脈中濯濯脈轉苦驚惕身如振寒熱始得之時驚臥失枕其根在小腸斑蝥主之白芷為佐療瘻九種方空青研煉之商陸根貍骨炙知母荏子桔梗雄黃黃芩礜石燒防風礬石燒汁盡地膽熬白朮甘草炙雌黃芍藥斑蝥去足羽熬白芷各二分上十八味搗其論病者特加其分餘種令分等細篩末空青最在後納之苦酒服一刀圭日三服三十日知五一日愈七十日平復病者百日禁食魚肉忌生菜桃李雀肉海藻菘菜犬肉生血物餘二大豆為一刀圭小兒服之半大人全服八歲以下寧從少起過度令人淋淋即減之出第九卷中千金問曰何謂九瘻答曰一曰狼瘻二曰鼠瘻三曰螻蛄瘻四曰蜂瘻五曰蚍蜉瘻六曰蠐螬瘻七曰浮沮瘻八曰瘰癧瘻九曰轉脈瘻謂之九瘻又療狼瘻發於頸頭腫有根起於缺盆上轉連延耳根腫大此得之因憂恚氣上不得下其根在肺空青主之商陸為佐方空青研二分蝟腦二分炕之獨活一分蝟肝一具干之芎藭半兩女婦草一分黃芩鱉甲炙斑貓去翅足乾薑當歸茴香礬石燒地膽各一分蜀椒三十去汗上十五味作散下篩酒服方寸匕日三十五日即止忌生血物莧菜劉涓子古今録驗同又療鼠瘻發於頸無頭尾如鼷鼠使人寒熱此得之因食大鼠餘毒不去其根在胃貍骨主之知母為佐方陵鯉甲炙山龜殼炙甘草炙桂心雄黃乾薑等分上六味作散下篩服方寸匕日三蜜和納瘡中無不愈先灸作瘡後與藥良忌海藻生蔥劉涓子備急古今録驗文仲同又療鼠瘻瘡瘥復發及不愈出膿血不止方以不中水豬脂㕮咀生地黃納脂中令其脂與地黃足相淹和煎六七沸去滓桑灰汁淨洗瘡去惡汁以地黃膏塗上日一易範汪同又療鼠瘻方得蛇虺所吞口中鼠燒末服方寸匕日再不過三服此大驗但難遇耳並敷瘡中範汪同又療鼠瘻方死鼠一枚中形者亂髮如雞子一枚上二物以臘月豬膏令淹鼠發煎之令其鼠發都盡消膏成分作二分一分稍稍塗瘡一分以酒服之即愈矣鼠子當從瘡出神良祕不傳翼備急文仲集驗範汪同又療螻蛄瘻發於頸項狀如螻蛄腫潰連生瘡其汁赤黃此得之食爪螻蛄餘毒及果實不去核其根在大腸荏子主之桔梗為佐方桂心乾薑桔梗礬石燒獨活各一分附子一分炮椒一百粒汗芎藭半分龍骨半分荏子一分上十味搗下篩棗二十枚合搗以酢漿丸如大豆溫漿下五丸古今録驗劉涓子同又方槲葉灰先以泔清煮槲葉取汁洗拭乾納灰瘡中又療蜂瘻發於頸瘰癧三四處俱腫起相連潰潰移此得之飲流水有蜂毒不去其根在脾雄黃主之黃芩為佐方蜂房一具炙鱉甲一分炙茴香一分吳茱萸二分椒一百粒汗乾薑一分上六味搗下篩作散敷瘡孔中日十度十日止忌莧菜又療蜂瘻初生時狀如桃而癢搔之則引大如雞子如覆手者方熬鹽尉之三宿四日不瘥至百日成瘻其狀大如四五寸又廣三寸中生蜂作孔乃有數百治法以石硫黃隨多少然燭燒令汁出著瘡孔中須臾皮中見蜂數十唯蜂盡即瘥又療蚍蜉瘻發於頸初得如傷寒此因食中有蚍蜉毒不去其根在腎礜石主之防風為佐方白朮四分知母雌黃乾地黃獨活青黛斑蝥去首羽足熬白芷柏脂芍藥海藻一雲海苔當歸各一分蝟皮四分炙椒一百粒去汗桃白皮一分正旦取上十五味搗下篩作散服一錢匕日三劉涓子古録驗同又療蠐螬瘻發於頸無頭尾如棗核塊塊多在皮中使人寒熱心痛滿此因喜怒哭泣其根在心礬石主之白朮為佐方白朮一分礬石一分空青兩三分當歸二分細辛一分蝟肉炙枸杞根斑蝥去翅足熬地膽各一分熬干烏腦三大豆上十味搗下篩散服方寸匕日三酢漿服之病在上側臥在下高枕臥使藥流下劉涓子古今録驗同七曰浮沮瘻發於頸如兩指使人寒熱欲臥得之因思慮憂憶其根在膽地膽主之甘草為佐方雄黃一分乾薑一分龍膽二分一作龍骨石決明續斷菴䕡根各分細辛二分大黃半分地膽一分熬上九味搗下篩為散敷瘡日四五忌生菜劉涓子同古今録驗無雄黃有硫黃余同又療瘰癧瘻發於頸有根初苦痛歷歷覺之使人寒熱此得之新沐頭濕髻發汗流入於頸其根在腎雌黃主之芍藥為佐方茯苓續斷礬石燒令汁盡乾薑雌黃芍藥桔梗椒汗乾地黃常山空青貍肉烏腦並腎肝斑蝥去翅足熬各一分附子一兩炮礜石二分燒半日虎指各一分一云虎腎上十七味搗篩為散蜜丸如大豆夜酒服十丸日三古今録驗同又療轉脈瘻發於頸如大豆浮在脈中濯濯脈轉苦驚惕身如振寒熱得之於驚臥失枕其根在小腸斑蝥主之白芷為佐方緑青二分礬石半分燒半日防風一分甘草半分炙大黃二分桂心二分人參二分當歸二分升麻一分地膽一分熬白朮一分鍾乳一分研斑蝥一分去翅足熬白芷一分續斷一分麝香一分麥門冬一分去心上十七味搗下篩蜜丸酒服如大豆十丸日三勿食倉米慎房百日劉涓子古今録驗同並出第二十四卷中崔氏療九種瘻方芫青二十枚去足翅熬地膽十枚去足羽熬斑蝥三十枚準上生犀如棗核大屑豉四十九粒大豆黃一百枚生用牛黃棗核大蜈蚣一枚肥大者折取一寸半微火熬上八味搗篩蜜丸如梧子初欲服藥少夜食明旦飲服二丸須臾可煮酢漿薄粥稍稍冷飲之其瘻蟲有形狀皆從小便出至日西甚虛悶可煮湯食蔓菁菜羹醬食之其餘脂膩醋脯一切口味五辛果子之類並不得食人強隔日一服人弱兩三日一服服藥以瘡瘥蟲盡為度若差仍作二十日許將息藥欲盡豫合勿使斷絶藥氣不能將息便不須服救急千金同出第五卷中張文仲療鼠瘻方石南生地黃雌黃茯苓黃連各二兩上五味作散敷瘡日再備急同又療鼠瘻諸惡瘡方苦參三斤露蜂五兩曲二升上三味以水三斗漬藥三宿去滓黍米二升釀熟飲日三一方得蝟皮一具劉涓子同並出第五卷中備急劉涓子鼠瘻方山龜殼炙桂心雄黃乾薑貍骨炙甘草炙上六味等分搗篩為散飲服方寸匕日三蜜和納瘡中無不愈先灸作瘡後與藥良又方礬石三分燒斑蝥一分去首足翅熬上二味搗下篩用酢漿服半匕須臾瘻蟲從小便出刪繁文仲同出第五卷中古今録驗療鼠瘻麝香塗方麝香研雌黃研上二味等分併為散取蝦蟆背白汁和塗瘡孔中日一度又療鼠瘻著頭生小者如杏大者如杯方斑蝥一分去首足翅熬牡蠣二分熬海藻四分先去鹹味上三味搗下篩酒服五分匕日三病當從小便出如魚胞忌蒜並出第四十一卷中諸瘻方一十五首劉涓子瘻腫病方斑蝥四十枚去足翅熬桂心四分芫青十枚去足翅熬葛上亭長三十枚熬上四味搗下篩酒服半錢匕日一忌生蔥又療瘻方斑蝥四十枚去足翅熬地膽三十枚去首足翅熬蜥蜴三枚炙上三味搗之千杵蜜和如大豆服二丸又療瘻衆方不瘥效驗方牡蒙數兩上一味搗之湯和適寒溫取一升許敷瘡上冷易經宿佳又療瘻生肉膏方桑薪灰三升水四升淋之復重淋之取三升石灰熬令黃納灰汁中以兩重帛裹絞去滓更魚目煎取二升勿用急火煎隨瘻孔深淺初時作服散而瘥孔若深四寸新藥與孔里薤白使濡安藥薤白入藥孔里若深四寸隨瘻根而灸兩處每處與四十壯唯勿灸瘻孔隨深淺去膿散與膏安著瘡孔里十五過少遷延日月取瘥肉滿膿亦斷神良無比出第六卷中肘後論此本在諸方瘡條中病類既多今狀出為別一篇凡瘻病有鼠蛇蜂蛙蚓類似而小異皆從飲食中得其精氣入人肌體變化成形瘡既穿潰浸諸經脈則亦殺人而鼠蟻最多以其間近人故也通治諸瘻方以八月中多取斑蝥蟲即納苦酒中半日許出曝乾使十取六七枚著銅器中微火上遙熬令熟搗作屑巴豆一粒去皮熬之又拔取黃犬背上毛二七枚亦熬作屑好朱以錢五分匕都合和以苦酒頓服之蟲當盡出若一服未效先時可預作三兩劑後日服遠不過三兩劑通按朱一作末又方虎薊根杜蘅枳根酸棗根各一把斑蝥一枚一方云三分去頭足翅熬貓薊根各一把上六味搗蜜丸日一服如棗一枚以小丸著瘡中又方若先著下部邊或上出耳後頸項諸處者苦參切五升以苦酒一斗漬三四日宜服一升亦加之但多作以知為度不過三四度必瘥又療瘻方槲木皮長一尺闊六寸去黑皮細切以水一斗煮取五升去滓納白糖十挺煎取一升分三服以銅器接吐出看視之又方新生兒屎一百日以來皆收置蜜器中五十六十日取塗瘡孔中又方鯉魚腸切作五段火上脫之洗瘡拭乾以腸封之冷即易自暮至旦干止覺癢開看蟲出瘥崔氏療瘻方槲白皮切取五升上一味以水八升煮令泣泣絞去滓重煎令成膏日服半棗漸加至一棗許亦著瘡上無忌患瘡唯宜煮飯苜蓿鹽醬又不得多食之出第五卷中備急療瘻生肉膏方楝白皮二兩鼠肉二兩薤白三兩當歸四兩生地黃五兩上五味以臘月豬膏三升煎薤白黃色膏成敷瘡孔上令生肉肘後文仲同又葛氏云苦著口裹方楝木東引根切上一味水煮取濃汁含之數吐勿咽肘後同並出第五卷中備急療諸瘻方取葶藶子搗細羅取好白蜜和丸每欲著藥先溫泔洗著瘡孔中以丸納之若塞以物道開日三度瘡痛是瘥候勿停藥大效出第五卷中必效療諸瘻方先以泔清溫洗以綿拭之取葵葉微火暖貼之引膿不過三二百葉膿盡出即肉生王丞頻用大奇效腋臭方三十七首病源人腋下臭如蔥豉之氣者亦言如狐貍之氣者故謂之狐臭此皆血氣不和蘊積故氣臭出第三十一卷中肘後療人體及腋下狀如狐𤜢氣世謂之胡臭方炊甑飯及熱丸以拭腋下臭仍與犬食之七日一如此即瘥文仲備急同又方煮雞子兩枚熟去殼及熱各納腋下冷棄之三路口勿反顧三為之又仲備急並同又方燒好礬石末絹囊盛之常以粉腋下不過十度小品集驗文仲備急同又方青木香二兩附子一兩礬石半兩燒白灰一兩半上四味細末著粉腋下汗出因以粉之亦瘥又方青木香一斤石灰半斤熬上二味常以粉身亦瘥並搗末傳之又方乾薑胡粉白灰等分上三味合作末粉之範汪同並出第五卷中千金療狐臭漏腑有天生狐臭有為人所染臭者天生者難療為人所染者易瘥然須三年敷白礬散勿止並服五香丸乃可得瘥勿言一度敷藥即瘥止可敷藥時暫得一度差耳凡狐臭人通忌食蕓薹五辛療之終身不瘥狐臭方辛夷芎藭細辛杜蘅藁本各三分上五味㕮咀以苦酒漬之一宿煎三日取汁敷之以瘥為度小品集驗必效範汪同五香丸主口臭及身臭止腫痛散血氣方豆蔻子丁香藿香白芷青木香當歸桂心各一兩零陵香一兩甘菘香二分香附子二兩檳榔二枚上十一味搗下篩蜜丸如大豆日三夜一時含之咽津五日內口香十日身香二七日衣被香三七日下風人聞香四七日靜洗手水落地香五七日把他人手亦香禁五辛下氣去臭第一出第六卷中又石灰散主胡臭方青木香楓香丁香薰陸香各二兩陽起石橘皮各三兩礬石四兩燒石灰一升熬上八味搗下篩以綿作篆子粗如四指長四寸展取藥著上即以絹囊盛之繫著臂先以布拭揩令痛然後夾之又方水銀胡粉面脂研和敷之大驗救急同又方辛夷細辛芎藭青木香上四味等分搗下篩作散熏畢粉之又方伏龍肝作泥敷之良又方牛脂和胡粉三合煎令可丸塗腋下一宿即愈集驗同又方三年苦酒和石灰敷之又方赤銅屑以酢和銀器中炒極熱以布裹尉腋下冷復易瘥止又方附子炮石灰熬青木香三兩礬石三分燒米粉一升上五味搗篩常粉之又方馬齒草一束上一味搗碎以蜜和作團以紙裹之以泥糊紙厚半寸曝乾以火燒熟破取更以少許蜜和使熱勿令冷先以生布揩之夾藥腋下痛久忍不能得然後以手中勒兩臂瘥出第二十五卷中崔氏療胡臭有效方先用泔清淨洗又用清酢漿水淨洗訖微揩使破取銅屑和醶酢熱揩之不過三四度瘥又方胡粉銅青上二味等分研以人乳和塗腋下若成瘡且停瘡差又塗以瘥為度出第四卷中張文仲療胡臭若股內陰下常汗濕且臭或作瘡者方但以胡粉一物粉之即差常用大驗備急同又隱居效驗胡臭方雞舌香藿香青木香胡粉各二兩上四味搗散作粉綿裹納腋下常敷即瘥備急同出第七卷中救急療腋臭方銅屑一升石灰三升熬上二味合和囊盛粉之有汗便粉之又方甘草炙松根白皮甘瓜子大棗各四分上四味為散食後服方寸匕日三出第三卷中又方雞屎白礬石熬令汁盡黃礬熬附子炮木蘭皮青木香各一大兩上六味搗為散粉之又石龍衣一大兩蛇蛻皮是也以子日夜半燒為灰服之又方常以鹽緑和釅酢塗之一遍一年再塗永除以胡粉和水銀和令相入塗腋下十日以來無氣出第八卷中又方黃礬細辛芎藭各二兩雄黃一兩上四味搗下篩為散先以泔清洗腋拔去毛令血出以粉腋下出第九卷中必效療腋臭方好硇砂二兩好白礬熬蜜陀僧各三兩酢酪二兩胡粉二分金屑八分鉛錫生銅屑各二分上八味並研令細酢一升新銅器中盛藥密封其口二七日看上青緑色鬱郁然其藥即成還須研令極細至用時若干更以好酢和藥以塗病處若有毛先拔去以石灰水淨洗拭使干以生布揩令微赤可作瘡一日一塗洗遠不過十日即待腋瘡瘥訖更取銅屑細研成粉粉病處日五六即止病瘥終身不得帶麝香食胡荽又方取五月五日承露百草陰乾火燒為灰用井華水和灰為團重火煉如燂灰色煉訖即以醶酢和為餅厚如掌大小徑二寸以來即於兩腋下挾即易夾時一身連頭並悶二日後若病不瘥復著藥微發亦不甚臭還依法療之永斷又金錯屑塗法金錯屑一銖銀錯屑一兩赤銅屑香附子胡粉錢錯屑各一兩三年醋三升上七味以羊酪一升於銅器中煮得二沸以用塗之又方三年醶酢二升碎銅一斤鹽半合灰二合上四味浸藥攪藥色青即塗腋下日三四塗三日小愈一月全瘥又方大銅錢二七文白梅二七個鹽一升上三味以五月五日水一升共置瓶子裹挂戶上百日畢可取用塗不得婦人為塗藥食黏食蒜髮又方以酢五合納銅器中以錢十四文胡粉五銖置中泥頭七日後以粉十銖和之訖去腋下毛日再敷之合藥勿令人見祕之又方以首子男兒乳汁浸鹽研銅青拔去毛使血出塗瘥又方醶醋浸青木香置腋下夾之即愈又方錢三七文胡粉三兩馬齒草鹿莖三兩青木香二兩大酢半升上五味切先以醋漬錢五六日然後總漬諸藥一物煮五六沸置垍器中先以石灰汁洗病處拭乾訖塗之以瘥為度並出第三卷中古今録驗療胡臭青羊脂粉方胡粉銅青等分上二味先以鹽湯洗兩腋下及著藥且淋洗又以青羊脂和敷數日瘥又錢汁敷方錢二七文上以礦石磨令平以夾腋下神良範汪同並出第三十卷中漏腋方三首病源腋下常濕仍臭生瘡謂之漏腋此亦是氣血不和為風邪所搏津液蘊瘀故令濕臭出第三十一卷中集驗療漏腋腋下及足心手掌陰下股里常如汗濕致臭六物胡粉敷方干枸杞根半兩胡粉一兩干商陸根一兩滑石一兩干薔薇根半兩甘草半兩灸上藥搗下篩以苦酒和塗腋下當微汗出易衣復塗著藥不過三敷便愈或更發覆塗之不可多敷傷人腋余處亦塗之小品文仲備急範汪同出第九卷中經心録漏腋方正朝旦以小便洗文仲備急集驗小品範汪千金同又方搗馬齒草腋下夾之令燥後復易之先用雌黃石灰等分合水煎一兩沸如泥泥之毛落然後塗諸藥良並出第五卷中七孔臭氣方三首千金療面目口齒七孔臭方沉香五兩甘草二兩炙白瓜瓣半升芎藭二兩丁香五兩藁本二兩麝香二兩當歸二兩上八味搗下篩蜜丸食後含如小豆五粒日三祕不傳久服令人舉體皆香救急同出第六卷中救急療人七孔臭氣方甘草五分炙芎藭四分白芷三分上三味作散下篩食後飲服方寸匕日三又方瓜子仁一分芎藭藁本當歸杜蘅各一兩細辛二分防風一分上七味搗下篩食後溫水服方寸匕日三令人體香方四首肘後令人體香方白芷薰草杜若杜蘅藁本等分上五味末之蜜和旦服如梧子三丸暮服四丸三十日足下悉香文仲備急範汪同又方甘草炙瓜子大棗松根皮等分上四味搗下篩食後服方寸匕日三二十日覺效五十日身體並香百日衣服床幃悉香文仲備急範汪千金同又方瓜子仁芎藭藁本當歸杜蘅細辛各二分白芷桂心各五分甘草二分炙上九味搗下篩食後服方寸匕日三五日口香二十日肉香文仲備急同出第五卷中千金療諸身體臭方竹葉寸兩桃白皮四兩上二味以水一石二斗煮取五斗浴即香出第六卷中雜療汗出不止方一十首集驗療止汗粉藥方牡蠣二兩熬附子半兩炮麻黃根二兩上三味搗篩以白粉一升和合粉汗汗止忌豬肉又汗後遂漏不止其人惡風小便難四肢微急難以屈伸桂枝加附子湯方大棗十三枚擘附子一枚炮桂心三兩芍藥三兩生薑三兩甘草二兩炙上六味切以水七升煮取三升溫服一升延年同此本張仲景傷寒論方千金止汗方青松葉一斤上一味搗令汁出清酒一升漬二宿近火一宿初服半升漸至一升頭面汗即止出第八卷中延年澤瀉湯療大虛煩躁止汗治氣方澤瀉茯苓各二兩牡蠣熬白朮各一兩生薑半升上五味切以水八升煮取二升分服一升日再服又都梁散療汗出如水及汗出衄血吐血小便血殆死方都梁香二兩紫菀人參青竹茹蓯蓉各一兩乾地黃二兩熬令燥上六味搗下篩水服方寸匕不效須臾再服忌蕪荑又療大病之後虛汗不可止方杜仲牡蠣等分熬上二味搗下篩向暮臥以水服一錢匕午前汗止者不再服服之令人乾燥若汗不止者復服一錢不過再必愈有驗天行及百病後虛吸漏汗遂溫之無不止者又療大病後虛汗出不禁者方粢粉豉等分焦炒故竹扇如手掌大燒取灰上三味合搗以絹囊盛粉體立止最驗當先熬末粉之千金並同又粉散療大病後身體虛腫汗出止汗方麻黃根三兩防風乾薑細辛各二兩白蘞一兩上五味合下篩以粢粉五升熬令黃合和以粉身出第十一卷中古今録驗療汗出不止術桂散方麻黃桂心各五分白朮附子炮菖蒲各三分上五味搗末酒服方寸匕日三未食服又止汗熱雷丸散方雷丸桂心牡蠣各五分熬上三味搗下篩粉身日三出第二十六卷中
