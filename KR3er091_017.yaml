戟天二兩茯神三兩本方作茯苓山茱萸二兩赤石脂二兩上十二味搗篩以蜜和丸如梧子食前以酒下二十丸至三十丸日再夜一服無所忌唯禁大醋蕪荑蒜陳臭物服之七日令人健四體潤澤唇口赤手足暖面有光澤消食身體安和音聲清明是其驗十日後日長肌肉其藥通中入腦鼻必痠疼不可怪若欲求大肥加敦煌石膏二兩若失性健忘加遠志一兩少津液加柏子仁一兩一月許即充足古今録驗通命丸療虛勞百病七傷六極少氣羸弱不能飲食方茯苓六分甘草六分炙杏仁六分去皮尖熬牛膝七分黃芩五分阿膠三分炙防風四分干天門冬六分去心芍藥六分大黃六分當歸六分乾薑六分乾地黃七分人參六分桂心三分乾漆四分熬紫菀五分白朮四分蓯蓉五分吳茱萸三分蜀椒三分汗石斛三分上二十二味搗篩以棗膏蜜相拌和作丸食前服七丸日三不知漸增以知為度病劇者夜更一服忌蕪荑鯉魚生蔥海藻菘菜桃李雀肉酢等出第二十五卷中又療體虛少氣羸瘦不堪榮衛不足善驚胸膈痰冷而客熱欲冷水飲食則心腹弦滿脾胃氣少不能消食或時衄血方黃耆二兩附子一兩炮大棗十四枚甘草二兩炙蜀椒一兩汗生薑六兩芍藥二兩茯苓二兩當歸二兩人參三兩黃芩二兩桂心二兩上十二味切以水一斗煮取三升半去滓分五服日三夜一適寒溫忌海藻生蔥菘菜豬肉冷水大酢又療男子虛羸七傷八公散方麥門冬去心石葦去毛五味子茯苓菟絲子酒漬乾地黃桂心上七味等分搗篩為散以飲服方寸匕日三後食二十日知三十日自任意欲行百里並得益顏色久服令人耐老輕身七十有子忌大酢生蔥蕪荑出第二十卷中虛勞食不生肌膚方三首範汪療男子七傷面目黃黑飲食不生肌肉手足悁疼少腹重急小便利方石斛六分山茱萸六分肉蓯蓉六分牛膝六分五味子六分附子四分炮遠志六分去心桂心四分人參六分茯苓六分菟絲子八分酒漬秦艽四分上十二味搗篩為散以酒服方寸匕日三食前服之忌豬肉冷水生蔥酢物出第七卷中一方無牛膝用萆薢小品黃耆湯療虛勞胸中客熱冷癖痞滿宿食不消吐噫脅間水氣或流飲腸鳴不生肌肉頭痛上重下輕目視䀮䀮惚惚志損常躁熱臥不得安少腹急小便赤餘瀝臨事不起陰下濕或小便白濁傷多方黃耆三兩人參一兩芍藥二兩生薑半斤桂肉三兩大棗十四枚當歸一兩甘草一兩炙上八味切以水一斗煮取四升分四服有寒加厚朴二兩忌生蔥海藻菘菜經心録同出第三卷中集驗淮南五柔丸療虛勞不足飲食不生肌膚三焦不調大便祕澀此藥和腸臟並療癖飲百病方大黃一斤前胡二兩茯苓一兩細辛一兩蓯蓉一兩半夏一兩湯洗當歸一兩葶藶子一兩熬芍藥一兩上九味搗篩蜜和搗萬杵丸如梧子食前以湯飲下五丸日再服加至十丸忌生菜酢物羊肉餳等延年崔氏同出第五卷中長肌膚方三首範汪大行諧散主強中益氣補力不足長養肌肉通和百脈調利機關輕身潤澤安定五臟強識不忘方白防己二兩菴䕡子五兩豬苓七兩六安石斛二兩占斯四兩一名良無極鍾乳五兩研蓯蓉七兩麥門冬二兩去心茯苓五兩牡丹皮七兩地膚子五兩澤瀉二兩桂心五兩甘草五兩炙白朮七兩胡麻三升熬令香當歸五兩覆盆子五兩薔薇五兩牛膝三兩八角附子三兩炮上二十一味搗篩蜜一升生地黃汁三斤取汁合令相和微煎以和前藥丸如桐子大曝乾以酒湯飲下三十丸又和曝乾以作散服方匕方云作散即恐不得丸忌豬肉冷水海藻菘菜生蔥酢物胡荽桃李雀肉等出第七卷中一方無薔薇用鬼蓋延年服大豆法令人長肌膚益顏色填骨髓加氣力補虛又能嗜食瘦人服兩劑即令肥充不可識肥人不得服之方大豆五升取肥好者一依作醬法料理取黃上一味搗末以絹篩之以豬肪脂好銷煉如法去滓以膏和豆末作團訖以油帛裹之著於瓷器中收之一服如梧子五十丸細細加至一百丸日再以酒飲任用下之一無所禁瘦人不過兩劑即大肥服十日已去食不知飽也祕驗神方又甘草丸主安養五臟長肌肉調經脈下氣補脾胃益精神令人能食強健倍力方甘草四兩炙人參二兩白朮二兩芍藥二兩黃耆二兩遠志二兩去心大麥蘖二兩熬令黃上七味搗篩為散以棗膏和蜜攪調和藥令成丸食後少時以酒或飲任下五丸如梧子漸加至七丸日再服長服勿絶盡即更合非止一劑即停多分兩恐難盡又壞分兩少服盡更常得新藥服忌海藻菘菜桃李雀肉並出第一卷中腎氣不足方六首深師療腎氣不足心中悒悒而亂目視䀮䀮心懸少氣陽氣不足耳聾目前如星火消疽痔一身悉癢骨中痛少腹拘急乏氣咽乾唾如膠顏色黑補腎方磁石二兩研綿裹生薑二兩防風二兩桂心二兩甘草一兩炙五味子二兩附子一兩炮玄參二兩牡丹皮三兩大豆二十四枚上十味切以水一斗二升先於銅器中揚三百遍煮藥取六升去滓更煎取二升八合分為三服忌海藻菘菜豬肉冷水生蔥胡荽等出第十三卷中一方無生薑磁石有石膏揚水二千遍小品增損腎瀝湯療腎氣不足消渴引飲小便過多腰背疼痛方腎一具豬羊並得遠志二兩麥門冬一升去心人參二兩五味子二合澤瀉二兩乾地黃二兩茯苓一兩桂心二兩當歸二兩芎藭二兩黃芩一兩芍藥一兩生薑五兩棗二十枚螵蛸二十枚炙雞䏶胵里黃皮一兩上十七味以水一斗五升煮腎取一斗三升去腎煎藥取三升去滓分三服忌生蔥蕪荑酢物又加減腎瀝湯療大虛內不足小便數噓嗡焦熇引水漿膀胱引急方腎一具豬羊並可用遠志二兩去心麥門冬一升去心人參一兩大棗四十枚芎藭二兩五味子二兩當歸二兩澤瀉二兩桂心四兩乾薑二兩乾地黃三兩黃連二兩桑螵蛸三十枚龍骨二兩甘草三兩炙上十六味切以水一斗五升如常法煎取三升去滓分三服忌海藻菘菜生蔥豬肉蕪荑等物古今録驗瀉腎湯療腎氣不足方芒硝二兩礬石二兩熬汁盡大豆一升上三味以水三升煮取一升二合去滓分再服當快下出第二十七卷中又療丈夫腰腳疼腎氣不足陽氣衰風痹虛損惙惙諸不足腰背痛耳鳴小便餘瀝風虛勞冷腎氣丸方羊腎二具炙細辛二兩石斛四兩蓯蓉四兩乾地黃四兩狗脊一兩黑者桂心二兩茯苓五兩牡丹皮二兩麥門冬三兩去心黃耆四兩人參二兩澤瀉二兩乾薑二兩山茱萸二兩附子二兩炮薯蕷二兩大棗一百枚取膏和丸上十八味搗篩以棗膏少著蜜合丸如梧子大以酒服二十丸漸加至三十丸日再服忌豬肉冷水生蔥生菜胡荽蕪荑酢物出第二十五卷中經心録羊腎湯療腎氣不足耳無所聞方羊腎一具芎藭一兩茯苓二兩人參三兩附子一兩炮桂心二兩牡丹皮一兩磁石二兩當歸二兩乾地黃三兩大棗五枚擘牡荊子一兩碎上十二味切以水一斗七升煮藥腎取一斗去腎煮取四升分四服晝三夜一忌豬肉冷水生蔥胡荽蕪荑酢物出第四卷中虛勞裡急方六首病源虛勞則腎氣不足傷於衝脈衝脈為陰脈之海起於關元穴在臍下隨腹直上至咽喉勞傷內損故腹裡拘急也上部之脈微細而臥引裡急心膈上有熱者口乾渴寸口脈陽弦下急陰弦裡急故為胃氣虛食難用飽飽則急痛不得息寸微關實尺弦緊者少腹腰背下苦拘急痛外如不喜寒身憒憒也其湯尉針石別有正方補養宣導今附於後養生方云正偃臥以口徐徐納氣以鼻出之除裡急飽食後小咽氣數十令溫寒者乾嘔腹痛從口納氣七十所大䐜腹小咽氣數十兩手相摩令極熱以摩腹令氣下也出第三卷中深師黃耆湯療大虛不足少腹裡急勞寒拘引臍氣上衝胸短氣言語謬誤不能食吸吸氣乏悶亂者方黃耆三兩半夏一升洗大棗二十枚擘生薑四兩桂心四兩芍藥四兩人參二兩甘草二兩炙上八味切以水一斗二升煮取四升分四服日夜再若手足冷加附子一兩忌生蔥海藻菘菜羊肉餳又大建中湯療內虛絶裡急少氣手足厥逆少腹攣急或腹滿弦急不能食起即微汗出陰縮或腹中寒痛不堪勞苦唇口舌乾精自出或手足乍寒乍熱而煩苦痠疼不能久立多夢寤補中益氣方黃耆四兩人參二兩大棗二十枚擘當歸二兩桂心六兩生薑一斤半夏一升洗芍藥四兩附子一兩炮甘草二兩炙上十味切以水一斗二升煮取四升分四服先服後食忌海藻菘菜生蔥豬羊肉餳冷水等又樂令黃耆湯療虛勞少氣胸心痰冷時驚惕心中悸動手足逆冷體常自汗補諸不足五臟六腑虛損腸鳴風濕榮衛不調百病又治風裡急方黃耆二兩當歸三兩烏頭三兩炮去皮尖四片入蜜炙之令黃色桂心三兩生薑四兩蜀椒二兩汗人參二兩芍藥二兩大棗二十枚擘茯苓二兩遠志二兩去心半夏四兩洗上十二味切以水一斗五升煮取四升分服八合日三夜再忌生蔥羊肉餳豬肉冷水大酢千金有橘皮細辛前胡甘草麥門冬無烏頭蜀椒遠志為十四味集驗療虛勞裡急諸不足黃耆建中湯方黃耆三兩桂心三兩甘草三兩炙芍藥二兩生薑四兩大棗十二枚擘飴糖一斤上七味切以水一斗二升煮取六升去滓納飴糖令消適寒溫服一升間日可作嘔者倍生薑腹滿者去棗加茯苓四兩忌生蔥海藻菘菜古今録驗同此本仲景方恐是甘草二兩芍藥六兩生薑三兩也通按當以此為準與金匱方同古今録驗黃耆湯主虛勞裡急引少腹絞痛極攣卵腫縮疼痛方黃耆三兩甘草三兩炙桂心二兩芍藥六兩生薑一斤大棗十二枚擘飴糖半斤上七味切以水一斗二升煮取三升去滓納糖令消分服一升嘔即除飴糖忌海藻菘菜生蔥又黃耆湯療虛勞裡急少腹痛氣引胸脅痛或心痛短氣方芍藥六兩黃耆四兩甘草二兩炙桂心二兩乾薑四兩當歸四兩大棗十二枚飴糖六兩上八味切以水一斗煮取三升去滓下飴糖令消分三服忌海藻生蔥菘菜並出第二十三卷中虛勞心腹痛方二首病源虛勞者臟氣不足復為風邪所乘邪正相干冷熱擊搏故令心腹俱痛出第三卷中古今録驗療虛勞腹中痛夢失精四肢痠疼手足煩熱咽乾口燥並婦人少腹痛芍藥湯方芍藥六兩桂心三兩甘草三兩炙生薑四兩大棗十二枚擘飴糖一斤上六味切以水九升煮取三升去滓下糖分服七合日三夜一忌海藻菘菜生蔥此仲景小建中湯方本云甘草二兩生薑三兩又建中黃耆湯療虛勞短氣少腹急痛五臟不足方黃耆三兩甘草三兩炙桂心三兩生薑一斤薄切飴糖半斤大棗十二枚擘上六味切以水一斗煮取三升去滓下糖溫服一升日三忌海藻菘菜生蔥並出第三卷中虛勞偏枯方一首病源夫勞損之人體虛易傷風邪風邪乘虛客於半身留在肌膚未即發作因飲水水未消散即勞於腎風水相搏乘虛偏發風邪留止血氣不行故半身手足枯細為偏枯也出第四卷中古今録驗主新飲水未散而交接令人偏枯身偏不足乾地黃丸方乾地黃五分乾漆四分熬萆薢三分防風二分椒一分汗附子二分炮烏頭一分炮上七味搗篩以蜜和丸如梧子每服三丸漸加至五丸酒下日三以知為度忌蕪荑豬肉冷水出第二十四卷中虛勞骨熱方二首集驗枸杞湯療虛勞口中苦渴骨節煩熱或寒方枸杞根白皮切五升麥門冬一升去心小麥二升洗上三味以水二斗煮麥熟藥成去滓分服一升瘥止出第五卷中古今録驗療虛勞少氣骨節中微熱諸疼痛枸杞湯方枸杞葉十斤乾薑二兩桂心一兩甘草五兩炙大麻子仁二升上五味切碎以河水三斗煮取九升去滓每服一升日三忌海藻菘菜生蔥出第二十三卷中虛勞虛煩不得眠方八首病源夫邪氣之客於人也或令人目不得眠者何也曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心肺而行呼吸焉榮氣者泌其津液注之於脈化而為血以營四末內注五臟六腑以應刻數焉衛氣者其出悍剽疾利而先行於四末分肉皮膚之間而不休息也晝行於陽夜行於陰其入於陰也常從足少陰之分行於五臟六腑今邪氣客於五臟六腑則衛氣獨營於外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹺滿不得入於陰陰氣虛故目不得眠也出第三卷中深師小酸棗湯療虛勞不得眠煩不可寧者方酸棗仁二升知母二兩生薑二兩甘草一兩炙茯苓二兩芎藭二兩上六味切以水一斗煮酸棗仁減三升納藥煮取三升分三服一方加桂二兩忌海藻菘菜酢物出第三卷中小品流水湯主虛煩不得眠方半夏二兩洗十遍粳米一升茯苓四兩上三味切以東流水二斗揚之三千遍令勞煮藥取五升分服一升日三夜再忌羊肉餳醋物有半夏必須著生薑四兩不爾戟人咽不審古方何以如此今改正之集驗療虛煩悶不得眠千里流水湯方半夏三兩洗生薑四兩麥門冬三兩去心酸棗仁二兩甘草二兩炙桂心三兩黃芩二兩萆薢二兩人參二兩茯苓四兩秫米一升上十一味切以千里流水一斛煮米令蟹目沸揚之萬遍澄清一斗煮諸藥取三升分三服忌海藻菘菜羊肉餳酢物生蔥又煩悶不得眠方生地黃五兩香豉五合綿裹人參二兩粟米三合茯苓四兩知母四兩麥門冬三兩去心前胡三兩甘草二兩炙枸杞根皮五兩上十味切以水八升煮取二升七合去滓分四服忌海藻菘菜蕪荑酢物延年酸棗飲主虛煩不得眠並下氣方酸棗二升茯苓三兩人參三兩生薑一兩半麥門冬一兩去心橘皮二兩陳者杏仁二兩去皮尖碎紫蘇二兩上八味切以水七升煮取一升半分再服忌大酢又酸棗飲療虛煩不得眠肋下氣衝心方酸棗仁一升人參二兩白朮二兩橘皮二兩五味子二兩半桂心一兩茯苓二兩生薑四兩上八味切以水六升煮取二升半去滓分三服忌桃李雀肉生蔥酢物蔣孝璋方又酸棗飲主虛煩不得眠方酸棗仁一升茯神二兩人參二兩生薑三兩上四味切以水五升煮取一升二合去滓分再服忌酢物蔣孝璋處又茯神飲療心虛不得睡多不食用此方茯神四兩人參三兩橘皮二兩甘草一兩半炙生薑二兩酸棗仁一升上六味切以水一斗煮取二升去滓分三服忌海藻菘菜酢物蔣孝璋處並出第十一卷中病後不得眠方二首病源大病之後腑臟尚虛榮衛未和故生冷熱陰氣虛衛氣獨行於陽不入於陰故不得眠若心煩而不得睡者心熱也若但虛煩而不得臥者膽冷也出第三卷中集驗溫膽湯療大病後虛煩不得眠此膽寒故也宜服此湯方生薑四兩半夏二兩洗橘皮三兩竹茹二兩枳實二枚炙甘草一兩炙上六味切以水八升煮取二升去滓分三服忌羊肉海藻菘菜餳出第五卷中古今録驗療虛勞客熱百病之後虛勞煩擾不得眠臥骨間勞熱面目青黃口乾煩躁偃慬渠斤切煩也不自安短氣乏少食不得味縱食不生肌膚胸中痰熱煩滿憒悶大竹葉湯方甘草二兩炙小麥五合完用黃耆二兩人參二兩知母二兩大棗二十枚擘半夏三兩洗栝蔞一兩粳米一升黃芩一兩當歸二兩生薑四兩前胡二兩芍藥二兩麥門冬六合去心龍骨三兩桂心三兩竹葉切一兩上十八味切用東流水二升煮取五升去滓分服一升日三夜二不過兩劑如湯沃雪效忌海藻菘菜羊肉餳生蔥虛勞百病方五首廣濟療虛勞百病腎瀝湯方羊腎一具去脂切八片茯苓三兩五味子二兩肉蓯蓉三兩牛膝二兩防風二兩黃耆二兩澤瀉二兩五加皮二兩地骨皮二兩磁石六兩桂心二兩上十二味切以水一斗五升先煮腎取一斗去腎入諸藥煎取三升去滓分溫服服別相去如七八里久不利春夏秋三時並可服之忌生蔥酢物油膩陳臭出第四卷中古今録驗彭祖丸無所不療延年益壽通腑臟安神魂寧心意固榮衛開益智慧寒暑風濕氣不能傷又療勞虛風冷百病方柏子仁五合石斛三兩天雄一兩炮巴戟天三兩去心續斷三兩天門冬三兩去心澤瀉二兩菟絲子五兩人參二兩乾地黃四兩薯蕷二兩遠志二兩去心蛇床子五合取仁鍾乳三兩煉研成粉覆盆子五合蓯蓉六兩山茱萸二兩杜仲三兩菖蒲二兩五味子五兩桂心四兩茯苓二兩上二十二味搗篩蜜和丸如梧子服八丸日再漸加至十丸本方與天門冬散方同但以覆盆子代菊花先服藥齋五日不食脂肉菜五辛藥宜以酒服勿令醉服二十日斷白瀝三十日漸脫六十日眼童子白黑分明不復淚出溺血餘瀝斷八十日白髮變黑腰背不復痛行步腳輕百五十日都瘥意氣如年少時諸病皆除長服如神忌鯉魚生蔥豬羊肉冷水酢物蕪荑餳經心録鍾乳散療傷損虛乏少氣虛勞百病令人丁壯能食去風冷方鍾乳粉用五分附子五分炮白朮十四分防風十分牡蠣十分熬栝蔞十分乾薑五分桔梗五分茯苓五分細辛五分桂心五分人參五分上十二味搗篩為散以酒服方寸匕日二漸加至二匕忌食生菜生蔥豬肉冷水桃李雀肉大酢又更生散療虛勞百病方防風十分栝蔞十分鍾乳十分粉赤石脂十分海蛤十分乾薑六分白朮六分桔梗五分白石脂十分細辛六分人參五分附子三分炮桂心三分上十三味搗篩為散以酒服方寸匕日再服忌豬肉冷水生菜生蔥桃李雀肉等出第四卷中一方以一分半為一簿以溫酒一簿日再又陸抗膏療百病勞損傷風濕補益神效男女通服之方豬脂三升羊脂二升牛髓二升並煉成白蜜二升生薑汁三升上五味先煎豬脂等次下薑汁又煎次下蜜復煎候膏成收之取兩匙溫酒服又一方加生地黃三升忌蕪荑出第六卷中虛勞陰痿方七首病源腎開竅於陰若勞傷於腎腎虛不能榮於陰氣故痿弱也診其脈瞥瞥如羹上肥者陽氣微連連如蜘蛛絲者陰氣衰陰陽衰微而風邪入於腎經故陰不起或引少腹痛也養生云水銀不得令近陰令消縮出第四卷中廣濟療陰痿不起滴瀝精清鍾乳酒方鍾乳三兩研絹袋盛附子二兩炮甘草二兩炙當歸二兩石斛二兩前胡二兩薯蕷三兩五味子三兩人參二兩生薑屑二兩牡蠣二兩熬桂心一兩菟絲子五合枳實二兩乾地黃五兩上十五味切以絹袋盛清酒二斗漬之春夏三日秋冬七日量性飲之效忌海藻菘菜豬肉冷水生蔥蕪荑生冷黏食等出第四卷中範汪療男子虛勞陰痿不起無子方杜仲十分蛇床子八分菟絲子五分酒漬遠志五分去心茯苓四分天雄五分炮澤瀉五分石斛五分蓯蓉四分五味子四分上十味搗篩為散酒服方寸匕日再效忌豬肉冷水酢物出第七卷中備急蓯蓉丸療痿弱益精氣男子服之外充婦人服之內補百病瘥方鍾乳粉三分萆薢三分蓯蓉三分乾地黃六分薏苡仁三分菟絲子四分上六味搗篩以雞子黃棗膏和丸如梧子酒服十丸漸至二十丸日再服忌蕪荑又遠志丸療男子痿弱丸續斷二兩薯蕷二兩遠志二兩去心蛇床子二兩肉蓯蓉二兩上五味搗篩以雀卵和丸如小豆以酒下七丸至十丸百日知之神良文仲療陰下濕癢又痿弱粉散方白粉乾薑牡蠣各三分熬上三味搗篩為散欲臥時粉陰下至起亦粉粉盛疏布袋中撲之佳此大驗又方加麻黃根三兩又方礬石熬令汁盡蛇床子黃連各三分上三味為散粉之同前經心録雄鵝散療五勞七傷陰痿十年陽不起皆繇少小房多損陽神女養母得道方雄鵝十分熬石斛三分巴戟天二分天雄二分炮五味子二分蛇床子二分薯蕷二分菟絲子二分牛膝二分遠志二分去心蓯蓉五分上十一味搗篩為散以酒服方寸匕亦可丸服日三忌豬肉冷水出第四卷中虛勞小便利方五首病源此繇下焦虛冷故也腎主水與膀胱為表裡膀胱主藏津液腎氣衰弱不能制於津液胞內虛冷水下不禁故小便利也出第四卷中溲師黃耆湯療虛乏四肢沉重或口乾吸吸少氣小便利諸不足方黃耆三兩茯苓二兩桂心二兩芍藥二兩甘草一兩半夏三兩洗生薑五兩當歸一兩大棗三十枚人參二兩桑螵蛸二十枚熬兩片破上十一味切以水一斗煮取四升分服一升忌海藻菘菜羊肉餳生蔥大酢出第四卷中又療虛勞腹滿食少小便多黃耆建中湯方黃耆三兩甘草三兩炙大棗三十枚桂心二兩芍藥四兩生薑四兩人參二兩半夏一升洗上八味切以水一斗煮取三升去滓分三服忌海藻菘菜羊肉餳生蔥古今録驗同出第十九卷中又阿膠湯療虛勞小便利而多有人虛勞服散又虛熱盛當風取冷患腳氣喜發動兼小便利脈細弱服此方利即減阿膠二兩乾薑二兩麻子一升搗碎遠志四兩去心附子一枚炮人參一兩甘草一兩炙上七味切以水七升煮六味取三升去滓納膠煬銷分三服一方云小便利多日夜數十行一石五斗者良忌豬肉冷水海藻菘菜小品黃耆湯療虛勞少氣小便過多方黃耆二兩麥門冬二兩去心大棗三十枚擘芍藥二兩乾地黃二兩黃芩一兩桂心二兩生薑二兩當歸二兩甘草二兩炙上十味切以水九升煮取三升去滓分三服忌海藻菘菜生蔥蕪荑豬肉冷水出第十卷三中一方有黃連一兩必效療虛勞下焦虛冷不甚渴小便數黃耆建中湯方黃耆三兩桂心二兩人參二兩當歸二兩芍藥三兩生薑八兩膠飴八兩大棗三十枚上八味切以水一斗煮七味取三升去滓下飴煬銷分三服若失精加龍骨一兩白蘞一兩忌生蔥
