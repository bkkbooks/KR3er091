body:
  text: 卷第十七素女經四季補益方七首素女經黃帝問素女曰男子受氣陰陽俱等男子行陽常先病耳目本其所好陰痿不起氣力衰弱不能強健敢問療之道素女曰帝之所問衆人同有陰陽為身各皆由婦人夭年損壽男性節操故不能專心貪女色犯之竭力七傷之情不可不思常能審慎長生之道也其為疾病宜以藥療之今所説犯者七第一之忌日月晦朔上下弦望六丁之日以合陰陽傷子之精令人臨敵不戰時時獨起小便赤黃精空自出夭壽喪身第二之忌雷電風雨陰陽晦暝振動天地日月無精光以合陰陽生子令狂癲或有聾盲喑啞啞失神或多忘誤心意不安忽常喜驚恐悲憂不樂第三之忌新飽食飲穀力未行太倉內實五臟防響以合陰陽六腑損傷小便當赤或白或黃腰脊疼痛頭項寄強或身體浮腫心腹脹滿毀形夭壽天道之常第四之忌新小便精氣微弱榮氣不固衛氣未散以合陰陽令人虛乏陰陽氣閉絶食無味腹脹滿結怫鬱不安忘誤或喜怒無常狀如癲發第五之忌作事步行身體勞榮氣不定衛氣未散以合陰陽藏氣相干令人氣乏喘息為難唇口乾燥身體流汗谷不消化心腹脹滿百處痠疼起臥不安第六之忌新息沐浴頭身發濕舉重作事流汗如雨以合陰陽風冷必傷少腹急痛腰脊疼強四肢痠疼五臟防響上攻頭面或生漏瀝第七之忌共女語話玉莖盛強以合陰陽不將禮防氣腠理開莖中痛傷外動肌體內損腑臟結髮塞耳目視䀮䀮心中怵惕恍惚喜忘如杵舂膈咳逆上氣內絶傷中女絶痿弱身可不防犯此七篇形證已彰天生神藥療之有方黃帝問高陽負曰吾知素女明知經脈臟腑虛盈男子五勞七傷婦人陰陽隔閉漏下赤白或絶産無子男子受氣陰陽同等其病緣由因何而起故欲問之請為具説對曰深哉問也男子五勞六極七傷病皆有元本由狀帝曰善哉七傷之病幸願悉説對曰一曰陰汗二曰陰衰三曰精清四曰精少五曰陰下濕癢六曰小便數少七曰陰痿行事不遂病形如是此謂七傷黃帝曰七傷如是療之奈何對曰有四時神藥名曰茯苓春秋冬夏療隨病形冷加熱藥溫以冷漿風加風藥色脈診評隨病加藥悉如本經春三月宜以更生丸更生者茯苓也療男子五勞七傷陰衰消小囊下生瘡腰背疼痛不得俯仰兩膝臏冷時時熱癢或時浮腫難以行步目風淚出遠視䀮䀮咳逆上氣身體痿黃繞臍弦急痛及膀胱小便尿血莖痛損傷時有遺瀝汗衣赤黃或夢驚恐口乾舌強渴欲飲水得食不常或氣力不足時時氣逆坐犯七忌以成勞傷此藥主之甚驗方茯苓四分若不消食三分加一菖蒲四分若耳聾三分加一山茱萸四分若身癢三分加一栝蔞根四分若熱渴三分加一菟絲子四分若痿泄二分加一牛膝四分若機閔不利加一倍赤石脂四分若內傷三分加一乾地黃七分若煩熱三分加一細辛四分若目䀮䀮三分加一防風四分若風邪三分加一薯蕷四分若陰濕癢三分加一續斷四分若有痔加一倍蛇床子四分若少氣三分加一柏實四分若少力加一倍巴戟天四分若痿弱三分加一天雄四分炮若有風三分加一遠志皮四分驚恐不安三分加一石斛四分若體疼加一倍杜仲四分若絶陽腰痛三分加一蓯蓉四分若冷痿加一倍上二十味搗篩蜜和丸如梧桐子先食服三丸日三不知漸增以知為度亦可散服以清粥飲服方寸匕七日知十日愈三十日餘氣平長服老而更少忌豬羊肉餳冷水生菜蕪荑等物又黃帝問曰夏三月以何方藥幸得具聞對曰宜以補腎茯苓丸療男子內虛不能食飲忽忽喜忘悲憂不樂恚怒無常或身體浮腫小便赤黃精泄淋瀝痛絞膀胱脛疼冷痹伸不得行渴欲飲水心腹脹滿皆犯七忌上已具記當療之法隨病度量方用如下茯苓二兩食不消加一倍附子二兩炮有風三分加一山茱萸三兩身癢三分加一杜仲二兩腰痛三分加一牡丹二兩腹中遊氣三分加一澤瀉三兩有水氣三分加一薯蕷三兩頭風加一倍桂心六兩顏色不足三分加一細辛三兩目視䀮䀮三分加一石斛二兩陰濕癢三分加一蓯蓉三兩身痿三分加一黃耆四兩體疼三分加一上十二味搗篩蜜和丸如梧桐子先食服七丸日二服忌生蔥生菜豬肉冷水大酢胡荽等物又黃帝問曰春夏之療已聞良驗秋三月以何方藥對曰宜以補腎茯苓丸療男子腎虛冷五臟內傷風冷所苦令人身體濕癢足行失顧不自覺省或食飲失味目視䀮䀮身偏拘急腰脊痛強不能食飲日漸羸瘦胸心懊悶咳逆上氣轉側須人起則扶升針灸服藥療之小折或乘馬觸風或因房室不自將護飲食不量用力過度或口乾舌燥或流涎出口或夢寤精便自出或尿血尿有淋瀝陰下癢濕心驚動悸少腹偏急四肢痠疼氣息噓吸身體浮腫氣逆胸脅醫不能識妄加余療方用如下茯苓三兩防風二兩桂心二兩白朮二兩細辛二兩山茱萸二兩薯蕷二兩澤瀉二兩附子二兩炮乾地黃二兩紫菀二兩牛膝三兩芍藥二兩丹參二兩黃耆二兩沙參二兩蓯蓉二兩乾薑二兩玄參二兩人參二兩苦參二兩獨活二兩上二十二味搗篩蜜和丸如梧桐子食前服五丸臨時以酒飲下之忌酢物生蔥桃李雀肉生菜豬肉蕪荑等又黃帝問曰春夏秋皆有良方冬三月復以何方治之對曰宜以垂命茯苓丸療男子五勞七傷兩目䀮䀮得風淚出頭項寄強不得回展心腹脹滿上支胸脅下引腰脊表裡疼痛不得喘息飲食咳逆面目痿黃小便淋瀝清精自出陰痿不起臨事不對足脛痠疼或五心煩熱身體浮腫盜汗流離四肢拘攣或緩或急夢寤驚恐呼吸短氣口乾舌燥狀如消渴忽忽喜忘或悲憂鳴咽此藥主之補諸絶令人肥壯強健氣力倍常飲食百病除愈方茯苓二兩白朮二兩澤瀉二兩牡蒙二兩桂心二兩牡蠣二兩熬牡荊子二兩薯蕷二兩杜仲二兩天雄二兩炮人參二兩石長生二兩附子二兩乾薑二兩菟絲子二兩巴戟天二兩蓯蓉二兩山茱萸二兩甘草二兩炙天門冬二兩去心上二十味搗篩以蜜和丸如梧桐子先食服五丸酒飲皆得忌海藻菘菜鯉魚生蔥豬肉酢等物又黃帝問曰四時之藥具已聞之此藥四時通服得不對曰有四時之散名茯苓散不避寒暑但能久服長生延年老而更壯方用如下茯苓鍾乳研雲母粉石斛菖蒲柏子仁菟絲子續斷杜仲天門冬去心牛膝五味子澤瀉遠志去心甘菊花蛇床子薯蕷山茱萸天雄炮石葦去毛乾地黃蓯蓉並等分上二十二味搗篩為散以酒服方寸匕日再二十日知三十日病悉愈百日以上體氣康強長服八十九十老公還如童子忌酢物羊肉餳鯉魚豬肉蕪荑等高陽負曰凡經方神仙所造服之療病具已論訖如是所擬説從開闢以來無病不治無生不救也並出古今録驗二十五卷中五勞六極七傷方一十首病源夫虛勞者五勞六極七傷是也五勞者一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞又有五勞肺勞者短氣而面腫鼻不聞香臭肝勞者面目乾黑口苦精神不守恐畏不能獨臥目視不明心勞者忽忽喜忘大便苦難或時鴨溏口內生瘡脾勞者舌本苦直不得咽唾腎勞者背難以俯仰小便不利色赤黃而有餘瀝莖內痛陰濕囊生瘡少腹急滿也六極者一曰氣極令人內虛五臟不足邪氣多正氣少不欲言二曰血極令人無顏色眉發墮落忽忽喜忘三曰筋極令人數轉筋十指爪甲皆痛苦倦不能久立四曰骨極令人酸削齒苦痛手足煩疼不可以立不欲行動五曰肌極令人羸瘦無潤澤飲食不生肌膚六曰精極令人少氣吸吸然內虛五臟氣不足發毛落悲傷喜忘七傷者一曰陰寒二曰陰痿三曰裡急四曰精連連五曰精少陰下濕六曰精液清七曰小便苦數臨事不舉又一曰大飽傷脾脾傷善噫欲臥面黃二曰大怒氣逆傷肝肝傷少血目暗三曰強力舉重久坐濕地傷腎腎傷少精腰背痛厥逆下冷四曰形寒寒飲傷肺肺傷少氣咳嗽鼻鳴五曰憂愁思慮傷心心傷苦驚喜忘善怒六曰風雨寒暑傷形形傷發落肌膚枯夭七曰大恐懼不節傷志志傷恍惚不樂男子平人脈大為勞極虛亦為勞男子勞之為病其脈浮大手足煩春夏劇秋冬瘥陰寒精自出酸削診寸口脈浮而遲浮即為虛遲即為勞遲即衛氣不足浮即榮氣竭脈直上者逆虛也脈澀無陽是腎氣少寸關澀無血氣逆冷是大虛脈浮微緩皆為虛緩而大者勞也脈微濡相薄為五勞微弱相薄虛損為七傷其湯尉針石別有正方補養宣導今附於後養生方導引法云唯欲默氣養神閉氣使極吐氣使微又不得多言語大喚呼令神勞損亦云不可泣淚及多唾洟此皆為損液漏津使喉澀大渴又云雞鳴時扣齒三十六下訖舐口唇漱舌聊上齒表咽之三過殺蟲補虛勞令人強壯又云兩手拓兩頰手不動摟肚肘使急腰內亦然住定放兩肘頭向外肘膊腰氣散盡勢大悶始起來去七通去肘臂之勞又云兩足跟相對坐上兩足趾相向外扒兩膝頭柱席兩向外扒使急始長舒兩手兩向取勢一一皆急三七去五勞腰脊膝疼傷冷脾痹又云跪一足坐上兩手䏶內卷足努踹向下身外扒一時取勢向心來去二七左右亦然去五勞足臂疼悶膝冷陰冷又云坐抱兩膝下去三里二寸急抱向身極勢足兩向身起欲似胡床住勢還坐上下來去二七去腰足臂內虛勞膀胱冷又云外轉兩腳平踏向陰端急蹙將兩手捧膝頭兩向極勢捺之二七畢身側兩向取勢二七前後努腰去心勞痔病膝頭冷調和未損盡時須言語不瞋喜偏跏兩手抱膝頭努膝向外身手膝各兩極勢挽之三七左右亦然頭須左右仰扒去背急臂勞又云兩足相踏令足掌合也蹙足極勢兩手長舒掌相向腦項之後兼至踏相挽向頭膊手向席來去七仰手七合手七始兩手角上極勢腰正足不動去五勞七傷臍下冷暖不和數用之常和調適又云一足踏地一足屈膝兩手抱犢鼻下急挽向身極勢左右換易四七去五勞三里氣不下又蛇行氣曲臥以正身復起踞閉目隨氣所在不息少食裁通腸服氣為食以舐為漿春出冬藏不財不養以治五勞七傷又云蝦蟆行氣正動搖兩臂不息十二通以治五勞七傷水腫之病又云外轉兩足十偏引去心腹諸勞內轉兩足十偏引去心五息止去身一切諸勞疾疹出第三卷中廣濟療五勞七傷六極八風十二痹消渴心下積聚使人身體潤服之多情性補益養精方生乾地黃十二分天門冬十分去心乾薑六分菟絲十分酒漬二宿焙乾別搗石斛八分當歸六分白朮六分甘草八分炙肉蓯蓉七分芍藥六分人參八分玄參六分麥門冬十分去心大黃八分牛膝六分紫菀六分茯苓八分防風六分杏仁八分去皮尖熬麻子仁八分地骨皮六分椒三分去目汗上二十二味搗篩蜜和丸如梧子空腹酒下二十丸日再服漸加至三十丸忌鯉魚海藻菘菜桃李雀肉大酢蕪荑等崔氏腎瀝湯療五勞六極八風十二痹補諸不足方豬腎一具去脂膜附子四分炮芎藭四分牡丹四分桂心四分茯苓八分乾地黃六分人參四分桑螵蛸八分炙磁石八分研如粉牡荊子八分當歸四分黃耆八分菖蒲八分上十四味切以水一斗七升煮腎取一斗一升去腎納藥煎取四升分四服忌羊肉餳冷水酢生蔥蕪荑胡荽古今録驗同又治丈夫五勞七傷百病無不補之乾漆散方乾漆八兩熬令斷煙蓯蓉八兩石斛八分枸杞子一升乾地黃十兩遠志皮五兩續斷五兩菟絲子五兩天雄三兩炮桂心三兩上十味搗篩為散每旦服一匕暮一匕酒飲皆得忌豬肉生蔥蕪荑冷水又七味乾漆散方韋都水服不逾月光悅倍常療虛羸無比乾漆三兩熬煙斷乾地黃八兩芍藥二兩蓯蓉二兩五味子二兩食茱萸四兩枸杞子四兩上藥搗篩為散酒服方寸匕漸加至二匕日二服以知為度忌蕪荑又五落散主五勞六極七傷八不足裡急