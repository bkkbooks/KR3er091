body:
  text: 卷第九咳嗽方三首病源咳嗽者由肺感於寒微者成咳嗽也肺主氣合於皮毛邪之初傷先客皮毛故肺先受之五臟與六腑為表裡皆稟氣於肺以四時更王五臟六腑皆有咳嗽各以其時感於寒而受病故以咳嗽形證不同五臟之咳者乘秋則肺先受之肺咳之狀咳而喘息有音聲甚則唾血乘夏則心先受之心咳之狀咳則心痛喉中介介如哽甚則咽腫喉痹乘春則肝先受之肝咳之狀咳則兩一作左脅下痛甚則不可轉側兩胠下滿乘季夏則脾先受之脾咳之狀咳則右脅下痛陰引於肩背甚則不可以動動則咳劇乘冬則腎先受之腎咳之狀咳則腰背相引而痛甚則咳逆此五臟之咳也五臟咳久不已傳與六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出肝咳不已則膽受之膽咳之狀咳而嘔膽汁肺咳不已則大腸受之大腸咳之狀咳而遺糞心咳不已則小腸受之小腸咳之狀咳而失氣氣與咳俱出腎咳不已則膀胱受之膀胱咳之狀咳而遺溺久咳不已則三焦受之三焦咳之狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也又有十種咳一曰風咳欲語因咳言不得終是也二曰寒咳飲冷食寒注入於胃從肺脈上氣內外合因之而咳是也三曰支咳心下硬滿咳則引四肢痛其脈反遲是也四曰肝咳咳而引脅下痛是也五曰心咳咳而唾血引手少陰是也六曰脾咳咳而涎出續續不止下引少腹是也七曰肺咳咳引頸項而唾涎沫是也八曰腎咳咳則耳聾無所聞引腰並臍中是也九曰膽咳咳而引頭痛口苦是也十曰厥陰咳咳而引舌本是也診其右手寸口氣口以前脈手陽明經也其脈浮則為陽實陽實者病苦腹滿善喘咳脈微大為肝痹咳引少腹咳嗽脈浮大者生沉小伏匿者死又云脈浮直者生沉硬者死咳且嘔腹脹且泄其脈弦弦欲絕者死咳脫形發熱脈小硬急者死咳且羸瘦絡脈大硬者死咳而尿血羸瘦脈大者死出第十四卷中小品療咳嗽紫菀七味湯方紫菀半兩五味子一兩桂心二兩麻黃四兩去節杏仁七十枚去皮尖兩仁碎乾薑四兩甘草二兩炙上藥切以水九升煎取二升半去滓溫服七合日三服忌海藻菘菜生蔥䔉面腥膩經心錄古今錄驗同出第二卷中延年紫菀飲主咳嗽方紫菀貝母茯苓杏仁去皮尖兩仁者生薑各三兩人參二兩橘皮一兩去脈上七味切以水五升煮取一升五合去滓分溫三服如人行七里更進一服忌蔥蒜面酢張文仲處古今錄驗同出第五卷中古今錄驗天門冬煎療咳嗽方天門冬六兩去心杏仁三升去雙仁皮尖碎椒三升熬令汗出桂心厚朴炙杜仲苦參各三兩附子六兩炮乾薑六兩烏頭二枚炮人參六兩蜈蚣一枚去頭足炙上十二味別搗杏仁其餘者合搗下篩以五斤膠飴和搗千杵服如大棗一枚日三忌冷水豬肉生蔥鯉魚出第九卷中五嗽方四首深師療五嗽一曰上氣嗽二曰飲嗽三曰燥嗽四曰冷嗽五曰邪嗽四滿丸方乾薑桂心躑躅花芎藭紫菀芫花根皮各二分人參細辛甘草炙半夏洗鬼督郵各一分蜈蚣一枚去頭足炙上十二味搗篩蜜和服如大豆五丸米飲下日三不知加之至七八丸服此丸無不瘥方秘不傳忌羊肉餳生蔥生菜海藻菘菜又方特生礜石一兩泥包燒半日款冬花一兩豉三百枚搗千杵巴豆十六枚去皮心熬別搗如脂上四味搗篩蜜和服如大豆米飲下二丸不知稍增至四五丸忌野豬肉蘆筍古今錄驗療三十年咳並出第十八卷中備急華佗五嗽丸方皂莢炙乾薑桂心上三味等分搗篩蜜和丸如梧子服三丸酒飲俱得日三忌蔥出第三卷中古今錄驗四滿丸療五嗽一為氣嗽二為痹嗽三為燥嗽四為邪嗽五為冷嗽悉療之方蜈蚣二枚炙芫花根五分熬躑躅花四分乾薑芎藭桂心各四分人參細辛各二分上八味搗篩蜜和為丸一服米飲下五丸如大豆許日三稍加至十丸忌生蔥生菜出第十九卷中新久咳方三首深師療新久咳嗽唾膿血連年不瘥晝夜肩息麻黃湯方麻黃去節四兩一方二兩桂心二兩甘草二兩大棗十四枚擘上四味切以水九升煮取三升去滓分溫三服日三數用有效忌海藻菘菜生蔥等物又療新久咳嗽前胡丸方前胡六分烏頭炮二枚桔梗乾薑各二分桂心八分蜀椒八分汗上六味搗篩蜜和如櫻桃大一丸含化稍稍咽之日三又療久咳晝夜不得臥咽中水雞聲欲死者療之良忌豬肉冷水生蔥並出第十八卷中千金療新久咳嗽款冬花煎方款冬花乾薑為末芫花根熟熬為末各二兩五味子紫菀各三兩上五味先以水一斗煮三味取三升半去滓納芫花乾薑末加白蜜三升合投湯中令調於銅器中微火煎令如飴可一升半服棗核大含之日三服曾數用甚良忌蒜面腥膩深師同出第十八卷中卒咳嗽方八首肘後療卒咳嗽方釜月下土一分豉七分熬上二味熬搗蜜丸如梧子大米飲服十四丸曾用有驗又方飴糖六分乾薑六分末豉一兩上三味先以水二升煮豉三兩沸去滓納飴糖消後納乾薑末分為三服又方生薑汁百部根汁上二味合煎服二合並出第一卷中張文仲卒咳方百部根四兩上一味酒一斗煮之再宿火溫服一升日再服之效肘後同又方溫清酒一升驢膏一升上服之亦療上氣並出第三卷中備急卒咳嗽方芫花二兩熬上一味水二升煮四沸去滓納白糖一斤服如棗大勿食鹹酸物亦療久咳肘後同又方爐中取鉛屑一分桂心二兩皂莢二兩去皮子炙上三味搗篩蜜和丸如梧子大人米飲下服十五丸小兒五丸日二服忌生蔥肘後同出第三卷中深師療卒咳逆上氣肩息晝夜不止欲絕麻黃湯方麻黃去節細辛各二兩甘草半兩炙桃仁二十枚去皮尖及兩仁者研一本作杏仁上四味切以水七升煮取三升去滓分三服秘方忌海藻菘菜生菜出第十八卷中暴熱咳方二首千金療暴熱咳杏仁飲方杏仁四十枚去皮尖兩仁炒研柴胡四兩紫蘇子一升橘皮一兩上四味切水一斗煮取三升分三服常服飲之不妨本方無紫蘇子有干棗出第十八卷中延年貝母煎主暴熱咳方貝母三兩紫菀五味子百部根杏仁去皮尖兩仁者研甘草炙各二兩上六味切以水五升煮取二升去滓和地黃汁三升生麥門冬汁一升白蜜五合好酥二合生薑汁一合又先取地黃麥門冬及湯汁和煎減半納酥薑汁攪不得停手又減半納蜜煎如稠糖煎成取如棗大含咽之日三夜再服忌海藻菘菜咸物蔣孝璋處出第五卷中冷咳方三首深師療冷咳逆氣乾薑湯方乾薑四兩紫菀一兩杏仁七十枚去皮尖雙仁切麻黃去節四兩桂心甘草炙各二兩五味子一兩上七味切水八升煮取二升七合分三服平體人加射干一兩代乾薑忌海藻菘菜生蔥等又療冷飲咳芫花煎方芫花二兩乾薑二兩白蜜二升上三味搗篩二味納蜜中攪令相和微火煎令如糜服如棗核一枚日三夜一欲痢者多服千金主新久咳並出第十八卷中千金療冷嗽方乾薑三兩末膠飴一斤上二味攪令和調蒸五升米下令熟以棗大含化稍稍咽之日五夜三出第十八卷中咳失聲方四首廣濟療咽喉乾燥咳嗽語無聲音桂心散方桂心三兩杏仁三兩去皮尖雙仁熬搗上二味搗篩為散以蜜和綿裹如棗大含之咽汁日三夜二忌生蔥油膩出第二卷中古今錄驗療暴中冷傷寒鼻塞喘咳喉中瘂塞失音聲者方取芫花根一虎口切曝上一味令病人以薦自縈就里春芫花根令飛揚入其七孔中當眼淚出口鼻皆羅剌郎達切畢畢耳勿住令芫花根盡則止病必於此瘥又療忽暴咳失聲語不出杏仁煎方杏仁一升去皮尖兩仁者熬通草四兩紫菀五味子各三兩貝母四兩桑白皮五兩蜜一升砂糖一升生薑汁一升上九味切以水九升煮五味取三升去滓納杏仁脂薑汁蜜糖和攪微火上煎取四升初服三合日再夜一稍稍加之忌䔉面炙肉等千金同又通聲膏方五味子款冬花通草各三兩人參二兩杏仁一升去尖皮兩仁者熬桂心細辛青竹皮菖蒲酪酥各二兩棗膏三升白蜜一升薑汁一升上十三味細切以水五升微火煎三上三下去滓納薑汁棗膏煎令調和酒服如棗二枚忌生菜生蔥羊肉餳千金用蘇五升棗膏蜜各二升余同並出第十九卷中氣嗽方八首病源夫肺主氣候皮毛人有運動勞役其氣外泄腠理則開因乘風取涼冷氣卒傷於肺即發成嗽故為暴氣嗽其狀嗽甚而少涎沫出第十四卷中古今錄驗療患氣嗽並下焦冷結方後四方同療姚大夫別錄要方紫菀貝母百部根款冬花五味子半夏洗各五分射干十分芫花根皮四分切熬令焦乾薑橘皮各四分杏仁八分去皮尖雙仁者熬蘇子四分白石英八分研鍾乳十分研上十四味搗篩以蜜和為丸如梧桐子酒服十丸日再稍加至三十丸忌羊肉餳諸生冷等物又方乾地黃桂心山茱萸五味子各三兩茯苓四兩蓯蓉丹參澤瀉甘草炙鍾乳研各二兩上十味搗篩蜜和酒服十五丸如梧子大日增至三十丸忌海藻生蔥醋物菘菜蕪荑又酒方丹參乾地黃各五兩芎藭石斛牛膝黃耆白朮蓯蓉各四兩防風獨活附子炮秦艽桂心乾薑各三兩鍾乳六分研上十五味切以酒三斗浸七日初服二合日再稍稍加之忌食桃李雀肉生蔥豬肉冷水蕪荑又丸方乾地黃四兩防風蓯蓉澤瀉各三兩山茱萸丹參五味子茯神各二兩一方作茯苓桂心一兩半上九味搗篩蜜和丸如梧子酒服二十丸日再稍加至三十丸忌醋物生蔥蕪荑並出第十九卷中延年杏仁煎主氣嗽方好杏仁一升去皮尖兩仁者酥熬糖一合蜜五合酥一合生薑汁一合貝母八合別篩末蘇子汁一升以七小合蘇子研水和濾取汁上七味先搗杏仁如泥納後六味藥合煎如稠糖取如棗大含咽之日三但嗽發細細含之忌豬肉蔣孝璋處又療氣嗽煎方貝母紫菀百部根炙款冬花甘草炙各三兩桂心二兩上六味切以水六升煮取一升五合去滓納後藥生地黃汁三升生麥門冬汁五合生薑汁五合白蜜五合酥五合白糖五合杏仁三合去皮尖雙仁熬搗作膏煎如糖一服一匙日三稍加至三匙嗽定則停忌海藻生蔥菘菜蕪荑䔉醋鹹食豬肉等又療氣嗽杏仁煎方杏仁五合去皮尖搗研生薑汁二合酥一合蜜三合上四味以水三升研杏仁取汁納銅鐺中煎攪可減半納薑汁煎如稀糖納酥蜜煎令如稠糖一服一匙日三服夜一服稍加至兩匙忌豬肉又杏仁煎主氣嗽方杏仁一升去尖皮兩仁者研濾取汁酥三合白蜜三合上三味以水三升研濾杏仁令味盡納銅鐺中煎可減半納酥蜜煎二十沸納貝母末四分紫菀末三分甘草炙末一分更煎攪如稀糖一服一匙日三夜一服以咳嗽止為度大驗忌䔉豬肉並出第五卷中呷咳方二首病源呷咳者猶是咳嗽也其胸膈痰飲多者咳則氣動於痰上搏咽喉之間痰氣相擊隨咳動息呀呷有聲謂之呷咳其與咳嗽大體雖同至於投藥則應加消痰破飲之物以此為異耳出第十四卷中崔氏三十年以來呷咳並療之方莨菪子新者南青木香真者薰黃無石臭者上三味等分搗篩為散以羊脂塗青紙一張以散藥著紙上卷裹之平旦空腹燒裹頭令煙出吸取十咽日中時復吸十咽日晚後吸十咽七日內禁生冷醋滑三日則瘥出第六卷中古今錄驗療呷咳書墨丸方大神驗萬年縣令席君懿送書墨二分甘遂二分葶藶子二分熬前胡五分大黃五分巴豆二分去心皮熬上六味搗篩為散巴豆葶藶別細研蜜和丸如梧子以白蜜粥清飲旦空腹服三丸人弱服二丸則利水或吐三日以後更一服還如上法不過三服愈療三十年咳如利不止者以冷白飲止之吐利止後食禁生冷醋滑豬魚雞面油酒冷水䔉蘆筍此藥宜春夏服之有毒之藥寧從少起廣濟療瘕嗽上氣喉中作水雞鳴出第十九卷中熏咳法六首千金療咳熏法細熟艾薄薄布紙上廣四寸復以石硫黃末薄布艾上務令調勻以荻一枝如紙長卷之作十枚先以火燒纏下去荻其煙從荻孔中出口吸取煙咽之取吐止明旦復熏之昨日余者後日復熏之三日止自然瘥惟得食白糜余皆禁之古今錄驗同又法薰黃研令細一兩以蠟蠟紙並上熏黃令與蠟相入調勻卷之如前法燒之亦如上法日一二止以吐為度七日將息後羊肉羹補之又法爛青布廣四寸上布艾艾上又布青礬石末礬上布少熏黃末又布少鹽又布少豉末急卷之燒令著納燥罐中以紙矇頭作小孔以口含取煙咽之以吐為度悶時復息煙盡止日一二用三卷用不盡瘥三七日慎油膩並出第十八卷中崔氏療久咳不瘥熏法款冬花上一味每旦取如雞子許用少許蜜拌花使潤納一升鐵鐺中又用一瓷碗合鐺碗底鑽一孔孔內插一小竹筒無竹葦亦得其筒稍長作碗鐺相合及插筒處皆面埿之勿令漏煙氣鐺下著炭火少時款冬煙自從筒中出則口含筒吸取煙咽之如覺心中少悶須暫舉頭即將指頭捻筒頭勿使漏煙氣吸菸使盡止凡如是三日一度為之待至六日則飽食羊肉餺飥一頓則永瘥出第六卷中古今錄驗療咳欱呼合切下同煙法鍾乳研白石英研人參丹參研雄黃各七分研水銀二分研烏羊腎脂一具淨紙十張上八味各搗篩為末以水銀投藥裹細研使入諸藥羊脂熬取置紙中令均平使厚一分散藥令周遍剪紙一張作三分瘦弱婦人五日用半寸熏未服藥前齋五日服藥後一百日忌五辛酒肉此一劑得療五十人上氣悉皆愈忌生血物又療咳腹脹氣上不得臥身體水腫長孫振熏法蠟紙一張熟艾薄布遍紙上薰黃末三分款冬花末二分上三味並遍布艾上著一葦筒卷之寸別以繩系之燒下頭欱煙咽之亦可三十咽欱訖則瘥欱盡三劑一百日斷鹽醋日一每欱三寸三日盡一劑出第十九卷中療咳方一十四首深師療咳方巴豆炮去殼勿傷肉白飲吞下初日飲服二枚二日三枚良忌野豬肉蘆筍千金同又方蜀椒一合汗去目杏仁去皮尖半合熬豉半合款冬花小半合上四味搗蜜和為丸晚間不食含一丸如彈丸大含一丸則知效驗十年者五六日知良並出第十八卷中小品療咳生薑五味子湯方五味子五合生薑八兩紫菀一兩半夏二兩洗吳茱萸一兩款冬花半兩細辛一兩附子一枚炮茯苓四兩甘草二兩炙桂心一兩上十一味切以水一斗煮取五升分溫三服老人可服五合忌海藻菘菜豬肉冷水羊肉餳生菜醋物生蔥古今錄驗同出第一卷中備急療咳方杏仁半斤去尖皮兩仁者熬紫菀二兩上二味先研杏仁取汁使盡細切紫菀更煎少濃去滓納蜜使稠細細飲之立定出第三卷中崔氏療咳方杏仁一升去尖皮兩仁熬蘇子汁五合生薑汁五合煎蜜五合煎令沫盡上四味先搗杏仁作脂訖納諸藥和煎攪調三四沸藥成含咽如棗大日三四忌䔉面出第六卷中延年紫菀飲主咳方紫菀一兩半貝母二兩人參一兩橘皮半兩生薑一兩杏仁一兩半去皮尖兩仁者研上六味切以水二升五合煮取八合分三服欲再服亦得慎咸醋䔉面蔣孝璋處出第五卷中必效療咳方棗一百二十顆去核豉一百粒桃仁一百二十顆去皮尖兩仁者熬令色黃上三味合搗為丸如棗大含之無不瘥又方雞子白皮十四枚熬令黃麻黃三兩去節上二味搗成散每服方寸匕日二食後飲下之無所忌又方麻黃二兩去節紫菀二兩貝母三兩去心上三味搗篩蜜和丸如杏核綿裹含稍稍咽汁盡更作日四五度又方杏仁一百二十枚去皮尖熬豉一百枚熬令乾干棗四十枚去核上三味合搗如泥丸如杏核含咽令盡日七八度盡更作出第一卷中古今錄驗百部湯療咳晝夜不得眠兩眼突出方百部半兩生薑半斤細辛三兩貝母三兩甘草二兩炙杏仁四兩去皮尖兩仁者紫菀三兩桂心二兩白朮二兩麻黃六兩去節五味子二兩上十一味切以水一斗二升煮取三升分三服忌桃李雀肉海藻菘菜生菜千金無杏仁紫菀余同又療咳吸散方細辛紫菀天雄炮石膏款冬花鍾乳各二分上六味搗篩作散如大豆七聚以小竹筒吸服日二不得食生魚醬醋生菜但食糜七日咳愈乃止若大豆聚不知亦小益勿大多甚良忌生菜冷水豬肉千金同又療咳麻黃五味子湯方麻黃四兩去節五味子五合甘草二兩炙半夏二兩洗乾薑五合細辛二兩桂心六兩杏仁三兩去皮尖兩仁者上八味切以水一斗煮取四升去滓分溫五服日三夜二忌海藻菘菜羊肉餳生菜生蔥又療咳羊肺湯太醫史脫方款冬花一兩紫菀乾薑細辛各一兩桂心甘草炙各半兩五味子半斤白前食茱萸各半兩羊肺一枚細切上十味切以水八升合煮取三升去滓一服三合日三禁食鹽䔉生菜海藻菘菜生蔥並出第十九卷中積年久咳方二十一首病源肺感於寒微者則成咳嗽久咳嗽是連滯歲月經久不瘥者也凡五臟皆有咳嗽不已則各傳其腑諸久咳不已三焦受之其狀咳而腹滿不欲食飲此皆寒氣聚於胃而關於肺使人多涕唾而變面浮腫氣逆故也出第十四卷中深師療五臟咳積年劇則上氣不得臥喉中如有物醫所不療五愈丸方桂心細辛乾薑白前甘草炙各三分蜀椒汗代赭通草款冬花芫花熬各一分伏龍肝紫菀牡蠣各二分熬上十三味搗篩以飴糖和之搗令調和如棗核一丸含之稍稍咽其汁盡復含令胸中熱為候不知以意加之其久病重者晝夜二十餘丸若一歲咳者一月愈十歲咳者百日愈忌海藻菘菜生蔥生菜等又療三十年咳芫花煎方芫花二兩乾薑三兩末之上二味以水五升煮芫花取三升去滓納薑末加蜜一升合煎之如糜一服如半棗日三不知加之一方不用幹姜取芫花汁蜜和煎令可丸服如梧子三丸日三又療三十年咳氣奔上欲死醫所不療海藻丸褚仲堪方海藻三分麥門冬五分去心昆布乾薑細辛文蛤桂心蜀椒汗各二分上八味搗篩蜜和服如杏仁許夜臥一丸著舌上稍稍咽汁盡更著一丸忌生蔥生菜等又療三十年咳嗽上氣短氣久冷五臟客熱四肢煩疼食飽則劇時有發甚不能行步夜不得臥多夢香豉丸香豉四分熬杏仁二分去尖皮兩仁熬紫菀三分桂心三分甘草八分炙乾薑二分細辛三分吳茱萸二分上八味搗篩蜜和服如梧子四丸日三不知增之能含嚼咽汁亦佳忌海藻菘菜生蔥生菜又療三十年上氣咳嗽款冬花丸方款冬花六分桂心四分紫菀六分杏仁四分去尖皮兩仁熬附子二兩炮藜蘆四分乾薑六分甘草七分炙細辛六分防風八分芫花六分熬蜀椒八分汗野葛四分去心上十三味搗篩蜜和丸如梧子服三丸稍加日三服忌生蔥辛咸醋豬肉冷水海藻菘菜生菜貍肉等一方十四味此方忌酢恐有茯苓又療三十年咳逆上氣咽喉如水雞鳴或唾膿血師藥不能療者方香豉三升熬蜀椒一升汗乾薑一斤豬肪三斤上三味搗篩納肪中以水五升合豉等物熟煎每以二合服之大效又療三十年咳嗽七星散方蜀椒汗桑根白皮芫花根皮款冬花紫菀代赭細辛伏龍肝各一兩上八味搗為散取作七星聚聚如扁豆大以竹筒口當藥上一一吸咽之令藥入腹中先食訖即服藥日三服後三日不瘥復作七聚以一臠肉炙令熟以轉展藥聚上令藥悉在炙肉中仰臥㕮咀炙肉汁令藥力歆歆皆毒螫咽中藥力盡吞肉前後所療皆不至食肉便愈若不愈復作如初法必愈乃止羊牛鹿肉皆可用勿用豬肉忌生菜千金延年不用椒與芫花根余同並出第十八卷中千金療三十年咳嗽方蜜一斤生薑二斤取汁上二味先秤銅銚知斤兩訖納蜜復秤知斤兩次納薑汁以微火煎令薑汁盡惟有蜜斤兩在止旦服如棗大含一丸日三禁一切雜食又療三十年咳方紫菀二兩款冬花三兩上二味為散先食飲服一錢匕日三七日愈張文仲古今錄驗深師同又療三十年咳方百部根三斤上一味搗取汁煎之如飴以溫粥飲服方寸匕日三服深師方白蜜二升更煎五六沸服三合有驗又療久咳不瘥方兔矢四十九枚胡桐律一分硇砂三分上三味搗篩蜜和為丸服如梧子三丸令吐冷物盡則瘥並出第十八卷中延年療久咳不瘥方豬腎一具去脂膜椒二十八顆開口者上二味取腎一顆上作十四孔取椒納孔中兩腎總著二十八顆了以水緩煮令熟割破細切啖之令盡有驗張文仲處出第五卷中崔氏療積年咳喉中啞聲方芫花根白皮六分切熬令焦黑貝母十二分款冬花六分百部根八分切熬杏仁十分去尖皮熬皂莢四分去皮子炙五味子六分蜈蚣半枚炙桑白皮六分麻黃八分去節紫菀八分上十一味搗篩蜜和為丸如梧子大一服五丸日再服加至十五丸煮棗汁送之出第六卷中必效療咳嗽積年不瘥者胸膈干痛不利方紫菀一大兩杏仁四十九枚去兩仁尖皮熬酥一大合蜜一大合上四味紫菀及杏仁各別搗先煮酥蜜攪令和納紫菀杏仁研破塊煎十餘沸藥成出瓷器中每日空腹服一彈丸細細含咽之忌酒面及豬肉等凌空道士得此方傳效不復可言又方莨菪二分以水淘去浮者水煮令牙出焙乾炒令黃黑色酥一雞子許大棗七枚上三味鐺中煎令酥盡取棗去皮食之日二又方生薑五兩餳半大升上二味取姜刮去皮如筭子切之置餳中微火煎姜使熟食使盡則瘥段侍御用之極效又方款冬花上一味和蜜火燒含取煙咽之三數度則瘥又方取莨菪子三指撮吞唾咽之日五六度光祿李丞自服之極神效並出第一卷中古今錄驗療人三十年寒冷咳逆上氣麻黃湯方麻黃八分去節蜀椒四分汗細辛三分藁本二分杏仁五十枚去皮尖兩仁者碎上五味切以水七升煮取三升分為三服日三忌生菜又許明療人久咳欲死方取厚榆皮削如指大去黑克令如鋸長尺余納喉中頻出入當吐膿血則愈又香豉丸療上氣三十年咳氣久寒冷痹脾中客熱變為冷方食茱萸一兩甘草一兩香豉二十枚細辛杏仁去尖皮兩仁者熬各一兩紫菀二兩上六味搗篩為末別搗杏仁如膏乃納末攪令勻蜜和丸如梧子服三丸日三不知增之至五丸暮臥時含十丸著咽喉中咽之忌海藻菘菜生菜出第十九卷中久咳坐臥不得方二首集驗療久患氣嗽發時奔喘坐臥不得並喉里呀聲氣欲絕方麻黃去節杏仁去尖皮兩仁者碎紫菀各三兩柴胡橘皮各四兩上五味切以水六升煮取二升半去滓分三服一劑不瘥頻兩三劑從來用甚驗張文仲同出第四卷中備急療久咳奔喘坐臥不得並喉里呀聲氣絕方麻黃去節干蘇葉橘皮各三兩柴胡四兩杏仁四兩去尖皮兩仁者碎上五味切以水六升煮取二升半分三服服兩劑必瘥甚效張文仲同出第三卷中咳嗽短氣方七首病源肺主於氣候於皮毛氣虛為微寒客於皮毛傷於肺氣不足則成咳嗽夫氣得溫則宜和得寒則痞澀虛則氣不足而為寒所迫並聚於肺間不得宣發故令咳而短氣也出第十四卷中深師療傷中咳嗽短氣腸中痛流飲厥逆宿食不消化寒熱邪癖五內不調肉蓯蓉湯方肉蓯蓉五兩乾地黃四兩大棗二十枚擘烏頭一兩炮甘草炙桂心紫菀五味子各二兩生薑石膏碎綿裹麥門冬去心各三兩上十一味切以水一斗五升煮取七升去滓分為七服日四夜三一方用大棗五十枚水一斗二升煮取九升忌海藻生蔥菘菜蕪荑豬肉冷水又療上氣咽喉窒塞短氣不得臥倚壁而息腰背苦痛支脅滿不能食面色萎黃貝母飲方貝母石膏綿裹碎桂心麻黃去節甘草炙各二兩杏仁三十枚去尖皮兩仁者生薑五兩半夏五兩洗上八味切以水一斗煮取三升去滓分三服忌海藻菘菜羊肉生蔥餳等又療咳而不利胸中痞而短氣心中時悸四肢不欲動手足煩不欲食肩背痛時惡寒海藻湯方海藻四兩茯苓六兩半夏五合洗五味子五合細辛二兩杏仁五十枚去尖皮兩仁者上六味切以水一斗煮取三升分三服忌羊肉餳生蔥醋物一方有生薑一兩千金同出第十八卷中古今錄驗五味子湯療逆氣咳嗽胸膈中寒熱短氣不足方五味子一兩前胡三兩紫菀甘草炙桂心生薑各二兩棗三十枚擘山茱萸三兩上八味切以水一斗煮取七升絞去滓服一升日三夜三忌生蔥海藻菘菜廣濟方用橘皮不用茱萸又胡椒理中丸療咳嗽逆氣不能飲食短氣方胡椒蓽茇乾薑款冬花甘草炙橘皮高良薑細辛各四兩白朮五兩上九味搗篩蜜和丸如梧子一服五丸日再忌桃李雀肉生菜海藻菘菜又瀉肺湯療咳逆短氣方人參三分生薑四分半夏五分洗甘草四分炙橘皮十二分竹葉二兩上六味切以水六升煮取二升分三服此方亦療霍亂忌羊肉餳海藻菘菜又療咳嗽及短氣脅痛姜椒湯方生薑椒去目汗各一兩上二味切以水五升煮取三升每服一合並出第十九卷中九種咳嗽方一首千金九種氣咳嗽欲死百病方乾薑二分半夏洗細辛紫菀吳茱萸芫花茯苓甘遂防葵甘草炙人參烏頭炮大黃葶藶子熬巴豆去皮心熬厚朴炙杏仁去皮尖兩仁者熬各一分五味子遠志去心枳實炙皂角去皮子炙當歸桂心前胡菖蒲大戟蜀椒各半分白薇三分上二十八味搗合蜜丸先食服如梧子二丸日三以知為度不知增之忌海藻菘菜羊肉餳生蔥酢物野豬肉蘆筍一方無巴豆有䗪蟲半分恐非出第十八卷中咳逆及厥逆飲咳方七首病源咳逆者是咳嗽而氣逆上也氣為陽流行腑臟宣發腠理而氣肺之所主也咳病由肺虛感微寒所成寒搏於氣氣不得宣胃逆聚還肺肺則脹滿氣逆不下故為咳逆其狀咳而胸滿氣逆膊背痛汗出尻陰股膝踹䯒足皆痛也其湯熨針石別有正方補養宣導今附於後養生方導引法云先以鼻納氣乃閉口咳還復以鼻納氣咳則愈向晨去枕正偃臥伸臂脛瞑目閉口無息極脹腹兩足再息頃間吸腹仰兩足倍拳欲自微息定復為之春三夏五秋七冬九盪滌五臟津潤六腑又云還向反望側望不息七通療咳逆胸中病寒熱出第十四卷中深師療咳嗽短氣不得息發熱胸苦滿不得飲食五味子湯方五味子二兩桂心甘草炙細辛各一兩乾薑三兩紫菀二兩一方一兩大棗二十枚擘麻黃二兩去節上八味切以水八升煮取三升分三服無干姜生薑亦得忌海藻菘菜生菜生蔥出第十八卷中千金竹皮湯主咳逆下血不息方生竹皮三兩紫菀二兩飴糖一斤生地黃汁一升上四味切以水六升煮取三升分三服忌蕪荑深師同又療大逆上氣喉咽不利止逆下氣麥門冬湯主之方麥門冬二升去心半夏一升洗人參甘草各二兩炙粳米三合大棗十四枚上六味切以水一斗二升煮取六升服半升日三夜一忌羊肉餳海藻菘菜此本仲景傷寒論方並出第十八卷中古今錄驗療厥逆臟氣有餘寒氣虛勞憂氣驚氣其人善悸胸中或寒上下無常多悲傷流四肢臍四邊常有核遊腫大便不利遊氣湯方厚朴四兩炙人參甘草炙牡蠣各二兩熬茯苓四兩桂心半夏各一兩洗梔子四枚生薑八兩黃芩三兩上十味切以水九升煮取三升半去滓分服七合日三夜再服若腹痛去黃芩加芍藥三兩良驗忌海藻菘菜生蔥羊肉餳醋物等又療咳逆上氣丸方乾薑四兩桂心款冬花各一兩附子四枚炮五味子二兩巴豆六十枚老者三十枚去皮心熬上六味先搗上五味下篩別搗巴豆如膏納藥末以蜜和丸如麻子以一丸著牙上㕮咀常暮臥時服亦可日三服忌生蔥豬肉蘆筍又小胡椒丸療寒冷咳逆胸中有冷咽中如有物狀吐之不出方胡椒五分乾薑六分款冬花三分上三味搗篩蜜和丸如梧子大米飲服三丸日再服以知為度禁如前法並出第十九卷中十咳方六首千金問曰咳病有十何謂也師曰有風咳有寒咳有支咳有肝咳有心咳有脾咳有肺咳有腎咳有膽咳有厥陰咳問曰十咳之證何以為異師曰欲語因咳言不得終謂之風咳飲冷食寒因之而咳謂之寒咳心下堅滿咳則支痛其脈反遲謂之支咳咳引脅下痛謂之肝咳咳而唾血引手少陰謂之心咳咳而涎出續續不止下引少腹謂之脾咳咳引頸項而唾涎沫謂之肺咳咳則耳無所聞引腰並臍中謂之腎咳咳而引頭痛口苦謂之膽咳咳而引舌本謂之厥陰咳夫風咳者下之寒咳支咳肝咳灸足太衝心咳灸刺手神門脾咳灸足太白肺咳灸手太泉腎咳灸足太谿膽咳灸足陽陵泉厥陰咳灸手太陵留飲咳者其人咳不得臥引項上痛咳者時如小兒瘛瘲狀夫久咳為水咳而時發熱脈在九菽一云卒弦者非虛也此為胸中寒實所致也當吐之咳家其脈弦欲行吐藥當相人強弱無熱乃可吐耳通按太泉疑太淵又咳家其人脈弦為有水可與十棗湯下之不能臥坐者陰不受邪故也又夫有支飲家咳煩胸中痛者不卒死至一百日一歲與十棗湯方芫花甘遂大戟並熬等分上三味搗下篩以水一升五合煮大棗十枚取八合絞去滓納藥末強人取重一錢羸人半錢匕頓服之平旦服而不下者明旦更益藥半錢下後自補養古今錄驗同此方仲景傷寒論方又咳而引脅下痛者亦十棗湯主之用前方又夫酒客咳者必致吐血此坐久極飲過度所致也其脈沉者不可發汗久咳數歲其脈弱者可療實大數者死其脈虛者必苦冒也其人本有支飲在胸中故也治屬飲家土氣汗出而咳屬飲家咳而小便利若失溺不可發汗發汗出則厥逆冷又咳逆倚息不得臥小青龍湯主之麻黃去節芍藥細辛桂心乾薑甘草炙各三兩五味子半升半夏半升洗上八味切以水一斗先煮麻黃減二升去沫乃納諸藥煮得三升去滓服一升若渴者去半夏加栝蔞根三兩微利者去麻黃加蕘花如雞子大熬黃若食飲噎者去麻黃加附子一枚炮去皮六片破小便不利少腹滿者去麻黃加茯苓四兩若喘去麻黃加杏仁半升去尖皮兩仁者熬芫花不主利麻黃止喘今語反之疑非仲景意加減忌海藻菘菜生蔥生菜羊肉餳此本仲景傷寒論方青龍下已多唾口燥寸脈沉而尺脈微手足厥逆氣從少腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時覆冒者可與茯苓桂心甘草五味子等湯主之治其氣衝方茯苓四兩桂心一兩甘草三兩炙五味子半升上四味切以水八升煮取三升去滓溫分三服忌海藻菘菜生蔥以千金校之亦脫此方今於仲景方錄附之沖氣則抵而反更咳胸滿者與茯苓甘草五味子去桂心加乾薑細辛以治其咳滿方茯苓四兩甘草炙乾薑細辛各三兩五味子半升上五味切以水八升煮取三升去滓溫服一升日三忌海藻菘菜生菜醋等物咳滿即止而復更渴沖氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲法當冒冒者必嘔嘔者復納半夏以去其水方茯苓四兩甘草炙乾薑細辛各三兩五味子半升半夏半升洗上六味切以水八升煮取三升去滓溫服一升日三忌海藻菘菜生菜羊肉餳酢等水去嘔則止其人形腫可納麻黃以其人遂痹故不納麻黃乃納杏仁也若逆而納麻黃者其人必厥所以然者以其人血虛麻黃髮其陽故也方茯苓四兩乾薑三兩細辛三兩五味子半升半夏半升洗杏仁半升去尖皮兩仁者甘草三兩炙上七味切以水一斗煮取三升去滓溫服一升日三忌海藻菘菜生菜羊肉餳酢等若面熱如醉狀者此為胃中熱上衝熏其面令熱加大黃利之方細辛甘草炙乾薑各三兩茯苓四兩五味子半夏洗杏仁去皮尖各半升大黃三兩蒸上八味切以水一斗煮取三升去滓溫服一升日三服忌海藻菘菜生菜餳醋羊肉並出第十八卷中久咳嗽上氣唾膿血及濁涎方五首病源久咳嗽上氣者是肺氣虛極風邪停滯故其病積月累年久不瘥則胸背痛面腫甚則唾膿血也出第十四卷中深師療肺氣不足咳逆唾膿血咽喉悶塞胸滿上氣不能飲食臥則短氣補肺湯方款冬花三兩桂心二兩鍾乳二兩乾薑二兩白石英二兩麥門冬去心四兩五味子三兩粳米五合桑白皮根一斤大棗一百枚擘上十味切以水一斗二升先煮桑白皮棗令熟去滓納藥煮取二升二合分三服忌生蔥等千金同又療咳逆上氣時時唾濁但坐不得臥皂莢丸方長大皂莢一挺去皮子炙上一味搗篩蜜和服如梧子一丸日三夜一以大棗膏和湯下之千金經心錄延年同此本仲景傷寒論方一名棗膏丸又療咳逆上氣吐膿或吐血胸滿痛不能食補肺湯方黃耆一法五兩桂心乾地黃茯苓厚朴乾薑紫菀橘皮當歸五味子遠志去心麥門冬去心各三兩甘草炙鍾乳白石英各二兩桑白皮根人參各三兩大棗二十枚擘上十八味切以水一斗四升煮取四升分溫四服日三夜一忌海藻菘菜生蔥醋物千金同並出第十八卷中古今錄驗療寒冷咳嗽上氣胸滿唾腥膿血四味石鐘乳散方鍾乳碎研白礜石煉款冬花桂心各一分上四味搗合下篩以筒吸之如大豆許一匕聚先食日三不知稍增之數試有驗當作七聚遂吸之忌生蔥千金集驗同出第十九卷中必效療上氣唾膿血方灸兩乳下黑白際各一百壯良千金同咳嗽膿血方一十一首病源咳嗽膿血者損肺傷心故也肺主氣心主血肺感於寒微者則成咳嗽傷於陰脈則有血血與氣相隨而行咳嗽極甚傷血動氣俱乘於肺以津液相搏蘊結成膿故咳嗽而有膿血也出第十四卷中廣濟療瘕瘶吐膿損肺方人參二分瓜蒂三分杜蘅五分上三味搗篩為散平旦空腹以熱湯服方寸匕當吐痰水惡汁一二升吐已復煮白粥食淡水未盡停三日更進一服忌生冷油膩豬魚肘後古今錄驗用杜蘅三分人參一分服一錢匕出第二卷中深師療咳逆唾膿血雞子湯方雞子一枚甘草二分炙甘遂一分大黃二分黃芩二分上五味切以水六升煮取二升去滓納雞子攪令調盡飲之良忌海藻菘菜又療傷肺唾血方茅根上一味搗篩為散服方寸匕日三亦可絞取汁飲之主熱渴出第四卷中刪繁療肺偏損胸中應肺偏痛唾血氣咳款冬花散方款冬花當歸各六分桂心芎藭五味子附子炮各七分細辛貝母各四分乾薑乾地黃各八分白朮甘草炙杏仁去尖皮各五分紫菀三分上十四味搗篩為散清酒服方寸匕日二服忌生蔥生菜桃李雀肉海藻菘菜豬肉蕪荑出第五卷中千金百部丸主諸咳不得氣息唾膿血方百部根二兩升麻半兩桂心五味子甘草炙紫菀乾薑各一兩上七味搗篩蜜和丸如梧子服三丸日三以知為度忌生蔥海藻菘菜等物又療肺傷咳唾膿血腸澀背氣不欲食惡風目暗䀮䀮足膝脛寒湯方乾地黃切半升桑白皮切二升芎藭切一升白膠五兩桂心二尺人參紫菀各二兩大棗二十枚擘生薑五兩飴糖一升大麻仁一升大麥三升上十二味切以水一斗五升煮麥濾取一斗去滓納藥煎取三升分三服忌生蔥又療肺病咳嗽膿血及唾涕血出不止方好酥五十斤上三遍煉停凝當出醍醐服一合日三以瘥止又方三遍煉酥如雞子黃適寒溫灌鼻中日二夜一又療咳嗽喘息喉中如有物唾血方杏仁二升去尖皮兩仁者豬脂二合糖一升生薑汁二升蜜一升上五味先以豬膏煎杏仁黃黑出以紙拭令淨搗如膏合煎五物令可丸服如杏核日夜六七漸加之並出第十八卷中古今錄驗瀉肺湯療肺中膿咳唾血氣急不安臥方芎藭麻黃去節細辛椒去目閉口汗當歸各一兩上五味切以水七升煮取三升分為三服日三微汗或吐膿血忌生菜一方有生薑一兩又羊肺湯療咳晝夜無閒息氣欲絕肺傷唾血方鍾乳五兩牡蠣熬桂心六兩射干桃仁去尖皮貝母橘皮百部根五味子各三兩生薑六兩白石英半夏洗各五兩款冬花甘草炙厚朴炙各二兩羊肺一具上十六味切先以水二斗三升煮羊肺取一斗去肺納諸藥煮取三升分四服日三夜一忌海藻菘菜羊肉餳生蔥出第十九卷中久咳嗽膿血方四首病源久咳嗽膿血者肺感於寒微則成咳嗽咳嗽極甚傷於經絡血液蘊結故有膿血氣血俱傷故連滯積久其血黯瘀與膿相雜而出也出第十四卷中廣濟療積年咳嗽膿血方莨菪二升大棗一百顆青州者上二味以水三大升取馬糞燒火煎熟之候令汁盡取棗早晨服一枚日中一枚日暮一枚不覺漸加口乾胸熱則以為度不吐不利忌並如前法又療咳經年不瘥氣喘欲絕傷肺見血方桑白皮切五合白羊肺一具切芍藥十分款冬花六分茯苓十一分貝母十二分麥門冬六分杏仁六分去尖皮熬為脂升麻十二分生地黃汁一升黃芩十二分蜜一升上十二味切以水一斗煮取三升去滓納杏仁脂地黃汁蜜等微火上煎如魚眼沸攪勿停手取二升二合煎成淨綿夾布濾每食後含一合日夜三四度老小以意減之微暖含之佳忌生冷油醋面魚䔉蕪荑並出第二卷中深師療咳逆氣喘不息不得眠唾血嘔血短氣連年款冬花丸方款冬花十八分紫菀十二分杏仁八分去尖皮兩仁者熬香豉十分熬人參二分甘草三分炙蜀椒三分汗天門冬六分去心乾薑桂心乾地黃各三分上十一味搗篩蜜和如彈丸含稍稍咽汁日四夜再神良忌海藻菘菜生蔥蕪荑鯉魚出第十八卷中近效療久咳兼唾血方白前三兩桑白皮桔梗各二兩甘草一兩炙上四味切以水二大升煮取半大升空腹頓服若重者十數劑忌豬肉海藻菘菜李子劍方咳嗽唾黏方二首廣濟療肺熱咳嗽涕唾多黏甘草飲子方甘草六分炙款冬花七分豉心一合生麥門冬八分去心蔥白一握檳榔十顆合子碎桔梗六分地黃汁半升上八味切以水六升煮取二升絞去滓下地黃汁分溫三服如人行四五里進一服不利忌生菜熱面炙肉海藻菘菜魚䔉黏食豬肉蕪荑出第二卷中延年紫蘇飲療咳嗽短氣唾涕稠喘乏風虛損煩發無時者宜服此方紫蘇貝母各二兩紫菀一兩麥門冬一兩去心棗五枚擘葶藶子一兩熬令黃別搗甘草一兩炙上七味切以水六升煮取二升分為四服每服如人行七里禁豬魚肉䔉海藻菘菜出第五卷中許仁則療咳嗽方一十二首許仁則論咳嗽病有數種有熱嗽有冷嗽有肺氣嗽有飲氣嗽熱嗽者年少力壯體氣充滿將息傷熱積熱所成故致熱嗽此但食飲取冷兼以藥壓之自歇冷嗽者年衰力弱體氣虛微如復寢食傷冷故成冷嗽此亦但將息以溫兼進溫藥則當平復肺氣嗽者不限老少宿多上熱後因飲食將息傷熱則常嗽不斷積年累歲肺氣衰便成氣嗽此嗽不早療遂成肺痿若此將成多不救矣飲氣嗽者由所飲之物停澄在胸水氣上衝衝入於肺肺得此氣便成嗽久而不除漸成水氣若作此病亦難療之熱嗽之狀更無其餘但遇於熱便發此者宜合生地黃等七味湯服之方生地黃一升切生薑二合切桑白皮根切一升射干切二升乾葛切六合紫蘇三合竹瀝一升上藥細切七味以水一斗煮取三升去滓納竹瀝攪調每食後良久則服之分一劑作四服若覺可則重合服之病輕者三數劑則瘥忌蕪荑又依前生地黃等七味飲雖得暫瘥於後還發宜合紫菀等十味丸方紫菀五分桑白皮六合射干四兩百部根五兩麻黃二兩去節乾葛五兩地骨皮升麻各四兩乾地黃六兩芒硝六兩上藥搗篩蜜和丸如梧子以竹瀝下之初服十五丸日再服稍稍加至三十丸忌蕪荑又冷嗽之狀但遇諸冷此疾便發有如此者宜合大棗等七味湯主之方大幹棗三十枚擘桂心四兩杏仁一百枚去尖皮兩仁研細辛五兩吳茱萸當歸各三兩上藥切以水八升煮取二升六合去滓溫分三服每服如人行十里久服一劑覺得力至三四劑亦佳隔三四日服一劑此湯原欠一味忌生蔥生菜又依前大幹棗湯服之雖可未能斷其根遇冷便發宜合當歸等十味丸服之方當歸切細辛甘草炙各五兩桂心吳茱萸人參各三兩蜀椒三合汗橘皮乾薑各四兩桑白皮八兩上藥搗篩蜜和丸煮乾棗飲下之初服十丸日再服稍加至三十丸如梧子服此丸經三五日覺熱每服藥後良久吃三數口粥食壓之豈海藻菘菜生蔥生菜又肺氣嗽經久將成肺痿其狀不限四時冷熱晝夜嗽常不斷唾白如雪細沫稠黏喘息氣上乍寒乍熱發作有時唇口喉舌乾焦亦有時唾血者漸覺瘦悴小便赤顏色青白毛聳此亦成蒸有此狀者宜合白前等七味湯服之兼有麻黃等十味丸桑白皮等十味煎又肺氣嗽經久有成肺癰者其狀與前肺痿不多異但唾悉成膿出無多少有此病者於白前湯中加半夏五兩黃耆三兩以水一斗煮取二升八合於麻黃丸中加黃耆五兩苦參六兩芍藥三兩於桑白皮煎中加黃耆切三升共桑白皮地骨皮同煎又加水三升同煎忌羊肉餳白前湯方白前三兩桑白皮三兩生地黃一升茯苓五兩地骨皮四兩麻黃二兩去節生薑六兩上藥切以水八升煮取二升六合去滓加竹瀝五合分溫四服食後服之晝三夜一覺得力重合服五六劑佳隔三日服一劑忌醋蕪荑又依前白前等七味湯雖服覺可根本未除宜合麻黃等十味丸服之方麻黃二兩去節白前二兩桑白皮六兩射干四兩白薇三兩百部根五兩乾地黃六兩地骨皮五兩橘皮三兩上藥搗篩蜜和丸煮桑白皮飲下之初服十丸日再服稍稍加至十五丸丸如梧子大本欠一味忌蕪荑又凡病在胸膈上者宜飽滿而在夜肺既居上此是病在上已晝服丸夜無憑準宜合桑白皮汁等十味煎每夜含咽之方桑白皮切一升地骨皮切三升二味用水七升熟煎取三升汁去滓澄清生地黃汁五升生麥門冬汁二升生薑汁一升竹瀝三升生葛根汁三升白蜜一升牛酥三合大棗膏一升上八味先於微火上取生地黃汁以下生葛汁以上和煎減半則納桑白皮等二物汁和煎之三分減一則納酥蜜棗膏攪之勿停手得如稠飴狀煎成訖置別器中服之每夜欲臥時取一胡桃大含之細細嚥汁稍加至雞子大欲晝日間丸服亦得忌蕪荑又飲氣嗽經久不已漸成水病其狀亦不限四時晝夜嗽不斷遇諸動嗽物便致困劇甚者乃至雙眼突出氣即欲斷汗出大小便不利吐痰飲涎洟沫無復窮限氣上喘急肩息每旦眼腫不得平眠有如此者宜合細辛等八味湯葶藶子十五味丸服之方細辛半夏洗桂心桑白皮各五兩乾薑當歸各四兩芒硝六兩杏仁六合去尖兩仁者研上藥切以水九升煮取三升去滓納芒硝分溫三服每服如人行十里久當得快利後好將息經三四日合丸服之忌生蔥生菜羊肉餳丸方葶藶子六合熬細辛五味子各五兩乾薑當歸各四兩桂心人參丁香大黃商陸根各三兩橘皮四兩桑白皮六兩皂莢肉二兩炙大腹檳榔二十枚麻黃二兩去節上藥搗篩蜜和丸煮桑白皮飲下初服十丸日再服稍加至十五丸如梧子大若利則減秘則加以大便通滑為度時時得鴨溏亦佳忌生蔥生菜又依前細辛等八味湯葶藶子等十五味丸不覺可漸成水病餘一如前況更加大小便秘澀頭面身體浮腫宜合大幹棗三味丸服之方大棗六十枚擘去核葶藶子一升熬杏仁一升去尖皮兩仁者熬上藥合搗令如膏可作丸如硬燥不相著細細下蜜作丸依前以桑白皮飲下之初服七八丸日再服稍稍加之以大便通為度病重者時令鴨溏佳亦有以前三味煮湯服之又依前大棗等三味丸服雖覺氣暫歇然病根深固藥力微弱且停服大棗丸合巴豆丸五味細細服之盪滌宿病方巴豆仁二十枚熬去心皮杏仁一百顆去尖皮兩仁者熬牽牛子五合熬葶藶子六合熬大棗六十枚擘去核上藥合搗一如前大棗丸法還以桑白皮飲下之服三四丸日再服如利即減秘即加常以大便調為候病甚時時取鴨溏亦佳忌蘆筍野豬肉吳升同出下卷中雜療咳嗽方三首古今錄驗五臟六腑皆令人咳肺居外而近上合於皮毛皮毛喜受邪故肺獨易為嗽也邪客於肺則寒熱上氣喘汗出咳動肩背喉鳴甚者唾血肺咳經久不已傳入大腸其狀咳則遺糞腎咳者其狀引腰背痛甚則咳涎腎咳經久不已傳入膀胱其狀咳則遺尿肝咳者其狀左脅痛甚者不得轉側肝咳經久不已傳入膽其狀咳則清苦汁出心咳者其狀引心痛喉中介介如鯁狀甚者喉痹咽腫心咳經久不已傳入小腸其狀咳則失氣脾咳者其狀右脅痛陰陰則引肩背甚者不得動動便咳劇脾咳經久不已則傳入胃其狀咳即嘔甚則長蟲出久咳不已則三焦受之三焦咳之狀咳而腹痛不能食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也又非時有風寒冷人觸冒解脫傷皮毛間入腑臟為咳上氣如此也又非時忽然暴寒傷皮膚中與肺合則咳嗽上氣或胸脅又痛咳唾有血者是其熱得非時之寒暴薄之不得漸散伏結深喜肺癰也因咳服溫藥咳尤劇及壯熱吐濃血汗出惡寒是也天有非時寒者急看四時方也又療咳嗽上氣時時嘔白唾沫數十歲者方吳茱萸五味子大黃桂心甘草炙細辛人參紫菀款冬花各一兩大戟竹茹各三分上十一味切以水一斗煮取三升分為三服亦療陰冷咳至良忌海藻菘菜生菜生蔥深師同並出第十九卷中深師療諸咳心中逆氣氣欲絕杏仁煎方杏仁四兩去尖皮末豬膏二斤白蜜二升生薑汁三升上四味著銅器中於微火上先煎薑汁次納蜜膏令如餳置器著地乃納杏仁末復令得一沸煎成服如棗大一丸含之日三不知稍稍增之又療氣上迫滿或氣不通煩悶喘嘔蘇子湯方蘇子一升乾薑三兩半夏四兩洗桂心人參各一兩橘皮茯苓各三兩甘草一兩炙上八味切以水八升煮取二升半分為三服若虛熱去乾薑用生薑六兩加黃芩二兩忌海藻菘菜羊肉餳生蔥酢等物並出第十八卷中
