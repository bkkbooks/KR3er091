補虛損去風冷兼悅肌膚白如瓠婦人服之更佳延年秘錄同出第六卷中古今錄驗療上氣兼咳蘇子湯方蘇子一升五味子五合麻黃去節細辛紫菀黃芩甘草炙各二兩人參桂心當歸各一兩半夏三兩洗生薑五兩上十二味切以水九升煮取三升分二服上氣病亦特單煮蘇子及生蘇葉冬天煮乾枝莖葉亦佳忌海藻菘菜羊肉餳生蔥生菜出第十九卷中咳逆上氣嘔吐方四首病源五臟皆稟氣於肺肺感微寒則成咳嗽也寒搏於氣氣聚還肺而邪有動息邪動則氣奔逆上氣上則五臟傷動動於胃氣者則胃氣逆而嘔吐也此是肺咳連滯氣動於胃而嘔吐者也又有季夏脾王之時而脾氣虛不能王有寒氣傷之而咳嗽者謂之脾咳其狀咳則右脅下痛陰陰引膊背甚則不可動動則咳發脾與胃合脾咳不已則胃受之其狀咳嗽而嘔嘔甚則長蟲出是也凡諸咳嗽甚則嘔吐各隨證候知其腑臟也出第十四卷中深師療咳嗽上氣喉咽中腥臭虛氣攪心頭痛眼疼耳中嘈嘈風邪毒注天行食不生肌胸中隔塞嘔逆多唾噁心心下堅滿飲多食少療疰並淋通氣丸方膠飴五斤蜀椒二升汗烏頭七分炮桂心六分大附子五枚炮乾薑人參各四分杏仁一升天門冬十分蜈蚣五節去頭炙上十味末之搗杏仁作膏稍稍納藥末搗千過烊膠飴乃納藥中攪令調和合如半棗一枚日六七夜二三服令胸中溫為度若夢與鬼神交通及飲食者全用蜈蚣食不消者加杏仁五合有虛氣少腹急腰痛加天門冬杜仲有風加烏頭二枚附子一枚立夏後勿加也有留飲加葶藶子一兩熬末之忌豬肉冷水生蔥鯉魚等物千金同又療上氣咳逆口乾手足寒心煩滿積聚下利嘔逆若墜瘀血上氣胸脅脹滿少氣腸鳴飽食傷中裡急婦人乳飲滯下有邪濕陰不足大小便不利肢節皆痛硝石丸方硝石一升乾薑前胡大黃各一斤杏仁一升上五味搗篩蜜和飲服如梧子三丸日再五日後心腹諸疾隨大小便去月經絕則通下長蟲數十亦利血及冷熱赤白汁癥瘕毒悉主之藥利以意消息又療上氣煩悶嘔逆不得飲食厚朴湯方厚朴一兩炙人參一兩半夏四兩洗生薑八兩茯苓甘草炙橘皮桂心各二兩枳實二兩炙上九味切以水八升煮取三升分三服忌海藻菘菜羊肉餳生蔥醋物並出第十八卷中必效療上氣咳嗽嘔逆不下食氣上方橘皮紫菀各三兩人參茯苓柴胡杏仁去尖皮上六味切以水六升煮取二升分為三服患冷加生薑二兩患熱加麥門冬三兩去心不能食加白朮二兩厚朴二兩炙忌醋物桃李雀肉等出第一卷中上氣咳嗽多唾方三首廣濟療上氣肺熱咳嗽多涕唾方白前四分生麥門冬十分去心貝母石膏甘草炙五味子生薑各四分黃芩五分杏仁四十顆淡竹葉切一升白蜜一匙上十一味切以水七升煮取二升七合絞去滓納白蜜更上火煎三沸分溫三服每服如人行五六里須利三兩行湯成後宜加芒硝八分忌熱面炙肉油膩醋食海藻菘菜出第二卷中古今錄驗小紫菀丸療上氣夜咳逆多唾濁方乾薑甘皮一作甘草細辛款冬花各三分紫菀三分附子二枚炮上六味搗篩以蜜和為丸如梧子先食服三丸日再以知為度忌冷水豬肉生菜等物又療咳氣上多涕唾杏仁煎方出徐王杏仁一升上一味搗碎研取大升三升汁以水和研之煎取一大升酒服一匙日三忌豬雞魚肉胡荽等物並出第十九卷中上氣咳方一首古今錄驗療咳逆上氣胸滿多唾太醫令王叔和所撰已更御服甚良效方乾薑三分礜石一分泥裹燒半日蜀椒五分汗細辛二分烏頭一分炮去皮杏仁一分吳茱萸四分洗菖蒲一分紫菀二分皂莢一分去皮子炙款冬花三分麻黃四分去節上十二味搗篩蜜和丸如梧子夜臥吞一丸日二不知加之療二十年咳不過二十丸便愈御藥也秘在石室不傳忌豬羊肉餳生菜冷水一方有桂心三分無麻黃千金同出第十九卷中久咳嗽上氣方三首肘後療久咳上氣十年二十年諸藥療不瘥者方豬胰三具干棗一百顆上二味以酒三升漬數日服二三合至四五服愈服盡此則瘥千金同出第三卷中深師療久上氣咳麻黃散方司馬太傳咳常將此服愈麻黃一斤去節杏仁一百枚甘草二兩炙桂心一兩上四味搗篩別搗杏仁如脂納諸末合令調臨氣上發時服方寸匕氣下止食頃氣不下更服一匕可至三匕氣發便服即止忌海藻菘菜生蔥千金古今錄驗同又療久上氣咳亦療傷寒後咳嗽方甘草二兩炙大棗二十枚上二味以水七升煮取二升分再服數用驗忌海藻菘菜等古今錄驗名溫脾湯並出第八卷中咳逆上氣方五首病源肺虛感微寒而成咳咳而氣還聚於肺肺則脹是為咳逆也邪氣與正氣相搏正氣不得宣通但逆上喉咽之間邪伏則氣靜邪動則氣奔上煩悶欲絕故謂之咳逆上氣出第十四卷中深師療咳逆上氣支滿息欲絕氣結於胸中心煩躁不安一合湯方芫花二分熬桂心乾薑各五分甘草炙細辛各四分蕘花二分上六味切以水三升煮取一升先食服一合日三夜一又云合湯亦得分六七服一日盡便愈一方有菖蒲四分無蕘花忌海藻菘菜生蔥生菜等又療咳逆上氣腹中有堅痞往來寒熱令人羸瘦不能飲食或時下痢此腹中如絞在臍上下關疝氣上腸使然為病有氣湧逆蜀椒散方蜀椒五合去目並閉口者汗桂心甘草各一兩炙通草半夏洗各三兩上五味搗篩飲服方寸匕日三夜一忌海藻菘菜羊肉餳生蔥並出第十八卷中古今錄驗麥門冬丸主氣逆上氣方乾薑六分麥門冬十分去心昆布洗海藻洗各六分細辛海蛤蜀椒熬桂心各四分上八味搗篩蜜和丸如梧子以飲服十丸漸加至二十丸日三有人患風虛得冷輒胸中上氣喉中常如吹管聲咳嗽唾清沫將此丸服得瘥若散服方寸匕日三忌生蔥生菜經心錄同又鯉魚湯療咳逆上氣喉中不利方生鯉魚一尾熟艾二升白蜜一升紫菀牡蠣各四兩熬款冬花一升杏仁二十枚豉半升射干二兩細辛三兩飴八兩菖蒲二兩上十二味㕮咀藥和納魚腹中置銅器中蒸之五斗米飯下藥成服一升日三夜一忌生菜羊肉餳等又杏仁煎療咳逆上氣方杏仁一升石斛乾薑各四兩桂心甘草炙麻黃去節各五兩五味子款冬花紫菀各三兩上九味搗八味下篩以水一斗先煮麻黃取八升去滓納藥末膠飴半斤蜜一升攪令相得未食服如棗大一枚日三忌生蔥海藻菘菜等並出第二十九卷中雜療上氣咳嗽方四首廣濟療上氣咳嗽兼水氣癖氣方葶藶子熬貝母桔梗鱉甲炙防葵各六分白朮茯苓大戟枳實炙紫菀旋覆花杏仁橘皮各四分芫花二分大黃十分皂莢一分炙去皮子上十六味搗篩蜜和為丸空腹以飲服如梧子五丸日二服漸漸加至十丸以微利為度忌桃李雀肉莧菜醋物豬肉陳臭等出第二卷中深師療上氣搶心胸奄奄不得息腹中脹滿食輒吐蘇子湯方蘇子一升大棗三十顆半夏三兩洗橘皮生薑桂心各一兩蜀椒二分汗上七味切以水七升煮取二升分三服忌羊肉餳生蔥出第十八卷中古今錄驗半夏湯療上氣五臟閉塞不得飲食胸中脅下支脹乍去乍來虛氣結於心中伏氣住胃管唇乾口燥肢體動搖手足疼冷夢寐若見人怖懼此五臟虛乏諸勞氣不足所致並療婦人方當歸防風黃耆各二兩柴胡半斤細辛麻黃去節人參各一兩杏仁五十粒桂心三兩半夏一升洗大棗二十枚生薑五兩黃芩一兩上十三味切以水一斗先煮麻黃一沸去上沫更入水一升及諸藥煮取五升分為五服日三夜二忌羊肉生蔥生菜餳等出第十九卷中近效療上氣腹內脹滿飲食不消欲作霍亂及咳嗽紫蘇子丸方紫蘇子橘皮各二兩高良薑桂心人參各一兩上五味搗篩蜜和為丸每服十五丸酒飲任下若食瓜膾等物有生熟氣擬似霍亂者即半棗慄許大細細嚥取汁令消盡應時立愈常有此藥永不患霍亂甚神效也忌生蔥豬肉陳臭等物
