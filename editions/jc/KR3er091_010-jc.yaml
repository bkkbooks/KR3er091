body:
  text: 卷第十肺痿方一十首千金論曰寸口脈數其人病咳口中反有濁唾涎沫出何也師曰此為肺痿之病肺痿之病何從得之師曰病熱在上焦因咳為肺痿或從汗出或從嘔吐或從消渴小便利數或從便難被快藥下利重亡津液故得肺痿又寸口脈不出而反發汗陽脈早索陰脈不澀三焦踟躕入而不出身體反冷其內反煩多唾唇燥小便反難此為肺痿傷於津液便如爛瓜亦如豚腦但坐發汗故也其病欲咳不得咳咳則出干沫久久小便不利甚則脈浮弱肺痿吐涎沫而不咳者其人不渴必遺溺小便數所以然者上虛不能制下故也此為肺中冷必眩師曰肺痿咳唾咽燥欲飲水者自愈自張口者短氣也出第十七卷中仲景傷寒論療肺痿吐涎唾不咳者其人不渴必遺溺小便數所以然者以上虛不能制下故也此為肺冷必眩甘草乾薑湯主之以溫其臟方甘草四兩炙乾薑二兩上二味切以水三升煮取一升半分溫二服服湯已小溫覆之若渴者屬消渴忌海藻菘菜又療肺痿涎唾多心中溫溫液液者炙甘草湯方甘草四兩炙生薑三兩去皮人參二兩地黃一斤阿膠三兩炙大麻子仁半升大棗四十枚麥門冬半斤去心桂心二兩上九味切以美酒七升水八升相和先煮八味取四升絞去滓納膠上微火烊銷溫服七合日三夜一並出第八卷中肘後療肺痿咳嗽吐涎沫心中溫溫咽燥而渴者方一云不渴生天門冬搗取汁一升酒一升飴糖一斤紫菀末四合上四味合銅器中於湯上煎可丸服如杏仁一丸日三忌鯉魚範汪經心錄同出第一卷中集驗療肺痿咳唾涎沫不止咽燥而渴方一云不渴生薑五兩人參二兩甘草二兩炙大棗十二枚擘上四味切以水五升煮取一升半分再服忌海藻菘菜仲景傷寒論備急範汪千金經心錄同又療肺痿咳嗽涎沫心中溫溫咽燥而渴方一云不渴生薑五兩甘草二兩炙大棗十二枚擘上三味切以水五升煮取一升半分再服一方乾薑三兩代生薑忌海藻菘菜文仲千金古今錄驗同深師云溫脾湯範汪亦同又療肺痿時時寒熱兩頰赤氣急方童子小便每日晚取之去初末少許小便可有五合取上好甘草量病人中指節男左女右長短截之炙令熟破作四片納小便中置於閒淨處露一宿器上橫一小刀明日平旦去甘草頓服之每日一劑其童子勿令吃五辛忌海藻菘菜熱面並出第四卷中刪繁療虛寒喘鳴多飲逆氣嘔吐半夏肺痿湯方半夏一升湯洗母姜一斤橘皮一斤白朮八兩桂心四兩上五味切以水九升煮取三升去滓分溫三服忌羊肉餳桃李雀肉生蔥一方有桑白皮切一升又療凡虛寒肺痿喘氣乾地黃煎方乾地黃五兩桑根白皮切二升芎藭五兩桂心人參各三兩大麻仁一升炒上六味切以水九升先煮五味取三升去滓納大麻仁煎數沸分三服忌生蔥蕪荑並出第二卷中千金療肺痿涎唾多出心中溫溫液液甘草湯方甘草二兩炙上一味切以水三升煮取一升半分溫三服忌海藻菘菜範汪同又療肺痿吐涎沫桂枝去芍藥加皂莢湯方桂心三兩甘草二兩炙大皂莢一挺去皮子炙生薑三兩大棗十二枚擘上五味切以水七升微火煮取三升分三服忌生蔥海藻菘菜範汪經心錄同並出第十七卷中肺氣客熱方二首延年百部根飲主肺氣客熱暴傷風寒因嗽不安方百部根一兩半天門冬二兩去心紫菀一兩半貝母乾葛白前橘皮各一兩生薑二兩蔥白切三合豉三合上十味切以水六升煮取一升七合去滓分溫三服疏數任情亦可分為四服欲間食亦得禁生冷鯉魚蒜出第五卷中古今錄驗療肺客熱並肝心家氣人參湯方桂心甘草炙各三兩人參乾薑防風各二兩白朮一兩半上六味切以水八升煮取三升分三服日三宜溫忌桃李雀肉生蔥海藻菘菜出第二十一卷中肺熱兼咳方七首刪繁療肺熱氣上咳息奔喘橘皮湯方橘皮杏仁四兩去尖皮柴胡麻黃去節各三兩干蘇葉二兩母姜四兩去尖石膏八兩上七味切以水九升先煮麻黃兩沸除沫下諸藥煮取三升去滓分三服不瘥再服母姜千金云宿姜千金同出第五卷中千金療肺熱悶不止胸中喘急驚悸客熱來去欲死不堪服藥泄胸中喘氣方桃皮一斗芫花一斗上二味以水四斗煮取一斗去滓以故布手巾納汁中薄胸溫四肢不盈數日即歇又凡右手寸口氣口以前脈陰實者手太陰經也病苦肺脹汗出若露上氣喘逆咽中塞如欲嘔狀名肺熱實也又療肺熱實胸憑仰息泄氣除熱湯方枸杞根皮二升白前三兩石膏八兩碎綿裹杏仁三兩去尖皮研橘皮白朮各五分赤蜜七合上七味切以水七升煮取二升去滓下蜜更煮兩三沸分三服忌桃李雀肉等又療肺熱言音喘息短氣好唾膿血方生地黃切二升石膏八兩淡竹茹如雞子大一枚杏仁四兩去尖皮研羚羊角屑三兩芒硝三兩赤蜜一升麻黃五兩去節升麻三兩上九味以水七升煮取二升去滓下蜜煮兩沸分三服忌蕪荑出第十七卷中延年天門冬煎主肺熱兼咳聲不出方生天門冬汁一升橘皮二兩生地黃汁五升白蜜五合牛酥三合白糖五兩杏仁一升去尖皮貝母紫菀通草各三兩百部根白前甘草炙各二兩人參二兩上十四味切以水六升煮貝母等藥取二升五合去滓納天門冬地黃汁煎可減半納酥蜜生薑等煎令可丸稍強取如雞子黃大含咽之日四五度忌鯉魚蕪荑海藻菘菜等張文仲處又地黃麥門冬煎主肺熱兼咳方生地黃汁三升生麥門冬三升生薑汁一合酥二合白蜜二合上五味先煎地黃麥門冬薑汁等三分可減一分納酥蜜煎如稀餳納貝母末八分紫菀末四分攪令調一服一匙日二服夜一服忌蕪荑又天門冬煎主肺間熱咳咽喉塞方天門冬三兩去心麥門冬二兩去心款冬花一兩貝母一兩紫菀二兩茯苓二兩升麻二兩生薑汁三升蜜一升酥一合地黃汁三升上十一味切以水八升煮七物取一升去滓納生薑地黃汁煮取一升納蜜酥於銀器中加湯上煎令成丸一服如彈丸一枚含咽日夜三五丸忌醋物蕪荑鯉魚等顏仁楚處又羚羊角飲主肺熱胸背痛時時乾咳不能食方羚羊角屑二兩貝母生薑茯苓各三兩橘皮人參芍藥各二兩上七味切以水五升煮取一升八合去滓分溫三服每服如人行八九里久更服禁生冷蒜面醋並出第五卷中肺虛寒方三首刪繁療肺虛寒癘風所傷聲音嘶塞氣息喘憊咳唾酥蜜膏酒止氣咳通聲方酥崖蜜飴糖生薑汁生百部汁大棗肉研為脂杏仁去皮尖甘皮五具末上八味合和微火煎常攪三上三下約一炊久薑汁並百部汁各減半停下溫清酒一升服方寸匕細細嚥之日夜三千金同出第六卷中千金療肺虛寒癘風傷語音嘶塞氣息喘憊嗽唾方豬𦚟三具大棗一百枚去核好酒五升上三味以酒漬二味秋冬七日春夏三日生布絞去滓二七日服盡忌鹽無豬𦚟以羊𦚟代肘後張文仲備急同出第十八卷中又凡右手寸口氣口以前脈陰虛者手太陰經也病苦少氣不足以息嗌乾不津液病名曰肺虛寒也又療肺虛寒則聲嘶傷語言用力戰掉緩弱虛瘠風入肺防風散方防風獨活芎藭秦椒汗黃耆各七分附子炮七分乾薑七分石膏研天雄炮甘草炙山茱萸麻黃去節五味子各六分秦艽桂心山藥杜仲人參防己各五分貫眾二枚紫菀菊花各四分細辛五分當歸五分上二十四味搗篩為散酒服方寸匕日再忌海藻菘菜豬肉冷水生蔥生菜一方無石膏當歸出第十七卷中肺氣不足口如含霜雪方四首廣濟療肺氣不足寒從背起口如含霜雪語無聲音劇者吐血苦寒五味子湯方五味子三兩大棗五十枚擘桑根白皮一升藁本二兩鍾乳三兩款冬花二兩雞蘇二兩上七味切以水九升煮取三升分溫三服每服如人行七八里進一服忌豬魚炙肉熱面陳臭等物此方甚良又療肺氣不足逆氣胸滿上迫喉咽閉塞短氣連唾相屬寒從背起口如含霜雪語無音聲劇者唾血腥臭或歌或哭乾嘔心煩耳聞風雨聲皮毛悴面白紫菀湯方紫菀五味子生薑合皮切白石英研綿裹款冬花桂心人參各二兩鍾乳研綿裹麥門冬去心桑根白皮各三兩大棗二十枚擘粳米一合上十二味切水一斗五升先煮桑根白皮粳米取九升去滓納諸藥煎取三升去滓分溫三服每服相去如人行七八里久忌生蔥熱面炙肉深師千金無紫菀人參並出第二卷中深師療肺氣不足逆滿上氣咽喉中閉塞短氣寒從背起口中如含霜雪語言失聲甚者吐血補肺湯方五味子三兩乾薑二兩款冬花二兩桂心一尺麥門冬一升去心大棗一百枚擘粳米二合桑根白皮一斤上八味切以水一斗二升先煮棗並桑白皮粳米五沸後納諸藥煮取三升分三服忌生蔥千金同出第十八卷中集驗補肺湯療肺氣不足咳逆短氣寒從背起口中如含霜雪語無音聲而渴舌本乾燥方五味子白石英研綿裹鍾乳同上桂心橘皮桑根白皮各三兩粳米二合茯苓竹葉款冬花紫菀各二兩大棗五十枚杏仁五十枚去兩仁尖皮蘇子一升生薑五兩麥門冬四兩去心上十六味切以水一斗三升先煮桑白皮棗粳米熟去滓納諸藥煮取四升分三服日再夜一忌大酢生蔥千金同出第四卷中肺脹上氣方四首五法廣濟療患肺脹氣急咳嗽喘粗眠臥不得極重恐氣欲絕紫菀湯方紫菀六分甘草八分炙檳榔七枚茯苓八分葶藶子三合炒末湯成下上五味切以水六升煮取二升半絞去滓分溫三服每服如人行四五里久進之以快利為度忌生蔥菜熱面海藻菘菜大醋蒜黏食出第二卷中仲景傷寒論肺脹者咳而上氣煩躁而喘脈浮者以心下有水宜服小青龍湯加石膏主之方麻黃三兩去節五味子半升石膏綿裹乾薑芍藥細辛各三兩桂心甘草各三兩炙半夏半升洗上九味切以水一斗先煮麻黃減二升去上沫納諸藥煮取二升半去滓溫服強人一升瘦人及老小以意減之日三夜一忌生蔥生菜海藻菘菜羊肉餳等又肺脹者病人喘目如脫狀脈浮大也肺脹而咳者越婢加半夏湯主之方大棗十五枚擘半夏半升洗生薑三兩麻黃六兩去節甘草二兩炙石膏半斤上六味切以水六升先煮麻黃三二沸去沫納諸藥煮取二升去滓溫服八合日三不知更作之忌海藻菘菜羊肉餳並出第十八卷中深師療咳而上氣肺脹其脈浮心下有水氣小青龍湯加石膏二兩設若有實者必躁其人常倚伏小青龍湯方用前仲景方千金療肺脹咳嗽上氣咽燥脈浮心下有水麻黃湯方麻黃去節芍藥生薑五兩細辛桂心各三兩半夏半升洗石膏四兩五味子半升上八味切以水一斗煮取三升分三服忌生蔥羊肉餳生菜集驗同出第十七卷中肺氣積聚方二首救急療肺氣積聚心肋下滿急發即咳逆上氣方麻黃三兩去節杏仁去雙仁尖皮柴胡生薑半夏洗十遍葶藶子熬研如脂各四兩干棗十二枚擘檳榔十枚上八味切以水一斗煮取二升八合去滓分溫三服每服相去如人行八九里久七日忌食生冷豬魚羊肉此方服一劑訖將息滿七日則服後方忌羊肉餳又方茯苓干蘇莖菜橘皮麻黃各三兩杏仁去尖皮兩仁者柴胡生薑各四兩上七味切以水一斗煮取二升七合去滓分溫三服每服如人行八九里久禁酢物蒜熱面豬肉五日服一劑並出第六卷中肺癰方九首千金論曰病咳唾其脈數實者屬肺癰虛者屬肺痿咳而口中自有津液舌上苔滑此為浮寒非肺痿也若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰也問曰病者咳逆師脈之何以知此為肺癰當有膿血吐之則死後終吐膿死其脈何類何以別之師曰寸口脈微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於營吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴唾而濁沫時時振寒熱之所過血為凝滯蓄結癰膿吐如米粥始萌可救膿已成則難治寸口脈數趺陽脈緊寒熱相搏故振寒而咳趺陽脈浮緩胃氣如經此為肺癰趺陽脈浮緩少陰微緊微為血虛緊為微寒此為鼠乳其病屬肺也問曰振寒發熱寸口脈滑而數其人飲食起居如故此為癰腫病醫反不知而以傷寒治之應不愈也何以知有膿膿之所在何以別知其處師曰假令在胸中者為肺癰其脈數咳唾設膿未成其脈自緊數緊去但數膿為已成也出第十七卷中仲景傷寒論咳胸中滿而振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如粳米粥者肺癰也桔梗白散主之方桔梗三分貝母三分巴豆一分去皮心熬研作脂上三味搗篩強人飲服半錢匕羸人減之若病在膈上者必吐膈下者必利若利不止者飲冷水一杯則定忌豬肉蘆筍等出第十八卷中集驗療胸中滿而振寒脈數咽燥而不渴時時出濁唾腥臭久久吐膿如粳米粥是為肺癰桔梗湯方桔梗二兩千金古今方云用一兩甘草二兩炙上二味切以水三升煮取一升分再服朝暮吐膿血則瘥張文仲千金備急古今錄驗範汪同此本仲景傷寒論方出第四卷中千金療咳有微熱煩滿胸心甲錯是為肺癰黃昏湯方黃昏手掌大一枚即合歡木皮上一味切以水三升煮得一升分再服範汪同又肺癰喘不得臥葶藶大棗瀉肺湯主之兼療胸脅脹滿一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞方葶藶三熬令色紫上一味搗令可丸以水三升煮擘大棗二十枚得汁二升納藥如彈丸一枚煎取一升頓服古今錄驗刪繁仲景傷寒論範汪同並出第十七卷中備急療腸癰肺癰方升麻白蘞漏蘆芒硝各一兩黃芩枳實炙連翹蛇銜各三兩梔子二十枚擘蒴藋根四兩上十味搗令細以水三升漬經半日以豬脂五升煎令水竭去滓敷之日三若交急合水煎出第四卷中古今錄驗療肺癰方薏苡仁一升醇苦酒三升上二味煮取一升溫令頓服有膿血當吐範汪經心錄同又療肺癰葦莖湯方銼葦一升薏苡仁半升桃仁五十枚去尖皮兩仁者瓜瓣半升上四味㕮咀以水一斗先煮葦令得五升去滓悉納諸藥煮取二升分再服當吐如膿仲景傷寒論云葦葉切二升千金範汪同千金云葦莖二升先以水二斗煮五升又療肺癰經時不瘥桔梗湯方桔梗三升白朮二兩當歸一兩地黃二兩甘草炙敗醬薏苡仁各二兩桑白皮一升切上八味切以水一斗五升煮大豆四升取七升汁去豆納清酒三升合諸藥煮之取三升去滓服六合日三夜再忌豬肉蕪荑桃李雀肉海藻菘菜等又療肺癰生地黃汁湯方生地黃汁一升當歸甘草炙白石英綿裹人參各一兩附子二分炮白小豆三十顆白雞一頭男用雌女用雄療如食法一作雉上八味切以水一斗五升煮雞取七升汁去滓納地黃汁諸藥等煮取三升去滓分服六合日三夜二忌蕪荑海藻菘菜冷水豬肉等並出第二十一卷中大腸論二首千金論曰大腸腑者主肺也鼻柱中央以為候也肺所以合氣於大腸者大腸為行道傳瀉之腑也號監倉掾重二斤十二兩長一丈二尺廣六寸臍右回疊積還反十二曲貯水穀一斗二升主十二時定血脈和利精神又曰肺前受病移於大腸肺咳不已則大腸受之大腸咳則遺失便利肺應皮皮厚即大腸厚皮薄即大腸薄皮緩腹裹大者大腸緩而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結刪繁同又扁鵲云大腸絕不療何以知之泄痢無度痢絕則死實即腸熱熱則脹滿不通口為生瘡食下入腸則腸實而胃虛下胃則胃實而腸虛所以實而不滿乍實乍虛乍來乍去虛則傷寒寒則腸中雷鳴泄青白之痢而發於氣水根在大腸大腸有寒鶩溏有熱便腸垢大腸有宿食寒慄發熱有時如瘧狀大腸病者腸中切痛而鳴濯濯冬日重感於寒則泄當臍而痛不能久立與胃同候腸中雷鳴氣上衝胸喘不能久立邪在大腸也大腸脹鳴而痛腸寒即泄食不化出第十八卷中大腸熱實方三首千金凡右手寸口氣口以前脈陽實者手陽明經也病苦腸滿善喘咳面赤身熱喉咽中如核狀名曰大腸實熱也又療大腸實熱腹脹不通口為生瘡生薑泄腸湯方生薑橘皮青竹茹白朮黃芩梔子各三兩桂心一兩生地黃十兩茯苓芒硝各二兩大棗十四枚擘上十一味切以水七升煮取三升去滓下芒硝分三服忌生蔥蕪荑海藻菘菜醋物桃李雀肉等出第十八卷中刪繁療肺脈厥逆大於寸口主大腸熱咳上氣喘鳴心煩麻黃湯方麻黃六兩去節芍藥生薑半夏洗十遍細辛五味子各三兩桂心二兩石膏八兩上八味切以水九升先煮麻黃七八沸去沫次下諸藥煎取三升去滓分三服忌羊肉餳生蔥生菜等又療大腸熱甚脅滿掌中熱淡竹葉飲泄熱氣方淡竹葉切三升橘皮三兩干蘇葉三兩白朮四兩甘草一兩炙蔥白切一升桂心一兩石膏六兩碎杏仁六十枚去皮尖熬上九味切以水一斗二升先煮竹葉取一斗去滓澄清取九升下諸藥煮取三升絞去滓分三服若須利下納芒硝三兩忌海藻菘菜桃李雀肉生蔥並出第二卷中大腸虛寒方三首千金凡右手寸口氣口以前脈陽虛者手陽明經也病苦胸中喘腸鳴虛渴唇乾目急善驚泄白名曰大腸虛寒也又療大腸虛寒痢下青白腸中雷鳴相逐黃連補湯方黃連四兩茯苓四兩芎藭三兩醋石榴皮四枚地榆五兩伏龍肝如雞子大一枚上六味切以水七升煮五味取二升五合去滓下伏龍肝屑攪調分三服忌豬肉冷水大醋出第十八卷中刪繁療大腸虛寒欠呿咳氣短少腹中痛款冬花丸方款冬花七分桂心五味子各六分乾薑芎藭甘草炙各五分附子四分炮桔梗四分蘇子五合熬蜀椒一升百部汁七合白蜜一升干棗五十枚去皮薑汁一升上十四味細搗為末將薑蜜汁和微火上煎取為丸如梧子每服溫酒下三十丸加至四十丸日再忌海藻菘菜豬肉冷水生蔥出第二卷中皮虛實方二首刪繁論曰夫五臟六腑者內應骨髓外合皮毛膚肉若病從外生則皮毛膚肉關格強急若病從內發則骨髓疼痛然陰陽表裡外皮內髓其病源不可不詳之也皮虛者寒皮實者熱凡皮虛實之應主於肺大腸其病發於皮毛熱即應臟寒即應腑千金同出第三卷中千金療皮虛主大腸病寒氣關格蒴藋蒸湯方蒴藋根葉切三升桃皮葉銼三升菖蒲葉銼三升細糠一斗秫米五升上五味以水一石五斗煮取米熟為度大盆器貯於上作小竹床子罩盆人身坐床中四面周迴將席薦障風身上以衣被蓋覆若氣急時開孔對口泄氣取通身接汗可作兩食久許如此三日若盆裡不過熱盆下安炭火也非惟療寒但是皮膚下一切勞冷並皆療之忌羊肉餳刪繁同又療皮實主肺病熱氣梔子煎方梔子枳實炙大青杏仁去兩仁尖皮柴胡芒硝各三兩生地黃切一升石膏八兩淡竹葉切一升生玄參五兩上十味切以水九升煮取三升下芒硝分三服忌蕪荑刪繁同並出第十八卷中上氣方九首廣濟療上氣方葶藶子五合熬紫色別搗如泥桑根白皮切大棗二十枚擘上三味以水四升煮取一升絞去滓納葶藶子泥如棗大煮之三分減一頓服以快利為度忌如藥法出第二卷中肘後主上氣方灸從大椎數下行第五節下第六節上空間即灸一處隨年壯秘方深師千金翼文仲同出第三卷中千金療上氣方上酥一升獨頭蒜五顆去皮先以酥煎蒜蒜黃出之生薑汁二合上三味同煎使熟空腹服一寸匕溫服之忌熱面又方芥子三升上一味末之蜜和為丸寅時井花水服如梧子七丸日二服散亦佳禁如藥法尤忌油面等並出第十七卷中必效療上氣方半夏洗茯苓各四兩橘皮白朮各三兩生薑五兩檳榔十顆上六味切以水一斗漬一宿煮取二升七合分三服更加甘草三兩人參二兩前胡二兩紫蘇一兩忌羊肉餳桃李雀肉醋物出第一卷中古今錄驗溫中湯療上氣方甘草三兩炙桂心四兩生薑一斤上三味切以水七升半煎取三升分五服忌生蔥海藻菘菜又昆布丸療胸滿上氣方大黃硝石海藻洗水銀各一兩昆布三兩洗苦瓠瓣四十枚葶藶半升熬通草二分桃仁五十枚熬上九味搗篩以蜜和為丸如梧子許先食服三丸日再服又已試鯉魚湯療上氣方杏仁熬貝母桂心各三兩橘皮人參甘草炙厚朴炙麻黃去節茯苓胡麻白前各二兩鯉魚五斤生薑六兩半夏五兩洗上十四味切先以水二斗煮魚得一斗二升去魚納藥煎取三升二合分四服日三夜一忌海藻菘菜醋物羊肉餳生蔥等物又上氣二物散本司馬大將軍方麻黃一斤去節杏仁一百枚上藥各別搗合和下篩為散上氣發時服方寸匕可至三方寸匕以氣下為候不必常服深師療上氣兼咳範汪同並出第十九卷中卒上氣方六首深師療卒上氣胸心滿塞半夏蘇子湯方半夏五兩洗蘇子一升生薑五兩大棗四十枚擘橘皮桂心各三兩甘草二兩上七味切水七升煮取二升七合分三服氣即下忌海藻菘菜羊肉餳生蔥又療卒急上氣胸心滿竹篠下氣湯方生甘竹篠一虎口石膏一兩生薑橘皮各三兩甘草三兩炙上五味切以水七升煮竹篠取四升半去滓納諸藥煮取二升分二服此方療忽上氣不止者服兩三劑瘥忌海藻菘菜並出第十八卷中備急葛氏療卒上氣鳴息便欲絕方桑根白皮切三升生薑切半升吳茱萸半升上三味切以酒五升煮三沸去滓盡令服之入口則愈千金秘方又方麻黃去節甘草炙各二兩上二味切以水三升煮取一升半分三服古今錄驗用水八升煮取三升八合忌海藻菘菜瘥後欲令不發者更取二味並熬杏仁五十枚搗篩蜜和丸服四五丸日三文仲肘後範汪同又療卒上氣氣不復報肩息方乾薑三兩㕮咀上一味以酒一斗漬服一升日三服又方麻黃三兩去節桂心甘草炙各一兩杏仁如法制上四味切以水六升煮取二升分三服此二方名小投杯湯有氣疾者亦可為散將服之冷多加乾薑三兩淡唾者加半夏三兩忌海藻菘菜生蔥出第三卷中久上氣方四首千金療積年上氣不瘥垂死者方莨菪子熬令色變熟羊肺薄切曝乾為末上二味各別搗等分以七月七日神酢拌令相著夜不食空肚服二方寸匕須臾拾針兩食間以冷漿白粥二口止之隔日一服永瘥三十日內得煮飯汁作蕪菁羹食之以外一切禁斷文仲肘後同又療上氣三十年不瘥方大棗一百枚去核皮豉一百二十顆杏仁一百粒椒二百粒汗上四味先搗杏仁令極熟後納棗椒豉更搗作丸如棗核大含稍稍咽之日三夜一並出第十七卷中近效療久上氣氣急臥不得方紫蘇葉二兩生薑麻黃去節杏仁各三兩赤茯苓桑根白皮葶藶子各二兩熬橘皮一兩半上八味切以水八升先煮麻黃去沫下諸藥和煮取二升七合絞去滓分三服每服如人行七八里久溫服之畢服後丸又丸方葶藶子六兩熬令紫色上一味搗如泥丸如梧子大每食後以棗飲下十丸日二服干棗十顆擘碎以水一升煮取五合去滓用下丸甚效上氣胸滿方二首古今錄驗胡椒丸療咳上氣胸滿時復嘔沫方胡椒蓽茇乾薑各三兩白朮二兩桂心高良薑人參款冬花紫菀甘草炙各二兩上十味搗篩蜜和丸如梧子一服五丸日二服不知增之以知為度忌生冷醋滑豬魚肉蒜桃李雀肉生蔥海藻菘菜出第十九卷中救急茯苓人參散療上氣胸脅滿悶益心力除謬忘永不霍亂能飲食此方功力諸藥不逮有人年四十時因患積痢羸憊不能起止形狀如七十老人服此藥兩劑平復如舊久服延年益壽方茯苓二斤去黑皮擘破如棗大清水漬經一日一夜再易水出於日中曝乾為末人參七兩搗甘草一兩炙切牛乳七升白砂蜜一升五合上五味以水五升納甘草煮取二升除甘草澄濾納茯苓緩火煎令汁欲盡次納白蜜牛乳次納人參緩火煎令汁盡仍攪藥令調勿許焦成日中曝乾搗篩為散以紙盛之溫乳及蜜湯和吃並得亦不限多少夏月水和當麨忌海藻菘菜大醋並是大斗大升大秤兩也此方極驗合數劑立效出第六卷中上氣咳身面腫滿方四首崔氏療肺熱而咳上氣喘急不得坐臥身面腫不下食消腫下氣止咳立驗方葶藶子二十分熬貝母六分杏仁十二分炮紫菀六分茯苓五味子各六分人參桑白皮各八兩上八味搗篩蜜和丸如梧子一服十丸日二服甚者夜一服漸漸加至二三十丸煮棗汁送之若腥氣盛者宜服此藥若小便不利者宜服後方忌酢物又方葶藶子二十分熬杏仁十二分茯苓六分牽牛子八分熬上四味搗篩蜜和為丸如梧子許每服八丸日再夜一漸漸加至二十丸煮棗汁送之大忌醋物又療上氣咳嗽長引氣不得臥或水腫或遍體氣腫或單面腫或足腫並主之方葶藶子三升微熬上一味搗篩為散以清酒五升漬之春夏三日秋冬七日初服如胡桃許大日三夜一冬日二夜二量其氣力取微利為度如患急困者不得待日滿亦可以綿細絞即服其葶藶單莖向上葉端兩角角粗且短又有一種苟芥草葉近根下作歧生角細長採時必須分別前件六種病狀發動各不同始終至困並歸於水但人腹內有塊及兩邊皆有者或當心有塊稍肚大者並是水病即此藥必須得好新熟無灰酒清者始可用經日多者惡不堪用前件病皆是熱服藥唯須慎酒面生冷雞豬魚肉大困及不得臥入口則定老少任意量力必須好差平復始可停藥此方神驗服藥如傷多悶亂者作土漿飲即定並出第六卷中必效療上氣咳嗽腹滿體腫方取楸葉三升上一味煮三十沸去滓煎堪作丸如小棗子以竹筒納下部立愈出第一卷中上氣喉中水雞鳴方一十二首深師療久逆上氣胸滿喉中如水雞鳴投杯湯方小麥一升麻黃四兩去節厚朴五兩石膏如雞子杏仁五合上五味以水一斗煮取小麥熟去麥納藥煮取三升分三服咳嗽甚者加五味子半夏洗各半升乾薑三累經用甚良又療上氣脈浮咳逆咽喉中水雞鳴喘息不通呼吸欲死麻黃湯方麻黃八兩去節射干二兩甘草四兩炙大棗三十顆上四味切以水一斗先煮麻黃三沸去上沫納諸藥煮取三升分三服已用甚良忌海藻菘菜等又療咳逆上氣胸中塞不得息臥不安席牽繩而起咽中如水雞聲投杯湯方款冬花二十分杏仁四十顆甘草一兩炙大棗二十顆桂心二兩麻黃四兩去節生薑半夏洗各三兩紫菀細辛各一兩上十味切以水八升煮取二升頓服之一方分再服臥令汗出食粥數口勿飽食神良忌海藻菘菜羊肉餳生蔥生菜又療咳逆上氣燥嗽冷嗽晝夜甚喉中水雞鳴鍾乳丸方鍾乳人參桂心乾薑各八分附子炮款冬花細辛各六兩紫菀十分杏仁四分上九味搗篩蜜和酒服如小豆二丸日三不知稍稍加之忌豬肉冷水生蔥生菜等物又療上氣咳嗽喉中水雞鳴唾膿血腥臭麻黃湯方麻黃六兩去節桂心一兩甘草炙杏仁去尖皮各二兩生薑八兩一方用乾薑三兩上五味切以水七升煮取三升半分五服已用療咳唾膿血喉中腥臭得力後長將丸服忌海藻菘菜生蔥又療久咳上氣喉中鳴晝夜不得臥貝母散方貝母三兩麻黃去節乾薑各二兩桂心甘草炙各一兩上五味搗篩平旦酒服方寸匕日二不知增之至二匕大劇可至再服酒隨飲多少忌海藻菘菜生蔥等又療久咳逆上氣體腫短氣脹滿晝夜倚壁不得臥喉常作水雞鳴白前湯方白前二兩紫菀半夏洗各三兩大戟切七合上四味切先以水一斗漬之一宿明旦煮取三升分三服忌羊肉餳此方四味千金方見水腫咳上氣中千金古今錄驗同並出第十八卷中小品療咳逆喉中如水雞聲貝母湯方貝母甘草炙各二兩麻黃去節桂心各四兩半夏洗乾薑各三兩杏仁七十枚上七味切以水二斗三升先煮麻黃得十沸納藥煮取三升溫服七合日三忌海藻菘菜生蔥羊肉餳古今錄驗同又療咳而上氣咽中如水雞聲射干麻黃湯方射干十二枚麻黃去節生薑各四兩紫菀三兩款冬花三兩細辛三兩五味子半升半夏八枚洗大棗七枚上九味切以東流水一斗二升煮取三升分三服忌羊肉餳生菜此本仲景傷寒論方千金古今錄驗同並出第一卷中必效療病喘息氣急喉中如水雞聲者無問年月遠近方肥皂莢兩挺好酥一兩上二味於火上炙去火高一尺許以酥細細塗之數翻覆令得所酥盡止以刀輕刮去黑皮然後破之去子皮筋脈搗篩蜜和為丸每日食後服一丸如熟豆日一服訖取一行微利如不利時細細量加以微利為度日止一服忌如藥法出第一卷中古今錄驗沃雪湯療上氣不得息臥喉中如水雞聲氣欲絕方麻黃四兩去節細辛二兩五味子半升桂心乾薑各一兩半夏八枚洗去滑一方四兩上六味切以水一斗煮取三升絞去滓適寒溫服一升投杯則臥一名投杯麻黃湯令人汗出不得臥勿怪亦可從五合不知稍增日再凡煮麻黃先煎二沸去上沫又納余藥忌生蔥生菜羊肉餳集驗經心錄範汪同又投杯湯療久咳嗽上氣胸中寒冷不得息食臥不安席每牽繩而起咽中如水雞聲方款冬花四十顆細辛一兩紫菀三兩甘草炙桂心麻黃去節乾薑各二兩五味子半升杏仁四十枚半夏半升洗上十味切以水八升煮取二升分再服臥汗出即愈忌海藻菘菜生蔥生菜羊肉餳並出第九卷中因食飲水上氣方四首古今錄驗宮泰說李將軍兒得病喘息甚難並數上氣呼吸療之不瘥遂亡本由食餅後乃飲水得之服五味湯不瘥此輩皆死是後乃有婢得之行極而渴飲水多此為所發起同與五味湯亦不瘥然後小瘥泰因此與三物備急藥半錢吐下得瘥由此思惟病之所由以冷水入肺及入腸寒熱不消化結聚逼迫於胃口故令其呼吸乏氣息不得下過謂喘而上氣息數也宜吐下之亦可與三物瓜蒂散吐之三味備急散本療卒死感忤宮泰以療人卒上氣呼吸氣不得