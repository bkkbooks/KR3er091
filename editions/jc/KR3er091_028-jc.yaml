body:
  text: 卷第二十八中惡方一十三首病源中惡者是人精神衰弱為鬼邪之氣猝中之也夫人陰陽順理營衛調平神守則強邪不干正若將攝失宜精神衰弱便中鬼毒之氣其狀猝然心腹刺痛悶亂欲死凡猝中惡腹大而滿者診其脈緊大而浮者死緊細而微者生又中惡吐血數升脈沉數細者死浮焱如疾者生中惡有瘥後余勢停滯發作則變成注又中惡死候中鬼邪之氣猝然心腹絞痛悶絕此是客邪暴盛陰陽為之離絕上下不通故氣暴厥絕如死良久其真氣復則生也而有乘年之衰逄月之空失時之和謂之三虛三虛而腑臟衰弱精神微羸中之則真氣竭絕則死也其得瘥者若余勢停滯發作則變成注並出第二十三卷中廣濟療猝中惡心腹刺痛去惡氣方麝香一分研青木香二分生犀角二分屑上三味為散空心熟水服方寸匕日二立效未止更作忌如常法出第四卷中肘後華佗療中惡短氣欲絕方灸兩足大𧿹趾上甲後聚毛中各灸二七壯即愈又法三七壯集驗張文仲備急同又方杏仁七十枚去尖皮桂心二兩甘草一兩炙麻黃三兩去節一方四兩上四味切以水八升煮取三升分三服含咽之通療諸昏客忤良忌如常法又方韭根一把烏梅十四顆茱萸半升上三味切以勞水一升煮之以病人櫛納中三沸櫛浮者生沉者死煮取三升飲之大效又方桂心一兩生薑三兩梔子十四枚豉五合上四味搗碎以酒二升微煮之去滓頓服之取吐為度並出第一卷中集驗療中惡遁屍心腹及身體有痛處甚者短氣不語手摸按之得其痛處則病色動惡人近則是痛處方取艾葉挼碎著痛上厚寸余鐺中煮湯和灰作泥令熱敷艾上冷輒易之不過再著則愈出七卷中又療中惡心痛胸脅㽲痛喘急湯方桃東行枝白皮一握真珠一兩梔子仁十四枚生薑二兩當歸桂心各三兩附子一兩炮香豉五合吳茱萸五合上九味切以水八升煮取二升去滓納真珠分二服忌如常法小品同又方仰臥以物塞兩耳以兩個竹筒納死人鼻中使兩人痛吹之塞口旁無令氣得出半日所死人即噫噫勿復吹也千金同又方搗皂莢細辛屑吹兩鼻孔中單用皂莢末亦佳千金同並出第四卷中刪繁療中惡痛欲絕方釜底墨五合鹽一撮上二味和研以水一升攪調一服範汪同又方牛屎絞取汁五合為一服口不開扣齒納藥若無新者乾者即以水和取汁並出第十卷中崔氏療猝中惡氣絕方取真珠研末書鬼字於舌上額上亦書鬼字驗又方灸右肩高骨上隨年壯並出第四卷中猝死方二十四首病源猝死者由三虛而遇賊風所為也三虛謂乘年之衰一也乘月之空二也失時之和三也人有此三虛而為賊風所傷使陰氣偏竭於內則陽氣阻隔於外二氣壅閉故暴絕如死也若腑臟氣未絕者良久乃蘇然亦有挾鬼神之氣而猝死者皆有頃邪退乃活也凡中惡及猝忤猝然氣絕其後得蘇若其邪氣不盡者停滯心腹或心腹痛或身體沉重不能飲食而成宿疹者皆變成疰又猝忤死候犯猝忤客邪鬼氣猝急傷人入於腑臟使陰陽離絕氣血暴不通流奄然厥絕如死狀也良久陰陽之氣和乃蘇若腑臟虛弱者死亦有雖蘇而毒氣不盡時發即心腹刺痛連滯變成疰也並出第二十三卷中甲乙經云黃帝問於岐伯有猝死者何邪使然答曰得三虛者暴疾而死得三實者邪不能傷也黃帝曰願聞三虛答曰乘年之衰逢月之空失時之和因為賊風所傷也願聞三實答曰逢年之盛遇月之滿得時之和雖有賊風邪氣不能傷也有猝死不知人有復生何氣使然陰氣先竭陽氣未入故猝死而不知人氣復則生集驗同出第六卷中肘後云猝死中惡及屍厥者皆天地及人身自然陰陽之氣有乖離痞隔上下不通偏竭所致故雖涉死境猶可療而生緣氣未都竭也當爾之時兼有鬼神於其間故亦可以符術護濟者又猝死或先有病痛或居常倒僕奄忽而絕皆是中惡之類療方取蔥刺鼻令入數寸須使目中血出乃佳一云耳中血出佳此扁鵲法同後云吹耳中葛氏吹鼻別為一法肘後集驗備急文仲必效等同崔氏亦療中惡又方令二人以衣壅口吹其兩耳亦可以葦筒吹之肘後同又方以蔥刺耳耳中鼻中血出者勿怪無血難療之有血者是活候也其欲蘇時當捧兩手莫放之須臾死人目當舉手撈人言痛乃止男刺左鼻女刺右鼻孔令入七寸余無苦立效亦療自縊死此扁鵲法肘後集驗備急同又方視其上唇裡弦有青息肉如黍米大以針決去之瘥肘後同又方以小便灌其面數過即能活扁鵲法也肘後集驗張文仲備急同又方以綿漬好酒納鼻中手按令汁入鼻中並持其手足莫令驚動也肘後同又方灸其唇下宛宛中名承漿十壯大良肘後同並出第一卷中文仲療猝死方濕牛馬糞絞取汁以灌其口中令入喉若口已噤者以物強發若不可強發者扣折齒下之若無新者以水若人尿和乾者絞取汁扁鵲法集驗備急肘後同又方以細繩圍其人肘腕中男左女右伸繩從背上大椎度以下行脊上灸繩頭一云五十壯又從此灸橫行各半繩此凡三灸各灸三壯即起又方令人痛抓其人人中取醒不起者卷其手灸下紋頭隨年壯又方灸鼻下人中三壯又方灸臍中百壯又方半夏末如大豆許吹鼻中又方搗薤若韭取汁以灌口鼻中張文仲集驗範汪同又方豬膏如雞子大苦酒一升煮沸灌喉中集驗肘後備急同又猝死而壯熱者方礬石半斤煮以漬腳令沒踝肘後範汪同並出第一卷中備急療猝死而目閉者方騎牛臨其面搗薤汁灌耳中末皂莢吹鼻中集驗文仲肘後範汪同又療猝死而張目反折者方灸手足兩爪甲後各十四壯飲以五毒諸膏散有巴豆者良肘後張文仲同又療猝死而四肢不收失便者方馬屎一升水三斗煮取二斗以洗足又取牛糞一升溫酒和灌口中肘後同又方灸心下一寸臍上三寸臍下四寸各百壯良肘後同又猝死而口噤不開者方縛兩手大拇指灸兩白肉中二十壯肘後文仲範汪同並出第一卷中集驗療猝死無脈無他形候陰陽俱竭故也方牽牛臨鼻上二百息又炙熨斗以熨兩脅下針兩間使各百餘息灸人中又療猝死而有脈形候陰氣先盡陽氣後竭故也方嚼薤哺灌之肘後文仲千金範汪同並出第一卷中古今錄驗司空三物備急散療猝死及感忤口噤不開者方巴豆去心皮熬乾薑大黃各等分上藥搗篩為散服如大豆許二枚以水三合和之腹脹煩熱復飲水能多益佳又療心腹痛幾死服此丸令小利瘥如腹常滿痛當令得下瘥一方服一刀圭以酒下之不能刀圭者便丸如大豆許四枚不知復加一豆許不瘥又加一豆許若病者口噤不能自飲掘口含之藥不預合預合氣力歇猝病者便合之無臼木杯中搗耳不過三服取利無不瘥者蜜丸尤良出第四卷中客忤方一十三首病源猝忤者亦名客忤謂邪客之氣猝犯忤人精神也此是鬼癘之毒氣中惡之類也人有魂魄衰弱者則為鬼氣所犯忤喜於道間門外得之其狀心腹絞痛脹滿氣衝心胸或即悶絕不復識人肉色變異腑臟虛竭者不療即至於死然其毒氣有輕重輕者微療而瘥重者侵克腑臟雖當時救療餘氣停滯久後猶發乃變成疰出第二十三卷中肘後論曰客者客氣也忤者犯也謂客氣忽犯人也此惡鬼毒癘之氣療之多愈亦有侵克臟腑經絡雖瘥後猶宜治療以消余勢不爾終為人患有時輒發又客忤死者中惡之類也喜於道間門外得之令人心腹絞痛脹滿氣衝心胸不即療亦殺人方灸鼻下人中三十壯愈備急文仲同又方以水漬粳米取汁二升以飲之口已噤者以物強發之又方以銅器瓦器盛熱湯器著腹上冷者徹去衣器襯肉大冷者易以熱湯取愈也又方先以衣三重藉腹上以銅器著衣上取茅草於器中燒之草盡再益勿頓多也取愈乃止備急文仲同又方以繩橫其人口以度度臍四面各一處灸三壯令火俱起也又方橫度口中折之令上頭著心下灸下頭五壯也並出第一卷中又療客忤心腹絞痛脹滿氣衝心胸煩躁壯熱或氣悶絞刺鬼魅之氣未散方麝香一錢茯神人參天門冬去心鬼臼菖蒲等分上六味蜜丸如桐子服十丸日三文仲扁鵲療客忤有救卒死符並服鹽湯法恐非庸世所能用故不載而此病即今人所謂中惡者與猝死鬼擊亦相類焉療皆參取而用之已死者方搗生菖蒲根絞取汁含之即愈備急肘後同又療猝忤停屍不能言者方燒桔梗二枚末飲服之又方細辛桂心各等分上二味納口中肘後備急同又猝忤口噤不開者方生附子末置管中吹納舌下備急肘後同並出第一卷中千金療客忤惡氣方吞麝香如大豆立驗出第五卷中千金翼客忤方灸間使七壯又肩井百壯又十指甲下各三壯出第二十七卷中猝魘方二十一首病源猝魘者屈也謂夢裡為鬼邪之所魘屈也人臥不寤皆是魂魄外遊為他邪所執錄欲還未得致成魘也忌火照火照則魂魄遂不復入乃至於死而人有於燈光前魘者本由明出所以不忌火也其湯熨針石別有正方補養宣導今附於後養生方導引法云拘魂門制魄戶名曰握固法屈大拇指著四小指內抱之積習不止眠時亦不復開令人不魘魅又云人魘忽然明喚之魘死宜暗喚之好唯得遠喚亦不得近而急喚亦喜失魂魄也又魘不寤候人眠睡則魂魄外遊為鬼邪所魘屈其精神弱者魘則久不得寤乃至氣暴絕所以須旁人助喚並以方術療之即蘇也並出第二十三卷中肘後療猝魘寐不寤方臥忽不寤勿以火照之殺人但痛齧其腳踵及足𧿹趾甲際而多唾其面則覺也又方皂莢末以竹筒吹兩鼻孔中即起三兩日猶可吹之也又方以筆毛刺兩鼻孔男左女右展轉進之取起也集驗同又方搗薤取汁吹兩鼻孔冬日取韭絞汁灌口集驗仲景文仲備急同又方以蘆管吹兩耳並取其人發一七莖作繩納鼻孔中割雄雞冠取血以管吹喉咽中大良並出第一卷中集驗療猝魘方以鹽湯飲之多少在意並齧其足大趾爪際痛齧之即起也肘後文仲備急同又方以其人置地取利刀畫從肩起男左女右畫地令周遍訖以刀鋒刺病人鼻下人中令入一分急持勿動其人當鬼語求去乃具問阿誰以何故來自當乞去乃以指滅向所畫地當肩頭數寸令得去又方雄黃細篩管吹兩鼻孔中佳並出第一卷中崔氏主猝魘方以甑帶左索縛其肘後男左女右用余猶急絞之又縛床腳乃詰問其故肘後古今錄驗同崔氏云療猝狂鬼語方以甑帶急令縛兩手大指便灸左右脅下屈肘頭尖各七壯須臾鬼語自道姓名乞去徐詰問乃解其手文仲療猝魘方令一人坐頭邊守一人於戶外呼病人姓名坐人應曰在便蘇活也肘後同又人喜魘及惡夢者方以下並闢魘方取燒死人灰著履中令枕之又方帶雄黃男左女右也又方枕麝香一分於頭邊佳又灌香少許又方以虎頭為枕佳又方取雄黃如棗核系左腋下令人終生不魘也集驗範汪同又方作犀角枕佳又方青木香納枕中並帶之亦佳並出第一卷中千金小定心湯療虛羸心氣驚弱多魘方茯神四分一本作茯苓甘草芍藥乾薑大棗十五枚擘遠志去心人參桂心各二兩上八味切以水八升煮取三升分三服日三忌如常法又大定心湯療心氣虛悸恍惚多忘或夢寤驚魘志少不足方人參茯苓茯神遠志去心赤石脂龍骨乾薑當歸甘草炙白朮芍藥大棗桂心防風紫菀各二兩上十五味切以水一斗二升煮取三升半分為五服日三夜二忌如常法千金翼療猝魘不覺方灸兩足大趾聚毛中二十一壯範汪同出第二十七卷中備急療猝魘不寤方末灶下黃土或雄黃桂心末亦得右以蘆管吹入兩鼻孔中文仲同出第一卷中鬼擊一十首病源鬼擊者謂鬼癘之氣擊著於人也得之無漸猝著如人以刀矛刺狀胸脅腹內絞急切痛不可抑按或即吐血或鼻中出血或下血一名為鬼排言鬼排觸於人也氣血虛弱精魂衰微忽與鬼神遇相觸突致之為其所排擊輕者因而獲免重者多死也出第二十三卷中肘後鬼擊之病得之無漸猝著如人以刀矛刺狀胸脅腹內絞急切痛不可抑按或即吐血或鼻中出血或下血一名鬼排治之方灸臍上一寸七壯及兩踵白肉際瘥千金翼同又方熟艾如鴨子大三枚以水五升煮取二升頓服之並出第一卷中文仲療鬼擊方鹽一升以水二升和攪飲之並以冷水潠之須臾吐即瘥備急肘後同又方粉一撮於水中攪飲之備急肘後同又方以淳苦酒吹令入兩鼻孔中肘後同並出第一卷中備急療鬼擊方燒鼠至末如黍米許水和服不能飲以水和少許納喉中肘後文仲同又方升麻獨活桂心各等分上三味為末酒服方寸匕立愈肘後同又有諸丸散並在備急條中今巫覡實見人忽被神鬼所擊刺擺扌𧴲者或犯其行伍或遇相觸突或身神散弱或愆負所招輕者獲免重者多死猶如周宣燕簡輩事不為虛也必應死者亦不可療要自不得不救之耳肘後同並出第一卷中刪繁倉公散方特生礬石燒半日研皂莢炙去皮子雄黃研藜蘆熬上四味等分搗為末主療猝鬼擊鬼排鬼刺心腹痛下血便死不知人及臥魘齧腳踵不覺者諸惡毒氣病取前散如大豆許以管吹入鼻中得嚏則氣通便活若未嚏復更吹之得嚏為度此藥能起死人漢文帝太倉令淳于意以此方療如前病勝余方若別疾不若玉壺丸等法崔氏備急範汪等同出第六卷中千金翼療鬼擊方灸臍下一寸三壯出第二十七卷中屍厥方一十二首病源屍厥者陰氣逆也此由陽脈猝下墜陰脈猝上升陰陽離居營衛不通真氣厥亂客邪乘之其狀如死猶微有息而不常脈尚動而形無知也聽其耳內循循有如嘯之聲而股間暖者是也耳內雖無嘯聲而脈動者故當以屍厥療之診其寸口脈沉大而滑沉則為實滑則為氣實氣相搏身溫而汗此為入腑雖猝厥不知人氣復則自愈若唇正青身冷此為入臟亦猝厥不知人即死候其左手關上脈陰陽俱虛足厥陰足少陽俱虛也病若恍惚不知人妄有所見張仲景云屍厥脈動而無氣氣閉不通故靜而死也治方菖蒲屑納鼻兩孔中吹之令人以桂屑著舌下又方取左角發方寸匕燒末酒和灌令入喉立起肘後方白馬尾二七莖白馬前腳甲二枚燒之以苦酒丸如小豆大開口吞二丸須臾服一丸又方灸鼻人中七壯又灸陰囊下去下部一寸百壯若婦人灸兩乳中又云爪刺人中良久又針人中至齒立起此扁鵲法又方以繩圍其臂脘男左女右繩從大椎上度下行脊上灸繩頭盡處五十壯活此是扁鵲法又方熨其兩脅下取炷中墨如彈丸大漿和飲之更以管吹耳中令三四人更互吹之又方以小管吹鼻孔梁上塵如豆大著中吹之令入又方針百會當鼻中入髮際五寸許針入三分補之針足大趾甲下肉側去甲三分又針足中趾甲上各三分大趾之肉去端韭葉許又針手少陰銳骨之端各一分又方灸膻中季肋間二七壯也肘後惟云灸膻中集驗同並出第一卷中千金論曰風寒之氣客於臟間滯而不能發故喑不能言及喉痹失聲皆風邪所為也入臟皆能殺人凡屍厥如死脈動如故此陽脈下墜陰脈上爭氣閉故也療方灸百會百壯針入三分補之又方針足中趾頭去甲如韭葉並刺足大趾甲下內側去甲三分崔氏論曰凡屍厥為病脈動而形無所知陽脈下墜陰脈上爭營衛不通其狀如死而猶微有息其息不常人乃不知欲殯殮者療之方急可以蘆管吹其兩耳極盡以氣吹之立起若人氣極可易人吹之出第四卷中中蠱毒方二十一首病源凡蠱毒有數種皆是變惑之氣人有故造作之多取蠱蛇之類以器皿盛貯任其自相啖食唯有一物獨在者即謂之為蠱便能變惑隨逐酒食為人患禍患禍於他則蠱主吉利所以不羈之徒而畜事之又有飛蠱去來無由漸狀如鬼氣者得之猝重凡中蠱病多趨於死以其毒害勢甚故云蠱毒著蠱毒面青黃者是蛇蠱其脈洪壯病發之時腹內熱悶胸脅支滿舌本脹強不喜言語身體常痛又心腹如似蟲行顏色赤唇口乾燥經年不治肝膈爛而死其面色赤黃者是蜴蜥蠱其脈浮滑而短病發之時腰背微滿手腳唇口悉皆習習而喉脈急舌上生瘡二百日不治啖人心肝盡爛下膿血羸瘦顏色枯黑而死其面色青白又云其脈沉濡病發之時咽喉塞不欲聞人語腹內鳴喚或上或下天陰雨轉劇皮內如蟲行手腳煩熱嗜醋食咳唾膿血顏色乍白乍青腹內脹滿狀若蝦蟆若成蟲吐出成蝌蚪形是蝦蟆蠱經年不治啖人脾胃盡唇口裂而死其脈緩而散者病發之時身體乍冷乍熱手腳煩疼無時節吐逆小便赤黃腹內悶胸痛顏色多青毒或吐出似蜣螂有足翅是蜣螂蠱經年不治啖人血脈枯盡而死欲知是蠱與非當令病人唾水內沉者是蠱浮者非蠱又云旦起取井華水未食前當令病人唾水內唾如柱腳直下沉者是蠱毒沉散不至下者草毒又云含大豆若是蠱豆脹皮脫若非蠱豆不爛脫又云以鵠皮置病人臥下勿令病人知若病劇者是蠱也又云取新生雞子煮熟去皮留黃白令完全日晚口含以齒微齧勿令破作兩炊時夜吐瓦上著霜露內旦看大青是蠱毒也昔有人食新變鱧魚中毒病心腹痛心下硬發熱煩冤欲得水洗沃身體搖動如魚得水狀有人診云是蠱其家云從無此毒不作蠱治遂死其湯熨針石別有正方補養宣導今附於後養生方導引法云兩手著頭相叉坐地緩舒兩腳以兩手從外抱膝中痛低頭入膝間兩手交叉頭十二通愈蠱毒及三尸毒腰中大氣又云常度日月星辰清淨以雞鳴安身臥漱口三咽之調五臟殺蠱蟲令人長生治心腹病又云治百病邪蠱當正臥閉目閉氣內視丹田以鼻徐徐納氣令腹極滿徐徐以口吐之勿令有聲令入多出少以微為故存視五臟各如其形色又存胃中令鮮明潔白如素為之倦極汗出乃止以粉粉身摩捋形體汗不出而倦者亦可止明日復為之又當存作大雷電光走入腹中為之不止病自除出第二十五卷中千金論曰蠱毒千品種種不同或吐下鮮血或好臥暗室不欲見光明或心性反常乍嗔乍喜或四肢沉重百節痠疼如此種種狀貌說不可盡亦有得之三年乃死急者一月或百日即死其死時皆於九孔中或於脅下肉中出去所以出門常須帶雄黃麝香神丹諸大辟惡藥則百蟲貓鬼狐貍老物精魅永不敢著人養生之家大須慮此以下亦有灸法初中蠱於心下作艾炷灸一百壯並主貓鬼亦灸得瘥又論曰世有拙醫見患蠱脹者偏腹腫滿四肢如故小便不甚澀以水病療之近服水藥經五十餘日望漸痊愈日復增加奄致殂殞如此者不一學者當細尋方意消息用之萬不失一醫方千卷不盡其理所以不可一一備述云爾出第二十五卷中廣濟療蠱毒方服此升麻散三四日後即服前光砂丸方升麻桔梗栝蔞各五兩上三味搗為散以熟湯洗所患人陰中再以濃汁服方寸匕日二服漸加至二匕內消忌黏食豬肉出第四卷中肘後療中蠱毒諸方人有養畜蠱毒以病人凡診法中蠱狀令人心腹切痛如有物齧或吐下血不即療之食人五臟盡即死矣欲知是蠱與非當令病人唾水沉者是浮者非也小品文仲備急集驗千金並翼同又欲知蠱主姓名方取鼓皮一片燒灰末以飲服病人須臾自當呼蠱主姓名可語令知便即去病愈矣亦有以蛇涎合作蠱毒著飲食中使人得瘕病此一種積年乃死療之各自有藥江南山間人不可不信之又方以蘘荷密著病人臥席上亦能令呼蠱主姓名也文仲備急千金並翼同出第三卷中小品療蠱方鼓皮廣五寸長一尺薔薇根五寸如足𧿹趾大細切本方云莨菪根上二味以水一升清酒三升煮取一升頓服之當下蠱即愈千金古今錄驗同千金治蠱吐下血又方土瓜根大如拇指長三寸切以酒半升漬一宿一服當吐下古今錄驗同又方皂莢三挺長一尺者炙去皮子美酒一升漬一宿去滓頓服古今錄驗範汪同肘後云以酒五升分三服又方取薺苨根搗為末以飲服方寸匕古今錄驗同千金犀角丸療蠱毒百病腹暴痛飛屍惡氣腫方犀角末羚羊角末鬼臼桂心各量四錢匕天雄炮莽草炙真珠研雄黃研各一兩麝香半兩研貝齒燒灰五枚赤足蜈蚣五節炙射罔如雞子黃三枚巴豆五十枚去皮心熬上十三味各搗合篩之以蜜和為丸如小豆大服一丸不知增一丸猝得腹中痛飛屍服如大豆二丸若惡氣腫以苦酒和以塗之甚良以絳囊盛藥系男左女右臂辟惡可以備急療萬病也忌如常法崔氏古今錄驗範汪同出第一十五卷中千金翼療蠱毒方槲木北陰白皮一大握長五寸以水三升煎取一升空腹服之即吐蠱出也並療蠱下血出第十五卷中崔氏療蠱方黃栝蔞根乾者二兩搗以綿裹酒一升漬一日去滓溫服之少時即吐利蠱即出後煮粥飲服一兩盞吐利即斷不斷即煮人參甘草炙生薑各一兩服之此根唯山南者好出第三卷中備急療蠱方取白鴿毛糞燒灰以飲和服之良又療蠱方人家雖藏此方而不知如此效驗搗生栝蔞根取汁一升醬汁少許和溫服之須臾吐蠱出試驗並出第十六卷中必效療蠱毒大神驗方大戟桃白皮東引者以火烘之斑蝥去足翅熬等分上三味搗篩為散以冷水服半方寸匕一服其毒即出未出更一服蠱並出李饒州法云奇效若以酒中得則以酒服若食中得以飲服之崔氏千金同肘後云斑蝥一分桃皮大戟各二分和棗核大米清飲服吐出蠱十日不瘥更一服千金崔氏云服八捻又方胡荽根搗取汁半升和酒服之立下又方取未鑽相思子二七枚搗碎為末暖水半盞和攪頓服之令盡即當欲吐抑之勿吐若耐不得即大張口吐之其毒即出出訖服稀粥勿食諸肉輕者但服七枚瘥無問年月深淺非常神效勿輕之又試蠱法取銀匙若箸或釵含之經宿色黑即是不黑者非出第三卷中古今錄驗療蠱方巴豆十枚去心皮熬豉半升熬釜底墨方寸匕上三味搗篩為散清旦以酒服如簪頭大小行蠱主當自至門勿應之去到家立自知其姓名又雄黃丸主蠱毒中藥欲死方雄黃研硃砂研藜蘆炙馬目毒公皂莢炙去皮子二分莽草二分炙巴豆去心皮熬各二分上七味搗篩以蜜丸如大豆許服三丸當轉下先利清水次出蛇等當煩悶者依常法可用鴨羹補之忌如常法又療中蠱毒方取牡丹根搗末服一錢匕日三服至良忌胡荽範汪同又療中蠱胡洽方以豬膽導下部至良肘後集驗範汪同並出第四十五卷中蠱吐血方一十首病源蠱是合聚蠱蛇之類以器皿盛之任其相啖食餘一存者名為蠱能害人食人腑臟其狀心切痛如被物齧或硬麵目青黃病變無常是先傷於膈上則吐血也不即治之食臟腑盡則死出第二十五卷中肘後療中蠱毒吐血或下血皆如爛肝方茜根蘘荷根各三兩上二味㕮咀以水四升煮取二升去滓頓服即愈又當自知蠱主姓名千金小品崔氏文仲備急古今錄驗同又方巴豆一枚去心皮熬豉三粒釜底墨方寸匕上三味搗分作三丸飲下一丸須臾當下蠱毒不下更服一丸小品必效集驗文仲備急範汪同並出第三卷中範汪療中蠱吐血方麥面二升熬以水服之令盡當下蠱又方苦瓠一枚以水二升煮取一升分服當吐蠱如蝦蟆蝌蚪之類苦瓠毒可臨時量用之肘後千金小品文仲備急古今錄驗同千金云苦瓠一分治下血又方生桔梗搗取汁服二三升日三服牛膝根亦得並出第十四卷中文仲療中蠱吐血方羚羊皮方三寸敗鼓皮亦佳苦參蘘荷根三兩黃連二兩當歸二兩上五味切以水七升煎取二升分三服備急集驗同一方有苦瓠又方取桑木心銼一斛於釜中以水淹之令上有三寸煮取二斗澄取清又微火煎得五升宿勿食旦服五合則吐蠱毒崔氏集驗古今錄驗同又方雄黃研釜月下黃土獺犴炙各如棗斑蝥十四枚去足翅熬上四味搗末以酪漿服之分為三四服則吐蝦蟆小品同古今錄驗方有大黃如棗大或吐蝦蟆及蛇等物余同範汪同崔氏療中蠱吐血方雄黃研丹砂研藜蘆炙各一兩上三味搗篩為散旦以井華水服一刀圭當吐蠱毒忌生血物貍肉肘後集驗同凡蠱有數種而人養作者最多也郡縣有名章者尤甚今東有句章章安故鄉南有豫章無村不有無縣不有而不能如此之甚耳非唯其飲食不可啖乃至目色之已入人類此輩小易療復有自然飛蠱狀如鬼氣者難療此諸種得真犀角麝香雄黃為良藥人可常帶此亦預防之易有蠱卦又子產所說並以器皿中蟲為蠱今省凡皿上安一蟲字或作蟲邊大非體也並出第四卷中小品療中蠱心痛吐血欲死方鹽一升淳苦酒一升煮令消和一服立吐蠱毒出已用良驗肘後文仲備急古今錄驗同出第四卷中蠱下血方九首病源蠱是合聚蟲蛇之類以器皿盛之任其自相食啖餘留一存者為蠱能變化為毒害人有事之以毒害多因飲食內行之人中之者心腹懊痛煩毒不可忍食人五臟下血瘀黑如爛雞肝出第二十五卷中小品療蠱毒腹痛注下赤血躑躅散方羊躑躅乾薑藜蘆熬附子炮巴豆去皮心熬野葛皮肉桂丹砂研雄黃研蜈蚣炙各一分上十味搗為散以水服一刀圭不知加一粟米忌豬肉蘆筍生血物生蔥貍肉古今錄驗同又療蠱下血欲死方薔薇根銼一升牛膝五連翹子一升臘一彈子許上四味切以水四升煮取三升分三服即愈古今錄驗同又療諸蠱大便下血日數十行方巴豆二七枚藜蘆炙附子炮芫菁去足翅熬礬石各二分熬汁盡上五味搗下篩別研巴豆如膏和相得以綿裹一大豆許納下部中日二三愈忌同前方千金古今錄驗同並出第四卷中千金凡忽患下血以上件方療更增劇者此是中蠱其下血狀如鴨肝腹中絞痛急者此方主之茜根升麻犀角各三兩地榆白蘘荷各四兩桔梗黃柏黃芩各一兩上八味切以水九升煮取二升半分三服又凡猝患血痢或赤或黑無有多少此皆是蠱毒粗醫以斷痢處之此大非也又療中蠱毒吐血下血皆如爛雞肝令人心腹絞切痛如有物齧若不即療令人五臟盡乃死驗之法欲知是蠱令病人唾水中沉者是蠱浮者非蠱也方槲木北陰白皮桃根皮蝟皮炙一方寸匕亂髮灰一方寸匕生麻子汁五升上五味先煮槲皮桃根取濃汁一升和麻子汁亂髮灰蝟皮末等令病者少食旦服一升須臾著盆水以雞翮攪吐水中如牛涎犢胎及諸蠱毒之物出第二十五卷中千金翼療蠱毒下血方蝟皮燒灰以水服方寸匕當吐蠱毒出第十五卷中崔氏療中蠱下血及毒下羚羊皮湯方羚羊皮方三寸炙蘘荷根四兩苦參黃連各二兩當歸升麻犀角各三兩上七味切以水九升煮取三升分三服無蘘荷根以茜根代之又療中蠱毒瀉血日夜無度腹痛不可忍方取白蘘荷葉四五枚私納著病人眠臥處席下勿令病人知之若為蠱毒所傷則不肯在上眠即知是蠱毒為病用皂莢三挺炙去皮子打碎用極釅醋四升於瓷器中候日正午時漬皂莢又以新白布三尺蓋上布上又橫一口食刀正對病人眠床下安之至來日午時取藥用蓋藥布濾去滓分三服每服相去如人行十里久若不肯服可將針刺兩手大拇指端甲亦不勞深其針且勿拔出病人當自服藥蠱毒或吐或大便中出除其血即斷腹痛亦除此方用皆驗並出第三卷中古今錄驗療猝中蠱下血如雞肝者晝夜下石余血四臟悉損唯心未毀或乃鼻破待死方桔梗搗末以酒服方寸匕日三不能下藥以物揭口開灌之心中當煩須臾自靜有頃下蠱至服七日止當服豬肝臛以補之出第四卷中五蠱方一十二首千金太上五蠱丸主百蠱吐血傷中心腹結氣或堅氣塞咽喉語聲不出短氣欲死飲食不下吐逆上氣去來無常狀如鬼祟身體浮腫心悶煩疼寒戰夢與鬼交狐貍作魅卒得心痛上叉胸脅痛如刀刺經年累歲著床不起悉主之方雄黃研椒目熬巴豆去心皮熬鬼臼莽草炙芫花熬真珠藜蘆炙礬石各四分燒獺肝炙二分附子炮去皮五分蜈蚣三枚炙斑蝥三十枚去翅足熬上十三味搗末蜜和更搗一二千杵每服如小豆一丸余密封勿泄十丸為一劑如不中病後日增一丸以下利為度當下蟲種種狀貌不可具載下七日後將息服一劑三十年百病盡除忌五辛豬肉冷水生血物貍肉蘆筍等又方酒服桔梗犀角末方寸匕日三服不能自服揭口與藥下心中當煩須臾自靜有頃下至七日止當食豬脾以補之並出第二十五卷中崔氏療五蠱毒方一曰蛇蠱食中得之咽中如有物咽之不入吐之不出悶亂不得眠心熱不能食方服馬兜鈴根即吐出又服麝香方寸匕亦自消或吐出也二曰蜣螂蠱得之胸中忽然或哽入咽怵怵如蟲行咳而有血方服獾肫脂即下或吐或自消也三曰蝦蟆蠱得之心腹脹滿口乾思水不能食悶亂大喘而氣發方服車脂半升即出四曰蝌蚪蠱同上療法甚驗五曰草蠱術在西涼以西及嶺南人多行此毒入人咽刺痛求死方服甘草藍汁即自消又方五蠱共一法療之但取產婦胎衣切之曝乾為散水和服半錢匕五毒自消又方含升麻咽汁又方五蠱都服馬兜鈴苗似蘿藦草形正直上取雞子大搗為散服半錢匕或至一匕五蠱毒之病多在喉中常須記之或小醫不識此病言胃冷蛔動或浪稱是注灸刺浪服諸藥枉死也此由醫生未經歷故也宜令審別之並出第三卷中古今錄驗五蠱湯方犀角三兩蘘荷根黃連縫草當歸各二兩羚羊皮方二寸炙上六味切以水七升煮取二升分為三服又五蠱下利去膏血赤罽丸方芫花一升巴豆一百枚赤罽方圓一寸上三味搗篩以蜜為丸更搗丸如胡豆服一丸如下利不止以清粥汁止之不下小增之欲令陰除不令大下範汪同並出第四十五卷中蠱注方三首病源蠱注者住也言其病遲滯停住死又注易旁人也蠱者是聚蛇蠱之類以器皿盛之令其自相啖食余有一個存者為蠱也而能變化人有造作欽事之者以毒害於他多於飲食內而行用之中之者心悶腹痛其食五臟盡則死有緩有急急者倉猝十數日便死緩者延引歲月遊走腹內常氣力羸憊骨節沉重發則心腹煩懊而痛令人所食之物亦變化為蠱漸侵食腑臟盡而死死則病流注染著旁人故為蠱注也出第二十四卷中範汪療蠱注百病癥瘕積聚酸削骨肉大小便不利猝忤遇惡風臚脹腹滿淋水轉相注殫門盡戶延及男女外孫醫所不能療更生十七物紫參丸方紫參人參半夏洗藜蘆代赭桔梗白薇肉蓯蓉各三分石膏一分大黃一分牡蠣一分熬丹參一分蝦蟆灰烏頭炮四分狼毒一分附子炮五分巴豆七十枚去心皮熬上藥搗篩蜜和為丸以飲下如小豆一丸日三服老小以意減之蜂蠆所螫以塗其上神良忌羊肉冷水一方無蝦蟆有乾薑四分出第十四卷中小品雄黃丸療蠱注四肢浮腫肌膚消索咳逆腹大如水狀漏泄死後注易家人方一名蠱脹方雄黃研巴豆莽草炙鬼臼各四分蜈蚣三枚炙上五味搗篩為末蜜和更搗三千杵藥成密器封之勿令泄氣宿勿食服如小豆一丸不知加一丸當先下清水蟲長數寸及下蛇或如壞雞子或白如膏下訖後作蔥豉粥鴨羹補之忌生魚生菜豬肉蘆筍冷水暖食將養也千金同出十四卷中集驗療鬼注蠱注毒氣變化無常鮫魚皮散方鮫魚皮鵲魚斑皮是犀角麝香研龍骨丹砂研雄黃研蘘荷葉鹿角炙各一分蜈蚣一枚炙椒一分汗乾薑一分貝子十枚雞舌香一分上十三味搗篩為散空心酒服一錢匕日三服出第一卷中蠱毒雜療方五首小品療蠱似蛔方雄黃研麝香研上二味各如大豆許取生羊肺如指大以刀開取雄黃等末以肺裹吞之崔氏集驗古今錄驗同又療人食菜及果子中蛇毒方大豆末以酒漬取汁半升服之又以雞血和真鐵精吞如梧子大一丸古今錄驗同又療有人食新變魚取飽中毒病心腹痛心下堅發熱煩冤欲得水沃身動搖如魚得水狀有人診病云是蠱家云野中相承無此毒不作蠱療之遂死並出第四卷中千金療人得藥雜蠱方斑蝥六枚去足翅熬桂心一片如指大釜月下土如彈丸大藜蘆如指大炙上四味搗散水服一錢匕下蟲蛇蝦蟆蜣螂白蟲又療有人中蠱毒腹內堅如石面目青黃小便淋瀝變狀無常方犀角一兩芍藥一兩黃連二兩本方一兩梔子仁十枚蘘荷葉四兩半牡丹皮一兩羚羊皮方廣五寸炙上七味切以水五升煮取一升半去滓分溫再服翼古今錄驗同出第二十五卷中古今錄驗療食中有蠱毒令人腹內堅痛面目青黃淋露骨立病變無常方爐中取鐵精細研別搗烏雞肝和之丸如梧子大以酒服三丸日三服甚者不過十日愈微者便愈肘後崔氏同出第四十五卷中貓鬼野道方三首病源貓鬼者云是老貍野物之類變為鬼蜮而依附於人人畜事之猶如事蠱以毒害人其病狀心腹刺痛食人腑臟吐血痢血而死又野道者是無主之蠱也人有畜事蠱以毒害人為惡既積乃至死滅絕其蠱則無所依止浮游田野道路之間有犯害人者其病發猶是蠱之狀但以其于田野道路得之故謂之野道並出第二十五卷中千金療貓鬼野道病歌哭不自由方五月五日取自死赤蛇燒作灰研井華水服方寸匕日一服又療貓鬼眼見貓貍並耳有所聞方相思子蓖麻子巴豆各一枚硃砂末蠟各四銖上五味搗作丸取麻子許含之即以灰圍患人前頭著一斗灰火吐藥火中即畫火上作十字其貓鬼並皆死矣忌豬肉蘆筍生血物翼方有硝粉出第二十六卷中古今錄驗療妖魅貓鬼病人不肯言鬼鹿角散方鹿角屑搗散以水服方寸匕病者即言實也出第四十五卷中自縊死方一十五首病源人有不得意志者多生忿恨往往自縊以繩物繫頸自懸掛致死呼為自縊若覺早雖已死徐徐捧下其陰陽經絡雖暴壅閉而臟腑真氣故有未盡所以猶可救療故有得活者若見其懸掛便忽遽截斷其繩則不可救此言氣已壅閉繩忽暴斷其氣雖通而奔並暈悶氣則不能還即不復得生又云自縊死旦至暮雖已冷必可活暮至旦則難療此謂其晝則陽盛其氣易通也夜則陰盛其氣難通也又云夏則夜短又熱則易活又云氣雖已斷而心微溫一日以上猶可活也出第二十三卷中肘後葛氏療自縊死心下尚微溫久猶可活方徐徐抱解其繩不得斷之懸其發令足去地五寸許塞兩鼻孔以蘆管納其口中至咽令人噓之有頃其腹中礱礱轉或是通氣也其舉手撈人當益堅捉持更遞噓之若活了能語乃可置若不得懸發可中分發兩手牽之又方皂莢末蔥葉吹其兩鼻孔中逆出復納之千金備急文仲同又方以蘆管吹其兩耳極則易人吹取活乃止若氣通者以少桂湯稍稍咽之徐徐乃以少粥清與之並出第三卷中仲景云自縊死旦至暮雖已冷必可療暮至旦小難也恐此當言陰氣盛故也然夏時夜短於晝又熱猶應可療又云心下若微溫者一日以上猶可活皆徐徐抱解不得截繩上下安被臥之一人以腳踏其兩肩手小挽其發常弦弦勿縱之一人以手按據胸上微動之一人摩捋臂脛屈伸之若已僵但漸漸強屈之並按其腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦勞之須令可少桂心湯及粥清含與之令濡喉漸漸能咽乃稍止兼令兩人各以管吹其兩耳彌好此最善無不活者並皆療之肘後備急文仲古今錄驗同備急方以罽衣若氍㲣厚氈物覆其口鼻抑之令兩人極力吹其兩耳一炊頃可活也肘後千金文仲集驗小品同又方懸牽其頭髮塞兩耳勿令通氣以蔥葉刺鼻中兩人極力痛吹之齧其兩腳踵即活亦可塞鼻而吹口活也小品古今錄驗同範汪療自縊死方懸其發令足裁至地一時許即活又方急手掩其口鼻勿令內氣稍出二時許氣至即活備急文仲古今錄驗肘後同又方以絹急絞身體令堅以車牛載行三十里許使人於車上行踏肩引發吹耳又方以松子油納口中令得入咽中則便活千金療自縊死方以藍青汁灌之又極須安定身心徐徐緩解慎勿割繩抱取心下猶溫者刺雞冠血滴口中即活男用雌雞女用雄雞又方雞屎白以棗許酒半盞和灌口鼻中即活又方梁上塵如大豆各納一筒中四人各一筒同時吹兩耳鼻中極力吹之即活又方尿鼻口眼耳中並捉頭髮一撮如筆管大掣之立活並出第二十六卷中刪繁療五絕死方一曰自縊二曰牆壁所迮三曰溺水四曰魘魅五曰產乳皆取半夏一兩搗篩吹一大豆許納鼻孔中即活心下溫一日者亦可活千金同熱暍方七首病源夏月炎熱人多冒涉途路熱毒入內與五臟相併客邪熾盛郁瘀不宣致陰氣猝絕陽氣暴壅經絡不通故奄然悶絕謂之暍也然此乃外邪所擊真臟未壞若遇便療救氣宣則蘇也夫熱暍不可得冷得冷便死此謂外邪猝以冷觸其熱蘊積於內不得宣發故也又冒熱困乏候人盛暑之時觸冒大熱熱毒之氣入臟則悶鬱冒至於困乏也並出第二十三卷中肘後夏月中熱暍死凡中暍死不可使得冷得冷便死療之方以屈革帶繞暍人臍使三四人尿其中令溫亦可用泥土屈草亦可扣瓦碗底若脫車釭以著暍人臍上取令尿不得流去而已此謂道路窮急無湯當令人尿其中仲景云欲使多人尿取令溫若有湯便可與之仲景云不用泥及車釭恐此物冷暍既在夏月得熱土泥暖車釭亦可用也備急文仲集驗小品千金同又方灸兩乳頭各七壯千金同又方取道中熱塵土以積暍人心下多為佳少冷即易通氣也千金同又方搗菖蒲汁飲之一二升又凡此療自經溺暍之法並出自張仲景為之其意理殊絕殆非常情所及亦非本草之所能開悟實拯救人之大術矣傷寒家別復有暍病在上仲景論中非此遇熱之暍文仲同出第七卷中千金療熱暍方可飲熱湯亦可用少乾薑橘皮甘草煮飲之稍稍咽勿頓使飽但以熱土及熱灰土壅其上佳古今錄驗同文仲療夏月暍死方濃煮蓼汁灌三升不瘥更灌之肘後千金同古今錄驗療熱暍方令人口噓心前令暖易人為之肘後同溺死方九首病源人為水所投溺水從孔竅入灌注腑臟其氣壅閉故死早拯救得出即泄瀝其水令氣血得通便得活又云經半日及一日猶可療氣若已絕心下暖者亦可活出第二十三卷中肘後療溺死一宿者尚可活方以皂莢末綿裹納下部中須臾出水則活古今錄驗同又方倒懸解衣挑去臍中垢極吹兩耳即活集驗千金小品文仲備急同又方倒懸死人以好酒灌鼻中立活千金備急文仲古今錄驗同又方取甕傾之以死者伏甕上令口臨甕口燃以蘆火二七把燒甕中當死人心下令煙出小入死者鼻口中鼻口中水出盡則活蘆盡更益為之取活而止常以手候死人身及甕勿令甚熱冬天常令火氣能使死人心下得暖若猝無甕可就岸穿地令如甕燒之令暖乃以死人著上亦可用車轂為之當勿隱其腹及令得低頭使水出並熬灰數斛以粉身濕即易千金同小品療溺死若身尚暖者方取灶中灰兩石余以埋人從頭至足水出七孔即活備急千金肘後同又方便脫取暖釜覆之取溺人伏上腹中出水便活也肘後同並出第十卷中千金療落水死方以灶中灰布地令厚五寸以甑側著灰上合死人於甑上使頭小垂下炒鹽二方寸匕納管中吹下孔中即當吐水水下因去甑以死人著灰中擁身使出鼻口即活矣又方掘地作坑中熬灰數斛納坑中下死人覆灰濕徹即易之勿令灰熱烙爆人冷即易之半日即活備急療溺死方屈死人兩腳著人肩上以死人背向生人揹負持走吐出水便活肘後云亦治凍死千金肘後文仲集驗小品古今錄驗同出第八卷中凍死方一首病源人有在途路逢悽風苦雨繁霜大雪衣服沾濡冷氣入臟致令陰氣閉於內陽氣絕於外營衛結澀不復流通故致噤絕而死若早得救療血溫氣通則生又云凍死一日猶可活過此即不療出第二十三卷中肘後療冬天墮水凍四肢直口噤裁有微氣出方以大器中多熬灰使暖囊盛以敷其心上冷即易心暖氣通目則得轉口乃開可溫尿粥清稍稍含之即活若不先溫其心便持火炙其身冷氣與火相搏則死集驗備急文仲千金古今錄驗同入井塚悶方二首肘後云此事他方少有其說且人為之寡不俟別條今於水凍之後附此乃是地氣熏蒸蓋亦障霧之例服諸解毒犀角雄黃麝香之屬豉豆竹瀝升麻諸湯亦應為佳出第三卷中小品療入井塚悶冒方凡五月六月井中及深塚中皆有伏氣入中令人鬱悶殺人如其必須入中者先以雞鴨雜鳥毛投之直下至底則無伏氣毛若徘徊不下則有毒氣也亦可納生六畜等置中若有毒其物即死必須入不得已當先以酒若無以苦酒數升先灑井塚中四邊畔停少時然後可入若覺中有些氣鬱悶奄奄欲死者還取其中水灑人面令飲之又以灌其頭及身體即活若無水取他水用也肘後千金錄驗同出第十卷中千金療入井塚毒氣方取他井中水灑身上至三食頃便活若東井取西井南井取北井中水用之出第二十六卷中
