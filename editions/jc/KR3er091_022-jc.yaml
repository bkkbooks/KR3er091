body:
  text: 卷第二十二耳聾方二十二首病源腎為足少陰之經而臟精氣通於耳耳宗脈之所聚也若精氣調和則腎氣強盛耳聞五音若勞傷血氣兼受風邪損於腎臟而精脫精脫者則耳聾然五臟六腑十二經脈有絡於耳者其陰陽經氣有相併時並則有藏氣逆名之為厥厥氣相搏入於耳之脈則令聾其腎病精脫耳聾者其候頰顴色黑手少陽之脈動而氣厥逆而耳聾者其候耳內輝輝焞焞也手太陽厥而耳聾者其候聾而耳內氣滿養生方云勿塞故井及水瀆令人耳聾目盲其湯熨針石別有正方補養宣導今附於後養生方導引法云坐地交叉兩腳以兩手從曲腳中入低頭叉項上治久寒不自溫耳不聞聲又云腳著項上不息十二通必愈大寒不覺暖熱久頑冷患耳聾目眩久行即成法法身五六不能變出第二十九卷中廣濟療耳聾方生地黃長一寸半肥者杏仁七枚去皮熬令黃色巴豆七枚去皮熬令黃印成鹽二顆發灰半錢匕上五味搗碎研堪丸如蕤核仁大用發薄裹納耳中日一易耳內當痛有水出即去當直以發塞耳耳內黃水出痛甚不得更著若未瘥還依前著藥取差千金翼同又療耳聾不聞人語聲方松脂四分巴豆二分去皮心熬麻子仁二分臘二分薰陸香一分石鹽二分上六味搗如膏丸棗核大納耳中三日一易取瘥集驗療耳聾方杏仁去皮尖熬葶藶子熬鹽末各等分上三味搗研以少許豬脂和合煎以綿裹塞耳又方附子炮瓜子杏仁去皮熬各等分上三味搗以綿裹塞耳中千金療耳聾方淳醋微火煎附子五六宿削令可入耳以綿裹塞耳中取差又方巴豆十四枚去皮心熬煉成松脂二分上二味合搗丸如黍米簪頭著耳中以瘥為度又方以竹筒盛鯉魚腦蒸之令烊以灌耳中又方雄黃硫黃各等分綿裹塞耳中數月聞又方取鐵燒令赤投酒中飲之仍以磁石塞耳中瘥又方蓖麻子一百粒去皮大棗十九枚去皮核上二味搗丸如杏仁納於耳中二十日瘥又方芥子搗碎以男乳和綿裹塞耳取瘥又方作泥餅子厚薄如飠單飽覆耳上四邊勿令泄氣當耳孔上以刺泥餅穿作一小孔於上以艾灸之百壯候耳中痛不可忍則止頃側耳瀉卻黃水出盡即瘥炙時泥干即數易之又方截箭竿竹二寸納耳中以面擁四畔勿令泄氣灸箭上七壯取瘥並出第六卷中崔氏療耳聾方鄭少卿雲頻用波律膏一蜆殼無以大麻脂一合小器中煎取一蜆殼替之楓木脂半兩無以薰陸香替以乳頭香更佳松脂半兩研巴豆三七枚去皮熬研蠟如彈通按波律膏丸大疑即胡桐淚上五味先搗松脂巴豆一千杵次下大麻油令熟丸如棗核大一頭尖通中作孔以綿裹塞耳數日一易更互塞之取瘥不得並塞出第四卷中備急療耳聾菖蒲根丸方菖蒲一寸巴豆一枚去皮心上二味合搗可丸分作七丸以綿裹塞耳中日別一丸取瘥肘後同又菖蒲散方菖蒲二兩附子二兩炮上二味搗篩以苦酒和丸如棗核許綿裹臥即塞耳中夜一易之十日有黃水出便瘥肘後千金崔氏又方磁石菖蒲通草薰陸香杏仁去皮熬蓖麻子去皮松脂等分上七味搗篩以蠟及鵝脂和丸稍長作以釵腳子穿中心為孔先去耳中垢然後納藥日再初著癢及作聲月餘即瘥殿中候監云非常良驗肘後同救急療耳聾方真崑崙青木香一兩碎以苦酒浸一宿胡麻油一合微火上緩煎之三上三下以綿濾去滓以點耳孔中以瘥為度必效療耳聾方以好神明膏好棗核許納耳中日一度頻著以瘥三五日以篦子挑耳中塞或癢取差亦治蟲入耳中又方取杏仁七枚去皮捶碎為三分以綿裹各於中著一裹鹽如小豆許以器承於飯甑中蒸之候飯熟出一裹令患耳者側臥和綿捻以油汁入耳中久又以一裹進前捻之瘥為度又方雞屎白半升熬令黃色烏豆一升熬令爆聲絕上二味先取無灰酒二升及熱以沃之良久濾去滓分溫服厚取汗其耳如鼓鞞勿訝又療耳聾神驗方取純烏羊新濕糞和杏子脂石鹽末上三味研滿耳孔中塞勿令風入干即易之乃至七日二七日耳內有聲漸大即以𥯤筒長二寸內耳孔裹四畔以面塞勿令氣出以面薄餅子裹筒頭以艾灸上從第一度灸三壯為始耳內即有烏塞干膿出未間內裹滿疼痛即出之即瘥但有塞即須桃卻還依前法乃至一日兩日瘥即停以後常用亂髮塞之甚驗風聾方三首病源足少陰之經宗脈之所聚其氣通於耳其經脈虛風邪乘之風入於耳之脈使經氣否塞不宣故為風聾風隨氣脈行於頭腦則聾而時頭痛故謂之風聾出第二十九卷中崔氏療耳風聾牙關急不得開方取八角附子二枚釅酢漬之二宿令潤徹削一頭納耳中灸上十四壯令氣通耳中即瘥出第四卷中古今錄驗療風聾年久耳中鳴魚腦膏方生雄鯉魚腦八分當歸六銖菖蒲六銖細辛六銖白芷六銖附子六銖上六味㕮咀以魚腦合煎三沸三下之膏香為成濾去滓冷以一棗核大納耳中以綿塞之取瘥又方附子菖蒲各等分上二味搗以綿裹塞兩耳中取瘥耳聾有膿方三首千金療耳聾有膿方烏賊魚骨去甲炙釜底墨各二分附子四分炮禹餘糧一分龍骨二分伏龍肝二分上六味搗末取皂莢子許大綿裹納耳中日一易取瘥有蟲者加麝香一豆大又方搗桂末以魚膏和塞耳中不過三四度並出第六卷中必效耳聾有膿方鯉魚腸一具切酢三合上二味合搗以布裹塞耳兩食頃當悶痛白蟲出更著新者蟲盡乃止取瘥無新者擇去蟲還可用良千金同久聾方五首病源足少陰腎之經宗脈之所聚其氣通於耳勞傷於腎宗脈虛損血氣不足為風邪所乘故成耳聾勞傷甚者血氣虛極風邪停滯故為久聾出第二十九卷中廣濟療風聾三十年無所聞方蓖麻子五分杏仁四分熬桃仁四分去皮熬巴豆一枚去皮熬石鹽三分附子一分炮薰陸香一分磁石四分研菖蒲四分臘八分通草二分松脂二兩半上十二味先搗菖蒲石鹽磁石通草附子薰陸香成末別搗蓖麻子等四味乃納松脂臘搗一千杵可捻作丸如棗核大綿裹塞耳中日四五度抽出別捻之三日一易以瘥為度千金翼云日一易之肘後療二三十年聾方取故鐵三十斤以水七斗漬之三宿取其水以釀七斗米用曲如常法酒熟出酒一斗取引針磁石一斤研末置酒中三宿乃可飲之取醉以綿裹磁石塞兩耳中好覆衣衾臥酒醒良久去磁石即聞人語聲也飲盡更為以瘥為度甚良千金同又方茱萸巴豆去皮熬乾薑各等分上三味搗末以蔥涕和以綿裹塞耳食頃干去之更和塞之如此五日當覺病去無苦八九日便聞人語取差止常以發塞耳慎避風又方柘根三十斤銼之以水煮用釀酒如常法久而服之甚良古今錄驗療三十年聾方天雄一分雞子一枚附子一枚上三味搗末取雞子開一孔取黃和藥卻納雞子中封合其頭還令雞覆之藥成以綿裹塞所聾耳中取瘥為度耳鳴方六首病源腎氣通於耳足少陰腎之經宗脈之所聚勞動經血而血氣不足宗脈則虛風邪乘虛隨脈入耳與氣相擊故為耳鳴診其右手脈寸口名曰氣口以前脈浮則為陽手陽明大腸脈也沉則為陰手太陰肺脈也陰陽俱虛者此為血氣虛損宗脈不足病苦耳鳴嘈嘈眼時妄見花此是肺與大腸俱虛也左手尺中名曰神門其脈浮為陽足太陽膀胱脈也虛者膀胱虛也腎與膀胱合病苦耳鳴忽然不聞時惡風膀胱虛則三焦實也膀胱為津液之府若三焦實則克消津液克消津液故膀胱虛也耳鳴不止則變成聾出第二十九卷中廣濟療耳鳴塞耳丸方巴豆二枚去皮熬桃仁去皮熬二枚松脂大豆許上三味搗作二丸綿裹塞耳中又療耳鳴沸鬧方吳茱萸巴豆去皮熬乾薑石菖蒲磁石細辛各一分上六味搗末以鵝膏和少許以綿裹塞耳中以鹽五升布裹蒸之以熨耳門令其暖氣通入耳內冷復易之如此數用瘥後常以亂髮卷以塞耳中慎風肘後療耳中常鳴方生地黃截斷塞耳日十易之以瘥一云紙裹微火中煨之用良出第四卷中千金療耳鳴聾方當歸細辛防風附子芎藭白芷各六銖上六味末之以雄鯉魚腦和煎三上三下膏香去滓以棗核許塞耳中以綿裹之魚腦用六合微火煉之又方通草細辛桂心各三分菖蒲四分附子一分礬石一分當歸甘草各二分獨活六分蔥涕半合上十味搗末以白鵝膏半合旋旋和以綿裹棗核大塞耳中日三取瘥忌如常又療耳聾鳴如流水聲久不治成聾方生烏頭淨洗削如棗核大以塞耳中日一易之三日愈亦療癢及卒風聾並出第六卷中聤耳方一十首病源耳者宗脈之所聚腎氣之所通足少陰腎之經也勞傷血氣熱乘虛而入於其經邪隨血氣至耳熱氣聚則生膿汁故謂之聤耳出第二十九卷中廣濟療聤耳癢有膿不止菖蒲膏方菖蒲一兩狼毒附子炮磁石燒礬石熬汁盡各一兩上五味搗篩以羊髓和如膏取棗核大塞耳中以瘥為度又療聤耳膿血出方取車轄脂綿裹塞耳中瘥肘後同千金治蟲入耳又療聤耳方黃連龍骨白蘞赤石脂烏賊魚骨各等分上五味搗末以綿裹塞耳中每著以綿纏拭之著藥肘後療聤耳耳中痛膿血出方取釜月下灰吹滿耳令深日三易之每換即以篦子去之然後著藥取瘥為度千金云灶下灰薄耳中又方附子末以蔥涕和灌耳中取瘥單蔥涕亦佳側臥令入耳中出中卷又方桃仁熟搗以故緋絹裹塞耳中日三易以瘥為度千金同又方黃連附子炮各等分上二味搗末以少許微微吹入耳中每著藥先拭惡物然後吹之又方釜月下墨末以豬膏和綿裹納耳中日再集驗療聤耳出膿水散方礬石烏賊魚骨黃連龍骨上四味搗末以棗核許綿裹塞耳中日再千金療聤耳出膿方黃礬石烏賊魚骨黃連赤石脂各一兩上四味搗末以綿裹棗核大納耳中取瘥止日二翼方用龍骨無赤石脂出第六卷耳卒疼痛方三首病源凡患耳中策策痛者皆是風入於腎之經也不治流入腎則卒然變脊強背直成痙也若因痛而腫生癰癤膿潰邪氣歇則不成痙所以然者足少陰為腎之經宗脈之所聚其氣通於耳上焦有風邪入於頭腦流至耳內與氣相擊故耳中痛耳為腎候其氣相通腎候腰脊主骨髓故邪流入腎脊強背直出第二十九卷中肘後療耳卒疼痛方蒸鹽以軟布裹熨之取瘥良備急療耳疼痛有汁出方熬杏仁令焦黑搗如泥作丸以綿裹納耳中頻易之瘥廣濟療耳卒疼痛求死者方菖蒲附子各一分上二味末以麻油和以點耳中立止肘後崔氏同耳卒腫方二首肘後療耳卒腫出腫方礬石燒末以葦管吹耳中日三四過或以綿裹塞耳孔內取瘥備急療耳卒腫方栝蔞根削可入耳以臘月豬脂煎之三沸冷以塞耳中取瘥日三作七日愈肘後治卒得風覺耳中恍恍者通耳中膿方二首廣濟療耳膿水通耳礬石散方吳白礬八分燒汁盡麻勃一分青木香二分松脂四分上四味搗末先消松脂後入藥末可丸如棗核淨拭以塞耳中取瘥又療通耳膿水出方吳白礬八分燒令汁盡末紅藍花胭脂四十枚上二味和粉淨拭耳中以粉粉之每拭然後著藥蟲入耳方九首廣濟療蟲入耳腫不聞人語聲有膿血出方黃耆四分乾薑一分蜀椒一分上三味搗末以生地黃搗取汁和用綿裹棗核大塞耳中日三夜一以瘥止肘後療百蟲入耳方苦酒漬椒灌之即出又方溫湯灌耳中又方搗藍青汁以灌之千金療蟲入耳方取桃葉火熨以塞耳卷之入中肘後同又方以蔥涕灌耳中即出並出第六卷中崔氏療蟲入耳方若甲蟲入耳者以火照之手打木入勿令損之即嚮明出之或蚰蜒諸蟲入耳以酢灌之或麻油或人尿亦佳或酢酪更妙備急療蟲入耳方以銅錢二七枚以豬膏煎之用將灌耳又方以兩刀於耳前相敵作聲蟲即出走蜈蚣入耳方三首肘後療蜈蚣入耳方以木葉裹鹽炙令熱以掩耳上即出冷復易之驗又方閉氣滿即吐之復閉准前以出為度或死耳中徐徐以鉤針出之若積久不出者取新豚肉炙向耳中拓之以出為度千金療蜈蚣入耳方炙豬肉掩耳即出集驗小品同出六卷中蚰蜒入耳方三首肘後療蚰蜒入耳方熬胡麻搗以葛囊盛枕之蟲聞香則自出又方以水銀大豆許瀉耳中歆臥空耳向下擊銅器叩齒十下即出蚰蜒呼為土蛄似蜈蚣黃色細長是也備急療蚰蜒入耳神效方以牛酪滿耳灌之即出當半消若入腹空腹食好酪一二升即化為黃水不盡更服神效肘後同飛蛾入耳方二首肘後療飛蛾入耳方先大吸氣仍閉口掩鼻呼氣其蟲隨氣一口出又方閉氣以筆管極吹之即出蟻入耳方二首肘後療蟻入耳方燒陵鯉甲末以水和灌之即出備急療蟻入耳方炙豬脂安耳孔上即出或兩邊耳雜療方八首廣濟療耳鳴或聾漬酒方菖蒲一斤通草一斤磁石一升碎綿裹上三物切以絹袋盛清酒二斗浸之春夏三日秋冬五日溫服三合漸加之至五合以下丸藥亦甚良又療兩耳腫膿水出不聞人語聲方黃耆升麻犀角屑梔子各六分玄參八分干藍芍藥人參各四分大黃八分青木香黃芩芒硝各六分上十二味搗篩蜜和丸食後少時以枸杞根湯下二十丸漸增之忌如常又療兩耳腫方青木香防己芍藥玄參白蘞大黃芒硝黃芩各八分赤小豆十分紫葛八分上十味搗散以榆木白皮搗汁和之塗布帛上貼腫取消千金療卒聾方細辛一分菖蒲一分杏仁三分曲末三分上四味搗篩研杏仁合之如脂棗核大以綿裹塞耳中日一易小瘥二日一易夜去之旦即著又底耳方燒黃礬搗末綿裹塞耳中二三日即瘥又療耳干耵聹不可出方爛搗自死蚯蚓取汁灌耳不過數灌即挑出之並出第六卷中千金翼赤膏主耳聾齒痛方丹參五兩蜀椒一升大黃白朮細辛芎藭各一兩大附子十枚乾薑二兩巴豆十枚去心桂心四寸上十味銼以苦酒漬一宿以豬膏三斤煎三上三下藥成去滓可服可摩耳聾者綿裹膏納耳中齒冷痛著齒間諸痛皆摩腹內有痛以酒服一棗許大咽喉痛吞一棗核大一枚出第十一卷中崔氏療風氣及腰腳並耳聾方磁石十二兩碎石菖蒲四兩通草三兩瞿麥二兩山茱萸三兩白朮三兩獨活四兩芎藭二兩薯蕷三兩甘草二兩炙附子二兩炮桂心三兩生薑五兩杏仁二兩去皮尖熬碎茯神二兩人參前胡各三兩蔥白切一升竹葉一握石膏二兩碎上二十味切以水一斗四升煮取二升半去滓分三服宜向暮服之令盡慎如常法五日禁食羊肉鼻中息肉方一十一首病源肺氣通於鼻肺臟為風冷所乘則鼻氣不和津液壅塞而為鼻齆冷搏於血氣停結鼻內故變生息肉其湯熨針石別有正方補養宣導今附於後養生方導引法云端坐伸腰徐徐以鼻內氣以右手捻鼻除目暗淚苦出徐徐閉目吐氣鼻中息肉耳聾亦能除又云東向坐不息三通以手捻鼻兩孔治鼻中息肉出第二十九卷中肘後療鼻中塞肉不通利方又方礬石一兩燒通草半兩真珠一兩上三味末以綿裹如棗核納鼻中日三易之有加桂心細辛各一兩同前搗末和使用之又方陳瓜帶搗末以敷塞肉上取瘥礬石燒胡粉熬各等分上二味末之以青羊脂和塗塞肉上以瘥又方細辛瓜蒂各等分末以吹鼻中須臾涕出頻吹之即瘥千金方以絮裹如棗大塞鼻中須臾通張文仲亦治鼻齆不聞香臭小品療鼻中塞肉通草散方通草半兩真珠六銖碎礬石一兩燒細辛一兩上四物搗末以綿裹如棗核沾散如小豆並綿頭納鼻中日三取瘥千金同千金療鼻中息肉方灸上星二百壯入髮際一寸又夾上星兩傍相去三寸各百壯灸之取差出第六卷中千金翼鼽鼻鼻中息肉不得息方礬石三分燒藜蘆二分瓜蒂二七枚附子二分炮上四物搗末蘆管吹小豆許於鼻孔中或以綿裹塞鼻中日再以差為度一方加葶藶半兩出第十一卷中崔氏療鼻中息肉不聞香臭方燒礬石末以面脂和著鼻中數日息肉隨藥出千金同必效療鼻中清涕生塞肉方細辛六分附子五分炮甘遂六分通草五分乾薑四分吳茱萸三合桂心四分上七味搗篩末蜜丸如杏仁綿裹塞鼻臥時著即涕出日三避風以瘥為度或以帛裹頭甚良妙古今錄驗療鼻中息肉通草散方通草細辛蕤仁雄黃研皂莢去皮子各一分白礬二分燒礜石三分泥裹燒半日研藜蘆三分炙地膽三分熬瓜蒂三分巴豆十枚去皮閭茹三分地榆三分上十三味搗篩末以細辛白芷煎湯和散敷息肉上又以膠清和塗之取瘥又療鼻中息肉方生地膽一枚細辛白芷末上三味以地膽押取汁和藥以塗貼息肉上取消亦只以地膽汁於竹筒中盛當上灌之即消無生者干即酒煮汁用之鼻齆方五首病源肺主氣其經手太陰之脈也其氣通於鼻若脈臟調和則鼻氣通利而知香臭若風冷傷於臟腑而邪氣乘於太陰之經其氣蘊積於鼻者則津液壅塞鼻氣不宣調故不知香臭而為鼻齆也出第二十九卷中千金療鼻齆方甘遂通草細辛附子炮各一分上四味搗末以白雄犬膽丸少許納鼻中瘥崔氏同云卒熱涕出四五升愈又方皂莢炙末如小豆以葦管吹鼻中又方以乾薑末吹之又蜜和塞之又方以鐵𥖨一云鏁磨石取末以豬脂和綿裹塞鼻中取瘥止又方伏面臨床前以新汲水淋玉枕上取瘥並出第六卷中通按玉枕腦後也肺寒鼻齆方二首刪繁療肺寒損傷氣咳及多唾呼聲鼻塞干棗補肺煎方棗肉二升取膏杏仁一升去尖皮研酥一升薑汁一升蜜一升餳糖一升上六味依常微火煎每服一匙瘥止又療鼻塞有清涕出方細辛蜀椒汗桂心芎藭吳茱萸各三分皂莢炙屑二分附子八分炮上七味切以苦酒漬一宿以豬脂一斤煎以附子色黃膏成以綿裹納鼻中兼以摩頂鼻窒塞不通利方七首小品療鼻中窒塞香膏方白芷當歸芎藭細辛辛夷通草桂心薰草各三分上八味㕮咀以苦酒漬一宿以豬膏一升煎以白芷色黃成膏濾去滓取少許點鼻中或綿裹納鼻中以瘥止千金無桂心不用薰草用莽草千金鼻塞多年不聞香臭清水出不止方取當道車輾過蒺藜一把搗以水三升煎令熟先仰臥使人口含一合灌鼻中不過再大嚏出一兩個息肉似爛蟲即瘥一方用黃連各二兩又療鼻窒氣息不通方小薊一把上一味以水三升煮取一升去滓分服又方綿裹瓜帶末少許塞鼻中並出第六卷中古今錄驗療鼻中不通利窒塞者香膏方當歸芎藭青木香細辛通草蕤核仁白芷各二分上七味切以羊髓微火煎白芷色黃膏成去滓以小豆許納鼻中日再以瘥為度千金有莽草無青木香云大熱鼻中赤爛者以黃芩梔子代當歸細辛又療人鼻塞不通皂莢散方皂莢一分炙去皮子細辛辛夷蜀椒附子炮各等分上五味搗末以少許吹鼻中或以綿裹塞之即通又療鼻窒塞不得喘息皂莢散方皂莢去皮子炙菖蒲各等分上二味以末綿裹塞鼻中暮臥之時乃著甚良鼻塞常清涕方二首病源夫津液涕唾得熱即乾燥得冷流溢不能自收肺氣通於鼻其藏有冷冷隨氣入乘於鼻故使津涕不能自收出第二十九卷中肘後療老小鼻塞常有清涕出方杏仁二分附子二分細辛一分上三味切以苦酒拌用豬脂五兩煎成膏去滓以點鼻中即通又以摩囟上佳必效療鼻塞多清涕方細辛蜀椒乾薑芎藭吳茱萸皂莢去皮尖附子各三兩豬膏一升三合上八味切㕮咀以苦酒浸一宿以豬脂煎候附子色黃去滓膏成凝以綿裹少許導鼻中並摩頂鼻生瘡及疳蟲蝕方九首病源鼻是肺之候肺氣通於鼻其臟有熱氣衝於鼻故生瘡也養生方導引法云踞坐合兩膝張兩足不息五通治鼻瘡出第二十九卷中千金療疳蟲蝕鼻生瘡方燒銅箸投酢中以塗之又方綿裹人屎灰夜臥著之又方燒祀灶飯末以敷之又方燒牛狗骨灰末以臘月豬脂和敷之瘥又方燒杏仁壓取油敷之又乳和敷又方取烏牛耳垢敷之良又方燒故馬絆末敷之又方取牛鼻頭津敷之良並出第六卷中必效療鼻內熱氣生瘡有膿臭並有蟲方礬石一兩燒生地黃三兩苦參一兩上三味切以水八合煮取三合以綿濾之微微點鼻中日三五度瘥止牙疼方八首廣濟療牙疼巴豆丸方巴豆十枚去皮心熬研如膏大棗二十枚取肉細辛一兩末上三味相和研為丸以綿裹著所疼處咬之如有涕唾吐卻勿咽入喉中日三瘥崔氏療牙疼方烏頭獨活郁李根白皮各一兩上三味切綿裹以好酒一大升半漬一宿緩火煎取一升去滓看冷熱漸含良久即吐卻含取瘥齒痛不問風蟲無不瘥必須含吐之不可咽卻也有毒恐傷人單用烏頭獨活亦瘥又方令患人所患牙齒齧宅東南桑枝一條教三姓人於桑枝炙三炷一炷咒之曰東方有蟲子不食五穀專食牙齒三姓灸齒痛蠍蟲自然死一咒一再拜即合灸人患人等還不得回頭更看之張文仲療牙疼驗方獨活五分莽草二分細辛二分附子一枚上四味切以苦酒五合浸以銅器中溫之稍熱含良久吐卻汁未差更含之勿咽汁欲食以暖水漱口甚良救急療牙疼方莽草細辛枳根皮各三兩椒一合汁上四味切以水一升煮取半升細細含之十度永不發藥有毒不得咽之含了以暖水三五度漱口訖以胡桐律一豆著痛齒上風痛蟲食並瘥必效療牙疼方取皂莢子搗末以綿裹如彈子大兩顆於釅醋中煮熱徹於牙疼處齧之冷即易日三五度以瘥為度又方取桃李槐並白皮各等分以酒煮含之取定姜君療牙疼方白楊皮一握地骨皮一兩椒二七枚杏仁二七枚去皮細辛一兩生地黃二兩碎好鹽一合蒼耳子二兩碎上八味切以酒二升煎六七沸去滓含之冷即吐卻別含以瘥為度齒痛方一十一首病源手陽明之支脈入於齒齒是骨之所終髓之所養若風冷客於經絡傷於骨髓冷氣入齒根則齒痛若蟲食齒而痛者齒根有孔蟲在其間此則針灸不瘥敷藥蟲死痛乃止其湯熨針石別有正方補養宣導今附於後養生方導引法云常向本命日擳發之始叩齒九通陰咒曰大帝散靈五老反真泥丸玄華保精長存左回拘月右引日根六合清煉百疾愈因嚥唾三過常數行之使齒不痛發牢不白頭腦不痛又云東向坐不息四通琢齒二七治齒痛病大張口琢齒二七一通二七又解四通中間其二七大勢以意消息瘥病而已不復疼痛解病鮮白不黧亦不疏離久行不已能破金剛又云東向坐不息四通上下琢齒三十六下治齒痛出第二十九卷中廣濟療齒痛及落盡石膽敷方取石膽研以人乳汁和以敷齒痛上或孔中日三兩度止痛後生齒百日復故齒生止每以新汲水漱令淨集驗療齒痛方雞屎白燒灰末以綿裹置齒痛上咬咋之瘥又方芎藭細辛防風礬石燒令汁盡附子炮藜蘆莽草上七味各等分搗篩為末以綿裹彈丸大酒漬熨所患處含之勿咽汁千金同又方獨活三分黃芩芎藭當歸蓽茇各二兩丁香一兩上六味切以水五升煮取三升去滓微微含漱良久吐卻更含又方含白馬尿隨左右含之不三五口瘥張文仲備急同並出第六卷中張文仲療齒疼痛方燒牛膝根末以綿裹著齒痛處含之又方蜀椒礬石各一兩上二味以水一升煎取六合去滓含之嗽口吐卻勿咽之備急療齒痛方胡葈子五升應是胡荽子也以水五升煮取一升含吐之謹按本草葈耳一名胡荽殺疳濕䘌封丁腫此治齒痛相近即非是胡葈子也又方馬夜眼如米許以綿裹著痛孔中斷根源也通按馬夜眼未許何物古今錄驗療齒痛方取楊柳細白皮卷如指大含嚼之以汁漬痛齒根數過即瘥又方獨活三兩芎藭二兩當歸二兩蓽茇二兩黃芩二兩甘草二兩細辛二兩雞舌香一兩上八味切以水五升煮取三升去滓含之取瘥千金無甘草齒疼方六首千金療齒疼方灸外踝下高骨前交脈三壯又方以繩量手中指至掌後一橫文又折為四分量文後當臂中灸一壯隨左右取之又方雞屎白以醋漬煮稍稍含之瘥又方生地黃一節蒜一瓣上二味搗以綿裹著痛處咬之勿咽汁汁盡吐出日日為之瘥止又方含驢尿須臾止並出第六卷中姜生療齒疼方附子一分胡椒蓽茇各二分上三味搗末著齒痛上又以散用臘和為丸置齒痛孔上取瘥止牙齒疼痛方八首病源牙齒痛者是牙齒相引痛牙齒是骨之所終髓之所養手陽明之支脈入於齒若髓氣不足陽明脈虛不能榮於牙齒為風冷所傷故疼痛也又有蟲食於牙齒則齒根有孔蟲居其間又敷變余齒亦皆疼痛此則針灸不瘥敷藥蟲死痛乃止出第二十九卷中廣濟療牙齒疼痛牙斷腫癢齒根宣露方肥松節四分細辛二分蜀椒二分胡桐律四分上四味切以清酒四升煮十沸承熱含之冷即吐卻更含瘥止又療牙疼齒痛方取槐白皮一握切上一味以酢一升煮去滓著鹽少許適寒溫含日三易之備急姚氏療牙齒疼痛方取枯竹燒竹一頭以注錢上得汁多著齒上即瘥必效療牙齒疼痛方防風附子蜀椒各二兩莽草一兩炙上四味搗篩為散溫清酒一盞和少許含勿咽汁以酒嗽口十年患亦差止又方獨頭蒜煨之乘熱截一頭以熨痛上轉易之亦主蟲痛又礬石散療牙齒疼痛風齲蟲食挺根出齒已落者方礬石燒令汁盡藜蘆炙防風細辛乾薑白朮椒汗甘草炙蛇床子附子炮各八分上十味搗篩為散溫酒半升納散方寸匕攪調含之漱吐勿咽之日三度差百日齒已落者還生每食時更以空酒漱去藥氣然後吃食又療牙齒疼肉宣露風疼效方莨菪子搗末綿裹著痛上吐卻汁勿咽之良又方獨活十兩生地骨白皮切三升細辛一兩楓柳皮一兩甘草二兩炙上五味切以水五升煮取一升細細含勿咽冷即吐之䘌齒方五首病源齒䘌者是蟲蝕齒至斷膿爛汁臭如蝕之狀故謂之䘌齒出第二十九卷中廣濟療䘌齒石黛散方五月五日乾蝦蟆燒灰石黛甘皮各等分搗末以敷齒上取瘥又療䘌齒及口疳蟲食紫藍灰方取紫藍燒作灰以塗敷之日三五度取瘥為度又療䘌齒並蟲積年不瘥從少至老方雀麥一名牡姓草似牛尾草一味苦瓠葉三十枚淨洗露一宿平旦取草屈長二寸廣一寸厚五分以瓠葉裹縛作五六十裹子以三年酢漬之至日中以兩裹火中炮令極熱納口中齒外邊熨之冷更易取銅器以水納中解裹於水中洗之即有蟲長三分老者黃色少者白色多即三二十枚少即一二十枚此方甚妙千金同必效近貴勝共敷䘌齒方細辛當歸甘草炙蛇床子各一兩青葙子三兩上五味搗以綿裹如大豆著齒上日三勿咽汁瘥止肘後同又䘌齒方韋給事處得之每見月拜咒云月阿姑䘌齒蟲枯月阿姨䘌齒蟲死以差即止齒風疼痛方三首張文仲療頭面風口齒痛不可忍方椒一合莽草十葉熬白朮崔李根郁李根也獨活芎藭各二兩細辛防風各一兩上八味切以酒三升煮三五沸去滓含之以瘥為度勿咽汁千金無白朮救急療齒風動痛方蒼耳一握以漿煮著鹽含之古今錄驗療齒中風疼痛齲腫芎藭湯方細辛一兩芎藭二兩附子一兩炮上三味切以水六升煮取二升去滓含之少許冷即吐卻日三四度勿咽汁齲齒方七首病源手陽明之支脈入於齒足太陽脈有入於頰遍於齒者其經虛風氣客之絡搏齒間與血氣相乘則斷腫熱氣加之膿汁出而臭侵食齒斷謂之齲齒亦曰風齲養生方云朝夕琢齒齒不齲又云食畢當漱口數過不爾使人病齲齒出第二十九卷中五月五日蝦蟆燒作灰石黛甘皮細辛白雞屎麝香乾薑熏黃上八味各等分以薄綿裹少許納蟲齒孔中日三易之瘥集驗療齲齒方取松脂銳如錐注齲孔內須臾齲蟲緣松脂出又方煮雞舌香汁含之瘥千金療齲齒及蟲齒方白附子一分知母一分細辛五分芎藭三分高良薑二分上五味末以綿裹少許著齲上勿咽汁日二三亦治口氣又方取白馬懸蹄少許塞孔中日三度即瘥止翼同並出第六卷中張文仲療齲齒方以郁李根白皮切水煮濃汁含之冷易之當吐蟲出備急齲齒方皂莢炙去皮子末少許著齒痛上瘥齒蟲方五首病源齒蟲是蟲食於齒齒根有孔蟲在其間亦令齒疼痛食一齒盡又度食余齒養生方云雞鳴時常叩齒三十六下長行之齒不蠹蟲令人齒牢又云朝未起早漱口中唾滿口乃吞之輒啄齒二七過使人丁壯有顏色去蟲而牢齒又云人能常服玉泉必可丁壯妍悅去蟲牢齒謂口中唾也出第二十九卷中小品療齒蟲腐棘刺漱湯方腐爛棘針二百枚即是棗木刺朽落地者用一物以水二升煎取一升含之即瘥日四五度以瘥為度刪繁療齲齒蟲方莨菪子三合青錢七文燒令赤取小口瓶子可令口含得者將錢納瓶子中取莨菪子一撮安錢上令爆烢聲仍以水少許淋錢上即氣出用熏齒冷止三合藥盡為劑蟲食齲齒風痛並用千金同又療蟲齒痛椒湯方蜀椒一兩礬石半兩桂心一兩上三味以水三升煮取一升去滓含之漱齒勿咽汁甚良又附子塞蟲孔丸方附子一枚炮末以臘和之為丸准齒蟲孔大小納之取瘥止必效殺齒蟲方雄黃末以棗膏和為丸塞牙孔中以膏少許置齒燒鐵篦烙之令微熱以瘥止一方有附子一枚風齒方四首病源手陽明之支脈入於齒頭面有風陽明之脈虛風乘虛隨風流入於齒者則令齒有風微腫而根浮也出第二十九卷中集驗療風齒疼腫悶方莽草二兩上一味以水五升煎取三升含漱之勿咽汁又方椒二十粒枳根皮莽草細辛菖蒲牛膝各二兩切上六味切以水四升煮取二升去滓細細含之以瘥為度未瘥更作取瘥備急療風齒疼刺腫方煮獨活含之良又療風齒腫杉葉湯方杉葉三兩芎藭細辛各二兩上三味切以酒四升煮取二升半稍稍含之取瘥勿咽之風齒根出方二首廣濟療熱風齒齦肉欲盡根出恐是疳蟲食齦及耳鼻疼痛方石黛五分細辛棘刺菖蒲香附子當歸青木香胡桐律乾薑各四分青葙子六分上十味搗為散以半錢匕綿裹就齒痛處含之勿停瘥止服後丸方一方無細辛有雞舌香丸方苦參八分大黃黃芩枳實各六分地骨皮六分玄參八分黃連八分上七味搗篩蜜為丸食後少時以漿水服一十五丸日再服至二十丸增減自量之忌蒜面豬肉風齒口臭方二首廣濟療風齒口氣臭芎藭湯方芎藭三兩當歸三兩獨活四兩細辛白芷各四兩上五味切以水五升煮取二升去滓含漱日三五度取瘥齒敗口臭方取芎藭煮一味含之牙齒風齲方三首延年療牙齒風齲方鼠黏子上一味搗以水四升煮取二升半濾去滓適寒溫含之冷吐別含取瘥又方薏苡根四兩切上一味以水四升煮取二升含冷易之又方郁李根白皮切四兩細辛一兩鹽一合上三味切以水四升煮取二升半去滓納鹽含之取瘥牙齒疼風蟲俱療方五首廣濟療牙齒疼痛風蟲俱瘥方獨活防風各四兩芎藭細辛當歸各五兩沉香八分雞舌香零陵香各五兩黃芩十分升麻八分甘草六分炙上十一味搗篩烊臘少許丸如小豆以薄綿裹當痛上含有汁咽亦無妨口臭氣尤妙又療齒痛不問蟲風者方熏黃一兩莽草一兩臘月羊脂蜀葵莖兩枚上四味搗熏黃等為末消羊脂以葵莖蘸脂點藥末注齒痛處孔中日三五度每令葵莖熱用之良又療牙齒疼蟲痛含湯方肥松脂三兩皂莢一枚去皮子炙令黃石鹽七枚上三味切以水二升煮取八合去滓溫含冷吐之即瘥止崔氏療牙齒隱隱痛無問風蟲搖動齒齦腳宣露含此藥效其齦便生方取細柳枝捋去皮銼一升炒之納大豆一升和柳枝更炒以豆炮聲盡於垍器盛之以清酒三升漬之經三日含之頻吐即無妨兩劑無不愈其齦亦生出第四卷中必效療風蟲疼痛方取屋間蜂窠一枚炙椒七粒上二味以水一升煎取半升含之或齦腫勿怪之風沖牙齒搖動方二首延年療風沖牙齒搖動方車下李根白皮郁李根也三兩切蒼耳子三合碎上二味以水三升煮取二升含之良又方芎藭三兩細辛一兩防風二兩薏苡根三兩上四味切以水六升煮取三升去滓含漱齒日三五度瘥止疳蟲食齒方一十首千金凡齒齦宣露多是疳䘌及月蝕方以角蒿燒灰夜塗齒齦間使滿不過兩三度即瘥慎油膩沙糖干棗及桂切忌之又方每旦以鹽一捻納口中以暖水含和鹽揩齒百遍可長為之口齒牢密又凡人好患齒病多由月蝕夜食飲所致識者特宜慎之所以日月蝕未平復時特忌飲食小兒亦然方蚯蚓糞水和作稠泥團以火燒之令極赤末之如粉以臘月豬脂和敷齒齦上日三即瘥止又疳蟲食齒根方伏龍肝置石上著一撮鹽須臾化為水以面展取待凝厚取以納病上又方以皂莢去皮炙末塗上蟲即出又方純麻子燭燼研以井花水和敷之又方黑羚羊脂莨菪子各等分上二味和先燒鋤銎使赤納其中煙出以布單覆頭令煙入口熏之並出第六卷中張文仲疳蟲方大酢一升煮枸杞白皮一升取半升含之蟲即出姜生論云齒齦虛軟而無膿血又口䘌其齒齦觸著即膿血出又口疳其齒齦不觸自然膿血出又口瘻其齒齦上有小孔如蜂窠形又齒疳其骨脆爛其齒齦唇口吻變作白色或作青紫黑色者是急疳之狀死不過旬日宜急療之先看唇頰邊有赤白黑脈處即須以針針去惡血便燒鐵篦烙之如此變即定或附齒有黃色物如爛骨狀名為食床凡療齒看有此物先以鉗刀略去之然後依方用藥其齒齦內附著齒根者形如雞子膜有如蟬翼纏著齒者亦須細看之不爾其齒齦永不附著齒根也病狀如前後方自有委曲也又雄黃膏療齒中疳瘡䘌瘻蟲蝕牙齒口裡之疾皆療之其膏以十二月合即得一年用不爾難久停方好牛酥五大兩蜜臘半兩雄黃一小兩研硃砂二分研藁本半大兩藜蘆二分杏仁四分去皮尖芎藭白芷鰻鱺魚升麻各三分上十一味以酥中煎諸藥魚令黃色去魚煎三上三下入臘煎沫盡膏成收器中攪勿住手凝定以本方即諸藥併為末不去滓甚良又升麻揩齒方升麻半兩白芷藁本細辛沉香各三分寒水石六分研上六味搗篩為散每朝楊柳枝咬頭軟點取藥揩齒香而光潔一方云用石膏貝齒各三分麝香一分尤妙齒痛有孔方四首備急療牙齒有孔方莨菪子數粒納齒孔中以臘封之即瘥古今錄驗療齒痛有孔不可食飲面腫莽草湯方莽草七葉蜀椒九個上二味以漿水二升煮取一升適寒溫含滿口冷即吐之日二三含之千金同又療齒齲痛有孔方取雄雀屎以綿裹納齒孔中日二易之姜生療齒有孔方附子二分炮去皮蜜臘五分上二味相和為丸塞齒孔中即瘥忌冷水油膩齒挺出及脫落方五首廣濟療齒牙風挺出疼痛郁李根湯方郁李根五兩芎藭二兩細辛二兩生地黃四兩上四味以水六升煮取二升半去滓先以鹽湯漱口然後溫含之冷即吐更含取瘥崔氏療牙齒挺出疼痛不可忍方羊腎脂二合泔澱二合牛糞絞取汁一合甘草半兩生用末之青黛熏黃半兩末上六味相和銅器中微火煎五六沸取東引桃枝如箸大六枝以綿纏頭點取藥更互熱烙齒齦際隔日又烙之不兩三度看好肉生以瘥乃止欲烙時淨刮齒牙根上然後為之不爾肉不生十餘日忌生冷酢酒肉陳臭一年禁油又療疳濕牙齒脫落刺唇穿破及下部侵蝕並痔䘌齒悉療之方顧參軍授甘家秘之青黛二兩雄黃研硃砂研莨菪子熬青礬石黃礬石白礬石並燒令汁盡附子炮苦參甘草炙藜蘆炙細辛麝香研各一兩上十三味搗篩為散有前齒疾稍稍著病上日二三濕䘌者以井花水平旦杪取半錢匕水中服之兼以薄綿裹如棗核許著蝕蟲䘌處日三瘥止下部中濕䘌蝕之以苦參甘草作湯和半錢匕灌之良並出第四卷中張文仲療齒根欲脫落方取生地黃搗以綿裹貼齒根常含之甚妙備急比見患齒風傷齒挺出一分者方長咋地黃尤妙更不復發齒間血出方三首病源手陽明之支脈入於齒頭面有風而陽明脈虛風挾熱乘虛入齒齦搏於血故血出也出第二十九卷中千金齒間血出者方竹葉濃煮著鹽含之冷吐又方童子小便溫含之冷吐血即止出第六卷中備急療齒疼痛齦間血出神驗方好鹽熬每夜封齒根上瀝水盡乃扣齒一二百遍即瘥忌棗沙糖等齒血不止方四首千金療齒血不止方刮生竹皮以苦酒漬之令其人解衣坐使人含噀其背三遍仍取茗草濃煮汁含之漱咽終日為之又療齒齦間津液血出不止方生竹茹四兩醋浸一宿含之又方細辛二兩甘草二兩炙上二味醋一升煮夜含之及熱尤良又方礬石一兩燒末以水二升煮先拭血乃含之並出第六卷中齒腫方二首千金療齒根腫方松葉一把鹽一合上二味以好酒三升煮取一升含之冷吐瘥即止又療齒腫痛及蟲方黃芩甘草桂心當歸細草蛇床子各一兩上六味切以漿水七升煮取三升去滓含之日三夜一良並出第六卷中牙疼痛及蟲方三首必效療牙風疼方取東牆下朽骨削之如疼牙齧許大於煻灰中煨燒令熱於所痛處齧之冷即易之又牙蟲痛並蟲蝕方以水煮露蜂房細辛各等分含之即瘥止又療牙疼及頭牙齦風腫口急不開面目虛腫皆頭起者方蒴藋五兩以水五升煮取四升去滓蜀椒一兩吳茱萸獨活烏賊魚骨桃膠各一兩桂心半兩酒一合上八味切以水二升煮取八合投蒴藋汁及酒更煎取一小升去滓含之就病處日三以瘥止為度牙齒雜療方七首集驗療齒楚痛方生地黃桂心上二味合以含嚼咽汁無妨千金同刪繁療心虛寒口氣臭衝入又蟲齒痛芎藭散方芎藭八分白芷七分甘草五分炙桂心四分杜蘅四分當歸五分上六味搗篩為末以酒和方寸匕服之日二服千金療酒醉牙齒湧血出方燒釘赤炷血孔中即止又療齒痛方當歸桂心甘草炙各二兩礬石六分燒上四味切以漿水二升煮取一升含之日五六瘥止張文仲療齒痛風引腫搖動發作不療蟲蝕盡方礬石燒乾薑藜蘆蛇床子甘草炙細辛蜀椒防風各一兩上八味搗散以一錢匕和溫酒二合含之勿咽汁冷即吐出日三度瘥止齒落自復生甚效又療歷齒稍碎壞欲盡方礬石如棗大以綿裹含之取瘥古今錄驗療牙齒根搖擬欲墮者齲齒方取生地黃綿裹含之微嚼候汁味盡棄之乃更含之緊唇方一十三首病源脾與胃合胃為足陽明其經脈起鼻環於唇其支脈入絡於脾胃脾胃有熱氣發於唇則唇生瘡而重被風邪寒濕之氣搏於瘡則微腫濕爛或冷或熱乍瘥乍發積月累年謂之緊唇亦名瀋唇出第三十卷中廣濟療緊唇水銀膏方水銀熏黃研青礬研苦參各二兩末絳緋一方亂髮一雞子大細辛二兩末上七物以緋裹發用麻油一斤蠟二兩先煎苦參細辛以緋發消盡入水銀石藥及蠟候膏成收凝定以敷病上取瘥為度水銀和石藥兩味研令盡入煎之又療緊唇瘡久不瘥石硫黃膏方石硫黃研白礬燒硃砂研水銀麝香黃柏末各一分上六味和水銀研於瓷缽中以水銀盡用臘月豬脂和如泥先拭淨塗之日三五以瘥為度甚良小品療緊唇方以白布纏作燭著空斧中燒布斧刃有汗出以指歷取塗病上取瘥千金同千金療緊唇方灸虎口男左女右七壯又方灸承漿三壯良又方青布燒灰酒服之又以脂和塗又方以蠟片灸貼之一宿瘥又方灸松脂貼上又方先灸瘡燒蛇皮灰以敷之並出第六卷中崔氏療緊唇方取膝頭垢綿裹燒敷之又方取屠兒肉几上垢燒塗之又方燒人屎灰敷之又方馬芥亦名刺芥搗取汁日曝令濃先揩唇使血出以藥匕塗之亦療刺風並出第四卷中瀋唇瘡爛方五首肘後療瀋唇常瘡爛方以五月五日鯉魚血墨和塗集驗療瀋唇緊唇方以青布卷燒炷著斧上取汁塗之良千金同又方取亂髮蜂房六畜毛燒作灰以豬脂和如膏敷千金同又方鱉甲及頭垢燒灰敷之千金同又方礬石燒末和胡粉敷之差唇瘡方三首肘後療唇瘡方以頭垢敷之日三千金同又方以東壁土敷之千金療唇瘡方胡粉敷之口瘡方一十一首廣濟療口瘡煎方龍膽黃連升麻槐白皮大青各二兩苦竹葉一升白蜜半升上七味切以水五升煮取一升去滓下蜜煎之塗口瘡瘥又療口舌生瘡含煎方升麻大青射干各三兩梔子黃柏各一升蜜八合薔薇白皮五兩苦竹葉一升切生地黃汁五合生玄參汁五合無用乾者二兩上十味切以水六升煎取二升去滓入生地黃汁蜜煎成一升如餳細細含之取瘥即止又心脾中熱常患口瘡乍發乍瘥積年不瘥方升麻八分大青枳實炙甘草炙各六分苦參七分黃連八分生乾地黃八分上七味搗羅蜜丸以水服二十丸日再忌如常法集驗療口瘡方升麻黃柏大青上三味切以水煮含之冷吐瘥止又方蘆根四兩黃柏升麻各三兩生地黃五兩上四味切以水四升煮取二升去滓含取瘥含極冷吐卻更含之千金療口瘡不歇生牛膝漱口煎方生牛膝生蘘荷根各三兩刺柏葉一兩上三味銼綿裹以酒三升積一宿微煎一兩沸含之必效口瘡方黃芩芍藥羚羊角屑黃柏大青苦竹葉各二兩升麻三兩上七味切以水七升煎取二升去滓納蜜二合攪含冷吐以瘥止肘後同古今錄驗療口瘡湯方細辛甘草桂心各三兩上三味切以酒一升煮取六合含之又黃芩湯療口瘡喉咽中塞痛食不得入方黃芩黃連甘草炙黃柏各一兩上四味切以水三升煎取一升含之冷吐取瘥又方大青四分山梔子黃柏各一兩白蜜半斤上四味切以水三升煮取一升去滓下蜜更煎一兩沸含之取瘥止又升麻散主口瘡方升麻六分黃柏上二味搗末以綿裹含之口瘡久不瘥方二首千金療口瘡不瘥入胸中生瘡三年以上不瘥方薔薇根濃煮汁含之又稍稍咽之三日三夜瘥冬取根夏取莖葉又方以角蒿灰塗之一宿知二宿瘥勿咽汁取瘥為度又論云凡患口瘡及齒切禁油麵酒醬醋膩干棗瘥後七日斷之彌佳若不久慎尋手即發發而更療其瘥稍遲慎之慎之薔薇根角蒿為口瘡之神藥人皆不知之口吻瘡方四首病源足太陰為脾之經其氣通於口足陽明為胃之經手陽明為大腸之經此二經並夾於口其腑臟虛為風邪濕熱所乘氣發於脈與津液相搏則生瘡常濕爛有汁世謂之肥瘡亦名燕口瘡出第三十卷中千金療口吻瘡方楸白皮及濕貼之數易取瘥又方掘經年葵根欲腐者彌佳燒灰以敷之又方白楊枯枝鐵上燒一頭取熱塗之本方云療燕吻又方以新炊飯了甑唇及熱熨之三十下三兩度瘥止口乾燥方五首刪繁療口熱乾燥甘草丸方甘草六分炙人參六分半夏六分洗烏梅肉六分棗膏十分上五味搗篩四味棗膏相和入蜜丸如彈子含之瘥千金同分兩小異千金療口乾除熱下氣方石膏五合碎上一味以水三升煎取二升入蜜二升煮取二升去滓稍稍含咽之瘥止又口乾方豬肪脂雞子大擘納醋半升漬一宿絞汁服之取瘥為度又方酸棗一升去核酸石榴子五合乾葛三兩烏梅五合去核麥門冬四兩去心覆盆子三合甘草炙栝蔞三兩上八味搗以蜜丸含如棗核大潤為度張文仲主口乾方干棗肉三兩甘草炙杏仁烏梅二兩上四味搗以蜜和丸如棗核含以潤瘥止口臭方九首千金療口中臭方桂心甘草細辛橘皮各等分上四味搗篩以酒服一錢匕瘥止為度又方甘草五兩芎藭四兩白芷三兩上三味搗篩以酒服方寸匕日三三十日口香又方濃煮細辛含之久卻吐甚良又方橘皮五分桂心三分木蘭皮四分芎藭六分一云棗四十個上四味搗篩以酒服方寸匕日再服一方無芎藭亦可以棗丸含化又方大豆熬令焦以醋沃取汁含之又方細辛豆蔻上二味等分搗末煮含之甚良又方梔子甘草炙各三分細辛五分桂心二分芎藭四分上五味搗篩蜜丸食後服七丸日再瘥止又方芎藭白芷橘皮桂心各四分棗肉八分上五味搗篩四物以蜜和棗肉為丸食後服十丸又含之以差為度此方甚驗古今錄驗療口臭方甘草二兩炙細辛二兩末上二味臨臥三指撮以酒服之甚良千金同舌論一首刪繁舌者主心小腸之候也舌重十兩長七寸廣二寸半善用機衡能知五味凡有所啖若多食鹹則舌脈凝而變色多食苦則皮藁而外毛拔多食辛則舌筋急而枯乾多食酸則舌肉腆而唇揭多食甘則舌根痛而外發落又曰心欲苦肺欲辛肝欲酸脾欲甘腎欲咸此五味納合五臟之氣也若臟熱則生瘡唇揭赤色若腑寒則舌本縮而口噤唇青寒宜補之熱宜瀉之不寒不熱依腑臟調之舌本縮口噤方二首刪繁療舌小腸腑寒應舌本縮口噤唇青獨活解噤膏方獨活芎藭各三兩天雄一兩炮防風一兩蜀椒二合莽草十葉細辛桂心各一兩苦李根皮三兩豬肪二升上十味㕮咀綿裹以苦酒一升淹漬一宿以豬肪微火煎之去滓膏成凝以綿裹少許口含於舌下壓之取瘥日三度易之此方甚良又生艾葉薄法無生艾葉者取乾者搗之以水淹一升已來熟搗以帛塗之於寒處上封裹之以瘥為度舌上瘡方二首千金云舌上瘡不得食舌本強頸兩邊痛此因心虛熱所致療之方柴胡升麻梔子仁芍藥通草各四兩黃芩大青杏仁去尖皮生薑各三兩石膏八兩上十味切以水一斗煎取三升半分四服日三夜一又療舌上瘡方豬膏一斤蜜二升甘草如指節三寸上三味相和煎相得即含棗許咽之日三瘥止咽喉舌諸疾方七首千金喉舌諸疾方松子苦芥子搗以苦酒和貼上又方麥面以苦酒和塗之痛止小品療喉諸病方雞子一枚破以黃白攪吞之瘥文仲療咽喉舌諸方爪耳下張口解間突處痛爪勿止兩三食久即得咽喉開又方隨所近左右刺手中指爪甲下令血出當先縛中指令血聚刺之備急療急喉咽舌病者方隨病所近左右以刀鋒裁刺手大指甲後爪中令出血即愈又方病人臥急爪其蹠心隨所近左右以瘥為良通按一本咽喉舌諸疾方七首與前不同今附錄之千金烏翣膏喉嚨者脾胃之候若藏熱喉則腫塞神氣不通方生烏翣十兩升麻三兩通草羚羊角芍藥各二兩薔薇根切一升生地黃切五合豬脂二斤艾葉六銖生者猶佳上九味㕮咀綿裹苦酒一升淹浸一宿納豬脂中微火煎取苦酒盡膏不鳴為度去滓薄綿裹膏似杏仁大納喉中細細吞之又方療喉痹以牛角燒研末酒服方寸匕又方療喉痹痹卒不語煮大豆汁吞之又方療喉痹燥腫連頰吐氣數者名為喉痹馬鞭草一握勿見風截去兩頭搗汁服之瘥又方療舌腫以醋和釜底墨厚敷舌上下脫皮更敷消息取瘥又方療舌脹用雄雞冠血盞盛浸舌嚥下即縮肘後療舌上出血如鑽孔者煎香薷汁服一升日三服盡口唇舌鼻雜療方一十四首廣濟療疳蟲蝕唇鼻齒口及余處皆效方石硫黃研乾漆熬文蛤燒作灰上三味各等分絹篩之每用減取胡桃大麝香棗核大研和先拭上惡物血等然後敷之日三肘後療唇里忽生丸核稍大方以刀鋒決之令血出瘥刪繁療舌主心臟熱即應舌生瘡裂破唇揭赤升麻泄熱煎方升麻三兩射干三兩黃柏切一升苦竹葉切五合大青三兩生蘆根薔薇根白皮各切一升生玄參汁五合生地黃汁五合赤蜜八合上十味切以水四升煮七味取一升絞去滓下諸汁蜜等候成煎放冷以綿取之封貼舌上含之細細嚥之以瘥為度良千金同千金療舌上有瘡四五孔大如簪者出血如湧泉此心臟病治方戎鹽五分黃柏黃芩各五分人參一分甘草二分炙大黃三分桂心二分上七味搗末蜜和丸以飲服十丸漸增之或燒鐵篦烙孔上又療膀胱熱不已口舌瘡咽腫升麻煎方升麻大青黃柏各二兩薔薇根射干玄參各四兩蜜五合上七味切以水七升煮六味取一升去滓下蜜煎成含之以瘥即止又療口傍瘡方亂髮灰故絮灰黃連末各等分以敷瘡取瘥翼中有乾薑又療唇邊生瘡連年不瘥方以八月藍葉十斤搗汁澄取澱以敷之又療唇舌忽生瘡方燒雞舌香末綿裹敷之取瘥又療唇黑腫痛癢不可忍方取大錢四文於石上磨似泥或乾用臘月豬脂和塗之瘥又方以竹彈弓彈之要惡血出瘥又療遠行唇口面皮單破方通按無皮單字一本作皹音均折裂也煎臘月豬脂敷之瘥又療冬月唇乾圻血出方搗桃仁以豬脂和塗張文仲療舌強不能言方礬石桂心各一兩上二味搗末敷舌上瘥必效療舌忽然粗滿口方以釜下煤和鹽等分以塗舌腫令遍瀝清水塗之取瘥止通按一本有後六方今附錄之千金療口瘡白漫漫方取桑樹汁先以發拭口次以汁塗之又療口中及舌上生瘡爛搗黃柏含之又療重舌舌上生瘡涎出以蒲黃末敷之不過三度瘥又療舌無故出血不止用槐花炒為末摻上立止又療鼻中外查瘤膿血出者正月取鼠頭燒灰和臘豬膏敷之又療咽喉閉塞口噤方用雄雀糞研末每服溫水調灌半錢匕立瘥
