身眼皆如金色但諸黃皆主之方取東引桃根細切如箸若釵股以下者一握取時勿令見風及婦人並雞犬等見之以水一大升煎取搦一小升適寒溫空腹頓服服後三五日其黃離離如薄雲散唯眼最後瘥百日方平復身黃散後可時時飲一盞清酒則眼中易散不則散遲忌食麵豬魚等肉此方是徐之才家秘方其侄珍惠說密用出第一卷中近效療發黃身面眼悉黃如金色小便濃如煮黃柏汁者眾醫不能療良驗茵陳湯方茵陳四兩黃芩二兩梔子三兩升麻三兩大黃三兩龍膽草二兩枳實二兩炙柴胡四兩上八味切以水八升煮取二升七合分溫三服若身絕羸加生地黃一升梔子加至七兩去大黃如氣力不羸依前著大黃取驗忌如法不瘥更作以瘥為限不過三四劑瘥隔三五日一劑經心錄同李皓處得此方神良癊黃方三首病源陽氣伏陰氣盛熱毒加之故但身面色黃頭痛而不發熱名為癊黃也出第十二卷中廣濟療癊黃身面眼俱黃小便如豉汁色茵陳散方茵陳四兩白蘚皮三分栝蔞四分黃芩三分梔子四分芍藥三分青木香三分柴胡三分枳實三分炙黃連三分紫雪八分土瓜根三分大青三分大黃十分上十四味搗篩為散煮茅根飲待冷平旦空腹以茅根飲服五錢匕一服少間當一兩行微利利後煮稀蔥豉粥食之利多以意漸減常取微泄利通一兩行為度瘥止忌豬肉冷水魚蒜黏膩及諸熱食出第一卷中必效療陰黃眼睛黃汗染衣涕唾黃方好黃蒸二大升上一味每夜以水二大升浸煅暖令熱勿令沸銅器中平旦絞取汁半升飲之余汁須臾則飲冬日微暖服夏冷飲每夜則浸依前服之亦得每夜小便中浸白帛片取色退為驗兩方並極效忌面羊肉豬魚又療癊黃汗染衣涕唾黃者方取蔓荊子搗細末平旦以井花水和一大匙服之日再漸加至兩匙以知為度每夜小便裹浸少許帛各書記日色漸退白則瘥不過服五升以來必瘥李潤州傳極效備急肘後張文仲深師同出第一卷中黃疸小便不利及腹滿喘方二首仲景傷寒論黃家腹滿小便不利而赤身汗出者表和裡實也宜下之大黃黃柏皮梔子硝石湯方大黃四分黃柏四兩梔子十五枚硝石四兩上四味切以水六升煮三物得二升半去滓納硝石更煎取一升先食頓服盡小品千金翼深師範汪並同又黃疸小便色不變欲自利腹滿而喘者不可除其熱熱除必噦噦者小半夏湯主之方半夏五兩炮生薑八兩上二味以水六升煮取一升半去滓分溫三服忌羊肉餳範汪同並第十四卷中黃汗方三首病源黃汗之為病身體洪腫發熱汗出而渴狀如風水汗染衣色正黃如柏汁其脈自沉此由脾胃有熱汗出而入水中若浴水入汗孔得之出第十二卷中仲景傷寒論師曰黃汗為病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如柏汁脈自沉也問曰從何得之師曰以汗出水入汗孔水從外入而得之宜黃耆芍藥桂心酒湯主之方黃耆五兩芍藥三兩桂心三兩上三味切以苦酒一升水七升和煮取三升去滓溫服一升正當心煩也至六七日稍稍自除其心煩不止者以苦酒阻故也阻作一方用美清醯代酒忌生蔥備急張文仲千金古今錄驗深師範汪經心錄同又凡黃汗之病兩脛自冷假令發熱此屬歷節食已則汗出又身常夜臥盜汗出者此勞氣也若汗出即發熱者久久身必甲錯也發熱不止者必生惡瘡也若身重汗出已輒輕者久久必身瞤瞤則胸中痛又從腰以上必汗出下無汗腰髖弛痛如蟲在皮中狀劇者不能食身疼重煩躁小便不利者名曰黃汗桂枝湯加黃耆五兩主之方桂心三兩芍藥三兩甘草三兩炙生薑三兩大棗十二枚黃耆五兩上六味切以水八升微火煎取三升去滓溫服一升覆取微汗須臾間不汗者食稀熱粥一升余以助湯力若不汗者更服湯也忌海藻菘菜生蔥古今錄驗範汪同出第十四卷中療黃疸身腫發熱汗出而渴狀如風水汗出著衣皆黃黃汗吳藍湯方吳藍六分芍藥麥門冬去心桑白皮漢防己白蘚皮山梔子各六分上七味各細切以水二升煎取八合去滓空腹分二服未效再合服此方未詳所出女勞疸方四首病源女勞疸之狀身目皆黃發熱惡寒少腹滿急小便難因大勞大熱而房室房室畢入水所致也出第十二卷中仲景傷寒論黃家日晡發熱而反惡寒此為女勞得之膀胱急小腹滿身體盡黃額上反黑足下熱因作黑癉大便必黑腹臚脹滿如水狀大便黑溏者此女勞之病非水也腹滿者難療硝石礬石散主之方硝石熬黃礬石燒令汁盡上二味等分搗絹篩以大麥粥汁和服方寸匕日三重衣覆取汗病隨大小便去小便正黃大便正黑也大麥則須是無皮麥者千金方云消石二分熬令燥礬石一分熬令燥故注之肘後小品崔氏文仲千金範汪深師並同出第十四卷中千金翼療黃疸之為病日晡所發熱惡寒小腹急體黃額黑大便黑溏泄足下熱此為女勞也腹滿者難療方滑石五兩研石膏五兩研上二味為散以大麥粥汁服方寸匕日三小便極利則瘥小品千金備急文仲並同出第十八卷中近效女勞疸黃家日晡發熱而反惡寒此為女勞得之膀胱急小腹滿身體盡黃額上反黑足下熱因作黑疸其大便必黑腹臚脹滿如水狀大便黑溏此女勞之病非水也療與黑疸同谷疸食則眩心忪怫鬱不安久久發黃為谷疸並以前茵陳湯主之方在遍身黃部中必效女勞之黃氣短聲沉者宜服此方取婦女月經布和血衣燒作灰以酒空腹服方寸匕日再服不過三日必瘥黑疸方三首病源黑疸之狀苦小腹滿身體盡黃額上反黑足下熱大便黑是也夫黃疸酒疸女勞疸久久變成黑疸出第十二卷中肘後療黃疸變成黑疸者多死急治之方取土瓜根汁服一小升平旦服至食時病從小便去則愈不忌先須量病人氣力不得多服力衰則起不得千金並翼文仲集驗崔氏刪繁範汪並同出第一卷中深師療黑疸身體及大便正黑赤小豆茯苓湯方赤小豆三十枚茯苓六銖瓜蒂四銖雄黃二銖甘草半兩炙女葳四銖上六味切以水三升煮小豆茯苓取八合汁搗後四藥為散取前汁調半錢匕適寒溫服之須臾當吐吐則愈一方云療久黃疸忌大醋海藻菘菜千金方名赤苓散千金翼同出第二十卷中千金翼茵陳丸主黑疸身體暗黑小便澀體重方茯苓四分茵陳一兩枳實五分炒黃白朮五分土炒半夏三兩洗甘遂一分杏仁三分去尖皮蜀椒二升汗當歸二分葶藶子四分熬大黃三分熬勿令焦乾薑四分上十二味搗篩蜜和丸如梧子空肚飲服三丸日三服忌羊肉餳酢桃李雀肉等出第十八卷中酒疸方七首病源夫虛勞之人若飲酒多進谷少者則胃內生熱因大醉當風入水則身目發黃心中懊痛足脛滿小便黃面發赤斑若下之久久變為黑疸目青面黑心中如啖蒜齏狀大便正黑皮膚抓之不仁其脈浮弱故知之酒疸心中熱欲嘔者當吐之即愈小便不利其候當心中熱足下熱是其證明也若腹滿欲吐鼻躁其脈浮者先吐之沉弦者先下之出第十二卷中仲景傷寒論酒癉者心中懊憹或熱痛梔子枳實豉大黃湯主之方梔子七枚枳實五枚香豉一升大黃一兩上四味切以水六升煮取二升去滓溫服七合日三服肘後千金同出第十四卷中肘後療酒疸者心中懊痛足脛滿小便黃飲酒面發赤斑黃黑由大醉當風入水所致黃耆散方黃耆二兩木蘭皮一兩上二味為散酒服方寸匕日三備急文仲同深師酒疸艾湯方生艾葉一把麻黃二兩去節大黃六分大豆一升上四味切清酒五升煮取二升分為三服出第三十卷中千金茵陳湯主黃疸酒疸酒癖身體面目盡黃方太醫校尉史脫處茵陳三兩大黃二兩一方一兩梔子二七枚黃芩三兩一方用一兩人參半兩一方用一兩黃連二兩一方用一兩甘草一兩炙上七味切以水一斗煮取三升分為三服忌豬肉冷水海藻菘菜文仲範汪同又夫人病疸者或無熱靜言了了腹滿欲吐酒疸心中熱欲嘔吐之即愈方取千金翼苦參散吐良在上通身黃部中七味者是也又肉疸飲少小便多白如泔色得之從酒寒水石散方寒水石五分白石脂五分栝蔞五分菟絲子三分酒漬知母三分桂心三分上六味搗篩麥粥服五分匕日三服五日知忌生蔥古今錄驗深師等並同古今錄驗療酒癖及飲黃疸散方芫花椒目各等分上二味搗下篩為散平旦服一錢匕老少半服之藥攻兩脅則下便愈間一日復服使小減如前又與之使盡根源深師同出第二十七卷中谷疸方三首病源谷疸之狀食畢頭眩心忪怫鬱不安而發黃由失飢大食胃氣衝熏所致陽明病脈遲食難用飽飽則發煩頭眩者必小便難此欲為谷疸雖下之其腹必滿以其脈遲故也出第十二卷中範汪療谷疸茵陳湯方茵陳四兩切以水一斗煮取六升以汁煎大黃二兩梔子七枚得二升分為三服黃從小便去病出立愈肘後同出第十四卷中集驗療勞疸谷疸丸方苦參三兩龍膽草一兩上二味下篩牛膽汁和丸先食以麥粥飲服如梧子大五丸日三不知稍增千金同出第二卷中刪繁療勞疸谷疸苦參丸方勞疸者因勞為名也谷疸者因食而勞故曰谷疸苦參三兩龍膽草二兩梔子仁三七枚上三味搗篩為散若病甚取豬膽和為丸如梧子大一服五丸日三四服以飲汁下之許仁則療諸黃方七首許仁則療急黃病此病始得與前天行病不多異五六日但加身體黃甚者洟音夷鼻液也下同淚汗唾小便如柏色眼白睛正黃其更重狀與天行病候最重者無別如至此困自須依前救天行最重半夏等分十味湯救之若未至是者宜依後法急黃狀始得大類天行病經三兩日宜合麻黃等五味湯服之發汗以泄黃勢方麻黃三兩去節乾葛五兩石膏八兩生薑六兩茵陳二兩上藥切以水八升煮取二升七合去滓分溫三服服相去十里久服訖當欲汗則覆被微取汗以散之又依前麻黃等五味湯服之取汗汗出後未歇經三五日又合梔子等五味湯以取利方梔子二十枚柴胡三兩黃芩三兩茵陳三兩芒硝六兩上藥切以水八升煮四味取二升六合去滓納芒硝攪令消分溫三服如人行十里久更服之效又依前梔子等五味湯服之取利利後病勢不歇經六七日又合秦艽牛乳二味湯服之方秦艽六兩牛乳二升上藥切秦艽以牛乳煮之可三分減一去滓帶暖頓服令盡極驗文仲必效同西域法也又依前秦艽等二味湯藥服後不覺病退漸加困篤勢如前天行最重狀則不可更服諸冷物冷物在心唯是痞速宜同前天行用半夏等十味湯以救之亦可合瓜蒂等三味散吹鼻孔中並與之服方瓜蒂七枚丁香七枚赤小豆七枚上藥搗篩末取如大豆分吹兩鼻孔中須臾當出黃水正如煮柏汁及出黃蟲亦可以新汲水和一方寸匕與患人服或利或吐吐利所出亦如煮黃柏汁天行用此療亦與崔氏同又論云此病俗間亦有單煮瓜蒂汁灌鼻孔中者亦有單服生麻油者又療黃疸病此病與前急黃不同自外狀與平常無別但舉體正黃甚者眼色如柏涕涎洟小便及汗悉如柏汁食消多於尋常稍覺瘦悴乏力此病不甚殺人亦有經年累歲不療而瘥者此由飲酒多亦是積虛熱所致黃疸初得稍覺心中煩熱滿身黃色眼白睛黃覺如此者宜合白蘚皮等七味湯以泄之黃連十味丸以壓之白蘚皮三兩乾葛五兩黃芩三兩鬱金三兩豉五兩梔子十枚芒硝六兩上藥切以水八升煮取二升半去滓納芒硝分溫三服服相去如人行二十里久更服此湯當得利利後將息一二日則合後黃連等十味丸服之又黃連丸方黃連五兩黃芩五兩苦參六兩沙參五兩乾地黃六兩乾葛六兩梔子仁三兩麥門冬一升去心地骨白皮五兩茯苓五兩上十味搗篩為末蜜和為丸以米飲下初服十丸日三服稍稍加至三十丸如梧子大黃疸亦有單服豬脂得瘥者忌豬肉冷水大酢蕪荑等物吳升同雜黃疸方三首千金濕疸之為病始得之一身盡疼發熱面色黃黑七八日後壯熱熱在裡有血當下去之如豚肝狀其小腹滿者急下之亦一身盡黃目黃腹滿小便不利礬石散方礬石五兩滑石五兩上二味為散大麥粥汁服方寸匕日三服當先食服便利如血者當汗出瘥深師古今錄驗並同出第十卷中古今錄驗九疸秦王散方胃癉食多喜飲梔子仁主之心癉煩心心中熱葛根主之腎癉其人唇乾葶藶子主之脾癉溺赤出少心惕惕若恐栝蔞主之肺癉飲少小便多秦椒汗瓜蒂主之一云膏疸舌癉渴而數便石鐘乳主之肉癉其人小便白凝水石主之髓癉目眶深多嗜臥牡蠣澤瀉主之肝癉胃熱飲多水激肝白朮主之上十一味名秦王散各等分隨病所在加二分搗合下篩飲服五分匕日三稍加至方寸匕忌桃李雀肉等膏癉飲少小便多秦椒散方秦椒一分汗瓜蒂二分上二味搗下篩水服方寸匕日三服深師千金同出第二十七卷中
