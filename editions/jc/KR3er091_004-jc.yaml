body:
  text: 卷第四溫病論病源二首病源經言春氣溫和夏氣暑熱秋氣清涼冬氣冰寒此則四時正氣之序也冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃為傷寒耳其傷於四時之氣皆能為病以傷寒為毒者以其最為殺厲之氣中而即病者名為傷寒不即病者其寒毒藏於肌膚中至春變為溫病至夏變為暑病暑病者熱極又重於溫也是以辛苦之人春夏多溫熱病者皆由冬時觸冒寒氣之所致以上與傷寒論同凡病傷寒而成溫病者先夏至日者為病溫後夏至日者為病暑故曰冬三月早臥晚起必待日光使志若伏若匿若有私意若已有得去寒就溫無泄皮膚使氣亟奪又因於寒欲如運樞故冬傷於寒春必病溫也又有冬時傷非節之暖名為冬溫之毒與傷寒大異也有病溫者乃天行之病耳其冬月溫暖之時人感乖候之氣未遂發病至春或被積寒所折毒氣不得泄至天氣暄熱溫毒始發則肌肉斑爛也經曰虛邪賊風避之有時恬淡虛無真氣從之精神內守病安從來故曰人清淨則肉腠閉拒雖有大風苛毒弗之能害又云四時陰陽者萬物之根本也是以聖人春夏養陽秋冬養陰以從其根也從陰陽則生逆之則死故曰精者身之本藏於精者春不病溫也有病溫汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何曰病名陰陽交交者死人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉之間而得汗者是邪卻而精勝也精勝則當能食而不復熱熱者邪氣也汗者精氣也今汗出而輒復熱者是邪勝也不能食者精無裨也病而留者其壽可立而傾也汗出而脈尚躁盛者死今脈不與汗相應此不勝其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死凡膚熱其脈盛躁者病溫也其脈盛而滑者汗且出也凡溫病人三二日身軀熱脈疾頭痛食飲如故脈直疾八日死四五日頭痛脈疾喜吐脈來細十二日死此病不療八九日脈不疾身不痛目不赤色不變而反利脈來牒牒按不彈手指時大心下硬十七日死病三四日以下不得汗脈大疾者生脈細小難得者死不治也下利腹中痛者死不治闢溫方二十首肘後屠蘇酒闢疫氣令人不染溫病及傷寒歲旦飲之方大黃桂心各十五銖白朮十銖桔梗十銖菝葜蜀椒十銖汗防風烏頭各六銖上八味切絳袋盛以十二月晦日中懸沉井中令至泥正月朔旦平曉出藥至酒中煎數沸干東向戶中飲之屠蘇之飲先從小起多少自在一人飲一家無疫一家飲一里無疫飲藥酒待三朝還滓置井中能仍歲飲可世無病當家內外有井皆悉著藥闢溫氣也又太乙流金散闢溫氣雄黃三兩雌黃六兩礬石一兩半鬼箭羽一兩半羚羊角燒二兩上五味治下篩三角絳袋盛一兩帶心前並掛門戶上若逢大疫之年以月旦青布裹一刀圭中庭燒之溫病人亦燒熏之又雄黃散闢溫氣方雄黃五兩硃砂一作赤木菖蒲鬼臼各二兩上四味搗篩末以塗五心額上鼻人中及耳門又斷溫疫轉相染著至滅門延及外人無收視者方赤小豆鬼箭羽鬼臼雄黃各三兩上四味搗末以蜜和丸如小豆大服一丸可與病人同床又避溫粉川芎蒼朮白芷藁本零陵香各等分上五味搗篩為散和米粉粉身若欲多時加藥增粉用之出第十卷中千金避溫虎頭殺鬼丸方虎頭骨五兩炙硃砂一兩半研鬼臼一兩雄黃一兩半研皂莢一兩炙雌黃一兩半研蕪荑一兩上七味搗篩以臘蜜和如彈丸大絳囊盛係臂男左女右家中置屋四角月朔望夜半中庭燒一丸忌生血物肘後同又治瘴氣竹茹湯方青竹茹二升上一味以水四升煮取三升分三服又避溫病粉身散方芎藭白芷藁本上三味等分搗下篩納米粉中以粉塗身延年同又斷溫疫朱蜜丸方白蜜和上等硃砂粉一兩常以太歲日平旦大小勿食向東方立人吞三七丸如麻子大勿令齒近之併吞赤小豆七枚投井泉水中終身勿忘此法又治溫病不相染方正旦吞麻子赤小豆各二七枚又以二七枚投井中肘後延年同又方新布盛大豆一升納井中一宿出服七枚肘後用小豆又方切松葉如粟米酒服方寸匕日三服闢五年溫又方常以七月七日閤家含赤小豆向日吞二七枚又方常以七月七日男吞大豆七枚女吞小豆七枚又方神仙教人立春後有庚子日溫蕪菁菹汁合家大小並服不限多少又療溫氣蒜豉湯方蒜五十子並皮研之豉心一升上二味以三歲小兒小便二升合煮五六沸頓服並出第九卷中千金翼老君神明白散方白朮二兩桔梗一兩細辛一兩附子二兩炮烏頭四兩去黑皮上五味搗篩絳囊盛帶之所居閭里皆無病若有得疫癘者溫酒服一方寸匕覆取汗得吐則瘥若經三四日者以三方寸匕納五升水中煮令大沸分三服又度瘴散方麻黃去節升麻附子炮白朮各一兩細辛防己乾薑桂心防風烏頭炮蜀椒出汗去目桔梗各二分上十二味搗篩為末蜜封貯之山中所在有瘴氣之處旦空腹服一錢匕覆取汗病重稍加之並出第十卷中古今錄驗許季山所撰干敷散主闢溫疫疾惡令不相染著氣方肘後作敷干抱朴子作敷干附子一枚炮細辛一分乾薑一分麻子一分研柏實一分上五味搗篩為散正旦舉家以井花水各服方寸匕服藥一日十年不病二日二十年不病三日三十年不病受師法但應三日服歲多病三日一服之肘後胡洽延年範汪刪繁同出第二卷中又殺鬼丸去惡毒方雄黃五兩研硃砂五兩研鬼臼五兩鬼督郵五兩雌黃五兩研馬兜鈴五兩皂莢五兩炙虎骨五兩炙阿魏五兩甲香一兩羚羊角一枚屑桃白皮五兩白膠香一兩菖蒲五兩羖羊角一枚屑臘蜜八斤煉石硫黃五兩研上十七味搗篩十六味臘蜜和之丸如杏子將往闢溫處燒之殺鬼去惡毒氣若大疫家可燒並帶行與胡洽方七味不同出第三卷中延年秘錄闢溫方正旦取東行桑根大如指長七寸以丹塗之懸著門戶上又令人帶之出第十卷中闢溫不相染方二首病源此病皆因歲時不和溫涼失節人感乖候之氣而生病則病氣轉相染易乃至滅門延及外人故須預服藥及為法術以防之出第十卷中千金斷溫疫主溫病轉相染著乃至滅門延及外人無收視者赤小豆丸方赤小豆二兩鬼臼二兩鬼箭二兩丹砂二兩研雄黃二兩研上五味末之以蜜和如小豆大服一丸可與病人同床傳衣也出第九卷中延年主闢溫疫疾惡氣令不相染易豉湯方豆豉一升伏龍肝三兩研小兒小便三升上三味用小便煎取一升五合去滓平旦服之令人不著瘴疫天行有瘴之處宜朝朝服出第十卷中溫病噦方四首病源伏熱在胃令人胸滿胸滿則氣逆氣逆則噦若大下後胃中虛冷亦令致噦也並出第十卷中小品茅根湯療溫病有熱飲水暴冷噦者方茅根葛根各切半升上二味以水四升煮取二升稍溫飲之啘止則停又療溫病熱未除重被暴寒寒毒入胃熱蘊結不散變啘者方單煮梓皮稍稍飲之佳溫病積飲冷冷結胃中熱入腎中變壯熱大啘者服梓皮溫啘得止也夫腎中有熱者病瘥後足心皮喜剝脫去頭髮禿落是其證也又茅根橘皮湯療春夏天行傷寒溫病干胃冷變啘方白茅根切一升橘皮三兩桂心二兩葛根二兩上四味切以水六升煮取三升分溫服三合數連服之盡復合啘止乃停耳微有熱減桂一兩文仲古今錄驗同出第六卷中古今錄驗療溫病有熱飲水暴冷啘枇杷葉飲子方枇杷葉拭去毛茅根各半升上二味切以水四升煮取二升稍稍飲之啘止則停出第三卷中溫病渴方二首病源熱氣入腎臟腎臟惡燥熱氣盛則腎燥腎燥則渴引飲也出第十卷中深師療溫毒病及吐下後有餘熱渴芍藥湯神方芍藥五分黃連四分甘草二分炙黃芩二兩桂心二兩栝蔞二分上六味切以水五升煮取三升分三服一日令盡出第十四卷中古今錄驗知母解肌湯療溫熱病頭痛骨肉煩疼口燥心悶者或是夏月天行毒外寒內熱者或已下之餘熱未盡者或熱病自得痢有虛熱煩渴者方麻黃二兩去節知母三兩葛根三兩石膏三兩甘草二兩炙上五味切以水七升煮取三升分為三服若已下及自得下虛熱未歇者除麻黃加知母葛根病熱未除因夢泄者可除麻黃加白薇人參各二兩則止小品同出第二卷中溫病發斑方七首病源夫人冬月觸冒寒毒者至春始發病病初在表或已發汗吐下而表證未罷毒氣不散故發斑瘡又冬月天時溫暖人感乖候之氣未即發病至春又被積寒所折毒氣不得泄至夏遇熱其春寒解冬溫毒始發出於肌膚斑爛隱疹如錦文也出第十卷中肘後療溫毒發斑大疫難救黑膏方生地黃半斤好豉一升上二味以豬膏二斤合露之煎五六沸令三分減一絞去滓末雄黃麝香如大豆者內中攪和盡服之毒便從皮中出則愈忌蕪荑出第二卷中小品葛根橘皮湯療冬溫未即病至春被積寒所折不得發至夏得熱其春寒解冬溫毒始發出肌中斑爛隱疹如錦文壯熱而咳心悶嘔但吐清汁宜服此湯則靜方大效葛根二兩橘皮二兩杏仁二兩去尖皮麻黃二兩去節知母二兩黃芩二兩甘草二兩炙上七味切以水七升煮取三升分溫三服嘔悶吐當先定便且消息古今錄驗同出第六卷中刪繁療肺腑藏熱暴氣斑點香豉湯方香豉一升綿裹蔥須切四兩石膏八兩梔子仁三兩生薑八兩大青二兩升麻三兩芒硝三兩上八味切以水六升煮七味取二升五合去滓然後下芒硝分三服出第十卷中備急療溫毒發斑赤斑者五死一生黑斑者十死一生大疫難救黑奴丸方麻黃三兩去節大黃二兩芒硝一兩黃芩一兩釜底墨一兩研灶尾墨一兩研屋梁上塵二兩研上七味搗末用蜜和如彈子大新汲水五合研一丸服之若渴但與水須臾當寒寒訖便汗則解日移五丈不覺更服一丸此療六日胸中常大熱口噤名壞病醫所不療服此丸多瘥胡洽小品同一名水解丸又一方加小麥黑勃一兩名為麥奴丸範汪方同古今錄驗黃連橘皮湯療冬溫未即病至春被積寒所折不得發至夏得熱其春寒解冬溫毒始發出肌中斑爛隱疹如錦文而咳心悶嘔吐清汁眼赤口瘡下部亦生瘡已自得下痢宜服此方黃連四兩去毛橘皮二兩杏仁二兩去尖皮枳實一兩炙麻黃二兩去節葛根二兩厚朴一兩炙甘草一兩炙上八味切以水八升煮取三升分三服令盡且消息下當先止又漏蘆橘皮湯療冬溫未即病至春被積寒所折不得發至夏熱其春寒解冬溫毒始發出肌中斑爛隱疹如錦文而咳心悶嘔吐清汁眼赤口瘡下部亦生瘡方漏蘆橘皮甘遂麻黃去節杏仁去皮尖黃芩各二兩上六味切以水九升煮取三升分四服得下為佳下後餘外證未除更服葛根橘皮湯方在前小品方一方有知母枳實白薇升麻大黃甘草為十二味出第三卷中又發斑瘡方黃連切三兩去毛上一味以水二升煮取八合頓服之忌豬肉冷水溫病勞複方四首病源溫病勞復謂病新瘥津液未復血氣尚虛因勞動早更生於熱熱氣還入經絡覆成病也又凡得溫毒病新瘥脾胃尚虛穀氣未復若食犬豬羊肉並腸血及肥魚炙脂膩必大下痢下痢則不可復救又食餅餌炙鱠棗慄諸生果難消物則不能消化停積在於腸胃便脹滿結實大小便不通因更發熱覆成病也非但雜食梳頭洗浴諸勞事等皆須慎之如桃李生蔥生菜海藻菘菜雀肉等俱在所忌並出第十卷中千金論曰凡熱病新瘥及大病之後食豬肉及腸血肥魚炙膩必大下痢醫所不能療也必至於死若食餅餌粢黍飴脯炙膾棗粟諸果及堅實難消之物胃氣尚虛弱不能消化必更結熱適以藥下之則胃虛冷大利難禁不下之必死下之復危皆難救也熱病及大病之後多坐此死不可不慎也病新瘥後但得食糜粥寧可少食令飢慎勿飽不得他有所食雖思之勿與引日轉久可漸食羊肉糜若羹汁雉兔鹿肉不可食豬狗肉也新瘥後當靜臥慎勿早起勿令人梳頭澡洗非但體勞亦不可多語言用心使意勞凡此皆令人勞復有人得病已瘥而未健詣華敷視脈曰雖瘥尚虛未復陽氣不足勿為勞事余勞尚可御內則死臨死當吐舌數寸其妻聞其夫病除從百餘里來省之止宿交接中間三日發病舌出數寸而死病新瘥未滿百日氣力未平復而以房室者略無不死及熱病房室名陰陽易之病皆難療多死古今錄驗集驗同又療重病新瘥早起勞及飲食多致復欲死方燒鱉甲末服方寸匕忌莧菜肘後集驗文仲備急同出第十卷中深師療溫病瘥愈食復病麻黃散方麻黃十分去節大黃十五分炙附子一分炮厚朴二分炙苦參六分石膏六分碎綿裹烏頭六分炮上七味搗篩以酒若米汁和服方寸匕日三夜二服出第十四卷中古今錄驗療熱病復麻子湯吳正服效方麻子一升豉一升牡鼠屎一十一枚上三味以水五升煮取二升半分溫三服立愈試之有神驗肘後同又大黃丸方大黃一兩蒸之二斗米下巴豆五十枚去心皮熬硝石三分熬無者以芒硝代之桂心二分乾薑二分炮上五味搗篩四味別搗巴豆令如泥合和以蜜更搗二千杵丸如梧子一丸湯服之但熱在膈上當吐在膈下當利豫作粥如服他吐下丸法服藥兩食頃不吐下以熱飲動之若不得吐下可更服一丸半能藥壯人可二丸此藥優於他下藥丸故宜大小下多冷粥解之若有瘡綿挺如指蜜和一丸塗挺頭且納瘡中㬂出之不瘥更作溫病不得大便服之得下佳宿食不消亦服之飛屍遁屍漿服半丸日一應須臾止心腹脹滿痛服一丸瘧者依發日先宿勿食清晨服一丸丁壯人服二丸得吐下忍飢過發時乃食婦人產後血結中奔走起上下或絕產無子或月經不調面目青黃服半丸小兒淋瀝寒熱臚脹大腹不欲食食不生肌三四歲者如麻子服一丸日一六七歲兒服二丸比三十日心腹諸病瘥兒小半之愈大良忌野豬肉蘆筍生蔥出第三卷中諸黃方一十三首病源黃病者一身盡疼發熱面色洞黃七八日後結熱在裡有血當下去之如㹠肝狀其人小腹滿急若其人眼睛澀疼鼻骨疼兩膊及項強腰背急則是患黃大便澀但令得小便快則不慮死不用大便多多則心腹脹不好此由寒濕在表則熱蓄於脾胃腠理不開瘀熱與宿谷相搏鬱蒸不得消則大小便不通故身體面目皆變黃色凡黃候其寸口近掌無脈口鼻氣冷並不可療之必死出第十二卷中仲景傷寒論諸黃豬膏發煎主之方豬膏八兩亂髮大如雞子一枚上二味納發膏中煎之發消盡研絞去膏細滓分二服病從小便去也肘後備急文仲千金古今錄驗深師範汪同云太醫校尉史脫家婢再病胃中干糞下便瘥神驗出第十四卷中刪繁療天行毒熱通貫臟腑沉鼓骨髓之間或為黃疸黑疸赤疸白疸谷疸馬黃等疾喘息須臾而絕瓜蒂散方瓜蒂二七枚赤小豆三七枚秫米二七粒上三味搗篩為散取如大豆粒吹於兩鼻之中甚良不瘥間日復服之千金範汪集驗同又方瓜蒂二七枚上一味以水一升煮取五合作一服又方鹽一升上一味紙裹漬濕燒之取通赤納三升水中攪令調手巾漉度為一服以前二方服訖並吐出黃汁崔氏療黃貧家無藥者可依此方取柳枝三大升以水一斗煮取濃汁搦半升一服令盡又療黃兼主心腹方蔓荊子一大合揀令淨上一味搗碎熟研以水一升更和研濾取汁可得一大盞頓服之少頃自當轉利或亦自吐腹中便寬亦或得汗便愈備急文仲深師同並出第一卷中延年秘錄療黃瓜蒂湯方瓜蒂一兩赤小豆四十九枚丁香二七枚上三味搗末以水一升煮取四合澄清分為兩度滴入兩鼻中出第十卷中救急療三十六種黃方取雞子一顆並殼燒作灰研酢一合又溫之總和頓服身體眼暗極黃者不過三顆鼻中蟲出神效又療諸黃暗黃眼暗及大角赤黑黃先擲手足內黃患渴疸黃眼赤黃腎黃小便不通氣急心悶五色黃瓜蒂散方丁香瓜蒂赤小豆各十枚上三味細搗篩取暖水一雞子許和服大神驗並出第十七卷中廣濟同必效療一切黃蔣九處得其父遠使得黃服此極效茵陳湯及丸方茵陳四兩大黃三兩黃芩三兩梔子三兩上四味切以水五升煮取三升分為三服空肚服之不然搗篩蜜和為丸飲服二十丸稍稍加至二十五丸量病與之重者作湯勝服丸日一服忌羊肉酒面熱物等以瘥為限小便黃色及身黃者並主之又療諸黃眼已黃亦差瓜蒂散方丁香一分赤小豆一分瓜蒂一分一方加秫米一分上三味搗末溫水食前頓服使盡則當利並吐黃水不瘥更服並出第一卷中千金療黃疸大黃丸方大黃二兩葶藶三兩上二味搗篩為末蜜和為丸如梧子大未食服十丸日三服病瘥便止又大黃丸方大黃二兩黃連三兩黃芩黃柏各一兩曲衣五合上五味搗篩為末蜜和丸如梧子大食前服三丸日三服不知可至五丸忌豬肉冷水並出第十卷中急黃方六首病源脾胃有熱穀氣鬱蒸因為熱毒所加故卒然發黃心滿氣喘命在頃刻故云急黃也有得病即身體面目發黃者有初不知是黃死後乃身面黃者其候得病但發熱心戰者是急黃也並出第十二卷中廣濟療急黃身如金色瓜蒂散方赤小豆二七枚丁香二七枚黍米二七枚瓜蒂二七枚麝香薰陸香等分別研青布二方寸燒為灰上七味搗篩為散飲服一錢匕則下黃水其黃則定忌生冷熱面黏食陳臭等一方止三味出第一卷中必效療急黃疸內等黃大黃湯方大黃三兩切芒硝二兩上二味以水二升生漬大黃一宿平旦絞汁一升半納芒硝攪服須臾當快利瘥出第一卷中延年秘錄療急黃心下堅硬渴欲得水吃氣息喘粗眼黃但有一候相當即須宜服此瓜蒂散吐則瘥方瓜蒂二小合赤小豆二合上二味搗篩為散年大人暖漿水五小合和散一服滿一方寸匕一炊久當吐不