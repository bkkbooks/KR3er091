不欲去衣或一身流腫方桂心三兩白朮三兩附子二枚炮八破甘草三兩上四味㕮咀以水六升煮取三升分三服微汗即止若汗出煩者稍服五合驃騎使吳諧以建元元年八月二十六日始覺如風至七日猝起便頓倒髀及手皆不隨通引腰背疼痛通身腫心多滿至九月四日服此湯一劑通身流汗即從來所患悉愈本方不用生薑既有附子今加生薑三兩忌同又療風濕體疼惡風微腫天門冬湯方天門冬三兩去心葛根四兩生薑三兩桂心四兩麻黃三兩去節芍藥二兩杏仁五十枚甘草二兩炙上八味切以水一斗煮取三升分三服取汗忌鯉魚余同前深師無芍藥名天門冬湯並出第十四卷中又療頭風濕面如針刺之狀身體有腫惡風汗出短氣不能飲食麻黃湯方麻黃四兩芎藭一兩莽草一兩當歸一兩杏仁三十枚上五味切以水五升煮取二升去滓分三服日三糜粥將息佳又辨中風偏枯風痱風懿風痹偏枯者半身偏不隨肌肉偏不用而痛言不變智不亂病在分腠之間溫臥取汗益其不足損其有餘乃可復也風痱者身無痛四肢不收智亂不甚言微知可療甚則不能言不可治也風懿者奄忽不知人咽中塞窒窒然舌強不能言病在臟腑先入陰後入陽治之先補於陰後寫於陽發其汗身轉軟者生汗不出身直者七日死風痹病不可已者足如履冰時如入湯腹中股脛淫濼煩心頭痛嘔眩時時汗出目眩悲恐短氣不樂不出三年死騎士息王恕母年五十紗扇自扇汗出中風口不得語身緩不收積一月困篤張苗為作七物獨活湯服五劑得愈又士度良母年七十餘中風但苦口不得語積百餘日往來飲食如故苗又與合獨活湯四劑得愈七物獨活湯療腳弱及中風濕緩縱不隨方出胡洽獨活五兩葛根四兩乾薑二兩桂心四兩半夏四兩洗甘草二兩炙防風三兩上七味㕮咀以水一斗煮取三升每服一升日三得少微汗出好忌羊肉餳海藻菘菜生蔥又療濕家始得病時可與薏苡麻黃湯方薏苡半升麻黃四兩去節甘草二兩炙杏仁二兩上四味㕮咀以水五升煮取二升分再服汗出即愈濕家煩疼可以甘草麻黃湯發汗不瘥更合飲家加白朮四兩名白朮麻黃湯忌海藻菘菜桃李雀肉等此本仲景方分兩小異並出第十五卷中許仁則療腳氣方三首許仁則曰此病有數種有飲氣下流以成腳氣飲氣即水氣之漸亦有腎氣先虛暑月承熱以冷水洗腳濕氣不散亦成腳氣亦有腎氣既虛諸事不節因居卑濕濕氣上衝亦成腳氣此諸腳氣皆令人腳脛大腳跌腫重悶甚上衝心腹滿悶短氣中間有乾溼二腳氣濕者腳腫乾者腳不腫漸覺枯燥皮膚甲錯須細察之若先覺心腹脅肋刺痛胸背滿悶吃食之後此狀彌加時時氣短手腳沉重骨髓疼多喝氣每食諸黏膩陳敗臭物即諸狀轉劇此即飲氣下流而成腳氣有此候者自宜依前療飲氣將成水氣細辛等八味湯葶藶子等十五味丸療之若先無前狀但覺腳腫疼悶沉重有時緩弱乍衝心腹滿悶小腹下不仁有時急痛宜依後吳茱萸等五味湯桑根白皮等十味丸側子等十味酒細細服之吳茱萸湯方吳茱萸二兩生薑五兩橘皮三兩桂心二兩大檳榔十枚上藥切以水七升煮取二升半去滓分溫三服服相去如人行七八里久一服覺諸狀可欲重合服亦佳服湯後將息經三四日即服後桑根白皮等十味丸忌生蔥又方桑根白皮五兩生薑屑六兩蜀椒汗桂心升麻四兩五味子四兩上藥搗篩蜜和為丸以飲下之初服十五丸日再服稍稍加至三十丸如梧子大覺熱食前服覺冷食後服之忌同蜀椒桂心元未見分兩又至九月以後宜合側子等十味酒服之兼將下丸方側子五兩生薑八兩桑根白皮八兩桂心四兩白朮八兩五加白皮六兩丹參六兩續斷五兩牛膝五兩細辛四兩上藥切絹袋盛用無灰酒五升浸五六日初服一雞子黃許日再服稍稍加之以知為度必用前數法不覺可宜依舊腳氣方用之忌豬肉冷水桃李雀肉生蔥生菜吳升同並出一卷中論陰陽表裡灸法三十七首蘇恭云凡腳氣發有陰陽表裡當隨狀療之不可妄依古方也惠陰療陽病表救里皆為重虛實危殆之甚也若病從陰發起兩足大指內側上循脛內及膝里頑痹不仁或腫先發於此者皆須隨病灸復留中都陰陵泉等諸穴灸者先從上始向下引其氣便各灸二十壯向後隔七日灸七壯取瘥止余穴皆依此若病從陽發起兩小指外側向上循脛外從絕骨至風市頑痹不仁或腫起於此者須灸陽輔絕骨陽陵泉風市等諸穴灸數及上向下皆依前法若氣毒兼行表裡者乃可量其輕重隨灸膏摩之若上下遍發表裡各灸一二處以此通泄之其用藥內攻各量病投藥也逐偏若處常使灸瘡不瘥為佳風氣都除乃隨瘡瘥瘥後瘢色赤者風毒盡青黑者猶有毒氣仍灸勿止待身體輕利然後可休矣又一本云常須灸三里絕骨勿令瘡瘥佳炙腳氣穴名陽陵泉二穴在膝外側骨下宛宛陷中是也絕骨二穴在足外踝上骨絕頭陷中又云一尺是也風市二穴平立垂手當中指頭髀兩筋間是也黃帝三部針灸經無風市二穴此處恐是環銚風市疑其別名未詳所出崑崙二穴在足外踝後跟骨上陷中是也陽輔二穴在絕骨前半寸少下是也徐云明堂無絕骨名有陽輔二穴在膝蓋下外側三寸傍廉骨當小指兩筋間是也黃帝三部針灸經丙卷陽輔二穴在足外踝上四寸輔骨前絕骨端前三分與此不同上廉二穴在三里下三寸是也條口二穴在上廉下二寸是也下廉二穴在條口下一寸是也太衝二穴在足大指本節後二寸是或云一寸半犢鼻二穴在膝蓋上外角宛宛中是也一云膝下黃帝三部針灸經丙卷犢鼻二穴在膝臏下骭上俠解大筋中膝目二穴在膝蓋下兩邊宛宛中是也黃帝三部針灸經無膝目二穴曲泉二穴在膝內屈文頭是又云從三里上度一寸五分又橫向脛二寸當脈中是也黃帝三部針灸經丙捲曲泉二穴在膝內輔骨下大筋上小筋下陷者中屈膝而得之陰陵泉二穴在膝下內側輔骨下宛宛中是蘇徐同中都二穴在陰陵泉三陰交中間是蘇一名太陰穴黃帝三部針灸經中郄一名中都在內踝上七寸䯒骨中央三陰交二穴在內踝上三寸是蘇徐云名太陰也復溜二穴在內踝上二寸是蘇徐云名曰外命黃旁三部針灸經復溜無外命之別名少陽維二穴在內踝後一寸動筋中是徐同太陰二穴在內踝上八寸骨下陷中是徐同太陰蹺二穴在內踝下向宛宛中是黃帝三部針灸經並同人腧穴經並無少陽維太陰太陰蹻三穴名委中二穴在膝後屈中央是徐蘇同承筋二穴在腨當中陷中是徐蘇同承山二穴在足腨腸下分肉間陷中是徐蘇同湧泉二穴在腳心中是蘇徐同上件穴並要不可揔能灸其穴最要者有三里絕骨承筋大沖崑崙湧泉有患者可灸又謹按明堂制當以立為正取穴必須直立膝臏骨坐立便即移動不定故宜立取之其寸取病人中指上節為一寸若取尺寸有長短取穴必不著又按秦承祖華佗等取穴並云三指四指為準取三里穴四指指闊六分四六二十四只闊二寸四分取穴如何得著黃帝為本諸說並不可信徐同徐論患腳氣體皆春發夏甚秋輕冬歇大法春秋宜灸冬差可行夏都不可灸既瘡敗又不得覆風冷因入反更增疴冬時血凝又逆天理急不得已無藥物處可灸一二要穴不可遍身多灸腳氣病大論毒從下上亦有從上向下者或云灸上毒氣便上謬矣比見毒氣攻處疼痛如刺隨病即灸火徹便瘳不拘上下凡毒氣所沖如賊欲出得穴即出豈在大門也風毒所攻亦復如是此皆經試萬不失一必不為誤耳蘇同蘇恭云腳氣初發轉筋者灸承山承筋二穴噦逆者灸湧泉若從頭至連背痛寒熱如瘧及腰痛者灸委中頭項背痛隨身痛即灸不在正穴也又云若腳氣盛發時自腰以上並不得針灸當引風氣上則殺人氣歇以後有餘病者灸無妨唯冬月得灸春夏不可灸自風市以下固宜佳耳又云若氣上擊心不退急灸手心三七炷氣即便退若未退即悶兼煮豉酒熱飲逐之即瘥不去即取烏特牛尿一大升暖服以利為止縱至三服五服彌佳又若已灸腳而胸中氣猶不下滿悶者宜灸間使五十炷兩手掌橫文後一云三寸兩筋間是也又若胸中氣散而心下有脈洪大跳其數向下分入兩髀股內令人心急忪悸者宜以手按捻少腹下兩傍接髀大斜文中有脈跳動便當文上灸跳三七炷即定灸畢背須灸三里二十炷以引其氣下也又若心腹氣定而兩髀外連膝悶者宜灸膝眼七炷在膝頭骨下相接處在筋之外陷中是若後更發復灸三炷又凡人雖不患腳氣但苦髀膝疼悶灸此無不應手即愈極為要穴然不可針亦不可多灸唯只灸七炷以下又若腳十指痠疼悶漸入趺上者宜灸指頭正中甲肉際三疰即愈又若大指或小指傍側疼悶覺內有脈如流水上入髀腹者宜隨指傍處灸三炷即愈並出上卷中唐論若手指本節間疼稍入臂者宜灸指間疼處七炷即定又若心胸氣滿已炙身脛諸穴及服湯藥而氣猶不下煩急欲死者宜灸兩足心下當中陷處各七炷氣即下此穴尤為極要而不可數灸但極急乃灸七炷耳以前諸灸法並經用所試皆驗灸畢應時即愈故具錄記之凡灸不廢湯藥藥攻其內灸泄其外譬如開門驅賊賊則易出若閉戶逐之賊無出路當反害人耳灸用火善惡補寫法一首張仲景云四肢者身之支幹也其氣繫於五臟六腑其分度淺薄灸之不欲過多須依經數也過謂余病則宜依之若腳氣不得拘此例風毒灸之務欲多也依此經數則卒難愈疾小品論灸有八木火明堂論灸有補寫之法若能依之應有道理八木之火凡灸用松木火則難愈柏木火則瘡多汁橘木火則傷皮桑木火則肉枯棗木火則髓消竹木火則傷筋多壯則筋縱枳木火則陷脈漬榆木火則傷骨多壯則骨枯凡八木之火皆不可用也火用陽燧之火其次用䃈石之火天陰則用槐木之火陽燧是以火珠向日下以艾於下承之便得火也䃈石似玉堅以此石擊實鐵即火出仍以極爛榆木承之即得亦用艾取之此是匈奴取火法今胡人猶爾灸有補寫者甲乙經云用灸補者無吹其火須自滅也以灸寫者疾吹其火拊其艾須其火滅也此言以口炊艾炷令疾滅即是寫也不吹聽自滅者即補也小品又云黃帝曰灸不過三分是謂從穴此言作艾炷欲令根下闊三分也若滅此則不覆孔穴不中經脈火氣不行不能除病也若江南嶺南寒氣既少當二分為準燧小不得減一分半也嬰兒以意減之凡灸瘡得膿增壞其病乃出瘡不壞則病不除矣甲乙經云灸不發者灸故履底熨之三日即發也甚宜解此又近有蘇恭善醫此疾馳名於上京顯譽於下邑換腳氣方卷論方則信為指南敘灸亦未成膠柱乃云毒氣如賊出何必要在大門腹背手足皆須灸也愚謂灸痛風毒所攻腹則引賊入室如何令賊出門特宜知之不可輕脫若手指疾悶灸無妨也出第一卷中雜療腳氣方一十五首千金防風湯療肢體虛風微經內發熱肢節不隨恍惚狂言來去無時不自覺悟南方支法存所用多得力溫和不損人為勝於續命越婢風引等湯羅廣州一門南州人士常用亦療腳弱甚良方防風三兩麻黃三兩去節秦艽三兩獨活三兩當歸三兩遠志二兩去心木防己二兩甘草二兩炙人參二兩黃芩二兩升麻二兩芍藥二兩石膏一兩碎麝香二分生薑二兩半夏二兩洗上十六味切以水一斗三升煮取四升一服一升初服厚覆取微汗亦當三兩行下其間相去如人行十里久更服有熱加大黃二兩先有冷心痛疾者倍當歸加桂心三兩去大黃忌海藻菘菜羊肉餳一方有白朮出第七卷中千金翼青丸主腳氣皮肉身體諸風方烏頭一兩附子三兩炮麻黃四兩去節加枳實四兩炙上四味搗篩蜜和丸梧子酒服五丸日三忌豬肉冷水如生用烏頭附子服如麻子五丸出第十六卷中必效曰楊皮酒主腳氣偏廢及主一切風緩風手足拘攣並效方取白楊東南面皮去地三尺以上去蒼皮勿令見風細切熬令黃赤色即止納不津器中以酒浸隨皮多少每令酒浸皮二三寸乃以泥封冬月二七日春夏一七日開飲晝二夜一隨性多少有酒氣為度得脊口為佳病可者飲至一石若重者乃至兩石以瘥為度酒唯須不灰其白楊不得取丘塚者服每日一兩行鴨溏利蘇恭文仲備急同出第三卷中蘇恭療諸氣方杏仁一百二十枚大棗六十枚去皮核香豉三百粒熬令乾上三味先搗豉次搗杏仁次搗棗令極熟取如彈丸大含之細細嚥之忌如藥法此方雖少深有效驗又凡腳氣內須服藥攻擊外須膏摩火灸發泄等並是腳氣之要若有攣急及有不仁之處不問冬夏常用膏摩之冶葛膏療江南風毒先從手腳上腫痹及上頸痹及面卻入腹即殺人宜用此膏摩之方冶葛二兩蛇銜二兩犀角二兩屑烏頭二兩桔梗二兩茵芋二兩防風三兩蜀椒二兩乾薑二兩巴豆三十枚又方云二兩去心皮升麻二兩細辛二兩雄黃半兩鱉甲一兩炙上十四味細切以酒四升漬藥一宿以不中水豬膏五斤以煎藥於微火上三上三下令藥色變黃勿令焦黑膏成絞去滓乃下之攪令調和以摩病上忌豬肉冷水生菜莧菜蘆筍等一方有石南白芷為十六味千金無茵芋細辛有莽草丹參躑躅花又療風痹手足疼弱鼠漏惡瘡毒所有腹內絞痛百病摩之皆愈方莽草三分牡丹皮二兩蜀椒四分藜蘆三分芫花二兩大黃四分皂莢二分附子三兩上八味搗篩以苦酒三升漬一宿以不中水豬脂三斤微火上煎之三上三下令藥色黃膏成去滓以摩腫敷瘡有毒不可服及近孔要處合藥勿令婦人孝子雞犬見之其二膏療風毒最善然冶葛膏救急勝於曲魚膏久摩不已令人肉漸枯細曲魚膏雖稍緩常用為佳常以臘月合一劑用之極效忌豬肉冷水胡荽又冶葛膏有巴豆摩多損皮肉用莽草膏方莽草五兩附子八兩生用去皮丹參四兩漢防己三兩芎藭四兩椒三兩吳茱萸四兩白芷三兩沉香半兩零陵香半兩雞舌香半兩犀角二兩屑當歸三兩商陸根四兩青木香半兩上十五味切以酢漬一宿以好酥三大斤煎九上九下布絞去滓用摩頑痹並腫處好膏入肉亦無損傷服諸藥不相妨神效忌豬肉冷水又冶葛膏方冶葛二兩犀角二兩屑漢防己二兩莽草二兩烏頭五兩生用吳茱萸五兩椒三兩生用丹參三兩躑躅花一升升麻三兩乾薑二兩附子五兩白芷一升當歸三兩桔梗三兩上十五味切酢漬以成煎豬肪七升煎五上五下去滓用之以酥代肪善忌豬肉冷水舊方無白芷防己茱萸附子當歸有巴豆雄黃蛇銜防風鱉甲又神明膏方附子十四枚小者三十枚炮吳茱萸一升生用蜀椒一升半白芷一升前胡切一升芎藭切一升白朮切一升桂心三兩當歸三兩漢防己切一升風多去之腫者去細辛細辛二兩上十一味切酢淹漬一宿以成煎豬肪五升煎五上五下去滓摩腫及不仁大試有驗有牛酥代豬脂大佳忌豬肉冷水生蔥生菜桃李等又腳氣風毒發不與人期攻心即死若居僻遠無藥物處致斃為橫死其要藥常宜備隨身半夏洗青木香吳茱萸木瓜犀角屑大黃生薑橘皮常須備之檳榔茯苓昆布蓽茇紫蘇杏仁前胡細辛桂心旋覆花亦其次也並須備急救命若卒患無藥處隨病所在三五味濃煮服之後依方合藥服之又凡人入八月氣自漸定非意氣大發者作半夏獨活湯多唾或睡覺心忪心悶風熱故也竹葉湯食後服之為佳如不已作後湯服麥門冬三兩去心茯苓二兩石膏四兩碎小麥五合竹葉切一升生薑二兩上六味切以水五升煮取一升二合食後分再服相去七八里久忌酢物又尋常氣滿三日兩日服一劑湯方檳榔七枚碎橘皮一兩厚朴二兩炙生薑四兩吳茱萸二兩上五味切以水二升煮取一升二合分三服相去五六里久復服之此藥性溫去冷氣又蒼耳酒去皮節頭足諸熱風藥性冷不便熱方六月以後收取日乾至九月銼一大斛水三斛煮取四斗漬二大斗曲三度總以米一大斛漬三日如凡釀法將息酘之酒熟日二三服五合身諸風骨髓中風若瘥或發瘡瘡瘥後皮痛膚堅實光悅腰腳甚便若虛熱羸瘦弱人無問男女加生地黃五升牛膝根銼三升丹參二升天門冬二升松葉五升枸杞根五升杏仁一升去皮尖荊根若子二升水三石別煮牛膝丹參松葉等取六斗並蒼耳汁總一石漬五斗曲用米二石五斗分四度酘杏仁末著第一酘飯中下生地黃搗如泥著第二酘飯中下天門冬蒸熟剝去皮搗如泥著第三酘飯中下又大麻子一大斗搗碎著第四酘中下大去皮膚風補虛大良效多頭風者得甘菊花一升漬第五酘糟中下攪之調酒熟大小同服並得余無禁忌毒魚肉並勿食有藥處可辨無藥處可以蒼耳為本如或少三兩物亦得不必俱備年常釀至三月服極攘眾疾復延齡輕身將漬石斛等藥灑彌佳忌鯉魚蕪荑又單釀鼠黏根酒和蒼耳單酒法大去風疼癢止咳嗽消淡癖差疽瘻亦是良藥腳氣人作漬側子等酒彌佳一名牛蒡根草名䙴責根又患昏昏頭旋彌甚氣滿背痛取前蒼耳酒漬此後藥方獨活山茱萸天門冬去心黃耆甘菊花防風天雄炮側子炮防己白朮茯苓牛膝各四兩枸杞三兩丹參四兩生薑六兩磁石十兩貫眾三兩生地黃八兩切上十八味切以絹袋盛酒二大斗漬七日溫服一盞日二三服忌豬魚陳臭物余無禁主腰腳兼去酒風忌豬肉冷水桃李雀肉鯉魚蕪荑酢物並出第一卷中
