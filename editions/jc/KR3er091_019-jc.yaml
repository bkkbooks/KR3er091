body:
  text: 卷第十九腳氣腫滿方二十九首病源此繇風濕毒氣搏於腎經腎主水今為邪所搏則腎氣不能宣通水液水液不傳於小腸致水氣壅溢腑臟浸漬皮膚故腫滿也出第十三卷中千金翼溫腎湯主腰脊膝腳浮腫不隨方茯苓乾薑澤瀉各二兩桂心三兩上四味切以水六升煮取二升分為三服忌酢物生蔥又療腳氣初發從足起至膝脛腫骨疼者方烏牛尿一服一升日二服腫消止羸瘦者二分尿一分牛乳合煮乳結乃服之又方生豬肝一具細切以淡蒜齏食之令盡若不盡者分再食之並出第十六卷中崔氏療腳氣遍身腫方大豆二大升以水一斗煮取五升去豆桑根白皮一握切檳榔二七枚碎茯苓二兩切上四味將三物以前豆汁浸經宿煮取二升絞去滓添酒二合納藥中隨多少服之忌酢物救急同又療遍身腫小便澀者用麻豆方主之療腳腫氣烏豆一斗水四斗煮取一斗半去豆桑根白皮切五升大麻子二升熬研碎上三味以豆汁納藥煎取六升一服一升日二服三日令盡又方烏豆五升桑根白皮切四升二物以水二斗煮取一斗半去滓大麻子仁一升熬橘皮二兩升麻二兩杏仁二兩豬苓二兩丹參三兩生薑二兩切上九味切將七物納前桑皮豆汁中煮取四升朝二服相去如三食久藥消進食食消又更進二服此二方並唐尚書送又療腳氣及腰腎膀胱宿水及痰飲桃花散方收桃花陰乾量取一大升但隨虛滿不須按捺搗為散紗羅下之溫清酒和一服令盡通利為度空腹服之須臾當轉可六七行但宿食不消化等物總瀉盡若中間覺飢虛進少許軟飯及麋粥極安穩不似轉藥虛人廢朝謁但覺腰腳輕快使人踴躍食味倍佳腳先腫者一宿頓消如囊中貯物傾卻相似又無毒易將息唯忌胡蒜豬肉三月內腹虛大都消息慎生冷酸滑五辛酒面及黏食肥膩四五日外諸食復常又余見古方論云腳氣但腫不悶經服利藥法令人渴但腫縱不服利藥亦遣人渴宜利方取大麻子熬令香和水研取一大升別以三大升水煮一大升赤小豆取一升汁即納麻汁更煎三五沸渴即飲之冷熱任取安穩飢時啖豆亦佳而利小便止渴消腫大良榖葉及桑白皮熬炙為飲飲之亦良腫盛力弱不堪大藥者取牛乳一小升烏牛尿一小升無烏牛尿用黃者亦得和調分三服相去十里久小便大利腳腫即頓消若一劑不除隔一二日更服氣力好者依前服羸弱者每日平旦唯一服六七合以瘥乃止忌雜肉並出第六卷中文仲大麻子酒方療腳氣上腳腫小腹痹大麻子一升碎研清酒三升漬三宿溫服隨性兼療頭風補益此一方傳用大良備急同又療腳氣滿小便少者方檳榔四十枚切大豆三升桑根白皮切二升上三味以水二斗煮取六升分六服間粥亦得若冷脹加吳茱萸二升生薑二兩用亦良備急同又療腳氣非冷非熱老人弱人脹滿者方檳榔殼汁中或茶飲中豉汁中服檳榔仁散方寸匕利甚快穩良備急同又腳氣滿方大豆一升以水四升煮之令熟去滓取桑根白皮切一大升和豆汁重煎之厚薄如酪布絞去滓空腹日再備急同又徐王枳實散宜春秋服消腫利小便兼補療風虛冷脹不能食方枳實半斤炙桂心一斤茯苓白朮各五兩上四味為散酒服方寸匕日三服加至二匕忌生蔥酢物桃李雀肉等備急同又手腳痠痛兼微腫方烏麻五升微熬碎之上一味以酒一升漬一宿隨多少飲之盡更作大佳備急同又若身腫氣攻心者方生豬肉去脂以漿水洗於兩板中壓去汁細切作膾蒜齏啖之日二頓下氣除風此方外國法備急同又捋腳方搗烏麻碎水煮漬捋大驗又方水煮杉木浸捋腳去腫滿大驗備急同又腳洪腫方取小豆一升和榖楮心一握熟煮吃三二升即瘥如湯沃雪良此二方經用效備急同並出第九卷中救急療風水毒氣遍身腫方榖楮白皮三兩橘皮一兩桑根白皮五兩東引者紫蘇生薑各四兩大豆二小升上六味切以水九升煮取一大升絞去滓分為四服其藥並須暖不過三劑必當瘥百日來唯禁大酢出第七卷中必效主腳氣數發通身滿妨氣急者方取大麻子一升碎以小便二升煮取一升去滓頓服之蘇唐徐同出第三卷中蘇恭療下焦冷腫滿胸塞吐不下食者兼去溫毒方防己芍藥各二兩枳實炙獨活防風桂心各三兩生薑八兩葛根三兩半夏一升洗上九味切以水九升煮取三升分作四服相去八九里久中間食少粥一方無防己枳實加附子二兩炮余依本方忌羊肉餳生蔥出上卷中唐侍中療苦腳氣攻心此方甚散腫氣極驗大檳榔七枚合子碎生薑各二兩橘皮吳茱萸紫蘇木瓜各一兩上六味切以水三升煮取一升三合分再服忌如藥法又葶藶丸療水氣及腳並虛腫方葶藶子七分生用牽牛子澤漆葉海藻洗去咸炙昆布如上炙桑根白皮炙甘遂熬椒目郁李仁各三分去皮桂心一分上十味搗篩蜜和為丸如梧子一服十五丸日再服加至二十丸其藥用桑白皮切五合赤小豆一合通草一兩切水二升煮取一升下藥忌生蔥出下卷中蕭亮療腳氣腫盛因生瘡積年不瘥膿血長流依狀是風毒氣為冬間服藥酒擁滯散在腠理宜服此方療風癢及舊癬疥百病輕腰腳兼通大腸療肺中熱毒氣方漏蘆葳蕤烏蛇脯炙各二十四分枳實十二分炙秦艽九分苦參一斤搗去筋脈取粉漢防己八分玄參二十二分干麥門冬十二分去心白朮黃耆各十二分大黃二十四分黃芩八分上十三味搗篩蜜和丸如梧子一服四十丸日再漸加至五十丸無問食前食後服酒浸藥下之又方牛蒡根切二大升枳實八兩炙磁石一斤薏苡仁一升玄參六兩烏蛇脯六兩炙生地黃切二大升烏豆小粒者一大升上八味細切絹袋盛以好無灰酒一大斗浸經三日任性多少將以下前藥又洗方漏蘆一大升白蘞五兩甘草三兩炙蒺藜子槐白皮五加根皮各一大升上六味切以水二大斗煮取六升納芒硝半大升癢即洗其湯微溫如人體如瘡熱濕布𤄥上忌海藻菘菜又解風毒入腰腳暴悶痛飲子方生犀角屑蜀升麻黃芩干藍漢防己枳實炙各二兩漏蘆三兩炙白蘞一兩梔子仁十個甘草原缺分兩上十味切以水八升煮取二升三合絞去滓分溫三服不問食前後忌海藻菘菜酢此方忌酢恐更有茯苓又𤄥方取前方加大黃三兩梔子四十顆取軟白布剪作三二十筒孔納藥汁中浸濕敷瘡上干即換近效療腳氣兩腳腫滿暴破衝心眾醫不瘥方小便三升黍三斤上二味相和煮三五沸將浸腳日三四度極神效其藥於水盆中盛下著火暖之如池甕法周迴泥塞然後浸腳捋使汗出立效腳氣腫滿小便澀方三首蘇恭防己湯主通身體滿小便澀上氣上下痰水不能食食則脹者方桑白皮五兩大豆五升以水二斗並桑白皮煮取一斗去滓防己橘皮赤茯苓麻黃去節各三兩生薑五兩旋覆花一兩杏仁八十枚紫蘇莖葉二兩切上十味切以前件藥汁煮取三升去滓分為三服力弱者分為五服相去六七里久微覆當大汗小便利腫氣消下冷多加茱萸四兩熱多加玄參四兩忌酢物又腫滿小便少者湯方檳榔三十枚合子碎大豆三升桑根白皮二升生薑一斤合皮上四味切以水二斗煮取五升半去滓分為六七服各相去十里久再服小便當利腫即消瘦弱不能忍者時復以少粥止之又紫蘇湯方紫蘇莖一兩甘草炙橘皮各一兩半生薑三兩檳榔五枚上五味切以水五升煮取二升分三服相去十里久若能長服之永令氣消下忌海藻菘菜並出上卷中腳氣上氣方五首病源此由風濕毒氣初從腳上後轉入腹而乘於氣故上氣也出第十三卷中張文仲硇砂牛膝三物散療腳氣上氣方硇砂牛膝細辛各三兩上藥為散酒和服方寸匕日再經四五服即效此方敕賜慕容寶節將軍服者云神效蘇恭腳氣方云是婆羅門法備急必效同又腳氣上氣入腹腫方野椒根除上皮細銼一升上一味以酒二升投安瓶中泥頭煻火燒得一沸然後溫服一盞甚效唯忌冷肥物其餘不禁並出第九卷中蘇恭腳氣散主腳弱上氣痹滿不能食常服方牛膝硇砂細辛丹參白朮郁李仁各三兩去皮上六味搗篩為散酒服方寸匕日二服主脹腫下氣春秋冬三月時得服夏熱不可服春秋冬消腫利小便兼補療風虛冷脹不能食忌桃李雀肉生菜出上卷中唐療上氣檳榔湯方檳榔二七枚杏仁四七枚去皮尖搗上二味以小便一大升煮取半升分為二服相去五六里許此方甚下氣一日一服之佳如腹中欲須利檳榔並子捶碎如前煮取汁服之即快利也又風引湯療痹滿上氣遍身脹膝疼並去風濕痛方大豆三升附子三兩炮枳實炙澤瀉橘皮各四兩甘草炙茯苓防風各二兩上八味切以水二斗酒二升煮大豆取一斗去滓納藥煮取三升分三服三劑腫消去大豆澤瀉更服三劑瘥忌豬肉冷水海藻菘菜酢物並出上卷中腳氣心腹脹急方四首病源此由風濕毒氣從腳上入於內與藏氣相搏結聚不散故心腹脹急也出第十三卷中蘇恭諸腳氣定時候間滿腹脹不能食者四時俱得服下氣消脹方昆布八兩射干四兩茯苓乾薑各二兩羚羊角屑橘皮各三分杏仁五分去皮尖蓽茇吳茱萸大黃各六分大小便澀者著大黃無不須用上十味搗篩蜜和為丸如梧子大飲服十五丸利多服七丸以意消息不能食者加白朮六分曲末十分氣發服已前丸得定如不定作檳榔皮湯壓之忌酢物桃李雀肉等又方檳榔七枚碎生薑三兩切橘皮二兩杏仁三十枚上四味切以水四升煮取一升五合分二服相去七八里久或作半劑一服亦得氣脹發則服之瘥止又若覺冷氣攻喉方當含吳茱萸三五粒即氣散又腳氣夏盛秋歇毒氣既謝風緩猶在若諸病皆退但苦食腹脹不安為氣在咽喉吐不出咽不入心悶痰滿食已吐酢水者宜此昆布丸若先服諸藥及湯酒等兼服之不相違忤昆布丸方一云具茱萸丸吳茱萸蓽茇茯苓白朮曲葶藶熬昆布各四兩洗杏仁去皮尖熬枳實炙大黃乾薑各三兩旋覆花一兩半橘皮三兩半上十三味搗篩蜜和為丸如梧子飲服十丸一本云二十丸日二服利多減之不利加之常令微利覺病退則止發便服之不可常服令人瘦六七日半合之或三分減一分不爾酸敗一本有半夏六兩以湯洗熬之射干三兩又一本無旋覆花乾薑大黃杏仁橘皮忌羊肉餳桃李雀肉酢物並出上卷中腳氣寒熱湯酒方一十首千金甘草湯療腳弱舉身洪腫胃反食谷吐逆胸中氣結不安而寒熱下痢不止小便難服此湯即益亦服女曲散利小便腫消服大散摩膏有驗方甘草一兩炙人參一兩半夏一升洗桂心三兩小麥八合完用大棗二十枚擘生薑八兩吳茱萸二升蜀椒三兩出汗上九味切以水一斗三升煮麥取一斗去麥納諸藥煮取四升一服六合作六服忌海藻菘菜羊肉餳生蔥又若寒熱日再三發可服此常山甘草湯方常山三兩甘草一兩半上二味切以水四升煮取一升半分三服相去五里久進一服忌海藻菘菜生蔥生菜又白朮膏酒療腳弱風虛五勞七傷萬病皆主之方生白朮淨洗一石五斗仍須揀擇搗取汁三斗煎取半濕荊二十五束束別三尺圍各長二尺五寸徑頭二寸火燒取瀝三斗煎取半青竹三十束束別三尺圍各長二尺五十徑頭一寸燒取瀝三斗煎取半生地黃五大斤粗大者搗取汁三斗煎取半生五加根三十斤淨洗訖銼於大釜內以水四石煎之去滓清澄取汁七斗以銅器中盛大釜內水上煎之取汁三斗五升其煎諸藥法一準五加法右件白朮等五種藥總計並訖得汁九斗五升上糯米一石五斗上小麥曲八斤曝乾末之以藥汁六斗浸曲五日待曲起第一淨淘米七斗令得三十遍以上下米置淨席上以生布拭之然後炊之下饋以余藥汁澆饙調強弱更蒸之待饙上痂生然後下於席上調強弱冷熱如常釀法醞之蜜蓋頭三日後第二酘更淘米四升一如前法酘之三日後即加藥如下桂心六兩甘草六兩炙白芷六兩當歸六兩芎藭六兩麻黃六兩去節乾薑一斤五加皮一斤細辛六兩防風六兩附子五兩炮牛膝九兩上十二味㕮咀訖第三酘以米四斗淨淘如前法還以余汁澆饙重蒸待上痂生下置席上調冷熱如常釀法和上件藥酘之三日外後嘗甘苦得中訖密封頭二七日後押取清酒一服四合日再細細加以知為度溫酒不得過熱慎生冷酢滑豬鯉牛肉蔥菜等物又松葉酒療腳弱十二風痹不能行服更生散數劑及眾療不得力服此一劑便能遠行不過一兩劑方松葉六十斤上一味㕮咀以水四石煮取四斗九升以釀五斗米如常法別煮松葉汁以漬米並饙飯釀泥封頭七日發澄飲之取醉得此酒力者甚眾神妙並出第七卷中崔氏療腳弱獨活湯方獨活三兩生石斛三兩白朮一兩防風一兩半茯苓四兩白前一兩羚羊角二兩屑芎藭二兩桑根白皮二兩黃芩三兩附子一兩炮生薑三兩桂心一兩防己一兩上十四味切以水九升煮取二升五合去滓分三服相去十里久服隔四日一劑宜服兩劑佳慎生冷酢滑豬魚蒜桃李雀肉生蔥蘇恭同出第六卷中備急療腳氣屈弱若田舍貧家無藥者可釀菝葜及松節酒皆善方菝葜一斛淨洗銼之以水三斛煮取九斗以漬曲又以水二斛煮滓取一斛以漬飯釀之如酒法熟押取飲隨多少若用松節及葉亦准此法其汁不壓也患腳氣屈弱積年不能行腰脊攣痹及腹內堅結者服之不過三五劑皆平復如常神驗肘後文仲同又金牙酒最為療腳氣屈弱之要今載之方如下金牙細辛茵芋肘後作莽草乾薑乾地黃防風附子去皮地膚子蒴藋升麻各四兩人參二兩獨活一斤牛膝五兩石斛五兩上十四味切之以酒四斗漬之六七日服二三合稍加之亦療口不能語腳屈至良又側子酒亦驗肘後同千金無升麻人參石斛牛膝茵芋乾薑有蜀椒莽草止十味云冷加乾薑又陶效驗方云金牙酒療腳弱風冷痹曳又令人肥健勝舊百倍起三十年嚲曳不能行口不能語者昔趙寅陽嚲曳二十六年肉冷如鐵唯余骨爾服此三十日便起郄太山家代傳秘之云一方用茵芋四兩初服無數任性令足使有酒色便止不得食肥肉生菜其方無牛膝石斛二物余同文仲同並出第二卷中蘇恭獨活酒十月以後腰腳屈弱兼頭眩氣滿服此方獨活生薑石斛各六兩牛膝丹參萆薢側子炮茯苓各四兩防風薏苡仁山茱萸桂心白朮天雄炮芎藭秦艽當歸人參各二兩甘菊花二兩生地黃八兩上二十味切絹袋貯以酒二斗五升漬四日溫服三四合日二服頭風患冷者加椒二兩汗出第一卷中腳氣痹弱方七首病源此由血氣虛弱受風寒濕毒氣與血並行於膚腠邪氣盛正氣少故血氣澀澀則痹虛則弱故令痹弱也出第十三卷中肘後療腳氣之病先起嶺南稍來江東得之無漸或微覺疼痹或兩脛小滿或行起忽屈弱或少腹不仁或時冷時熱皆其候也不即療轉上入腹便發氣上則殺人療之多用湯酒摩膏藥種數既多不但五三劑今止取單行效用方急先取好豆豉一斗三蒸三曝乾以好酒三斗漬三宿便可飲隨人多少欲盡預作若不及待漬便以酒煮豉飲之以滓敷腳其勢得小退乃更營諸酒及膏湯炙之文仲備急同又獨活酒方獨活五兩切附子五兩生用去皮破上二味以酒一斗漬三宿服從一合始以微痹為度忌豬肉冷水文仲備急同又方好硫黃二兩末之牛乳五升上二味以水五升先煮乳水至五升乃納硫黃煎取三升一服三合亦可直以乳煎硫黃不用水也卒無牛乳羊乳亦善千金翼云一服一合不知至三合又方先煎牛乳三升令減半以五合服硫黃末一兩服畢厚覆取汗勿令得風中間更一服至暮又一服若已得汗不更服但好消息將護之若未瘥愈後數日中亦可更作若長將亦可煎為丸北人服此療腳多效但須極好硫黃取預備之並出第一卷中千金松脂散主一切風及大風腳弱風痹方薰陸法亦同取松脂三十斤以棕皮袋盛系頭鐵鐺底布竹木置袋於上石押之下水於鐺中令滿煮之膏浮出得盡以後量更二十沸接取置於冷水中易袋洗鐺更煮如此九遍藥成搗篩為散以粗羅下之用酒服一方寸匕日二初和藥以冷酒藥入腹後飲熱酒行藥以知為度如覺熱即減不減令人大小便秘澀宜食蔥羹仍自不通宜服生地黃汁微取泄利也除忌大麻子以外無所禁若欲斷米加茯苓與松脂等分蜜和為丸但食淡面餺飥日兩度一食一小碗勿多食也作餺飥法硬和麵熟挼煮五十沸漉出冷水淘更置湯中煮十餘沸然後漉出食之服松脂三十日後自覺有驗兩腳如似水流下是效如恐秘澀和一斤松脂茯苓與棗粟許大蘇即不澀服經一百日後腳氣當愈仙經曰服松脂一年增壽一年服之二年增壽二年服之乃至十年增壽十年出第七卷中蘇恭煮散療腳氣經春夏及秋腳弱或腫氣時上衝心身體痹悶者方獨活茯苓牛膝漢防己白朮黃耆麻黃去節柴胡各六兩當歸防風橘皮桂心人參各四兩附子三兩生用磁石十六兩碎如豆羚羊角三兩屑生薑杏仁半夏洗吳茱萸檳榔碎丹參八兩上二十二味不著分兩自隨時加減餘二十物切如豆分作三十貼貼著生薑一兩合皮碎切杏仁十四枚去皮尖碎以水二升煮取七合去滓頓服之日一服或二日一服冷多加吳茱萸半兩熱多加麥門冬半兩大熱以竹瀝一升代水嘔逆食不下加半夏一兩毒悶加青木香二分以意消息之患人大便難加大黃半兩服滿食不消加檳榔三二枚所加藥病瘥即止不常服忌豬肉冷水羊肉餳生蔥桃李雀肉酢物出第一卷中又療諸腳氣弱未至大發尋常煮散方獨活漢防己麻黃去節茯苓丹參牛膝各六兩磁石十六兩碎黃耆防風人參犀角各六兩升麻青木香桂心各四兩石膏十四兩碎吳茱萸八兩生薑半夏洗檳榔大者杏仁大黃切上二十一味將十六物搗切如豆分作三十分分和為一服服以檳榔三枚生薑一兩各合皮切杏仁十四枚去皮尖以水二升三合煮取七合去滓日晚或夜中服之日一服若氣盛時日二服可一服或二日一服或三日一服若心下滿嘔逆者加半夏一兩嘔定止若大便澀者可去磁石加大黃一兩大便利即停忌生蔥醋物羊肉餳腳氣痹攣方二首病源腳氣之病有挾風毒者則風毒搏於筋筋為攣風濕乘於血則痹故令痹攣也出第十三卷中千金石斛酒療風虛氣滿腳疼冷痹攣弱不能行方石斛五兩丹參五兩防風二兩側子四兩桂心三兩乾薑三兩羌活三兩秦艽四兩芎藭三兩杜仲四兩薏苡仁一升碎五加根皮五兩山茱萸四兩橘皮三兩椒三兩黃耆三兩白前三兩茵芋三兩當歸三兩牛膝四兩鍾乳八兩上二十一味切將鍾乳搗碎別絹袋盛繫於大藥袋內以清酒四斗漬三日初服三合日再稍稍加之以知為度忌豬肉冷水生蔥出第七卷中千金翼防己湯主風濕四肢疼痹攣急浮腫方木防己三兩茯苓四兩芎藭三兩芍藥二兩桂心三兩甘草六分炙大棗十二枚擘麻黃三兩去節桑根白皮切二升上九味以水一斗二升煮麻黃減一升納藥煮取三升分三服服漸汗出令遍身以粉粉之慎風冷出第十六卷中風偏枯方二首此風偏枯以下五門併兼療腳氣風毒等病相類病源風偏枯者由血氣偏虛則腠理開受於風濕風濕客於半身在分腠之間使血氣凝澀不能潤養久不瘥生氣去邪獨留則成偏枯其狀半身不隨肌肉偏枯小而痛言不變智不亂是也邪初在分腠之間宜溫臥取汗益其不足損其有餘乃可復也診其胃脈沉大心脈小牢急皆為偏枯男子則廢左女子則廢右若不喑舌轉者可療三十日起其年未滿二十者三歲死又左手尺中神門以後脈足太陽經也虛者則病惡風偏枯此由愁思所致憂思所為其湯熨針石別有正方補養宣導今附於後養生方導引法云正倚壁不息行氣從頭至足止愈疽疝大風偏枯諸風痹又云仰兩足指五息止引腰背痹偏枯令人耳聞聲常行眼耳諸根無有障礙又云正倚壁不息行氣從口趣令氣至頭始止療疽痹大風偏枯又云一足踏地足不動一足向側相轉身欹勢並手盡急回左右迭二七去脊風冷偏枯不通潤出第一卷中深師大八風湯療毒風濕痹嚲曳或手腳不隨身體偏枯或毒弱不任或風經五臟恍恍惚惚或多語喜忘有時恐怖或肢節痠疼頭眩煩悶或腰脊強直不得俯仰又加腹滿食少時氣咳或始遇病時猝倒悶絕即不能語便失音半身或舉體不隨不仁沉重皆由體虛恃少不避風冷所致二十三種大八風湯方當歸二兩半升麻一兩半烏頭二兩炮黃芩二兩芍藥二兩遠志二兩去心獨活二兩五味子一兩半防風二兩芎藭二兩麻黃二兩去節乾薑二兩半秦艽二兩桂心二兩大豆二升石斛二兩甘草二兩牛炙杏仁四十枚人參二兩茯苓二兩黃耆二兩紫菀二兩石膏二兩碎上藥㕮咀以水一斗三升酒二升合煮取四升強人分四服羸人分五六服千金翼同出第九卷中古今錄驗療三十年風躃偏枯不能行香豉散方生地黃三十斤香豉三升綿裹上二味洗地黃㕮咀先蒸半日曝燥更合豉蒸半日曝令燥搗下篩以酒服三方寸匕日三亦可水服益精爽氣服數月有神效出第十四卷中風四肢拘攣不得屈伸方五首病源此由體虛腠理開風邪在於筋故也春遇痹為筋痹則筋屈邪客關機則使筋攣邪客於足太陽之絡令人肩背拘急也足厥陰肝之經也肝通主諸筋主在春其經絡虛春過風邪則傷於筋使四肢拘攣不得屈伸診其脈急細如弦者筋急足攣也若筋屈不已又遇於邪則移變入肝其狀夜臥則驚小便數也其湯熨針石別有正方補養宣導今附於後養生方導引法云手前後遞互交拓極勢三七手掌向下低頭面心氣向下至湧泉倉門卻努一時取勢散氣放縱身體平頭動膊前後欹側柔轉二七去膊並冷血筋急漸漸如消又云兩手抱左膝生腰鼻內氣七息展右足除難屈伸拜起脛中痛萎又云以兩手抱左膝著膺除下重難屈伸又云踞坐伸右腳兩手抱左膝頭生腰以鼻內氣自極七息展右足著外除難屈伸拜起脛中疼痹又云立身上下正直一手上拓抑手如似推物勢一手向下如捺物極勢上下來去換易四七去膊內風兩膊並內冷血兩腋筋脈攣急又云踞伸左腳兩手抱右膝生腰以鼻內氣自極七息展左足者外除難屈伸拜起脛中疼痹出第一卷中千金療口風手足拘攣百節疼痛煩熱心亂惡寒經日不欲飲食張仲景三黃湯方麻黃五分去節獨活四分細辛二分黃耆二分黃芩三分上五味切以水五升煮取二升分二服一服小汗兩服大汗心中熱加大黃二分腹滿加枳實一分炙氣逆加人參三分悸加牡蠣三分熬渴加栝蔞根三分先有寒加八角附子一枚炮此方神秘不傳張文仲備急深師及翼古今錄驗同又麻子湯療大風周身四肢攣急風行在皮膚身勞強服之不虛人又主精神矇昧方秋麻子三升淨擇水漬一宿防風二兩麻黃二兩去節生薑二兩橘皮桂心二兩竹葉一握洗石膏二兩碎細辛二兩蔥白一握香豉一合上十一味切先以水二斗半煮麻子令極熟漉卻滓取九升別煮麻黃數沸掠去沫納諸藥汁中煮取三升去滓空腹分三服服訖當微汗汗出以粉塗身然極重風者不過三劑乃至五劑以來無不瘥輕者不過兩劑瘥有人患大風賊風刺風加獨活三兩比小續命湯准當六七劑忌生蔥生菜一方無細辛又白蘞薏苡湯療風拘攣不可屈伸方白蘞一升薏苡仁一升芍藥一升酸棗仁一升乾薑一升附子三枚炮破甘草炙一升桂心一升牛膝一升上九味淳酒二斗漬一宿微火煎三沸服一升日三扶杖起行不耐酒服五合忌生蔥豬肉海藻古今錄驗同