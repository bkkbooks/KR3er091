body:
  text: 卷第二十九從高墮下方三首千金療丈夫從高墮下傷五臟微者唾血甚者吐血及金瘡傷絕崩中皆主之方阿膠炙乾薑各二兩艾葉芍藥各三兩上四味切以水八升煮取三升去滓入膠令消分二服羸人三服女人產後崩中傷下血過多虛喘腹中絞痛下血不止服之悉愈又療從高墮下瀉血及女人崩中方當歸二分大黃一分上二味搗為散酒服方寸匕日三範汪同並出第二十六卷中千金翼膠艾湯主男子傷絕或從高墮下傷五臟微者唾血甚者吐血及金瘡經內絕者方阿膠炙艾葉芍藥乾地黃各三兩乾薑當歸甘草炙芎藭各二兩上八味切以水八升煮取三升去滓納膠令烊分再服羸人三服此湯正主婦人產後崩中傷下血多虛喘欲死腹痛血不止者服之良出第十九卷中從高墮下瘀血及折傷內損方一十八首廣濟療從高墮下內損瘀血消血散方蒲黃十分當歸乾薑桂心各八分大黃十二分虻蟲四分去足翅熬上六味搗為散空腹以酒服方寸匕日再漸漸加至一匕半忌生蔥豬犬肉出第四卷中肘後療猝從高墮下瘀血脹心面青短氣欲死方取胡粉一錢匕以水服之備急文仲同又方煮大豆或小豆令熟飲汁數升和酒服之彌佳千金備急文仲同一云大豆二升煮令熟取汁二升去豆以醇酒六七升和飲之一日飲盡小豆亦佳又方生乾地黃二兩熬末以酒服之又方生地黃搗取汁服一升或二升尤佳又方烏鴉翅羽二七枚燒末酒和服之即當吐血也如得左羽尤佳又療從高墮下若為重物所頓笮得瘀血方豆豉三升沸湯二升漬之食頃絞去滓納蒲黃三合攪調頓服之不過三四服神良刪繁小品文仲備急集驗千金同又方烏梅五升去核以飴糖五升煮稍稍食之自消文仲備急千金同又方取茅連根葉搗絞取汁一二升服之不過三四服愈冬用根又方刮琥珀屑酒服方寸匕取蒲黃二三匕日四五服良又方末鹿角酒服三方寸匕日三千金同又方取敗蒲薦燒灰以酒服方寸匕並出第三卷中深師療從高墮下傷內血在腹聚不出療下血方取好大黃二兩桃仁三十枚上二味搗以水五升煮取三升分為三服去血後作地黃酒服隨能服多少益血過百日成微堅者不可復下之虛極殺人也又療墮落瘀血桃枝湯方桃枝一握中指長銼芒硝五分大黃四兩當歸甘草炙桂心各二兩虻蟲二十枚去翅足熬水蛭二十枚熬桃仁五十枚去尖皮熬上九味㕮咀以水八升煮取三升去滓溫分三服內消又療墮落積瘀血消血理中膏方大黃二兩豬脂二斤桂心一兩乾薑一兩當歸二兩通草亂髮各一兩上七味切以膏煎發令消盡搗藥下篩須令絕細下膏置地納諸藥攪勻微火煎之三上三下即藥成去滓以好酒服一兩日二服一方不去滓並出第二十六卷中千金療從高墮下及被木石所迮或因落馬凡是傷損血瘀凝積氣急欲絕無不療方淨土五升蒸之令極熱分半以故布數重裹之熨病上勿令大熱恐破肉候冷即易之以痛止即已但有損傷並以此法療之神效已死不能言者亦活三十年亦瘥又療從高墮下損有瘀血方蒲黃八兩附子一兩炮去皮末上二味為散以酒服五六錢匕日三不知增之並出第二十六卷中近效土質汗療折傷內損有瘀血每天陰則疼痛兼療產婦產後諸疾神效方開寶本草云質汗主金瘡傷折瘀血內損補筋消惡血下血婦人產後諸血並酒消服之亦敷病處出西蕃如凝血蕃人煎甘草松淚檉乳地黃並熱血成之今以益母成煎故謂之土質汗也三月採益母草一重擔一名夏枯草上一味揀擇去諸雜草及干葉以新水淨洗於箔上攤曬令水盡則用手捩斷可長五寸勿用刀切即置鑊中量水兩石令水高草三二寸則縱火煎候益母草糜爛水三分減二漉去草取五六斗汁瀉入盆中澄之半日以綿濾取清汁盆中滓澱並盡棄之其清汁於小釜中慢火煎取一斗如稀餳每取梨許大暖酒和服之日再服和羹粥吃並得如遠行不能將稀煎去即更煉令稠硬停作小丸服之七日內則疼痛漸瘳二七日平復或有產婦惡露不盡及血暈一兩服即瘥其藥兼療風益心力無所忌鄭長史處吏部李郎中服之得力墜損方三首廣濟療墜損骨肉苦疼痛不可忍方故馬氈兩段其氈欲得故膩者於鐺中以酒五六升著一抄鹽煮令熱即納氈於鐺中看氈熱便用裹所損處冷即易之勿令久熱傷肉如是三五遍痛定即止仍服止痛藥散即漸瘥又療男子虛勞墜傷內損吐血不止欲死面目黑如漆者悉主之方黃耆芎藭當歸芍藥各三兩甘草三兩炙生薑八兩上六味切以水九升煮取二升五合去滓分溫三服服別相去六七里並出第四卷中近效療墜損方生地黃一斤分為三份上每服取一份熬令焦黃以酒半升煎一兩沸絞去滓令溫暖得所食前日三無所忌馬墜亦療之墜落車馬方六首肘後療忽落馬墮車及墜屋坑崖腕傷身體頭面四肢內外切痛煩躁叫喚不得臥方急覓鼠矢無問多少燒搗末以豬膏和塗封痛處急裹之仍取好大黃如雞子大以亂髮裹上如鴨子大以人所裁白越布衫領巾間余布以裹發外乃令火燒煙斷搗末屑薄以酒服日再三無越布余布可強用常當預備此物為要備急集驗古今錄驗同出第三卷中千金療凡人墜落車馬心腹積血唾吐血無數方干藕根末酒服方寸匕日三如無取新者搗取汁服之尤妙又療墮馬及樹崩瘀血腹滿短氣方大豆五升水一斗煮得二升半去豆頓服劇者不過三服並出第二十六卷中千金翼療落馬墮車及諸傷腕折臂腳疼痛不止方黃耆芍藥各三兩乾地黃當歸附子炮通草續斷桂心乾薑各二兩蜀椒一合汗烏頭半兩炮上十一味搗為散先食酒服五分匕日三忌如常法本方有大黃一兩又云服方寸匕出第十九卷中救急療墜馬落車被打傷腕折臂呼喚痛聲不絕服此散呼吸之間不復大痛三日筋骨相連當歸散方當歸熬令香桂心甘草炙蜀椒汗各二分芎藭六分熬附子炮澤蘭熬各一分上七味搗為散酒服方寸匕日三小兒被奔車馬所損裂其膝皮肉決見骨即絕死小蘇啼不可聽聞服之便眠十數日便行走其神驗如此忌同前方千金翼深師同出第六卷中近效療墮馬內損方取廅藥一小兩搗為末牛乳一盞煎五六沸和服李諫議云廅藥以羊肉汁和服一日內不用吃菜極效出第一卷中折骨方三首肘後療凡脫折折骨諸瘡腫者慎不可當風臥濕及多自扇若中風則發痓口噤殺人若已中此覺頸項強身中急束者急服此方竹瀝飲三二升若口已噤者可以物拗開納之令下禁冷飲食及飲酒竹瀝猝燒難得多可合束十許枚並燒中央兩頭承其汁投之可活小品備急文仲古今錄驗同出第三卷中千金療腕折骨痛不可忍方取大麻根葉無問多少搗取汁飲一小升無生青者以乾者煮取汁服亦主墮墜打捶瘀血心腹脹滿短氣良出第二十六卷中救急療骨折接令如故不限人畜也方取鈷䥈銅錯取末仍搗以絹篩和少酒服之亦可食物和服之不過兩方寸匕以來任意斟酌之出第九卷中傷筋方三首千金療被傷筋絕方取蟹頭中腦及足中髓熬之納瘡中筋即續生又方搗葛根汁飲之葛白屑熬令黃敷瘡止血並出第二十六卷中救急續斷筋方取旋覆草根淨洗去土搗量瘡大小取多少敷之日一易之以瘥為度必效同出第九卷中筋骨俱傷方七首肘後療腕折四肢骨破碎及筋傷蹉趺方爛搗生地黃熬之以裹折傷處以竹片夾裹之令遍病上急縛勿令轉動一日可十易三日即瘥千金刪繁備急文仲古今錄驗同又方取生栝蔞根搗之以塗損上以重布裹之熱除痛止備急同又方搗大豆末合豬膏和塗之干即易之並出第三卷中深師療折腕傷筋骨槐子膏方槐子中仁秦艽白朮續斷各一兩桂心六分巴豆十枚去皮心熬大附子一枚炮上七味㕮咀以醇苦酒漬槐子等一宿以成煉豬脂二斤於微火上煎三上三下候膏成絞去滓溫酒服棗子許一枚日三並塗敷忌生蔥豬肉冷水蘆筍桃李雀肉等出第二十卷中千金療四肢骨碎及傷筋蹉跌方生地黃多少熟搗熬以裹傷骨處頻易古今錄驗同又方豉三升以水七升漬之絞去滓取汁飲止煩悶古今錄驗同又方乾地黃當歸獨活苦參各二兩上四味搗末以酒服方寸匕日三服並出第二十六卷中折腕方一首深師卓氏膏大附子四枚生用去皮上一味切苦酒漬三宿以脂膏一斤煎之三上三下膏成敷之亦療卒中風口噤頸項強出第二十六卷中折腕瘀血方四首千金療折腕瘀血方虻蟲去足翅熬牡丹等分上二味為散以酒服方寸匕血化成水又方大黃六兩桂心二兩桃仁六十枚去皮上三味切以酒六升煮取三升分三服當下血瘥並出第二十六卷中千金翼療折腕瘀血方菴䕡草汁飲之亦可作散服出第十九卷中古今錄驗療折腕瘀血方蒲黃一升當歸二兩上二味搗散酒服方寸匕日三先食服之千金同出第三十四卷中蹉跌方三首深師療蹉跌補絕復傷地黃散方乾地黃十分桂心乾薑芎藭甘草炙當歸各二分芍藥五分上七味搗為散先食以酒服方寸匕日三服又方大豆熬令黑大黃各二兩桂心一兩上三味搗為散分為三劑酒和服忌生蔥又大黃一兩生地黃三兩切熬以水酒二升煮取一升頓服之瘥出第二十六卷中範汪蹉跌膏兼療金瘡方當歸續斷附子去皮細辛甘草炙通草芎藭白芷牛膝各二兩蜀椒二合上十味㕮咀以豬膏二斤煎以白芷色黃膏成絞去滓日再以摩損處出第十卷中被打有瘀血方一十三首肘後療若為人所打舉身盡有瘀血方刮青竹皮二升亂髮如雞子大四枚燒灰延胡索二兩上三味搗散以一合酒一升煎三沸頓服日三四備急範汪同又療被打擊有瘀血在腹內久不消時時發動方大黃二兩乾地黃四兩上二味搗散為丸以酒服三十丸日再為散服亦妙備急文仲小品範汪等同並出第三卷中範汪療被打有瘀血方大黃二兩桃仁去皮尖熬虻蟲各二十一枚去足翅熬上三味搗蜜丸四丸即納酒一升煎取七合服之備急肘後同又方姜葉切一升當歸三兩上二味為末以酒服方寸匕日三並出第十卷中備急若久血不除變成膿者宜此方大黃三兩桃仁三十枚去皮尖上二味切以水五升煮取三升分三服當下膿血不盡更作文仲肘後同又若久宿血在諸骨節及脅肋外不去者方牡丹虻蟲去足熬等分上二味搗末以酒服方寸匕血化成水小品文仲千金並翼古今錄驗同又方大黃如雞子一枚蚯蚓矢一合上二味酒半升煮取三沸服之又方鐵一斤酒三升煮取一升服之又燒令赤投酒服之小品文仲肘後同出第八卷中千金療被打傷破腹中有瘀血方蒲黃一升當歸桂心各二兩上三味搗散以酒服方寸匕日三夜一不能酒飲服之劉涓子方又方搗莨菪子末以敷瘡上又凡有瘀血者其人喜忘不欲聞人聲胸中氣塞短氣方甘草一兩炙茯苓二兩杏仁五合上三味切以水一斗煮取三升分為三服範汪同又被毆擊損傷聚血腹滿方豉一升以水二升煮三沸去滓再服不瘥重服之範汪同並出第二十六卷中張文仲劉涓子療被打腹中瘀血白馬蹄散方白馬蹄燒令煙斷搗末以酒服方寸匕日三夜一亦療婦人瘀血消化為水肘後備急千金同被打損青腫方七首千金療被打頭眼青腫方用新熱羊肉敷之又方大豆黃末和敷之又方牆上朽骨唾於石上研摩塗之干即易又方釜月下土細末塗之又方羊皮上臥之又方炙肥豬肉令熱拓上又炙豬肝貼之亦佳出第二十六卷中文仲療被打青腫方以水磨桂塗之赤則以牆中朽骨磨塗之則平復也梁都督侍中傳效也出第八卷中許仁則療吐血及墮損方三首許仁則論曰此病有兩種一者緣墮打損內傷而致此病一者緣積熱兼勞而有此病若內傷自須依前墮墜內損大便血等諸方救之若積熱累勞吐血狀更無餘候但覺心中悁悁似欲取吐背上煩熱便致此病宜依後雞蘇七味湯桑白皮八味散療之方雞蘇五兩生地黃切青竹茹各一升生薑桑白皮各六兩小薊根切六合生葛根切六合上藥切以水九升煮取三升去滓分溫三服服別相去如人行十里久若一劑得力欲重合服至四五劑尤佳隔三四日服一劑如未定則宜合後桑白皮八味散服之桑白皮散方桑根白皮六兩生薑屑六兩柏葉雞蘇各四兩小薊根五兩乾地黃七兩青竹茹一升新者地菘三兩上藥搗散煮桑白皮飲和一方寸匕日再服漸漸加至二三匕以竹瀝下亦得又此病有兩種一者外損一者內傷外損因墜打壓損或手足肢節肱頭項傷折骨節痛不可忍覺內損者須依前內損法服湯藥如不內損只傷肢節宜依後生地黃一味敷之法及芥子蘇等摩之方生地黃無問多少淨洗搗碎令爛熬之候水氣盡及熱以敷折處冷即易之如骨蹉跌即依療折傷法縹縛兼敷羊腦生龜生鼠等法為有所損此不復載如傷損處輕搗芥子和蘇以摩傷處若被打墜壓傷損急猝雖不至昏悶腹內無覺觸然身之中相去非遠外雖無狀內宜通利或慮損傷氣不散外雖備用諸方腹內亦須資藥但不勞大湯如前內損欲死者服湯取利欲用時間小小諸物服之理應無嫌其法略出如後小便酒煮生地黃每始王木綟木梓葉廅藥梒藥豬脂及石蜜白石地菘延胡索赤泥藥以上十一物並出下卷吳升同金瘡禁忌序一首肘後凡金瘡去血其人若渴當忍之常用干食並肥脂之物以止渴慎勿鹹食若多飲粥輩則血溢出殺人不可救也又忌嗔怒大言笑思想陰陽行動作勞勿多食酸鹹飲酒熱羹臛輩皆使瘡痛腫發甚者即死瘡瘥後猶爾出百日半年乃稍復常耳凡金瘡傷天窗眉角腦戶臂里跳脈髀內陰股兩乳上下心鳩尾小腸及五臟六腑輸此皆是死處不可療也又破腦出血而不能言語戴眼直視咽中沸聲口急唾出兩手妄舉亦皆死候不可療若腦出而無諸候者可療又療猝無汗者中風也瘡邊自出黃汁者中水也並欲作痓候可急療之又痛不在瘡處者傷經也亦死之兆又血出不可止前赤後黑或白肌肉腐臭寒冷堅急者其瘡難愈亦死也並出第三卷中金瘡預備膏散方三首肘後療金瘡膏散三種宜預備合以防急疾之要續斷膏方蜀續斷蛇銜防風各三兩上三味切以豬脂三斤於東向露灶煎之三下三上膏成去滓若深大瘡者但敷四邊未可使合若淺小瘡者但通敷便相連令止血住痛亦可以酒服如杏子大又冶葛蛇銜膏方蛇銜薔薇根續斷冶葛各二兩當歸附子各一兩半去皮防風黃芩澤蘭各一兩松脂柏脂各三兩上十一味㕮咀以豬脂二斤煎之別以白芷一枚納中候色黃即膏成去滓濾以密器收貯之以塗瘡無問大小皆瘥不生膿汁也出第卷中深師預備金瘡散方乾薑甘草炙桂心各一兩當歸三兩芎藭四兩蜀椒三兩汗上六味搗散以酒服方寸匕日三肘後同出第二十九卷中金瘡方一十一首肘後療金瘡方割氈方一寸燒灰研以敷之瘥又方杏仁去皮尖搗如泥石灰分等以豬脂和之淹足合煎令杏仁黃絞去滓以塗瘡上日五六遍愈又方燒故青布作灰敷瘡上裹縛之數日瘥可解去又方以蛇銜草搗敷之瘥又方狼牙草莖葉熟搗敷貼之兼止血一方燼草挼敷之又方五月五日掘葛根曝乾搗末敷瘡上止血止痛又方釣樟根出江南刮取屑敷瘡上有神驗又方紫檀末以敷金瘡止痛止血生肌又方燒牡蠣末敷之佳凡裹縛瘡用故布帛不寬不急如系衣帶即好並出第七卷中近效金瘡或壓損斷裂方剝取新桑皮作線縫之又以新桑皮裹之以桑白汁塗之極驗小瘡但以桑皮裹即瘥又金瘡灸瘡火燒瘡等方蠟如胡桃仁杏子一抄爛搗檳榔仁一枚薰陸香半合上四味和搗以豬脂煎即以此藥塗帛上貼瘡此方甚效金瘡續筋骨方三首千金療金瘡粉散闢風水續筋骨止血方石灰地菘苗細辛旋覆根葛葉豬膏青蒿麥門冬苗益母苗不限多少切上九味搗取汁和石灰作餅子曝乾末如粉以敷傷瘡上止血止痛生肌五月五日合之神效出第二十六卷中必效療被斫筋斷者續筋方旋覆根搗汁瀝瘡中仍用滓封瘡上即封裹之十五日即斷筋便續矣更不須開易此方出蘇景仲家獠奴用效出第四卷中古今錄驗療金瘡中筋骨續斷散方續斷五兩乾地黃蛇銜地榆杜蘅各四兩乾薑蜀椒汗細辛桂心各一兩當歸芎藭蓯蓉芍藥各三兩人參甘草炙附子炮去皮各二兩上十六味搗為散以酒飲和服方寸匕日三服忌海藻菘菜生菜生蔥豬肉冷水一方無杜蘅有牡蠣出第三十四卷中金瘡止痛方五首範汪療金瘡內塞止痛地榆散方地榆根白蘞各二分附子一分炮當歸四分芎藭白芷芍藥各三分上七味搗散以酒飲服方寸匕日三服忌同前方又金瘡內塞逐痛方黃芩當歸各三兩甘草炙二兩細辛烏頭炮各二兩乾薑一兩白芷四兩上七味搗篩以酒飲服一錢匕日三可至二錢匕忌同前方又金瘡止痛方馬蹄燒灰三指撮以酒和服之並出第十九卷中千金凡金瘡若刺瘡痛不可忍者方蔥白一把水三升煮數沸漬洗瘡上痛即止亦治因水入疼痛翼深師同出第二十六卷中古今錄驗療金瘡止痛牡蠣散方牡蠣二分熬石膏一分上二味下篩以粉瘡痛即止出第三十四卷中金瘡生肌方四首廣濟療金瘡生肌破血補勞消瘡輕身紫葛湯方紫葛三握細銼之以順流河水三大升煎取一升二合去滓空腹分三服若冷以酒一大升水二升和煮取一大升無忌出第六卷中範汪療金瘡內塞止痛生肌肉散方當歸甘草炙肉蓯蓉芎藭芍藥蜀椒汗吳茱萸乾薑桂心白芨黃耆厚朴人參上十三味等分搗為散以酒飲服一方寸匕日三服忌如前方又療金瘡生肌白膏方白芷一兩六銖乾地黃一兩半芎藭一兩六銖甘草半兩炙當歸白蘞附子各十八銖去皮蜀椒二合半汗上八味㕮咀以豬脂五斤合煎三上三下藥成去滓塗瘡上日再忌同前方並出第九十五卷中古今錄驗療金瘡生肌散方甘草一斤炙黃柏八兩當歸四兩上三味搗末以封瘡上日再出第三十四卷中金瘡去血多虛竭內補方二首千金療金瘡去血多虛竭內補方當歸三兩芍藥細辛各五分乾薑三分甘草二分炙上五味為散以酒服方寸匕日三夜一忌同前方出第二十六卷中古今錄驗療金瘡去血多虛竭內補方蜀椒三分乾薑二分蓯蓉甘草炙芍藥當歸芎藭桂心黃芩人參黃耆厚朴炙吳茱萸桑白皮各一兩上十四味搗散以酒服方寸匕日三一方有白芨無桑白皮千金翼同出第三十四卷中金瘡中風方八首肘後療金瘡中風方蜀椒量瘡大小用面作餛飩煻灰中炮令熟及熱開一小口當瘡上掩之即引風出可多作取瘥備急小品同出第三卷中必效療金瘡中風角弓反張者方取杏仁碎之蒸令餾搗絞取脂服一小升許兼以摩瘡上即瘥又方取蒜一大升破去心以無灰酒四升煮蒜令極爛並滓服一大升以來須臾汗如雨出則瘥又療口噤不能語方蔓菁子淨洗一升搗令細黏手撮為炷以灸瘡上一兩度熱徹即瘥兼服後方又療因瘡著風方雞糞一合烏豆二升簸令淨二味相和於鐺中熬令焦黑及熱瀉出以酒二大升淋之與服隨多少令盡取汗瘥如無汗更作服又療因瘡著風角弓反張方取莨菪根可瘡大小截令平如無大者並縛數根稱瘡以為限豬脂一大合鹽末一雞子黃大和膏於火上溫之令膏鹽相得不用過熱熱即傷肉以暖得炷瘡上冷即易之為兩炷於垍器中燒之更相用以瘥止驗又方生雞子烏麻沙二味合煎稍稠待冷以封瘡上古今錄驗療金瘡得風身體痓強口噤不能語或因破打而得及斧刀所傷得風臨死總用此方無有不瘥瓠𤬛燒麻燭熏之方取未開瓠𤬛一枚長柄者開其口隨瘡大小開之令瘡相當可繞四邊閉塞勿使通氣上覆開一孔如碗口取浮麻子燭兩條並燃瓠𤬛向上燭盡更續之不過半日即瘥若不止亦可經一兩日熏之以瘥為度若燭長不得納入瓠𤬛可中折用之出第三十四卷中諸瘡中風寒水露方五首文仲云凡以八九月刺手足金瘡及諸瘡中寒露水冷毒皆殺人不可輕也療之方生竹若桑枝兩條著煻火中令極熱斫斷炷瘡口中熱氣盡更易一枚盡二枚則瘡當爛乃取薤白搗以綿裹著熱灰中使極熱去綿以薤白敷瘡上布帛急裹之肘後千金同又療若已中水及惡露風寒腫痛方以鹽數合著瘡上以火炙之令熱達瘡中畢以蠟納竹管插熱灰中令烊以滴入瘡中即便愈若無鹽用薤白但單用蠟亦良肘後同出第五卷中備急療諸瘡中風寒水露腫痛云因瘡而腫者皆中水及中風寒所作也其腫氣入腹則殺人也方燒黍穰或牛馬乾糞桑條輩多煙之物掘地作坎於中燒之以板掩坎上穿板作小孔以瘡口當孔上熏之令瘡汁出盡乃止又滴熱蠟瘡中佳集驗肘後文仲同又方以桑灰汁溫之以漬瘡大良姚云神驗肘後千金同出第十八卷中近效療瘡因水入疼痛方取生蔥一束搗以腳踏上須臾更著之瘥李諫議房給事錄試效被刀箭傷方一十一首劉涓子療金瘡箭在肉中不出方半夏三兩洗白蘞三兩上二味下篩以酒服方寸匕日三淺者十日出深者二十日出終不住肉中肘後千金文仲小品同出第三卷中肘後療猝被毒箭方搗藍青絞取汁飲之並敷瘡上若無藍取青布漬之絞取汁飲之亦以汁淋灌瘡中肘後範汪文仲備急千金同又方煮藕取汁飲之多多益善肘後文仲備急同又方但多食生葛根自愈或搗生葛絞取汁飲之乾者煮飲之小品千金集驗備急文仲同又方乾薑鹽等分搗末敷瘡上毒皆自出範汪肘後備急同一作乾葛又凡毒箭有三種交廣夷俚用焦銅作鏃次嶺北用諸蛇蟲毒螫物汁著管中漬箭鏃此二種才傷皮便洪腫沸爛而死唯射豬犬雖困猶得活以其啖人糞故也人若有中之便即餐糞或絞濾取汁飲之並以塗瘡上須臾即定不爾不可救也又一種是今之獵師射獐鹿用射罔以塗箭鏃人中之當時亦困頓著寬處者不死若近胸腹亦宜急療之今葛氏方是射罔者耳又療箭鏑及諸刃刀在咽喉胸膈諸隱處不出者方牡丹一分白蘞二分上二味搗末以溫酒服方寸匕日三服刃自出肘後備急千金同出第九卷中小品療被毒箭傷方雄黃末敷之愈肘後千金集驗同此方亦療蛇毒又方食麻子數升愈搗飲其汁亦佳肘後範汪千金同出第十卷中集驗療毒箭方以鹽滿瘡中灸鹽上三十壯肘後同又方煮蘆根汁飲一二升範汪小品同一云煮薑汁飲二三升又療刀箭瘡有血不止方以小兒矢塗封之三日即瘥並不傷人出第九卷中竹木刺不出方一十六首劉涓子竹木刺不出方鹿角燒灰末以水和塗之立出久者不過一夕集驗文仲備急肘後範汪古今錄驗深師同出第三卷中肘後療竹木刺不出方取羊糞燥者燒灰和脂塗之刺若未出重敷之刪繁集驗千金備急深師同一云用干羊糞末又方嚼白梅塗之集驗千金同又方王不留行末服之並敷上即出集驗文仲深師千金同又方搗烏梅水和塗之刺上立出千金用白梅並出第三卷中深師療刺不出方以鹿腦厚敷上燥復易之半日即出出第二十九卷中集驗療刺藏在肉中不出方用牛膝根莖合搗以敷之即出縱瘡合其刺猶自出肘後備急文仲範汪深師千金同出第九卷中千金療刺在人肉中不出方煮瞿麥汁飲之日三立出又方溫小便漬之又方白茅根燒末以膏和塗之亦主諸瘡因風致腫肘後同又方薔薇燒灰以水服方寸匕日二度十日刺出又方燒鑿柄為灰酒服二方寸匕又方酸棗核燒末服之瘥又方頭垢塗之並出第二十六卷中文仲療竹木刺不出方刮象牙屑水和塗刺上立出肘後範汪備急深師同出第八卷中救急療竹木刺傷方嚼豉封之立瘥千金肘後同出第九卷中狐尿刺方二首千金翼論凡諸螳螂之類盛暑之時多有孕育遊諸物上必有精汁其汁干久則有毒人手觸之不疑之間則成其疾故曰狐尿刺日夜燥痛不識眠睡百方療不能瘥方但取蒲公英莖葉根斷之取白汁塗令厚一分即瘥神驗出第二十四卷中肘後療狐尿棘刺人腫痛欲死方以熱桑柴灰汁漬之冷復易永瘥備急崔氏同出第八卷中狐刺方五首崔氏療狐刺方取好豉心以足為限但覺被刺即熟嚼豉以敷之少頃看豉中當見毛不見又速嚼豉數敷之以晝夜勿絕但以毛盡便愈又方熱搗杏仁細研煮一兩沸承熱以浸刺處數數易之大良古今錄驗同集驗療狐刺方熱魚汁灌瘡中備急療狐刺方以熱蠟灌瘡中又煙燻之令汁出愈此狐所溺之木猶如蛇螫也肘後小品文仲同出第八卷中必效主狐刺痛如烏啄者方生栝蔞香豉二味等分搗之為餅敷患處干即易之效段家方出第六卷中惡刺方三首千金翼療惡刺方五月蔓菁子搗末和烏牛乳封之無烏牛但是牛乳亦得本方云人乳亦得出第二十四卷中古今錄驗療惡刺方取未煮餅油脂以面和油調須臾著瘡上即愈一云蔓菁根和粉以面和油又方取曲末和獨頭蒜搗之納瘡孔中蟲出即瘥出第三十五卷中灸瘡方四首肘後論曰凡灸不依明堂脈穴或是惡日神惡時殺病人年神人神所犯天地昏暗日月無光久積陰沉及灸日食毒物方畢或灸觸犯房室等其灸瘡洪腫發作疼痛病人加甚灸者疾本不痊增其火毒日夜楚痛遇其凡愚取次亂灸此皆因火毒傷臟即死矣今用方療之柏白皮三兩當歸一兩薤白一握上三味切以豬脂一升煎三上三下以薤白黃絞去滓以塗瘡上亦療風水中瘡火瘡出第三卷中集驗療灸瘡痛腫急方搗灶中黃土末之以水和煮令熱以漬之深師千金肘後同又療灸瘡薤白膏生肌肉止痛方薤白當歸各二兩白芷一兩羊髓一斤上四味㕮咀以羊髓煎白芷色黃藥成去滓以敷瘡上日二肘後千金文仲同出第八卷中千金療灸瘡方甘草炙當歸各一兩胡粉六分一作胡麻羊脂六分上四味切以豬脂五合煎之去滓以敷瘡上忌海藻菘菜出第二十六卷中灸瘡膿不瘥方三首肘後療灸瘡膿不瘥方白蜜一兩烏賊骨一兩末上二味相和以塗之千金同千金療灸瘡膿壞不瘥方臘月豬脂一斤薤白切一升胡粉一兩上三味先煎薤白令黃去之綿裹石灰一兩更煎去之入胡粉令調敷之日三又方石灰一兩末細絹篩以豬脂和相得微火上煎數沸先以暖湯洗瘡訖以布裹灰熨瘡上三過便以藥貼瘡上灸之又搗薤敷之肘後同出第二十六卷中火燒瘡及火油天火瘡方三首集驗凡被火燒者初慎勿以冷水冷物並井下泥火瘡得冷即熱氣更深轉入至骨爛壞人筋攣縮者良由此也又療猝被火燒苦劇悶絕不識人方取新熱小便飲一升及冷水和蜜飲之口噤不開者可拗開灌之其悶瘥然後療外乃善千金古今錄驗崔氏小品同出第八卷中千金療火瘡方末熬麻油和梔子仁末塗之唯厚為佳已成瘡者篩白煻灰粉之即瘥出第二十六卷中近效療火油及天火瘡初出似沸子漸漸大如水泡似火燒瘡赤色熱翕翕須臾浸淫漸多急速者是也方蕓薹菜不限多少搗絞取汁芒硝大黃生鐵衣各等分搗大黃末相和芒硝等以蕓薹汁調如稀糊以禿筆點藥敷瘡上干即再點頻用極有效閻師云蕓薹冬月煮取汁洗亦可火灼爛壞方五首劉涓子療火燒人肉爛壞麻子膏方麻子一合柏白皮山梔子碎白芷甘草各一兩柳白皮一兩上六味㕮咀以豬脂一升煎三上三下去滓以塗瘡上日三出第五卷中集驗療火爛瘡膏方柏白皮生地黃研各四兩苦竹葉甘草各四兩上四味切以豬脂一斤煎三上三下藥成濾去滓以摩瘡上日再摩千金無地黃深師千金劉涓子範汪同出第八卷中千金墮火灼爛瘡方榆白皮熟嚼封之瘥又火瘡敗壞方柏白皮切臘月豬膏合淹相和煮四五沸色變去滓塗瘡範汪同出第二十六卷中又方柏白皮生地黃黃芩蛇銜梔子苦竹葉各一兩上六味切以羊髓半升煎之三上三下去滓塗瘡上瘥湯火所灼未成瘡及已成瘡方一十一首肘後療湯火所灼未成瘡者方取暖灰以水和習習爾以敷之亦以灰汁洗之又方黍米女曲分等上二味各異熬令黑如炭搗下以雞子白和塗之良又方取菰蔣根洗去土燒灰雞子黃和塗之又方取柳白皮細切以豬膏煎以塗之以柏白皮彌佳凡此以上三方皆能止痛疾仍不成瘡也又方以小便漬洗之又方以苦酒和雄黃塗之又若已成瘡者方以白蜜塗瘡上取竹幕貼之日三出第七卷中範汪療湯火灼瘡方破雞子取白塗之肘後同又方以豆醬汁塗之肘後文仲同並出第九十一卷中備急療湯火灼瘡方柳皮燒灰如粉敷之肘後同又方豬膏和米粉塗之日五六過良此二方既令不痛又使速愈又無瘢痕已試有效肘後同出第八卷中湯火瘡無問大小方四首崔氏療湯火瘡無問大小秘要方取狗毛碎剪烊膠和之以遍封瘡上一封之後比至痂落亦不痛救急同出第五卷中文仲療湯火瘡無問大小秘要方新熱牛糞塗之良崔氏同出第十七卷中救急療湯火瘡無問大小秘要方取粟熬令焦黑投水中攪之良久濾取汁重煎如糖以敷瘡上並滅瘢崔氏同又方取黍米煮粥和雞子白敷瘡良並出第五卷中湯火爛瘡方五首肘後療湯火爛瘡方取石膏搗末以敷之立愈古今錄驗同出第三卷中備急湯火灼爛方白蘞末塗之立有效又方以竹中蠹蟲末塗之良又方石灰末以水和塗之干即易之並出第八卷中古今錄驗療湯火爛方取商陸根搗末以粉瘡上出第四十卷中湯煎膏火所燒方四首肘後療為沸湯煎膏所燒火爛瘡方丹參細切以羊脂煎成膏敷瘡上千金備急文仲集驗同又方熟搗生胡麻如泥以厚塗瘡上並出第七卷中集驗被湯火熱膏所燒不問大小梔子膏方梔子三十枚白蘞黃芩各五兩上三味切以水五升麻油一升煎令水氣竭去滓冷之以淋瘡令溜去火熱毒肌乃得完也作二日任用膏塗湯散治之千金並翼古今錄驗小品同出第八卷中文仲滾湯煎膏所灼火焰所燒方牛糞新者和以雞子白塗之比常用之亦不作瘡不痛神效出第七卷中漆瘡方二十七首廣濟療漆瘡方煮椒湯洗頻三五度又嚼糯米敷上干即易之頻四五度即瘥忌熱面肉飲酒出第五卷中肘後療猝得漆瘡方以雞子黃塗之干即易之不過三五度文仲同又方煮柳葉湯適寒溫洗之柳皮尤妙集驗必效文仲千金同又方取生蟹黃塗之又方煮香薷以漬洗之深師古今錄驗同又方濃煮鼠查莖葉洗之亦可搗取汁以塗之集驗千金同赤瓜木也又方嚼秫米以塗之又方以造酒小曲搗末以粉之干即以雞子白和塗之良又方挼慎火草若雞腸草以塗之漆姑草亦佳深師千金翼同又方以羊乳汁塗之千金翼深師同又咒漆法畏漆人見漆便漆著之唾之曰漆奕丹陽漆無弟無兄漆自死丹七二匕須鼠傷三唾之又咒三過止則不復生瘡也出第四卷中刪繁療漆瘡方取蓮葉乾者一斤以水一斗煮取五升洗瘡上日再肘後崔氏文仲千金同又方芒硝五兩湯浸洗之肘後千金翼深師同出第九卷中千金療著漆洗湯方取磨石下滓泥塗之取瘥止大驗翼同又方礬石著湯中令消以洗之翼肘後同出第二十六卷中千金翼療漆瘡方貫眾搗末以塗之良干以油和塗之集驗文仲肘後同又方取豬膏塗之文仲刪繁千金同又方宜啖肥肉集驗深師千金同又方嚼穄谷塗之出第十九卷中崔氏療漆瘡方頻以鹽湯洗之大良又方以馬尿洗之瘥止備急療漆瘡方搗韭根如泥塗之煮薤葉洗之佳肘後深師崔氏同又方取蟹搗以塗之最妙或以水浸之取水數數洗之亦效救急療漆瘡方以鐵漿洗之隨手瘥頻為之妙出第八卷中必效療漆瘡方取漆姑草搗汁二分和芒硝一分塗之若無芒硝即朴硝最妙炙韭熨之效又方濃煮杉木汁洗之數數用即除小兒尤佳出第四卷中古今錄驗療漆瘡方黃櫨木一斤銼鹽一合二味以水一斗煮取五升去滓候冷以洗之即瘥王長華家神方出第四十三卷中論曰此疾雖小有著者遍身頭面似疹癩浮腫生瘡痛癢毛髮脫落心煩恍惚不得眠睡因療之遲遂為他疾或便成風癩亦可畏也侵淫瘡方七首肘後療猝得侵淫瘡轉廣有汁多起於心不早療之繞身周匝則能殺人方以雞冠血塗之良又方取牛糞新者絞取汁以塗之亦燒煙燻之又方胡燕窠末以水和塗之文仲備急同又方取鯽魚長三寸者以少豉合搗塗之亦療馬鞍瘡若先起四肢漸向頭面者難療也又取鯽魚油煎去魚塗之文仲備急同出第四卷中集驗療猝毒氣攻身或腫或赤痛或癢並分散上下周匝煩毒欲死方取生鯽魚切之如鱠以鹽和搗遍塗瘡上干復易之此為侵淫瘡也備急同出第八卷中古今錄驗療侵淫瘡苦瓠散方苦瓠一兩蛇皮半兩燒露蜂房半兩熬大豆半升梁上塵一合上五味為散以粉粥和塗紙貼赤處日三甚良又療侵淫瘡戎鹽散方戎鹽二分大黃四分䕡茹一分上三味搗散以酒和敷瘡上日三良月蝕瘡方一十二首廣濟療月蝕瘡方自死青蛙一枚燒灰母豬蹄一枚燒灰甘草末救月杖燒灰上四味等分蜜和塗瘡上日二瘥止又方五月五日乾蝦蟆一枚燒灰石硫黃一兩研礬石一兩熬令汁盡上三味為散以敷瘡上日二瘥止小兒耳後瘡同用並出第五卷中肘後療大人小兒猝得月蝕瘡方五月五日蝦蟆灰以豬膏和塗之瘥止文仲備急集驗同又方於月望夕取兔矢仍納蝦蟆腹中合燒為灰末以敷瘡上瘥止集驗崔氏同崔氏云兔矢七枚又方取蘿藦草搗末塗之瘥又方燒蚯蚓矢令赤末以豬膏和敷之文仲備急千金古今錄驗同又云此瘡多在兩耳上及七孔邊隨月死生故名月蝕瘡也世言小兒夜指月所為實多著小兒也文仲備急同又方水銀黃連末各二兩胡粉熬松脂各一兩研上四味相和合研水銀消以塗瘡瘡如干以臘月豬脂和先以鹽湯洗拭然後敷之出第十六卷中集驗療月蝕瘡方救月蝕鼓皮如手許大一片以苦酒三升漬一宿以塗瘡上或云燒作灰脂和敷之崔氏同又方虎頭骨二兩碎浮萍屑一兩上二味以豬脂一斤煎取骨黃成膏以塗瘡上崔氏同又方茱萸根地榆根薔薇根上三味各等分為散作湯洗瘡取藥塗瘡上日三崔氏同又方燃燭照瘡使燭熱氣相及瘡即愈崔氏古今錄驗同並出第九卷中千金翼療月蝕瘡惡肉方斑蝥去足翅熬石硫黃䕡茹各一兩末上三味搗篩以塗瘡上如瘡干以豬脂和塗之日三出第二十四卷中代指方一十一首小品代指者其狀先腫焮焮熱痛色不黯黑然後緣爪甲邊結膿劇者爪皆脫落亦謂之代指病也又代指無毒正由人筋骨中熱盛撮結故耳吳人名遭指野夫名為土盧即皆是代指疾也療方單煮甘草汁漬之或用芒硝湯漬之搗青菜汁拓之但得一種浸拓之即瘥千金同肘後療代指方以豬膏和白蟮敷之數易瘥止深師千金翼同白蟮一作蛐蟮土又方以指刺炊上熱飯中七遍文仲集驗深師千金範汪同又方取梅核中熟搗以淳苦酒和敷之須臾瘥止文仲同又指忽掣痛不可忍方灸指頭痛處七壯愈千金同又指端忽發瘡方燒鐵令熱勿令赤以灼之上二方俱主代指並出第五卷中千金翼療代指方先刺去膿蛐炙鮓皮令熱以裹縛指令周匝痛即止便愈千金同出第二十三卷中崔氏論代指者是五臟之氣使然流注於十二源經脈熱沖手指不還即代指也當取熱湯急漬之即出使滿七度便以冷水中浸之訖又復浸之如此三度即塗羊膽愈未成膿此方甚效或以豬膽盛代指纏之瘥本方云訖干封桂末便愈出第四卷中備急療手指忽腫痛不已者名為代指方和泥泥指令遍周匝厚一寸許以熱灰中炮之令燥視皮皺即愈不皺者更為之良文仲深師範汪同又方取粱米粉鐵鐺中熬令赤以眾人唾和之塗上令厚一寸即消又方小便和鹽作泥厚裹之數易瘥鑱針刺血出最妙出第五卷中甲疽方五首崔氏夫甲疽之為病或因割甲傷肌或因甲長侵肉成瘡腫痛復緣靴窄研損四邊腫焮黃水出侵淫相染五指俱爛漸漸引上腳跌泡漿四邊起如火燒瘡日夜倍增萬醫所不能療之方綠礬石五兩形色似朴硝而綠色上一味置於鐵板上聚炭封之以囊袋吹令火熾即沸流出色赤如融金看沸定汁盡去火待冷收取挼為末色似黃丹先以鹽湯洗瘡拭乾用散敷瘡上唯多為佳著藥訖以軟綿纏裹當日即汁斷瘡干若患急痛即塗少酥令潤每日一遍鹽湯洗濯有膿處則洗使淨其痂干處不須近每洗訖敷藥如初似急痛即塗酥五六日即覺瘡上痂漸剝起但依前洗敷藥十日即瘡漸漸總剝痂落軟處或更生白膿泡即捺破敷藥自然總瘥神驗無比刑部張侍郎親嬰此病臥經六十餘日困頓不復可言在京眾醫並經造問皆隨意處方了無效驗唯此法得效如神今故錄之以貽好事者出第五卷中救急療甲疽方屋上馬齒菜崑崙青木香印成鹽上三味各燒成灰並等分又取光明砂少許於諸藥中拌總和下篩為細散以敷瘡上干即易之以瘥止當瘡末瘥以前不宜食雞豬魚肉腥穢酒蒜等瘥後仍三十日忌酒良出第九卷中必效療甲疽赤肉生甲邊上裹甲者方取瓜州礬石燒令沸定末敷之濕即刮卻更著日數易即消散竇宣城綽云效亦主雜瘡有蟲有黃水若得吳白礬石亦佳若無雞矢礬亦好又療甲疽瘡腫爛生腳趾甲邊赤肉出時瘥時發者方黃耆二兩䕡茹三兩上二味切以苦酒浸一宿以豬脂五合微火上煎取二合絞去滓以塗瘡上日三兩度其息肉即消散出第四卷中近效療甲疽瘡神妙方熏黃慳好者蛇皮燒灰上二味等分更和研之先以溫泔清浸洗瘡令軟以尖刀子割去甲角入內處裛干取藥棗慄許大以敷瘡上用軟綿裹之半日許藥濕即易之一日許即永除其先痛者敷藥訖一飯頃即宜痛定瘥訖一二日勿著窄靴鞋若能斷酒及豬雞魚蒜面等其效愈遠其藥不過三四度永瘥簫十四郎中有效肉刺方二首古今錄驗療肉刺方好薄刮之以新酒醋和羊腦敷之一宿洗去常以綿裹之良出第四十一卷中近效療肉刺方以黑木耳取貼之自消爛又不痛宜以湯浸木耳軟乃用之手足皸裂方五首深師療手足皸裂方蜀椒四大合汗以水一升煮之七沸去滓漬之半食頃出令燥須臾復浸塗羊豬髓腦尤妙範汪同出第二十九卷中集驗療手足皸裂血出痛方若涉冰霜凍面及手足皸裂瘃壞取麥窠濃煮汁及熱以浸洗之即瘥又方取蔥葉萎黃及籜煮以漬洗之範汪同又療人腳無冬夏常坼裂名曰屍腳此因履踏洗屍水及惡物故也方取雞屎一升以水二升煮數沸待小冷以漬腳半日不過三四度瘥深師千金範汪同出第九卷中千金療手足皴裂血出疼痛方豬胰著熱酒中以洗之即瘥深師集驗同云無酒用湯亦佳出第二十四卷中手足逆臚及瘃壞方二首範汪療手足指逆臚方真珠一分乾薑二分上二味搗末以塗瘡指上日三千金深師同深師療冬月冒涉凍凌面目手足瘃壞及始熱痛欲瘃者方蜀椒二分芎藭二分白芷防風各分姜一分一作鹽上五味以水四升煎令濃以洗之出第二十九卷中疣目方一十九首肘後療疣目方月晦日夜於廁前取故草二七莖莖研二七過粉疣目上訖咒曰今日月晦疣驚或明日朝乃棄勿反顧之又方取亡人枕若席物以二七拭之亡人近彌易去也並出第五卷中集驗療去疣目方七月七日以大豆一合拭疣目上三過訖使病疣目人種豆著南向屋東頭第二霤中豆生四葉以熱湯沃殺疣目便去矣千金肘後範汪同又方取松柏脂合和塗其上一宿即不知處千金同又方作艾炷著疣目上灸之三炷即除範汪千金同又方以石硫黃突疣目上六七過除千金同千金去疣目方取月十五日月正中時望月以禿苕帚掃疣目上三七遍瘥止又方以豬脂癢處揩之令少血出即瘥神驗不可加也又方以苦酒漬石灰六七日取汁點疣上小作瘡即落又方杏仁燒令黑研如膏塗之令瘥止又方以牛涎數塗之自落並出第二十四卷中崔氏疣目方取月盡日平旦井花水月生一日煮作湯灶突北面南自洗咒曰日盡水月初湯灶突北千疣死百疣亡凡七度洗及咒甚良又方先布紙一張於床上即以筆點疣一下還點紙一下無問多少皆一一點每點即咒曰紙亦爛疣亦散點一遍訖乃深埋點紙於屋溜下久當疣散又方以蜘蛛網絲繞纏之自落良又方盜取一酘酒醋以摩疣上咒曰疣疣不知羞一酘酒醋洗你頭急急如律令咒滿七遍久即自愈並出第四卷中張文仲療手足忽生疣目方蒴藋赤子挼使壞疣目上塗之即去範汪同又方以鹽塗疣上令牛舐之不過三度出第五卷中近效療疣子法以墨塗之不過五度即瘥又方以屋溜下水塗疣上韋給事方去黑子方二首集驗去黑子及贅方生藜蘆灰五升生薑灰五升石灰二升半上三味合和令調蒸令氣溜取甑下湯一斗從上淋之盡湯取汁於鐵器中煎減半更鬧火煎以雞羽搖中即燃斷藥成欲去黑子疣贅先小傷其上皮令裁破以藥點之此名三灰煎秘方古今錄驗範汪同出第九卷中救急去黑子方夜以暖漿水洗面以布揩黑子令赤痛挑動黑子水研白旃檀取濃汁以塗黑子上旦又復以暖漿水洗面仍以鷹屎粉其上出第三卷中疣贅疵黑子雜療方六首深師灰煎療瘤贅瘢痕疵痣及癰疽惡肉等方石灰一斗五升濕桑灰四斗柞櫟灰四斗上三味合九斗五升以沸湯令浥浥調濕納甑中蒸之從平旦至日中還取釜中沸湯七斗合甑三淋之澄清納銅器中煎令至夜斟量餘五鬥汁微火徐徐煎取一斗洗亂髮干之如雞子大納藥中即消盡又取五色彩剪如韭葉大量五寸著藥中亦消盡又令不強藥成以白罌子中貯之作藥時不得令婦人小兒雞犬臨見之灰煎亦療瘤驗其肉瘤石瘤藥敷之皆愈其血瘤瘤附左右胡脈及上下懸雍舌本諸險處皆不可令消消即血出不止殺人不可不詳之又療疣贅方取速讀子熟時壞破之以塗其上便落並出第二十九卷中千金療皮中紫赤疵痣靨穢方乾漆熬雌黃礬石各三兩熬巴豆五十枚炭皮一斤雄黃五兩上六味為散以雞子白和塗故綿貼病上日二易之即除深師加莽草三兩餘同出第二十四卷中又療疣贅疵痣方雄黃硫黃真珠礬石熬䕡茹巴豆去皮心藜蘆各一兩上七味為散以漆和令如泥以塗貼病上頃成瘡及去面上黑子點之即去深師同出第二十四卷中古今錄驗療黑子去疣等五灰煎方石灰蒴藋灰桑灰炭灰蕈灰各一升上五味以水溲蒸令氣匝仍取釜中湯淋取清汁五升許於銅器中東向灶煎之不得令雞犬小兒女人穢者見之膏成好凝強如細沙糖即堪用量以點封之出第五卷中廣濟療疣贅赤黑疵痣靨穢瘡疽息肉強結瘤等神效灰煎方炭灰三升湯拌令濕徹以熱湯漬令半日後還以湯淋之稍稍點湯不得太速下即灰汁不驗候汁下得三二升即納一小鐺中煎令一兩沸即別取一兩石灰風化者為佳恐中濕者須熬令極熱納灰汁中和煎以杖篦攪之勿住手候如煎餅面少許細細取成膏急瀉著一瓷器中攪令冷不然須臾乾燥不堪用常候此煎十分有一分堪久停但有傷損肉色須臾變赤黑色痛如火燒狀若灸瘢發焮經二十餘日病自然脫落無瘢痕欲衝風冷遠行貼烏膏亦神效痂亦易落瘡未瘥間忌小豆姜外縱有瘢亦不凸出烏膏在二十四卷中滅瘢痕方一十七首廣濟療人面瘢痕滅之方取白雞以油脂和水煮小麥令熟純以飼雞三兩日大肥安雞著板上作籠籠之七日莫與雞食空飼清水七日取豬脂去脈膜切啖飼如食糞皆凝白開收暖水取塗瘢上十度平復舊欲用塗以粗葛布揩微赤離離訖然後塗之男女俱用效也又療人面及身瘡瘢不滅方鷹白糞爛腐骨尿白咸各四分麝香二分上四味研令如粉以葛布揩令赤微離離以脂和敷之日二度瘥止並出第五卷中劉涓子六物滅瘢膏方衣中白魚雞屎白鷹糞白芍藥白蘞白蜂等分上藥研如粉以乳汁和塗瘢上日三良出第五卷中小品滅瘢方雞矢白一兩辛夷四分白附子二分細辛二分上四味酒浸一宿以羊脂六合微火煎三上三下去滓傷瘢以甘草洗訖塗之一方有桂心二分又方鷹屎白一兩研白蜜和塗瘢上日三並出第十卷中千金翼凡面皰瘡瘢三十年以上並冷瘡姜瘢金瘡等方斑蝥三枚去足翅熬巴豆三枚去心皮密陀僧胡粉二兩鵝脂三兩煎金𨥥洮沙三兩高良薑三兩去皮海蛤三兩取中者上八味為粉用鵝脂和夜半塗之旦以甘草湯洗之瘥止出第五卷中救急滅瘢方豬脂三斤飼烏雞令三日使盡收取白矢納白芷當歸各一兩煎白芷令黃去滓納鷹矢白二分攪令調塗之旦洗之千金同又方蒺藜子山梔子仁各一合上二味為散醋漿和如泥臨臥時以塗之旦洗之千金同又方痕凸出秋冬小麥面春夏大麥面下篩令細以酥和封之良千金同又方夏以熱瓦熨冬以凍凌熨之千金同又方鷹矢白一兩白魚二七枚上二味為散蜜和塗之日三即瘥千金同又方鷹矢白十分白殭蠶八分上二味研如粉白蜜和敷之日三瘥慎五辛肥膩生冷物千金同又方臘月豬脂四升煎大鼠一枚令消盡以生布摩傷以塗之日四五過千金同並出第三卷中必效滅瘢方禹餘糧半夏上二味等分末以雞子黃和之先以新布拭瘢上令赤以塗之勿令見風二十日滅矣十年瘢無不愈平復如故救急範汪千金同又療灸瘡及金瘡凡百瘡瘢能令高者平下者起方雞屎白鷹屎白各二合辛夷仁四分白附子杜若各三分細辛二分上六味下篩以赤蜜少少和先以布揩瘢微破塗之日二瘥後忌五辛小豆油膩及酢飲酒等若慎口味如大小淺深無不瘥一本無杜若有桂心並出第四卷中古今錄驗療面上瘢滅之方白殭蠶一兩珊瑚一兩白芷一兩雞矢白一兩硃砂一兩研上五味搗蜜和敷之尤良又方木蘭香一斤以三歲米醋浸令沒百日出曝乾搗末以塗之一方用醋漿水浸百日出曝乾末服方寸匕日再出第三卷中
