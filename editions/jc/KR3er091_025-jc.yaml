body:
  text: 卷第二十五水穀痢方一十首病源水穀痢者由體虛腠理開血氣虛春傷於風邪氣留連在肌肉之間後遇脾胃大腸虛弱而邪氣乘之故為水穀痢也脾與胃為表裡胃者脾之府也為水穀之海脾者胃之臟也其候身之肌肉而脾氣主消水穀水穀消其精化為榮衛以養其臟充實肌膚大腸肺之腑也為傳道之官化物出焉水穀之精化為血氣者行於經脈其糟粕行於大腸也肺與大腸為表裡而肺主氣其候身之皮毛春陽氣雖在表而血氣尚弱其飲食居處運動勞役血氣虛者則為風邪所傷客在肌肉之間後因脾胃氣虛風邪又乘虛而進入於腸胃其脾氣弱者不能剋制水穀故糟粕不結聚而變為痢也又新食竟取風名為胃風其狀惡風頭多汗膈下塞不通食飲不下腹脹形瘦腹大失衣則䐜滿食寒則洞泄洞泄者痢無度也若胃氣竭者痢絕即死診其脈小手足寒難療也脈大手足溫易療也下白沫脈沉則生浮則死身不熱脈不懸絕滑大者生懸澀者死以藏期之也脈絕而手足寒晬時脈還手足溫者生脈不還者死脈緩時小結者生洪大數者死懸絕而澀者死細微而澀者生緊大而滑者死得代絕脈者不死養生方云秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飧泄又云五月勿食未成核果及桃李發癰癤不爾發寒熱變黃疸又為泄痢出第十七卷中廣濟療赤白水穀冷熱等痢方地榆六分白朮五分赤石脂七分研厚朴六分炙乾薑六分熟艾四分龍骨七分甘草四分炙黃連十分烏梅六分熬人參六分當歸五分上十二味搗篩為末蜜丸以米飲汁服二十丸如梧桐子大日三服加至三十丸出第四卷中集驗論黃帝問曰人若溏泄下痢者何也對曰春傷於風夏生溏泄腸澼久風亦為溏泄也又療熱水穀下痢黃連阿膠湯方黃連阿膠炙各二兩梔子三十枚烏梅二十枚黃柏一兩上五味切以水七升煮取二升半分為再服神良備急同肘後名烏梅湯療熱下䘌又方黃連一升金色者陳米五合上二味以水七升煮取二升分再服肘後文仲同並出第四卷中刪繁療中焦熱水穀下痢藍青丸方藍青汁三升黃連八兩黃柏四兩阿膠五兩白朮地榆地膚子烏梅肉各三兩上八味搗篩為散用藍汁和微火上煎取可為丸丸如杏子大飲進三丸出第四卷中崔氏療水穀痢方乾薑三分雞子二枚小豆二百粒炒令香黃連三分上四味搗篩三味納雞子黃白中熟攪令相得微火上炒令可丸一服五十丸如小豆大旦以飲服瘥即停出第三卷中文仲療因仲夏熱多令人發水谷痢腸中鳴轉一瀉五六升水方黃連去毛厚朴各三兩上二味切以水三升煮取一升頓服之出第三卷中必效療水穀痢方小豆一升煮臘二兩煮上三味和頓服之即愈又方棕䕡皮燒灰上一味研以水和服三方寸匕並出第二卷中古今錄驗療熱水穀下痢方黃連阿膠各二兩梔子二十枚上三味切以水七升煮取二升分為三服又方黃連當歸甘草炙各二兩酸石榴皮三兩上四味切以水三升煮取一升半分為三服並出第十卷中水痢方六首廣濟療水痢及霍亂崔氏方同云冷痢食不消化及有白膿日夜無節度但疑是冷悉主之方白石脂乾薑各八分上二味搗篩為末以沸湯和少許面薄糊和藥並手捻作丸如食法下不止加乾薑八兩忌如常法又療水痢腹中氣方茯苓八分白龍骨八分研訶黎勒皮八分黃連八分酸石榴皮八分上五味搗篩為末蜜丸空心以飲服如梧子大三十丸日二服瘥止出第四卷中文仲療水痢百起者馬藺散方馬藺子乾薑黃連原無分兩上三味為散熟煮湯取一合許和二方寸匕入腹即斷冷熱皆治常用神效不得輕之又方朽骨灰牛骨灰亦得神麯炒黃上三味等分為散空腹飲服一方寸匕無六月六日曲時用常曲亦得御敷並出第三卷中經心錄主水痢方雞子二枚黃臘一兩上二味熬熟食之宜空肚食之日三服佳又方黃連倉米各三兩上二味作散和雞子七枚令熟並捻作丸煮赤豆作漿粥服三十丸日三服若渴但飲豆漿粥並出第二卷中久水痢不瘥腸垢方四首病源腸垢者腸間津液垢膩也由熱痢蘊積腸間虛滑所以因下痢而便腸垢也出第十七卷中肘後療水下積久不瘥腸垢已出者方烏梅二十枚上一味以水二升煮取一升頓服之又方石榴一枚上一味合皮搗絞取汁隨多少服之最良備急療水下積久不瘥腸垢已出者方赤石脂桂心乾薑附子炮上四味等分搗篩蜜丸如小豆每服三丸日三服飲下肘後同出第六卷中文仲治久水痢難斷方黃連二兩黃柏二兩阿膠二兩炙上三味搗篩為散以苦酒蜜各半升煮納阿膠令烊又納諸藥令可丸飲服三丸日四此是古方極要冷痢方二十二首病源冷痢者由腸胃虛弱受於寒氣腸虛則泄故為冷痢也凡痢色青色白色黑皆為冷也色黃色赤並是熱也故痢色白食不消謂之寒中也診其脈沉則生浮則死出第十七卷中廣濟療冷痢青白色腹內常鳴其痢行數甚疏出太多此是冷痢宜服調中散方龍骨人參黃連阿膠炙黃柏各一兩上五味搗篩為散煮米飲服兩方寸匕日兩服瘥停出第四卷中肘後療水下痢色白食不消者為寒下方黃連乾薑各三兩上二味搗篩白酒一升半合煎令可丸飲服如梧桐子二十丸忌豬肉冷水又方黃連二兩甘草炙半兩附子炮半兩阿膠半兩炙上四味切以水三升煮取一升半分再服之又方半夏洗烏頭炮甘草炙各等分上三味搗篩蜜和丸如梧桐子大飲服三丸日再服又方生薑汁二升白蜜一升半上二味相和分再服之又方腥二兩切乾薑三兩末上二味以水六升半著米一合煮作糜糜熟納姜一食令盡不瘥更作備急同又方酸石榴皮燒灰上一味為末服方寸匕文仲同又方乾薑二兩末雜麵一升上二味為燒餅熟食之盡更作不過三劑瘥文仲同又療純下白如鼻涕者方龍骨乾薑附子炮上三味等分搗篩蜜和丸如梧子大飲下五丸漸至十丸日一服文仲同又方黃連末臘阿膠各一兩上三味先以酒半升令沸下膠臘合烊乃納黃連末頓服之本云姚氏療卒注下並痢血一日夕數十行又方灸臍下一寸五十壯良文仲同並出第二卷中千金論曰凡五臟絕於內者下不自禁下甚者手足不仁也細尋取之萬不失一下病體例略如此耳素問曰春傷於風夏為膿血夏多滯下也夏傷於風秋必洞泄秋下水者患必是冷也又療久冷痢下純白者此由積臥冷處經久病發遂令脾胃俱冷日夜五六十行大小腹痛不可忍之凡白痢屬冷赤痢屬熱方上好曲末五升微熬令香上一味溫清淳酒熱和曲末一升空腹一頓服之日三若至食時搗蒜一升令至熟下姜椒末調如常食法惟須稠勿加鹽以水和麵二升作索餅極熟爛煮之干漉熱納蒜齏中相和一頓食之少與餘食至飢時仍准前食曲末酒比至差來少食餘食以此法療不過二日必瘥又烏梅丸療冷痢久下方烏梅三百粒當歸四兩乾薑十兩桂心六兩附子六兩炮黃連十六兩蜀椒汗四兩細辛六兩人參六兩黃柏六兩上十味異搗篩合治之苦酒漬烏梅一宿去核蒸之如五斗米下搗如泥盤中揉合相得蜜和搗二千杵食前飲服如梧子大十丸日三稍增至二十丸此本仲景傷寒論方又舊療痢於貴勝用健脾丸多效今療積久冷痢先以溫脾湯下訖後以健脾丸補之未有不效者貧家難以充辦亦不可將息溫脾湯方療積久冷痢赤白者大黃三兩桂心三兩附子炮乾薑人參各二兩上五味切以水七升煮取二升半分為三服日再並出第十五卷中備急葛氏療痢色白食不消者為寒下方豉一升綿裹薤白一把上二味以水三升煮取二升及熱頓服之陶效方云療暴下大去血痢姚療赤白下痢並效肘後同又方牛角腮燒灰上一味搗篩白飲服方寸匕日三肘後同又方好面炒上一味搗篩煮米粥納面方寸匕日四五云此療日百行師不救者肘後同出第六卷中古今錄驗白頭翁湯療寒急下及滯下方白頭翁乾薑各二兩甘草炙一兩當歸一兩黃連秦皮各一兩半石榴皮一兩生者二兩上七味切以水八升煮取三升分為四服出第十卷中近效療冷痢方肉豆蔻五顆合皮碎甘草二兩炙上二味切以水三升煮取一升半頓服之戶部李尚書處得云療冷痢極者有效自用得力又療久冷痢方赤石脂搗作末和麵作餛飩空腹服一碗以下不過兩頓瘥老人尤佳體中先熱者不可服之以上二方新附文仲治青下白下姜附散方乾薑附子炮皂莢炙去子上三味等分搗篩為散飲服方寸匕不可再服即愈亦可丸服小品肘後同又治冷痢姜艾餛飩子方乾薑末熟艾上二味等分作面餛飩如酸棗大煮熟服四五十枚日二服腹脹者炙厚朴煮汁服藥此熱服訖即須食飯大效曾有產婦冷痢如白膏服之立瘥腹痛亦定冷痢食不消下方六首廣濟療脾胃氣微不能下食五內中冷及微下痢方白朮八兩神麯末五兩炒甘草炙乾薑枳實炙各二兩上五味搗篩蜜和丸空腹以溫酒服如梧桐子大二十丸日二服漸加至三十丸腹中痛者加當歸出第四卷中文仲華佗治老小下痢柴立不能食食不化入口即出命在旦夕久痢神驗方黃連末半雞子殼亂髮灰准上淳苦酒准上蜜准上白臘方寸匕雞子黃一枚上六味於銅器中炭火上先納苦酒蜜臘雞子黃攪調乃納黃連末發灰又攪煎視可摶出為丸久困者一日一夜盡之可者二日盡之肘後同出第三卷中延年增損黃連丸主腹內冷食不消及冷痢兼補方黃連黃耆各三分龍骨三分當歸甘草炙五分乾薑厚朴炙各六分地榆白朮人參各一分上十味搗篩蜜丸如梧子大飲酒任下服十五丸日再服加至二十丸蔣仲璋處又地榆丸主冷痢不消食腹中脹痛氣滿不能食方地榆六兩炙赤石脂七分厚朴六分白朮五分乾薑六兩龍骨七分黃連十分當歸五分熟艾五分烏梅肉六分甘草四分炙上十一味搗篩蜜和丸如梧子大飲服二十丸日二服加至二十五丸並出第七卷中又深師療冷痢下膿血絞臍痛食不消腹脹方吳茱萸乾薑各六分赤石脂曲末炒各八分厚朴炙當歸各四分上六味搗篩蜜和丸如梧子空腹以飲下四十丸日再又療冷氣久痢臍下痛出白膿食不消方吳茱萸人參芎藭桔梗甘草炙各四分枳實炙三枚乾薑十二分附子炮八分曲味二十分炒上九味搗篩蜜和丸如梧子空腹飲下七丸日二服漸加之文仲云溫脾丸療久寒氣逆脹滿面目痿黃食不消化白痢方八首病源白滯痢者腸虛而冷氣客之薄於腸間津液凝滯成白故為白滯痢出第十七卷中廣濟療白膿痢方甘草六分炙厚朴十二分炙乾薑枳實茯苓各八分上五味切以水五升煮取一升六合絞去滓分為二服日再服又療心腹脹滿不能下食及痢白膿方厚朴五兩炙豆蔻五枚甘草一兩炙乾薑一兩上四味切以水五升煮取一升五合絞去滓分為二服日再並出第四卷中千金大桃花湯主冷白滯痢腸痛方赤石脂八兩乾薑當歸龍骨各三兩附子炮牡蠣各二兩熬芍藥甘草炙各一兩人參一兩半白朮一升上十味切以水一斗二升煮白朮取九升納藥煮取三升分為三服膿者加厚朴三兩嘔者加橘皮二兩又方龍骨六兩厚朴三兩炙赤石脂五兩當歸一兩上四味切以水七升煮取二升半分為三服日再服熱加白頭翁十分牡蠣三兩延年烏梅肉丸主冷白膿痢食不消方烏梅肉熬熟艾黃柏甘草炙各八分上四味搗篩蜜丸如梧子以飲服十五丸日三服忌同前出第七卷中必效白痢方麻子汁上一味以汁煮取綠豆空腹飽服極效又方黃連末上一味以水和每服三匕即愈並出第二卷中古今錄驗療白滯下晝夜無複數龍骨湯方龍骨牡蠣各三兩煉烏梅肉熟艾白頭翁乾薑各一兩女萎黃連當歸各二兩甘草六兩炙上十味切以水七升煮取三升二合分服日三夜一斷便止忌同前出第十卷中重下方六首病源此謂今赤白滯下也令人下部疼重故曰重下去膿血如雞子白日夜數十行繞臍痛也出第十七卷中肘後療重下方黃連一升上一味以酒五升煮取一升半分溫再服臍當小絞痛則瘥又方鼠尾草上一味以濃煮煎如薄飴糖服五合至一升日三赤下用赤花者白下用白花者佳也文仲備急同文仲隱居效驗方主下部絞痛重下下赤白方當歸黃柏黃連乾薑各二兩上四味搗篩煮取烏梅汁服方寸匕日三若腹中絞痛加當歸下赤加黃連下白加乾薑大效神良秘之備急同出第三卷中備急療重下方此即赤白痢下也令人下部疼重故名重下葛氏方豉熬令少焦上一味搗服一合日再三服又熬豉令焦水一升淋取汁服冷則用酒淋日三服之肘後文仲同出第六卷中古今錄驗重下下赤者方取獺赤糞下白取白糞燒末上一味以飲清旦空腹服一小杯三旦飲之即愈又療得毒病後得重下赤白絞痛方石鐘乳一兩研黃連防風附子炮黃柏蜀椒汗當歸乾薑各二兩上八味切以水六升煮取二升半分三服適寒溫服並出第十卷中卒暴冷下部疼悶方二首千金療卒暴冷下部疼悶方燒磚令熱大酢沃之三重布覆坐上取瘥又方黍米二升臘羊脂膠炙各二兩上四味合煮作粥一頓令盡即瘥並出第十五卷中冷熱痢方七首病源夫冷熱利者由腸胃虛弱宿有寒而為客熱所傷冷熱相乘其痢乍黃乍白是也若熱摶於血血滲腸間則變為血痢也而冷伏腸內摶津液則變凝白則成白滯亦變赤白痢也其湯熨針石別有正方補養宣導今附於後養生方導引法云泄下有寒者微一作引氣以息內腹徐吹息以鼻引氣氣足復前即愈其有熱者微呼以去之也出第十七卷中刪繁療下焦冷熱不調暴下赤白痢香豉湯方香豉一升白朮六兩薤白切一升升麻二兩上四味切以水七升煮取二升半分為三服出第四卷中古今錄驗生春石榴將療熱不調下或滯或水或赤白青黃者方酸石榴五枚上一味合殼舂絞取二升汁分服五合稍稍服二升盡即斷小兒以意服二三合佳千金同出第十卷中又深師無問冷熱新舊痢方黃連黃柏乾薑甘草炙艾烏梅肉熬各八分附子三枚臘一雞子大上八味搗篩以蜜和臘於鐺中熔之其著蜜須候臘熔盡如干益蜜丸空腹以飲服四十丸日二漸加至五六十丸近效療痢無問冷熱神驗黃連丸方黃連一兩茯苓二兩阿膠一兩炙上三味先搗黃連茯苓為末以少許水熔阿膠和為丸眾手丸之曝乾量患輕重空腹以飲下三四十丸漸漸加至六十丸不過五六服必瘥常用之極效又療苦下無問冷熱及膿血痢悉主之方生犀角屑黃柏各二兩黃連苦參各三兩上四味搗篩為散以糯米煮作飲莫令生每日空腹服一方寸匕日再服便瘥勿輕之此方於度支王郎中處得曾用極效肘後有當歸云庚侍郎家方產後彌佳崔氏治痢無問冷熱赤白久新並疳溫劉秘監積年患痢每服此即愈方阿膠二兩一兩炙入藥一兩銷作清黃連一兩乾薑二兩入黃無食子二枚久痢腸滑甚者量加至三四枚上四味搗篩為末以醋熔膠清頓和丸如梧子飲服二十五丸日再漸加至三十丸老小者以意斟酌禁如常法一云若冷劑以酒下熱痢以粥飲下出第三卷中文仲治無問冷熱及五色痢入口即定方黃連四分黃柏當歸黃芩各一兩阿膠二兩炙熟艾一兩上六味搗篩為散以醋二升煮膠烊下藥煮令可丸如大豆飲服七八十丸日二夜一服特宜老人若產婦痢加蒲黃一兩蜜和為丸神驗出第三卷中熱毒痢方三首肘後若下色黃者協毒熱下也療之方梔子十四枚去皮上一味搗篩蜜和丸如梧子飲服三丸日再服出第二卷中千金療熱毒痢方苦參橘皮獨活阿膠炙藍青黃連鬼箭羽一云鬼臼黃柏甘草上九味等分搗篩以蜜烊膠和並手丸如梧子干以飲服十丸日三稍加之卒下疰痢者大良出第十五卷中文仲治熱痢久不瘥者黃連丸方黃連末以雞子白和丸如梧子飲服十丸至二十丸日三熱毒血痢方六首廣濟療熱毒痢血其痢行數甚數痢出不多腹中刺痛此是熱痢宜生犀角散方生犀角末酸石榴皮熬枳實熬令黃各三兩上三味各異搗篩為散以飲服兩三寸匕日再差停熱食物又療熱毒痢血片臍下絞刺痛方升麻地榆茜根黃芩各六分犀角四分生地黃八分梔子七枚擘薤白八分香豉二合上九味切以水六升煮取一升五合絞去滓分溫三服日再並出第四卷中千金大熱毒純血痢療不可瘥者方黃連六兩上一味切以水七升煮取二升半夜露著星月下旦空腹頓服之臥將息不瘥加黃連二兩更作服之仍不瘥者以疳痢法療之佳忌如常又療熱毒下黑血五內攪切痛日夜百行氣絕欲死方黃連一升龍骨白朮各二兩阿膠炙乾薑當歸赤石脂各三兩附子一兩炮上八味切以水一斗煮取五升分為五服余以正觀三年七月十二日忽得此痢至於五日將絕處此藥入口即定並出第十五卷中古今錄驗療熱毒下血及豆汁犀角煎方犀角屑人參當歸各三兩黃連四兩蜜一合上五味切以水五升煮取一升去滓納蜜煎三沸分為三服日三忌同出第十卷中文仲治熱毒痢痢血犀角散方生犀三兩石榴皮三兩燒黃連三兩干藍二兩地榆二兩上五味搗篩為散以米飲服三方寸匕日二服出第三卷中赤痢方四首病源此由腸胃虛弱為風邪所傷則成痢挾熱熱乘於血則血流滲入腸與痢相雜下故為赤痢也出第十七卷中集驗療下赤痢方秫米一把鯽魚酢二臠細切薤白一虎口細切上三味合煮如作粥法啖之古今錄驗同出第四卷中千金療赤帶下方成煎豬膏三合清酒五合上二味以緩火煎十沸適寒溫頓服之取瘥止又論曰凡痢病通忌生冷酢滑豬雞魚油乳酪酥干脯醬粉鹹食所食諸食皆須大熟爛為佳亦不得傷飽此將息之大經也若將息失所聖人不救也並出第十五卷中必效療赤痢方香淡豉半升黃連一兩上二味以水一升半浸豉一日濾取汁碎黃連薄綿裹豉汁中煎取強半升空腹頓服即上桑泉蔣尉云效出第二卷中崔氏治赤痢黃連丸方陳倉米四分黃連四分乾薑四分上三味搗篩為末緩火炒令色變以納二顆雞子白中熟和丸如梧子大空腹服五十丸以好無灰酒溫一盞下之至晚間痢赤色當變白明旦即瘥出第三卷中久赤痢方二首病源久赤痢者由體虛熱乘於血血滲腸間故痢赤腸胃虛不平復其熱不退故經久不瘥胃氣逆則變為嘔噦也胃虛穀氣衰蟲動侵食則變為䘌也出第十七卷中千金療下赤連年方地榆鼠尾草各一兩上二味切以水二升煮取一升分為二服如不瘥取屋塵水盡去滓服一升日二服古今錄驗服屋塵汁一小杯余同此是徐平方療下血二十年者若不止重服即愈肘後同又方鼠尾草薔薇根秦皮用槲皮亦得上三味等分水淹煎去滓以銅器重釜煎成丸如梧子服五六丸日三稍增瘥止亦可濃汁服半升出第十五卷中卒下血方七首深師治卒下血晝夜七八行方黃連黃柏各四兩上二味切以淳苦酒五升煮取一升半分為二服亦療下痢又療卒下血蒲黃散方蒲黃三合當歸一兩鹿茸一枚燒上三味搗篩為散飲服方寸匕先食日三並出第一十六卷中集驗療卒下血不止方草龍膽一握上一味切以水五升煮取二升半分為五服如不瘥更服出第四卷中葛氏療卒下血方小豆二升上一味搗碎水三升和絞取汁飲之姚云立止又方黃連半兩黃柏二兩梔子二七枚上三味切以酒二升漬一宿去滓煮三沸頓服之並出第十六卷中崔氏治卒下血不止方灶突中塵一升黃連五兩地榆三兩上三味搗篩為散粥飲服方寸匕日再服重者夜一近效治卒下血不問丈夫婦人立效牛角䚡灰散方黃牛角䚡一具燒赤色出火即青碧上一味為細散食前濃煮豉汁和二錢匕重者日三神驗血痢方六首病源血痢者熱毒乘於血血滲入大腸故也血之隨氣循環經絡通行臟腑當無停積毒熱氣乘之遇腸虛者血滲入於腸腸虛則泄故為血痢也身熱者死身寒者生診其關上脈芤大便去血暴下血數升也出第十七卷中廣濟療血痢黃連丸方黃連白龍骨炙禹餘糧伏龍肝各八分代赭研乾薑各六分上六味搗篩蜜和丸飲服三十丸如梧子漸加至四十丸差止又療痢鮮血方茜根黃連地榆各八分梔子十四枚薤白切香豉各八分犀角屑六分上七味切以水八升煮取二升分為三服日再出第四卷中必效療患熱血痢方粳米一升研上一味研碎令米盡取汁可一大升於新瓷瓶中盛取油絹密閉頭系內著井水中令至明飲之敷與人無不瘥者出第二卷中古今錄驗療血痢及膿血方黃連三兩上一味切以清水三升漬一宿旦煎取一升半去滓分為二服服令須臾盡文仲同又療下痢鮮血方乾地黃犀角屑地榆各二兩上三味搗篩蜜丸如彈子大每服一丸水一升煎取五合去滓溫服之又療下血痢地膚散方地膚五兩地榆根黃芩各二兩上三味搗篩為散以水服方寸匕日三並出第二卷中久血痢方三首病源此由體虛受熱熱折於血血入腸故成血痢熱不歇胃虛不復故痢血久不瘥多變嘔噦及為濕䘌出第十七卷中崔氏療痢血數十年方石灰三大升炒令黃上一味以水一斗攪令澄清一服一升三服止出第三卷中小品療下血連歲不愈方黃連半斤上一味搗末以雞子白和為餅子微火炙令黃黑復搗篩服方寸匕日三有效下清血痿黃失色醫不能療者皆差肘後同文仲治七八十老人患積痢不斷兼不能飲食方人參四分鹿角去皮取白作末炒令黃上二味搗篩為散平旦以粥清服方寸匕日再並出第三卷中蠱注痢方三首病源此由歲時寒暑不調則有濕毒之氣傷人隨經脈血氣漸至於臟腑大腸虛者毒氣乘之毒氣挾熱與血相搏則成血痢也毒氣侵食於臟腑如病蠱注之狀痢血雜膿瘀黑有片如雞肝與血雜下是也出第十七卷中肘後療苦時歲蠱注毒下者方礬石熬二兩乾薑附子炮黃連各二兩上四味搗篩為散以酒服方寸匕日三不止更服又方黃連黃柏等分上二味搗末蜜丸如梧子大飲服十丸日四服並出第二卷中古今錄驗療純痢血如鵝鴨肝並協蠱毒方茜根升麻犀角桔梗黃柏黃芩各三兩地榆蘘荷根各四兩上八味切以酒三升漬一伏時服一升日一服千金同未差更作出第六卷中腸蠱痢方一首病源腸蠱痢者冷熱之氣入在腸間先下赤後下白連年不愈侵傷於臟腑下血雜白如病蠱之狀名為腸蠱也出第十七卷中肘後凡病下應先下白後下赤若先下赤後下白為腸蠱方牛膝三兩搗碎以酒一升漬經宿每服一兩杯日二三服姚同出第二卷中膿血痢方七首病源夫春陽氣在表人運動勞役腠理則開血氣虛者傷於風至夏又熱氣乘之血性得熱則流散也其遇大腸虛而血滲入焉與腸間津液相搏積熱蘊結血化為膿腸虛則泄故成膿血痢也所以夏月多苦膿血痢者腸胃虛也秋冬診其脾脈微澀者為內潰多下血膿又脈懸絕則死滑大則生脈微小者生實急者死脈沉細虛遲者生數疾大而有熱者死出第十七卷中肘後療熱病久下痢膿血柏皮湯方黃柏二兩梔子二十枚黃連四兩阿膠炙二兩上四味切以水六升煮取二升分為三服又一方加烏梅二十枚文仲同出第二卷中文仲治熱痢及下黃赤水及黃膿血四肢煩皮上冷者方黃連八兩熟艾一兩黃柏四兩黃芩三兩上四味搗篩為末以黃臘二兩安一升蜜中煮令消及暖和藥白飲服六七十丸如小豆日二夜一即驗又久下痢膿血方赤石脂一升烏梅二十個乾薑四片粳米一升上四味切以水七升煮取令熟藥成服七合日三肘後同並出第三卷中刪繁療下焦熱或痢下膿血赤石脂湯方赤石脂八兩烏梅二十枚去核梔子十四枚白朮蜀椒汗麻各三兩乾薑二兩粟米一升上八味切以水一斗二升煮米熟去滓取七升下諸藥煮取五合服之出第四卷中備急葛氏云若挾熱者多下赤膿雜血方黃連灶突中塵各半兩上二味末之酒服方寸匕日三服肘後云以棗膏和分作三丸日服一丸姚氏同出第六卷中古今錄驗療腸澼溏便膿血乾薑散方乾薑黃連桂心各一分上三味搗篩服方寸匕著麋中食日三多膿加姜多血加桂有驗又療中寒下痢膿血附子散方蜀附子一枚炮曲乾薑各三分上三味下篩為散先食以酒服方寸匕日二並療婦人漏下忌如前並出第三卷中赤白痢方六首病源凡痢皆由榮衛不足腸胃虛弱冷熱之氣乘虛而入客於腸間腸虛則泄故為痢也然其痢而赤白者是熱乘於血血滲腸內則赤也冷氣入腸搏於腸間津液凝滯則白也冷熱相交故赤白相雜重者狀如膿涕而血雜之輕者白膿上有赤脈薄血狀如魚腦世謂之魚腦痢也出第十七卷中文仲鹿茸散治青黃白黑魚腦痢日五十行方鹿茸二分炙石榴皮二兩乾薑二分棗核中仁七枚赤地利一兩燒作灰服後云赤𦋺如三指上五味搗篩為散先食飲服方寸匕日三夜一若下數者可五六服肘後同小品卒久赤白下方燒馬屎一丸作灰分服酒水隨意服已試良肘後同深師療赤白下者黃連湯方黃連黃柏乾薑石榴皮阿膠炙各三兩甘草一兩炙上六味切以水七升煮取二升為三服日再出第二十六卷中延年駐車丸主赤白冷熱痢腹痛方黃連六兩乾薑二兩當歸三兩阿膠炙三兩上四味搗篩三年酢八合消膠令熔和並手丸如大豆以飲服三十丸日再肘後同出第七卷中救急療赤白痢無問新舊入口即斷方香豉心豉心謂合豉其中心者熟而且好不是去皮取心勿浪用之上一味以取豉爆令乾香搗為末壯年者一大升豉心為四服小兒量與之出第九卷中必效主赤白痢方黃連二兩阿膠四片上二味以好酒二大升合黃連煎十五沸漉出滓然後納膠令烊溫分三服出第二卷中久赤白痢方四首病源久赤白痢者是冷熱乘於血血滲腸間與津液相雜而下甚者腸虛不復故赤白連滯久不瘥也凡痢久不瘥脾胃虛弱則變嘔噦胃弱氣逆故嘔也氣逆而外有冷折之不通故噦亦變為䘌蟲食人五臟也三月九蟲常居人腸胃腸胃虛則動上食於五臟則心懊憹而悶齒斷唇口並生瘡下食於腸則肛門傷爛而穀道開也輕者可治重者致死出第十七卷中崔氏馬藺子散療赤白痢腹內㽲痛並久水穀痢色白如泔澱悉主之極重者不過三四日必瘥方馬蘭子一升熬地榆根皮八分厚朴炙八分熟艾八分赤石脂一升龍骨十分茯苓十分當歸十分上八味搗篩為散一服方寸匕加至四五匕日再夜一白飲服出第三卷中文仲療赤白痢五六年者方燒大荊上一味取瀝服五六合即瘥肘後同又卒腹痛下赤白數日不絕方雞子一枚扣頭取黃去白胡粉末令滿殼燒焦成劑上二味以酒服之肘後同並出第三卷中近效療赤白痢日數十行無問老小方甘草二兩炙上一味切以漿水四升煮取一升去滓頓服之疳痢方六首必效療冷疳痢方取莨菪子熬令黃色上一味搗為末和臘月豬脂更搗令熟為丸綿裹如棗許大以內下部因痢出即更納新者不過三度即瘥出第二卷中古今錄驗療五疳蒸下痢方苦參三兩青葙甘草炙各三兩上三味切以水四升煮取二升半分三灌即愈凡蒸但服生地黃汁即瘥又方青黛丁香黃連各等分上三味搗篩用泔澱和為丸口中有瘡含之若下部有瘡以綿裹納下部日服五六十丸含之令下瘥又方丁香麝香別研石黛石鹽山榆仁小柏皮桂心乾薑青礬石燒頭髮灰上十味搗為散著瘡上乾者和臘月豬膏暖著療時行病後食羊肉及肥膩或酒或房而得久蒸絡變為疳必須攻下部不可輕之又療疳濕痢方青葙雄黃研石硫黃研蕪荑雷丸各二兩苦參狼牙各三兩藜蘆一兩炮上八味搗篩為散取如杏仁大納下部中又療疳濕痢神效方黃連三兩零陵香一兩半犀角屑一分丁香三十枚麝香一大豆牛黃一大豆上六味以水洗黃連零陵香丁香澄取清水去滓更以水添滿九升納黃連零陵丁香犀角煮兩沸然後著牛黃麝香煎一沸取一升分作三服如一日服不盡二日服又深師以九升先以一升煮添盡九升取一大升分為三服並出第十卷中久疳痢及久痢成疳方九首廣濟療久患疳痢不瘥兀子礬散方兀子礬八分燒麝香二分研吳白礬六分燒雲母粉五分桂心二分龍骨六分無食子七顆燒黃連八分上八味搗篩為散空腹以生薑汁和三錢匕服日再煮薑湯下又療積年疳痢羸瘦面色痿黃方石硫黃研黃連各一兩艾一兩蜜一升上四味以水二升先煮黃連艾取半升後納石硫黃末更煮三五沸即絞去滓又納蜜更煮三五沸下分為三服並出第四卷中必效療積久痢成疳灌方樗根一握淨洗剝白皮搗絞取汁三合取時勿令見風麻子脂二合燒如車脂酢泔澱一合椒四分汗豉二合上五味以水六升取椒豉和煎絞取汁二升和樗汁麻油泔澱等三味分為兩分用一分灌隔一日更取余者復灌其藥欲用時溫溫即得又療痢初較後膿血或變純白或成魚腦五十日以上或一二年不瘥變成疳所下如泔澱方生羊肝一具上一味取大酢一年以上者米麥並中年深者佳取羊肝則去上膜柳葉切朝旦空腹取肝手拈取酢中出吞之覺心悶則止不悶還服之一日之間能不食粥飯盡一具羊肝者大佳不然除飽吞以外料理如生肝以姜齏下飯如常法食之日食一具肝不過二三具即永瘥後一月不得食熱面油膩醬豬魚雞肉等又療疳痢久不瘥羸瘦著床欲死方新出羊糞一升上一味以水一升漬經宿明旦絞汁頓服之極重者不過三服又療疳法丈夫婦人小兒久痢百方療不能瘥此方最效丁香麝香黃連各等分上三味搗篩為散以杏核大取竹筒吹入下部小兒取核子量力減之不過三四回瘥積年久疳痢不瘥蔡光州云常用奇效備急同並出第三卷中又療久痢變成疳下部窮生惡瘡惡寒壯熱者方桃白皮切一升槐白皮一升苦參切五合艾大棗十枚上五味以水五升煮取二升半去滓納熊膽棗許大攪令勻取二升灌下部餘三分服近效新附療久痢及疳痢諸方不瘥者此方必效揀樗根白皮不拘多少當取時不宜見狗及風上一味細切搗如泥取細面捻作餛飩如小棗勿令破熟煮吞七枚重者不過七八服皆空腹服之又疳痢曉夜無度者方取樗根濃汁一雞子殼許上一味以和粟米泔一雞子殼許灌下部再度即瘥其驗若神小孩兒減半用之醫人褚球錄上數十年痢方一十一首千金療下痢丸主數十年痢下下氣消穀令人能食夏月長時服之令人不霍亂方黃連黃柏桂心大麥蘗一升半乾薑各三兩吳茱萸四兩蜀椒汗半兩曲一升熬炒烏梅二升半上九味搗篩蜜和食已飲服如梧子十丸日三服至二十丸亦可至三十丸又療數十年下痢消穀下氣補羸烏梅肉丸方曲好者一升炒附子炮二兩大麥蘗炒一升當歸三兩桂心三兩黃連吳茱萸烏梅肉乾薑各四兩蜀椒一兩汗上十味搗篩蜜和丸如梧子食已飲服十丸日三又四續丸主三十年疰痢骨立萎黃腸滑不療方雲實五合蠟五兩白者附子炮二兩女萎三兩龍骨二兩上五味搗篩為末以蠟煎烊以丸藥如梧子飲服五丸日三不過五六服必瘥其雲實熬令香千金名臘煎丸又療三十年下痢所食之物皆不消化或青或黃四肢沉重起即眩倒骨肉消盡兩足逆冷腹中熱苦轉筋起止須人扶陰冷無子椒艾丸方赤石脂二兩別末熟艾一升乾薑三兩蜀椒三百枚汗烏梅三百枚醋浸剝取肉上五味先搗篩姜椒為末將熟艾梅肉著一斛酒飯下蒸令飯熟內乾薑椒末赤石脂末合搗三千杵蜜和丸如梧子飲服十丸日三不瘥至二十丸加黃連一升艾一斤又療三十年痢不止方厚朴炙乾薑阿膠炙各二兩黃連五兩石榴皮艾葉各三兩上六味切以水七升煮取二升分再服又療積久三十年常下神效方赤松木皮去上蒼皮二斗上一味為散面粥和一升服之日三即止不過服一斗永瘥秘方三十年痢百日服瘥良並出第十五卷中古今錄驗療三十年寒下及霍亂諸藥所不能療並腸滑若是蠱疰所中方蓼子艾屑各一升龍膽續斷白朮各三兩蜀椒汗附子炮桂心苦參乾薑甘草炙鼠尾草各二兩上十二味搗篩蜜和一歲兒服一丸如梧子三歲兒服二丸五歲兒服三丸大人服五丸飲下療寒熱氣愊愊在胸中卒氣痛繞臍神良廩丘公療下痢三十年方茯苓乾薑黃連等分上三味搗篩為散蜜和丸如梧子飲服之一日漸增至百丸苦痢劇者加龍骨附子炮等分一服十丸漸增之以知為度又當歸湯療三十年下痢止諸痛方當歸一兩生薑八兩大棗二十枚上三味以水四升煮取一升半分作三服不瘥復作之又云吾患痢三十餘年諸療無效唯服此方得愈也安石榴湯療大疰痢及白滯困篤欲死腸已滑醫所不能療方乾薑二兩生薑倍之黃柏一兩細切石榴一枚小者二枚阿膠二兩別研漬之上四味切以水三升煮取一升二合去滓納膠令烊頓服不瘥復作療老小亦良人羸者稍稍服之不必頓盡須臾復服石榴須預取之肘後同一方無黃柏用黃連並出第二卷中又深師療久痢方龍骨赤石脂無食子各六分地榆三分熟艾三月者良三分橡子黃柏各五分上七味搗篩蜜和丸如梧子空腹飲服四十五十丸日二服稍加至六十丸休息痢方五首病源休息痢者胃管有停飲因痢積久或冷氣或熱氣乘之氣動於飲則飲動而腸虛受之故為痢也冷熱氣調其飲則靜而痢亦休也腸胃虛弱易為冷熱其邪氣或動或靜故其痢乍發乍止謂之休息痢也出第十七卷中肘後療休息痢方黃連切龍骨如鴨子大一枚膠如掌大炙熟艾一把上四味水五升煮三物取二升去滓乃納膠膠烊分再服濃煮乾艾葉亦佳又當煮忍冬米和作飲飲之又方乾地榆一斤附子一兩炮上二味以酒一斗漬五宿飲一升日三服盡更作又方龍骨四兩上一味搗如小豆以水五升煮取二升半冷之分為五服又以米飲和為丸服十丸文仲同並出第二卷中文仲葛氏若久下經時不愈者此名為休息下療之方取大骨上一味炙令黃焦搗篩飲服方寸匕日三愈肘後備急同胡洽曲柏丸療數十年休息痢下不能食消穀下氣療虛羸方麥柏炒曲炒各一升附子炮桂心烏梅肉各二兩人參茯苓各四兩上七味搗篩蜜和為丸如梧子食前飲服十丸日三稍稍增之肘後備急同並出第三卷中腹肚不調痢一首廣濟療冷熱不調痢膿水方人參乾薑枳實炙各四分厚朴炙龍骨赤石脂黃連苦參各六分黃芩五分上九味搗篩蜜丸空腹以飲服如大豆十五丸日二漸加出第三卷中泄痢不禁不斷及日數十行方三首集驗結腸丸療熱毒下不斷不問久新悉療之方苦參橘皮獨活阿膠炙芍藥乾薑黃柏甘草炙鬼臼各四分上九味搗篩蜜與膠共烊以和丸並手捻作丸如梧子曝燥以飲服十丸日三不知稍加此方亦療諸疰下及卒下悉效又禪脾丸療脾滑胃虛弱泄下不禁飲食不消雷鳴絞痛方附子炮一兩蜀椒汗一兩桂心二兩赤石脂黃連人參乾薑茯苓大麥柏陳面炒石斛當歸各二兩鍾乳三兩研上十三味搗篩蜜和以酒服十丸如梧子日三稍稍加之出第四卷中文仲療五勞及飽食房室傷胃令人大便數至溷而不能便日數十行劇者下血並婦人產後余疾腹絞痛方附子一枚炮上一味以豬脂如雞子黃大煎附子裂為候削去上黑皮搗篩蜜和丸先食服如大豆三丸日三稍加可至十丸當長服之永不痢出第三卷中下焦虛寒及遠血近血方二首崔氏療下焦寒損或先見血後便此為遠血或痢不痢伏龍肝湯方伏龍肝五合研甘草一兩炙乾地黃五兩燒發灰屑二合黃芩牛膝乾薑生槲皮阿膠各二兩炙上九味切以水七升煮七物取三升去滓下阿膠更煎取烊乃下發分作三服又療下焦虛寒損或前便轉後見血此為近血或痢下或不痢好因勞冷而發續斷湯方續斷當歸桔梗阿膠炙桂心炙三兩乾薑乾地黃芎藭各四兩蒲黃一升甘草二兩炙上十味切以水九升煮八物取三升五合去滓下阿膠更烊膠取沸下蒲黃分為三服並出第四卷中下痢食完出及上入下出方一首範汪溫中湯療寒下食完出方甘草炙乾薑各三兩蜀椒八十枚汗附子一枚炮上四味切以水二升煮取一升分為再服若嘔納橘皮半兩小與老皆取服之良出第十五卷中下痢腸滑方三首範汪苦酒白丸療赤白滯下腸已滑日數十行者方女萎半夏洗各二兩附子炮藜蘆炙去頭各一兩上四味搗合下篩和以十年苦酒頓丸如梧子若有下者飲服三丸日三不知稍稍增之出第十五卷中集驗療下痢腸滑飲食及服藥皆完出豬肝丸方豬肝一斤煮焙乾黃連阿膠炙烏梅肉各二兩胡粉七棋子上五味搗下篩蜜和酒服十五丸如梧子日三稍加亦可散服葛氏文仲胡洽同肘後云亦可散服出第四卷中千金療下痢絞痛腸滑不可差方黃連六兩阿膠鼠尾草當歸乾薑各三兩上五味切以酒七升煮取三升去滓溫分三服若熱不絞痛去乾薑加當歸以水煮之出第十五卷中大注痢及赤白困篤腸滑方二首深師卒大注痢及赤白滯下困篤欲死腸已滑方乾薑二兩生者焙黃柏石榴皮各一兩阿膠二兩半淡豉一升前胡四兩上六味切以水三升煮取三合去滓內膠頓服不差更作無毒宜老小羸人稍稍服之此湯兼療傷寒大下及赤白困篤亦皆主之出第二十六卷中範汪療得病羸劣服藥不愈因作腸滑下痢膿血日數十行復中絞痛身熱如火頭痛如破其脈如澀方黃連四兩苦參二兩阿膠一兩上三味㕮咀以水一斗煮取二升去滓適寒溫服二合日三少少益至半升服湯盡者復合以愈為度曾試驗古今錄驗同痢兼渴方二首病源夫水穀之精化為血氣津液以養藏腑藏腑虛受風邪邪入於腸胃故痢痢則津液空竭藏腑虛燥故痢而兼渴也渴而引飲即痢不止翻溢水氣脾胃已虛不能克消水水氣流溢浸漬肌肉則變成腫也出第十七卷中必效療痢兼渴方麥門冬三兩去心烏梅二大枚上二味以水一大升者煮取強半絞去滓待冷細細嚥之即定仍含之出第二卷中古今錄驗療熱渴痢方冬瓜一枚上一味以黃土厚一尺火炮穩約以水爛去土淨洗絞取服之許仁則痢方七首許仁則云此病有數種有水痢有谷痢有血痢有膿痢有膿血相和痢者有腸澼痢其水痢者本由脾氣熱消穀作水穀氣不得消便生此痢谷痢者由脾氣冷穀氣不消而生此痢血痢者由毒熱在腹血流入腸致有此痢膿痢者由積冷所致膿血相和痢者由冷熱相擊便致此痢腸澼痢者由積冷在腸腸間垢涕不能自固便有此痢色數雖多其源則一皆緣飲食不節將息失宜也又水痢之候心腹甚痛食無妨但食後即痢食皆化盡唯變作水穀無期度多食多下少食少下有此伏者宜依後黃芩等五味散服之方黃芩黃連黃柏各五兩黃耆四兩龍骨六兩上藥搗篩為散以飲下之初服一方寸匕日二服稍稍加至二三匕服差乃止又谷痢之候痢無期度食不消化腹痛每過冷便發有此疾候者宜依後附子等五味散主之方附子炮細辛白朮各五兩乾薑四兩神麯一升上藥搗篩為散以飲下之初服一方寸匕日再服稍稍加至二三匕良又血痢之候小腹絞痛無期度食不住如水但兼血而下有此患者宜依後方犀角五味散方生犀角末五兩阿膠炙四兩黃柏四兩艾葉乾薑各三兩一作干藍上藥搗篩為散以飲下之初服一方寸匕日再服稍稍加至二三匕良又膿痢之候腹亦刺痛食亦不大稀但大便兼膿遇冷而劇有此候者宜依後神麯等五味散服之良曲末一升乾薑六兩丁香豆蔻各四兩高良薑五兩上藥搗篩為散以飲下之初服一方寸匕日再服稍稍加至二三匕良又膿血相和痢候食不甚稀每出膿血與食相兼腹亦小痛有此候者宜依後黃耆等五味散服之方黃耆六兩赤石脂八兩厚朴五兩炙乾薑艾葉炙各二兩上藥搗篩為散以飲下之初服一方寸匕日再服稍稍加至二三匕良又腸澼痢候食稀或稠便但似膿每便極滑痢有常期有如此者宜依後豆蔻子等八味散服之方豆蔻子丁香各三兩細辛附子炮乾薑各四兩人參黃耆各五兩赤石脂六兩上藥搗篩為散以飲下之初服一方寸匕日再稍稍加至二三匕良又前件諸痢患無新舊如藥療之蹔差還發此即縱以新藥止之終存其根本由腸胃中冷熱不調病根固結必須湯藥滌之以泄病勢痢後更以藥物補助之有此候者宜依後附子等六味湯以利之後服高良薑十味散以補之方附子炮細辛甘草炙人參各二兩乾薑三兩大黃五兩上藥切以水七升煮取二升四合去滓分溫三服服如人行十里久一服此湯當得快利利中有惡物如魚腦狀或如桃李但異於常利勿怪之將息經三四日宜合後高良薑等十味散服之方高良薑細辛黃耆白朮苦參各五兩丁香二兩人參乾薑各四兩豆蔻子三兩赤石脂六兩上藥搗篩為散以飲下之初服一方寸匕日再服之稍稍加至二三匕並出上卷中
