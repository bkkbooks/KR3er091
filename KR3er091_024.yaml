body:
  text: 卷第二十四癰疽方一十四首集驗癰疽論黃帝曰夫子言癰疽何以別之岐伯答曰榮衛稽留於經脈之中則血泣而不行不行則衛氣從之從之而不通壅遏不得行故熱大熱不止熱勝則肉腐肉腐則為膿然不能陷肌膚於骨髓骨髓不為焦枯五臟不為傷故命曰癰黃帝曰何謂疽岐伯答曰熱氣純盛下陷肌膚筋髓骨肉內連五臟血氣竭盡當其癰下筋骨良肉皆無餘故命曰疽疽者其上皮夭瘀以堅亦如牛領之皮癰者其上皮薄以澤此其候黃帝曰善出太素第十六卷中經言五臟不調致疽六腑不和生癰一曰熛疽急者二三日殺人緩者十餘日殺人二曰癰疽急者十餘日殺人緩者一月死三曰緩疽急者一年殺人緩者數年四曰水疽所發多在手足數年猶可療疽者數十種要如此千氏法癰之疾所發緩地不殺人所發若在險地宜令即外消若至小膿猶可療大膿致禍矣一為腦尸二為舌本三為玄癰四為喉節五為胡脈六為五臟俞七為五臟系八為兩乳九為心鳩尾十為兩手魚十一為腸屈之間十二為小道之後十三為九孔十四為兩腨腸十五為神主之舍一本云主客之舍凡十五處不可傷而況於癰乎若癰發此地遇良醫能不及大膿者可救至大膿害及矣範汪同候賊風證但夜痛應骨不可按抑不得回轉痛處不壯熱體亦不乍寒乍熱但覺體瘮瘮然冷欲得熱熱尉痛處即小寬時有汗此是賊風證也宜即得針灸服療風藥溫也方在療風候上大法宜知二候如此也又初得附骨疽即服漏蘆湯下之敷小豆薄得消也又下利已腫處未消者可除大黃用生地黃及乾地黃隨時也熱漸退餘風未歇者可服五香連翹湯除大黃餘熱未消可敷升麻膏佳若失時不消成膿者用火針膏散如療癰法又有䐔疾喜著四肢其狀赤脈起如編繩急痛壯熱其發於腳者喜從躡蹀起至踝赤如編繩謂之䐔病也又其發於臂者喜腋下起至掌也皆由四肢勞熱氣盛為涼濕所折風結筋中成此疾也不即療取消潰去膿則筋攣縮也其若但置不消復不潰其熱歇氣不散喜變作䐔也又療之宜服漏蘆湯令下外以鋒針針去血氣針寫上結脈處敷小豆薄則消也皆可依療丹法消之及潰成膿出火針敷膏散如療癰法也又亦用甘蕉根薄之瘥又癰發腫高者病源淺腫下者病源深大熱者易療小熱者難療初便大痛傷肌晚乃大痛傷骨都堅者未有膿半堅半軟者有膿發腫都軟血瘤也非癰發腫以漸知長引日月亦不大熱時時牽痛瘤也非癰吳音曰謂諸氣結亦有腫久久不消成癰療之宜散氣氣已散若初腫處有浮氣年衰皆發癰療之宜及年盛並折散熱可無此憂於氏法夫癰疽脈洪粗難療脈微澀者易療諸浮數之脈應當發熱而反惡寒者癰也此或附骨以有膿也趙乃言無虛勞腹中疾或發血瘤瘡瘡狀墳起頭墨正爾置不當灸療療之火尉便焦爛剝刮去焦痂則血泄不可禁必死癰起於節解遇頑醫不能即消令至大膿者豈膏藥可得復生乎又發癰堅如石走皮中無根瘰癧也久不消因得他熱之疾時有發為癰也又發癰至堅而有根者名為石癰療之法當服酒非酒即藥勢不宣但當稍飲取令相得和散便止凡癰腫有肥人用貼宜栝蔞根和平體宜赤小豆貼方以赤小豆五合納苦酒中熬之畢搗為散以苦酒和之塗拭紙上貼腫從發腫兩頭以下範汪同又論少小有渴年四十以外多發癰疽有膈痰而渴者年盛必作黃疸年衰必發癰疽也範汪同又黃帝曰願聞癰疽之形與其期日岐伯曰略説癰疽之極者十八種又癰疽發咽名曰猛疽猛疽不療則血化為膿膿不瀉塞咽半日死其化膿者瀉已則含豕膏無冷食三日而已一去無食又發於股胻名曰股脫疽其狀不甚變而癰腫膿搏骨不急療三十日死髀內曰股股外曰髀膝上股下骨稱曰股胻也又發於脅名曰改訾改訾者女子之疾也久之其狀大癰膿其中乃有生肉大如赤小豆療之方銼連翹草及根各一升以水一斗六升煮令竭取三升即強飲厚衣坐釜上令汗出至足已又發於尻者名曰鋭疽其狀赤堅大急療之不療三十日死又發於脛者名曰兔齧其狀赤至骨急療之不療害人又發於足上下者名曰四淫其狀大如癰不急療百日死又發於肩及臑者名曰疵疽其狀赤黑急療之此令人汗出至足不害五臟癰發四五日逆𤋲之上灸百壯石子當碎出也不出可益壯從癰發高下以後範汪並同又石癰者始發皮核相親著不赤頭不甚堅微痛熱熱漸自歇便堅如石故謂之石癰難消又不可得自熟縱愈皆百餘日也又發癰兩頭牽而傍推無根者又不痛結筋非癰也發癰狀如蚢雖極大此肉瘤非癰也腫一寸至三寸癤也三寸至五寸癰也五寸至一尺癰疽也一尺至三尺名曰竟體疽腫成膿九孔皆出諸氣憤郁不遂志欲者多發此疾癰及疽血瘤鼠乳石癰結筋瘤癧皆不可就針角針角少不及禍者凡癰疽之疾未見膿易療之當上灸三百壯四邊間子灸各二百壯實者可下之虛者可補之有氣者下其氣服占斯內塞散得愈絶房三年凡癰瘡審知膿者破之皆當近下邊膿出後當膏藥兌之常使開潤勿令燥合也若其人羸勿一頓盡膿徐徐令後稍出乃盡癰方潰其上皮薄人喜當上破之此終不愈當下破之乃得膿耳勿要其皮厚也凡癰有膿當破無膿但氣腫若有血慎不可破針灸也按之四邊堅中軟此為有膿瀋也一邊軟亦有膿都堅者此為菹核或但有氣也都軟者此為有血血瘤也當審堅軟虛實為要若堅疽積久後若更變熟偏有軟處不可破者疽當暖裹置耳若灸刺破療必暴劇不可救及結筋腄馳偽切肉鼠乳皆不當療也又服內塞散不與他療相害晝夜十餘度服散當以酒又發於腋下堅赤者名曰米疽療之用砭石欲細而長疏啓之塗以豕膏六日已勿裹其癰堅而不潰者為馬刀挾纓急療之太素經曰頸前已纓又發於股陰者名曰赤弛不急療六日死在兩股之內不可療一云六十日死又發於膝者名曰疵疽其狀大癰色不變寒熱如堅石勿石石之死須其柔色異乃石之者生冷石尉之柔乃破之準例之也又諸癰腫之發於節而相應者不可療太素經云膈八節門故不可療也又發於陽者百日死又發於陰者三十日死丈夫陽器曰陽婦人陰器曰陰又發於踝者名曰走緩其狀肉色不變數石其輸而止其寒熱不死又發於足傍者名曰厲疽其狀不大初從小指發急療之去其黑者不消輒益不療百日死云足側也又發於胸者名曰背疽狀如大豆三四日起不早療下入腹入腹不療十日死太素經云寒熱不去十日早死又發於足指者名曰脫疽其狀赤黑死不療不赤黑可療療不衰急斬去之得活不去者死又發於膚者名曰舌疽其狀如谷實瓜蔞常苦寒熱急療之去其寒熱不療十歲死死後出膿又發於頸者名曰夭疽其狀大而赤黑不急療則熱氣下入淵腋前傷任脈內熏肝肺十餘日死太素經曰項曰前曰頸一云發頭以前十八種並千金論曰夫癰疽初發人皆不以為急此實奇患唯宜速療若療不速病成難救以此致禍者不一發皆外皮薄為癰皮厚為疽宜急治之夫癰壞後有惡肉者以豬蹄湯洗去穢次敷食肉膏散惡肉盡敷生肉膏散及摩四邊令善肉速生當斷絶房室慎風冷勞煩待筋脈平復乃可任意耳不爾新肉易傷傷則重潰發發則禍至慎之慎之凡癰疽始發或似小節或復大痛或復小痛或發如米粒大白膿子此皆微候宜善察之見有少異即須大驚忙須急治之及斷口味速服諸湯下去熱毒若無醫藥即灸當頭百壯其大重者灸四面及頭上二三百壯壯數不慮多也復敷冷藥貼膏種種救療必瘥也又其用藥貼法皆須當瘡中處開孔口令泄瘡熱氣出亦當頭以大針針入四分即瘥身中忽有痛處似打狀名曰氣痛痛不可忍遊走不住發作有時痛則小熱痛定則寒此皆由冬受溫風至春暴寒風來折之不成溫病乃作氣痛也又宜先服五香連翹湯摩丹參膏又以白酒煮楊柳皮及暖尉之有赤氣點點刺出血也其連翹湯可服數劑及竹瀝湯勿以一劑未效便謂即止遂不服耳中間將白薇散佳素問曰寒氣客於經絡血凝滲澀不行擁結為癰疽也不言熱之作也其後成癰又陽氣湊集寒化為熱熱盛則肉腐為膿也又以酢和蜂蛤灰塗之干即易瘥即止凡腫根廣一寸以下名癤一寸以上名小癰如豆粒大者名皰子皆始作急服五香連翹湯下之數劑取瘥止並出第二十三卷中廣濟療癰疽排膿散方黃耆十分膿多倍青小豆一分熱口乾倍芎藭三分肉不生倍芍藥三分痛不止倍白蘞三分有膿不合倍栝蔞三分若渴小便利倍甘草三分炙上七味為散酒服方寸匕日三服不利忌海藻菘菜熱面魚蒜等千金同一方無白蘞甘草又療發癰疽排膿散方人參二兩當歸二兩桂心二兩芎藭一兩厚朴一兩炙甘草一兩炙防風二兩白芷二兩桔梗一兩上九味搗篩為散以酒服方寸匕日二服不利若瘡未合常服之忌生冷菘菜海藻生蔥蒜並出第五卷中劉涓子療癰疽先宜敷大黃食肉膏方在發背部千金方食惡肉散後用大黃附子等十物者乃是次兌膏方當歸芎藭白芷各二兩烏頭一兩巴豆二十枚去皮松脂二兩豬肪二分上七味㕮咀納膏中微火合煎三沸已納松脂攪令相得以綿布絞去滓以膏著綿絮兌頭大瘡雖深兌之膿自出就兌盡即生善肉瘡淺者不足兌著瘡中日三惡肉盡即止又療癰疽發壞出血生肉黃耆膏方黃耆一兩芍藥一兩當歸一兩大黃芎藭獨活白芷薤白生地黃各一兩上九味切豬膏二升半煎三上三下膏成絞去滓敷兌瘡中摩左右日三文仲同並出第四卷中又療癰疽瘡生肉黃耆膏方黃耆細辛生地黃蜀椒當歸芍藥薤白白芷芎藭丹參各一兩豬膏一升半臘月者甘草蓯蓉獨活黃芩各一兩上十五味以苦酒一升二合夏月漬一宿冬月二宿微火煎三沸煮酒氣盡成敷之又療癰疽始作便壞熱毒發瘡膏方羊髓一兩甘草二兩胡粉五分一法五兩大黃一兩豬膏二升上五味切合膏髓煎二味煬納甘草大黃三上三下絞去滓內胡粉絞令調和敷瘡上日五度又療癰疽已潰白芷摩膏方白芷甘草各二分烏頭三分薤白十五挺青竹茹雞子大一枚上五味切以豬膏一升合煎白芷黃膏成絞去滓塗瘡四邊勿著瘡中並出第五卷中深師內塞散療癰疽潰漏血脈空竭方黃耆細辛芍藥薏苡仁白芷瞿麥各二兩赤小豆七兩乾地黃人參防風各二兩上十味切先以新成白苦酒置新器中納赤小豆須臾出銅器中熬令燥復須納苦酒中更熬凡五反止合搗為散酒服方寸匕日夜六七過腹痛甚倍芍藥口未閉倍薏苡仁膿多倍黃耆出第二十八卷中刪繁療癰疽等毒潰爛豬蹄洗湯方豬蹄一具治如食法薔薇根一斤甘草五兩炙芍藥五兩白芷五兩上五味切以水二斗煮豬蹄取八升去滓下諸藥煮取四升稍稍洗瘡出第九卷中千金翼黃帝問曰有疽死者奈何岐伯曰身有五部伏菟一朓二一云膊背三五臟之腧四項五五部有疽死也刪繁同本出靈樞又王不留行散主癰疽及諸雜腫潰皆服之亦療癰腫不潰苦困無賴方野葛皮半分五色龍骨五兩王不留行子二升千金方用三合翼云一升桂心一兩當歸二兩乾薑一兩栝蔞末六合上七味為散食訖溫酒服方寸匕日三以四肢習習為度不知漸漸加之此浩仲堪方隨日濟闍黎施行實為神散癰腫即消此方妙千金同出第十四卷中癰腫方二十五首集驗療癰腫大按乃痛者病深小按便痛者病淺按之處陷不復者無膿按之即復者有膿若當上破者膿出不盡不盡稍深蝕骨骨碎出當以魚導側際從下頭破令膿出盡出盡則骨生愈矣若惡肉不盡者食惡肉藥去之膏塗之即愈食肉藥方取白荻灰水淋之煎令如膏此不宜預作作之十日則歇並可以去黑子黑子藥注便即拭去不時拭則傷膚又一方以桑皮灰亦妙凡破諸病肉厚處當先廣封四面不爾瘡披裂氣泄便死不可救也以前範汪同有久癰余瘡為敗癰深疽有脛間喜生瘡中外惡瘡霜寒凍不瘥經年或骨疽亦名脛瘡深爛青黑四邊堅強中央膿血惡汁出百藥療不瘥汁漬好肉處皆腫亦有碎骨從中出者可溫赤龍皮湯洗之夏月日日洗之冬日三日四日一洗潰肉多者可時敷白䕡茹散食去之可一日之中三四敷之止後長敷家豬屎散得瘥也取豬屎燒作灰下絹篩以粉疽敗瘡中令滿汁出脫去便敷之長敷須差也若更生青肉復著白䕡茹微如前法也出第八卷中千金翼凡五子日夜半五丑日雞鳴五寅日平旦五卯日日出五辰日食時五巳日禺中五午日日中五未日日眣五申日晡時五酉日日入五戌日黃昏五亥日人定右以此日時遇疾發者皆不起也出第二十三卷中廣濟療癰腫腫潰內服藥外宜貼膏方松脂一斤煉者膒脂三合生椒葉一兩白蠟三兩蛇銜一兩黃耆一兩芎藭一兩白芷一兩當歸一兩細辛一兩芍藥一兩上十一味切以水先煎脂蠟煬盡納諸藥三上三下白芷色黃膏成用剪故帛可瘡大小塗膏貼上日夜各一又療癰腫膿潰瘡中有紫肉硬不消以此散兌頭內蝕之方石硫黃一分研馬齒礬石二分熬令汁盡漆頭䕡茹二分麝香二分研雄黃二分雌黃一分研白礬二分熬令汁盡丹砂二分研上八味搗篩為散攪令調熟以敷瘡中瘡惡肉上貼膏日二易千金並翼深師同並出第三十卷中劉涓子療癰腫方白蘞烏頭炮黃芩各等分上三味搗下篩和雞子白敷上即愈出第十卷中療癰腫有熱黃耆貼方數用神驗甘草炙大黃白蘞黃耆芎藭上五味各等分搗篩以雞子黃和如濁泥塗布上隨赤熱有堅處大小貼之燥易甚效刪繁療癰腫白蘞薄貼方白蘞當歸芍藥大黃莽草芎藭上六味各等分搗篩下雞子黃和如泥塗布隨大小貼之燥易又療癰腫堅核不消白蘞貼之方白蘞大黃赤石脂芍藥莽草黃芩黃連茱萸上八味各等分搗篩以雞子黃和如濁泥塗布上隨核大小貼之燥易又療癰腫黃耆貼之方通按腫一作疽黃耆一兩半黃芩一兩芎藭一兩黃連白芷芍藥各二兩當歸一兩半上七味搗篩以雞子白和如膏諸暴腫起處以塗著布上已貼燥易腫處不覺貼冷便愈熱勢毒者加白蘞一兩尤佳又療癰腫黃耆貼方黃耆大黃白芷牡蠣熬白蘞上五味各等分搗篩和雞子貼燥易又療癰腫已潰四物黃連薄貼方黃連黃柏地榆白芷各一兩上藥搗篩雞子白和塗布敷癰上對瘡口穿布出癰氣令疏氣又療癰腫一物栝蔞薄貼方以栝蔞根隨多少止一物切五片納苦酒中熬燥搗篩之苦酒和塗紙上以貼癰腫上服散人宜用並出第九卷中千金療癰腫松脂貼方當歸黃耆黃連芍藥蠟黃芩芎藭大黃各一兩細切松脂一斤半膒脂一合半上十味切以微火煎之三上三下綿布絞去滓向火炙塗生箋紙上隨大小貼之一日三度易之即瘥又療腫蒺藜散方蒺藜子一升熬令黃上一味搗篩以麻油和之如泥炒令焦黑以塗故布上剪如腫大勿開頭箋上無蒺藜子用小豆和雞子如前干則易之甚妙又箋湯方大黃黃芩白蘞各三兩芒硝六分上四味以水六升煮取三升以故帛四重納汁中以箋腫上暖復易晝夜為之翼同又癰腫痛煩困方以生楸葉十重貼之以布綿裹緩急得所日二易止痛消腫食膿血良無比勝於衆貼冬以先收乾者臨時鹽湯沃潤用之亦可薄削楸皮用之備急張文仲肘後同又諸癰腫牢堅諸藥不療方削附子如棋子厚一指正著腫上以少唾濕附子火炙附子令熱徹附子欲干輒令更唾濕之常令附子熱氣入腫中無不愈者此法絶妙並出第二十三卷中千金翼黃耆湯主癰腫熱盛口乾除熱止渴方黃耆升麻栝蔞乾地黃各二兩麥門冬去心芍藥各二兩黃苓一兩半梔子二十枚擘上八味切以水一斗煮取三升分三服劉涓子用升麻一兩梔子十四枚余藥同又白蘞薄貼主癰腫方白蘞大黃黃芩各等分上三味搗篩和雞子白如泥塗布上薄貼腫上干則易之可以三指撮藥末納三升水中煮三沸綿注汁拭腫上數十遍以寒水石末和塗腫上以紙覆之干則易之一易輒以煮汁拭之日夜三十度劉涓子同又療癰腫方伏龍肝以大酢和作泥塗布上貼之干則易之消矣又凡腫已潰未潰者方以膠一片水漬令軟納納然稱腫之大小貼當頭上開孔若已潰還合者膿當被膠急撮之膿皆出盡未有膿者腫當自消矣又方燒鯉魚作灰酢和塗之一切腫上以瘥為度至良又溫中湯主癰腫取冷過多寒中下利食完出方甘草炙乾薑附子各六分炮蜀椒二百四十枚汗上四味切以水六升煮取二升分三服忌海藻菘菜豬肉冷水劉涓子同出第二十三卷中張文仲劉涓子療癰消膿木占斯散方木占斯桂心人參細辛敗醬乾薑厚朴炙甘草防風桔梗各一兩栝蔞一兩上十一味搗為散服方寸匕入咽覺流入瘡中若癰及疽灸亦不能發壞者可服之瘡未壞者去敗醬已壞發膿者納敗醬此藥時有化癰疽令成水為妙隱居必效方消癰腫白蘞二分藜蘆一分上二味搗為末以苦酒和如泥貼腫上日三大良備急同出第五卷中石癰方五首千金堅如石核覆大色不變或作石癰療之煉石散方鹿角八兩一作白灰白蘞三兩粗理黃石一斤酢五升先燒石令赤內酢中復燒內之酢盡半止上三味搗篩作細末以余醋拌和如泥厚塗之干即塗取消止盡更合諸漏瘰癧藥悉皆主之並須火針瘡上塗膏又方單磨鹿角半夏塗不如上方佳也集驗文仲小品古今録驗同又療石癰堅如石不作膿方以生商陸根爛搗敷之燥則易又治腦漏及諸癰癤古今録驗同又方以蜀桑根白皮陰乾搗末消膠以酒和敷上即救出並出第二十三卷中備急療若發腫至堅而有根者名曰石癰也方灸腫三百壯當石子破碎出如不出益壯乃出其癰疽石癰結筋瘰癧皆不可針角針角殺人集驗文仲千金同出第四卷中癰癤方一十四首劉涓子療癰癤諸腫有熱方地黃三斤洗細切上一味以水一斗煮取三升去滓煎湯令小厚以塗紙當瘡中央貼之日再三易數用大良並療牛頷上腫出第十卷中集驗療癰及癤如結實赤熱者方以水磨半夏塗之燥復更塗得流便消也出草中可自掘生半夏乃佳此療神驗勿不信也出第八卷中千金療凡癤無頭者方吞葵子一枚即出勿多服頭多也又方燒葛蔓灰封上自消又方牛糞封之佳又方以鼠黏葉貼之又方用水和雀糞敷之又方狗頭骨蕓薹子上二味等分為末和酢封之又療癰癤潰後膿不斷及諸物刺傷不瘥方取石硫黃三兩粉之一味筋一片磓頭令碎少濕之納石硫黃中刺瘡孔以瘡瘥為度通按筋字可疑又幹地黃丸主虛熱消瘡癤方乾地黃四兩大黃六兩桂心二兩芍藥三兩茯苓三兩王不留行二兩黃芩二兩麥門冬二兩去心遠志二兩升麻二兩人參二兩甘草二兩炙枳實二兩炙上十三味搗篩蜜和丸如梧子大酒服十丸日三加至二十丸長服令人肥健翼同又地黃煎方補虛除熱可將和服取利也散石癰疽癤痔熱悉宜服百日癰疽永不發也取生地黃隨多少三搗三押取汁令盡一味以新布重絞其汁澄清置銅器中湯上煮之減半復下更新布絞去粗碎結濁者滓穢盡復煎之濃竭令如飴糖置瓷器中酒服如彈丸大日三勿加至百日服之有驗又梔子湯主表裡俱熱三焦不實身體生瘡或發癰癤大小便不利方芒硝二兩大黃四兩梔子二七枚擘黃芩二兩知母二兩甘草二兩炙上六味切以水五升煮減半下大黃煮取一升八合去滓納芒硝二兩分三服忌海藻菘菜並出第一十三卷中千金翼論曰一切癰疽皆是瘡痕根本所患癰之後膿汁不止得冷即是鼠瘻是以漏方次之大須急救之馬齒草五升切槲白皮一斤水五升煮取一升澄清麝香半臍乾之仍研作末杏仁半升油煎令黑搗如膏上四味以瓷器貯之合和以三四重綿密系口病已成瘡者以泔清淨洗拭乾剪作貼子塗藥貼著瘡上日三易若未作瘡如作瘰癧子者以艾一升熏黃如棗大乾漆如棗大末之釜月下土三味並末和艾作炷灸三七壯本方療鼠瘻出第二十三卷中又主癤腫方生椒末曲末釜月下土末之以大酢和敷之並出第二十四卷中附骨疽方八首千金診附骨疽法凡附骨疽者無故附骨成膿故名附骨疽喜著大節解中丈夫産婦喜著胯髀嬰兒亦著脊背丈夫急者先覺痛不得動搖按之應骨痛經日便覺皮肉漸急洪腫如肥狀是也小兒才近便大啼呼即是肢節有痛候也大人緩者先覺肥洪洪然經日便覺痹痛不隨小兒四肢不能動搖亦如不隨狀著肢節解中有洪洪處不知是附骨疽令遍身成腫不至潰死體皆青黯大人亦有不別是附骨疽呼為賊風風腫也又凡人身體患熱當風取涼風入骨解中風熱相搏便成附骨疽其候嗜眠沉重忽忽耳鳴又秋夏露臥為冷所折風熱伏結而作此疾急者熱多風少緩者風多熱少小兒未知取風冷何意而有此疾由其血氣盛肌嫩漸為風冷折之即腠理凝結故也又凡骨疽者久瘡不瘥瘥而復發骨從孔中出名為骨疽方以豬膽和楸葉搗封之又方搗白楊葉下篩敷之又方穿地作坑口小里大深三尺取乾雞屎五升以艾及荊葉和之令可燃火令煙出納疽孔坑中以衣擁坑口勿泄煙半日許當有蟲出又癰疽敗及骨疽方末龍骨粉瘡四面厚二分又方用自死蝦蟆一枚頭髮一把以豬膏一片半納二物煎之消盡下之欲冷納鹽一合攪和以膏著瘡中日一易蟲出如發蟲盡愈又骨疽百方療不瘥方可瘡上以艾灸之三日三夜無不愈也並出第二十三卷中備急若骨疽積年每一年一發汁出不瘥方取膠熬搗末粉勃瘡上及破生鱧魚以㩉之如食頃刮視其小蟲出更洗更敷蟲出盡止備急文仲同又療疽瘡骨出方黃連牡蠣各二分熬上二味末先以鹽湯洗以粉之文仲同出第四卷中瘭疽方一十六首集驗論胸中痛少氣急入暗中以手掩左眼竟視右眼見光者胸中結癰也若不見光瘭疽內發若吐膿血此不療之疾宜以灰掩膿血上不爾著傍人也又齒間臭熱血出是瘭疽也七日死療所不差宜以灰掩地血瘭疽喜著指與代指相似人不別者亦呼作代指不急療其毒逐脈上入臟殺人也南方人得此疾皆斬去指恐其毒上攻臟故瘭疽著指頭者其先作黯疱然後腫赤黑黯瘮痛入心是也出第八卷中千金瘭疽論説曰瘭疽者肉中忽生點子如豆粒小者如黍粟劇者如梅李或赤黑青白不定一種其狀有根不浮腫痛瘮應心根深至肌少久便四面悉腫疱黯黯紫黑色能爛壞筋骨也毒散逐脈入臟殺人南方人名為榻著毒著厚肉處即割去之亦燒鐵烙疱上合焦如炭亦疱上灸百壯為佳單搗酸草葉敷腫四面防其長大飲葵根汁及藍青汁若犀角汁升麻汁竹瀝汁黃龍湯諸單療折其勢耳其病亦喜著指故與代指相似人不識之呼作代指不急療之亦逐脈上入五臟殺人南方人得之皆斬去指疽著指初指頭先作黯疱然後腫赤黑黯瘮痛入心是也復有惡肉病者身上忽有肉如赤豆粒突出便長推出如牛馬乳上如雞冠狀不療自長出不止不痛癢此由春冬時受惡風入肌脈中變成此疾療之宜服漏蘆湯外燒爍日日為之令焦盡竟以升麻膏敷之積日乃瘥備急同出第二十三卷中劉涓子療瘭疽侵淫廣大羊髓膏方羊髓二兩大黃甘草炙胡粉各二兩上四味㕮咀以豬膏二升半合煎微火三上三下絞去滓敷日四五深師云兼療赤黑爛壞成瘡出第五卷中千金療瘭疽著手足肩背纍纍如米起色白刮之汁出愈復發方黃耆六分款冬花二分升麻四分附子一分炮苦參一分赤小豆一分上六味下篩酒服半錢匕漸增至一錢日三服範汪方無苦參有赤小豆又方虎糞白者以馬尿和之曝令乾燒灰粉之翼同又方胡粉青木香龍骨滑石各二兩上四味下篩以米粉一升和之稍以粉之日四五又方灶室塵灶突中墨灶釜底土各一升上三味合研令勻以清水一斗煮三沸取汁洗瘡日二三度又凡瘭疽手足肩背忽纍纍如赤小豆刺之汁出者是療之方剝卻瘡皮溫泔清洗胡燕窠和百日男子屎塗之又方熬蕪菁子熟搗綿裹敷之勿止文仲備急附後同又方熬麻子末摩上日五六度又方面和酒敷之又方鯽魚三寸長者亂髮如雞子大豬脂一斤煎以成膏塗之又療瘭疽祕方世所不傳神良無比射干甘草炙升麻枳實炙各二兩大黃十分麝香二分研乾地黃二兩犀角六分屑前胡三兩本方云三分上九味切以水九升煮取三升分三服瘥止不限劑數翼同深師加黃芩十分余同又瘭疽漏蘆湯方漏蘆白蘞黃芩麻黃去節白薇枳實炙升麻芍藥甘草各二兩炙大黃三兩上十味切以水一斗煮取三升分三服無藥單用大黃下之良張文仲備急並翼並同又升麻膏方升麻白薇漏蘆連翹芒硝各二兩黃芩蛇銜枳實各二兩炙梔子仁二十枚蒴藋四兩上十味切搗破令細後以水三升漬半日以豬膏五升煎水氣竭去滓敷諸丹毒皆用及熱瘡腫上並日三易之升麻㧺湯方升麻漏蘆芒硝各二兩梔子二十枚黃芩三兩上五味切以水一斗合蒴藋五兩煮取七升冷㧺諸丹腫上常令濕內宜服漏蘆湯甚佳又瘡瘭疽侵淫多汁日就浸大胡粉散方胡粉二分熬黃連三分甘草三分炙䕡茹二分上四味下篩以粉瘡上日三翼文仲備急深師同並出第二十三卷中千金翼薄㩉湯主瘭疽侵淫欲作未成或如桃李核或如雞子赤焮方甘草炙黃芩大黃黃連當歸芒硝各兩上六味切以水一斗煮取三升絞去滓鐺中下芒硝一沸攪之貼布帛中以㩉腫上數百遍劉涓子深師同出第二十三卷中緩疽方四首集驗論有緩疽者初結腫形似癰回回無頭尾其色不異但痛深有根核又與皮肉相親著外耳一名內癰其有大者如拳小者如桃李狀積日不消喜變紫色黯黑久即皮內俱爛如牛領瘡狀便通體遍青黯色而不作頭穿潰出膿初作服五香連翹湯鑱去血以小豆薄塗之其間數針鑱去血又薄之取消也若不消色未變青黯者以煉石薄之若失時不得療已爛者猶服五香連翹湯及漏蘆湯下之隨熱多少投方也外以升麻湯拓洗之薄升麻膏若生臭惡肉者可以單行一物白䕡茹散敷之青肉去盡便停也好肉既生但敷升麻膏良不生單敷一物黃耆散也若敷白䕡茹散積日青惡肉不盡者可以漆頭赤皮䕡茹取半錢匕和三大錢匕白䕡茹散中合和敷之惡肉去盡還以淳用白䕡茹散也視好肉欲生可敷黃耆散也黃耆散方白䕡茹散方漆頭䕡茹散方並一味單行隨多少搗篩為散出第八卷中範汪飛黃散療緩疽惡瘡食惡肉方取丹砂著瓦盆南雌黃著中央磁石北曾青東白石英西礜石上石膏次鍾乳下雄黃覆雲母薄布下各二兩先搗篩瓦盆中以一盆覆上羊毛泥令厚作三隅灶燒之以陳葦一日成取其飛者使之甚妙又療緩疽以飛黃散食惡肉令盡作土灶熏之方雄黃一兩雞白屎一兩藜蘆一兩丹砂一兩干鰻鱺魚一兩上五味搗下篩青布裹之熏經三日乃止止畢要以蛇銜膏摩之良簡範汪方無蛇銜膏崔氏方附於後並出第三十一卷中崔氏蛇銜膏療癰腫瘀血産後血積耳目暗等牛領馬鞍瘡方蛇銜一兩大黃附子去黑皮芍藥當歸細辛黃芩大戟椒去目莽草獨活各一兩薤白十四莖上十二味並切之以苦酒淹之一宿以不中水成煉豬膏二升龍銜藤一兩合膏煎名龍銜膏今又有龍草似蛇銜而葉大耳亦有取其根合煎者亦名龍銜膏出第二卷中小品療緩疽初作即以小豆薄塗之亦消也出第十卷中發背方四十一首其乳石發背自有正方在第三十八卷中具述千金論曰凡發背皆由服餌五石寒食更生散所致亦有單服鍾乳而發者又有生平不服諸石而自發背者此是上代有服之者其候率多於背兩胛間起初如粟米大或痛或癢仍作赤色人皆初不以為事日漸長大不過十日遂至不救其臨困時方圓徑三四寸高一寸瘡有數十孔以手按之諸孔之膿皆反出尋即失音不言所以養生者小覺背上痛癢有異即取淨土冷水和泥捻作餅子徑一寸半厚二分以粗艾大作炷灸泥上貼著瘡上灸之一炷一易餅子若粟米大時可灸七餅即瘥若榆莢大灸二七炷即瘥至錢許大日夜灸不住乃瘥並服五香連翹湯及鐵漿諸藥攻之乃愈又常以冷水射之漬冷石尉之日夜勿止待瘥住手此病忌面酒肉五辛等亦有當兩腎上發者又論曰凡服石人皆須大勞役四體無得自安如其不爾多有發動亦不得遂便恣意取暖稱適已情必須違欲以取寒凍雖當時不寧於後在身多有所益終無發動之慮又發背方凡腫起於背胛中頭白如黍粟四面相連腫赤黑令人悶亂者名發背也即禁房慎蒜面不速灸治即入內殺人灸當瘡上七八百壯有人不識多作雜腫療之皆死又方取亂髮灰酒服方寸匕又方以三年酢滓微火煎令調和牛脂封上日一易又方取狗牙灰酢和敷之又方取豬羊脂封之亦療髮乳又方以蛇頭灰水和敷之又方飲鐵漿三升下利為佳又方以鹿角灰酢和塗之古今録驗同又方燒古蚌末之如粉雞子白和敷上日三即瘥止又發背及癰疽潰漏並未潰毒腫方栝蔞榆皮胡燕窠蚡鼠土女人月水布洗取汁上五味並須等分以月水汁和如泥封腫上干即易之潰者四面封已覺即封從一日至五日令瘥翼同又療癰疽潰漏發背及小小瘰癧李根散方李根半夏洗栝蔞各一升甘草二兩炙葛根三兩桂心四兩當歸二兩通草一兩芎藭一兩半白蘞一兩桔梗二兩厚朴炙黃芩各一兩芍藥四兩附子一兩炮上十五味為散酒服方寸匕日三瘡大困者夜再服有患發背骨出身有三十餘癰癤服此瘥忌羊肉餳海藻菘菜豬肉冷水生蔥範汪同又治諸虛不足發背癰疽經年瘥後復發或由大風聚結毒氣在內閉塞夏月已來出攻於背久不療積聚作膿血為瘡內漏大內塞排膿散方山茱萸五味子茯苓乾薑各六分當歸四分附子二分炮肉蓯蓉八分石斛五分菟絲子三分酒漬巴戟天八分瞿麥三分一云地麥地膚地膚子也遠志八分去心人參五分甘草五分炙麥門冬八分去心石葦四分芎藭四分芍藥五分乾地黃八分桂心五分上二十味為散酒服方寸匕日三夜一稍加至兩匕長服終身不發癰癤忌同前又內補散療癰瘡發背方蜀升麻黃芩人參各二分乾薑白蘞桂心甘草炙附子炮防風各一兩芎藭一兩赤小豆上十一味為散酒服方寸匕日三夜再一云蜀椒非又內補散主癰疽發背已潰排膿生肉方當歸桂心人參各二兩芎藭厚朴炙桔梗甘草炙防風白芷各一兩上九味為散酒服方寸匕日三夜再瘡未合服勿停忌範汪同又瞿麥散主排膿止痛利小便方瞿麥二兩芍藥二兩桂心半兩赤小豆半合芎藭半兩白蘞半兩黃耆一兩當歸二兩麥門冬二兩去心上九味為散先食溫酒服方寸匕日三忌生蔥翼深師同又薏苡仁散主令癰自潰長肌肉方薏苡仁桂心乾薑白蘞當歸肉蓯蓉各一兩上六味為散先食溫酒服方寸匕日三夜再翼同又黃耆竹葉湯主胸背遊熱癰疽方生地黃八兩黃耆甘草炙芍藥黃芩各三兩人參石膏碎芎藭當歸各二兩生薑五兩大棗三十枚擘半夏四兩洗淡竹葉切一升麥門冬去心三兩上十四味以水一斗二升煮竹葉取九升去滓納藥煮取三升分四服相去如人行五六里再服日三夜一忌海藻菘菜羊肉餳古今録驗同又排膿內塞散主大瘡熱已退膿血不止瘡中肉虛疼痛方防風茯苓白芷桔梗遠志去心甘草炙人參芎藭當歸黃耆各一兩桂心二分附子炮二枚厚朴二兩赤小豆五合熬上十四味搗散酒服方寸匕日三夜一忌同前又麝香膏主諸惡瘡及癰疽發背上惡肉方麝香研雄黃研真珠研各一兩礬石一兩熬上四味細篩以豬膏攪令如泥塗惡肉盡止更敷生肉膏佳又療癰疽敗壞生肉膏方生地黃一斤辛夷獨活當歸黃耆大黃芎藭各一兩薤白五兩白芷芍藥黃芩續斷各一兩上十味切以臘月豬脂四升煎敷之佳又方大黃附子炮芎藭雄黃真珠各一兩白蘞礬石燒黃芩䕡茹各二兩雌黃一兩莽草一兩上十一味先以豬膏一升半煎六沸去滓納䕡茹礬石末攪之塗瘡上惡肉盡止劉涓子同又方䕡茹漆頭者礬石各二分熬雄黃二分研硫黃二分上四味為散納瘡口中惡肉盡止勿使過好肉也又發背上初欲作腫即服此方梔子仁一百枚大黃升麻黃芩甘草炙各三兩上五味切以水九升煮取三升半分三服使利便止不下更進一服忌海藻菘菜從瞿麥散以下九方並療發背部中已次之文仲備急同並出第二十三卷中範汪療癰腫發背虎牙散方虎牙炙乾薑附子炮當歸甘草炙防風桂心王不留行茯苓各一兩上九味搗下篩服方寸匕日三忌同前出第三十一卷中又療癰發背排膿內補鐵屑散方當歸人參細辛甘草炙蓯蓉黃耆桂心防風黃苓鐵屑芎藭芍藥上十二味各等分合搗為散服方寸匕忌同前又療癰腫牢核發背成膿莽草膏方莽草芎藭當歸細辛附子炮黃芩烏頭炮牛膝躑躅野葛茯苓防風杜蘅各一兩豬脂二斤上十四味切用豬肪合煎去滓敷瘡上日再忌同前又卓氏白膏療癰疽發背金瘡已壞及未敗火瘡諸瘑疥患療之方當歸附子炮細辛芎藭續斷牛膝通草甘草炙白芷各二兩蜀椒三合芍藥黃耆各一兩上十二味㕮咀以豬膏二升煎之微火上以白芷色黃藥成絞去滓以敷瘡上日三忌同前又療發背髮乳房及諸惡瘡膏方黃連當歸馬齒芎藭薯蕷各一兩珍珠十四枚礬石半兩燒黃柏半兩石葦三分去毛生竹皮三合豬肪一斤上十一味㕮咀細切肪美酒一升合煎石葦焦膏成去滓有病稍稍敷上亦可酒服棗核大一枚忌同前並出第四十一卷中救急療發背百無不瘥方取豬羊脂切作片冷水浸取貼上暖徹易之五六十片即瘥若初貼少許即寒寒定好眠甚妙又療發背若初覺赤腫腫上作小瘡疼不可近方急用針刺上七八針取冷水用筒擊射腫上日夜不止疼歇腫消出第五卷中又療發背方取白麵搜圍腫四畔令童子七人尿漬之又方以馬糞封之干易婦人髮乳亦瘥又方取蔚臭草搗取汁服一雞子滓封上熱即易之又方搗地菘汁一升日再服以瘥止又方大黃石灰熬小豆上三味等分末白酒和塗立效忌羊肉熱面大酢並出第六卷中近效凡發背皆發出自腸胃流入五臟仕流多腳氣為主或有先服乳石並熱肉面並失飢房室過度皆作此疾縱身不曾服乳石先代服亦有此病或有下里人服面過度亦有患者請依後方萬不失一發背亦覺有腫即須審看根硬軟如硬頭一點白燒四邊紫黑色時掣痛憎寒不食狀若天行此石癰知是此狀即須當上灸一百壯艾炷大如鼠屎許大凡發背初亦一點白四邊赤色漸漸長大或杯盞並碗許大四邊生飯漿小小瘡如粟米許大亦時時抽掣痛此兩狀皆是死病一日內堪醫十日以外不濟就中冬月得此病即延得三五日其發背初覺即須當頭灸二十一壯如杯許大即五花灸之各二十一壯即服牛蒡子栝蔞葛粉第二服犀角湯瀉之不然服犀角丸亦得大效也忌梨鯉魚面酒肉漿水粥真臚肪賈顯録凡發背候憎寒壯熱身如拘束或口乾不用食瘡初出如青紫色者毒重赤者輕膿如稀泔者極重膿稠白赤者輕張道士升玄房陵口録留又療惡寒嗇嗇似欲發背或已生瘡腫癮疹起方硝石三兩上一味以暖水一斗和令消待冷取故青布疊三重可似欲赤處方圓濕布㩉根熱即換之頻易瘥又療發背及一切毒腫方生麻油六合黃丹二兩半地膽兩錢搗碎篩生栗子四十九枚取大小中者熬焦去皮碎絹篩上四味和於銅器中盛用炭火重湯煎候沫溢出與器口欲平取小麥一合分二人嚼取筋急納藥中攪使與相和膏擎下安銅器冷水中成膏訖以故綿塗膏貼所苦處晨夕換膏又療前瘡定訖令生肌方黃四員外云極效麝香兩錢棗皮灰半兩生麻油六合上三味依法和用火重湯上煎十餘沸稀稠前藥相似取故綿塗膏貼瘡上膏漸取瘳減唯得吃白羊頭肉但是豆並不得吃余如藥法又療癰腫犀角丸主腸癰乳癰發背一切毒腫服之化為水神驗方犀角十二分蜀升麻黃芩各四分大黃五分防風四分巴豆二十二枚去心皮熬令黃人參四分當歸四分黃耆四分干蓼藍黃連甘草炙梔子仁各四分上十三味搗為末別搗巴豆成膏納末和以杵研搗令相得煉蜜和搜更搗二三百杵暖湯服三丸如梧子得利三兩行吃冷粥止即瘥不利加至四五丸初服取快利後漸減丸數取鴨溏微泄為度老小以意增減腫消及和潤乃止利卻黃水即覺輕皮皺色變一切腫皆內消神驗不可論忌熱面蒜豬肉蘆筍魚海藻菘菜生冷黏食以上並主發背癰疽發背雜療方二十六首劉涓子療發背髮乳口已合皮上急痛生肉摩踠折丹參膏方丹參防風白芷細辛芎藭黃芩芍藥牛膝大黃槐子獨活當歸各一兩上十二味切以臘月豬脂五升微火煎三上三下膏摩病日三四不須向火古今録驗同出第五卷中肘後療諸癰疽發背及乳方熬粢粉令黑雞子白和之以塗練上貼癰小穿練上作小口以泄毒氣令散燥復易之此藥神效文仲備急同又方以釜底上搗取散以雞子中黃和塗之加少豉彌良以五月葫及少鹽佳文仲備急同一本無下一法又方取茱萸一升搗之以苦酒和貼癰上干易之佳刪繁療癰疽發背九物大黃薄貼方大黃黃芩各三兩白芷二兩寒水石五兩白蘞五兩黃柏二兩石膏赤石脂黃連各三兩上藥下篩以三合投粉麋二升中和之薄塗紙貼腫上燥易之腫下止不下厚敷之忌生冷熱面大酢又蝟皮散療諸瘻及浮核壞敗並主男子發背女子髮乳等癰疽或膿血肉瘤方蝟皮一具燒杜仲八分炙續斷五分附子炮地榆各五分厚朴八分藁本五分當歸桂心各五分小露蜂房一具燒上十味搗篩為散服方寸匕日三服酒進取瘥止忌豬肉生蔥冷水又陵鯉甲散療發背乳房癰腫方陵鯉一頭取甲爪炙桂心三分當歸二分上三味搗篩為散服方寸匕日三服酒進出第九卷中千金療癰疽發背豬蹄湯方豬蹄一具治如食法黃耆黃連芍藥各三分黃芩三兩薔薇根狼牙根各八兩上七味以水三斗煮蹄令熟澄取二斗清切藥煮取一斗洗瘡一食頃以綿拭燥著生肉膏日二瘥生痂止痛加當歸甘草各二兩又療癰疽發十指或起膀胱及發背後生惡肉方豬蹄一具當歸大黃芎藭芍藥黃芩獨活莽草各一兩上八味蹄取膝下斷治如食法以水二斗煮取八升納藥煮取四升去滓漬瘡兩食頃拭令燥以麝香膏敷之其方在前發背部中只有四味者是也又生肉膏主癰疽發背已潰令生肉方甘草炙當歸白芷蓯蓉蜀椒細辛各二兩烏啄六枚薤白二十莖乾地黃三兩續斷一兩無以蛇銜替之上十味以好酢半升相和漬二宿豬膏三斤煎令三沸三上三下膏成使用劉涓子同又癰發腹背陰匿處通身有數十者方取牛糞乾者燒搗下重絹以雞子白和以塗之干復易肘後張文仲備急同又若已結膿使聚長者方以生栝蔞根細搗苦酒和敷上燥復易之末赤小豆亦佳又凡發背為癰疽已潰未潰者方以香豉三升少與水和熟搗成強泥可腫作餅厚三分已有孔勿覆孔可腫上布豉餅艾列其上灸其豉使溫溫熱而已勿令破肉也其熱痛急易之癰疽當減便得安或一日二日灸之若先有瘡孔孔中汁出即差備急文仲並翼同又癰腫發背初作及經十日以上腫勢焮熱毒氣猛盛日夜疼痛百藥不治者方毈假雞子一枚新出狗屎如雞子大上二味攪令調和微火熬之今稀稠得所捻作餅子腫頭堅處貼之以紙貼上以綿抹之時時看之覺餅子熱即易勿令動轉及歇氣經一夜定其多日患者三日貼一度瘥止謹按千金論曰此方穢惡不可施於貴勝然其愈疾一切諸方皆不及又自外諸方還復備員作儀注而已學者常當曉斯以備諸急云耳並出第二十三卷中千金翼諸癰腫發背及癰癤已潰爛疼痛方蒸糜谷更遞尉之當即愈一云薔薇谷更炙尉之又連翹五香湯主一切惡核瘡腫方連翹射干升麻獨活各二兩桑寄生二兩通草二兩大黃三兩丁香一兩青木香二兩沉香二兩薰陸香二兩麝香三兩上十二味㕮咀以水九升煮減半內竹瀝二升煮取三升分三服未瘥中間常服佳又五香湯主惡氣毒腫方沉香青木香丁香各一兩薰陸香一兩麝香半兩上五味切以水五升煮取一升半分三服集驗方用雞舌香一兩不用丁香出第二十四卷中崔氏療發背及諸瘡久不瘥有效方先以甘草湯洗瘡拭極干乃嚼胡麻敷上干即易從旦至日西去胡麻乃取黃連末滑石末中半相和以敷瘡上數數易明日又依前敷胡麻及黃連等末更不須洗瘡不過六七日即瘥必效備急同又連翹湯療患瘡腫而渴方連翹蜀升麻各二兩黃芩三兩枳實二兩炙干藍三兩芍藥二兩玄參二兩白蘞二兩甘草二兩炙羚羊角屑二兩通草二兩黃耆二兩大黃三兩上十三味切以水八升煮取二升半分三服利一兩行後更服去大黃干藍即不利忌海藻菘菜又犀角飲子方犀角三兩屑羚羊角三兩屑上二味以水八升煮取三升渴即飲盡更作之時熱恐壞懸著井底甚妙又五香連翹湯療惡瘡熱毒腫恐惡毒氣入腹兼取利以泄毒氣方連翹三兩蜀升麻二兩薰陸香二兩淡竹瀝一升麝香一分研青木香二兩丁香一兩獨活二兩寄生三兩射干二兩甘草二兩沉香一兩大黃四兩水一升別漬朴硝二兩熬干別內上十四味切以水一斗煮取二升半絞去滓然後納大黃朴硝竹瀝更煮一兩沸去滓納麝香分溫三服服別相去如人行十里久以得利一二行為度慎雞豬魚蒜生冷酢滑油膩麵食小豆五辛葵菜等備急文仲同並出第五卷中備急葛氏療始發諸癰疽發背及乳房方皆灸上百壯半夏末雞子白和塗良姚云生者神驗以水和塗之肘後文仲古今録驗小品並同又方以酢和墓上土茱萸搗薑小蒜薄貼並良肘後文仲同並出第四卷中救急療熱毒風丹併發背犀角膏方犀角六分屑升麻十大分羚羊角六分梔子仁二七枚薤白切一升吳藍八分大藍亦得玄參六分續斷大黃白蘞射干白芷各六分蛇銜切一升寒水石十二分黃芩六分慎火草切一升麻黃六分去節上十七味切以竹瀝三升生地黃汁五合漬藥一宿納豬脂二升微火上煎十上十下候白芷黃膏成去滓塗病上出第五卷中文仲療發背及婦人髮乳及腸癰木占斯散方木占斯厚朴炙甘草炙細辛栝蔞防風乾薑人參桔梗敗醬草各一兩上十味為散酒服方寸匕日七夜四以多為度病在上當吐病在下當下膿血此謂腸癰之屬凡癰腫即可服兼療諸疽痔若瘡已潰便早愈發背無有不療長服去敗醬亦療婦人諸産癥瘕益良是劉涓子方千金範汪刪繁古今録驗同出第五卷中古今録驗療諸癰瘡發背有膿血當歸貼方當歸一分蠐螬一分丹參一分附子一分炮蠟蜜一分梔子十枚桂心一分膠一分上八味合煎以貼瘡上出第二十一卷中
