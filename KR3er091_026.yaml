body:
  text: 卷第二十六五痔方一十二首崔氏論曰凡痔病有五若肛邊生肉如鼠乳出孔外時時膿血出者名牡痔也若肛邊腫痛生瘡者名酒痔也若肛邊有核痛及寒熱者名腸痔也若大便輒清血出者名血痔也若大便難肛良久肯入者名氣痔也此皆坐中寒濕或房室失節或醉飽過度所得當時不為患久久不瘥終能困人別有大方今單行亦要便宜依按用之肘後集驗同出第四卷中廣濟療五痔方生槐煎五分皂角二兩炙去皮子麝香研鰻鱺魚炙雄黃研莨菪熬丁香木香各二分上八味搗篩以槐煎和丸分為五丸取一淨瓶可一升以來掘地埋之著一疊子於瓶上鑽疊子作孔納火瓶中灰蓋之然後納藥一丸燒以下部著疊孔上坐便通汗其盡一丸藥即止內痔以藥一丸納下部立效仍不及熏忌魚熱面等又療五痔蝟皮散方蝟皮炙鱉甲炙當歸各六分黃耆槐子大黃各八分蛇皮炙五寸露蜂房炙五分藁本桂心各五分豬後懸蹄甲十四枚炙上十一味搗為散空腹以米飲服方寸匕日二漸加一匕半不利忌如前方又療五痔下血不止方槐子五色龍骨檞葉炙令紫色乾薑芎藭當歸茜根吳茱萸各六分白蘞附子五分炮黃耆八分大黃十分豬懸蹄甲十四枚炙發灰四分上十四味搗篩蜜丸空腹以飲服如梧子二十丸日二漸加至四十丸若利恐多以意減之忌如前方出第四卷中小品療五痔散主酒客勞及損傷療下部中旁孔起居血縱橫出方赤小豆四分熬黃耆三分附子炮白蘞桂心各一分芍藥黃芩各二分上七味搗為散以酒服方寸匕日三止血大驗文仲同備急集驗同又方藜蘆大黃黃連各半兩楝木子十四枚桃仁十四枚去皮巴豆四枚去皮心萆麻十四枚一名狗蟬上七味㕮咀以豬肪一升煎三沸下去滓敷贅肉上日三外著此膏內服紫參丸常並行古今録驗同又療五痔大便肛邊清血出紫參丸療不瘥服之無不瘥方紫參秦艽亂髮灰紫菀厚朴炙以上各一兩藁本二兩雷丸半升白芷一兩䗪蟲半兩熬貫衆三兩去毛豬後懸蹄甲十四枚炙虻蟲半兩去翅足熬石南半兩炙上十三味搗篩以羊脊骨中髓合豬脂各半升煎和丸如梧子未食酒服十五丸日再亦可飲下劇者夜一服四日肛邊癢止八日膿血盡鼠乳悉愈滿六十日終生不復發久服益善有痔病十八年肛出長三寸服此方即愈亦療脫肛有人熱可除羊髓以赤蜜代集驗備急千金同集驗療五痔有氣痔溫寒濕勞即發蛇蛻皮主之牡痔生肉如鼠乳在孔中頗見外妨於更衣鱉甲主之牝痔從孔中起外腫五六日自潰出膿血蝟皮主之腸痔更衣挺出久乃縮牡豬左懸蹄甲主之脈痔更衣出清血蜂房主之方上所主藥皆下篩等分隨病倍其所主藥為三分旦早以井華水服方寸匕病甚者旦暮服之亦可至四五服唯得食乾白肉病瘥之後百日乃近房室又用藥納下部有瘡納中無瘡納孔中千金刪繁文仲同又方野葛末上一味以刀圭納藥中服五日知二十日瘥三十日愈徐安用之良千金同又方煮槐根洗之又煮桃根洗之千金備急同並出第九卷中刪繁療五痔桃葉蒸痔方桃葉一斛細糠胡麻各一斗熬上三味合為一家蒸之取細糠熟為度納小口甕中將肛門坐桃葉氣熏入肛門蟲出當死出第十七卷中千金療五痔方蝟皮三指大切熏黃如棗大熟艾一握上三味穿地作坑調和取便熏之取口中熏黃煙氣出為佳火氣稍盡即停三日將息更熏之三度永瘥勿犯風冷羹綶臛將補慎雞豬魚生冷又方桑耳上一味作羹空腹下飯飽食之三日食之待孔卒痛如鳥啄取大豆小豆各一升合搗作兩囊中蒸之及熱更互坐之即瘥並出第二十四卷中五痔數年不瘥方六首深師療五痔數年不瘥槐子丸主燥濕痔痔有雌雄為病苦暴有乾燥腫痛者有崩血無數者有鼠乳附核者有腸中煩癢者三五年皆殺人忌飲酒及作勞色犯之即發方槐子乾漆熬樧木根皮各四兩一各樧子即茱萸秦艽黃芩白蘞青木香牡蠣熬龍骨附子炮八角者雷丸蒺藜子白芷桂心雞舌香各二兩黃耆二兩上十六味搗篩蜜和為丸一服二十丸日三服千金翼同千金翼有丁香茱萸根皮無雞舌香樧木根皮千金小槐實丸主五痔十年方槐子三斤龍骨十兩礬石燒硫黃各一斤白糖二斤大黃十兩乾漆十兩熬上七味搗篩石二種及糖並細切納銅器中一石米下蒸之以綿絞取汁以和藥合作丸並手捻之丸如梧子大陰乾一服二十丸日三服深師同又槐酒主五痔五十年不瘥方槐東南枝細銼一石槐東南根細銼二石槐白皮銼一石槐子一石上四味大釜以水十六石煮取五石澄取漬更煎取一石六斗炊兩石黍米上曲二斗釀之攪令調封泥七日酒熟取清飲日三四適寒溫量性常令小小醉耳合時更煮滓取汁濤米洗器不得用生水此藥忌生水故也深師並翼同又方塗熊膽取瘥乃止但發即塗一切方皆不及此救急並翼同並出第二十四卷中古今録驗療三十年痔肛出下血如雞肝此腸痔肛邊生痤橫肛中此牡痔肛邊生乳此牝痔皆飽勞氣所生方大黃如金色者十兩滑石七兩研碎芒硝三兩桑白皮二兩棗三十枚黃芩五兩杏仁二兩研上七味切以酒一斗二升煮取二升盡服之當下又療十年痔如鼠乳膿出便作血劇白蘞散方赤小豆四分黃耆三分芍藥二分白蘞二分黃芩三分桂心三分附子炮牡蠣各二分熬上八味搗篩為散酒若泔汁服方寸匕日三服並出第三十卷中五痔脫肛方二首千金療五痔脫肛槐皮膏止痛癢血出方槐白皮二兩薰草辛夷甘草白芷各半兩野葛六銖巴豆七枚去皮漆子六枚桃仁十枚去皮豬脂半斤上十味切以豬脂煎三上三下去滓以綿沾膏塞孔中日四五過蟲死瘥止癢痛大佳出第二十四卷中必效五痔脫肛方以死蛇一枚指大者濕用掘地作坑燒蛇取有孔板覆坑坐上蟲盡出張文仲處出第六卷中腸痔方一十五首肘後療患腸痔每大便常有血方以蒲黃水服方寸匕日三瘥備急文仲崔氏千金古今録皆同又方礬石熬附子炮各一兩上二味搗篩蜜丸如梧子服二丸酒下日三稍增百日永瘥不發備急文仲崔氏千金同又方以鯉魚作鱠姜齏食之任性多少良崔氏用鱔魚又方常食鯽魚羹及蒸隨意任之備急文仲同並出第三卷中文仲療腸痔方以槐木上耳搗末飲服方寸匕日三肘後古今録千金同又方白薔薇根枸杞根各二分曝乾上二味搗篩為末服方寸匕日三五六日當更小腫是中病崔氏備急肘後同又方生地黃一斤切酒二斗上二味以酒漬地黃三日隨意飲多少即瘥肘後備急同又方取枳根皮末飲服方寸匕日三亦可煮汁常飲肘後備急崔氏皆同備急療腸痔方以穀子燒末敷之深者導之文仲崔氏同又方以槐白皮一擔銼水煮令濃脫衣入中坐當如欲大便狀冷更易不過三蟲出又方搗槐白皮作屑粉以導之崔氏文仲千金必效同又方以蘩蔞燒灰礬石熬和為粉粉之崔氏文仲範汪同出第六卷中刪繁療肺虛勞寒損至腸中生痔名曰腸痔肛門邊有核痛寒熱得之好挺出良久乃縮而瘡生豬懸蹄青龍五生膏方豬懸蹄甲三枚炙生梧桐白皮四兩生龍膽五分生桑白皮五分蛇蛻皮五分雄黃五分生青竹皮六分生柏皮七分炙露蜂房炙蜀椒汗各三分蝟皮附子炮各四分杏仁二十枚去皮上十三味細切綿裹以苦酒二升浸一宿於火上炙燥搗篩以豬脂三升和微火煎之如薄糖敷並酒服如棗核出第七卷中崔氏療大便後出血此腸痔之疾宜服薤白湯方薤白切七合羊腎脂一升上二味緩火煎令薤白黃去滓頓盡末瘥更服即止得膿血與糞相和即瘥又方白礬燒汁盡附子炮去皮乾薑各一兩上三味搗篩蜜和飲服二丸至三丸日二服並出第四卷中諸痔方二十八首廣濟療痔下血方以蛇不問多少煎煮肉消盡去滓用汁和婆羅粥著少鹽食之大效一無所忌又黃耆丸方黃耆枳實炙各三兩烏蛇炙當歸赤石脂各二兩蝟皮二兩炙上六味搗篩蜜丸空腹酒下如梧子二十丸日二服更不加減並出第四卷中範汪療痔下血黃連曲散方黃連二兩曲一兩上二味搗篩薄蜜溲先食以飲服五分匕日三不知增至方寸匕集驗療痔蝟皮丸方槐子三兩附子炮二兩當歸二兩連翹二兩乾地黃五兩乾薑二兩礬石二兩燒令汁盡續斷黃耆各一兩蝟皮一具細切熬令焦上十味搗篩蜜丸飲服十五丸如梧子日再加至三十丸亦可主瘻常用大驗肘後備急文仲刪繁千金古今録驗同又方以生槐皮十兩削去黑皮熟搗丸如彈子綿裹納下部中大效備急千金同又方以槐赤雞一斤為散飲服方寸匕千金云槐糯也千金療痔神方以七月七日多采槐子熟搗涎取汁重綿絞納銅器中盛庭中高門上曝之二十日以上煎成取如鼠糞大納穀道中日三亦主瘻及百種瘡救急崔氏古今録驗同又方鯉魚腸二具以火炙令香上一味以綿裹納下部中一食頃蟲當出魚腸數數易之盡數枚當瘥一方云坐上蟲出古今録驗同又方虎頭骨炙犀角上二味各為末如雞子大以不中水豬脂和塗瘡上即瘥救急深師同並出第二十四卷中崔氏療痔方雀林草一大握粗切上一味以水二大升煮取一升頓服盡三日重作一劑無不瘥者又方取駱駝頷下毛燒作灰可取半雞子大酒和頓服之並出第四卷中必效尉痔法痔頭出或疼痛不可堪忍方取枳實煻灰中煨之及熱尉病上盡七枚立定發即尉之永除也又方以麝香當門子印成鹽相和以手塗痔頭上若令人著亦佳其痛不可忍者不過兩度永瘥又方以野豬肉炙食十頓即瘥三方云奇效又方取五月五日蒼耳子陰乾搗末水服三方寸匕日三瘥乃止又方以二十年久針線袋口燒作灰分和水服又痔正發疼痛方以蔥和須濃煮湯置盆中坐浸之須臾即當痛止又方以貍肉作羹食之或作脯食之不過三頓無不瘥又方以肥大棗一顆剝去赤皮取水銀掌中以唾研令極熟塗棗瓤上納下部中瘥又方以萹蓄根葉搗汁服一升一兩服瘥又方姜屑二兩上一味以水三大合煮之取一合去滓暖空腹服隔日再服忌豬肉蒜等又方倚死竹色黑者取之折斷燒為灰篩和薄飲服之方寸匕忌牛肉余無所忌出第三卷中古今録驗療痔黃耆丸方是直殿中省散騎常侍郎甄立言處黃耆青箱子漏蘆鱉甲炙狼牙各五分黃柏四分犀角屑八分斑蝥去足翅熬蝟皮四分炙白礬十分燒去汁芫菁去足翅熬地膽去足翅熬蜈蚣各十枚炙豬懸蹄甲七枚炙上十四味搗篩為散蜜和丸如梧子大空腹以飲服二丸日二增之以知為度忌一切油膩莧菜又方掘地深一尺圓徑四寸炭火燒令赤去火以魚簿著口上取莨菪子一合納坑中燒煙出痔人坐上以被擁當汗出密室內作之以煙盡更著一合莨菪子熏避風如發汗法則瘥又療諸痔及下血不止轉虛羸者服之無不效方黃耆枳實各二大兩半細銼熬令黃黃礬石一大兩炭火燒經一伏時仍數翻轉令勻著火冷訖細羅去沙淨上三味先搗黃耆枳實篩訖然後和礬石更搗勻蜜和丸空腹以酒下二十丸加至三十丸日再服忌蕎麵豬肉蒜魚勞事唯久服一年半年愈良驗又療痔方鯉魚腸可半升上一味擇之令淨仍新鮮取一方板可闊二尺以來厚二寸當中鑿孔深一寸半圓如醬盞口大布魚腸於其內以好麝香碎末滲魚腸取厚氈二三重當心開孔可板孔大小鋪坐以被擁之數進食可至兩炊久覺下部痛者即是蟲出也時且更坐良久取魚腸細擇之恐蟲入於腸中蟲可長一二寸許細如網絲斑作五色每出不過十餘枚不問度數蟲盡則止許仁則曰此病有內痔有外痔內但便即有血外有異外痔下部有孔每出血從孔中出內痔每便即有血下血甚者下血擊地成孔出血過多身體無復血色有痛者有不痛者有此候者宜依後藥方生槐子一斗候未堅硬時採上一味搗令碎絞取汁日曝取稠取地膽曝乾搗篩為散和槐子煎作丸以飲服十丸日再加至三十丸如桐子大兼以煎捻作丸如棗核大納下部中日夜三四度亦可搗苦參末代地膽依前生槐子煎不覺可宜合後黃耆十味散服之方黃耆五兩苦參玄參各六兩附子炮大黃各三兩乾薑二兩蝟皮炙二兩黃連各四兩槐子六合豬懸蹄甲一具炙上藥搗篩為散空腹以飲服方寸匕日再服之漸漸加至二匕忌豬肉冷水出下卷中痔下部如蟲齧方九首肘後療痔下部癢痛如蟲齧方胡粉水銀上二味以棗膏調勻綿裹夜臥納穀道中導之效崔氏同又方以菟絲子熬令黃黑末以雞子黃和塗之集驗文仲備急範汪崔氏等同又方以杏仁熬令黑搗取膏塗之集驗備急文仲崔氏同又方以蝟皮燒灰敷之又獺肝燒搗散服之崔氏備急文仲同又方以溺溫令熱納少礬石以洗之良崔氏同並出第二卷中文仲療痔下部如蟲齧方搗桃葉一斛蒸之令熱納小口器中以布蓋上坐之蟲死即瘥肘後崔氏備急同一方有烏梅又方掘地作小坑燒令赤以酒沃中搗吳茱萸三升納中及熱以板覆上開一小孔以下部坐上冷乃下不過三度即瘥肘後崔氏備急同又方以小豆一升好苦酒五升煮豆令熟出曝乾復納令酒盡止搗末以酒服方寸匕日三崔氏備急同又方以豬椒子一升酒一升漬經五日稍稍飲一日令盡佳崔氏同出第六卷中大便下血風冷積年變作痔方三首崔氏療大便急去血或至一升數合而少血色此是內傷風冷積年多變作痔方大黃五分甘遂三分黃芩二分乾薑附子各四分炮桃仁三七枚去皮尖蔥白七莖上七味以水六升煮取一升半先服半升藥稍安又服半升須臾血發又服半升未斷候發日再作不過三劑瘥忌豬肉等又方煮桃皮李皮萹蓄苦參取汁漬之大佳出第四卷中備急療大便血風冷積年多變作痔方燒稻藁灰淋汁煎熱漬之三五度佳崔氏肘後文仲同灸痔法方二首崔氏灸痔法以繩圓病者項令兩頭相拄展繩從大椎正中量之垂繩一頭當脊正下以墨點訖又量病者口兩吻頭接繩頭正下復點之又量病者口吻如前便中屈繩接前口吻繩頭正下復點之望使相當所三處並下火重者各五百壯輕者三百壯即愈又法令疾者平坐解衣以繩當脊大椎骨中向下量至尾株骨尖頭訖再折繩更從尾株尖頭向上量當繩頭正下即點之高虢州初灸至一百壯得瘥後三年復發又灸之便斷兼療腰腳並出第四卷中雜療痔方五首廣濟療痔瘻疽瘡方光明砂別研麝香當門子別研蛇皮五月五日者熬上三味等分研先以鹽湯洗拭乾於瘡上敷少蜜以散敷上瘥止小品療穀道中癢痛痔瘡槐皮膏方槐皮五兩甘草當歸白芷各二兩陳豉桃仁各五十粒去皮赤小豆二合上七味銼以豬脂二升煎候白芷黃膏成去滓以塗之日三度集驗同刪繁療虛勞寒下痢不止肛邊轉生肉如鼠乳在大孔旁時時膿出名牡痔鱉甲丸方鱉甲炙乾地黃黃連連翹各七分栝蔞黃耆乾薑各六分蠐螬五枚炙蝟皮炙續斷各五分附子炮槐子礬石燒汁盡各四分上十三味搗篩以蜜丸如梧桐大飲下二十丸漸加至三十丸日再忌如常又療腎勞虛或酒醉當風所損腎臟病所為酒痔肛門腫生瘡因酒勞傷發瀉清血肛門疼痛蜂房膏方蜂房三兩炙生槐白皮十兩楝實桃仁各五十枚熬白芷二兩赤小豆一合碎豬膏一升半上七味㕮咀綿裹以苦酒一升漬一宿下膏煎取酒盡膏成去滓取杏子大綿裹納肛門中又酒服一方寸匕出第三卷中必效療痔及諸蟲方石榴東引根深者取一握上一味勿令見風拭去土銼又取鹿脯四指大一片炙兩畔令熟捶碎擘以水三升煮取一升適寒溫空腹頓服之其患痔盛發者服即定諸蟲無問赤白並出瘥出第三卷中脫肛方三首病源脫肛者肛門脫出也多因久痢後大腸虛冷所為肛門為大腸之候大腸虛而傷於寒痢而用氣堰而氣下衝則肛門脫出因謂脫肛也出第十七卷中小品療脫肛熏方以女萎一升以器中燒坐上熏肛門即愈範汪集驗千金同出第十卷中刪繁論曰肛者主大便道肺大腸合也號為通事令史重十二兩長一尺二寸廣二寸二分應十二時若臟傷熱即肛閉塞大便不通或腫縮入生瘡若腑傷寒則肛寒大便洞瀉肛門凸出良久乃入熱則通之寒則補之不虛不實依經調之療肛門主肺熱應肛門閉塞大便不通腫縮白蜜兌通之方以白蜜三升煎令成乾燥投冷水中可得丸長六七寸許兌肛門中到身中向上入頭向下停少時兌煬斯須即通泄千金同出第三卷中千金療肛出方磁石四兩研桂心一尺蝟皮一枚炙黃上三味篩為散服方寸匕一日服十服即縮勿舉重須斷房室周年乃佳出第二十五卷中肛門凸出方三首刪繁療肛門主大腸寒應肛門寒則洞瀉凸出豬肝散方豬肝一斤炙令黃燥黃連阿膠炙芎藭各二兩烏梅肉五兩熬艾葉一兩熬上六味搗篩平旦空腹溫服方寸匕日再若不能酒白飯服亦得千金同出第三卷中千金肛門凸出壁土散方故屋東壁土一升碎研皂莢三挺長者上搗土為散裹敷肛門其頭出處取皂莢炙暖更遞尉之取入則止又麻履底按入方麻履底鱉頭一枚上二味燒鱉頭為散敷肛門凸出頭炙履底以按尉令入永不出矣並出第二十五卷中猝大便脫肛方六首肘後療猝大便脫肛方灸頂上回發中百壯又方以豆醬清合酒塗之文仲備急同又方燒虎骨末水服方寸匕日三即瘥範汪療猝大便脫肛方以緑桑枝螺取燒末豬脂和敷之立縮亦可末以粉之備急張文仲同出第三卷中千金療猝大便脫肛方以豬膏和蒲黃敷之指推納之但以粉粉之亦佳張文仲備急同又方灸鳩尾骨上七壯備急文仲集驗同出第二十五卷中腸肛俱出方二首肘後療若腸隨肛出轉廣不可入一尺來者方搗生栝蔞取汁溫服之以豬肉汁洗手隨抑按自得入效範汪小品張文仲備急千金同備急若腸隨肛出方熬石灰令熱布裹尉之隨按令入冷即易小品文仲備急同出第八卷中脫肛歷年不愈方三首集驗療脫肛歷年不愈方以生鐵三斤以水一斗煮取五升以洗之日再範汪千金備急文仲同出第六卷中千金療脫肛歷年不愈方以死鱉頭一枚燒令煙盡作屑以敷肛門上手按之令入兼灸橫骨一百壯又方以鐵精粉上按令入即愈並出第二十五卷中疝氣及㿗方六首廣濟療疝氣核腫疼方黃耆桃仁去尖皮熬山茱萸五加皮檳榔仁各八分牛膝六分茯苓六分蓯蓉八分五味子十八分人參續斷各六分桂心八分遠志去心石南各五分海藻洗八分玄參十分枳實炙龍骨八分蒺藜子二十分熬上十九味搗篩蜜丸如桐子大酒服三十丸日二漸加至四十丸又療腎虛疝氣腰膝冷疼陰囊腫癢狐陰丸方狐陰一枚炙木香蒺藜子膃肭臍昆布各六分牛膝菟絲子各八分酒漬桃仁去尖皮熬石斛各十分檳榔仁十枚上十味搗篩蜜和丸如梧子大空腹以酒下二十丸至三十丸日再服忌熱面蕎麥豬魚黏食等物並出第六卷中集驗療㿗方取楊柳如腳大趾長三尺二十枚以水煮令極熟以故布干掩腫處取柳枝更互拄之如此取瘥止文仲備急千金同通按拄音主刺也千金療㿗方牡丹二兩海藻二兩洗狐陰一具炙地膚子二兩茯苓二兩五味子二兩芍藥二兩橘皮二兩蜘蛛五十個熬防葵二兩細辛二兩蒺藜子二兩桂心二兩澤瀉二兩桃仁五十枚去皮尖熬上十五味下篩蜜和服十丸如梧子大稍加至二十丸忌胡荽生蔥生菜酢物出第二十五卷中備急療㿗方以桃仁搗敷之亦療婦人陰腫干即易集驗同出五卷中古今録驗療㿗蒺藜丸方蒺藜子乾地黃各一分鹿茸炙十分白蘞八分磁石十分研礜石煉十分鐵精桂心續斷各五分巴戟天芍藥玄參通草升麻牛膝寄生各八分澤瀉七分射干八分蓯蓉十分海藻八分如發者上二十味搗篩以蜜和為丸如梧子大飲下十丸日二漸增至二三十丸甄立言處出第四十一卷中卒病㿗方五首肘後療超躍舉重卒得陰㿗方白朮五分地膚子十分桂心一分上三味搗末以飲服一刀圭日三古今録驗同又方狐陰一具炙海藻牡丹皮各三分桂心二分上四味搗篩為散蜜和為丸如梧子大小兒服五丸大人增之集驗灸猝㿗法以蒲橫度口折之一倍增之以布著小腹大橫理令度中央上當臍勿使偏僻灸度頭及中央合二處隨年壯好自養勿舉重大語怒言大笑呼喚千金範汪同又方牽陰頭正上向灸莖頭所極又牽下向穀道又灸所極又牽向左右髀直下行灸所極皆使正直勿偏四處炷隨年壯佳千金範汪同又法灸足厥陰左右各三壯穴在足大趾間是也千金範汪同並出第九卷中㿗卵偏大方三首千金療㿗疝卵偏氣上方牡丹防風各一分上二味搗為散溫酒服方寸匕日二忌胡荽出第二十五卷中張文仲小品牡丹散療㿗偏大氣脹方牡丹桂心防風鐵精豉熬等分上五味搗篩酒和方寸匕服之小兒一刀圭二十日愈嬰兒以乳汁和大豆與之大效忌如前肘後同出第七卷中古今録驗牡丹五等散療㿗疝陰卵偏大有氣上下脹大行走腫大服此良驗方牡丹皮防風黃柏炙桂心各一分桃仁二分去皮尖研上五味搗為散以酒服一刀圭二十日愈少小㿗疝最良小兒以乳汁和如一大豆與之忌如前出第四十一卷中灸諸㿗法一十四首千金論曰男㿗有腸㿗卵㿗氣㿗水㿗四種腸㿗卵㿗難瘥氣㿗水㿗針灸易瘥又卵偏大上入腹方灸三陰交在內踝上八寸隨年壯又男陰卵偏大㿗法灸肩井解臂接處隨年壯男㿗灸小指端七壯病在左者可灸左在右者灸右良效又法灸關元百壯又法灸玉泉百壯報之穴在臍下四寸又法灸泉陰百壯三報之在橫骨邊三寸又㿗病陰猝腫者法令並足合兩拇趾爪相併以一艾丸灸兩爪端方角處一丸令頓上兩爪角各令半丸上爪上七壯又兩丸縮入腹法灸三陰交隨年壯神效又男陰卵大㿗病法灸足太陽五十壯三報之又法灸足太陰五十壯又在內踝上一穴又法灸大拇指內側去端一寸白肉際隨年壯甚驗雙灸之又法灸橫骨兩邊二十壯夾莖是也又法灸足大趾理中十壯隨邊腫灸之灸小兒㿗法先將兒至碓頭祝之曰坐汝令兒某甲陰囊㿗故灸汝三七二十一灸訖便牽小兒令碓頭下向著囊縫當陰頭灸縫上七壯即消已驗艾炷帽簪頭大耳又法凡男㿗當騎碓軸以莖伸置軸上齊陰莖頭前灸軸木上隨年壯即愈並出第二十五卷中陰腫方六首病源此由風熱客於腎經腎經流於陰腎不能宣散故致腫也出第四卷中集驗療男子陰腫大如斗核痛人所不能療者方以雄黃一兩研碎綿裹甘草一尺生用切水一斗煮取二升以洗之忌海藻菘菜又方取莧菜根搗敷之範汪千金同又方取蔓菁根搗敷之範汪同又方搗馬鞭草敷之範汪同並出第九卷中文仲療陰腫方取桃仁去皮尖熬末酒服彈丸許不過三服即瘥千金備急同出第七卷中古今録驗療腫大如斗方取雞翅燒灰飲服其毛一孔生兩毛者佳腫在左取左翅在右取右翅雙腫取兩邊翅千金治小兒卵腫出第四十一卷中陰疝腫縮方一首病源疝者氣痛也衆筋會於陰器邪客於厥陰少陽之經與冷氣相搏則陰痛而攣縮也出第四卷中文仲療陰猝縮入腹急痛欲死名陰疝方狼毒四兩炙防葵一兩附子二兩炮上三味搗篩蜜和丸如梧子酒服三丸日三夜二古今録驗範汪同出第七卷中陰猝腫痛方三首文仲葛氏療男子陰卒腫痛方灸足大趾第二節下橫理紋正中央五壯姚云足大趾本三炷亦治小兒陰疝發時腫痛隨痛左右灸之出第七卷中備急療男子陰卒腫痛方雞翮六枚燒蛇床等分上二味為末以飲服少許隨卵左右取雞羽集驗同姚方無蛇床又若有息肉突出方以苦酒三升漬烏喙五枚三日以洗一日夜三四度瘥肘後同出第五卷中陰囊腫痛方五首千金有人陰冷漸漸冷氣入陰囊腫滿恐死夜即痛悶不得眠睡方取生椒擇之令淨以布綿裹著丸囊令厚半寸須臾熱氣大通日再易之取消為效乃止又方煮大薊根汁服一升日三不過三劑愈又方醋和麵炙令熱尉之又方以醋和麵塗之又方釜月下土以雞子白和敷之效肘後同並出第二十五卷中陰下癢濕方七首病源大虛勞損腎氣不足故陰汗陰冷液自泄風邪乘之則瘙癢也其湯針灸石別有正方補養宣導今附於後養生方導引法云臥令兩手布膝頭取踵置尻下以口納氣腹脹自極以鼻出氣七息除陰下濕少腹裡痛膝冷不隨出第四卷中文仲療陰癢生瘡方嚼胡麻塗之驗肘後千金同葛氏療陰囊下濕癢皮剝方烏梅十四枚錢四十文鹽三指撮上三味以苦酒一升於銅器中浸九日洗之效肘後同又方煮槐皮苦參黃柏及香薷汁洗之並良肘後同出第七卷中救急療陰下濕癢成瘡方豬蹄兩腳槐白皮切一升上二味斟酌以水煮洗瘡一日五六遍永瘥又方煮桃皮和黍米汁洗之並出第五卷中古今録驗療陰下癢濕湯洗方甘草一尺以水五升煮取三升漬洗之日三四度便愈又療陰下濕癢生瘡方吳茱萸一升水三升煮取三五沸去滓以洗瘡諸瘡亦治之出第四十一卷中陰痛方三首病源腎氣虛損為風邪所侵邪氣流入於腎經與陰氣相擊真邪交爭故令陰痛但冷者唯痛挾熱者則腫其湯尉針石別有正方補養宣導今附於後養生方導引法云兩足趾向下拄席兩湧泉相拓坐兩足跟頭兩膝頭外叉手互前向下盡勢七通去勞損陰膝冷出第四卷中集驗療猝陰痛如刺汗如雨出方小蒜一斤韭根一斤一方無楊柳根一斤上三味合燒以酒灌之及熱氣熏之即愈千金同出第九卷中千金療陰腫痛方灸大敦三壯又方車前子末酒服之佳出第二十五卷中陰瘡方七首病源腎榮於陰腎氣虛不能制津液則汗濕虛則為風邪所乘邪客腠理而正氣不泄邪正相干在於皮膚故癢搔之則生瘡出第四卷中千金療陰下生瘡洗湯方地榆黃柏各八兩上二味切以水一斗煮取六升去滓適寒溫洗瘡日再只以黃柏湯洗亦效又凡妒精瘡者男子在陰頭節下婦人在玉門內並似疳瘡作臼方用銀叉以綿裹用臘月豬脂熏黃火上暖以叉烙瘡上令熱取干槐枝𬋖塗之以麝香黃礬青礬末敷之小便後即敷之不過三兩度瘥但用疳瘡方中藥敷之即瘥出第二十五卷中葛氏療男子陰瘡方爛煮黃柏洗之又用白蜜塗之又方黃連黃柏各等分末之先煮肥豬肉湯洗之然後以藥粉之又方以蜜煎甘草末塗之大良比見有人患塗頭腫坎下瘡欲斷者以豬肉湯漬洗之並用前粉粉之及依陶方即瘥神驗出第七卷中必效療陰生瘡膿出作臼方高昌白礬一兩上一味搗細研之煉豬脂一合於滋器中和攪作膏取槐白皮切作湯洗瘡上拭令乾即取膏敷上及以楸葉貼上不過三兩度永瘥古今録驗療陰瘡方黃柏黃連各三分胡粉一合上三味搗為末粉上日三婦人綿裹棗核大納之出第四十一卷中陰邊粟瘡方五首必效療陰瘡陰邊如粟粒生瘡及濕癢方以槐北面不見日處白皮一大握鹽三指一撮以水二大升煮取一升洗之日三五遍適寒溫用若涉遠恐衝風即以米粉和塗之神效又療陰瘡有二種一者作白膿出名曰陰蝕瘡二者但赤作瘡名為熱瘡若是熱瘡用此方取黃柏黃芩各一兩切作湯洗之用黃柏黃連末粉之云神良又方以黃連和胡粉末敷之必效又方紫芽茶末一分荷葉一片燒灰上二味為末以鹽漿水洗訖敷之三五度即愈又方取停水處干卷地皮末敷之神效是長安郭承恩用之得效出第四卷中著硇砂方四首救急邂逅著硇砂損陰方豬蹄一具擘破浮萍草三兩上二味以水三大升煮取半升去滓以瓶子盛汁納陰瓶中漬之冷即出拭乾便敷後藥粉之又粉法薔薇根皮黃柏各三分朴硝蛇床子各一分甘草二分炙上五味搗為散用前法浸洗後以粉瘡上亦不甚痛慎風出第八卷中必效主著硇砂方取雞子一枚煮熟剝取肉更用生雞子二個傾取白和熟研令細以綿裹之立定李饒州云奇效又方甘草黃柏白礬燒令汁盡上三味為末敷之出第四卷中九蟲方一首病源夫九蟲者一曰伏蟲長四寸二曰蛔蟲長一尺三曰白蟲長一寸四曰肉蟲狀如爛杏五曰肺蟲狀如蠶形六曰胃蟲狀如蝦蟆七曰弱蟲狀如瓜瓣八曰赤蟲狀如生肉九曰蟯蟲至細微形如菜蟲伏蟲群蟲之主也蛔蟲貫心則殺人白蟲相生子孫轉大長至四五尺亦能殺人肉蟲令人煩滿肺蟲令人咳嗽胃蟲令人嘔吐胃逆喜噦弱蟲又名隔蟲令人多唾赤蟲令人腸鳴蟯蟲居胴腸多則為痔劇則為癩因入瘡處以生諸癰疽癬瘻瘑疥齲蟲無所不為人亦不必盡有有亦不必盡多或偏有或偏無者此諸蟲依腸胃之間若腑臟氣實則不為害若虛則能侵蝕隨其蟲之動而變成諸患也集驗同出第十八卷中集驗貫衆丸主療九蟲動作諸病方貫衆熬石蠶熬五分狼牙四分雚蘆二分蜀漆六分炙殭蠶三分熬雷丸六分蕪荑四分厚朴三分檳榔六分上十味搗篩蜜丸空心暖漿水服三十丸日三不知稍稍加之白蟲用棐子湯服備急文仲古今録驗範汪同出第九卷中五臟蟲方七首刪繁療脾勞有白蟲長一寸在脾為病令人好嘔而胸中駭駭一作玄玄嘔而不吐出前胡湯方前胡三兩白朮三兩赤茯苓三兩枳實炙二兩細辛三兩旋覆花一兩常山三兩松蘿二兩龍膽三兩竹葉切一升杏仁三兩去尖皮上十一味切以水一斗煮取三升去滓分三服若腹中熱滿下芒硝三兩黃芩三兩苦參二兩加水二升依方煎忌如常又療脾勞熱有白蟲在脾中為病令人好嘔茱萸根下蟲湯方茱萸東引根大者一尺切大麻子八升橘皮二兩切上三味切搗麻子爛並和煎服或下黃汁凡合藥禁聲勿語道作藥蟲當聞便不下切須忌之甚驗以水煎服臨時量之效又療肺勞熱損生肺蟲形如蠶在肺為病令人咳逆氣喘或謂憂恚氣隔寒熱皆從勞之所生名曰膏肓針灸不著麥門冬五隔下氣丸方麥門冬十兩去心蜀椒四分汗遠志附子炮各六分乾薑五分甘草十分炙人參七分細辛六分桂心五分百部根白朮黃耆各五分杏仁四十枚檳榔五分上十四味搗篩蜜丸如彈子許含一丸稍稍咽汁忌如常千金療腎熱四肢腫急蟯蟲如菜中蟲生腎中為病方貫衆大者三枚熬乾漆二兩熬茱萸六分一云五十枚杏仁四十枚蕪荑胡粉槐白皮各四分上七味搗散平旦以井華水服方寸匕增之以瘥止又肺勞熱生蟲在肺為病方東行桑根白皮切一升東行茱萸根切五兩狼牙三兩上三味切以酒七升煮取一升半平旦服盡又療肝勞生長蟲在肝為病令人恐畏不安眼中赤方雞子五枚去黃東行茱萸根切三升蠟三兩乾漆四兩熬粳米粉半升上五味搗茱萸根漆為末和藥銅器中打雞子調火煉可丸如小豆宿勿食旦以飲服一百二十丸小兒五十丸蟲即爛出瘥又療心勞熱傷心有長蟲名蛔蟲長一尺貫心為病方雷丸熬橘皮桃仁各五分狼牙六分貫衆三枚蕪荑青葙子乾漆熬各四分亂髮如雞子燒殭蠶二十枚熬上十味搗篩蜜丸以飲及酒空腹服二七丸日再服之並出第十八卷中長蟲方二首集驗療長蟲雞子丸方雞子白三枚乾漆四兩熬一本無臘三兩粳米粉半斤上四味納銅器中於微火上煎攪令調納粉令凝可丸置土上溫乃納雞子攪令相得又煎令可丸宿勿食以飲下小豆許大一百二十丸小兒五十丸效驗又方取棟實以淳苦酒中漬再宿以綿裹納下部中令入三寸許一日易之千金範汪同並出第九卷中蛔蟲方九首病源蛔蟲者是九蟲之一也長一尺亦有長五六寸或因腑臟虛弱而動或因食甘肥而動其發動則腹中痛發作種聚去來上下痛有休息亦攻心痛口中喜涎及吐清水賁傷心者則死診其脈腹中痛其脈法當沉弱弦今反洪而大則蛔蟲也出第十八卷中廣濟療蛔蟲方酸石榴根東引入土五寸者切二升檳榔十枚碎上二味以水七升煮取二升半絞去滓著少米煮稀粥平旦空肚食之少間蟲便死快利效無忌出第四卷中肘後療蛔蟲或攻心痛如刺口中吐清水方取龍膽根多少任用以水煮濃汁去滓宿不食平旦服一二升不過再服下蛔蟲也又方取有子楝木根銼以水煮取濃赤黑汁用米煮作麋宿勿食旦取肥香脯一片先吃令蟲聞香舉頭稍從一口為度始少進漸加服一匕服至半升便下蛔蟲千金文仲同又方以雞子一枚開頭去黃以好漆少許納中相和仰頭吞之蟲悉出矣文仲集驗備急千金同出第二卷中集驗蛔蟲攻心腹痛方取薏苡根二斤銼以水七升煮取三升先食盡服之蟲死盡出千金範汪同出第九卷中千金療蛔蟲方雚蘆下篩以餅臛和服方寸匕蟲不覺出之亦主蟯蟲出肘後云雚蘆一兩末以羊肉作臛和服出第十八卷中崔氏療蛔蟲方取繅蠶蛹汁空腹飲之良若非繅絲時即須收蛹曝乾患者搗篩取意斟酌多少和粥飲服之又方鶴蝨三兩上一味搗散以肥豬羊肉但得一色以蔥豉為臛汁每旦空腹服以臛汁和一方寸匕頓服稍多飲臛汁佳若不能散服即以蜜和為丸如梧子一服十丸還以此臛汁下之假令明旦服今日暮即勿食明旦服藥訖還至巳時為佳要服此丸散使盡以後三十日勿雜食永瘥出第五卷中必效療蛔蟲方緑豆三升煮取濃汁麻子一大升研取汁一升以下然後取麻子汁半升和豆汁一升更暖令溫溫正發即炙羊肉脯令熟先含咽汁三五咽即服之須臾即吐出或利其蟲已消如綿練帶三二百條如未盡更服即永絶郭參軍云頻試無不瘥者一方服麻子汁效出第六卷中寸白蟲方一十九首病源寸白者九蟲之一也長一寸而色白形小褊因腑臟虛弱而能發動或云飲白酒以桑枝貫牛肉炙食之並食生魚所成又食生魚後即飲乳酪亦令生之其發動則損人精氣腰腳疼弱又云此蟲生長一尺則殺人出第十八卷中廣濟療白蟲如馬藺葉大於下部出不盡以刀截斷者令人漸漸羸瘦石榴湯方醋石榴根東引者一大握蕪荑三兩牽牛子半兩熬末上三味以水六升煮取二升去滓分三服別和牽牛子末每服如人行五里更服儘快利蟲亦盡死出忌生冷豬魚牛肉白酒葵筍等此方神驗又方狼牙白蘞各四分蕪荑六分上三味搗散空肚以大醋和如膏溫頓服之無所忌千金同並出第四卷中肘後療白蟲方淳漆三合豬血三合上二味相和微火上煎之不著手成宿勿食空腹旦先吃肥香脯一片服如大豆許一百丸日中蟲悉出亦主蛔蟲範汪同又方濃煮豬肉汁煎檳榔三十枚取三升服之蟲盡出文仲備急同又方熟煮豬脂血宿勿食明旦飽食之蟲當下文仲備急同出第二卷中範汪療白蟲橘皮丸方橘皮四分牙子蕪荑各六分上三味搗篩蜜丸如梧子以漿水下三十丸先食日再服又方狼牙五兩上一味搗篩蜜丸如麻子大宿不食明旦空腹以漿水下一合服盡瘥又方楝實破其上取皮中子搗合蜜丸如梧子宿不食旦以醋漿水若米汁下三百丸蟲並死或以糜爛皮亦可丸服八十丸忌如常法出第十九卷中備急療白蟲蕪荑散方狼牙三分炙蕪荑二分上二味搗為末酒和服之先食脯後頓服盡立瘥張文仲同出第六卷中救急療白蟲方石榴枝東引者一握去瘡皮檳榔七枚上二味以水二大升煮取強半頓服欲服時先嚼鹿脯咽汁即進之每月一二三日吃藥必瘥以蟲頭向上月三以後服藥不效為其蟲頭向下也今日欲服預前一日莫食其蟲吃藥之後或利出或內消皆瘥忌食生膾白酒諸生肉冷物一月餘又方取棐子一百枚去皮火燃啖之能食盡佳不能者但啖五十枚亦得經宿蟲消自下無忌崔氏同出第八卷中崔氏療白蟲諸方不瘥方取石榴東引根令患人以手大指與第三指滿一握兩頭出者總留之又取干脯肥者如手大一片細銼以水四升漬之一宿明旦煮取一升去滓分三服如人行十里久每欲服先嚼脯一片然後飲藥並令人以手按所患人腹令藥易宣都服了有頃當自便蟲出服藥以月一至五日以前是蟲頭向上服之得力無問多少皆得出盡若疑蟲未盡更合一劑永愈又方東引茱萸根一大握切麻子半大升上二味先搗麻子極碎又盆中熟研以水一大升更和研絞取濃汁以浸茱萸根一宿明旦煮兩三沸頓服如不頓服分再服至明旦欲服藥今日午後便不得食仍須先嚼一片肥干脯咽汁然後服藥服一劑去蟲不盡停一日更作服一劑永瘥後一月日勿食脂膩魚肉必效出第五卷中千金療白蟲方取棐子四十九枚去皮以月上旬旦空腹服七枚七日服盡蟲消為水永瘥又方取茱萸北陰根洗去土切以酒一升漬一宿平旦去滓分再服凡茱萸皆用細根東北陰者良若指以上大者皆不佳用之無力範汪同又方熬錫令速燥末平旦作羊肉臛以藥方寸匕納汁中服之一方熬胡粉又方桑白皮切三升以水七升煮取二升宿不食明旦頓服之又方用石榴根如茱萸根法又方胡麻一升胡粉一兩上二味搗末明旦空腹以豬肉臛汁服盡即瘥並出第十八卷中蟯蟲方六首病源蟯蟲是九蟲之一也形甚小如今之蝸蟲狀亦因腑臟虛弱而致發動甚者則能成痔瘻疥癬癩癰疽瘑諸瘡蟯蟲此是人體虛弱極重者故蟯蟲因之動作無所不為也出十八卷中範汪療蟯蟲芫花散方芫花狼牙雷丸桃仁去皮尖上四味搗散宿勿食平旦以飲服方寸匕當下蟲也又巴豆白膏療蟯蟲方巴豆一枚燒令煙斷去心皮桃仁四枚熬令黑去皮上二味合搗作三丸大人清旦未食以漿服盡少小服一丸若不下明旦更復作服並出第十九卷中千金療蟯蟲在胃中漸漸羸人方淳酒白蜜好漆各一升上三味合銅器中微火上煎之令可丸丸如桃核大一枚宿勿食空腹溫酒下蟲不下再服之肘後備急集驗範汪同出第十八卷中備急葛氏療蟯蟲攻心如刺吐清汁方搗生艾汁宿不食平旦嚼脯一片令蟲聞香後飲汁一升當下蟯蟲備急文仲並同肘後云療蛔蟲陶氏療蟲方取七月七日蒺藜子陰乾燒作灰先食服方寸匕一服三日止範汪千金同又方以好鹽末二兩淳酒半升於銅器中煮令數沸宿勿食清旦溫空肚頓服之備急文仲千金範汪等同並出第七卷中三蟲方七首病源三蟲者長蟲赤蟲蟯蟲為三蟲也猶是九蟲之數也長蟲者蛔蟲也長一尺動則吐清水出則心痛貫心則死赤蟲狀如生肉動則腸鳴蟯蟲細微形如菜蟲也居胴腸之間多則為痔劇則為癩因入瘡處即生諸癰疽癬瘻瘑疥齲蟲無所不為此既是九蟲內之三者而今別立名者當以其三種偏發動成病故謂三蟲也其湯尉針石別有正方補養宣導今附於後養生方導引法云以兩手著頭相叉長引氣即吐之坐地緩舒兩腳以兩手從外抱膝中疾低頭入兩膝間兩手交叉頭上十二通愈三蟲又云叩齒二七過輒咽氣二七如是三百通乃止為之二十日邪氣悉去六十日小病愈百日大病除三蟲伏尸皆去面體光澤出第十八卷中肘後療三蟲方茱萸根取東引指大者長一尺栝蔞四兩切上二味細銼茱萸根以酒一升漬之一宿旦絞去滓宿勿食旦空腹先吃脯然後頓服之小兒分三服亦療寸白蟲又方搗桃葉絞取汁飲一升千金集驗同一方云平旦飲三合又方真珠一兩研亂髮如雞子大燒末上二味納苦酒中旦空腹頓服之令盡集驗範汪同千金治蟯蟲又三蟲者謂長蟲赤蟲蟯蟲也乃有九種而蟯蟲及寸白人多病之寸白從食牛肉飲白酒所成相連一尺則殺人服藥下之須結裹潰然出盡乃佳若斷者相生未已更宜速除之蟯蟲多是小兒患之大人亦有其病令人心痛清朝口吐汁煩燥則是也其餘各種種不利人人胃中無不有者宜服九蟲丸以除之範汪療三蟲白蘞丸方白蘞狼牙雚蘆桃花貫衆各三分橘皮二分蕪荑一分上七味搗篩蜜丸如小豆大宿勿食旦以漿水服一劑日中乃食立下男子病大腹面黃欲食肉服此藥下赤蟲如筍莖者一尺所有頭目百餘枚病愈又九江謝丘病脅下有積大如杯小腹亦堅伏痛上下移嘔逆喜唾心下常痛欲食肉服此藥下蟲無頭足赤身有口尾二百餘枚得愈又九江陳昉病大腹煩滿常欲食生菜服此藥下白蟲大如臂小者百餘枚立瘥妊身婦人不得服之又療三蟲竹節丸方燒竹節雷丸各三分錫屑二分橘皮一分半上四味搗篩蜜丸如梧子大一服八丸日三服又療三蟲芎藭散方芎藭雷丸桔梗白芷各四分上四味搗散以蜜飲苦酒或米汁服方寸匕日三服又可用蜜丸如梧子吞十三丸當稍稍下不盡更服一劑出第十九卷中備急療三蟲方雚蘆四兩炙乾漆二兩熬吳茱萸四兩上三味為末依前先嚼脯以粥清服方寸匕日一服肘後範汪同雜療蟲方三首廣濟療蛔蟲寸白蟲方檳榔十二分當歸鶴蝨蕪荑熬橘皮各六分貫衆雷丸各四分上七味搗散空腹煮大棗湯服方寸匕日二服漸加至三匕微利無忌出第四卷中千金療蟯蟲蛔蟲及痔䘌蟲食下部生瘡桃湯方桃皮一兩槐子三兩艾葉一兩大棗三十枚上四味以水三升煮取半升空腹頓服之出第十八卷中又療寸白蟲化為水泄出永除方棐子檳榔蕪荑等分上三味為散溫酒服二錢匕先燒牛肉脯吃後服藥也
