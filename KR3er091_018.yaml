body:
  text: 卷第十八腳氣論二十三首千金論曰考諸經方往往有腳弱之論而古人少有此疾自永嘉南度衣纓土人多有遭者嶺表江東有支法存仰道人等並留意經方偏善斯術晉朝仕望多獲全濟莫不由此二公又宋齊之間有釋門僧深師仰道人述支法存等諸家舊方為三十卷其腳弱一方近百餘首魏周之世蓋無此病所以姚公集驗殊不殷勤徐王撰録未以為意特以三方鼎峙風教未一霜露不均寒暑不等是以關西河北之人不議此病自聖唐開闢六合無外南極之地襟帶是重爪牙之寄作鎮於彼不襲水土往者皆遭近來中國士大夫雖不涉江表亦有居然而患之者良由今代天下風氣混同物類齊等所致之耳然此病初得即先從腳起因即脛腫時人號為腳氣深師云腳弱者即其義也深師述支法存所用水平山敷施連範祖耀黃素等諸家療腳弱方凡八千餘條皆是精要學者尋覽頗覺繁重正是方集耳卒欲救急莫測指南今取其所經用灼然有效者以備倉卒余者不復具述論何以得之於腳問曰風毒中人隨處皆得作病何偏著於腳也答曰夫人有五臟心肺二臟經絡所起在手十指腎肝與脾三臟經絡所起在足十指夫風毒之氣皆起於地地之寒暑風濕皆作蒸氣足常履之所以風毒之中人也必先中腳久而不瘥遍及四肢腹背頭項也微時不覺痼滯乃知經云次傳間傳是也論得已便令人覺否凡腳氣病皆由感風毒所致得此病多不令人即覺會因他病一度乃始發動或奄然大悶經三兩日不起方乃覺之諸小庸醫皆不識此疾謾作余病療之莫不盡斃故此病多不令人識也始起甚微食飲嬉戲氣力如故唯卒起腳屈弱不能動有此為異耳黃帝云緩風濕痹是也論風毒相貌夫有腳氣未覺異而頭項臂膊已有所苦有諸處皆悉未知而心腹五內已有所困又風毒之中人也或見食嘔吐憎聞食臭或腹痛下痢或大小便澀祕不通或胸中衝悸不欲見光明或精神愍憒或喜迷忘語言錯亂或壯熱頭痛或身體酷冷疼煩或覺轉筋或腳脛腫或不腫或䏶腿頑痹或時緩縱不隨或復百節攣急或少腹不仁此皆腳氣狀貌也亦云風毒腳氣之候也其候難知當須細意察之不爾必失其機要一朝病成難可以理婦人亦爾又有婦人産後春夏取涼多中此毒宜深慎之其熱悶掣瘲驚悸心煩嘔吐氣上皆其候也又但覺臍下冷痞愊愊然不快兼小便淋瀝不同生平即是腳氣之候頑弱名緩風疼痛為濕痹論得之所由凡四時之中皆不得久立久坐濕冷之地亦不得因酒醉汗出脫衣靴襪當風取涼皆成腳氣若暑月久坐久立濕地者則熱濕之氣蒸入經絡病發必熱四肢痠疼煩悶若寒月久坐久立濕冷地者則冷濕之氣上入經絡病發則四體酷冷轉筋若當風取涼得之者病發則皮肉頑痹諸處瞤動漸漸向頭凡常之日忽然暴熱人皆不能忍得者當於此時必不得頓取於寒以快意也卒有暴寒復不得受之皆生病也世有勤功力學之士一心注意於事久坐行立於濕地不時動轉冷風來擊入於經絡不覺成病也故風毒中人或先中手足十指因汗毛孔開腠理疏通風如擊箭或先中足心或先中足趺或先中膝以下踹脛表裡者若欲使人不成病者初覺即灸所覺處三二十壯因此即愈不復發也黃帝云當風取涼醉已入房能成此疾論冷熱不同問曰何故得者有冷有熱答曰足有三陰三陽寒中三陽所患必冷暑中三陰所患必熱故有表裡冷熱冷熱不同熱者療以冷藥冷者療以熱藥以意消息之脾受陽毒即熱頭腎受陰濕即寒痹論須療緩急凡小覺病候有異即須大怖畏決意療之傷緩氣上入腹或腫或不腫胸脅逆滿氣上肩息急者死不旋踵寬者數日必死不可不急療也但看心下急則氣喘不停或白汗數出或乍寒乍熱其脈促短而數嘔吐不止者皆死也論脈候法凡腳氣雖復診候多塗而三部之脈要須不違四時者為吉其逆四時者勿治余如脈經所說此中不復具載其人本黑瘦者易治本肥大肉厚赤白者難愈黑人耐風濕赤自不耐風瘦人肉硬肥人肉軟肉軟則受疾至深難已也論腫不腫凡有人久患腳氣不自知別於後因他病發動療之得瘥後直患嘔吐而復腳弱余為診之乃告為腳氣病者曰我平生不患腳腫何因名為腳氣不肯服湯余醫以為石發狐疑之間不過一旬而死故腳氣不得一向以腫為候有腫者亦有不腫者其以小腹頑痹不仁者腳多不腫小腹頑後不過三五日即令人嘔吐者名腳氣入心如此者死在旦夕凡患腳氣到心難治以其腎水克心火故也論須慎不須慎凡腳氣之病極須慎房室羊肉牛肉魚蒜蕺菜菘菜蔓荊瓠子酒面酥油乳糜豬雞鵝鴨有方用鯉魚頭此等並切禁不得犯之並忌大怒唯得食粳米梁米粟米醬豉蔥韭薤椒姜橘皮又不得食諸生果子酸醋之食犯之者皆不可瘥又大宜生牛乳生栗子論善能療者幾日可瘥凡腳氣病枉死者衆略而言之有三種一覺之傷晚二驕狠恣傲三狐疑不決此之三種正當枉死之色世間雖有良醫而病人有性靈堪受入者更復鮮少故雖有騏驥而不遇伯樂雖有尼父而人莫之師其為枉橫亦猶此也今有病者有受入性依法使余療之不過十日可得永瘥矣若無受入性者亦不須為療縱令療之恐無瘥日也非但腳氣諸病皆然良藥善言觸目可致不可使人必服法為信者施不為疑者說出第七卷中病源凡腳氣病皆由感風毒所致也得此病者多不即覺或先無他病而忽得之或因衆病後得之初甚微飲食嬉戲氣力如故當熟察之其狀自膝至腳有不仁或若痹或淫淫如蟲所緣或腳指及膝脛灑灑爾或腳屈弱不能行或微腫或酷冷或㾓疼或緩縱不隨或攣急或有至困能飲食者或有不能者或見飲食而嘔吐惡聞食臭或有物如指發於踹腸徑上衝心氣上者或舉體轉筋或壯熱頭痛或胸心鬆悸寢處不欲見明或腹內苦痛而兼下者或語言錯亂有善忘誤者或眼濁精神惛憒者此皆病之證也若療之緩便上入腹入腹或腫或不腫胸脅滿氣上便殺人急者不全日緩者或一二三月初得此病便宜速療之不同常病也病既入臟其脈有三品內外證候相似但脈異耳若病人脈得浮大而緩宜服續命湯兩劑若風盛宜作越婢湯加朮四兩若脈轉快而緊宜服竹瀝湯若脈微而弱宜服風引湯二三劑此皆多是因虛而得之若大虛乏短氣可間服補湯隨病體之冷熱而用之若未愈更服竹瀝湯若病人脈浮大而緊快此是三品之中最惡脈也脈或沉細而快者此脈正與浮大而緊者同是惡脈浮大者病在外沉細者病在內療亦不異當消息以意耳其形或尚可而手腳未及至弱數日之內上氣便死如此之脈急服竹瀝湯日服一劑湯勢常令相及勿令半日之內空無湯也若服竹瀝湯得下者必佳也此湯竹瀝多服之皆須熱服之不熱輒停在胸膈更為人患若已服數劑病及脈勢未折而若脹滿者可作大鱉甲湯下之湯勢盡而不得下者可以丸藥助令得下下後更服竹瀝湯輒令脈勢折氣息料理乃佳江東嶺南土地卑下風濕之氣易傷於人初得此病多從下上所以腳先屈弱然後毒氣循經絡漸入腑臟腑臟受邪氣便喘滿以其病從腳起故名腳氣其湯尉針石別有正方補養宣導今附於後養生方導引法云坐兩足長舒自縱身內氣向下使心內氣一作柔和適散然後屈一足安膝下努長舒一足仰取指向上便急仰眠頭不至席兩手急努向前頭向上努挽一時各各取勢來去二七遞互亦然去腳疼腰膊冷血冷風痹日日漸損又云覆臥傍視內踵生腰以鼻內氣自極七息除腳中弦痛轉筋腳痠疼腳痹弱又云舒兩足坐散氣向湧泉可三通氣徹到始收右足屈卷將兩手急捉腳湧泉挽足踏手手挽足踏一時取勢手足用力逆氣向下三七不失氣數尋去腎中冷氣膝冷腳疼又云一足屈之足指仰俟急一足安膝頭散心兩足跟出氣向下一手拓膝頭向下急捺一手向後拓席一時極勢左右亦然二七去膝痹疼急又云一足踏地一足向後將足解溪安腨上急努國手偏相向後側身如轉極勢二七左右亦然去足疼痛痹急腰痛出第十三卷中吳氏竊尋蘇長史唐侍中徐王等腳氣方身經自患三二十年各序氣論皆有道理具述灸穴備說醫方咸言總試但有效驗比來傳用實愈非虛今撰此三本勒為二卷色類同者編次寫之仍以朱題蘇唐徐姓號各於方論下傳之門內以救疾耳蘇長史論曰腳氣之為病本因腎虛多中肥溢肌膚者無問男女若瘦而勞苦肌膚薄實皮膚厚緊者縱患亦無死憂一瘥以後又不可久立蒸濕等地多飲酒食麵心情憂憒亦使發動晉宋以前名為緩風古來無腳氣名後以病從腳起初發因腫滿故名腳氣也又有不腫而緩弱行卒屈倒漸至不仁毒氣上陰攻心便死急不旋踵寬延歲月耳然則緩風毒氣得其總稱矣近來諸醫多宗小品所說粗為詳悉而因循舊貫頗為膠柱肘後單略時有可依集驗亦遵小品胡洽陶公微在梗概並非身以經患不能原始要終也今略述病有數種形證不同一人經病三十年中便數發每發差異為療亦殊前用經效後用便增一旬之內變候不等未能深達往往致斃固不可先方救後發也鄙年二十許時因丁憂得此病三十年中已經六七度發每發幾死後發時大況雖同三分論之二分有異依舊用差方療不復有效更張乃瘳耳一分同者毒氣除後手足緩弱頑痹不仁服側子金牙酒往往得瘥此酒腳氣之要也余無以加痿蹙不能動者服之指期取起二分異者毒氣入腹冷熱不同已經投藥虛實亦異或補或瀉須臨時變革也按小品集驗腳氣脈三種以緩脈為輕沉緊為次洪數者為下自三十年凡見得此病者數百脈沉緊者多死洪數者並生緩者不療自瘥大況如此療之違法雖輕亦殆療之得理雖重可生也凡腳氣為疾不同余病風毒不退未宜停藥比見病者皆以輕疾致斃或以病小則言疾自愈廢藥不服或已服藥而患末退諸藥病相違乃改為他療皆自取危殆如之何略述所知以示同病者蘇凡腳氣病多以春末夏初發動得之皆因熱蒸情地憂憒春發如輕夏發更重入秋少輕至冬自歇大約如此亦時有異於此候者近入京以來見在室女及婦人或少年學士得此病者皆以不在江嶺庸醫不識以為他病皆錯療之多有死者風氣毒行天下遍有非獨江嶺間也既婦人亦病又非由腎虛而得卑濕之土斯病尤衆不為此療冤死極多深用哀悼無如之何夫療腳氣者須順四時春秋二時宜兼補瀉夏時疾盛專須汗利十月以後乃用補藥雖小小變通終不越此法或有凡人曾以夏時見患汗利得差冬時遇病還令汗利冬時見患用補藥得除夏時遇病還用補藥此並下愚專固同之醫者雖懷濟物之心翻有致死之效既未深達以何瘥療又如野葛救飢人乎今録此方並經試驗患者披覽當狀自療必有驗效殊勝庸醫也幸當傳之以濟危殆矣蘇凡腳氣病雖苦虛羸要不可補之補藥唯宜冬月酒中用之丸散亦不可補服之臚脹非瀉不瘥唯昆布丸用葶藶子大黃乃佳耳庸醫多不曉此謂為腎虛多將補藥有不經劑而斃也古方多用風引續命湯療之猶十愈一二若氣毒少而風多者若以療腳氣法用療風則十愈八九矣如當病用藥終無不瘥腳氣非死病若不肯療蓋自取死非病能殺人也若在遠無藥物處病毒深非灸不能瘥病者不論耳中華足藥病不肯療而致死者深可痛哉蘇夫腳氣病不可常服補藥補藥多令鼓脹緊實難救也每月之中須五六度行利為佳縱常服藥時時取利亦宜時取汗當候冷熱隨時消息不可專一法覺熱煩口乾頭面熱悶即須取冷覺頑痹不仁身體強屈冷疼者便暖將息此並可解尋常飲酒作豉酒服之大辟風濕兼利腰腳晝日莫多臥須力遨遊舒暢情性以勿睡也蘇諸毒氣所攻攻內則心急悶不療至死若攻外毒出皮膚則不仁不仁者膏摩之瘥若未出皮膚在榮衛刺痛者隨痛處急宜灸三五炷即瘥不必要在孔穴也遠方無藥物處急宜灸之腹背手足諸要穴皆能療此病縱明堂無正文但隨所苦火文徹處痛便消散此不可不知也又候灸瘡瘥後瘢色赤白平復如本則風毒盡矣若色青黑者風毒未盡仍灸勿止待肢體輕乃休矣蘇療腳氣不可全補當依前論隨四時候病虛實療之常宜食犢肉犢蹄鯽魚鯉魚豬兔肉蔥芥薤蓴等菜豬肝食法先湯中浸之使才熟作臠切以醬汁和水並著一抄米姜椒煮令極熟每食下飯大補益消得腳氣生薑蒜豉當食大佳不宜食麵及羊肉蘿蔔蔓荊韭酒醉房室久立冷濕船行水氣夏月屋中濕氣熱氣勞劇哭泣憂憒如此等類好使氣發也初以微發即服煮散以壓之服煮散不必日別二三服量病輕重日一服或二日一服以攘毒耳若毒氣盛非煮散所能救者急服麻黃等湯也毒氣既退唯苦頑痹兩腳緩弱十月服側子酒不至三劑皆即能行蘇凡腳氣復發或似石發惡寒壯熱頭痛手足冷或似瘧發發作有時又似傷寒脈甚洪急七日以後壯熱既定則腳氣狀見也冷毒盛脹即服金牙酒熱盛脹即服紫雪平平脹者單用檳榔飲子亦瘥患腳氣人遠行在家常有金牙紫雪不虞病發便能起死諸大湯藥卒求難濟蘇凡腳氣虛病猛在皮膚毒未入者可服三五劑大小竹瀝湯唯宜多熱者大小續命湯時宜可用不宜多至十劑也石斛酒及鍾乳酒惡於側子而傷緩鈍小石斛散及鍾乳散宜多冷者猶不如側子酒中加鍾乳一二十兩白石英一二斤合漬服之其力數倍兩腳緩弱者服之百日皆起行消息腳氣法依此消息必得氣愈第一忌嗔嗔即心腹煩煩即腳氣發第二忌大語大語即損肺肺損亦發動又不得露腳當風入水以冷水洗腳腳脛尤不宜冷雖暑月常須著綿褲至冬寒倍令兩脛溫暖微有汗是大佳依此將息氣漸薄損每至醜寅日割手足爪甲丑日指寅日足亦宜十二日一度割少侵肉去氣又數須用梳攏頭每梳欲得一百餘梳亦大去氣每旦長展腳坐手攀腳七度虛攀一度令手著腳趾漸至腳心腳極踏手極攀每日如此腳氣亦不傷人唐若頭面及項少似熱氣上即露背膊取冷勿使腰腎冷其背膊冷極厚著衣須如此姑息必漸瘥若不解將息立見危殆困篤轉加易發致損性命洗面及腳皆須熱湯小添冷水洗之又不得食酸飯不用乘馬若能步行勞筋力其腳氣自然漸瘥唐凡腳氣病人不能永瘥至春夏還復發動夏時腠理開不宜臥睡睡覺令人按挼勿使邪氣稽留數勞動關節常令通暢此並養生之要拒風邪法也尋常有力每食後行五百步罷倦便止此腳中惡氣隨即下散雖浮腫氣不能上也出上卷中服湯藥色目方一十九首千金風毒之氣入人體中脈有三品內外證候相似但脈有異耳若脈浮大而緩宜服續命湯兩劑應瘥若風盛宜作越婢湯加朮四兩若脈浮大而緊轉快者宜服竹瀝湯若病人脈微而弱宜服風引湯兩劑應瘥此人脈多是因虛而得之若大虛短氣力乏可其間作補湯隨病冷熱而用之若未愈更服竹瀝湯若病人脈浮大而緊快此是三品之中最惡脈也脈或沉細而快者此脈正與浮大而緊者同是惡脈浮大者病在外沉細者病在內治亦不異但當消息以意耳其形尚可而手腳未及至弱數日之中氣上便終如此之脈往往有人得之無一存者急服竹瀝湯日服一劑切要湯勢常令相及勿令半日之中空無湯也此湯竹汁多服之若不極熱輒停在胸心更為人患每服當使極熱若服竹瀝湯得下者必佳也若己服三劑竹瀝湯病及脈勢未折而若腹脹滿可以大鱉甲湯下之湯勢盡而不得下可以丸藥助湯令得下下後更服竹瀝湯趣令脈勢折氣息料理便停得服三十二物八風散佳又初得病便摩野葛膏日再頑痹腳弱都愈乃止若服竹瀝湯脈勢折如未病時氣力轉勝腳故未能行體力充足然後漸微行步病重者瘥後半年始能扶人行耳既覺脈及體內差但當勤服八風散勿以腳未能行輕加余療余療末必得益更生諸惡失此諸療也猥人邊亦勿行野葛膏有人聞竹瀝湯即云恐傷腰腳者即勿與療宜知此法人無受八性者不可醫故也不為疑者說此之謂也竹瀝湯有三首輕者服前方重者次第服後方此風毒乃相注易病人宜將空缺服小金牙散以少許塗鼻孔耳門病困人及新亡人喜易人強健人宜將服之亦以塗耳鼻乃可臨近亡人及視疾者絳囊帶一方寸匕男左女右臂上此散毒服宜從少始金牙散方在第十二卷中病人唯宜服赤小豆飲冬服側子金牙酒續命湯療風毒病初得似天行毒病而脈浮緩終不變快此不療或數日而死或十日而死或得便不識人或發黃或發斑或目赤或下部穿爛或腿膝穿漏者此最急得之即先服續命湯一劑須服葛根湯麻黃湯下之若故不折更與續命湯兩三劑必瘥此病太急令湯勢相接不可使半日缺湯即便殺人又第一竹瀝湯療兩腳痹弱或轉筋皮肉不仁脹起如腫按之不陷心中惡不欲食或患冷方甘草三兩炙秦艽一兩葛根一兩附子二枚炮黃芩一兩麻黃一兩去節防己一兩杏仁五十枚防風一兩半升麻一兩茯苓三兩細辛一兩竹瀝五升桂心一兩乾薑一兩上十五味切以水七升合竹瀝煮取三升分三服取汗忌海藻菘菜豬肉醋物生菜生蔥翼方無茯苓杏仁有白朮又第二大竹瀝湯療猝中風口吃不能語言四肢緩縱偏痹攣急痛風經五臟恍惚恚怒無常手足不隨方竹瀝一斗四升獨活二兩芍藥二兩桂心二兩防風二兩麻黃一兩去節白朮二兩葛根二兩生薑三兩茵芋二兩細辛二兩茯苓三兩防己一兩烏頭一枚炮人參一兩石膏一兩黃芩二兩芎藭二兩甘草二兩炙上十九味切以竹瀝煮取四升分六服先未汗者取汗一狀相當即服忌同翼方無白朮又第三竹瀝湯療風毒入人五內短氣心下煩熱手足煩疼四肢不舉皮肉不仁口噤不能語方當歸二兩防風三兩生薑八兩白朮三兩人參二兩黃芩二兩芎藭二兩細辛二兩桂心二兩茯苓三兩甘草二兩炙附子二枚炮秦艽三兩葛根五兩升麻二兩麻黃二兩去節蜀椒一兩汗上十七味切以甘竹汁一斗九升煮取四升分五服忌同翼方有芍藥茯神防己通草無茯苓黃芩芎藭升麻蜀椒麻黃生薑並出第七卷中千金翼療腳氣常作榖白皮粥防之法即不發方榖白皮切五升炙勿取班者有毒上一味以水一斗半煮取七升去滓煮米粥常食之出第十六卷中崔氏療腳氣夏月須食瓜及瓜飲子方生瓜一枚去蒂四破以水五升煮令爛去滓白朮二兩生薑一兩上三味切二物以前汁煮取二升去滓分三服禁食桃李雀肉等生瓜恐是木瓜出第六卷中又療腳氣毒遍內外煩熱口中生瘡者方服紫雪強人服如兩棗大弱者減之和水服當利熱毒若經服石發熱毒悶者服之如神勝三黃湯十劑備急同又若冷脹毒悶方服金牙散以湯如桃李許和散如棗核大服卒患取利及吐者一服四分匕用之若神良備急同並出第九卷中必效療腳氣方蒼耳子五升赤小豆二升鹽一斤上三味以水一石五斗緩火煎取五六斗去滓別貯取受鬥半鐺於前泥四面開一畔入火處鐺內著所煎汁用浸腳終令沒踝鐺下微著炭火常令溫溫如汁漸盡不沒踝續續添使沒浸時仍於蜜房中床前遮閉為垂腳恐風不能久坐之仰臥亦得連夜浸之彌佳浸經三日外其欲食飲常苦飢便食任食此一劑藥汁盡必瘥不過用半汁即可覺漸可一日兩日食一頓生豬肉鱠大精此方甚效又方取上好椒未經蒸者取三大斗分為兩袋袋以布作長八寸椒須滿實勿使虛即以醋漿水三大升鹽一大升納在漿中即煮椒袋可經十餘沸即止其鐺釜底仍微著火勿使冷又取冷醋漿一大升安貯盆中即取前件袋一枚納於冷漿盆裡患人於床上坐垂腳床下盆安地上將兩腳踏盆中熱袋上其椒袋冷熱令可忍覺椒袋如冷即換取釜中熱袋還准前盆中以腳踏之如冷還於舊釜中以火溫使熱更互用之其床前可垂氈席到地勿使風吹腳如兩腳至膝以來牽風如蟲行頭項及四肢身體總於腹中如雷鳴氣下即休踏椒袋得汗間覺心氣悶可取冷飯吃二三口以鹿脯下勿食豬羊肉魚及臭穢又不得食粳米如須和羹可以蘇和兼生薑合皮吃麵餅蒜蔥醬豉醋等並得食踏袋得汗已後覺微利勿怪之此是病狀通泄之候若不瘥隔日三日二回取舊湯袋依前法踏之得汗還止覺腹中緩空能食起即停如未覺損終而復始以瘥為度白桑葉膏服之亦可不相妨又方白椹桑葉切細取大斗一石如無葉即取軟條還細銼取一石以清水一石五斗於一釜中和上件一石白桑椹葉即火煮使常沸其湯可有五斗許即濾卻葉更煎可有二斗以來移於鐺中又煎取三升以下二升以上似稠餳即止每旦空腹服一匙至日晚又服一匙如嘔不能下可和羹和粥和食能吃不嘔能服一七日以上即覺四肢能暢下泄氣泄氣以後兩腳腫勿怪此得藥力是病瘥候此法已經療五六十人以上異種神效又方大半夏三兩淨削去皮生薑汁三升上二味水五升煮取二升去滓空腹一服盡每日一劑三劑必好禁羊肉餳此方梁公家出方始有本奇異神效並出第三卷中蘇恭云凡患腳氣每旦早食任意飽午後少食日晚不食彌佳如飢可食豉粥若瞑不消及吃難消之物致霍亂轉筋十不一活若晚食不消欲致霍亂者方高良薑一兩打碎上一味以水三升煮取一升頓服盡即消待極飢乃食一碗薄粥其藥唯極飲之良若卒無高良薑取母姜一兩切之以清酒一升煮令極沸並滓飲之雖不及高良薑亦大驗又若已覺著腳氣宜服此方蒜三升去心切熬令黃色桃仁一升去皮尖雙仁熬令紫色豉一大升熬令香上三味合和生絹袋盛以美酒一斗漬之夏月三日冬月七日初服半升漸加至二升量增減若盡更著五升美酒漬飲之加椒一二合尤妙又方香豉一升小便一升和漬少時令有稠色去滓平旦空腹服三日一停三日復作服以瘥為度又紫雪療腳氣毒遍內外煩熱口中生瘡狂易叫走及解諸石草熱藥毒發邪熱卒黃等瘴疫毒癘卒死溫瘧五尸五注心腹諸疾絞刺切痛蠱毒鬼魅野道熱毒小兒驚癇百病最良方黃金百兩寒水石三斤石膏三斤磁石三斤滑石三斤玄參一斤羚羊角五兩屑犀角五兩屑升麻一斤沉香五兩丁子香一兩青木香五兩甘草八兩炙上十三味以水一斛先煮五種金石藥得四斗去滓後納八物煮取一斗五升去滓取硝石四升芒硝亦可用朴硝精者十斤投汁中微炭上煎柳木簞攪勿住手有七升投在木盆中半日欲凝內成研硃砂三兩細研麝香當門子五分納中攪調寒之二日成霜雪紫色病人強壯者一服二分當利熱毒老弱人或熱毒微者一服一分以意節之合得一劑支十年許用大神妙不用余論腳氣病經服石藥發熱毒悶者服之如神水和四分服勝三黃湯十劑以後依舊方用麝香丸下腳氣或熱脹曾用不如金牙散良忌海藻菘菜生血物等又金牙散方此方並要金牙研曾青研礬石研尼裹燒半日丹砂研雄黃研朴硝研寒水石研代赭研龍骨研犀角屑獺肝炙鸛骨炙貍骨炙巴豆去心皮熬大黃野葛皮炙各三分牛黃別入麝香別研升麻桂心附子生用去皮鬼臼鬼督郵黃環鳶根本草有鳶尾此云鳶根即是用鳶尾之根也青木香牡蠣熬蘇合香研別入常山茯苓黃耆知母龍膽各二分露蜂房玉支茵草一本作茵芋鬼箭羽徐長卿石長生蜀漆當歸桔梗白薇各一分蜈蚣一枚炙蜴蜥一枚炙蕪青炙地膽炙亭長炙各三十九枚椒四十九枚汗上四十九味合搗為散以湯如桃李許和散三分匕或如棗核服之常患者日再服平患取利吐者服四分匕若以絳袋裡方寸匕三匕帶之闢諸惡厲忌食生冷蘆筍生蔥菜豬肉冷水醋物陳臭生血等物合藥用臘月王相日勿令積汙風見之以臘紙裹得二年用此藥能冷熱能虛實說其功效卒不盡矣凡服藥散酒丸等但所服者衆蒙效者寡或五藏證候不同七情有所乖舛分兩參瘥冷熱有異故陶隱居云醫者意也古之所謂良醫蓋以其意量而得其節是知療病者皆意出當時不可以舊方醫療今之人或異於此病勢少與方題似便即以和合病機未察診候宜然大同小異致令乖舛實取危殆如之何又云代無良醫枉死者半此之一言深可悲也凡患腳氣者雖苦虛羸不得多服補藥服之臚脹非瀉不瘥但益虛羸也唯冬月得用補藥如冬月仍患氣不除者亦不得服可斟酌此大都患氣尋常須微利但不得大利益虛耳凡腳頑至冬則定者多所以然冬腎王王則不受邪所以腰腳得利也凡此有五種冷腳氣熱腳氣平平腳氣大虛腳氣大實腳氣或患變作五者冷者專瀉亦兼療風毒尋趁腳氣乃似傷寒參差危殆深須曉識若不通博不如不為金牙散功少大猛就中姑息兼療諸病蠱毒注忤鬼魅野道肺痿骨蒸傳尸相易為第一藥用物既多斟酌用悉要者乃為施功少合之須得真好法得瘥不要盡劑用之並出第一卷中近效療腳氣方附子五兩炮甘草五兩大炙上二味並細銼以水五斗煎取二斗半置盆中以板子闊三寸許橫湯上共水面平腳踏板上以湯將腳水冷即休此湯得四五度用腳氣求除此方極驗又桑煎療水氣肺氣癱腫兼風氣方桑條二兩亦用上一味細銼如豆以水一大升煎取三大合如欲得多造准此增加先熬令香然後煎每服肚空吃或如茶湯或羹粥每服半大升亦無禁忌又本方云桑枝平不冷不熱可以常服療遍體風癢乾燥腳氣風氣四肢拘攣七氣眼暈肺氣咳嗽銷食利小便久服輕悅耳目令人光澤兼療口乾仙經云一切仙藥不得桑煎不服出枹朴子桑枝細切一小升上一味熬令香以水三大升煎取二大升一日服盡無問食前後比服只依前方腳氣不隨方五首崔氏側子酒療腳氣不隨方側子四兩炮生石斛八兩碎磁石八兩獨活三兩秦艽三兩甘草三兩炙紫蘇莖一握前胡四兩防風三兩茯苓八兩黃芩三兩五味子四兩防己三兩桂心二兩丹參三兩蜀椒二兩出汗山茱萸四兩芎藭二兩細辛二兩當歸三兩白朮四兩乾薑三兩薏苡仁一升三合上二十三味薄切絹袋貯以清酒四升浸五日一服四合日再細細加至八九合溫飲慎生冷豬肉蒜面其中間覺熱渴得飲豉酒豉仍須蒸暴之忌海藻菘菜桃李雀肉生蔥生菜及醋物等又煮散方地骨皮十二分麻黃六分去節杏仁八分去皮尖兩仁防己二十分黃芩十分羚羊角屑八兩茯苓十二分澤瀉六分細辛五分薏苡仁二十分石斛二十分人參六分白朮十分大黃六分磁石二十分丹參十分犀角八分屑蒺藜子十二分甘草十分炙桂心六分生薑十二分前胡八分上二十二味搗以粗葛篩度攪使極調三兩為一劑以後藥汁二升煮取一升頓服之日服一劑以小便利為度忌海藻菘菜生蔥菜桃李雀肉醋等物又小飲子法用煮前散大棗五枚擘桑根白皮五兩白前二兩橘皮二分上四味切以水五升煮取二升將煮前散慎如藥法又若腳氣上入少腹少腹不仁即服張仲景八味丸方乾地黃八兩澤瀉四兩附子二兩炮薯蕷四兩茯苓三兩桂心三兩牡丹三兩去心山茱萸五兩上八味搗篩蜜和為丸如梧子酒服二十丸漸加至三十丸仍灸三里絶骨若腳數轉筋灸承山若腳脛內稍不仁灸三陰交忌豬肉冷水生蔥醋物蕪荑又腳氣雖瘥至冬季間常須服側子酒方側子二兩炮乾薑二兩石斛八兩丹參三兩牛膝二兩甘草二兩炙防風三兩乾地黃四兩芎藭二兩當歸三兩桂心三兩五味子三兩白朮二兩秦艽三兩防己二兩椒二兩汗獨活三兩山茱萸四兩細辛二黃芩二兩茯苓四兩附子一兩炮上二十二味切絹袋貯以酒三斗五升浸秋冬七日春夏五日一服四合日二細細加之以知為度得食羊鹿獐肉雞亦得食忌海藻菘菜豬肉冷水桃李雀肉生蔥生菜蕪荑酢物並出第六卷中風毒腳弱痹方六首千金療惡風毒氣腳弱無力頑痹四肢不仁失音不能言毒氣衝心有人病者但一病相當即服第一服此麻黃湯次服第二第三第四方麻黃一兩去節防風二兩大棗二十枚擘當歸二兩茯苓三兩升麻二兩芎藭二兩白朮二兩芍藥二兩麥門冬二兩去心黃芩二兩桂心二兩杏仁三十枚去皮心甘草二兩炙上十四味切以水九升清酒二升合煮取二升半分四服日三夜一覆令小汗粉之莫令見風忌海藻菘菜生蔥桃李雀肉酢物第二服獨活湯方獨活四兩乾地黃三兩芍藥二兩葛根一兩桂心二兩生薑五兩麻黃二兩去節甘草二兩炙上八味切以水八升清酒二升合煮取二升五合去滓分四服日三夜一犯之一世不愈忌同腳弱特忌食瓠子蕺菜第三服兼補厚朴湯並治諸氣咳嗽逆氣嘔吐方吳茱萸一升一方用三兩半夏七兩洗乾地黃二兩生薑一斤芎藭二兩桂心二兩厚朴二兩炙芍藥二兩當歸二兩人參二兩黃耆三兩甘草三兩炙上十二味切以水二斗煮豬蹄一具取一斗二升去上肥納清酒三升合煮取三升分四服相去如人行二十里久忌同又第四服風引獨活湯兼補方獨活四兩人參二兩附子一兩炮大豆二升桂心二兩防風二兩芍藥二兩當歸二兩茯苓三兩黃耆二兩乾薑二兩甘草三兩炙升麻一兩半上十三味切以水九升清酒三升合煮取三升半去滓分四服相去二十里久忌同又療腳弱神驗防風湯方防風三兩獨活二兩黃芩二兩茵芋二兩葛根二兩芎藭二兩細辛一兩蜀椒一兩出汗防己一兩桂心一兩芍藥二兩麻黃一兩去