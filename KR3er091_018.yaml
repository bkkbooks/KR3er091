說種種不同破壞病人心意莫知孰是遷延未定時不待人欻然致禍各自散走是故大須好人及好名醫識疾深淺探順方書博覽古今是事明解者看病不爾大誤人事竊悲其如此者衆故一一顯析具述病之繇狀令來世病者讀之以自防備也但有一狀憂恚積思喜怒悲歡復隨風濕結氣咳時嘔吐食以變大小便不利時泄利重下溺血上氣吐下乍寒乍熱臥不安席小便赤黃時時惡夢夢與死人共食飲入冢神室魂飛魄散筋極則傷肝傷肝則腰背相引難可俯仰氣極則傷肺傷肺則小便有血目不明髓極則陰痿不起住而不卒骨極則傷腎傷腎則短氣不可久立陰疼惡寒甚者卵縮陰下生瘡濕癢搔之不欲止汁出此皆為腎病甚者多遭風毒四肢頑痹手足浮腫名曰腳弱一名腳氣醫所不療此皆主之方天門冬三斗半去心搗壓取令汁盡獐骨一具碎以水一石煮取五斗澄清枸杞根切三斗半淨洗水二石五斗煮取一斗三升澄清酥三升煉生地黃切三斗半搗壓如天門冬法白蜜三升煉上六味並大斗銅器中微火先煎門冬地黃汁減半乃合煎取大十二斗下後散藥煎取一斗納銅器中重釜煎令隱掌可丸平旦空腹酒服如梧子二十丸日二稍加至五十丸擇四持王相日合之散藥如下茯苓柏子仁桂心白朮葳蕤菖蒲遠志肉去心澤瀉薯蕷人參石斛牛膝杜仲細辛蔓荊子獨活枳實炙芎藭黃耆蓯蓉續斷狗脊黑者萆薢白芷巴戟五加皮覆盆子橘皮胡麻仁大豆黃卷各二兩甘草六兩炙薏苡仁一升蜀椒一兩汗阿膠十兩炙鹿角膠五兩炙大棗一百枚煮作膏石南二兩茯神二兩上三十八味搗絹下篩納煎中有牛髓鹿髓各加三升大佳小便澀去柏子仁加秦艽二兩乾地黃六兩陰痿失精去葳蕤加五味子二兩頭風去柏子仁加菊花二兩防風二兩小便利陰氣弱去細辛防風加山茱萸二兩腹中冷去防風加乾薑二兩無他疾依方合之凡此煎至九月下旬採藥立冬日合而服之至五月上旬止若十二月臘日合者經夏至七月下旬即服之若停經夏不壞當於舍北陰處入地深六尺填沙置藥沙中上加少土覆之即經夏不壞也女人先患熱者得服冷者勿服又大鱉甲湯療腳弱風毒攣痹氣上及傷寒惡風溫毒及山水瘴氣熱毒四肢痹弱方鱉甲二兩炙防風一兩麻黃一兩去節白朮一兩吳茱萸五合知母一兩升麻一兩大棗二十枚擘貝齒七枚燒茯苓一兩橘皮一兩芎藭一兩杏仁一兩犀角半兩屑生薑三兩人參一兩赤小豆三合青木香半兩麝香三銖研羚羊角一分屑麥門冬一兩去心大黃一兩半薤白十四枚烏頭七枚炮石膏一兩碎雄黃二分研半夏一兩洗當歸一兩葳蕤一兩芍藥一兩甘草一兩炙上三十一味切以水二斗煮取四升去滓分六服相去十里久得下止一方用大黃二分畏下可用一分也一方用羚羊角二分毒盛可用三分也忌海藻菘菜莧菜桃李雀肉醋物羊肉餳等一方有山茱萸翼方無知母升麻橘皮芎藭當歸葳蕤又小鱉甲湯療身體虛脹如微腫胸心痞滿有氣壯熱少腹厚重兩腳弱方鱉甲三兩炙升麻三兩黃芩三兩麻黃三兩去節羚羊角三兩屑前胡四兩桂心三兩烏梅二七枚擘杏仁三兩薤白二十一莖上十味切以水一斗煮取二升七合去滓分三服此常用若體強壯須利者加大黃二兩忌莧菜生蔥又療風虛腳弱手足拘急攣疼痹不能行動腳趺腫上膝少腹堅如繩約氣息常如憂患不能食飲者皆由五勞七傷腎氣不足受風濕故也宜服內補石斛秦艽散方石斛四分秦艽五分山茱萸三分蜀椒二分汗五味子二分麻黃三分去節桔梗三分前胡三分白芷二分白朮二分附子炮獨活天門冬去心桂心各四分烏頭五分炮人參五分天雄四分炮乾薑五分防風五分細辛三分杜仲五分莽草三分炙當歸五分上二十三物搗篩為散酒服方寸匕日再服不知加至二匕虛人三建皆炮實人亦可生用風氣者本因腎虛既得病後毒氣外滿則灸泄其氣內滿則藥馳之當其救急理必如此至於風消退四體虛弱餘毒未除不可便止宜服此散推陳致新極為良妙此既人情可解者無可疑焉忌桃李雀肉豬肉冷水生蔥生菜鯉魚並出第七卷中腳氣嘔逆不下食方二首文仲瓜飲療腳氣嘔逆不得食方生瓜一枚四破水九升煮取五升去滓白朮四兩甘草一兩炙生薑二兩上四味切三物納瓜汁中煮取二升去滓溫分三服忌桃李雀肉海藻菘菜生瓜恐是木瓜出第九卷中延年茯苓飲主腳氣腫氣急上氣心悶熱煩嘔逆不下食方茯苓三兩紫蘇葉三兩杏仁三兩橘皮三兩升麻三兩柴胡三兩生薑四兩犀角二兩屑檳榔十二枚並皮子碎上九味切以水八升煮取二升五合去滓分溫三服如一人行八里久忌醋物出第十九卷中腳氣疼不仁方二首病源此由風濕毒氣與血氣相搏正氣與邪氣交擊而正氣不宜散故疼痛邪在膚腠血氣則澀隔則皮膚厚搔之如隔衣物不覺知名為不仁也出第十三卷中蘇恭療初患腳足皮膚舒緩足上不仁膝下疼痛眉眼動左脅下氣每飽食即發隔上熱臍下冷心虛陰汗且疼兼補煮散方黃耆人參獨活芎藭防風當歸桂心萆薢防己各六兩茯苓白朮丹參各八兩附子生用甘草炙各四兩杏仁去皮尖生地黃生薑磁石二十分碎如小豆上十八味並切分之為三十服服別以生薑二兩生地黃一兩杏仁十四枚碎以水二升煮取七合布絞去滓一服之常以日晚或夜中服之不妨公事如逆嘔者加半夏一兩如前加減法忌豬肉冷水海藻菘菜生蔥桃李雀肉醋物羊肉蕪荑及腸三日以後並無禁忌又側子酒主腳氣春夏發入秋腫消氣定但苦腳弱不能屈伸足上不仁手指脹悶不得屈伸四肢腰頸背皆廢者服此酒方側子生用乾薑各五兩生者良丹參牛膝各六兩金牙碎綿裹磁石如上生石斛各一斤乾用八兩石南炙獨活六兩炙萆薢生茱萸生地黃各十兩乾者用八兩防風茯苓各四兩五加皮薏苡仁各一兩茵芋炙椒各兩汗桂心天雄生用人參芎藭當歸白朮細辛各二兩上二十五味切絹袋貯清酒六七斗漬之七日成一服一小盞日二三服量性多少稍加以痹為度若婦人服去石南丈夫苦冷著孔公孽鍾乳等多至一二斤少至七八兩服此酒時須隨病內外灸三兩處以泄氣忌豬肉冷水醋物生蔥桃李雀肉生菜蕪荑等並出第一卷中腳氣衝心煩悶方二十二首廣濟療腳氣衝心悶洗腳漬湯方糜穰一石納釜中上一味多煮取濃汁去滓納椒目一斗更煎十餘沸漬腳三兩度如冷溫漬洗瘥止無所忌又療腳氣急上衝心悶欲死者方檳榔三顆細末生薑汁三合童子小便二升新者不須暖上三味攪頓服須臾即氣退若未全瘥更服最佳利三兩行無所忌又療腳氣心煩悶氣急臥不安方半夏一升湯洗去滑生薑八兩桂心三兩檳榔一兩半末上四味切以水八升煮減半納檳榔仁末煎取二升八合絞去滓分溫三服服別相去如人行五六里進一服微利為度又療腳氣攻心悶腹脹氣急欲死者方吳茱萸三升木瓜切二合檳榔二十顆碎竹葉切二升上四味以水一斗煮取三升分三服得快利即瘥忌生菜熟面蕎麥蒜等物又療腎虛風腳氣衝心疝氣下墜小便數膝冷腰疼時時心悶氣急欲絶四肢無力射干丸方射干六分昆布八分洗通草四分犀角六分屑杏仁一分去皮尖熬漢防己八分茯苓六分青木香八分旋覆花四分白頭翁四分獨活六分葶藶子八分熬上十二味搗篩蜜和丸如梧子酒下二十丸漸加至三十丸日再服不利空腹服煮檳榔桑根皮下更佳忌生菜熱面蕎麥蒜炙肉黏膩醋物並出第一卷中崔氏旋覆花湯療腳氣衝心欲死者服之救病困急此方最先旋覆花二兩犀角二兩屑紫蘇莖一握桂心一兩赤茯苓三兩橘皮二兩生薑三兩前胡四兩干棗七枝擘白前一兩香豉七合綿裹文仲用一升上十一味切以水八升煮取二升四合分三服相去十里久以下氣小便利為度忌生蔥酢物又治腳氣麻痹不仁兩腳緩弱腳腫無力重者少腹氣滿胸中痞塞見食即嘔或兩手大拇指不遂或兩腳大拇指不遂或小便澀第一療氣滿嘔逆不下食旋覆飲子方旋覆花二兩橘皮二兩生薑三兩紫蘇莖一握茯苓三兩香豉一升綿裹大棗十枚擘上七味切以水八升煮取二升四合分三服服別相去十里久日一劑凡服五劑上氣即下小便澀者加桑根白皮四兩慎生冷豬肉蒜面魚枯食如其服此飲二三劑氣下訖即須服大犀角湯第一方十四味者是也服當小便利為度如其胸膈中氣滿者加半夏四兩湯洗待腹內氣和腳腫欲消皮膚猶如隔帛者宜服犀角麻黃湯一二劑五日後然服之忌生蔥醋物又大犀角湯療腳氣毒衝心變成水身體遍腫悶絶死者方犀角二兩屑桑根白皮四兩白朮二兩桂心二兩香豉一升防己二兩紫蘇一握前胡四兩橘皮三兩黃芩三兩茯苓三兩大棗十枚擘生薑一兩上十三味切以水九升浸一宿煮取二升七合或水一斗煮取三升分為三服服相去如人行十里久以下氣利小便為度忌酢物桃李雀肉生蔥等又犀角麻黃湯方犀角二兩屑麻黃二兩去節甘草一兩炙茯苓二兩防己二兩黃芩一兩石膏三兩附子一兩炮白朮一兩芎藭一兩防風一兩當歸一兩生薑三分細辛一兩桂心一兩上十五味切以水一斗先煮麻黃去沫訖取汁八升下諸藥煎取二升七合分三服相去十里久服訖覆取汗待三四日後若其皮膚不仁瘥即停不瘥宜更服之不得過三劑即瘥瘥訖腳中無力者宜服獨活犀角湯二三劑即愈又獨活犀角湯獨活三兩犀角二兩屑石斛二兩先煮丹參二兩側子一兩炮防風二兩防己二兩芎藭二兩生薑三兩當歸二兩芍藥三兩茯苓四兩桂心一兩半甘草二兩炙上十四味切以水一斗煮取二升七合去滓分三服相去十里久服訖任臥不須取汗凡服三二劑隔五日一服初服此藥覺腹內氣散兩腳有力行動無妨或可即停又可常服香豉酒灸三里穴絶骨各三百壯又香豉酒方取香豉一斗以酒三斗浸三日取飲任性多少利即減之不利任性其中用橘皮生薑調適香味任意服盡復作以瘥為度並出第六卷中文仲療腳氣心煩不下食方牛乳一小升杏仁四十九枚橘皮一分切生薑一兩切上四味合煎取八合空心頓服令盡虛人或微利亦無苦有人服驗備急同又毒氣攻心欲死者方與蘇徐木瓜二物相加減用吳茱萸四升淡竹葉切一升上二味以水一斗煮取二升去滓分五服兼主上氣腫滿蘇恭云大快比加檳榔仁四十枚末之更快於本方備急同徐王用尋常氣滿日服一劑檳榔七枚合皮碎橘皮一兩厚朴炙吳茱萸各三兩生薑四兩水三升煮取一升二合分二服此湯性溫去冷脹亦蘇家之法備急同又若毒氣攻心手足脈絶此亦難濟不得已作此湯十愈七八方千金云治腳氣入腹困悶欲死腹脹茱萸湯方吳茱萸六升木瓜二枚切上二味以水一斗三升煮取三升分三服或以吐汗便活蘇恭云服得活甚易但鑽擊一作急少時熱悶耳此方是為起死是高麗老師方與徐王方相似故應神妙備急千金蘇徐同方云無木瓜可取吳茱萸一色煮服又方加青木香三兩犀角二兩屑亦云此湯起死人又腳氣冷毒悶心下堅背膊痛上氣欲死者方吳茱萸三升檳榔四十枚青木香二兩犀角三兩屑半夏八兩湯洗生薑六兩上六味切以水一斗煮取三升分三服大效破毒氣尤良備急同又腳氣入腹心悶者方濃煮大豆汁飲一大升不止更飲大驗備急同又療腳氣入心悶絶欲死者半夏三兩洗切生薑汁二升半上二味納半夏煮取一升八合分四服極效忌羊肉餳備急同並出第九卷中蘇恭云若風熱輕但毒氣入胃唯心悶煩索水灑胸面乾嘔好叫喚欲斷絶者服此犀角湯效方犀角屑青木香羚羊角屑人參竹茹沉香射干各二兩麥門冬去心茯苓各三兩麝香雞舌香各二兩石膏八兩碎綿裹上十二味切以水六升煮取二升二合分四服相去六七里晚再服如覺眼明心悟若強人作三服此謂救死已試大驗若嘔逆不下食水漿即吐出者加半夏四兩洗生薑二兩橘皮一兩加水一升半煮取二升三合忌五辛羊肉餳醋物唐侍中同出第一卷中近效救腳氣衝心此方甚效檳榔六顆上一味搗篩取童子小便半升微溫和末強半頓服如一炊久不轉動更取半准前服令盡得通即好甚良又療腳氣抬肩喘並腳氣衝心方烏豆二斗上一味以水五大斗煮斟酌有一斗半即休分向兩故瓷甕中以兩腳各於一甕中浸遣人從膝向下捋之捋百遍以來必瘥如無瓷甕取故瓦甕不滲者亦得極重不過更浸一度必瘥房給事用極效又加減青木香丸方崑崙青木香六分大腹檳榔七分桂心四分芍藥六分枳實七分炙大黃十分上六味搗篩蜜和為丸如梧子大以酒若飲任性服十五丸日二服稍稍加至大便微微通軟為度忌生蔥已前方療一切腳氣發上衝祕悶有所不快即服三兩日取宣通亦療卒心痛腰腎間冷膿水服亦佳吳升方又療腳氣上衝心狂亂悶者方赤茯苓十二分漢防己八兩芍藥十分檳榔仁十二分甘草八分炙郁李仁十分枳實八分炙春著大黃十四分冬著牛膝十二分上九味搗篩蜜和丸如梧子空腹清酒服十五丸日再服漸加至二十丸以微通泄為度利多減丸冬則去大黃加牛膝若體中虛弱去大黃加牛膝服亦得其藥皆須州土上好者惡藥服無益忌海藻菘菜酢物生冷油膩雜肉熱面新炊飯及陳臭難消之物一切勿食又療腳氣衝心肺氣氣急及水氣臥不得立驗方葶藶子四分好者熬令紫色杏仁四分甘草四分炙海蛤四分別研如面郁李仁四分漢防己五分吳茱萸二分檳榔仁六分大黃七分上九味搗篩為散合研令調和取蒸餅中棗膏二分去皮攪和白蜜少許更於日中搗一千二百杵方止空腹一服十五丸如梧子漸漸加至下泄為度服良久待丸散後可食忌海藻菘菜又准前狀常服方白蒺藜子一升炒去刺五味子八分牛膝八分杏仁一升枳實八分炙甘草五分擘破炙人參八分不用亦得車前子二兩桑根白皮一兩通草一兩上十味搗篩蜜和丸如梧子空腹一服十五丸漸漸加至二十五丸日再服亦得酒飲任情服良久待散可食忌海藻菘菜牛肉熱面潘玢侍御襄城録留嶺南瘴氣腳氣酒湯散方一十三首千金夫腳氣之疾先起嶺南稍來江東得之無漸或微覺疼痹或兩脛腫滿行起屈弱或上入少腹不仁或時冷時熱小便祕澀喘息氣衝喉氣急欲死食嘔不下氣上逆者皆其候也是先覺此證先與犀角旋覆花湯方犀角三兩屑旋覆花二兩橘皮三兩茯苓二兩大棗二十枚擘香豉一升紫蘇莖一握生薑三兩上八味切以水八升煮取二升七合分三服相去十里久服之以氣下小便利為度如其不下服後大犀角湯忌醋物崔氏名小犀角湯備急同又大犀角湯方犀角二兩屑旋覆花二兩白朮二兩桂心二兩防己二兩黃芩二兩生薑三兩香豉一升綿裹橘皮三兩茯苓三兩前胡四兩桑根白皮四兩紫蘇莖一握大棗十枚擘上十四味切以水九升煮取二升七合分三服相去十里久取下氣為度若得氣下小便利腳腫即消能食若服湯訖不下氣急不定仍服後湯忌桃李雀肉生蔥醋物以上二方並出崔氏文仲同又方甘草二兩炙犀角二兩屑防風二兩桂心三兩杏仁二兩獨活二兩防己二兩石膏四兩芎藭二兩麻黃三兩去節生薑三兩白朮二兩當歸二兩羚羊角二兩屑黃芩一兩上十五味切以水二斗先煮麻黃取八升汁下藥煎取三升分三服相去十里久三服訖覆取汗五日後更服一劑取汗同前忌海藻菘菜桃李雀肉生蔥又療腳氣初發從足起至膝脛腫骨疼者方取萆麻葉切搗蒸薄裹之日二三易即消萆麻子似牛萆蟲故名萆麻也若冬月無萆麻取蒴藋根搗碎和酒糟三分根一分合蒸熟及熱封裹腫上如前法日二即消亦治不仁頑痹又若腫已入䏶至少腹脹小便澀少者方取烏特牛尿一升一服日再服取消乃止翼方云羸瘦者二分尿一分牛乳合煮浮結乃服之又若腫已消仍有此候者急服此湯方麻黃二兩去節半夏一兩洗生薑五兩射干二兩獨活三兩犀角一兩屑羚羊角一兩屑青木香一兩橘皮一兩杏仁一兩人參二兩升麻一兩吳茱萸一升茯苓二兩防己二兩前胡二兩枳實二兩炙上十七味切以水九升煮取四升分五服相去二十里久中間進少粥以助胃氣此湯兩日服一劑取病氣退乃止以意消息之若熱盛喘煩者加石膏六兩生麥門冬一升去心去吳茱萸若心下堅加鱉甲一兩炙忌羊肉醋物餳莧菜以上三方出蘇長史並出第七卷中又大金牙酒療瘴癘毒氣中人風冷濕痹口喎面戾半身不遂手足拘攣歷節腫痛甚者少腹不仁名曰腳氣無所不療方金牙一斤側子三兩炮附子三兩炮天雄三兩炮人參二兩蓯蓉三兩茯苓二兩獨活半斤當歸三兩白朮三兩防風三兩黃耆三兩薯蕷三兩細辛三兩桂心三兩茵芋二兩石南三兩芎藭三兩地骨皮三兩五加皮三兩磁石十兩丹參五兩杜仲三兩萆薢三兩牛膝五兩狗脊三兩葳蕤三兩薏苡仁一升白芷三兩麥門冬一升生石斛八兩厚朴三兩炙枳實三兩桔梗三兩生地黃切二升蒴藋四兩黃芩三兩遠志三兩去心荊子三兩上三十九味切以酒八斗浸七日溫服一合日四五夜一石藥細研如粉別絹袋盛共藥同漬藥力和善主療極多凡是風虛四體小覺有風疴者皆須將服之無不療者服者一依方合之不得輒信人大言浪有加減也忌豬肉冷水生蔥生菜桃李雀肉蕪荑等並出第七卷中又小金牙散療南方瘴癘疫氣腳弱風邪鬼注方金牙五分牛黃一分天雄二分萆薢二分黃芩二分麝香二分蜀椒汗二分由跋二分雄黃二分硃砂二分烏頭二分細辛三分葳蕤三分桂心二分莽草二分犀角二分乾薑三分黃連四分蜈蚣一枚長六寸者炙上十九味搗篩合牛黃麝香搗三千杵溫酒服錢五匕日三夜二以知為度絳囊盛帶男左女右一方寸匕省病問孝不避夜行塗鼻人中晨昏霧露亦塗之忌豬肉冷水生血物生菜等出第十二卷中延年療得嶺南瘴氣熱煩短氣心悶氣欲絶方香豉一升梔子十四枚擘升麻二兩上三味切以水四升煮取一升半分為三服即定也又嶺南瘴氣面腳腫乍寒乍熱似瘧狀腳腫氣上心悶咳嗽攤緩頑痹方大麻仁一兩綿裹升麻一兩射干一兩菖蒲一兩甘草一兩炙麻黃一兩去節大黃一兩別浸豉三合綿裹芒消半兩上九味切以水六升煮取二升去滓乃納芒硝分三服微利一二行解毒熱忌羊肉餳海藻菘菜並出第十九卷中蘇唐豉酒若能常飲此酒極利腰腳嶺南常服此酒必佳及卑濕處亦准此又恐有腳氣似著即宜服之方香豉三升美酒香者一斗上二味先取香豉三升三蒸三曝乾內一斗酒中潰三宿便可飲隨人多少用滓敷腳良又方大豆新者一斗九蒸九曝上一味以美酒三斗漬三宿便可隨性多少飲盡復作常服甚佳又方香豉三升犀角八兩末之上二味其豉如前用一生絹袋貯用好美酒九升漬之五日許其犀角末散著袋外每服常攪令犀角味入酒中服三合量性增減日三服其酒夏月勿作多恐壞可用此方豉三合橘皮生薑蔥細切任意調和先熬油令香次下諸物熬熟以綿裹納鐺中著酒任意性飲之並出上卷中
