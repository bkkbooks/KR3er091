服大效古今常用又療腹脹滿堅如石積年不損者方取白楊東南枝去蒼皮護風細銼五升熬令黃酒五升淋訖則以絹袋盛滓還納酒中蜜封再宿每服一合日三並出第二卷中卒心腹脹滿方六首肘後療卒心腹煩滿方銼薏苡根濃煮取汁服三升又方黃芩一兩杏仁二十枚去尖皮牡蠣一兩熬上三味切以水三升煮取一升頓服之又方灸兩手大拇指內邊爪後第一紋頭各一壯又灸兩手中央長指爪下一壯愈肘後此方本治卒吐逆此本在雜療中其病亦是痰飲霍亂之例兼宜依霍亂條中法療之人平居有患者亦少皆因他病兼為之耳或從傷寒後未復或從霍亂吐下後虛躁或是勞損服諸補藥痞滿或觸寒熱邪氣或食飲協毒或服藥失度並宜各循其本源為療不得專用此法也並出第一卷中備急療卒心腹脹滿又胸脅痛欲死方熱煮湯令灼灼爾以漬手足冷則易祕之肘後張文仲同又桂心散方枳實炙桂心上二味等分下篩以米汁服一匕忌生蔥肘後張文仲同並出第一卷中救急療卒患心腹脹滿刺痛方生薑大有功能遠行宜將自隨煮汁服良患久痢虛損嘔逆不下食見食則吐取三兩細切搗絞取汁微暖點少多蜜頓一服則下食大效出第七卷中腹脹雷鳴方三首範汪療腹中寒氣脹雷鳴切痛胸脅逆滿附子粳米湯方附子一枚炮半夏半升洗甘草一兩炙大棗十枚粳米半升上五味切以水八升煮米取熟去米納藥煮取三升絞去滓適寒溫飲一升日三忌海藻菘菜豬羊肉餳仲景傷寒論同集驗加乾薑二兩出第十五卷中延年療患腹內氣脹雷鳴胸背痛方丹參三兩枳實炙各三兩桔梗白朮芍藥各二兩生薑四兩檳榔七枚上七味細切以水九升煮取二升七合去滓分溫三服忌豬肉桃李雀肉生冷油膩魚蒜等出第十五卷中又丹參湯療腸鳴發則覺作聲方丹參茯苓各三兩桔梗二兩生薑四兩細辛厚朴炙食茱萸各二兩上七味切以水八升煮取二升五合去滓分溫三服每服如人行七八里忌生菜豬肉酢物出第四卷中腹內諸氣及脹不下食方一十一首廣濟療腹內諸氣脹滿昆布散方昆布海藻人參玄參橘皮升麻各三兩芎藭桂心乾薑各二兩小麥一升半醋一升半漬之一宿出暴醋盡止上十味搗篩為散別搗小麥作散合藥散一處更搗千杵酒服方寸匕日三服漸加至二匕不利忌熱面炙肉生蔥蒜黏食等物又療冷氣薏苡仁飯粥方細伐薏苡仁炊為飯氣味欲勻如麥飯煮粥亦好豉漿粥並任意無所忌又療氣蘇子粥方蘇子不限多少研如麻子作粥依食法著蔥豉姜並得無所忌又療氣膀胱急妨宜下氣方蕪荑搗和食鹽末令調以綿裹如棗大納下部久時或下惡汁並下氣佳無所忌通按膀胱急妨謂小便急不得出而妨悶也又療氣昆布臛法高麗昆布一斤白米泔汁浸一宿洗去鹹味以水一斗煮令向熟擘長三寸闊四五分仍取蔥白一握二寸切斷擘之更合熟煮令昆布極爛仍下鹽酢豉糝調和一依臛法不得令鹹酸以生薑橘皮椒末等調和宜食粳米飯粳米粥海藻亦依此法極下氣大效無所忌又療心頭冷硬結痛下氣檳榔湯方檳榔十顆生薑青木香各三兩橘皮枳實炙甘草炙大黃各二兩上七味切以水六升煮取二升半絞去滓分溫三服服別如人行四五里進一服取微利忌生菜熱面炙肉海藻菘菜等又療一切氣妨悶不能食檳榔丸方檳榔七個芍藥五分枳實七枚炙人參五分大黃十六分青木香六分桂心四分上七味搗篩蜜和丸空腹服如梧子二十丸日再服漸加至二十五丸微泄為度忌生菜熱面炙肉蒜黏食生蔥等物又療氣小芥子酒方小芥子一升搗碎以絹袋盛好酒二升浸之七日空腹溫服三合日二服漸漸加之以知為度酒盡旋旋添之無所忌又療久患氣脹烏牛尿方取烏牛尿空心溫服一小升日一服氣散則止無所忌並出第二卷中近效燒鹽通一切氣尤療風方取鹽花以生麻油和之以濕布一片急裹以繩子系如打牆錘許大置瓦子上以炭火四面燒望之如火氣訖更勿加炭待火盡冷訖吹扇去灰收取鹽搗破如患心腹脹滿氣隔不通取棋子大含咽之立瘥如煮訶黎勒檳榔及茶湯用此鹽療一切病韋特進用之極效驗又訶黎勒丸療氣脹不下食尤除惡氣方訶黎勒青木香上二味等分搗篩融沙糖和衆手一時捻為丸隨意服之氣甚者每服八十丸日再稍輕者每服四五十丸則得性熱者以生牛乳下性冷者以酒下不問食之前後禮部蕭郎中處得云自服大效灸諸脹滿及結氣法二十二首千金療臚脹脅腹滿法灸膈俞百壯三報穴在第七椎下兩旁各一寸半翼同又療脹滿水腫法灸脾俞隨年壯穴在第十一椎下兩旁各一寸半翼同又療脹滿雷鳴酒沸法灸大腸俞百壯三報穴在第十六椎下兩傍各一寸半翼同又療脹滿氣聚寒冷法灸胃管穴在心鳩尾下三寸灸百壯三報之翼同又療脹滿繞臍結痛堅不能食法灸中管百壯穴在臍上一寸一名水分翼同又療脹滿瘕聚帶下疼痛法灸氣海百壯穴在臍下一寸半忌不可針翼同又療脹滿結氣如水腫狀小腹堅如石法灸膀胱募百壯穴在中極臍下四寸翼同又療脹滿腎冷瘕聚泄痢法灸天樞百壯通按銅人經天樞二穴俠臍二寸翼同又療冷脹胸滿心腹積聚痞疼痛法灸肝俞百壯穴在第九椎下兩旁各一寸半翼同又療五臟六腑積聚脹滿羸瘦不能飲食法灸三焦俞隨年壯穴在第十三椎下兩旁各一寸半翼同並出第十六卷中又療結氣法扁鵲曰第四椎下兩旁各一寸半名闕俞主胸中膈氣灸隨年壯通按關當作闕四椎兩旁一寸半乃厥陰俞也又主心腹諸病堅滿煩痛憂思結氣寒冷霍亂心痛吐下食不消腸鳴泄痢法灸太倉穴一名胃募在心下四寸胃管下一寸灸百壯又主結氣囊裹針藥所不及法灸肓募二穴在從乳頭邪度至臍中屈去半從乳下行度頭是灸隨年壯通按銅人腧穴依法量度乃得日月膽募之穴然主療別肝募期門穴在此穴上五分然主療與此頗同又凡臍下絞痛流入陰中發作無時此冷氣療之法灸臍下三寸名關元百壯又療短氣不語法灸肘後兩筋間名天井百壯又方灸大椎隨年壯又方灸肺俞穴在第三椎兩旁各一寸半百壯又方灸肝俞第九椎百壯又方灸尺澤百壯又方灸手十指頭各十壯又方灸小指第四指間交脈上七壯又少年房室多短氣者法灸鳩尾頭五十壯並出第十七卷中胸脅痛及妨悶方四首病源胸脅痛者由膽與肝及腎之支脈虛為寒氣所乘故也足少陽膽之經也其支脈從目鋭眥貫目下行至胸循脅裡足厥陰肝之經也其支脈起足大指聚毛上循入腹貫膈布脅肋足少陰腎之經也其支脈起肺出絡心注胸中此三經之支脈並循行胸脅邪氣乘於胸脅故傷其經脈邪氣之與正氣交擊故令胸脅相引而急痛也診其寸口脈弦而滑弦則為痛滑則為實痛則為急實則為躍弦滑相搏則胸脅搶息痛也又卒苦煩滿又胸脅痛欲死候此由手少陽之絡脈虛為風邪所乘故也手少陽之脈起小指次指之端上循入缺盆布膻中散絡心包風邪在其經邪氣迫於心絡心氣不得宣暢故煩滿乍上攻於胸或下引於脅故煩滿而又胸脅痛也若經久邪氣留連搏於臟則成積搏於腑則成聚也並出第十六卷中廣濟療氣結築心胸脅悶痛不能吃食訶黎勒散方訶黎勒四顆炮去核人參二分上二味搗篩為散以牛乳二升煮三四沸頓服之分為二服亦得如人行三二里進一服無所忌又療胸脅不利腹中脹氣急妨悶半夏湯方半夏一升洗生薑一斤桂心六兩檳榔二兩末上四味細切以水八升煮取二升四合絞去滓分溫五服服別相去如人行六七里進一服快利為度忌羊肉餳生蔥油膩小品有吳茱萸三十顆無檳榔余並同又療胸脅妨悶胃中客氣大便苦難大黃丸方大黃十二分厚朴四分炙枳實四分炙芒硝八分杏仁六分去皮尖葶藶子四分熬上六味搗篩蜜和丸空腹以飲服如梧子十丸日二服稍稍加以大便微調為度忌生冷油膩黏食出第二卷中千金療冷氣脅下往來胸膈痛引脅背悶當歸湯方當歸芍藥吳茱萸桂心人參大黃甘草各二兩茯苓枳實各一兩乾薑三兩上十味細切以水八升煮取二升半一服八合日三服治尸注亦佳忌海藻菘菜生蔥酢物等出第十六卷中脅肋痛方二首小品療脅下偏痛發熱其脈緊弦此寒也當以溫藥下之大黃附子湯方大黃三兩附子三枚炮細辛二兩上三味切以水五升煮取二升分三服若強盛人煮取三升半分為三服服別如人行四五里進一服忌豬肉冷水生菜等仲景同又半夏茯苓湯療胸膈心腹中痰水冷氣心下汪洋嘈煩或水鳴多唾口清水自出脅肋急脹痛不欲食此皆胃氣弱受冷故也其脈喜沉弦細遲悉主之方半夏五兩洗生薑五兩茯苓三兩旋覆花一兩陳橘皮人參桔梗芍藥甘草炙各二兩桂心一兩上十味切以水九升煮取三升分三服欲得利者加大黃須微調者用乾地黃病有先時喜水下者加白朮三兩除旋覆花若大便不調宜加大黃及乾地黃並用三兩忌羊肉餳酢物生蔥豬肉海藻菘菜集驗同出第一卷中胸膈氣方三首廣濟療胸膈氣脹滿吃食心下妨虛熱腳手煩疼漸羸瘦不能食四肢無力枳實丸方枳實六分犀角四分前胡四分青木香八分麥門冬去心八分赤茯苓八分苦參六分芍藥六分上八味搗篩為末蜜和丸如梧子以飲空腹下二十丸漸加至三十丸日二服不利忌生菜熱面油膩炙肉酢蒜又療胸膈滿塞心背撮痛走注氣悶宜服此柴胡湯方柴胡六分當歸六分青木香六分犀角屑六分檳榔十個甘草二分炙上六味切以水七升煮取二升半絞去滓納麝香末分溫三服如人行四五里微利為度忌海藻菘菜生菜熱面蕎麥豬魚蒜又療胸膈間伏氣不下食臍下滿柴胡湯方柴胡三兩枳實三兩生薑三兩白朮三兩甘草炙一兩檳榔七個上六味切以水六升煮取二升絞去滓分溫二服服別如人行六七里進一服小弱人微利禁生冷蒜腥海藻菘菜桃李雀肉等並出第一卷中寒疝腹痛方一十三首病源疝者痛也此由陰氣積於內寒氣結搏而不散腑臟虛弱風冷邪氣相擊則腹痛裡急故云寒疝腹痛也出第二十卷中廣濟療丈夫虛勞寒疝腹痛並主産後方生乾地黃三兩甘草炙二兩茯苓二兩人參二兩當歸二兩大棗十四枚白羊肉去脂三斤上七味切以水三斗先煮羊肉取一斗去羊肉納諸藥煮取五升納蔥白一把煮取四升絞去滓分溫五服服別相去如人行十二三里後藥消進少食食消服藥忌蕪荑海藻菘菜酢物余無忌出第四卷中仲景傷寒論寒疝繞臍苦痛若發則白汗出手足厥寒若脈沉弦者二物大烏頭煎主之方大烏頭十五枚白蜜二斤上藥以水三升煮烏頭取二升去烏頭納蜜煎令水氣盡得二升強人服七合弱人五合一服不瘥明日更服日止一服不可再也忌豬肉冷水千金同又寒疝腹滿逆冷手足不仁若一身盡痛灸刺諸藥所不能治者抵當烏頭桂枝湯主之方秋烏頭實中大者十枚白蜜二斤一方一斤桂心四兩上三味先以蜜微火煎烏頭減半去烏頭別一處以水二升半煮桂取一升去滓以桂汁和前蜜合煎之得一升許初服二合不知更服至三合又不復知更加至五合其知如醉狀得吐者為中病也忌豬肉冷水生蔥等範汪方同桂心三兩芍藥三兩甘草二兩炙生薑三兩切大棗十二枚上五味切以水七升煮取三升去滓取五合和前烏頭蜜令得一升余並同前法服仲景傷寒論千金同又療寒疝腹中痛引脅痛及腹裡急者當歸生薑羊肉湯主之方當歸三兩生薑五兩肥羊肉一斤去脂上三味切以水一斗合煮取三升去滓溫服七合日三痛即當止若寒多者加生薑足前成一斤若痛多而嘔者加橘皮二兩術一兩合前物煮取三升加生薑者亦加水五升煮取三升二合服之依前經心録範汪同無忌又療寒疝腹中痛者柴胡桂枝湯方柴胡四兩大棗六枚黃芩一兩半人參一兩半甘草一兩炙半夏二合半桂心生薑各一兩半芍藥一兩半上九味以水八升煮取三升去滓溫服一升日三服又云人參湯作如桂枝法加半夏柴胡黃芩復如柴胡湯法今著人參作半劑忌海藻菘菜羊肉餳生蔥並出第十五卷中小品寒疝氣腹中虛痛及諸脅痛裡急當歸生薑等四味主之方當歸生薑芍藥各三兩羊肉三斤上藥切以水一斗二升煮肉爛熟出肉納諸藥煎取三升分溫服七合日三數有效古今録驗經心録範汪同出第一卷中集驗療寒疝氣來往衝心腹痛桂心湯方桂心四兩生薑三兩吳茱萸二兩上三味切以酒一大升煎至三合去滓分溫三服如人行六七里一服忌生蔥又療寒疝下牽少腹痛附子丸方附子二兩炮桃仁三兩去皮尖蒺藜子一升去角尖熬上三味搗篩末蜜和丸梧子大空腹酒下十丸漸加至十五丸及二十丸日再服忌生菜熱面炙肉筍蒜豬魚出第六卷中又療積年腹內宿結疝冷氣及諸癖症等香豉丸方香美爛豉曝乾微熬令香即止小芥子去土石微熬令赤即止各一升上二味搗篩蜜和丸梧子大空腹酒服二十丸漸加至三十丸日二服初服半劑以來腹中微絞痛勿怪之是此藥攻病之候又療疝瘕冷氣方採鼠李子日乾九蒸九曝酒浸服三合日兩服漸加至三服能下血及碎肉積滯物古今録驗楚王瓜子丸療心腹寒疝胸脅支滿食飲不化寒中腹痛及嘔痢風痙頸項強急不得俯仰方桂心五分茱萸三兩白薇一分乾薑四分烏頭二分炮蜀椒五分汗芎藭四分防葵二分白芷三分上九味末之合蜜和為丸如梧子先食服一丸日三不知稍稍增之以腹中溫身中憹憹為度忌生蔥豬肉冷水方中無瓜子未詳方名範汪等同出第八卷中寒疝心痛方三首病源夫疝者痛也陰氣積結所生也陰氣不散則寒氣盛寒氣盛則痛上下無常處冷氣上衝於心故令心痛也出第二十卷中範汪大茱萸丸療心腹寒疝胸中有逆氣時上搶心痛煩滿不得臥面目惡風悸掉惕惕時驚不欲飲食而嘔變發寒熱方吳茱萸半升細辛芍藥柴胡一方用前胡旋覆花黃芩紫菀人參白朮茯苓乾薑桂心附子炮甘草炙半夏洗當歸各半兩上十六味搗篩以蜜和為丸如梧子先食服三丸日三不知稍加忌生蔥羊肉餳酢物桃李雀肉豬肉生菜海藻菘菜除此更無所忌一方有蜀椒無桂心又一方有乾地黃無黃芩深師同出第十四卷中小品解急蜀椒湯主寒疝氣心痛如刺繞臍腹中盡痛白汗出欲絶方蜀椒二百枚汗附子一枚炮粳米半升乾薑半兩半夏十二枚洗大棗二十枚甘草一兩炙上七味切以水七升煮取三升澄清熱服一升不瘥更服一升數用療心腹痛困急欲死解結逐寒上下痛良忌豬羊肉餳海藻菘菜肘後古今録驗範汪方無甘草余同經心録同出第一卷中古今録驗療心痛寒疝牡丹丸方牡丹去心桂心各二兩烏頭炮二枚上三味末之合蜜和為丸如大豆旦起未食服三丸日二不知稍增之藥少急寧少服並治遁尸發動無烏頭附子亦可用炮之忌胡荽豬肉冷水生蔥等出第八卷中卒疝方三首集驗療卒疝暴痛方灸大敦男左女右三壯立已穴在灸經圖上出第六卷中文仲療卒得諸疝少腹及陰中相引絞痛白汗出欲死方搗沙參下篩酒服方寸匕立愈肘後備急同又若不瘥服諸利丸下之走馬湯亦佳此名寒疝亦名陰疝張仲景飛尸走馬湯方巴豆二枚去心皮熬杏仁一枚去尖皮上二味取綿纏捶令極碎投熱湯二合捻取白汁服之須臾瘥未瘥更一服老小量之通療鬼擊有尸疹者常蓄此藥用驗忌野豬肉蘆筍備急同出第十卷中七疝方三首病源七疝候七疝者厥疝症疝寒疝氣疝盤疝胕疝狼疝也厥逆心痛足寒諸飲食吐不下名曰厥疝也腹中氣乍滿心下盡痛氣積如臂名曰症疝也寒飲食則脅下腹中盡痛名曰寒疝也腹中乍滿乍減而痛名曰氣疝也腹中痛在臍旁名曰盤疝也腹中臍下有積聚名曰胕疝也少腹與陰相引而痛大便難名曰狼疝也凡七疝皆由血氣虛弱飲食寒溫不調之所生也出第二十卷中文仲小器七疝丸主暴心腹厥逆不得氣息痛達背膂名曰尸疝心下堅痛不可手迫名曰石疝臍下堅痛得寒冷食輒劇名曰寒疝脅下堅痛大如手痛時出見若不痛不見名曰盤疝臍下結痛女人月事不時名曰血疝少腹脹滿引膀胱急痛名曰脈疝悉主之方臣等看詳七疝已載前序椒四分汗桔梗芍藥乾薑厚朴炙細辛附子炮各二分烏頭一分炮上八味末之蜜和丸服如大豆三丸加至七八丸日三服忌豬肉冷水生菜出第一卷中古今録驗七疝丸療疝諸寒臍旁痛上支胸中滿少氣太醫丞樊之方蜀椒五分汗乾薑厚朴炙黃芩細辛芍藥桂心各四分桔梗二分烏喙一分炮柴胡一分茯苓一分牡丹皮一分上十二味搗篩蜜和丸梧子大先餔以酒服七丸日三不知漸加以知為度忌豬肉冷水生蔥生菜酢物胡荽範汪同出第十卷中集驗疝氣桃仁湯方桃仁去皮尖吳茱萸橘皮海藻各三兩生薑茯苓羌活蒺藜子去角各三兩上八味切以水三大升煮取九合分為三服空心服忌酢物寒疝不能食方四首深師療虛冷心腹寒疝胸脅支滿飲食不消腹中痛久痢頸強芎藭丸方芎藭七分烏頭四分炮防葵三分蜀椒九分汗白薇二分桂心十分白芷五分茱萸六分乾薑八分上九味搗篩蜜和丸如梧子飲服二丸日三稍加至五六丸以知為度忌豬肉冷水生蔥範汪同又主虛冷痰癖疝食不消心腹痛氣弱不欲食虛惙羸瘦吳茱萸丸方吳茱萸十分紫菀三分白薇三分烏頭十分炮桂心六分前胡芍藥細辛芎藭黃芩各五分上十味下篩蜜和酒服如梧子五丸日三稍加之忌豬肉冷水桃李生蔥生菜等謹按別本有此方原缺五味按忌法有桃李即當用白朮恐後古今録驗治寒疝積聚是全方出第十六卷中範汪療手足熱腹中寒疝不能食飲數心腹痛十一物七熬飯後丸方茯苓五兩乾薑六兩今倍並十二兩大黃二斤柴胡十兩芎藭七兩蜀椒一兩汗芒硝一升重十兩今減五合杏仁一升去皮尖葶藶子一升加桂心五兩附子三兩炮上藥乾薑茯苓不熬余皆熬搗篩以蜜和丸如梧子飲服七丸日三龍朔元年三月十七日詔書十一物七熬方忌豬肉冷水醋物生蔥等出第十四卷中通按除乾薑茯苓當九熬今云七者以桂心附子蓋加之集驗療寒疝不能食方取馬藺子一升每日取胡桃許以面拌熟煮吞之然後依常飯日再服服盡必愈亦除腹內一切諸疾消食肥肌仍時燒磚熱以羖羊毛作氈裹卻氈上尉之日一度尤佳寒疝積聚方四首病源夫積聚者由寒氣在內所生也血氣虛弱風邪搏於腑臟寒多則氣澀氣澀則生積聚也積者陰氣五臟所生始發不離其部故上下有所窮已聚者陽氣六腑所成也故無根本上下無所留止但諸臟腑受邪初未能為積聚邪氣留滯不去乃成積聚其為病也或左右脅下如覆杯或臍上下如臂或胃管間覆大如盤羸瘦少氣或灑浙寒熱四肢不收飲食不為肌膚或纍纍如桃李或腹滿嘔泄寒則痛故云寒疝積聚也其脈駃所吏反而緊積聚浮而牢積聚牢強急者生虛弱急者死出第二十卷中通按脈數為駃脈遲為駛深師破積丸療寒疝久積聚周走動搖大者如鱉小者如杯乍來乍去在於胃管大腸脹滿不通風寒則腸鳴心下寒氣上搶胸脅支滿芫花丸方芫花一分蜀椒一分汗大黃六分細辛六分桔梗五分烏頭四分炮茱萸芍藥茯苓各三分龍膽二分半夏一分洗上十一味搗篩蜜和丸如梧子大飲服五丸日三當下如泥病愈忌豬羊肉餳酢物生菜等又當歸丸療心腹勞強寒疝邪氣往來堅固結聚苦寒煩悁於緣切下同不得臥夜苦汗出大便堅小便不利流飲在腹中食不生肌方桔梗二分葶藶子熬五分藜蘆炙二分厚朴炙五分杏仁五十枚去尖皮附子炮五分桂心人參各三分沙參三分特生礜石一兩燒半日上十味搗篩蜜和如梧子飲服三丸日三稍加之忌豬肉生蔥冷水出第二十二卷中古今録驗療久寒三十歲心腹疝癥瘕積聚邪氣往來厥逆搶心痛久痹羸瘦少氣婦人産乳余疾胸脅支滿不嗜食手足悁煩月水不通時時便血名曰破積聚烏頭續命丸方食茱萸十分芍藥五分細辛五分前胡五分一云柴胡乾薑十分烏頭十分炮紫菀黃芩白朮白薇各三分芎藭人參乾地黃各五分蜀椒十分汗桂心十分上十五味搗篩蜜和為丸如梧子大先食服三丸日三不知稍加至七丸忌生菜生蔥豬肉冷水桃李雀肉蕪荑等範汪同出第十卷中集驗療腎冷及疼疝氣滯後灌方鹽花一大合漿水半大升上二味和暖灌下部少間即下膿日一度再灌之即止心疝方四首病源心疝者由陰氣積於內寒氣不散上衝於心故使心痛謂之心疝也其痛也或如錐刀所刺或四肢逆冷或唇口變青皆其候也出第二十卷中範汪療心疝復繞臍痛上支脅心下痛方芍藥桔梗細辛蜀椒汗桂心乾薑各三分附子一分炮上七味末之合蜜和為丸如梧子服七丸以酒下日二服忌豬肉冷水生蔥生菜等又療三十年心疝神方真射𦬣釅好者新好茱萸一名殺子上二味等分搗篩蜜和丸服如麻子二丸日三藥勢盡乃熱食良已用得瘥劉國英所祕又主心疝方灸兩足大指甲寅之際甲寅各半炷隨年壯良通按寅當作肉又心疝發時心腹痛欲死方灸足心及足大指甲後橫理節上及大指岐間白黑肉際百壯則止足心者在足下偏近大指本節際不當足心中央也並出第十八卷中通按足心在足下近大指本節即湧泉穴也
