body:
  text: 卷第七心痛方八首病源心痛者由風冷邪氣乘於心也其痛發有死者有不死者有久成疹者心為諸臟主而藏神其正經不可傷傷之而痛為真心痛朝發夕死夕發朝死心有支別之絡脈其為風冷所乘不傷於正經者亦令心痛則乍間乍甚故成疹不死又心為火與諸陽會合而手少陰心之經也若諸陽氣虛少陰之經氣逆謂之陽虛陰厥亦令心痛其痛引喉是也又諸臟虛受病氣乘於心者亦令心痛則心下急痛謂之脾心痛也足太陰為脾之經與胃合足陽明為胃之經氣虛逆乘心而痛其狀腹脹歸於心而痛甚謂之胃心痛也腎之經足少陰是也與膀胱合膀胱之經足太陽是也此二經俱虛而逆逆氣乘心而痛者其狀下重不自收持苦泄寒中為腎心痛也診其心脈急者為心痛引背食不下寸口脈沉緊苦心下有寒時痛關上脈緊心下苦痛左手寸口脈沉則為陰陰絶者無心脈也苦心下毒痛出第十六卷中備急療心痛方桂心末溫酒服方寸匕須臾六七服乾薑依上法服之亦佳忌生蔥文仲集驗肘後同出第一卷中延年療心痛茱萸丸方吳茱萸一兩半乾薑一兩半桂心一兩白朮二兩人參一兩橘皮一兩附子一兩半炮蜀椒一兩出汗甘草一兩炙黃芩一兩當歸一兩上十一味搗篩為散蜜丸一服五丸如梧子大日三服稍加至十五丸忌豬肉生蔥海藻菘菜桃李雀肉等藥盡更合酒飲無拘食前後任意肘後有桔梗一兩出第十五卷中救急療心痛方取驢糞絞取汁五六合及熱頓服立瘥肘後同又方東引桃枝一握切以酒一升煎取半升頓服大效肘後同出第八卷中必效療心痛方當歸末酒服方寸匕頻服備急文仲同又方生油半合溫服瘥肘後備急張文仲同並出第五卷中古今録驗療心痛黃連湯方黃連八兩上一物㕮咀以水七升煮取一升五合絞去滓適寒溫飲五合日三忌豬肉冷水肘後範汪同出第八卷中九種心痛方三首廣濟療九種心痛蛔蟲冷氣先從兩肋胸背撮痛欲變吐當歸鶴蝨散方當歸八分鶴蝨八分橘皮六分人參六分檳榔十二分枳實六分炙芍藥六分桂心五分上八味搗篩為散空腹煮薑棗飲服方寸匕日二服漸漸加至一匕半不利忌生蔥生冷物油膩黏食出第四卷中千金療九種心痛一蟲心痛二注心痛三氣心痛四悸心痛五食心痛六飲心痛七冷心痛八熱心痛九去來心痛悉主之並療冷衝上氣落馬墮車附子丸方附子一兩炮巴豆仁一兩去心皮熬人參一兩生狼毒一兩炙令極香食茱萸一兩乾薑一兩上六味搗末蜜和空腹服如梧子三丸一日一服弱者二丸卒中惡心痛口不能言連年積冷流注心胸痛者亦服之好好將息神效忌野豬肉蘆筍必效經心録同又療九種心痛方取當太歲上新生槐枝一握去兩頭水三升煮一升頓服之並出第十三卷中諸蟲心痛方一十八首廣濟療諸蟲心痛無問冷熱蛔蟲心痛檳榔鶴蝨散方當歸桔梗芍藥橘皮鶴蝨各八分人參六分桂心六分檳榔十分上八味搗篩為散空服煮薑棗湯服方寸匕漸漸加至二匕不利忌豬肉生蔥油膩小豆黏食等又療蛔蟲心痛積年久不瘥方取苦酒五合燒青錢二文令赤安酒中則取雞子白一顆去卻錢瀉著酒中頓服之瘥無所忌又主心腹攪結痛不止仍似有蛔蟲者當歸湯方當歸橘皮細辛甘草炙生薑各四分大黃八分別漬鶴蝨二分上七味切以水六升煮取二升分溫三服如人行四五里進一服不利未瘥三日更作服之忌海藻菘菜生菜救急同出第四卷中小品溫中當歸湯療暴冷心腹刺痛面目青肉冷汗出欲霍亂吐下脈沉細者及傷寒毒冷下清水變作青白滯下及白滯後還復下清水者悉主之此方可以調諸冷痛也當歸人參乾薑茯苓厚朴炙青木香桂心桔梗芍藥甘草炙各二兩上十味切以水八升煮取三升分溫三服日三服不耐青木香者以犀角一兩代之忌海藻菘菜豬肉醋物生蔥等又凡厥心痛與背相引喜瘛瘲如物從後觸其心身傴僂者腎心痛也厥心痛腹脹滿不欲食食則不消心痛尤甚者胃心痛也厥心痛痛如錐針刺其心心痛甚者脾心痛也厥心痛色蒼如死灰狀不得太息者肝心痛也千金同厥心痛臥若徒居痛間動作痛益甚色不變肺心痛也真心痛手足清至節心痛甚旦發夕死夕發旦死心腹中痛發作腫聚往來上下痛有休止腹中熱喜涎出是蛔蟲咬也出甲乙經第一卷中千金療心腹中痛發作腫聚往來上下痛有休止多熱喜涎出是蛔蟲咬也並宜溫中當歸湯服兩三劑後若不效有異宜改方增損湯其溫中當歸湯在前小品方中此是增損湯方芍藥六兩黃芩四兩厚朴四兩桔梗四兩柴胡四兩當歸三兩升麻三兩上七味切以水八升煮取二升半分三服忌豬肉出第十三卷中張文仲療蛔蟲心痛鶴蝨散方鶴蝨二分末溫酢一盞和服之蟲當出備急千金同又幹漆丸方乾漆熬搗蜜和丸服十五丸日再備急同又方取槐上木耳燒灰末如棗大正發和水服若不止飲熱水一升蛔蟲立出必效方云酒下備急同又方發時取鹽一匙納口中水下立定蟲即出備急同出第一卷中延年療蛔蟲惡吐水心痛鶴蝨丸方鶴蝨三兩搗篩蜜和為丸用蜜漿水平旦服二十丸日只一服古今録驗用十兩云韋云患心痛十年不瘥令服此便愈又鶴蝨丸療蛔蟲心痛方鶴蝨六兩吳茱萸五兩橘皮四兩桂心三兩檳榔四兩上五味搗篩蜜和為丸如梧子大一服二十丸蜜湯下日二服加至三十丸以蟲出為度忌生蔥出第十五卷中救急療心痛不可忍似蛔者胡粉丸方生真胡麻一合胡粉半合熬搗上二味先以豬肉脯一片空腹啖咽汁勿咽肉後取胡粉和胡麻搜作丸以少清酒使成頓服盡十歲以上斟酌增減忌生冷豬肉魚雞蒜酢滑等七日若是蛔吐水者是也出第八卷中必效療蜎心痛方士弱氏曰蜎井中小蟲蓋痛一處若小蟲咬也取𩻠鱺魚淡炙令熟與患人吃一二枚永瘥飽食彌佳又方熊膽如大豆和水服大效又茱萸丸方吳茱萸一升桂心二兩當歸二兩上三味搗篩蜜和丸如梧子酒服三十丸日再服漸加至四十丸以知為度忌生蔥又丁香散方丁香七枚頭髮灰一棗許上二味並末和酒服之又鶴蝨檳榔湯方鶴蝨二兩小兒用一兩檳榔二七枚上二味以豬肉汁六升煮檳榔取三升去滓納鶴蝨末先夜不食明旦空腹頓服之須臾病下及吐水永瘥神效七日禁生冷酢並出第五卷中冷氣心痛方五首廣濟主冷氣心痛肋下鳴轉喉中妨食不消常生食氣每食心頭住不下桔梗散方桔梗當歸芍藥茯苓橘皮厚朴炙白朮各八分蓽茇四分豆蔻子四分檳榔六分桂心六分訶黎勒皮六分炙上十二味搗篩為散空腹煮薑棗飲服方寸匕日二服加至一匕半不利忌生蔥豬肉酢物桃李雀肉等一方有枳實不用桔梗出第四卷中深師療胸滿短氣心痛吐涎虛冷防風茯苓湯方防風二兩茯苓二兩桂心六兩甘草二兩炙半夏四兩洗乾薑四兩炮人參三兩上七味切以水一斗煮取三升絞去滓分三服良忌酢物生蔥海藻菘菜羊肉餳出第十六卷中崔氏療心痛與冷氣痛者特相宜烏頭丸方烏頭三兩炮附子三兩炮赤石脂三兩蜀椒二兩出汗桂心二兩乾薑二兩上六物搗篩蜜和為丸痛發時溫清酒服三丸如梧子覺至痛處痛則止若不止加至五六丸以知為度若早朝服無所覺至午時又服三丸此方丹陽有隱士出山云得華他法其療略同若久心痛每旦服三丸稍加至十丸盡一劑遂終身不發忌生蔥豬肉張文仲備急同出第四卷中延年療冷氣久刺心痛不能食方當歸桂心桔梗吳茱萸人參白朮高良薑以上各六分橘皮三分上八味搗篩為散蜜和為丸如梧子大一服十丸酒下日二服加至十五二十丸為度忌生蔥桃李豬肉雀肉等又療心痛冷痛腹滿如錐針刺及蟲齧心痛當歸湯方當歸三兩桔梗二兩吳茱萸三兩桂心三兩芍藥二兩大黃二兩上六味切以水六升煮取二升三合去滓納鶴蝨一兩攪溫一沸分三服空腹服之微利為度忌豬肉生蔥出第十五卷中惡疰心痛方三首廣濟療惡疰撮肋連心痛當歸湯方當歸八分青木香六分檳榔十顆碎麝香一銖研上四味切以小便一大升半煮取六大合絞去滓下麝香末分溫三服服別如人行四五里進一服微微利忌生菜熱面豬犬肉黏食蒜陳臭物出第四卷中崔氏療疰在心腹痛不可忍方取東引桃枝削去蒼皮取白皮一握以水二大升煮取半升一服令盡則瘥如不定更依前服之無忌又療心腹痛不可忍似疰病者或暴得惡疰攪刺欲死桃仁大黃湯方鬼箭羽二兩桃仁六十枚去皮尖芍藥四兩鬼臼二兩削去皮橘皮一兩當歸二兩生薑五兩桂心二兩柴胡一兩硃砂二兩研湯成下麝香一分研湯成下朴硝二兩研湯成下大黃三兩別浸上十三味切以水九升急火煮取三升溫分三服如人行相去六七里服但得快利三四行必瘥忌生蔥生血物並出第四卷中心痛症塊方二首廣濟療心痛症塊硬築心氣欲絶當歸湯方當歸桔梗芍藥各八分厚朴十分炙橘皮八分人參六分高良薑十分桃仁五十枚去皮尖生薑八分上九味切以水八升煮取二升五合去滓分溫三服服別相去如人行六七里進一服不利忌豬肉生冷油膩雞魚黏食小豆大蒜出第四卷中張文仲療心下堅痛大如碗邊如旋柈音盤名為氣分水飲所結方枳實七枚炙白朮三兩上二味切以水一斗煮取三升分三服腹中軟即當散也忌桃李雀肉等此張仲景傷寒論方備急肘後同出第一卷中心背徹痛方四首仲景傷寒論心痛徹背背痛徹心烏頭赤石脂丸主之方烏頭二分炮去皮附子一分炮去皮赤石脂二分乾薑二分蜀椒一分汗上五味搗篩蜜和丸先食服如麻子大一服三丸少少加之忌豬肉冷水千金必效文仲範汪經心録等同出第十五卷中千金分兩小別張文仲蜀椒丸療胸中氣滿心痛引背方蜀椒一升出汗半夏一升洗附子一兩炮上三味搗篩蜜和為丸如梧子大一服五丸日三忌豬羊肉餳等出第三卷中範汪療心下切痛引背胸下蓄氣胃中有宿食茱萸煎方吳茱萸一升蜀椒五升甘草二兩炙乾地黃一斤上四味以清酒三升漬三宿絞取汁銅器中煎令沸麥門冬五升去心乾漆一斤納煎中色黃絞去之納石斛五兩阿膠一斤白蜜六升凡九味以湯煎令可丸取如棗大含稍稍咽之日三甚者日五六服膝脛重痛者加石斛少氣加麥門冬服藥五日愈當下症忌海藻菘菜蕪荑等奉車都尉陳蓋試有驗又芫花湯主卒心痛連背背痛徹心心腹並懊痛如鬼所刺絞急欲死者方芫花十分大黃十分上二味搗下篩取四方寸匕著二升半苦酒中合煎得一升二合頓服盡須臾當吐吐便愈老小從少起此療強實人良若虛冷心痛恐未必可服並出第十八卷中卒心痛方一十四首肘後療卒心痛方先煮三沸湯一升以鹽一升合攪飲之若無火以作湯仍可用水鹽或半升服之古今録驗同又方吳茱萸二升生薑四兩切豉一升酒六升上四味煮取二升半分三服又方白艾成熟者三升以水三升煮取一升去滓頓服之若為客氣所中者當吐蟲物出範汪同又方取灶下熱灰篩去炭分以布囊盛令灼灼爾更番以尉痛上冷者更熬令熱又桂心散方桂心當歸各一兩梔子仁十四枚上三味搗為散酒服方寸匕日三五服亦主久心痛發作有時節者忌生蔥又桂心丸方桂心一兩烏頭一兩炮上二味搗篩蜜和為丸如梧子服三丸稍增之忌生蔥豬肉又療暴得心痛如刺苦參湯方苦參二兩龍膽二兩升麻二兩梔子仁三兩上四味切苦酒五升煮取一升分二服當大吐乃瘥並出第一卷中集驗卒心痛桂心湯方桂心八兩上一味以水四升煮取一升半分二服忌生蔥肘後範汪千金同出第一卷中張文仲療卒心痛方取敗布裹鹽如彈子燒令赤末以酒一杯和服之肘後備急同出第五卷中又方閉氣忍之數十過並以手大指按心下宛宛中取瘥肘後備急同又方苦酒一升破雞子一枚著中合攪飲之好酒亦佳肘後備急範汪同又方蒸大豆若煮之以囊盛更番尉心上冷復易之肘後同並出第十卷中救急療卒心痛不能起止方井花水一大升蜜半合上二味相和婦人患令男子度與飲男子患令婦人度與飲必愈出第八卷中必效療卒心痛人參湯方人參桂心梔子黃芩甘草各一兩炙上五味切以水六升煮取二升分三服則愈奇效忌海藻菘菜生蔥肘後同出第五卷中中惡心痛方五首廣濟療卒中惡心腹絞刺痛氣急脹奄奄欲絶瓜蒂散方雄黃四兩研赤小豆四分熬瓜蒂三分上三味搗篩為散空肚溫漿水服一錢匕半當吐止不吐加至兩錢匕忌生冷油膩黏食陳臭等又療卒中惡心腹刺痛去惡氣麝香散方麝香一分研生犀角二分屑青木香二分上三味搗篩為散空肚以熟水服方寸匕立愈未止更服之不利忌五辛並出第四卷中集驗療卒暴心痛或中惡氣毒痛不可忍方大黃四兩芍藥四兩升麻三兩黃芩三兩鬼箭三兩鬼臼二兩桂心二兩桔梗三兩柴胡四兩硃砂二兩別研朴硝二兩上十一味切以水九升煮取二升七合分三服先分硃砂作三分一服納一分攪硃砂調服之此湯快利若痛不止宜服後方忌豬肉生蔥生血物千金云寒氣卒客於五臟六腑中則發心痛方千金同又方赤芍藥六兩桔梗五兩杏仁五兩去尖皮上三味切以水六升煮取二升半分三服日三忌豬肉千金同出第一卷中千金療卒中惡心痛方苦參三兩切好醋一升半上二味以醋煮苦參取八合強人頓服老小二服出第十三卷中多唾停飲心痛方二首病源心痛而多唾者停飲乘心之絡故也停飲者水液之所為也心氣通於口心與小腸合俱象火小腸心之腑也其水氣下行於小腸為溲便則心絡無有停飲也膀胱與腎俱象水膀胱為腎之腑主藏津液腎之液上為唾腎氣下通於陰若腑臟和平則水液下流宣利若冷熱相乘致腑臟不調津液水飲停積上迫於心令心氣不宣暢故痛而多唾也出第十六卷中範汪療胸中寒熱心痛清唾滿口數數欲吐食不化乾薑丸方乾薑一分桂心一分礬石一分熬令汁盡半夏一分蜀椒一分上五味搗篩蜜和丸如大豆許服二丸日三不知稍加以知為度忌生蔥羊肉餳出第十八卷中集驗療心痛唾多似蟲者方取六畜心隨得生切作四臠刀縱橫各一割破之納少真硃砂著中平旦吞之蟲死愈矣無真硃砂可用雄黃麝香也肘後云切作十四臠刀縱橫各割之以真丹一兩粉納割中旦悉吞之入雄黃麝香佳肘後經心録同出第一卷中通按生食果安否心下懸急懊痛方四首病源心與小腸合為表裡俱象於火而火為陽氣也心為諸臟主故正經不受邪若為邪所傷而痛則死若支別絡為風邪所乘而痛則經久成疹其痛懸急懊者是邪迫於陽氣不得宣暢擁瘀生熱故心如懸而急煩懊痛也出第十六卷中仲景傷寒論心下懸痛諸逆大虛者桂心生薑枳實湯主之方桂心三兩生薑三兩枳實五枚炙上三味切以水六升煮取三升去滓溫分三服忌生蔥範汪同出十五卷中肘後姜附丸方附子二兩炮乾薑一兩上二味搗篩蜜和丸如梧子服四丸酒飲並得日三服忌豬肉冷水本方云治心肺傷動冷痛出第一卷中古今録驗療人心痛懊憹悁悶築築引兩乳又或如刺困極桂心湯方通按悁音絹躁急也桂心半兩茱萸二兩芍藥三兩當歸二兩生薑半斤無生薑以乾薑五兩代之上五味切以水一斗二升煮取四升服一升晝三夜一良有驗忌生蔥出第八卷中千金心下痞諸逆懸痛桂心三物湯主之方桂心二兩膠飴半斤生薑二兩上藥切以水四升煮二味取三升去滓納飴分三服忌生蔥出第十三卷中心痛不能飲食方二首病源心痛而不能飲食者積冷在內客於脾而乘心絡故也心陽氣也冷陰氣也冷乘於心陰陽相乘冷熱相擊故令痛也脾主消水穀冷氣客之則脾氣冷弱不勝於水谷也心為火脾為土是母子也俱為邪所乘故痛復不能飲食也出第十九卷中廣濟療久心刺肋冷氣結痛不能食高良薑湯方高良薑十分當歸十分橘皮八分厚朴十分炙桔梗八分桃仁五十枚去尖皮吳茱萸八分生薑八分訶黎勒五分上九味切以水八升煮取二升八合絞去滓分溫三服服別相去如人行六七里再服忌豬肉生冷油膩黏食小豆等出第四卷中肘後療常患心痛不能飲食頭中疼重烏頭丸方烏頭六分炮椒六分汗乾薑四分桂心四分上四味搗末蜜丸酒服如大豆四丸稍稍增之忌生蔥出第一卷中久心痛方六首病源心為諸臟主其正經不可傷傷之而痛者則朝發夕死夕發朝死不暇展療其人心痛者是心之支別絡為風邪冷氣所乘痛也故成疹不死發作有時經久不瘥也出第十六卷中廣濟療心痛三十年不瘥月上旬殺蟲雷丸鶴蝨散方雷丸八分鶴蝨八分貫衆八分狼牙八分桂心八分當歸八分檳榔八分上七味搗篩為散空腹煮蜜水半雞子許服方寸匕日二服若重不過三服則瘥不利忌生蔥生冷油膩豬魚小豆大蒜等出第四卷中範汪療久心痛烏頭赤石脂丸方赤石脂乾薑桂心椒汗烏頭炮上五味等分末之蜜和丸如梧子服三丸日三以知為度赤石脂當取斑斑赤中者忌豬肉冷水生蔥出第十八卷中必效療三十年心痛方桃仁七枚去皮尖上一味研湯水合頓服酒服亦良肘後經心録同出第五卷中古今録驗療久心痛腹痛積年定不過一時間還發發甚則數日不能食又便出乾血窮天下方不瘥甄立言為處犀角丸服之數日則瘥方犀角二分屑麝香二分碎硃砂四分光明者研桔梗二分莽草二分炙鬼臼二分附子二分炮桂心二分貝齒五枚甘草六分芫花二分熬巴豆二十枚去心皮赤足蜈蚣二枚去足炙上十三味搗篩蜜和丸如梧子飲服一丸旦漸加至三丸以利為度忌生蔥豬肉野豬肉蘆筍生血物一方無附子千金有雄黃二分出第八卷中療心痛如蟲齧痛宛轉欲死不救方又濃搗地黃汁和麵作冷淘不用鹽服一頓蟲即出不出再服必出便瘥正元十年通事舍人崔抗女患心痛垂氣欲絶忽記此方服便吐出一物可方一寸以來狀如蝦蟆無目足微似有口蓋被此物所蝕抗云往年見親表患心痛因偶食地黃䬪飥遂吐一蟲猶動其時亦不謂地黃冷淘能害此蟲因盛於小竹筒以數莖地黃冷淘投於竹筒中須臾視之已化為水然覺此冷淘殺蟲心痛無不永絶抗自得此方救三四人皆如神效出手抄方經心録療四十年心痛不瘥方黍米沉汁溫服隨多少出第一卷中雜療心痛方三首廣濟療心痛又心撮肋心悶則吐血手足煩疼食飲不入桃仁丸方桃仁八分去皮尖當歸六分芍藥八分訶黎勒六分甘草六分炙延胡索四分人參六分檳榔十四枚上八味搗篩蜜丸如梧子以酒空腹下二十丸漸加至三十丸日再服取快利忌海藻菘菜生菜熱面蕎麥豬犬肉黏食出第四卷中古今録驗真心痛證手足青至節心痛甚者旦發夕死夕發旦死療心痛痛及已死方高其枕柱其膝欲令腹皮蹙柔爪其臍上三寸胃管有頃其人患痛短氣欲令人舉手者小舉手問痛瘥緩者止出第八卷中救急療心痛冷熱方取伏龍肝末煮水服方寸匕若冷以酒和服瘥範汪經心録同出第八卷中腹痛方四首病源腹痛者由腑臟虛寒冷之氣客於腸胃募原之間結聚不散正氣與邪氣交爭相擊故痛其有冷氣搏於陰經者則腹痛而腸鳴謂之寒中是陽氣不足陰氣有餘者也診其寸口脈沉而緊則腹痛尺脈緊臍下痛脈沉遲腹痛脈來觸觸者少腹痛脈陰弦則腹痛凡腹急痛此里之有病其脈當沉若細而反浮大故當愈矣其人不即愈者必當死以其病與脈相反故也其湯尉針石別有正方補養宣導今附於後養生方導引法云股脛手臂痛法屈一脛臂中所痛者正偃臥口鼻閉氣腹痛以意推之想氣往至痛上俱熱即愈又云偃臥展兩脛兩手仰足指以鼻納氣自極七息除腹中弦急切痛又云偃臥口納氣鼻出之除裡急飽咽氣數十令溫中寒干吐嘔腹痛口納氣七十所大振腹咽氣數十兩手相摩令熱以摩腹令氣下出第十六卷中張文仲當歸大黃療冷氣牽引腰背肋下腹內痛方當歸三兩芍藥八分桂心三分乾薑六分茱萸五分人參一兩大黃一兩甘草二兩炙上八味切以水六升煮取三升去滓溫服一升日三忌海藻菘菜生蔥出第三卷中範汪四味當歸湯主寒腹痛方當歸桂心乾薑各三兩甘草二兩炙上切以水八升煮取三升一服一升日三服虛冷激痛甚者加黃耆芍藥各二兩忌海藻菘菜生蔥千金無甘草有附子一兩出第十五卷中小品療寒冷腹痛茱萸湯方吳茱萸二兩甘草炙人參桂心各一兩生薑五兩半夏一升小麥一升當歸二兩上八味切以水一斗五升煮取三升分溫服一升日三服忌海藻菘菜羊肉餳生蔥千金桂二兩生薑切一升出第一卷中古今録驗芎藭湯療卒寒腹中拘急痛方芎藭當歸桂心芍藥甘草炙各一兩黃芩半兩乾薑半兩杏仁三十枚去皮尖上八味切以水五升煮取二升分再服忌海藻菘菜生蔥出第八卷中卒腹痛方七首肘後療卒腹痛方粳米二升上一味以水六升煮取六七沸飲之又方掘土作小坎以水滿坎中熟攪取汁飲之瘥並出第一卷中張文仲療卒腹痛方令病人臥高枕一尺許柱膝使腹皮踧氣入胸令人爪其臍上三寸便愈能幹咽吞氣數十過者彌佳亦療心痛肘後備急同又方灸兩足指頭各十四壯使火俱下良備急肘後同並出第一卷中千金療胸腹中卒痛生薑湯方生薑一斤搗取汁食蜜八兩醍醐四兩上三味微火上熬令相得適寒溫服三合日三出第十六卷中集驗療卒腹痛葛氏方桂末三匕酒服人參上好乾姜亦佳忌生蔥肘後文仲同又方食鹽一大把多飲水送取吐肘後張文仲同並出第一卷中心腹痛及脹滿痛方一十首病源心腹痛者由腑臟虛弱風寒客於其間故也邪氣發作與正氣相擊上衝於心則心痛下攻於腹則腹痛上下相攻故心腹絞痛氣不得息診其脈左手寸口人迎以前脈手少陰經也沉者為陰陰虛者病苦心腹痛難以言心如寒狀心腹痛痛不得息脈細小者生大堅疾者死心腹痛脈沉細小者生浮大而疾者死其湯尉針石別有正方補養宣導今附於後養生方導引法云行大道常度日月星辰清靜以雞鳴安身臥漱口三咽之調五臟殺蠱蟲令人長生療心腹痛出第十六卷中廣濟療心腹中氣時時痛食冷物則不安穩及惡水桔梗散方桔梗茯苓各八分枳實炙人參厚朴炙芍藥橘皮各六分桂心五分檳榔八分麥門冬去心八分上十味搗篩為散空肚煮薑棗飲服方寸匕日三服漸加至一匕半熱以茶飲下不利忌豬肉酢物生蔥生冷油膩小豆黏食熱面炙肉等物又療卒心腹痛氣脹滿不下食欲得瀉三兩行佳當歸湯方當歸茯苓桔梗橘皮高良薑檳榔各八分生薑八分上七味細切以水七升煮取二升三合絞去滓分溫三服服別相去如人行六七里服訖利三兩行宜停後服忌豬肉酢物生冷油膩魚蒜黏食小豆並出第十五卷中肘後療心腹俱脹痛煩滿短氣欲死或已絶方梔子十四枚豉七合上二味以水二升先煮豉取一升二合去滓納梔子更煎取八合絞去滓服半升不愈者盡服之備急文仲同又方烏梅二七枚水五升煮一沸納青大錢二七文煮取一升半強人可頓服羸人分再服當下愈文仲同又方茱萸二兩生薑四兩切豉三合上三味酒四升煮取二升分三服即瘥又療心腹相連常脹痛狼毒丸方狼毒二兩炙附子半兩炮上二味搗篩蜜和丸服如梧子一日服一丸二日二丸三日三丸自一至三以為