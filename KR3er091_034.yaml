方當歸乾地黃各十分澤蘭八分防風黃耆續斷各六分桂心人參地骨皮芍藥各七分乾薑六分上十一味搗末蜜丸桐子大酒下二十丸忌如常法第十四產後不論服藥宜爾不宜食諸生冷陳久滑物若服藥彌須將息每方服藥後合疏忌食法為欲錄其都要不能一一具言諸方有白朮忌桃李細辛忌生蔥甘草忌菘菜海藻枸杞忌狗肉附子黃連忌諸肉桂心忌生蔥第十五產後血氣不多通散當時不甚覺之在蓐雖小不和出則成痼結少腹疼硬乍寒乍熱食飲不為肌膚心腹有時刺痛口乾唾黏手足沉重有此狀宜依此方當歸芍藥人參甘草炙鬼箭羽牛膝各五分牡丹皮六分白朮六分桂心白薇烏梅熬各四分大黃八分虻蟲熬去翅足水蛭熬各三分蒲黃三分朴硝赤石脂各十分乾地黃七分虎杖六分上十九味搗末蜜丸桐子大酒服二十丸日再加二十五丸良忌如常法第十六產後膿血痢相兼宜依此方赤石脂五色龍骨黃連各十分阿膠炙黃耆各六分黃柏四分白朮五分上七味搗末蜜丸桐子大飲下三十丸散服亦妙如前服忌如常法產後遺糞方三首廣濟療產後遺糞方取故燕巢中草燒末以酒下半錢亦治男子集驗療產後遺糞方取礬石燒牡蠣熬各等下篩酒服方寸日三亦治男子又療產後遺糞不知出時方白蘞芍藥各二分上二味搗為散以酒服方寸匕產後陰道開方二首廣濟療產後陰道開不閉方取石灰一升熬令能燒草以水二升投灰中適冷暖入水中坐漬須臾復暖坐如常法用之集驗療婦人產後冷玉門開不閉硫黃洗方石硫黃研蛇床子各四分菟絲子五分吳茱萸六分上四味搗散以湯一升投方寸匕以洗玉門瘥止產後陰下脫方六首集驗療婦人產後陰下脫方取蛇床子一升布裹炙熨之亦療陰中痛千金療產後陰下脫方以鐵精粉上推納之又方燒人屎末酒服方寸匕日三度又方臍下橫紋灸二七壯古今錄驗療產後陰下脫方蜀椒一升吳茱萸一升戎鹽半雞子大上三味搗以綿裹如半雞子大納陰中日一易二十日愈又方鱉頭陰乾二枚葛根一斤上二味搗散酒服方寸匕日三八瘕方一十二首素女經論婦人八瘕積聚無子斷絕不主令有子受胎養法並曾傷落依月服藥法及陰閉生息肉陰癢生瘡陰癢䘌瘡帶下陰子臟不正陰門挺出陰腫堅隱疾方黃帝問於素女曰吾聞天下婦人產乳有子而病者未曾生子而病者又產乳後而中絕不復產者何也諸病作生而令婦人腹中有積聚胸脅腰背攣而痛久而生八瘕之聚病深可畏不在腸胃療之或已復作其狀寧可得聞之乎對曰婦人之病皆由於月病生產所致又從胞胎所起其病不同針灸食藥不得其方也黃帝曰安心其要易聞之為寶受之良久詳思念其事曰善哉療將奈何素女曰誠為主說婦人胞胎之數皆在陰里萬物皆從生淵深血脈精氣所從行腎為陰陰主開閉左為胞門右為子戶主定月水生子之道胞門生於子精精神氣所出入合於中黃門玉門四邊主持關元禁閉子精臍下三寸名曰關元主藏魂魄婦人之胞三焦之府常所從上然婦人經脈俞絡合調則月水如時來至故能生子而無病婦人營衛經絡斷絕不通其人思惟邪氣便得往來入合於子臟若生後惡露未已合陰陽即令婦人經脈攣急令人少腹裡急支滿胸脅腰背相引痛苦四肢酸削飲食不調結牢惡血不除月水不如時或在前或在後乍久不止因生積聚如懷胎狀邪氣盛甚令人恍惚多夢寒熱四肢不欲時動陰中生氣腫肉生風甚者小便不利苦痛如淋狀面目黃黑歲月病即不復生子黃帝曰吾深所憂也療之奈何可得愈病令人有子願拜受非其人不敢妄傳何以神良耳素女曰今詳面圖一曰黃瘕黃瘕者婦人月水始下若新傷墜血氣未止臥寢未定五臟六腑虛羸精神不定因向大風便利陰陽開閉關節四遠中於風濕氣從下上入於陰中稽留不去名為陰虛則生黃瘕之聚令人病苦四肢寒熱身重淋露臥不欲食左脅下有氣結牢不可得抑苦病腰背相引痛月水不利則善令人不產少腹急下引陰中如刺不得小便或時寒熱下赤黃汁病苦如此令人無子療當刺關元氣衝行以毒藥有法療治瘕當下即愈矣又療黃瘕皂莢散導之方皂莢一兩炙去皮子蜀椒一兩汗細辛六分上三味搗散以三角囊大如指長二寸貯之取納陰中悶則出之已則復納之惡血畢出乃洗以溫湯三日勿近男子忌生菜等二曰青瘕青瘕者婦人新生未滿十日起行以湯浣洗太早陰陽虛玉門四邊皆解散子戶未安定骨肉皆痛手臂不舉飲食未復內臟吸吸又當風臥不自隱障若居濕地及濕席令人苦寒洒洒入腹中心腹煩悶沉淖惡血不除結熱不得散則生青瘕之聚在左右脅下藏於背膂上與肩甲腰下攣急兩足腹下有氣起喜唾不可多食四肢不欲動搖恍惚善夢手足腫面目黃大小便難其候月水不通利或不復禁狀如崩中此自過所致令人少子療之當刺胃管行以毒藥有法瘕當下即愈矣又療青瘕導藥方戎鹽一升皂莢半兩去皮子炙細辛一兩六銖上三味搗散以三角囊大如指長三寸貯之納陰中但臥瘕當下青如葵汁養之如產法三曰燥瘕燥瘕者婦人月水下惡血未盡其人虛憊而以夏月熱行疾步若舉重移輕汗出交流氣力未平而卒以恚怒致腹中猥咽不泄經脈攣急內結不舒煩滿少力氣上達膈中背膂少腹壅急月水與氣俱不通利而反以飲清水快心月水橫流溢入他臟不去有熱則生燥瘕之聚大如半杯上下腹中苦痛在兩脅下上引心而煩害飲食食欲嘔吐胸及腹中不得太息腰背重喜臥盜汗足酸削久立而痛小便失時忽然自出若失精月水閉塞大便澀難有此病者令人少子療之以長針按而刺之法度行以毒藥瘕當下即愈矣又療燥瘕方大黃如雞子許乾薑二兩雞䏶胵中黃膜一枚炙黃連二兩桂心一尺䗪蟲三枚熬厚朴十銖炙郁李仁一兩去皮尖熬上八味搗散早朝空腹以溫酒一盞和三錢匕頓服瘕當下下畢養之如產婦法三月無子者當有子三日勿合陰陽四曰血瘕血瘕者婦人月水新下未滿日數而中止因飲食過度五穀氣盛溢入他臟若大肌寒吸吸不足呼吸未調而自勞動血下走腸胃之間流落不去內有寒熱與月水合會則生血瘕之聚令人腰痛不可以俯仰橫脅下有積氣牢如石少腹裹急苦痛背膂疼腰股下痛陰裹若生子風冷子門僻月水不時乍來乍去有此病者令人無子療之瘕當下即愈矣方缺崔氏療婦人血瘕痛方乾薑烏賊魚骨各一兩炙桃仁一兩去皮尖熬上三味搗散酒服二方寸匕日二又方取古鐵秤錘或大斧頭或鐵杵以炭火燒令赤投好酒三升中稍稍飲之又方桂末溫酒服方寸匕佳日二並出第十下卷中古今錄驗療婦人血瘕攻刺腹脅時痛導藥方大黃當歸各半分山茱萸一兩皂莢一兩去皮子炙細辛戎鹽二六銖上六味搗以香脂丸如指大每以綿裹納陰中正坐良久瘕當下養如乳婦之法五曰脂瘕脂瘕者婦人月水新下若生未滿三十日其人未復以合陰陽絡脈分胞門傷子戶失禁關節散五臟六腑津液流行陰道瞤動百脈關樞四解外不見其形子精與血氣相遇犯禁子精化不足成子則生脂瘕之聚令人支滿裹急痛痹引少腹重腰背如刺四肢不舉飲食不甘臥不安席左右走腹中切痛時瘥時甚或時少氣頭眩身體疼解苦寒惡風膀胱脹月水乍來乍去不如常度大小便血不止有此病者令人無子療之當刺以長針行以毒藥瘕當下即愈矣又療脂瘕方皂莢十八銖去皮尖礬石六銖燒五味子蜀椒汗細辛乾薑各半兩上六味搗散以香脂和如大豆著男子陰頭以合陰陽不三行其瘕乃愈又療婦人絕不復生及未曾生皆以脂瘕腹中有塊以湯煎自下尚不受子導散方皂莢炙去子皮吳茱萸當歸各一兩蜀椒汗各二兩細辛熬礬石燒五味子各三分大黃戎鹽各二兩乾薑二兩上十味搗散以輕絹袋如指大長三寸盛藥令滿納陰中坐臥隨意勿行走小便時去之別換新者六曰狐瘕狐瘕者婦人月水當日數來而反悲哀自恐若以遠行逢暴風疾雨電雷驚恐被濕罷音疲倦少氣心中恍惚未定四肢懈墮振寒若寤寐脈氣絕精神遊亡邪氣入於陰里不去則生狐瘕之聚食人子臟令人月水閉不通少腹瘀滯胸脅腰背痛陰中腫小便難胞門子戶不受男精五臟氣盛令人嗜食欲嘔喜唾多所思如有身狀四肢不舉有此病者終身無子其瘕有手足卒成形者殺人未者可療以長針急持刺之行以毒藥有法瘕當下即愈矣又療狐瘕方取新死鼠一枚裹以新絮塗以黃土穿地坎足沒鼠形置其中桑薪灼其上一日一夜出分去絮納桂心末六銖酒服二方寸匕病當下甚者不過再服瘥止七曰蛇瘕蛇瘕者婦人月水已下新止適閉未復胞門子戶勞動陰陽未平營衛分行若其中風暴病羸劣飲食未調若起行當風及度泥塗因沖寒大早若坐濕地名曰陰陽亂腹中虛若遠行道路伏飲汙井之水不潔之食通吞蛇鼠之精流落不去則生蛇瘕之聚上食人之肝心苦病長大條條在臍下上還絞左右脅不得吐氣兩股脛間苦疼少腹多熱小便赤黃膀胱引陰中攣急腰背俱痛難以動作喜發寒熱月水或多或少有此病者不復生子其瘕手足成形者殺人未者可治之療有法度行以毒藥瘕當下即愈矣又療蛇瘕方大黃黃芩芒硝各半兩甘草大如指一尺炙烏賊魚骨二枚皂莢六枚去皮子尖上六味搗以水六升煮之三沸下絞去滓下硝適寒溫服之十日一劑空腹服之當下八曰鱉瘕鱉瘕者婦人月水新至其人劇作罷音疲勞汗出衣服潤濕不以時去之若當風睡足踐濕地恍惚覺悟踱立未安顏色未平復見所好心為開蕩魂魄感動五內脫消若入水浣洗沐浴不以時出而神不守水氣與邪氣俱入至三焦之中又暮出入玉門先閉津液妄行留落不去則生鱉瘕之聚大如小杯令人少腹內切痛惡氣左右走上下腹中苦痛若存若亡持之躍手下引陰里腰背亦痛不可以息月水不通面目黃黑脫聲少氣有此病者令人絕子其瘕有手足成形者殺人未者可治之療有法度以長針按療之行以毒藥瘕當下即愈矣又療鱉瘕方大黃六分乾薑側子各半分附子人參各九銖䗪蟲一寸匕熬桂心一兩六銖細辛土䱉各十八銖白朮一兩上十味搗散以酒服方寸匕日三以上八般瘕疾出古今錄驗第三十卷中肉癥方二首集驗療婦人臍下結堅大如杯升月經不通寒熱往來下痢羸瘦此為癥氣不可療未生癥者可療方生地黃三十斤取汁乾漆一斤熬上二味搗漆為散納地黃汁中微火煎令可丸酒服桐子大三丸至七八丸即止刪繁療女人子門不開血聚腹中生肉癥築築如物此呼為癥氣臟寒所致生地黃煎破血丸方生地黃汁一升生牛膝汁一升乾漆一斤半熬上三味搗漆為散納地黃等汁中攪微火煎取堪為丸止停攪丸如梧子一服三丸以酒服日再若覺腹內過痛食後乃服之婦人崩中方一十一首小品療婦人崩中晝夜十數行醫所不能療方芎藭八兩上一味切以酒五升煮取三升分三服不飲酒水煮亦得千金療崩中方白茅根二斤小薊根五斤上二味切以酒五升煮取四升分稍稍服又療婦人白崩中方芎藭阿膠炙桂心赤石脂小薊根各二兩乾地黃四兩伏龍肝雞子許七枚上七味切以酒六升水四升煮取三升去滓納膠令烊分為三服日三並出第四卷中千金翼療婦人白崩中馬通方白馬通汁二升乾地黃四兩伏龍肝如雞子大七枚桂心芎藭阿膠炙小薊根白石脂各二兩上八味切以酒七升合馬通汁煮取三升去滓納膠令烊分服日三又療婦人崩中及痢一日一夜數十起大命欲死多取諸根煎丸得入腹即活若諸根難悉得者第一取薔薇根令多多仍合之遇有酒以