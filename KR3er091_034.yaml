濕散是蚺蛇膽等六味者是在前療甘濕卷中余家婢遇此疾百方療不瘥蝕處作兩瘡深半寸余於涓子方中檢得此甘草湯方仍以自處蚺蛇膽散用不經七日瘡乃平復甚效凡救十八人手下即活遇斯疾者請廣流布傳之出第十卷中又療疳頻用大效方蚺蛇膽真者研青木香石硫黃研鐵精麝香各四分舊用五月五日蝦蟆麝香臨時分之多少入用緣麝香闢蛇毒若先以相和蛇膽即無力也上六味等分搗篩為散更細研有患取如三棋子和並花水日再服服訖先令便利了即以後方桃枝熏下部訖然後取散如二棋子納竹管里深吹入下部中亦日再老小量減其熏法每日一度不用再為之甚良又療疳蟲食下部及五臟方取桃東南枝三七枚輕打頭使散以綿緩纏之又搗石硫黃為末將此綿纏桃枝捻轉之令末少厚又截一短竹筒先納下部中仍以所捻藥桃枝熟然熏之並出第三卷中文仲療陰蝕欲盡者方蝦蟆兔屎等分末敷之良古今錄驗療婦人陰蝕苦中爛傷狼牙湯方狼牙三兩㕮咀以水四升煮取半升去滓納苦酒如雞子中黃一杯煎沸適寒溫以綿濡湯以瀝瘡中日四五度即愈陰中腫痛方四首肘後療陰中腫痛方炙枳實以熨之經心錄療婦人陰中腫痛不可近者湯洗方防風三兩大戟二兩艾五兩上三味切以水一斗煮取五升溫洗陰中日可三度良古今錄驗療婦人陰腫堅痛礬石散方礬石二分熬甘草半分炙大黃一分上三味搗篩取棗大綿纏導陰中二十日即愈又療婦人陰腫苦瘡爛麻黃湯洗之麻黃去節黃連蛇床子各一兩酢梅十枚上四味切以水一斗煎取五升洗之陰中瘡方五首集驗療婦人陰中痛生瘡方羊脂一斤當歸杏仁去皮尖白芷芎藭各一兩上五味細切羊脂和置甑中蒸之藥成取如大豆一枚綿裹藥納陰中日一度肘後療女子陰中瘡方末硫黃敷瘡上又療女子陰中瘡方杏仁燒末雄黃礬石燒各二分麝香半分上四味和敷之日三度古今錄驗療婦人陰中生瘡黃芩湯洗方當歸黃芩芎藭大黃礬石各二分黃連一分雄黃二分上七味切以水五升煮取四升洗瘡日三度又療婦人陰中生瘡雄黃散方芎藭藜蘆雄黃研丹砂研蜀椒汗細辛當歸各一分上七味搗篩散取方寸匕綿裹納陰中又敷外瘡方忌如常法陰癢方五首廣濟療苦產門癢無計方蚺蛇膽研雄黃研石硫黃研硃砂研硝粉未詳藜蘆蕪荑各二分上七味搗細篩重蘿令調以臘月豬脂和如泥取故布作篆子如人指長一寸半以藥塗上納孔中日一易易時宜以豬椒根三兩煮湯洗干拭納藥佳崔氏療陰癢痛不可忍方取蒜隨多少水煮作湯洗之日三又方取狼牙蛇床子煮作湯洗日三又方取杏仁燒作灰乘熱綿裹納陰中良並出第十卷中經心錄療陰癢方枸杞根一斤水三升煮十沸適寒溫洗之陰中癢有蟲方六首千金療人陰蟲瘡方以肥豬肉一斤以水煮肉令爛去肉以湯令極熱便灌瘡上冷易之又方取狼牙兩把以水五升煮取一升洗之日五六度並出第三卷中崔氏療陰癢似有蟲狀煩悶真丹散方真丹一分研礬石二分燒研芎藭四分上三味為散以縠囊盛著陰中蟲當死盡又陰癢有蟲方取雞肝去脂及熱納陰中蟲當盡死並出第十卷中古今錄驗療陰癢有蟲方取牛肝截五寸繩頭納陰中半日蟲入肝出之豬肝亦得又療陰中有蟲癢且痛目腫身黃欲得男子漏血下白少氣思美食方用生鯉魚長一尺去頭內取骨搗末熬黃黑以豬脂和以絹袋盛如常法內陰中至痛處即止陰下脫方四首廣濟療陰下脫出方皂莢去皮子炙半夏洗大黃細辛各四分蛇床子六分上五味搗散薄絹袋盛如指大納陰中日二易又以羊脂煎煮遍塗上以鐵精敷脂上多少令調以火炙布令暖以熨之研磁石酒服方寸匕日三服集驗療婦人陰下脫散方當歸黃芩牡蠣熬各二兩芍藥一兩半蝟皮一兩切熬上五味搗散酒服方寸匕日三服禁舉重良千金同千金療陰下脫硫黃散方硫黃研烏賊魚骨各二分五味子三銖上三味搗散以粉上日三出第三卷中千金翼療諸婦人陰下脫方細研礬石酒服方寸匕日三服出第六卷中陰挺出方三首廣濟療婦人子臟挺出數痛洗方蛇床子一斤酢梅十四枚上二味以水五升煮取二升半洗痛處日夜十過良又方烏頭炮白芨各四分上二味搗散取方寸匕以綿裹納陰中令入三寸腹內熱即止日一度著明晨仍須更著以止為度集驗療婦人陰下挺出方蜀椒烏頭白芨各二分上三味搗篩以方寸匕綿裹納陰中入三寸腹中熱明旦更著瘥止千金同女人傷丈夫頭痛方二首集驗療女人傷於丈夫四體沉重噓吸頭痛方生地黃八兩芍藥五兩香豉一升蔥白切一升生薑四兩甘草二兩炙上六味切以水七升煮取二升半分三服不得重作慎房事千金同千金翼療諸婦人傷丈夫若頭痛欲嘔悶桑白皮湯方桑根白皮半兩乾薑半兩桂心五寸大棗二十枚上四味切以酒一斗煮三四沸去滓分溫服之適衣無令汗出千金同出第八卷中交接輒血出痛方二首千金療女人交接輒血出方桂心二分伏龍肝二分上二味搗末以酒服方寸匕瘥止出第三卷中崔氏療合陰陽輒痛不可忍方黃連六分牛膝甘草炙各四分上三味切以水四升煮取二升洗之日三四度瘥止出第十卷中童女交接他物傷方三首集驗療童女交接陽道違理及他物所傷犯血出流離不止方取釜底墨斷葫蘆以塗之又療童女交接陽道違理血出不止方燒發並青布末為粉塗之又方割雞冠取血塗之小戶嫁痛方四首千金療小戶嫁痛連日方甘草三分炙芍藥二分生薑三分桂心一分上四味切以酒二升煮取三沸去滓分溫服之神良出第三卷中千金翼療小戶嫁痛單行方牛膝五兩上一味切以酒三升煮再沸分三服又療婦人嫁痛單行大黃湯方大黃三兩上一味以酒一升煮一沸頓服又療婦人小戶嫁痛烏賊魚骨散方烏賊魚骨二枚燒為屑酒服方寸匕日三並出第八卷中坐藥方三首通真論療婦人子門冷坐藥法蛇床子四分茱萸六分麝香二銖上三味搗散蜜丸綿裹如酸棗納之下惡物為度近效坐藥主下冷子門癢閉方吳茱萸葶藶子熬各二分蛇床子三分無食子一枚上四味為散以綿裹如棗許納子宮中令熱為度又方遠志二分蛇床子五味子各四分乾薑蓮花葉各三分上五味搗散以口中玉泉和兔矢大納陰門中去冷內熱良夏侯拯錄婦人慾斷產方四首小品斷產方故布方圓一尺燒屑以酒飲服之終身不產千金云蠶子故布又療妊身欲去之並斷產方栝蔞桂心各三兩豉一升上三味切以水四升煮取一升半分服之又方附子二枚搗為屑以淳苦酒和塗右足去之大良千金斷產方油煎水銀一日勿息空肚服棗大一丸永斷不損人
