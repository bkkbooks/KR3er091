body:
  text: 卷第三十四產婦忌慎法六首千金論曰產婦雖是穢惡然將痛之時及未產已產並不得令死喪汙穢家人來視之則生難若已產者則傷兒也又凡婦人產乳忌反支月若值此月當在牛皮上若灰上勿令水血惡物著地則殺人及浣濯衣水皆以器盛過此忌月乃止又凡產不依產圖脫有犯觸於後母子皆死若不至死即母子俱病庶事皆不稱心能依圖無犯觸母子即得無疾子即易養又凡欲產時特忌多人瞻視唯得三二人在旁待總產訖即告語眾人也若人眾令人難產又凡產婦第一不得匆匆懼怕旁人極須少靜皆不得預緩預急憂悒憂悒則難產若腹痛眼中火生此兒迴轉未即生也兒生訖一切人及母皆忌問是男是女兒胎落地即急取口中惡物與新汲並水五合咽忌與暖湯物亦勿令母看視穢汙又產婦慎熱食熱藥熱面食常識此飲食當如人肌溫溫也並出第二卷中令易產方六首千金令易產方凡欲臨產時先脫尋常所著衣以籠灶頭及灶口令至密即易生神驗又方生地黃汁半升生薑汁半合煎熱頓服又方燒藥杵令赤納酒中飲之小品同並出第二卷中小品預服散令易生母無疾病未生一月日前預服過三十日行步動作如故兒生墮地皆不自覺甘草散方甘草八分炙黃芩大豆黃卷粳米麻子仁乾薑桂心各二分吳茱萸二分上八味搗散酒服方寸匕日三千金同又療婦人易生產飛生丸方飛生一枚槐子故弩箭羽各十四枚上三味搗末蜜丸桐子大以酒服二丸即易產又方取蛇蛻皮著衣帶中鑑鼻系衣帶臨欲產時左手持馬銜右手持飛生毛令易產並出第七卷中下乳汁方一十五首廣濟療婦人乳無汁方以母豬蹄四枚治如食法以水二斗煮取一斗去蹄土瓜根通草漏蘆各三兩以汁煮取六升去滓納蔥白豉如常法著少米煮作稀蔥豉粥食之食了或身體微微熱有少許汗佳乳未下更三兩劑甚驗崔氏同出第三卷中千金療乳無汁漏蘆湯方漏蘆通草各八分鍾乳四分黍米一升上四味切將米宿漬研取汁三升煮藥三四沸去滓作飲服經心錄同又方土瓜根末酒服半錢匕乳日下如流水崔氏同又療乳無汁單行石膏湯方石膏四兩研以水二升煮三沸稍稍服一日盡良又療乳無汁單行鬼箭湯方鬼箭五兩水六升煮取四升去滓一服八合日三服亦可燒灰作末水服方寸匕日三又下乳汁通草散方通草鍾乳研上二味等分為散面粥服方寸匕日三百日後可兼養兩兒又麥門冬散方麥門冬去心鍾乳研通草理石各等分研上四味搗散食前後酒服方寸匕日三又下乳漏蘆散方漏蘆二分鍾乳五分研栝蔞五分蠐螬三分熬上四味搗散食後砂糖水下方寸匕日三又方母豬蹄一具粗切以水二斗煮令熟餘五六升汁飲之甚良崔氏同又方豬蹄二枚炙捶碎通草八兩切上二味以清酒一斗浸之稍漸飲盡不出更作崔氏同又方栝蔞根切一升酒四升煮三沸去滓服半升日三良崔氏同又方栝蔞青色大者一枚熟搗以白酒一升煮取四升去滓溫飲一升日三若無大者用小者兩枚無青色者黃色者亦好崔氏同又方燒鯉魚頭末酒服三指撮又方燒死鼠酒服灰方寸匕日三立下並出第三卷中崔氏療乳汁不下方鼠肉五兩羊肉六兩獐肉八兩上三味合作臛啖之勿令食者知出第十卷中妒乳瘡痛方一十四首集驗論療婦人妒乳乳癰諸產生後宜勤擠乳不宜令汁蓄積不去便不復出惡汁於內引熱溫壯結堅掣痛大渴引飲乳急痛手不得近成妒乳非癰也方始妒乳急灸兩手魚際各二七壯斷癰脈也便可令小兒手助將之則乳汁大出皆如膿狀內服連翹湯汁自下外以小豆散薄塗之癰處當瘥千金同又產後不自飲兒及失兒無兒飲乳乳蓄喜結癰不飲兒令乳上腫者方以雞子白和小豆散塗之乳房令消結也若飲兒不泄者數捻去之亦可令大者子含水使漱口中冷為嗍取乳汁吐去之不含水漱令乳頭作瘡乳孔寒也千金同又療妒乳乳癰連翹湯方連翹升麻杏仁去皮尖射干防己黃芩大黃芒硝柴胡各三兩芍藥甘草炙各四兩上十一味切以水九升煮取三升分服忌海藻菘菜千金同又方取葵莖燒灰搗散服方寸匕日三即愈千金同又療妒乳生瘡方蜂房豬甲中土車轍中土各等分末苦酒和塗之良千金同一方又有車轂上脂一味又療婦人女子乳頭生小淺熱瘡搔之黃汁出侵淫為長百療不瘥者動經年月名為妒乳病婦人飲兒者乳皆欲斷世論苟抄乳是也宜以赤龍皮湯及天麻湯洗之敷二物飛鳥膏及飛烏散佳始作者可敷以黃芩漏蘆散及黃連胡粉散並佳方如下赤龍皮湯方槲皮切三升以水一斗煮取五升夏冷用之秋冬溫之分以洗乳亦洗諸深敗爛久瘡洗畢敷膏散千金同又天麻草湯方天麻草切五升以水一斗半煎取一斗隨寒溫分洗乳以殺癢也此草葉如麻葉冬生夏著花赤如鼠尾花亦以洗侵淫黃爛熱瘡癢疽濕陰蝕瘡小兒頭瘡洗畢敷膏散千金同又飛烏膏散方用燒硃砂作水銀上黑煙一名細粉者三兩礬石三兩燒粉上二味以絹篩了以甲煎和之令如脂以敷乳瘡日三作散者不須和有汁自著可用散亦敷諸熱瘡黃爛侵淫汁瘡蜜瘡丈夫陰蝕癢濕諸小兒頭瘡疳蝕口邊肥瘡蝸瘡等並以此敷之千金同又黃連胡粉膏散方黃連二兩胡粉十分水銀一兩同研令消散上三味搗黃連為末三物相和合皮裹熟挼之自和合也縱不成一家且得水銀細散入粉中也以敷乳瘡諸濕癢黃爛肥瘡若著甲煎為膏千金同備急小品妒乳方黃芩白蘞芍藥各等分上三味下篩漿水服一錢五匕日三若右乳結將去左乳汁左乳結即將去右乳汁服即消千金同又方柳白皮酒煮令熱以熨上即消又方苦酒磨升麻若青木香或紫檀香以摩上並良一味即得佳又方已入腹者麝香薰陸香青木香雞舌香各一兩以水四升煮取二升分再服忌蒜面酒牛馬豬肉必效療婦人妒乳癰瘡遲愈五物雄黃䕡茹膏方雄黃白蘞雌黃䕡茹各一分並切亂髮如雞子一枚上以豬脂半斤合煎三沸去滓乃納亂髮發盡藥成以塗瘡不過十日瘥乳癰腫方一十八首廣濟療乳癰大堅硬赤紫色衣不得近痛不可忍方大黃芍藥楝實馬蹄炙令黃等分上四味搗散酒服方寸匕覆取汗當睡著覺後腫處散不痛經宿乃消百無失一明晨更服一匕忌衝風熱食深師療乳癰腫消核芍藥散方芍藥通草桂心昆布白蘞附子炮黃耆人參海藻木占斯各一兩上十味搗散以清酒服一錢匕日三當先食並療頤下氣結瘰癧又乳癰眾醫不能療柏皮膏方豬膏年多者佳柏皮三斤去黑皮以豬膏煎之當稍稍煎柏皮熟黑便漉出更煎余柏皮如初盡以塗瘡甚驗集驗療乳癰方大黃二兩莽草二分伏龍肝十二分乾薑二分上四味搗末以酢和塗乳上即效只一方生薑極驗可用也千金同又方取鹿角下篩散以豬頷下清汁服方寸匕不過再服亦以醋漿服之良千金云豬脂銷上清汁又療乳癰四物膠敷貼方膠炙大黃莽草細辛上各等分搗末以雞子白和塗紙上貼腫頻易晝夜貼之割紙穿如錢大出腫頭又療乳癰三物桂心貼方桂心三分烏頭二分甘草二分上搗散以苦酒和塗腫上以小紙覆濡其上將乳居其中以乾布置乳下須臾布當濡有膿水也佳範汪同千金翼排膿散主乳癰方鐵粉蓯蓉桂心細辛芎藭人參防風乾薑黃芩芍藥各四兩當歸甘草炙各五分上十二味搗散酒服方寸匕日三夜一加至一匕半服藥十日血出多勿怪是惡物除甚良出第五卷中備急葛氏療婦人乳癰妒腫者或經久眾療不瘥方堅硬紫色削柳根皮搗熟熬令溫帛囊盛熨乳上冷更易甚良一宿即愈千金同又方研米槌二枚煮令熱以絮及巾覆乳上用二捶更互熨腫數十過瘥上已用大驗千金云炙熬又乳癰方大黃灶下黃土各一分末生薑二分上三味搗末醋和塗乳痛即止極驗劉涓子不用生薑用生魚三味等分余比用鯽魚妙又療乳癰方大黃鼠屎黃連各一分上三味搗末合鼠屎更搗以黍米粥清和敷乳四邊痛止即愈無黍米粟米粳米並可用千金同救急療乳癰腫痛如升碗大痛不可忍方取白姜石搗末一二升用雞子白和如稀泥敷腫干更易之此方頻試驗如雞子慮罪取榆白皮和搗敷即瘥又療乳癰堅硬痛不可忍方莨菪子半大匙當年新者服時不得嚼破以清水一大盞和頓服痛即止又療乳癰腫方以釅醋研地黃塗上干即易不過三五遍服以酒研之必效療婦人乳癰方覺痛色未變時以飼豬米研汁飲之即瘥仍取豬槽木厚如匙面火炙數數熨上又療婦人乳癰丹參膏方丹參白芷芍藥各二兩上三味㕮咀以苦酒淹經宿又取豬脂半斤微火上煎之白芷黃膏成去滓以膏塗上甚良又療瘡上須貼膏方黃耆八分白芷大黃各五分當歸續斷各四分薤白二合切松脂十二分薰陸香蠟各十分豬脂一升生地黃汁七合上十一味切納地黃汁中漬半日納豬脂中微火上煎三上三下白芷色黃膏成布絞去滓剪帛如瘡大小塗帛貼瘡上日四五度易之終身無苦極效產後血暈心悶方一十首廣濟療產後血暈心悶不識人或神言鬼語氣欲絕方荷葉二枚炙蒲黃一兩甘草二兩炙白蜜一匙地黃汁半升上五味切以水三升煮取一升絞去滓下蒲黃蜜地黃汁暖服立瘥止又療產後心悶血氣衝上血暈羚羊角散方取羚羊角一枚燒成灰末以東流水服方寸匕若未瘥更服瘥救急產暈心悶大困方鯽魚剝皮作鱠以虀食三兩口止文仲暈絕方蘇方木三兩碎以水五升煎取二升分再服或無蘇木煮緋色衣取汁服甚驗又方取牆上青衣一抄以水四小升煮取二升分服又生薑汁一小升地黃汁一小升酒一大升相和煎五六沸分再服每劑和大黃末一匙此方甚良崔氏凡暈者皆是虛熱血氣奔迸腹中空所致欲分娩者第一須先取釅醋以塗口鼻仍置醋於旁使聞其氣兼細細飲之此為上法如覺暈即以醋噴面蘇來即飲醋仍少與解之一云仍少與水解之又凡產後忽悶冒汗出不識人者是暴虛故也方取破雞子吞之便醒若未醒可與童子小便一升甚驗丈夫小便亦得切不得用病人者又若久不識人或時復發者此為有風因產血氣暴虛風行脈中故也若產後去血多者尤增此疾與雞子不醒者可急與竹瀝汁一服五合須臾不定復與五合頻得三五服立瘥並出第十上卷中近效療血暈絕不識人煩悶方紅藍花三兩新者佳以無灰清酒半升童子小便半大升煮取一大盞去滓候稍冷服之新汲水一大升煮之良久又方赤父馬糞絞取汁一大盞濕者良若干者取新汲水半大盞和研絞取汁頓服亦主人血不止神驗夏侯拯錄產乳暈絕方五首崔氏療產乳暈絕方以惡血服少許良又方以服洗兒水三合良又方覺暈即用三股麻繩長五六尺系產婦右腳膝上令人捉兩頭急挽得醒徐徐解之並出第十上卷中文仲療產乳暈絕方半夏一兩洗搗篩丸如大豆納鼻中即愈崔氏同救急療產乳暈絕方生赤小豆搗為散取東流水和方寸匕服之不瘥再服崔氏同產後余血不盡腰腳疼及惡露不下方七首廣濟療產後三日患腰疼腹中余血未盡並手腳疼不下食生地黃湯方生地黃汁一升芍藥甘草各二兩炙丹參四兩蜜一合生薑汁半合上六味切以水三升煮取一升去滓納地黃汁蜜薑汁微火煎一兩沸一服三合日二夜三利一兩行中間進食與藥更進服又療產後惡露不多下方牛膝大黃各八分牡丹皮當歸各六分芍藥蒲黃桂心各四分上七味搗散以生地黃酒服方寸匕日二血下止救急療婦人產後余血不盡血流入腰腳疼痛胸急氣滿兩脅痛方生薑一斤淡竹葉一升並切上二味以水二升煮取一升去滓分再服又療產後血不盡血痛悶方取荷葉燒作灰暖水和服煮取汁亦良又惡露不盡腹脹痛方取亂髮如雞子大灰汁洗淨燒末酒服又方取百斤秤錘一枚燒赤投酒五升中用此秤錘酒煮當歸三兩取二升去滓分再服千金同又療一切宿血及損傷瘀血在腹內不問新久並婦人月經不通產後惡血不下皆良方大黃芒硝各三兩桃仁四十枚去尖皮上三味芒硝桃仁合搗四五百杵以酢漿二升半漬一宿空腹攪調頓服之不能頓服者分作兩服良久先下糞次下如豆泥汁或黑血為驗強人日別服一劑弱人兩日服之下血盡便止不過三兩劑忌生冷茶葵並出第四卷中產後惡露不絕方四首廣濟療婦人產後血露不絕崩血不可禁止腹中絞痛氣息急療蓐病三十六疾方亂髮燒灰阿膠各二兩炙代赭乾薑各三兩馬蹄一枚燒乾地黃四兩牛角鰓五兩炙上七味搗篩蜜和為丸如梧桐子空腹以飲下二十五丸日二至四十丸良深師療產後虛冷下血及水穀下痢晝夜無數兼療惡露不絕龍骨丸方乾薑甘草炙桂心各二兩龍骨四兩上四味搗篩蜜丸如梧桐子以酒下二十丸日三忌如常法此方甚良文仲葛氏療血露不絕方以鋸截桑木取屑五指撮酒服日三瘥又隱居效方澤蘭湯療產後惡露不盡腹痛往來兼滿少氣澤蘭八分當歸三分生地黃三分芍藥十分甘草六分炙生薑十分大棗十四枚上七味切以水九升煮取三升分為三服欲死塗身得瘥產後血氣煩悶方四首廣劑療產後心胸中煩悶血氣澀肋下妨不能食方生地黃汁一升當歸一兩末生薑汁三合酒五合童子小便二升上五味和煎三四沸去滓分服一日令盡間食服又血氣煩悶方取生藕搗絞取汁飲一升未定更飲瘥止竹瀝亦得千金同集驗療產後血氣煩悶方取生地黃汁一升酒三合相和微溫頓服之千金同千金療婦人產後氣欲絕心中煩悶不解必效方竹葉切麥門冬去心小麥各一升甘草一兩炙生薑二兩大棗十四枚上六味切以水一斗煮竹葉小麥取八升去滓納余藥煮取三升去滓分服心虛悸加人參二兩少氣力加粳米五合一方用竹皮若胸中氣逆加半夏二兩忌如常法出第三卷中產後心痛方三首集驗大岩蜜湯療產後心痛方乾地黃當歸獨活甘草炙芍藥桂心小草細辛各一兩吳茱萸一升乾薑三兩上十味切以水九升煮取三升分三服良千金同經心錄蜀椒湯療產後心痛此大寒冷所為方蜀椒二合汗芍藥三兩半夏洗當歸桂心人參甘草炙各二兩生薑汁五合蜜一升茯苓二兩上十味切以水九升煮椒令沸下諸藥煮取二升半去滓下薑汁蜜等更煎取三升一服五合漸至六合盡勿冷餐千金同千金羊肉湯療產後腹中心下切痛不能食往來寒熱若中風乏氣力方羊肉三斤當歸黃芩甘草炙芎藭防風各二兩芍藥三兩生薑四分上八味切以水一斗二升煮羊肉減半煮藥取三升分溫三服忌如常法崔氏同出第三卷中產後腹中絞刺痛方九首廣濟療產後腹中絞刺痛不可忍方當歸芍藥乾薑芎藭各六分上四味搗散以酒服方匕日二服又療產後內虛寒入腹腹中絞痛下赤煩毒譫語見鬼羊肉湯方肥羊肉一斤當歸甘草炙芍藥各一分上四味切以水一斗煮羊肉取七升煮藥取二升分服又療新產後腹中加弦常堅絞痛無聊方蜜一升當歸一兩上一味末入蜜中煎融融耳適寒溫頓服千金當歸湯療婦人寒疝虛勞不足若產後腹中絞痛方當歸三兩生薑五兩芍藥二兩羊肉一斤上四味切以水八升煮取三升適寒溫頓服七合日三又療產後疾痛桃仁芍藥湯方桃仁半升去皮尖芍藥芎藭當歸乾漆熬桂心甘草炙各二兩上七味切以水八升煮取二升半分三服又單行茱萸酒療產後腹內外疾痛方吳茱萸一升酒三升漬一宿煎取半升頓服亦可再服瘥止並出第三卷中必效療產後腹痛方羌活四兩切酒二升煮取一升分服又方兔頭炙令熱以熨產婦腹如刀絞痛者熨之立定又療痛不可忍方取一苦瓠蘆未經開者開之去子訖以沸釅酢投中蒸熱隨痛熨冷即換極甚效產後虛熱方二首千金蜀漆湯療產後虛熱往來心胸中煩悶滿骨節疼及頭痛壯熱晡時輒甚又似微瘧方蝭母芍藥各二兩蜀漆葉甘草炙桂心黃芩各一兩生地黃一斤黃耆五兩上八味切以水一斗先煮地黃取七升去滓下諸藥煮取二升半分三服此湯療寒熱不損人忌如常法出第三卷中千金翼療產後虛熱頭痛方白芍藥乾地黃牡蠣各五兩熬桂心三兩上四味切以水五升煮取二升半分三服日三此湯不損人無毒亦療腹中拘急痛若通身發熱加黃芩二兩甚驗大熱即除出第六卷中產後虛勞方四首千金增損澤蘭丸療產後百病理血氣補虛勞方澤蘭甘草炙當歸芎藭各七分附子炮乾薑白朮白芷桂心細辛各四分防風人參牛膝各五分柏子仁乾地黃石斛各六分厚朴炙藁本蕪荑各二分麥門冬八分去心上二十味搗末蜜丸以酒下十五丸至二十丸良忌如常法出第四卷中延年增損澤蘭丸主產後風虛勞損黃瘦方澤蘭七分防風乾地黃當歸細辛桂心茯苓芍藥人參甘草炙藁本烏頭炮麥門冬去心石斛紫菀芎藭各五分乾薑柏子仁蕪荑仁厚朴炙蜀椒汗各四分白朮黃耆各六分紫石英研石膏研各八分上二十五味搗篩蜜和丸如梧桐子以酒下二十至三十丸忌如常法刪繁療產婦勞虛或本來虛寒或產後血脈虛竭四肢羸弱飲食減少經水斷絕血脈不通虛實交錯澤蘭補虛丸方澤蘭葉九分石膏八分研芎藭甘草炙當歸各七分白芷防風白朮藁本蜀椒厚朴炙乾薑桂心細辛各五分上十四味搗篩蜜丸如梧桐子酒下二十丸至三十丸日再忌如常法古今錄驗澤蘭丸療產後風虛勞羸百病必效方澤蘭葉六分白芷椒汗蕪荑仁藁本細辛各四分白朮柏子仁人參桂心防風厚朴炙丹參各五分芎藭甘草炙當歸各七分乾地黃十分上十七味搗篩蜜和丸如梧桐