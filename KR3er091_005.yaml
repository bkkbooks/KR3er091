body:
  text: 卷第五療瘧方二十一首病源夏日傷暑秋必病瘧瘧病之發以時者此由邪氣客於風府循膂而下衛氣一日一夜常大會於風府其明日下一節故其作也晏此先客於脊背也每至於風府則腠理開腠理開則邪氣入邪氣入則病作此所以日作稍益晏者也其出於風府日下一節二十五日下至尾骶二十六日入於脊內注於伏膂之脈其氣上行九日出於缺盤之中其氣日高故作日益早也其間日發者由邪氣內搏於五臟橫連募原其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日蓄積乃作夫衛氣每至於風府則腠理乃發發則邪氣入邪氣入則病作今衛氣日下一節則其氣之發也不當風府其日作者奈何曰此邪氣客於頭項循膂而下者也故虛實不同邪中異所則不得當其風府也故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病衛氣之所在與邪氣相合則病作故風無常府衛氣之所發必開其腠理邪氣之所合則其府也風之與瘧也相與同類而風獨常在也而瘧得以時休者何也由風氣留其處瘧氣隨經絡沉以內搏故衛氣應乃作陽當陷而不陷陰當升而不升為邪所中陽遇邪則蜷陰遇邪則緊蜷則惡寒緊則為栗寒栗相搏故名曰瘧弱則發熱浮乃汗出旦中旦發晚中晚發夫瘧其人形瘦皮必粟起問曰病瘧以月一日發當以十五日愈設不愈月盡解出第十一卷中廣濟療瘧常山散方常山五分升麻二分蜀漆一分上三味搗篩為散一服二錢匕和井花水煮米半合頓服少間則吐吐訖則瘥忌生蔥生菜及諸果子生冷油膩等物又療瘧常山湯方常山三兩上一味切以漿水三升浸經一宿煮取一升欲發前頓服之後微吐瘥止忌生蔥生菜近效療瘧間日或夜發者張文仲備急同並出第一卷中張仲景傷寒論辨瘧病師曰夫陰氣孤絶陽氣獨發而脈微者其候必少氣煩滿手足熱而欲嘔也名曰疸瘧若但熱不寒者邪氣在心臟外舍分肉之間令人消瘦脫肉又辨瘧脈夫瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下之瘥弦遲者溫藥愈弦緊者可發汗針灸也浮大者吐之瘥脈弦數者風疾也以飲食消息之又辨瘧歲歲發至三歲發連日發不解者以脅下有痞也療之不得攻其痞但虛其津液先其時發汗其服湯已先小寒者漸引衣自覆汗出小便利則愈瘧者病人形瘦皮上必粟起又問病瘧以月一日發當以十五日愈設不瘥者當月盡解也如期不瘥當云何師曰此結為癥瘕名曰瘧母宜急療之大鱉甲煎方鱉甲十二分炙烏扇三分黃芩三分柴胡六分鼠婦三分熬乾薑三分大黃三分芍藥五分桂心三分葶藶二分熬石葦二分厚朴三分炙牡丹皮五分瞿麥二分紫葳三分半夏一分洗人參一分蟅蟲五分熬阿膠三分炙蜂窠四分炙赤硝十二分蜣螂六分炙桃仁三分去皮尖熬上二十三味末之取鍛灶下土一斗清酒一斛五升浸土候酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁下諸藥煎為丸如梧子大空心服七丸日三服忌莧菜生蔥胡荽羊肉餳等物千金有海藻大戟虻蟲無赤硝鼠婦用鍛灶灰一斛又瘧發渴者與小柴胡去半夏加栝蔞湯方柴胡八兩黃芩三兩人參三兩大棗十二枚擘甘草三兩炙生薑三兩栝蔞根四兩上七味切以水一斗二升煮取六升去滓更煎取三升溫服一升日三忌海藻菘菜經心録療勞瘧並出第十五卷中肘後療諸瘧方取青蒿一把上一味以水一升漬絞取汁盡服之備急張文仲同又方鱉甲三兩炙上一味搗末酒服方寸匕至發時令服三服兼用火炙無不斷者忌莧菜又方牛膝莖葉一把切以酒三升漬一宿分三服令微有酒氣不即斷更作不過三服止文仲備急集驗同並出第一卷中深師療瘧膈痰不得吐宜吐之常山烏梅湯方烏梅半兩桂心半兩芫花半兩豉五合綿裹半夏半兩常山半兩上六味切以酒三升水四升合煮取二升分三服必得吐一方取三升忌生蔥羊肉餳生菜一方無半夏常山又療瘧丸神方人參三分鉛丹三分天雄十分熬上三味搗合下篩蜜和初服二丸如梧子大臨發服二丸中當溫熱四肢淫淫痹為知服藥忌飽飯食瘧斷後食如常萬不失一備急文仲同又療瘧撩膈湯方常山三兩甘草三兩炙松蘿二兩烏梅十四枚黃芩二兩瓜蒂十四枚梔子仁十四枚擘上七味切以酒二升漬一宿明旦以水四升煮取三升分三服忌海藻生蔥生菜菘菜等又瘧結實積熱煩擾迷冒寒熱但多綿惙困篤常山大黃湯方常山三兩甘草三兩炙前胡二兩大黃三兩上四味切以水一斗煮取三升半下大黃煎取三升分澄令冷初服七合中服八合比欲發服九合王文州大子因瘧危困服此皆愈忌海藻菘菜生蔥生菜等又療瘧醇醨湯方生薑三兩烏梅三七枚擘一方十四枚甘草三兩炙桂心二兩常山三兩蘘荷根三兩上六味切以水六升煮取一升曰醇未發時須頓服更以水三升煮取一升曰醨至發不斷復頓服甚良別方説發日平旦服醨一升以醇著頭邊若欲發便服醇神良二説不同也忌海藻菘菜生蔥生菜出第二十二卷中千金麻黃湯療瘧須發汗方麻黃四兩去節大黃四兩栝蔞四兩甘草一兩炙上四味切以水七升煮取二升半分三服未發前食頃服臨發更服服後皆覆取汗忌海藻菘菜集驗同出第十卷中千金翼療瘧病醫不能救者方以繩量病人腳圍繞足跟及五指一匝訖截斷繩取所量得繩置項上著反向背上當繩頭處中脊骨上灸三十壯則定候看復惡寒急灸三十壯則定比至過發一炊久候之雖飢勿與食盡日此神驗男左足女右足出第十八卷中崔氏療瘧會稽賴公常山湯方常山三兩石膏八兩碎綿裹甘竹葉一把切糯米一百粒上四味切以水八升明旦欲服今晚漬於銅器中露置星月下高淨處橫刀其上嚮明取藥於病人房門前於銅器里緩火煮取三升分三服日欲出一服臨發又一服若即定不須後服取藥滓石膏裹置心上餘四分置左右手足心甚驗忌生蔥生菜出第四卷中備急華他常山桂心丸神良方甘草炙常山大黃桂心各四分上四味末之蜜和平旦服如兔屎每欲發服六丸飲下之欲服藥時先進少熱粥良忌海藻菘菜生蔥生菜文仲同出第二卷中延年療瘧常山丸方裴右庶送常山四分青木香四分南者蜀漆一分牡蠣二分煅大黃二分烏梅肉一分熬丹砂二分研豉二分熬知母二分鱉甲二分炙麻黃一分去節上十一味搗篩蜜和為丸丸如梧子未發前粥飲服五丸訖微吐後須臾任食至欲發更服十丸忌莧菜生血物生蔥生菜油膩崔氏同又療瘧丸方常山三兩甘草二分炙知母四分上三味搗篩蜜和為丸丸如梧子未發前飲服十五丸臨發服十五丸得快吐則愈忌海藻生蔥生菜菘菜並出第十五卷中必效療瘧雞子常山丸方取雞子一枚斷開頭出黃及白令盡置小鐺子中又取常山細末量滿前空殼又傾鐺子中又量白蜜還令滿殼復傾鐺子中三味同攪微火煎之勿停手微冷可丸則停丸如梧子如病人午時發巳時服三十丸欲至發時又服三十丸用飲汁下欲吐任吐亦如前服訖更不發者不須服服後禁脂膩油麵生菜瓜果七日此方敕賜喬將軍服之立效小品崔氏文仲延年支家備急並同又療瘧不瘥虎骨常山丸方虎頭骨炙常山甘草炙鱉甲炙烏梅熬葳蕤白薇升麻茯苓石膏研知母麥門冬去心豆豉熬地骨白皮上十四味各等分合搗蜜和丸如梧子大未發前日晚空肚服二十丸至發日平旦服四十丸如人行十里食白粥一碗欲發時亦服三十丸三日內慎生冷萬無一觸不吐自瘥魏右史處得云奇效忌海藻菘菜大酢生蔥生菜莧菜又療瘧常山酒方常山一兩切獨頭蒜一顆去根莖橫切糯米一百粒烏豆一百粒清酒一升上五味病未發前一日以酒浸藥於碗中以白紙一張覆之碗上橫一刀欲發時三分飲一分如未吐更服一分得吐則瘥忌生菜生蔥並第一卷中古今録驗療瘧豉心丸方香豉五合熬令色變常山二兩大黃三分附子二分炮上四味搗篩蜜和丸服如大豆十丸當勿食比至發來令服三十丸瘧不止亦可至四十丸瘧必止若膈上有停痰欲吐聽之若腹中實欲下亦無妨常有驗忌生蔥生菜等楊孔思方出第四卷中又烏梅丸療瘧無問溫瘴痰瘧悉皆主之方烏梅肉二兩常山二兩鱉甲二兩炙香豉二兩蜀漆二兩生用人參一兩肉蓯蓉二兩桂心二兩知母二兩桃仁二兩去尖皮別搗如稀餳上十味搗篩為末蜜和丸如桐子空心以酒飲任下三十丸忌生蔥生菜莧菜海藻菘菜一方有升麻甘草各二兩為十二味五臟及胃瘧方六首病源肺病為瘧者乍來乍去令人心寒寒甚則熱發善驚如有所見此肺瘧證也若人本來語聲清雄忽爾不亮拖氣用力方得出言而反於常人呼共語直視不應雖曰未病勢當不久此則肺病聲之候也察病觀疾表裡相應依源審療乃不失也心病為瘧者令人心煩甚欲飲清水多寒少熱若人本來心性和雅而忽卒急反於常倫或言未訖便住以手剔腳爪此人必死禍雖未及呼曰行尸此心病聲之候也虛則補之實則瀉之不可療者明而察之肝病為瘧者令人色蒼蒼然氣息喘悶戰掉狀如死者若人本來少於悲恚忽爾嗔怒出言反常乍寬乍急言未訖以手向眼如有所思若不即病禍必至矣此肝病聲之候也其人若虛則為寒風所傷若實則熱氣所損陽則瀉之陰則補之脾病為瘧者令人寒則腹中痛熱則腸中鳴鳴已則汗出若其人本來少於喜怒而忽反常嗔喜無度多言自笑不答於人此是脾病聲之候也不盈旬日禍必至矣腎病為瘧者令人悽悽然腰脊痛而宛轉大便澀身掉不定素問作目眴眴然手足寒若人本來不喜不怒忽然謇而好嗔怒反於常性此腎已傷雖未發覺是其候也見人未言而前開口笑還閉口不聲舉手爪柵腹此腎病聲之候也虛實表裡浮沉清濁宜以察之逐以療之夫瘧脈者自弦弦數者多熱弦遲者多寒弦小緊者可下之弦遲者溫藥已若脈數而緊者可發汗針灸之脈浮大者不可針灸之凡瘧先發食頃乃可以療之過之則失時足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇虛嬌切瞎瞎然熱止汗出難已刺郤中出血足少陽之瘧令人身體解㑊寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚刺足少陽足陽明之瘧令人先寒灑灑淅淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然刺足陽明胕上足太陰之瘧令人不樂好太息不嗜食多寒熱汗出病至則善嘔嘔已乃衰則取之足少陰之瘧令人悶吐嘔甚多寒熱熱多寒少欲閉戶而處其病難止足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數小便意恐懼氣不足腹中悒悒刺足厥陰肺瘧者令人心寒寒甚發熱熱間善驚如有所見者刺手太陰陽明心瘧者令人煩心甚欲得清水反寒多不甚熱刺手少陰肝瘧者令人色蒼蒼然太息其狀若死者刺足厥陰見血脾瘧者令人病寒則腹中痛熱則腸中鳴鳴已汗出刺足太陰腎瘧者令人灑灑腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰胃瘧者令人且病也善飢而不能食食即支滿腹大刺足陽明太陰橫脈出血並出第十一卷中千金療肝邪熱為瘧顏色蒼蒼戰掉氣喘或熱久勞動如瘧積年不瘥烏梅丸方烏梅肉四分蜀漆四分石膏八分研鱉甲四分炙常山六分香豉一合熬知母四分甘草三分炙細辛三分苦參四分葳蕤五分上十一味搗篩蜜和丸如梧子大酒服十丸日再飲下亦得忌莧菜生菜生蔥海藻菘菜又療心瘧令人煩心甚欲得清水多寒少熱者常山湯方常山四兩淡竹葉切二升梔子仁三七枚擘石膏五兩碎綿裹烏梅三七枚擘鱉甲四兩炙甘草一兩炙香豉一升綿裹蜀漆三兩上九味以水九升煮取三升分溫三服忌生蔥生菜菘菜人莧海藻刪繁同又療脾熱或渴或不渴熱氣內傷不泄轉為脾瘧令人病寒則腹中痛熱則腸中鳴轉汗出常山丸方常山三兩甘草半兩炙知母一兩鱉甲一兩炙上四味搗篩蜜和丸如梧子大未發前酒服十丸臨發又一服正發又一服忌生蔥生菜海藻菘菜人莧等又療肺熱痰聚胸中來去不定轉為瘧其狀令人心寒甚即發熱熱間善驚如有所見常山湯方常山三兩秫米三百粒甘草二分炙上三味切以水七升煮取三升分三服至發時令三服盡忌生蔥生菜海藻菘菜等刪繁同又療腎熱發為瘧令人悽悽然腰脊痛宛轉大便難目眴眴然手足寒常山湯方常山三兩烏梅三七枚碎香豉八合熬裹淡竹葉切一升蔥白一握除青令盡上五味切以水九升煮取三升去滓分溫三服至發令盡忌生蔥生菜等並出第十卷中刪繁療胃腑瘧者令人善飢而不能食四肢脹滿氣喘藜蘆丸方藜蘆一兩皂莢一兩去皮子常山一兩巴豆三十枚去皮熬牛膝一兩上五味熬藜蘆皂莢色令黃合搗為末蜜丸如小豆旦服一丸未發前一丸正發一丸一日勿食飲忌野豬肉蘆筍生蔥生菜貍肉等六腑唯胃有瘧不可別列故附於後千金同出第六卷中溫瘧方五首病源夫溫瘧與寒瘧安舍溫瘧得之冬中於風寒寒氣藏於骨髓之中至春則陽氣大發邪氣不能出因遇大暑腦髓鑠肌肉消釋腠理發泄因有所用力邪氣與汗偕出此邪氣先藏於腎其氣先從內出之於外如是則陰虛而陽盛盛則病矣陽衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧瘧先寒而後熱者此由夏傷於大暑汗大出腠理開發因遇夏氣淒滄之小寒寒迫之藏於腠理皮膚之中秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱病以時作名曰寒瘧先傷於風而後傷於寒故先熱而後寒亦以時作名曰溫瘧夫病瘧六七日但見熱者溫瘧也出第十一卷中甲乙經黃帝曰夫瘧皆生於風夏傷於暑秋為痎瘧黃帝問瘧先寒而後熱何也岐伯對曰夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也名曰寒瘧又問曰先熱而後寒者何也對曰先傷於風而後傷於寒故先熱而後寒也名曰溫瘧其但熱而不寒者陰氣先千金作孤絶陽氣獨發即少氣煩冤手足熱而欲嘔名曰疸瘧又曰溫瘧者得之冬中於風寒寒氣藏於骨髓之中至春即陽氣大發邪氣不能出因遇大暑腦髓鑠肌肉消釋腠理理髮泄因有所用力邪氣與汗偕出此邪氣先藏於腎其氣先從內出之於外如是者陰虛而陽盛盛則病矣陽衰則氣復反入入則陽虛陽虛則復寒矣故先熱而後寒名曰溫瘧又曰疸瘧者肺素有熱氣盛於身厥氣逆上中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰故但熱不寒熱氣內藏於心外舍分肉之間令人銷鑠脫肉故名曰疸瘧出庚卷第七千金同廣濟療溫瘧漸漸羸瘦欲成骨蒸常山湯方常山三兩車前葉一握甘草二兩炙獼猴骨三兩炙烏梅肉二兩天靈蓋一兩燒作灰末驢糞汁三合上七味切以水六升煮五味取三升去滓下糞汁天靈蓋末分三服微吐不利忌生蔥生菜海藻菘菜面黏食等又療溫瘧常山丸方常山烏梅肉熬豉天靈蓋燒各六分知母硃砂蜀漆大黃各四分上八味搗篩蜜和丸如梧子空肚以溫酒下二十丸至三十丸日三服並未發前服不吐利忌生蔥生菜生血等物並出第十卷中千金論曰疸瘧者陰氣孤絶陽氣獨發其候也少氣煩滿手足熱欲嘔熱而不寒氣藏在心又曰有溫瘧者其脈如平人無寒時熱其候骨節疼煩時嘔朝發暮解暮發朝解皆白虎加桂心湯主之方知母六兩甘草二兩炙石膏碎一斤粳米六合上四味切以水一斗二升煮取米爛去滓加桂心三兩煎取三升分溫三服覆令汗先寒發熱汗出者愈忌海藻菘菜生蔥傷寒論云用秕粳米不熟稻米是也出第十卷中備急竹葉常山湯療溫瘧壯熱微寒溫瘧之候也壯熱後如覺微寒或疸瘧依時手足冷少時便壯熱亦有手足煩熱乾嘔者痎瘧先大寒後大熱者並主之神效尤宜乳下小兒亦瘥方常山三兩切淡竹葉一握小麥一升上三味以水五升漬一宿明旦煮取二升溫分三服忌生菜生蔥支小品文仲並同出第三卷中延年療溫瘧壯熱不能食知母鱉甲湯方知母鱉甲炙地骨皮各三兩常山二兩竹葉切一升石膏四兩碎上六味切以水七升煮取二升五合去滓分三服忌蒜豬肉莧菜生蔥生菜出第十七卷中山瘴瘧方一十九首病源此病生於嶺南帶山瘴之氣也其狀發寒熱休作有時皆由挾溪源嶺瘴溫毒氣故也其病重於傷暑之瘧矣出第十一卷中小品療山瘴瘧陵鯉甲湯南方山嶺溪源瘴氣毒作寒熱發作無時痿黃腫滿四肢痹弱皆山毒所為也並主之方陵鯉甲十片炙千金用十四片烏賊魚骨去甲鱉甲炙各一兩常山三兩附子一枚炮上五味切以酒三升漬之一夕先瘧發前稍稍服之勿絶藥味兼以塗身體斷雜人勿食飲過時乃得通人進飲食忌莧菜生蔥生菜豬肉千金文仲備急經心録並同出第六卷中千金療乍寒乍熱乍有乍無山瘴瘧酒方常山三兩鱉甲炙升麻附子烏賊魚骨去甲各二兩上五味並切絹袋盛以酒六升漬之小令近火轉之一宿成一服一合比發可數服或吐忌豬肉生蔥生菜莧菜肘後療老瘧久不斷出第十卷中備急夫瘴與瘧分作兩名其實一致或先寒後熱或先熱後寒嶺南率稱為瘴江北總號為瘧此由方言不同非是別有異病然南方溫毒此病尤甚原其所歸大略有四一山溪毒氣二風溫痰飲三加之鬼癘四發以熱毒在此之中熱毒最重故所用藥物須審病源患瘧瘴之後特須防瘴而發痢死不旋踵所以然者瘴體先虛虛不宜痢又瘴宜冷瘥痢宜溫斷斷痢則益瘴斷瘴則益痢大率如此不可不慎非直藥療亦須宜加將息取適若能用一色藥兼二種病冷而止痢溫而斷瘧最其妙也如不然先須斷痢然後療瘴瘴緩痢急故也仍率須作挾毒防之不得專醫其痢又服瘴藥皆在發前必須平旦空腹服服藥之後勿洗手面漱口勿通外人勿吃食勿勞力既過發時久小進糜粥如此將療無不即斷又當發熱之時慎勿多飲冷水及多服冷藥若心下冷結更是難療得瘧之後覆成症癖亦有即發氣者死不救若熱渴者豉汁暖服取足得吐彌善水煮豉研犀汁與服兼時進生葛根汁其大熱盛者與紫雪如兩棗許大水和飲之並燒豬糞人糞作黃龍湯亦善各可服三二升又搗一大鼠絞汁與服大止熱毒瘴熱病服此俱效其鼠並頭皮五臟等全搗若汁少著少許水和絞亦不難服常用立驗也又療瘴瘧服藥後灸法灸大椎三四十壯無不斷若先寒者將欲寒預前以炭火安床下令背暖並炙鱉甲末一方寸匕暖酒和服至發時令得三服被覆過時無不斷此是陶氏法比欲寒時但以火炙其背亦乃即瘥者縱發亦輕效驗又療瘴瘧常山丸方常山黃連豉各三兩附子二兩炮上四味搗篩為末蜜和丸如梧子發前空腹服四丸欲發更服三丸飲下之自旦至暮乃食三日勿雜食豬肉魚肥膩及生冷生蔥生菜桂廣州家傳已用有效此方兼痢者瘥又麻黃散方麻黃去節常山杏仁去尖皮熬人參乾漆熬甘草炙鱉甲各二兩炙上七味作散平旦空腹溫酒三合服方寸匕日再宜七日連服服後七日不得食雜物此許仁則五方元比部云在嶺南服得力大驗年時常服一劑按此兼補虛羸者忌莧菜生蔥生菜海藻菘菜又若患瘴熱實兼吐痢者大黃湯方大黃常山升麻甘草炙各三兩上四味切以水七升煮取二升半分三服發前盡服別取吐利此蔣家傳忌海藻菘菜生蔥生菜又若瘴熱兼痢苦渴者烏梅飲方烏梅二十枚取好者擘破上一味以水一大升煮取一大盞去梅和一匙蜜細細啜之近方驗並出第二卷中延年蜀漆丸主嶺南瘴氣發乍熱乍寒積勞似瘧皆主之千金翼方云兼主痎瘧連年不瘥方蜀漆知母升麻白薇地骨皮麥門冬各五分烏梅肉鱉甲炙葳蕤各四分石膏八分甘草三分炙常山六分豆豉一合熬上十三味搗篩為末蜜和丸如梧子大飲下十丸日再服加至二十丸此方用無不瘥加光明砂一兩神良忌海藻菘菜人莧生蔥生菜千金亦療勞瘧崔氏千金翼集驗並同出第十七卷中救急療瘧瘴癘經百日或一年以上諸藥不能瘥進此方無不損者蜀漆湯方白薇蜀漆知母甘草炙苦參升麻龍膽各二兩常山大黃別漬後下各四兩鱉甲炙石膏碎茯苓黃芩各三兩香豉二合裹獨蒜七顆切淡竹葉切一升上十六味切以水一斗漬之並春酒二升合煮取三升去滓分三服未發前一服欲至發時又一服皆溫之當發日勿見人在一靜房臥藥滓置病兒頭邊仍以藥汁塗手面過時任出忌肥膩腥臊滑物生冷海藻人莧大酢菘菜生蔥生菜又硃砂丸方硃砂光明者牛膝常山各等分上三味搗篩為末蜜和丸如梧桐子候瘧發日平明服七丸飲下欲覺發時更服七丸當日不斷更作一服即瘥忌生蔥生菜生血物油膩牛肉等又敕賜長孫祥極效常山湯方常山八分橘皮六分牡蠣四分熬桂心二分上四味搗篩為散發日平旦酒服一方寸匕臨發又一匕發後又一匕二日不得洗手面七日忌食雜物唯藥用酒余皆斷或吐或不吐皆瘥忌生蔥生菜又方取五六歲兒小便一升納白蜜二大匙攪使相得去白沫訖即頓服當大吐碧緑痰然後食若不得吐但數小便亦佳以前兩方吐碧痰外更吐白沫出後可吃食不然瘴氣終不除又常山湯方常山苗一握無苗取根五兩代之獨蒜七顆淡竹葉二握豉一合裹鱉甲三兩炙上五味切以苦酒三升煎取一升臨發隨性多少服之盡服之訖當大吐便愈忌人莧生蔥生菜古今録驗瘴瘧及嶂氣常山湯方常山三兩細切上一味搗碎虛弱者二兩蒜七瓣去皮中切以酒一小升半漬一宿旦去滓暖服盡須臾當吐令盡好過時食一日不得漱口及洗手面三七日慎生蔥生菜生冷肉面油膩若早發者半夜服要令吐出第四卷中近效療瘧瘴孟補闕嶺南將來極效常山丸方常山豉熬桃仁去尖皮熬等分上三味各搗末先以豉和桃仁搗如泥然後下常山末細攪蜜丸如梧桐子候欲發前一食時酒下四十丸須臾更服二十丸如不瘥更服遠不過三服能信用者無不瘥忌生蔥生菜又凡跋涉江山防諸瘴癘及蟲毒等常服木香犀角丸方青木香犀角屑羚羊角屑各六分升麻玄參豬苓檳榔各十分鱉甲炙甘草炙各八分豉二十分熬上十味搗篩為末蜜和丸如梧子酒飲服三十丸日二服若體熱即去甘草檳榔加大黃二十分忌海藻菘菜又主瘧兼痢無問赤白水穀鮮血瘴皆瘥黃連犀角丸方黃連犀角屑香豉熬各二兩龍骨四兩牡蠣二分熬上五味搗篩為末蜜和丸如梧子米飲下三十丸日三服瘥止忌豬肉冷水油膩等又瘴瘧不瘥蜀漆丸方蜀漆青木香升麻鱉甲炙牡蠣熬硃砂豬苓香豉各四分常山大黃各八分上十味搗篩為末蜜和為丸如梧子米湯下十二丸日二服漸漸瘥至平復止忌人莧油膩陳臭生血等物十二時瘧方一十二首千金翼黃帝問岐伯曰瘧多方少愈者何岐伯答曰瘧有十二種帝曰瘧鬼字何可得聞乎岐伯曰但得瘧鬼字便愈不得其字百方不愈黃帝曰瘧鬼者十二時願聞之岐伯曰寅時發者獄死鬼所為療之上以瘧人著窯上灰火一周莫令火滅即瘥卯時發者鞭死鬼所為療之右用五色衣燒作灰三指撮著酒中無酒用清水服之辰時發者墮木死鬼所為療之上令瘧人上木高危處以棘子塞木根間立瘥巳時發者燒死鬼所為療之上令瘧人坐師以周匝然火瘥午時發者餓死鬼所為療之上令瘧人持脂火于田中無人處燒脂香假拾薪去即瘥未時發者溺死鬼所為療之上令瘧人臨發時三渡東流水即瘥申時發者自刺死鬼所為療之上令瘧人欲發時以刀刺冢上使得姓名字咒曰若瘥我與汝拔卻即瘥酉時發者奴婢死鬼所為療之上令瘧人碓梢上捧上臥莫令人道姓字即瘥戍時發者自絞死鬼所為療之上令索繩系其手腳腰頭即瘥亥時發者盜死鬼所為療之上以刀子一口箭一枝灰一周刀安瘧人腹上其箭橫著底下瘥子時發者寡婦死鬼所為療之上令瘧人脫衣東廂床上臥左手持刀右手持杖打令聲不絶瓦盤盛水著路邊即瘥丑時發者斬死鬼所為療之上令瘧人當戶前臥頭東向血流頭下即瘥並出第十八卷中發作無時瘧方二首病源夫衛氣者陽氣也一日一夜大會於風府則腠理開腠理開則邪氣入邪氣入則病作當其時陰陽相併隨其所勝則生寒熱故動作皆有早晏若腑臟受邪內外失守邪氣妄行所以休作無時也出第十一卷中肘後療瘧發作無常心下煩熱者常山湯方常山二兩甘草一兩半炙豉五合綿裹上三味切以水六升煎去滓取二升再服當快吐仍節飲食忌海藻菘菜生蔥生菜文仲同又雞子常山丸療諸瘧並經服諸藥法術不斷發無復定時不可復斷者宜服此丸忌食物勿勞力即斷方常山三兩上一味搗篩為散以雞子白和並手為丸如梧桐子大令圓調丸訖分置銅鏂子中以湯煮銅鏂令熱殺得雞子腥氣即止以竹葉清飲服三十丸欲吐但吐比至發時令得三服時早可食者斷若晚不可斷食者當作竹葉汁糜食之忌生蔥生菜經心録同並出第一卷中痎瘧方五首病源夫痎瘧者夏傷於暑也其病秋則寒甚冬則寒輕春則惡風夏則多汗然其畜作有時以瘧之始發先起於毫毛伸欠乃作寒栗豉頷腰脊俱痛寒去則外內皆熱頭痛而渴唯欲冷飲何氣使然此陰陽上下交爭虛實更作陰陽相移也陽並於陰則陰實而陽明虛陽明虛則寒栗豉頷太陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱外內皆熱則喘而渴故欲冷飲也此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此營氣之所舍也此令人汗出空疏腠理開因得秋氣汗出遇風乃得之及得以浴水氣舍於皮膚之內與衛氣並居衛氣者晝日行陽夜行於陰此氣得陽而外出得陰而內搏內外相搏是以日作其間日作者調其氣之舍深內搏於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作出第十一卷中小品常山湯療痎瘧先寒戰動地寒解壯熱日日發及間日發並斷方鱉甲一兩炙淡竹葉切三升洗常山二兩甘草炙三兩久酒三升上五味切以酒漬藥刀置上覆頭安露地明旦以水七升煮取三升分五服比未發前令盡當吐吐極傷多不必盡劑但斷人禁飲食得吐過時乃佳忌人莧海藻菘菜生蔥生菜出第六卷中集驗夫瘧必從四肢始療方先其時一食頃用細左索繩緊束其手足十指過發時乃解之千金同又方先作羊肉臛餅飽食之其進少酒隨所能令其欣欣有酒氣入一密室里燃炭火厚覆取大汗則瘥燕國公説此方常見用有驗並出第二卷中方土弱曰虛者得效實者彌甚又療溫瘧勞瘧烏梅飲子方烏梅七顆桃柳心各七莖蔥白七莖豆豉一合甘草四分柴胡四分知母四分大黃三分上八味各細銼以童子小便兩茶碗宿浸明旦早煎三兩沸去滓頓服瘥未瘥更作服三服未瘥忌海藻菘菜又療溫瘧痰瘧久不瘥黃連散方宣州黃連二兩上一味搗篩末以濃酒一盞調三錢空心頓服相次更服三錢更飲三兩盞酒任意醉卻睡候過時方得食如渴枳實煎湯並三日服瘥忌豬肉冷水間日瘧方二首病源此由邪氣與衛氣俱行於六腑而有時相失不相得故邪氣內搏五臟則道遠氣深故其行遲不能與衛氣偕出是以間日而作也出第十一卷中備急療間日瘧方燒黑牛尾作灰酒服方寸匕日三服出第十卷中又桂廣州法醇醨湯方大黃三分甘草一分半炙常山一分半上三味以水三升煮取一升去滓更以水二升煮滓取一升未發服醨醨是後煮者相次服醇醇是前煮者瘥忌菘菜海藻生蔥生菜等支云極驗文仲經心録方無甘草用石膏三銖余同一方有桂心一分半出第二卷中久瘧方八首病源夫瘧皆由傷暑及傷風所為熱盛之時發汗吐下過度腑臟空虛營衛傷損邪氣伏藏所以引日不瘥仍故休作也瘧歲歲發至三歲發連日發不解脅下有痞療之不得攻其痞但得虛其津液先其時發其汗服湯已先寒引衣自覆汗出小便自利則愈也出第十一卷中深師療久瘧難斷香豉丸方香豉一分熬常山七分蜀漆十分附子一分炮大黃二分好者上五味搗下篩蜜和發日早服五丸如梧子須臾又服五丸發晚者至發可三四服令其得吐為佳欲不即斷畏吐者但則長將久服無不瘥也忌生蔥生菜豬肉又療三十年瘧常山湯方常山三兩黃連三兩上二味切以酒一斗宿漬之向晚以瓦釜煮取六升一服八合比發時令得三服有熱當吐有冷當下服之者千百無一不斷亦可半合無服全劑者忌豬肉冷水生蔥生菜並出第二十二卷中千金梔子湯主瘧經數年不瘥者兩劑瘥一月以來一劑瘥方梔子十四枚常山三兩車前葉二十枚炙乾秫米十四粒上四味切以水九升煮取三升分三服未發一服發時一服發後一服以吐利四五行為瘥不止冷飲止之忌生蔥生菜出第十卷中崔氏療瘧縱久患者不過五六服以來亦瘥常山散方常山三兩乾漆三兩熬煙盡牡蠣一兩半熬桂心三兩橘皮二兩杏仁二兩去皮尖熬上六味搗篩為散一服方寸匕先發熱飲和服若先寒清酒和服之時取未發前一食頃服服藥日唯須晚食七日內慎如藥法忌生蔥生菜出第四卷中備急龍骨丸療久瘧不斷者方龍骨一兩常山三兩大黃二兩附子二分炮上四味搗末以雞子黃丸如梧子大先發臨發各飲服五丸無不斷長將服之支云神驗療三十年瘧忌生蔥生菜豬肉等張文仲支方同出第二卷中備急療瘧連綿積日不瘥常山散方常山三兩羚羊角三兩炙令焦烏梅肉三兩黃芩二兩甘草一兩半炙上五味搗為散以竹葉煮飲取六七合飲及熱用調常山散三方寸匕未發前一服若瘥停不瘥臨欲發又進二寸匕老小以意量之忌海藻菘菜生蔥生菜又療瘧無問年月遠近並瘥烏梅丸方烏梅肉三兩熬蓯蓉三兩桃仁三兩熬去皮常山三兩熬升麻二兩炙桂心二兩甘草二兩炙上七味搗篩蜜和丸如梧子大未發時酒服二十丸欲至發時更服二十丸百無所忌唯觸之則難瘥飲服亦得此藥或吐利或不吐利勿怪五六日頻進佳忌海藻菘菜生蔥生菜一方有豉三兩熬文仲備急同並出第一卷中近效療久難瘥瘧常山酒方常山三兩鱉甲二兩炙鯪鯉甲一兩炙烏賊魚骨一兩炙烏梅肉七枚桃仁四十九枚去皮尖別搗如泥竹葉切一升豉三合熬令香蔥白切一升上九味細切合以酒三升漬經再宿空腹早朝溫服一合良久取吐如不吐至齊午以來服之四服如不瘥隔日更依前服必瘥瘥後十日內不得吃冷水黏滑人莧生菜余如常梁皓處勞瘧方三首病源凡瘧積久不瘥者則表裡俱虛客邪未散真氣不復故疾雖暫間小勞便發也出第十一卷中肘後療勞瘧鱉甲酒方鱉甲二兩炙黃常山三兩蜀漆二兩烏賊魚骨一兩炙附子一兩知母二兩椒一兩汗上七味切以酒三斗漬一宿平旦服一合稍稍加至二合日三四服忌莧菜生蔥生菜豬肉並出第一卷中千金勞瘧積久不斷衆療無效此方療之長生大牛膝一虎口切以水六升煮取二升分再服第一服取未發前一食頃服第二服臨發服張文仲肘後同出第十卷中集驗療一切瘧勞瘧無問年月深遠阿魏散及丸方阿魏安息香蘿蔔子各二兩蕪荑一合上四味搗篩為散以暖水服半錢如不能散服蜜丸熟水下三十丸須臾吐忌冷水如吐不止吃蒩齏餺飥仍以貼子盛散一錢男左女右係臂上立瘥出第三卷中牝瘧方二首仲景傷寒論牝瘧多寒者名牝瘧牡蠣湯主之方牡蠣四兩熬麻黃四兩去節甘草三兩炙蜀漆三兩若無用常山代之上四味切以水先洗蜀漆三遍去腥以水八升煮蜀漆及麻黃去沫取六升納二味更煎服二升去滓溫服一升即吐勿更服則愈忌海藻菘菜又療牝瘧蜀漆散方蜀漆洗去腥雲母龍骨上三味等分搗篩為散先未發前一炊以清酢漿水和半錢服臨發時更服一錢溫瘧者加蜀漆半分雲母炭火燒之三日三夜用雲母一作雲實並出第十五卷中一切瘧方四首崔氏療一切瘧大黃丸方大黃三兩朴硝二兩巴豆一兩去皮熬令黑研如泥上三味搗篩大黃朴硝然後納巴豆以蜜和搗二千杵丸如梧桐子大米飲下兩丸日二服不斷再服即瘥忌蘆筍野豬肉等物救急療一切瘧常山湯方常山三兩石膏八兩打破綿裹白秫米一百二十粒淡竹葉一握上四味以水八升漬一宿煮取二升五合去滓分溫三服清旦一服欲發一服正發時一服三服訖靜室中臥莫共人語過時後洗手面與食七日禁勞生蔥生菜酒及熱面毒魚久瘧不過再劑一方加烏梅二七枚熬之集驗療瘧間日或夜發出姚大夫出第一卷中古今録驗療一切瘧大有驗硃砂丸方硃砂一兩蜀常山三兩上二味各搗下篩畢別取硃砂瓷器中細研可一日研如面白蜜和童兒搗一萬七千杵訖作丸如梧子大一服三丸用清酒下行五十餘步隨意坐臥無酒湯下亦得唯須暖將息病人氣力強仍不發行動者則須於當發日服之如似日西發者臨發之日勿食平旦服三丸巳時服三丸午後更服三丸則瘥若不瘥必定輕微更服則瘥余時發者準此日西一時任意消息其病人氣力微弱者不得臨發日服應預前一日服之如似明日發者今日平旦空腹服三丸至齋時食一碗粥至日西更服三丸至日暮復食一碗淡粥並不得飽食至一更盡更服三丸至平明食粥一碗至齋前更進三丸不得食至午時更進三丸必瘥瘥後三日以來唯得食甜粥飲漿忌生冷酢滑膩面及飽食七日以來特忌生血物生蔥生菜若後七日余者漸食生冷二種須復日禁若如百日來患瘥後還須百日禁忌生冷乃至七日患者瘥還復禁七日生冷患來雖經多年但得百日以來禁生冷過百日後得食無妨若不禁者必還重發患來日久極重者不過十服瘥近者三五服則瘥病人十五以上者一服三丸十五以下七歲以上者一服兩丸七歲以下者一服一丸如小者分此一丸丸作二小丸服之出第四卷中近效加減療一切瘧無不效比用不過再服入口如神萬不一失桃仁常山丸方桃仁二兩不熬亦不去雙仁尖皮常山二兩豆豉三兩上三味各別搗五六百杵又和更搗六七百杵然後點好酒如黑泥自成丸不飲酒事須酒下三十丸如梧子未發前服臨發更服三十丸以手捧之於鼻下嗅取氣便定如不得平復更服三十丸或吐或微利勿怪亦有不吐利瘥者吐了仍不得漱口亦不得吃生蔥生菜果子甜物油膩等卻發則難瘥此來者不過再三服便瘥一服瘥者多其常山須蜀者始堪使用桃仁須是毛桃仁余者即無效豉須新美不用陳者渴者取烏梅三枚作漿稍稍咽三五咽其藥唯一人患則少合不堪預合無力不效今方有常山一兩桃仁五七枚豉一合恬多者佳搗常山作散訖次研桃仁作泥別搗豉點酒搗三五百杵次一處和搗又六百杵以來如法服之醫人夏侯拯録之灸瘧法一十三首千金療瘧灸法灸上星及大椎大椎穴在背後第一椎上節陷中是也至發時令滿一百壯艾炷如黍粒俗人不解取穴務大炷又法覺小異則灸百會七壯若後更發又灸七壯極難愈者不過三灸又法以足踏地以綖圍足一匝中折後大椎向百會灸綖頭三七壯炷如小豆許大又法灸風池二穴各三壯又法從手發者灸三間穴在虎口第二指節根下一寸三年痎瘧欲發慘慘則下火又法從頭項發者未發前預灸項大椎尖頭漸灸過時止又法從腰發者灸腎俞百壯穴在第十四椎下兩旁各一寸半是又療一切瘧無問遠近法正仰臥以綖量兩乳間中屈從乳向下灸度頭隨年壯男左女右灸又療五臟瘧及一切諸瘧法灸尺澤七壯穴在肘中約紋動脈是也又療痎瘧法上星主之穴在鼻中央直入髮際一寸陷容豆是也灸七壯又療瘧日西而發者法臨泣主之穴在目眥上入髮際五分陷者中是也灸七壯又療瘧多汗腰痛不能俯仰目如脫項如拔者法崑崙主之穴在足外踝後跟骨上陷中是也灸三壯又療瘧實則腰背痛虛則鼻衄法飛揚主之穴在外踝上七寸灸七壯並出第十卷中禳瘧法六首千金療瘧法未發前抱大雄雞一隻著懷中時時驚動令雞懷中作大聲無不瘥肘後同出第十卷中崔氏書瘧法平旦日未出時閉氣書之先書額上則戴九天次書兩手心作把九江又書背上從右脾骨下向左分作兩行書之一如後法南山有一木木下不流水水中有一魚三頭九尾不食五穀唯啖瘧鬼急急如律令又書兩腳心下作履九江上以前法既不損人又無不瘥者其有一度書不甚差可更書之書符必不得脫錯亦不可重點書不成也又勿食五辛書瘧法路州滿上人傳云妙不可道以下二法余用俱效又法令所患人未發前正南北眠頭向南五心並額及舌上七處閉氣書鬼字則瘥隨意任東西肘後同又法總書八行其下七行一準前行通而為八山題子山題子山題子山題子準前計更有七行通前為八行此符厭瘧鬼一去千里外急急如律令某年某月某州某縣某鄉某里姓名牒姓名則所患人也上以手把符勿開男左女右待過時久然後任開其符仍以火燒卻咒瘧法候病者發日日未出時自執一石於水濱一氣咒云𡖅月𡖅月團團行路非難捉取瘧鬼送與河官急急如律令即投石沉於水中勿反顧而去並出第四卷中元希聲侍郎集驗書瘧法額上書兩金字重胸前書兩火字並背上書兩水字並兩手書木字單兩足下各書土字齊下作四口字重右含水閉氣用朱書未發前書之有驗許仁則療瘧方四首許仁則此病之候乃有數種亦有宿患痃癖飲食失宜因節氣初交亦生此病亦有痰澼積聚久不通散冷熱相攻亦生此疾亦有地居卑濕時屬暑熱內有宿病外感惡氣亦生此疾亦有盛夏蒸熱飲冷冷熱間隔秋夏氣交亦生此疾以要言之終由飲食失常寒暑乖宜上熱下系將療之方吐下為本人有強羸病有輕重自須臨時斟酌不可一概言之此病別有祈禱厭禳而瘥者自是人心妄識畏愛生病亦猶弓影成蠱耳必有不誣此法專意信之亦任其從禳禱之道雖然必須資藥以救之比見用藥攻療無不瘥者以法禳之則有不效者以此言之明知病在於內徒勞無外耳此病之始與天行不多別亦頭痛骨肉酸楚手足逆冷口鼻喉舌乾好飲水毛聳腰脊強欲反拗小便赤但先寒後熱發作有時可不審察其發作日有準凡經七日以後先服鱉甲等五味散取快吐方鱉甲三兩生用常山二兩甘草二兩炙松蘿二兩桂心一兩右藥搗篩為散煮烏梅湯下初服一方寸匕日二服稍稍加之以得吐為限忌人莧生蔥生菜海藻菘菜又審其候若體力全強日再服每服皆取吐自覺氣力不甚強則每一服取吐晚不須服如全綿惙事須取吐則三兩日一服經五六度吐訖但適寒溫將息並食飲使體氣漸強若知病雖輕吐根本未似得除事須利之以泄病勢宜合當歸等六味散服之取利方當歸五兩白朮五兩細辛四兩桂心三兩大黃五兩朴硝四兩右藥搗篩為散平旦空肚以酒飲下初服一方寸匕日再服稍稍加之得利為度候氣力強羸取利多少一一如前取吐法忌桃李雀肉生蔥生菜又依前鱉甲等五味散取吐當歸等六味散利後雖經吐下其源尚在如更吐利又慮尩羸宜合鬼箭羽等十味丸服之方細辛四兩橘皮四兩鬼箭羽折看之如金色者二兩白朮五兩桂心四兩地骨皮四兩蜀漆二兩甘草三兩炙當歸五兩丁香三兩右藥搗篩蜜和丸如梧子煮烏梅飲下之初服十五丸日再稍稍加至三十丸服經三五日後若覺熱甚每服藥後良久任吃三兩口粥飲壓之忌海藻菘菜桃李雀肉生蔥又療此病魯用釋深師一方大有效其方有巴豆皂莢藜蘆三味作丸服雖經困苦一服永斷吳升同並出第一卷中
