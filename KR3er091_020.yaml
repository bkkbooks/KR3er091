body:
  text: 卷第二十水腫方一十三首病源腎者主水脾胃俱主土土性剋水脾與胃合相為表裡胃為水穀之海今胃虛不能傳化水氣使水氣滲溢經絡浸漬腑臟脾得水濕之氣加之則病脾病則不能制水故水氣獨歸於腎三焦不瀉經脈閉塞故水氣溢於皮膚而令腫也其狀目里上微腫如臥起之狀頸脈動時咳股間冷以手按腫處隨手而起如物里水之狀口苦舌乾不得正偃偃則咳清水不得臥臥則驚驚則咳甚小便黃澀是也水病有五不可療第一唇黑傷肝第二缺盆平傷心第三臍凸傷脾第四足下平滿傷腎第五背平傷肺凡此五傷必不可療脈沉者水也脈洪大者可療微細者不療也養生方云十一月勿食經夏自死肉脯內動於腎喜成水病其湯熨針石別有正方補養宣導今附於後養生方導引法云蝦蟆行氣正坐動搖兩臂不息十二通以治五勞水腫之病也又云人臥勿以腳懸蹋高處不久必成腎水出第二十一卷中黃帝問曰水與膚脹鼓脹腸單石瘕何以別之岐伯對曰水始起也目里上微腫如新臥起之狀頸脈動時咳陰股間寒足脛腫腹乃大其水已成也以手按其腹隨手而起如里水之狀此其候也膚脹者寒氣客於皮膚之間殼殼然不堅腹大身盡腫皮厚按其腹陷而不起腹色不變此其候也鼓脹者腹脹身腫大與膚脹等色倉黃腹脈起此其候也腸覃者寒氣客於腸外與衛氣相薄正氣不得營因有所繫癖而內著惡氣乃起息肉乃生其始生也大如雞卵稍以益大至其成也若懷子之狀久者離歲月按之則堅推之則移月事不以時下此其候也石瘕者生於胞中寒氣客於子門子門閉塞氣不得通惡血當寫不寫衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下曰膚脹鼓脹可刺耶對曰先寫其腹之血絡後調其經亦刺去其血脈師曰病有風水有皮水有正水有石水有黃汗風水其脈自浮外證骨節疼痛其人惡風皮水其脈亦浮外證胕腫按之沒指不惡風其腹如鼓不滿不渴當發其汗正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身體發熱胸滿四肢頭面腫久未愈必致癇膿千金範汪同並出甲乙經第八辛卷範汪療水腫方葶藶子一兩熬黑甘遂一兩熬吳茱萸四兩上三味別搗異下篩和以蜜丸如梧子服可至五丸經心錄云服三丸日三服余同又葶藶丸療水腫方葶藶一升熬吳茱萸一升上二味各別搗篩合以蜜和更搗二萬杵藥成飲服二丸如梧實不知增之當以小便利及下為候若下者但可清旦一服若不下但小便利者日可再三服常將服腫消耳一名二利丸又利小便消水腫郁李核丸方郁李核仁三分松蘿三分海藻二分桂心大黃五分葶藶五分熬黃連二分通草一分石葦一分去毛上九味搗合下篩和以蜜九如梧子先食飲服七丸日二稍增以知為度並出第二十八卷中又療水腫大檳榔丸方檳榔三兩桂心三兩附子二兩炮栝蔞三兩杏仁三兩熬一方無乾薑二兩甘草二兩炙麻黃三兩去節黃耆三兩茯苓三兩厚朴二兩炙葶藶三兩熬椒目三兩吳茱萸王合白朮三兩防已二兩上十六味下篩蜜和服如梧子大二丸日三不知稍增至四丸不知又加二丸不下還服四丸得小下為驗此療老小水腫虛腫大病後客腫作喘病療之佳忌海藻菘菜豬肉冷水生蔥桃李雀肉大酢千金翼有海藻二兩出第四十五卷中小品療水腫方大豆三升上一味以水六升煮令熟出豆澄汁更納美酒五升微火煎如餳服一升漸增之令小下又桃皮酒療水腫方桃皮三斤削去黑取黃皮女曲一升秫米一升上三味以水三斗煮桃皮令得一斗以五升汁漬女曲五升汁饙飯釀如酒法熟漉去滓可服一合日三耐酒者增之以體中有熱為候小便多者即是病去便愈忌生冷酒面一切毒物又麝香散療水腫方千金云治婦人短氣虛羸遍身浮腫皮虛急麝香三銖芫花三分熬甘遂三分上三味合下篩酒服錢半邊匕老小錢邊三分匕亦可丸服之強人如小豆十丸老人五丸千金有雄黃一味並麝香各用六銖肘後又有人參二分又療水腫商陸膏方商陸根一斤生者豬膏一斤先煎可有二升上二味合煎令黃去滓以摩腫亦可服少許忌大肉經心錄同千金云塗以紙覆之燥即塗不過三日愈並出第一卷中集驗療水腫方黃犍牛尿一飲三升若不覺更加服之以得下為度療老小者寧從少起飲半亦可用後方又療水腫方豬腎一枚分為七臠甘遂一分末篩為散以粉腎微火炙令熟食之至三四臠乃可止當覺腹中鳴轉攻而脅下小便利去水即愈若三四臠不覺可食七臠令盡肘後經心錄文仲同並出第六卷中千金翼療水腫方葶藶子六兩生用桂心二兩上二味搗蜜和丸飲服十丸如梧子日二慎蒜面豬雞油膩出第二十卷中必效療水腫方皂莢一挺去皮子炙烏餳五兩一味以酒二升煮取六沸絞去滓頓服之須臾即小便一三升腫消忌一切肉及面生冷咸酢食一周年又方取苦瓠一枚上一味以水一石煮一炊久去滓煎汁令堪丸如胡豆一服二丸當小便下後作小豆羹飯慎勿飲水效並出第二卷中水病方七首千金論曰大凡水病難療瘥後特須慎於口味又病水人多嗜食不廉所以此病難愈世有醫者隨逐時情意在財物不本性命病人慾食肉於貴勝之處勸令食羊頭蹄肉如此者未見一愈者耳又此病百脈之中氣水俱實療之皆令瀉之使虛羊頭蹄極補那得瘳愈所以治水藥多用葶藶等諸藥本草云葶藶久服令人虛故水病非久虛不得絕其根本又有蠱脹但腹滿不腫水脹脹而四肢面目俱腫醫者不善診候療蠱以水藥療水以蠱藥或但見脹滿皆以水藥如此者仲景所云醫殺之今錄慎忌如左其療蠱方具在備急中喪孝產乳音樂房室誼戲一切魚一切肉生冷酢滑蒜黏米豆油膩並不得食之亦不得用心上以前禁者並具本方之下其房室等猶三年慎之不復重發不爾差而更發重發不可更療古方有十水丸歷驗多利大便不利小便所以不能述錄也諸從腰以下腫當利小便腰以上腫當發汗即愈出第二十一卷中範汪療水病方黃連末上一味以蜜和搗萬杵丸如梧子飲服二丸可至三四丸禁飲水並冷物又方以苦酒一升飲之一方取鹽豉各一撮以飲飲之一方取角木葉滿虎口搗取汁飲之並出第二十八卷中崔氏療水病方烏豆一大升粒小者桑根白皮五升細切上二味以水五斗和煮可一斗汁濾去滓於銅器中重湯煎如餳可作丸即成所患人每服取利小便為度其小便復舊色身上腫除候體中熱煩即服之禁房及死牛馬肉油膩面酒等經數日得食羊頭肉兔肉水病忌食羊頭蹄此云得食恐誤也又療水病洪腫氣脹不消食方干香薷五十斤上一味細銼納釜中以水淹之出香薷上數寸煮使氣兩盡去滓清澄之漸火煎令可丸服五丸如梧子日三稍加之以小便利為度也無所忌經心錄同又療水病身腫方鯉魚一頭極大者去頭尾及骨唯取肉上一味以水二斗赤小豆一升和魚肉煮可取二升以上汁生布絞去滓頓服盡如不能盡分為二服後服溫令暖服訖下利利盡即瘥慎牛肉白酒生冷麵豬魚油酪藥滓埋之勿令人食並出第六卷中古今錄驗療水病方木防己八分蜀大黃八分錦文者別搗人參八分杏仁八分熬紫色別搗葶藶子十分熬上五味總和搗篩蜜和為丸先食後初服七丸如梧子日再日加一丸至十二丸還日減一丸至七丸復漸加至十二丸循環服之以白飲服若病人熱多加黃芩茯苓各八分如病人冷多加厚朴八分如病久心驚加吊藤八分忌酒面羊肉其牛肉一色永斷不得食外禁酢物得食鵝鴨獐兔鯉魚鱧魚等肉又療水病牛黃桂枝丸方牛黃六銖研桂枝十二銖又一方云桂六銖牡蠣十二銖熬研椒目十二銖一方雲海藻二十四銖不須椒目葶藶子半升熬一方云用一升上五味搗篩蜜和丸如梧子飲服七丸日再小便利為度忌生蔥並出第十一卷中十水方三首病源十水者青水赤水黃水白水黑水懸水風水石水里水氣水也青水者先從面目腫遍一身其根在肝赤水者先從心腫其根在心黃水者先從腹腫其根在脾白水者先從腳腫上氣而咳其根在肺黑水者先從腳足趺踵其根在腎懸水者先從面腫至足其根在膽風水者先從四肢起腹滿大目盡腫其根在胃石水者先從四肢小腹腫獨大其根在膀胱里水者先從腹滿其根在小腸氣水者乍盛乍虛乍來乍去其根在大腸皆由榮衛痞澀三焦不調腑臟虛弱所生雖名證不同並令身體虛腫喘息上氣小便黃澀也出第二十一卷中古今錄驗十水丸療十種水腫方腫從頭諸書云腳起名為白水其根在肺椒目主之腫從面起名為青水其根在肝大戟主之腫從胸起名為黃水其根在脾甘遂主之腫從腹起名為氣水乍實乍虛其根在大腸芫花主之腫從股起名為黑水其根在腎玄參主之腫從頭面起至足名為懸水其根在膽赤小豆主之腫從內起堅塊四肢腫名為石水其根在膀胱桑根白皮主之腫從四肢起腹大名為風水其根在胃澤漆主之腫從腹起名為里水其根在小腸巴豆主之腫從胸中氣起名為赤水其根在心葶藶子主之上十味分等隨其病始所在增其所主藥皆一分巴豆四分去心皮搗末合下篩蜜和丸服如梧子三丸得下為度不下日三亦可散未食服半錢匕便利明朝復服如法再服病愈禁飲但得食乾物耳又方第一之水先從面目腫遍一身名曰青水其根在肝大戟主之第二之水先從心腫名曰赤水其根在心葶藶主之第三之水先從腹腫名曰黃水其根在脾甘遂主之第四之水先從腳腫上氣而咳名曰白水其根在肺氣藁本主之第五之水先從足趺腫名曰黑水其根在腎連翹主之第六之水先從面腫至足名曰玄水其根在膽芫花主之第七之水先從四肢起腹滿大身盡腫名曰風水其根在胃澤漆主之第八之水四肢小其腹腫獨大名曰石水其根在膀胱桑根白皮主之第九之水先從小腹滿名曰里水其根在小腸巴豆主之第十之水乍盛乍虛乍來乍去名曰氣水其根在大腸赤小豆主之上十病藥皆分等所病形同則倍之搗合白蜜丸如小豆先食飲服一丸日三欲下病服三丸人弱者以意節之療宿食飲寒熱溫病禁辛菜豬肉生魚不禁熟也範汪千金翼同又療十水大黃丸方大黃一分硝石一分大戟一分熬甘遂一分熬芫花一分熬椒目一分葶藶一分上七味搗合下篩以蜜和丸如小豆先食飲服一丸日再漸增以知為度範汪同並出第十一卷中大腹水腫方五首病源夫水病皆由榮衛痞澀腎脾虛弱所為而大腹水腫者或因大病之後或積虛勞損或新熱食訖入水自漬及浴令水氣不散流溢腹外三焦閉塞小便不通水氣結聚於內乃腹大而腫故四肢小陰下濕手足逆冷腰痛上氣咳嗽煩疼故云大腹水腫也出第二十一卷中肘後療卒大腹㽷病諸方此病本由水來應水字而經方皆水為病故施疾床水病之初先兩目上腫起如老蠶色俠頸脈動股里冷脛中滿按之沒指腹內轉側有聲此其候也不即療須臾身體稍腫腹盡脹按之隨手起則病已成猶可療此皆從虛損大病或下痢後婦人產後飲水不即消三焦決漏小便不利乃相結漸漸生聚遂流諸經絡故也療之方防己甘草炙葶藶子熬各二兩上三味搗篩苦酒和丸飲服如梧子三丸日三常將之取消平乃止忌海藻菘菜又方將服牛溺商陸羊肉𦡱及香薷煎等在腫滿條中其十水丸諸大方在別卷若止皮膚水腹內未有者服諸發汗藥得汗藥得汗便瘥然慎護風寒為急又方牽牛子三分熬厚朴一分炙上二味搗篩強人服三稜角殼弱人二殼酒飲隨意樞筋有水氣病水腫諸藥不能瘳者此方效驗出第一卷中千金療大腹水腫氣息不通命在旦夕者方牛黃二分研昆布十分洗海藻十分洗牽牛子八分熬桂心八分椒目三分葶藶六分熬上七味別搗葶藶如膏合丸如梧子飲服十丸日再稍加小便利為度正觀九年漢陽王患水醫所不療余處此古方日夜尿一二斗五六日瘥瘥後有他犯因爾殂矣計此即是神方忌生蔥出第二十一卷中崔氏療大腹水病身體腫上氣小便澀赤臍深頸上有兩大脈動唾稠不得眠睡每腫先隨腳腫亦有在前頭面腫或大便澀者服此藥大佳若先患大便利臍凸腹大脹手掌平滿即不可服此藥方大棗四十枚飯蒸剝去皮核葶藶子五兩取苦者熬令紫色杏仁三兩熬令黃色上三味先搗葶藶子一萬杵寫出之乃搗杏仁三百杵訖總和合棗膏搗一萬杵藥成平旦空腹服八丸日晚食消更服五丸以飯汁下之三日後每旦服五丸日晚服三丸丸如棗核如大便利未得服此藥若正服藥次忽患痢即先食二三口飯然後吃藥若利過多停藥即可爛煮小豆勿以鹽食之忌咸黏脂膩及大冷熱物等唯得食粳粟米飯及淡醋不得吃稀粥唯只得吃飯佳如欲食粥即稠煮不得遣大便利一方加螢火蟲糞並出第六卷中風水方八首病源風水者由腎脾氣虛弱所為也腎勞則虛虛則汗出汗出逢風風氣內入還客於腎脾虛又不能制於水故水散溢皮膚又與風濕相搏故云風水也令人身浮腫如里水之狀頸脈動時咳按腫上凹而不起也骨節疼痛而惡風是也脈浮大者名風水也出第二十一卷中深師療大風水脈浮浮為在表其人或頭汗出表無他病但下重故知從腰以上為和腰以下當腫及陰難以屈伸木防己湯方生薑三兩大棗十二枚擘白朮四兩木防己四兩甘草二兩炙黃耆五兩上六味切以水六升煮取二升分三服喘者加麻黃身重胃中不和者加芍藥氣上衝者加桂心下久寒者加細辛防己黃耆為本服藥欲解當如蟲行皮中狀從腰以下冷如冰服湯後坐被上又以一被繞腰溫下令得汗汗出則愈也忌海藻菘菜桃李雀肉等此本仲景傷寒論方又療風水氣舉身腫滿短氣欲絕大豆湯方大豆一升杏仁一升去尖皮熬黃耆二兩防風三兩白朮五兩木防己四兩茯苓四兩麻黃四兩去節甘草四兩炙生薑六兩清酒一升上十一味切以水三斗先煮豆取一斗去滓納酒及藥煮取七升分七服一日一夜令盡當下小便極利神驗忌大醋余忌同前又療暴水風水氣水腫或瘡中水通身皆腫香薷術丸方干香薷一斤白朮七兩上二味搗術下篩濃煮香薷取汁和術為丸飲服如梧子十丸日夜四五服利小便極良夏取花葉合用亦佳忌青魚余忌同前崔氏療風水腫毒氣遍身方楮白皮三兩桑根白皮五兩橘皮一兩紫蘇四兩生薑四兩大豆三升上六味切以水九升煮取一升絞去滓分溫為四服與三劑佳百日內忌咸酢出第六卷中古今錄驗療風水惡風舉身悉腫脈浮不渴欲自有汗而無大熱越婢湯方麻黃六兩去節生薑三兩甘草二兩炙石膏半斤碎大棗十五枚擘上五味切以水六升先煮麻黃再沸去上沫納諸藥煮取三升分三服惡風加附子一枚炮風水加朮四兩服如上法咳肺脹加半夏五合洗一服五合稍稍增之忌豬羊肉余忌同前此本仲景傷寒論方云里水越婢加朮湯主之又療風水腫症癖酒癖方商陸根一斤薄切上一味以淳酒二斗漬三宿服一升當下下者減從半升起日三服盡更合不堪酒者以意減之忌犬肉又甘遂丸療人風水黃疸體大如囊面目皆合陰腫如斗正如霜瓜方甘遂二兩熬葶藶子二兩熬杏仁五十枚熬巴豆四十枚去心皮熬上四味下篩蜜和丸如大豆一服三丸飲下當吐不知可至五丸禁野豬肉蘆筍又麻黃湯療風水身體面目盡浮腫腰背牽引髀股不能食方麻黃五兩去節桂心四兩生薑三兩甘草二兩炙附子二枚炮上五味切以水一斗先煮麻黃減二升納藥煎取三升一服一升日三忌同前水蠱方四首病源此由水毒氣結聚於內令腹漸大動搖有聲常欲飲水皮膚粗黑如似腫狀名為水蠱也出第二十一卷中肘後療唯腹大動搖水聲皮膚黑名曰水蠱方白茅根一大把切小豆三升上二味以水二升煮取干去茅根食豆水隨小便下又方鼠尾草馬鞭草各十斤上二味切以水一石煮取五斗去滓更煎餘五升以粉和丸飲服如大豆二丸至四五丸禁肥肉生冷勿食並出第一卷中文仲療苦唯腹大動搖水聲皮膚黑名曰水蠱方鬼扇搗絞取汁服如雞子即下水更服取水盡若渴研麻子汁飲之良肘後同又方巴豆九十枚去心皮熬令黃杏仁六十枚去皮尖熬令黃上二味搗相和服如小豆一枚以水下為度勿飲酒佳忌豬肉蘆筍肘後同並出於第五卷中卒腫滿方六首肘後療卒腫滿身面皆洪大方灸足內踝下白肉際三壯差備急同又方香薷銼煮令濃及熱以漬亦可服之又方商陸根一斤刮去皮薄切之煮令爛去滓納羊肉一斤下蔥鹽豉亦如常作臛法隨意食之腫瘥後亦可宜作此可常搗商陸與米中拌蒸作餅子食之忌犬肉範汪方云數用愈經心錄千金同並出第一卷中範汪療卒腫滿身面皆洪大方用大鯉魚一頭以淳苦酒三升煮之令苦酒盡訖乃食魚勿用酢及鹽豉他物雜也不過再作愈備急同肘後用淳酒又方車下李核中仁十枚研令熟粳米三合研令破以四升水中煮作粥令得一二升服之日三作未消更增核肘後古今錄驗同並出第二十八卷中備急療卒患腫滿效方曾有人忽腳趺腫漸上至膝足不得踐地諸療不瘥方以蒴藋莖菜埋熱灰中令極熱以薄腫上冷又易一日夜消盡出第三卷中腫入腹苦滿方三首肘後論凡此滿或是虛氣或是風冷氣或是飲氣此方皆療之腫入腹苦滿急害飲食方大戟烏翅白朮各二兩上三味搗篩蜜和丸如梧子旦服二丸當下漸退更服取令消乃止又方葶藶七兩椒目三兩茯苓三兩吳茱萸二兩上四味搗篩蜜和丸如梧子飲服十丸日三忌酢物又方鯉魚一頭重五斤者以水二斗煮取汁去魚澤漆五兩茯苓三兩桑白皮切三升澤瀉五兩上五味取四物納魚汁中煮取四升去滓分四服小便當利漸消也忌酢物並出第一卷中水通身腫方一十一首病源水病者由腎脾俱虛故也腎虛不能宣通水氣脾虛又不能制水故水氣盈溢滲入皮膚流遍四肢所以通身腫也令人上氣體重小便黃澀腫處按之隨手而起是也出第二十一卷中千金麻子湯主遍身流腫方麻子五升商陸一斤切防風三兩切附子一兩炮破赤小豆三升上五味先搗麻子令熟以水三斗煮麻子取一斗三升去滓納藥及豆合煮取四升去滓食豆飲汁日再忌豬肉及冷水犬肉又療水氣遍身洪腫百藥不愈待死者方大麻子一石未入窖不鬱悒者為佳赤小豆一石不得一粒雜上二味取新精者仍淨揀擇以水淘汰曝令乾蒸麻子使熟更曝令乾貯於淨器中欲服取五升麻子熬令黃香唯須緩火勿令焦搗極細作末以水五升搦取汁令盡淨器密貯之明旦欲服今夜以小豆一升淨淘漬之至旦干漉去水以新水煮未及好熟即漉出令乾納麻子汁中煮令爛熟為佳空腹恣意飽食日三服當小心悶少時止五日後小便數或赤唾黏口乾不足怪之服訖常須微行不得即臥十日後灸三里絕骨下氣不爾氣不泄盡服藥後五日逆不可下者取大鯉魚一頭先死者去鱗尾翅以湯脫去滑淨洗開肚去臟以上件麻汁中和小豆煮令極熟作羹下蔥豉橘皮生薑紫蘇調和下藥食之始終一切斷鹽渴飲麻汁秋冬暖飲春夏冷飲常食不得至飽止得免飢而已慎房室䐜恚大語高聲酒面油酢生冷菜茹一切魚肉鹽醬五辛療十十瘥神驗並療一切氣病服者皆瘥凡作一月日服之大良麻子熟時多收新甕貯之施人也又方吳茱萸蓽茇昆布杏仁去尖皮兩仁熬葶藶子熬上五味等分搗丸如梧子氣急飲服五丸勿令至利食訖飽悶氣急服之即散又苦瓠丸主大水頭面遍身大腫脹滿方苦瓠白穰實捻如大豆粒上一味以麵裹煮一沸空腹吞七枚至午當出水一升三四日水自出不止大瘦乃差三年內慎口味也苦瓠須好無靨翳細理妍淨者不爾有毒不堪用又方苦瓠膜二分葶藶子五分熬上二味搗丸服之日五丸如梧子又方葶藶子熬桃仁去皮尖熬上二味等分搗丸服之利小便一方用杏仁又方大棗去皮核七枚苦瓠膜如棗核大上二味搗丸一服三丸日三又方燒姜石令赤納黑牛尿中令熱服一升日一並出第二十一卷中千金翼澤漆根湯主水通身洪腫四肢無堪或從消渴或從黃疸支飲內虛不足榮衛不通血氣不化氣實皮膚中喘息不安腹中向向脹滿眼不得視方澤漆根十兩赤小豆二升甘草二兩炙鯉魚一枚重五斤淨去腸麥門冬二兩去心茯苓三兩人參二兩生薑八兩上八味切以水一斗七升先煮鯉魚豆減七升去之納藥煮取四升半去滓一服三合日三弱人二合日再服氣下喘止可至四合晬時小便利腫氣減或小溏下若小便大利還從一合始大利止若無鯉魚鮦音同魚亦可用若水甚不得臥臥不得轉側加澤漆一片渴加栝蔞二兩咳加紫菀二兩細辛一兩款冬花一兩桂心三兩增魚汁二升忌海藻菘菜酢物深師同出第二十卷中古今錄驗療祖承郎水腫通身眾醫不能療得此湯一劑一夜小便五六升即瘥療水咳逆氣通身流腫短氣腹滿晝夜倚壁不得臥喉中水雞鳴白前湯方白前六分紫菀二兩半夏五合又方四兩洗之三十遍生澤漆根七合切量一方三兩上四味切以水一斗納藥刻志水度復加水七升微火煎令至刻去滓次納藥七種白朮二兩吳茱萸五合桂心三兩人參一兩乾薑一兩或生薑五兩栝蔞五合或六合六物微火煮取三升半分三服小便當利或當溏下勿怪氣即低腫減呂計方經傳楊氏有驗忌羊肉餳桃李雀肉生蔥範汪同一方有棗二十枚擘又小消化水丸療水病令通身微腫腹大食飲不消方芫花一兩熬甘遂一兩熬大黃一兩葶藶一兩熬巴豆四十枚去心皮熬研上五味合搗下篩蜜為丸如梧子一服一丸不知稍增以知為度忌蘆筍野豬肉並出第十一卷中水氣腫鼓脹方四首數是四首千金翼療水氣腫鼓脹小便不利山璉治韋司業得差司業侄雲表所送云數用神驗莨菪丸方莨菪子一升羚羊肺一具青羊亦佳湯微煉即薄切之曝乾搗作末上二味以三年大酢漬莨菪一伏時出之熬令變色熟搗如泥和肺末蜜和搗作丸食後一食久服如梧子大四丸麥門冬飲服之喉中干口黏妄語為候數日小便大利即瘥麥門冬飲法麥門冬二十五枚去心米二十五粒上二味以三合半水煮之米大熟去滓以下丸每服常作千金同出第二十卷中救急療水氣腹鼓脹硬頻試要效方葶藶子七兩熬茯苓三兩吳茱萸二兩椒目三兩沉水者甘遂五兩上五味搗篩蜜和為丸如梧子大以飲服五丸日三服不知稍加丸以利為度禁食如藥法並酢物出第九卷中古今錄驗療大水腫腹如鼓堅如石方出胡洽葶藶一升熬椒目一升芒硝六兩水銀十二兩上四味以水煮煉水銀三日三夜數益水要當令黃白以合搗藥六萬杵自令相和如梧子先食服一丸日三日增一丸至十丸不知更從一丸始病當從小便利當飲好牛羊肉羹晝夜五飲當令補養禁豬肉生魚菜勿忘飲漿水渴飲羹汁釋僧深所撰方云煉水銀一日一夜亦是也水銀用十兩芒硝用七兩如小豆先食服二丸文仲陶氏集驗範汪同出第十一卷中小腫咳逆上氣方三首病源腎主水肺主氣腎虛不能制水故水妄行浸溢皮膚而身體腫滿流散不已上乘於肺肺得水而浮浮則上氣咳嗽也出第二十一卷中深師療水咳逆上氣通身洪腫短氣脹滿晝夜倚壁不得臥喉中水雞鳴大小便不通不下食而不甚渴白前湯方白前三兩紫菀四兩半夏一升洗生澤漆根一汁切凡四味水一斗七升煮取一斗汁又納後藥桂心三兩人參六分大棗二十枚擘白朮五兩生薑八兩一方乾者二兩茯苓四兩吳茱萸五兩杏仁三兩去兩仁皮尖碎葶藶二兩栝蔞五合一方十合上十味納前汁中煮取三升分四服當得微下利小便氣即下腫減深云增損用之若神忌羊肉餳生蔥桃李雀肉酢物出第十九卷中古今錄驗夫水在五臟令人咳逆喘上氣腹大向向兩腳腫目下有臥蠶微渴不得安臥氣奔短氣有頃乃復小便難少而數肺病胸滿隱痛宜利小便水氣迫肺吸吸寒熱澤漆根湯方生鯉魚一頭重五斤粗銼麥門冬二兩去心甘草二兩炙人參二兩茯苓二兩澤漆根八兩生者上六味切以水一斗七升煮魚取一斗去魚以煮藥取四升分服日三小便利為度不利增服之大便如利而小便未利者增至四合服一日氣即下得安臥有寒可納生薑八兩深師同又防己煮散療水腫上氣方出許諫議漢防己三兩澤漆葉三兩石葦三兩去毛澤瀉三兩郁李仁五兩白朮三兩丹參三兩赤茯苓三兩桑白皮三兩橘皮二兩生薑十兩通草二兩上十二味粗篩為散以水一斗七合納四方寸匕散煮取八合去滓一服令盡日三大便利者一服取小便利為度許澄秘方忌同前千金同出第十一卷中氣兼水身面腫方四首張文仲周大候正大將軍平公於禮患氣兼水身面腫垂死長壽公姚僧垣處二方應手即瘥先服湯方桑根白皮四兩橘皮二兩海藻三兩洗去咸茯苓郁李仁碎各四兩赤小豆一升上六味切以水八升煮取二升半分三服甚效古今錄驗療氣水身腫脹滿姚大夫治燕公雍州錄事於志光選云從來知不能服湯事較急勿不努力服之服此湯若微覺為益頻服三兩劑勿不服此藥甚易必無逆忤如不能服可服後丸丸遲不應急耳又方橘皮五分郁李仁十分茯苓八分葶藶六分熬防己桑根白皮各五分甘遂四分熬蘇子四合上八味搗下篩蜜和丸取榖白皮火炙焦黃煮飲服十丸如梧子日再服若不得宣通稍稍加常以宣為度渴者飲此方老蔣公處與張大夫家效忌酢物又方灸丹田穴在臍下二寸灸三壯療水腫女子禁灸並出第五卷中古今錄驗療氣水身腫脹滿方杏仁十分去皮尖熬蘇子五分白前六分昆布八分洗去咸李根白皮五分橘皮六分五味子六分大麻仁五分熬茯苓八分生薑八分切曝燥上十味搗篩蜜和丸粥清服二十丸如梧子日再稍稍加至三十丸忌酢物出第十一卷中水氣方六首範汪療風虛水氣腫豆酒方大豆一升上一味以水四升煮取二升汁去豆納美酒一升合煎取一升能隨意飲之日三常令有酒氣當清酒作之又療通身腫皆是風虛水氣亦療暴腫蒲黃酒方蒲黃一升小豆一升大豆一升上三味以清酒一斗煮取三升去豆分三服又療腫患下水氣四肢腫聶聶動木防己湯方木防己三兩甘草二兩炙桂心二兩茯苓六兩黃耆三兩生薑二兩白朮三兩芍藥二兩上八味切以水八升煮取三升二合分為四服有人患下是胃寒加當歸三兩人參二兩半龍骨二兩水一斗煮取三升二合分四服相去二十里頓服不下即不須納此三物也忌海藻菘菜桃李雀肉生蔥大酢並出第四十五卷中崔氏療水氣方葶藶子三兩上一味以物盛於甑上蒸令濕徹上即搗萬杵自堪為丸不須蜜和如不得以少蜜和之一服五丸漸加之七丸以微利為度得利即停不可多服令人不甚能食若氣發又服之得利氣下定即停此方療水氣無以加蕭駙馬時任太常卿患水腫見在名醫悉療不瘥唯服此丸得平復故記又葶藶子療水氣極效方取葶藶子一合熬令色黃搗碎別研如面取大棗二十顆去核以水一大升煮棗取半升汁去棗滓納前件葶藶子並棗汁於銅器中緩火煎令堪成丸平旦空腹頓服盡必不能頓者分為兩服得利兩行差至日午宜食乾飯慎如藥法並出第六卷中近效療水氣方商陸根去皮取白者不用赤色切如小豆一大盞上一味以水三升煮取一升以上爛即取粟米一大盞煮成粥仍空腹服若一日兩度服即恐利多每日服一頓即微利不得吃生冷等皮水方三首病源肺主於皮毛腎主於水腎虛則水妄行流溢於皮膚故令身體面目悉腫按之沒指而無汗也腹如故不滿亦不渴四肢重而不惡風是也脈浮者名皮水也出第二十卷中深師療皮水如腫水氣在皮膚中四肢集集動木防己湯方木防己三兩黃耆三兩桂心三兩茯苓六兩甘草二兩炙上五味切以水六升煮取二升分再服忌海藻菘菜生蔥酢物出第十九卷中範汪皮水一身面目悉腫甘草麻黃湯主之方甘草二兩炙麻黃四兩去節上二味以五升水先煮麻黃再沸去上沫乃納甘草煮得一升絞去滓適寒溫先服一升重覆之日移二丈所當汗出汗出勿復服不汗乃復服當慎護風寒數日乃出入忌海藻菘菜出第二十八卷中古今錄驗皮水越婢湯加水主之方麻黃六兩去節大棗十二枚擘白朮四兩生薑三兩切甘草二兩炙石膏半斤上六味㕮咀以水七升煮麻黃一二沸去上沫乃納余藥煮取二升絞去滓適寒溫服七合日三忌同前範汪同已上三方並本出仲景傷寒論水腫從腳起方四首病源腎者陰氣也主於水而又主腰腳腎虛則腰腳血氣不足水之流溢先從虛而入故腳先腫也出第二十一卷中肘後若腫從腳起稍上進者入腹則殺人療之方小豆一斛煮令極爛得四五斗汁溫以漬膝以下日日為之數日消盡若已入腹者不復漬但煮小豆食之莫雜吃飯及鮭音圭魚鹽又專飲小豆汁無小豆大豆亦可用如此之病十死一生急救之又方削楠及桐木煮取汁以漬之並飲少許如小豆法並出第一卷中範汪療水腫從足始轉上入腹則殺人豚肝方生豬肝一具煮如食法細切頓食令盡不得用鹽可用苦酒豬重五六十斤以上肝者一頓啖盡百斤以上豬者分兩服肘後同又若但兩足腫者方銼蔥葉煮令爛以漬之日三四度良也集驗同並出第二十八卷中水症方二首病源水症者由經絡痞澀水氣停聚在於腹內大小腸不利所為也其病腹內有結塊堅強在兩脅間膨膨脹滿遍身腫所以謂之水症出第二十一卷中深師療水症腹內胸脅牢強通身腫不能食海藻丸方海藻一兩洗水銀一兩椒目一兩芒硝一兩葶藶一兩熬大黃一兩甘遂一兩熬杏仁三十枚去尖皮熬桂心一兩附子一兩炮茯苓一兩大戟一兩松蘿一兩乾薑一兩巴豆三十枚去心皮熬上十五味下篩蜜和服如小豆二丸日三不知稍稍加之忌豬肉大酢生蔥蘆筍範汪同出第十九卷中範汪療水腫大腹水症丸方礬石十分熬躑躅花十分細辛十分半夏十分洗藜蘆十分丹參十分承露十分承露是落葵巴豆十枚去心皮熬苦參十分雄黃十分大黃十分芒硝十分大戟十分烏頭二十分炮狼毒十分野葛二分上十六味搗下篩蜜和藥成以置腫上並服如黍米三丸日三欲取下者服五丸禁食生魚生菜肥肉千金不傳謂之千金丸並出第三十五卷中水瘕方一首病源水瘕者由經絡痞澀水氣停聚在於心下腎經又虛不能宜利溲便致令水氣結聚而成形瘕在於心腹之間抑按作水聲但欲飲而不用食遍身虛腫是也出第二十一卷中古今錄驗水瘕病心下如數升油囊滎滎作聲日飲三斗不用食但欲飲久病則為瘕堅有蝦䗫鱉療之方取蓖麻成熟好者二十枚去皮杯中研令熟不用搗水解得三合宿不餐清旦一頓服盡日中許當吐下青黃如葵汁當囊結裹其病不盡即三日更增服三十枚蓖麻如上法若病如故復不盡復增十枚服如上法其以盡病根為限藥但去病不令人悶亂下病之後慎不可飲當五日斷飲止進白糜關高方已試神良範汪同出第十一卷中石水方四首病源腎主水腎虛即水氣妄行不依經絡停聚結在臍間少腹腫大鞭如石故云石水其候引脅下脹痛而不喘是也脈沉者名曰石水脈微大亦曰石水腫起臍下至少腹垂垂然上至胃管則死不療出第二十一卷中集驗膀胱石水四肢瘦腹腫方大豆五升防己四兩桑根白皮切三升白朮四兩澤漆葉切三升射干四兩榖白皮四兩一云切三升上七味切以水一斗半煮取六升去滓納好酒三升更煎取五升分五服日再夜一余煎明日服之千金同出第六卷中千金療膀胱石水四肢瘦腹腫方桑根白皮六兩射干四兩澤湯五兩澤漆切一升茯苓四兩防己一兩黃芩四兩白朮四兩大豆三升上九味切以水五斗煮大豆取三斗去滓澄清取汁一斗下藥煮取三升空腹溫分三服出第二十一卷中集驗療石水痛引脅下脹頭眩痛身盡熱灸法灸關元又灸石水法灸章門然谷暴腫滿方四首集驗療暴患遍身腫滿方大豆上一味搗篩為散粥清服三方寸匕日再甚良驗又療身體暴腫如吹方巴豆三十枚合皮㕮咀上一味以水五升煮取三升綿納汁中以拭腫上隨手減矣日五六拭勿近目及陰範汪同並出第六卷中備急療身體暴腫滿方榆白皮搗屑隨多少雜米作粥食小便利即消陶效方出第三卷中古今錄驗澤漆湯療寒熱當風飲多暴腫身如吹脈浮數者方澤漆二兩炙知母二兩海藻二兩茯苓二兩丹參三兩秦艽二兩木防己二兩豬苓二兩去皮大黃三兩通草二兩青木香二兩上十一味切以水九升煮取三升分三服忌酢物出第十一卷中氣滿胸急方八首古今錄驗療氣忽發滿胸急者方茯苓四兩杏仁四兩橘皮二兩上三味切以水六升煮取二升分作三服日三隨小便下愈飲盡更作忌酢物又茯苓杏仁煎方茯苓四兩杏仁四兩橘皮三兩蘇子一升碎甘草三兩炙芍藥四兩白前三兩五味子三兩生薑汁五合蜜六合竹瀝二升上十一味切以水九升先煮諸藥取三升去滓納竹瀝生薑汁蜜等和攪微火煎取四升一服四合日再夜一忌海藻菘菜酢物又方甘遂三兩熬茯苓四兩杏仁四兩澤漆葉三兩炙黃芩四兩澤瀉三兩郁李仁五兩碎橘皮三兩朴硝四兩上九味切以水九升煮取二升七合分三服忌酢物又方桑根白皮切二升郁李仁一升碎赤小豆二升橘皮三兩蘇葉三兩茅根切二升上六味切以水一斗煮取三升適冷暖稍稍飲之又方桑白皮四兩橘皮三兩茯苓四兩甘遂三兩熬杏仁三兩澤瀉三兩黃芩四兩赤小豆一升上八味切以水九升煮取二升半分三服忌酢物一方甘草三兩又方羊腎一具去脂破桑根白皮四兩茯苓四兩橘皮三兩李根白皮四兩黃耆三兩玄參三兩生薑四兩上八味切以水九升煮取二升七合分三服忌酢物又方豬腎一具去脂破桑根白皮五兩茯苓四兩澤漆葉三兩炙防己三兩澤瀉三兩橘皮三兩大豆三升甘遂三兩熬郁李仁一升碎上十味切以水一斗三升先煮腎桑根皮澤漆葉大豆取八升去滓納余藥煎取一升七合分為三服忌酢物又方大棗三十枚擘破烏梅三十枚打破上二味以水四升煮取二升納蜜和調不得過甜不得過酢稍稍含咽之並出第十一卷中虛熱及先服石風水腫方三首集驗蔥豆洗湯療虛熱及服石熱當風露臥冷濕傷肌熱阻在裡變成熱風水病心腹腫滿氣急不得下頭小便不利大便難四肢腫如皮囊盛水晃晃如老蠶色陰卵堅腫如升莖腫生瘡臭如死鼠此皆虛損腎中有熱強取風冷濕痹故也內宜依方服諸利水藥外宜以此湯洗四肢訖以蔥豆膏敷之別以豬蹄湯洗瘡爛處及卵腫也方赤小豆一升蔥合青切一升蒺藜子一升碎菘菜子一升舂碎蒴藋切五升巴豆一百枚合心皮打破上六味以水一石二斗煮取四斗以淋洗身腫處古今錄驗同又豬蹄洗湯療丈夫服石有虛因勞損熱盛當風臥傷於風濕身變成熱風水腫病腹滿氣急四肢欲腫小便不利陰卵堅腫莖腫生瘡赤爛臭如死鼠名水疸以湯洗之方豬蹄一雙黃柏五兩銼蒴藋根切三升葶藶子五合蒺藜子一升上五味以水三斗煮取二斗冷以洗之日三古今錄驗同並出第六卷中古今錄驗蔥白膏方療與前蔥豆湯同蔥青白切半升菘菜子半升葶藶子半升破蒴藋切半升青木香二兩切莽草一兩切丹參切半升生蛇銜半升蒺藜子一升破上九味以豬肪五升煎之三沸令水氣竭去滓敷痛處集驗同出第十一卷中三焦決漏水病方二首深師療三焦決漏水在脅外名曰水病腹獨腫大在腹表用大麝香丸華佗方麝香三銖研雄黃六銖研甘遂十二銖熬芫花十二銖熬上四味搗合下篩和以白蜜丸如大豆二丸酒下日三服可至四丸節飲食禁肥肉生菜之輩有效千金同古今錄驗療通身手足面目腫食飲減少此是三焦決漏精液不通水氣卻行者鯉魚湯方鯉魚重五斤者茯苓六兩澤漆五兩炙人參二兩杏仁一兩澤瀉五兩甘草二兩炙上七味切以水二斗五升煮魚取一斗半汁納藥煮取四升未食服一升日三以小便利為度年八十病大困服此瘥忌海藻菘菜酢物並出第十一卷中男女新久腫方三首範汪療久腫新腫方黑大豆一斗清水一斗煮之令得八升去豆以八升薄酒投中更微火上煎令得八升一服之為佳不能者亦可分再三服腫當隨小便去腫除後渴難忍要不可飲慎之出第二十八卷中千金療男女新久腫得惡暴風入腹婦女新產上圊風入臟中如馬鞭者噓吸短氣咳嗽大豆煎方大豆一斗擇令淨以水五斗煮取一斗三升澄清納釜中以一斗半美酒納汁中更煎取九升宿勿食日服三升溫覆取汗兩食頃當下去風氣腫減慎風冷十日平復也除日合服之若急不可待逐急合服無令六畜婦人見之腫差勿服之神驗也亦可任性飲之常使酒氣相接範汪並翼同又方楮枝皮一大束切煮取汁隨多少釀酒旦服醉為佳不過三日腫減瘥後可常服之並出第二十一卷中水腫小便澀方三首廣濟主下水氣若小便澀水腫氣妨悶不能食海蛤丸方昆布洗橘皮赤茯苓漢防己海蛤研郁李仁桑根白皮澤漆炙檳榔杏仁去皮尖各四分大黃六分葶藶子二十分微火熬令黃上十二味搗篩蜜和丸飲服如梧子十五丸日二服加至二十五丸以小便利為度忌熱面冷滑大酢出第五卷中崔氏療水腫盛滿氣急喘咳小便澀如血者方桑根白皮六兩澤漆葉切二升炙白朮二兩生薑四兩郁李仁六兩杏仁二兩橘皮二兩玄參三兩上八味切以水九升急著火煮取四升溫分四服相去六七里久或利黃水三五升及小便利為候即瘥者可頻服三四劑佳忌桃李雀肉青魚酢等出第六卷中古今錄驗療男女心上脹滿胸背痛食進少面微似腫小便如澀方出姚大夫杏仁八分熬橘皮五分蘇子三合防己五分葶藶六分熬茯苓八分上六味搗篩蜜和為丸如小豆細切桑根白皮煮為飲用服此丸初服十丸日再漸加至三十丸千金同出第十一卷中上氣大便澀方二首崔氏療上氣大便澀方葶藶子四兩熬牽牛子一兩熬杏仁二百顆大棗四十枚去皮芒硝一兩牛酥一合上六味搗一萬杵更彆著牛酥乃更搗一萬杵空腹服八丸用粥飲下藥先禁咸醬等物又療上氣大便秘澀方杏仁五兩熬印城鹽三兩乾薑三兩上三味搗篩以醬汁和之令得相著作甕可長一寸余如指大兩頭尖仍以薄綿裹之於風日中曝令少干納下部中時易之不過一兩易即有惡物下氣上即定亦下食納藥痛時少須忍如深納少頃亦不大痛急出時物即出痛忍之不得後可便轉時出膿及惡物多大便不澀停之並出第六卷中水病雜療方一十二首集驗療水腹大臍平者法灸臍中腹無文理者不可療又水腹脹皮腫法灸三里風水灸解谿並出第六卷中千金翼鯉魚炙主腫滿方鯉魚長一尺五寸以尿漬令沒一宿平旦以水從口中灌至尾微火炙令微熟去皮宿勿食鹽頓服之不能者再服令盡神方肘後備急張文仲千金同又有人虛肥積年氣上似水病眼似腫而腳不腫方榖楮葉八兩上一味以水一斗煮取六升去滓納米煮粥亦當以水煮羹菜等皆用之秋中多收以擬經冬用其水多少濃淡任人勿拘此方慎蒜面豬雞魚油膩重者三年服之永瘥輕者一年並出第二十卷中崔氏療一切腫方取紅藍花熟揉搗取汁服之不過再三服便愈服之多少量腫大小而進花汁也又療水腫已上少腹連臍硬氣上悶方苦瓠子一兩上一味以面如作餛飩法其面勿著鹽作二七枚湯中煮待浮漉出及暖吞之如不下以湯汁下之能禁生冷酢滑及肉油膩佳若恐虛煮牛乳服之如此隔日作漸加至三七枚以小便利為候小便若太多即歇一二日以腹腫消即止又療水病瘥後口中習習熱瘡出方先以鐵鐺中著水一小鬥煮金器不問多少煎取二小升出金取金水著病人口中含良久應欲言語有要事方可吐出勿咽之殺藥氣並出第六卷中張文仲羊胃湯久病羸瘦不生肌肉水氣在脅下不能食四肢煩熱方羊胃一枚切白朮一升切上二味以水一斗煮取九升服一升日三三日盡更作兩劑乃瘥忌桃李雀肉等備急小品小女曲散療利後虛腫水腫者服此藥小便利得止腫亦消方女曲一升生用乾薑細辛椒目附子炮桂心各一兩上六味為散酒服方寸匕不知服二三匕日三產後虛滿者大良忌豬肉生蔥生菜出第三卷中古今錄驗療水或下不下則滿溢下之則虛竭還復十無一活桑酒方桑枝並心皮細銼以水八升煮取四升汁以四升米釀酒一服一升又療脾胃水面目手足胕腫胃管堅大滿短氣不能動搖方桑根白皮切三升桂心一尺生薑三兩人參一兩上四味切以水三升煮桑白皮得一升絞去滓納桂心等並飴十一兩煮之竭得七合消息更服須臾當下不盡復一升忌生蔥傳效鯉魚湯療水腫腹大面目身體手足盡腫喘咳短氣又脅滿不得臥方鯉魚一枚重三斤桂心三兩紫菀一兩木防己二兩黃芩一兩硝石二兩乾薑二兩人參二兩上八味切以水一斗五升煮魚如食法取汁一斗二升出魚內藥煮取三升去滓先食溫服一升日三忌生蔥並出第十一卷中
