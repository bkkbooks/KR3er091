body:
  text: 重刻外臺祕要方序程子敬通醇儒也而旁通於醫吾於醫固未之學而一接程子指脈説病則目無全人微言高論疊見層生聞未聞解未解程子之於醫幾乎道又見其醫人也雖極賤貧但一接手則必端問詳審反復精思未嘗有厭怠之色其疑難者多至盈時惟恐少誤無惑而後動其心行復如是是其人一第而為宰官推是道也用是心也以往其謀國以善萬里生民之寄豈可及哉有唐王刺史外臺祕要一書更五代至宋孫中丞一較正行之及今而絶程子不忍圖令其流布人間而為余言余因問程子如欲知醫何道而能精曰必好學將何學曰先讀書讀書可以醫乎曰讀書而不能醫者有之矣決未有不讀書而能醫者也嗚呼天下事皆然耳獨醫也乎余因問程子以子之道醫世之人當吾世而既日不暇給及身後而書不盡言言不盡意吾懼其不傳也盍得其人而傳之何以書程子曰師之求弟甚於弟之求師有來學者吾願盡所學焉爾而無如今之來學者未嘗求學徒以求行也是道也非苦心十年不可得而今之學者來輒問曰欲就師授十日足乎一若是其亟也吾雖欲傳其何從而傳嗚呼天下之學大抵然耳獨醫也乎古之君子其於道也其始也急求人而已及其求人不可得則不得不有事於書以冀其長存天地之間其於書也不必自著書而章隱繼絶圖存古人之書古人之書其賴有心之後人以獲行世者多矣初不必後人之盡有心盡好學而能讀也而其書則不忍以不存以為萬有一人焉有心好學而一能讀是書也則是一書為遂不虛存也更百世而當有人焉出而視今日之敬通程子亦猶程子之視唐宋王刺史孫中丞兩先生也則今日之及程子之門而欲以十日盡學其所學者程子其亦可以謝之而無所負矣賜進士出身翰林院庶吉士奉命參佐軍務欽授山東道監察御史郡人金聲撰重刻外臺祕要序嘗謂良醫與良相功齊總之能為民生造命耳豫武夫也不知相亦不知醫惟是人之有疾不啻已出值此滄桑變故之際民遭兵火若患熱烈之症豫濫任撫綏尤當視民如傷恨不能人人而投以清涼之劑自入新安以來每問民間疾苦見程生衍道者業儒而通醫博施濟衆久矣更構唐時王刺史外臺祕要四十卷詳訂而剞劂之蓋醫之有方猶兵之有法也説者曰功在一隅者小而功在四海者大又曰功在一時者小而功在千古者大是程生傳流方略意也若然則程生志在要功矣而非也程生恐匹夫匹婦疾病而無告又恐良醫良相世代不全有不能弭病於無病之先尚可瘳病於有病之後繼宋而鐫壽民因以壽國大有深心文王畫卦使人知吉凶孔子作春秋使人知君臣即此意也程生一士子藉醫而行相道然與豫撫民一念默相吻合又以醫而兼將矣曷可與庸人道也天下後世能按此而擴充之又何病民之與有欽命提督徽寧池太等處地方總兵官都督同知榆林張天祿題外臺祕要序天下事久壞於庸人而庸醫均之所謂庸者皆不學無術之人也其遇事也初不晰其受病之源並不審其對治之方而或以姑息養癰或以鹵莽嘗試究之鹵莽之為害什居五而姑息之為害什居八乃始藉手以貽後人曰吾姑徐徐無動為大耳不知邪氣日深元氣日削而大命已隨之所謂庸臣誤國與庸醫誤人其情同其罪均而其原皆本於不學使其學之而窮究古今之病源細考古今之方略其病之在標在本也其方之宜補宜泄也其病之或傳或變也其方之不執不拘也彼夫三年蓄艾能治之於未病之先與夫一匕回生能治之於已病之後皆是先聖先賢當日殫竭之心思皆是醫國醫人當日素具之方略懦者明理奈何不亟亟講求而以人命為戲耶此余友敬通氏探析性命之微雅抱痌瘝之痛而以好學不倦之旨牖人以博施濟衆之方先梓外臺祕要續補聖濟總録壽國壽民具茲編矣程子之功顧不偉歟時崇禎庚辰清和之吉賜進士及第翰林院編修國史講官邑人吳孔嘉撰自序蓋聞上古之世方不如醫中古之世醫不如方甚矣醫與方之並重也世降而方愈凌雜莫不各據一家言彼此互相是非間有二三驗方亦惟是父師傳之子弟絶不輕以示人而其鐫行於世者率皆依樣葫蘆時或改頭換面以博名高則已矣余獨取外臺祕要付之剞劂者何請得而備言之蓋自神農氏深明藥性著本草經三卷而未有方也軒轅氏日與岐伯雷公剖析病機著素問靈樞經各九卷而未有方也商周之間如伊尹如和如緩如跗皆以醫名而未有方也越人受長桑君之禁方所傳於世者八十一難經及治虢太子尸厥耳而其為帶下醫小兒醫耳目痹醫俱未悉其所以為方也倉公受公乘陽慶之禁方所可曉者莨菪子湯苦參湯耳其他火齊湯下氣湯陽劑剛石陰劑柔石亦未悉其所以為方也若夫刳腸湔胃無論其方不傳即令華元化方傳至今而亦難乎效其為方也惟是仲景氏出有卒病論以治傷寒著方一百一十三有金匱要略以治雜病著方一百一十二醫方實開先焉蓋鼻祖也又得叔和王氏為之詮次俾仲景之微旨益以彰明叔和氏不更立方即述仲景之方為方者也皇甫士安之甲乙經特重針刺而無方巢元方之病源每病必有源源必立論而無方覽者咸以無方致憾逮唐有孫真人者初著方三十卷晚復增三十卷自珍其方曰千金醫方較明備焉蓋大宗也乃前後乎孫真人者人則有深師崔尚書孫處士張文仲孟同州許仁則吳升若而人方則有廣濟録驗刪繁肘後延年小品必效若而方門分派別編帙浩繁從未有綜而輯之者獨刺史王燾先生前居館閣二十年採托群書匯成方略上溯炎昊下及諸家傷寒一遵仲景發論率冠病源雖置針法不言而大唐以前之方靡有遺佚千金則居多焉卷凡四十方餘六千蓋集醫方之大成者題曰祕要悉皆祕密樞要也自宋皇祐詔諭刊布後無復鋟梓以廣其傳豈非沿習時尚而探源證本者之寡其儔哉夫天下何事不宜師古文則六經之外必追秦漢字則篆籕而後必法鍾王至於醫而何獨不然昔祖訥云辨釋經典小有異同不足以傷風教湯藥小小不達則後人受弊不淺此余亟欲以外臺祕要公諸海內之深意也向購寫本訛缺頗多因復殫力校讐遇有疑義則旁引類證録於篇側其無文可徵者不敢強釋以俟解人十載始竣厥工客閲而謂余曰奧義之難析也圓機之莫辨也淺識可以漫試乎余曰用其所信闕其所疑可也又謂世代之推遷也風氣之殊尚也陳轍可以適時乎余曰不師其法而師其意可也且謂同病而異方也同方而異治也毫釐不幾千里乎余曰三部微妙別之在指五臟精華察之在目合色脈而後定方求其曲當可也總之以方為方方遂一成而不易以矩為方方乃萬變而不窮誠究心於平昔會其所以立方之意斟酌於臨時施其確然對症之方果屬熱而當寒何不參之河間濕而宜燥何不參之東垣可汗可吐而可下何不參之子和陰陽乖錯營衛失調何不參之丹溪博洽前方勿執我見期於實有拯救不愧前賢濟民利物之心則請以外臺祕要一書為醫家之筌蹄也亦奚不可新安後學程衍道敬通父謹識外臺祕要方序唐銀青光祿大夫持節鄴郡諸軍事兼守刺史上柱國清源縣開國伯王燾撰昔者農皇之治天下也嘗百藥立九候以正陰陽之變診以救性命之昏扎俾厥土宇用能康寧廣矣哉洎周之王亦有冢卿格於醫道掌其政令聚毒藥以供其事焉歲終稽考而制其食十全為上失四下之我國家率由茲典動取厥中置醫學頒良方亦所以極元氣之和也夫聖人之德又何以加於此乎故三代常道百王不易又所從來者遠矣自雷岐倉緩之作彭扁華張之起逮茲厥後仁賢間出歲且數千方逾萬卷專車之不受廣廈之不容然而載祀綿遠簡編虧替所詳者雖廣所略者或深討簡則功倍力煩取捨則論甘忌苦永言筆削未暇尸之余幼多疾病長好醫術遭逢有道遂躡亨衢七登南宮兩拜東掖便繁臺閣二十餘載久知弘文館圖籍方書等繇是睹奧升堂皆探其祕要以婚姻之故貶守房陵量移大寧郡提攜江上冒犯蒸暑自南徂北既僻且陋染瘴嬰疴十有六七死生契闊不可問天賴有經方僅得存者神功妙用固難稱述遂發憤刊削庶幾一隅凡古方纂得五六十家新撰者向數千百卷皆研其總領核其指歸近代釋僧深崔尚書孫處士張文仲孟同州許仁則吳升等十數家皆有編録並行於代美則美矣而未盡善何者各擅風流遞相矛盾或篇目重雜或商較繁蕪今並味精英鈐其要妙俾夜作晝經之營之捐衆賢之砂礫掇群才之翠羽皆出入再三伏念旬歲上自炎昊迄於聖唐括囊遺闕稽考隱祕不愧盡心焉客有見余此方曰嘻博哉學乃至於此邪余答之曰吾所好者壽也豈進於學哉至於遁天倍情懸解先覺吾常聞之矣投藥治疾庶幾有瘳乎又謂余曰稟生受形咸有定分藥石其如命何吾甚非之請論其目夫喜怒不節飢飽失常嗜欲攻中寒溫傷外如此之患豈由天乎夫為人臣為人子自家刑國由近兼遠何談之容易哉則聖人不合啓金滕賢者曷為條玉版斯言之玷竊為吾子羞之客曰唯唯嗚呼齊梁之間不明醫術者不得為孝子魯閔之行宜其用心若不能精究病源深探方論雖百醫守疾衆藥聚門適足多疑而不能一愈之也主上尊賢重道養壽祈年故張王李等數先生繼入皆欽風請益貴而遵之故鴻寶金匱青囊緑帙往往而有則知日月所照者遠聖人所感者深至於嗇神養和休老補病者可得聞見也余敢採而録之則古所未有今並繕緝而能事畢矣若乃分天地至數別陰陽至候氣有餘則和其經渠以安之志不足則補其復溜以養之溶溶液液調上調下吾聞其語矣未遇其人也不誣方將請俟來哲其方凡四十卷名曰外臺祕要方非敢傳之都邑且欲施於後賢如或詢謀亦所不隱是歲天寶十一載歲在執徐月之哉生明者也較正唐王燾先生外臺祕要方序夫外臺者刺史之任也祕要者祕密樞要之謂也唐王燾臺閣二十餘年久知弘文館得古今方上自神農下及唐世無不採托集成經方四十卷皆諸方祕密樞要也以出守於外故號曰外臺祕要方凡一千一百單四門以巢氏病源諸家論辨各冠其篇首一家之學不為不詳王氏為儒者醫道雖未及孫思邈然而採取諸家之方頗得其要者亦崔氏孟詵之流也且古之如張仲景集驗小品方最為名家今多亡逸雖載諸方中亦不能別白王氏編次各題名號使後之學者皆知所出此其所長也又謂針能殺生人不能起死人其法云亡且久故取灸而不取針亦醫家之蔽也此方撰集之時或得缺落之書因其闕文義理不完者多矣又自唐歷五代傳寫其本訛舛尤甚雖鴻都祕府亦無善本國家詔儒臣較正醫書臣承命以其書方證之重者刪去以從其簡經書之異者注解以著其詳魯魚豕亥煥然明白臣謂三代而下文物之盛者必曰西漢止以侍醫李柱國較方技亦未嘗命儒臣也臣雖濫吹儒學但盡所聞見以修正之有所闕疑以待來哲總四十卷並目録一卷恭惟主上盛德承統深仁流化頒此方論惠及區宇贊天地之生育正萬物之性命使歲無疵癘人不夭橫熙熙然歌樂於聖造者也前將仕郎守殿中丞同較正醫書臣孫兆謹上
