body:
  text: 卷第十六五臟勞論一首刪繁論曰夫五臟勞者其源從臟腑起也鼓生死之浮沉動百病之虛實厥陰陽逆腠理皆因勞瘠而生故曰五臟勞也出第七卷中肝勞論一首刪繁論曰凡肝勞病者補心氣以益之心旺則感於肝矣人逆春氣則足少陽不生而肝氣內變順之則生逆之則死順之則治逆之則亂反順為逆是謂關格病則生矣所以肝恐不止則傷精精傷則面離色目青盲而無所見毛悴色夭死於秋出第七卷中肝實熱方二首刪繁療肝勞實熱悶怒精神不守恐畏不能獨臥目視無明氣逆上不下胸中滿塞半夏下氣消悶明目吐熱湯方半夏洗破生薑各八兩麻黃去節芍藥杜蘅枳實炙細辛杏仁去皮尖碎烏梅擘各三兩松蘿二兩淡竹葉切一升上十一味切以水一斗先煮麻黃去沫下諸藥煮取三升分為三服忌羊肉餳生菜出第七卷中深師療肝氣實目赤若黃脅下急小便難瀉肝湯方人參甘草各三兩炙生薑五兩黃芩二兩半夏一升洗大棗十四枚擘上六味切以水五升煮半夏三四沸納藥最後納薑煎取二升去滓分為二服羸人三服忌海藻菘菜羊肉餳出第十三卷中肝勞虛熱方四首刪繁療肝勞虛熱兩目為赤閉塞不開煩悶宛轉熱氣胸裡炎炎前胡瀉肝除熱湯方前胡乾薑大青細辛秦皮決明子梔子仁子芩各一兩淡竹葉切一升車前子切一升石膏八兩碎綿裹上十一味切以水一斗煮取三升去滓平旦分為三服須利加芒硝三兩忌生菜又療肝勞熱悶關格不通精神不守氣逆上胸熱炎炎不止柴胡下熱湯方柴胡黃芩澤瀉升麻芒硝各三兩玄參六兩淡竹葉切生地黃切各一升乾薑二兩上九味切以水九升煮取三升去滓下芒硝平旦分三服忌蕪荑又療肝勞熱恐畏不安精神不守悶怒不能獨臥感激惆悵志氣錯越不得安守茯苓安肝定精神丸方茯苓遠志去心防風人參柏子仁熬各五分龍骨七分牡蠣熬大棗肉各八分甘草四分炙上九味搗篩白蜜和為丸如梧子初服二十丸加至三十丸為度暖清白飲進之日再服忌海藻菘菜大酢又扁鵲療勞邪氣熱眼赤方灸當容百壯兩邊各爾當容在眼小眥近後在耳之前客主人三陽三陰之會處以手按之有上下行脈則是與耳相對並出第七卷中肝勞虛寒方五首刪繁療肝勞寒眩忘咳唾憂恚內傷面離色目青盲硫黃丸方硫黃乾薑吳茱萸人參當歸防風各七分礜石泥裹燒半日烏頭各八分炮桂心天雄炮甘草炙各六分蜀椒汗皂莢炙去皮子枳實炙各五分細辛甘菊花各四分上十六味搗篩白蜜和為丸如梧子初服二十丸加至三十丸日再溫清酒進之忌豬肉冷水生蔥生菜海藻菘菜又肝勞虛寒關格勞澀閉塞不通毛悴色夭豬膏酒方豬膏七升生薑汁二升上二味微火煎取三升下酒五升和分為三服千金同又療肝氣虛寒眼青盲䀮䀮不見物真珠煎方真珠四分研白蜜二合鯉魚膽一枚上三味和合微火上煎兩沸綿裹納眼中眼汁當自出藥歇更為之本方又有鯉魚腦一枚又療肝虛寒勞損口苦骨節疼痛筋攣縮煩悶虎骨酒補勞損骨節疼痛方虎骨一升炙取令焦黃碎如雀頭乾薑芎藭地骨皮各四兩白朮豬椒根五加皮枳實熬各五兩丹參八兩乾地黃七兩上十味㕮咀以絹囊貯清酒四升漬四宿初服六七合加至一升日再服忌蕪荑桃李雀肉等並出第七卷中千金療肝勞虛寒脅下痛脹滿氣急眼昏濁視不明檳榔湯方生薑附子炮各七兩檳榔七枚合皮碎茯苓三兩桔梗四兩橘皮桂心各三兩白朮四兩吳茱萸五兩上九味切以水九升煮取三升去滓分為三服若氣喘加芎藭三兩半夏四兩洗甘草二兩炙忌酢物生蔥豬肉冷水海藻菘菜桃李雀肉等出第十一卷中膽實熱方二首刪繁療膽腑實熱精神不守瀉熱梔子煎方梔子二十一枚甘竹茹一兩熬香豉六合熬綿裹大青橘皮去脈各二兩赤蜜三合上六味細切以水六升煮取一升七合去滓下蜜更微火上煎兩三沸分再服出第四卷中千金療膽腑實熱精神不守瀉熱半夏千里水湯方半夏洗宿薑各三兩酸棗五合黃芩一兩遠志去心茯苓各二兩生地黃五兩秫米一斗上八味細切取流水五斗煮秫米令蟹目沸揚之三千下澄清取五升煮藥取二升半分為三服忌羊肉餳酢物蕪荑出第十二卷中髓虛實方二首刪繁論曰髓虛者腦痛不安髓實者勇悍凡髓虛實之應主於肝膽若其腑臟有病從髓生熱則應藏寒則應腑千金同出第三卷中千金療髓虛腦痛不安膽腑中寒羌活補髓丸方羌活芎藭當歸各三兩桂心二兩人參四兩酥一升棗肉一斤研為脂牛髓一升羊髓一升大麻仁二升熬研為脂上十味先搗五種干藥為散下棗膏麻仁又搗相濡為一家下二髓並酥納銅鉢中重湯煎之取好為丸如梧子酒服三十丸日再加至四十丸忌生蔥又療髓實勇悍驚熱主肝熱柴胡發泄湯方柴胡升麻黃芩細辛枳實炙梔子仁芒硝各三兩澤瀉四兩淡竹葉切一升生地黃切一升上十味切以水九升煮取三升去滓下芒硝分為三服忌生菜蕪荑並出第十二卷中咽門論並傷破聲嘶方二首千金論曰夫咽門者應五臟六腑往還神氣陰陽通塞之道也喉嚨胞囊舌者並津液調五味之氣本也不可不研乎咽門者肝膽之候也其重十兩廣二寸五分至胃管長一尺六寸主通五臟六腑津液神氣應十二時若臟熱咽門則閉而氣塞若腑寒咽門則破而聲嘶母薑酒主之熱則通之寒則補之若寒熱調和病不生矣刪繁同出第十二卷中又療咽閉主膽腑咽門傷破聲嘶母薑酒方母薑汁二升牛髓酥油各一升別煎取熱桂心秦椒各四分芎藭獨活各五分防風六分上九味將五物合搗下篩為散納薑汁中煎取相淹濡下髓酥油等攪令調微火上三上三下平旦溫清酒一升下二合膏細細吞之日三服忌生蔥刪繁同此方今録附此論後出第六卷中六極論一首刪繁論曰夫六極者天氣通於肺地氣通於嗌風氣應於肝雷氣動於心榖素問作谷氣感於脾雨氣潤於腎六經為川腸胃為海九竅為水注之於氣所以竅應於五臟五臟邪傷則六腑生極故曰五臟六極也出第八卷中筋極論一首刪繁論曰凡筋極者主肝也肝應筋筋與肝合肝有病從筋生又曰以春遇病為筋痹筋痹不已復感於邪內舍於肝陽氣入於內陰氣出於外凡陰氣外出出則虛虛則筋虛筋虛則善悲色青蒼白見於眼下而傷寒則筋不能動十指爪皆痛數好轉筋其源以春甲乙日得之於傷風風在筋為肝虛風也若陽氣內發發則實實則筋實筋實則善怒嗌乾傷熱則咳咳則脅下痛不能轉側又腳下滿痛故曰肝實風也然則因其輕而揚之因其重而減之因其衰而彰之審其陰陽以別柔剛陽病療陰陰病療陽善療病者病在皮毛肌膚筋脈而療之次療六腑若至五臟則半死半生矣扁鵲曰筋絶不治九日死何以知之手足爪甲青黑呼罵口不息筋應足厥陰足厥陰氣絶於筋則筋縮引卵與舌足厥陰者肝脈也肝者筋之合也筋者聚於陰器而脈絡於舌本故脈不營則筋急筋急則引卵與舌故唇青舌卷卵縮則筋先死庚篤辛死金勝木醫之拱手也千金同出第八卷中筋實極方四首刪繁療筋實極則好怒口乾燥好嗔身躁不定調筋止怒定氣黃耆湯方黃耆芎藭白柘皮無刺者各三兩白朮通草芍藥各四兩甘草炙桂心各二兩大棗四十枚擘去核石膏八兩碎綿裹竹葉切一升上十一味切以水九升煮取三升去滓分為三服忌海藻菘菜生蔥桃李雀肉等又療筋實極則咳咳則兩脅下縮痛痛甚則不可動轉橘皮通氣湯方橘皮四兩白朮石膏碎綿裹各五兩桂心細辛當歸茯苓各三兩香豉一升熬別裹上八味切以水九升煮取三升去滓分為三服忌桃李雀肉生蔥生菜酢物千金同並出第八卷中千金療筋實極則兩腳下滿而痛不得遠行腳心如割筋斷折痛不可忍丹參煮散方丹參十二分芎藭杜仲續斷地骨皮各八分通草當歸乾地黃麥門冬去心禹餘糧煉麻黃去節七分甘草炙桂心各五分牛膝九分生薑薄切炒取焦燥牡蠣各十分熬升麻六分上十七味搗下篩為散以絹袋子盛散二方寸匕以井華水二升煮數動絹囊子煮取一升為一服日再煮忌海藻菘菜生蔥蕪荑刪繁同又療筋實極則手足爪甲或青或黃或黑烏黯四肢筋急煩滿地黃煎方生地黃汁三升生葛汁一升澄清生玄參汁一升大黃二兩梔子仁升麻麻黃去節犀角屑各三兩石膏五兩碎芍藥四兩上一十味切以水七升煮取二升去滓下地黃汁一兩沸次下葛汁等煎取三升分為三服日再忌蕪荑刪繁肘後同並出第十一卷中筋虛極方二首刪繁療筋虛極則筋痹好悲思顏色蒼白四肢噓嗡腳手拘攣伸動縮急腹中轉痛五加皮酒方五加皮一斤枳刺二升㕮咀炙豬椒根皮丹參各八兩桂心當歸甘草炙各三兩天雄炮秦椒汗白蘚皮通草各四兩芎藭乾薑各五兩薏苡仁半升大麻仁三升研為末上十五味㕮咀以絹袋貯酒四斗漬春夏四宿秋冬六七宿初服六七合稍稍加之以知為度忌生蔥豬肉冷水海藻菘菜又療筋虛極傷風為風所傷入筋縮攣腰背不伸強直苦痛或為腳氣牛膝湯方牛膝防風甘李根皮丹參前胡各四兩石斛五兩杜仲秦艽續斷鱉甲炙各三兩陳橘皮二兩大麻仁二升熬研上十二味切以水一斗四升煮取五升去滓下麻仁更煎取二升分三服忌莧菜並出第八卷中筋虛胞轉方二首刪繁療筋虛實暴損絶極或因霍亂轉筋腹滿痛或因服藥吐利過度腳手虛轉腸胞轉痛人參湯方人參厚朴炙各二兩蔥白一虎口白朮四兩蓼一把長三升上五味切以水五升煮取二升去滓分再服忌桃李雀肉等又療胞轉筋急方白朮通草各四兩梔子仁子芩茯苓各三兩榆白皮三兩香豉一升熬綿裹上七味切以水七升煮取三升去滓分三服忌酢物桃李雀肉等並出第八卷中一方無香豉轉筋方七首範汪療轉筋方以鹽一升水一升半作湯洗漬良又療轉筋在兩臂若胸脅者方灸手掌白肉際七壯並出第八卷中刪繁療轉筋十指筋攣急不得屈伸灸法灸手踝骨上七壯良又扁鵲療轉筋脛骨痛不可忍方灸屈膝下廉筋上三壯又治轉筋方灸湧泉湧泉在腳心下當大拇指大筋灸七壯亦可灸大都在足大拇指本節內側白肉際灸七壯又腹腸轉筋方灸臍上一寸十四壯並出第八卷中近效療腳轉筋及渾身轉筋方暖水稍熱於浴斛中坐浸須臾便瘥如湯沃雪心勞論一首刪繁論曰凡心勞病者補脾氣以益之脾旺則感於心矣人逆夏氣則手太陽不長心氣內消順之則生逆之則死順之則治逆之則亂反順為逆是謂關格病則生矣心主竅竅主耳耳枯燥而鳴不能聽遠毛悴色夭死於冬出第七卷中心勞實熱方五首刪繁療心勞實熱好籠無度自喜四肢煩熱麻黃止煩下氣湯方麻黃去節梔子仁茯苓子芩白朮各三兩石膏八兩碎綿裹桂心二兩芒硝三兩生地黃切一升大棗三十枚雞子二枚甘草一兩炙赤小豆二合上十三味切以水一斗煎和下雞子白攪調去沫下諸藥煮取二升五合去滓下竹瀝芒硝煎一沸分為三服忌生蔥酢物桃李雀肉海藻菘菜等前無竹瀝復下竹瀝恐有失又療心勞熱口為生瘡大便難閉塞不通心滿痛小腹熱大黃泄熱湯方大黃澤瀉黃芩梔子仁芒硝各二兩桂心二兩大棗三十枚石膏八兩碎綿裹甘草一兩炙上九味切以水九升先取一升水別漬大黃一宿以餘八升煮諸藥取二升五合去滓下大黃更煮兩沸去大黃滓下芒硝分為三服忌海藻生蔥菘菜又療心勞熱傷心有長蟲名蠱蟲長一尺周心為病雷丸丸方雷丸熬橘皮石蠶炙桃皮炙各五分狼牙六分貫衆二枚蕪荑熬青葙子蜀漆各四分殭蠶三七枚熬茱萸根皮七分亂髮如雞子大燒末上十二味蒸切搗篩白蜜和為丸如梧子清白飲一服七丸不覺更加至二七丸為度日再又療心勞熱心主竅竅主耳耳枯焦而鳴不能聽遠磁石湯方磁石五兩碎綿裹茯苓大青人參白朮菖蒲芍藥各三兩竹葉切一升赤石脂二兩綿裹上九味切以水九升煮取二升五合去滓分為三服忌羊肉餳酢物桃李雀肉等本方無芍藥又療心勞熱不止肉毛焦色無潤口赤乾燥心悶麥門冬飲方生麥門冬一升去心陳粟米一升雞子二七枚取白淡竹葉切三升上四味先以水一斗八升煮粟米竹葉取九升去滓澄清接取七升冷下雞子白攪五百轉去上白沫下麥門冬煮取三升去滓分三服並出第七卷中心實熱方三首千金瀉心湯療心實熱或欲吐吐而不出悶喘急頭痛方小麥三升香豉一升綿裹石膏一斤碎綿裹地骨皮五兩梔子仁二十一枚茯苓二兩淡竹葉切一升上七味切以水一斗五升煮小麥竹葉取八升澄清下諸藥煮取三升去滓分溫三服忌酢物本名石膏湯又療心實熱驚夢喜恐畏悸懼不安竹瀝湯方淡竹瀝一升石膏八兩碎綿裹人參知母去毛赤石脂梔子仁芍藥白朮各三兩茯神紫菀各二兩生地黃汁二升上十一味切以水九升煮十味取二升七合去滓下竹瀝更煎取三升若須利下芒硝二兩去芍藥分為三服忌桃李雀肉酢物蕪荑又茯神煮散主心實熱口乾煩渴眠臥不安方茯神麥門冬去心各六分通草六分升麻五分淡竹茹一丸如雞子大熬知母四分去毛赤石脂七分紫菀桂心各三分大棗二十枚擘上十味搗粗篩為散取方寸匕帛裹之以井華水二升半煮取九合時動藥裹子平旦為一服日再服忌生蔥酢物並出第十三卷中脈極論一首刪繁論曰凡脈極者主心也心應脈脈與心合心有病從脈起又曰以夏遇病為脈痹脈痹不已復感於邪內舍於心則食飲不為肌膚顏脫面色白不澤其脈空虛口唇見赤色凡脈氣衰血焦發墮以夏丙丁日得之於傷風風損脈為心風心風狀汗多若脈氣實則熱熱則傷心使人好怒口為色赤甚則言語不快血脫色乾燥不澤食飲不為肌膚若脈氣虛則寒寒則咳咳則心痛喉中介介如哽甚則咽腫喉痹故曰心風虛實候也若陽經脈病療陰絡陰絡脈病療陽經定其血氣各守其鄉脈實宜瀉氣虛宜補善療病者病在皮毛肌膚筋脈則全療之至六腑五臟則半死半生扁鵲曰脈絶不療三日死何以知之脈氣空虛則衰顏焦發落脈應手少陰手少陰氣絶則脈不通手少陰者心脈也心者脈之合也脈不通則血不流血不流則髮色不澤故面黑如漆柴則血脈先死壬篤癸死水勝火故非治藥所效也出第八卷中千金同脈熱極方三首刪繁療脈實熱極血氣傷心使心好生赫怒口為色變赤言語不快消熱止血氣調脈理中茯苓湯方茯苓黃芩梔子仁芒硝各五兩赤石脂升麻紫菀各二兩生麥門冬五兩去心竹葉切一升香豉一升熬石膏八兩碎綿裹生地黃切一升上十二味切以水九升煮取二升去滓下芒硝分為三服忌酢物蕪荑又療脈極熱傷風損脈為心風心風狀多汗無滋潤消虛熱極止汗麻黃湯方麻黃去節杏仁各四兩去皮尖兩仁碎梔子仁黃芩防風紫菀各三兩升麻桂心茯神人參各三兩大棗二十枚擘石膏六兩碎綿裹桑根白皮一升上十三味切以水一斗先煮麻黃三沸去沫下諸藥煮取三升去滓分為三服忌生蔥酢物又療脈熱極遇風為痹痹感心顏脫面色白不澤脈空虛口唇色赤乾燥升麻潤色消痹止熱極湯方升麻射干芎藭人參各三兩赤小豆五合生薑四合麥門冬去心四兩葳蕤四兩生地黃切一升甘草二兩炙竹葉切一升上十一味切以水一斗煮取二升去滓分為三服忌海藻菘菜蕪荑並出第八卷中脈寒極方四首刪繁療脈極虛寒則咳咳則心痛喉中介介如哽甚則咽腫喉痹半夏消痛止極益氣湯方半夏一升洗四破宿薑八兩芎藭細辛附子炮玄參當歸各三兩桂心甘草炙茯苓各二兩杏仁六十枚去兩仁皮尖碎上十一味切以水一斗煮取三升去滓分溫三服忌羊肉餳生蔥菜豬肉冷水菘菜海藻酢物等又療脈極虛寒鬢髮墮落安發潤生桑白皮沐頭方桑白皮二升細切上一味以水淹漬煮五六沸去滓洗沐鬢髮數數為之自不復落又方麻子三升研白桐葉切一把上二味以淘米甘汁二斗煮取五六沸去滓以洗沐頭則鬢髮不落而長又療發墮落方生柏葉一升附子四枚炮豬膏三斤上三味末以膏三斤和為三十丸用布裹一丸納煎沐頭汁中令髮長不復落也並出第八卷中脾勞論一首刪繁論曰凡脾勞病者補肺氣以益之肺旺則感脾是以聖人春夏養陽秋冬養陰以順其根矣肝心為陽脾肺腎為陰一云太陰陽明為根逆其根則伐其本陰陽四時者萬物之始終也千金同出第七卷中脾勞實熱方四首刪繁療脾勞熱身體眼目口唇悉痿黃舌木強直不能得咽唾生地黃煎方生地黃汁三升赤蜜石膏各一升碎綿裹升麻射干子芩各三兩生玄參八兩梔子仁葳蕤各四兩甘草二兩炙上十味切以水七升先煮石膏等取二升去滓下生地黃汁更煎取四升綿捩分為四服若須利泄加芒硝三兩分為三服餘一服停下芒硝留晚若熱不止更進服之得利泄止後一服也忌海藻菘菜蕪荑又療脾勞熱有白蟲長一寸在脾為病令人好嘔胸中塞嘔而不出前胡吐熱湯方前胡白朮赤茯苓枳實炙細辛旋覆花龍膽杏仁去尖皮雙仁常山松蘿各三兩竹葉切一升上十一味切以水一斗煮取三升去滓分為三服若腹中熱滿加芒硝山梔子仁黃芩各三兩苦參二兩加水二升忌酢物桃李雀肉生蔥生菜又療脾勞熱有白蟲在脾中為病令人好嘔茱萸根下蟲酒方東行茱萸根大者一尺大麻子八升橘皮二兩切上三味銼茱萸根搗麻子並和以酒一斗漬一宿微火上薄暖之三上三下絞去滓平旦空腹為一服取盡蟲便下出或死或半