耳聾夢腰脊離解及伏水等氣急瀉腎湯方黃芩三兩磁石八兩碎如雀頭綿裹大黃三兩切以水一升密器中漬一宿甘草炙二兩茯苓三兩芒硝三兩生地黃取汁菖蒲各五兩玄參四兩細辛二兩上十味切以水九升煮七物取二升五合去滓納大黃更煮取二升三合去大黃滓下地黃汁微火上煎一兩沸下芒硝分為三服忌海藻菘菜羊肉餳生菜酢物蕪荑出第十九卷中腎勞虛寒方二首刪繁療腎勞虛寒關格塞腰背強直飲食減少日日氣力羸人參補腎湯人參甘草炙桂心橘皮茯苓各三兩杜仲白朮各四兩生薑五兩羊腎一具去膏四破豬腎一具去膏四破薤白切一升上十一味切以水三斗煮取六升去滓分為六服晝四夜二服覆頭眠忌海藻菘菜生蔥酢物桃李雀肉等又療腎虛寒損耳鳴好唾欠呿委頓羊腎補腎湯方羊腎一具細切磁石碎綿裹白朮各八兩黃耆茯苓乾薑各四兩桂心三兩上七味切以水三斗煮取七升絞去滓分服一升晝四服夜三服燥器貯之六月減水忌生蔥桃李雀肉酢等物並出第八卷中腎勞熱方二首千金療腎勞熱陰囊生瘡麻黃根粉方麻黃根三兩石硫黃三兩研米粉五合上三味搗下篩合研安絮如常用粉法折瘡上粉濕更折之刪繁肘後同出第十九卷中刪繁療勞熱四肢腫急少腹滿痛顏色黑黃關格不通鱉甲湯方鱉甲炙麻黃去節升麻前胡羚羊角屑各三兩桑根白皮五兩薤白切一升香豉一升熬綿別裹黃芩三兩上九味切以水一斗煮取三升去滓分為三服忌莧菜出第八卷中腎熱方三首刪繁療腎熱四肢腫急有蟯蟲如果中蟲生在腎為病貫衆散方貫衆大者三枚切熬乾漆三兩熬吳茱萸五十粒蕪荑熬胡粉熬槐皮燒各四分杏仁四十枚去尖皮熬研上七味搗篩和胡粉研平旦以井華水調服方寸匕並出第八卷中千金療腎熱好忘耳聽無聞四肢滿急腰背動轉強直方柴胡茯苓本方云茯神澤瀉黃芩磁石碎綿裹升麻杏仁去尖皮兩仁者大青芒硝各三兩生地黃切一升羚羊角四兩屑淡竹葉切一升上十二味切以水一斗煮取三升去滓下芒硝分為三服日再忌酢物又療腎熱小便黃赤不出出如梔子汁輒如黃柏汁每欲小便即莖頭痛方榆白皮切三升滑石八兩碎子芩瞿麥通草各三兩石葦四兩拭去毛冬葵子一升車前草切二升上八味切以水二斗煮車前草取一斗去滓澄清取九升下諸藥煮取三升五合去滓溫分四服並出第十九卷中骨極論一首刪繁論曰凡骨極者主腎也腎應骨骨與腎合又曰以冬遇病為骨痹骨痹不已復感於邪內舍於腎耳鳴見黑色是其候也凡腎病則骨極牙齒苦痛手足悁疼不能久立屈伸不利身痹腦髓酸以冬壬癸日中邪傷風為腎風風歷骨故曰骨極若氣陰陰則虛虛則寒寒則面腫垢黑腰脊痛不能久立屈伸不利其氣衰則發墮齒稿腰背相引而痛痛甚則咳唾若氣陽陽則實實則熱熱則面色炲隱曲膀胱不通牙齒腦髓苦痛手足酸悁耳鳴色黑是骨極之至也須精別陰陽審其清濁知其分部視其喘息善療病者病始於皮毛肌膚筋脈即須療之若入六腑五臟則半生半死矣扁鵲曰骨絶不治悁而切痛伸縮不得十日死骨應足少陰足少陰氣絶則骨枯足少陰者冬脈也伏行而濡滑骨髓者也故骨不濡則肉不能著骨也骨肉不相親則肉濡而卻肉濡而卻故齒長而垢發無澤發無澤則骨先死戊篤巳死土勝水醫所不能療千金同並出第八卷中骨極實方四首刪繁療骨極主腎實熱病則色炲隱曲膀胱不通大便壅塞四肢滿急干棗湯方干棗十枚擘去核大黃大戟切炒令黃甘草炙甘遂黃芩各一兩芫花半兩炒芒硝二兩蕘花半兩炒上九味切以水五升煮取一升六合後下芒硝分為四服忌海藻菘菜出第八卷中千金療骨極主腎熱病則膀胱不通大小便閉塞面顏枯黑耳鳴虛熱三黃湯方大黃切別漬水一斗黃芩芒硝各三兩梔子十四枚甘草一兩炙上五味切以水四升先煮三物取一升五合去滓下大黃更煎兩沸下芒硝分為三服忌海藻菘菜刪繁同出第十九卷中又療骨實痠疼苦煩熱煎方葛根汁一升生地黃汁一升生麥門冬汁一升赤蜜上四味汁相攪調微火上煎之三沸分三服忌蕪荑又療骨髓中疼方芍藥一斤生地黃五斤虎骨四兩炙上三味切以酒一斗漬三宿曝乾後入酒如此取酒盡為度搗篩酒服方寸匕日三忌蕪荑出第十九卷中骨極虛方七首刪繁骨極虛寒主腎病則面腫垢黑腰脊痛不能久立屈伸不利夢寤驚悸上氣少腹裡急痛引腰腰脊四肢常苦寒冷大小便或白腎瀝湯方羊腎一具豬腎亦得芍藥麥門冬去心乾地黃當歸各三兩乾薑四兩五味子二合人參茯苓甘草炙芎藭遠志去心各二兩黃芩一兩桂心六兩大棗二十枚擘上十五味切以水一斗五升煮腎取一斗除腎納藥煮取四升去滓分為四服晝三夜一若遺小便加桑螵蛸二十枚炙忌海藻菘菜生蔥酢物蕪荑又灸法扁鵲曰第十八椎名曰小腸俞主小便不利少腹脹滿虛乏兩邊各一寸五分隨年壯灸之主骨極並出第八卷中千金療骨虛痠疼不安好倦主膀胱寒虎骨酒方虎骨一具並通炙取黃焦汁盡碎之如雀頭大釀米三石曲四斗水三石如常釀酒法所以加水曲者其骨消曲而飲水也酒熟封頭五十日開飲又療虛勞冷骨節痛無力方豉二斗地黃八斤切上二味再通蒸曝乾搗篩食後以酒一升服二方寸匕再服亦療虛熱等疾忌蕪荑又虛勞體疼方天門冬為散酒服方寸匕日三二百日瘥忌鯉魚又方地黃一石取汁酒二斗相攪重煎溫服日三補髓忌蕪荑又療骨髓冷疼痛灸法灸上廉七十壯三里下三寸是並出第十九卷中精極論並方三首刪繁論曰凡精極者通主五臟六腑之病候也若五臟六腑衰則形體皆極目視無明齒焦而發落身重則腎水生耳聾行步不正邪風逆於六腑淫虛厥於五臟故曰精極也凡陽邪害五臟陰邪損六腑陽實則從陰引陽陰虛則從陽引陰若陽病者主高高則實實則熱眼視無明齒焦發脫腹中滿滿則歷節痛痛則宜瀉於內若陰病者主下下則虛虛則寒體重則腎水生耳聾行步不正邪氣入內行於五臟則咳咳則多涕唾面腫氣逆所以形不足者溫之以氣精不足者補之以味善療精者先療肌膚筋脈次療六腑五臟若邪至五臟則半死半生矣扁鵲曰五陰氣俱絶不可療絶則目系轉轉則目精奪為志先死遠至一日半日矣非醫所及也宜須精研以表療里以左療右以右療左以我知彼疾皆瘥也千金同並出第八卷中千金療精極實熱眼視無明齒焦發落形衰體痛通身虛熱竹葉黃芩湯方竹葉切三升黃芩茯苓各三兩生薑六兩麥門冬去心甘草炙大黃各二兩芍藥四兩生地黃切一升上九味切以水九升煮取三升去滓分為三服忌酢物海藻菘菜蕪荑刪繁同又療精極五藏六腑俱損傷虛熱遍身煩疼骨中悁痛煩悶方生地黃汁二升生麥門冬汁赤蜜竹瀝各一升石膏八兩碎人參三兩芎藭三兩甘草一兩炙黃芩三兩當歸四兩桂心四兩麻黃二兩去節上十二味切以水七升先煮八物取二升去滓下地黃汁等煮取四升分四服日三夜一忌海藻菘菜生蔥蕪荑刪繁桂三兩刪繁同並出第十九卷中虛勞失精方五首病源腎氣虛損不能藏精故精漏失其病少腹弦急陰頭寒目眶痛發落診其脈數而散者失精脈也凡脈芤動微緊男子失精出第四卷中深師人參丸療虛勞失精方人參二兩桂心牡蠣熬薯蕷黃柏細辛附子炮苦參各三分澤瀉五分麥門冬去心乾薑乾地黃各四分菟絲子二分上十三味搗合下篩和以白蜜為丸酒服如梧子大三丸痹加附子一分炮婦人血崩加乾地黃好者二分一本云黃柏四分忌豬肉冷水生蔥生菜蕪荑出第三卷中範汪療男子虛失精三物天雄散方天雄三兩炮白朮八分桂心六分上藥搗下篩服半錢匕日三稍稍增之忌豬肉冷水桃李雀肉生蔥張仲景方有龍骨文仲同出第六十八卷中千金療男子虛勞失精陰縮灸法灸中封五十壯又男子虛勞失精陰上縮莖中痛方灸大赫三十壯穴在夾屈骨端三寸並出第十九卷中以上灸穴尺寸遠近具在第三十九卷中古今録驗療虛損失精黃耆湯方黃耆當歸甘草炙各二兩桂心六兩蓯蓉石斛各三兩干棗百三十枚白蜜二升上八味切以水一斗煮取四升納蜜煎取三升分為四服日三夜一以食相間忌海藻菘菜生蔥範汪同出第三卷中虛勞尿精方八首病源虛勞尿精者腎氣衰弱故也腎藏精其氣通於陰勞傷腎虛不能藏其精故因小便而精液出也出第四卷中深師療男子尿精方栝蔞根澤瀉土瓜根各二兩上三味搗合下篩以牛膝和為丸如梧子先食服三丸良範汪云用四分余並同又尿精小便白濁夢泄韭子散方韭子菟絲子車前子各一升附子三枚炮當歸芎藭礬石燒各三兩桂心一兩上八味搗合下篩溫酒服方寸匕日三亦可蜜和為丸酒服如梧子大五丸忌豬肉冷水生蔥千金同出第三卷中千金療虛勞尿精方韭子二升糯米一升上二味以水一斗七升煮如粥取汁六升分為三服精溢同此又方柘白皮五合桑白皮五合切上二味切以酒五升煮取三升分為三服一方柘白皮作石榴皮又方干膠二兩炙上一味搗末酒二升和溫分三服瘥一方用鹿角膠又方新韭子二升十月霜後採上一味好酒八合漬一宿明旦日色好童子向南搗一萬杵平旦溫酒五合服方寸匕日再服又小便失精及夢泄精方韭子一升熬麥門冬一升去心菟絲子二合車前子二合芎藭二兩白龍骨三兩上六味搗篩以酒服方寸匕日三不知稍稍增之甚者夜一服肘後用澤瀉一兩半並出第十九卷中古今録驗棘刺丸療男子百病小便過多失精方棘刺二兩麥門冬去心萆薢厚朴炙菟絲子柏子仁蓯蓉桂心石斛小草細辛杜仲牛膝防葵乾地黃各一兩石龍芮二兩巴戟天二兩烏頭半兩炮削去皮上十八味搗下篩以蜜雜雞子黃各半和之搗五六千杵以飲服如梧子十丸日三稍稍增至三十丸以知為度忌豬肉冷水生蔥生菜千金有葳蕤深師同並出第十卷中虛勞夢泄精方一十首病源腎虛為邪所乘邪客於陰則夢交接腎藏精今腎虛弱不能制於精故因夢感動而泄也出第四卷中深師韭子丸療虛勞夢泄精方韭子五合熬大棗五枚黃耆人參甘草炙乾薑當歸龍骨半夏洗芍藥各三兩上十味搗合下篩和以白蜜棗膏丸如梧子服十丸日三四忌海藻菘菜羊肉餳千金同又棘刺丸療虛勞諸氣不足數夢或精自泄方棘刺天門冬去心各二兩乾薑菟絲子烏頭炮小草防葵薯蕷石龍芮枸杞子巴戟天萆薢細辛葳蕤石斛厚朴炙牛膝桂心各二兩上十八味搗合下篩和以蜜雞子白各半相和丸如梧子先食服五丸日三若患風痿痹氣體不便熱煩滿少氣消渴枯悴加葳蕤天門冬菟絲子身黃汗小便赤黃不利加石龍芮枸杞子關節腰背痛加萆薢牛膝寒中氣脹時泄數唾嘔吐加厚朴乾薑桂心陰囊下濕精少小便餘瀝加石斛以意增之菟絲子酒漬之經一宿後有一方十四物長陰加肉蓯蓉磁石其説小異故兩存焉忌豬肉冷水生蔥菘菜鯉魚等又鹿角湯療勞夢泄精方鹿角一具屑韭白半斤生薑一斤芎藭茯苓各二兩當歸鹿茸炙各二兩白米五合上八味切先以水五斗煮鹿角取一斗二升去滓納諸藥煮取四升分服一升日三夜一鹿角唯取肥而解者打令碎也忌酢物又桂心湯療虛喜夢與女邪交接精為自出方一名喜湯桂心牡蠣熬芍藥龍骨甘草各二兩炙大棗三七枚一方十枚生薑五兩上七味㕮咀以水八升煎取三升去滓溫分三服忌海藻菘菜生蔥範汪同並出第三卷中千金療夢泄失精尿後餘瀝尿精方人參麥門冬去心赤石脂遠志去心續斷鹿茸炙各六分茯神一雲茯苓龍齒炙磁石研蓯蓉各八分乾地黃十二分丹參韭子熬柏子仁各五分上十四味搗篩蜜和丸如梧子以酒服二十丸日再稍稍加至三十丸忌酢物蕪荑又療夢失精方韭子一升熬上一味搗篩以酒服方寸匕日再神效並出第十九卷中古今録驗石斛散療男子夢泄精方石斛七分桑螵蛸紫菀各二分乾漆熬五味子乾地黃鍾乳研遠志皮附子各二分炮上九味搗合下篩以酒服方寸匕漸漸增至二匕日三服忌豬肉冷水蕪荑出第十卷中小品龍骨湯療夢失精諸脈浮動心悸少急隱處寒目眶疼頭髮脫者常七日許一劑至良方龍骨甘草炙各二分牡蠣三分熬桂心芍藥各四分大棗四枚擘生薑五分上七味切以水四升煮取一升半分再服虛羸浮熱汗出者除桂加白薇三分附子三分炮故曰二加龍骨湯忌海藻菘菜生蔥豬肉冷水又薰草湯療夢失精方薰草人參乾地黃白朮芍藥各三兩茯神桂心甘草炙各二兩大棗十二枚擘上九味切以水八升煮取三升分為二服每服如人行四五里一方又有茯苓三兩忌桃李雀肉大酢海藻菘菜生蔥一本無薰草人參又有薰草人參龍骨別是一方範汪同並出第三卷中集驗灸丈夫夢泄法灸足內踝上一寸一名三陰交二七壯兩腳皆灸內踝踝大脈並四指是範汪文仲同出第五卷中
