body:
  text: 卷第二傷寒中風方九首臣億等按傷寒論傷寒中風自是兩疾今云傷寒中風非病源中風傷寒之狀太陽中風陽浮陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風熻熻發熱鼻鳴乾嘔此其候也太陽中風以火劫發其汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身即發黃陽盛則欲衄陰虛小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語荒語也本作譫甚者至噦手足躁擾循衣摸床小便利者其人可療陽明中風口苦而咽乾腹滿微喘發熱惡寒脈浮緊若下之則腹滿小便難陽明病若能食為中風不能食為中寒少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下之則悸而驚太陽中風四肢煩疼其脈陽微陰澀而長者為欲愈少陰中風其脈陽微陰浮者為欲愈厥陰中風其脈微浮者為欲愈不浮為未愈仲景傷寒論同並出第七卷中仲景傷寒論桂枝湯療太陽中風陽浮陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風熻熻發熱鼻鳴乾嘔方桂枝芍藥生薑各三兩甘草二兩炙大棗十二枚擘上五味切姜擘棗次切余藥以水七升煮棗令爛去滓乃納諸藥水少者益之煮令微微沸得三升去滓服一升日三小兒以意減之初一服便得汗出者後服小小闊其間如不得汗者小小促之令其藥勢相及汗出自護如服六物青散法若病重者晝夜服特須避風若服一劑晬時不解病證不變者當更服之至有不肯汗出服二三劑乃愈服此藥食頃亦當飲熱粥以助藥力若初得病甚便以火發汗火氣太過汗出不解煩躁不得寐因此湯加龍骨牡蠣各三兩減桂心生薑各一兩不用芍藥若虛勞裡急腹中痛者取前桂枝湯二升加膠飴一升適寒溫分再服若得大汗出者只用桂枝二兩發汗後重發汗亡陽譫語其脈反和者不死發汗已解半日許重發煩其脈浮數可復發汗宜桂枝湯方忌海藻生蔥菘菜等在上出第二卷中千金胡洽集驗文仲備急範汪同又療傷寒頭疼腰痛身體骨節疼發熱惡風汗不出而喘麻黃湯方麻黃三兩去節桂心二兩甘草炙一兩杏仁七十枚去皮尖兩仁碎上四味切以水九升煮麻黃減二升去上沫納諸藥煮取二升半去滓服八合覆取微汗不須歠粥余如桂枝法將息忌海藻菘菜生蔥臣億等按張仲景傷寒論麻黃湯惟主傷寒不主中風若中風但可服前桂枝湯又療太陽病項背強𠘧𠘧反汗不出惡風者屬葛根湯方葛根四兩麻黃四兩去節甘草二兩炙芍藥桂心各二兩生薑三兩大棗十二枚擘上七味切以水一斗煮麻黃葛根減二升去上沫納諸藥煮取三升去滓溫服一升覆取微似汗出不須吃熱粥助藥發汗余將息依桂枝法忌海藻菘菜生蔥並出第三卷中張仲景傷寒論治中風汗出用桂枝此證云汗不出亦傷寒之病非中風也小品葳蕤湯療冬溫及春月中風傷寒則發熱頭眩痛喉咽干舌強胸內疼心胸痞結滿腰背強方葳蕤二兩石膏三分末綿裹白薇二兩麻黃二兩去節獨活二兩杏仁二兩去皮尖兩仁芎藭二兩甘草二兩炙青木香二兩無可用麝香一分代之上九味切以水八升煮取三升分三服取汗若一寒一熱者加朴硝一分及大黃三兩下之忌海藻菘菜並出第六卷中古今錄驗同一方有葛根二兩千金療傷寒中風五六日以上但胸中煩乾嘔栝蔞實湯方栝蔞實一兩柴胡半斤黃芩三兩甘草三兩炙生薑四兩切大棗十枚擘破上六味切之勿令大碎吹去末以水一斗二升煮得六升絞去滓更煎取三升適寒溫服一升日三服忌海藻菘菜出第十卷中千金翼療中風發熱六七日不解而煩有表裡證渴欲飲水飲水而吐此為水逆五苓散主之方豬苓三分澤瀉五分茯苓三分桂心二分白朮三分上五味搗篩水服方寸匕日三多飲暖水汗出愈忌桃李醋物生蔥雀肉等又傷寒中風醫反下之其人下利日數十行水穀不化腹中雷鳴心下痞堅而滿乾嘔心煩不能得安醫見心下痞以為病不盡復重下之其痞益甚此非結熱但以胃中虛客氣上逆故使之堅甘草瀉心湯主之方甘草四兩炙黃芩三兩大棗十二枚擘黃連一兩乾薑二兩半夏半升洗去滑上六味切以水一斗煮取六升分六服忌海藻菘菜豬羊肉餳並出第九卷中一方有人參三兩古今錄驗療中風傷寒脈浮發熱往來汗出惡風項頸強鼻鳴乾嘔陽且湯主之方大棗十二枚擘桂枝三兩芍藥三兩生薑三兩甘草三兩炙黃芩二兩上六味㕮咀以泉水六升煮取四升分四服日三自汗者去桂心加附子一枚炮渴者去桂加栝蔞三兩利者去芍藥桂加乾薑三兩附子一枚炮心下悸者去芍藥加茯苓四兩虛勞裡急者正陽且主之煎得二升納膠飴半升分為再服若脈浮緊發熱者不可與也忌海藻菘菜生蔥等物千金同又大青龍湯療太陽中風脈浮緊發熱惡寒身疼痛汗不出而煩躁方麻黃六兩去節桂枝二兩甘草二兩炙石膏如雞子大碎綿裹生薑三兩杏仁四十枚去兩仁及尖皮大棗十枚擘上七味切以水九升先煮麻黃減二升去沫乃納諸藥煮取三升去滓分服一升厚覆取微汗汗出多者溫粉粉之一服汗者不可再服若復服汗多亡陽遂虛惡風煩燥不得眠也忌海藻菘菜生蔥等物並出第二卷中張仲景傷寒論雲中風見傷寒脈者可服之傷寒結胸方七首一十二法病源結胸者謂熱毒氣結聚於心胸也此由病發於陽而早下之熱氣乘虛而痞結不散也按之痛其脈寸口浮關上反自沉是也脈大不可下下之則死脈浮而大下之為逆若陽脈浮關上細小沉緊而飲食如故時小便利者名為臟結臟結病舌上白苔滑者為難療不往來寒熱其人反靜舌上不苔者不可攻之出第七卷中張仲景傷寒論問曰病有結胸有臟結其狀如何答曰按之痛寸脈浮關脈沉名結胸也問曰何謂臟結答曰如結胸狀飲食如故時時下利寸口脈浮關上小細而沉緊名臟結舌上白苔滑者為難治臟結無陽證不往來寒熱其人反靜舌上苔滑者不可攻也病發於陽而反下之熱入因作結胸病發於陰而反下之一作汗之因作痞也所以成結胸者以下之太早故也結胸證悉具煩躁者亦死結胸證其脈浮大者不可下也下之則死夫結胸病項亦強如柔痓狀下之則和宜大陷胸丸方蜀大黃半斤葶藶子半升熬杏仁半升去皮尖熬令赤黑色芒硝半升上四味搗篩二味杏仁合芒硝研如泥和散合和丸如彈子大每服一丸用甘遂末一錢匕白蜜一兩水二升同煮取一升溫頓服之一宿乃自下如不下更服取下為效千金翼同又太陽病脈浮動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒表未解也醫反下之動數變遲膈內拒痛一雲頭痛即眩胃中空虛客熱動膈短氣煩躁心內懊憹陽氣內陷心下因堅則為結胸大陷胸湯主之若不結胸但頭汗出余處無汗劑頸而還小便不利身必發黃大陷胸湯方蜀大黃六兩甘遂末一錢匕芒硝一升上三味以水六升先煮大黃取二升去滓納芒硝煮一兩沸納甘遂末溫服一升得快利止後服千金翼同又傷寒六七日結胸熱實脈沉緊心下痛按之石堅大陷胸湯主之方依前法但結胸無大熱者此水結在胸脅也但頭微汗出者大陷胸湯主之方依前法又傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯大柴胡湯方柴胡半斤枳實四枚炙生薑五兩黃芩三兩芍藥三兩半夏半升洗大棗十二枚擘上七味切以水一斗二升煮取六升去滓更煎取三升溫服一升日三服一方加大黃二兩若不加大黃恐不名為大柴胡湯忌羊肉餳千金翼古今錄驗同又太陽病二三日不能臥但欲起心下必結脈微弱者本有久寒也而反下之若利止者必作結胸未止者四日復下之此作恊熱利也又太陽病下之其脈促不結胸者此為欲解也若心下滿硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之也宜半夏瀉心湯主之方半夏半升洗乾薑三兩人參三兩甘草三兩炙黃連一兩大棗十二枚擘黃芩三兩上七味切以水一斗煮取六升去滓溫服一升日三若須大陷胸湯服者如前法忌羊肉餳海藻菘菜豬肉冷水等千金翼同一方半夏五兩又小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之方黃連一兩上好者栝蔞實一枚大者破半夏半升洗上三味切以水六升煮栝蔞實取三升去滓納諸藥煮取二升去滓溫分三服忌羊肉餳豬肉千金翼同又病在太陽應以汗解之反以冷水潠之若灌之其熱卻不得去彌更益煩皮上粟起意欲飲水而反不渴者服文蛤散若不瘥者與五苓散用前篇方士弱氏曰熱得冷水之氣約退而後卻也又寒實結胸無熱證者與三物小陷胸湯方如前法白散亦可服文蛤散方士弱氏曰龐安常云無熱證者與三物白散小陷胸湯治熱白散治寒旨哉言乎文蛤五兩上一味搗篩為散以沸湯和一方寸匕服之湯用五合千金翼同又白散方桔梗三分貝母三分巴豆一分去心及皮熬令黑赤別研如脂上三味搗篩更於臼內搗之以白飲和服強人半錢匕羸人減之病在膈上則吐在膈下則利利不止飲冷粥一杯止忌豬肉蘆筍等並出第四卷中千金翼同傷寒嘔噦方一十四首病源傷寒病後胃氣不和此由初受病時毒熱氣盛多服冷藥瀉下及飲冷水病折以後熱勢既退冷氣乃動故使心下堅牢噫噦食臭腹內雷鳴而泄利此由脾胃氣虛冷故也出第八卷中仲景傷寒論療嘔噦心下悸痞硬不能食小半夏湯方半夏一升洗生薑八兩去皮上二味切以水七升煮取一升半去滓分再服忌羊肉餳又療嘔噦心下痞硬者以膈間有水頭眩悸半夏加茯苓湯方半夏一升洗生薑八兩去皮茯苓三兩上三味切以水七升煮取一升半去滓溫分再服忌羊肉餳酢等物又療胸內似喘不喘似嘔不嘔似噦不噦心中憒憒然徹無聊賴者生薑汁半夏湯兼主天行方生薑汁一升半夏半升洗切上二味以水三升煮半夏取一升納薑汁取一升半綿漉小冷分二服一日一夜服令盡嘔噦一服得止者停後服忌羊肉餳救急同又療乾嘔噦若手足厥冷者小橘皮湯兼主天行方橘皮四兩生薑八兩去皮上二味狹長切以水七升煮取三升去滓小冷服一升下咽則愈救急同出第十六卷中深師療傷寒病啘不止甘草湯方兼主天行甘草三兩炙橘皮三兩上二味切以水五升煮取一升去滓頓服之日三四服取瘥忌海藻菘菜崔氏同又半夏散方半夏洗焙乾上一味末之生薑湯和服一錢匕忌羊肉餳等又赤蘇湯方赤蘇一把上一味水三升煮取一升去滓稍稍飲之肘後同又幹姜丸方乾薑六分附子四分炮上二味搗篩以苦酒丸如梧子服三丸日三服酒飲下皆得忌豬肉肘後同又療傷寒噦甘竹茹湯方甘竹茹四兩生白米一升上二味以水八升煮之取米熟湯成去滓分服徐徐服療風熱氣噦甚神驗諸噦亦佳又療傷寒嘔噦胸滿虛煩不安大橘皮湯方橘皮一兩甘草一兩炙生薑四兩人參二兩上四味切以水六升煮取二升去滓分三服忌海藻菘菜並出第十四卷中小品茅根橘皮湯療春夏天行傷寒胃冷變啘方白茅根切一升橘皮三兩桂心二兩切上三味切以水六升煮取三升去滓溫分三服數數服之盡復合之啘止乃停取微汗有熱減桂心一兩忌生蔥文仲同出第六卷中一方有葛根二兩千金療傷寒後嘔噦及乾嘔不下食生蘆根飲方生蘆根切一升青竹茹一升粳米三合生薑二兩切上四味以水七升先煮千里鞋底一隻取五升澄清下藥煮取二升半去滓隨意便飲不瘥重作又療傷寒後嘔噦通草湯方通草三兩生蘆根切一升橘皮一兩粳米三合上四味切以水五升煮取二升去滓隨意便稍飲不瘥更作取瘥止古今錄驗文仲同出第十卷中千金翼乾嘔吐涎沫而頭痛茱萸湯主之方吳茱萸一升炒大棗十二枚擘生薑六兩切人參三兩細銼上四味以水五升煮取二升去滓分服七合日三仲景同出第十卷中此張仲景傷寒論方傷寒咽喉痛方八首病源傷寒病過經而不愈脈反沉遲手足厥逆者此為下部脈不至陰陽隔絕邪客於足少陰之經毒氣上熏故喉咽不利或痛而生瘡出第七卷中仲景傷寒論少陰病咽喉痛者半夏散及湯主之方半夏洗甘草炙桂心上三味等分各搗篩畢更合搗之以白飲服方寸匕日三服若不能服散者水一升煮七沸納散兩匕更煮三沸下火令小冷少少含細嚥之半夏有毒不當散服之忌羊肉生蔥海藻菘菜餳千金翼同出第六卷中文仲療傷寒毒攻喉咽腫痛方兼主天行切商陸炙令熱以布藉喉以熨布上冷復易之肘後同又方真䕡茹爪甲大納口中以牙小嚼汁以漬喉當微覺異為佳亦主天行肘後同又附子丸方附子炮藜蘆等分上二味末之蜜和丸服如梧子一枚飲下含黃柏亦佳忌豬肉貍肉並出第二卷中深師貼喉膏療傷寒舌強喉痛方蜜一升甘草四兩豬膏半斤上三味微火煎甘草豬膏令數沸去滓乃納蜜溫令銷相得如棗大含化稍稍咽之忌海藻菘菜出第十四卷中集驗療傷寒熱病喉中痛閉塞不通烏扇膏方生烏扇一斤切豬脂一斤上二味合煎烏扇藥成去滓取如半雞子薄綿裹之納口中稍稍咽之取瘥忌酒蒜等物張文仲千金等同又升麻湯方升麻三兩通草四兩射干二兩羚羊角三兩屑芍藥二兩生蘆根切一升上六味切以水七升煮取二升半去滓分為三服徐徐服千金古今錄驗同並出第三卷中千金治傷寒熱病後口乾多唾咽痛干棗丸方干棗二十枚烏梅十枚上二味搗合蜜和丸如杏核大綿裹含化咽津自愈出第十卷中傷寒吐唾血及下血方三首病源此由諸陽受邪熱初在表應發汗而汗不發致使熱毒入深結於五臟內有瘀積故吐血出第八卷中仲景傷寒論吐血不止者柏葉湯主之方青柏葉三兩乾薑二兩切艾三把上三味以水五升煮取一升去滓別絞取新出馬通汁一升相和合煎取一升綿濾之溫分再服馬通是馬屎汁也一方有阿膠無艾又吐血下血黃土湯主之方釜灶下黃焦土半升綿裹甘草三兩炙乾地黃三兩白朮三兩附子三兩炮破阿膠三兩炙黃芩三兩上七味切以水八升煮六味取二升去滓納膠令烊分三服忌海藻菘菜蕪荑豬肉桃李雀肉等物並出第十六卷中古今錄驗蒲黃湯療傷寒溫病天行疫毒及酒客熱傷中吐血不止面黃乾嘔心煩方蒲黃桑寄生桔梗一作栝蔞犀角屑甘草各二兩炙葛根三兩上六味切以水七升煮取三升去滓分三服徐徐服之忌海藻菘菜豬肉出第三卷中傷寒衄血方四首病源傷寒病衄血者此由五臟熱結所為也心主血肝藏血熱邪傷於心肝故衄血也衄者鼻出血也肺主氣而開竅於鼻血隨氣行所以從鼻出陽明病口燥但欲漱水不欲咽者此必衄衄家不可攻其表汗出額上脈急而緊直視而不能眴不得眠亡血不可攻其表汗出則寒慄而振脈浮緊發熱其身無汗自衄者愈出第八卷中肘後療傷寒大病瘥後小勞便鼻衄牡蠣散及丸方左顧牡蠣十分熬石膏五分上二味搗末酒服方寸匕日三四亦可蜜丸如梧子大酒服十五丸集驗千金並同出第二卷中小品芍藥地黃湯療傷寒及溫病應發汗而不發之內瘀有蓄血者及鼻衄吐血不盡內余瘀血面黃大便黑者此主消化瘀血芍藥三分地黃半斤丹皮一兩犀角屑一兩上四味切以水一斗煮取四升去滓溫服一升日二三服有熱如狂者加黃芩二兩其人脈大來遲腹不滿自言滿者為無熱不用黃芩又茅花湯療傷寒鼻衄不止主之方茅花一大把上以水八升煮取三升分三服即瘥若無茅花取茅根代之亦可又麥門冬湯療傷寒身熱衄血嘔逆主之方麥門冬石膏寒水石各三兩甘草二兩桂心一兩上五味切以水一斗煮取三升分三服傷寒煩渴方九首病源此由陰氣少陽氣勝故熱而煩滿也少陰病惡寒而蜷時自煩欲去其衣被者可治也病脈已解而反發煩者病新瘥又強與谷脾胃氣尚弱不能消穀故令微煩損谷即愈少陰病脈微細而沉但欲臥汗出不煩欲自吐五六日自利後煩躁不得臥寐者死發汗後下之脈平而少煩此新虛不勝穀氣故也又傷寒渴者由熱氣入於臟流於少陰之經少陰主腎腎惡燥故渴而引飲並出第七卷中仲景傷寒論療傷寒汗出惡寒身熱大渴不止欲飲水一二斗者白虎加人參湯主之方知母六兩石膏粳米各一升人參三兩甘草二兩上五味切以水一斗二升煮米熟去米納諸藥煮取六升去滓溫服一升日三忌海藻菘菜出第十卷中小品同又若脈浮發熱渴欲飲水小便不利者豬苓湯主之方豬苓一兩去皮茯苓一兩阿膠一兩炙滑石一兩碎綿裹澤瀉一兩上五味以水四升先煮四物取二升去滓納阿膠令烊銷溫服七合日三服忌醋物千金翼同出第五卷中範汪栝蔞湯主渴飲方栝蔞根內黃脈少者三兩上一味切以水五升煮取一升分二服先以青淡竹瀝一升合水二升煮好銀二兩減半去銀先與病人飲之訖須臾後乃服栝蔞湯其銀汁須冷服出第二十卷中千金療傷寒後結熱在內煩渴青葙子丸方青葙子五兩龍膽三兩黃芩一兩梔子仁一兩苦參一兩黃柏二兩栝蔞一兩黃連二兩上八味搗篩為末蜜丸先食服如梧子七丸飲下日三不知稍增忌豬肉冷水集驗同出第九卷中深師黃芩人參湯療傷寒吐下後內外有熱煩渴不安方黃芩人參甘草桂心生薑各二兩大棗十五枚擘破上六味切以水八升煮取三升分三服徐徐服忌菘菜海藻生蔥等物又療傷寒除熱止渴欲飲水栝蔞根湯方黃芩三兩人參二兩桂心二兩大黃二兩栝蔞根三兩芒硝二兩甘草二兩炙上七味切以水八升煮取三升去滓飲一升須臾當下不下復飲一升得下止勿復飲湯藥力勢歇乃可食糜耳一方用生薑二兩忌海藻菘菜生蔥油膩等物又療傷寒下後除熱止渴五味麥門冬湯方麥門冬去心五味子人參甘草炙石膏碎各一兩上五味搗篩三指撮水一升二合煮令沸得四合盡服忌海藻菘菜並出第十四卷中古今錄驗黃龍湯療傷寒十餘日不解往來寒熱狀如溫瘧渴胸滿心腹痛方半夏半升洗生薑三兩人參三兩柴胡半斤黃芩三兩甘草三兩炙大棗十二枚擘上七味切以水一斗二升煮取六升去滓更煎取三升溫服一升日三服不嘔而渴去半夏加栝蔞根四兩服如前忌羊肉餳海藻菘菜等物出第三卷中此本張仲景傷寒論方又高堂丸療傷寒苦渴煩滿欲死令極飲水法方大黃二分硝石三分熬釜底墨一分灶突中墨一分黃芩一分梁上塵一分灶中黃土一分麻黃二分去節胡洽用芒硝無黃土上八味篩末蜜和如彈丸大取一丸著一盞水中盡用服之即自極飲水汗出得熱除矣一名黑奴丸一名駐車丸並療溫瘧神良並出第二卷中此方第一卷用小麥黑奴名黑奴丸傷寒癖實及宿食不消方二首病源此謂被下後六七日不大便煩熱不解腹滿而痛此為胃中有干糞挾宿食故也或先患寒癖因有宿食又感於傷寒熱氣相搏故宿食不消也出第八卷中深師快豉丸療傷寒留飲宿食不消一名續命丸方黃芩五兩大黃五兩梔子仁十六枚黃連五兩去毛豉一升熬甘遂三兩太山者麻黃五兩去節芒硝二兩巴豆一百枚去皮及心熬研上九味搗篩白蜜和丸如梧子服三丸以吐下為度若不吐利加二丸一本有杏仁七十枚忌豬肉冷水蘆筍肉出第十四卷中範汪同古今錄驗續命丸療傷寒及癖實痰飲百病方大黃五兩黃連一兩麻黃五兩去節甘遂三兩熬黃芩二兩芒硝二兩研杏仁七十枚去皮尖熬巴豆一百枚去心熬研豉一升熬上九味搗篩蜜和丸得傷寒一日服一丸如小梧子大二日二丸至六七日六七丸但吐下得汗愈若水澼及痰實服三五丸日二忌豬肉冷水蘆筍範汪延年刪繁同出第三卷中傷寒春冬咳嗽方三首病源此由邪熱客於肺也上焦有熱其人必飲水水停心下則肺為之浮肺主於咳水氣乘之故咳嗽出第八卷中小品射干湯主春冬傷寒秋夏中冷咳嗽曲拘不得氣息喉鳴啞失聲干嗽無唾喉中如哽者方射干二兩半夏五兩洗杏仁二兩去皮尖兩仁乾薑二兩炮甘草二兩炙紫菀二兩肉桂二兩吳茱萸二兩當歸二兩橘皮二兩麻黃二兩去節獨活二兩上十二味切以水一斗煮取三升去滓溫分三服始病一二日者可服此湯汗後重服勿汗也病久者初服可用大黃二兩初秋夏月暴雨冷及天行暴寒熱伏於內宜生薑四兩代乾薑除茱萸用枳實二兩炙忌羊肉海藻菘菜餳生蔥出第六卷中古今錄驗下氣橘皮湯療春冬傷寒秋夏冷濕咳嗽喉中鳴聲上氣不得下頭痛方橘皮紫菀麻黃去節杏仁去雙仁尖皮當歸桂枝甘草炙黃芩各三分上八味切以水七升煮取三升分三服不瘥重合之忌海藻菘菜生蔥出第三卷中延年療傷寒骨節疼頭痛眼睛疼咳嗽知母湯方知母二兩貝母三兩乾葛三兩芍藥三兩石膏四兩碎裹黃芩三兩杏仁一兩去皮尖及雙仁梔子仁三兩擘上八味切以水七升煮取二升五合去滓分為三服如人行八九里再服忌蒜面七日出第九卷中傷寒攻目生瘡兼赤白翳方六首病源目者臟腑之精華肝之外候也傷寒熱毒壅滯熏蒸於肝上攻於目則令目赤腫痛若毒氣盛者眼生翳膜又肝開竅於目肝氣虛熱乘虛上衝於目故目赤痛重者生瘡翳白膜息肉出第八卷中肘後療傷寒大病後熱毒攻目方煮蜂房以洗之日六七度張文仲同又方冷水漬青布以掩目張文仲同又療熱病後生翳方燒豉二七粒末納管中以吹之並出第二卷中文仲備急同小品漏蘆連翹湯療傷寒熱毒變作赤色癰疽丹疹腫毒及眼赤痛生障翳悉主之方兼療天行漏蘆二兩連翹二兩黃芩二兩麻黃二兩去節白蘞二兩升麻二兩甘草二兩炙大黃三兩切枳實三兩炙上九味切以水九升煮取三升去滓溫分三服相去二食頃更服熱盛者可加芒硝二兩忌海藻菘菜等物千金同又秦皮湯療毒病沖眼忽生赤翳或白或腫膚起或赤痛不得視光痛入心肝或眼外浮腫如吹汁出生膜覆珠子方秦皮二兩前胡二兩常山二兩黃芩二兩升麻二兩芍藥二兩白薇二兩枳實二兩炙大黃三兩甘草二兩炙上十味以水八升煮取三升分三服相去二食頃更服若盛熱者可加芒硝二兩忌海藻菘菜生蔥生菜出第六卷中一方加蕤仁一兩梔子仁半兩張文仲秦皮湯主傷寒病熱毒氣入眼生赤脈赤膜白膚白翳者及赤痛不得見光痛毒煩惱者神效方秦皮升麻黃連各一兩上三味切以水洗去塵用水四升煮取二升半冷之分用三合仰眼以綿繞箸頭取湯以滴眼中如屋漏狀盡三合止須臾復用日五六遍乃佳忌豬肉冷水出第二卷中傷寒口瘡方二首病源夫傷寒冬時發其汗必吐利口中爛生瘡以其熱毒在臟心脾煩壅表裡俱熱熱不已毒氣熏於上焦故令口舌乾燥生瘡也出第七卷中深師療傷寒熱病口瘡黃柏蜜方黃柏削去上皮取里好處薄斜削上一味以崖蜜半斤極消者以漬柏一宿唯欲令濃含其汁良久吐之更復如前若胸中熱有瘡時飲三五合尤良又療傷寒口瘡爛者升麻湯方升麻一兩甘草一兩炙竹葉切五合麥門冬三分去心牡丹一分干棗二十枚擘上六味切以水四升煮取一升半去滓分五服含稍稍咽之為度忌海藻菘菜胡荽等並出第十四卷中傷寒手足欲脫疼痛方七首病源此由熱毒氣從內而出循經絡攻於手足也人五臟六腑井滎輸皆出於手足指故毒從臟腑而出也出第八卷中範汪療傷寒熱病手足腫欲脫方生牛肉裹之腫消痛止出第三十卷中深師同崔氏療傷寒手足熱疼欲脫方取羊屎煮汁以淋之瘥止亦療時疾陰囊及莖腫亦可煮黃柏洗之肘後深師集驗千金備急並同出第一卷中集驗療毒熱攻手足腫疼欲脫方濃煮虎杖根適寒溫以漬手足入至踝上一尺兼療天行範汪肘後千金同又方酒煮苦參以漬之範汪千金集驗同並出第二卷中千金療毒熱病攻手足腫疼痛欲脫方煮馬糞若羊糞汁漬之豬膏和羊糞塗之亦佳範汪集驗肘後同又方取常思草絞取汁以漬之一名蒼耳範汪集驗肘後同出第十卷中備急療熱病手足腫欲脫者方兼主天行以稻穰灰汁漬之佳集驗千金肘後同出第一卷中傷寒虛羸方四首病源其人血氣先虛復為虛邪所中發汗吐下之後經絡俱損傷陰陽竭絕熱邪始散真氣尚少五臟猶虛穀神未復無津液以榮養故虛羸而生病焉出第八卷中集驗療傷寒虛羸少氣氣逆苦嘔吐方石膏一斤碎綿裹竹葉一把麥門冬一升去心人參二兩半夏一升洗生薑四兩甘草二兩炙上七味切以水一斗二升煮取六升去滓納粳米一升米熟去米飲一升日三服忌海藻菘菜羊肉餳出第三卷中又生地黃湯療傷寒有熱虛羸少氣心下滿胃中有宿食大便不利方生地黃三斤大黃四兩大棗二十枚擘甘草一兩炙芒硝二合上五味合搗令相得蒸五升米下熟絞取汁分再服忌海藻菘菜出第二卷中千金療傷寒虛羸少氣嘔吐竹葉石膏湯方石膏一斤碎綿裹竹葉一把麥門冬一升去心人參二兩半夏半斤洗甘草二兩上六味以水一斗煮取六升去滓納粳米一升煮米熟去米飲一升日三服忌海藻菘菜羊肉餳出第十卷中此張仲景傷寒論方張文仲梔子豉湯療吐下後虛羸欲死方梔子一十枚豉四合綿裹上二味以水五升先煮梔子取二升納豉又煮三四沸去滓分再服支同此出姚萬第二卷中集驗備急同各用梔子十四枚傷寒不得眠方四首病源夫衛氣晝行於陽夜行於陰陰主夜夜主臥謂陽氣盡陰氣盛則目瞑矣今熱氣未散與諸陽並所以陽獨盛陰偏虛雖復病後仍不得眠者陰氣未復於本故也出第八卷中仲景傷寒論療傷寒發汗若吐下後虛煩不得眠劇則反覆顛倒心內苦痛懊憹者屬梔子豉湯證方肥梔子十四枚擘香豉四合綿裹上二物以水四升先煮梔子取二升半去滓納豉更煮取一升半去豉分溫再服得吐止後服肘後療大病瘥後虛煩不得眠腹中疼痛懊憹烏梅豉湯方豉七合綿裹烏梅十四枚擘上二物以水四升煮烏梅取二升半納豉更煮取一升半去滓溫分再服無烏梅用梔子四枚又半夏茯苓湯方半夏三兩洗秫米一升茯苓四兩上三味切以千里流水一石揚之萬遍澄取二斗合煮諸藥得五升去滓溫分五服忌羊肉餳酢等物並出第一卷中深師酸棗湯療傷寒及吐下後心煩乏氣晝夜不眠方酸棗仁四升麥門冬一升去心甘草二兩炙蝭母二兩知母也茯苓二兩芎藭二兩乾薑三兩上七味切以水一斗六升煮酸棗取一斗去棗納藥煮取三升去滓溫分三服忌海藻菘菜大醋出第十四卷中傷寒小便不利方九首病源傷寒發汗後而汗出不止津液少胃中極干小腸有伏熱故小便不通也出第八卷中仲景傷寒論少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣或咳或小便自利或下利或嘔者真武湯主之方茯苓三兩白芍藥三兩附子一枚炮去皮破八片白朮三兩生薑三兩去皮上五味切以水八升煮取三升去滓溫服七合日三若咳者加五味子半升細辛一兩乾薑一兩若小便自利者去茯苓若下利者去芍藥加乾薑二兩嘔者去附子加生薑足前成半斤忌酢豬肉桃李雀肉等出第六卷中深師同兼主天行大效又傷寒六七日已發汗而復下之胸脅滿結小便不利渴而不嘔但頭汗出往來寒熱心煩者此未解也屬小柴胡桂薑湯主之方柴胡半斤桂心三兩黃芩三兩牡蠣二兩熬甘草二兩炙栝蔞根四兩乾薑二兩上七味切以水一斗二升煮取六升去滓更煎取三升溫服一升日三初一服微煩後汗出便愈忌生蔥海藻菘菜出第四卷中又療傷寒七八日身黃如橘子色小便不利腹微滿者茵陳湯主之方茵陳六兩肥梔子十四枚擘大黃二兩去皮酒洗破三片上三味以水一斗二升先煮茵陳減二升去滓納二物煮取三升去滓分溫三服日三小便當利尿如皂莢沫狀色正赤一宿腹減黃從小便去出第五卷中張文仲千金並同又服桂枝湯或下之仍頭項強痛熻熻發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白朮湯主之方芍藥生薑切白朮茯苓各三兩甘草二兩炙大棗十二個擘上六味切以水八升煮取三升去滓溫服一升小便利則愈忌海藻菘菜酢桃李雀肉等肘後療小腹滿不得小便方兼療天行細末雄黃蜜和為丸如棗核納溺孔中令入半寸出第二卷中文仲同千金翼療少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重四逆散方甘草十分炙枳實十分炙柴胡十分芍藥十分上四味搗細篩白飲和服方寸匕日三服嗽者加五味子乾薑各五分並主下利胸中悸者加桂心五分小便不利者加茯苓五分腹中痛者加附子一枚泄利下重者先以水五升煮薤二升取三升以散三方寸匕納湯中煮之取一升半分再服忌海藻菘菜仲景範汪同出第十卷中崔氏療傷寒熱盛小便不利滑石湯方兼療天行滑石屑二兩葶藶子一合熬上二物以水二升煮取七合去滓頓服之又方搗生蔥敷臍下橫文中燥則易之又瞿麥湯方瞿麥三兩甘草三兩炙滑石四兩葵子二合半石葦三兩去毛令盡上五味切以水八升煮取二升半分三服忌海藻菘菜並出第一卷中古今錄驗同傷寒下痢及膿血黃赤方一十六首病源傷寒病若表實裡虛熱氣乘虛而入攻於腸胃則下黃赤汁若溫毒氣盛則腹痛壯熱下膿血如魚腦或如爛肉汁若寒毒入胃則腹滿身熱下清穀下清穀者不可攻表汗出必脹滿表裡俱虛故也傷寒六七日下利便發熱而痢其人汗出不止者死但有陰無陽故也下利有微熱其人渴脈弱者今自愈脈沉弦者下重其脈大者為未止脈微數者為欲自止雖發熱不死少陰病八九日而一身手足盡熱熱在膀胱必便血下利脈反浮數尺中自澀其人必圊膿血少陰病下利若利自止惡寒而欲蜷手足溫者可療陽明病下利其人脈浮大此皆為虛弱強下之故也傷寒下利日十餘行其人脈反實者死出第八卷中張仲景傷寒論陽明無下利證不可下或有云下利其脈浮大者此皆為虛以強下之故也設脈浮革因爾腸鳴當溫之與水即噦仲景傷寒論傷寒本自寒下醫復吐之下之不解者寒格更逆吐下食入還吐出者屬乾薑黃連人參湯主之方乾薑黃連黃芩人參各三兩上四味切以水六升煮取二升去滓分再服之忌豬肉冷水等出第六卷中又太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者屬葛根黃連湯方葛根八兩黃連三兩金色者黃芩三兩切甘草二兩上四味切以水八升先煮葛根減二升掠去沫納諸藥煮取二升去滓溫分再服忌豬肉冷水海藻菘菜出第七卷中肘後療傷寒若下膿血者赤石脂湯方赤石脂二兩碎乾薑二兩切附子一兩炮破上三味以水五升煮取三升去滓溫分三服後臍下痛者加當歸一兩芍藥二兩用水六升煮忌豬肉範汪張文仲同又主下利不能食者兼療天行黃連丸方黃連一兩烏梅二十枚炙燥上二味搗末臘如博棋子一枚蜜一升於微火煎令可丸如梧子一服十五丸日三忌豬肉冷水出第一卷中又白通湯療傷寒泄痢不已口渴不得下食虛而煩方大附子一枚生削去黑皮破八片乾薑半兩炮甘草半兩炙蔥白十四莖上四味切以水三升煮取一升二合去滓溫分再服渴微嘔心下停水者一方加犀角半兩大良忌海藻菘菜豬肉範汪同出第十四卷中張仲景傷寒論白通湯惟主少陰下利厥遊無脈乾躁而煩者白通加豬膽湯主之本無甘草仍不加犀角範汪療傷寒腹中微痛不止下利秦皮湯方秦皮三兩黃連四兩白頭翁二兩阿膠三兩上四味㕮咀三味以水八升煮得二升絞去滓納膠令烊適寒溫先食飲七合日二服忌豬肉冷水又豉薤湯療傷寒暴下及滯利腹痛方豉一升薤白一把寸切上二物以水三升煮令薤熟漉去滓分為再服不瘥復作又蕙草湯療傷寒除熱止下利方蕙草二兩黃連四兩當歸二兩上三味切以水六升煮得二升適寒溫飲五合日三忌豬肉冷水等物又療傷寒下利脈微足厥冷通草湯方通草一兩乾薑一兩枳實四兩炙人參一兩附子一枚炮令裂破上五味切以水六升煮取二升適寒溫飲五合日三不瘥稍加至七合忌豬肉並出第三十卷中小品犀角湯療熱毒下黃赤汁及赤如腐爛血及赤滯如魚腦腹痛壯熱諸藥無效方黃柏一兩半黃芩一兩半白頭翁一兩黃連二兩當歸一兩牡蠣一兩半熬犀角屑半兩艾葉半兩石榴皮一兩半桑寄生一兩甘草一兩炙上十一味切以水八升煮取三升分三服忌豬肉冷水海藻菘菜出第六卷中古今錄驗同集驗療傷寒後下利膿血柏皮湯方黃柏二兩黃連四兩梔子仁十四枚擘阿膠一兩炙上四味切以水六升煮三味取二升去滓納膠令烊溫分再服忌豬肉冷水範汪同出第二卷中千金翼熱利下重白頭翁湯主之方白頭翁二兩黃柏三兩黃連三兩秦皮三兩切上四味切以水七升煮取二升去滓分服一升不愈更服忌豬肉冷水範汪同出第十卷中此張仲景傷寒論方崔氏療傷寒後赤白滯下無數阮氏桃花湯方赤石脂八兩冷多白滯者加四兩粳米一升乾薑四兩冷多白滯者加四兩切上三味以水一斗煮米熟湯成去滓服一升不瘥復作熱多則帶赤冷多則帶白千金翼方不同加減稍別傷寒論千金範汪同張仲景傷寒論煮湯和赤石脂末一方寸匕服又療傷寒熱利黃連丸方黃連三兩去毛當歸三兩乾薑二兩赤石脂二兩切上四味搗篩蜜和丸如梧子大服三十丸日三叔尚書以療熱痢是歲傳與東都當方諸軍營及夏口戍人發者數千餘人余時亦復用之亦佳但時用之不及諸湯速耳當服百丸許乃斷忌豬肉冷水並出第一卷中張文仲陶氏傷寒下利豉薤湯方豉一斤綿裹薤白一握梔子十四枚擘破上三味以水五升煮取二升半去滓溫分三服小品云此方主溫毒及傷寒內虛外熱攻腸胃下黃赤汁及如爛肉汁並去赤滯下伏氣腹痛諸熱毒悉土之水四升先煮梔子薤白令熟納豉煮取二升分三服千金備急方同又療傷寒下利惡血不止犀角湯方乾薑一兩犀角一兩末地榆一兩蜜二合上四味切以水五升煮取一升半去滓下蜜更煮至一升分三服自愈此治熱毒蠱利千金同並出第十五卷中傷寒䘌瘡方一十首病源凡得傷寒及天行熱病日數較多腹內有熱又人食少腸胃空虛三蟲行作求食食人五臟及下部也䘌病之候齒齦無色舌上盡白甚者唇里有瘡四肢沉重匆忽喜眠如此皆為蟲食其肛肛爛見五臟則死當數看其上唇內有瘡唾血唇內如粟瘡者則心內懊憹痛此蟲在上食其五臟下唇內生瘡者其人不寤此蟲食下部皆能殺人也出第八卷中肘後若病人齒齦無色舌上白者或喜眠憒憒不知痛癢處或下利宜急療下部不曉此者但攻其上不以為意下部生瘡蟲食其肛肛爛見五臟便死燒馬蹄作灰細末豬膏和塗綿以導下部日數度瘥又桃仁苦酒湯方桃仁五十枚去皮尖及兩仁苦酒二升鹽一合上三味煮取六合去滓盡服之並出第一卷中深師療䘌食下部桃皮湯方桃皮二兩槐子二兩艾二兩大棗三十枚擘一方用黃連上四味切以水五升煮取三升去滓溫分三服之又療䘌蟲食下部方以泥作罌以竹筒如指所橫穿罌肚筒一頭納下孔中內如雞子艾燒之人就罌口吹之常令艾燒強人可益艾甚良千金同又龍骨湯治傷寒已八九日至十餘日大煩渴熱盛而三焦有瘡䘌者多下或張口吐舌呵籲咽爛口鼻生瘡吟語不識人宜服此湯除熱毒止痢神方龍骨半斤碎上一味以水一斗煮取四升沉之井底令冷服五合余漸漸進之恣意如飲尤宜老少無味殆如飲水亦斷下文仲備急千金等同又療傷寒及諸病之後內有瘡出下部煩者黃連犀角湯方黃連一兩去毛烏梅十四枚擘犀角三兩青木香半兩上四味切以水五升煮取一升半分再服忌豬肉冷水等並出第十四卷中範汪療傷寒心中懊憹下利穀道中爛傷當服懊憹散以䘌藥納穀道中懊憹散方雚蘆十分乾漆二分萹蓄二分上三味各異搗篩粉粥飲服一錢匕先食日再服千金同又療䘌懊憹麝香散方麝香一分研雄黃一分研丹砂一分研犀角一分屑羚羊角一分研青葙子一分黃連一分升麻一分桃仁一分熬貝齒一分上十味並搗合下篩先食以小麥粥服錢五匕服藥訖復以錢五匕綿裹以導穀道中食頃去之日三忌豬肉冷水生血等物並出第三十三卷中小品青葙子散療熱病有䘌下部生瘡方青葙一兩雚蘆四兩狼牙三分橘皮二分萹蓄二分切之上五味搗下篩粥飲和合服兩錢匕日三不知稍增之出第六卷中千金同有甘草一分張文仲療傷寒兼䘌瘡王叔和云其候口唇皆生瘡唾血上唇內有瘡如粟者則心中懊憹痛如此則此蟲在上乃食五臟若下唇內生瘡其人喜眠者此蟲在下食下部方取雞子一枚扣頭出白與漆一合熟和令調如漆還納穀中仰吞之食頃或半日或下蟲或吐蟲劇者再服乃盡熱除病愈凡得熱病腹內熱食少三蟲行作求食食人五臟及下部人不能知可服此藥不爾䘌蟲殺人集驗深師肘後同又方豬膽一具上一味漬著半升苦酒中和之煎三沸三下三上藥成可放溫空腹飲一滿口蟲即死有人經用之驗並出第二卷中千金同傷寒陰陽易方八首病源傷寒陰陽易病者是男子婦人傷寒病新瘥未平復而與之交接得病者名為陰陽易也其男子病新瘥未平復而婦人與之交接得病者名陽易其婦人得病新瘥未平復而男子與之交接得病者名陰易若二男二女並不相易所以呼為易者陰陽感動其毒度著於人如換易也其病之狀身體重小腹裡急或引陰中拘攣熱上衝胸頭重不能舉眼內生䁾四肢拘急小腹㽲痛手足拳皆即死其亦有不即死者病苦小腹裡急熱上衝胸頭重不能舉百節解離經脈緩弱血氣空虛骨髓枯竭便噓噓吸吸氣力轉少著床不能動搖起止仰人或引歲月方死出第八卷中深師療婦人得溫病雖瘥平復未滿一百日不可與交合交合為陰易之病病必拘急手足拳皆死丈夫病以易婦人名為陽易速當療之可瘥滿四日不可療也宜令服此藥方乾薑四兩上一味搗末湯和一頓服溫覆汗出得解止手足伸遂愈範汪同出第十四卷中範汪豭鼠糞湯療傷寒病後男子陰易方薤一大把豭鼠糞十四枚上二味以水五升煮取二升盡飲之溫臥汗出便愈亦理勞復豭鼠屎兩頭尖者是也肘後薤作藍又丹米湯療傷寒病已後男子陰易方丹米三兩上一味末以薄酒和盡飲之溫覆汗出便愈亦隨人大小不必三兩自以意消息之又療交接勞復卯腫腹中絞痛便絕死竹皮湯方刮青竹皮一升上一味以水三升煮五六沸絞去滓頓服立愈肘後同又療陰陽易栝蔞湯方栝蔞根二兩上一味以水五升煮取一升分二服先以青淡竹瀝一升合水二升煮好銀二兩減半去銀先與病人飲之訖須臾乃服湯小便利即瘥栝蔞湯銀汁須冷服與前療渴方同千金曰昔者有人得傷寒病已瘥未健詣華敷視脈敷曰雖瘥尚虛未復陽氣不足勿為勞事余勞尚可御內即死臨死當吐舌數寸其妻聞其夫病除從百餘里來省之止宿交接中間三日發病口舌出數寸而死病新瘥未滿百日氣力未平復而以房室者略無不死有士蓋正者病愈後六十日已能行射獵以房室則吐涎而死及熱病房室名為陰陽易之病皆難療多死近者有士大夫小得傷寒瘥已十餘日能乘馬行來自謂平復以房室則小腹急痛手足拘攣而死醫者張苗說有婢得病後數十日有六人奸之皆死婦人得病易丈夫丈夫得病亦易婦人療之炕裩散方兼主溫病陰易也取女人中裩近隱處燒取灰上一物為散服方寸匕日三小便即利陰頭微腫此為愈矣女人病可取男子裩如前法酒水服此本仲景方肘後同又療交接勞復卯腫縮腹中絞痛便欲死者方取交接婦人衣服以覆男子肘後同又方取女人手足爪二十枚女人衣中裳一尺燒上二味末以酒服亦可米汁飲服之出第十卷中肘後同傷寒勞復食複方二十五首病源傷寒病新瘥津液未復血氣尚虛若勞動早更復成病故云復也若言語思慮則勞神梳頭澡洗則勞力勞則生熱熱氣乘虛還入經絡故復病也其脈沉緊者宜下之又食復傷寒病新瘥及大病之後脾胃尚虛穀氣未復若食豬肉腸血肥魚及油膩物必大下利醫所不能治也必至於死若食餅餌黏黍飴脯炙膾棗慄諸果牢強難消之物胃氣虛弱不能消化必更結熱適以藥下之則胃氣虛冷大利難禁不下之必死下之亦危皆難救也大病之後多坐此死不可不慎護也夫病新瘥後但得食糜粥寧可少食令飢慎勿飽不得他有所食雖思之勿與引日轉久可漸食羊肉糜若羹汁慎不可食豬狗等肉並出第八卷中廣濟療傷寒因食勞復頭痛壯熱梔子湯方梔子十四枚擘香豉一升綿裹蔥白一握切粟米三合雄鼠屎二七枚燒令煙絕末上五味以水八升煮取二升三合去滓納鼠屎分三服服別相去如人行六七里須利納芒硝五分忌面炙肉蒜等物出第一卷中深師療勞復大青湯方大青四兩甘草二兩炙阿膠二兩炙香豉二兩上四味切以水一斗煮取三升去滓溫服一升日五六欲盡復作常使有湯渴便飲無毒除熱止吐下傷寒一二日上至十數日困篤發汗熱不解吐下後熱不除止下利甚良先煮大青甘草取四升去滓納膠豉膠消盡便漉去勿令豉壞當預漬膠令釋也忌菘菜海藻集驗肘後千金同又方取雞子空殼碎之熬令黃黑搗篩熱湯和一合服之溫臥取汗愈雞子殼悉服之肘後崔氏同又方取馬糞燒搗為散冷酒服方寸匕良三炊頃便驗神良又療傷寒瘥後勞復葵子湯方葵子二升梁米一升上二味合煮作薄粥飲之多多為佳取汗立瘥並出第十四卷中範汪療傷寒病瘥語言書疏坐起行步勞複方創青竹皮多多煮之令厚濃服三升汁則愈又傷寒已愈食飲多勞復大黃豉湯方豉五合甘草二兩炙桂心二兩大黃四兩芒硝半斤上五味㕮咀以水六升煮得二升去滓先食適寒溫飲一升日再忌海藻菘菜生蔥等物又療傷寒瘥已後飲食勞復梔子湯方梔子十四枚豉一升桂心二兩麻黃二兩大黃二兩上五味㕮咀以水七升先煮麻黃掠去沫納余藥更煮取二升去滓溫服一升日再服當小汗及下利忌生蔥並出第三十四卷中千金療傷寒溫病後勞復或食飲或動作梔子石膏湯方梔子仁三七枚擘石膏五兩碎鼠屎尖頭者二十枚香豉一升綿裹上四味以水七升煮取三升分三服又療勞復或因洗手足或梳頭或食等勞複方取洗足手汁飲之一合即愈又方取頭垢如棗核大吞一枚又方取飯燒為末飲進一升肘後同又療大病已瘥勞復者枳實梔子湯方枳實三枚炙梔子十四枚擘上二味以酢漿一斗先煎取六升煮藥取三升納豉一升煎五六沸去滓分再服覆取汗如有宿食者納大黃如棋子一枚範汪救急集驗並同出第十卷中張仲景傷寒論納大黃如博棋子五六枚又療勞復垂死者方暖湯三合洗四五歲女子陰取汁納口中服則愈男兒亦得起死人方又療食勞方曲一餅煮取汁服之又療食勞方杏仁五十枚酢二升煎取一升服之取汗則瘥又方燒人糞灰水服之方寸匕又療傷寒瘥後更頭痛壯熱煩悶者方服黃龍湯三合日三服又欲令病人不復者方燒頭垢如梧子大服之並出第十卷中崔氏療傷寒勞復鼠屎湯方梔子二七枚擘豉五合鼠屎兩頭尖者二七枚上三味以漿水二升煮取一升去滓頓服數試異驗出第一卷中古今錄驗梔子湯療傷寒勞複方梔子十四枚擘麻黃二兩去節大黃二兩豉一升綿裹上四味切以水七升煮取二升分為三服深師肘後同又療傷寒勞復鼠屎湯方鼠屎二十一枚豉一升綿裹梔子七枚擘大黃三兩切上四味以水五升煎取二升七合分三服微取汗應小鴨溏下千金同又療病新瘥早起及食多勞復鼠屎豉湯方鼠屎兩頭尖者二十一枚香豉一升上二味以水三升煮取一升盡服之溫臥令小汗千金同又療食不消勞復脈實者鼠屎梔子豉湯方豉二升綿裹鼠屎二十一枚梔子七枚擘麻黃三兩去節上四味以水五升煮取二升分服七合汗微出日三服千金麻黃作大黃又療傷寒已愈食飲多復發者方豉五合綿裹甘草二兩炙大黃四兩芒硝半兩上四味切以水九升煮取三升去滓飲一升日再忌菘菜海藻等範汪同又療傷寒瘥令不復白芷散方白芷十二分白朮十分防風八分栝蔞五分桔梗四分細辛三分附子二分炮去皮乾薑二分桂心二分上九味搗篩為散以粳米粥清服一錢匕食已服二錢小兒服一錢常以雞子作羹吃粳米飯多少與病人食之亦未必常有雞子羹粳米飯如服藥訖即扶起令行步仍擳頭洗手面食輒服之勞行如前則不復浩云數用佳忌豬肉桃李雀肉胡荽蒜青魚鮓生蔥生菜範汪同出第三卷中一方有人參三分傷寒百合病方七首病源傷寒百合病者謂無經絡百脈一宗悉致病也皆因傷寒虛勞大病之後不平復變成斯病也其狀意欲食復不能食常默默欲得臥復不得臥欲出行而復不能行飲食或有美時或有不用時聞飲食臭或如強健人而欲臥復不得眠如有寒復如無寒如有熱復如無熱至朝日苦小便赤黃百合之病諸藥不能療得藥則劇而吐利如有神靈所加也身形如和其人脈微數每尿輒頭痛其病六十日乃愈若尿時頭不痛淅淅然如寒者四十日愈若尿時快然但眩者二十日愈其證或未病而預見或病四五日而出或病二十日一月日復見其狀惡寒而嘔者病在上焦也二十三日當愈其狀腹滿微喘大便硬三四日一大便時復小溏者病在中焦也六十三日當愈其狀小便淋瀝難者病在下焦也四十三日當愈各隨其證以療之耳並出第八卷中仲景傷寒論療百合之病諸藥不能療若得藥則劇而吐痢如有神靈所加也身體仍和脈微數每尿時輒頭痛六十日乃愈尿時頭不痛淅淅然者四十日愈尿時快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日一月復見者悉療之又發汗已更發者百合知母湯主之方百合七枚擘知母三兩上二味以泉水洗先漬百合經一宿上當白沫瀉卻其汁更以好泉水二升煮取一升去滓置之一處別以泉水二升煮知母取一升去滓二味汁相和煮取一升半分溫再服之小品千金同又下之已更發者百合滑石代赭湯主之方百合七枚擘以泉水漬一宿上當白泔出去之滑石三兩碎代赭如彈丸一枚碎上三味先以泉水二升煮百合取一升去滓置一廂又以泉水二升煮和二味取一升去滓合煎取一升半分再服千金小品同又吐之已更發者百合雞子湯主之方百合七枚上一味依前法泉水二升煮取一升去滓扣雞子一枚取中黃納百合湯中攪令調溫再服之千金同又不吐不下不發汗病形如初百合生地黃湯主之方百合七枚上一味依前法漬以泉水二升煮取一升生地黃汁一升二味汁相和煮取一升半溫分再服一服中病者更勿服也大便當出惡沫千金小品並同又百合病一月不解變成渴者以漬百合水洗身法其後千金方中一味是後服栝蔞牡蠣散其次則是並出第十七卷中小品凡百合病見於陰而以陽法攻之其陰不得解也復發其汗此為逆其病難治見於陽而以陰法攻之其陽不得解也復下之其病不愈千金百合病經一月不解變成渴者方百合根切一升上一味以水一斗漬一宿以汁洗病人身也洗身訖食白湯餅今餺飥也勿與鹽豉也渴不瘥可用栝蔞根並牡蠣等分為散飲調方寸匕日三服小品張仲景方同又療百合病變而發熱者方滑石三兩百合根一兩炙上二味末之飲下方寸匕日三微利者止勿服之熱即除一本云治百合病小便赤澀臍下堅急又百合病變腹中滿痛者方但服百合根隨多少熬令色黃末之飲調方寸匕日三滿消痛止小品同並出第十卷中傷寒狐惑病方四首仲景傷寒論狐惑之病其氣如傷寒嘿嘿但欲臥目瞑不得眠起臥不安蝕於喉咽者為惑蝕於陰者為狐狐惑之病並惡飲食不欲聞飲食臭其面乍赤乍黑乍白蝕於上部其聲嗄蝕於下部其咽乾蝕於上部瀉心湯主之蝕於下部苦參湯淹洗之蝕於肛外者雄黃熏之又瀉心湯兼療下利不止心中愊愊堅而嘔腸中鳴者方半夏半升洗黃芩三兩人參三兩乾薑三兩黃連一兩甘草四兩炙大棗十二枚擘上七味切以水一斗煮取六升分服一升日三服忌豬肉冷水菘菜海藻羊肉餳千金同出第六卷中又雄黃熏法兼主䘌病雄黃一物研末以兩筒瓦合之燒以熏下部千金療狐惑薰草黃連湯方黃連四兩去皮薰草四兩上二味切以白漿一斗漬之一宿煮取二升去滓分為二服忌豬肉冷水小品同又其人脈數無熱微煩嘿嘿但欲臥汗出得之三四日眼赤如鳩眼者得之七八日其四眥黃黑能食者膿已成也療之方以赤小豆三升漬之令生牙足復干之加當歸三兩為末漿水服方寸匕日三小品同出第十卷中此本仲景方凡病形不可炙因火為邪散走血脈傷脈尚可傷臟則劇井輸穴腫黃汁自出經絡外爛肉腐為癰膿此為火疽七居反醫所傷也凡微數之脈慎不可炙因火為邪即致煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也
