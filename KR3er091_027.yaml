body:
  text: 卷第二十七諸淋方三十五首病源諸淋者由腎虛而膀胱熱故也膀胱與腎為表裡俱主水水入小腸下於胞行於陰為溲便也腎氣通於陰陰津液下流之道也若飲食不節喜怒不時虛實不調則腑臟不和致腎氣虛而膀胱熱也膀胱津液之腑熱則津液內溢而流於睪水道不通水不上不下停積於胞腎虛則小便數膀胱熱則水下澀數而且澀則淋瀝不宣故謂之淋其狀小便出少起數少腹弦急痛引於臍又有石淋勞淋血淋氣淋膏淋諸淋形證各隨名具說於後章而以一方療之者故謂諸淋也其湯尉針石別有正方補養宣導今附於後養生方導引法云偃臥令兩足布膝頭斜踵置鳩口納氣振腹鼻出氣去淋數小便又去石淋莖中痛又云蹲踞高一尺許以兩手從外屈膝內入至足趺上急手握足五趾極力一通令內曲以利腰髖療淋也出第十四卷中廣濟療患淋來積年比醫療不能得愈或十日五日一發即有可時今年因病更頻數二十日來不定方滑石冬葵子各八分瞿麥石葦各五分去毛蒲黃六分陳橘皮四分芍藥茯苓芒硝各六分子芩六分上十味搗篩為散空腹煮後飲子服方寸匕日二服漸加至一匕半忌熱面炙肉醋蒜等又飲子方桑白皮六分通草百合各八分白茅根一分上四味細銼以水四升煮取二升去滓溫下前散藥口乾渴含之亦得也又療淋小便不通六七日方滑石五兩通草三兩瞿麥二兩冬葵子一兩茅根一升石葦三兩去毛芒硝二兩上七味切以水九升煮取二升八合去滓納芒硝分溫三服每服如人行六七里進一服以微利為度忌如前並出第四卷中範汪療淋方取蘩蔞草滿兩手把以水煮服之可常作飲勿不飲也又方煮菟絲子服之如蘩蔞法又方露蜂房燒飲服之取如碗大者妙又方雞子二枚去白黃以鹽納殼中使滿以三升水漬一升豉絞取汁取殼中鹽投汁中攪令調盡服之又方滑石海蛤雞子殼各等分上三味搗篩為散以飲服半錢匕日三服漸加至一錢匕甚良又方取地麥草一名地膚草二七把以水二升煎之亦可長服一法旦漬豉汁飲之良又療淋利小便葵子散方葵子半升滑石二兩石南葉一兩地榆三兩石葦一兩去毛通草一兩上六味搗篩為散飲服方寸匕日三服良又療淋莖中有石方取雞屎白半升曝乾熬之令香搗篩為散以酪一云酢漿飲方寸匕日三服到一二日當下石即愈又療淋師所不能療者神方取葛上亭長生折斷腹腹中有白子如小米長二三分取著白板子上陰乾燥二三日藥成若有人患十年淋服三枚八九年以還服二枚服時以水著小杯中水如棗許納藥盞中半食頃以爪甲研當令扁扁見於水中仰頭令人瀉入咽喉中勿令近牙近則著牙齒間不盡得入咽之也藥雖微小下喉自當覺至下焦淋所有頃藥作大煩急不可堪者飲麥乾飯汁藥勢止也若無麥乾飯汁但水亦可耳老小服三分之一藥當下淋如膿血連連爾石去者或如指頭或青或黃男女服之皆愈並療婦人産生後余疾積聚或成帶下服之亦愈此蟲正月二月為芫菁三月為王不留行四月五月六月為葛上亭長七月為斑蝥九月十月為地膽隨時變耳亭長時頭當赤身黑若淋不止以意節度更增服之並出第六十五卷中小品地膚湯療下焦諸結熱小便赤黃數起出少大痛或便血溫病後餘熱及霍亂後當風取熱過度飲酒房勞及步行冒熱冷飲逐熱熱結下焦及乳石熱動關格少腹堅胞脹如斗大諸淋服之即通方地膚草三兩知母豬苓去皮瞿麥黃芩升麻通草各二兩海藻一兩葵子一升枳實二兩炙上十味切以水九升煮取三升分為三服大小便皆閉者加大黃三兩婦人房勞腎中有熱小便難不利腹滿痛脈沉細者加豬腎一具千金同崔氏云若加豬腎先以水一斗半煮取一斗納藥煎又療淋榆皮湯方榆皮半斤滑石二兩一方一兩黃芩一兩一方二兩甘草炙瞿麥各二兩葵子一升上六味切以水一斗煮取三升溫服一升旦服忌海藻菘菜並出第四卷中集驗療淋方以比輪錢三百文以水一斗煮取三升飲之神效肘後同千金治氣淋通按比輪錢未詳又方取牛耳中毛燒灰服半錢匕立愈文仲必效同又方燒頭髮灰服之良文仲同並出第五卷中千金療淋痛方滑石四兩貝子三十枚燒茯苓白朮通草芍藥各二兩上六味搗篩為散酒服方寸匕日二服大良又方葵子五合茯苓白朮當歸各二兩上四味切以水七升煮取三升分三服範汪同又方栝蔞滑石石葦去毛各二兩上三味為散以大麥粥飲服方寸匕日三服良又方蜀葵根八兩大麻根五兩甘草一兩炙貝子五合燒通草二兩茅根三斤石首魚頭石四兩上七味切以水一斗二升煮取五升分為五服日三夜二服亦主石淋又方取細白沙三升一味熬令極熱以酒三升淋取汁一合服之一云頓服又方榆皮一斤車前子一升冬瓜子一升鯉魚齒桃膠地麥草通草各二兩瞿麥四兩上八味切以水一斗煮取三升分三服日三服又療猝淋方灸外踝尖七壯又方取石首魚頭石末水服方寸匕日三服又方鯉魚齒燒灰末酒服方寸匕日三服並出第二十一卷中崔氏療淋散方石葦洗刮去毛大蟲魄一兩研滑石一兩半當歸芍藥黃芩冬葵子瞿麥各一兩亂髮三團如雞子大燒灰茯苓一兩半上十味搗篩為散服方寸匕日二服出第四卷中通按大蟲魄即琥珀古今録驗療淋瞿麥散方主簿甄權處瞿麥石葦去毛滑石車前子葵子各四兩上五味搗篩冷水服方寸匕日三服增至三匕又方取生續斷絞汁一升服之又療淋滑石湯方滑石一兩榆白皮二兩石葦一兩去毛地麥草二兩葵子二兩上五味切以水一斗煮取四升分四服日再服甚良又療淋榆皮湯方瞿麥二兩防葵一兩榆白皮一兩葵子一升滑石二兩一方四兩黃芩一兩一方二兩甘草二兩一方一兩炙上七味切以水一斗煮取三升分二服又方取附船底苔大如鴨子以甌半水煎取一甌頓服日三服千金治氣淋並出第二十六卷中近效療淋方葵子一升上一味以水三升煮取二升去滓分溫服煎茅根飲之亦佳又方人參六分厚朴三分炙粟米二合上三味切以水三升煮取七八合以新布絞去滓分溫三服服別相去如人行七里又方茯苓地骨皮各三兩甘草炙黃芩前胡生薑各二兩麥門冬八兩去心竹葉切一升蒲黃二兩上九味切以水九升煮二升六合去滓分為三服五淋方三首集驗論五淋者石淋氣淋膏淋勞淋熱淋也石淋之為病小便莖中痛尿不得猝出時自出痛引少腹膀胱裡急氣淋之為病小便難常有餘瀝膏淋之為病尿似膏白出少腹膀胱裡急勞淋之為病倦即發痛引氣衝小便不利熱淋之為病熱即發其尿血後如豆汁狀蓄作有時五淋各異療方用雜故不載也並出第五卷中範汪療五淋方䗪蟲五分熬一作虻蟲斑蝥二分去翅足熬地膽二分去足熬豬苓三分上四味搗篩為散每服四分匕日進三服夜二服但少腹有熱者去豬苓服藥二日後以器盛小便當有所下肉淋者下碎肉血淋者下如短繩若如肉膿氣淋者下如羹上肥石淋下石或下砂劇者十日即愈禁食羹豬肉生魚蔥鹽醋以小麥汁服之良又療五淋神良延命散方滑石礜石燒半白石膏車前子露蜂房炙並白子用之貝子搗著苦酒中二三宿取細者用之柏子仁魚齒搗令熟雞矢白苦瓠中穰並子熬特牛陰頭毛燒芒硝熬令汁盡各一分白雞膍胵里黃皮熬婦人陰上毛二分燒一本無上十四味搗篩為散每服半錢匕加至一錢匕日三夜一服以葵子飲下之三日愈甚者不過六七日愈小便以器盛之當見石及諸物也並出第十五卷中必效療五淋方白茅根四斤銼之以水一斗五升煮取五升去滓分三四服肘後千金同出第三卷中石淋方一十六首病源石淋者淋而出石也腎主水水結則化為石故腎客砂石腎虛為熱所乘熱則成淋其病之狀小便則莖里痛溺不能猝出痛引少腹膀胱裡急砂石從小便道出甚者塞痛令悶絶出第十四卷中範汪療石淋方鱉甲燒灰搗篩為散酒服方寸匕頻服數劑當去石也肘後同又方取人家籬牆上連蔓葎闊掘出見其根挽斷以杯於坎中承其汁服之一升石自當出若不出更服一升又方取車前子二升用絹囊盛之以水八升煮取三升去滓頓服之移日又服石當下也宿勿食服之神良肘後千金同又方柏子仁芥子滑石各等分上三味搗篩為散以麥汁飲服方寸匕日三服已效又方牛角燒灰服方寸匕日五六服任意飲酒又方瞿麥子搗為末酒服方寸匕日三服至一二日當下石又香薷搗作屑以酢漿飲服方寸匕日三至二三日當下石並出第十五卷中小品療石淋方浮石取滿一手搗為末以水三升苦酒一升煮取二升澄清溫服一升不過再三服石即出古今録驗千金崔氏同出第四卷中集驗療石淋方鯉魚齒一升貝齒一升搗篩以三歲苦酒和分為三服宿不食旦服一份日中服一份暮服一份古今録驗範汪同文仲石淋方桃膠如棗大夏月著三合冷水中冬月以湯三合和之一服日三當下石石盡即止千金古今録驗同又方濃煮車前草汁飲之良也古今録驗同出第四卷中古今録驗療石淋及諸淋方石首魚頭石十四枚當歸等分上二味搗篩為散以水二升煮取一升頓服立愈單用魚頭石亦佳又石淋石葦散方石葦去毛滑石各三分上二味搗篩為散用米汁若蜜服一刀圭日二服範汪同又方取生葎葉搗絞取汁三升為三服石自出範汪同又滑石散療石淋莖中疼痛瀝瀝晝夜百餘行內出石及血方滑石二十分石葦去毛當歸通草地膽去足熬鍾乳研各二分車前子三分瞿麥蛇床子二分細辛蜂房炙各一分上十一味為散以葵汁麥粥服方寸匕日三又療石淋瀝瀝莖中痛晝夜百行或血出延命散方滑石牛角䚡燒灰芒硝各二兩瞿麥三兩車前子露蜂房炙貝子燒柏子仁魚齒炙雞矢白苦瓠子燒牛陰頭毛各一兩婦人陰上毛二分一本無上十三味搗篩為散以葵汁服方寸匕日三服又療石淋方取雞子陳者一枚用苦酒一升以雞子合苦酒置器中以油紙三四重密封頭不令水得入沉井中一宿平旦取剝去皮吞其黃石即消去並出第二十六卷中血淋方五首病源血淋者是熱淋之甚者則尿血謂之血淋心主血血之行身通遍經絡循環腑臟勞熱甚者則散失其常經溢滲入胞而成血淋也出第十四卷中廣濟療血淋不絶雞蘇飲子方雞蘇一握竹葉一握切石膏八分碎生地黃一升切蜀葵子四分末湯成下上五味以水六升煮取二升去滓和葵子末分溫二服如人行四五里久進一服古今録驗範汪同又療血淋小便磣痛方雞蘇二兩滑石五兩碎生地黃半斤小蘇根一兩竹葉二兩通草五兩石膏五兩碎上七味細銼以水九升煎取三升去滓分溫三服如人行四五里進一服並出第四卷中千金療血淋方石葦去毛當歸芍藥蒲黃各等分上四味為散酒服方寸匕日三服肘後文仲同出第二十一卷中備急陶氏療淋下血二升者方取苧麻根十枝以水五升煮取二升一服血止神驗肘後古今録驗同又方灸足大趾前節上十壯良並出第六卷中小便赤色如紅方三首延年論曰療小便赤色如淺紅花汁此是憂愁驚恐心氣虛熱客邪氣與熱傳搏心所以小便赤心主南方火旺在四月五月六月其色赤驚恐動於心心不受邪邪即傳於小腸滲入胞中所以小便赤此為微邪其病猶輕今服丸子即得漸瘥心即是火火惡於清清即是水水能滅火既損心氣即不得食熱及冷水並勿憂愁如不慎恐小便色赤如血漸即難愈今處乾地黃丸補心神益脾氣散客熱自然調和小便色即自變如常第一不得憂愁在心並勿食熱食及冷水等方乾地黃黃耆各六分防風遠志茯神栝蔞子芩各四分鹿茸炙三分龍骨四分五色者人參五分滑石十二分石葦湯漬一宿刮去皮當歸各二分芍藥蒲黃甘草炙戎鹽各三分車前子八分上十八味篩為末以蜜及棗膏各半相和煎令消散和藥為丸如梧桐子大每食後少時以粥清下十丸日二三稍加至十五二十丸以知為度許孝璋處又茅根飲子療胞絡中虛熱時小便如血色方茅根一升茯苓三兩人參乾地黃二兩上四味切以水五升煮取一升五合去滓分溫五六服一日食盡文仲處文仲通草飲子主熱氣淋澀小便赤如紅花汁色方通草葵子茅根王不留行蒲黃炮桃膠瞿麥滑石各兩甘草七錢上九味切以水一斗煮取六升去滓分溫五六服忌如藥法熱淋方三首病源熱淋者三焦有熱氣搏於腎流入於胞而成淋也其狀小便赤瀝亦有宿病淋今得熱而發者其熱甚則變尿血亦有小便後如似豆羹汁狀者蓄作有時也出第十四卷中廣濟療熱淋方車前草切一升通草三兩切葵根切一升芒硝六分湯成下上四味以水七升煮取二升絞去滓納硝分溫三服服別相去如人行六七里微利為度忌熱食出第四卷中古今録驗療淋小便數病膀胱中熱滑石散方滑石二兩栝蔞三兩石葦二分去毛上三味搗篩為散以大麥粥清服方寸匕日二並出第二十六卷中近效療熱淋日夜數十度服藥不瘥方空腹服井華水一二升必瘥韋鴻臚進用如神效方吃水了後行六七百步甚良勞淋方三首病源勞淋者謂勞傷腎氣而生熱成淋也腎氣通於陰其狀尿留莖內數起不出引少腹痛小便不利勞倦即發也出第十四卷中千金夫勞淋之為病勞倦即發痛引氣衝灸之方灸足太陰百壯在內踝上三寸三報之療與氣淋同又療五勞七傷八風十二痹以為淋勞結為血淋熱結為肉淋小便不通莖中痛及少腹急痛不可忍者方滑石三分王不留行冬葵子車前子桂心甘遂通草各二分石葦四分去毛上八味搗篩為散以麻子粥五合和服方寸匕日三服尿清瘥並出第二十一卷中古今録驗療石淋勞淋熱淋小便不利胞中滿急痛石葦散方通草二兩石葦二兩去毛王不留行一兩滑石二兩甘草炙當歸各二兩白朮瞿麥芍藥葵子各三兩上十味搗篩為散先食以麥粥清服方寸匕日三服出第二十六卷中氣淋方五首病源氣淋者腎虛膀胱熱氣脹所為也膀胱與腎為表裡膀胱熱熱氣流入胞熱則生實令胞內氣脹則少腹滿腎氣不能制其小便故成淋耳其狀膀胱小便皆滿尿澀常有餘瀝是也亦曰氣癃診其少陰脈數者男子則氣淋出第十四卷中千金療氣淋方灸關元五十壯又方挾玉泉相去一寸半灸三十壯又方水三升煮豉一升一沸去滓納鹽一合頓服之又方搗葵子末湯和服方寸匕又方空腹單茹蜀葵一滿口膏淋方二首病源膏淋者淋而有肥狀如膏故謂之膏淋亦曰肉淋此腎虛不能制於肥液故與小便俱出也出第十四卷中千金療膏淋方搗葎草汁三升醋三合和空腹頓服當如大豆汁下一名葛葎也又膏淋之為病尿似膏自出療之一如氣淋也並出第二十一卷中許仁則淋方二首許仁則療小便淋澀方此病有數種有石淋有熱淋有氣淋氣淋者氣壅塞小便不通遂成氣淋此病自須依前療水氣法石淋者緣先服石石氣不散壅遏生熱故成石淋熱淋者體氣生熱更緣食飲將息傷熱熱氣灼灼遂成熱淋更無餘候但若體氣熱小便澀出處酸灑宜依後瞿麥等六味湯大蟲魄等五味散三淋俱服之方瞿麥穗三兩冬葵子一升榆白皮切一升桑根皮六兩白茅根切一升石葦四兩去毛上藥切以水一斗煮取三升去滓分溫三服每服如人行十里久服三五劑後宜合大蟲魄五味散服佳又方大蟲魄六兩石葦三兩去毛瞿麥穗四兩冬葵子一升茯苓六兩上藥搗篩為散煮桑白皮作飲子初服一方寸匕日再服稍加至三匕忌酢物吳升同出下卷中大便難方六首病源大便難者由五臟不調陰陽偏有冷熱虛實三焦不和則冷熱並結故也胃為五穀之海水穀之精化為營衛其糟粕行之於大腸以出也五臟三焦既不調和冷熱壅塞結在腸胃之間其腸胃本實而又為冷熱之氣所並結聚不宣故令大便難也又云邪在腎亦令大便難所以爾者腎臟受邪虛而不能制小便則小便利津液枯燥腸胃乾澀故大便難又渴利之家大便亦難所以爾者為津液枯竭致令腸胃乾燥診其左手寸口人迎以前脈手少陰經也脈沉為陰陰實者病苦閉悶大便不利腹滿四肢重身熱若胃脹右手關上脈陰實者脾實也病苦腸中怵怵一作伏伏如牢狀大便難脈緊而滑直大便亦難趺陽脈微弦法當腹滿不滿者必大便難而腳痛此虛寒從下而上也其湯尉針石別有正方補養宣導今附於後養生方導引法云偃臥直兩手捻左右脅除大便難腹痛脹中寒口納氣鼻出氣溫氣咽之數十病愈出第十四卷中肘後療脾胃不和常患大便堅強難方大黃芍藥厚朴炙各二兩枳實六枚炙麻子別研五合上五味搗篩入麻子蜜和為丸如梧桐子大每服十丸日三服稍稍增之以通利為度可常將之集驗備急古今録驗同出第二卷中千金療大便難方灸承筋二穴三炷在腨中央陷中又方單用豉清醬清羊酪土瓜根汁並單灌之立出範汪同又練中丸主宿食不消大便難方大黃八兩葶藶熬杏仁去皮尖熬芒硝各四兩上四味搗篩為末煉蜜為丸如桐子大每服十丸日三服稍加之並出第十五卷中備急不得大便或十日一月方葵子二升水四升煮取一升去滓一服不愈重作服良忌蒜炙肉古今録驗文仲範汪同姚方出第六卷中古今録驗麻子仁丸療大便難小便利而反不渴者脾約方麻仁二升別為膏枳實半斤炙芍藥半斤大黃一斤厚朴一尺炙杏仁一升去皮尖熬別為脂上六味搗篩為末煉蜜為丸如梧桐子大每服飲下十丸漸增至三十丸日三服此本仲景傷寒論方出第二十六卷中大便不通方一十七首病源大便不通者由三焦五臟不和冷熱之氣不調熱氣偏入腸胃津液竭燥故令糟粕痞結壅塞不通也其湯尉針石別有正方補養宣導今附於後養生方導引法云龜行氣伏衣被中覆口鼻頭面正臥不息九通微鼻出氣療閉塞不通出第十四卷中肘後療大便不通方研麻子以米雜為粥食之又方用礜石如指大者導下部並出第六卷中千金療大便不通方灸第七椎兩旁各一寸七壯又方桃皮三升水五升煮取一升頓服又方水一升煮羊蹄根一把取半升頓服又方煮麻子取汁飲之又方常服蜜煎五合又方豬脂和陳葵子末為丸如梧桐子大每服飲下十丸通即止又方常服車前子及苗並通也又方搗葵根汁服之良又方葵子一升牛酥一升豬脂亦得以水三升煮葵子取一升納酥煮一沸待冷分二服並出第十五卷中必效療大便不通方牛膠一條廣二寸長四寸蔥白一握上二味用水二升和煮消盡去滓頓服之千金同又方濕瓜蒂七枚綿裹納下部如非時醬瓜亦得並出第三卷中崔氏療大便不通方菖蒲末石鹽末上二味相和取半匕和烏麻脂少許綿裹納下部中即通又方豬脂一升溫酒一服令盡良並出第四卷中古今録驗療心腹脹滿大便不通方芍藥六分黃芩五分大黃八分芒硝六分杏仁熬去皮尖八分上五味搗篩為末煉蜜為丸如梧桐子大每服十五丸粥飲下加至二十丸取通利為度經心録同出第二十六卷中近效療大便不通方用豬膽和少蜜於鐺中熬令熟稠丸如棗大納下部中即瘥大便祕澀不通方七首千金療大便祕澀不通神方豬羊膽上一味以筒灌三合許令深入即出矣不盡須臾更灌一方加冬葵子汁和之又有椒豉湯五合豬膏三合灌之佳經心録同又三黃湯療下焦熱結不得大便方大黃三兩黃芩二兩甘草炙一兩梔子二七枚上四味切以水五升煮取一升八合分三服若祕加芒硝二兩並出第十五卷中備急療猝大便閉澀不通方葛氏云削瓜菹如指大導下部中即效又方燒亂髮灰三指捻投水半升一服又方綿裹鹽作三丸如指大納下部中又方煎蜜令強加乾薑末和丸如指導下部中姚云欲死者蜜三升微火煎如飴投冷水中令凝丸如大指長三四寸導之良又方豬膽一枚納下部中姚云療七八日奔氣傷心欲死者須臾便通良範汪同大便失禁並關格大小便不通方二十二首病源大便失禁者大腸與肛門虛冷滑故也肛門大腸之候也俱主行糟粕既虛弱冷滑氣不能溫制故使大便失禁又關格大便不通謂之內關小便不通謂之外格二便俱不通為關格也由陰陽氣不和營衛不通故也陰氣大盛陽氣不得營之曰內關陽氣大盛陰氣不得營之曰外格陰陽俱盛不得相營曰關格關格則陰陽之氣痞結腹內脹滿氣不行於大小腸故關格而大小便不通也又風邪在三焦三焦約者則小腸痛內閉大小便不通日不得前後而手足寒者為三陰俱逆三日死也診其脈來浮牢且滑直者不得大小便也並出第十四卷中範汪療下部閉不通方取烏梅五顆著湯漬須臾出核取熟搗之如彈丸納下部中即通也肘後同又方取蒴藋根一把搗末水和絞去滓強人服一升數用有效兼療腳氣又療大小便不通三陽實大便不通方榆白皮三兩桂心二兩滑石六兩甘草三兩炙上四味以水一斗煮取三升分三服集驗同並出第十六卷中集驗療關格之病腸中轉痛不得大小便一日一夜不瘥欲死方芒硝三兩紙三重裹於炭火內燒令沸安一升水中盡服之當先飲溫湯一二升以來吐出乃飲芒硝汁也肘後同千金療老人小兒大便失禁方灸兩腳大拇趾去爪甲一寸三壯又方灸足大趾奇間各三壯又療大小便不通方灸臍下一寸三壯又方灸橫紋一百壯又方葵子一升竹葉一把上二味以水一升煮一沸頓服之又方葵子一升榆白皮切一升上二味以水五升煮取二升分二服又方水三升煮葵子一升去滓取一升納豬膏一升空肚一服又方鹽半升合蜜三合同煎如飴出之著冷水中丸如指大深納下部中立通並出第十五卷中千金翼濡臟湯主大小便不通六七日腹中有燥糞寒熱煩迫短氣汗出腹滿方生葛根二斤切豬膏二斤大黃一兩切上三味以水七升煮取五升去滓納膏煎取三升澄清強人頓服之羸人分再服出第七卷中備急葛氏療猝關格大小便不通支滿欲死二三日則殺人方鹽以苦酒和塗臍中干又易之必效同陶氏猝大小便不通方紙裹鹽燒投水中服之姚氏風寒冷氣入腸忽痛堅急如吹狀大小便不通或小腸有氣結如升大脹起名為關格病又療大小便不利方苦參滑石貝齒各等分上三味搗篩為散每服飲下一匕或煮葵根汁服之彌佳文仲同出第六卷中古今録驗療關格大小便不通方以水三升煮鹽三合使沸適寒溫以竹筒灌下部立通也又療大小便不通方通草四兩郁李仁三兩去皮車前子五合一方一升黃芩三兩朴硝四兩瞿麥三兩上六味切以水八升煮取二升去滓分三服經心録同又方取生土瓜根搗取汁以水解之於筒中吹納下部即通並出第二十六卷中經心録療關格大小便不通方芒硝烏梅榆白皮各五兩芍藥杏仁去皮尖各四兩麻子仁三兩大黃八兩上七味切以水七升煮取三升分為三服一方無烏梅加枳實幹地黃各二兩又療大小便不通方滑石二兩葵子榆白皮各一兩上三味下篩為散煮麻子汁一升半取二匕和服兩服即通並出第二卷中近效療大小便不通方含硝石吐去水關格脹滿不通方四首千金療關格脹滿不通方芍藥六分芒硝六分黃芩五分杏仁八分去皮尖大黃八分上五味末之蜜和丸如桐子飲下十丸日二服良又方獨頭蒜燒熟去皮綿裹納下部氣立通削姜裹鹽導並佳又方乾薑鹽杏仁上三味等分搗導之又療脹滿關格不通方吳茱萸一升熬乾薑大黃桂心當歸芍藥甘草炙芎藭各二兩雄黃三分研人參細辛各四兩真珠一分研桃白皮一握上十三味切以水一斗煮取三升去滓納雄黃真珠末酒一升微火煎三沸服一升得下即止不必盡也每服如人行十里久進之並出第十五卷中許仁則大便暴閉不通方二首許仁則論曰此病久無餘候但由飲食將息過熱熱氣蘊積祕結若緣氣祕自須仍前療氣法服巴豆等三味丸及療水氣葶藶等諸方取利若是風祕自依後服大黃等五味丸暴祕之狀骨肉強痛體氣煩熱唇口乾焦大便不通宜依後大黃芒硝二味湯取利方大黃六兩芒硝五兩上藥先切大黃以水四升煮取二升去滓納芒硝頓服之須臾利良久不覺以熱飲投之若服此依前不利宜合後大麻仁等五味丸服之取快利五味大黃丸方大黃五兩大麻子一升微熬研之芒硝六兩乾葛桑根白皮各五兩上五味先搗四味為散然後搗麻仁令如膏即投四味散和搗和少蜜搗之丸如梧子大初服十丸日再服稍稍服得大便通為限主大便風祕不通吳升同出下卷中小便不通方一十三首病源小便不通由膀胱與腎俱有熱故也腎主水膀胱為津液之府此二經為表裡而水行於小腸入胞者為小便腎與膀胱既熱熱入於胞熱氣大盛故結澀令小便不通少腹脹氣急甚者水氣上逆令心急腹滿乃至於死診其脈緊而滑直者不得小便也出第十四卷中廣濟療下冷疼小便不通雞蘇飲子方雞蘇一握通草四兩石葦一兩炙去毛冬葵子一兩半杏仁二兩去皮尖滑石二兩生地黃四兩上七味切以水六升煮取二升半絞去滓分溫三服如人行四五里進一服又方冬葵子五兩通草三兩茅根四兩芒硝二兩湯成下茯苓三兩滑石五兩上六味切以水九升煮取三升去滓納芒硝分溫三服服別相去如人行六七里又方茯苓二分大黃六分芍藥當歸枳實炙白朮人參各二分大麻仁四分上八味切以水六升煮取二升去滓分溫三服要著芒硝亦得並出第四卷中崔氏療小便不通方取熏黃如豆許末之納小孔中神良又方桑根白皮豬苓去皮通草各二兩上三味切以水六升煮取二升分三服又方雞屎白如彈丸以苦酒和服即下不過三四服佳一本云療淋又方足大拇趾奇間有青脈針挑血出灸三壯愈並出第四卷中救急主小便不通方取印成鹽七顆搗篩作末用青蔥葉尖盛鹽末開便孔納葉小頭於中吹之令鹽末入孔即通非常之效又方取嫩榖木梢濃汁可飲半升以來即愈必效療小便不通不得服滑藥急悶欲絶方鹽二升大鐺中熬以布綿裹尉臍下挼之小便當漸通也肘後同古今録驗療熱結小便不通利方刮滑石屑水和塗少腹及繞陰際干復塗之肘後同又方取鹽填滿臍中大作艾炷灸令熱為度良肘後千金同並出第二十六卷中近效療小便不通數而微腫方取陳久筆頭燒作灰和水服之小便難及不利方九首病源小便難者此是腎與膀胱熱故也此二經為表裡俱主水水行於小腸入胞為小便熱氣在於臟腑水氣則澀其熱勢微故但小便難也診其尺脈浮小便難尺脈濡小便難尺脈緩故小便難有餘澀也出第十四卷中集驗療小便難淋瀝湯方滑石八兩石葦三兩去毛榆皮一升葵子一升通草四兩上五味切以水一斗煮取三升分三服一方加黃芩三兩又療淋小便不利陰痛石葦散方石葦二兩去毛瞿麥一兩滑石五兩車前子三兩葵子二兩上五味搗篩為散服方寸匕日三並出第五卷中千金療小便不利莖中痛少腹急方通草二兩葶藶子熬三兩茯苓二兩上三味搗為散以水服方寸匕日三服忌醋物出第二十一卷中備急療小便不利莖中痛劇亦療婦人血結腹堅痛牛膝飲方生牛膝一名牛唇掘取根煮服之立瘥肘後同陶效方秦艽二分冬瓜子二兩上二味搗為末酒服一匕日三服神良肘後同文仲療小便不利方桑螵蛸三十枚黃芩一兩上二味切以水一升煮取四合頓服之良肘後同又方蒲黃滑石各一分上二味為散酒服一匕日三大驗肘後同又療諸淋及小便常不利陰中痛日數十度起此皆勞損虛熱所致常將散服方石葦去毛滑石瞿麥王不留行葵子各二兩上六味搗篩為散每服方寸匕日三服之姚方加滑石五兩車前子三兩無王不留行備急同出第四卷中古今録驗療淋胞痛不得小便滑石散方滑石葵子鍾乳各一兩桂心通草王不留行各半兩上六味搗篩為散先食訖以酒服方寸匕日三服忌生蔥出第二十六卷中遺尿方六首病源遺尿者此由膀胱虛冷不能約於水故也膀胱為足太陽腎為足少陰二經為表裡腎主水腎氣下通於陰小便者水液之餘也膀胱為津液之府府既虛冷陽氣衰弱不能約於水故令遺尿也診其脈來過寸口入魚遺尿肝脈微滑亦遺尿左手關上脈沉為陰絶者無汗脈也若遺尿尺脈實少腹牢痛小便不禁尺中虛小便不禁腎病小便不禁脈當沉滑而反浮大其色當黑反黃此土之剋水為逆不治其湯尉針石別有正方補養宣導今附於後養生方導引法云蹲踞高一尺許以兩手從外屈膝至趺上急手握足五趾極力一通令內曲以利腰髖療遺尿也出第十四卷中集驗療遺尿方取雄雞腸燒灰為末用三指一撮服之朝暮服當愈範汪同出第五卷中千金療遺尿小便澀方牡蠣熬鹿茸炙各四兩桑耳三兩阿膠二兩炙上四味切以水七升煮取二升分為二服作散以飲送之經心録同又方木防己二兩葵子二兩防風三兩上三味切以水五升煎取二升半分溫三服作散亦佳古今録驗同並出第二十一卷中古今録驗牡蠣湯療遺尿小便澀方牡蠣四兩熬鹿茸炙四兩阿膠炙各二兩桑螵蛸二兩上四味切以水五升煮取二升分再服又方桑耳三分礬石二分熬汁盡阿膠二分炙龍骨三分上四味為散空心服方寸匕日三服又方桑耳二兩牡蠣三兩熬礬石二兩熬汁盡上三味搗篩為散酒服方寸匕日三服並出第二十六卷中尿血方一十一首千金療房損傷中尿血方牡蠣熬車前子桂心黃芩上四味等分搗篩為散飲服方寸匕日三服不知加至二匕忌生蔥出第二十一卷中崔氏療猝傷熱行來尿血方大黃末芒硝末各半匕上二味冷水和頓服之立止三日內禁如藥法出第四卷中古今録驗療尿血鹿茸散方鹿茸炙當歸乾地黃各二兩葵子五合蒲黃五合上五味搗篩為散酒服方寸匕日三服忌蕪荑出第二十六卷中蘇澄療尿血方車前草搗絞取汁五合空腹服之瘥又方水服亂髮灰方寸匕日三服肘後千金同又方服益母草汁一升瘥一云葎草又方車前三升水五升煮取二升分三服棘刺二升水三升煮取二升分三服瘥又方膠三兩炙以水二升煮取一升四合分再服又方酒服蒲黃二方寸匕日二服水服亦得又方搗水筋汁服六七合日一服胞轉方一十五首病源胞轉者由是胞屈闢小便不通名為胞轉其病狀臍下急痛小便不通是也此病或由小便應下強忍之或為寒熱所迫此二者俱令水氣上還氣迫於胞屈闢不得充張外水應入不得入內溲應出不得出外內相壅塞故令不通此病至四五日乃有致死者飽食訖應小便而忍之或飽食訖而走馬或小便因急奔走或忍尿入房亦皆令胞轉或胞落並致死出第十四卷中肘後療猝小便不通及胞轉方取雞子中黃一枚服之不過三服佳備急同又方水上浮萍曝乾末服之小便不通利水脹流腫佳千金翼同又方炙桑螵蛸搗為末水服之方寸匕日服良效又療小便忍久致胞轉方自取爪甲火燒服之備急又方取梁上塵三指撮以水服之神效又方服蒲黃方寸匕日三服良範汪療胞轉不得小便方用蒲席捲人倒立令頭至地三反則通肘後同又方雀矢半合車前子滑石各四兩通草芍藥各二兩上五味切以水七升煮取三升服五合日二先食服立愈又療胞轉欲死及失溺方取豆醬清和灶突中黑如豆大納陰孔中立愈並出第十五卷中備急療猝小便不通及胞轉方車前草一斤水一斗煮取四升分四服小品同出第六卷中古今録驗療胞轉小便不通亂髮散方亂髮三斤洗去垢燒滑石半斤鯉魚齒一兩上三味搗篩為散以飲服方寸匕日三服良又療胞轉不得小便方真琥珀一兩蔥白十四莖上二味以水四升煮取三升去蔥白末琥珀細篩下湯中溫服一升日三服佳範汪同又張苗說有容忍小便令胞轉大小便不得四五日困篤欲死無脈服此瘥方滑石二兩亂髮三兩燒灰上二味搗下篩取生桃白皮一斤熟舂以水合絞得汁二升以汁服散方寸匕日三服即愈其但淋者取亂髮三兩燒灰滑石五兩合搗為散服方寸匕日三服又說不得小便者為胞轉或為寒熱氣所迫胞屈闢不得充張津液不入其中為尿及在胞中尿不出方當以蔥葉除尖頭納入莖孔中吹之初漸漸以極大吹之令氣入胞中津液入便愈也朱郁用此藥療郭虎將十五歲男用葵子一升通草甘草各二兩炙石葦一兩半去毛滑石四兩榆皮二升上六味以水一斗煮取三升令服範汪同並出第二十六卷中小便血及九竅出血方一十二首小品療小便血菟絲丸方菟絲子蒲黃乾地黃白芷荊實葵子敗醬當歸茯苓芎藭各二兩上十味合搗為末以白蜜和丸如梧子大飲服二丸日三服不知加至五六丸劉洪玘方已效常服忌酢物蕪荑古今録驗範汪同又斷血諸方所云下血者其從腹裡出者悉為下血也有痔病血從孔邊出者別尋痔方出第四卷中千金療小便出血方一本云以下治勞虛尿白濁灸脾俞百壯在第十椎又方灸三焦俞百壯在第十三椎又方灸腎俞百壯在第十四椎又方灸章門百壯在季肋端又方榆皮二斤水二斗煮取五升令服之佳又方搗干羊骨下篩水服方寸匕日三服又治小便血方生地黃八兩柏葉一把黃芩三兩阿膠二兩上四味切以水七升煮取三升去滓納膠分三服並出第二十一卷中文仲療小便出血方生地黃汁一升生薑汁一合上二味相和頓服不瘥更作此法許令公處云極效肘後同又方灸足第二趾本第一紋七壯立愈肘後同又方龍骨末二方寸匕溫酒一升服之日三服深師肘後範汪陶氏同又方當歸四兩酒三升煮取一升頓服之肘後深師範汪同並出第六卷中小便不禁方二首病源小便不禁者腎氣虛下焦受冷也腎主水其氣下通於陰腎虛下焦冷不能溫制其水液故小便不禁也出第十四卷中千金翼小便不禁日便一二斗或如血色方麥門冬去心乾地黃各八兩蒺藜子桂心續斷各二兩甘草一枚炙乾薑四兩上七味切以水一斗煮取二升五合分三服又久房散主小便多或不禁方菟絲子二兩酒漬蒲黃三兩黃連三兩硝石一兩肉蓯蓉二兩五味子三兩雞膍胵中黃皮三兩炙上八味搗篩為散每服方寸匕日三服每服如人行三四里又服並出第十五卷中小便數及多方五首病源小便數者膀胱與腎俱虛而有客熱乘之故也腎與膀胱為表裡俱主水腎氣下通於陰此經既虛致受於客熱虛則不能制水故令數小便熱則水行澀澀則小便不快故令數起也診其脈趺陽脈數胃中有熱即消穀引食大便必硬小便則數其湯尉針石別有正方補養宣導今附於後養生方導引法云以兩踵布膝除數尿出第十四卷中範汪療小便數而多方黃連二分苦參二分麥門冬去心一兩土瓜根龍膽各一分上五味搗篩以蜜丸如梧子每服十丸加至二十丸良一方無苦參有黃芩又方栝蔞十分黃連五分上二味搗篩為散每服方寸匕日三良又方瞿麥二兩滑石一兩葵子一升黃芩甘草炙各一兩上五味切以水六升煮取三升去滓一服六合又方桃仁一味㕮咀酒一升煮三沸去滓分為三服強人一服盡之並出第十七卷中集驗療小便數而多方羊肺羹納少許羊肉合作之調和鹽如常食之法多少任意不過三具效範汪同出第五卷中許仁則小便數多方四首許仁則論此病有二種一者小便多而渴飲食漸加肌肉漸減乏氣力少顏色此是消渴一者小便雖數而不至多又不渴食飲亦不異常或不至多能食但稍遇天寒冷即小便多更無別候此是虛冷所致大都兩種俱緑緣氣膀胱冷不瘥便能殺人腎虛腰冷無所為害若候知是消渴小便數宜依後菝葜等八味湯黃耆等十四味丸並竹根等十味飲小麥面等十四味煎以次服之菝葜八味湯方菝葜土瓜根各三兩黃耆地骨皮五味子各四兩人參三兩石膏八兩碎牡蠣三兩上藥切以水一斗煮取三升去滓分溫三服每服如人行十里服一劑服至五六劑佳隔五日服一劑劑數滿宜合後黃耆等十四味丸服之又黃耆十四味丸方黃耆黃連土瓜根各五兩苦參三兩玄參六兩栝蔞地骨皮龍骨菝葜鹿茸炙各四兩牡蠣熬人參桑螵蛸炙各三兩五味子一升上藥搗篩為末蜜和為丸用後竹根飲下之初服十五丸日二服稍加至三十丸如梧桐子大忌豬肉冷水又竹根飲子方䈽竹根生茅根蘆根各切五升菝葜切二升石膏一斤杵碎烏梅三十枚生薑切一升小麥三升竹瀝二升白蜜一升上藥以水五斗煮取一斗去滓納竹瀝及蜜著不津瓶貯之用下前丸縱不下丸但覺口乾及渴即飲之如熱月即逐日斟酌煎之多則恐壞也如不能作此飲且用烏牛乳下丸及解渴日服丸及飲夜中恐虛熱宜合後小麥面等十四味煎細細含咽之又小麥面十四味煎方小麥五升以水硬溲之別於水中揉挺令麵粉盡麵筋別成一塊即止以此麵粉汁別器澄停瀝卻清汁即以稠粉盛於練袋子中漉著令微燥生葛根五挺徑三寸長二尺碎捶於水中揉挺令葛根中粉汁盡別器澄停盛貯一如小麥面法生栝蔞五斤搗如上法胡麻三升去皮熬令熟為散䈽竹根切一斤生茅根切一斤生蘆根切一斤烏梅五十個以上用水五斗緩火煎取一升半去滓澄取清冬瓜汁二升生麥門冬汁三升生薑汁一升牛乳一升白蜜二升先取竹根等汁和冬瓜以下汁微火上煎減半次納牛乳白蜜又煎六七沸投小麥麵粉生葛粉栝蔞粉胡麻散於諸汁中煎和熟攪之勿住手候如稠糖即成成訖止火待冷貯別器中每夜含如此初服一棗大稍稍加至一匙亦任性日日含之欲作丸飲服亦得出第十卷中尿床方六首病源人有於眠睡不覺尿出者是其稟質陰氣偏盛陽氣偏虛則膀胱腎氣俱冷不能溫制於水則小便多或不禁而遺尿膀胱足太陽也為腎之腑腎為足少陰為臟與膀胱合俱主水凡人之陰陽日入而陽氣盡則陰受氣至夜半陰陽大會氣交則臥睡小便者水液之餘也從膀胱入於胞為小便夜臥則陽氣衰伏不能制於陰所以陰氣獨發水下不禁故於眠睡而不覺尿出也出第十四卷中千金療尿床方羊肚系盛水令滿急系兩頭熟煮開取水頓服之立瘥又方雞䏶胵一具並腸曝乾末酒服之男雌女雄也又方羊胞盛水滿中炭火燒之盡肉晨朝空腹服之不過四五頓瘥又療尿床方新炊熟漬飯一盞瀉尿床處拌之收取與食之勿令知又方垂兩手髀上盡指陷處灸七壯又灸臍橫紋七壯並出第二十一卷中近效療尿床方取麻鞋乳帶及鼻根等唯不用底須七輛以水七升煮取二升分再服灸穴雜法一十二首千金翼灸五淋法灸大敦三十壯又石淋臍下三十六種疾不得小便法灸關元三十壯一方云百壯又血淋法灸丹田穴隨年壯良又方灸復溜穴五十壯一云隨年壯又尿黃法灸石門穴五十壯又遺尿法灸遺道挾玉泉五寸隨年壯又法灸陽陵泉穴隨年壯又失禁尿不自覺知法灸陰陵泉穴隨年壯又莖中痛法灸行間穴三十壯又腹滿小便數法灸屈骨端二七壯又淋痛法灸中封穴三十壯亦隨年壯又小便不利及轉胞法灸心下八寸七壯以上穴並出第二十七卷中
