稍加千金文仲集驗古今錄驗同云療症堅心下大如杯食則腹滿心腹絞痛又熨症方灶中黃土一升生葫一升上二味先搗葫熟納土復搗以好苦酒澆令浥浥先以塗布一面仍㩉病上又塗布上干復易之取令消止並出第一卷中症癖痃氣灸法四首崔氏療症癖閃癖方令患人平坐取麻線一條繞項向前垂線頭至鳩尾橫截斷即回線向後當脊取線窮頭即點記乃別橫度口吻吻外截卻即取度吻線中折於脊骨點處中心上下分之各點小兩頭通前合灸三處其所灸處日別灸七壯以上十壯以下滿十日即停看患人食稍得味即取線還度口吻於脊中點處橫分灸之其數一準前法仍看脊節穴去線一二分亦可就節穴下火如相去遠者不須就節穴若患人未捐可停二十日外還依前灸之仍灸季肋頭二百壯其灸季肋早晚與灸脊上同時下火也又灸閃癖法其癖有根其根有著背者有著膊上者遣所患人平坐熟看癖頭仍將手從癖頭向上尋之當有脈築築然向上細細尋至膊上至築築頭當膊即下火還與前壯數無別王丞云背上恐不得過多下火只可細細日別七炷以來又療癖左右相隨病灸法第一屈肋頭近第二肋下即是灸處第二肋頭近第三肋下亦是灸處左右各灸五十壯一時使了千金云灸症癖方患左灸左患右灸右脊屈肋數第二肋上第三肋下向肉趐前初日灸三次日五周而復始至五十止忌大蒜余不忌又灸痃氣法從乳下即數至第三肋下共乳上下相當稍似近肉接腰骨外取穴孔即是灸處兩相俱灸初下火各灸三壯明日四壯每日加一壯至七壯還從三壯起至三十日即罷上前兩種灸法若點時拳腳點即拳腳灸若舒腳點時還舒腳灸並出第七卷中積聚方五首病源積聚者由陰陽不和腑臟虛弱受於風邪搏於腑臟之氣所為也腑者陽也臟者陰也陽浮而動陰沉而伏積者陰氣五臟所生始發不離其部故上下有所窮已聚者陽氣六腑所成故無根本上下無所留止其痛無有常處諸臟受邪初未能為積聚留滯不去乃成積聚肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發痎瘧連歲月不已以季夏戊巳日得之何以言之肺病當傳肝肝當傳脾脾季夏適王王者不受邪肝欲復還肺肺不肯受故留結為積故知肝之積以季夏戊巳日得之也心之積名曰伏梁起臍上大如臂上至心下以秋庚辛日得之何以言之腎病當傳心心當傳肺肺以秋適王王者不受邪心欲復還腎腎不肯受故留結為積故知伏梁以秋庚辛日得之也脾之積名曰痞氣在胃管覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚以冬壬癸日得之何以言之肝病當傳脾脾當傳腎腎以冬適王王者不受邪脾欲復還肝肝不肯受故留結為積故知痞氣以冬壬癸日得之也肺之積名曰息賁在右脅下覆大如杯久不愈令人灑浙寒熱喘咳發肺癰以春甲乙日得之何以言之心病當傳肺肺當傳肝肝以春適王王者不受邪肺欲復還心心不肯受故留結為積故知息賁以春甲乙日得之也腎之積名曰賁豚發於少腹上至心下若豚賁走之狀上下無時久不愈令人喘逆骨痿少氣以夏丙丁日得之何以言之脾病當傳腎腎當傳心心以夏適王王者不受邪腎欲復還脾脾不肯受故留結為積故知賁豚以夏丙丁日得之也此為五積診其脈駃而緊積聚脈浮而牢積聚脈橫者脅下有積聚脈來小沉實者胃中有積聚不下食食即吐出脈來細䎡附骨者積也脈出在左積在左脈出在右積在右脈兩出積在中央以部處之診得肺積脈浮而毛按之辟易脅下氣逆背相引痛少氣善忘目瞑皮膚寒秋愈夏劇主皮中時痛如蝨綠狀其甚如針刺之狀時癢白色也診得心積脈沉而芤時上下無常處病悸腹中熱面赤咽乾煩掌中熱甚即唾血主身瘛瘲主血厥夏瘥冬劇色赤也診得脾積脈浮大而長飢則減飽則見䐜起與谷爭累累如桃李起見於外腹滿嘔泄腸鳴四肢重手足脛腫厥不能臥是主肌肉損色黃也診得肝積脈弦而細兩脅下痛邪走心下足脛寒脅痛引少腹男子積疝也女子病淋也身無膏澤喜轉筋爪甲枯黑春瘥秋劇色青也診得腎積脈沉而急苦脊與腰相引飢則見飽則減病腰痛少腹裡急口乾咽腫傷爛目䀮䀮骨中寒主髓厥喜忘色黑也診得心腹積聚其脈牢強急者生脈虛弱急者死又積聚之脈實強者生沉者死其湯熨針石別有正方補養宣導今附於後養生方導引法云以左足踐右足上除心下積又云病心下積聚端坐柱腰向日仰頭徐以口內氣因而咽之三十過而止開目又云左脅側臥伸臂直腳以口內氣鼻吐之通而復始除積聚心下不便又云以左手按右脅舉右手極形除積及老血又云閉口微息正坐向王氣張鼻取氣逼置臍下小口微出十二通氣以除結聚低頭不息十二通以消飲食令人輕強行之冬月令人不寒又云端坐拄腰直上展兩臂仰兩手掌以鼻內氣閉之自極七息名曰蜀王橋除脅下積聚又云向晨去桃正偃臥伸臂脛瞑目閉口不息極張腹兩足再息頃間吸腹仰兩足倍拳欲息微定復為春三夏五秋七冬九盪滌五臟津潤六腑所病皆愈腹有病積聚者張吸其腹熱乃止癥瘕散破即愈矣出第十九卷中範汪破積丸療積聚堅症方大黃一斤牡蠣三兩凝水石一兩石膏一兩石鐘乳一兩理石一兩上六味搗合下篩和以蜜丸如梧子先食服酒飲任下三丸日三不知稍增以知為度又順逆丸主久寒積聚氣逆不能食方大黃十分黃芩四分厚朴四分炙乾地黃四分桂心四分滑石四分杏子二分黃連四分麥門冬四分去心上九味搗合下篩和以蜜丸如梧子服十丸日再服後食不知稍增以知為度忌蕪荑生蔥豬肉又捶鑿丸療腹中積聚邪氣寒熱消穀方甘遂一分蕘花一分芫花一分桂心一分巴豆一分杏仁一分桔梗一分上七味蕘花芫花熬令香巴豆杏仁去皮熬令變色已各異搗下細篩搗合丸以白蜜搗萬杵服如小豆一丸日三行長將服之傷寒增服膈上吐膈下利小兒亦服婦人兼身亦服名曰捶鑿以消息之忌豬肉蘆筍生蔥並出第十三卷中延年療腹內積聚癖氣衝心肋急滿時吐水不能食兼惡寒方鱉甲六分炙防葵四分人參四分前胡四分桔梗四分檳榔八分白朮八分大黃八分枳實四分炙厚朴三分炙當歸四分附子四分炮乾薑四分甘草五分炙吳茱萸三分上十五味搗篩蜜和為丸梧子大一服十五丸酒下日再服加至三十丸忌莧菜豬肉生冷魚蒜又白朮丸主積聚癖氣不能食心肋下滿四肢骨節痠疼盜汗不絕方白朮六分黃耆六分牡蠣四分熬人參六分茯苓六分烏頭六分炮乾薑六分芍藥四分當歸六分細辛四分麥門冬四分去心桂心五分前胡四分甘草六分炙防葵三分鱉甲四分炙紫菀三分炙檳榔六分桔梗三分上十九味搗篩蜜和為丸空肚酒下二十丸日再加至三十丸忌莧菜桃李大醋豬肉生蔥並出第十六卷中積聚心腹痛方三首病源積者陰氣五臟所生其痛不離其部故上下有所窮已聚者陽氣六腑所成故無根本上下無所留止其痛無有常處此皆由寒氣搏於臟腑與陰陽氣相擊下上故心腹痛也診其寸口之脈沉而橫脅下有積腹中有橫積聚痛又寸口脈細沉滑者有積聚在脅下左右皆滿與背相引痛又云寸口脈緊而牢者脅下腹中有橫積結痛而泄痢脈微細者生浮者死出第十九卷中範汪通命丸療心腹積聚寒中㽲痛又心胸滿脅下急繞臍痛方大黃四分遠志四分去心黃耆四分麻黃四分去節甘遂四分鹿茸四分炙杏仁六十枚豉一合巴豆五十枚芒硝三分上十味搗合下篩和以蜜丸如小豆先食服三丸日再忌蘆筍野豬肉一方無鹿茸黃耆用黃芩出第十四卷中又療心腹積聚食苦不消胸脅滿除去五臟邪氣四物丸方大戟五分㕮咀熬令色變芫花四分熬杏仁一分巴豆一百枚去皮心熬右藥搗合下細篩以雞子中黃亦可以蜜和丸如小豆日三日增一丸覺勿復益欲下頓服七丸下如清漆陳宿水婦人乳有餘疾留飲者下水之後養之勿飲冷水長壯者服五丸先食忌野豬肉蘆筍出第十三卷中古今錄驗匈奴露宿丸療心腹積聚膈上下有宿食留飲神方出僧深甘草三分炙大黃二分甘遂二分芫花二分熬大戟二分炙葶藶子二分熬苦參一分硝石一分巴豆半分去心皮熬上九味細搗合蜜和丸如小豆服三丸當吐下不吐下稍益至五六丸以知為度先少起忌海藻蘆筍菘菜野豬肉範汪同出第十卷中積聚心腹脹滿方一首病源積聚成病蘊結在內則氣行不宣通還搏於腑臟故心腹脹滿則煩悶而短氣也出第十九卷中深師烏頭丸療心腹積聚脹滿少食多厭繞臍痛按之排手寒中有水上氣女人產後余疾大人風癲少小風驚癇百病者元嘉中用療數人皆良有一人服五服藥即出蟲長一尺餘三枚復出如牛膽黑堅四枚中皆有飯食病即愈方烏頭七枚炮乾薑五分皂莢五分炙兼皮子菖蒲三分桂心四分柴胡三分附子三分炮人參三分厚朴三分炙黃連三分茯苓三分蜀椒五分汗吳茱萸四分桔梗三分上十四味搗篩蜜和為丸服如梧子二丸日三稍加至十五丸忌豬肉冷水醋物生蔥羊肉餳出第二十三卷中積聚宿食寒熱方四首病源積聚而宿食不消者由腑臟為寒氣所乘脾胃虛冷故不能消化留為宿食也診其脈來實心腹積聚飲食不消胃中冷故也出第十九卷中千金翼三臺丸療五臟寒熱積聚臚脹腸鳴而噫食不作肌膚甚者嘔逆若傷寒寒瘧已愈令不復發食後服五丸飲多者吞十丸長服令人大小便調和長肌肉方大黃二兩熬熟硝石一升葶藶一升熬前胡二兩厚朴一兩炙附子一兩炮茯苓半兩半夏一兩洗杏仁一升去尖皮熬細辛一兩上十味搗篩蜜和搗五千杵酒服如梧子五丸稍加以知為度忌豬羊肉餳生菜酢物深師同出第二十卷中古今錄驗氣痞丸療寒氣痞積聚結不通繞臍切痛腹中脹滿胸逼滿風入臟憂恚所積用力不節筋脈傷羸瘦不能食飲此藥令人強嗜食益氣力方烏頭二分炮甘草二分炙葶藶子二分熬大黃二分芎藭二分芍藥二分甘皮二分炙上七味下篩蜜和丸如梧子一服三丸日再不知漸至五丸七丸一方桂心二分去甘皮忌海藻菘菜豬肉冷水等一方有通草無甘皮又小烏頭丸療久寒積聚心腹繞臍切痛食飲不下方烏頭三兩炮甘草三兩炙茱萸半兩細辛二兩半夏二兩附子二兩炮藁本二兩上七味下篩蜜和丸如梧子大先食服五丸日再不知稍增之忌羊豬肉冷水又五通丸主積聚留飲宿食寒熱煩結長肌膚補不足方椒目一兩附子一兩炮厚朴一兩炙杏仁三兩半夏一兩葶藶三兩熬芒硝五兩大黃九兩上八味搗葶藶子杏仁使熟和諸藥末和以蜜搗五千杵吞如梧子二丸忌豬羊肉餳冷水出第十卷中療症方三首病源症者由寒溫失節致腑臟之氣虛弱而食飲不消聚結在內漸染生長塊段盤牢不移動者是症也言其形狀可徵驗也若積引歲月人則柴瘦腹轉大遂至於死診其脈弦而伏其症不轉動者必死出第十九卷中範汪療症病丸方射菵二兩熬蜀椒三百粒汗上二味搗末下細篩以雞子白和丸半如麻子半如赤小豆先服如麻子漸服如赤小豆二丸不知稍增之以知為度出第十三卷中集驗療心腹宿症及卒得症方取雄雞一頭飼之令肥肥後餓二日以好赤朱溲飯極令朱多以飼雞安雞者板上取糞曝燥末溫清酒服五分匕可至方寸匕日三若病困急者晝夜可五六服一雞少更飼余雞取足出第六卷中備急熨症方吳茱萸三升上一味以酒和煮熱布裹以熨症上冷更炒更番用之症移走逐熨都消乃止也肘後方云亦可用射菵五兩茱萸末以雞子白和塗症上出第三卷中暴症方六首病源暴症者由臟氣虛弱食生冷之物臟既本弱不能消之結聚成塊卒然而起其生無漸名之暴症也本由臟弱其症暴生至於成病斃人則速出第十九卷中肘後療卒暴症腹中有物堅如石痛如刺晝夜啼呼不療之百日死方取牛膝根二斤㕮咀曝令極干上一味酒一斗浸之密器中封口舉者熱灰中溫之令味出先食服五六合至一升以意量多少又用蒴藋根亦准此大良千金集驗經心錄張文仲同又凡症堅之起多以漸生而有覺便牢大者自難療也腹中微有結積便害飲食轉羸瘦療多用陷冰玉壺八毒諸大藥今上取小小易得者方取虎杖根勿令影臨水上者可得石余淨洗干之搗作末以秫米五斗炊飯內攪之好酒五斗漬封藥消飯浮可飲一升半勿食鮭鹽症當出亦可但取其根一升干搗千杵酒漬飲之從少起日三亦佳此酒療症乃勝諸大藥張文仲同又方大黃半斤朴硝三兩蜜一斤上三味合於湯上煎可丸如梧子服十丸日三備急文仲崔氏同惟崔氏用朴硝半斤蜜一升半服二十丸日再服余依肘後並出第一卷中千金翼療卒暴症方蒜十片去皮五月五日戶上者伏龍肝鴨卵大一枚桂心一尺二寸上三味合搗以淳苦酒和之如泥塗著布上掩病處三日消肘後千金同凡蒜或無桂心亦得用也又方商陸根搗蒸之以新布籍腹上以藥鋪布上以衣覆冷即易取瘥止數日之中晨夕勿息千金集驗肘後同並出第十九卷中古今錄驗療暴得症方取蒴藋根一小束淨洗瀝去水細切以醇酒浸之取淹根三宿服五合至一升日三若欲速得可於熱灰中溫令藥味出服之此方無毒已愈十六人神驗藥盡復作將服之出第十卷中鱉症方四首病源鱉症者謂腹內癥結如鱉之形狀也有食鱉觸冷不消而生症者有食雜冷物不消變化而作者此皆脾胃氣弱而遇冷不能克消故也症者其病結成推之不動移是也出第十九卷中廣濟療鱉症服白馬尿方白馬尿一升五合溫服之令盡瘥又方白馬尿一升雞子三枚破取白上二味於鐺中煎取三合空腹服之不移時當吐出病無所忌千金同又療鱉症蟹爪丸方蟹爪三分附子六分炮麝香三分研半夏六分生薑四分屑鱉甲六分炙防葵六分郁李仁八合上八味搗篩蜜和為丸如梧子空肚以酒下二十丸日再服以知為度忌生冷豬肉莧菜並出第二卷中集驗療鱉症伏在心下手揣見頭足時時轉者並心腹宿症及卒得症方白雌雞一雙絕食一宿明旦以膏熬飯飼之取其屎無問多少以小便和之於銅器中火上熬令燥搗篩服方寸匕日四五服消盡乃止常飼雞取屎瘥畢殺雞單食之肘後同出第六卷中米症方二首病源人有好啞米啞謹按說文於革切笑也集韻無此字但有飢乙革切飢也今詳啞者飢而喜食之義也下同轉久彌嗜啞之若不得米則胸中清水出得米便止米不消化遂生癥結其人常思米而不能飲食久則斃人出第十九卷中廣濟療米症其疾常欲食米若不得米則胸中清水出方雞屎一升白米五合上二味合炒取米焦搗篩為散用水一升頓服取盡少時即吐吐出症如研米汁碎若無症即吐白沫痰水乃憎米不復食之無所忌千金同又療米症久不療羸瘦以至死方蔥白兩虎口切烏梅三十枚碎上二味以水三升宿漬烏梅使得極濃清晨啖蔥白隨飲烏梅汁令盡頃之心腹煩欲吐即令出之三晨療之當吐去米症瘥無所忌並出第三卷中食症及食魚肉成症方二首病源有人卒大能食乖其常分因飢值生蔥便大食之乃吐一肉塊繞畔有口其病則愈故謂食症特由不幸致此妖異成症非飲食生冷過度之病也出第十九卷中廣濟療食症病食蔥瘥方有一人食飯七升並羊脂餅番不論數因於道中過飢急食生蔥須臾吐出一實簿而圓繞畔有口無數即以食投之立消盡飯七升乃止吐此物後其人食病便愈此名食症無忌出第二卷中千金療食魚肉等成症結在腹內並諸毒氣方狗糞五升上一味燒灰末之綿裹以酒一斗漬再宿濾取清分十服日三服三日令盡隨所食癥結即便出矣出第十一卷中發症方二首病源有人因食飲內誤有頭髮隨食而入胃成症胸喉間如有蟲下上來去者是也出第十九卷中廣濟療發症乃由人因食而入久即胸間如有蟲上下去來唯欲得飲油方油一升上一味以香澤煎之大𨪊鐒貯之安病人頭邊以口鼻臨油上勿令得飲及敷之鼻面並令有香氣當叫喚取飲不得與之必疲極眠睡其發症當從口出飲油人專守視之並石灰一裹見症出以灰粉手捉症抽出須臾抽盡即是發也初從腹出形如不流水中濃菜隨髮長短形亦如之無忌千金同又療胸喉間覺有症蟲上下偏聞蔥豉食香此是發蟲故也方油煎蔥豉令香二日不食張口而臥將油蔥豉置口邊蟲當漸出徐徐以物引去之無所忌出第二卷中蝨症方一首病源人有多蝨性好齧之所齧既多而腑臟虛弱不能消之不幸變化生症而患之者亦少俗云患蝨症人見蝨必齧之不能禁止蝨生長在腹內時有從下部出亦斃人出第十九卷中千金療蝨症由齧蝨在腹生長為蝨症方故篦子一枚故梳子一枚上二味各破為兩分各取一分燒作灰末之又取一分以水五升煮取一升用頓服前末盡少時當病出無所忌廣濟同出第二卷中鱉瘕方一首病源鱉瘕者謂腹內瘕結如鱉狀是也有食鱉觸冷不消而生者亦有食諸雜冷物變化而作者皆由脾胃氣弱而遇冷即不能克消所致瘕言假也謂其形假而推移也昔曾有人共奴俱患鱉瘕奴在前死遂破其腹得一白鱉仍故活有人乘白馬來看此鱉白馬忽尿墮落鱉上即縮頭及腳尋以馬尿灌之即化為水其主曰吾將愈矣即服之果如其言得瘥故養生云六月勿食澤中水令人成鱉瘕出第十九卷中崔氏療鱉瘕方大黃六銖乾薑半兩附子九銖炮人參九銖側子半兩炮桂心六銖貝母半兩白朮二兩細辛十八銖䗪蟲大一寸者七枚熬上十味搗下篩以酒服半方寸匕日三忌豬肉冷水出第九卷中蛇瘕方一首病源人有食蛇不消因腹內生蛇瘕也亦有蛇之津液誤入飲食內亦令人病瘕其狀常苦飢而食則不下喉噎塞食至胸內即吐出其病在腹摸揣亦有蛇狀謂蛇瘕也出第十九卷中崔氏療蛇瘕大黃湯方大黃半兩芒硝如雞子一枚烏賊魚骨三枚黃芩半兩甘草如人指一尺炙皂莢六枚如豬牙者炙去皮子上六味㕮咀以水六升煮之三沸下絞去滓納芒硝適寒溫盡服之十日一劑煮作如上法欲服之宿無食平旦服當下病也千金同出第九卷中蛟龍病方一首病源蛟龍病者云三月八月蛟龍子生芹菜上人食芹菜不幸隨入人腹變成蛟龍其病之狀發則如癲出第十九卷中廣濟療蛟龍病三月八月近海及水邊因食生芹菜為蛟龍子生在芹菜上食入人腹變成龍子須慎之其病發似癲面色青黃少腹脹狀如懷妊宜食寒食餳方寒食粥餳三升日三服之吐出蛟龍有兩頭及尾開皇六年又賈橋有人吃餳吐出蛟龍大驗無所忌千金方同出第二卷中胸痹方二首病源寒氣客於五臟六腑因虛而發上衝胸間則胸痹胸痹之候胸中愊愊如滿噎塞不利習習如癢喉里澀唾燥甚者心裡強痞急痛肌肉苦痹絞急如刺不得俯仰胸前皮皆痛手不能犯胸滿短氣咳唾引痛煩悶白汗出或徹背膂其脈浮而微者是也不治數日殺人其湯熨針石別有正方補養宣導今附於後養生方云以右足踐地左足上除胸痹食熱嘔出第三十卷中仲景傷寒論療胸痹理中湯方人參三兩甘草三兩炙白朮三兩乾薑三兩上四味切以水八升煮取三升去滓溫服一升日三夜一頻服三劑愈張仲景云胸痹心中痞堅留氣結於胸胸滿脅下逆氣搶心理中湯亦主之千金同出第十六卷中深師療胸痹麝香散方麝香四分牛黃二分生犀角一分屑末上三味研服五分匕日三忌生冷物蔥蒜出第十六卷中胸痹短氣方三首千金論曰夫脈當取太過與不及陽微陰弦即胸痹而痛所以然者責其極虛故也今陽虛知在上焦所以胸痹心痛者以其脈陰弦故也平人無寒熱短氣不足以息者實也仲景傷寒論同胸痹之病喘息咳唾胸背痛短氣其脈沉而遲關上小緊數者栝蔞湯主之方栝蔞一枚薤白一斤半夏半升洗生薑四兩枳實二兩炙上五味切以白酨漿一斗煮取四升服一升日三肘後仲景傷寒論無生薑枳實半夏等三味同小品云用水一斗忌羊肉餳又胸中氣塞短氣茯苓湯主之方茯苓三兩甘草一兩炙杏仁五十枚上三味㕮咀以水一斗煮取五升溫服一升日三服不瘥更合仲景傷寒論同並出第十三卷中深師療胸痹連背痛短氣細辛散方細辛乾地黃甘草各二兩炙桂心茯苓各五兩枳實炙白朮生薑栝蔞實各三兩上九味搗篩酒服方寸匕日三古今錄驗千金同出第十三卷中胸痹心下堅痞緩急方四首千金論胸痹之病令人心中堅痞急痛肌中苦痹絞急如刺不得俯仰其胸前皮皆痛手不得犯胸中愊愊如滿咽塞習習癢喉中乾燥時欲嘔吐胸滿短氣咳唾引痛煩悶自汗出或徹引背腹痛不即療之數日殺人出第十三卷中範汪療胸痹心中痞堅留氣結於胸中胸滿脅下逆氣搶心枳實湯方陳枳實四枚炙厚朴四兩炙薤白八兩桂心一兩栝蔞實一枚上五味先以水五升煮枳實厚朴取二升半去滓納余藥又煎三兩沸去滓分溫三服除心氣良古今錄驗千金同此本仲景傷寒論方古今錄驗療胸中隱然而痛脊膂肩痛方桂心一分乾薑一分人參三分細辛三分烏頭一分炮山茱萸三分貝母三分上七味搗下篩和以蜜丸如小豆大酒若粥汁吞二丸稍稍益以胸中痛止溫溫為度忌生蔥生菜豬肉冷水又療胸痹偏緩急薏苡仁散方薏苡仁五百枚附子十枚大者炮甘草三兩炙上三味搗下篩服方寸匕日三忌海藻菘菜豬肉冷水又療胸痹偏緩急薏苡仁散方薏苡仁一千五百枚附子大者十枚炮上二味搗下篩服方寸匕日三不知稍增之忌豬肉冷水此方出僧深範汪同仲景方用薏苡仁十五兩並出第八卷中胸痹噎塞方二首仲景傷寒論胸痹之病胸中愊愊如滿噎塞習習如癢喉中澀唾燥沫是也橘皮枳實湯主之方橘皮半斤枳實四枚炙生薑半斤上三味切以水五升煮取二升分再服肘後小品文仲深師範汪古今錄驗經心錄千金同出第十五卷中千金通氣湯療胸滿短氣噎塞方半夏八兩洗生薑六兩桂心三兩吳茱萸四十枚上四味切以水八升煮取三升去滓分溫三服忌羊肉餳生蔥一方無桂心用橘皮出第十三卷中胸痹咳唾短氣方四首仲景傷寒論胸痹之病喘息咳唾胸背痛短氣寸脈沉而起關脈小緊數者栝蔞薤白白酒湯主之方栝蔞實一枚薤白切半升上二味以白酨酒七升煮取二升去滓溫分再服深師範汪同出第十五卷中肘後論胸痹之病令人心中堅痞急痛肌中苦痹絞急如刺不得俯仰其胸前及背皆痛手不得犯胸滿短氣咳唾引痛煩悶自汁出或徹引背膂不即療數日殺人療卒患胸痹方雄黃巴豆去皮心熬上二味先搗雄黃細篩納巴豆務熟搗之相和丸如小豆服一丸不覺稍益忌野豬肉蘆筍又方枳實炙上一味搗篩以米汁先食服方寸匕日三夜一又或已瘥復更發方取薤根五斤上一味搗絞取汁飲之立愈並出第一卷中胸痹心痛方四首仲景傷寒論胸痹不得臥心痛徹背者栝蔞薤白半夏白酨漿湯主之方大栝蔞一枚薤白切三兩半夏半升洗上三味以白酨漿一斗煮取四升去滓溫服一升日三忌羊肉餳古今錄驗同範汪同出第十五卷中千金療胸痹心痛方灸膻中百壯穴在鳩尾上一寸一云膺腧中行直兩乳內間是忌針又療胸脅滿心痛方灸期門隨年壯穴在第二肋端乳直下不容旁一寸半是並出第十三卷中古今錄驗小草丸療胸痹心痛逆氣膈中飲不下方小草三分桂心三分蜀椒三分汗乾薑二分細辛三分附子二分炮上六味搗合下篩和以蜜丸如梧子大先食米汁服三丸日三不知稍增以知為度忌豬肉冷水生蔥生菜範汪同出第八卷中胸痛方二首範汪療胸痛枳實散方枳實八分炙桂心五分上二味搗下篩酒服方寸匕日三忌生蔥深師同深師療胸痛枳實散方枳實四枚炙神麯一兩熬白朮一兩上三味搗篩酒服方寸匕日三忌桃李雀肉等出第十六卷中賁豚氣方四首病源夫賁豚者腎之積氣也起於驚恐憂思所生也若驚恐則傷神心臟神也憂思則傷志腎臟志也神志傷動氣積於腎而氣下上游走如豚之賁故曰賁豚其氣乘心若心中踴踴如車所驚如人所恐五臟不定食飲輒嘔氣滿胸中狂癡不定妄言妄見此驚恐奔豚之狀也若氣滿支心心下煩亂不欲聞人聲休作有時乍瘥乍劇吸吸短氣手足厥逆內煩結痛溫溫欲嘔此憂思賁豚之狀也診其脈來祝祝一云觸祝者病賁豚也腎脈微急沉厥賁豚也其足不收不得前後出第十三卷中小品黃帝問金冶子曰驚為病如奔豚其病奈何金冶子對曰驚為奔豚心中踴踴如事所驚如人所恐五臟不定食飲輒嘔氣滿胸中狂癡欲走閉眼謬言開眼妄語或張面目不相取與眾師不知呼有所負賁豚湯主之黃帝曰善黃帝問金冶子曰憂思賁豚何以別之金冶子對曰憂思賁豚者氣滿支心心下煩亂不欲聞人之聲發作有時乍瘥乍劇吸吸短氣手足厥逆內煩結痛溫溫欲嘔眾師不知呼有觸忤奔豚湯主之黃帝曰善師曰病如奔豚者氣從少腹起上衝喉咽發作欲死復還生皆從驚恐得之腎間有膿故也範汪同師曰病有奔豚有吐膿有驚怖有火邪此四部病者皆從驚發得之火邪者桂枝加龍骨牡蠣湯主之若新亡財為縣官所捕迫從驚恐者療用鴟頭鉛革共千金翼有飛鴻鉛丹丸主癲癇瘛瘲此意相近鉛革共一云角為馬桃末即羚羊角復余物未定未定者上作方未成所言奔豚者病人氣息逆喘迫上如豚奔走之狀奔豚湯主之又療卒傷損食下則覺胸中偏痛慄慄然水漿下亦爾問病與相應急作此方生李根一斤細銼之麥門冬一升去心人參二兩桂心二兩甘草一兩炙上五味㕮咀以水一斗煮取三升分三服範汪同又奔豚湯療虛勞五臟氣乏損遊氣歸上上走時若群豚相逐憧憧時氣來便自如坐驚夢精光竭不澤陰痿上引少腹急痛面乍熱赤色喜怒無常耳聾目視無精光方葛根八兩乾者生李根切一升人參三兩半夏一升洗芍藥三兩當歸二兩桂心五兩生薑二斤甘草炙二兩上九味切以水二斗煮得五升溫服八合日三不知稍增至一升日三忌羊肉餳生蔥海藻菘菜等出第十一卷中肘後療卒厥逆上氣氣支兩脅心下痛滿淹淹欲絕此謂奔豚病從卒驚怖憂迫得之氣從下上上衝心胸臍間築築發動有時不療殺人方甘草二兩炙人參二兩吳茱萸一升生薑一斤半夏一升桂心三兩上六味切以水一斗煮取三升分三服此藥須預蓄得病便急合服之千金方桂五兩甘草三兩張文仲同賁豚氣衝心胸方四首廣濟賁豚氣在心吸吸短氣不欲聞人語聲心下煩亂不安發作有時四肢煩疼手足逆冷方李根白皮八兩半夏七兩洗乾薑四兩茯苓三兩人參二兩甘草二兩炙附子一兩炮桂心四兩上八味切以水一斗煮取三升絞去滓分三服別相去如人行六七里忌生冷羊肉餳海藻菘菜油膩醋物生蔥黏食範汪同又療賁豚氣在胸心迫滿支脅方生薑一斤半夏四兩湯桂心三兩人參二兩甘草二兩炙吳茱萸一兩上六味切以水一斗煮取三升絞去滓分溫三服服別相去如人行六七里忌生蔥熱面羊肉餳黏食海藻菘菜範汪同並出第四卷中集驗賁豚茯苓湯療短氣五臟不足寒氣厥逆腹脹滿氣賁走沖胸膈發作氣欲絕不識人氣力羸瘦少腹起騰踴如豚子走上走下馳往馳來寒熱拘引陰器手足逆冷或煩熱者方茯苓四兩生葛八兩甘草二兩炙生薑五兩半夏一升湯洗人參三兩當歸二兩芎藭二兩李根白皮切升上九味切以水一斗二升煮取五升服一升日三夜二服忌羊肉餳海藻菘菜酢物等又療賁豚氣上衝胸腹痛往來寒熱賁豚湯方甘草二兩炙芎藭二兩當歸二兩半夏四兩湯洗黃芩三兩生葛五兩芍藥三兩生薑四兩甘李根白皮切一升上九味切以水二斗煮取五升去滓溫服一升日三夜二服忌海藻菘菜羊肉餳等並出第四卷中雜療奔豚氣及結氣方六首深師療憂勞寒熱愁思及飲食膈塞虛勞內傷五臟絕傷奔氣不能還下心中悸動不安七氣湯方桔梗二兩人參三兩一方二兩芍藥三兩茱萸七合黃芩二兩一方三兩乾地黃三兩一方二兩枳實五枚炙桂心二兩一方三兩乾薑三兩一方一兩甘草三兩一方二兩炙橘皮三兩半夏三兩洗一方一升上十二味切以水一斗煮取三升去滓分三服忌海藻菘菜羊肉餳生蔥豬肉蕪荑等千金無桂心橘皮桔梗有厚朴栝蔞蜀椒集驗療賁豚氣從下上者湯方生葛五兩半夏五兩洗黃芩二兩桂心二兩芍藥三兩人參二兩生薑五兩甘李根白皮五兩切上八味切以水一斗五升煮取五升去滓溫分為五服日三夜二服忌羊肉餳生蔥出第四卷中小品牡蠣賁豚湯療賁豚氣從少腹起憧胸手足逆冷方牡蠣三兩熬桂心八兩李根白皮一斤切甘草三兩炙上四味切以水一斗七升煮取李根皮得七升去滓納余藥再煮取三升分服五合日三夜再忌生蔥海藻菘菜範汪同又療手足逆冷胸滿氣促從臍左右起郁胃者奔豚湯方甘草四兩炙李根白皮一斤切葛根一斤黃芩三兩桂心二兩栝蔞二兩人參二兩芎藭一兩上八味切以水一斗五升煮取五升去滓溫服一升日三夜再忌海藻菘菜生蔥範汪同又方桐君說孵出雞卵殼中白皮梨木灰麻黃去節紫菀各等分上四味搗下篩作丸散隨宜酒服十丸如梧子散者方寸匕療三十年喉中結氣咳逆立瘥也亦可水煮為湯以意分之經心錄同並出第一卷中千金奔氣湯主火氣上奔胸膈中諸病每發時迫滿短氣不得臥劇者便悄欲死腹中冷濕氣腸鳴相逐成結氣方桂心五兩生薑一斤人參三兩半夏一升洗吳茱萸一升甘草三兩炙上六味切以水一斗煮取三升去滓分為四服忌羊肉餳生蔥海藻菘菜出第十七卷中灸奔豚法千金療奔豚腹腫法灸章門一名長平二穴在大橫外直臍季肋端百壯又主奔豚衝心不得息灸中極一名玉泉在臍下四寸五十壯又主奔豚上下腹中與腰相引痛者法炙中府二穴在雲門下一寸乳上三肋間動脈是百壯一云百五十壯又主奔豚上下者法灸四滿夾丹田旁相去三寸七壯又主奔豚法灸氣海在臍下一寸半百壯又法灸關元在臍下三寸五十壯亦可百壯並出第十七卷中
