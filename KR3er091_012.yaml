body:
  text: 卷第十二療癖方五首病源夫五臟調和則營衛氣理營衛氣理則津液通流雖復多飲水漿亦不能為病若攝養乖方則三焦痞隔三焦痞隔則腸胃不能宣行因飲水漿便令停滯不散更遇寒氣積聚而成癖癖者謂僻側在於兩脅之間有時而痛是也其湯熨針石別有正方補養宣導今附於後養生云臥覺勿飲水更眠令人作水澼又云飲水勿急咽久成水澼又云舉兩膝夾兩頰邊兩手據地蹲坐故久行之愈伏梁伏梁者宿食不消成癖腹中如杯如盤宿癰者宿水宿氣癖數生癰久則腸化為筋骨變為實出第二十卷中廣濟療腹中癖氣方牛膝八分桔梗六分芍藥六分枳實八分炙白朮六分鱉甲八分炙茯苓八分人參六分厚朴六分炙大黃六分桂心六分檳榔六分上十二味搗篩蜜和丸空肚溫酒服如梧子二十丸日二服漸加至三十丸老小微利忌生冷油膩小豆黏食莧菜醋生蔥豬肉出第二卷中千金翼江寧衍法師破癖方白朮三兩枳實三兩炙柴胡三兩上三味切以水五升煮取二升分溫三服服三十劑永瘥忌桃李雀肉出第十九卷中必效療癖方取車下李仁微湯退去皮及並仁與乾麵相半搗之為餅如猶乾和淡水如常溲麵大小一如病人手掌為二餅微炙使黃勿令至熟空肚食一枚當快利如不利更食一枚或飲熱粥汁即利以快利為度至午後利不止即以醋飯止之利後當虛病未盡者量力一二日更進一服以病盡為限小兒亦以意量之不得食酪及牛馬肉無不效但病重者李仁與面相半輕者以意減病減之後服者亦任量力頻試瘥神效又方大黃十兩上一味搗篩醋三升和煎調納白蜜兩匙煎堪丸如梧子一服三十丸以利為度小者減之又方牛黃三大豆許麝香一當門子大硃砂准麝香生犀角小棗許別搗末以上四味並研令極細湯成後納之大黃一兩吊藤一兩升麻一兩甘草半兩炙鱉甲半兩炙丁香五十枚上十味切以水三升先煮大黃等六味取強半升絞去滓納牛黃等四味和絞分為三服每服如人行十里久忌如藥法若利出如桃膠肉醬等物是病出之候特忌牛馬肉其藥及水並是大兩大升此藥分兩是十五以上人服若十歲以下斟量病減之忌莧菜海藻菘菜生血物等並出第三卷中癖結方三首病源此由飲水聚停不散復因飲食相搏致使結積在於脅下有時弦旦起或脹痛或喘息短氣故云癖結脈緊實者癖結也出第二十卷中廣濟療癖結心下硬痛巴豆丸方巴豆三枚去心皮熬杏仁七枚去尖大黃如雞子大上三味搗篩大黃取巴豆杏仁別搗如膏和大黃入蜜和丸空肚以飲服如梧子七丸日一服漸加以微利下病為度忌生冷油膩出第二卷中千金狼毒丸主堅癖方狼毒五兩塗薑汁炙半夏三兩洗杏仁三兩桂心四兩附子二兩炮細辛二兩椒三兩汗上七味搗篩別搗杏仁蜜和飲服如大豆二丸出第十一卷中救急中候黑丸療諸癖結痰飲等大良方桔梗四分桂心四分巴豆八分芫花十二分熬杏仁五分上五味先搗三藥成末別搗巴豆杏仁如膏合和又搗一千杵下蜜又搗二千杵丸如胡豆漿服一丸取利可至二三丸兒生十日欲癇發可與一二丸如黍米諸腹不快體中覺患便服之得一兩行利即好肘後千金同服四神九下之亦得出第三卷中寒癖方五首病源寒癖之為病是飲水停積脅下痃強是也因遇寒即痛所以謂之寒癖脈弦而大者寒癖也出第二十卷中肘後療腹中冷癖水穀癊結心下停痰兩脅痞滿按之鳴轉逆害飲食方大蟾蜍一頭去皮及腹中物支解之芒硝大人用一升中人七合羸小五合上二味以水七升煮取四升溫服一升一時頓服一升若未下更服一升中人七合羸小五合得下者止後九日十日一遍作之又方大黃三兩甘草二兩炙蜜一升二合棗二十七枚上四味切以水四升先煮三物取二升一合去滓納蜜再上火煎令烊分再服忌海藻菘菜又方巴豆三十枚煮杏仁二十枚桔梗六分藜蘆四分炙皂莢三分去皮上五味搗蜜和丸如胡豆未食服一丸日三欲下病者服二丸長將服百日都好瘥忌豬肉蘆筍貍肉古今錄驗同並出第三卷中深師主久寒癖胸滿短氣心腹堅嘔吐手足逆冷時來時去痛不欲食食即為患心冷引腰背強急吳茱萸丸方吳茱萸八分附子三分炮厚朴五分炙半夏五分洗桂心五分人參五分礬石五分熬枳實五分炙乾薑五分上九味下篩蜜和酒服如梧子二十丸日三不知增之出第十六卷中延年白朮丸主宿冷癖氣因服熱藥發熱心驚虛悸下冷上熱不能食飲頻頭風旋喜嘔吐方白朮六分厚朴兩分炙人參五分白芷三分橘皮四分防風五分吳茱萸四分芎藭四分薯蕷四分茯神五分桂心四分大麥蘖四分熬乾薑四分防葵四分炙甘草五分炙上十五味搗篩蜜和丸如梧桐子酒服十五丸日再加至二十丸出第十六卷中久癖方二首病源久癖謂因飲水過多水氣擁滯遇寒熱氣相搏便成癖在於兩脅下經久不瘥乃結聚成形段而起按之乃水鳴積有歲年故云久癖出第二十卷中集驗療冷熱久癖實不能下虛滿如水狀方前胡四兩生薑四兩枳實三兩炙半夏四兩洗白朮三兩茯苓四兩甘草二兩炙桂心二兩上八味切以水八升煮取三升分三服千金同出第六卷中古今錄驗曾青丸療久寒積聚留飲宿食天行傷寒者服之二十日愈久服令人延年益壽殷仲堪云扁鵲曾青丸療久癖積聚留飲宿食天行傷寒咳逆消渴隨病所在久病羸瘦老小宜服藥或吐或下或汗出方曾青二分寒水石三分朴硝二分茯苓三分大黃三分附子三分炮巴豆二分上七味各異搗下篩巴豆消相合搗六千杵次納附子搗相得次納茯苓搗相得次納大黃搗相得次納曾青搗相得次納寒水石搗相得次納蜜和搗千杵大人服大豆二丸小兒五歲以下如麻子一丸二三歲見如黍米一丸如服藥以薄粉粥清下當覆臥令汗出吐下氣發作服二丸霍亂服三丸泄痢不止服一丸可至二丸一方用曾青三分忌豬肉冷水蘆筍大酢崔氏同出第十卷中癖羸瘠方二首刪繁療癖羸瘠膏髓酒方豬肪膏三升牛髓二升油五升薑汁三升生地黃汁三升當歸四分蜀椒四分汁吳茱萸五合桂心五分人參五分五味子七分芎藭五分乾地黃七分遠志皮五分上十四味切搗九味下篩為散取膏髓等五種汁加水一斗同汁煎取水並藥汁俱盡但餘膏在停小冷下散攪令調火上煎三上三下燥器貯凝冷為餅方寸以清酒一升暖下膏取服之晝兩服夜一服非但療癖亦主百病忌生蔥蕪荑又枸杞子散方枸杞子五升乾薑五兩白朮五兩吳茱萸一升蜀椒三合汗橘皮五兩上六味切搗五味三篩下為散取枸杞子燥瓷器貯研曝如作米粉法七日曝之一曝一研取前藥散和之又研隨飲酒食等即便服一方寸匕和酒食進之如此能三年服非但療百病亦長陽氣並出第五卷中痃癖方四首廣濟療痃癖氣兩脅妨滿方牛膝十分桔梗八分芍藥八分枳實八分人參六分白朮八分鱉甲八分茯苓八分訶黎勒皮八分柴胡六分大黃十分桂心六分上十二味搗篩蜜和丸如梧子空肚酒飲及薑湯任服二十丸日二服漸加至三十丸利多即以意減之常取微通泄為度忌生硬難消油膩等物及莧菜一方用五加皮無人參出第二卷中千金翼療十年痃癖方桃仁六升豉六升蜀椒三兩乾薑三兩上四味先搗桃仁如脂令搗千杵如干可下少許蜜和搗令可丸空肚酒服三丸如酸棗大日三本方下有熨法此不載出第十九卷中崔氏療痃癖積冷發如錐刀所刺鬼疰往來者方烏頭八分炮人參八分桂心八分附子八分炮乾薑八分赤石脂八分硃砂三分研上七味搗篩蜜和為丸如梧子以暖酒服七丸稍稍加之至十丸又療痃癖方鼠屎一合炒令黃上一味以水二升煮五六沸及熱濾取汁置碗中急納硇砂一小兩乃蓋頭經宿明日平旦溫為兩服稍晚食無所忌一方硇砂作硃砂並出第七卷中痃氣方三首廣濟療痃氣方牛膝六分芍藥六分桔梗八分枳實三分炙厚朴六分炙橘皮四分茯苓六分人參五分蒺藜子五分熬訶黎勒六分熬柴胡八分檳榔四分大黃六分上十三味搗篩蜜和丸空肚煮大棗飲服如梧子二十丸日再漸漸加至三十丸如利多以意減之忌生硬難消物及油膩豬肉醋物出第二卷中延年療兩肋脹急痃滿不能食兼頭痛壯熱身體痛方枳實三兩炙桔梗二兩鱉甲二兩炙人參二兩前胡二兩生薑四兩檳榔七枚桂心二兩上八味切以水九升煮取二升五合去滓分溫三服如人行七八里久禁生蔥莧菜出第十六卷中救急療腹中痃氣連心以來相引痛緊急方白朮三兩枳實三兩炙柴胡四兩鱉甲二兩炙上四味切以水七升煮取二升五合去滓空肚分三服相去七八里久能連服三四劑始知驗禁生冷豬肉並毒魚大須慎之頻服有效忌莧菜生蔥出第七卷中癖及痃癖不能食方一十四首廣濟療症癖痃氣不能食兼虛羸瘦四時常服方牛膝六兩生地黃九兩當歸三兩桂心四兩肉蓯蓉六兩遠志三兩去心五味子五兩曲末五合熬炒令黃白朮三兩人參三兩茯苓六兩一方三兩大麥蘖末一升五合熬黃上十二味搗篩為散空腹溫酒服方寸匕日二服漸加至一匕半夏中煮生薑及檳榔飲下加麥門冬六兩此方甚宜久服令人輕健忌牛肉生蔥蘿蔔等出第二卷中崔氏療宿癖時腹微滿不能食調中五參丸方人參沙參玄參丹參苦參各一兩大黃四兩附子一兩炮巴豆四十枚蜀椒一合汗乾薑半兩防風一兩䗪蟲十五枚熬葶藶一合熬上十三味搗下篩蜜和為丸如梧子先食服一丸日三忌豬肉蘆筍生血等物又療癖飲並醋咽吐水及沫食飲不消氣逆脹滿方檳榔十兩高良薑三兩桃仁一升上三味和搗絹篩以白蜜和丸酒服如彈丸二枚日再服漸加至四五丸加減任意自量並出第七卷中延年人參丸主痃癖氣不能食方人參八分白朮六分枳實六分炙橘皮四分桂心七分甘草五分炙桔梗五分上七味搗篩蜜和為丸如梧子大一服十五丸酒下日二服加至二三十丸又療冷氣兩肋脹滿痃氣不能食方白朮三兩人參二兩茯苓三兩枳實三兩炙生薑三兩桔梗二兩桂心一兩半上七味切以水八升煮取二升五合去滓分溫三服如人行七八里久又桃仁丸主痃癖氣漫心脹滿不下食發即更脹連乳滿頭面閉悶咳氣急者方桃仁八分鱉甲六分炙枳實六分炙白朮六分桔梗五分吳茱萸五分烏頭七分炮檳榔五分防葵五分芍藥四分乾薑五分紫菀四分細辛四分皂莢二分去皮子人參四分橘皮四分甘草四分炙上十七味搗篩蜜和丸如梧子服十丸日再服加至二十丸忌豬肉莧菜等又浸藥酒用下前藥方紫蘇三兩牛膝三兩丹參三兩生薑六兩生地黃三升香豉三升紫菀三兩防風四兩橘皮三兩大麻仁一升五合上十味細切絹袋盛以清酒二斗五升浸三宿後溫一盞用下桃仁丸酒盡更添忌蕪荑又檳榔子丸主腹內痃癖氣滿胸背痛不能食日漸羸瘦四肢無力時時心驚方檳榔子六分桔梗四分當歸四分人參五分桂心四分前胡四分橘皮三分厚朴三分炙白朮四分甘草五分炙烏頭四分炮乾薑四分茯神四分鱉甲五分炙大黃四分龍齒六分炙上十六味搗篩蜜和為丸如梧子大服十丸飲汁下日二服加至二十丸酒下亦得忌醋莧菜生蔥等又療痃癖胸背痛時時咳嗽不能食方桂心四分細辛四分白朮六分厚朴三分炙附子五分炮乾薑五分橘皮三分鱉甲四分炙防葵三分炙吳茱萸三分上十味搗篩蜜和為丸如梧子大服十五丸酒下日二服加至二三十丸忌莧菜醋物生蔥等又療痃癖發即兩肋弦急滿不能食方檳榔子六分枳實六分炙桔梗四分鱉甲四分炙人參六分白朮六分桂心三分龍膽