body:
  text: 卷第一諸論傷寒八家合一十六首陰陽大論云春氣溫和夏氣暑熱秋氣清涼冬氣凜冽此則四時正氣之序也冬時嚴寒萬類深藏君子周密則不傷於寒觸冒之者乃名傷寒耳其傷於四時之氣皆能為病以傷寒為毒者以其最成殺癘之氣也中而即病者名曰傷寒不即病者寒毒藏於肌膚中至春變為溫病至夏變為暑病暑病者熱極重於溫也是以辛苦之人春夏多溫熱病者皆由冬時觸冒寒冷之所致非時行之氣也凡時行者春時應暖而反大寒夏時應熱而反大冷秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也仲景病源小品千金同王叔和曰傷寒之病逐日淺深以施方治今世人得傷寒或始不早治或治不對病或日數久淹困乃告醫醫又不知次第而治之則不中病皆以臨時消息制方無不效也今搜探仲景舊論録其證候診脈聲色對病真方有神驗者擬防世急也又土地高下寒溫不同物性剛柔餐居亦異是故黃帝興四方之問岐伯舉四治之能以訓後賢開其未悟臨病之工宜須兩審也小品千金同又曰夫表和里病一作陽盛陰虛下之而愈汗之則死里和表病一作陽虛陰盛汗之而愈下之則死夫如是則神丹不可以誤發神丹丸在此卷崔氏部中六味者是也甘遂何可以妄攻甘遂者水導散也在第三卷天行狂語部中甘遂等二味者是也出千金方表裡之治相背千里吉凶之機應若影響然則桂枝下咽表和則斃桂枝湯在此卷仲景曰數部中桂枝等五味者是也承氣入胃里平則亡承氣湯在此卷仲景日數部中三味者是也此表裡虛實之交錯其候至微發汗吐下之相反其禍至速而醫術淺狹為治乃誤使病者隕沒自謂其分至令冤魂塞於冥路死尸盈於曠野仁者鑑此豈不痛歟千金同又凡兩感病俱作治有先後發表攻裡本自不同而執迷妄意者乃云神丹甘遂合而服之且解其外又除其內言巧似是於理實違安危之變豈可詭哉夫病發熱而惡寒者發於陽無熱而惡寒者發於陰發於陽者可攻其外發於陰者宜溫其內發表以桂枝溫里宜四逆四逆湯在第二卷傷寒不得眠部中三通按第二卷傷寒不得眠部並無四逆湯味者是也三味方惟小便不利部內有四逆散加減法華他曰夫傷寒始得一日在皮當摩膏火灸即愈若不解者至二日在膚可法鐵服解肌散發汗汗出即愈若不解者至三日在肌復發汗則愈若不解者止勿復發汗也至四日在胸宜服藜蘆丸微吐則愈若更困藜蘆丸不能吐者服小豆瓜蒂散吐之則愈視病尚未醒醒者復一法針之藜蘆丸近用損人不録之瓜蒂散在卷末雜療中範汪方二味者是也五日在腹六日入胃入胃則可下也若熱毒在胃外未入於胃而先下之者其熱乘虛便入胃則爛胃也然熱入胃病要當須復下去之不得留於胃中也胃若實熱致此為病三死一生此輩皆多不愈胃虛熱入爛胃也其熱微者赤斑出劇者黑斑出赤斑出者五死一生黑斑出者十死一生但論人有強弱病有難易功效相倍耳病者過日不以時下之熱不得泄亦胃爛斑出矣上弱氏日藜蘆丸見第五卷許仁則療瘧云魯用釋深師一方大效三味者近似若得病無熱但狂言煩躁不安精采言語與人不相主當者勿以火迫之但以五苓散一方寸匕水和服之五苓散仲景云豬苓散是也在第二卷傷寒中風部中千金翼方五味者是也當以新汲井水強飲一升許若一升半可至二升益佳令以指刺喉中吐之病隨手愈不即吐者此病輩多不善勿強與水水停即結心下也當更以余藥吐之皆令相主當者不爾即危若此病不急以豬苓散吐解之者其死殆速耳亦可先吐去毒物及法針之尤佳又云春夏無大吐下秋冬無大發汗發汗法冬及始春大寒宜服神丹丸亦可摩膏火灸膏在雜療中黃膏七味白膏四味範汪方是也若末春夏月初秋凡此熱月不宜火灸又不宜厚覆宜服六物青散青散在雜療中範汪方六味者是也若崔文行度障散度障散在雜療中範汪方四味者是也赤散赤散在雜療中範汪方七味者是也本出華他雪煎亦善雪煎在雜療中古今録驗方三味者是也若無丸散及煎但單煮柴胡數兩傷寒時行並可服也不但一也至再三發汗不解當與湯實者轉下之其脈朝夕駃者為實癖也朝平夕駃者非澼也轉下湯為可早與但當少與勿令下多耳少與當數其間病有虛煩熱者與傷寒相似然不惡寒身不疼痛故知非傷寒也不可發汗頭不痛脈不緊數故知非裡實也不可下如此內外皆不可攻而師強攻之必遂損竭多死矣諸虛煩但當行竹葉湯竹葉湯在第三卷天行虛煩部中出文仲方是也若嘔者與橘皮湯一劑不愈者可重與也橘皮湯在第二卷傷寒嘔噦部中四味者是也出於深師方此法官泰數用甚效傷寒後虛煩亦宜服此湯仲景千金方同陳廩丘云或問得病連服湯藥發汗汗不出如之何答曰醫經云連發汗汗不出者死吾思可蒸之如蒸中風法蒸濕之氣於外迎之不得不汗出也後以問張苗苗云曾有人作事疲極汗出臥單簟中冷得病但苦寒蜷諸醫與丸散湯四日之內凡八發汗汗不出苗令燒地布桃葉蒸之即得大汗於被中就粉傅身極燥乃起便愈後數以此發汗汗皆出也人性自有難使汗出者非但病使其然蒸之無不汗出也小品千金同蒸法在此卷崔氏日數部巾阮河南法又有桃葉湯熏其法在第三卷天行部中文仲方支太素法是範汪論黃帝問於岐伯曰人傷於寒而得病何以反更為熱岐伯曰極陰變陽寒盛則生熱熱盛則生寒諸病發熱惡寒脈浮洪者便宜發汗當發汗而其人適失血及大下利如之何岐伯答曰數少與桂枝湯使體潤漐漐汗才出連日如此自當解也千金同九捲雲黃帝曰傷寒熱病死候有九太素云不可刺者九一曰汗不出大灌發者死太素云汗不出大通按靈樞熱病論中灌發赤噦者死大顴發赤噦者死二曰泄而腹滿甚者死甚一作黃三曰目不明熱不已者死四曰老人嬰兒熱病腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死熱病痙者腰反折瘛瘲齒噤齘也熱病七八日脈微小病者便血口中乾一日半而死熱病七八日脈不躁不數後三日中有汗三日不汗四日死熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生熱病脈常盛躁而不得汗者此陽脈之極也死脈盛躁得汗者生甲乙太素同士弱氏曰灌發灌驟也漬也先不出汗後則若灌溉之驟至而淋漓浸漬亡陽也小品論曰古今相傳稱傷寒為難療之病天行溫疫是毒病之氣而論療者不別傷寒與天行溫疫為異氣耳云傷寒是雅士之辭雲天行溫疫是田舍間號耳不說病之異同也考之衆經其實殊矣所宜不同方說宜辨是以略述其要焉出第十卷中千金同千金論曰人生天地之間命有遭際時有否泰吉凶悔吝苦樂安危喜怒愛憎存亡憂畏關心之慮日有千條謀身之道時生萬計乃度一日是故天無一歲不寒暑人無一日不憂喜故有天行瘟疫病者則天地變化之一氣也斯蓋造化必然之理不得無之故聖人雖有補天立極之德而不能廢之雖不能廢之而能以道御之其次有賢人善於攝生能知樽節與時推移亦得保全天地有斯瘴癘還以天地所生之物以防備之命曰知方則病無所侵矣然此病也俗人謂之橫病多不解療皆云日滿自瘥以此致枉者天下大半凡始覺不佳即須救療迄至於病愈湯食競進折其毒熱自然而瘥必不可令病氣自在恣意攻人拱手待斃斯為誤矣今博採群經以為上下兩卷廣設備擬好養生者可得詳焉又夫傷寒病者起自風寒入於腠理與精氣分爭營衛否隔周行不通病一日至二日氣在孔竅皮膚之間故病者頭痛惡寒腰背強重此邪氣在表發汗則愈三日以上氣浮在上部填塞胸心故頭痛胸中滿當吐之則愈五日以上氣沉結在臟故腹脹身重骨節煩疼當下之則愈明矣當須消息病便不可亂投湯藥虛其胃氣也經言脈微不可吐虛細不可下又夏亦不可下此醫之大禁也文仲同又脈有沉浮轉能變化或人得病數日方以告醫雖云時覺視病已積日其病源結成非復發汗解肌所除當診其脈隨時形勢救解求免也不可苟以次第為固失其機要乃致禍矣此傷寒次第病三日以內發汗者謂當風解衣夜臥失覆寒濕所中並時有疾疫賊風之氣而相染易為惡邪所中也至於人自飲食生冷過多腹藏不消轉動稍難頭痛身溫其脈實大者便可吐下之不可發汗也又凡人有少病苦似不如平常則須早道若隱忍不療冀𣈂自瘥須臾之間以成痼疾小兒女子益以滋甚若天行不和當自戒勒若有小不和則須救療尋其邪由及在腠理以時早療鮮有不愈者患人忍之數日乃說邪氣入臟則難可制此雖和緩亦無能為也癰疽疔腫尤為其急此自養之至要也又凡作湯藥不可避晨夜時日吉凶覺病須臾即宜便治不等早晚則易愈矣服藥當如方法若縱意違師不須療之也又凡得時氣病五六日而渴欲飲水飲不能多不當與也所以爾者腹中熱尚少不能消之便更與人作病矣若至七八日大渴欲飲水者猶當依證而與之勿令極意也能飲一斗者與五升若飲而腹滿小便澀若喘若噦者不可與之飲而忽然汗出者已愈也人得病能飲水者欲愈也出第九卷中經心録論曰傷寒病錯療禍及如反覆手耳故諺云有病不治自得中醫者論此疾也其病有相類者傷寒熱病風溫濕病陰毒陽毒熱毒溫疫天行節氣死生不同形候亦別宜審詳也出第二卷中論傷寒日數病源並方二十一首素問黃帝曰夫熱病者皆傷寒之類也或愈或死其死皆以六七日間其愈皆以十日以上者何也岐伯曰巨陽者諸陽之屬也其脈連於風府故為諸陽主氣也人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必死帝曰願聞其狀岐伯曰一日巨陽受之故頭項痛腰脊強二日陽明受之陽明主肌肉其脈夾鼻絡於目故身熱目疼而鼻乾不得臥三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受其病而未入於臟者故可汗而已四日太陰受之太陰脈布胃中絡於隘故腹滿而隘干五日少陰受之少陰脈貫腎絡肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而終於肝故煩滿而囊縮三陰三陽五臟六腑皆受病營衛不行五臟不通則死矣其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣帝曰治之奈何岐伯曰治之各通其臟脈病日衰已矣其未滿三日者可汗而已其滿三日可泄而已又帝曰其病兩感於寒者其脈應與其病形何如岐伯曰兩感於寒病者病一日則巨陽與少陰俱病則頭痛口乾煩滿而渴也二日則陽明與太陰俱病則腹滿身熱不欲食譫語三日則少陽與厥服俱病則耳聾囊縮厥逆水漿不入不知人則六日而死帝曰五臟已傷六腑不通營衛不行如是之後三日乃死何也岐伯曰陽明者十二經脈之長也其氣血盛故不知人三日其氣乃盡故死出第九卷中甲乙太素同病源傷寒一日太陽受病太陽者小腸之經也為三陽之首故先受病其脈絡於腰脊主於頭項故得病一日而頭項背膊腰脊痛也又傷寒二日陽明受病陽明者胃之經也主於肌肉其脈絡鼻入目故得病二日內熱鼻乾不得眠也諸陽在表表始受病在皮膚之間故可摩膏火灸發汗而愈出第七卷中仲景傷寒論傷寒一二日心中悸而煩小建中湯主之方桂心三兩甘草炙二兩生薑三兩大棗十二枚擘膠飴一升芍藥六兩上六味切以水七升先煮五味取三升去滓納飴更上火微煮令消解溫服一升日三服如嘔家不可服建中湯以甜故也忌海藻菘菜生蔥千金翼同出第三卷中張仲景傷寒論傷寒一二日內麻黃湯主之此云小建中湯非也此方但治心中悸而煩病源傷寒三日少陽受病少陽者膽之經也其脈循於脅上於頸耳故得病三日胸脅痛而耳聾也三陽經絡始相傳病未入於臟故皆可汗而解出第七卷中仲景傷寒論療太陽病三日發其汗病不解蒸蒸發熱者屬調胃承氣湯方甘草炙三兩芒硝半升大黃四兩上三味切以水三升煮二物取一升去滓納芒硝更煮微沸溫溫頓服以調胃承氣則愈忌海藻菘菜經心録同出第十卷中張仲景傷寒論三日亦可服麻黃湯此云調胃承氣湯非也此方但治三日發汗不解蒸蒸發熱者病源傷寒四日太陰受病太陰者脾之經也為三陰之首是知三日以前陽受病訖傳之於陰而太陰受病焉其脈絡於脾主於喉嗌故得病四日腹滿而嗌乾其病在胸膈也故可吐而愈又傷寒五日少陰受病少陰者腎之經也其脈貫腎絡肺繫於舌故得病五日口燥舌乾渴而引飲也其病在腹故可下而愈矣並出第七卷中仲景傷寒論傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之方柴胡半斤栝蔞根四兩桂心三兩黃芩三兩牡蠣三兩甘草炙二兩乾薑三兩上七味切以水一斗二升煮取六升去滓更煎取三升溫服一升日三服初服微煩溫覆汗出者便愈也忌生蔥海藻菘菜範汪同出第三卷中仲景傷寒論名柴胡薑桂也合用柴胡人參甘草黃芩半夏生薑大棗七味小柴胡湯是也玉函千金翼同病源傷寒六日厥陰受病厥陰者肝之經也其脈循陰器絡於肝故得病六日煩滿而囊縮也此則陰陽俱受病毒氣在胸故可下而愈又傷寒七日太陽病衰頭痛少愈傷寒七日病法當小愈陰陽諸經傳盡故也今七日以後病反甚不除者欲為再經病也再經病者是陰陽諸經絡重受病故也並出第七卷中仲景傷寒論療傷寒不大便六七日頭痛有熱與承氣湯其人小便反清者知不在裡仍在表也當鬚髮汗若頭痛者必衄血宜桂枝湯方士弱氏曰藥非衄後用乃當汗時用則不衄矣先未汗故衄耳桂枝湯方桂枝芍藥各三兩甘草炙二兩生薑三兩大棗十二枚擘上五味切以水七升煮取三升去滓溫服一升須臾吃稀粥一升助藥力覆取微汗忌生蔥海藻菘菜集驗備急文仲範汪同仲景傷寒論此方六七日病在表者可服之又傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在故可與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解病源傷寒八日陽明病衰身熱少愈傷寒八日病不解者或是諸陰陽經絡重受於病或因發汗吐下之後毒氣未盡所以病證猶存也又傷寒九日少陽病衰耳聾微聞傷寒九日以上病不除者或初一經受病即不能相傳或已傳三陽訖而不能傳於陰致停滯纍日病證不罷者或三陽三陰傳病已畢又重感於寒故日數多而病候改變出第七卷中仲景傷寒論療傷寒八九日風濕相搏身體疼痛而煩不能自轉側不嘔不渴下之脈浮虛而澀者屬桂枝附子湯若大便硬小便自利者附子白朮湯桂枝附子湯方桂心四兩附子三枚炮去皮生薑三兩甘草二兩炙大棗十二枚擘上五味切以水六升煮取二升去滓溫分三服忌生蔥豬肉海藻菘菜附子白朮湯方白朮四兩大棗十二枚甘草炙一兩生薑二兩附子三枚炮去皮四破上五味切以水六升煮取二升去滓溫分三服初一服其人身如痹半日許復服之都盡其人如冒狀者勿怪此以附子術並走皮中逐水氣未除故使人如冒狀也本云附子一枚今加之二枚名附子湯忌蔥豬肉菘菜海藻桃李雀肉等千金翼同出第十一卷中張仲景論法當加桂枝四兩此本一方二法以大便硬小便自利故去桂也以大便不硬小便不利當加桂附子三枚恐多也虛弱家及産婦宜減之此二方但治風濕非治傷寒也病源傷寒十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣出第七卷中素問太素甲乙並同仲景傷寒論療吐下之後不大便五六日至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘但發熱譫譫疾而寤寐自語也語者屬大承氣湯方大黃去皮四兩陳枳實炙五枚芒硝三合厚朴半斤上四味切以水一斗先煮二物取五升去滓納大黃煮取二升去滓納芒硝煮一二沸分為兩服初一服便得利者止後服不必盡劑千金方並翼同出第五卷中又太陽病過經十餘日及二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急一云嘔止小安鬱郁微煩者為未解也可與大柴胡湯下之即愈方柴胡半斤黃芩芍藥各三兩半夏半斤水洗大棗十三枚擘生薑五兩枳實四枚炙上七味切以水一斗二升煮至六升去滓更煎取三升溫服一升日三服一方加大黃二兩今不加大黃恐不名為大柴胡湯也忌羊肉餳兼主天行千金翼肘後同又傷寒十三日不解胸脅滿而嘔日晡所發潮熱熱畢而微利此本柴胡證下之不得利今反利者知醫以丸藥下之此非其治也潮熱者實也先宜服小柴胡湯以解其外後以柴胡加芒硝湯主之方柴胡二兩十六銖黃芩人參甘草炙生薑各一兩半夏五枚大棗四枚擘芒硝二合上八味切以水四升煮七味取二升去滓下芒硝更上火煎一二沸分為兩服未解更作忌海藻菘菜羊肉餳等出玉函經一方芒硝三合桑螵蛸五個大黃四分煮取一升半溫服五合微下愈本云柴胡湯再服以解其外取愈一方外加芒硝大黃桑螵蛸是也肘後方七首肘後療傷寒有數種庸人不能分別今取一葉兼療者若初覺頭痛肉熱脈洪起一二日便作此蔥豉湯方蔥白一虎口豉一升綿裹上二味以水三升煮取一升頓服取汗若汗不出更作加葛根三兩一方更加升麻三兩水五升煮取二升分溫再服徐徐服亦得必得汗即瘥若不得汗更作加麻黃三兩去節服取汗出為效文仲同又方蔥白一握切米三合豉一升上三味以水一斗煮米少時下豉後納蔥白令大熟取三升分溫三服則出汗又方豉一升絺綿裹上一味以童子小便三升煮取二升分溫再服汗出為效集驗方加蔥白一升切云神良支太醫文仲備急同又方葛根四兩切上一味以水一斗煮取三升納豉一升更煮取一升半分溫再服取汗為瘥又方搗生葛根汁一二升服亦佳又療傷寒汗出不歇已三四日胸中惡欲令吐者方豉三升綿裹鹽一兩上二味以水七升煮取二升半去滓納蜜一升又煮三沸頓服一升安臥當吐如不吐更服一升取吐為效又方苦參三分甘草炙一分瓜蒂赤小豆各二七枚上四味切以水一升煮取半升一服之當吐吐不止者作蔥豉粥解之必息忌海藻菘菜又方苦參黃芩各二兩生地黃半斤上三味切以水八升煎取二升服一升或吐下毒物忌蕪荑深師方四首深師療傷寒一日至三日應汗者作此湯方葛根半斤烏梅十四枚蔥白一握豉一升綿裹上四味切以水九升煮取三升分為三服初一服便厚覆取汗汗出粉之又麻黃解肌湯療傷寒三四日煩疼不解者方麻黃三兩去節甘草一兩炙杏仁七十枚去皮尖熬桂心二兩上四味切以水九升先煮麻黃減二升掠去沫乃納諸藥合煮取二升半絞去滓分服八合以汗出為度忌海藻菘菜生蔥本仲景麻黃湯千金翼並同又黃芩湯療傷寒六七日發汗不解嘔逆下利小便不利胸脅痞滿微熱而煩方黃芩桂心各三兩茯苓四兩前胡八兩半夏半升洗上五味切以水一斗二升煮取六升分為六服日三服夜三服間食生薑粥投取小便利為瘥忌羊肉餳生蔥酢物又石膏湯療傷寒病已八九日三焦熱其脈滑數昏憒身體壯熱沉重拘攣或時呼呻而已攻內體猶沉重拘攣由表未解今直用解毒湯則攣急不瘥直用汗藥則毒因加劇而方無表裡療者意思以三黃湯以救其內有所增加以解其外故名石膏湯方石膏黃連黃柏黃芩各二兩香豉一升綿裹梔子十枚擘麻黃三兩去節上七味切以水一斗煮取三升分為三服一日並服出汗初服一劑小汗其後更合一劑分兩日服常令微汗出拘攣煩憒即瘥得數行利心開令語毒折也忌豬肉冷水出第十四卷中小品方四首小品詔書發汗白薇散療傷寒二日不解方白薇二兩麻黃七分去節杏仁去皮尖熬貝母各三分上四味搗散酒服方寸匕厚覆臥汗出愈古今録驗千金同又雞子湯療發汗後二三日不解頭痛肉熱方麻黃一兩去節甘草一分炙上二味切以水二升加雞子白令置水內合和令勻納藥復攪令和上火煎之勿動煎至一升適寒溫頓服之蓋覆汗出粉敷之有效忌海藻菘菜古今録驗備急同張文仲療天行又葛根湯療傷寒三四日不瘥身體熱毒方葛根八兩生薑三兩龍膽大青各半兩桂心甘草炙麻黃去節各二兩葳蕤一兩芍藥黃芩各二兩石膏碎升麻各一兩上十二味切以水一斗先煮葛根麻黃取八升掠去沫後納余藥煮取三升分三服日二夜一忌海藻菘菜生蔥千金同名葛根龍膽湯又療傷寒六七日其人大下寸脈沉遲手足厥逆下部脈不至咽喉痛不利唾膿血泄利不止者麻黃升麻湯方麻黃二兩半去節升麻三分當歸五分知母葳蕤一作菖蒲黃芩各三分麥門冬去心一作天門冬桂心芍藥乾薑石膏碎甘草炙茯苓白朮各一兩上十四味切以水一斗先煮麻黃減二升掠去上沫納諸藥煮取三升去滓溫分三服相去如炊三斗米頃令盡汗出便愈忌海藻菘菜生蔥醋桃李雀肉等並出第六卷中此張仲景傷寒論方通按千金作麻黃知母葳蕤黃芩各三兩餘十味作各二兩為異耳用此方者當以傷寒論為正集驗方五首集驗療傷寒時氣溫疫頭痛壯熱脈盛始得一二日者方真丹砂一兩末上一味以水一斗煮之取一升頓服之覆取汗忌生冷物千金同又療疫氣傷寒三日以後不解者方好豉一升綿裹蔥白切一升上二味童子小便五升煮取二升分再服覆取汗神效千金同又療傷寒五六日斑出以後湯方豬膽三合雞子一枚苦酒三合上三物合和煎令三沸強人盡服之羸人煎六七沸分為兩服取汗出為效文仲備急千金同又療傷寒七八日不解默默煩悶腹中有干糞譫語大柴胡湯方柴胡半夏湯洗各八兩生薑四兩知母芍藥大黃葳蕤各二兩甘草炙一方加枳實四兩黃芩二兩上十味切以水一斗煮取三升去滓溫服一升日三服忌海藻菘菜羊肉餳範汪加人參三兩餘並同千金用芍藥不用枳實又療傷寒熱病十日以上發汗不解及吐下後諸熱不除及下利不止斑出方大青四兩甘草炙二兩阿膠炙珠二兩豉一升綿裹上四味切以水八升煮二味取三升半去滓納豉煮三沸去滓乃納膠令溶分溫三服欲盡更作當使有餘渴者當飲但除熱止吐下無毒忌海藻菘菜肘後深師千金同出第二卷中千金方六首合一十一法千金治傷寒頭痛項強四肢煩疼青膏方當歸芎藭吳茱萸附子烏頭莽草蜀椒各三兩白芷三兩上八味切以醇苦酒漬再宿以豬脂四斤緩火煎候白芷色黃絞去滓以暖酒服棗核大三枚日三服取汗不知稍增可服可摩如初得傷寒一日苦頭痛背強宜摩之佳忌豬肉又少陰病得病二三日口燥咽乾急下之宜承氣湯又少陰病六七日腹滿不大便者急下之宜承氣湯又陽明證其人善忘必有蓄血所以然者本有久瘀血故令善忘雖大便堅反易色必黑宜抵當湯下之又傷寒有熱而少腹滿應小便不利今反利者此為有血不可余藥宜抵當丸又太陽病身黃脈沉結少腹堅小便不利者此為無血也小便自利其人如狂者血證諦也宜抵當湯下之又陽明病脈遲雖汗出不惡寒體必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然汗出者此為大便已堅宜承氣湯主之若汗多而微發熱惡寒為外未解宜桂枝湯其熱不潮未可與承氣湯若腹大滿不大便可少與承氣湯微和其胃氣勿令致大下又陽明病潮熱微堅者可與承氣湯不堅者勿與之若不大便六七日恐胃中有燥糞欲知之法可與小承氣湯若腹中轉失氣者為有燥糞乃可攻之若不轉失氣者此為但頭堅後溏不可攻之攻之必脹滿不能食欲飲水者即噦其後發熱者必復堅與小承氣湯和之不轉失氣者慎不可攻之夫實則譫語虛則鄭聲鄭聲重語也直視譫語喘滿者死若下利者亦死又傷寒四五日脈沉喘滿沉為在裡而反發汗津液越出大便為難表虛里實久則譫語承氣湯方枳實陳者五枚炙大黃四兩芒硝三合厚朴半斤上四味切以水一斗先煮二味取五升納大黃更煮取二升去滓納芒硝更上微火一兩沸分溫再服得下余勿服也小承氣湯方大黃四兩厚朴二兩炙枳實大者三枚炙上三味切以水四升煮取一升二合去滓分溫再服若一服得利譫語止勿服之也又抵當丸方水蛭二十枚熬桃仁二十枚去皮尖雙仁虻蟲二十枚去足翅熬大黃三兩上四味末下篩合分為四丸以水一升煮一丸取七合頓服晬時當下血不下仍須服之取血下為效又抵當湯方水蛭熬三十枚桃仁二十枚去皮虻蟲去足翅熬三十枚大黃三兩上四味切以水五升煮取三升分為三服不下更服又療傷寒頭痛壯熱百節疼痛湯方柴胡芍藥梔子仁各四兩知母四兩香豉一升綿裹石膏八兩碎黃芩大青升麻杏仁去雙仁皮尖各三兩上十味切以水九升煮取二升七合分三服苦熱盛者加大黃四兩並出第十卷中千金翼方一十三首合一十三法千金翼療少陰病一二日口中和其背惡寒者當灸之服附子湯方大附子二枚炮茯苓芍藥各二兩人參二兩白朮四兩上五味切以水八升煮取三升溫服一升日三服忌豬肉桃李雀肉酢又療少陰病二三日咽痛者可與甘草湯不瘥可與桔梗湯方甘草湯方甘草二兩上一味切以水三升煮取一升半服七合日三服忌海藻菘菜又桔梗湯方大桔梗一兩甘草炙三兩上二味切以水三升煮取一升分兩服吐膿血瘥忌豬肉海藻菘菜又療少陰病二三日至四五日腹痛小便不利下利不止而便膿血桃花湯方赤石脂一斤一半全用綿裹一半篩末乾薑一兩切粳米一升上三味以水七升煮取米熟去滓取七合納赤石脂末一方寸匕日三服傷寒論千金崔氏範汪同又療少陰病得之二三日以上心中煩不得臥者黃連阿膠湯主之方黃連四兩黃芩一兩雞子中黃二枚芍藥二兩阿膠三兩炙一云三片上五味切以水六升先煮三味取二升去滓納阿膠煮煬盡小冷納雞子黃攪令相得溫服七合日三服忌豬肉冷水並出第十一卷中又療傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞堅或心下卒悸小便不利或不渴外有微熱或咳小柴胡湯方柴胡八兩半夏洗半斤生薑黃芩人參甘草炙各三兩大棗十二枚擘上七味切以水一斗二升煮取六升去滓更煎取三升溫服一升日三服但胸中煩而不嘔者去半夏人參加栝蔞實一枚若渴者去半夏加人參合前成四兩半栝蔞根四兩若腹中痛者去黃芩加芍藥三兩若脅下痞堅者去大棗加牡蠣六兩若心下卒悸小便不利者去黃芩加茯苓四兩若不渴外有微熱者去人參加桂心三兩溫覆取微汗若咳者去人參大棗生薑加五味子半升乾薑二兩忌羊肉餳海藻菘菜崔氏深師同又療傷寒五六日大下之後身熱不去心中結痛此為未解梔子豉湯方肥梔子十四枚擘香豉四合綿裹上二味以水四升先煮梔子取二升半去滓納豉更煮取一升半去滓溫分再服若一服得吐余更勿服之若嘔者用後梔子加生薑湯傷寒論備急同傷寒兼療不得眠又梔子生薑湯方肥梔子十四枚擘香豉四合生薑五兩切上三味以水四升煮梔子生薑取二升半去滓納豉更煮取一升半去滓溫分再服若一服安即勿服傷寒論同並療虛煩不得眠耳又傷寒六七日結胸熱實其脈沉緊心下痛按之如石堅宜陷胸湯主之方大黃六兩切甘遂末一錢芒硝一升上三味以水六升先煮大黃取二升去滓納芒硝煮一二沸乃納甘遂小溫分再服得快利止後服又傷寒若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之又諸衄血家不可與白虎湯虛者亦不可與卒得之腹痛而利者但可溫之又傷寒無大熱而口乾渴心煩其背微惡寒者白虎湯主之又傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎湯主之方知母六兩石膏一升碎綿裹甘草三兩炙粳米六合上四味切以水一斗二升煮取米熟去米納藥煮取六升去滓分六服日三服忌海藻菘菜千金傷寒論備急文仲崔氏範汪經心録同諸家無療天行之病又白虎加人參湯方石膏粳米各一升知母六兩人參三兩甘草二兩炙上五味切以水一斗二升煮米熟納藥煮取六升去滓分服一升日三服此方立秋後立春前不可行白虎湯正二三月時尚冷亦不可與服與之則嘔利而腹痛忌海藻菘菜又療傷寒八九日下之後胸滿煩驚小便不利譫語一身盡重不可轉側柴胡加龍骨牡蠣湯方柴胡四兩黃芩生薑龍骨人參牡蠣熬鉛丹桂心茯苓各一兩半半夏二合半湯洗大棗六枚擘大黃二兩上十二味切以水八升煮取四升納大黃切如博棋子煮取二升去滓溫分再服忌羊肉餳生蔥酢物又陽明病發熱而汗出此為熱越不能發黃也但頭汗出其身無有劑頸而還小便不利渴引水漿此為瘀熱在裡身必發黃宜服茵陳湯方茵陳六兩大肥梔子十四枚擘大黃二兩上三味切以水一斗二升先煮茵陳減六升去滓納諸藥煮取三升分三服小便當利如皂莢沫狀色正赤一宿腹減黃從小便去並出第九卷中崔氏方一十五首崔氏療傷寒始得一二日方便可灸頂三壯又灸大椎三壯各加至五壯益良用之驗大椎平肩斜齊高大者是也仍不得侵項分取之則非也上接項骨下肩齊在椎骨節上是余穴盡在節下凡灸刺不得失之毫釐今崔氏不定高下是以言之出黃帝針灸經又療傷寒一日至三日可發汗度瘴散方麻黃十分去節桔梗蜀椒汗細辛白朮吳茱萸防風各四分烏頭炮乾薑桂心各五分上十味搗篩為散溫酒服方寸匕溫覆取汗或數服得汗即止若得病一二日而輕者服此藥皆得汗解若得便重者頗不能解也然可以二大豆許著鼻孔中覺燥涕出一日可三四著必愈兼闢天行病忌豬肉生蔥生菜桃李雀肉等又療傷寒敕色惡寒發熱體疼發汗神丹丸方人參五分烏頭四分炮半夏洗五分茯苓五分硃砂一分研附子四分炮上六味搗為末蜜和丸如大豆每服三丸生薑湯下發汗出令體中濈濈然如汗未出更以熱粥投之令汗出若汗少不解復如前法若得汗足不解當服桂枝湯此藥多毒飲水解其熱愈周護軍子期自說天行用之甚良故記之忌豬羊肉大酢生血等物刪繁範汪同兼主天行又療傷寒服度瘴散而不汗出者便作蔥鼓湯方蔥十四莖豉一升綿裹上二味以水三升煮取一升頓服溫暖覆取汗出勝度瘴散也與前肘後方重又療傷寒服蔥豉湯不得汗可服葛根湯方蔥白十四莖豉一升綿裹葛根三兩切上三味以水五升煮取二升分為再服溫覆取汗汗不出更服余時用此一服輒汗略不再服救數十人甚效又療傷寒前軍府直吏周虎服葛根湯再服不得汗余更視之甚惡寒而拘急更思作麻黃湯以解之方麻黃二兩去節葛根三兩蔥白十四莖豉一升綿裹上四味切以水七升煮取二升半分三服虎再服快汗愈其疹與周虎相似者服之皆汗十餘人瘥又療傷寒阮何南蒸法薪火燒地良久掃除去火可以水小灑取蠶砂若桃葉桑柏葉諸禾糠及麥麬皆可取用易得者牛馬糞亦可用但臭耳桃葉欲落時可益收取干之以此等物著火處令厚二三寸布席臥上溫覆用此發汗汗皆出若過熱當細審消息大熱者可重席汗出周身輒便止當以溫粉粉身勿令遇風又療傷寒三五日疑有黃則宜服此油方取生烏麻清油一盞水半盞以雞子白一枚和之熟攪令相得作一服令盡又小前胡湯療傷寒六七日不解寒熱往來胸脅苦滿默默不欲飲食心煩喜嘔寒疝腹痛方胡治云出張仲景前胡八兩半夏半升洗生薑五兩黃芩人參甘草炙各三兩干棗十一枚擘上七味切以水一斗煮取三升分四服忌羊肉餳海藻菘菜古今録驗同仲景方用柴胡不用前胡今詳此方治寒疝腹痛恐性涼耳合用仲景柴胡桂薑湯今崔氏用之未知其可也又療傷寒或始得至七八日不大便或四五日後不大便或下後祕塞者承氣湯方厚朴炙大黃各三兩枳實六片炙上三味切以水五升煮取二升體強者服一升羸者服七合得下必效止範汪同又若胃中有燥糞令人錯語正熱盛亦令人錯語若祕而錯語者宜服承氣湯通利而錯語者宜服下四味黃連除熱湯承氣湯舊用芒硝余以有毒故去之用之數年安穩得下良既服湯亦應外用生薑兌讀作鋭下同使必去燥糞若服湯兼兌而並不得下者可依本方加芒硝一兩又姜兌法削生薑如小指長二寸鹽塗之納下部中立通又方以豬膽灌下部用亦立通張仲景傷寒論云豬膽和法醋少許灌穀道中又前軍督護劉車者得時疾三日已汗解因飲酒復劇苦煩悶乾嘔口燥呻吟錯語不得臥余思作此黃連解毒湯方黃連三兩黃芩黃柏各二兩梔子十四枚擘上四味切以水六升煮取二升分二服一服目明再服進粥於此漸瘥余以療凡大熱盛煩嘔呻吟錯語不得眠皆佳傳語諸人用之亦效此直解熱毒除酷熱不必飲酒劇者此湯療五日中神效忌豬肉冷水又大前胡湯療傷寒八九日不解心腹堅滿身體疼痛內外有熱煩嘔不安方胡洽云出張仲景前胡半斤半夏半升洗生薑五兩枳實八片炙芍藥四兩黃芩三兩干棗十二枚擘上七味切以水一斗煮取三升分四服日三夜一服忌羊肉餳等物古今録驗同張仲景用柴胡不用前胡本云加大黃二兩不加大黃恐不名大柴胡湯又凡少陰病寒多表無熱但苦煩憒默默而極不欲見光有時腹痛其脈沉細而不喜渴經日不瘥舊用四順湯余怪其熱不甚用也若少陰病下利而體猶有熱者可服黃連龍骨湯若已十餘日而下利不止手足徹冷及無熱候者可服增損四順湯方黃連龍骨湯見第三卷天行中甘草二兩炙人參二兩龍骨二兩黃連乾薑各二兩附子中形者一枚炮去黑皮上六味切以水六升煮取二升分再服不瘥復作甚良若下而腹痛加當歸二兩嘔者加橘皮一兩忌海藻菘菜豬肉冷水又療少陰病二十日後下不止可服陟釐丸浩京方陟釐四兩不用鹹者當歸四兩漢防己三兩黃連三兩紫石英別搗末細研二兩豉三升厚朴二兩炙苦酒五升上八味切以二升苦酒漬防己一宿出切炙之燥復納苦酒中盡止又以三升苦酒漬豉一宿小蒸之研絞取汁搗下篩諸藥以酒豉汁和之丸如梧桐子大冷漿水服二十丸丸極燥乃可服之忌豬肉冷水並出第一卷中張文仲方一十首張文仲葛氏療傷寒及溫病頭痛壯熱脈盛始得一二日方破雞子一枚著冷水半升中攪令相得別煮一升水令沸以雞子水投其湯中急攪調適寒溫頓服覆取汗備急同又療傷寒二三日以上至七八日不解者可服小柴胡湯方柴胡半斤人參甘草炙黃芩生薑各二兩半夏五合洗大棗十二枚擘上七味切以水一斗二升煮取三升分三服微覆取汗半日便瘥不瘥更服一劑忌羊肉餳海藻菘菜備急範汪千金翼方重又療傷寒溫病等三日以上胸中滿陶氏云若傷寒溫病已三四日胸中惡欲令吐者服酒膽方苦酒半升豬膽一枚上二味和盡服之吐則愈神驗支云去毒氣妙胡洽集驗備急千金同又療傷寒近效方凡胸中惡痰飲傷寒熱病瘴瘧須吐者方鹽末一大匙上一味以生熟湯調下須臾則吐吐不快明旦更服甚良備急同又瓜蒂散主傷寒胸中痞塞宜吐之方瓜蒂赤小豆各一兩上二味搗散白湯服一錢匕取得吐去病瘥止備急經心録範汪同又療傷寒已四五日頭痛體痛肉熱如火病入腸胃宜利瀉之方生麥門冬一升去心生地黃切一升知母二兩生薑五兩半芒硝二兩半上五味以水八升煮取二升半納芒硝煎五沸分五服取利為度忌蕪荑備急同又療傷寒五日以上宜取下利陶氏云若汗出大便堅而譫語方大黃四兩厚朴二兩炙枳實四枚炙上三味以水四升煮取一升二合分兩服通者一服止此是仲景方備急範汪同與前千金崔氏方重又療傷寒八九日不瘥名為敗傷寒諸藥不能消者方鱉甲炙蜀升麻前胡烏梅枳實炙犀角屑黃芩各二兩甘草一兩炙生地黃八合上九味切以水七升煮取二升半分五服日三服夜二服忌海藻菘菜莧菜蕪荑備急方同又若十餘日不大便者服承氣丸方大黃杏仁去皮尖各二兩枳實一兩炙芒硝一合上四味搗下篩蜜和丸如彈子以生薑湯六七合研一丸服之須臾即通不通更服一丸取通為度備急同又療晚發傷寒三月至年末為晚發方生地黃一斤打碎梔子二十枚擘升麻三兩柴胡石膏各五兩上五味切以水八升煮取三升分五服頻頻服若不解更服若頭面赤去石膏用乾葛四兩無地黃用豉一升煮取三升分三服忌蕪荑備急同並出第二卷中古今録驗方八首古今録驗陽毒湯療傷寒一二日便成陽毒或服藥吐下之後變成陽毒身重腰背痛煩悶不安狂言或走或見神鬼或吐血下利其脈浮大數面赤斑斑如錦文喉咽痛唾膿血五日可療至七日不可療也宜服升麻湯方升麻二分當歸二分蜀椒汗一分雄黃研梔子桂心各一分甘草二分炙鱉甲大如手一片炙上八味切以水五升煮取二升半分三服如人行五里久再服溫覆手足毒出則汗汗出則解不解重作服亦取得吐佳陰毒去雄黃忌海藻菘菜生蔥莧菜張仲景方無梔子桂心陰毒去雄黃蜀椒又陰毒湯療傷寒初病一二日便結成陰毒或服湯藥六七日以上至十日變成陰毒身重背強腹中絞痛喉咽不利毒氣攻心心下堅強短氣不得息嘔逆唇青面黑四肢厥冷其脈沉細緊數一本無數字仲景云此陰毒之候身如被打五六日可療至七日不可療宜服甘草湯方甘草炙升麻當歸各二分蜀椒一分出汗鱉甲大如手一片炙上五味切以水五升煮取二升半分再服如人行五里頃復服溫覆當出汗汗出則愈若不得汗則不解當重服令汗出忌海藻菘菜莧菜千金集驗備急文仲小品肘後同並出第二卷中又還魂丸療傷寒四五日及數年諸癖結堅心下飲食不消目眩四肢疼咽喉不利壯熱脾胃逆滿腸鳴兩脅裡急飛尸鬼注邪氣或為驚恐傷瘦背痛手足不仁口苦舌燥天行發作有時風溫不能久住吐惡水方巴豆去心皮熬甘草炙硃砂芍藥各二兩麥門冬二兩去心上五味各搗下篩合和以蜜搗三千下丸如梧桐子大每服兩丸蔥棗湯下小兒二歲以上服如麻子大二丸日二服忌海藻菘菜野豬肉蘆筍生血物出第三卷中又麥奴丸療傷寒五六日以上不解熱在胸中口噤不能言唯欲飲水為敗傷寒醫所不療方麻黃去節大黃芒硝灶突中墨黃芩各二分麥奴梁上塵釜底墨各一分上八味搗篩蜜和如彈丸以新汲水五合研一丸病者渴欲飲水但極飲冷水不節升數須臾當寒寒訖汗出則愈若日移五丈不汗依前法服一丸以微利止藥勢盡乃食當冷食以除藥勢一名黑奴丸小麥黑勃名為麥奴是也肘後胡洽小品刪繁張文仲深師範汪經心録廣濟並同又解肌湯療傷寒發熱身體疼痛方葛根四兩麻黃去節茯苓各三兩牡蠣二兩熬上四味切以水八升煮取三升分三服徐徐服之得汗通則止忌酢物千金有生薑甘草又調中湯療夏月及初秋忽有暴寒折於盛熱熱結四肢則壯熱頭痛寒傷於胃則下痢或血或水或赤帶下壯熱且悶脈微且數宜下之方大黃葛根黃芩芍藥桔梗茯苓藁本白朮甘草炙各二兩上九味以水九升煮取三升分三服服別相去二食久勿以食隔須取快下壯熱便歇其下亦止也凡秋夏早熱積日忽有暴寒折之熱無可散喜搏者肌中作壯熱氣也胃為六腑之長最易得傷非忽暴寒傷之而下也虛冷人則不在壯熱但下痢或霍亂也少實人有服五石人喜壯熱其適與藥吃斷下則加熱喜悶而死矣亦有不止便作壅熱毒壯熱甚不歇則劇是以宜此調中湯下之和其胃氣其表熱者宜前胡大黃下之也忌海藻菘菜豬肉酢物桃李雀肉等又療往來寒熱胸脅逆滿桃仁承氣湯方大黃四兩漬別下甘草炙芒硝湯成下桂心各二兩桃仁五十枚去皮尖碎上五味以水七升煮取二升半去滓納芒硝更煎一兩沸溫分三服忌海藻菘菜太醫較尉史脫方肘後傷寒論千金翼同並出第二卷中雜療傷寒湯散丸方八首並是論中所要者範汪療傷寒敕色頭痛頸強賊風走風黃膏方大黃附子細辛乾薑蜀椒去目桂心各一兩巴豆好者五十枚去皮上七味各切以淳苦酒漬藥一宿以臘月豬脂一斤煎之調適其火三上三下藥成傷寒敕色發熱酒服如梧桐子許又以摩身數百遍兼療賊風絶良風走肌膚追風所在摩之已用有效此趙泉方千金同忌野豬肉生蔥生菜蘆筍又療傷寒白膏摩體中手當千遍藥力方行並療惡瘡小兒頭瘡牛領馬鞍皆療之先以鹽湯洗惡瘡布拭之著膏瘡腫上摩向火千遍日再自消方天雄烏頭炮莽草羊躑躅各三兩上四味各切以苦酒三升漬一宿作東向露灶又作十二聚濕土各一升許成煎豬脂三斤著銅器中加灶上炊以葦薪為火令膏釋納所漬藥炊令沸下著土聚上沸定頃上火煎如此十二過令土聚盡遍藥成絞去滓傷寒頭痛酒服如杏核一枚溫覆取汗咽痛含如棗核日三咽之不可近目千金同忌豬肉等又崔文行解散療傷寒發熱者方一名皮瘴散烏頭一斤燒桔梗細辛各四兩白朮八兩上四味搗散皆令盡若中寒服一錢匕覆取汗若不覺復少增服之以知為度時氣不和旦服錢五匕辟惡氣欲省病服一服皆酒服忌生菜豬肉桃李雀肉等千金同又六味青散療傷寒敕色惡寒者方敕通作赤烏頭炮桔梗白朮各十五分附子炮五分防風細辛上六味搗篩為散溫酒服錢五匕不知稍增服後食頃不汗出者飲簿簿粥一升以發之溫覆汗出濈濈可也勿令流離勿出手足也汗微出勿粉若汗大出不止溫粉粉之不得汗者當更服之得汗而不解當服神丹丸忌生菜豬肉桃李雀肉等千金同又服桂枝湯大汗出後脈洪大者與桂枝湯如前法若形如瘧一日再發者汗出便解屬桂枝二麻黃一湯主之方桂心一兩十七銖杏仁十六枚去尖皮芍藥一兩六節麻黃一十六銖去節生薑一兩六銖切甘草炙一兩二銖大棗五枚擘上七味切以水五升先煮麻黃一兩沸掠去沫乃納諸藥煮得二升去滓溫服一升日再本云桂枝湯二分麻黃湯一分合為二升分再服今合為一方忌海藻菘菜生蔥本張仲景傷寒論方集驗療天行又療傷寒及天行瓜蒂散吐方赤小豆一兩瓜蒂一兩上二味搗作散溫湯二合服一錢匕藥下便臥若吐便且急忍也候食頃不吐者取錢五匕散二合湯和服之便吐矣不吐復稍增以吐為度吐出青黃如菜汁者五升以上為佳若吐少病不除者明日如前法復服之可至再三不令人虛也藥力過時不吐服湯一升助藥力也吐出便可食無復餘毒若服藥過多者益飲冷水解之與前張文仲方重又療傷寒熱病闢毒氣疫病七味赤散方硃砂烏頭炮各二兩細辛躑躅乾薑白朮各一兩栝蔞一兩半上藥搗散服半錢匕用酒調服汗出解不解增至一錢匕除邪氣消疫癘忌桃李雀肉生菜豬肉生血等物出第二十一卷中又療傷寒雪煎方麻黃十斤去節杏仁四升去雙仁尖皮熬搗為膏大黃一斤十三兩金色者各細銼上三味以雪水五石四斗漬麻黃於東向灶釜中三宿入大黃攪調炊以桑薪煮至二石去滓復於釜中下杏仁膏煎至六七斗絞去滓置銅器中更以雪水三斗合煎得二斗六升其藥已成可丸如彈子大有病者以三沸白湯五合研一丸入湯中適寒溫服立汗出若不愈者復服一丸密封藥勿令泄氣也此本出第三卷中千金同
