升煮取一半量與服之又療小兒下部被蟲食大腸赤瘡爛方水銀一兩以漿水煮之取少許以唾研安著竹筒中吹入下部中三度瘥小兒疳濕瘡方六首備急療小兒疳濕瘡方以鐵上衣少許內下部中即瘥千金同又方自大椎數至第十五椎夾骨兩旁灸七壯不瘥加七壯千金同又方艾葉一兩水一升煮取四合分三服瘥千金云艾葉切五升以米一斗煮取一升半分三服又小兒疳瘡方胡粉熬八分豬脂和塗之瘥為度油亦得千金同又方嚼栗子塗之瘥千金云嚼麻子敷之日六七度又方羊膽二枚以醬汁和灌下部中豬膽亦得千金同小兒蛔蟲方七首千金療小兒蛔蟲方楝木削上蒼皮以水煮取汁飲之量大小多少為此有小毒又方大麻子研取汁與飲之又方石榴根一把水五升煮取一升分二服又小兒羸瘦有蛔蟲方雚蘆二兩以水一升米二合煮取米熟去滓與服之又方萹蓄三兩水一升煮取四合分服之搗汁服亦佳又方東引茱萸根白皮四兩桃白皮三兩上二味切以酒一升二合漬之一宿漸與服取瘥又方蕪荑六分狼牙四分白蘞二分上三味搗末以苦酒和量與服之小兒蟯蟲及寸白方五首千金療小兒蟯蟲方取豬膏服尤妙又方搗生槐實內下部中瘥為度又主寸白蟲方東行石榴根一把水一升煮取三合分服又方桃葉搗絞取汁服之又小兒蟲方雷丸芎藭各等分上二味搗散服一錢匕日三小兒瘻瘡方四首千金療小兒瘻方冢中石灰研敷之厚著之良又方燒桑根灰敷之並燒烏羊角灰和敷之又療小兒疽瘻方丹砂大黃各五分雌黃雄黃䕡茹各四分礬石燒如馬齒者佳莽草各三分黃連六分上八味㕮咀以豬脂一升三合微火煎三上三下膏成去滓下諸藥末攪凝塗之瘥備急若患漏瘡頭盡開出膿夜復合者方大附子一顆內鯽魚腹中於炭火上燒灰研以敷之更搗蒜以封之良小兒疥瘡方六首範汪療小兒疥瘡雄黃膏方雄黃研雌黃研各一兩烏頭一枚松脂亂髮各一雞子許豬脂一升半上六味和煎之候發消烏頭色黃黑膏成去滓以敷之熟塗之千金瘡疥方以臭蘇和胡粉敷之瘥為度備急療疥方燒竹葉灰以雞子白和塗之以瘥為度又方以亂髮灰以豬膏和敷之效救急療疥瘡及小兒身上熱瘡並主之方黃連黃柏赤小豆臭黃各一兩水銀半兩研相和上五味為散以麻油和先淨洗瘡然後塗之甚佳又療小兒瘡疥等神驗方黃連糯米粉各十二分水銀八分碎胡粉六分吳茱萸赤小豆各一兩上六味搗散水銀手中和唾研如泥以豬脂並水銀成膏先洗瘡干拭令淨以塗藥三兩度瘥忌豬雞魚肉小兒癬瘡方六首集驗療小兒癬方以蛇床子末以白膏和敷之千金療小兒濕癬方枸杞根搗末和臘月豬膏敷之一云酢和亦佳又方桃青皮搗末以醋和敷之日二又方煎馬尿洗之又方揩破以牛鼻上津塗之又方狗屎灰和豬脂以塗之小兒誤吞物方四首小品療小兒誤吞鐵珠子如貍豆大者經年不以為害後病瘦瘠食不生肌膚時下痢或寒熱服諸藥自療來反劇不效有師診之云是吞物不消作法服衆藥所吞物不去終不瘥令其家中察之云兒近歲常弄十六貝鐵珠覺失一顆慮是吞之從來積歲實不以為疑之師六診乃信是故令病矣為處湯藥所患即瘥復與將療其兒肌膚充悅而忘説其方且記之又有一家女子六七歲許患腹痛其母與摩按之覺手下有一橫物在兒肉裡正平橫爾問兒曰那得針在肉中大驚怪脫衣看之肉完淨真有刺處按之兒亦不患針痛惟覺腹裡痛耳其母即以爪甲重重介之乃橫物折爪下兩段亦不偏痛迎師診之共察若吞針刺物者其嬰兒時不經鯁礙惟恐養兒時母常帶針裸抱橫兒體針入兒肌膚中兒縱覺痛啼呼與乳臥息便止遂成不覺今因腹痛摩之知耳鐵得土木濕皆生屑易朽針在人肉中經數歲肉得血氣皆朽也故介之即折令患腹痛不安但療腹痛服溫中湯下心腹病瘥後長大嫁因産乳不聞道針處為患故記之千金療小兒吞針方取磁石如棗核大吞之其針立出又誤吞鐵等物方艾蒿一把銼以水五升煮取一升頓服之即下肘後療小兒誤吞梅李方以少許水灌小兒頭承其水與飲之即出良近效療小兒誤吞錢在喉中不出方取麩炭末指彈入喉中其兒當便咯出妙小兒雜療方六首劉氏療小兒上冷下熱上熱下冷難將息方犀角末甘草生地黃各六分芍藥五分白朮茯苓梔子各三分柴胡人參大黃生薑各四分黃芩二分桂心一分上十三味切以水三升煮取一升分溫服之又療小兒身體滿氣急臥不得方郁李仁一合搗末和麵溲作餅子如常法與兒吃微利即瘥又方郁李仁末六分以水七合和調去滓煮粥與兒吃之又療小兒油丹赤腫方栝蔞三大兩以釅醋搗藥以敷之佳又方取蕎麥麵以醋和塗之瘥又療小兒野雞下部癢悶方通按野雞未詳枳實二兩鬼箭青木香鬼臼各二兩上四味搗為末以釅醋和以青布裹以尉之有頭即破尉訖令根拔去之瘥止甚佳
