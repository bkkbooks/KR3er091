body:
  text: 卷第八痰飲論二首病源痰飲者由氣脈閉塞津液不通水飲氣停在胸腑結而成痰又其人素盛今瘦水走腸間漉漉有聲謂之痰飲其為病也胸脅脹滿水穀不消結在腹內兩肋水入腸胃動作有聲身體重多唾短氣好眠胸背痛甚則上氣咳逆倚息短氣不得臥其形如腫是也脈偏弦為飲浮而滑為飲其湯尉針石別有正方補養宣導今附於後養生方導引法云左右側臥不息十二通療痰飲不消右有飲病右側臥左有飲病左側臥又有不消氣排之左右各十二息療痰飲出第二十卷中千金痰飲論問曰夫飲有四何謂師曰有痰飲一云留飲有懸飲有溢飲有支飲問曰四飲之證何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水留在脅下咳唾引痛謂之懸飲飲水過多歸於四肢當汗出而不汗出身體疼重謂之溢飲其人咳逆倚息短氣不得臥其形如腫謂之支飲凡心下有水者築築而悸短氣而恐其人眩而癲先寒即為虛先熱即為實故水在於心其人心下堅築築短氣惡水而不欲飲水在於肺其人吐涎沫欲飲水水在於脾其人少氣身體盡重水在於肝脅下支滿嚏而痛水在於腎心下悸夫病人卒飲水多必暴喘滿凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下後喜虛耳脈偏弦者飲也肺飲不弦但喜喘短氣支飲亦喘而不能眠加短氣其脈平也留飲形不發作無熱脈微煩滿不能飲食脈沉滑者留飲病病有留飲者脅下痛引缺盤咳嗽轉甚一云輒已其人咳而不得臥引項上痛咳者如小兒掣瘲狀夫胸中有留飲其人短氣而渴四肢歷節痛心下有留飲其人背寒冷大如手病人胸息上引此皆有溢飲在胸中久者缺盤滿馬刀腫有劇時此為氣飲所致也膈上之病滿喘咳吐發則寒熱背痛惡寒目泣出其人振振身瞤劇必有伏飲病人一臂不隨時復轉移在一臂其脈沉細此非風也必有飲在上焦其脈虛者為微勞營衛氣不周故也出第十八卷中通按形不發作謂表無病狀也痰飲食不消及嘔逆不下食方九首病源夫痰水結聚在於胸腑膀胱之間久而不散流行於脾胃脾胃惡濕得水則脹脹則不能消食也或令腹裡虛滿或水穀不消化或時嘔逆皆其候也出第二十卷中廣濟療心頭痰積宿水嘔逆不下食前胡丸方前胡白朮甘草炙各五分旋覆花豆蔻仁各三分人參麥門冬去心各六分枳實炙大黃各四分上九味搗篩蜜和為丸如梧子大空肚以酒下二十丸漸加至三十丸日再服不利忌桃李雀肉海藻菘菜熱面炙肉魚蒜黏食生冷等物又療心胸中痰積氣噎嘔逆食不下方柴胡橘皮各六分茯苓十分人參麥門冬去心雞蘇各八分生薑二十分檳榔仁四分末湯成下上八味切以水八升煮取二升五合絞去滓分溫三服服別相去如人行七八里進一服未瘥三日更服一劑以利為度忌酢物生冷油膩黏食並出一卷中千金療痰飲飲食不消乾嘔湯方澤瀉杏仁去尖皮枳實炙白朮各三兩茯苓柴胡生薑芍藥各四兩旋覆花人參橘皮細辛各二兩半夏四兩洗上十三味切以水九升煮取二升七合分為三服忌桃李雀肉大酢生菜羊肉餳等物又療胸中痰飲腹中水鳴食不消嘔吐水湯方大腹檳榔四十枚生薑八兩半夏半升洗杏仁四兩去尖皮橘皮三兩茯苓五兩白朮四兩切上七味切以水一斗煮取三升去滓分三服忌羊肉餳大酢桃李雀肉等古今録驗同並出第十八卷中範汪姜椒湯主胸中積聚痰飲飲食減少胃氣不足咳逆吐哯方半夏三兩洗生薑汁七合桂心附子炮甘草炙茯苓桔梗各一兩蜀椒二合汗橘皮二兩切上九味切以水七升煮取二升半去滓納薑汁煎取四升半分三服服三劑佳若欲服大散並諸五石丸必先服此方及進黃耆丸輩必佳忌海藻菘菜羊肉餳生蔥豬肉冷水酢物千金翼深師同又白朮茯苓湯主胸中結痰飲澼結臍下弦滿嘔逆不得食亦主風水方白朮五兩茯苓三兩橘皮當歸附子炮各二兩生薑半夏各四兩切桂四兩細辛四兩一作人參上九味切以水一斗煮取三升分三服服三劑良忌羊肉餳桃李雀肉豬肉冷水生蔥生菜醋物等千金翼同又旋覆花湯主胸膈痰結唾如膠不下食者方烏頭五枚去皮熬旋覆花細辛前胡甘草炙茯苓各二兩半夏一兩洗生薑八兩桂心四兩上九味切以水九升煮取三升分為三服忌羊肉餳海藻菘菜生蔥酢物豬肉冷水等並出第十六卷中延年茯苓飲主心胸中有停痰宿水自吐水出後心胸間虛氣滿不能食消痰氣令能食方茯苓三兩人參二兩白朮三兩生薑四兩枳實二兩炙橘皮一兩半切上六味切以水六升煮取一升八合去滓分溫三服如人行八九里進之忌酢物桃李雀肉等仲景傷寒論同出第十七卷中古今録驗療胸膈痰飲食啖經日則並吐出食皆不消出如初空腹一兩日聚食還復吐之極不便此由痰飲聚下絶不通服此丸宣通下氣方吳茱萸澤瀉芍藥白朮漢防己赤茯苓各二兩蜀大黃二兩上七味搗篩蜜和為丸如梧子大飲服二十五丸忌桃李雀肉酢物出第十九卷中懸飲方二首病源懸飲謂飲水過多留在脅下令脅間懸痛咳唾引脅痛故云懸飲出第二十二卷中範汪大甘遂丸療久澼留水澼飲方芫花熬甘遂葶藶子熬大黃苦參大戟芒硝貝母桂心各一兩杏仁三十枚巴豆三十枚去心皮熬烏喙三分炮令折上十二味搗篩其巴豆杏仁搗如膏合以蜜和丸如大豆許服二丸日三服不知稍加以意將息之大佳療大水飲病忌食蘆筍豬肉生蔥等出第十六卷中千金療懸飲十棗湯方芫花甘遂大戟上三味等分搗篩以水一升五合煮大棗十枚取八合絞去滓納藥末強人取一錢匕羸人半錢匕頓服之平旦不下者益藥半錢下後以糜粥自養此本仲景傷寒論方出第十八卷中溢飲方三首病源溢飲謂因大渴而暴飲水水氣溢於腸胃之外在於皮膚之間故言溢飲令人身體疼重而多汗是其候也出第二十卷中範汪溢飲者當發其汗大青龍湯主之方麻黃六兩去節桂心二兩甘草炙二兩生薑三兩石膏如雞子一枚杏仁四十枚去尖皮大棗十枚上七味㕮咀以水九升先煮麻黃減二升乃納諸藥煮取三升絞去滓適寒溫服一升溫覆令汗汗出多者溫粉粉之一服汗出者勿復服汗出多亡陽逆虛惡風煩躁不得眠脈微弱汗出惡風不可服服之則厥逆筋惕肉瞤此為逆也忌海藻菘菜生蔥此本仲景傷寒論方出第十六卷中千金溢飲者當發其汗宜青龍湯方麻黃去節芍藥細辛桂心乾薑甘草炙各三兩五味子半升半夏半升上八味切以水一斗先煮麻黃減二升乃納余藥煮三升去滓溫服一升忌海藻菘菜羊肉餳生菜生蔥此仲景傷寒論小青龍湯也出第十八卷中千金翼大五飲丸主五種飲一曰留飲停水在心下二曰澼飲水澼在兩脅下三曰痰飲水在胃中四曰溢飲水溢在膈上五臟間五曰流飲水在腸間動搖有聲夫五飲者由飲後傷寒飲冷水過多所致方遠志去心苦參烏賊魚骨藜蘆白朮甘遂五味子大黃石膏桔梗半夏洗紫菀前胡芒硝栝蔞桂心蓯蓉貝母芫花當歸人參茯苓芍藥大戟葶藶黃芩各一兩常山甘草炙山藥厚朴細辛各三分附子三分炮巴豆三十枚去皮心上三十三味搗篩蜜和為丸如梧子大酒服三丸日三稍加之忌貍肉桃李雀肉豬肉羊肉餳生蔥酢物生菜野豬肉蘆筍等胡洽同出第十九卷中支飲方九首病源支飲謂水飲停於胸膈之間支乘於心故云支飲其病令人咳逆喘息身體如腫之狀謂之支飲出第二十卷中深師療心下有支飲其人喜眩一作苦冒澤瀉湯方白朮二兩澤瀉五兩上二味切以水二升煮取一升又以水一升煮取五合合此二汁分為再服忌桃李雀肉等此本仲景傷寒論方千金療支飲不得息葶藶大棗瀉肺湯方葶藶子熬令紫色搗為丸如彈丸大大棗十二枚上二味先以水三升煮大棗得汁二升納葶藶煎取一升頓服三日一劑可服三四劑此本仲景傷寒論方又嘔家不渴者為欲解本渴今反不渴心下有支飲故也小半夏湯主之加茯苓者是也先渴卻嘔此為水停心下小半夏加茯苓湯主之卒嘔吐心下痞膈間有水目眩悸小半夏加茯苓湯方半夏二斗生薑半斤茯苓四兩上三味切以水七升煮取一升五合分再服忌羊肉餳大醋仲景傷寒論茯苓三兩餘並同又假令瘦人臍下有悸者吐涎沫而癲眩水也五苓散主之方豬苓去皮白朮茯苓各三分桂心去皮二分澤瀉五分上五味下篩水服方寸匕日三多飲水汗出愈忌桃李雀肉生蔥醋物等此本仲景傷寒論方又心下有痰飲胸脅支滿目眩甘草湯主之方甘草二兩炙桂心白朮各三兩茯苓四兩上四味細切以水六升煮取三升去滓服一升日三小便當利忌海藻菘菜生蔥桃李醋物等此本仲景傷寒論方又夫酒客咳者必致吐血此坐以極飲過多所致也其脈虛者必冒其人本有支飲在胸中也支飲胸滿厚朴大黃湯主之方厚朴一兩炙大黃六兩枳實四兩炙上三味細切以水五升煮取二升去滓分溫再服之此本仲景傷寒論方又夫上氣汗出而咳者此為飲也干棗湯主之若下後不可與也干棗湯主腫及支滿澼飲方大黃大戟各一兩芫花炒蕘花各半兩甘草炙甘遂黃芩各一兩干棗十枚上八味切以水五升煮取一升六合分四服空心服以快下為佳忌海藻菘菜又膈間支飲其人喘滿心下痞堅面黧黑其脈沉緊得之數十日醫吐下之不愈木防己湯主之方木防己三兩石膏雞子大三枚桂心二兩人參四兩切上四味以水四升煮取二升去滓分再服虛者即愈實者三日復發則復與不愈者宜去石膏加茯苓芒硝湯方木防己三兩桂心二兩人參茯苓各四兩芒硝三合上五味以水六升煮四味取二升去滓內芒硝分溫再服取微下利則愈忌生蔥此本仲景傷寒論方深師同並出第十八卷中留飲方二首病源留飲者由飲酒後飲水多水氣停留於胸膈之間而不宣散乃令人脅下痛短氣而渴皆其候也出第二十卷中範汪海藻丸療腹中留飲方海藻木防己甘遂蓯蓉蜀椒去汗芫花熬葶藶子熬各一兩上七味搗篩蜜和為丸如梧子服十丸不瘥當增之出第十六卷中千金療病者脈伏其人欲自痢痢者反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之方甘遂大者三枚半夏十二枚芍藥一兩甘草如指大一枚炙上四味以蜜半升納藥汁及蜜合一升煎取八大合頓服之忌海藻菘菜羊肉餳此本仲景傷寒論方出第十八卷中酒澼飲方三首病源夫酒澼者因大飲酒後渴而引飲無度酒與飲俱不散停滯在於脅肋下結聚成澼時時而痛因卻呼為酒澼其狀脅下弦急而痛出第二十七卷中深師消飲丸療酒澼飲酒停痰水不消滿逆嘔吐目視䀮䀮耳聾腹中水聲方乾薑茯苓各三兩白朮八兩枳實四枚炙上四味搗篩蜜和丸服如梧子五丸日三稍加之若下去枳實加乾薑二兩名為五飲丸忌桃李雀肉大醋生冷之類大神驗又倍術丸療五飲酒澼方白朮一斤桂心乾薑各半斤上三味搗篩蜜和丸如梧子飲服十丸稍加之取下先食服之日再忌桃李雀肉生蔥又溫脾丸療久寒宿食酒澼方乾薑三兩炒芍藥三兩蜀椒二兩汗小草一兩熬干芎藭茯苓桃仁去皮尖柴胡熬干各三兩大黃八兩切熬令黃黑上九味搗篩蜜和更搗萬杵服如大豆許十丸日三忌大醋並出第二十三卷中留飲宿食方七首病源留飲宿食者由飲酒宿食後飲水多水氣停留於脾胃之間脾得濕氣則不能消食令人噫氣酸臭腹脹滿亦壯熱或吞酸所以謂之留飲宿食也出第二十卷中深師通草丸療積聚留飲宿食寒熱煩結長肌膚補不足方椒目附子炮半夏洗厚朴炙各一兩芒硝五兩大黃九兩葶藶三兩熬杏仁三兩去皮尖上八味搗篩為末別搗葶藶杏仁令如膏合諸末以蜜和丸搗五千杵服如梧子二丸忌豬肉羊肉餳等大效方中無通草未詳其名出第二十三卷中範汪千金丸療心腹留飲宿食方沙參丹參苦參桂心各二分石膏五分研人參一分大黃一分半夏五分洗乾薑五分戎鹽一分巴豆六十枚去皮心附子一分炮上十二味皆搗合以白蜜和如小豆吞一丸日再令人先食服一丸不知稍益以知為度忌豬肉冷水羊肉餳蘆筍生蔥又療留飲宿食桑耳丸方桑耳二兩巴豆一兩去皮上二味搗和以棗膏丸如麻子先食服一丸不下服二丸病下即止忌野豬肉蘆筍又主留飲宿食芫花丸方芫花一兩熬大黃甘遂黃連麻黃去節杏仁去尖皮甘草炙附子炮令各一兩巴豆五十枚去皮心上九味搗篩杏仁巴豆別搗如膏合和以蜜丸如小豆先食服一丸日再不知稍增以知為度忌海藻菘菜豬肉冷水蘆筍等又順流紫丸療百病留飲宿食心下伏痛四肢煩疼男子五勞七傷婦人産有餘疾等方當歸代赭各一分茯苓烏賊魚骨桂心各三分肉蓯蓉二分藜蘆五分小熬巴豆六十枚去心皮上八味搗篩白蜜和丸先食服如小豆一丸日再不知增之欲下倍服之別搗巴豆令如膏忌生蔥貍肉酢物野豬肉蘆筍並出第十六卷中千金療留飲宿食不消腹中積聚轉下當歸湯方當歸人參桂心甘草炙芒硝芍藥各二兩大黃四兩生薑黃芩澤瀉各三兩上十味切以水一斗煮取三升分三服空心食後服忌生蔥海藻菘菜出第十八卷中集驗痰飲積聚嘔逆兼風虛勞陰疝方霜後蒺藜苗子搗汁一石先以武火煎減半即以文火煎攪勿停手候可丸止空腹酒下梧子大三十丸煎服亦得出第五卷中痰飲方二首病源痰澼者由飲水未散在於胸府之間因遇寒熱之氣相搏沉滯而成痰也痰之停聚流移於脅肋之間有時而痛則謂之痰澼出第二十卷中延年療左肋下停痰澼飲結在兩脅脹滿羸瘦不能食食不消化喜唾乾嘔大便或澀或利或赤或黃腹中有時水聲腹內熱口乾好飲水漿卒起頭眩欲倒脅下痛旋覆花丸方旋覆花五分大黃七分蒸茯苓三分澤瀉四分人參桂心皂莢去皮子炙附子炮去皮各二分芍藥四兩蜀椒三分去目汗乾地黃四兩防葵取水中浮者乾薑枳實炙杏仁去皮尖葶藶子四分熬上十六味搗篩為末納杏仁葶藶脂中碎研調篩度蜜和為丸每食後少時白飲服三丸如梧子日二服稍增以微利為度禁食豬肉魚面蒜生蔥酢今既在肋下有澼氣水飲結聚不散數發則悶刺心痛又未魯服如此破澼飲藥雖服補藥癖氣不除終是不損恐久積聚更急飲食減少此方正與癖氣相當更有三兩種毒藥今商量除訖其方內有附子及別本續命丸有烏頭此並破癖疾不得不用復聽臨時不如服烏頭丸癖氣得減亦未必須服旋覆花丸忌酢物生蔥豬肉蕪荑出第十六卷中集驗療痰澼心腹痛兼冷方鱉甲炙柴胡赤芍藥各八分甘草炙枳實炙生薑白朮各六分檳榔七個上八味切以水六升煮七味取二升半去滓納檳榔末分服八合當利忌海藻菘菜莧菜桃李雀肉等出第五卷中飲澼方二首病源飲癖者由飲水過多在於脅下不散又遇冷氣相觸而痛呼為飲癖也其狀脅下弦急時有水聲出第二十卷中深師附子湯療氣分心下堅如盤邊如旋杯水飲所作此湯主之方桂心三兩生薑三兩麻黃去節三兩甘草炙二兩細辛三兩大附子一枚炮大棗十二枚上七味切以水七升先煮麻黃再沸掠去沫乃下諸藥煮取二升去滓分服七合當汁出如蟲行皮中即愈神驗忌海藻菘菜生蔥豬肉冷水生菜等仲景傷寒論名桂枝去芍藥加麻黃細辛附子湯並出第二十二卷中備急療心下堅大如盤邊如旋盤水飲所作枳實白朮湯方枳實七枚炙白朮三兩上二味切以水一斗煮取三升分三服腹中軟即散此出姚大夫方忌桃李雀肉等物此本仲景傷寒論方出第三卷中癖飲方七首病源此由飲水多水氣停聚兩脅之間遇寒氣相搏則結聚而成塊謂之癖飲在於兩脅下弦旦起按之作水聲也出第二十卷中深師朱雀湯療久病癖飲停痰不消在胸膈上液液時頭眩痛苦攣眼睛身體手足十指甲盡黃亦療脅下支滿飲輒引脅下痛方甘遂芫花各一分大戟三分上三味為散以大棗十二枚擘破以水六升先煎棗取二升納藥三方寸匕更煎取一升一合分再服以吐下為知未知重服其良無比出第二十三卷中通按此即前十棗湯千金中候黑丸療癖飲停結悶滿目暗方巴豆八分去皮心熬芫花三兩熬桂心四分桔梗四分杏仁五分去皮尖上五味搗篩蜜和丸飲服如胡豆三丸日一稍增得快下為度忌豬肉蘆筍生蔥等肘後同千金半夏湯療痰冷癖飲胸膈中不理方白朮三兩半夏一升洗生薑八兩茯苓二兩人參桂心甘草附子炮各二兩上八味切以水八升煮取三升絞去滓分溫三服忌羊肉餳桃李雀肉大酢生蔥海藻菘菜豬肉冷水又旋覆花丸療停痰癖飲結在兩脅腹脹滿羸瘦不能食食不消化喜唾乾嘔大小便或澀或痢水在腸胃動搖作水聲方旋覆花桂心枳實炙人參各五分乾薑芍藥白朮各六分茯苓狼毒炙烏頭炮礜石燒各八分細辛大黃黃芩葶藶子熬厚朴炙芫花熬吳茱萸橘皮各四分甘遂二分上二十味搗篩蜜和丸酒服如梧子五丸日再服加之以知為度忌桃李雀肉大酢豬肉生菜生薑等大驗並出第十八卷中千金翼前胡湯主胸中久寒癖實宿痰膈塞胸痛不通利二焦冷熱不調飲食損少無味或寒熱體重臥不欲起方前胡三兩生薑四兩黃芩一兩人參二兩吳茱萸一兩大黃二兩防風一兩杏仁三十枚去皮尖當歸甘草各二兩炙半夏三兩洗麥門冬一兩去心上十二味切以水一斗煮取三升去滓分溫三服日三服三劑良深師云若脅下滿加大棗二枚利水亦佳忌海藻菘菜羊肉餳等又半夏湯主痰飲癖氣吞酸方半夏