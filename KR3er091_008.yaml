吐方茯苓八分橘皮六分甘草四分炙生薑八分雞蘇六分人參四分上六味切以水五升煮取一升五合去滓分溫二服服別相去如人行六七里進一服不利忌海藻菘菜酢物出第一卷中千金順流紫丸療心腹積聚兩脅脹滿留飲痰澼大小便不利小腹切痛膈上寒方代赭三分烏賊魚骨炙三分半夏三分巴豆七分去心皮熬桂心四分石膏五分研上六味搗篩蜜和丸平旦服一丸如胡豆至二丸忌羊肉餳豬肉蘆筍生蔥出第十八卷中通按此方比前紫丸少當歸茯苓蓯蓉黎蘆多半夏石膏延年前胡湯主胸背氣滿膈上熱口乾痰飲氣頭風旋方前胡三兩枳實炙細辛杏仁去尖皮碎芎藭防風澤瀉麻黃去節乾薑芍藥以上各三兩茯苓一作茯神生薑各四兩桂心甘草炙各二兩上十四味切以水九升煮取二升六合分三服微汗忌生冷油滑豬牛肉麵海藻菘菜生蔥生菜酢物出第十七卷中古今録驗姜附湯療冷胸滿短氣嘔沫頭痛飲食不消化方附子六分生薑十二分上二味切以水八升煎取三升二合分為三服忌豬肉冷水等出第九卷中胃反方一十首病源夫營衛俱虛血氣不足停水積飲在於胃管則臟冷臟冷而脾不磨脾不磨則宿穀不化其氣逆而成胃反也則朝食暮吐暮食朝吐心下牢大如杯往來寒熱甚者食已則吐其脈緊而弦緊則為寒弦則為虛虛寒相搏故食已則吐名為反胃也出第二十一卷中集驗療胃反不受食食已嘔吐大半夏湯方人參一兩茯苓四兩青竹茹五兩大黃六兩橘皮乾薑各三兩澤瀉甘草炙桂心各二兩上九味切以水八升煮取三升服七合日三夜一已利去大黃用泉水東流水尤佳忌海藻菘菜生蔥大酢千金備急張文仲同方中無半夏未詳其名又療胃反吐而渴者茯苓小澤瀉湯方茯苓澤瀉半夏各四兩桂心甘草炙各二兩上五味以水一斗煮取二升半去滓服八合日三忌海藻菘菜羊肉餳生蔥酢物等千金加生薑四兩又療胃反朝食暮吐食訖腹中刺痛此由久冷者方橘皮一兩白朮人參各二兩蜀椒一百二十粒汗桂心一兩薤白一握去青上六味切以水二升漬一宿納豬肚中縫合三升水煮水盡出之決破去滓分三服忌桃李雀肉生蔥千金用羊肚又療胃反大驗方前胡生薑各四兩阿膠一兩大麻子仁熬吳茱萸各五合桂心三寸甘草五寸炙大棗十枚上八物切以酒二升水三升煮取一升七合分再服忌生蔥海藻菘菜等物一方有橘皮三兩又療胃反吐食者方搗粟米作粉水和作丸如楮子大七枚爛煮納酢中細細吞之得下便已面亦得用之又方好面十斤粗地黃二斤二味搗日乾酒服若飲三方寸匕日三服千金云治酢咽通按生地黃同麵食之殺蟲蟲去則胃安也又主胃反食則吐出上氣者方灸兩乳下各一寸以瘥為度又方灸臍上一寸二十壯又方灸內踝下三指稍斜向前有穴三壯即瘥又方蘆根茅根各二兩上二味切以水四升煮取二升頓服得下食以上並與千金同並出第十六卷中崔氏療食則吐或朝食夜吐名曰胃反或氣噎不飲食數年羸削唯飲水亦同此方朱靈感録選製半夏六兩人參三兩生薑一兩橘皮二兩春杵頭糠一升綿裹牛涎一升厚朴二兩炙羚羊角三兩削上八味切以水八升煮取三升分溫三服相去十里久欲頻服者可至三劑氣噎病者胃閉不受食唯飲水水入吐出積年不瘥乃至於死人間多有此病此方救療有效忌羊肉餳黏食又華他療胃反胃反為病朝食夜吐心下堅如杯往來寒熱吐逆不下食此為寒癖所作療之神效方真珠雄黃丹砂以上研各一兩朴硝二兩乾薑十纍上五味搗篩蜜丸先食服如梧子二丸小煩者飲水則解之忌生血物一方有桂心一兩必效云治心下堅痛胃反寒病所作久變成肺痿方備急集驗千金張文仲同並出第四卷中救急療胃反方昔在幼年經患此疾每服食餅及羹粥等物須臾吐出正觀中許奉御兄弟及柴蔣等家時稱名醫奉敕令療罄竭口馬所患終不能瘳漸羸憊候絶朝夕忽有一衛士而云服驢小便極驗此日服食二合然後食唯吐一半晡時又服二合人定時食粥吐便即定迄至今日午時奏知之大內中有五六人患胃反同服用一時俱瘥此藥稍有毒服時不可過多承取尿及熱服二合病若深七日以來服之良後來療人並瘥必效同出第六卷中通按驢尿治蟲隔必效人參湯主胃逆不消食吐不止方人參澤瀉桂心各二兩橘皮甘草炙黃耆各三兩茯苓四兩生薑八兩麥門冬二升去心半夏一升制大黃一兩半上十一味切以水一斗二升煮取三升二合服八合日三夜一服若羸人服六合以下去大黃忌海藻菘菜酢物生蔥羊肉餳千金同又療胃反朝食夜吐夜食朝吐諸藥療不瘥方羊肉去脂膜作脯以好蒜虀空腹任意多少食之立見效驗又療胃反吐水及吐食方大黃四兩甘草二兩炙上二味切以水三升煮取一升去滓分溫再服如得可則隔兩日更服一劑神驗千金不傳忌海藻菘菜此本仲景傷寒論方並出第二卷中萬全方療脾飲食吐逆水穀不化此為胃反半夏飲子方製半夏八分厚朴炙人參白朮生薑切棗各六分粳米兩合橘皮四分上八味細切以水二大升煎取一升去滓分溫四服空肚服二服忌羊肉餳並出第一卷中脾胃弱不能食方三首病源脾者臟也胃者腑也脾胃二氣相為表裡胃為水穀之海主受盛飲食者也脾氣磨而消之則能食今脾胃二氣俱虛弱故不能食也尺脈浮滑速疾者食不消脾不磨也出第二十一卷中廣濟療脾胃氣微不能下食五內中冷時微下痢方白朮八兩神麯末五兩甘草二兩炙乾薑二兩枳實二兩炙上五味搗篩蜜和丸空腹溫酒服如梧子二十丸日二服漸加至三十丸腹中有痛加當歸二兩忌熱面海藻菘菜桃李雀肉等出第一卷中延年人參飲主虛客熱不能食噁心方人參麥門冬去心橘皮白朮厚朴各二兩炙茯苓四兩生薑三兩切甘草一兩炙上八味切以水八升煮取三升分為三服日三忌海藻菘菜桃李雀肉等蔣孝瑜處大效又厚朴湯療不能食腹內冷氣方厚朴三兩炙白朮人參各一兩茯苓三兩生薑五兩橘皮二兩上六味切以水四升煮取一升二合分為三服忌桃李雀肉酢物蔣孝瑜處出第六卷中脾胃病日漸瘦因不食方三首廣濟主脾胃中熱消渴小便數骨肉日漸消瘦方黃連麥門冬各十二分去心苦參栝蔞知母茯神土瓜根各八分人參甘草炙各六分上九味搗篩蜜和丸每食後少時煮蘆根大麥飲服如梧子二十丸日二服漸加至四十丸不利忌海藻菘菜豬肉冷水酢等物又主胃氣冷弱食則吐逆從朝至夜不得食食入腹則脹氣滿急大便出飯粒如故帶酸氣而羸計日漸困者方吳茱萸二兩白朮三兩人參乾薑甘草炙五味子各二兩曲末麥蘖末各五合厚朴一兩半桂心一兩上十味搗篩為散空腹煮生薑湯服方寸匕一日三服漸加至二匕忌生蔥桃李雀肉海藻菘菜出第一卷中延年白朮丸療噁心數吐水不多能食少心力者方白朮乾薑人參厚朴炙桂心各六分細辛茯苓當歸茯神枳實炙五味子附子各六分炮吳茱萸六分遠志五分去心旋覆花四分澤瀉五分上十六味搗篩蜜和為丸如梧子酒服二十丸日再服加至三十五丸忌桃李雀肉大酢生菜生蔥豬肉冷水出第十七卷中胃實熱方二首千金凡右手關上脈陽實者足陽明經也病苦頭痛脈經雲陽中堅痛而熱汗不出如溫瘧唇口乾善噦乳癰缺盆腋下腫名曰胃實熱也療胃實瀉胃熱湯方梔子仁二兩芍藥四兩白朮五兩茯苓三兩生地黃汁一升射干三兩赤蜜一兩升麻三兩上八味切以水七升煮六味取一升五合去滓下地黃汁兩沸次下蜜煎取二升分三服老小以意服之忌桃李雀肉酢物蕪荑等又方灸膝下三寸兩腳三里穴各三十壯主胃中熱病胃虛寒方七首千金右手關上脈陽虛者足陽明經也病苦脛寒不得臥惡風寒灑灑自急腹中痛耳虛鳴時寒時熱唇口乾面浮腫名曰胃虛冷也又療胃虛冷少氣口苦身體無澤補胃湯方防風柏子仁細辛桂心橘皮各二兩芎藭吳茱萸人參各三兩甘草一兩炙上九味切以水一斗煮取三升分溫三服忌海藻菘菜生蔥生菜等物又補胃虛寒身枯絶骨諸節皆痛人參散方人參細辛甘草炙各六分桂心當歸各七分麥門冬七分去心乾薑八分遠志肉四分蜀椒三分汗吳茱萸二分上十味為散食後服方寸匕溫清酒進之忌海藻菘菜生蔥生菜並出第十六卷中範汪療胃氣虛不欲食四肢重短氣調和五臟並療諸病調中湯方薤白切一升枳實六枚炙橘皮三枚大棗十二枚粳米三合香豉六合上六味切枳實橘皮棗以水六升先煮薤得四升納諸藥煮取一升半適寒溫服中分服之良一方生薑四分出第二十一卷中刪繁療胃虛苦飢寒痛人參補虛湯方人參當歸茯苓桔梗芎藭橘皮厚朴炙各三兩桂心甘草炙各二兩白朮五兩吳茱萸二兩大麥蘖二升炒上十二味切以水一斗二升煮取三升去滓分三服忌海藻菘菜桃李雀肉生蔥豬肉酢等物出第十一卷中又白朮八味等散方與前療同白朮厚朴炙人參吳茱萸麥蘖炒茯苓芎藭橘皮各三兩右藥搗篩為散食前服方寸匕暖酒進之隨性服忌桃李雀肉大酢出第四卷中延年補胃飲主胃氣虛熱不能食兼渴引飲方茯苓四兩人參三兩橘皮二兩生薑三兩薤白切一升豉五合綿裹糯米二合上七味切以水七升煮取三升去滓分溫六服中間任食一日令盡忌酢物張文仲處出第一卷中五膈方八首病源五肺氣者謂憂膈恚膈氣膈寒膈熱膈也憂膈之為病胸中氣結煩悶津液不通飲食不下羸瘦不為氣力恚膈之為病心下苦實滿噫輒酢心食不消心下積結牢在胃中大小便不利氣膈之為病胸脅逆滿噎塞胸膈不通噫聞食臭寒膈之為病心腹脹滿咳逆腹上苦冷雷鳴繞臍痛食不消不能食肥熱膈之為病臟有熱氣五心中熱口中爛生瘡胸煩四肢重唇口乾燥身體頭面手足或熱腰背疼痛胸痹引背食不消不能多食羸瘦少氣及癖也此是方家所說五膈形證也經云陽脈結謂之膈言憂恚寒熱動氣傷神而氣之與神併為陽也傷動陽氣致陰陽不和而腑臟生病結於胸膈之間故稱為膈氣衆方說五膈互有不同但傷動之由有五故云五膈氣出第十三卷中備急膈中之患名曰膏肓湯丸徑過針灸不及所以作丸含之令氣勢得相薰染有五膈要丸方麥門冬十分去心椒六分汗遠志附子炮乾薑人參桂心細辛各六分甘草十分炙上九味搗篩以蜜和丸如彈子以一枚著牙齒間含稍稍咽汁日三主短氣胸滿心下堅冷氣此病有十許方率皆相類此丸最效五膈者謂憂膈氣膈恚膈熱膈寒膈也忌豬肉生菜海藻菘菜生蔥千金肘後文仲同出第三卷中張文仲五膈丸方吳茱萸曲杏仁去皮尖乾薑蜀椒汗好豉熬上六味等分搗篩蜜和丸如梧子飲服七丸日三忌生冷此方出隱居效驗備急肘後同出第三卷中延年祕録凡憂膈氣膈食膈寒膈飲膈五病同藥常以憂愁思慮食飲而得之若寒食食生菜便發其病苦心滿不得氣息引脊痛如刺之狀食則心下堅大如粉絮大痛欲吐吐則瘥飲食不得下甚者乃手足冷上氣咳逆喘息氣短療以九物五膈丸方麥門冬去心蜀椒汗各三兩遠志三兩去心甘草五兩炙附子一兩炮乾薑三兩人參四兩桂心三兩細辛三兩通按此即前五膈要丸一味不差右藥搗篩蜜和微使淖置有蓋器中先食服大如彈子丸一丸置喉中稍咽之喉中胸中當熱藥力稍盡復含一丸日三四夜一二服服藥七日愈二十日平復若不能含者可一大丸作二小丸盡服之唯夏月合乃益麥門冬甘草人參耳其餘不異神良椒當以銅器熬於火上使極熱下置地納椒器中熟攪之須臾汗出便搗合同處椒力有熱亦去其毒非令有熱也忌海藻菘菜豬肉冷水生蔥生菜千金集驗同不能其於此方録用之耳古今録驗大五膈丸療膈中游氣上下無常處臟有虛冷氣迫咽喉胸滿氣逆脅有邪氣食已氣滿羸瘦著床骨立往來寒熱腹中不調或下痢嘔逆咳嗽骨肉銷盡服之令人能食長肌肉強筋骨利五臟好顏色補不足益氣力方細辛桂心黃芩食茱萸厚朴炙各三分杏仁三十枚去尖乾薑川椒汗遠志各三分去心小草芍藥附子炮當歸各二分黃連二分上十四味搗篩蜜和服如梧子二丸日三不知加之以知為度忌豬肉冷水生蔥菜等又五膈丸療憂膈氣膈食膈寒膈飲膈異病同藥神方人參附子炮遠志去心桂心細辛各四分乾薑蜀椒各五分汗上七味搗篩以蜜和服如彈丸著牙下㕮咀咽之若病劇者日三夜再並療諸毒風注氣腹中百病皆應當得真新好藥即可中病耳神祕妙方不傳忌生蔥生菜豬肉冷水等物通按此方比前五膈丸同但少麥冬甘草二味又療邪氣嘔逆吸氣五膈為病五臟俱虛則受風冷五臟有邪呼吸不足陰注於內陽結於外陰陽錯亂語言無常膈中左右狀如結氣喉咽不利氣出不入此血氣衰微臟凝冷氣成之服此丸安穀通氣溫臟五膈丸出僧深方蜀椒一升汗乾薑二兩桂心二兩芍藥一兩半半夏洗細辛茯苓各一兩前胡一兩半上八物搗篩蜜和服如彈丸一枚喉中稍稍吞之可增至三丸或冷則加遠志一兩佳日再忌羊肉餳生蔥生菜醋物又療胸痛達背膈中煩滿結氣憂愁飲食不下藥悉主之宜丸方製半夏一分甘草炙遠志去心各四分乾薑桂心細辛椒去目汗附子炮各二分上八味搗篩以蜜和為丸先飯酒若粳米飲服如梧子五丸日三稍增至十丸忌海藻菘菜羊肉餳豬肉冷水生蔥生菜並出第十八卷中經心録五膈丸療寒冷則心痛咽中如有物吐之不出咽之不入食飲少方乾薑三兩麥門冬二兩去心附子一兩炮細辛二兩蜀椒一兩汗遠志一兩去心甘草一兩炙人參二兩食茱萸二兩桂心三兩通按此方即前五膈丸多食茱萸一味上十味蜜和為丸如梧子服五丸日二忌豬肉冷水海藻菘菜生蔥生菜千金同出第二卷中七氣方三首病源七氣者寒氣熱氣怒氣恚氣喜氣憂氣愁氣凡七種氣積聚堅大如杯若柈一作盤蒲官切在心下腹中疾痛欲死飲食不能時來時去每發欲死如有禍祟此皆七氣所生寒氣則嘔吐噁心熱氣則說物不竟言而迫一云恍惚不章怒氣則上氣不可忍熱痛上搶心短氣欲死不得氣息恚氣則積聚在心下心滿不得飲食喜氣則不可疾行不能久立憂氣則不可劇作暮臥不安席愁氣則喜忘不識人語置物四方還取不得去處若聞急則四肢手足筋攣不能舉狀如得病此是七氣所生男子卒得飲食不時所致婦人則産中風余疾千金同出第十三卷中千金七氣丸方烏頭七分炮紫菀前胡半夏洗細辛丹參茯苓芎藭桃仁去尖皮吳茱萸桂心桔梗石膏各三分研人參甘草防葵各四分千金作防風大黃七分乾薑二分蜀椒二分汗菖蒲三分上二十味搗篩為末蜜和丸酒服如梧子三丸日三加至十丸一方去半夏加甘遂三分忌海藻菘菜羊肉餳豬肉冷水生蔥大酢生菜一方有芍藥無菖蒲又七氣丸主七氣七氣者寒氣熱氣怒氣恚氣喜氣憂氣愁氣此七氣為病皆生積聚堅牢如杯心腹絞痛不能飲食時去時來發則欲死凡寒氣狀吐逆心滿熱氣狀恍惚眩冒失精怒氣狀上氣不可當熱痛上蕩心短氣欲絶不得喘息恚氣狀積聚心滿不得食飲喜氣狀不可疾行久立憂氣狀不可苦作臥不安席愁氣狀平故怒氣善忘四肢跗腫不得舉止亦療産後中風余疾方大黃十分椒二分人參半夏洗芎藭柴胡甘草炙桔梗石膏菖蒲桃仁去皮尖吳茱萸茯苓各三分乾薑四分細辛三分上十五味搗篩蜜和丸如梧子酒服三丸日三加至十丸忌羊肉餳生蔥海藻菘菜豬肉生菜酢物又七氣湯療虛冷上氣勞氣方半夏一升洗生薑十兩人參桂心甘草炙各一兩上五味切以水一斗煮取三升分為三服日三忌羊肉餳生蔥海藻菘菜並出第十七卷中氣噎方六首病源此由陰陽不和臟氣不理寒氣填於胸膈故氣噎塞不通而謂之氣噎令人喘悸胸背痛也出第二十卷中廣濟療噎胸脅氣滿每食氣噎通氣湯方半夏洗生薑各六兩橘皮桂心各三兩切上四味切以水八升煮取二升五合絞去滓分溫三服服別相去如人行六七里服忌羊肉生蔥餳等出第一卷中深師療胸滿氣噎通氣湯方半夏八兩洗生薑六兩桂心三兩大棗三十枚上四味切以水八升煮取三升分服五合日三夜一忌羊肉餳生蔥千金同出第二十二卷中集驗療氣噎煎方蜜酥薑汁各一升上三味合和微火煎五六大沸取如大棗二枚納酒中飲之直抄服之亦好千金古今録驗同又通氣噎湯方半夏三兩洗桂心三兩生薑八兩羚羊角三兩上四味切以水八升煮取三升分服半升日再服忌羊肉生蔥餳古今録驗同並出第四卷中救急療喉中氣噎方半夏洗柴胡生薑各三兩羚羊角屑一法三兩犀角屑桔梗昆布通草甘草炙各二兩上九味切以水八升煮取三升分三服忌羊肉餳豬肉海藻菘菜等古今録驗羚羊角湯療噎氣不通不得下食方羚羊角屑二兩厚朴炙吳茱萸乾薑各三兩通草橘皮各二兩烏頭十五枚炮上七味切以水九升煮取三升分三服日三忌豬肉冷水深師千金同出第二十七卷中諸噎方一十二首病源夫陰陽不和則三焦隔絶三焦隔絶則津液不利故令氣塞不調理也是以成噎此由憂恚所致憂恚則氣結氣結則不宣流使噎噎者噎塞不通也出第二十卷中深師療噎方羚羊角屑前胡甘草各兩人參橘皮各二兩上五味切以水六升煮取二升分四服忌海藻菘菜又方鸕鷀喙上一物當噎時以銜之則下肘後同又方羚羊角上一物多少自在末之飲服亦可以角摩噎上良並出第二十二卷中廣利方療因食即噎塞如炙肉懸在咽中不下方吳射干六分升麻四分桔梗四分木通十二分赤茯苓八分百合八分紫菀頭二十一枚上七物切以水二大升煎取九合去滓分溫三服食後良久服忌豬肉酢物出第四卷中千金理諸噎方常食干粳米飯即不噎又方炭末細羅蜜丸如彈子大含少細細咽津即下集驗同並出第十六卷中集驗療噎方取頭垢如棗大以粥若漿水和服之肘後深師同出第十卷中必效主噎方𨫼捺大椎盡力則下仍令坐之通按𨫼捺未詳仍令坐之亦未詳又方以酢煮麵糊啖之則瘥此只可一兩日瘥欲長久絶者取溲為丸如彈子酢中煮熟於水中澤卻及熱則食二十丸神驗不過三兩度則瘥大效又半夏湯主噎方生薑四兩半夏一升洗石膏四兩碎小麥一升完用吳茱萸一升赤小豆二十顆大棗二十一顆人參甘草炙桔梗桂心各二兩上十一味切以酒二升水八升煮取三升分三服忌豬羊肉海藻菘菜餳生蔥等古今録驗有栝蔞無桔梗名乾薑湯不用生薑又方杏仁二兩去尖皮桂心二兩上二味末之蜜和丸含之如棗核許稍稍咽之臨食先含極效忌生蔥千金同並出第二卷中古今録驗療噎方蘆根三斤上一味切以水一斗煮取四升分四服出第二十七卷中卒食噎方九首病源此由臟氣冷而不理津液澀少而不能傳行飲食故食入則噎塞不通故謂之食噎胸內痛不得喘息食不下是故噎也出第二十卷中肘後療卒食噎方橘皮三兩上一味切以水三升煮取一升頓服之又方春杵頭糠置手巾角以拭齒立下集驗深師千金同並出第五卷中深師療卒噎法旁人可緩解衣帶勿令噎者知則愈又療卒噎方與共食人當以手捉噎人筋問曰此等何物噎人當答言箸共食人云噎下去則立愈又療卒噎不下方水一杯刀一口上二物先以刀橫畫水已後盡飲之則下出第二十二卷中集驗療醋噎方羌活五兩搗用水一升浸三宿每日溫服五合瘥又療氣噎不下食兼嘔吐方半夏四兩洗生薑三兩各切上二味以東流水二大升煎取一升去滓溫服三合日三服忌羊肉餳並出第五卷中備急療卒食噎不下方取蜜含之則下千金集驗肘後同又方取老牛涎沫如棗核大置水中飲之終身不有噎必效肘後深師千金同並出第三卷中五噎方三首病源夫五噎謂一曰氣噎二曰憂噎三曰食噎四曰勞噎五曰思噎雖有五名皆由陰陽不和三焦隔絶津液不行憂恚嗔怒所生謂之五噎噎者噎塞不通也出第二十卷中古今録驗五噎丸療胸中久寒嘔逆逆氣膈飲食不下結氣不消氣噎憂噎勞噎食噎思噎氣噎者心悸上下不通噫噦不徹胸脅苦痛憂噎者天陰苦厥逆心下悸動手足逆冷勞噎者苦氣隔脅下支滿胸中填塞令手足逆冷不能自溫食噎者食無多少唯胸中苦塞常痛不得喘息思噎者心悸動喜忘目視䀮䀮此皆憂恚嗔怒寒氣上逆胸脅所致療之方乾薑蜀椒汗食茱萸人參桂心各五分細辛白朮茯苓附子炮各四分橘皮六分上十味搗篩以蜜和為丸如梧子酒服三丸日再不知漸增忌桃李雀肉大酢豬肉冷水生蔥生菜酢物出第二十七卷中經心録五噎丸主五種之氣皆令人噎方人參半夏桂心防葵一方用防風小草各二兩附子炮細辛甘草炙各二兩食茱萸三合紫菀乾薑芍藥枳實炙烏頭各六分炮上十三味搗篩以蜜和為丸如梧子大服五丸日三不知加至十五丸忌羊肉餳海藻菘菜豬肉生蔥生菜千金同出第二卷中集驗噎塞不通方營實根十二分上一味搗為散酒下方寸匕日三服出第五卷中諸骨哽方三十五首肘後療食諸魚骨哽百日哽者方用綿二兩以火煎蜜納一段綿使熱灼灼爾從外縛哽所在處灼瓠以尉綿上若故未出復煮一段綿以代前並以皂莢屑少少吹鼻中使得嚏出矣祕方不傳禮云魚去乙謂其頭間有骨如乙字形者哽入不肯出故也又方取捕魚竹笱須燒末飲之魚網亦佳又療食諸肉骨哽方白雄雞左右翮大毛各一枚燒末水服一刀圭也仍取所食余者骨左右手反復擲背後則下也文仲備急同又方燒雞足末服方寸匕酒下立出深師同又方生艾蒿數升水酒共一斗煮取三四升稍稍飲之深師同凡療病皆各以其類豈宜以鸕鷀療肉骨貍虎療魚哽耶至於竹篾薤白嚼筋綿蜜事乃可通為諸哽用耳又有咒術小小皆須師解故不備載出第五卷中深師療食魚骨哽方捕魚網燒飲服刀圭匕良是魚哽燒魚網服之良又療哽及刺不出方服薔薇灰末方寸匕日三亦療折箭刺入膿囊不出堅燥及鼠撲服之十日哽刺皆穿皮出效又療鐵棘竹木諸刺在肉中折不出及哽不下方半夏二兩洗白蘞二兩上二物搗篩酒服半錢匕日三寧從少少起者半夏戟人喉中故也忌羊肉餳等加乾薑一兩尤佳又方鼠腦厚塗瘡上則出亦可用填鼠大效又療哽方螻蛄腦上一物吞即下亦療刺不出塗刺瘡上又療咽哽方取魚尾著衣領令下推立下又方白蘞白芷等分搗散飲服刀圭又療食哽方鷹糞燒灰存性上一物下篩服方寸匕虎狼雕屎皆可服之佳又療骨哽咽不得下飲食方白雞翼翮大毛各一枚著銅器中燒之焦作灰飲服一刀圭立下又療哽方半夏五兩洗白芷五兩上二物搗篩服方寸匕則嘔出忌羊肉餳又方以東流水一杯東向坐以手指畫水中作龍字訖飲水不自曉書令他人持手書良又方凡書文曰天有門地有根諸家入口者皆當得吞集驗同並出第二十二卷中千金療哽方取鹿筋漬之濡索之大如彈丸持筋端吞之候至哽處徐徐引之哽著筋出集驗同又方極吹之食骨鯁燒虎狼屎服又方末虎骨若貍骨服方寸匕集驗同又方服瞿麥末方寸匕集驗同古今録驗並主折刺不出又方吞豬膏如雞子大不瘥更吞瘥止古今録驗同又療諸哽方作竹篾刮令滑綿纏納咽中令至哽處可進退引之哽即出小品古今録驗深師同又療諸哽方鸕鷀屎末服方寸匕集驗古今録驗同又療魚骨哽方口稱鸕鷀鸕鷀則下並出第二十六卷中張文仲療食諸魚骨哽方以魚骨插頭上則立下陶云因𭌏刻則出肘後備急同又方小嚼薤白令柔以繩系中央持繩一端吞薤到哽處引哽當隨出集驗古今録驗深師備急千金同又療魚骨哽在喉中衆法不能去者方取飴糖丸如雞子黃大吞之不去又吞此用得效也肘後備急千金集驗小品同又療食中吞發哽不去繞喉者方取梳頭髮燒灰飲服一錢匕肘後備急集驗千金同並出第三卷中救急療哽方好蜜以一匙抄稍稍咽之令下良文仲同又療魚骨哽在喉中方以少許硇砂口中咀嚼咽之立下出第七卷中必效療魚骨哽方含水獺骨立出小品同又方魚網覆頭立下千金云燒灰服半匕小品同出第二卷中古今録驗療魚哽骨橫喉中六七日不出方取鯉魚鱗皮合燒作屑以水服之則出也未出更服之取出為度出第二十九卷中雜誤吞物方一十七首肘後療誤吞鉤方若繩猶在手中者莫引之但益以珠璫若薏子輩就貫之著繩稍稍令推至鉤處小小引之則出又方以小羊喉以沓繩推至鉤處當退脫小引則出又方但大戾頭四向顧小引之則出又方常思草頭一把二升水淘灌之十餘過而飲之又療誤吞諸木竹叉輩方取布刀故鋸燒漬酒中以女人大指甲二枚燒末納酒中飲之又方若是桃枝竹叉但數數多食白糖自消去又療以銀叉簪筋擲吐因氣吸誤吞不出方多食白糖漸漸至十斤當裹物自出此說與葛氏小異並出第五卷中深師療誤吞鉤方虎珀珠上一物貫著鉤繩推令前入至鉤所又復推以牽引出矣若水精珠卒無珠堅物摩令滑用之也出第二十二卷中千金療誤吞環若指嘔方燒雁毛二七枚末服之鵝羽亦佳備急文仲同又誤吞珠銅鐵而哽者方燒弩銅牙令赤納酒中飲之立愈出第二十六卷中張文仲療吞諸珠璫鐵而哽方燒弩銅牙令赤納水中飲其汁立愈肘後備急同又療誤吞錢方搗火炭末服方寸匕則出肘後小品集驗千金備急深師同備急葛氏誤吞叉方取薤暴令萎煮令熟勿切食一大束叉則便隨出生麥葉若蘩縷皆可用良效千金肘後同又誤吞釘及箭金針鐵等物方多食肥羊肉脂及諸肥肉自裹出肘後千金文仲同並出第五卷中古今録驗療誤吞銀鈈及叉者方取飴糖一斤一頓漸漸食盡多食之鈈及叉便出小品集驗千金同千金作白糖又方取水銀一兩分服之叉便下去也亦可以胡粉一兩搗調之分再服食銀令如泥也若吞金銀物在腹中皆服之令消煬出也又療誤咽針方取真吸針磁石末酒白飲服一方寸匕解曰磁石特能吸取針難云今吞針哽在喉中而服磁石末入腹耶若含磁石口中者或吸針出耳二理詳取其義焉小品集驗千金同出第二十九卷中
