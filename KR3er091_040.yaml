body:
  text: 卷第四十熊虎傷人瘡方七首肘後療熊虎爪牙所傷毒痛方燒青布以熏瘡口毒即出仍煮葛根汁令濃以洗瘡日十度並搗葛根為散煮葛汁以服方寸匕日五甚者夜二文仲備急姚方小品刪繁古今錄驗並同千金方治虎咬又方嚼粟塗之姚方文仲備急古今錄驗千金同又方煮生鐵令有味以洗瘡姚方文仲備急古今錄驗千金同又凡猛獸毒蟲皆受人禁氣今人將入山草中自宜先作禁以防之可不俟備而後療也其經術云到山下先閉氣三十五息所在山神將虎來到吾前乃存吾肺中有白帝出收取虎兩目塞吾下部中乃吐肺氣上自通冠一山林之上於是良久又閉氣三十五息兩手捻都監目作三步步皆以右足在前乃止祝曰李耳李耳圖汝非李耳耶汝盜黃帝之犬黃帝教我問汝汝答之云何畢便行一山虎走不可得見若卒逢之者因正而立大張左手五指側之極勢跳手上下三度於跳中大喚咄曰虎北斗君使汝去虎即走止宿亦先四向如此又方雄黃硫黃紫石上三物搗末以絳囊盛之帶以防用本方無硫黃集驗療熊虎傷人瘡方取蒴藋一大把銼碎以水一升漬須臾取汁飲之余濘以敷瘡上備急入山闢虎法燒牛角羊角虎不敢近人文仲肘後千金姚同出第八卷中辨蛇一首肘後云惡蛇之類甚多而毒有差劇時四五月中青蝰蒼虺白頸大蛈六月中竹狩文蝮黑甲赤目黃口反鉤白蝰三角此皆蛇毒之猛烈者中人不即療多死第一有禁第二則藥今凡俗知禁者少縱尋按師術已致困斃唯宜勤事諸藥但或經行草路何由皆齎方書則應儲具所制之藥並佩帶之自隨天下小物能使人空致性命者莫此之甚可不防慎之乎文仲備急同出第八卷中禁蛇法三首崔氏禁蛇法路安滿所傳有人被蛇螫者縱身不得自來但有報人至前使之坐問被螫何處即面巳地依左右快掐頭指內第一節曲文頭側上仍心想口暗誦曰齧蛇頭掐蛇目望蛇鄉踏蛇足訖則放前人去待極遠然後緩放所掐處即瘥路安滿禁蛇法五月五日從門東刺向南三步九跡四方取氣訖重向南方取氣即切切誦後咒文四十九遍於後任所行用其遮吒呵迦吒僧禁吒噀劍吒蛇毒死噀劍嚴蛇毒爛若欲誦咒時須在月建上立喚被螫人當前立定然後背足行七步仍頓足回身向被螫人立掐指二所如了乃誦咒七遍即放所患者歸可一炊久放掐目也若不解咒蛇致死乃放掐目誦云吾庭前者木百尺無枝鳳皇在上資斯速出放汝去攝汝毒命寧收急急如律令出第五卷中古今錄驗禁蛇齧方高元海大李參軍送咒曰某郡某縣裡男女姓名年若干於某年月日時於某處為某色蛇螫某處陰咒云你是巳功曹我是亥明府你若不攝毒吾當掐你口閉氣隨想掐蛇口蛇口在食指第二節白肉際文以手大指甲掐之各自以其手屈食指掐之閉氣急掐若螫右手右手掐左手左手掐螫當中兩手盡掐急忘任放手腫處手刺去血即便瘥出第四十五卷中闢蛇法三首肘後姚氏仙人入山草法闢蛇之藥雖多唯以武都雄黃為上帶一塊古稱五兩於肘間則諸蛇毒物莫之敢犯他人中者便摩以療之帶五蛄黃丸良以丸有蜈蚣故也人入山伐船有太赤足蜈蚣置管中繫腰又有𪓛龜啖蛇帶其尾亦好䲰日喙彌佳禁法中亦有單行輕易者今疏其數條然皆須受而後行不爾到山車口住立存五蛇一頭乃閒氣以物屈刺之因左回兩步思作蜈蚣數千以衣身便行無所畏也張文仲備急同集驗入山草闢眾蛇方乾薑生麝香雄黃上三味等分搗以小絳囊盛男左女右帶佩則蛇逆者闢人為蛇所中便以療之如無麝香以射菵和帶之療諸毒良肘後千金文仲備急古今錄驗同出第九卷中千金療入山闢眾蛇方當燒羚羊角令煙出蛇則去矣肘後同出第二十六卷中蛇齧人方一十四首廣濟療毒蛇齧方取慈菇草搗以敷之即瘥其草似燕尾者是大效出第五卷中肘後蛇齧毒腫方乾薑末敷之燥復易之備急文仲千金同又方灸齧處三五壯則毒不能行又方搗射菵塗腫上血出乃瘥備急文仲千金同又方豬屎熬令焦末藍一把水三升煮取二升投屎攪和以洗之瘥文仲療蛇齧方搗雄黃末以敷之日三四度瘥又方取梳裹垢如指大長二寸以尿和敷之又方灸梳使汗出以熨瘡口即驗備急千金同又方取雞屎二七枚燒作灰投酒服之瘥千金同必效療蛇咬方五月五日前七日即齋不得食飲酒肉五辛仍先向桑下覓菟葵先知處記之至五月五日中時先手摸桑木陰一遍仍著上摸索之訖即以口齧取菟葵嚼使熟以唾塗手熟揩令遍五月七日潔齋如後七日內亦不得洗手後有蛇蠍螫者以手摩之即瘥止又方燒桑刀麝香少許和刀上以烙齧處令皮破即瘥又方生蠶蛾陰乾為末敷齧處孔中數易之其蛾有生子者妙又方麝香雄黃半夏巴豆上四味等分為末敷之又方先以唾塗咬處熟揉生大豆葉封之蛇螫方六首肘後蛇螫人瘡已合而餘毒在肉中淫淫痛癢方取大小蒜各一升合搗以熱湯淋取汁灌瘡中姚同崔氏療被蛇螫驗方生椒三兩好豉四兩上二味以人唾和搗令熟用敷傷處須臾即瘥又方取獨顆蒜截兩頭著螫處一頭大作艾炷灸之如此即愈未愈更灸以瘥為度又方取狼牙草六月以前用葉以後用根生㕮咀以葉裹煻火炮令熱用冷即易之又方取醋草熟搗以敷螫處仍將膩幞頭裹之數易其醋草似初生短嫩新鮮苗是又方取遠志嚼令碎以敷之並納一片子於所螫瘡處孔中數易之並出第五卷中蛇毒方三首救急療蛇毒方雄黃麝香乾薑上三味各等分搗研以蜜和為膏敷毒螫處良瓦舍中疑有蛇處取雄黃燒令氣散及蛇並走不住又方取獨狼牙搗臘月豬脂和以敷毒上立瘥又方取荊葉以袋盛敷瘡腫處即瘥止肘後同青蝰蛇螫方二首小品療竹中青蝰蛇螫人方雄黃乾薑上二味各等分搗篩以射菵和之著小竹管中帶之行有急便用敷瘡兼療諸蛇毒千金同肘後有麝香為三味肘後青蝰蛇論此蛇正綠色喜綠木及竹上與竹木色一種人卒不覺若人入林中行脫能落頭背上然自不甚齧人齧人必死那可屢肆其毒此蛇大者不過四五尺世人皆呼為青條蛇其尾二三寸色異者名熇尾最烈療之方破烏雞熱敷之蝮蛇螫方一十首肘後療蝮蛇螫人方桂心栝蔞上二味等分為末用小竹筒密塞之以帶行卒為蝮蛇所螫即敷之此藥療諸蛇毒塞不密則氣歇不中用文仲同又方急掘地作坎埋所螫處堅築其上毒則出土中須臾痛緩乃出徐徐以藥療之又方搗小蒜絞之飲其汁以滓封瘡上又方取豬耳中垢著傷瘡中當黃汁出瘥牛耳中垢亦可用之良又方嚼鹽唾瘡上訖灸三壯復嚼鹽唾上備急療蝮蛇螫人方燒蜈蚣末敷瘡上良肘後同又方蠟及蜜等分於鐺中消令和以無節竹筒著瘡上以蠟蜜灌竹筒令下入瘡中瘥無蜜唯蠟用之亦得又方急尿瘡中乃投刀向日閉氣三步以刀掘地作小坑以熱湯沃坎中取泥作三丸如梧子大服之取少泥塗瘡上肘後同文仲療蝮蛇螫人方細辛雄黃上二味等分以納瘡中日三四敷之兼療諸蛇及虎傷瘡良又云蝮蛇形不長頭扁口尖頭斑身赤紋斑亦有青黑色者人犯之頭腹貼相著是也東間諸山甚多其毒最烈草行不可不慎之又有一種狀如蝮而短有四腳能跳來齧人東人呼為千歲蝮或中之必死然其齧人畢即跳上林木作聲云研木研木者但營棺其判不救若云博叔博叔者猶可急療之吳音呼藥為叔故也虺蛇螫方四首古今錄驗療虺蛇毒方搗葵根以敷之肘後療虺蛇眾蛇螫人方以頭垢敷瘡中張文仲備急同又方以兩刀於水中相摩良久飲其汁痛即止備急張文仲同又方搗葎草以敷之立愈神良眾蛇螫方七首集驗療眾蛇螫人方取紫莧菜搗飲汁一升滓以少水和塗瘡上又搗冬瓜根以敷之肘後千金同又方取常思葉搗取汁飲一升以滓敷瘡上又以鬼目葉敷之止痛肘後云搗鬼針草敷上並出第九卷中文仲療眾蛇螫方嚼乾薑敷瘡上不過三四瘥又煮吳茱萸湯以漬瘡上立瘥集驗同又方搗生蓼絞汁飲之少少以滓敷瘡上又挼藍青敷之又方搗大蒜塗之以少鹽豉合搗尤佳備急集驗古今錄驗同又方以繩縛瘡上一寸許即毒氣不得走便令人以口嗍所螫處取毒數唾去之毒盡即不復痛口嗍當小腫無苦狀備急同又云此眾蛇者非前件三種也謂赤𧐖音連黃頷之類復當六七種不盡知其名水中黑色名公蠣山中一種亦相似並不聞螫人有鉤蛇尾如鉤能倒牽人獸入水後而食之又南方有𠯜蛇人忽傷之不死終身伺覓其主雖百人眾中亦直來取之唯遠去百里乃免耳又有柂長七八尺如柂毒中人必死即削取船柂煮漬之便愈凡大蛇多是神不可妄殺之又額上有白色狀如王字者有靈或有角形者此是欲變為龍也凡青蝰中人立死蝮中人一日死虺毒急於眾蛇不早療之多殘斷人手足藥不可以一法宜審按之並出第八卷中蜘蛛咬方六首廣濟療蜘蛛咬方取生鐵衣以醋研取汁塗之瘥肘後同又蜘蛛咬作瘡頻療不瘥方取蘿摩草搗如泥封之日二三毒化作膿膿出頻若勿停又方棗葉柏葉各五月五日採陰乾生鐵衣晚蠶砂上四味各等分搗散以生麻油和如泥先灸咬處塗之瘥並出第五卷中千金療蜘蛛咬人方以烏麻油和胡粉如泥塗之干則易之取瘥止肘後同出第二十六卷中備急療蜘蛛咬人方取羊桃葉搗敷之立愈肘後同又方以蒜切作兩斷以措之又以蒜摩地取泥塗之文仲同並出第八卷中蜂螫方一十首肘後療蜂螫人方取人溺新者洗之瘥備急文仲必效刪繁同又方斫谷木取白汁塗之桑汁亦良備急文仲小品古今錄驗同又方煮蜂房洗之又燒灰末以膏和塗之千金同本方云燒羊角灰苦酒和塗之又方刮齒垢塗之備急文仲千金同千金治蜂螫方蜜五合蠟二兩豬脂五合上三味和煎如膏候冷以塗之甚良一云稍稍食之又方以淳醋沃地取泥塗之又方以尿泥塗之又方取蛇皮以蜜塗之炙令熱以貼螫處效又以醬汁塗蛇皮炙以封之甚效並出第二十六卷中必效療蜂螫方搗青蒿封之亦可嚼用之肘後同又方近用敷荷挼貼之大效蜀中用驗並出第六卷中蜈蚣螫方八首肘後療蜈蚣螫人方割雞冠取血塗之瘥備急文仲刪繁必效同又方嚼鹽塗之效又以鹽拭瘡上蜈蚣未遠不得去備急小品文仲古今錄驗同又方嚼大蒜若小蒜或桑白汁以塗之亦以麻履底土措之良小品備急文仲必效古今錄驗同又方挼蛇衛草封之佳備急療蜈蚣螫人方挼藍汁以漬之即瘥蜈蚣不甚齧人甚亦微殊輕於蜂當時小痛易歇脫為所中幸可依此療之藥家皆用赤足者今赤足者螫人乃痛於黃足者是其毒烈故也張文仲肘後同又方取屋中土以水和敷之小品同崔氏療蜈蚣螫人方趁雄雞令走以雞嘴氣阿之數易雞立瘥張文仲療蜈蚣螫人方取錫炙令熱以熨之不越十度即瘥出第十卷中蠍螫人二十七首廣濟療蠍螫毒方搗蒜塗之崔氏備急同又方半夏以水研塗之亦止又方咒曰一名蒿枝一名薄之傍他籬落螫他婦兒毒氣急去不出他道你愚癡急急如律令並出第五卷中集驗療蠍蟲螫人方余身經遭此毒手指痛苦不可忍諸法療皆無效有人見令以冷水漬指亦漬手即不痛水微暖便痛即以冷水漬小暖即易之余處冷水浸故布以拓之此實大驗肘後備急千金必效文仲同又方蠍有雄雌雄者止痛在一處雌者痛牽諸處若是雄者用井底泥敷之溫則易雌者用當屋及溝下泥塗之若不值天雨可用新汲水從屋上淋下於下取泥敷之又方畫地作十字取上土水服五分匕並出第一卷中千金療蠍毒方取齒中殘飯敷之又以豬脂封之又以射菵封之又方硇砂和水塗上愈救急同凡一切螫毒之物見必不得起噁心向之亦不得殺之若輒殺之於後必遭螫慎之慎之治亦難瘥又方嚼茱萸以封之立愈又方生烏頭末唾和塗之良崔氏療蠍螫人方取人參嚼以敷痛處立瘥又以黃丹塗之瘥又方深削桂心醋磨塗之立定又方滴蠟燭熱脂於螫處三兩度易之並出第五卷中備急療蠍螫人方蜀葵花石榴花艾心上三味等分並以五月五日午時取陰乾合搗和水塗螫處立定花取未開者張文仲同又方溫湯浸之肘後崔氏同又方挼馬莧菜封之瘥肘後備急文仲同又方嚼乾薑塗之瘥肘後備急文仲同並出第八卷中必效療蠍咬人方溫酒以漬之又搗豉作餅如錢大貼螫處以艾灸七壯問被咬人云是物遣報云蠍螫即語云沒所苦語訖即私向一處翻一瓦還安舊勿使其人知回更問瘥未遣報云瘥訖即痛止神效古今錄驗療蠍螫人方取苦李子仁嚼以封之即瘥又方挼蛇銜取汁以敷之瘥又方以木碗率取此螫處即以木碗合之便瘥神驗又方挼鬼針草取汁敷之即瘥又方五月五日取菟葵熟搗以遍塗手至後日中時然後洗手若有人被螫以手摩索應手即瘥又禁蠍螫人法咒曰系胡計反梨乎俱尚蘇婆訶於五月五日桑木正北陰中菟葵日正午時先七步至菟葵此右膝著地立左膝手摘取菟葵子摘取著口中熟嚼吐著手內與五葉草菟葵等相和若無子直取二葉相和於手內左轉挼之口陰誦前咒七遍一吐氣得一百八遍止所挼葉令汁出染手其葉還放置菟葵處起勿反顧之一日一夜不得洗手亦不用點汙手內亦不得人知作此法不得人見被螫者口問云何處即陰咒七遍男以左手摩螫處口云瘥去若猶小瘮痛者男掐左手無名指第一節內側紋頭陰咒掐之女掐以右手指以右手摩螫處其菟葵私取移種於桑北五葉草處處有之耳又甄立言以此蠍毒陰蛇即非蜂蜈蚣之輩自有小小可忍者有經一日一夜不可忍者京師偏饒此蟲遍用諸藥塗敷不能應時有效遂依角法以意用竹依作小角留一節長三四寸孔徑四五分若指上可取細竹作之才令搭得螫處指用大角角之氣漏不嗍故角不厭大大即嗍急瘥速作五四枚鐺內熟煮取以角螫處冷即換初被螫先以針刺螫處出血然後角之熱畏傷肉以冷水暫浸角口二三分以角之此神驗不可以口嗍毒入腹殺人甄公云灸即瘥以熱角嗍之無火灸也並出第四十五卷中蠼螋尿方二十二首千金療蠼螋蟲尿人影便令人病其狀身中忽有處瘮痛如芒刺亦如刺蟲所螫處後起細㾦㿔作聚如茱萸子狀四邊赤中央有白膿如黍粟亦令人皮肉急舉身惡寒壯熱劇者連起盡腰脅胸也療之法初得之便磨犀角塗之上其毒療如火丹法余以武德中六月得此病經五六日覺心悶不佳以他法療之不愈有友人教畫地作蠼螋形以刀細細畫取蠼螋腸中土就中以唾和成泥塗之再塗即愈方知天下萬物相感難曉其由矣又方羚羊須燒灰臘月豬脂和以封之瘥又療蠼螋尿方熟嚼梨葉以封之干復易之又方取馬鞭草爛搗以封之干復易瘥廣濟療蠼螋尿繞腰欲死方取敗蒲扇煮汁塗之又方扁豆葉搗塗之並出第啳中深師療蠼螋尿方取鵲巢中土以苦酒和敷之又方以雞子和白磰敷之侵淫為廣以大蒜磨研書墨塗之一方以胡粉塗之一方以豬膏塗之又燒蒲灰敷之並出第二十九卷中集驗療蠼螋尿瘡方燒鹿角搗末以苦酒和敷之已有汁者燒道邊弊蒲席灰以敷之深師千金並翼文仲同又方槐白皮半斤切苦酒二升上二味漬半日刮去瘡處以洗日五六遍末赤小豆和苦酒敷之燥即易之小兒以水和敷之甚良千金並翼文仲深師同又方嚼大麥以敷之日三千金同又方豬脂和燕巢中土敷之千金同並出第九卷中千金翼療蠼螋尿瘡方取茱萸東引根下土以醋和塗之又瘡表裡相當一名侵淫瘡方取豬牙車骨年久者捶破燒令脂出及熱塗之千金同又方取楝木枝若皮燒灰敷之乾者以豬膏和敷並主小兒禿及諸惡瘡深師同出第二十四卷中崔氏療蠼螋尿瘡習習然黃水出者方取韭搗取汁以塗之又方煮甘草湯洗之又方嚼桂塗之又方絞馬屎汁洗之又方嚼麻子塗之又方令患人於日裡立側近作沸湯微取以淋患人影令當所患瘡處六七度仍遣人熟嚼蒜以噀患人影中患處口中余蒜氣即真噀患人瘡上愈並出第五卷中救急蠼螋尿方取燕窠和釅醋塗之大良出第五卷中惡蠔方三首必效療惡蠔已洪腫者並瘥方取楝木根並皮切一升以水三升和煎取二升適寒溫浸洗瘡冷即易再三瘥又惡蠔已洪腫爛者方乾薑水銀豬脂臘月者上三味揉令相得即置九向碗中燒以竹筒籠上熏所腫處未熏先破兩處然後熏即瘥又方取胡蔥於煻火中煨令軟出以紙隔手挼令破以拓瘡上以痛定為度李饒多用神效並出第十六卷中蠆螫方二首肘後論云此𧓽字作蠆字所謂蜂蠆作於懷袖賁育為之驚恐言其小而有毒起乎不意也世人呼蝘蜓為蠆子而未嘗中人乃言不可螫人雷鳴乃放想亦當極有毒書家呼蝘蜓為守宮本草云守宮即是蜥蜴如東方朔言則兩種物矣今蜥蜴及蛇醫毋並不螫人蜥蜴有五色具者亦云是龍不可殺之令人震死今又有一小烏蟲子尾有翹世人呼為甲蟲而尾似車緩兩尾復言此蟲是蠆未詳其正矣又療蠆螫人方搗常思草絞取汁以洗瘡出第八卷中古今錄驗蠆螫人方取屋霤下土水和敷之立愈出第四十五卷中射工毒方一十九首備急論射工毒江南有此射工毒蟲一名短狐一名蜮常在山間水中人行反入水中此蟲口中有橫骨狀如角弩即以氣射人影則病其診法初得時或如傷寒或似中惡或口不能語或身體苦強或惡寒壯熱四肢拘急頭痛旦可暮劇困者三日則齒間血出不療則死其人中有四種初覺即遍身視之其一種正如黑子而皮繞四邊突赤以衣被犯之如芒刺狀其一種作瘡瘡久則穿陷其一種突起如石癰狀其一種如火灼人肉起作瘡此種最急能殺人居此毒之地天大雨時或逐行潦流入人家而射人又當養鵝鵝見即食之船行將純白鵝亦闢之白鴨亦善帶好生金犀角麝香並佳又若見身中有此四種瘡處便急療之方急周繞遍去此瘡邊一寸輒灸一處百壯瘡上亦百壯大良肘後同又療射工毒方白雞屎白者二七枚以水湯和塗瘡上必效文仲備急千金肘後同並出第九卷中肘後初見此瘡便宜療之方便水磨犀角塗之燥復塗亦取細屑和麝香塗之一方云服一方寸匕又方以白梅皮裹豉母蟲吞至六七枚勿佳本方云取水上浮走豉母蟲一枚置口中便瘥又射工毒蟲止黑狀如大蜚生齧發而形有雌雄雄者口邊有兩橫角角能屈伸有一長角橫在口前弩檐臨其角端曲如上弩以氣為矢因水勢以射人人中之便不能語冬月並在土中蟄其上雪不凝氣蒸休休然人有識處掘而取帶之溪邊行亦往往得此若中毒仍為屑與服夏月在水中則不可見乃言此蟲含沙射人影便病欲度水先以石投之則口邊角弩發矣若中此毒體覺不快視有瘡處便療之療之亦不異於溪毒又方取皂莢一挺長一尺二寸者捶碎以苦酒一升煎如餳去滓敷毒上文仲備急同又方取馬齒莧搗飲汁一升滓以敷瘡上日四五遍良文仲備急同集驗療射工毒中人寒熱發瘡偏在一處有異於常方取赤莧合莖葉搗絞取汁服一升日再三服千金備急文仲必效刪繁肘後同姚云服七合日四五服又方犀角升麻烏翣根各二兩上三味以水四升煮取一升半去滓分再服相去一炊久盡更作千金同又方取生茱萸莖葉一虎口斷去前後取握中者熟搗以水二升煎取八合頓服之千金同又療射工中人瘡有三種一種瘡正黑如壓子皮周遍悉赤或衣犯之如有刺痛一種作瘡瘡久則穿或晡間寒熱一種如火灼熛起此者最急數日殺人此病令人寒熱方烏翣根二兩升麻二兩上二味切以水三升煮取一升適寒溫頓服之滓敷瘡上肘後千金文仲備急同古今錄驗云烏扇無根用葉出第一卷中千金療射工初中未有瘡但憎寒凜凜及其成瘡似蠼螋尿亦似瘭疽狀方取芥子搗熟苦醋和厚塗瘡上半日痛便止古今錄驗同又方取狼牙葉冬取根枝搗之令熟敷所中處又飲四五合汁又云山中草木上石蛵著人則穿齧肌肉行人肉中侵淫墳起方灸斷其道即愈又凡入山路行草木中常以臘月豬膏塗腳足趾間跌上及著鞋處蛵不敢著人又江南毒氣惡核似射工暴腫生瘡五香散方甲香犀角屑鱉甲炙令黃薰陸香升麻烏翣根吳茱萸沉香丁香各三分黃連羚羊角屑牡蠣熬甘草炙黃芩各四分黃柏六分上十五味為散水服方寸匕日三服又以雞子白和塗上干易之以水和少許洗上忌莧菜豬肉海藻出第二十六卷中救急療射工毒方取葫蒜切貼瘡灸七壯良古今錄驗療射工中人已有瘡者方取蜈蚣大者一枚炙搗末以苦酒和敷瘡上痛便止千金同溪毒方二十一首肘後中溪毒論葛氏云水毒中人一名中水一名中溪一名中灑一名水病似射工而無物其診法初得之惡寒頭微痛目眶疼心中煩懊四肢振焮腰背骨節皆強筋急兩膝疼或熻熻而熱但欲睡旦醒暮劇手足逆冷至肘膝二三日則腹中生蟲食人下部肛中有瘡不痛不癢不令人覺視之乃知耳不即療過六七日下部膿潰蟲上食五臟熱盛煩毒汪下不禁八九日良醫所不能療之覺得之急當早視下部若有瘡正赤如截肉者為陽毒最急若瘡如蠡魚齒者為陰毒猶小緩要皆殺人不過二十日也欲知是中水當作數斗湯以小蒜五升㕮咀投湯中莫令太熱熱即無力去滓消息適寒溫以浴若身體發赤斑文者是也其無者非也當作他病療之文仲千金翼備急同又療中水毒方取梅若桃葉搗絞取汁三升許為二服或干以水絞取汁極佳集驗文仲備急千金同姚云小兒不能飲以汁敷乳頭與之又方取常思草搗絞汁三升飲之妙並以綿裹導下部中日三瘥文仲備急同又方搗藍青汁以少水和塗頭面遍身令匝文仲千金翼備急同又方取蓼一把搗以酒一升和絞服之不過三服文仲千金翼備急云肘後用梨葉又方取大莓連根上一味搗作屑服之亦可投水搗絞汁飲一二升並導下部生蟲者夏月常行多齎此屑欲入水浴先以少屑投水上流便無所畏又闢射工家中雖以器盛水浴亦常以此屑投水中大佳文仲千金翼備急同又今東間諸山州縣人無不病溪毒每春月多得亦如京都傷寒之狀呼為溪溫未必皆是射工輩爾亦盡患瘡痢但寒熱煩疼不解便死耳方家療此用藥與傷寒溫疾頗相似今復疏其單療於此方東向三兩步即以手左一攪取水將蒜一把熟搗以酒漬之去滓可飲兩杯當吐得吐便瘥此方甚效備急療溪毒方取五加根燒末以酒若漿服方寸匕肘後文仲備急同又方燒鮫魚皮以飲服方寸匕立瘥又方荊葉搗汁飲之佳肘後同又方搗柒姑以塗之腰背諸處柒姑生東間細葉如蒜狀又方烏蒜一枚搗以酒和服半升得吐即瘥又名烏韭山中甚多又若下部生瘡已決洞者方取秫米一升鹽五升水一石煮作麋坐中即愈文仲備急同肘後並同又方取桃葉艾葉搗熟以水漬之縱取濃汁去滓著盤中坐有白蟲出瘥文仲備急同肘後云取桃皮葉無艾葉又方燒皂莢搗末以綿裹導之又方以鹽和皂莢末搗之綿裹導之又方末牡丹屑以飲服方寸匕日三又其土俗有療之術方初覺便取溪蒜莃薟桃葉銼一斤蒸使遍熱出布席上解衣臥上厚覆衣被大汗良久出拭之勿見風則瘥已五六日恐毒入腹不可救爾應先服藥東間諸山有大木名埋檀枝葉上似梨冬不凋剝取白皮皮重疊如紙捶破煮服一升日夜六七遍無生者預取干之亦單用茜根白蘘荷根藍青汁並佳若卒無根皮亦可單用藍汁可服之亦可都合煮取汁漬之若患腹中痛恐轉成蠱啖人腹藏者取豬脂二升熬令燥水一斗絞取汁稍稍服之並出第八卷中千金療溪毒方取大蒜十枚合皮安熱灰中炮令熱刀切斷頭以柱所著毒處文仲備急崔氏同又方雄黃硃砂常山各等分上三味五月五日午時使童子搗合之出第二十六卷中張文仲療溪毒方取蓼搗取汁服一二升又以塗同匝瘥又方取雄牛膝根一把搗水酒共一升漬絞取汁飲之日三雄牛膝莖白紫色者是出第十卷中沙蝨毒方六首肘後中沙蝨毒論云山水間多有沙蝨其蟲甚細不可見人入水浴及汲水澡浴此蟲在水中著人及陰雨日行草中即著人便鑽入皮里其診法初得之皮上正赤如小豆黍米粟粒以手摩赤上痛如刺過三日之後令人百節強疼痛寒熱赤上發瘡此蟲漸入至骨則殺人凡在山澗水澡浴畢熟以巾拭身中數過又以故帛拭之一過乃敷粉也今東間水無不有此洗浴畢以巾拭㸁㸁如甚毛針刺熟看見處仍以竹葉抄拂去之比見嶺南人初有此者即以茅葉刮去乃小傷皮膚為佳乃數塗苦苣菜汁瘥已深者用針挑取得蟲子正如疥蟲著爪上映光方見行動也挑不得便就上灸三四炷則蟲死病除若止兩三處不能為害多處不可盡挑灸若猶覺惛惛是其已大深便應依土俗作方術出之並作諸藥湯以俗皆得一二升沙出沙出都盡乃止若無方術痛飲番酒取醉亦佳如其無則依此方為療並雜用前中溪毒射工法急救七日中宜瘥不爾則仍變成溪毒如薤葉大長四五寸初著腹脅腫如刺則破雞拓之蟲出食雞或三四數遍取盡乃止兼須服麝香犀角護其內作此療之彼土有中之者不少呼此病為㿗呼故切沙蟲吳音名沙作盜護如鳥長尾盜者言此蟲能招呼溪氣東間山行無處不有其蟲著人肉不痛不即覺者久久便生子在人皮中稍攻人則為瘻山行宜竹管盛鹽數視體足見者以鹽塗之便脫雜少石灰尤良亦斷血而闢水溫又療沙蝨毒方以少許麝香敷瘡上過五日不瘥當用巴豆湯服之一日輒以巴豆一枚二日二枚計為數並去皮心以水三升煮取一升盡服之未瘥即更可作服之文仲備急同又方斑蝥二枚熬一枚研末服之燒一枚令煙絕末著瘡中千金文仲備急同又方取麝香大蒜合搗以羊脂和著筒中帶之行大良千金同刪繁療沙蝨方以鹽五合以水一斗煮一沸以漬洗瘡出第十卷中必效療沙蝨方初著有赤點如米以鹽和麝香塗之瘥犬咬人方九首肘後犬咬人方取灶中熱灰以粉上畢裹縛之千金同又方乾薑末服二方寸匕薑汁服半升亦良集驗療凡犬咬人方以苦酒和灰塗之良千金同千金療凡犬咬人方燒犬尾灰敷之日二又燒自死蛇灰末敷瘡中又方桃東南枝白皮一握以水一升煮取五合服之又方莨菪子七枚以水服之日一度瘥止又方梅子末以酒服之又方以臘月鼠一枚以豬脂煎如膏去滓候凝以塗之古今錄驗療凡犬咬人方先以水洗瘡任血出勿止之洗勿住取血自止以帛裹之即瘥狂犬咬人方二十二首千金論曰凡春末夏初大多發惡狂必誡小弱持杖預以防之而不免者莫出於灸百日之中無缺一日者方得免難若初見瘡瘥痛定即言平復者此最可畏大禍即至死在旦夕凡狂犬咬人著訖即令人狂精神已別何以得知但看灸時一度火下即覺心神中醒然方知咬已即狂是以深須知此此病至重世人皆輕之不以為意坐之死者每年常有之臣昔初學醫未以為業有人遭此將以問臣臣子不知報答以是經臣手而死者非一由此銳意學之一解以來療者皆愈方知世無良醫枉死者半此言非虛故將來學者非必此法餘一一方皆須沉思留作心意勤學之乃得通曉莫以粗解一兩種法即謂知說極自誤也因方申此一言言不盡意耳又療狂犬咬人方蛇脯一枚去頭炙搗末服五分匕日二又方服青布汁三升又方飲驢尿一二升良又方搗莨菪根和鹽以敷之日三度肘後療猘犬咬人方先嗍去惡血乃須灸瘡中十壯明日以去日灸一壯滿百日乃止忌酒千金文仲備急小品古今錄驗同又方搗地榆根絞取汁塗瘡無生者可取乾者以水煮汁飲之過百日乃止日末服方寸匕日三兼敷瘡上千金同又方搗薤絞取汁敷之又服一升日三須瘡瘥乃止亦治已瘥復發者千金同又方以豆醬清塗瘡日三四瘥千金同小品療狂犬咬人方刮狼牙或虎牙骨末服方寸匕已發狂如猘犬者服此藥即愈肘後同又方頭髮蝟皮燒作灰末等分和水飲一杯若或已目赤口噤者可折齒灌之肘後千金同又方搗地黃汁飲之並塗瘡上過百日止肘後同又眾療不瘥毒攻人煩亂㖦已作犬聲者方通按㖦音董多言動也髑髏骨燒灰末以東流水和服方寸匕以活止凡狂犬咋人七日輒應一發過三七日不發則免也要過百日乃為大免每至七日當搗薤一作韭汁飲二三升又當終身禁食犬肉蠶蛹若食此發則不可救之瘡未瘥之間亦忌食生魚諸肥膩肉及諸冷食但於飯下蒸生魚及就膩器中食便發不宜飲酒能過一年乃佳又若重發者療之方生食蟾蜍膾絕良亦可燒炙食之不必令其人知初得齧便為此則不發集驗文仲千金備急肘後同姚剝作膾吞蒜齏下也又方搗生薑汁一升以來服之佳崔氏療狂犬咬人方凡被狂犬咬即急嗍去血急吐之勿錯咽之然後搗杏仁和大蟲牙捻作餅子貼瘡上頓灸二七壯從此以後每日灸一兩壯貼杏仁餅子灸之須要滿百日乃止百日內必莫使瘥如無大蟲牙可單用杏仁亦得狂狗咬人每至七日即合一發值至七日即須搗韭汁服一大合日再服之縱非至七日值一日兩日服一兩合大妙如冬月無可取韭根搗汁服之又三兩日取杏仁一合搗碎熟研濾取汁和大蟲牙齒無牙齒骨亦可用熟煎取一大升汁又燒竹瀝一合以和杏仁酪汁更煎一兩沸分三服一日使盡又取所咬犬腦以塗瘡大佳取大蟲牙齒末或大蟲脂塗之便佳又方以大蟲骨灰和杏仁膏以塗之甚良文急療狂犬齧人無問深淺者方初被咬便以冷水洗令血斷封裹著如其瘡大及深宜放流水中浸之血斷依法封裹更不用余裹忌風千萬不畏凡初被咬即覓一切物與吃後不發也出第八卷中必效療狂犬咬方梔子皮燒灰石硫黃末上二味搗為末敷瘡日一易救急同又方取蚯蚓糞水和之如泥以封之上有毛以毛盡即瘥又方驢屎汁飲一升即瘥又方杏仁切去尖豆豉各一兩韭根一握淨洗上三味搗為餅可瘡大小厚一二分貼咬處大作艾炷以灸餅上熱徹即瘥又方虎骨石灰上二味以臘月豬脂和作餅子曝乾搗末以敷之良並出第六卷中豬齧人方二首千金療豬齧人方煉松脂貼上又方屋霤中泥以敷之並出第二十六卷中馬咋踏人方四首肘後療馬咋及踏人作瘡有毒腫熱疼痛方炙瘡中及腫上即瘥又方取婦人月經敷之最良姚云神效集驗療馬咋及踏人作瘡有毒腫熱疼痛方割雞冠血點所齧瘡中日三若父馬用雌雞母馬用雄雞肘後同千金療馬咬人及踏人作瘡毒腫熱痛方取馬鞭稍三尺鼠屎二七枚燒末以豬膏和塗之立愈備急小品集驗必效古今錄驗同出第二十六卷中肘後云取馬鞭梢二寸剝死馬馬骨傷人方三首肘後療剝死馬馬骨傷人手毒攻欲死方取死馬腹中屎以塗之即瘥集驗千金備急古今錄驗小品同集驗療剝死馬馬骨傷人手毒攻欲死方絞飲其矢汁燒末服方寸匕備急同出第九卷中古今錄驗療剝死馬馬骨傷人手毒欲攻死方服人屎汁出第四十五卷中馬骨所刺及馬血入舊瘡方八首肘後療馬骨所刺及馬血入舊瘡中毒痛欲死方以熱桑灰汁更番漬之常目為之冷即易數日乃愈若痛止而腫不消煮炙石令熱以熨之灸瘡上亦佳集驗千金同又方搗脈子以水絞取汁飲一升日三服又方酒漬馬目毒公少少飲之小品療馬骨所刺及馬血入攻人瘡中毒痛欲死方人糞泥之又搗馬莧敷之出第十卷中刪繁療馬骨刺人馬血入人瘡孔方馬糞乾者止一物粉瘡孔上㩉瘡口也又方雄黃乾薑上二味等分搗末納瘡口中即瘥又方大小蒜搗熬暖用敷瘡上又方以熱湯數淋瘡上即瘥並出第十卷中馬汗及毛入人瘡中方六首肘後療人體上先有瘡而乘馬馬汗及馬毛入瘡中或但為馬氣所蒸皆致腫痛煩熱入腹則殺人方燒馬鞭皮以豬膏和敷之備急千金集驗同又方以水漬瘡數易水漬之千金備急同又方以石灰敷上千金備急同集驗療人先有瘡而乘馬馬汗若馬毛入瘡及拂略著致令腫痛方大飲醇酒取醉即愈肘後千金同出第八卷中千金療馬汗入人瘡方燒雞毛末以酒服方寸匕集驗同又方煮沸湯及熱以漬之冷復易之小品同出第二十六卷中驢馬諸疾方三十一首救急夫六畜之中唯馬最為貴致遠之勞賢愚所要或在戎漠或居村落忽患急黃黑汗等諸疾將息水草之宜人間之要次之君子所附卷末敷以意焉凡騎馬遠行初到先與空銼草刷畢飲水飲水畢然後與粟豆等若先與粟豆等或水穀並必致馬病也出第九卷中肘後療馬熱蟲顙黑汗鼻中有膿腔水草不進方黃栝蔞根貝母桔梗大青梔子仁吳藍款冬花大黃白蘚皮黃芩鬱金各二大兩黃柏馬牙硝各四大兩上十三味搗篩患相當及常要啖重者藥三大兩地黃半斤豉二合蔓菁油四合和合齋前啖至晚飼大效又蟲顙重者方葶藶子一合熬令紫色搗如泥桑白皮一大握大棗二十枚擘上三味以水二升煮取一升去滓入葶藶合調勻適寒溫灌口隔日又灌重者不過再瘥又療馬脊瘡方黃丹敷之避風即瘥又療馬羯骨脹方取四十九隻羊蹄燒之熨骨上冷即易之如無羊蹄楊柳枝指粗者炙熨之不論數瘥又療馬後冷方豉蔥姜各一兩水五升煮取半和酒灌之又療馬目暈方霜後干楮葉細為末日兩度管吹眼中瘥又療馬疥方大豆熬焦和生油麻搗敷之醋泔淨洗又方樗根末和油麻塗之先以皂莢水或泔淨洗之洗了塗令中間空少許放蟲出不得多塗恐瘡大又方巴豆去皮心膩粉上二味研以油麻油和塗先洗之塗數日看更驗備急療驢馬蟲顙方生地黃汁一升桑根白皮五兩紫菀三兩射干二兩麻黃一兩蔥白一斤蘇二合蜜一合上八味切以水一斗五升煮取八升去滓納麝香末一豆攪調作兩度灌之當灌每取早朝食時飲水三分與一分至午時三分與二分至夜使足明日還依前法與之其藥更加地黃及蔥白蜜豉以水三五升煮取多少依前加麝香少許自余將息一依前法當灌時高舉頭勿使藥汁射肺則藥汁不出斟酌藥入即不得用全高每灌皆取一雞子汁分灌兩鼻孔中若氣力弱隔日灌之若神強頻日灌之若輕者三兩度灌之即瘥灌後三兩日伺候看鼻中膿絕嚬斷即瘥如不斷用後法桑白皮一斤細切以水三升煮取一升去滓每旦灌鼻孔中灌時入研麝香一豆大佳又馬蕩方大黃黃芩鬱金當歸芍藥紫菀芎藭白朮牛膝細辛各一兩上十味合搗末用湯調方寸匕以灌之又療馬急黃黑汗方割上斷訖取陳久靴爪頭水漬汁灌口如不足用大黃當歸各一兩鹽半升以水三升煎取半分兩度灌口如不定破尾使骨才血即止肘後同又療馬起臥胞轉並腸結並用此方細辛防風芍藥各一兩鹽一升上四味切以水五升煮取二升半去滓分二度灌後前灌方芒硝鬱金寒水石大青各一兩上四味切以水五升煮取二升去滓以油酒各半升和調分二度灌口肘後同又療馬心黃並肺熱方大黃黃芩芍藥細辛各一兩上四味切以水五升煮取二升半油半升酒半升調和分為三度灌口如不定鹽半升水一升半溫如人肌和鹽灌後即定又春冬灌馬方大黃鬱金黃芩細辛芍藥桔梗升麻麻黃大青茵陳白朮芒硝寒水石朴硝各一兩上十四味搗為散若春灌即和雞子油量水多少攪調灌口若冬灌即切以煎之訖冷和油及酒灌口又療馬蟲顙十年以上灌鼻一兩度無不瘥方醬清和膽半合攪令調分兩度灌鼻每一灌停一兩日將息不得傷多多即傷馬故錄之令知肘後同又療馬蟲顙方候馬鼻沫出梁腫起即不可療硇砂二酸棗許研豬脂臘月者二雞子許上二味先研硇砂令極細為末然後熬豬脂及硇砂煎一沸停如人肌高仰馬鼻以灌之一炊久若患一鼻減藥之半兩鼻患兩鼻中灌之一鼻患一鼻中灌之灌鼻後一二日更有熏法如後莨菪子別搗藜蘆穀精草乾膝葶藶子別搗各等分為末相和以麻捻如燭燒一頭納馬鼻中令煙入效仍仰馬頭令稍高又療馬驢胞轉欲死方搗蒜內小便孔中深五寸立瘥又用小兒尿和水灌口立瘥又方騎走上坡用木腹下來去捺以手內大孔中探卻糞大效探法剪卻指甲以油塗手恐損破腸也肘後同又方但以鹽四升人尿和灌口又方搗蒜三升哺之小馬分半又療馬患月憐方取鬼微熱挼揩之立瘥鬼微如地菌夏月得濕多聚生糞中見日消黑者是又療馬食著地膽等蟲輒困脹悶立死方取桑根入地一尺者去黃皮銼之以水煎取濃汁急灌口止毒勝甘草又療馬嗽方取麻子一斗飼之立定若腔及色焦與吃即光澤肘後同又馬跙蹄方於馬櫪下當馬前腳闊一尺許掘渠深一尺許取石如雞子許大滿中填實令馬立其上兩日即瘥肘後同又馬每月一兩度灌油鹽永不著黃方以油一小升鹽一小合和以灌口瘦弱馬以意量之又馬脊瘡方取馬通汁及熱遍瘡上塗之又療馬疥方云花草一兩狀如麻黃而堅實薰黃二兩附子一枚用藜蘆二兩神效上三味搗末生麻油和之以泔清皂莢洗之日中少時令水乾後敷藥不過五六遍無不瘥韓五家盛談效驗但苦不識云花出第九卷中又療馬筋瘙方硇砂藜蘆槐子葶藶子各半兩薰黃石硫黃黃柏巴豆烏麻各少許蜜豬膏各半兩上十味搗為末蜜豬膏和藥如泥敷瘡方又方取一杯酒酢並麥米等相和令調塗布上重裹上用麻纏每敷先以鐵漿汁洗病拭乾塗藥日再瘥止牛狗疾方六首肘後療牛疫病方取獺屎三升以沸湯淋取汁二升灌之良又療牛馬六畜水穀疫病方取酒和麝香少許和灌之又療六畜脊瘡焦痂方以麵糊封之即落又療牛脹方以豬脂和小兒屎灌口瘥又療牛吃苜蓿草誤吃地膽蟲肚脹欲死方以研大麻子灌口瘥吹生蔥亦佳救急療犬疥方蛇皮燒灰和粥與吃瘥出第九卷中牛牴觸腸出方一首救急療牛牴觸腸出方硇砂一大兩乾薑二小兩上二味為末塗損處腸即自入腸幹不入宜割去幹處訖用粟谷葉為末以敷之即卻入大良神妙出第九卷中油衣黏及松脂著人衣蟲蝕毯韉法五首救急油衣黏法以黃土泥水和如煎餅面表裡塗之陰乾一宿以水濯去之不黏也又韉被蟲蝕方取吳茱萸搗末和麵作糊塗韉面煎茱萸汁刷之其蟲永斷又氈被蟲蝕方刈取黃蒿有子者曝乾鋪氈中卷之令遍置閣上十年不蝕又松脂著人手足及衣氈褥洗不去法以嚼杏仁洗之立去除彩色衣物等著車脂及油膩等米研煮作飲洗之即不損緋紫碧綠一雲車脂嚼粟以水洗之蠟以蜜水洗之極驗又方煮水便和皂莢洗佳以酒洗亦佳以蜜和湯洗之平復不損色並試有功雖是小事亦為切要以附之服餌之未出第九卷中
