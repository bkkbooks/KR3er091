body:
  text: 卷第三十三求子法及方一十二首千金論曰夫婦人之別有方者以其血氣不調胎妊生産崩傷之異故也是以婦人之病比之男子十倍難療經言婦人者衆陰所集常與濕居十四歲以上陰氣浮溢百想經心內傷五臟外損姿顏月水去留前後交互瘀血停凝中道斷絶其中傷墮不可具論矣然五臟虛實交錯惡肉內漏氣脈損竭或飲食無度損傷非一或胎瘡未愈而合陰陽或行步風來便利於懸廁之上風從下入便成十二痼疾所以婦人別立方也若是四時節氣為病虛實冷熱為患者故與丈夫同也唯懷胎妊孕而挾病者避其毒藥耳其雜病與丈夫同則散在諸卷中可得而知也然而女人嗜欲多於丈夫感病倍於男子加以慈戀愛憎嫉妒憂恚染著堅牢情不自抑所以為病根深療之難瘥故養生之家特須教子女學此三卷婦人方令其精曉即於倉猝之秋何憂畏也夫四德者女子立身之樞機産育者婦人性命之長務若不通明於此則何以免其夭橫者哉故傅母之徒亦不可不學當宜繕寫一本懷挾隨身以防不意也又論曰人之性情皆願賢己而疾不及人至於學問則隨情逐物墮於事業詎肯專一推求至理莫不虛棄光陰沒齒無益夫婚姻養育者人倫之本王化之基聖人設教備論厥旨後生莫能精曉臨事之日昏爾若愚是則徒願賢己而疾不及人之謬也斯實不達賢己之趣而妄徇虛聲以終無用今具述求子之法以貽後嗣同志之士或可覽焉又論曰夫欲求子者當先知夫妻本命五行相生及與德合併本命不在子休廢死墓中生者則求子必得若其本命五行相剋及與刑煞衝破並在子休廢死墓中生者則求子了不可得慎無措意縱或得者於後終亦纍人若其相生並遇福德者仍須依法如方避諸禁忌則所誕兒子盡善盡美難以具陳矣禁忌法凡欲要兒子生吉良者交會之日常避丙丁及弦望朔晦大風大雨大霧大寒大暑雷電霹靂天地昏冥日月無光虹霓地動日月薄蝕此時受胎非止百倍損於父母生子或喑啞聾聵頑愚癲狂攣跛盲眇多病短壽不孝不仁又避日月火光星辰之下神廟佛寺之中井灶圊廁之側冢墓尸柩之傍皆悉不可夫交會如法則有福德大智善人降托胎中仍令父母性行調順所作和合家道日隆祥瑞競集若不如法則有薄福愚癡惡人來托胎中則令父母性行凶險所作不成家道日否殃咎屢至雖生成長家國滅亡夫禍福之驗有如影響此乃必然之理何不再思之男女受胎時日法凡男女受胎皆以婦人經絶一日三日五日為男仍遇男宿在貴宿日又以夜半後生氣時瀉精者有子皆男必壽而賢明高爵也若以經絶後二日四日六日瀉精者有子皆女過六日皆不成子又遇王相日尤吉推王相日法春甲乙夏丙丁秋庚辛冬壬癸推貴宿日法正月一日六日九日十日十一日十二日十四日二十一日二十四日二十九日二月四日七日八日九日十日十二日十四日十九日二十二日二十七日三月一日六日七日八日十日十七日二十日二十五日四月三日四日五日六日八日十日十五日十八日二十二日二十八日五月一日二日三日四日五日六日十二日十三日十五日十六日二十日二十五日二十八日二十九日三十日六月一日三日十日十三日十八日二十三日二十六日二十七日二十八日二十九日七月一日十一日十六日二十一日二十四日二十五日二十六日二十七日二十九日八月五日八日十三日十八日二十一日二十二日二十三日二十四日二十五日二十六日九月三日六日十一日十六日十九日二十日二十一日二十二日二十四日十月一日四日九日十四日十七日十八日十九日二十日二十二日二十九日十一月一日六日十一日十四日十五日十六日十七日十九日二十六日二十九日十二月四日九日十二日十三日十四日十五日十七日二十四日二十七日若春合甲寅乙卯夏合丙午丁巳秋合庚申辛酉冬合壬子癸亥與上件月宿日合者尤佳出第二卷中千金翼論曰夫求子者服藥須有次第不得不知其次第謂男服七子散女服蕩胞湯及坐藥並服紫石門冬丸則無不得效矣不知此者得力鮮焉其七子散蕩胞湯紫石門冬丸出第五卷中在次下千金並翼方中廣濟療無子令子宮內炙丸方麝香二分研皂莢十分塗酥炙削去黑皮子蜀椒六分汗上三味搗篩蜜丸酸棗仁大以綿裹納産宮中留少綿線出覺憎寒不淨下多即抽綿線出卻丸藥一日一度換之無問晝夜皆納無所忌又方蛇床子石鹽細辛乾薑土瓜根各四兩上五味搗散取如棗核大以綿裹納子宮中以指進之依前法中間病未可必不得近丈夫余無所忌並出第三卷中又療婦人百病斷絶緒産白薇丸方白薇細辛厚朴炙椒汗桔梗鱉甲炙各五分防風大黃附子炮石硫黃各六分研牡蒙二分人參桑上寄生各四分半夏洗白殭蠶續斷秦艽紫菀杜仲牛膝虻蟲去翅足熬水蛭各二分紫石英研朴硝桂心鍾乳當歸各八分上二十七味搗篩蜜丸空腹溫酒服如梧桐子十五丸日二漸加至三十丸不吐不利忌生冷油膩餳生血物人莧生蔥生菜豬肉冷水黏食陳臭出第二卷中千金七子散療丈夫風虛目暗精氣衰少無子補不足方五味子牡荊子菟絲子車前子乾地黃薯蕷石斛杜仲鹿茸炙遠志去心菥蓂子各八分附子炮蛇床子芎藭各六分山茱萸天雄炮黃耆人參茯苓牛膝各五分桂心十分巴戟天十二分蓯蓉七分鍾乳三分上二十四味搗篩為散酒服方寸匕日二服不知增至二匕以知為度忌生冷酢滑豬雞魚蒜油膩不能酒者蜜和丸服亦佳行房法一依素女經女人月信斷一日為男二日為女三日為男四日為女以外無子仍每日午時前半夜後陽時為男下精欲得去玉門入半寸不爾過子宮一方加覆盆子八分忌蕪荑生蔥經心録並翼同又朴硝蕩胞湯療婦人立身以來全不生及斷緒久不産三十年者方朴硝牡丹當歸大黃桃仁去皮尖生用合三兩細辛厚朴炙桔梗芍藥人參茯苓桂心甘草炙牛膝橘皮各二兩虻蟲去翅足微熬水蛭炙各六十枚附子一兩半炮上十八味切以清酒五升水六升合煮取三升分四服日三夜一每服相去三辰少時更服如常覆被取少汗汗不出冬日著火籠必下積血及冷赤膿如赤小豆汁本為婦人子宮內有此惡物令然或天陰臍下痛或月水不調為有冷血不受胎若斟酌下盡氣力弱人困不堪更服亦可二三服即止如大悶不堪可食酢飯冷漿一口即止然恐去惡物不盡不大得藥力若能忍服盡大好一日後仍著導藥翼方無桔梗甘草並出第二卷中千金翼坐導藥方皂莢一兩炙去皮子大黃戎鹽礬石燒當歸各二兩五味子乾薑各三兩細辛三兩蜀椒汗二兩葶藶子苦瓠各三分千金作山茱萸上十一味搗篩納輕絹袋子如中指許大長三寸盛之令滿納子門中坐任意勿行走急小便時即出之仍易新者一日當下青黃冷汁汁盡止即可幸御自有子若未見病出亦可至十日安之千金無葶藶一方又有砒霜三分廣濟同著藥後一日乃服紫石門冬丸其方如下紫石英七日研之天門冬各三兩去心紫葳甘草炙桂心牡荊子千金作牡蒙烏頭炮乾地黃辛夷仁石斛卷柏禹餘糧當歸芎藭各三兩烏賊魚骨牛膝薯蕷各六分桑寄生人參牡丹皮乾薑厚朴炙續斷食茱萸細辛各五分柏子仁一兩上二十六味搗篩蜜和酒服十丸如梧桐子日三稍加至三十丸慎如藥法經心録同並出第五卷中延年療婦人子臟偏僻冷結無子坐藥方蛇床子三兩芫花三兩上二味搗篩取棗大紗袋盛納産門中令沒指袋少長便時須去任意臥著慎風冷出第四卷中久無子方五首廣濟療久無子白薇丸方白薇牡蒙藁本各五分當歸乾地黃各七分芎藭人參柏子仁石斛桂心附子炮五味子防風吳茱萸甘草炙牛膝桑寄生各六分薑黃七分禹餘糧八分秦椒二分汗上二十味搗篩蜜丸如梧桐子空腹酒下二十丸加至三十丸日再服不利忌生蔥生菜熱面蕎麥豬肉葵菜蕪荑菘菜海藻黏食陳臭物等又療久無子斷緒少腹冷疼氣不調地黃湯方乾地黃牛膝當歸各八兩芎藭卷柏防風各六分桂心牽牛子末各三分上八味切以水六升煮取二升三合去滓分三服服別和一分牽牛子末服如人行四五里更進一服以快利止忌熱面蕎麥炙肉生蔥蕪荑蒜黏食等物出第三卷中千金療月水不利關塞絶産十八年服此藥二十八日有子金城太守白薇丸方白薇細辛各五分人參杜蘅厚朴炙牡蒙半夏洗白殭蠶秦艽當歸紫菀各二分牛膝沙參乾薑各三分蜀椒汗附子炮防風各六分古今録驗不用杜蘅用牡蠣三分熬上十七味末之蜜和丸先食服如梧桐子三丸不知稍增至四五丸此藥不可將服覺有身則止用大驗忌餳豬羊肉冷水生蔥生菜崔氏延年同有桔梗丹參各三分出第二卷中千金翼白薇丸主久無子或斷緒上熱下冷百病皆療之方白薇車前子各三分當歸芎藭蛇床子各四分紫石英菴䕡子石膏藁本卷柏各五分澤蘭太一禹餘糧覆盆子桃仁熬白芷麥門冬去心人參各六分桂心蒲黃各十分細辛乾薑乾地黃椒汗各十二分茯苓赤石脂遠志去心白龍骨各八分橘皮二分上二十八味搗篩為末蜜和酒服十五丸如梧桐子日再增至四十丸以知為度亦可至五十丸慎豬雞魚蒜生冷酢滑生蔥生菜蕪荑驢馬等肉覺有身則止藥祕之勿妄傳也出第五卷中經心録茱萸丸療婦人陰寒十年無子方吳茱萸一升蜀椒一升去目汗末上二味蜜丸如彈子丸綿裹導子腸中日再易無所下但開子臟令陰溫即有子也出第六卷中養胎法並禁忌一十三首千金論曰舊說凡受胎三月逐物變化稟質未定故妊娠三月欲得觀犀象猛獸珠玉寶物欲得見賢人君子盛德大師觀禮樂鐘鼓俎豆軍旅陳設焚燒名香口誦詩書古今針誡居處簡靜割不正不食席不正不坐彈琴瑟調心神和性情節嗜欲庶事清靜生子皆良長壽忠孝仁義聰慧無疾斯蓋文王胎教者也又論曰兒在胎日月未滿陰陽未備腑臟骨節皆未成足故自初訖於將産飲食居處皆有禁忌又妊娠食雞子及干鯉魚令子多瘡又妊娠食雞肉糯米令子多寸白蟲又妊娠食雀肉並豆醬令子滿面皯黯黑子又妊娠食山羊肉令子多病又妊娠食兔犬肉令子無音聲並缺唇又妊娠食驢馬肉延月又妊娠食椹並鴨子令子倒出心寒又妊娠食騾肉難産又妊娠食雀肉飲酒令子心淫情亂不畏羞恥又妊娠勿向非常之地大小便必半産殺人又妊娠勿食羊肝令子多厄又妊娠勿食鱉令兒短項又妊娠食冰漿絶産並出第二卷中妊娠隨月數服藥及將息法一十九首千金妊娠一月名始胚飲食精熟酸美受御宜食大麥無食腥辛是謂才正又妊娠一月足厥陰脈養不可針灸其經足厥陰內屬於肝肝主筋及血一月之時血行痞澀不為力事寢必安靜無令恐畏又妊娠一月陰陽新合為胎寒多為痛熱多猝驚舉重腰痛腹滿胞急猝有所下當預安之宜服烏雌雞湯方烏雌雞一隻治如食法茯苓一兩吳茱萸一升芍藥白朮各三兩麥門冬五合去心人參三兩阿膠二兩甘草一兩炙生薑一兩切上十味切以水一斗二升煮雞取汁六升去雞下藥煮取三升納酒三升並膠煬盡取三升去滓溫服一升日三服又若曾傷一月胎者當預服補胎湯方細辛一兩防風二兩烏梅一升吳茱萸五合乾地黃白朮各一兩大麥五合生薑四兩上八味切以水七升煮取二升半去滓分溫三服若寒多者倍細辛茱萸若熱多渴者去細辛茱萸加栝蔞根二兩若有所思去大麥加柏子仁三合忌生菜蕪荑桃李雀肉等物一方人參一兩又妊娠二月名始膏無食辛臊居必靜處男子勿勞百節皆痛是謂胎始結又妊娠二月足少陽脈養不可針灸其經足少陽內屬於膽膽主精二月之時兒精成於胞里當慎護驚動又妊娠二月始陰陽踞經有寒多壞不成有熱即萎猝中風寒有所動搖心滿臍下懸急腰背強痛猝有所下乍寒乍熱艾湯主之方丹參三兩當歸人參麻黃去節艾葉阿膠炙各二兩甘草一兩炙大棗十二枚擘生薑一兩上九味切以酒三升水一斗納藥煮減半去滓納膠煎取三升分溫三服忌海藻菘菜又若曾傷二月胎者當預服黃連湯方黃連人參各一兩吳茱萸五合生地黃五兩生薑三兩上五味切以醋漿七升煮取三升分四服日三夜一每十日一作若頗覺不安加烏梅一升加烏梅者不用漿直用水耳忌豬肉冷水蕪荑一方當歸半兩又妊娠三月名始胎當此之時未有定儀見物而化欲生男者操弓矢欲生女者弄珠璣欲子美好數視璧玉欲子賢良端坐清虛是謂外象而內感者也又妊娠三月手心主脈養不可針灸其經手心主內屬於心無悲哀無思慮驚動又妊娠三月為定形有寒大便青有熱小便難不赤即黃猝驚恐憂愁嗔恚喜頓僕動於經脈腹滿繞臍苦痛腰背痛猝有所下雄雞湯方雄雞一隻治如食法甘草炙人參茯苓阿膠各二兩黃芩白朮各一兩麥門冬去心五合芍藥四兩大棗十二枚擘生薑一兩切上十一味切以水一斗五升煮雞減半納藥煮取半納清酒三升並膠再煎取三升分三服一日盡之當溫臥忌海藻菘菜酢物桃李雀肉等一方當歸芎藭二兩不用黃芩生薑又若曾傷三月胎者當預服茯神湯方茯神丹參龍骨各一兩阿膠當歸甘草炙人參各二兩赤小豆二十一粒大棗十三枚擘上九味切酢漿一斗煮取三升分四服七日後服一劑腰痛者加桑寄生二兩忌海藻菘菜深師有薤白二兩麻子一升又妊娠四月始受水精以成血脈宜食稻粳羹魚雁是謂成血氣以通耳目而行經絡又妊娠四月手少陽脈養不可針灸其經手少陽內輸三焦四月之時兒六腑順成當靜形體和心志節飲食又妊娠四月為離經有寒心下溫溫欲嘔胸膈滿不欲食有熱小便難數數如淋狀臍下苦急猝風寒頸項強痛寒熱或驚動身軀腰背腹痛往來有時胎上迫胸心煩不得安猝有所下菊花湯方菊花如雞子大一枚麥門冬去心一升麻黃三兩去節阿膠三兩炙甘草二兩炙當歸二兩人參一兩半生薑五兩半夏二兩洗大棗十二枚擘上十味以水八升煮減半納清酒三升並阿膠煎取三升分三服溫臥當汗以粉粉之護風寒四五日忌羊肉海藻菘菜餳等又若曾傷四月胎者當預服調中湯方芍藥四兩甘草炙芎藭續斷各一兩生李根白皮柴胡白朮各三兩烏梅一升當歸一兩半生薑四兩厚朴炙枳實炙各二兩上十二味切以水一斗煮取三升分四服日三夜一八日復服一劑一方半夏二兩忌海藻菘菜桃李雀肉等物又妊娠五月始受火精以成其氣臥必晏起沐浴浣衣深其居處厚其衣裳朝吸天光以避寒殃其食稻麥其羹牛羊和以茱萸調以五味是謂養氣以定五臟又妊娠五月足太陰脈養不可針灸其經足太陰內輸於脾五月之時兒四肢成無大飢無甚飽無食乾燥無自炙熱無大勞倦又妊娠五月毛髮初生有熱苦頭眩心亂嘔吐有寒苦腹滿痛小便數猝有恐怖四肢疼痛寒熱胎動無常處腹痛悶頓欲僕猝有所下阿膠湯方又方旋覆花湯阿膠四兩炙人參一兩麥門冬一升去心生薑六兩吳茱萸旋覆花當歸芍藥甘草炙黃芩各一兩上十味切以清酒三升以水九升煮減半納清酒三升並膠微火煎取三升半分四服日三服夜一先食再服便愈不瘥更服忌海藻菘菜又若曾傷五月胎者當預服安中湯方甘草炙芍藥各三兩當歸人參乾地黃芎藭各二兩五味子五合麥門冬去心一升大麻仁五合生薑六兩大棗三十五枚擘黃芩一兩上十二味切以水七升清酒五升煮取三升半分四服日三夜一七日復服一劑忌菘菜海藻蕪荑又妊娠六月始受金精以成筋身欲微勞無得靜處出遊於野數觀走犬馬食宜鷙鳥猛獸之肉是謂變腠理紉筋以養其力以堅背膂又妊娠六月足陽明脈養不可針灸其經足陽明內屬於胃主其口目六月之時兒口目皆成調五味食甘美無大飽又妊娠六月猝有所動不安寒熱往來腹內脹滿身體腫驚怖忽有所下腹痛如欲産手足煩疼麥冬湯方麥門冬去心一升甘草炙人參各一兩乾地黃三兩黃芩二兩阿膠四兩生薑六兩大棗十五枚擘上八味切以水七升煮減半納清酒二升並膠煎取三升分三服每服如人行三四里中間進糜粥忌海藻菘菜蕪荑又若曾傷六月胎當預服柴胡湯方柴胡四兩芍藥一方作紫葳白朮甘草炙各二兩麥門冬三兩去心蓯蓉一兩芎藭二兩乾地黃五兩生薑六兩大棗三十枚擘上十味切以水一斗煮取三升分四服日三夜一中間進糜粥勿食生冷及堅強之物七日更服一劑忌海藻菘菜蕪荑桃李雀肉等一方有黃芩二兩又妊娠七月始受木精以成骨勞身搖肢無使定止動作屈伸以運血氣自此後居處必燥飲食避寒常食粳稻以密腠理是謂養骨而堅齒又妊娠七月手太陰脈養不可針灸其經手太陰內屬於肺肺主皮毛七月之時兒皮毛已成無大言無號哭無薄衣無洗浴無寒飲又妊娠七月忽驚恐搖動腹痛猝有所下手足厥冷脈若傷寒煩熱腹滿短氣常苦頸項腰背強蔥白湯方蔥白長三四寸十四枚半夏洗麥門冬去心各一升生薑八兩甘草炙當歸黃耆各三兩阿膠四兩人參一兩半黃芩一兩旋覆花一把上十一味切以水八升煮減半納清酒三升並膠煎取四升溫服一升日三夜一溫臥當汗出若不出者加麻黃二兩煮服如前法若秋後勿強責汗忌羊肉餳海藻菘菜等又若曾傷七月胎者當預服杏仁湯方杏仁去雙仁皮尖甘草炙鍾乳研各二兩麥門冬去心吳茱萸各一兩乾薑二兩五味子粳米各五合紫菀一兩上九味切以水八升煮取三升半分四服日三夜一中間進食七日服一劑忌海藻菘菜又妊娠八月始受土精以成膚革和心靜息無使氣極是謂密腠理光澤顏色又妊娠八月手陽明脈養不可針灸其經手陽明內屬於大腸大腸主九竅八月之時兒九竅皆成無食燥物無輒失食無忍大起又妊娠八月中風寒有所犯觸身體盡痛乍寒乍熱胎動不安常苦頭眩痛繞臍下寒時時小便白如米汁或青或黃或使寒栗腰背苦冷痛而目視茫茫芍藥湯方芍藥四分人參當歸甘草炙各三兩白朮一兩厚朴二兩炙薤白切一升生薑四兩切上八味切以水五升酒四升合煮取三升分三服日再夜一忌海藻菘菜桃李雀肉等又若曾傷八月胎者當預服葵子湯方甘草炙三兩芍藥二兩一方四兩柴胡三兩葵子一升白朮三兩生薑六兩大棗二十枚擘厚朴二兩上八味切以水九升煮取三升分三服日三十日服一劑忌海藻菘菜桃李雀肉等又妊娠九月始受石精以成皮毛六腑百節莫不畢備飲醲食甘緩帶自持而待之是謂養毛髮多才力又妊娠九月足少陰脈養不可針灸其經足少陰內屬於腎腎主續縷九月之時兒脈續縷皆成無處濕冷無著炙衣又妊娠九月若猝下痢腹滿懸急胎上衝腰背痛不可轉側短氣半夏湯方半夏洗麥門冬去心各五合乾薑一兩當歸吳茱萸阿膠炙各三兩大棗十二枚擘上七味切以水九升煮取三升去滓納白蜜八合微火上溫分四服痢即止忌生血物餳等又若曾傷九月胎者當預服豬腎湯方豬腎一具茯苓桑寄生乾薑乾地黃芎藭各三兩白朮四兩麥門冬一升去心附子中者一枚炮大豆三合上十味切以水一斗煮腎令熟去腎納諸藥煎取三升半分四服日三夜一十日更一劑忌豬肉冷水蕪荑桃李雀肉酢物等又妊娠十月五臟俱備六腑齊通納天地氣于丹田故使關節人神皆備但俟時而生集驗延年同並出第二卷中小品療妊娠五月日舉動驚愕動胎不安下在小腹痛引腰胳公洛切腋下也小便疼下血安胎當歸湯方當歸阿膠炙芎藭人參各一兩大棗十二枚擘艾一虎口上六味切以酒水各三升合煮取三升去滓納膠令煬分三服腹中當小便緩瘥也古今録驗救急同出第七卷中妊娠嘔吐及惡食方九首集驗療婦人妊娠惡阻嘔吐不下食湯方青竹茹橘皮各五兩生薑茯苓各四兩半夏五兩湯洗上五味切以水六升煮取二升半分三服不瘥頻作忌羊肉餳酢物等千金經心録同又療妊娠嘔吐不下食橘皮湯方橘皮竹茹人參白朮各三兩生薑四兩厚朴炙二兩上六味切以水七升煮取二升半分三服不瘥重作忌桃李雀肉等千金救急經心録同出第十一卷中古今録驗療妊娠不欲食或吐春月所宜服柴胡湯方甘草炙柴胡各二兩麻黃一兩去節煎去沫大棗十二枚擘食茱萸一升上五味切以水六升煮取三升適寒溫服一升日三療食噫醋除熱下氣多所宜與上同但春秋冬夏去茱萸加枸杞一斤六月加小麥一升石膏三兩秋去石膏加甘草一兩九月去麻黃加乾薑一兩十月加芎藭三分忌海藻菘菜又療惡食人參湯方人參四兩厚朴炙生薑枳實炙甘草炙各二兩上五味切以水六升煮取三升分三服忌海藻菘菜並出第三十四卷中崔氏半夏茯苓湯療妊娠阻病心中憒悶空煩吐逆惡聞食氣頭眩重四肢百節疼煩沉重多臥少起惡寒汗出疲極黃瘦方半夏洗生薑各五兩旋覆花一兩橘皮二兩茯苓二兩細辛芎藭人參桔梗甘草炙各二兩芍藥二兩乾地黃三兩上十二味切以水一斗煮取三升分三服忌豬羊肉餳菘菜海藻生菜蕪荑千金云若病阻積月日不得治及服藥冷熱失候病變客熱煩渴口生瘡者除橘皮細辛用前胡知母各二兩若變冷下痢者除乾地黃用桂心二兩若食少胃中虛生熱大便悶塞小便赤少者加大黃三兩除地黃加黃芩一兩餘依方服一劑得下後消息看氣力冷熱更增損方調定更服一劑湯便急服茯苓丸令能食便強健也又茯苓丸療妊娠阻病患心中煩悶頭眩重憎聞飲食氣便嘔逆吐悶顛倒四肢垂重不自勝持服之即效要先服半夏茯苓湯兩劑後可將服茯苓丸方茯苓人參各一兩桂心熬橘皮白朮甘草炙葛根熬乾薑半夏洗枳實炙各二兩上十味搗篩蜜和丸如梧桐子大飲服二十丸漸至三十丸日三忌海藻菘菜羊肉餳桃李雀肉酢等千金同肘後只五味又云妊娠忌桂故熬肘後不用幹姜半夏橘皮葛根又療妊娠常苦煩悶此子煩也竹瀝湯方竹瀝三兩防風黃芩麥門冬去心各三兩茯苓四兩上五味切以水四升合竹瀝煮取二升半分三服不瘥重作忌酢物又方時時服竹瀝隨多少出第十卷中近效療妊娠惡食心中煩憒熱悶嘔吐方青竹茹麥門冬去心各三兩前胡二兩陳橘皮一兩炙令黃焦香氣出佳蘆根一握取肥白嫩者上五味切以水二大升煮取半大升去滓分再服食後一服無麥門冬用小麥三合煮之勿令裂即熟四肢煩蒸者加地骨皮醫人夏候極録妊娠胎動方九首廣濟主安胎胎病漏肚痛方當歸芎藭阿膠炙人參各一兩大棗十二枚擘上五味切以水三升酒四升合煮取二升半分三服五日一劑頻服三四劑無所忌出第三卷中小品療妊娠重下痛引腰背安胎止痛湯方當歸阿膠炙乾地黃黃連芍藥各一兩雞子一枚秫米一升上七味切以水七升攪雞子令相得煮秫米令如蟹目沸去滓納諸藥煮取三升分四服忌蕪荑經心録同又膠艾湯療損動母去血腹痛方阿膠二兩炙艾葉二兩上二味以水五升煮取二升半分三服出第七卷中經心録同集驗療妊娠胎動不安腹痛蔥白湯方蔥白切一升阿膠炙當歸續斷芎藭各三兩銀隨多少上六味切以水一斗先煮銀取七升去銀納余藥煎取二升半納膠令煬分三服不瘥更作千金同又療妊娠二三月上至八九月胎動不安腹