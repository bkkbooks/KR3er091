生胎不下或子死腹中或半著脊及在草不産血氣上蕩心母面無顏色氣欲絶方豬膏一升煎白蜜一升淳酒二升上三味合煎取二升分再服不能隨所能服之備急刪繁千金崔氏同又子死腹中不出方以牛屎塗母腹上立出備急崔氏千金同又方榆皮切一兩珍珠一兩上二味以苦酒三升煮取一升頓服死兒立出集驗千金備急崔氏同並出第二卷中救急療子死腹中方服水銀三兩立出集驗千金備急文仲小品同又方取夫尿二升煮令沸飲之集驗千金崔氏同並出第四卷中胞衣不出方二十首廣濟療胞衣不出方末灶突中土三指撮以水服之集驗千金備急文仲同又方取夫單衣蓋井上立出千金集驗救急崔氏小品同又療胞衣不出方取苦酒服赤米一兩千金集驗崔氏同又方雞子一枚苦酒一合和飲之即出集驗千金崔氏同又方當戶燒黍穰即出崔氏同並出第二卷中小品療胞衣不出方取皂莢搗末著鼻孔中嚏即出崔氏同又方鹿角末三指撮酒服之崔氏同又方兒衣不出吞此符吉延年療婦人傷娠及胎死腹中胞衣不出産後疾病及諸困竭欲死方刺取羊血及熱飲之不能者人含吐與之能多益善若不能咽啖少鹽又水噀其面此方神驗崔氏文仲備急同又胞衣不出方以洗兒水服半杯即出崔氏同又療胞衣不出腹中滿則殺人方但多服豬膏又大豆一升苦酒一斗煮取三升分三服崔氏同又方吞雞子黃兩三枚解發刺喉中令得嘔即出若困極死者以水一升煮栝蔞一枚三兩沸瀉口中汁下即出出第十四卷中崔氏雲水一升煮螻蛄一枚三沸服救急療胞衣不出並兒橫倒死腹中母氣欲絶方半夏二兩洗白蘞二兩上二味搗篩服方寸匕小難一服橫生二服倒生三服兒死四服亦可加代赭瞿麥各二兩廣濟集驗小品備急文仲崔氏同又方小豆小麥相和濃煮汁飲之立出小品千金備急崔氏同又療胞衣不出方取炊簞當戶前燒之廣濟集驗千金崔氏同出第四卷中必效療胞衣不出令胞爛牛膝湯方牛膝四兩滑石八兩當歸三兩通草六兩葵子一升瞿麥四兩上六味切以水九升煮取三升分三服忌牛狗肉廣濟集驗千金崔氏同通草一方作莽草又方服蒲黃如棗大良集驗千金崔氏同又方生男吞小豆七枚生女吞二七枚千金崔氏並同又方生地黃汁一升苦酒三合暖服之不能頓服再服之集驗千金崔氏同又方澤蘭葉三兩滑石五兩屑生麻油二合上三味以水一升半煮澤蘭取七合去滓納滑石生麻油頓服之廣濟集驗千金崔氏同並出第四卷中以上三符主産難産婦吞之吉産難燒此符水和服之吉逆産橫産吞此符上出崔氏産書
