body:
  text: 卷第三十五小兒方序例論一首千金論曰夫生民之道莫不以養小為大若無小卒不成大故易稱積小以成高大詩有厥初生民傳云聲子生隱公此之一義即是從微至著自少及長人情共見不待經史故今斯方先婦人小兒後丈夫耆老者則是崇本之義也小兒氣勢微弱醫人欲留心救療立功差難今之學者多不存意良由嬰兒在於襁褓之內乳氣腥臊醫者操行英雄詎肯瞻視靜而言之可為太息者矣小品方云凡人年六歲以上為小十六以上為少三十以上為壯五十以上為老其六歲以下經所不載所以乳下嬰兒有病難療者皆為無所承據也中古有巫妨者立小兒顱囟經以占夭壽判疾病死生世相傳授始有小兒方焉逮於晉宋江左推諸蘇家傳習有驗流於人間齊有徐王者亦有小兒方三卷故今之學者頗得傳授然徐氏位望隆重何暇留心於少小詳其方意不甚深細小有可採未為至祕今博撰諸家及自經用有效者為上下兩卷可披而尋之凡百居家皆宜達茲養小之術則無夭橫之禍也出第五卷中小兒初生將護法一十七首崔氏療小兒初生便以綿裹指拭口中及舌上青泥惡血此為之玉銜一作衡若不急拭啼聲一發即入腹成百病矣又療兒生落地不作聲方取暖水一器灌之須臾自當啼又兒生不作聲者此由難産少氣故也可取兒臍帶向身卻捋之令氣入腹仍呵之至百度啼聲自發又方以蔥白徐徐鞭之即啼又方小兒初生即當舉之舉之遲晚則令中寒腹內雷鳴乃先浴之然後速斷臍不得以刀子割之須令人隔單衣物咬斷兼將暖氣呵七遍然後纏結所留臍帶當令長至兒足跌上短即中寒令兒腹中不調常下痢若先斷臍然後浴者則臍中水中水則發腹痛其臍斷訖連臍帶中若有蟲宜急剔撥去之不爾當入兒腹成疾矣又兒中水及中冷則令兒腹中絞痛夭糾啼呼面青黑此是中水之過兒尿清一云糞青者冷也與兒臍中水即同方當灸粉絮尉之不時治護臍至腫者當臍中隨輕重重者便灸之乃可至八九十壯若輕者臍不大腫但出汁時時啼呼者但搗當歸末和胡粉敷之仍灸絮日日尉之至百日乃愈以啼呼止為候又兒初生法宜用父故衣裹之若生女宜以母故衣勿用新帛切須依之令兒長壽又一晬之內兒衣皆須用故綿帛為之善兒衣綿帛特忌厚熱慎之慎之又兒洗浴斷臍訖繃抱畢未可與朱蜜宜與甘草湯取甘草可中指一節捶碎以水二合煮取一合以綿纏沾取與兒吮之可得一蜆殼入腹止兒當快吐吐去心胸中惡汁也如得吐余藥更不須與若不得吐可消息計如飢渴須臾復與之若前所服及更與並不得吐者但稍稍與之令盡此一合止得吐去惡汁令兒心神智慧無病也吮一合盡都不吐者是兒不含惡血耳勿復與之乃可與朱蜜以鎮心神安魂魄也又小兒初生三日中須與朱蜜只不宜多多則令兒脾胃冷腹脹喜陰癇氣急變噤痓而死也與朱蜜法以真經飛煉朱如大豆以赤蜜一蜆殼和之以綿纏沾取與兒吮之得三沾止一日令盡此一豆許可三日與之則用三豆許也亦勿過過此則傷兒與朱蜜訖可與牛黃如朱蜜多少也牛黃益肝膽除熱定精神止驚避惡氣除小兒百病三日後應開腸胃助穀神可研米作厚飲如乳酪厚薄以大豆粒多與嗍之嗍三豆許止日三與之滿七日乃可與哺也又兒生十日始哺如棗核二十日倍之五十日如彈丸百日如棗若乳汁少不得依此法當用意少少增之若至二十日而哺者令兒無病兒若早哺之及多者令兒頭面身體喜生瘡愈而復發令兒尫弱難長乳兒不用太飽飽則令吐候兒吐者乳大飽也當以空乳乳之即消夏不去熱乳令兒嘔逆冬不去寒乳令兒咳痢乳母奶兒當先以手按散其熱氣勿令乳汁奔出以令兒噎如噎即便奪其乳令得氣息定復乳之如是十反五反視兒飢飽以節度之一日之中幾乳而足以為常準又常捉去宿乳也乳母與兒臥當以臂與兒枕之使乳與兒頭平乃可乳之令兒不噎母欲睡即奪去其乳勿令填兒鼻口乳不知飢飽忌之又兒初生著口噤不開不收乳方赤足蜈蚣半枚去足炙令焦末研之絹篩以豬乳二合和之分三四服與之瘥又兒著口噤體熱者方暖竹瀝二合分四五服之又兒新生慎不可逆灸灸之忍痛動其五脈因喜成癇是以田舍小兒任其自然皆無此夭也又兒初生有鵝口者其舌上有白屑如米劇者鼻外亦有療之法以發纏筯頭沾井花水撩拭之三旦如此便去不者可煮栗荴汁令濃以綿纏筯頭沾拭之無栗荴煮栗木皮如井花水法千金同並出第十上卷中文仲療兒生有連舌舌下有膜如石榴子中隔連其舌下漸漸喜令兒聲不發不轉法以爪摘斷之微有血出無害若血出不止可燒發作末以敷之即止千金同又兒初生六七日後血氣收斂成肉則口舌喉頰裡清淨也若喉里舌上有物如蘆蘀盛水狀者若懸癰有脹起者以綿纏長針留刃處如粟米許大以刺決之令氣泄去青黃赤血汁也一刺之止消息一日若不消又刺之不過三刺自消或余小小未消三刺之亦止自然消也有著舌下如此者名重舌有著頰裡及上齶如此者名重齶有著齒齦上者名重齦皆刺之去血汁瘥止千金同又療兒初生出腹骨肉未斂肌肉猶是血也血凝乃堅成肌肉耳其血阻一作沮敗不成肌肉則使面目繞鼻口左右悉黃而啼一作不啼閉目聚口撮面口中乾燥四肢不能伸縮者皆是血脈不斂也喜不育如此者宜與龍膽湯方在客忤部中十味者是也千金同兒初生將息法二首千金兒初生不可令衣過厚熱令兒傷皮膚害血脈發雜瘡而黃又小兒始生肌膚未成不可暖衣暖衣則令筋骨緩弱宜時見風日若都不見風日則令肌膚脆軟便易中傷皆當以故絮衣之勿用新綿也天和暖無風之時令母將於日中嬉戲數見風日則血凝氣剛肌肉牢密堪耐風寒不致疾病若常臟於幃帳之中重衣溫暖譬猶陰地之草木不見風日軟脆不堪風寒也出第五卷中小兒初受氣論一首崔氏論曰凡小兒初受氣在娠一月結胚二月作胎三月有血脈四月形體成五月能動六月筋骨立七月毛髮生八月藏腑具九月穀氣入胃十月百神能備而生矣生後六十日目瞳子成始笑應知人百五十日百脈生能反覆百八十日尻骨成能獨坐二百一十日掌骨成能匍匐三百日臏骨成能獨倚三百六十日為一期膝骨成乃能行此其定法若有不依期者必有不平之處小兒變蒸論二首崔氏小兒生三十二日一變六十四日再變兼蒸九十六日三變百二十八日四變又蒸百六十日五變百九十二日六變又蒸二百二十四日七變二百五十六日八變又蒸二百八十八日九變三百二十日十變又蒸此小變蒸畢也後六十四日又蒸蒸後六十四日又一大蒸蒸後百二十八日又一大蒸此大小蒸都畢也凡五百七十六日乃成人所以變蒸者皆是榮其血脈改其五臟故一變畢輒覺情態忽有異也其變蒸之候令身熱脈亂汗出目睛不明微似欲驚不乳哺上唇頭小白泡起如珠子耳冷尻亦冷此其診也單變小微兼蒸小劇先期四五日便發發後亦四五日歇凡蒸平者五日而衰遠至七日九日而衰當變蒸之時慎不可療及灸刺但和視之若良久熱不已可微與紫丸熱歇便止若於變蒸中加以天行溫病或非變蒸而得天行者其診皆相似唯耳及尻通熱口上無白泡耳當先服黑散以發其汗汗出溫粉粉之熱當歇便就瘥若猶不都除乃與紫丸下之其間節度甚多恐悠悠不能備行今略疏其經要者如此又黑散方麻黃一分去節大黃一分杏仁二分去皮尖熬令變色上三味先搗麻黃大黃為散杏仁別搗如脂乃細細內散又搗令調和訖內密器中一月兒服如小豆大一枚以乳汁和服之抱令得汗汗出溫粉粉之勿使見風百日兒服如棗核以兒大小量之為度又紫丸方代赭赤石脂各一兩巴豆三十枚去心皮熬杏仁五十枚去尖皮熬上四味搗代赭等二味為末巴豆杏仁別搗如膏又內二味合搗三千杵自相和若硬入少蜜更搗密器中盛封之三十日兒服如麻子一丸與少乳汁令下喉食頃後與少乳勿令多至日中當小下熱除若未全除明旦更與一丸百日兒服如小豆一丸以此準量增減也小兒夏月多熱喜令發疹二三十日輒一服甚佳此丸無所不治代赭須真者若不真以左顧牡蠣代之忌豬肉蘆筍並出第十上卷中相兒命長短法並論二十九首千金翼兒生枕骨不成者能言而死膝骨不成者能倨而死掌骨不成者能匍匐而死踵骨不成者能行而死臏骨不成者能立而死身肉不收者死魚口者死股間無生肉者死頤下破者死陰不起者死囊下白者死赤者死相法甚博略述十數條而已兒初生陰大而與身色同者成人兒初生額上有旋毛早貴妨父母兒初生叫聲連延相屬者壽聲絶而復揚急者不壽兒初生汗血者多厄不壽兒初生目視不正數動者大非佳人兒初生自開目者不成人兒初生通身軟弱如無骨者不成人兒初生髮稀少者不聽人兒初生臍小者不壽兒初生早坐早行早語早齒生惡性者非佳人兒初生頭四破者不成人兒初生頭毛不周匝者不成人啼聲散不成人啼聲深不成人汗不流不成人小便凝如脂膏不成人常搖手足者不成人無此狀候者皆成人兒初生臍中無血者好卵下縫通達黑者壽鮮白長大者壽論曰兒三歲以上十歲以下觀其性氣高下即可知其夭壽兒小時識悟通敏過人者多夭則項橐顏回之流是也小兒骨法成就威儀回轉遲舒稍費人精神雕琢者壽其預知人意回旋敏速者亦夭則楊修孔融之徒是也由此觀之夭壽大略可知也亦由梅花早發不睹歲寒甘菊晚榮終於年事是晚成就者壽之兆也並出第十一卷中小兒藏衣法五首崔氏凡藏兒衣法兒衣先以清水洗之勿令沙土草汙又以清酒洗之仍內錢一文在衣中盛於新瓶內以青綿裹之其瓶口上仍密蓋頭且置便宜處待滿三日然後依月吉地向陽高燥之處入地三尺埋之瓶上土厚一尺七寸惟須牢築令兒長壽有智慧若藏衣不謹為豬狗所食者令兒癲狂蟲蟻食者令兒病惡瘡犬鳥食之令兒兵死近社廟旁者令兒見鬼近深水汙池令兒溺死近故灶旁令兒驚惕近井旁者令兒病聾盲棄道路街巷者令兒絶嗣無子當門戶者令兒聲不出耳聾著水流下者令兒青盲棄於火里者令兒生癘瘡著林木頭者令兒自絞死如此之忌皆須慎之又安産婦及藏衣天德月空法正月天德在丁月空在丙壬二月天德在坤月空在甲庚三月天德在壬月空在丙壬四月天德在辛月空在甲庚五月天德在乾月空在丙壬六月天德在甲月空在甲庚七月天德在癸月空在丙壬八月天德在艮月空在甲庚九月天德在丙月空在丙壬十月天德在乙月空在甲庚十一月天德在巽月空在丙壬十二月天德在庚月空在甲庚凡藏兒衣皆依此法天德月空處埋之若有遇反支者宜以衣內新瓶盛密封塞口挂於宅外福德之上向陽高燥之處待過月然後依法埋藏之大吉又法甲寅旬日十日不得藏埋兒衣以瓶盛密封安置空處度十日即藏埋之又法甲辰乙巳丙午丁未戊申此五日亦不藏兒衣還盛瓶中密塞勿令氣通挂著見生處過此五日即埋之亦不得更過此日又法甲乙日生兒丙丁日藏衣吉丙丁日生兒戊巳日藏衣吉戊巳日生兒庚辛日藏衣吉庚辛日生兒壬癸日藏衣吉並出第十上卷中浴兒法一十一首崔氏初生浴兒良日此謂初生浴兒以後重浴亦吉寅卯酉日大吉壬午丁未癸巳日凶又浴兒虎頭骨湯主避除惡氣兼令兒不驚不患諸瘡疥方虎頭骨五兩苦參四兩白芷三兩上三味切以水一斗煮為湯內豬膽汁少許適寒溫以浴兒良又療兒若卒客忤中人吐下不乳哺面青黃色變弦急者以浴之方取錢七十文以水三斗煮令有味適寒溫浴兒良又療兒生三日浴除瘡方桃根李根梅根各八兩上三味切以意著水多少煮令三四沸以浴兒又療少小卒寒熱不佳不能服藥六物莽草湯浴兒方莽草丹參蛇床子桂心各三兩菖蒲半斤雷丸一斤上六味㕮咀以水三斗煮三五沸適寒溫浴兒避日向陰處又療少小身熱一物李葉湯方李葉無多少以水煮去滓以浴兒良忌準前又方白芷煎湯浴兒佳根苗皆得又方苦參湯浴兒良又凡尋常浴兒不緣別療諸病只就浴者方湯熟添少許清漿水一捻鹽浴兒浴訖以粉摩兒既不畏風又引散諸氣又兒不用數浴數浴多背冷令兒發癇其湯必適寒溫得所又療少小壯熱不能服藥宜此十二物寒水石粉散方寒水石芒硝滑石石膏赤石脂青木香甘草炙大黃黃芩芎藭麻黃去節牡蠣熬上藥各等分搗篩以粉一升和藥屑三合復下篩以粉粉兒日三熱退即止本方有防風無牡蠣又少小盜汗三物黃連粉方黃連牡蠣熬貝母上藥各等分搗篩以粉粉兒良出第十上卷中剃兒頭法一首崔氏初剃兒頭良日寅丑日吉丁未日凶哺兒法三首崔氏初哺兒良日以平定成日大吉其哺不得令咸又方寅醜辰巳酉日良又方男戊巳日不得女丙丁日不得攘謝法一十二首崔氏軒轅者乾神天丞相使者風伯犯之令兒驚吐可取梨枝六寸埋生處大吉雷公者震神太陰使者天馬犯之令兒煩悶腹滿解之以三屠家肉為餅於産處謝之大吉咸池者坎神天之雨師使者犯之令兒啼不止用羊脯酒於生處謝之吉豐隆者艮神天之東明使者天僕也害氣犯之令兒乍寒乍熱大腹以白魚二枚於生處謝之又大豆一升投井中亦大吉招搖者坤神天上使者犯之令兒驚空嚼不止以酒餅生處謝之即愈天候者吳神天一執法使者犯之令兒腹脹張眼以白魚二枚於生處謝之吉吳時者離神天一將軍遊擊使者犯之令兒驚腹痛用馬脯五寸於生處謝之吉又以白魚五枚並棗餅埋其生處吉大時者兌神小時北斗使者犯之令兒腹脹下痢解之以酒脯於生處謝之又以大豆一升投井中吉犯月殺者小兒驚啼用丹雄雞血於生處謝之吉犯白虎者用稻米一升雞子三枚於生處謝之吉黍米亦得犯大夫者用羊肝三枚及稻米一升於生處謝之吉又用雞羝羊皮黍米亦得犯日遊者令兒口噤色變欲死者用三屠家肉麥飯於生處謝之吉揀乳母法一首崔氏乳母者其血氣為乳汁也五情善惡悉血氣所生其乳兒者皆須性情和善形色不惡相貌稍通者若求全備不可得也但取不狐臭癭瘻氣嗽瘑疥癡瘙白禿癧瘍瀋唇耳聾齆鼻癲癇無此等疾者便可飲兒師見其身上舊灸瘢即知其先有所疾切須慎耳小兒驚癇啼壯熱不吃奶吐不已不小便方五首劉氏療小兒眠睡不安驚啼不吃奶虎睛丸方小兒熱甚神效犀角十二分屑子芩五分梔子仁大黃各十分虎睛一枚研上五味搗篩蜜和如梧子大每服七丸大小量之奶母忌熱面小兒熱風癇以乳汁或竹瀝研三丸服之漸增以瘥為度小兒百日以下蓐內壯熱以奶汁研四丸與服即瘥又療小兒初生不吃奶方以乳兩合蔥白一寸和煎一兩沸去蔥與吃即能吃乳立效以蛤蜅灌之又療小兒吃奶不穩三日至七日以來覺壯熱顏色赤及鼻孔黃即恐作撮口及孩子牙關裡有蟲似蝸牛亦似黃頭白蚌螺者方燒竹取瀝半合和少許牛黃與吃即瘥又以豬肉拭口即引蟲出或自消便瘥又療小兒初生吐不止方人乳二合蘧蒢茂少許鹽兩粟米大上三味煎三兩沸牛黃兩米許研和與服即瘥止又小兒初生不小便方人乳四合蔥白一寸上二味相和煎分為四服即小便利神效小兒將息衣裳厚薄致生諸癇及諸疾方並灸法二十八首廣濟療小兒驚癇體羸不堪療子母五癇煎方鉤藤二分知母子芩各四分甘草炙升麻沙參各三分寒水石六分蚱蟬一枚去翅炙蜣螂三枚炙上九味搗篩以好蜜和薄泔著銅鉢於沸湯上調之攪不停手如飴糖煎成稍稍別出少許一日兒啖之一枚棗核大日夜五六過服不妨五六日兒啖之三枚一百日兒啖四枚二百日兒至三百日兒啖五枚三歲兒啖七枚以意量之小品云玄中記曰天下有女鳥一名姑獲又名釣星鬼也喜以陰雨夜過飛鳴徘徊人村裡喚得來也是鳥純雌無雄不産喜落毛羽於中庭置入兒衣中便使兒作癇必死即化為其兒也是以小兒生至十歲衣裳不可露七八月尤忌之千金夫癇病小兒之惡病也或有不及求醫而致困者然氣發於內必先有候常宜審察其精神而採其候也手白肉魚際脈黑者是癇候魚際脈赤者熱脈青大者寒青細者為平也又鼻口乾燥大小便不利是癇候又眼不明上視喜陽是癇候又耳後完骨上有青絡盛臥不靜是癇候脈青大刺之令血出又小兒發逆上啼哭面暗色不變是癇候又鼻口青時小驚是癇候又意氣下而妄怒是癇候又身熱小便難是癇候又吐痢不止厥痛時起是癇候又身熱目時直視是癇候又目閉青時小驚是癇候又咽乳不利是癇候又身熱頭常汗出是癇候又目瞳子卒大黑於常時是癇候又身熱吐哯而喘是癇候又喜欠目上視是癇候又臥惕惕而驚手足振搖是癇候又身熱目視不精是癇候又臥夢笑手足動搖是癇候又弄舌搖頭是癇候以上諸候二十條皆癇之初也見其候便當瓜其陽脈所應灸瓜之皆重手令兒驟啼及足脈絶亦依方與湯又直視瞳子動腹滿轉鳴下血身熱口噤不得乳反張脊強汗出發熱為臥不悟手足瘛瘲喜驚凡八候癇之劇也如此非復湯瓜所能救便當時灸之妙又小兒驚啼眠中四肢掣動變蒸未解慎不可針灸瓜之動其百脈仍因驚成癇也惟陰癇噤痓可針灸瓜之凡灸癇當先下兒使虛乃承虛灸之未下有實而灸者氣逼前後不通殺人也又癇平旦發者在足少陽黃昏發者在足太陰日中發者在足太陽夜半發者在足少陰人定發者在足陽明晨朝發者在足厥陰上癇發時節病所在視其發早晚灸其所也又五臟之癇六畜之癇或在四肢或在腹內審察其候隨病所在灸之雖少必瘥若失其要則為害也肝癇之為病面青目反視手足搖灸陽明太陰各三炷心癇之為病面赤心下有熱短氣息微數灸心下第二肋端宛宛中此為巨闕也又灸手心主及少陰各三炷脾癇之為病面黃腹大泄痢灸胃管三壯俠胃管傍各二壯足陽明太陰各二炷肺癇之為病面目白口沫出灸肝俞二壯又灸太陰二炷腎癇之為病面黑目正直視不搖如尸狀灸心下二寸二分三壯又灸肘下動脈各二壯膈癇之為病目反四肢不舉灸風府又灸頂上鼻人中下唇承漿皆隨年壯腸癇之為病不動搖灸兩承山又灸足心兩手勞宮又灸兩耳後完骨各隨年壯又灸臍中可五十壯上五臟癇證候又馬癇之為病張口搖頭馬鳴欲反折灸項風府臍中三壯病在腹中燒馬蹄末服牛癇之為病目正直視腹脹灸鳩尾上及大椎各三壯燒牛蹄灰末服雞癇之為病延頸反折喜驚自搖灸足諸陽各三壯羊癇之為病喜揚目吐舌灸大椎上三壯豬癇之為病喜吐沫灸完骨兩旁各一寸七壯犬癇之為病手屈拳攣灸兩手心一壯灸足太陽各一壯灸肋戶兩聊頭兩穴各一壯良上六畜癇證候凡諸反張大人脊下容側手小兒容三指者不可療也又若目反上視瞳子動當灸囟中取之法橫度口盡兩吻際又橫度鼻下亦盡兩邊折去鼻度半都合口為度從額上髮際上行度之灸度頭一處正在囟上未合骨中隨手動者是此最要處也次灸當額上入髮際二分許直望鼻為正也次灸其兩邊當目瞳子直上入髮際二分許次灸頂上回毛中次灸客主人穴在眉後際動脈是也次灸兩耳門當耳開口則骨解開動張陷中是也次灸兩耳上卷耳取之一法當卷耳上頭是也大人當耳上橫三指小小兒各自取其指也次灸兩耳後完骨上青脈亦可以針刺令血出次灸玉枕項後高骨是也次灸兩風池穴在項後兩轅筋外發際陷中是也次灸風府當項中髮際亦可與風池三處高下相等次灸頭兩角兩角當回毛兩邊起骨是也上頭部凡二十九處兒生十日可灸三壯三十日灸五壯五十日灸七壯病重者具灸之輕者唯灸囟中風池玉枕也艾使熟炷令平正著肉火勢乃至病所也艾若生炷不平正不著肉徒灸多炷無益也又若腹滿短氣轉鳴灸肺募穴在兩乳上第二肋間宛宛中垂繩取之當瞳子是也次灸膻中次灸胸堂次灸臍中次灸薜息穴薜息在兩乳下第一肋間宛宛中是也次灸巨闕穴巨闕人人鳩尾下一寸小兒去臍作六分分之去心鳩尾下一寸是也並灸兩邊次灸胃管次灸金門穴金門在穀道前囊之後當中央是也從陰囊下度至大孔前中分之上腹部一十二處胸堂巨闕胃脘十日兒三炷一月以上可五炷陰下縫三炷或云隨年壯以灸之又若脊強反張灸大椎並灸諸臟俞及督脊上當中央從大椎度至窮骨中屈更從大椎度之灸度下頭是督脊也上背部一十二處十日兒灸三壯一月以上灸五壯又若手足掣瘲驚者灸尺澤次灸陽明次灸少商次灸勞宮次灸心主次灸合谷次灸三間穴次灸少陽上手部一十六處其要者陽明少陽心主尺澤合谷少商也壯數如上又灸伏兔次灸三里次灸腓腸次灸鹿溪次灸陽明次灸少陽次灸然谷上足部一十四處皆要可灸如上壯數手足陽明謂人四指凡小兒驚癇皆灸之若風病大動手足掣瘲者盡灸手足十指端又灸本節後又論曰若病家始發便來告師師可診候所解為法作次序療之以其節度首尾取瘥也病家已經雜療無次序不得制病病則變異其本候後師便不知其前證虛實直依其後證作療亦不得瘥也要應精問察之為前師貫者所配依取其前蹤續以為療乃無逆耳前師處湯本應數劑乃瘥而病家服一兩劑求效便謂不驗以後更問他師師不尋前人為療寒溫次序而更為療而不依次前師療則斃也或前已下之後須平和療以接之而得瘥也或前人未下之或不去者或前療寒溫失度後人應調理之是為療敗病皆須邀射之然後免耳不依次第及不審察必反重斃也又茵芋丸療少小有風癇疹至長不除或遇天陰節變便發動食飲堅強亦發百脈攣縮行步不正言語不便者服之不發方茵芋炙鉛丹熬鉤藤炙杜蘅防葵石膏研秦艽各四分菖蒲黃芩各六分松蘿二分蜣螂十枚炙甘草十四分炙上十二味搗篩丸如小豆三歲以下服五丸三歲以上服七丸五歲以上服十丸十歲可至十五丸大小量之又神農本草經説小兒驚癇有一百二十種其證候微異於常便是癇候也初出胎血脈不斂五臟未成稍將養失宜即為病也時不成人其經變蒸之後有病餘證並寬唯中風最暴卒也又小兒四肢不好驚掣氣息小異欲作癇又凡小兒不能乳哺當與紫丸下之小兒始生生氣尚盛但有微惡則須下之必無所損及其愈病則致深益及變蒸日滿不解者並宜龍膽湯也方在客忤中若不時下則成大病病成則難療矣凡下四味紫丸最善雖下不損人足以去疾若四味紫丸不得下者以赤丸下之赤丸不下當倍之若已下而有餘熱不盡當按方作龍膽湯稍稍服之摩赤膏風癇亦當下之後以豬心湯下之驚癇但按圖灸之及摩膏不可大下也何者驚癇心氣不定下之內虛益令甚耳驚癇甚者特為難治如養小兒嘗慎驚勿令兒聞大聲抱持之間當安徐勿令怖也又天雷時便掩塞兒耳並作余細聲以亂之凡養小兒皆微驚以長血脈但不欲大驚大驚乃灸驚脈若五六十日灸者驚復重甚生百日後灸驚脈乃善治少小心腹熱除熱丹參赤膏方丹參雷丸芒硝戎鹽大黃各三兩上五味切以苦酒半升浸四種一宿以成煉豬脂一斤煎三上三下去滓內芒硝膏成以摩心下冬夏可用一方但丹參雷丸亦佳並出第五卷中千金翼凡小兒之癇有三種有風癇有驚癇有食癇然風癇驚癇時時有耳十人之中未有一二是食癇者凡是先寒後熱發癇者皆是食癇也驚癇當按圖灸之風癇當與豚心湯下之食癇當下乃愈紫丸佳凡小兒所以得風者緣衣暖汗出風因而入也風癇者初得之時先屈指如數乃發作此風癇也驚癇者起於驚怖先啼乃發作此驚癇也驚癇微者急療勿復驚之或自止也其先不哺乳吐變熱後發癇此食癇也早治則瘥四味紫丸逐澼飲最良去病速而不虛人赤丸瘥快病重者當用之小兒衣甚寒薄則腹中乳食不消其大便皆酢臭此欲為癖之漸也便將紫丸以微消之服法先從小起常令大便稀勿使大下也稀後便漸減之屎不酢臭乃止藥又凡小兒冬月下無所畏夏月下難瘥然有病者不可不下後腹中當小脹滿故當節哺乳將紫丸數日又乳哺小兒常令多少有常劑兒漸大當稍稍增之若減少者此腹中已有小不調也便微服藥停哺但與乳甚者十許日微者五六日止哺自當如常若不肯哺而欲乳者此是癖為重要當下之無不瘥者不下則致寒熱或反吐而發癇或更致下痢此皆病重不早下之所為也此為難療又凡小兒有熱不欲哺乳臥不安又數驚此癇之初也服紫丸便愈不瘥更服之兒立夏後有病療之慎勿妄灸不欲吐下但以除熱湯浴之除熱散粉之除熱赤膏摩之又臍中以膏塗之令兒在涼處勿禁水漿常以新水飲之又凡小兒屎黃而臭者此腹中有熱宜微將服龍膽湯若白而酢者此寒不消也當服紫丸微者少與藥令內消甚者小增令小下皆須節乳哺數日令胃氣平和若不節乳哺則病易復復下之則傷其胃氣令腹脹滿再三下之尚可過此傷矣並出第十一卷中備急療少小百二十種癇病胸中病蛇蛻皮湯方蛇蛻皮三寸炙細辛甘草炙鉤藤黃耆各二分大黃四分蚱蟬四枚炙牛黃五大豆許上八味切以水二升半煮取一升一合百日兒一服二合甚良窮地無藥物可一二味亦合不可備用然大黃一味不得常用效又療少小二十五癇大黃湯方甘草炙大黃甘皮當歸各一兩細辛半兩上五味搗篩以指撮著水一升煮取二合一歲兒服一合日二古今録驗赤湯療二十五種癇吐痢寒熱百病不乳哺方大黃五兩當歸芍藥黃芩栝蔞甘草炙桂心人參赤石脂牡蠣熬紫石英麻黃去節各二兩上十二味搗篩令調盛以韋囊八歲兒以干棗五枚用水八合煮棗取五合兩指撮藥入湯中煮取三沸去滓與兒服之取利微汗自除十歲用棗十枚三指撮藥水一升煮三沸服之此湯療小兒百病及癇神驗又療未滿月及出月兒壯熱發癇鉤藤湯方鉤藤一分蚱蟬一枚去翅柴胡升麻黃芩各二分蛇蛻皮二寸炙甘草炙大黃各二分竹瀝三合石膏三分碎上十味切以水一升煮取三合半和竹瀝服一合得利見湯色出停後服至五十六十日兒一服一合乳母忌海藻菘菜等崔氏云若連發不醒加麻黃一分去節又療百日及過百日兒發癇連發不醒及胎中帶風體冷麵青反張宜服麻黃五癇湯方麻黃去節羌活乾葛甘草炙枳實各二分炙杏仁二十枚升麻黃芩大黃各四分柴胡芍藥各三分鉤藤皮一分蛇蛻三寸炙蚱蟬二枚炙去羽石膏六分碎上十五味切以水二升並竹瀝五合煎取六合每服一合佳小兒驚悸方二首必效鉤藤湯療小兒壯熱時氣驚悸並熱瘡出方鉤藤人參蚱蟬炙子芩各一分蛇蛻皮三寸炙龍齒四分防風澤瀉各二分石膏一兩碎竹瀝三合上十味切以水二升並竹瀝煎取七合細細服之以瘥為度又方牛黃兩大豆許研蚱蟬炙各二分龍齒麥門冬去心各四分人參三分鉤藤一分茯神杏仁十二枚蛇蛻皮三寸炙末入上九味切以水二升煎取六合去滓下牛黃末分六服消息服之令盡瘥小兒夜啼方一十首小品療小兒夜啼一物前胡丸方前胡隨多少上一味搗篩蜜丸如大豆服一丸日三加至五六丸以瘥為度千金同又方以妊娠時食飲偏有所思者以哺兒則愈千金同千金療小兒夜啼不已醫所不治者方取狼糞中骨燒作灰水服如黍米粒一枚即定又療小兒夜啼至明不安寐芎藭散方芎藭防己白朮各二分上三味搗篩以乳和之與兒服之量多少又以兒母手掩臍中亦以摩兒頭及脊驗二十日兒未能服散者以乳汁和之服如麻子一丸又方交道中土伏龍肝各一把上二味以絹篩水和少許服之瘥又方取馬骨燒灰敷乳上飲兒啼即止並出第五卷中備急或常好啼方取犬頭下毛以絳囊盛擊兒兩手立效必效小兒夜啼方以日未出時及日午時仰臥著於臍上橫文屏氣以朱書作血字其夜即斷聲效古今録驗小兒夜啼如腹痛方蟅蟲熬令煙盡芍藥炙芎藭熬各等分上三味搗末服如刀圭日三以乳服之又療小兒夜啼不止腹中痛宜以乳頭散方黃耆甘草炙當歸芍藥附子炮乾薑各等分上六味為散以乳頭飲兒丸可胡豆三丸大小量之小兒驚夜啼方七首廣濟療小兒五驚夜啼龍角丸方龍角黃芩大黃各二分牡丹皮一分蚱蟬一枚炙牛黃小豆大五枚上六味搗篩蜜和丸如麻子少小以意增減之甚良千金牡丹作牡蠣崔氏名五驚丸千金療小兒驚啼方以雞屎白熬末以乳服少許又方以臘月縛豬繩燒灰服之又方燒蝟皮三寸灰著乳頭飲兒又方車轄脂如小豆許內口中及臍中瘥又小兒因宿乳不消腹痛驚啼牛黃丸方大附子二枚炮去皮牛黃三銖巴豆去心皮熬杏仁去尖皮真珠各一兩研上五味搗附子真珠下篩別搗巴豆杏仁合如膏內附子及牛黃搗一千二百杵若干入少蜜足之百日兒服如粟米一丸三歲兒服如麻子一丸五六歲兒服如胡豆一丸日二先乳哺了服之隔上下悉當微轉藥完出者病愈散出者更服並出第五卷中文仲隱居效方小兒夜啼不安此腹痛故至夜輒劇狀似鬼禍五味子湯方五味子當歸芍藥白朮各四分甘草炙桂心各二分上六味切以水一升煎取五合分服之增減量之小兒客忤一十首千金論曰少小所以有客忤病者是外人來氣息忤之一名中人為客忤也雖是家人或別房異戶或乳母父母從外還衣服或經履鬼神粗惡暴氣或牛馬之氣皆為忤也發作喘息乳氣未定者皆為客忤其乳母遇醉及房勞後乳兒最劇能殺兒也不可不慎又論曰凡中客之為病皆頻吐下青黃白色水穀解離腹痛夭糾面色變易其候似癇但眼不上插耳其脈急數者是也宜與龍膽湯下之又龍膽湯療嬰兒出腹血脈盛實熱溫壯四肢驚掣發熱大吐哯者若已能進哺中食不消壯熱及變蒸不解中客人魃氣並諸驚癇方悉主之小兒皆服之小兒龍膽湯第一此是新出腹嬰兒方若日月長大者以次依此為例若必知客忤及有魅氣者可加人參當歸各如龍膽稱分多少也一百日兒加半分二百日兒加一分一歲兒加半兩余藥皆準爾龍膽鉤藤皮柴胡黃芩桔梗芍藥茯神甘草炙各一分蜣螂二分炙大黃四分上十味切以水一升煎取五合為劑也服之如後節度藥有虛實虛藥宜足數合水也兒生一日至七日分取一合為三服生八日至十五日分取一合半為三服生十六日至二十餘日至四十日者盡以五合為三服十歲亦準此得下即止勿復服也又少小卒客忤不知人者方取新熱馬屎一枚絞取汁飲兒下便愈亦治中客忤而𠸯啼面青腹強者又少小見人來卒不佳腹中作聲者二物燒發散方用向來者人頭生髮十莖斷兒衣帶少許合燒灰細末和乳飲兒即瘥又少小中忤人一物馬通浴湯方用馬通三升火燒令煙盡以酒一斗煮三沸去滓以浴兒即瘥又凡乘馬行還得汗氣臭又未盥洗易衣裝而便向兒邊令兒中馬客忤兒忽卒見馬來及聞馬鳴驚及馬上衣物馬氣皆令兒中馬汗氣及客忤慎護之特重一歲兒也又凡非常人及諸物從外來亦驚小兒致病欲防之法諸有從外來人及有異物入戶當將兒回避之勿令見也若不避者即燒牛糞令有煙氣置戶前則善又方吞麝香如大豆許立愈又療少小客忤二物黃土塗頭方以灶中黃土熟者曲蟺糞等分合搗如雞子黃大塗兒頭上及五心良一方雞子清和如泥又療小兒犯客忤發作有時方取母月衣覆兒上大良又療卒客忤方剪取驢前膊胛上旋毛大如彈丸以乳汁煎之令毛消藥成著乳頭飲之下喉即愈又療小兒卒客忤方銅鑑鼻燒令赤投少許酒中大兒飲之少兒不能飲者含與之即愈並出第五卷中小兒癥瘕癖方六首廣濟療少小及大人腹中宿食積成症癖兩脅妨滿氣息喘急不能食面黃日漸瘦腹大脹硬除百病紫雙丸方代赭研丹砂研大黃各八分青木香當歸各五分桂心四分犀角三分屑巴豆六分上八味搗篩蜜和丸如梧子大人小兒量之十歲兒服大豆二丸六歲者小豆許二丸以下臨時斟酌要瀉病出為度久疾日一丸以溏泄而已不在猛瀉忌如常法又療小兒痃癖發腹痛不食黃瘦鱉甲丸方鱉甲炙郁李仁各八分防葵人參各五分訶黎勒皮七顆大黃四分桑菌三分上七味搗篩蜜丸大小量之以酒飲乳服五丸至十丸千金牛黃鱉甲丸療小兒癖實癰腫壯熱食不消化中惡忤氣方牛黃二分鱉甲炙麥曲熬柴胡大黃枳實炙芎藭各二兩厚朴炙茯苓桂心芍藥乾薑各半兩上十二味搗篩蜜丸如小豆日三服以意量之又療小兒心下生痞痰澼結聚腹大脹滿身體壯熱不欲哺乳芫花丸方芫花黃芩各四分大黃雄黃細研各十銖上四味搗篩為末蜜和更搗一千杵三歲兒至一歲以下服如粟米一丸欲服丸內兒喉中令母與乳若長服消病者當以意消息與服之與乳哺相避良又療小兒痰實結聚宿癖羸露瘦不能飲真珠丸方真珠半兩研麥門冬一兩去心蕤仁五十枚一云二百個巴豆七枚去心皮熬一云四十枚上四味搗篩蜜和丸期歲兒服二丸小豆大二百日兒服如麻子二丸漸增以知為度當下病赤黃白黑葵汁勿絶藥病盡下自止久服令小兒肥白無病已試驗並出第五卷中劉氏療小兒冷癖痃癖氣不下食瘦時時肋下痛方防葵當歸枳實炙厚朴炙楮實人參黃耆茯神白朮訶黎勒皮各八分郁李仁去皮柴胡大麻仁芍藥橘皮防風紫菀洗去土薏苡仁各六分鱉甲炙三稜根各十二分桂心七分仙鼠二枚如無以糞二合代大附子二枚炮乾薑末二分甘草炙乾地黃各十分大黃十分五味子四分檳榔四顆牛膝二分上三十味搗篩蜜丸如梧子大小增減以意量之須飲服之良小兒痰結方二首千金療少小宿食癖氣痰飲往來寒熱不欲食消瘦芒硝紫丸方芒硝四分熬大黃四兩半夏二兩洗代赭一兩甘遂二兩熬巴豆三百枚去心皮熬杏仁一百二十枚上七味搗篩別治巴豆杏仁令如膏搗數千杵令相和如強內少蜜百日兒服如胡豆十丸過百日至一歲服二十丸隨兒大小以意節度之當候兒大便中藥出為愈若不出復與加初出第五卷中古今録驗療八歲以上兒熱結痰實不能下食方大黃十二分柴胡九分黃芩知母各十二分升麻十分枳實炙杏仁各六分芍藥梔子各八分細辛二分半竹葉切一升上十一味切以水六升煮取一升八合分四服十歲兒分三服以下以意消息多少量之千金有桔梗黃連無枳實杏仁小兒因食痞滿羸瘦不下食肚脹方四首小品療四五歲兒因食及在胎中宿熱乳母飲食粗惡辛苦乳汁不起兒哺不為肌膚心腹痞滿痿黃瘦瘠四肢痿疒躄繚戾服之令充悅方芍藥十分炙令黃黃耆鱉甲炙人參各四分柴胡八分茯苓六分甘草炙乾薑各二分如熱以枳實代上八味搗篩蜜和為丸如大豆服五丸日二服忌如常法千金有大黃無黃耆云服一丸一歲以上乳服三丸七歲兒服十丸日二千金療少小傷寒久病不除瘥復劇羸瘦骨立五味子湯方五味子十銖大黃六銖芒硝五分麥門冬六分去心石膏一兩甘草炙當歸黃芩黃連前胡各一分上十味切以水三升煮取一升半服二合下利即止效又療小兒羸瘦惙惙常服不妨乳方甘草五兩炙上一味搗篩蜜丸如小豆一歲兒服十丸日三盡即更合並出第五卷中劉氏療小兒肚脹漸瘦不食四肢熱不調方甘草炙鱉甲炙柴胡茯神子芩各六分訶黎勒皮十分檳榔兼皮三顆研芍藥橘皮各三分生薑當歸各四分知母五分大黃八分上十三味切以水一升半煎取七合分為數服得瀉病瘥小兒食不下及不消不嗜食方四首廣濟療小兒心腹滿吃食不下地黃飲子方生地黃汁三合生薑汁三合訶黎勒四分末白蜜一匙上四味相和調勻分溫服之微利尤良小品療小兒宿食不消發熱九味當歸湯方當歸甘草炙芍藥人參桂心黃芩乾薑各一分大棗五枚大黃二分上藥切以水一升半煎取六合去滓分服千金療少小五六日不食氣逆桂心橘皮湯方桂心半兩橘皮三兩薤白切五合黍米五合人參半兩上五味切以水七升先煮藥取二升次下薤米米熟湯成稍稍服之又療少小胃氣不調不嗜食生肌肉地黃丸方乾地黃大黃各五分茯芩三分當歸柴胡杏仁各二分上六味末之以蜜丸如麻子大服五丸日三服並出第五卷中小兒霍亂方一十二首廣濟療小兒霍亂心腹刺痛吐痢方茯芩桔梗人參各六分白朮五分甘草炙厚朴各四分炙上六味切以水二升煮取六合去滓溫服之又療小兒霍亂嘔吐不止方人參六分厚朴三分炙陳倉米三合上三味切以水三升煮取七合去滓分服之千金療小兒吐痢霍亂方人參四分厚朴炙甘草各二分炙白朮三分上四味切以水一升二合煮取五合六十日兒服一合百日兒分三服期歲兒分再服乳母忌油膩等備急療小兒霍亂吐痢方人參四分厚朴炙甘草各二分炙乾薑一分白朮三分上五味切以水一升煮取四合分服之又療孩子霍亂已用有效方人參蘆籜各二分扁豆藤二兩倉米一撮上四味切以水二升煮取八合分服又方人參四分生薑三分厚朴炙白朮甘草炙各二分上五味切以水一升煮取四合分服又方人參四分木瓜一枚倉米一撮上三味切以水煮分服以意量之立效必效主小兒霍亂方取廁屋戶簾燒灰研以飲服一錢匕又方訶黎勒一枚上一味先煎沸湯研一半許與兒服立止再服神妙古今録驗療小兒霍亂吐痢人參白朮湯方人參六分白朮茯苓各四分厚朴炙甘草炙各三分上五味切以水一升半煮取六合分溫服立效劉氏療百日以來及蓐內兒霍亂方以人乳半合及生薑汁少許相和煎服入口定又療小兒霍亂方生薑四分香薷一兩薄荷一兩上三味以水煎分溫兒與母俱服之甚良小兒霍亂雜病方六首劉氏療小兒霍亂空吐不痢方人參六分生薑四分厚朴二分炙橘皮一分兔骨一兩炙碎上五味切以水一升二合煎取四合服之即利下部又以杏仁鹽少許皂莢末少許面和硬溲如棗核大以綿裹內之便通奶母忌熱面大效又療小兒霍亂空利不吐方烏牛葹草一團生薑人參各三兩上三味切以甜不醋漿水一升半煎取五合分服之如孩子渴取曲蟺糞爛龍骨一兩以漿水煎澄清與兒吃即瘥又療小兒霍亂不吐不痢肚脹妨滿上下不通方甘草四分炙當歸二分石鹽三分上三味切以漿水一升半煎取六合去滓牛黃麝香各半錢匕研蜜半匙相和以下灌之即通奶母與漿水粥吃勿吃麵肉等又小兒干霍渴熱及壯熱眼色慢四大困悶方以烏豆一升淨干擇生薑一兩切以水三升煎烏豆皮欲爛即濾取汁二合和少許蜜吃即變吐如人行六七里又與吃無問大人小兒並與服之效又療小兒熱霍諸藥不瘥方以蘆葉二大兩糯米三大合水三升先煮葉入米煮取一升入蜜少許和服即瘥不足即取桑葉二升生薑半兩切以水三升煮取一升著一匙白米為飲服又療小兒霍亂吐痢不止方以人乳汁二合生薑汁粟米許豆蔻取仁碎似蕎麥大二七枚蘧蒢一小把龍骨六分以乳煎取一合著少許牛黃麝香兔毛灰等和分為三服如渴以糯米汁著蜜與吃即瘥小兒吐痢方四首千金療小兒吐痢方以亂髮灰二分鹿角一分作末以米飲服一刀圭日三又方以熱牛矢汁灌之又方燒特豬矢水解取汁少少飲兒劉氏療百日以下蓐內兒吐痢方面一錢炒乳汁兩合龍骨六分上三味煎龍骨和炒麵服之即瘥小兒噦方二首備急療小兒噦方以生薑汁五合牛乳五合上二味合煎取五合分二服又方以羊乳一升煎減半分五服無用牛乳代之小兒口噤方四首千金療小兒口噤方以鹿角粉之大豆末之等分和乳塗乳飲兒又方以驢乳二升豬乳一升合煎得一升半服如杏仁三四服瘥備急療小兒鵝口並噤方礬石燒末硃砂各半分末上二味和研令極細敷兒舌上日三以亂髮洗舌上垢頻頻令淨即瘥古今録驗療小兒噤其病在咽中如麻豆許令兒沫不能乳哺方取水銀如黍米與服覺病無早晚水銀下咽便愈以意量之不過小麻子許與可也小兒重舌方一十三首千金療小兒重舌方灸行間隨年壯穴在足大趾岐中是又方取田中蜂房燒灰酒和敷喉下愈又方以灶中黃土末苦酒和塗舌上又方以赤小豆末和醋塗舌上又方取簸箕舌燒灰敷舌上又方黃柏竹瀝漬取細細點舌上良又方兒重舌舌強不能收唾燒蛇蛻末以雞毛蘸醋展藥掠舌下愈千金翼療小兒重舌方取三屠家肉各如指大以摩舌上兒立能乳便啼又方以衣魚燒作灰以敷舌上千金云衣魚塗舌上又方兒重舌舌強不收唾者鹿角末如小豆許著舌下數數與之又療小兒重舌口中瘡涎出至多方以蒲黃敷舌上不過三度愈古今録驗療兒重舌欲死方灸右足踝三壯立愈又灸左右並良千金云灸兩足外踝又方取亂髮燒灰末敷舌上甚佳小兒鵝口燕口方六首千金療小兒心藏熱口為生瘡重舌鵝口方取柘根銼五升無根只以弓材佳上一味以水一斗煮取二升以汁更煎取五合細細拭齒數次良又方口生瘡白漫漫取桑木汁先以父發拭口次以桑汁塗之又療小兒鵝口不能飲乳方取白鵝屎汁瀝口中良又方取黍米汁塗之又方取父母亂髮淨洗纏桃枝沾取井華水東向日以發拭口中得口中白乳以置水中七過瀝洗三朝作之救急療小兒燕口兩吻生瘡方取發灰以豬脂和塗之千金同小兒口瘡方五首小品療小兒口爛瘡方取羊乳細細瀝口中不過三度瘥千金療小兒口瘡方大青三分黃連二分上二味切以水三升煮取一升二合一服一合日再夜一文仲支太醫療小兒口瘡方桑木白汁生地黃汁各一合赤蜜半合上三味和暖敷兒口中瘡便瘥救急療小兒口瘡方以蛇蛻皮水漬令濕軟拭口內瘡一兩遍即瘥劉氏療小兒口瘡方黃柏皮一兩切烏豆一升上二味以水二升煮取兩合去滓重煎如餳入少許龍腦香研和敷之甚良小兒口中涎出方三首千金療小兒口涎出方以白羊屎內口中瘥又方以東行牛口中沫塗兒口中及頤上又方桑白汁塗之瘥小兒舌上瘡唇腫方五首小品療小兒唇腫及口赤生白瘡爛方清旦研桑木白皮取汁以塗兒唇口即瘥又小兒舌上瘡方烏賊魚骨燒末以雞子黃和塗之至喉咽舌下遍敷即瘥止千金療小兒舌瘡方蜂房燒灰屋間塵各等分和先洗瘡使干敷之效又方羊蹄骨中生髓和胡粉敷上日三取瘥又舌腫強滿口方滿口舍糖醋少時熱氣通愈小兒咽喉生瘡方二首千金療熱病口爛咽喉生瘡水漿不得入者膏方當歸射干升麻各一兩附子半兩白蜜四合上五味切以豬膏四兩先煎之令成膏下著地勿令大熱內諸藥微火煎令附子色黃藥成去滓投蜜更上火一兩沸以器盛之取杏仁許含之日四五咽之無妨大人小兒並用妙又療口中瘡咽喉塞不利口燥膏方豬脂一斤黃連一兩白蜜一升上三味合煎令成膏去滓合半棗大日四五夜亦含之小兒喉痹方四首千金升麻湯主小兒喉痹痛若毒氣盛便咽塞並大人喉咽不利方生薑升麻射干各三兩橘皮一兩上四味切以水六升煎取二升分溫三服又療小兒卒毒腫著喉頸壯熱妨乳方升麻射干大黃各一兩上三味切以水二升半煮取八合一歲兒分三服余滓敷腫處冷更暖而敷大兒以意加之又方煮桃皮汁三升服之又燒荊瀝汁服之劉氏療小兒喉痹熱塞方升麻五兩切馬藺子一合上二味以水一升煎取二合入少白蜜與兒服之甚良小兒聤耳方四首千金療小兒聤耳方末石硫黃以粉耳中日一夜一瘥又療少小聤耳方桃仁熟末以豉許裹塞耳中古今録驗小兒聤耳方青羊屎曝乾以綿裹塞中即瘥又小兒聤耳有瘡及惡肉敷耳雄黃散方白麻措取皮一合花燕脂十願上二味搗篩細研敷耳中令滿一兩度瘥方無雄黃未詳其名小兒鼻塞方四首千金療小兒鼻塞不通濁涕出方杏仁二分椒出汗附子去皮細辛各一分上四味切以醋五合漬藥一宿明早以豬脂五合煎令附子色黃膏成去滓待冷塗絮導鼻孔中日再兼摩頂上又療小兒鼻塞生息肉方通草細辛各一兩上二味搗篩以綿纏如棗核大藥如豆著綿頭著鼻孔中日二古今録驗療小兒鼻塞不通細辛膏方細辛通草各一分辛夷仁一分半杏仁二分去皮上四味切以羊髓三合豬脂三合緩火煎之膏成絞去滓取一米粒許大以內鼻孔中頻易瘥劉氏療小兒鼻塞不通吃乳不得方醍醐三合青木香零陵香各四分上三味切和煎成膏取少許以膏和捻為丸或以膏塗兒頭上及塞鼻中以通佳
