body:
  text: 卷第三十八乳石發動熱氣上衝諸形候解壓方五十二首論曰夫乳石之性緩而且速能悍風寒逐暑濕導經脈行飲食之氣在陰即補其不足在陽即能發其炎陰盛陽虛則二儀亢位所以炎上腑之受邪則表熱氣隔至陰之伏也脈形陽浮而數陰伏而沉理之於經自然通泰若灸之於孫絡即血脈遄流或全抑之則乖於石性理而兼助則表裡周營若遇小發可自勞力按摩不可即治熱不已者別法隨事擇用解散方療寒熱胸中塞面腫手足煩疼是鍾乳發宜服生麥門冬湯方生麥門冬四兩去心豉三升綿裹蔥白切半斤上三味以水八升煮取三升分服體氣熱是客熱當自漸加衣物雖似惡加之後必佳忌如常法此方甚良千金同又壓丹石發方天台山國清師所敷用杏仁一百枚去皮尖上一味以水一升於盤中研之絞取汁令盡以白麵二升用杏仁汁溲作餺飥還以杏仁汁煮務令極熟其病者量性多少啖之令盡訖又取美酒數升煮十餘沸候熱訖病者量性多少飲之徐令盡蓋覆安臥初覺心悶頃間四體輕虛一服三年不發大效又療乳石發方甘草炙麻黃去節各一兩上二味切以水三升煮取半升和清酒半升其患者先須火邊灸熱徹欲汗承熱服令盡蓋衣臥須臾大汗即瘥千金翼同又若因食倉米臭肉動乳方必須蔥豉湯細細服之五六度即瘥千金翼同又食飲損者方於蔥豉湯中加當歸一兩煎之去滓分服即瘥若未可即服蘆根湯千金翼同又若已服安和藥仍不退者此小觸動服蔥豉等湯不解者可服蘆根湯解壓之方蘆根地榆五加根各一兩上三味切以水三升煮取一升服之即解千金翼同又若得時氣冷熱不調動乳者皆是寒熱所致其狀似瘧久久不療損人性命縱服湯藥必終難瘥宜作生熟湯浴之方以大器盛湯若大熱投少冷水即於湯中坐勿動須臾百節開寒熱之氣皆從毛孔中出變作流汗若心中熱悶者還服少許熱湯即定久乃出湯以衣被覆蓋睡豁然平復如患太重者不過三兩度即瘥千金翼同又解一切石發方僧珎法胡豆半升上一味搗研之以水八合絞取汁飲之即瘥虛弱人半升中平以意量之又大黃丸方大黃五兩搗末大麻子五兩熬勿令焦待冷於簸箕中以手挼去皮取仁研如膏上二味合治令勻以蜜和丸如梧子大以湯飲下十丸至二十丸以宣利為度此方甚妙通陽壅秘服之尤良忌如常法華陀薺苨湯療石毒卒發者慄慄如寒或欲食或不欲食若服紫石英發毒者亦熱悶昏昏喜臥起止無氣力或寒皆是腑臟氣不和所生療之方薺苨四兩甘草藍子各一兩茯苓黃芩各二兩蔓菁子一升人參一兩芍藥二兩上八味切以水一斗煮蔓菁子取八升去滓內余藥煎取三升去滓分三服日三若虛弱倍人參若氣上加茯苓薺苨一兩甚良千金翼云若體寒者倍人參減黃芩若氣上倍茯苓加薺苨一兩應楊州所得異故單蔥白湯藥療沉體中數年或更發宜服之方蔥白一斤切上一味以水五升煮取二升半去滓服盡未定更作服之至三劑即瘥止又療乳石發樊尚書傳蕭亮常服良驗余因熱重盛切慮不安遍於李虔祐率更吳升諾議處求解法亦稱此味奇絕方甘草二兩炙生犀角一兩牛屑葳蕤三兩上三味切以水四升煮取一升半分服甚效又方烏豆二升上一味以水九升煮取五升去滓以銅缽重湯煮取一升每服一匙盡即瘥未定更作佳又若盛熱發方取無灰酒煮三五沸承稍熱服之以布手巾兩個浸水以拓熱處取瘥為妙更互用之又療諸乳石發動口乾寒熱似鬼神為病方麥門冬八分去心五加皮犀角屑黃芩各四分葳蕤四兩梔子四分升麻四兩大黃五分芍藥四分大青甘草炙各三分苦參六分上十二味搗篩密丸食後以蜜水服十四丸漸加至二十丸日再以意加減千金翼同又療諸石發熱困苦方豬脂五合成煉者芒硝四分蔥白五合切豉心三合上四味以水三升煮蔥豉取一升二合去滓下豬脂芒硝分三服未瘥再服千金翼同又療石發熱盛充實四體煩滿脈急數大小便赤澀升麻湯方升麻黃柏黃連甘草炙各三兩黃芩四兩芍藥六兩白鴨通五兩淡竹葉切一升梔子十四枚豉一升大黃三兩上十一味切以水二斗煮竹葉鴨通取一斗一升去滓澄清取一斗內諸藥煮取四升去滓分三服若上氣者加杏仁五合滿加石膏二兩千金同又常防備熱發法方麥門冬三兩去心甘草一兩人參二兩上三味搗篩蜜和丸如彈丸一日服三丸甚良千金翼同又三黃湯折石熱通氣泄腸胃解肌方大黃三兩別漬黃芩二兩梔子一七枚甘草二兩炙豉一升麻黃一兩去節上六味切以水九升煮麻黃去上沫下諸藥煎取三升半下大黃三五沸去滓分服得利以瘥止千金翼同又方黃芩二兩豉五合綿裹蔥白五合梔子二七枚上四味切以水四升煮取一升八合去滓分服三劑瘥止千金翼同又療石發身熱如火燒黃芩湯方靳邵法黃芩三兩枳實二兩炙厚朴炙栝蔞芍藥各一兩梔子仁十四枚甘草炙一兩上七味切以水七升煮取三升去滓分三服忌如常法千金翼同又療熱氣結滯經年數數發方胡荽半斤五月五日採陰乾如此物可先收貯備之上一味以水七升煮取一升半去滓分服未瘥更作服春夏取葉秋冬取根莖用又療膈上熱方柴胡黃芩甘草炙茯苓麥門冬去心枳實炙生地黃各三兩竹葉切一升上八味切以水一斗煮取三升去滓分服又方取河中石不限多少燒令赤投小便一大升候冷頓服之良又方取寒水石長含以瘥為度又方取黃連水漬服一升最良又療心下煩熱悶內熱不安冷石湯方冷石半兩細研之上一味以水攪如白飲頓服不瘥更作又去石毒麻黃湯方麻黃二兩去節甘草二兩炙豉一升綿裹上三味切以水五升煮取一升去滓分溫再服之又豬膏湯解大散方豬膏二兩烊之豉一升上二味以水三升煮豉取汁一升內豬膏服七合日三服石人飲食宜清冷不宜熱熱即氣擁痞石唯酒一種須熱也千金翼同又療乳石發如寒熱狀似瘧方前胡半升黃芩甘草炙生薑知母各三兩牡蠣熬石膏各六兩大棗二十枚擘上八味切以水一斗煮取四升去滓分為四服取瘥為度此方甚良又療胸背頭中游熱補虛方黃耆芍藥各三兩甘草炙桂心各一兩茯苓人參石膏生乾地黃生薑麻黃去節麥門冬去心各二兩大棗三十枚擘竹葉切一升上十三味切以水一斗二升煮竹葉取一斗去滓下諸藥煎取三升去滓分服之一方無茯苓有大黃又療石發諸藥療不瘥方以硝石含之效又方若熱盛可向冷地臥腰下以厚物薦之腰以上令薄使受稍似涼即起不得過度又三黃丸療虛熱氣壅不通方黃連黃芩各三兩大黃二兩上三味搗篩蜜丸以湯飲下十五丸至二十丸如梧子以利即瘥又療精神如失氣攻上骨熱方柴胡升麻黃芩澤瀉各三兩淡竹葉切一升生地黃切二升干藍芒硝各二兩上九味切以水八升煮取三升去滓下芒硝分服取利止忌如常法又療石熱將行體微筋嗇郎此方從叔汾州刺史河東公口受此法余久服石每服此飲頗甚為效方茱萸葳蕤各一兩豉心一升蔥白一握上四味切以水四升煮取減半分服又療服諸藥石後或熱不禁多向冷地臥又不得食諸熱面酒等方五加根皮二兩上一味切以水四升煮取二升半候石發之時便服未定更作服又療諸石盛熱不除心腹滿小便赤大便不利吐逆氣衝胸口焦乾目赤重熱三黃湯方黃連芒硝各二兩甘草炙大黃一兩黃芩三兩上五味切以水五升煮取二升半去滓下芒硝分服以利為度甚良妙又療天行丹石發動上下擁隔不通頭痛口苦不能食立效方醴泉杜主薄傳青木香紫葛紫參玄參丹參苦參人參石膏代赭細辛桂心獨活蓯蓉乾薑齊鹽吳藍各一分巴豆二分去皮心熬上十七味搗篩蜜和丸如梧子有患服三丸強者服五丸余即量與之以飲下得快利三兩行即瘥忌如常法又療石發內有虛熱胸中痞滿外風濕不解肌肉拘急方香豉一升梔子十四枚蔥白一握黃芩二兩上四味切以水七升煮豉五六沸去豉內藥煮取三升分三服之不止更為之千金翼同又療熱腫初起始欲作癰便宜服升麻湯方升麻大黃黃芩芍藥枳實各二兩甘草炙當歸各一兩上七味切以水八升煮取三升分三服腫即消散如熱加黃芩三兩千金翼同又淡竹葉湯方淡竹葉切一升茯苓白朮甘草炙枳實炙梔子人參各一兩大黃二兩黃芩三兩上八味切以水七升煮取三升分服以瘥止又療服散不得力食不下飲酒解散輒嘔吐七味三黃湯方豉五合綿裹梔子十四枚枳實八分炙甘草炙前胡大黃各一兩芒硝二兩上藥切以水七升煮取三升分服又增損竹葉湯解散下氣方黃連麥門冬去心竹葉切人參各二兩枳實炙梔子各一兩甘草炙茯苓各二兩上八味切以水八升煮取三升分服之瘥止又療心忪熱煩悶如火氣上方石膏八兩茯神葳蕤黃芩各四兩橘皮五味子干藍麻黃去節甘草炙犀角屑各二兩杏仁去皮尖梔子各三兩上十二味切以水八升煮取三升分服之瘥止又療虛勞下焦虛熱骨節煩疼肌肉急內痞小便不利大便數而少吸吸口燥少氣折石熱方大麻仁五合研豉二升上二味以水四升合煮取一升五合分三服三劑即止千金翼同又療內熱結不除或更服散或以飲酒冷食澡洗猶不解或腹脹頭痛眼眶疼或先有癖實不消或連飲不食或時作心痛服此湯皆愈方甘草炙黃芩大黃各二兩上三味切以水五升煮取二升分三服千金翼同又散熱白鴨通湯方白鴨通五升以沸湯二斗半淋之澄清取一斗麻黃四兩去節豉二升冷石一兩梔子仁二十一枚甘草炙五兩石膏三兩碎上七味切以鴨通汁煮取六升去滓內豉煮三沸一每服五合若覺冷小便利潤其閒若熱猶盛小便赤促服之不限五合宜小小勞漸漸進食不可令食少但勿頓多耳千金同又下氣除熱前胡湯方前胡黃芩甘草炙茯苓各二兩梔子仁枳實炙大黃各一兩杏仁六十枚去尖皮生薑三兩切上九味切以水九升煮取二升半分服又麻黃湯下氣解肌折熱方麻黃四兩黃芩甘草炙石膏各三兩碎升麻二兩梔子仁一兩上六味切以水一斗煮取三升半分三服之又療服升麻湯內解外不解者宜此麻黃湯方麻黃去節升麻大黃黃芩石膏各三兩碎甘草一兩炙梔子仁三合上七味切以水九升煮取三升分服之瘥止又療腹中無妨直患虛汗方澤瀉知母石膏各二兩碎當歸甘草炙人參桂心黃芩茯苓各三兩麥門冬三兩去心竹葉切三升上十一味切以水一斗二升煮竹葉取一斗去滓下諸藥煮取四升分服瘥忌如常法石發熱嗽沖頭面兼口乾方六首論曰五臟之尊心雖為王而肺最居其上也肺為華蓋覆其四臟合天之德通達風氣而肺母火也性慣受溫而惡寒心火更炎上蒸其肺肺金被火傷則葉萎倚著於肝肺發癢即嗽或因石增熱心肝虛弱不能傳陽至下焦遂被正陽俱躋變成嗽矣或為發背或作癰頭也夫言惡寒則何以知也肺主皮毛皮毛遇寒即慄而粟起其肺嗽亦萎倚著肝而成病亦由木能扣金興鳴也凡如此先食養肺抑心肝虛熱和其腎即愈矣療石發熱沖頭面兼口乾嗽方生麥門冬去心葳蕤石膏各三兩碎生地黃汁七合蔥白一握和須乾葛四兩豉心三合上七味切以水七升煮取三升分三服忌如常法又療熱嗽方取生豉漬汁溫之才免冷食服訖即臥勿令入腰中故也以意消息之又天門冬煎主定肺氣去風熱明目止嗽喘粗血腥乳石發冷而補之方通按天冬性冷而能補病虛熱者宜服天門冬汁一升生地黃汁二升生薑汁二合杏仁五合去皮尖研如膏白蜜八合牛酥五合款冬花升麻百部根紫菀麻黃去節各二兩甘草四兩炙上十二味切以水八升煮麻黃去沫下諸藥煎取二升去滓澄濾銅器中微火煎去半下天門冬等汁次第下之煉成煎取一匙含咽之日三五度取瘥忌如常法又療上氣肺熱呼嗽沸唾方麥門冬十分去心杏仁三十枚去皮尖研貝母生薑各六分切石膏八分碎黃芩五分甘草炙五味子白朮各四分淡竹葉切一握白蜜一匙上十一味切以水四升煮取一升二合去滓內蜜分服若須利入芒硝又療肺脹氣急呀嗷喘粗眠臥不得極重恐氣即絕紫菀湯方紫菀六分甘草炙茯苓各八分檳榔七枚碎葶藶子三分熬末之上五味切以水六升煮取二升去滓分再服又宜服丸主上氣呀嗽不得臥臥即氣絕方蕓薹子葶藶熬各十二分馬兜苓十顆紫菀人參杏仁去皮尖皂莢去皮子炙白前甘草各六分炙漢防己八分上十味搗篩蜜和丸如桐子大服十丸至二十丸增減量之石發兼虛熱痰澼乾嘔方五首論曰凡人有五臟合則脾胃為水穀之府且國府足谷則足食足兵也人胃足食則營衛不厥若人能食則能悅也陰陽和平有何患乎若服食之人皆增於熱失時不食則胃口乾焦胃口乾焦則土不足或因飲酒水而食少變為痰結酒水流下迎令上升下焦無陽即陽虛也中腑無谷上焦漸炎致陽嘔噦經曰陽數即嘔吐又曰嘔噦發下焦之間此之義也可以破痰結通水穀填胃腑則無咎也夫通填之義不可虛其虛實其實歧伯曰瀉虛補實神去其室他臟皆仿此療因飢空腹飲酒飲水食少痰結心頭乾嘔方枳實三兩炙梔子仁一兩香豉半升大黃二兩別浸上四味切以水六升煮取二升分再服忌如常法又療結熱澼心下腫胸中痞塞嘔逆不止雁肪湯方雁肪一具甘草炙當歸桂心芍藥人參石膏各二兩碎桃仁三十枚去皮尖大棗二十枚擘大黃二兩上十味切以水一斗二升煮雁肪取汁一斗煮諸藥取五升去滓分服無雁肪以雁肉無雁以鴨代之雞亦得又療嘔不止不下食方薤白一握橘皮一兩豉半升麥門冬二兩去心粟米一合上五味切以水三升煮取一升去滓細細服之瘥止又療熱發胸中痰醋乾嘔煩熱方半夏洗白薇各一兩乾薑一兩甘草半兩炙上四味切以苦酒五升煮取三升分服夫苦酒能令石朽爛故用之又療數振動煩悶嘔逆人參湯方人參甘草炙栝蔞麥門冬去心各二兩黃芩蘆根各一兩上六味切以水四升煮取二升分四服瘥止石發吐血衄血方七首論曰五臟所藏心藏血也血之傷盛則心脫力制固無守自然流溢為陽氣傷故也或有衄血者加以肺風熱之謂也若益之於服石則客熱復盛營衛增勞旋周無度則投虛而出出而多則傷營氣色奪而黃久不療則氣撮撮傷損先須破汙血留好血調經絡平腑臟則愈也療石發熱盛吐血方生地黃五兩搗碎小薊根切一升黃芩二兩豉一升梔子仁三七枚上五味切以水五升煮取二升分溫服之又衄血方生地黃汁小薊汁上二味隨多少以點鼻中兼服之良又療心腑中熱甚鼻中衄血不止方胡粉熬光墨末釜下墨末乾薑發灰伏龍肝末等分上六種但得一物以兩棋子許以竹筒吹令入兩鼻孔中即止又方橘皮蒼耳莖葉翹遙莖葉生地黃雞蘇苗上五種但得一味搗絞汁服五六合即止如未定即更服之又療頭痛壯熱鼻衄血心上硬遍身疼痛四肢煩悶兩膊舉不得方小薊四兩青竹茹生麥門冬去心碎雞蘇各三兩生薑二兩切生地黃汁半斤上六味切以水九升煮取三升去滓分服之以止為度忌如常法又療卒吐血一二升口鼻俱出至一二斗者方生地黃汁小薊汁生麥門冬汁伏龍肝十匙上地黃等三味汁相和每服五合著伏龍肝末一匙許和攪服之以止為度忌如常法又療心悶吐血方生麥門冬八分去心生地黃二十四分碎甘草四分炙薺苨乾薑各六分茅根十分香豉五合以綿裹上七味切以水五升煮取二升去滓分服之忌如常法石發熱煩及渴方一十六首論曰凡人陽處其表陰處其里則非純陰在其下復非純陽在其上皆須陰陽通於陰陽通平則五氣不乏五氣不乏則人無病只如服石之人多為陰虛而服攝之過溫則經脈湊溢或遭陽時亦發其證也正陽本自浮升石力更藏陽氣客主兩陽並蒸肺肝故患渴也或臟實腑虛而生髮背亦渴不獨兩陽為禍也且肺是庚辛庚辛畏火即告其子其子腎腎為壬癸雖子投而性惡寒陽雖得水暫寒而水潛流於下客水正水足為滂沱渴乃未除更增腎冷凡遇此候皆先泄溝瀆致陰氣於腎微理其石氣孰不痊乎療解散失度飲食冷熱不消虛脹吐清水而渴悶欲死方人參栝蔞枳實炙甘草炙白朮各一兩大棗二十枚擘上六味切以水六升煮取二升半分溫二服瘥止又療發癰虛熱大渴方生地黃八兩竹葉切三升小麥二升黃耆黃芩通草前胡各三兩栝蔞四兩芍藥升麻甘草炙大黃別浸知母茯苓各二兩人參當歸各一兩上十六味切以水二斗煮竹葉小麥取一斗去滓內余藥煮取四升去滓分服之小便利除通草大熱者去人參當歸忌如常法又療客虛熱衝上焦胸中口乾燥頭面熱赤並渴方生葛汁生地黃生麥門冬汁白蜜各一升棗膏八合生薑汁二合上六味和煎之內蜜候如稀餳食後漸漸含之其功甚妙又療消渴止小便方黃連一斤金色者麥門冬八兩去心生地黃汁羊乳栝蔞汁各三兩上五味搗上二味為末以汁相和藥末眾手一時丸如梧子食後以飲服二十丸忌如常法又療熱渴竹葉湯方淡竹葉切五升茯苓石膏各三兩碎小麥三升栝蔞二兩上五味切以水二斗煮竹葉取八升下諸藥煮取四升去滓分溫服忌如常法又療發癰盛患渴口乾排膿止渴方黃耆梔子仁栝蔞生乾地黃升麻各二兩麥門冬去心芍藥各二兩黃芩一兩半上八味切以水一斗煮取三升服之瘥止忌如常法又療消渴方取螺二升上一味以一石江水浸養之傾澄取汁飲之經日放卻更取新者漬之准前服又方竹根濃煮汁飲之又方煮青粱米汁飲之又方搗冬瓜汁飲之又方冬麻子二升上一味搗以水煮三四沸飲之又方以水浸雞子取清生服甚良又方黃柏一斤上一味切以水一斗煮汁飲之又方桃仁五升去尖熬研白米三升上二味以水一斛煮取三升渴即飲之良又方石膏碎枳實炙茯苓各三兩上三味切以水九升煮取四升分服之又方茯苓半斤澤瀉四兩白朮乾薑桂心各三兩小麥三升甘草二兩炙上七味切以水一斗煮小麥取八升入藥煎取五升分服之石發熱風頭痛心煩寒熱方三首論曰五行五臟皆互相生肝雖處中而為臟首位在甲乙懷養懷仁故應春而王也為心之母餘臟循而次生焉心為王主身神毅而無纖不察四臟為四鄙四鄙有憂王必懷憂四臟和平則王有悅悅則營衛不錯憂則經絡患生心不受邪所病者為憂樂能致也肺為風府施於太穹為呼吸之門氣息之道也諸臟紊亂氣息皆形誰能出不繇戶耳若熱風盛心憂即頭痛若過憂即心煩熱盛必寒寒盛必熱倚伏之道足可明焉皆繇風狂邪熱之謂也但平風熱抑狂邪營衛自然通泰也療熱如火燒頭痛心煩悶乍寒乍熱胸中熱嘔逆方升麻前胡甘草炙黃連各二兩黃芩生地黃各三兩枳實炙梔子仁栝蔞各一兩豉五合綿裹上十味切以水八升煮取三升分服忌如常法又療食訖心煩悶眩心下胸中不安方茵陳四兩大黃二兩梔子仁二十枚上三味切以水五升煮取二升分服取瘥又療頭疼欲裂方取當歸二兩清酒一升煮取六合飲至再服石發口瘡連胸面及身上心痛方一十四首論曰夫人癢者為虛痛者為實在表為虛在裡為實心肺虛熱沖胸口乾干久乃成瘡生膿則癢矣自然虛極非是實也臟者藏也為不能含藏陽氣使陽氣妥出發則日虛若獨肝家有風即木氣搏心故痛亦非真心痛若真心痛只得半日而死為心不受邪故也療乳石熱發頭痛心痛胸脅脹滿寒熱手足逆冷或口生瘡爛或乾嘔惡聞食氣氣上欲絕久虛者方前胡芍藥黃芩大黃甘草炙各二兩大棗二十枚擘上六味切以水八升煮取三升分服若堅實加茯苓二兩若胸滿塞加枳實一兩炙若吐逆加乾薑二兩若口燥加麥門冬二兩增減以意量之忌如常法又療食失度口中發瘡漱之湯方黃芩三兩升麻甘草炙各二兩石膏五兩碎上四味切以水五升煮取三升去滓冷含漱口吐卻日十數過瘥止又療口瘡方子柏四兩龍膽三兩黃連二兩升麻一兩上四味切以水四升煮取二升別取子柏冷水浸投湯中令相得絞取汁稍稍含之取瘥忌如常法又若熱發腹內胸悉有瘡方升麻二兩烏梅十枚黃芩黃連栝蔞甘草炙各一兩上六味切以水五升煮取半去滓含之咽亦不妨又療體赤熱煩悶口中瘡爛表裹如燒痛不能食方黃芩三兩梔子仁二十一枚香豉二升大黃二兩上四味切以水四升煮取一升半去滓分服又塗飛雪湯方麻黃四兩去節石膏二兩碎黃芩三兩芒硝四兩上四味切以水八升煮取四升去滓內生雞子白二枚及芒硝攪令勻以拭瘡上取瘡瘥即止又療熱不散體生細瘡並熱不止方黃連芒硝各五兩上二味切以水六升煮取三升去滓內硝以拭瘡上取瘥為限又療紫石發動惡寒壯熱口舌乾焦方烏豆二兩上一味以水四升煮令稀稠得所如餳去豆下蜜二合更一兩沸以匙抄細細含之如腹中鳴轉欲利即停得利即瘥忌熱食陳臭物千金翼治發背癰疽又療石氣發熱身體微腫面生瘡方升麻葳蕤各六分黃芩紫雪各八分湯成下甘草炙犀角各四分梔子十四枚上七味切以水五升煮取二升內雪分服之以飛雪湯塗之即瘥千金翼同又療體卒熱生瘡麥門冬湯方麥門冬五兩去心豉二升桂心人參各二兩甘草三兩炙蔥白一斤上六味切以水一斗煮取三升去滓分服之忌如常法又療表裡俱熱身體生瘡或發癰癤大小便不利方芒硝湯成下黃芩知母甘草各二兩梔子仁二七枚大黃四兩上六味切以水五升煮取二升下芒硝分服忌如常法又療兩鼻生瘡熱癢內亦熱兼頭痛方麥門冬去心知母澤瀉甘草炙各二兩粳米五合竹葉切一升小麥二升上七味切以水一斗半煮竹葉小麥取九升去之內諸藥煮取四升去滓分服日三夜一忌如常法又療生瘡熱氣奔胸方豉一升蔥白切梔子仁各十四枚上三味以水二升煮取九合去滓分服之忌如常法又療石熱發煩熱滿脹及體生瘡兼氣力弱方黃芩芒硝麥門冬各二兩大黃三兩梔子十四枚甘草一兩炙上六味切以水六升煮取二升分再服之石發腹脹痞滿兼心痛諸形證方七首論曰服石之人髮狀非一或發於外陽則頭角皮膚作病癰腫頭痛是也或發於內陰則反冷臟虛口瘡吐血是也凡氣內溫五臟外榮經絡石性清淨不喜煩穢目所睹鼻所聞皆欲馨香不願郁腐因成種種之病也或食陳臭生酸之物貯於胃腑胃腑不受推諸臟諸臟不受即肝膈痞滿或為臚脹而堅積便發心痛亦非心自然而痛為穢觸神氣也覺此候者可速滌腸胃無令留壅不然即成痰澼其心轉痛豈能不勉哉靳邵療寒過度成痰澼水氣心痛百節俱腫者大黃丸方大黃葶藶子熬豉各一兩杏仁去尖皮熬巴豆各三十顆去皮心熬上五味大黃搗篩末四味別搗如膏入少蜜和更搗一千杵以飲下一丸如麻子稍強至二丸三丸以意量之忌如常法又療赤石脂發心痛飲熱酒不解方蔥白半斤切豉二升綿裹上二味以水六升煮取二升半分服之良又療大熱心腹滿脹方石膏半斤碎黃芩麻黃芍藥各二兩大青續斷各三兩上六味切以水八升煮取四升去滓分服之又療心腹痛不解若通身顫寒者營衛不通人參湯方麻黃三兩去節人參枳實炙黃芩甘草炙茯苓各一兩上六味切以水五升煮二升分服之又療散發心痛腹脹兼冷熱相搏甘草湯方甘草炙枳實炙白朮梔子各二兩桔梗三兩上五味切以水六升煮取二升分再服之忌如常法又療腹脹頭痛眼眶疼先有癖實不消或飲酒下食內熱或時時心急痛方甘草炙黃芩大黃別浸麥門冬去心芒硝各二兩梔子三十枚上六味切以水七升煮取三升分服之忌如常法又療石發動上氣熱實不除心腹滿小便赤大便不利痞逆沖胸口乾燥目赤痛方大黃一兩別浸黃芩三兩黃連甘草炙芒硝麥門冬去心各二兩上六味切以水五升煮取二升入大黃更煎三五沸去滓分再服之石發熱目赤方一十一首論曰凡人五臟盡有風而發有高下動有深淺則腎風發腳氣肝風目淚而暗肺風鼻鼽嚏而嗽脾風肉緩而重心風恍惚而忘若加於熱亦隨臟觀候即肝風脅滿而怒喜靜加之熱即目漠漠而暗若石氣兼之則赤而益痛或生胬肉及腫而爛速可隨輕重瀉之不然喪明矣經曰肝旺則目赤若兼石則冬慎勿食熱熱既不散遂成伏氣遇春必發預宜法防之即非石藥之過豈不惜哉黃帝曰形受味精受氣皆為飲食寒溫呼吸之召也諸臟仿此療眼久赤痛方干棗相接長一尺切黃連相接長一尺擘上二味以水一升煎三合綿裹夜臥點眼眥中以瘥為度忌如常法又瀉肝湯不服石人亦主之方大黃黃連石膏各二兩碎甘草炙黃芩細辛生薑半夏洗各一兩梔子十四枚擘上九味切以水八升煮取三升分溫服忌如常法又療眼赤閉目不開煩悶熱胸中澹澹瀉肝湯方前胡大青秦皮乾薑子芩細辛各三兩決明子三枚梔子仁二兩石膏八兩碎淡竹葉車前葉各切一升上十一味切以水一斗煮取三升去滓分服或加朴硝三兩得利即瘥忌如常法又療眼腫痛不開方精豬肉薄切以貼眼上熱即易之一方用子肝又以井花水浸更再用之取瘥又療久風目赤兼胎赤方光明鹽六分杏仁油五合又云半雞子上二味以淨銅鑼一尺面者一枚內鹽油即取青柳枝如筋大者一握急束截令頭齊用研之三日候如稠墨即先剜地作一小坑置瓦於底又取熱艾一鵝子許於瓦上燒火即安前藥鑼覆坑上令煙燻之勿令火滅候火盡可收置於銅合子或垍合子中每夜用點目眥間便臥頻點之取瘥通按前目病胎赤用此方又主眼生赤脈息內磣痛不開者方大棗七枚取肉黃連二兩碎綿裹淡竹葉切五合上三味以水二升煮竹葉取一升澄清取八合內棗肉黃連煎取三合去滓以點眼眥中瘥止又療目癢赤方黃連半兩碎丁香二七枚碎黃柏皮半兩切青錢七文蕤仁三七枚碎上五味以水二升煮取一升去滓以綿纏杖子頭點之妙扁鵲療令人目明發不落方取十月上巳日槐子去上皮不限多少於瓶中封口三七日初服一枚再服至二枚十日十枚還從一起甚驗又療發熱心腹脹滿小便赤大便難逆沖胸中口燥目赤痛方黃芩大黃各二兩梔子一兩豉三合上四味切以水三升煮取一升二合去滓分服又療目翳方干藍二分雄黃二分研上二味相和以少許點上三五度即便瘥石發痰結大小腹留壅老小虛羸方六首論曰夫老小尫羸為和氣不足寒氣獨積於地炎氣獨散於天天地不交故體成痞體成痞則肌肉不潤腠理不通胸膈氣急腸胃招滿為陰氣衝陽陽不接也或膀胱堅積支足沉疴為陽氣不能下營陰氣獨盛也致大腸留擁湯藥不下或水穀不消更加短氣若不利關格實不得其死也療羸劣老弱體性少熱因服石散而寒氣盛藥伏胸膈冷熱不調煩悶短氣欲死者藥既不行又不能大便作害於人急宜吐之方甘草四兩生用上一味切以水五升煮取折半去滓令頓服之當大吐藥亦與病俱去便愈矣夫散家患心腹痛服諸藥不瘥者服此甘草湯諸膈即通大便亦利甚驗又療甚虛弱去熱益氣力方竹葉切一升大棗二十枚擘黃耆四兩芍藥三兩甘草炙人參乾地黃升麻生薑各二兩桂心黃芩茯苓各一兩上十二味切以水一斗五升煮竹葉取一斗去竹葉入諸藥煎取三升分溫服之忌如常法又療散發後虛熱羸乏或腳疼腰痛本是虛勞人並挾風宜腎瀝湯方羊腎一具去脂膜切五味子三兩當歸甘草炙芎藭遠志去心芍藥麥門冬去心茯苓各一兩乾地黃生薑各四兩切黃芩桂心各一兩大棗二十枚擘上十四味切以水一斗煮腎取八升內諸藥煎取三升半去滓分服忌如常法又療性熱虛羸補益方生地黃二石細切蒸之極熟上一味以好酒一升灑之曝乾搗眾並手丸之每食前含一丸如胡桃大咽令盡日三五度甚妙又療人身體黃瘦不能食及服藥腰背拘急痛眠臥陷床沉重不能起行宜秋夏中服之方半夏洗茵陳各四兩生薑茯苓各三兩黃芩土瓜根梔子各二兩大黃一兩別浸上八味切以水八升煮取三升去滓分溫服耆婆湯療人風勞虛損補髓令人健方麻油一升牛酥一斤蔥白一握胡麻仁一升研豉二升以水二升漬一枚取汁蜜一升上酒二升上七味先於鍋中入油煎令沸著蔥白令色黃下酥蜜豉汁麻仁沸下酒成煎收不津器中盛之日服一匙兩匙或和酒服亦妙冷即加生薑一斤取汁乾薑末亦可用之石發大小便澀不通兼小便淋方一十六首論曰夫言大小便澀者皆繇大腸虛受邪氣所致也且腑有高下而肺腑系在天上中接土腑名之大腸為傳導之腑也有風氣熱結即大便乾澀而不通順或發癰腫口鼻乾燥或腎腑有虛則心肺俱熱使小便赤而澀也或腎氣虛熱膀胱不足加之以渴飲即小便淋澀皆繇臟虛不能主其腑也且形能受味氣能致精氣散則精虛味益則體實體實之人筋骨有餘因勞精氣精氣既衰即招其病故石氣流入膀胱作其淋疾則非正石氣而行此肺遭熱盛傳之於腎腎為精竭純陰自孤石氣懼陰不入便投其膀胱膀胱受邪遂成淋也淋狀合澀數赤熱而痛何以知之澀至故知肺傳於子也數至為子被母逼水急奔下也熱赤至為心與石氣相傳也痛至為本臟自虛客氣衝擊也所以服石藥者藉其少滋味而助精氣即神門之固病邪不能入也何以知因石虛竭虛竭之人其陰好怒而交接難畢其病名強中或不交接其精自流也或為消利為作消竭皆由少服諸石用之傷勞也夫遇茲候等可救其病失時不療便至夭枉不可全服補虛之藥恐變諸𤵲常以不虛不實於大腸不寒不燥於腠理能調神氣有何患乎療小便淋澀少腹痛方大黃芍藥茯苓各一兩麻仁四兩研上四味切以水五升煮取二升去滓分服之良又方桑螵蛸二十枚熬黃芩一兩上二味切以水一升煮取四合頓服之又療熱淋澀痛方車前草葵根各切一升通草三兩芒硝八分上四味切以水五升煮取二升去滓入芒硝分服之又療血淋不絕方雞蘇竹葉各一握葵子末石膏各八分碎蜀椒末四分上五味切以水二升煮取九合後下葵末服之又療初患淋方滑石五兩通草二兩石葦拭去毛瞿麥各三兩芒硝二兩湯熱下冬葵子二升上六味切以水九升煮取三升分服之忌諸熱物又療淋積年醫不能愈或十日五日一度發即可時或頻發不定方冬葵子滑石各八分茯苓芍藥子芩蒲黃芒硝各六分石葦去毛瞿麥各五分陳橘皮四分上十味搗散空腹煮後飲子和服一方寸匕加至二匕以小便通利為度忌如常法下散飲子方桑白皮六分白茅根十分通草八分甘草四分炙滑石十分上五味搗散煎湯服前散又卒患淋方取舡底青苔如雞子大以水一升煮服之又主熱淋方白茅根四斤切上一味以水一斗半煮取五升適寒溫飲之瘥止又石淋狀如碎沙石下者方車前子二斤以絹囊盛上一味以水八升煮取三升經宿空腹服之即石下又療煩熱身體微腫不能食飲小便不利方茯苓三兩甘草炙栝蔞根人參黃芩桂心白朮各一兩枳實二兩炙上八味切以水六升煮取三升去滓每服三合盡即瘥甚妙又療氣上不得食嘔逆大小便澀氣滿煩悶折熱下氣方前胡黃芩各三兩梔子大黃各一兩甘草炙茯苓生薑各二兩杏仁四十枚去尖皮碎上八味切以水八升煮取三升分服之忌如常法又療熱小便數少如淋葵子湯方冬葵子一升上一味以水三升煮取一升半分服之忌如常法又若大小便塞不通或淋瀝尿血陰中疼痛此是熱氣所致先以冷物熨之小腹又以熱物熨更互冷熱若小便數亦是取冷所致即暖將息也療發熱體氣昏昏不痛不癢小便赤澀方生茅根五大斤淨洗擇搗絞取汁服之瘥又若發熱口乾小便澀方取甘蔗去皮盡足吃之咽汁若口痛搗取汁服之又方取葳蕤五兩煮汁飲之瘥石發後變霍亂及轉筋方一十六首論曰服石之人體常多熱熱即引飲飢復加餐水穀既傷胃腑失度土既衰損木必來乘故曰肝入胃即泄或單下而不吐是肝乘之盛也木既剋土克過必宣二氣俱虛而肝必怒陽氣既乏則發轉筋變吐加腎肝之病也宜速止之仍溫足而兼復調以五味其病必痊矣療石發霍亂絞痛不可忍方茱萸一升上一味以酒三升煮取一升強服之得下瘥又療霍亂吐多者必轉筋不渴即臍上築者腎氣虛先療其築理中湯方人參桂心甘草炙各三兩乾薑二兩上四味切以水八升煮取三升分服又加白朮三兩又療霍亂轉筋入腹方取雞屎白乾者一方寸匕以水和頓服之又療轉筋入腹痛方灸腳心下當𧿹趾上七壯又方灸足大𧿹趾下約中一壯又幹嘔方灸手腕後中指兩筋間左上各七壯名間使又若吐止而下痢不止方灸臍下一跌約上二七壯又嘔不息者方薤白一握上一味切以水一升煮取六合頓服之又吐痢不止轉筋入腹欲死方生薑三兩切上一味以酒一升半煮三沸頓服之良又方藿香一把上一味以水四升煮取一升服之瘥艾亦佳又療轉筋不吐不下氣息急方木瓜一枚上一味切以水二升煮取一升服之瘥又方高良薑五兩捶碎上一味以酒二升煮取一升服亦主腹痛又方桑葉切二升上一味以水三升煮取一升三合去滓服之又療腹滿痛不可忍方取鹽一合熬以水二升煮取一升頓服即得吐止若吐痢止心中煩悶及渴不止取竹瀝一升分服即止不止心中復似冷取茱萸一兩於鐺中炒搗末以水二升煮取一升著少鹽澄清服之取瘥又療霍亂吐痢不止方粟米任多少研上一味以水攪如乳服之即瘥又療腳轉筋方灸兩大拇指爪甲後連肉處當中尖三壯石發後變下痢及諸雜痢方一十二首論曰凡石性剛烈氣多炎上理之傷溫即火轉為熾內煎脾肺脾肺苦熱遂成其渴飲水過量即溲腸胃胃得水則吐腸得水即金寒臟雖寒火炎不滅水漸流下而為行潦遂變擁腸胃虛冷水穀不消在陽益氣不餐在陰陽鳴而泄久將不瘥有成痢者經言嘔噦發下焦之間其斯之謂歟療下痢乾嘔服香豉多服之佳如不損更發宜服此方香豉二升乾薑三兩甘草二兩炙蔥白切一升上四味切以水五升煮取二升去滓溫分服之甚良又方乾薑五兩上一味切以水二升煮取一升去滓頓服之又療白赤痢兼熱悶方梔子仁十四枚薤白一握切上二味以水三升煮取一升二合去滓分服之良又療白痢方黃連一兩碎綿裹白蜜一合上二味以童子小便二升漬一宿煮取一升去滓入蜜分服之又方黃連一兩碎薤白切一升烏梅一握上三味以水二升煮取一升分溫服之又療解散已經快利熱尚不退兼痢不斷黃連湯方黃連一兩碎白粱米二合上二味以水五升煮取二升分服之又療癰腫熱盛取冷過多寒中下痢食完出方甘草炙乾薑附子炮各六兩蜀椒二百三十枚汗上四味切以水六升煮取三升分服之忌如常法又療天行兼有客熱下血痢止血破棺起死黃連湯方黃連四兩黃柏三兩梔子仁十五顆阿膠一兩炙乾薑枳實炙芍藥各二兩上七味切以水六升煮取三升分服之忌如常法又療解散除熱止痢黃連湯方甘草炙升麻各一兩黃連三兩豉五合梔子仁十四枚上五味切以水三升煮取一升分溫服之又解散因痢宜服甘草湯方甘草炙人參黃連各一兩梔子仁二十一枚上四味切以水五升煮取二升分服之又療熱毒赤白痢方羊肝去膜切以水洗二十遍血盡以粟米飯拌作麵餅上一味以水煮熟漉著漿水中淘之干漉以美蒜虀候極飢食之不過三兩頓即瘥又療水穀痢方取鯽魚無問多少治如食法以新布干拭斷血脈切作鱠以蒜虀食之取足候至夜要以白粥量事吃之即得瘥忌如常法石發兩腳卒冷兩脅腋卒熱並口噤方三首論曰經言脈有陰蹺陽蹺有陰搏陽搏此在三陰位也脈足太陰脾脈也脾為中州含藏陽氣壓本脈者矣若人之和平則脾能行陽氣暖其三陰三陰暖則足能舒適若脾虛不能含藏則地氣漸泄陽上騰則三陰堅塞足便冷也或有踵緩急不仁者則加之以腎肝之氣不足使少陰厥陰之闕也所以足無載運之功而不能蹺捷其力是陰搏其陽此由臟虛所生陽氣傷狂而陰不能獨理有因發熱口噤及腋下熱不可近者即三陽傷盛之所致也況服石增熱餐𩚵失度在陰為疹可外溫其足內置陽氣於三陰則愈也在陽為𤵲可微冷於外又以寒藥散其內熱其疴豈能逃乎療兩腳卒冷方以醋漿溫置盆中以浸腳即瘥又療口噤氣上欲絕方蔓菁子二升茯苓三兩蓼藍子人參薺苨甘草炙黃芩白朮各一兩上八味切以水二斗煮蔓菁子取八升去滓內余藥煮分服若口噤以物嚾之即瘥又療兩腋熱不得相近方滑石一斤寒水石三斤芒硝一斤上三味搗散取絹一尺分作袋盛散藥結口更互於腋下夾之勿住取涼冷止石發若熱解折下石方四首論曰五形之人其性各別則土形之人骨聳氣清水形之人體薄氣長木形之人筋骨粗聲圓而長火形之人性急氣尖而散其有固疾者則先服草藥病愈後始服石必速應也凡土火二形人性躁氣高而肥盛多火氣若更服石益之於炎物盛必衰自焚之名也若覺禍發速宜下之只如固疾之人服石者病氣久強石熱尚薄不能破其病但增其熱亦能損人若熱不濟者亦可速下自余形人服之者如有發動但以石投之自然而瘥不可見小熱即求大冷為山九仞終虧一簣醫者意也詳而行之臣億等按論中五形少金別無本校今闕蜂房飲解石余方露蜂房三兩上一味以水三升煮取一升去滓頓服不定三五日更服如熱悶服後方千金翼療石發熱困苦宜下石方露蜂房一升切以水二升煮取一升一服五六合日三服石從小便下如細沙盡停無所忌又下石方葛根紫草各八兩犀牛角十二兩屑露蜂房十兩炙芒硝大黃各二兩薺苨人參各七兩玄參甘草炙銀屑細研各四兩豬脂十二兩臘月者上十二味以無灰酒漬經十日其豬脂用酒一升煎取脂三兩取銀屑和研內藥中每日空腹服之一匙前合藥未得本法原本如此可求別定本細而勘之千金翼方中更有升麻葳蕤各七兩黃芩八兩梔子十四枚計十六味以無灰酒八升漬經十日豬脂用酒一升煎煉取三兩與銀屑和研內藥中每日空腹服之量力多少忌熱面炙肉海藻蒜等又療散發不可堪忍欲下之方肥豬肉五斤蔥白薤白各半斤上三味並搗研合器中蒸之令熟早朝啖之盡為度又療雖服乳石等而常患冷此由不先服瀉湯而服石等以其病藥各在一處丹石不行則病所以依舊患冷宜依此法瀉之冷自瘥石勢行方人參茯苓乾地黃當歸桔梗甘草炙芍藥各二兩大黃四兩上八味切以水三升煮取一升二合去滓分服之服石後將息飲食所宜法二首論曰服石所宜飲食時宜以自調護隨所取適若一一依方慎之則動成滯礙能依此法庶得通濟方取少脂豬肉一月二服百沸餺飥任性無妨新熟白酒少飲亦好及白羊頭蹄並豬肉作姜豉任作食之壓石肥肉黎柿等甚佳凡欲吃熱羊肉餺飥宜先食三五匙冷飯後吃之即不畏熱吃訖乃速以飯壓之行步適散乃可不慮致損生菜亦然蕓薹胡荽等亦不宜多食服石人有性好面嗜醋不能禁慎者宜食淡糠醋百沸紫餺飥及水漠餅即不慮熱冷韭羹亦大補時時宜食之諸飲食品類既多不可一一但言不得服所不宜者服石人亦不宜多飲酒飲酒多則失食味失食味則不多食不多食則令人虛熱虛熱則令石數發惡寒寡沉又損石力為酒能壓石故也多飲則損石勢亦令人風虛腳弱此由飲酒致之耳若能飲食者大佳甚妙其方藥如上服石特忌熱面陳臭哀孝哭泣憂恚大醋生蒜齏芥醬雞犬肉老牛肉鮑魚肉鮓衡熱忍飢冷酒有灰酒蕎麥小豆胡麻餺飥枸杞羹倉米臭魚脯勿承飢虛熱沐浴夏月不宜吃豬肉冷水恐致滑痢不止傷冷飲食不消或成霍亂特宜消息慎之紫餺飥並食飲將慎法三首千金紫餺飥方烏豆任多少煮取濃汁上一味以和麵稍鹽和之依常法作餺飥以此豆汁中熟煮可三二十沸溢添冷烏豆汁以豬羊肉為臛亦精好或以山芋粉尤妙又宜食麵餅方取面溲如家常作餅法細切如小豆許以面於簸箕中拌令圓煮之令極熟承熱任以諸肉作臛食之大涼補腰腳又夏月冒熱遠行早食晚失飢石氣發動作大麥餅將行在路食之亦壓得石氣凡患瘡腫無問大小或如黍米即須加意專精療之或以冷水淋或鹽湯洗以指擿破即以指甲細細掏旁邊亦以藥塗之或以蒼耳湯浸洗之或以冷石熨之即瘥夫服石將慎至難若不能將息特宜勿服非但服之若瘦熱更增他疾性行躁暴唯多忽恚飲食日減形體日消妻子不能供承卑下何其能濟此皆由將慎失度致使然也人之無檢慎勿輕服至於背圻腦裂藥物無及也婦人則髮乳體腫帷簿不修特宜審慎自量其力將息尤佳服石後防慎貯備雜藥等一首凡服石人當宜收貯藥等人參朴硝苦竹瀝大黃梔子大麥面好豉薺苨黃連升麻石膏荊瀝葛根並粉豬膏酥蜜紫蘇子白鴨屎粳米前胡冬葵子生薑冬瓜大豆車前地榆五加皮大小麥奴天門冬蔥白葳蕤麥門冬生地黃蘆根紅雪紫雪黃芩露蜂房
