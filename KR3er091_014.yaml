body:
  text: 卷第十四中風及諸風方一十四首灸法附病源中風者風氣中於人也風是四時之氣分布八方主長養萬物從其鄉來者而人中少死病不從卿來者人中多死病其為病也藏於皮膚之間內不得通外不得泄其人經脈行於五臟者各隨臟腑而生病焉心中風但得偃臥不得傾側若唇赤流汗者可療急灸心俞百壯若唇或青或黑或白或黃此是心壞為水面目亭亭時悚動者不可復療五六日而死肝中風但踞坐不得低頭若連兩目連額色微有青唇青面黃者可療急灸肝俞百壯若大青黑麵一黃一白是肝已傷不可復療數日而死脾中風踞而腹滿通身黃吐咸汁出者可療急灸脾俞百壯若手足青者不可復療腎中風踞而腰痛視脅左右未有黃色如餅粢大者可療急灸腎俞百壯若齒黃赤鬚髮直面土色者不可復療肺中風偃臥而胸滿短氣胃悶汗出視目下鼻上下兩邊下行至口色白者可療急灸肺俞百壯若色黃為肺已傷化為血不可復療其人當妄掇空指地或自拈衣尋衣縫如此數日而死診其脈虛弱者亦風也緩大者亦風也浮虛者亦風也滑散者亦風也出第一卷中深師療中風汗出乾嘔桂枝湯方桂心甘草炙各三兩大棗十二枚掰上三味切以水五升煮取二升半分三服一方用生薑五兩忌生蔥海藻菘菜又桂枝湯療中風身體煩疼惡寒而自汗出頭強痛急方桂心五兩生薑八兩甘草二兩炙葛根八兩芍藥三兩大棗十二枚掰上六味切以水七升煮取二升半服八合日三溫覆取汁陸伯庸用良忌生蔥海藻菘菜人玉曰此仲景桂枝加葛根湯方也今雲頭強痛急當作項強痛急才是又麻黃湯療中風氣逆滿悶短氣方麻黃三兩去節甘草二兩炙石膏四兩碎綿裹杏仁五十枚去兩仁及尖皮碎人參三兩乾薑五兩茯苓防風各四兩桂心三兩半夏一升洗上十味以水九升煮取三升先食服一升日三服甚良忌海藻生蔥羊肉餳菘菜又茯苓湯療中風入腹心下如刺不得臥或在脅下轉動無常腹滿短氣惙惙欲死此病或中虛冷或素有宿食食飲不消或素風氣在內今得他邪復於五臟故成此病方茯苓二兩芎藭乾薑芍藥白朮當歸人參各一兩枳實三分炙甘草炙一兩上九味細切以水九升煮取三升日三若病劇者可相去如人行五里頃一服胸中有氣可加人參二兩服一劑不瘥不過兩劑神良忌海藻菘菜桃李雀肉大酢並出第九卷中千金翼中風論聖人以為風是百病之長深為可憂故避風如避矢是以御風邪以湯藥針灸蒸尉隨用一法皆能愈疾至於火艾特有奇能雖曰針湯散皆所不及灸為其最要昔者華他為魏武帝針頭風但針即瘥華他死後數年魏武帝頭風再發他當時針訖即灸頭風豈可再發只由不灸其本不除所以學者不得專恃於針及湯藥等𣈂病畢瘥既不若灸安能拔本塞源是以雖豐藥餌諸療之要在火艾為良初得風之時當急下火火下即定此煮湯熟已覺眼明豈非大要其灸法先灸百會次灸風池次灸大椎次灸肩井次灸曲池次灸間使各三壯次灸三里五壯其炷如蒼耳子大必須大實作之其艾又須大熟從此以後日別灸之至隨年壯止凡人稍覺心神不快即須灸此諸穴各三壯不得輕之苟度朝夕以致殞斃誡之哉誡之哉又論曰學者凡將欲療病先須灸前諸穴莫問風與不風皆先灸之此之一法醫之大術宜深體之要中之要無過此術是以常預收三月三日艾最救急危其五月五日亦好仍不及三月三日者又有卒死之人及中風不得語者皆急灸之夫卒死者氣入五臟為生平風發強忍怕痛不灸忽然卒死謂是何病所以皆必灸之是大要也又論曰夫得風之時則依此次第療之不可違越若不依此當失機要性命必危又凡初得風四肢不收心神惛憒眼不識人言不出口凡中風多由熱起服藥當須慎酒面羊肉生菜冷食豬魚雞牛馬蒜乃可瘥得患即服此竹瀝湯方竹瀝二升生葛汁一升生薑汁三合上三味相和溫暖分三服平旦日晡夜各一服訖覺四體有異似好以進後方土弱日一云有荊瀝一升又方麻黃去節防風各一兩半芎藭防己附子炮人參芍藥黃芩桂心甘草炙各一兩生薑四兩杏仁四十枚去尖皮兩仁者羚羊角二兩屑竹瀝一升生葛汁五合一云地黃汁石膏六兩碎綿裹上十六味切以水七升煮取一半乃下瀝汁煮取二升七合分溫三服五日更服一劑頻與三劑慎如上法漸覺稍稍損次進後方忌豬肉冷水海藻菘菜生蔥又方竹瀝二升防己一兩麻黃三兩去節防風升麻桂心芎藭獨活羚羊角各二兩屑上九味切以水四升並瀝煮取三升分為三服兩日進一劑進三劑若手足冷加生薑五兩白朮二兩若未除次進後方忌生蔥等如前又方防風麻黃去節芍藥各一兩半防己桂心黃芩各一兩附子三分炮甘草炙白朮人參芎藭獨活各一兩竹瀝一升羚羊角二兩屑升麻一兩石膏二兩碎綿裹生薑二兩上十七味以水八升煮減半下瀝煮取二升半分三服相去如人行十里再服有氣加橘皮牛膝五加皮各一兩若除退訖可常將服後煮散忌豬肉冷水海藻菘菜桃李生蔥雀肉等又煮散方防風獨活芍藥黃耆人參芎藭白朮丹參薯蕷茯神桂心麥門冬去心山茱萸厚朴牛膝五加皮天門冬去心升麻羚羊角屑地骨皮秦艽石斛防己甘草各四分麻黃三兩去節甘菊花薏苡仁各一升石膏六兩橘皮三兩生薑二兩切乾地黃六兩附子三兩炮遠志三兩去心上三十三味搗篩為散每煮以水三升納藥三兩煮取一升綿濾去滓頓服之日別一服覺心中煩熱以竹瀝代水煮之千金有黃芩檳榔蒿本杜仲犀角無出茱萸薯蕷甘草麥門冬附子又凡患風人多熱宜服荊瀝方荊瀝竹瀝生薑汁各五合上三味相和溫為一服每日旦服煮散午後當服此荊瀝常作此將息防風湯主偏風甄權處治安平公方防風白朮芎藭白芷牛膝狗脊萆薢各一兩薏苡仁杏仁去尖皮兩仁者人參葛根羌活各二兩麻黃四兩去節石膏碎綿裹桂心各二兩生薑五兩切上十六味切以水一斗二升煮取三升分為三服服一劑覺好更服一劑一劑一度灸之服九劑湯九度灸之灸風池一穴肩髃一穴曲池一穴支溝一穴五樞一穴陽陵泉一穴巨墟下廉一穴合七穴即瘥仁壽宮備身患腳奉效灸環跳陽陵泉巨墟下廉陽輔即起行大理趙卿患風腰腳不隨不得跪起灸上髎二穴環跳二穴陽陵泉二穴巨墟下廉二穴即得跪起庫狄欽偏風不得挽弓灸肩髃一穴即瘥前方忌桃李生蔥千金翼本方並云針此云灸者蓋王道不取針也又一切風虛方常患頭痛欲破者杏仁九升去尖皮兩仁者曝乾上一味搗作末以水九升研濾如作粥法緩火煎令如麻浮上匙取和羹粥酒納一匙服之每食即服不限多少服十日後大汗出二十日後汗止慎風冷豬魚雞蒜大酢一劑後諸風減瘥春夏恐酢少作服之秋九月後煎之此法神妙可深祕之並出第十六卷中千金同備急療若卒覺體中恍恍皮肉習習此即欲中風方急取獨活桂心各五兩二味切以酒三升漬於火邊炙之使暖一服五合日三加至一升良忌生蔥千金同出第二卷中近效薏苡仁湯療諸風方薏苡仁五合葳蕤生薑茯神各三兩生犀角末二兩烏梅七枚麥門冬去心竹瀝各三合白蜜一合上九味切以水八升緩煮取二升七合汁絞去滓納竹瀝白蜜攪調細細飲之不須限以回數多少亦不限食前食後亦不限晝夜冷暖盡又合服亦不限劑數多少此飲但合服勿輕尤佳以防風候忌食米醋油脂陳敗難消等物以前方療暴風手足癱廢言語謇澀神情恍惚遊風散走或出諸四肢𤸷痹有所不穩似緑風候即合服之十日服一劑甚佳吳升處卒中風方七首千金芎藭湯主卒中風四肢不仁善笑不息方芎藭六分杏仁二十枚去兩仁尖皮碎黃芩當歸炙石膏碎綿裹麻黃去節桂心秦艽炙甘草炙乾薑各四分上十味切以水九升煮取三升分為三服忌海藻菘菜生蔥又主卒中風四肢不仁善笑不息方芎藭六分黃芩當歸桂心秦艽乾薑甘草炙麻黃去節黃連各四分杏仁二十枚去皮尖兩仁碎上十味切以水九升煮取三升溫服一升日三大汗忌生蔥海藻菘菜豬肉並出第八卷中崔氏小續命湯療卒中風欲死身體緩急口目不正舌強不能語奄奄惚惚神情悶亂諸風服之皆驗不令人虛方出小品余昔任戶部員外忽嬰風疹便服此湯三年之中凡得四十六劑風疾迄今不發余曾任殿中少鹽以此狀説向名醫咸云此方為諸湯之最要麻黃去節人參黃芩芍藥芎藭甘草炙杏仁去兩仁尖皮碎桂心各一兩防風一兩半附子一枚大者炮生薑五兩上一十味切以水九升煮取三升分為三服甚良不瘥合三四劑必佳取汗隨人風輕重虛實也有人腳弱服此方至六七劑得瘥有風疹家天陰節變輒合之可以防喑也忌豬肉冷水海藻菘菜生蔥千金有防己一兩如惚恍者加茯神遠志若骨節煩疼本有熟者去附子倍芍藥服之又續命湯方太府梁卿得效麻黃去節茯神生薑各三兩附子炮防己甘草炙各一兩半芎藭細辛白蘚皮杏仁去皮尖兩仁碎人參羌活桂心各三兩上十三味切以水八升煮取二升八合去滓分三服服別相去八九里許覆取汗可服三劑間五日一進慎如藥法本方云間五日一進若老弱虛羸非間十日以上不可頻服忌豬肉冷水海藻菘菜生蔥生菜大酢並出第六卷中備急療卒得中風急悶亂欲死方灸足大趾下橫紋隨年壯又不能語者方灸第三或第五椎上百五十壯並出第六卷中古今録驗小續命湯療卒中風欲死身體緩急目不停舌強不能語諸中風服之皆驗不令人虛方大附子一枚炮芍藥一兩生薑五兩芎藭一兩甘草一兩炙麻黃三兩去節白朮一兩木防己一兩防風六分黃芩一兩桂心一兩人參一兩上十二味㕮咀以水一斗三升煮取三升分三服甚良大善可作三四劑必佳忌豬肉海藻桃李生蔥菘菜出第十四卷中四時中風方四首古今録驗療中風發三春脈浮短者多凶大而長可療青龍湯方甘草一兩炙麻黃二兩去節桂心七寸大棗二十枚擘生薑芍藥各二兩上六味切以水六升煮取二升半分為再服初服覆取汗後即止忌海藻菘菜生蔥等物又療中風發三夏脈沉緊惡寒不汗煩三陽湯方當歸一兩生薑二兩甘草五分炙麻黃五兩去節杏仁四十枚去尖皮兩仁碎石膏二兩碎綿裹上六味切以水六升煮取半分再服忌海藻菘菜等物又療中風發三秋脈浮大而洪長扶金湯方葛根三兩獨活二兩附子一兩炮四破石膏二兩碎綿裹上四味切以水八升煮取三升服九合晝二夜一忌豬肉冷水等物又療中風發三冬脈浮大者溫脾湯方芎藭二兩石膏四分碎綿裹甘草四分炙黃芩三兩杏仁十四枚去尖皮兩仁碎麻黃六分去節蜀椒二分去目閉口汗防風四分桂心五分上九味切以水八升煮取三升分三服忌海藻菘菜生蔥等物中風發熱方三首深師十一味防風湯療中風發熱無汗肢節煩腹急痛大小便不利方防風當歸麻黃去節甘草炙各三分茯苓天門冬去心附子炮乾地黃白朮山茱萸二兩黃芩五分上十一味㕮咀以水九升煮取二升半去滓分服七合日三大小便不利納大黃人參各二分大棗三十枚掰生薑三兩忌海藻菘菜豬肉蕪荑大酢桃李雀肉等又防風湯療中風發熱頭痛面赤吸吸苦熱惡風煩悶身中悁悁而疼其脈浮而數者方防風白朮桂心蜀椒汗黃芩細辛芍藥人參甘草炙各一兩麻黃三兩去節石膏二兩碎綿裹大棗三十枚掰上十二味切以水九升煮取三升分三服忌海藻菘菜桃李生蔥生菜出第三卷中範汪療中風發熱大戟洗湯方大戟苦參上二味等分搗篩藥半升用醋漿一斗煮之三沸適寒溫洗之從上下寒乃止小兒三指撮之醋漿四升煮如上法肘後同出第一卷中賊風方一十二首病源賊風者謂冬至之日有疾風從南方來名曰虛風此風至能傷害於人故言賊風也其傷人也但痛不可抑按不得動轉痛處體平無熱傷風冷則骨解深痛按之乃應骨痛但覺身體內凜凜冷欲得熱物尉痛處即小寬時有汗久而不去重遇冷風相搏乃結成瘰癧及偏枯遇風熱氣相搏乃變作附骨疽也出第一卷中深師療賊風入腹五臟四肢心胸急痛背反寒咽乾口噤戴眼方此故是大續命湯藥分兩不同麻黃三兩去節石膏碎綿裹當歸芎藭甘草炙乾薑桂心各二兩黃芩一兩杏仁三十枚去兩仁尖皮上九味㕮咀以水酒各五升合煮取四升分為四服忌海藻菘菜生蔥又秦艽湯療賊風入腹搶心拘急四肢不隨腹滿欲死者方桂心防風黃芩乾薑茱萸秦艽甘草各一兩炙上七味切以水五升煮取一升半分再服湯令熱不瘥更作忌海藻菘菜生蔥又竹瀝湯療大虛挾風及賊風入腹腹中拘痛煩亂恍惚妄語迷惑不知人口噤不開手足緩縱飲食不作肉臥驚見屋中光口乾惡風時時失精夢寤沉重及婦人産後余病體虛受風躁憒欲死方秦艽甘草炙防風當歸各二兩茵芋烏頭炮乾薑細辛人參黃芩桂心天雄炮木防己茯苓白朮各一兩上十五味切以竹瀝一斗半煮取五升隨病加後藥胸逆滿加前胡二兩半半夏二兩洗朮附子炮各一兩腹中痛加芍藥二兩椒一兩汗煩加知母一兩口乾加麥門冬一兩去心體痹加麻黃二兩去節有方不用朮附子用半夏二兩忌海藻菘菜豬肉冷水生蔥生菜桃李雀肉酢物等又大續命湯療毒風賊風身體不能自收不知痛處咽中卒不得語若拘急腰痛引頸目眩不得見風坐欲卻倒覺即反張脊不著席脈動不安恍惚恐懼欲啼上氣嘔逆面腫方杏仁三十枚去雙仁皮尖碎芎藭石膏碎綿裹甘草炙桂心當歸麻黃去節黃芩各一兩乾薑一兩上九味切以水六升酒三升合煮取三升分為四服取微汗汗出粉之勿見風忌海藻菘菜生蔥又茵芋酒療賊風濕痹身體不能自動四肢偏枯火炙不熟骨節皆疼手足不仁皮中淫淫如有蟲行搔之生瘡癮疹起手不得上頭頭眩瞑甚者狂走歷節腫及諸惡風悉主之方茵芋烏頭炮天雄炮石南女葳附子炮躑躅花熬秦艽木防己防風各二兩上十味㕮咀以絹囊盛之清酒三斗漬之夏三日春秋五日冬七日平旦服一合不知稍增之可至二合以意消息忌如常法又甘草湯療心腹絞痛賊風入腹脹滿拘急不得氣息並轉筋寒中下重溫中止痛利大小便方甘草炙防風各一兩半吳茱萸乾地黃芍藥當歸細辛乾薑各一兩上八味㕮咀以水五升煮取三升分再服良忌海藻菘菜生蔥菜蕪荑又烏頭膏療賊風身體不隨偏枯口喎僻及傷風寒身強直方烏頭炮野葛炙五兩去心莽草一斤上三味㕮咀以好酒漬令淹漸再宿三日漬之以不中水豬肪五斤煎成膏合藥作東向露灶以葦薪煎之三上三下藥成去滓有病者向火摩三千過汗出即愈若觸露鼻中塞對火摩頭頂鼻中即通藥不可令入口眼也並出第九卷中千金療賊風所中腹內攣急方麻黃四兩去節甘草一兩炙切石膏如雞子大碎之綿裹鬼箭羽削圍如雞子大上四味以東流水二杯煮取一杯頓服之忌海藻菘菜又大岩蜜湯主賊風腹中絞痛並飛尸遁疰發作無時發則搶心脹滿脅下如刀錐刺並主少陰傷寒方甘草乾地黃細辛乾薑當歸羊脂青羊脂更勝桂心茯苓吳茱萸芍藥各一兩梔子十五枚掰上十一味切以水八升煮取三升去滓納脂溫分三服忌海藻菘菜生蔥生菜蕪荑酢物深師同小品治中惡一方無桂心有防風又烏頭湯主寒疝腹中絞痛賊風入腹攻五臟拘急不得轉側叫呼發作有時使人陰縮手足厥逆方烏頭十五枚炮芍藥四兩甘草二兩炙大棗十枚擘生薑一斤桂心六兩上六味切以水七升煮五味取三升去滓別取烏頭去皮四破蜜二升微火煎令減五六合納湯中兩三沸去滓服一合日三間食強人三合以如醉狀為知不知漸增忌海藻菘菜豬肉冷水生蔥深師同又倉公當歸湯主賊風口噤角弓反張身體強直方當歸細辛防風各六分獨活三分麻黃十分去節附子四分炮去皮上六味切以清酒八升水四升合煮取四升分為四服口不開者校口下湯一服當蘇再服小汗三服大汗忌豬肉生蔥廣濟同並出第八卷中古今録驗續命湯療中風賊風入腹角弓反張口噤舌不停目視不見不能語舉身不仁或心腹絞痛方甘草炙黃芩各二兩防風一兩半生薑五兩人參芎藭芍藥麻黃去節木防己各一兩大附子一枚炮上十味切以水一斗二升煮取三升分為三服一日令汗可服三劑不令人虛本方有十三味見藥止有十味忌海藻豬肉菘菜冷水魚等物出第十卷中歷節風方一十首病源歷節風之狀短氣白汗出歷節疼痛不可忍屈伸不得是也由飲酒腠理開汗出當風所致亦有血氣虛受風邪而得之者風歷關節與血氣相搏交擊故疼痛血氣虛則汗出風冷搏於筋則不可屈伸為歷節風也出第二卷中深師大風引湯療男女歷節風大虛手腳曲戾或變狂走或悲笑言語錯亂無所不療方茯苓防風當歸白前乾薑甘草炙各二兩大豆一升生薑獨活各三兩遠志去心附子炮人參各一兩大棗三十枚上十三味切先以水一斗五升煮豆棗取一斗去滓納諸藥煮取三升分為五服忌海藻菘菜豬肉醋物蒜面生菜等物出第九卷中千金論曰夫歷節風著人久不療者令人骨節蹉跌變成癲病不可不知古今以來無問貴賤往往苦之此是風之毒害者也療之雖有湯藥而並不及松膏松節酒若羈旅家貧不可急辦者宜服諸湯猶勝不療但於痛處灸三七壯佳又防己湯療風發歷節四肢疼痛如捶煅不可忍者方防己茯苓白朮桂心生薑各四分人參二兩烏頭七枚炮甘草三兩炙上八味切以苦酒一升水一斗合煮取三升半一服八合日三夜一當覺熱痹忽忽然慎勿怪也若不覺復合服以覺乃止凡用烏頭皆去皮熬令黑乃堪用不然至毒人宜慎之忌醋物桃李雀肉生蔥豬肉冷水海藻菘菜古今録驗同又大棗湯療歷節疼痛方大棗十五枚掰黃耆四兩附子一枚炮生薑一兩麻黃五兩去節甘草一尺炙上六味切以水七升煮取三升服一升日三忌豬肉冷水海藻菘菜古今録驗同又療歷節諸風百節痠疼不可忍方松脂三十斤煉五十遍不能五十遍二十遍亦可用上一味以煉蘇三升溫和松脂三升熟攪令極調旦空腹以酒服方寸匕日三數數食麵粥為佳慎血腥生冷酢物果子百日瘥又松節酒主歷節風四肢疼痛猶如解落方通按酘音投酒再釀也松節四十斤細銼以水四石煮取一石豬椒葉四十斤細銼以水四石煮取一石上二味澄清合漬干曲五斗候發以糯米四石五斗釀之依家醞法四酘勿令寒冷熱第一酘時下後諸藥柏子仁五兩磁石十二兩末獨活十五兩天雄五兩炮茵芋四兩炙防風十兩秦艽六兩芎藭五兩人參四兩萆薢五兩上十味細切納飯中炊之下酘為池酘足訖封頭四十日押取清適性服之勿令至醉吐忌豬肉冷水又方松膏一升搗酒三升浸七日服一合日再數劑即愈又方松葉三十斤酒二石五斗漬三七日服一合日五六並出第八卷中延年療歷節風四肢頭面腫方黃耆十二分獨活八分生地黃切三升曝乾豆豉一升熬鼠黏子三升曝乾上五味搗篩為散一服方寸匕飲汁下日二服加至二三匕忌蕪荑蒜面豬肉一方無鼠黏子又療歷節風流入腰腳方獨活六兩玄參四兩犀角屑升麻各三兩生地黃切三升曝乾豉三合熬鼠黏根切三升曝乾上七味搗篩為散服方寸匕飲汁下日二服加至二三匕忌蕪荑蒜面並出第十卷中古今録驗防風湯主身體四肢節解疼痛如墮脫腫按之皮急一作陷頭眩短氣溫溫悶亂如欲吐方防風桂心知母各四兩白朮生薑各五兩芍藥甘草各三兩炙附子二枚炮上八味切以水一斗煮取三升分為三服忌生蔥豬肉海藻菘菜桃李雀肉等出第四卷中千金有半夏杏仁芎藭為十味無附子中風角弓反張方七首病源風邪傷人令腰背反折不能俯仰似角弓者由邪入諸陽經故也出第一卷中肘後療中風無問男子婦人中風脊急身痓如弓紫湯方雞屎二升大豆一升防風三兩切上三味以水三升先煮防風取三合汁豆雞屎二味鎗中熬之令黃赤色用酒二升淋之去滓然後用防風汁和分為再服相去如人行六七里衣覆取汗忌風出第二卷中小品大岩蜜湯療中風身如角弓反張並生卒心腹絞痛方茯苓芎藭當歸甘草各一兩炙桂心二兩半梔子十四枚掰吳茱萸三兩細辛乾薑乾地黃各二兩上十味切以水八升煮取三升分為三服相去如行十里頃若痛甚者加羊脂三兩當歸芍藥人參各一兩心腹脹滿堅急者加大黃三兩忌酢生蔥生菜海藻菘菜蕪荑等出第四卷中千金小岩蜜湯主惡風角弓反張飛尸入腹絞痛悶絶往來有時筋急少陰傷寒口噤不利方大黃二兩雄黃一兩青羊脂乾薑桂心芍藥甘草炙細辛乾地黃各四分吳茱萸三兩當歸四兩上十一味切以水二斗煮取六升分六服重者加藥用水三斗煮取九升分十服忌海藻菘菜生蔥生菜深師同又療半身不隨手足拘急不得屈伸體冷或智或癡身強直不語或生或死狂言不可名狀角弓反張或欲得食或不用食大小便不利方人參桂心當歸獨活黃芩乾薑各三分甘草二分炙石膏六分碎綿裹杏仁四十枚去皮兩仁尖碎上九味切以井華水九升煮取三升分二服日二覆取汗不汗更合服之忌海藻菘菜生蔥等物又療賊風口噤角弓反張痓者方當歸防風各三分獨活六分麻黃去節五分附子一枚炮細辛二分上六味切以酒五升水二升煮取三升服一升口不開尺挍口下湯一服當開二服小汗三服大汗又單服荊瀝忌豬肉冷水生菜並出第八卷中備急療若身體角弓反張四肢不隨煩亂欲死者方清酒五升雞屎白一升熬上二味搗篩合和揚之千遍乃飲之大人服一升小兒服五合更小者服三合良肘後同出第二卷中必效療風入耳角弓反張及婦人風方烏豆二升熬令聲絶酒三升納鐺中急攪以絹濾頓服取汗不過三劑極重者和雞糞合熬若口不開者灌之良備急文仲同出第三卷中古今録驗療卒中風身體直角弓反張口噤西州續命湯方麻黃去節乾薑各三兩附子一兩炮防風桂心白朮人參芎藭當歸甘草炙各一兩杏仁四十枚去皮尖及兩仁碎上十一味切以水九升煮取三升未食分再服覆令汗出文仲同出第一卷中風口噤方一十首病源諸陽經筋皆在於頭三陽之筋並絡入於頷頰夾於口諸陽為風寒所客則筋急故口噤不開診其脈遲者生出第一卷中深師竹瀝湯療卒中惡風噎倒悶口噤不能語肝厥方淡竹瀝一斗防風葛根各一兩菊花細辛芍藥白朮當歸桂心通草防己人參各一兩甘草炙附子炮茯苓玄參各一兩秦艽生薑各二兩楓寄生三兩上十九味切以淡竹瀝一斗煮藥取四升分為四服忌海藻菘菜豬肉生菜生蔥醋桃李雀肉等物又甘竹瀝湯療卒中惡風噎倒悶口噤不能語肝厥尸蹶死不識人閉目灸針不知痛風狂宜服此湯方甘竹瀝一斗生薑三兩防風甘草炙各三兩防己麻黃去節人參黃芩白朮細辛茵芋秦艽桂心各一兩附子一枚仁者炮上十四味㕮咀以湯漬藥令赤合竹瀝煮取四升分為四服忌海藻菘菜桃李雀肉生蔥生菜豬肉冷水並出第十九卷中千金排風湯主諸毒風氣邪風所中口噤悶絶不識人身體疼煩面目暴腫手足腫方犀角末羚羊角貝齒末升麻末上四味各一兩和勻以方寸匕為一分水二升半納四匕煮取一升去滓服五合殺藥者以意增之若腫和雞子敷上日三老小以意亦可多合用