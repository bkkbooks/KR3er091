氣出引氣五息六息一出之為一息數至十息漸漸增益能至百息二百息病即除愈不用食生菜及魚肥肉大飽食後喜怒憂恚不得輒行氣唯須向曉清靜時行氣佳能愈萬病出第一卷中千金療心虛寒性氣反常心手不隨語聲冒昧其所疾源厲風損心白朮釀酒補心志定氣方白朮切地骨根皮荊實各三升菊花上四味切以水三石煮取一石五斗去滓澄清取汁釀米兩石用曲如常法以酒熟隨多少能飲常取小小半醉忌桃李出第八卷中古今録驗小續命湯療中風入臟身緩急不隨不能語方麻黃去節桂心各三兩甘草炙人參芍藥芎藭黃芩防風當歸石膏各二兩碎綿裹白朮一兩生薑五兩附子二枚炮杏仁三十枚去皮尖兩仁上十四味切以水一斗煮取三升分三服若不瘥可服三四劑一方石膏三兩忌海藻菘菜生蔥桃李豬肉出第四卷中風半身不隨方八首病源風半身不隨者脾胃氣弱血氣偏虛為風邪所乘故也脾胃為水穀之海水穀之精化為血氣潤養身體脾既弱水穀之精潤養不周致血氣偏虛而為風邪所侵故半身不隨也診其脈寸口沉細名陽中之陰苦悲傷不樂惡聞人聲少氣時汗出臂偏不舉又寸口偏絶者則不隨其兩手盡絶者不可療出第一卷中深師療風半身不隨口不能言十物獨活湯方獨活四兩桂心五兩生葛根八兩甘草炙防風當歸各二兩生薑十兩芍藥附子一兩炮半夏一升洗右藥切以水一斗煮取三升分為三服日三大驗忌海藻菘菜生蔥豬肉羊肉餳出第九卷中千金療卒暴風口面僻半身不隨不轉竹瀝湯方竹瀝三升防風防己升麻桂心芎藭羚羊角屑各二兩麻黃四兩去節上八味切以水四升合竹瀝煮取二升半分為三服三日服一劑常用忌生蔥廣濟同集驗無羚羊角余同又療心虛寒風半身不隨骨節離解緩弱不用便利無度口面喎斜薑附湯方乾薑附子炮各八兩麻黃去節芎藭桂心各四兩上五味切以水九升煮取三升三日一劑忌豬肉生蔥冷水崔氏同又療大風半身不隨方蠶砂兩石上一味熟蒸作直袋三枚各受七斗即熱盛一袋著患處如冷即取余袋一依前法數數換百不禁瘥止須羊肚釀粳米蔥白薑豉椒等爛煮熟吃日食一枚十日止千金不傳並出第八卷中古今録驗療大痹一身不隨或半身一手一臂口不能言習習不知人不覺痛癢續命湯方麻黃三兩去節防風二兩石膏碎綿裹黃芩乾地黃芎藭當歸甘草炙各一兩杏仁四十枚去皮尖雙仁桂心二兩上十味㕮咀以水一斗煮取四升服一升日再服之當汗出氣下自覆當慎護風寒不可見風並療上氣咳逆面目大腫但得伏不得臥更善忌海藻菘菜生蔥蕪荑又獨活湯療風半身不隨口不能語方獨活四兩生葛根半斤芍藥三兩防風二兩半夏一斤洗桂心五兩當歸附子炮甘草炙各二兩生薑十兩上十味切以水一斗五升煮取三升服一升日三一方去半夏用麻黃三兩去節忌羊肉餳生蔥海藻菘菜豬肉冷水等又八風續命湯療半身不隨手腳拘急不得屈伸體冷或癡或智身強直不語或生或死狂言不可名狀或角弓反張或欲得食或不用食或大小便不利皆療之方麻黃八分去節人參桂心當歸獨活甘草炙各三兩石膏六分碎綿裹黃芩乾薑各三分杏仁四十枚去皮尖兩仁上十味切以井花水九升煮取三升分為二服日二覆令汗汗解食白糜慎風不汗復更服唯汗得瘥忌生蔥海藻菘菜又八風九州湯療男子婦人寒冷不自愛護當風解衣汗出臥冷濕地半身不隨手足苦冷或不隨或俯仰屈伸難周身淫淫痹四肢不收狀如風狂飲食損少方麻黃四兩去節甘草炙乾薑附子炮防風獨活各三兩石膏綿裹茯苓白朮芎藭柴胡當歸人參各二兩杏仁四十枚去皮尖兩仁細辛二兩上十五味切以水一斗清酒五升漬三夜煮取四升分為三服一日令盡若病人羸瘦者用水煎服藥訖厚覆當汗出微微去上衣汗解以粉粉之忌生菜海藻菘菜酢桃李豬肉雀肉並出第四卷中癱瘓風方四首廣濟療癱瘓風及諸風手足不隨腰腳無力方驢皮膠五兩炙令微起上一味先煮蔥豉粥一升別貯又香淡豉二合以水一升煮豉去滓納膠更煮六七沸膠煬如餳頓服之及暖吃前蔥豉粥任意多少如吃令人嘔逆頓服三四劑即止風並瘥忌熱面炙豬肉魚蒜又療熱風癱瘓常發者方羌活二斤穀子一升五合水中取沉者上二味搗篩為散酒服方寸匕日三服稍加之無忌並出第一卷中文仲療癱瘓風方生地黃汁淡竹瀝荊瀝各一升防風四分獨活八分附子一枚中形正者炮上六味切三味以和地黃等汁煮取半升去滓空腹分再服取暖隔日一劑若虛三日一劑服可絶根大神驗忌豬肉蕪荑備急同出第八卷中元侍郎希聲集療癱瘓風神驗方側子一兩去皮五加白皮四兩磁石一斤綿裹甘菊花一斤漢防己羚羊角屑杏仁去皮尖各三兩乾薑一方作乾葛芍藥麻黃去節各四兩薏苡仁一升防風芎藭秦艽甘草炙各一兩上十五味切以水一斗二升煮麻黃去上沫納諸藥煎取三升分溫三服相去十里久將息取汗訖敷粉勿當風慎熱物及豬魚蒜酒出第一卷中風痱方三首病源風痱之狀身體無痛四肢不收神智不亂一臂不隨者風痱也時能言者可治不能言者不可治也出第一卷中千金療風痱方風痱者卒不能語口噤手足不隨而不強直是也方伏龍肝五升末冷水八升和攪取其汁飲之能盡佳範汪同兼主中惡出第八卷中古今録驗西州續命湯療中風痱身體不自收口不能語冒昧不識人不知痛處但拘急中外皆痛不得轉側悉主之方麻黃六兩去節石膏四兩碎綿裹桂心當歸甘草炙各二兩芎藭乾薑黃芩各一兩杏仁四十枚去皮尖兩仁上九味切以水一斗九升先煮麻黃再沸吹去沫後下諸藥煮取四升初服一升稍能自覺者勿熟眠也可臥厚覆小小汗出已漸漸減衣勿復大覆不可復服瘥前服不汗者更服一升汗出即愈汗後稍稍五合一服飲食如常唯忌生蔥海藻菘萊深師胡洽集驗文仲肘後千金同又續命湯治中風痱身體不能自收口不能言冒昧不知人不知痛處或拘急不得轉側姚云與大續命同兼療産婦大去血者及老人小兒方甘草炙桂心當歸人參石膏碎綿裹乾薑各二兩麻黃三兩去節芎藭一兩杏仁四十枚去皮尖兩仁上九味㕮咀以水一斗煮取四升服一升當小汗薄覆脊憑几坐汗出則愈不更服無所禁勿當風並療但伏不得臥咳逆上氣面目洪腫忌海藻菘菜生蔥範汪方主病及用水升數煮取多少並同汪云是仲景方本欠兩味出第八卷中偏風方九首病源偏風者風邪偏客於身一邊也人體有偏虛者風邪乘虛而傷之故為偏風也其狀或不知痛癢或緩縱或痹痛是也其湯尉針石別有正方補養宣導今附於後養生方導引法云一手長舒合掌一手捉頦挽之向外一時極勢二七左右亦然手不動兩向側勢急挽之二七去頭骨急強頭風腦旋喉痹膊內冷注偏風又云一足踏地一手向後長舒弩之一手捉湧泉急挽足弩手挽一時極勢左右換易二七去上下偏風陰氣不和出第一卷中廣濟療偏風麻子湯方大麻子一升淨擇水漬一宿麻黃去節防風生薑橘皮荊芥芎藭各三兩桂心二兩石膏五兩碎綿裹竹葉洗蔥白各一握豉心一合蜀椒三十枚汗去目杜仲五兩獨活四兩上十五味切以水二斗煮麻子令牙出去滓取一斗先煮麻黃三沸去沫納諸藥煎取三升去滓空腹頓服之令盡覆取汗以粉粉身勿衝風此藥補必不虛人亦不利有患風㽷及大風者不過三四劑忌生蔥生菜熱面蕎麥豬魚筍一切陳臭物又療偏風不隨服補麻子湯後次服枳實丸方枳實炙防風羌活人參羚羊角各六分屑甘菊花乾葛薏苡仁桂心各四分茯苓升麻黃連乾地黃各八分上十三味搗下篩蜜和為丸以酒空腹服如梧子二十丸加至三十丸日再忌生蔥酢物豬肉冷水蕪荑生菜熱面蕎麥雞魚蒜筍陳臭物並出第一卷中千金甘草湯療偏風積年不瘥手腳枯細口面喎僻精神不足言語倒錯方甘草炙桂心芎藭麻黃去節人參當歸芍藥各一兩獨活三兩秦艽一兩半茯神生薑各四兩防風一兩半附子炮側子炮各二枚白朮黃芩細辛各一兩甘菊花一升淡竹瀝四升上十九味切以水一斗煮麻黃去沫取汁七升納諸藥並瀝和煮取三升分為四服前三服訖間一杯粥更後服待藥勢自汗忌海藻菘菜桃李雀肉豬肉冷水生蔥大酢物等又方青松葉一斤搗令汁出清酒一斗漬二宿近火一宿初服半升漸至一升頭面汗即止並出第八卷中備急徐玉療偏風半身不遂兼失音不語方取杏仁生吞不去皮尖日別從一七漸加至七七周而復始食後即以竹瀝下之任意多少日料一升取盡文仲同出第二卷中延年療偏風半身不遂冷痹疰等方桃仁一千七百枚去兩仁尖皮以好酒一斗三升並大升斗浸經二十一日出桃仁曝乾搗令極細堪作丸即止日別再服服別三十丸還將浸桃仁酒服之禁食豬肉蒼耳余並不禁又小續命湯主偏風半身不遂口眼喎不能言語拘急不得轉側方麻黃去節防己附子炮去皮芎藭桂心黃芩芍藥人參甘草炙各一兩杏仁四十枚去皮尖兩仁生薑四兩切防風一兩半上十二味切以水八升煮取二升六合分為三服隔五日更服頻進十劑病不愈乃至二十劑忌海藻菘菜生蔥豬肉冷水並出第十二卷中又急療偏風膈上風熱經心臟恍惚神情天陰心中惛惛如醉不醉方淡竹瀝三升若熱多用竹瀝冷多用荊瀝羚羊角二分屑石膏十分碎綿裹茯神六分切上四味以水一斗合竹瀝煮取一升五合去滓食後欲消分為三服常能服之永不畏風發忌酢物經心録文仲同又方生附子一兩無灰酒一升上二味㕮咀附子納酒中經一七日隔日飲之一小合有病出無所怪特忌豬肉生冷醋滑並出第一卷中風猥退方三首病源風猥退者四肢不收身體疼痛肌肉虛滿骨節懈怠腰腳緩弱不自覺知是也皮肉薄弱不勝四時之虛風故令風邪侵於分肉之間流於血脈之內使之然也經久不瘥則變成風水之病出第一卷中千金療猥退半身不隨失音不語方杏仁三升去兩仁者及尖皮洗入臼搗二升令碎研如寒食粥法取汁八升煎取四升口嘗看香滑即熟反此為不熟唯熟為佳停極冷然後納好曲一升炊時以前所留一升杏仁肉取四升搗下水一斗六升煎取八升第一遍酘也次一炊復取杏仁三升研取一斗二升汁煎取六升第二酘也次一炊準第二酘取杏仁汁多少為第三酘也疑米不足別更取二升杏仁研取八升煎取四升重斟酌炊米酘若猶不足研杏仁二升取八升汁煎取四升更酘之以熟為限一石米杏仁三斗所以節次研杏仁者恐並煎汁酢故也若冬日任意並煎準計三斗杏仁取一石六斗煎取八斗四升漬曲以外分之酘饙酒熟封四七日開澄取清然後押糟糟可乾末和酒服之大驗士弱氏口酘音豆酘酒也饙音分一蒸飯也又方萆麻子脂一升酒一升上二味銅鉢盛著酒中一日煮之令熟服之並出第八卷中千金翼療猥退風方蒼耳子五升苗亦得羊桃二升切蒴藋切赤小豆各二升半鹽二升上五味以水兩石五斗煮取五斗適寒溫納所患之腳漬深至絶骨勿過之一度炊二斗米頃出之慎風冷汗從頭出出第八卷中風嚲曳及攣躄方二首病源風嚲曳者肢體弛緩不收攝也人以胃氣養於肌肉經脈也胃若衰損其氣不實氣不實則經脈虛經脈虛則筋肉懈惰故風邪搏於筋而使嚲曳也出第一卷中範汪療中風躄不能起逐水消食平胃下氣方百部四分烏頭炮牛膝白朮各一分上四味搗下篩以酒服方寸匕日三稍增可至三匕良忌豬肉冷水桃李出第二十卷中古今録驗療風懿不能言四肢不收手足嚲攣獨活湯方獨活四兩生薑六兩甘草炙桂心生葛根芍藥栝蔞各二兩上七味㕮咀以水五升煮取三升服一升日三忌海藻菘菜生蔥出第四卷中柔風方二首病源血氣俱虛風邪併入在於陽則皮膚緩在於陰則腹裡急柔風之狀皮外緩腹裡急四肢不能自收裡急不得伸息者柔風侯也出第一卷中深師療柔風體疼白汗出石膏散方石膏二兩研甘草一兩炙上二味搗篩為散以酒服方寸匕可以七服武家黃素方出第九卷中古今録驗療中柔風身體疼痛四肢緩弱欲不隨獨活葛根湯産後中柔風亦用此方羌活桂心乾地黃葛根芍藥各三兩生薑六兩麻黃去節甘草炙各二兩上八味切以清酒三升水五升煮取三升溫服五合日三忌生蔥蕪荑海藻菘菜範汪同出第八卷中許仁則療諸風方七首許仁則療諸風病方此病多途有失音不得語精神如醉人手足俱不得運用者有能言語手足不廢精神昏恍不能對人者有不能言語手足廢精神昏亂者有言語手足精神俱不異平常而發作有時每發即狂言浪語高聲大叫得定之後都不自醒者有諸事不異尋常發作有時每發即狂走叫喚者有時每發即作牛羊禽獸聲醒後不自覺者有諸事不異尋常發作有時發即頭旋目眩頭痛眼花心悶輒吐經久方定者有諸事不異平常發作有時每發即熱頭痛流汗不能自勝舉者此等諸風形候雖別尋其源也俱失於養生本氣既羸偏有所損或以男女或以飲食或以思慮或以勞役既極於事能無敗乎當量已所歸而舍割之靜思息事兼助以藥物亦有可復之理風有因飲酒過節不能言語手足不隨精神昏恍得病經一兩日宜合生葛根等三味湯服之方生葛根一挺長一尺徑三寸生薑汁一合竹瀝二大升如不可得宜用䈽竹根一大升切以水一大斗緩少煎取二大升以代竹瀝如竹根不可得以䈽竹葉繃切一大升以水一大斗如上法煎取二大升以代竹瀝如無竹葉宜細切弩條一大升以水一大斗煎取二大升代之上藥先取生葛根淨洗刷使搗極碎且空榨取汁令盡訖又搗即以竹瀝潑灑極榨取汁汁盡又搗潑灑不限遍數以葛根粉汁盡為度用生薑汁綿濾之細細緩服之不限遍數及食前食後如覺腹內轉作聲又似痛即以食後溫服之如此經七日以後服附子等十味湯又附子湯方附子二枚共稱重一兩半者炮生薑乾薑各三兩桂心一兩石膏六兩碎綿裹生犀角屑地骨白皮白朮獨活芎藭各二兩上藥切以水八升煮取二升半去滓分溫三服服相去如人行十里久服服湯後如覺欲汗少覆之令汗出須臾歇汗後以藥末粉身其湯須服五六劑間三四日服一劑其方一劑後量患進退臨時加減藥物熱多加生麥門冬一兩去心冷多加桂心一兩有痛加當歸二兩不能食加人參二兩大便澀加檳榔七枚合皮子用之忌豬肉生蔥桃李雀肉等又療風熱未退服湯日數未滿病後未堪服丸宜合薏苡仁等十二味飲服之方薏苡仁一升葳蕤五兩生麥門冬二兩去心石膏八兩碎綿裹杏仁六兩去尖皮兩仁碎烏梅四十枚掰生薑八兩生犀角屑地骨皮各三兩人參二兩竹瀝一升白蜜二合上藥切以水一斗煮十味取三升去滓納竹瀝白蜜攪調細細飲之不限冷暖及食前後若熱多即食前冷飲冷多即食後暖飲如服丸藥以飲送彌佳又療風熱未退頻服湯飲力不能攻宜合苦參十二味丸服之方苦參乾薑芎藭各六兩玄參丹參人參沙參白朮各五兩地骨白皮獨活各四兩薏苡仁二升蜀升麻二升上藥搗篩蜜和為丸用薏苡仁飲下之初服十五丸日再服稍稍加至三十丸如梧子大若覺冷即去玄參沙參加桂心四兩細辛三兩若覺熱別加十兩生地黃若覺有痛處去沙參加當歸六兩若覺有氣去玄參加橘皮四兩若大便澀加大檳榔仁二十枚忌桃李生蔥生菜蕪荑又至九月以後二月以前宜合五加皮等入味藥酒細細用下前丸飲之方五加皮薏苡仁大麻仁熬各五升丹參五兩生薑生地黃各四斤桂心五兩大豆一斗熬上藥切以絹袋盛用無灰清酒六斗浸六七日細細取下前丸初服一二合再服稍稍加至五六合能至一升亦佳忌生蔥蕪荑又預防熱病急黃賊風乾葛散方乾葛乾地黃各三斤新香豉心一升上三味曝令乾搗篩為散每食後服一方寸匕日再服稍稍加至三匕牛乳蜜湯竹瀝粥飲梅漿任意下之又依前乾葛等三味散服之雖覺熱氣少退熱未能頓除宜合黃連等八味散服之方黃連黃芩乾薑蜀升麻知母乾地黃各一斤梔子仁大青各半斤上藥搗篩為散每食後飲服一方寸匕日再服稍加至二匕若能食飲適寒溫男女節勞逸候體氣服前方乃至終身無熱病急黃暴風之慮忌豬肉冷水蕪荑吳升同並出上卷中張文仲療諸風方九首元侍郎希聲集張文仲方九首奉敕語張文仲等諸患風氣醫人處方多不同可共諸名醫修一本進來仍令殿中監王方慶專勾當臣文仲言臣準敕諸名醫集諸方為一卷風有一百二十種氣有八十種風則大體共同其中有人性各異或冷熱庸醫不識藥之行使或冬藥夏用或秋藥冬用多殺人唯腳氣頭風大風上氣此四色常須服藥不絶自余諸患看發即依方吃藥夫患者但春夏三四月秋八九月取利一行甚妙臣所進此方不問四時皆得服輕者服小方重者服大方藥味雖同行使殊別謹上如後桑枝煎療偏風及一切風方桑枝銼一大升不用全新嫩枝上一味以水一大斗煎取二大升夏月井中沉恐酢壞每日服一盞空腹服盡又煎服若豫防風能服一大升終身不患偏風無忌又療風飲子方羌活三兩桂心半兩人參一兩蜀升麻茯神防風生薑合皮切生犀角屑各二兩上八味切以水一大升煮取二大合分溫三服如熱下竹瀝一盞一無禁忌唯忌生蔥酢又方仲云四時俱服神方十九味丸防風羌活五加皮芍藥人參丹參薏苡仁玄參麥門冬去心乾地黃大黃青木香各六分松子仁磁石各八分研檳榔子十分枳實炙八分牛膝八分茯神八分桂心八分上十九味搗篩蜜和為丸如梧子以酒服十五丸日再服稍稍加至三十丸為度忌豬肉魚蒜生蔥酢蕪荑又療一切風及偏風發四肢口目喎戾言語謇澀其湯不虛人勝於續命湯故録傳之特宜老人用之方生地黃汁竹瀝荊瀝以上三味汁各取一升五合羌活防風各二兩蜀附子大者一枚生用去皮八九破重一兩者有神上六味切納前三瀝汁中寬火煎取一升五合去滓溫分二服服別相去八九里風甚頻服五六劑驗不可論特宜老小等無問冬夏並同服之無忌隔三日服一劑益佳忌豬肉蕪荑又煮散方茯神六兩防風牛膝枳實炙防己秦艽玄參芍藥黃耆白蘚皮澤瀉獨活各四兩桂心三兩五味子一升碎人參四兩薏苡仁一升碎麥門冬一兩去心羚羊角二枚屑石膏一斤碎綿裹甘草三兩炙磁石二十四兩綿裹上二十一味切如麻豆分作二十四帖每日取一帖著杏仁十四枚去尖皮兩仁者碎以水三升煮取一升去滓空腹頓服每春中夏初服禁生冷忌醋生蔥海藻生菜又療一切風乃至十年二十年不瘥者方牛蒡根細切一升生地黃細切牛膝細切枸杞子微碎各三升上四味取無灰酒三升漬藥以疏絹袋盛之春夏一七日秋冬二七日每服皆須空腹仍須稍稍令有酒色又寒水石煮散方寒水石石膏滑石白石脂龍骨各八兩桂心甘草炙牡蠣各三兩熬赤石脂乾薑大黃各四兩犀角一兩屑上十二味搗以馬尾羅篩之將皮囊盛之急系頭挂著高涼處欲服以水一升煮五六沸納方寸一匕藥煮七八沸下火澄清瀉出頓服服之每日服亦得百無所忌小兒服之即以意斟酌多少忌生蔥海藻菘菜又五粒松酒方冬十月以去服五粒松葉七斤並大片麻黃七兩去節防風黃耆獨活秦艽各二兩牛膝四兩生地黃一斤芎藭二兩上九味切以無灰清酒四大斗漬春七日冬二十日夏五日日別二三度服服別大合四合以來忌如藥法又釀酒法糯米一升曲一升半防風半斤切蒼耳子三升上四味以水八升煎取六升米曲一時拌於瓷器中盛暖著一周時即熟若須重釀任情覺冷加五味子一升並出上卷中
