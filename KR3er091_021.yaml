body:
  text: 卷第二十一天竺經論眼序一首隴上道人撰俗姓謝住齊州於西國胡僧處授蓋聞乾坤之道唯人為貴在身所重唯眼為寶以其所繫妙絶通神語其六根眼最稱上是以療眼之方無輕易爾敘眼生起一首謝道人曰夫眼者六神之主也身者四大所成也地水火風陰陽氣候以成人身八尺之體骨肉肌膚塊然而處是地大也血淚膏涕津潤之處是水大也生氣溫暖是火大也舉動行來屈伸俯仰喘息視瞑是風大也四種假合以成人身父母精血實斯增長而精成者也其眼根尋無他物直是水耳輕膜裹水圓滿精微皎潔明淨狀如寶珠稱曰眼珠實無別珠也黑白分明肝管無滯外托三光內因神識故有所見凡人不解謂眼有珠喻若魚之被煮此事不然夫魚畜水陸之有目者悉皆是水無有別珠直以湯火煎煮水凝結變自成珠但看生魚未被煮炙豈有珠義直置死魚水已凝厚論其活者水亦輕薄出眼疾候一首謝道人曰夫人眼白睛重數有三設小小犯觸無過傷損但黑睛水膜止有一重不可輕觸致敗俄頃深可慎之凡人不究謬據多重或七或五此皆是其妄説一家成言耳然眼之精微水映輕薄無所堪耐易致諸疾故學療之者事須安審不可粗疏恐致毀傷患眼之家自須謹慎諸所禁忌悉不應犯若覺有疾即宜早療當及其初根腳未立則易驅遣若其久後根盤四布既成痼疾雖復行療極難成效且身稟四大性各不同是以治者證候非一冷熱風損疾生不同傷勞虛實其方各異宜應察其元起尋究本根按法依源以行療救不得謬濫措方以乾薑療熱毒之眼以冷水療風寒之目非直冷熱無效蓋亦致患俄頃常見愚人不識病源直尋古方輕欲立療或經有疾遇藥得愈便以此法遞相傳授都不知病有冷熱之殊虛實之異或有道姑嬤嫗為人求食輕得有損寧慮幽冥良為病家不別真偽聞語便從遂使應愈之病增為痼疾驪珠之眸永成盲瞽一何可哀故目有條貫以示後人皆苦眼無所因起忽然膜膜不痛不癢漸漸不明久歷年歲遂致失明令觀容狀眼形不異唯正當眼中央小珠子里乃有其障作青白色雖不辨物猶知明暗三光知晝知夜如此之者名作腦流青盲眼未患時忽覺眼前時見飛蠅黑子逐眼上下來去此宜用金篦決一針之後豁若開云而見白日針訖宜服大黃丸不宜大泄此疾皆由虛熱兼風所作也眼疾品類不同候一首謝道人曰苦有人若患眼漸膜膜狀與前青盲相似而眼中一無所有此名黑盲宜針刺服藥如瞳子大者名曰烏風如瞳子翳緑色者名為緑翳青盲皆是虛風所作當覺急須即療湯丸散煎針灸禁慎以驅疾勢若眼自暗多時不復可療此疾之源皆從內肝管鈌眼孔不通所致也亦宜須初欲覺時即須速療之若已成病更不復可療亦無勞措意也若因時病後得眼生白障者此名為翳也為熱毒所作宜應速服湯丸依法鐮之敷食翳散若因病後生肉者此為膚障也後卷並無食翳散通按後方敷翳皆令翳除食即除字意此是風熱所作宜服湯丸鉤割除之若眼赤癢淚出者為熱虛風服散煎除之若見黑煙赤光瞳子黑大者為烏風勞水動故宜服車前空青丸以消息之若眼忽爾赤痛者此是天行眼痛風熱所作應宜早急療之不者當生於翳後難療若人眼痛當黑珠生白翳並黑子等大如米如此之者名為痛損眼此不易可療勿輕犯觸但眼因破損有物撞作翳障瘢痕者悉不可療亦無勞措意通按勞水動三字疑有闕文眼將節謹慎法一首謝道人曰五行雲肝者眼家之根本此乃一家之同類而言無實五臟六腑悉皆相連故欲療眼而審其虛實察其由起既識病源宜先作內療湯丸散煎事事分明既服諸藥便須依方謹慎凡欲療眼不問輕重悉不得以風霜雨水寒熱虛損大勞並及房室飲食禁忌悉不得犯若虛勞冷者宜服補肝丸出千金翼第十卷十五味在此卷下也若人患眼不值明師遇道姑嬤嫗欺詐妄語云犯神鬼或以環鉤或復蒜熏或火燒針尉此皆不識病源而逆療包陰陽為益實微動致傷余見此途內懷矜愍學療之者勿習是方非直疾勢不除亦自奇成蠱道此法中文句疑昧金別季校眼暴腫痛方一十首謝道人療眼暴腫毒痛不可忍欲生醫方決明子一升石膏四兩研升麻四兩切梔子仁一升地膚子茺蔚子各一分苦竹葉切二升干藍葉切一升芒硝二兩車前草汁一升二合冬瓜子三升為末上十一味以水二斗煮竹葉取七升二合去滓納諸藥煮取四升分為四服每服相去可兩食間再服為度小兒減藥以意裁之又療眼暴腫痛方苦竹葉一升柴胡二兩蛇街二兩黃連白芒硝細辛各一兩上六味切以水三升煮取一升去滓溫服之忌豬肉又方秦皮黃連各一兩苦竹葉一升上三味切以水五升煮取八合洗眼與前方相類眼忽腫痛盲須煮秦皮作湯洗是主療也忌豬肉又方細辛蕤核仁盧鹽各一兩決明子二兩上四味切以地骨汁煮取一升半去滓更以蜜一升半合煎取一升半與前方同又療眼天行暴腫癢痛方地骨皮三斤切上一味以水三斗煮取三升絞去滓更納鹽二兩煎取一升敷目或加乾薑一兩又方前胡三兩芍藥青葙子決明子細辛各二兩車前子五合梔子淡竹葉切一升上九味切以水九升煮取三升溫分為三服忌生菜又方半夏一升洗生薑八兩前胡四兩枳實二兩炙細辛一兩烏梅十二枚擘上六味切以水七升煮取二升半溫分為三服忌羊肉餳生菜又方甘草一兩炙粟米三合甘竹茹雞子大蘆根五兩上四味切以水八升煮取二升七合分為三服忌海藻菘菜又療兩眼痛大黃湯方大黃四兩芍藥五兩細辛甘草炙各四兩黃芩二兩上五味切以水七升煮取二升半溫分為三服甚妙又方大黃八兩切上一味以水五升漬之一宿明旦絞取汁分三服之病甚多由脾實以上忌油膩生冷房室蒜菜酒面等物目赤痛方二十一首病源凡人肝氣通於目若肝氣有熱熱衝於目故令赤痛出第二十八卷中廣濟療目赤病及胎赤方以蚌蛤裹置蜜二分鹽碌一分夜臥火炙暖著目眥二四日瘥止又方豬膽和鹽碌五分點眥效深師療眼赤痛除熱黃連煎方黃連半兩大棗一枚切上二味以水五合煎取一合去滓展綿取如麻子注目日十夜再忌豬肉集驗療目赤痛方甘竹葉二七片烏梅四兩碎大錢三文上三味以水二升洗漬藥半日早向東灶煮之三沸三上三下取二合臥以注目眥又療目赤痛洗眼方蕤核仁二十枚碎苦竹葉一把細辛半兩上三味以水三升煮取半升以洗眼日三五度甚妙刪繁療眼赤洗眼竹葉湯方淡竹葉五合黃連四枚青錢二十文大棗二十枚去皮核梔子仁七枚車前草五合上六味以水四升煮取二升以洗眼日六七遍此方甚良忌豬肉千金療眼赤暗方杏未熟時杏仁汁一合鹽五兩青錢三文上三味合納瓷器中封頭勿令泄百日後出著四眥頭日二三千金翼療赤眼方杏仁四十九枚去皮尖絹袋裹飯底蒸之承熱絞取脂以銅青胡粉各如大豆乾薑石鹽各如半大豆許熟研之以雞毛沾取掠眼中眥頭日三夜再又方杏仁脂一合鹽碌如棗核大印成鹽三顆上三味取杏仁脂法先搗杏仁如脂布袋盛蒸絞取脂置密器中納諸藥直坐著其中密蓋二七日夜臥注目四眥不過七度差止又療赤眼不問久遠方硼砂三兩以酢漿垍器中浸日中曝之三日藥著器四畔乾者取如粟大夜著兩眥不過三四度永瘥並石鹽石膽等分尤佳並出第十一卷中通按垍乃堅土或系粗瓦罐如罌類也張文仲療兩眼熱赤方東壁上土帛細羅納如豆大兩眥中令淚出三五度即瘥常用大效肘後同又傳效療眼赤無新久皆差神驗方石鹽棗核大人乳一棗許置故銅碗中以古錢十文研之使青稠著碗底取熟艾急搏一雞子許掘地作小坑子坐艾於坑中燒使煙出以銅碗覆上以土擁四邊勿令煙出量艾燃盡即止刮取著碗青藥每以半豆許於蛤蚌中和棗核大人乳汁研細以綿纏杖頭注入兩眥夜即仰臥著之至五六度必瘥無石鹽以白鹽無古錢以青錢替之亦得肘後同延年療眼赤熱不能得好差此由肝中客熱不絶方黃連三兩秦皮三兩上二味切以水三升煮取一升五合去滓食後溫服分二服如人行七八里服必效同又療眼赤飲方前胡黃連秦皮黃芩梔子仁各三兩決明子二兩半蕤仁一兩碎竹葉一升上八味切以水六升煮取二升五合去滓分三服食後服之忌豬肉又療眼赤方蕤仁黃芩梔子仁黃連秦皮各二兩竹葉一升上六味切以水五升煮取一升六合分三服又療目赤熱方前胡二兩防風決明子黃連蕤仁各二兩竹葉一升上六味切以水六升煮取二升分為五服又竹葉飲主痰熱眼赤頭痛方竹葉一握犀角屑升麻乾葛各二兩黃芩麥門冬各三兩去心上六味切以水六升煮取二升分為三服又方竹葉一握麥一升淘地骨白皮三分上三味以水五升煮取二升以麥熟為度食後分二服蔣孝璋處此方近效療眼赤痛眼漠漠方硝石研末於眼四角各點一粟許須臾熱淚出便睡睡覺以漿水洗又明目又療赤眼及眼睛上瘡方秦皮一大兩以清水一大升於白瓷碗中浸春夏一食久以上看碧色出即以箸頭纏綿點下碧汁仰臥點所患眼中仍先從大眥中滿眼著微痛不畏量久三五度飯間即側臥瀝卻熱汁每日十度以上著不過兩日瘥忌酢蘿蔔李諫議近效方又敕賜源乾曜療赤眼方生石蜜硃砂光明者石鹽芒硝鹽碌石決明去粗皮細研各六分蕤仁三百顆黃連宣州者細辛各一兩烏賊魚骨長二寸去甲上十味搗篩細研欲著時少少取白蜜和置眼兩大角中如緑豆許大仍不避風日唯破及枯除此並差萬金不傳忌豬肉生菜胎赤久赤方七首病源胎赤者是人初生洗目不淨令穢汁浸漬於眼使瞼赤爛至大不瘥故云胎赤出第二十八卷中千金療胎赤眼方取槐木枝如馬鞭大長二尺齊頭麻油一匙置銅鉢中旦使童子以水研之至瞑止取夜臥時以塗目眥日三度瘥止崔氏療三五十年眼赤並胎赤方西域法太常丞昌才道效生烏麻油半雞子許著銅器中以細蠣石磨之使述述不能研乃止熟艾三升杏仁一升去尖皮黃連一兩雞糞一升鹽一合亂頭髮如半碗許大上七味穿一坑其形如瓶口小里大燒使干別開一小風孔以前藥並艾等一重重布著坑內狀如灸炷以火燒之將前所磨銅器以蓋坑口煙盡收取銅器上脂煙敷眼眥瘡上欲臥時著胎赤三十五十年者不過三兩日瘥忌豬肉又方胡粉六分蕤仁四分上二味先研蕤仁使碎納胡粉中更熟研又搗生麻子為燭燃使著別取豬肪脂於燭焰上燒使脂流下滴入蕤仁胡粉中更研攪使均如餳以綿纏細杖子納藥內承軟點眼兩眥藥須臾冷還於麻燭上燒而用之又療積年赤眼方取古字錢四十九文重著又取石鹽末填心孔中令滿以五月五日中於石上用烈炭火燒令極赤然後納一升醶酢中以傾罌內用四十九重紙封一日去一重去盡然後用一黍米大點眼眥中極效並出第四卷中必效主眼風赤久胎赤方銅鏭鑼一尺以下面者一枚著石鹽末如杏仁許油脂半雞子許相和合鹽取柳枝如箸一握急束齊一頭用研油脂三日狀如墨取熟艾如雞卵大剜地作小坑置幾於下安艾著火合銅鏭鑼於上其下仍令通氣火盡即成常蓋頭欲用時以綿纏杖子頭點取藥者兩眥頭每夜著即臥蘇六方云頓用甚效又療積年風赤眼方取生油生豬脂胡粉各等分和研敷眼中二日內赤總除救急療久患風赤眼方黃連一兩大棗兩顆去皮核細切印成鹽兩大豆許上三味以井花水半升納前件藥攪緩火煮三分去一以綿濾使盡其餘汁更緩火煎之候藥上有紫液起即是更煎以物盡刮取於合內貯之勿使塵汙取用一度取二大豆許以人乳和之置兩眼眥頭從淚出每著苦人咽喉即停積年患赤眼者不過五度即瘥及風胎赤皆差亦不勞避風每欲出時口含鹽水以洗之甚良忌豬肉目暴卒赤方六首肘後葛氏療目卒赤痛方以鹽湯洗之又方燒荊木出黃汁敷之又方竹葉黃連各一兩錢二七枚上三味以水三升煎取二合綿染敷眥日五六度忌豬肉並出第二卷中深師療眼忽赤痛方鯉魚膽一枚黃連二十一枚上二味和淹於飯下蒸之熟去滓塗目眥五六度愈忌豬肉必效療眼暴赤方雞舌香二十枚干棗二十擘黃連二十枚碎上三味以水半升煎五六沸澄取清點目中瘥多著令人目明忌豬肉韋永傳又目暴赤熱毒方蕤仁一分搗成膏吳黃連一分雞子白一枚上三味以綿裹二味納雞子白中漬一宿塗眼四五度厚則洗之目癢方四首肘後療目卒癢且痛方削乾薑令圓滑納眥中有汁拭薑復內之未盡易之姚同又風目常癢淚出方以鹽注眥中差止文仲療眼暗及風赤癢方煎成白鹽三匙烏賊魚骨四枚去甲上二味以清酢漿水四升煎取二升澄清每旦及晚洗眼赤去膚肉單鹽漿水煎之洗亦佳又療風癢赤方黃連半兩丁香二七枚碎柏皮半兩蕤仁二七枚錢七文古者上五味以水二升煎取一升去滓綿纏杖點取著眼角瘥止肘後同目中風腫方五首病源目為肝之外候肝虛不足為冷熱所幹故氣上衝於目外復遇風冷所擊冷熱相搏而令瞼內結腫或如杏核大或如酸棗之狀腫而因風所發故謂之風腫出第二十八卷中肘後療目中風腫弄眼方礬石二錢熬末上一味以棗膏和如彈丸以磨目上下食頃止日三磨一作揉姚同又方取頭垢著眥中亦得又方枸杞根白皮伏雞子殼上二味等分搗為末著目上範汪療目中風腫痛方取薤白刀截仍以膚上令遍漠皆差薤頭辛痛者止之集驗療目中腫痛方搗枸杞汁洗之日六七度深師療眼有熱生翳肘後同眼熱磣痛赤腫方三首刪繁療眼熱眥赤生赤脈息肉急痛開不得開如芒在眼磣痛大棗煎方大棗十顆去皮核黃連二兩淡竹葉五合上三味以水二升煎取一升澄取八合下棗黃連煎取四合去滓綿濾細細點敷眼中忌豬肉又車前草湯洗方車前草切半升干藍五合淡竹葉三兩上三味切以水三升煮取二升綿濾去滓用上好鹽半刀圭內湯中攪令調取冷細細用洗眼一刀圭者準丸如兩大豆大必效同張文仲療眼暴赤腫磣痛不得開淚出方黃連黃柏蕤仁鹽碌芒硝各等分上五味搗篩和如黍米大納眥中忌豬肉眼暗令明方一十四首千金論曰凡人年四十五十以後漸覺眼暗至六十以後還漸目明療之法五十以前可服瀉肝湯五十以後不可瀉肝目中病可敷石膽散等藥無病不可輒敷散但補肝而已目病肝中有風熱令人眼暗者當灸肝俞五百壯穴在明堂部中及服除風湯丸散數十劑當愈也凡生食五辛接熱食飲刺頭出血過多極目遠視夜讀細書不避煙火博奕不休日沒後讀書飲酒不已熱食麵食抄寫多年雕鏤細作泣淚過度房室無節數向日月輪看夜遠視星火月中讀書雪山巨晴視日極目瞻視山川草木上十九件並是喪明之由養性之士宜熟慎之又有馳騁田獵冒涉霜雪迎風追獸日夜不息者亦是傷目之媒也恣一時之浮意為百年之痼疾可不慎歟可不慎歟凡人從少時不自將慎年至四十即漸漸眼暗若能依此將慎可得白首無他所以人年四十已去當須瞑目非有要事不可輒開此之一術護慎之極也其讀書博奕等過度患目者名曰肝勞若欲療之非三年閉目不視不可得差徒自瀉肝及作諸療終是無效也人有風邪多必眼暗先攻其風而暗自差出第六卷中廣濟主令明目方三月中取新杏仁研脂絞取汁一升石鹽兩大豆大銅器盛之取銅古錢二七文浸之二七日綿注目中夜洗眼用出第五卷中小品療眼漠漠黃連洗湯方黃連三兩秦皮二兩蕤仁半兩上三味㕮咀水三升煮取一升半絞去滓適寒溫以洗目日四五度又加升麻二兩加水煎之忌豬肉集驗明目令發不落方十月上巳日取槐子納新罌中封口三十日洗去皮初服一枚再服二枚至十日服十枚滿十日卻從一起千金云從月一日一枚二日二枚每日加一枚計十日服五十五枚一月日服一百六十五枚一年服一千九百八十枚小月減六十枚此療主明目令發不白好顏色長生舊病冷人勿服肘後云扁鵲方刪繁療肝虛寒目䀮䀮視物不明稀視生花防風補煎方防風細辛各二兩芎藭白蘚皮獨活各三兩甘草炙橘皮去脈各二兩大棗二七枚去核甘竹葉一升切蜜五合上十味切以水一斗二升煮取四升去滓下蜜更煎兩沸分為四服日三餘一服若是五六月燥器貯冷水藏之忌海藻菘菜生菜千金崔氏同出第十一卷中千金補肝散療男子五勞七傷明目方地膚子一斤陰乾生地黃七斤取汁上二味搗地膚末和汁曝之令乾更搗為散酒服方寸匕日三又方白瓜子七升絹袋盛絞沸湯中三遍訖以酢五升漬一宿曝乾搗下篩酒服方寸匕日三久服佳又神麯丸主明目百歲可讀細書方神麯四兩磁石二兩燒研光明硃砂一兩研上三味末之蜜和丸如梧子飲服三丸日三常服益眼力衆方不及學者須知此方神驗當寶祕之忌生血物並出第六卷中千金翼瀉肝湯主藏中痰實熱沖眼漠漠暗方苦竹根八兩半夏四兩洗干藍茯苓枳實炙白朮各三兩杏仁二兩熬乾地黃二兩細辛二兩甘草二兩炙上十味切以水一斗二升煮取二升七合分三服又補肝丸主明目方地膚子藍子蒺藜子車前子瓜子菟絲子茺蔚子青葙子各二分決明子三合細辛桂心螢火蟲各三分大黃八分黃連六分上十四味搗篩蜜和為丸如梧子飲服子五丸日三加至三丸前方有白朮名瀉肝此方有大黃名補肝通按前將節謹慎中雲虛勞冷者宜服補肝丸豈有虛冷而可服大黃乎又主眼暗方蔓菁子一斗淨洗上一味以水四升煮自旦至午去汁易水又煮至晚去汁易水又煮至旦曝乾以布袋貯之一度搗三升以粥飲服三方寸匕日三服美酒等任性所便並出第十一卷中延年令目明方濾療香取黍米一粒納目眥中當有水出並目中習習然引風出狀即明之候也常以日申時敷之若似痛以冷水洗之即定以申時敷藥者為其目至日下便漠漠暗如有物即以藥內中淚出以熟帛拭之以水洗訖便豁然明也此香以單主百病服之益人勝石乳也本云是外國用之明目甚驗天竺沉香中出此必效洗眼湯去熱氣漠漠視物不見並翳方秦皮黃柏皮蕤仁各三分細辛二分茺蔚子三分黃連四分古銅錢七文上七味切以水二升煮取八合平旦洗目忌生菜又青葙子丸主眼風暗有花方青葙子槐子覆盆子地膚子菥蓂子車前子各五分上六味搗篩蜜和丸如梧子日服十五丸忌五辛豬雞牛羊肉魚蒜面酢近效療眼中一切諸疾盲翳天行風冷熱胎赤淚出常漠漠不多見物唯不療睛破余悉主之方石膽一兩光明者波斯鹽緑一兩色青陰兩中幹不濕者是真石鹽二兩硇砂二分以上四味各別研秦皮三兩蕤仁三兩研三日烏賊魚骨一兩去上甲別研細辛一兩防風三兩馬蹄決明二兩七孔者仍以暖水洗去上細皮數過用鉛丹一兩黃連三兩上十二味草石藥合搗篩睢似粉仍以重絹羅重篩訖以白蜜於火上微暖去上沫取下清者和之作塊更搗千杵以油臘紙裹之亦取瓷瓶子盛貯勿使見風可得多年不敗每欲著以兩米許硬和少許蜜稀搗如熟面以篦子頭分置兩眼眥至夜仰臥枕之閣眼至明不漱口含清漿和一豆許鹽鹽消吐洗眼不避風日未瘥之前忌食麵羊肉醬果子生菜齏汁苜蓿萵苣惟羊頭蹄肝冷鹽下余並不得食至著後復更七日慎之過此一任與食每日一度著藥甚妙失明方六首肘後療積年失明不識人方七月七日取蒺藜子陰乾搗篩食後服方寸匕深師療失明主一歲二歲三歲四歲拭目中無他病無所見如絹中視決明散方馬蹄決明二升上一味搗篩以粥飲服方寸匕忌魚蒜豬肉辛菜千金補肝散療目失明漠漠無所見方青羊肝一具去上膜薄切之以新瓦盆子未用者淨拭之納肝於中炭火上炙令極燥脂汁盡取之別搗決明子半升蓼子一合熬令香下篩三味合和更篩以飲汁食後服方寸匕漸加至三匕不過兩劑能一歲復可夜讀書又補肝散療三十年失明方細辛鍾乳研茯苓雲母粉遠志去心五味子上六味各等分搗作散飲服五分匕日三加至一錢匕忌生菜大酢又方胡麻一石蒸三十遍末之日服一升良又方三月採蔓菁花陰乾末之空腹以井花水服方寸匕久服長生目明可夜讀細書並出第六卷中青盲及盲方六首病源青盲者謂眼本無異瞳子黑白分明直不見物耳但五臟六腑之精氣皆上注於目若臟虛有風邪痰飲乘之有熱則赤痛無熱但內生障是腑臟血氣不榮於睛故外狀不異只不見物而已是謂之青盲養生方云勿塞故井水漬令人耳聾目盲又云正月八日沐浴除目盲出第二十八卷中深師療青盲方豬膽一枚一味微火煎之可丸如黍米內眼中食頃良又黃牛肝散療青盲積年方黃牛肝一具土瓜根三兩羚羊角屑三升蕤仁三兩細辛六兩車前子一升上六味藥合肝於瓶中春夏之月封之十五日冬月封之二十日出曝乾搗下篩酒服方寸匕忌肉魚五辛生菜等又療肝臟病眼青盲內或生障惡風赤痛補肝散方乾薑六分甘遂三分桂心茯苓附子炮黃連甘草炙當歸乾漆熬貝齒燒豬苓白朮各五分乾地黃八分丹參六分防風七分黃耆六分上十六味為散酒服方寸匕日三服忌海藻菘菜生菜豬肉冷水桃李雀肉等又療肝氣之少眼視䀮䀮面目青眼中眵淚不見光明調肝散方細辛柏實各二兩蕤仁甘草炙各一兩羊肝一具去脂膜炙乾上五味搗為散以酒服方寸匕甚良忌同前又療眼盲腦痛方鯉魚腦並膽等分調以注目眥日三良肘後療雀目必效蔓荊子散主青盲瞳子不壞者治十得九方蔓荊子六升蒸之看氣遍合甑下以釜中熱湯淋之即曝乾如是三度訖搗篩清酒服二方寸匕漸至加三匕陰雨日勿合散壞百日克愈神效甚良雀目方四首病源人有晝而睛明至瞑則不見物世謂之雀目言其如鳥雀瞑便無所見也出第二十八卷中廣濟療雀目地膚子丸方地膚子五兩決明子一升上二味搗篩米飲和丸每食後以飲服二十丸至三十丸又雀目至暮無所見者柏皮散方老柏白皮四兩烏梅肉二兩熬細辛地膚子各四兩上四味搗篩為散每食後清酒服二方寸匕日三四服瘥崔氏療雀目方七月七日九月九日取地衣草淨洗陰乾末之酒和服方寸匕日三服一月即愈出第四卷中千金翼療眼暮無所見方豬肝一具細切以水一斗煮熟置小口器中及熱以目臨上大開勿閉也冷復溫之取瘥為度出第十一卷中目膚翳方一十四首病源陰陽之氣皆上注於目若風邪痰氣乘於腑臟腑臟之氣虛實不調故氣衝於目久不散變生膚翳膚翳者明眼睛上有物如蠅翅者即是又此言肝臟不足為風熱之氣干之故令目睛上生翳翳久不散漸漸長侵覆瞳子出第二十八卷中深師療眼翳方胡粉注翳上以療三年翳又療眼黑翳覆瞳子膚起方貝子四枚燒空青一兩礬石一兩熬汁盡上三味末取如黍米注翳上日二又主眼翳方書中白魚末注少許於翳上千金療目赤及翳方烏賊魚骨去甲鉛丹等分合研細和白蜜如泥蒸之半食久著少許四眥中瘥又去翳方貝齒十枚燒細篩末取胡豆著翳上日再正仰臥令人敷之炊一石米久乃拭之息肉者加真珠如貝子分等研如粉又療目翳障白膜落方雄雀屎人乳和研以敷上當漸漸消爛良妙肘後並翼同又洗眼湯療熱出攻眼生障翳方秦皮黃柏決明子黃芩黃連各三分蕤仁五分梔子仁七枚大棗五枚上八味切以水一升煮取六合洗目日二差忌豬肉千金翼真珠散主白翳覆瞳睛不見物方光明硃砂二分研貝子五枚炭燒末之白魚七枚炙乾薑末半分上四味搗為末相和研之如粉以熟帛三篩之仰臥遣人以小指爪挑取少許將敷眼中亦主白膚翳風淚忌生血物又七寶散主目翳經年不愈方白真珠一分珊瑚一分紫貝一分馬珂一分硃砂二分琥珀一分蕤仁二分決明子一分石膽一分上九味搗下篩極細敷目中如小豆日三大良忌生血物並出第十一卷中崔氏療翳五十年不瘥方貝齒一枚燒豆豉三十枚三年苦酒三升上三味先漬貝齒三宿消盡乃納豉微火煎如膠取三合藥置筒中夜臥時著如小麥大於眥頭明日以湯洗之十日愈又療眼中翳少輕者方取枸杞及車前子葉分等手中熟挼使汁欲出又別取桑葉兩三重裹之懸於陰地經宿乃摘破桑葉取汁細細點目中不過三五度翳目當爛又翳如重者方取楮白皮曝乾合作小繩子如粗叉腳許火燒作灰待冷隨便以灰點翳上不過三五度翳自當爛張右司送並出第四卷中延年療眼熱暈白翳覆瞳子方車前子九分決明子黃連各九分黃芩秦皮玄參沙參瞿麥地骨皮蕤核仁各七分藍實九分上十一味搗篩蜜和丸如梧子食後飲服二十丸漸加至三十丸瘥止為度忌豬肉謝道人療眼翳欲盡微微猶有者敷此散方珊瑚琥珀玉屑曾青紫貝硃砂伏雞子殼去白皮上七味各等分研重篩為散仰臥以米許置翳上四五度忌血物暈翳方四首病源五臟六腑之精華皆上注於目目為肝之外候肝臟血血氣不足則肝虛致受風邪風邪搏於精氣故精氣聚生於白睛之上繞於黑睛之際精彩昏濁黑白不明審謂之目暈延年主眼熱暈翳覆瞳子方柴胡三兩茯苓枳實炙決明子瞿麥各三兩黃連別漬甘草炙蕤仁各二兩上八味切以水一斗煮取二升七合去滓分再服忌海藻菘菜豬肉酢物又方黃連決明子車前子各九分黃芩沙參人參地骨皮蕤仁瞿麥茯神各七分秦皮甘草澤瀉各五分上十三味搗篩蜜和為丸如桐子飲服二十丸日再服為度又療眼因赤差後翳暈方決明子六兩碎黃連蕤仁各六兩黃柏四分鹽碌三分上五味搗末更研極細取少許納目中日三四度忌豬肉又方秦皮一兩上一味以水一升五合煮取七合澄清決明用漬散納目中一如前法並出第四卷中生膚息肉方八首病源息肉淫膚此由邪熱在臟氣衝於目熱氣攻於血脈蘊積不散結而生息肉在於白睛膚瞼之間即謂之息肉淫膚也肘後療目中生肉稍長欲滿目及生珠管方貝齒真珠分等上二味並研如粉拌令和以注肉上日三四度良小品療眼膚肉生覆瞳子者方取針燒令赤爍著膚上不過三爍縮也有令人割之三復生不如爍之良刪繁療肝熱不止沖眼為眥赤脈息肉閉痛不開但熱勢彭彭不歇及目睛黃洗肝干藍飲方干藍切車前子苦竹葉切各三升秦皮三兩細辛決明子蕤仁山梔子升麻芍藥各三兩上十味切以水二斗煮乾藍取一斗去滓取清八升煮藥取一升下芒硝三兩沸去滓分再服忌生菜千金療眼中息肉方驢脂石鹽末和以注眥即瘥千金翼礬石散主目翳及胬肉方礬石上上白者納如黍米大於翳上及胬肉上即令淚出以綿拭之令得惡汁盡日一其疾逐惡汁盡日日漸自薄便瘥好上上礬石無過絳礬色明淨者慎如療眼常法崔氏療人眼熱冷膚肉暗方光明硃砂一兩研硇砂一兩研漿水一大升上三味以五月五日合置銅器中日曝使干用刀子刮取以新帛裹之每夜眠時著一米許安眼四眥各一米盡一月間內外暗者皆愈忌生血物出第四卷中必效療眼熱胬肉及赤癢方黃連一兩碎竹葉一兩切上二味以水一升半煎取半升置銅器中湯上煎似稀錫止臥時點眼中熱淚出即瘥止謝道人療眼風熱生赤肉方大黃二兩黃芩一兩甘草炙人參地骨白皮決明子各三兩防風石膽地膚子黃連兔肝各一兩車前子一升螢火蟲一兩枚上十三味搗篩為散以鯉魚膽一合和丸飲下十五至三十丸忌豬肉海藻菘菜目風淚出方六首病源目為肝之外候若被風邪傷肝肝氣不足故令目淚出其湯尉針石別有正方補養宣導今附於後養生方導引法云以鼻內氣左手持鼻除目暗泣出又云端坐伸腰徐以鼻內氣以手持鼻除目暗淚出又夫五臟六腑皆有津液通於目者為淚若臟氣不足則不能收制其液故目自然淚出亦不因風而出不止本無赤痛並出第二十八卷中深師療眼淚出雞舌香丸方雞舌香二銖黃連六銖乾薑一銖蕤仁一百枚礬石二銖熬上五味搗為末以棗膏和丸如雞距以注眼眥忌豬肉又療眼白翳淚出雞距丸方乾薑三分蕤仁三十枚雞舌香十枚黃連二銖胡粉四銖礬石五銖熬上六味搗末以棗膏丸如雞距注眼大眥日再忌豬肉又療風淚出眼癢痛散方貝齒十枚燒決明子黃連細辛乾薑各一分上五味搗下篩以指瓜取如麻子注眥中日再三夏月加乾薑一分眼痛以三指撮二合水煮三沸去滓以汁洗之良何漢壽用甚有效驗集驗療目中風寒淚出眥赤癢乳汁煎方黃連三分蕤仁二分乾薑四分上三味搗散以乳汁一升漬藥一宿明旦於微火上煎得三合綿絞去滓取如米納眥中崔氏療目淚出方苦酒一斗古錢一百五十文上二味以苦酒漬錢微火煎取三升去錢濾取汁更煎取七合漸漸點著眥中甚良又療目中煙淚出不得開即刺痛方取石鹽如大豆許用納目中習習去鹽以冷水洗數日瘥並出第四卷中眯目方八首廣濟療眯目甑帶灰方取少許甑帶燒作灰水服方寸匕立出肘後同又療眯目不出淫膚瞿麥散方瞿麥乾薑各二分上二味為散以井花水服方寸匕日三不過三眯出又療眯目豬膏塞鼻方以豬膏如半雞子裹鼻孔中隨眯左右著鼻中以吸之即便仰臥須臾不知眯處又麥芒入目不出方煮大麥汁注眼中即出良肘後療目萃芒草沙石輩眯不出方磨好書墨以新筆點注目中瞳子上又方鹽豉各少許著水中臨目視之即出並出第一卷中深師療目痛及眯忽中傷因有熱瞑者方取地膚白注目中千金翼主眯目不明方椎羊鹿筋擘之納口中熟嚼著臉上以手輕挼之若有眯者二七過挼便出之視眯當著筋出即止未出者復為之如此法常以平旦日未出時為之以瘥為度出干以好蜜注四眥頭鯉魚膽亦佳若數挼目痛可間日挼之出第十一卷中肝氣不足方二首千金翼補肝湯主肝氣不足兩脅拘急痛寒熱目不明並婦人心痛乳癰膝脛熱消渴爪甲枯口面青方甘草炙防風各三兩烏頭二兩炮大棗二十枚細辛柏子仁茯苓各二兩蕤仁桂心各一兩上九味切以水八升煮取三升分為三服忌海藻菘菜豬肉生蔥菜酢物又補肝湯主肝氣不足方甘草炙黃芩人參桂心各二兩上四味切以水六升煮取二升分三服忌生蔥余同肝實目痛方二首刪繁療肝實熱目痛胸滿急塞瀉肝前胡湯丸方前胡秦皮細辛梔子仁黃芩升麻蕤仁決明子各三兩芒硝三兩苦竹葉切一升車前草切一升上十一味切以水九升煮取三升去滓納芒硝分為三服千金同又療肝實熱或眼痛熱不止生地黃煎方生地黃汁一升玄參汁五合蜜五合車前汁五合升麻細辛各二兩芍藥梔子各三兩切上八味切以水五升煮升麻等四物取一升五合去滓下生地黃等汁蜜沸成煎分五六服眼雜療方二十首內缺二方廣濟療客熱沖眼赤痛淚出決明湯方決明子升麻枳實炙柴胡黃芩芍藥各一兩梔子十四枚竹葉一升車前草四升甘草一兩炙上十味切以水九升煮取二升五合去滓納芒硝溫服分為三服忌海藻菘菜又療先服石熱衝上眼赤方黃連苦參槐子各八兩蕤仁決明子黃芩各二分麥門冬六分去心葳蕤大黃各六分上九味搗篩蜜和丸如梧子食後以蜜水下二十至三十丸忌豬肉肘後療目卒痛珠子脫出及有青翳方越燕屎真丹乾薑各等分上三味末如粉以少許者目中翳上良妙小品療眼風結腫合或眼生翳人口吹之睛中牽引疼痛白睛赤起或黑變黃從下上覆半睛者秦皮湯方秦皮洗黃連各二分黃柏三分大棗五枚蕤仁二分上五味切以水二升煮取一升以洗眼忌豬肉集驗療眼暗熱病後失明方以羊膽敷旦暮各一又療風眼爛眥者方竹葉四分柏白皮六分黃連四分上三味切以水二升煎取五合稍稍滴兩眥日三度忌豬肉刪繁療肝陽氣伏邪熱喘逆悶恐眼視無明狂悸非意而言竹瀝泄熱湯方竹瀝一升麻黃大青梔子人參玄參升麻茯苓知母各三兩石膏八兩碎生薑四兩芍藥四兩生葛八兩上十三味切以水九升煮取二升去滓下竹瀝更煎三五沸分三服忌酢物千金翼蕪菁子主明目益飢膚方蕪菁子三升淨淘高著水煮二十沸出著水盆中淘之令水清接取以別釜煮之水盡即添益時嘗看味美瀝出曝乾上一味搗末酒飲等任意和服三方寸匕日惟服七合飽食任性酒服即服無限時慎生冷百日身熱瘡出不久自瘥又療目赤口乾唇裂方石膏一斤生地黃汁一升赤蜜一升淡竹葉五升上四味以水一斗二升煮竹葉取七升去滓入石膏取一升半下地黃汁蜜取三升細細服之忌蕪荑並出第十一卷中文仲陶氏療數十歲䁾眼爛眥方摘葫葉中心一把著鐺中水五升煮用小板覆上穿作孔以目臨上瘡當痛食頃出淚一升便即瘥必效硃砂散主人眼中有黑白花逐眼上下方光明砂六分研地骨白皮五分車前子三分龍腦香六分決明子五分上五味搗篩細研如粉少少敷之近效療熱風暴赤瞼爛生瘡或磣或疼或癢或痛久患虛熱遠視不明喻若隔絹看花或服石乳發動冷熱淚出白睛赤紅腫脹淚裹眼珠皆是肝膈實熱腎臟已虛宜先服竹葉飲子治之然後可點藥凡患眼有連睛疼痛者皆不得以辛辣藥點之幸請細意詳思不得措手比見投方點藥未曾試驗各説異能競施衆療微有疼障似翳者或有庸人不審眼珠厚薄乃將針穿豆爪甲摩之傷敗非一今輒附數方百無一失且服之不令吐利點藥不痛不疼將攝既有所憑疾苦豈能不愈如前病狀宜服此竹葉飲子除風客熱暴磣澀疼痛睛赤目黃冷淚熱淚兼理石乳天行眼疾方竹葉一握乾葛三兩地骨白皮薺苨各五兩甘草三兩炙上五味切以水二大升煎取半升去滓納車前子三兩分三服一日令盡皆食後服之良不過三劑眼中疼痛歇次得點藥一無疼痛神效前方亦須敷藥抽熱毒風不然恐尋經脈入眼熱深入亦難瘥也又取羊肝一具或豬肝亦得豬肉精處亦堪取三斤皆須破作手許大片厚薄亦如手掌候其疼處或從眼後連耳上頭或有從眉向上入頭掣痛者火急新汲水中漬令極冷貼其疼痛脈上及所患部分候肝或肉稍暖徹則易之須臾間其肝肉等並熟如煮來者豈不是熱毒之候出也此即損眼之禍又恐三辰齋忌之月無肉以大豆還作四五替如漬肝肉法更互尉之其疼痛忽連鼻中酸辛者並是難差之候亦宜急覓吳藍莖葉搗如泥敷痛處亦有差者十得三四凡是此患不宜久忍痛若深入於眼中漸成痼疾又療眼睛不疼亦不痛上下瞼赤風癢生瘡淚多者宜點此藥方蕤仁四十九枚去赤皮研胡粉如棋子許大上火燒看赤變如金色上二味各別研取好真酥如杏核許大都一處和研令勻入龍腦香如大豆許大三粒研令消宜油帛裹或銅合子盛之勿泄氣傷風則不堪用或有小兒胎赤並宜用此方且不疼痛亦不損眼大人久患赤痛爛瘡者宜先取鹽花或好白鹽一方寸匕醋漿水不用純酢中中者一大升煎鹽三五沸綿濾取汁欲夜臥先以清水洗眼次以鹽湯洗之拭令眼乾次以爪甲挑取麻子許多藥塗眼大小眥任眼開合須臾少淚出眼中涼冷狀若人吹不經三日內其赤便瘥視物漸明恐眼中忽有到眯毛刺眼者速令一人以鑷子摘去之否則令眼淚多磣痛若不除之塗藥終無益耳又凡目疾不問少長男女等所忌有五一房室二面酒三目衝風冷霜雪向日遠視四哭泣嗔怒五終身不用吃生五辛蕎麥葵菜若因疾犯者則疾深難療幸細意將慎百無一失故具五忌也又療眼赤腫熱疼淚出燒人皮肉不可堪忍或石乳發動連睛疼悶乍歇乍發頭痛增寒瞼赤瘡爛無所見物白膜覆黑珠或因天行斑毒入眼無所見者一切藥並不可著唯宜用此法甚驗萬無失一方千歲虆汁一名櫻薁藤汁也不問春秋冬夏比採其莖削去上蒼皮粗細如大拇指大者即得截斷可長六七寸取一銅器或瓷器中盛水三五升漬之一食頃其頭白乳汁出可長半寸許取此汁將又療眼中一切諸疾青盲翳者天行風赤無端忽不見物悉主之此方兵部侍郎盧英所傳價重千金石膽研波斯鹽碌研石決明烏賊魚骨去甲鉛丹細辛濃沙各三分蕤仁三兩碎防風三兩末秦皮二兩支馬蹄決明二兩淨上十一味搗散及研避風煮以白蜜煉濾使淨和訖於臼中更搗五七千杵以油臘紙重裹之重合盛勿令見風可致百年不敗合之不欲見蟲大與鳥雀婦女及孝子穢惡之類仍取臘月合之有患取米粒更和上蜜如稀餳夜臥點之衝風行亦不畏每日點以瘥即止夏侯拯處敷又凡自天行病後皆不得食葵熱面生五辛蕎麥魚膾毒物傷目就中更犯房室加之疼痛連眉乍疼乍癢鬢邊脈掣微似憎寒愚醫不曉遂妄針灸兼服補藥因茲失明或有先服英乳之人亦同斯疾宜即將理不得妄服湯丸甘苦酸辛須知冷熱只如腎風虛損瞳仁脹大無翳而便失明假如肝臟熱風筋膜連睛生薄浮翳宜服甘平苦味之藥辛酸溫熱入口發其風毒唯宜敷薄膏散熱氣自除少飲湯方攝理不盈三劑日漸痊愈吐利湯針灸不得妄施宜服後方療天行從因犯食毒失明兩鬢脈掣熱疼兼頭痛憎寒天陰即發及先食英乳者方前胡三兩生麥門冬五兩去心竹葉一握甘草二兩炙梔子二七枚乾葛葳蕤三兩漏蘆各三兩上八味切以水三大升煮取一大升分作三服神驗良忌海藻生菜又蚡鼠土膏療眼疼脈掣連耳熱疼不可堪者方取口中蚡鼠土二升青木香一兩大黃五兩白蘞三兩寒水石六兩上五味搗篩為散用熟新白酒和如稠餳當痛掣處摩之如手掌許敷之干即易至平旦午即止神效無比又眼有倒睫毛或折在瞼中聚生刺人白睛唯覺癢悶漸赤膜起連上下瞼多赤生瘡若掣刺黑睛則淚出似白翳出若刺著瞳仁令眼疼痛磣澀不欲見明連鼻駿痛兼腦掣疼此多損傷宜速救療其法如下若欲療之者皆取平晨日未出之際令一眼明人把鑷子拔之去倒睫毛勿使毛斷連根去之下手十減八九疼痛立止至夜點前千歲虆汁三五日將息方得平復點首生男乳汁良若點辛辣之藥從此傷敗實可痛哉慎風寒日月光及煙火房室五辛一月內即瘥又凡是黑睛及瞳仁瑩薄有瘡翳皆不可用辛辣及溫藥洗之並是害眼之兆宜用秦皮湯洗之方秦皮一兩梔子仁二七枚淡竹葉一握上三味切綿裹以水一升半著銅器中煎三五沸以綿濾取洗眼切須淨器物盛之夏侯拯録用
