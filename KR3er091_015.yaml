body:
  text: 卷第十五風狂方九首病源風狂者由風邪入並於陽所為也風邪入血使人陰陽二氣虛實不調若一實一虛則令血氣相併氣並於陽則為狂彂或欲走欲自高賢稱神聖是也又肝藏魂悲哀動中則傷魂魂傷則狂妄不精明不敢正當人而攣筋兩脅骨不舉毛瘁色夭死於秋皆由血氣虛受風邪致令陰陽氣相併所致故名風狂千金方療狂邪彂惡或披頭大叫欲殺人不避水火方苦參為末以蜜丸如梧子大每服十丸薄荷湯下又方療癲狂不識人人屎燒灰酒調服之又方療風狂百病麻仁四升水八升猛火煮令牙生去滓煎取七升旦空心服或彂或不彂或多言語勿怪之但令人摩手足須定凡進三服千金翼療癲狂不識人伏龍肝為末水調方寸匕日進三服肘後方療風狂喪心取葶藶一升搗三千杵取白犬倒懸之以杖杖血出盛取以和葶藶末丸如麻子大一丸三服取瘥又方莨菪子二升酒五升浸之出曝乾再漬盡酒止搗服一錢匕日三勿多服益狂又方防葵為末酒服一刀圭至二三身潤又小不仁為候又方自縊死者繩燒三指撮服之又主狂言恍惚方灸天樞百壯並出第十四卷中銅人經天樞俠臍二寸風驚恐失志喜忘及妄言方六首深師人參湯療忽忽善忘小便赤黃喜夢見死人或夢居水中驚恐惕惕如怖目視䀮䀮不欲聞人聲飲食不得味神情恍惚不安定志養魂方人參甘草炙各二兩半夏一兩洗龍骨六兩遠志八兩麥門冬一升洗去心乾地黃四兩大棗五十枚擘小麥一升阿膠三兩炙膠飴八兩石膏四兩碎綿裹上十二味切以水三斗煮小麥令熟去麥納藥煮取七升去滓納膠飴令煬一服一升日三夜一安臥當小汗彌佳忌海藻菘菜羊肉蕪荑又龍骨湯療宿驚失志忽忽喜忘悲傷不樂陽氣不起方龍骨茯苓桂心遠志去心各一兩麥門冬去心二兩牡蠣熬甘草炙各三兩生薑四兩上八味㕮咀以水七升煮取二升分為二服忌海藻菘菜酢生蔥又鐵精散療驚恐妄言或見邪魅恍惚不自覺發作有時或如中風方鐵精茯苓芎藭桂心蝟皮炙各三兩上五味搗下篩以酒服錢五匕日三不知稍增至一錢以上知之為度忌酢物生蔥等並出第九卷中古今録驗道士陳明進茯神丸一名定志小丸主心氣不定五臟不足甚者憂愁悲傷不樂忽忽喜忘朝瘥暮劇暮瘥朝發發則狂眩加茯神為茯神丸不加茯神為定志丸二分合少可兩度合方菖蒲遠志去心茯苓各二分人參三兩上四味搗下篩服方寸匕後食日三蜜和丸如梧桐子服六七丸日五亦得一方加茯神一兩半牛黃五銖為六味茯苓遠志菖蒲各一兩忌酢物羊肉餳千金同又定志紫葳丸療五驚喜怒不安方紫葳六分遠志十五分去心白龍骨七分牛黃一兩甘草十分炙虎頭皮十二分炙令焦人參桂心白朮各八分防風七分麥門冬去心熬雷丸各五分柴胡六分上十三味各別搗下篩蜜和丸如梧桐子大先食服十丸日三甚良忌海藻菘菜桃李生蔥並出第五卷中千金療驚勞失志方茯神五兩甘草炙桂心各一兩龍骨麥門冬去心防風牡蠣熬遠志去心各二兩棗二十枚擘上九味切以水八升煮取二升分為二服日再服忌海藻菘菜生蔥酢物出第十四卷中一云主驚悸心神錯亂或是或非言語無度茯神湯風邪方八首病源風邪者謂風氣傷於人也人以身內血氣為正外風氣為邪若其居處失宜飲食不節致腑臟內損血氣外虛則為風邪所傷故病有五邪一曰中風二曰傷暑三曰飲食勞倦四曰中寒五曰中濕其為病不同風邪者發則不自覺知狂惑妄言悲喜無度是也出第二卷中廣濟療風邪狂亂失心安神定志方金銀薄各一百和合石膏研龍齒研鐵精研地骨白皮茯神黃芩生乾地黃升麻茯苓玄參人參各八分虎睛一具微炙牛黃生薑屑各四分麥門冬十分去心枳實炙甘草炙葳蕤芍藥各六分遠志去心柏子仁白蘚皮各五分上二十四味搗篩以蜜和為丸食訖少時煮生枸杞根汁服如梧桐子二十丸日二服漸加至三十丸不利忌熱面海藻菘菜蕪荑炙肉醋蒜黏食陳臭油膩出第一卷中深師鎮心丸療老小心氣不足虛弱時苦小語勞則劇風邪百病並主之方銀屑一分半研牛黃九銖丹砂研甘草炙麥門冬去心遠志去心各五分防葵人參防風細辛茯神椒汗附子炮紫石英研各四分桂心乾薑各六分菖蒲紫菀各三分上十八味搗下篩以白蜜和丸如梧子大先食服三丸日三不知稍稍增之忌海藻菘菜生菜豬肉生蔥生血酢物餳等丹砂一作丹參又五石鎮心丸療男女風虛心氣不足風邪入臟夢寤驚恐心悸諸病悉主之方紫石英研白朮各一兩茯苓海蛤菖蒲白石英杏仁去皮尖兩仁熬硫黃研遠志去心細辛牛黃鐵精研卷柏阿膠炙各四分麥門冬去心蓯蓉鍾乳研銀屑研大豆卷當歸乾薑各五分大棗五十枚人參防風薯蕷甘草炙各七分澤瀉六分白蘞前胡各二分石膏研乾地黃芍藥桔梗柏子仁桂心烏頭炮各三分秦艽六分半夏八分洗大黃五分三斗米下蒸黃耆六分上四十味搗下篩棗膏蜜和為丸如梧子大一服十丸不知增之忌海藻菘菜豬羊肉餳生蔥桃李羊血蕪荑酢物並出第十卷中肘後麻子湯療風邪感結衆殃恍惚不安氣欲絶水漿不入口方麻子五合熬橘皮芍藥生薑桂心甘草炙各三兩半夏五兩洗人參一兩當歸二兩上九味切以水九升煮取三升分為三服忌海藻菘菜羊肉餳生蔥等物古今録驗同出第三卷中千金翼續命湯療大風風邪入心心痛達背背痛達心前後心痛去來上下或少腹脹滿微痛一寒一熱心中煩悶進退無常面或青或黃皆是房內太過虛損勞傷交通會後汗出汗出未除或因把扇或出當風因而成勞五俞大傷風因外入下有水因變成邪雖病如此然於飲食無退坐起無異至卒不知是五內受風故也名曰行尸宜預備此方麻黃六分去節大棗十枚擘桂心防風細辛芎藭甘草炙芍藥人參秦艽獨活黃芩防己各一兩附子炮白朮各三分乾薑五分上十六味切以水一斗三升先煮麻黃令一沸下之去沫納諸藥煮取五升去滓納棗煎取三升分為三服老小人病服五合強人可取微汗忌生蔥海藻菘茱生菜豬肉冷水桃李雀肉等物又鎮心丸療胃氣厥實風邪入臟喜怒愁憂心意不定恍惚喜忘夜不得寐諸邪氣病悉主之方秦艽一兩柏實當歸乾漆熬白蘞杏仁去皮尖熬芎藭各三分澤瀉一兩乾地黃六分防風人參各四兩甘草一兩白朮薯蕷茯苓乾薑各二分麥門冬去心二兩前胡四分上十八味搗下篩以蜜和為丸如梧子大先食飲服十丸日三不知稍增之忌桃李雀肉海藻菘菜蕪荑酢物並出第十六卷中崔氏療風邪虛悸恍惚悲傷或夢寐不安鎮心湯方茯神半夏洗生薑各四兩羚羊角屑當歸人參防風芎藭杏仁去皮尖桔梗各二兩龍齒碎綿裹石膏碎各三兩綿裹防己桂心各一兩半竹瀝一升上十五味切以水一斗煮減半納竹瀝煎取二升八合去滓分溫三服相去如人行十里久忌酢物羊肉豬肉餳生蔥等物又別離散療男子女人風邪男夢見女女夢見男交歡日久成勞愁悲憂恚怒喜無常日漸羸瘦連年歲月深久難療或半月或數月日復發者方楊上寄生三兩炙菖蒲細辛附子炮乾薑薊根一云苧根天雄炮桂心各一兩白朮二兩茵芋二兩炙上十味合搗下篩以酒服半方寸匕日三不飲酒用童子小便調服合藥勿令婦人雞犬見之勿令病人見合藥見者令邪氣不去禁之為驗忌生蔥生菜豬羊肉桃李雀肉餳等物小品同並出第七卷中五邪方五首深師五邪丸療心驚恐夢寤愁憂煩躁不樂心神錯亂邪氣經入五臟往來煩悶悲哀啼泣常如苦怖吸吸短氣當發之時恍惚喜臥心中踴踴忽然欲怒癲倒手足冷清氣乏鬼邪氣所中涉於臟腑食即嘔逆除氣定心神方芎藭龍角無角用齒茯苓紫石英研防風厚朴炙鐵精研甘草炙各四分遠志六分去心丹參大黃梔子仁桂心細辛菖蒲椒汗去目人參乾薑附子炮吳茱萸各五分芥子三分禹餘糧七分研上二十二味搗下篩和以蜜丸如梧子大未食服二十丸夜服十丸棗湯下不知增之忌海藻菘菜生蔥生菜豬羊肉餳等物又五邪湯療風邪恍惚悲涕泣狂走如有神之狀身體強直或疼痛口禁噤喉水漿不通面目變色甚者不識人方菖蒲秦艽桂心當歸禹餘糧人參附子炮黃芩甘草炙遠志去心防風各一兩龍骨赤石脂茯苓芍藥芎藭防己各二兩上十七味搗下篩作粗散調和取水二升一方取東流水煮小沸納散二兩煮取一升五合未食服五合日再夜一分作十二裹重裹令密勿令泄氣忌羊肉餳海藻菘菜酢物並出第八卷中範汪五邪湯療五邪氣入人體中鬼語諸妄有所語悶亂恍惚不足意志不定發作來往有時方人參白朮茯苓菖蒲茯神各三兩上五味切以水一斗煮取三升先食服八合日三忌桃李雀肉羊肉餳酢物並出第四十二卷中古今録驗五邪湯主邪氣啼泣或歌或哭方禹餘糧研防風桂心芍藥遠志去心獨活甘草炙人參石膏碎綿裹牡蠣熬秦艽各一兩白朮防己菖蒲雄黃研茯神蛇蛻皮炙各一兩上十七味搗粗篩以水一升半納三方寸匕煮二沸去滓服之日四服忌生蔥海藻菘菜桃李雀肉餳醋等深師用黃丹不用雄黃余同又茯神湯主五邪氣入人體中見鬼妄語有所見聞心悸動搖恍惚不定方茯神二兩人參茯苓各三兩赤小豆四十枚菖蒲三兩上五味以水一斗煮取二升半分為三服忌酢羊肉餳深師千金翼同並出第四卷中風驚悸方九首病源風驚悸者由體虛心氣不足心之經為風邪所乘也或恐懼憂迫令心氣虛亦受風邪風邪搏於心則驚不自安驚不已則悸動不定其狀目睛不轉而不能呼診其脈動而弱者驚悸也動則為驚弱則為悸出第一卷中廣濟療熱風驚悸安心久服長年鎮心丸方茯神人參龍齒研升麻石膏研黃芩茯苓麥門冬八分去心銀薄二百番研虎睛一具炙枳實炙白蘞玄參芍藥葳蕤甘草炙各六分生薑二分上十七味搗篩蜜和丸每食訖少時以飲服如梧子大十五丸日二服漸漸加至三十丸不利忌海藻菘菜醋蒜面黏食陳臭等物出第一卷中深師大定心丸療恍惚驚悸心神不安或風邪因虛加藏語言喜忘胸脅滿不得飲食方人參桂心各三兩白朮防己茯苓乾薑防風大黃茯神桔梗白蘞各一兩牛膝十銖遠志二兩去心銀屑六銖上十四味搗合下篩以蜜丸如梧子大先食服五丸日三不知稍稍增之一方無牛膝而有茱萸一兩銀屑十銖余悉同忌生蔥酢物豬肉桃李雀肉等又補心湯療心氣不足其病苦滿汗出心風煩悶善恐獨苦多夢不自覺者咽喉痛時時吐血舌本強水漿不通手掌熱心驚悸吐下血方麥門冬三兩去心紫石英五分紫菀二兩桂心一尺一方二兩茯苓四兩一方一兩小豆二十四枚一方六合人參半兩大棗二十五枚擘甘草五寸炙一方一兩上九味切以水八升煮取二升四合羸人分作三服強人再服心旺之時有血症可服耳一方説用藥兩數不盡同注之在下煮取多少服亦同忌海藻菘菜生蔥酢物並出第十卷中千金療心虛寒陰陽寒損心驚掣悸語聲寬急混濯口喎冒昧好自笑厲風傷心荊瀝湯方荊瀝三升麻黃去節白朮芎藭各四兩防風桂心升麻茯苓遠志去心人參羌活當歸各三兩防己甘草炙各二兩母薑切一升取汁上十五味切以水一斗先煮麻黃兩沸去沫次下諸藥煮取三升絞去滓下荊瀝薑汁煎取四升分為四服日三夜一忌海藻菘菜酢生蔥桃李雀肉等物又大鎮心丸療心虛驚悸夢寤恐畏方紫石英茯苓防風人參甘草炙澤瀉各八分秦艽黃耆白朮薯蕷白蘞各六分麥門冬當歸各五分桂心遠志去心柏子仁石膏桔梗大黃大豆卷各四分熬椒汗去目芍藥乾薑細辛各三分上二十四味酒服如梧子大十五丸日再一方用棗膏丸忌海藻菘菜生蔥豬肉生菜桃李雀肉等又小鎮心散療心氣不足虛悸恐畏悲思恍惚心神不定惕惕而驚方人參遠志去心赤小豆附子炮桂心細辛乾薑防風龍齒炙菖蒲乾地黃各二兩茯苓白朮黃耆各四兩上十四味搗篩為散以酒服兩方寸匕日三忌羊肉餳桃李雀肉生蔥生菜豬肉並出第十四卷中崔氏療熱風驚掣心忪恐悸風邪狂叫妄走者服此湯亦瘥朱四頻用之極效方茯神三兩杏仁三兩去皮尖兩仁切升麻白蘚皮沙參各二兩龍齒六兩炙寒水石一斤碎綿裹石膏二十兩碎綿裹生麥門冬去心四兩上九味切以水一斗二升煎取三升去滓分溫為三服相去十里若甚者減水三升納竹瀝三升先用水煮九沸然後納竹瀝煮取三升服如上法忌酢物出第六卷中古今録驗茯神湯療風經五臟虛驚悸安神定志方龍骨一兩乾薑一兩半細辛一兩半白朮一兩茯神三兩人參遠志去心甘草炙桂心獨活各二兩酸棗仁一兩防風二兩上十二味切以水九升煮取三升分為三服忌海藻菘菜桃李雀肉生蔥生菜醋物又大竹瀝湯療大虛風氣入腹拘急心痛煩冤恍惚迷惑不知人或驚悸時怖吸吸口乾澀澀惡寒時失精明歷節疼痛或緩或不攝産婦體虛受風惡寒慘慘憒憒悶心欲絶者並療風痙口噤不開目視如故耳亦聞人語心亦解人語但口不得開劇者背強反折百脈掣動悉主之方秦艽防風茯苓人參各二兩茵芋烏頭炮黃芩乾薑當歸細辛白朮各一兩天雄一枚炮甘草三兩炙防己二兩上十四味切以竹瀝一斗水五升煮取四升分服一升羸人服五合佳此湯令人痹寧少服也茵芋有毒令人悶亂目花虛人可半兩良風輕者用竹瀝三升水七升小重者竹瀝五升水五升風大劇停水用竹瀝一斗忌酢生菜海藻菘菜桃李雀肉等並出第一卷中風驚恐方三首病源風驚恐者由體虛受風入乘腑臟其狀如人將捕之心虛則驚肝虛則恐足厥陰為肝之經與膽合足少陽為膽之經主決斷衆事心肝既虛而受風邪膽氣又弱而為風所乘故驚恐如人將捕之出第一卷中廣濟療心虛熱風上衝頭面心系急時時驚四肢煩腰膝冷邪氣發神不定犀角丸方犀角屑防風人參升麻防葵檳榔仁各五分青木香光明砂研牛膝各八分龍齒炙鐵精各六兩露蜂房炙銀箔研各三分上十三味搗篩蜜和為丸如梧子酒下二十丸至二十五丸日再服不利忌生血物熱面蕎麥炙肉葵蒜黏食等出第一卷中深師續命湯療大風風邪入心或心痛徹背背痛徹心去來上下驚恐小腹脹滿微痛乍寒乍熱心中悶狀如微溫進退無常面青或白或黃虛勞邪氣入百脈百病皆療之方人參甘草炙乾薑麻黃去節獨活當歸芎藭石膏碎綿裹各二兩附子一枚炮桂心白朮細辛各三分防風五分芍藥二分秦艽一兩杏仁四十枚去兩仁尖皮黃芩一兩上十七味以水一斗煮麻黃十餘沸納諸藥煮取四升半去滓納棗十枚煎取三升分五服老小者五合此以下以意消息調和六腑安五臟無不損除無芎藭防己代之無獨活天雄代之無附子烏頭代之湯成之後服湯以椒十枚置湯中溫令暖服之此與十二味西州續命湯療同俱療癲邪大風西中有十二味者中有大棗三十枚忌海藻生蔥豬肉桃李生菜雀肉等又療五臟六腑血氣少亡魂失魄五臟晝夜不安惚惚善悲心中善恐怖如有鬼物此皆發於大驚及當風從高墮落所致療之十黃散方雄黃五分熬人參五分蜀椒五分汗大黃四分硃砂三分研乾薑四分黃柏二分山茱萸二分細辛二分黃耆三分澤瀉三分黃連一分蒲黃一分桂心三分麻黃去節一分黃孫一分壯蒙也一方云黃昏黃環三分黃芩三分上十八味搗篩為散未食溫酒服一方寸匕日三稍增至二匕服此散體中筋力強者不須增人參氣力羸虛可增人參五分合十分忌豬肉冷水生菜生蔥生血物等並出第八卷中崔氏同千金無椒硃砂乾薑風癲方七首病源風癲者由血氣虛風邪入於陰經故也人有血氣少則心虛而精神離散魂魄妄行因為風邪所傷故邪入於陰則為癲疾又人在胎時其母卒大驚精氣並居令子發癲其發則仆地吐涎沫無所覺是也原其癲病皆由風邪故也養生方云夫人見十步直牆勿順牆而臥風利吹人必發癲癇及體重人臥春夏向東秋冬向西此是常法其湯尉針石別有正方補養宣導今附於後養生方導引法云還向反望不見七通治咳逆胸中病寒熱癲疾喉不利咽乾咽塞又云以兩手承轆轤倒懸令腳反在其上元愈頭眩風癲坐地舒兩腳以繩絆之以大繩絆訖拖轆轤上來下去以兩手挽繩使腳上頭下不使離地自極十一通愈頭眩風癲久行身臥空中而不墜落出第二卷中集驗風癲論曰凡癲病發則仆地吐涎沫無知若強掠如狂及遺糞者難療無方出第三卷中千金同千金療風癲方葶藶子熬研鉛丹栝蔞虎掌各三分烏頭三分炮白朮一分鴟頭一枚炙鐵精䕡茹各一兩椒汗大戟炙甘遂天雄各二分炮上十三味末之以蜜和如梧子大服二丸日二忌桃李雀肉豬肉冷水經心録同名鴟頭丸又芎藭湯主風癲引脅牽痛發作則吐耳如蟬鳴方芎藭藁本䕡茹各五兩上三味切納酒一斗煮取三升頓服酒一升羸者二服取大汗深師同又方生天門冬十斤生地黃三十斤上二味取汁作煎服之忌鯉魚蕪荑又天門冬酒通治五臟六腑大風洞虛五勞七傷癥結滯氣冷熱諸風癲癇惡疾耳聾頭風四肢拘攣猥退歷節風萬病皆主之久服延年輕身齒落更生發白再黑方天門冬與百部相似天門冬味甘兩頭方百部細長而味苦令人利門冬汁一斗漬曲二升令發以米二斗準家法醞之春夏極冷下飯秋冬溫如人肌酒熟取清服一盞常令酒相接勿至醉吐慎生冷酢滑雞豬魚蒜特忌鯉魚亦忌油脂此是一斗汁法餘一石二石亦準此以為大率服藥十日覺身體大癢二十日更大癢三十日乃漸止此是風氣出去故也四十日即覺心豁然大快似有所得五十日更覺大快當風坐臥覺風不著人身中諸風悉盡用米法先淨淘米暴炕令乾臨欲用時更別取天門冬汁漬米灑炊之餘汁拌飯取天門冬汁法淨洗天門冬干漉去水切之搗押取汁三四遍令滓干如草乃止此酒初熟味酸仍作臭泔腥氣但依式服之久停即香美余酒不及也封四七日佳凡八月九月即少少合至十月合擬到來年五月三十日以來相續服之春三月亦得合入四月不得合服酒時若得散服更得力倍速散方如下天門冬去心皮暴乾搗篩以上件酒張方寸匕日三加至三匕久服長生凡酒亦得服之又療風癲方茯神白龍骨研龍齒研龍角研龍膽蔓荊子鐵精研乾薑各十分人參遠志去心黃連大黃各八分芎藭白芷黃芩當歸各六分桂心五分去皮上十七味末之蜜和丸湯服十五丸如梧子大日二稍稍加之以知為度忌酢物豬肉冷水生蔥並出第十四卷中古今録驗療風癲六生散方菖蒲蒴藋一作雚蘆防風茵芋商陸根蜀附子炮各二兩上六味搗下篩酒服錢五匕日再服不知稍增以知為度忌豬肉冷水羊肉餳牛犬肉蒜等又侯氏黑散療風癲方菊花四十分防風白朮各十分茯苓細辛牡蠣熬鍾乳研礜石泥裹燒半日研人參乾薑桂心芎藭當歸礬石如馬齒者燒令汁盡研各三分黃芩五分上十五味搗合下篩以酒服方寸匕日三忌桃李雀肉胡荽青魚鮓酢物生蔥生菜並出第十卷中張仲景此方更有桔梗八分無鍾乳礜石以溫酒下之禁一切魚肉大蒜常宜冷食六十日上即藥積在腹中不下也熱食即下矣冷食自能助藥力五癲方三首病源五癲者一曰陽癲發時如死人遺尿有頃乃解二曰陰癲坐小時臍瘡未愈數洗浴因此得之三曰風癲發則眼目相引牽縱反強羊鳴食頃方解由熱作汗出當風因以房室過度醉飲飽滿行事令心意逼迫短氣脈悸得之四曰濕癲眉頭痛身重坐熱沐頭濕髻腦沸未止得之五曰馬癲發作時反目口噤手足相引身熱坐小時膏氣腦熱不和得之皆然診其脈心脈微澀為癲疾並脾脈緊而疾者癲脈也腎脈急甚為骨癲疾脈洪大而長者癲疾脈浮大附陰者癲疾脈來牢疾者癲疾三部脈緊急者癲可療發則仆地吐涎沫無所知若強掠起如狂及遺糞者難療脈虛則可療實則死脈緊弦實牢者生脈沉細小者死脈搏大滑久久自已其脈沉小急疾不可療小牢急亦不可療出第二卷中古今録驗莨菪子散療五癲反側羊鳴目翻吐沫不知痛處方豬卵一具陰乾百日莨菪子三升牛黃八分研鯉魚膽五分桂心十分研上五味切以清酒一升漬莨菪子暴令乾盡酒止乃搗合下篩酒服五分匕日再當如醉不知稍增以知為度忌生蔥等又鐵精散療五癲方鐵精一合研芎藭防風各一兩蛇床子五合上四味合搗篩酒服一錢匕日三有效文仲範汪同又療五癲牛癲則牛鳴馬癲則馬鳴狗癲則狗吠羊癲則羊鳴雞癲則雞鳴五癲病者腑臟相引盈氣起寒厥不識人氣爭瘛瘲吐沫久而得蘇雄黃丸方鉛丹二兩熬成屑真珠雄黃研水銀熬雌黃一方無各一兩丹砂半兩研上六味搗和以蜜又搗三萬杵乃丸先食服胡豆大三丸日再驚癇亦愈良忌生血物千金範汪同云各五兩小兒三丸如小豆並出第六卷中癇方三首廣濟療癇疾積年不瘥得熱即發水銀丸方水銀紙裹煉麥門冬去心烏蛇脯炙鐵精研乾地黃各八分龍角研人參防風子芩升麻各六分熊膽四分研上十一味搗篩蜜和丸如梧子食後以生驢乳汁下二十丸漸漸加至三十丸日再不利忌蕪荑生菜熱面蕎麥炙肉蒜黏食出第一卷中千金大鎮心丸主諸癇醫所不救方虎睛一具酒漬一宿炙防風秦艽防葵龍齒研黃芩雄黃防己山茱萸茯苓鐵精研鬼臼人參大黃銀屑研乾薑牛黃研各四分寒水石六分研羌活升麻遠志白蘚皮細辛白薇貫衆麝香鬼箭各三分茯神石膏研天雄炮各二分蛇蛻皮一尺炙蜂房二分炙上三十二味搗篩蜜和酒服十五丸日二服加至三十丸忌醋物生菜豬肉冷水出第十四卷中崔氏云療風癇及風邪有鴟頭三枚炙無茯苓余並同救急療癇少老增減之方竹茹一握衣中白魚七頭上二味以酒一升煎取二合頓服之出第八卷中風癇及驚癇方五首廣濟療風癇卒倒嘔沫無省覺方麻黃去節大黃牡蠣熬黃芩各四兩寒水石白石脂石膏研赤石脂紫石英滑石研各八兩人參桂心各二兩蛇蛻皮一兩炙龍齒六兩研甘草三兩炙上十五味搗篩為散八兩一薄以絹袋盛散藥用水一升五合煮取一薄取七合絞去滓頓服之日一服一方水二升煮散方寸匕取一升去滓服之少小百日服一合熱多者日二服三五日一服亦得本方無麻黃龍齒蛇蛻皮忌海藻菘菜生蔥熱面蕎麥豬肉蒜膩黏食又方吊藤皮麻黃去節各二分龍齒六分研綿裹銀一斤寒水石梔子擘知母石膏碎綿裹杏仁去兩仁皮尖研各十二分升麻十分子芩十分蛇蛻皮七寸炙蚱蟬四枚去足翅炙柴胡十分芍藥沙參各八分生葛汁五分蜜七合牡牛黃如大豆粒十枚煎成研下之上十九味切以水六升淡竹瀝二升合煮取二升四合絞去滓納杏仁脂葛汁蜜於微火煎攪不停手令餘二升三合成三四歲一服二合五六歲一服二合半日再服稍增兒若大便澀者加大黃十分慎熱面炙肉魚蒜黏食油膩冷水並出第一卷中深師療大人風及少小驚癇瘛瘲日數十發醫所不能療除熱方龍骨大黃乾薑各四兩牡蠣三兩熬滑石赤石脂白石脂桂心甘草炙各三兩上九味搗下篩葦囊盛大人三指撮以井華水二升煮三沸藥成適寒溫大人服一升未滿百日服一合未能飲者綿裹箸頭納湯中著小兒口中以當乳汁熱多者日四服無毒以意消息之忌海藻菘菜生蔥一方無大黃赤石脂桂心甘草出第九卷中崔氏療暴得驚癇立驗方朱四云極效吊藤皮茯神黃芩升麻白蘚皮沙參各二兩龍齒三兩石膏八兩蚱蟬七枚去翅炙研湯成內寒水石六兩碎研裹甘竹瀝二升湯熟內之上十一味切以水九升煮取三升溫分三服相去六七里久若小孩子患藥各減量取多少細細飲之立瘥忌醋物又療大人風引少小驚癇瘛瘲日數十發醫所不能療除熱鎮心紫石湯方紫石英滑石白石脂石膏寒水石赤石脂各八兩大黃龍骨乾薑各四兩甘草炙桂心牡蠣熬各三兩上十二味搗篩盛以葦囊置於高涼處大人欲服乃取水二升先煮兩沸便納藥方寸匕又煮取一升二合濾去滓頓服之少小未滿百日服一合熱多者日二三服每以意消息之紫石湯一本無紫石英紫石英貴者可除之永嘉二年大人小兒頻行風癇之病得發例不能言或發熱半身掣縮或五六日或七八日死張思惟合此散所療皆愈忌海藻菘菜生蔥此本仲景傷寒論方古今録驗範汪同並出第六卷中風毒方五首廣濟療風毒發即眼睛疼腳縱中指疼連肘邊牽心裹悶兩肋脹少氣力喘氣急欲絶不能食黃耆丸方黃耆黃連各七分防風甘草炙五分五加皮白蘚皮枳實炙各四分升麻車前子苦參炙麥門冬去心葶藶子熬巨勝各六分上十三味搗篩蜜和丸如梧子空腹以酒浸大豆下二十丸漸加至三十丸日二服不知增之忌海藻菘菜豬肉冷水熱面炙肉蕎麥並出第一卷中深師芍藥湯療中毒風腫心腹痛達背迫氣前後如疰痛方芍藥細辛桂心甘草炙當歸吳茱萸獨活各二兩乾地黃二兩生薑五兩桃仁四十枚去皮兩仁尖碎上十味切以水九升煮取三升分為四服宜利者加大黃二兩忌海藻菘菜生蔥蕪荑生菜並出第九卷中備急虎骨酒療男子女人骨體疼痛風毒流灌臟腑及至骨肉方虎骨一具炭火炙令黃色刮削去脂血捶碎取盡搗篩得數升絹袋盛清酒六升浸五宿隨多少稍稍飲之日二三杯酒盡更添文仲同又續命湯療毒風其病喉咽塞氣噎或口不能言或身體緩縱不能自勝不知痛處拘急腰背強引頭恍恍惚惚不得臥轉側綿絶欲死此毒風所作方麻黃三兩去節石膏碎綿裹乾薑各二兩防風一兩當歸芎藭甘草炙黃芩桂心各二分杏仁二十枚去兩仁尖皮碎上十味切以水九升煮取三升分服小取汗若口噤不能飲絞口與湯不過二三劑忌海藻菘菜生蔥並出第九卷中千金逐風毒石膏湯方石膏如雞子大三枚碎綿裹麻黃三兩去節杏仁三十枚去皮尖兩仁碎雞子二枚甘草一尺指許大炙上五味切以水三升破雞子納水中洋令相得納藥煮取一升服之覆取汗汗不出燒石尉令汗出良忌海藻菘菜等物並出第八卷中風多汗及虛汗方五首深師療風多汗惡風四味防風散方防風五分澤瀉牡蠣熬桂心各三分上藥搗下篩為散先食酒服方寸匕日再忌生蔥又療風汗出少氣方趙子高法防風十分白朮九分牡蠣三分熬上三味搗篩為散以酒服方寸匕日三增至二三匕惡風倍防風少氣倍術汗出面腫倍牡蠣忌桃李雀肉胡荽火蒜青魚鮓等物並出第九卷中延年療風虛止汗石膏散方石膏研甘草炙各四分上二味合搗下篩為散先食以漿水服方寸匕日三夜再服忌海藻菘菜等又療風虛汗出不止方秦艽附子炮石斛菖蒲白朮桂心各三分麻黃根防風各五分上八味搗為散以酒服方寸匕日三忌羊肉餳豬肉冷水桃李雀肉生蔥並出第五卷中刪繁療大虛汗出欲死若自汗出不止方麻黃去節附子炮各一兩牡蠣二兩熬上三味搗下篩以一合藥白粉一升合和令調以粉汗上一方粉二升忌豬肉冷水出第九卷中風熱方六首病源風熱者風熱之氣先從皮毛入於肺也肺為五藏上蓋候身之皮毛若膚腠虛則風熱之氣先傷皮毛乃入肺也其狀令人惡風寒戰目欲脫涕唾出候之三日內及五日內目不精明者是也七八日微有青黃膿涕如彈丸大從口鼻內出為善也若不出則傷肺變咳唾膿血也出第二卷中延年黃連丸主風熱氣發即頭面煩悶不能食兼欠呿眠睡不安方黃連十二分人參茯神各六分葳蕤四分豉一合熬生薑屑三分上六味搗篩蜜和為丸如梧子一服十丸食上飲汁下日二服加至十五丸二十丸忌豬肉冷水酢物又葳蕤飲主風熱項強急痛四肢骨肉煩熱方葳蕤三兩羚羊角屑人參各二兩蔥白切一升豉一升綿裹上五味切以水五升煮取二升去滓納豉煎取一升五合去豉分溫三服如人行八九里取微汗即瘥忌蒜面脂魚文仲處又葳蕤丸主虛風熱發即頭熱悶不能食方葳蕤六分人參白朮各五分甘草四分炙上四味搗篩蜜和為丸如梧子一服十丸食上飲汁下日三服加至十五二十丸忌桃李海藻菘菜雀肉等物文仲處並出第十卷中千金翼防風丸主肺間風熱旦朝好噴嚏方防風茯神各三分天門冬四分去心芎藭白芷人參各二分上六味搗篩蜜和丸如梧子酒服十丸日二服加至十五丸忌鯉魚鮓物蔣孝璋處又葳蕤丸主熱風沖頭面妨悶方葳蕤黃連各八分防風人參各六分茯神五分豆豉三合熬上六味搗篩蜜和為丸如梧子一服十五丸飲汁下日二服加至二十丸若冷用酒下之忌豬肉冷水酢物蒜熱面出第十八卷中近效療熱風沖頂熱悶方訶黎勒一枚取大者芒硝三合醋一升上三味搗訶黎勒為細末並芒硝於醋中攪令消摩塗熱處日一二度張文仲處必效範汪同頭風及頭痛方一十首病源頭面風者是體虛陽經脈為風所乘也諸陽經脈上走於頭面運動勞役陽氣發泄腠理開而受風謂之首風病狀頭面多汗惡風病甚則頭痛又新沐中風則為首風又新沐未乾不可以臥使頭重身熱反得風則煩悶診其脈寸口陰陽表裡互相乘如風在首久不瘥則風入腦則變為頭眩養生云飽食仰臥久成氣病頭風又云飽食沐發作頭風又云夏不用露面臥露墮面上令面皮厚喜成癬一云作面風其湯尉針石別有正方補養宣導今附於後養生方導引法云一手拓頤向上極勢一手向後長舒急弩四方顯手掌一時俱極勢四七左右換手皆然拓頤手兩向共頭𣣱側轉身二七去臂膊頭風眠睡又云解發東向坐握固不息一通舉手左右導引手掩兩耳治頭風令發不白以手復捋五通脈也又云熱食枕手臥久成頭風目澀又云端坐伸腰左右傾頭閉目以鼻內氣除頭風自極七息止又云頭痛以鼻內徐吐出氣三十過休又云欲治頭痛閉氣令鼻極偃臥乃息汗出乃止又云叉兩手頭後極勢振搖一七手掌翻覆安之二七頭欲得向後仰之一時一勢欲得𣣱斜四角急挽之三七去頭掖膊肘風出第二卷中千金療頭風方附子一枚中形者炮裂鹽附子大上二味作散沐頭畢以方寸匕摩頂上日三忌豬肉冷水等又方服荊瀝不限多少取瘥又方又搗蒴藋根二升酒二升漬服汁又方蔓荊子二升酒一斗絹袋盛浸七宿溫服三合日三又方臘月烏雞屎一升炒令黃末之絹袋盛酒三升浸溫服之多少任性常令醺酣又方七月七日麻勃三升麥子一碩末相和蒸之沸湯一碩五斗三遍淋之煮取一石神麯二十斤漬之令發以黍米兩石五斗釀之熟封三七日服清一升百日中身澀皮八風五臟骨髓伏風百病悉去又方生油二升鹽一升末油煎一宿令消盡塗頭石鹽尤良又方大豆三升炒令無聲先以一斗二升瓶盛九升清酒乘豆熱即傾著酒中密泥頭七日溫服之並出第十三卷中延年療風熱頭痛掣動方防風黃芩升麻芍藥各二兩龍骨石膏碎各四兩乾葛三兩竹瀝二升上八味切以水六升和瀝煮取二升六合去滓分溫三服日晚再忌蒜面豬肉油膩又療風勞氣吐逆不能食四肢骨節痠疼頭痛頂重方茯苓三兩枳實炙橘皮人參芍藥各二兩生薑四兩上六味切以水五升煮取三升去滓分溫三服日晚再忌面蒜醋物並出第十卷中風頭眩方九首病源風頭眩者由血氣虛風邪入於腦而引目系故也五臟六腑之精氣皆上注於目血氣與脈並上為系上屬於腦後出於項中逢身之虛則為風邪所傷入腦則腦轉而目系急目系急故成眩也診其脈洪大而長者風眩又得陽維浮者暫起目眩也風眩久不瘥則變為癲其湯尉針石別有正方補養宣導今附於後養生方導引法云以兩手拘右膝著膺除風眩又云凡人常覺脊背倔強不問時節縮咽膊內仰面努膊並向上頭左右兩向挼之左右三七一住待血行氣動住然始更用初緩後急不得先急後緩若無病人常欲得旦起午時日沒三辰別二七徐寒熱病脊腰頸項痛風痹口內生瘡牙齒風頸頭眩衆病盡除又云大寒不覺暖熱久頑冷患耳聾目眩病久行即成法法身五六不能變也又云低頭不息六通治耳聾目癲眩咽喉不利又云大前側牢不息六通愈耳聾目眩隨左右聲伏並兩膝耳著地牢強意多用力至大極愈耳聾目眩病久行不已耳聞十方亦能倒頭則不眩也出第二卷中千金療風頭眩口喎目痛耳聾大三五七散方天雄細辛各三兩山茱萸乾薑各五兩薯蕷防風各七兩上六味搗篩為散清酒服五分匕日再不知稍稍加之忌豬肉生菜又療頭風目眩耳聾小三五七散方天雄三兩炮山茱萸五兩薯蕷七兩上三味搗篩為散以清酒服五分匕日再不知稍增以知為度忌豬肉冷水並出第十三卷中崔氏療忽頭眩暈經久不瘥四體漸羸食無味好食黃土方白朮三斤曲三斤上二味搗篩酒和並手捻丸如梧子曝乾飲服二十枚日三忌桃李雀肉等又療風眩翻倒無定方獨活六兩枳實炙三兩石膏碎綿裹蒴藋各四兩上四味切清酒八升煮取四升頓服之以藥滓尉覆取汗覺冷又納鐺中溫令熱熱又尉之即瘥文仲肘後千金同又療頭痛眼眩心悶陰雨彌甚方當歸山茱萸各一兩防風柴胡薯蕷各二兩雞子二枚熟去皮打黃碎上六味搗下篩用前雞黃和散令調酒服方寸匕日三並出第六卷中延年薯蕷酒主頭風眩不能食補益氣力方薯蕷白朮五味子碎丹參各八兩防風十兩山茱萸二升碎人參二兩生薑屑六兩上八味切以絹袋盛酒二斗五升浸五日溫服七合日二稍加忌桃李雀肉等出第十卷中古今録驗九江太守獨活散療風眩厥逆身體疼痛百節不隨目眩心亂反側若癲發作無常方獨活四分白朮十二分防風八分細辛人參乾薑各四分蜀天雄炮桂心各一分栝蔞六分上九味搗合細篩旦以清酒服半方寸匕日再忌桃李雀肉豬肉冷水生菜生蔥等物又防風湯療風眩嘔逆水漿不下食輒嘔起即眩倒發作有時手足厥方防風白朮防己乾薑甘草炙各一兩附子炮桂心各半兩蜀椒一百枚汗上八味切以水四升煮取一升半分為三服忌豬肉冷水生蔥海藻菘菜桃李雀肉等出第四卷中近效白朮附子湯療風虛頭重眩苦極不知食味暖肌補中益精氣又治風濕相搏骨節疼痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣身體微腫者方白朮三兩附子二枚炮甘草二兩炙桂心四兩上四味切以水六升煮取三升分為三服日三初服得微汗即解能食復煩者將服五合以上愈忌海藻菘菜豬肉生蔥桃李雀肉等此本仲景傷寒論方頭風旋方七首廣濟療熱風頭旋心悶衝風起即欲倒方麥門冬去心山茱萸茯神苦參各八分地骨皮薯蕷人參蔓荊子沙參防風芍藥枳實大黃各六分甘菊花龍膽各四分上十五味搗篩蜜丸每食訖少時以蜜水服如梧子大二十丸日二漸加至三十丸不利忌酢物熱面炙肉蒜豬肉魚黏食又療頭面熱風頭旋眼澀項筋急強心悶腰腳疼痛上熱下冷健忘方肉豆蔻十顆去皮人參犀角屑枳實炙各六分黃連白朮大黃各八分甘草炙苦參旋覆花各四分檳榔仁十顆上十一味搗篩蜜和丸如梧子以酒飲服二十丸漸加至三十丸日三服無問食前後服之不利忌生菜熱面蕎麥酒蒜豬肉海藻菘菜桃李雀肉等又療心虛感風頭旋心忪痰飲築心悶惛惛惚惚不能言語宜微吐痰此候極重秦艽飲子吐方秦艽常山人參羚羊角屑各二兩甘草三兩生用上五味切以水六升煮取二升絞去滓分溫二服日再如人行四五里久進一服取快吐不利忌生菜生蔥熱面蕎麥豬肉魚海藻菘菜並出第一卷中貼頂膏療頭風悶亂鼻塞及頭旋眼暗皆主之方萆麻去皮杏仁去兩仁皮尖石鹽芎藭松脂防風上六味等分先搗石鹽以下四種為末別搗萆麻杏仁相次入訖即臘紙裹之有病者先灸百會三壯訖刮去黑毛使淨作一帛帖子裁大於灸處塗膏以貼上兩日三日一易之其瘡於後即爛破膿血出及帛貼之似爛柿蒂出者良一方用膿兼前七物相和出第三卷中延年療頭風旋不食食即吐方前胡三兩白朮防風枳實炙茯神各三兩生薑四兩上六味切以水六升煮取二升去滓分溫三服忌桃李雀肉酢又療風邪氣未除發即心腹滿急頭旋眼暈欲倒方芎藭獨活防風白朮杏仁去尖皮枳實炙各二兩茯神三兩生薑四兩羚羊角屑黃芩各一兩上十味切以水九升煮取三升分為三服日三忌桃李雀肉大酢蒜面等又療風痰氣發即頭旋嘔吐不食防風飲方防風人參橘皮各二兩白朮茯神各三兩生薑四兩上六味切以水六升煮取三升去滓分溫四服中間任食一日令盡忌大醋桃李雀肉蒜面等物並出第十卷中癮疹風疹一十三首俗呼為風矢者是也黃帝素問曰風邪客於肌中肌虛真氣致散又被寒搏皮膚外發腠理淫氣行之則癢也所以癮疹瘙疾皆由於此有赤疹忽起如蚊蚋啄煩癢重沓壟起搔之逐手起也刪繁同深師療十種疹散方鬼箭甘草炙白蘞白朮礬石熬各一兩防風二兩上六味搗篩以菜米粉五合極拭身以粉納藥中搗合一服五分匕日三中間進食不知增之忌海藻菘菜桃李雀肉等出第十卷中千金癮疹百療不瘥方景天一斤一名護火草上一味搗絞取汁塗上熱炙摸之再三即瘥又方黃連芒硝各五兩上二味以水六升煮取四升去滓洗之日四五度良忌豬肉冷水範汪同又療風痹癮疹方以酒六升煮大豆三升四五沸服一杯日三又方蛇床子二升防風三兩生蒺藜二斤上三味切以水一斗煮取五升漬綿拭之日四五範汪同又方白朮三兩戎鹽半兩黃連黃芩芎藭細辛莽草茵芋各一兩礬石半兩上九味切以水一斗煮取三升洗之日三又方馬藺子蒴藋茺蔚子礬石蒺藜茵芋羊桃萹蓄各二兩上八味切以酢漿水二斗煮取一斗二升納礬石洗之日三範汪無馬藺並出第二十三卷中崔氏療風疹遍身方麻黃去節生薑各三兩防風二兩芎藭芍藥當歸蒺藜子甘草炙獨活烏喙人參各一兩上十一味切以水九升煮取二升八合絞去滓分溫三服訖進粥食三日慎生冷酢滑豬肉冷水海藻菘菜出第四卷中延年塗風疹蒴藋湯方蒴藋根切蒺藜子羊桃切楮枝切茺蔚子石鹽各半升辛夷仁礬石各三兩上八味切以水一斗煮取三升去滓納鹽攪消用塗風疹上下塗之一方有菟藿又方取枳實以醋漬令濕火炙令熱適寒溫用尉上即消文仲處並出第十卷中古今録驗療三十歲癮疹耳目皆合春秋輒發方於南屋東頭第一梁壁外以細灰厚布地大小足容兩腳躡灰上訖使病人徑去勿反顧灸腳十趾間灸灰上隨病人年為壯數車瑗道方已試神良範汪同出第十卷中元侍郎希聲集療卒風疹祕驗方石灰隨多少和醋漿水塗疹上隨手即減出第一卷中近效療風疹方生蔥一大束三尺以上圍者並根鬚鹽三大升以香漿水三石煮取兩石並大斗於浴斛中適冷熱浸雖積年患者不過三兩度浸必瘥風搔身體癮疹方五首病源邪氣客於皮膚復逢風寒相折則起風搔癮疹若赤疹者由涼濕搏於肌中之熱熱結成赤疹也得天熱則劇取冷則滅也白疹者由風氣搏於肌中之熱熱與風相搏為白疹也得天陰雨冷則劇出風中亦劇得晴暖則滅厚衣身暖亦瘥也脈浮而大浮為風虛大為氣強風氣相搏即成癮疹身體為癢養生方云汗出不可露臥及浴使人身振寒熱風疹也出第二卷中深師療風搔癮疹如漆瘡連心中悶方天雄炮蝭母知母也牛膝各四分防風六分桂心干藍細辛人參各三分栝蔞五分白朮八分上十味搗篩先食服半錢匕日再不知稍增之忌豬肉生蔥生菜桃李雀肉等又療風搔身體癮疹粉散方烏頭炮桔梗細辛白朮各一兩上四味搗篩以鉛朱為色粉四升和令調以粉身範汪同並出第十卷中千金療風搔癮疹方牛膝末酒服方寸匕日三並主骨肉疽癲病及㾦瘰出第二十三卷中延年蒴藋膏主身癢風搔癮疹方蒴藋根切蒺藜子各一升附子獨活犀角屑薔薇根白芷防風苦參及己升麻白蘞防己各三兩川椒莽草青木香蛇床子蛇銜草各二兩茺蔚子切一升枳實五枚炙茵芋二兩半切上二十一味切以苦酒漬令淹匝一宿明旦銅器中炭火上用豬膏五升煎令三上三下以候白芷色黃膏成絞去滓納不津器中用摩風疹張文仲同又茺蔚浴湯主身癢風搔或生癮疹方茺蔚蒺藜羊桃蒴藋根苗亦得漏蘆蒿各一斤鹽三斤上六味切以水三石煮取二石五斗去滓納鹽令消適寒溫先飽食即入浴能良久浸最好每至夜即浴浴訖即臥慎風如法並出第十三卷中風熱頭面疹癢方四首千金療風搔腫癢在頭面大黃㧺洗方大黃芒硝各四分莽草二分黃連六分黃芩八分蒺藜五合上六味切以水七升煮取三升半去滓納芒硝訖帛㧺上日一過勿令近眼出第二十三卷中延年牡丹膏主項強痛頭風搔疹癢風腫方牡丹皮當歸芎藭防風升麻防己芒硝各六分芍藥細辛乾薑犀角屑漏蘆蒴藋零陵香各四分杏仁去兩仁皮尖碎梔子仁黃芩大黃青木香各三分竹瀝二升上二十味切以竹瀝漬一宿醍醐三升半煎於火上三下三上候芍藥黃膏成絞去滓以摩病上又犀角竹瀝膏主風熱發即頭項脈掣動急強及熱毒疹癢方犀角十二分屑升麻八分蒴藋根秦艽獨活白芨菊花白朮防己白芷當歸防風芎藭青木香寒水石碎苦參漏蘆根各四分蒺藜子二合莽草二分枳實二枚四破梔子仁七枚竹瀝三升吳藍一兩上二十三味切以竹瀝漬一宿明旦於炭火上和豬脂五升煎令九上九下以候白芷色黃膏成絞去滓納於不津器中用摩風處日三張文仲同並出第七卷中肘後枳實丸療熱風頭面癢風疹如㿗方枳實六分炙天門冬去心獨活蒺藜仁防風桔梗各五分黃連薏苡仁各四分菌桂一分半上九味搗篩蜜和丸如梧子飲服十五丸日再如能以酒和飲之益佳不限食之前後以意加減忌鯉魚生蔥豬肉冷水出第四卷中一方有人參五分風搔癮疹生瘡方六首病源人皮膚虛為風邪所折則起癮疹寒多則色赤風多則色白甚者癢痛搔之成瘡出第二卷中深師療風癮疹或發瘡甚則胸急滿短氣欲吐方茵芋七分泰山者炙芎藭烏頭炮防風白蘞乾薑各三分桂心二分上七味搗下篩為散服半錢匕日再忌豬肉生蔥又療癮疹煩滿及血不止方取新濕馬矢絞取汁服二升微者一升立愈若干者水濕取汁並出第十卷中延年療風疹癢悶搔之汁出生瘡洗湯方苦參一小斤漏蘆根一小斤枳實五小兩蒺藜一小斤楮莖葉一小斤嫩者上五味切以清漿水二升煮取一大升以綿沾拭癢處日八九度訖以粉粉拭處瘥又枳實丸主風熱氣發沖頭面熱皮膚生風疹瘙癢盛生瘡不能多食方枳實炙蒺藜子苦參各六分人參四分獨活天門冬去心菌桂各三分白朮四分上八味搗篩蜜和丸如梧子一服十丸用薄酒下日二加至十五丸忌蒜熱面鯉魚桃李雀肉生蔥並出第十卷中又升麻犀角膏療諸熱風毒氣癢衝出皮膚搔即癮疹赤起兼有黃水出後結為膿窠瘡悉主之方升麻犀角屑白蘞漏蘆枳實炙連翹生蛇銜草乾薑芒硝研湯成下各二兩黃芩三兩梔子二十枚擘蒴藋根四兩玄參三兩上十三味切以竹瀝二升漬一宿以成煉豬脂五升煎令竹瀝水氣盡絞去滓納芒硝攪令凝膏成用摩患處日五六度益佳文仲同近效療風熱結疹搔之汁出癢不可忍方麻黃根五兩蛇床子四兩蒺藜子礬石各二兩熬白粉二小升上五味搗篩生絹袋盛癢即粉之此方甚良風身體如蟲行方四首病源夫人虛風邪中於榮衛溢於皮膚之間與虛熱並故遊奕遍體狀如蟲行出第二卷中千金石南湯療六十四種風淫淫液液走人皮膚中如蟲行腰脊強直五緩六急手足拘攣癮疹搔之作瘡風尸身癢卒面目腫起手不上頭口石南炙乾薑黃芩細辛人參各一兩桂心麻黃去節當歸芎藭各六分甘草八分炙乾地黃三分食茱萸五分上十二味切以水六升酒三升煮取三升去滓分為三服取大汗勿觸風但是癮疹服之皆瘥忌蕪荑生蔥生菜海藻菘菜等又療舉體痛癢如蟲齧皮上癢時瘙則皮脫作瘡方蒺藜子三升碎蛇床子二升茺蔚子一升防風五兩大戟一斤大黃二兩礬石三兩熬上七味切以酒四升水七升煮取四升去滓納礬石三上火燒用帛拭身上瘥止又方灸曲池隨年壯發即灸之神良並出第二十三卷中延年疾藜子丸療熱風沖頭面癢如蟲行身上時有風疹出除風熱消疹兼補益堅筋骨倍氣力充實方蒺藜子六分黃耆獨活白芷防風薯蕷各三分枳實炙人參黃連各四分葳蕤地骨白皮各二分桂心一分上十二味搗篩蜜和為丸如梧子一服十丸酒下日二服加至十五丸中間欲服術煎及黃連丸並無妨忌豬肉生蔥張文仲處出第三卷中癧瘍風方一十五首廣濟療癧瘍風方石硫黃三兩研雄黃一兩研硇砂附子生用各二兩上四味搗篩為散以苦酒和如泥塗瘍處干即更塗以瘥為度出第五卷中集驗療癧瘍方苦酒於瓦甌底磨硫黃令如泥又取附子截一頭又磨硫黃上使熟將臥先以布拭瘍上數過乃以藥敷之即愈深師處文仲範汪延年同又方硫黃研礬石研水銀別研入灶墨上四味等分搗下篩納碗子中以蔥葉中涕和研之臨臥以敷病上肘後同並出第九卷中刪繁療癧瘍方取五月五日車轍中水並牛蹄中水浴甚良出第九卷中千金療癧瘍方取三年酢磨烏賊魚骨先布磨肉赤即敷之良又方取塗中先死蜣螂搗爛之當揩令熱封之一宿瘥止又方酢磨硫黃塗之最上又方雌黃研蛇蛻一具燒灰研槲皮燒灰研硫黃研上四味分等下篩以清漆和之塗白處欲塗時先以巴豆半截拭白處皮微破然後敷之不過兩三度即瘥並出第二十四卷中崔氏療癧瘍方取茵陳蒿兩握以水一斗五升煮取七升以皂莢湯先洗癧瘍令傷然後以湯洗之湯冷更溫洗可作三四度洗隔日作佳不然恐痛難忍出第四卷中救急療癧瘍方取青胡桃皮搗之並少許醬清和磠砂令相入如煎餅面先以泔清洗之然後敷藥又方以醬汁研石硫黃作泥以生布揩破以敷瘍上又方以石硫黃熏之令汗出佳並出第五卷中古今録驗療身體癧瘍班駁女葳膏方女葳一分附子一枚炮雞舌香青木香各二分麝香方寸匕白芷一分上六味㕮咀以臘月豬膏七合煎納五物微火煎令小沸急下去滓納麝香攪調復三上三下膏成以浮石摩令小傷以敷之又方三淋蒴藋淋灰取汁熏之洗癧瘍訖醋研木防己塗之即愈神驗達奚送又蜀水花膏療癧瘍方蜀水花白附子麝香白蘞商陸鷹屎白各二兩上六味切以豬膏二升合煎之沸三上二下膏成以敷上並出第十卷中白癜風方九首廣濟療白癜風方苦參三斤露蜂房炙松脂附子炮防風各三兩梔子仁五兩烏蛇脯六兩炙木蘭皮上八味搗篩為散一服一匕以酒下宜常吃蘿蔔菜勿食雞肉豬肉冷水熱面生菜文仲同又方黑油麻一大升生地黃五大兩桃仁去兩仁皮尖三十枚熬上三味先退去油麻皮蒸之日曝乾又蒸之如此九度訖又曝取干搗令極碎然後搗地黃桃仁羅之即總相和加少蜜令相著一服一匙日再服和酒吃空吃亦得兼食諸肺尤妙忌蕪荑熱面豬蒜油膩等又方礬石研硫黃研上二味等分酢和敷之並出第五卷中千金療白癜風方酒服生胡麻油一合日三稍加至五合慎生冷豬魚蒜百日服五升瘥又方揩上令破摘蘿摩白汁塗之日日為之取瘥為度崔氏療白癜風神效方劉祕監録選雌黃七分細研木蘭皮白朮各八分苦參芎藭麻黃去節山茱萸甘草炙狗脊枳實炙各四分秦艽沙參細辛牛膝白蘞人參當歸薯蕷白芷各五分防風附子炮枲耳子各六分上二十二味搗篩為散酒服方寸匕日再漸漸加至二匕忌生蔥菜海藻菘菜豬肉桃李雀肉等出第四卷中古今録驗療疱白癜風商陸散方生商陸根切一升白蘞天雄炮黃芩各三兩乾薑四兩附子炮躑躅花一升上七味搗篩酒服五分匕日三忌豬肉冷水千金同亦主癧瘍又療白癜風附子膏方附子炮天雄炮烏頭炮各三兩防風二兩上四味切以豬膏三升合煎之先服散白癜上以膏敷之一方無防風又方蘿摩草煮以拭之取瘥並出第八卷中白駁方七首集驗療頸項及頭面上白駁侵淫漸長有似癬但無瘡可療之方干鰻鱺魚脂以塗之先洗拭駁上外把刮之使磣痛拭燥然後以魚脂塗之一塗便愈難者不過三塗之深師千金同又方取蛇蛻皮熟摩之數百過棄皮置草中深師千金同又療身體白駁方取木空中水洗之搗桂屑唾和敷駁上日三千金文仲同並出第七卷中古今録驗療面白駁方出徐王弊帛蟬頸帚甑帶脯臘履底蛇皮上七味等分以月蝕之夕盛蝕時合燒之搗篩以酒服方寸匕日二二服止以淳苦酒和塗白上一拯除之又方荷葉裹鮓合葉相和更裹令大臭爛先拭令熱敷之即瘥二公主方又療舉體苦白駁經年不瘥此風虛生菖蒲酒方陸地菖蒲細切一石別煮天門冬一斤去心天雄三兩去皮生用麻子仁一升茵芋乾漆乾地黃遠志去心各三兩露蜂房五兩苦參一斤黃耆半斤獨活石斛各五兩柏子仁二升蛇皮長三尺大蓼子一升上十六味㕮咀之以絹囊盛著先以水二斛五斗煮菖蒲根取八斗以釀一斛五斗米許用七月七日造冬月酒成漉糟停藥著器中下消減令人延年益壽耳目聰明氣力兼倍一劑不覺更作尤妙當以瘥為期更重煮菖蒲去滓取汁以漬洗悉益佳禁食羊肉餳鯉魚豬肉蕪荑雞犬生冷十日酒定熟須去滓佳並出第八卷中
