body:
  text: 卷第三十一採藥時節一首千金翼論曰夫藥採取不以時節不知陰乾曝乾雖有藥名終無藥實故不依時採取與朽木不殊徒費人功卒無裨益其法雖具本經學者尋覽造次難得所以甄別即目可知耳葳蕤立春後採陰乾藁本曝乾三十月通草取枝陰乾烏喙陰乾烏頭陰乾絡石陰乾以上並正月採茯苓陰乾茯神陰乾桂心陰白朮曝乾地黃陰天門冬曝麥門冬陰薯蕷曝甘草曝人參曝勿見風石龍芮採皮陰乾藁本曝龍膽陰杜仲陰牛膝陰細辛陰獨活曝升麻曝柴胡曝榆皮曝藍葉曝當歸陰防風芍藥桔梗秦艽前胡知母栝蔞根沙參狗脊茜根王不留行萆薢菝葜白芷杜若百合白蘞地榆以上曝乾大黃火干虎掌黃連秦皮豬苓石葦紫菀紫葛狼毒鬼臼天雄防己烏喙烏頭甘遂牡丹巴戟天石南葉貫衆羊桃黃精黃耆以上並陰乾二月採黃芩陰大青陰天門冬曝水萍曝厚朴陰青葙葉陰玄參陰白薇艾葉曝芫花陰商陸日乾白朮曝麥門冬陰紫菀陰躑躅陰射干陰茵芋陰黃環陰澤蘭陰蕪荑陰杜蘅曝藍葉王瓜陰寄生陰防葵曝紫草陰芎藭曝苦參曝茜根曝紫參火炙澤漆陰藜蘆陰以上並三月採赤箭菥蓂子蒲黃玄參蘼蕪以上曝遠志陰景天陰人參曝芎藭大青陰白頭翁白蘚石南葉鼠尾草以上並四月採陰乾菖蒲陰卷柏陰白蘚陰澤瀉陰車前五月採陰石龍芮子蜀漆陰肉蓯蓉陰菥蓂子曝覆盆子乾漆夏至後採半夏曝五加採莖陰杜仲茵陳陰莽草陰蕤核葛根曝丹參曝蛇床子陰葶藶子立夏後採陰茺蔚子青葙子茛菪子蘼蕪曝松蘿陰旋覆花曝萹蓄陰䕡茹陰青蘘巨勝苗也以上五月採松脂青葙子茅根杜仲蕘花以上六月採陰石斛陰五加皮採莖陰卷柏陰海藻曝腐婢陰澤漆陰天門冬曝鼠尾花陰瓜蒂槐子麻黃立秋採陰石龍芻曝景天陰飛廉陰薇銜陰菌桂陰立秋採水蘇瞿麥立秋取實陰桃仁陰續斷陰蒺藜子曝以上並七月採白瓜子飛廉陰女青陰地榆曝大黃火干桔梗曝大棗曝楮實曝秦皮陰桂陰營實陰鬼臼陰百合曝牡丹陰防己陰狼毒陰萆薢曝菝葜曝白芷曝連翹陰苦參曝石龍芮陰狗脊曝白蘞曝前胡曝知母曝栝蔞根曝巴豆豬苓陰茯神陰蛇含陰茯苓陰虎掌陰薏苡仁天門冬麥門冬陰杜若曝當歸陰蓍實曝柴胡曝升麻曝獨活曝細辛陰牛膝陰石斛陰人參曝薯蕷曝甘草曝敗醬曝恆山陰半夏曝雷丸曝牡荊陰漏蘆陰酸棗陰白朮曝秦艽曝龍膽陰巴戟天陰蒺藜子曝黃連沙參曝王不留行曝續斷陰貫衆陰乾地黃陰地膚子陰五味子陰蜀椒陰雚菌陰鬼箭陰附子上旬採秦椒澤瀉陰牙子曝黃耆陰芍藥曝石南實陰以上八月採松實陰菊花陰耆實曝乾薑枳實陰白朮曝楮實曝厚朴陰杜仲皂莢陰山茱萸陰吳茱萸九月採陰梔子曝辛夷曝牡荊陰秦椒菟絲子曝菅實陰以上並九月採麥門冬陰牛膝陰地膚子陰枳實陰防風曝決明子皂莢陰桂陰菴䕡子陰山茱萸陰五加根陰厚朴陰雲實曝貝母曝以上並十月採菊子陰莧實陰款冬花陰龍膽陰以上並十一月採冬葵子菖蒲龍膽忍冬木蘭大戟以上並十二月採陰枸杞子冬採根春夏採葉秋採莖實陰桑根白皮採無時柏葉四時各依方面採之神陰蒴雚春夏採葉秋冬採根莖論曰凡藥皆須採之有時日陰乾曝乾則有氣力若不依時採之則與凡草不別徒棄功用終無益也學者當要及時採掇以供所用耳藥所出州土一首千金翼論曰按本草所出郡縣皆是古名今之學者卒尋而難曉自聖唐開闢四海無外州縣名目事事惟新所以須甄明即因土地名號後之學者容易即知其出藥土地凡一百三十三州合五百一十九種其餘州土皆有不堪進御故不繁録耳關內道雍州柏子仁茯苓華州覆盆子茯神杜蘅柏白皮茵芋天門冬木防己麥門冬黃精王不留行白朮薯蕷茯苓牛膝細辛狼牙鱉甲水蛭丹參松花鬼臼鱉頭白芷小草款冬花桑螵蛸白蘞松子松蘿玄參兔肝沙參遠志續斷澤瀉山茱萸五味子萆薢茯藜白薇桔梗通草石南龜頭石葦同州蟅蟲麻黃根斑蝥蕪荑麻黃蒲黃寒水石麻黃子岐州木𫲽亐雞及己獐骨藜蘆獐髓秦艽鬼督郵甘草寧州芫青荊子菴䕡子虻蟲萹蓄菴䕡花鄜州芍藥黃芩䕡茹秦艽原州獸狼牙黃耆楓柳皮白藥蓯蓉延州蕪荑涇州澤瀉秦艽防風黃芩靈州代赭蓯蓉野豬黃狟脂鹽州青鹽河南道洛州黃魚膽黃石脂秦椒榖州半夏桔梗鄭州秦椒陝州栝蔞柏子仁汝州鹿角鹿茸許州鹿茸虢州茯苓細辛茯神白石英桔梗栝蔞桑上寄生豫州吳茱萸鹿茸齊州阿膠防風榮婆藥萊州牡蠣文蛤䕡茹烏賊魚馬刀牛黃海藻海蛤七孔決明兗州防風紫石英仙靈脾雲母羊石桃花石蜜州海蛤牛黃泗州麋脂麋角徐州桑上寄生淄州防風沂州紫石英江南東道潤州躑躅鬼臼貝母半夏卷柏越州棐子劉寄奴婺州睦州歙州建州並出黃連泉州乾薑江南西道宣州半夏黃連饒州黃連吉州陟釐江州生石斛嶽州杉木楠木蟬蛻鱉甲潭州生石斛郎州牛黃永州石燕郴州釣樟根辰州丹砂隴右道秦州防葵獸狼牙狼毒鹿茸鹿角蘼蕪芎藭成州防葵狼牙蘭州蓯蓉鹿角膠廓州大黃武州石膽雌黃雄黃宕州藁本當歸獨活河西道涼州大黃鹿茸白附子甘州椒根肅州肉蓯蓉百脈根伊州伏翼葵子瓜州甘草西州蒲暴沙州石膏劍南道益州苧根梅煎枇杷葉蜀漆黃環薏苡仁鬱金百部根百兩金恆山薑黃乾薑木蘭慎火草沙糖眉州巴豆資州折傷木嘉州巴豆紫葛綿州天雄側子烏頭巴戟天附子甘皮烏喙邛州賣子木滬州蒟醬茂州升麻馬牙硝羌活朴硝金牙大黃馬齒礬雄黃芒硝礬石嶲州高良薑松州當州並出當歸扶州芎藭龍州側子烏頭巴戟天烏喙天雄附子柘州黃進嶺南道廣州石斛決明子白藤花甘蕉根丁根恩州蚺蛇膽賀州梧州象州並出蚺蛇膽桂州滑石蚺蛇膽春州封州瀧州並出石斛融州桂心韶州石斛鍾乳牡桂柳州桂心釣樟根水畨州蚺蛇膽交州檳榔龍眼三百兩銀木藍子峰州豆蔻馬牙石一名長石一名太乳一名牛腦石出在齊州歷城縣空青出蔚州蘭州宣州梓州宣州者佳蔚州者無空塊大色深深曾青鄂州蔚州者佳餘州者惡白青簡州梓州者並佳石膽蒲州虞鄉東亭谷及薜集窟塊如雞子大者佳芒硝同名為硝石嶺南始安出者佳萊州齊州者惡堅潤服之勝乳乳石第一齣始興其次連廣澧朗柳等州今陝州青溪房州三洞出者亞於始興者自余不可用也桃花石舊出中州鐘山縣似赤石脂但不著舌赤石脂虢州盧氏縣澤州陵川縣慈州呂鄉縣並有凡石中有石骨如玉陽起石齊州歷城縣西北五六里齊山西北六七里盧山出白者佳黑者不堪石腦一名石飴餅出徐州宋里山入土一丈餘得之大如雞子觸著即破青琅玕出雋州西烏白蠻中及於闐國一名青珠蒼石梁州均州房州金州並出疑水石出同州韓城縣色青黃理如雲母者佳澄城斜理文逆白者劣礜石漢川武當西遼阪名礜石谷即是其真者梁州馬道成澗中有土陰柏色白如脂出渭州鄣縣三交驛西北坡平地土窟中乳是也有六十餘坎人云服之同鍾乳不發熱戎鹽沙州名為禿登鹽廊州名為土陰鹽生河岸山阪之陰燒之不鳴薑石齊州歷城東者良代赭今靈州鳴沙縣大勝齊代所出者論曰既知無物非藥及所出土地復採得時須在貯積以供時用不得虛棄光陰臨時勿遽失其機要使風燭不救實可悲哉博學者深可思之用為備耳用藥分兩煮湯生熟法則一十六首千金或曰古人用藥至少分兩亦輕瘥病極多觀君處方非不煩重分兩亦多而瘥病不及古人者何也答曰古者日月長遠藥在土中自養經久氣味真實百姓少欲稟氣中和感病輕微易為醫療今時日月短促藥力輕虛人多巧詐感病厚重難以為醫故病輕藥味須少痾重用藥即多此則醫之一隅何足怪也又古之醫者自解採取陰乾曝乾皆悉如法用藥必依土地所以療十得九今之醫者但知診脈處方不知採藥時節至於出處土地新陳虛實一皆不悉所以療十不能得愈五六者實由於此處方者常須加意重復用藥藥乃有力若學古人徒自誤耳將來學者須詳熟之凡紫石英白石英硃砂雄黃硫黃等皆須光明映徹色理鮮淨者為佳不然令人身體乾躁發熱口乾而死凡草木藥皆須土地堅實氣味濃烈不爾療病不愈凡狼毒枳實橘皮半夏麻黃吳茱萸皆欲得陳久者良其餘唯須精新也問曰凡和合湯藥治諸草石蟲獸用水升數消殺之法則云何答曰凡草有根莖枝葉皮骨花實諸蟲有毛翅皮甲頭足尾骨之屬有須燒煉炮炙生熟有定一如後法順方者福逆之者殃或須皮去肉或去皮須肉或鬚根莖或須花實依方煉治極令淨潔然後升合稱兩勿令參差藥有相生相殺氣力有強有弱君臣相理佐使相持若不廣通諸經即不知有好有惡或醫自以意加減不依方分使諸藥草石強弱相欺入人腹中不能治病更加鬥爭草石相反使人迷亂力甚刀劍若調和得所雖未能治病猶得利安五藏於病無所增劇例曰諸經方用藥所有熬煉節度皆腳下注之今方不然此篇具條之更不煩別注也凡藥治擇熬炮訖然後稱之以充用不得生稱凡石藥及玉皆碎如米豆以綿裹內湯酒中煮之凡鍾乳及諸石以玉錘著水研之三日三夜漂練務令極細乾研則七日七夜凡銀屑以水銀和成泥凡礜石以黃土泥團之火燒半日乃熟可用仍不得過之不煉生入藥使入破心肝凡朴硝礬石燒令汁盡乃入丸散芒硝朴硝皆絞湯訖乃納汁中更上火兩三沸令煬盡乃服凡湯中用丹砂雄黃細熟研如粉臨服乃投湯中攪令調和服之凡湯中用完物皆擘破干棗梔子之類是也用細核物亦打破山茱萸五味子蕤核決明子之類是也細花子物正爾完用之旋覆花菊花地膚子葵子之類是也米麥豆輩亦完用之凡橘皮吳茱萸椒等入湯不㕮咀凡諸果子仁皆去尖皮及兩仁者湯揉撻去皮仍切之用梔子者去皮用蒲黃者湯成下凡生麥門冬生薑入湯皆切三搗三絞取汁湯成去滓下之煮五六沸依如升數不可共藥煮一法薄切用之凡麥門冬皆微潤抽去心凡麻黃去節別煮兩三沸掠去沫更益水如本數乃納諸藥煮之不爾令人煩寸斬之小草瞿麥五分斬之細辛白前三分斬之膏中細切用之凡牛膝石斛等入湯酒拍碎用之石斛入丸散者先以砧捶極打令碎乃入臼不爾搗不熟凡用桂厚朴杜仲秦皮木蘭皮輩皆削去上虛軟甲錯取里有味者稱之茯苓豬苓削去黑皮稱牡丹天門冬巴戟天遠志野葛等皆捶破去心紫菀洗去土戟干乃稱之薤白蔥白除責令盡莽草石南茵芋澤蘭剔取葉及嫩莖去大枝鬼臼黃連皆除根毛石葦辛夷拭去毛又去心蜀椒去目及閉口者用大棗烏梅皆去核用鬼箭削取羽皮凡茯芍藥補藥須白者瀉藥唯赤者凡菟絲子湯淘汰去土乾漉暖酒漬經一宿漉出曝微白搗之不盡者更以酒漬之三五日乃出曝微干搗之須臾悉盡極易碎凡甘草厚朴枳實石南茵芋藜蘆皂莢之類皆炙之而枳實去欀藜蘆去頭皂莢去皮子凡椒雲實微熬令汗出即有勢力凡湯丸散用天雄附子烏頭烏喙側子皆煻灰炮令微拆削去黑皮乃稱之唯薑附湯及膏酒中即生用亦削去皮乃稱之直理破作七八片半夏熱湯浸洗去上滑一云十洗四破乃稱之以入湯若膏酒丸散皆煻灰炮之用凡巴豆去心皮膜熬令紫色杏仁桃仁葶藶胡麻諸有膏脂藥皆熬黃別搗令如膏脂㩢視之泯泯爾乃以向成散稍稍下臼中合研搗令消散乃復都以輕絹篩之盡又納臼中依法研治數百杵也湯膏中亦有熬者雖有生用者並搗破凡麥蘗曲末大豆黃卷澤蘭蕪荑皆微炒乾漆熬令煙斷烏梅入丸散熬之用熟艾者先炒細擘合和諸藥搗之今細散不可篩者納散中和之凡用諸毛羽齒牙蹄甲龜鱉鮫鯉等甲皮肉骨角筋鹿茸等皆炙之蛇蛻皮微炙凡用斑蝥諸蟲皆去足翅微熬用桑螵蛸中破炙之牡蠣熬令黃色殭蠶蜂房微熬之凡湯中用麝香犀角鹿角羚羊角牛黃須末如粉臨服納湯中攪令調和服之凡丸散用膠先炙今通體沸起燥乃可搗有不沸處更炙之斷下湯直爾用之勿炙諸湯中用阿膠皆絞湯畢納汁中更上火令煬盡凡用蜜先以火煎掠沫令色紫黃即丸經久不壞掠之多少隨蜜精粗遂至大稠於丸彌佳凡丸中用蠟煬之投少蜜中攪調以和藥凡湯中用飴粳皆湯成下諸湯用酒者皆臨熟下之又云古稱唯有銖兩而無分名今則以十黍為一銖六銖為一分四分為一兩十六兩為一斤此則神農之稱也吳人以二兩為一兩隋人以三兩為一兩今依四分為一兩為定方家有云等分者皆是丸散隨病輕重所須多少無定銖兩兩三種或五種皆悉分兩同等爾凡丸散云若干分兩者是品諸藥宜多宜少之分兩非必止於若干之分兩也假今日服三方寸匕須瘥止是三五兩藥爾凡散藥有云刀圭者十分方寸匕之一準如梧桐子大也方寸匕者作匕正方一寸抄散取不落為度錢匕者以大錢上全抄之若云半錢匕者則是一錢抄一邊爾並用五銖錢也錢五匕者今五銖錢邊五字者以抄之亦令不落為度一撮者四刀圭也十撮為一勺十勺為一合以藥升分之者謂藥有虛實輕重不得用斤兩即以升平之藥升方作上徑一寸下徑六分深八分納散勿按抑之正爾微動令平調耳今人分藥不復用此凡丸藥有云如細麻者即胡麻也不必扁但令較略大小相稱爾如黍粟亦然以十六黍為一大豆也如大麻子者即今大麻子準三細麻也如胡豆者今之青斑豆也以二大麻子準之如小豆者今赤小豆也粒有大小以三大麻子準之如大豆者以小豆準之如梧桐子者以二大豆準之一方寸匕散蜜和得如梧桐子十丸為度如彈丸及雞子黃者以十梧子準之凡方云巴豆若干枚者當先去心皮畢乃稱之以一分準十六枚附子烏頭若干枚者去皮畢以半兩準一枚枳實若干枚者去核畢以一分準二枚橘皮一分準三枚棗有大小以三枚準一兩乾薑一纍者以半兩為正本草云以一兩為正凡方云半夏一升者洗畢稱五兩為正椒一升三兩為正吳茱萸一升五兩為正菟絲子一升九兩為正菴䕡子一升四兩為正蛇床子一升三兩半為正地膚子一升四兩為正此其不同也云某子一升者其子各有大小虛實輕重不可通以稱準皆取平升為正凡方云桂一尺者削去皮重半兩為正甘草一尺者重二兩為正云某草一束者重三兩為正云一把者重二兩為正凡方云蜜一斤者有七合豬膏一斤者一升二合凡湯酒膏藥舊方皆云㕮咀者謂稱畢搗之如大豆又使吹去細末此於事殊不允當藥有易碎難碎多末少末稱兩則不復均平今皆細切之較略令如㕮咀者乃得無末而片粒調和也凡云末之者謂搗篩如法也凡丸散先細切曝燥乃搗之有各搗者有合搗者並隨方所言其濕潤藥如天門冬乾地黃輩皆先切曝乾獨搗令偏碎更出細擘曝乾若值陰雨可微火烘之小停冷乃搗之凡濕藥燥皆大耗當先增分兩須得屑乃稱之為正其湯酒不須如此凡篩丸藥用重密絹令細於蜜丸易熟若篩散草藥用輕疏絹於酒中服即不泥其石藥亦用細絹篩令如丸藥者凡篩丸散藥畢皆更合於臼中以杵搗之數百過視其色理和同為佳凡煮湯用微火令小沸其水數依方多少大略二十兩藥用水一斗煮取四升以此為率皆絞去滓而後酌量也然則利湯欲生少水而多取汁者為病須快利所以少水而多取汁補湯欲熟多水而少取汁者為病須補益是以多水而少取汁好詳視之不得令水數多少湯熟可用新布兩人以尺木絞去滓澄去垽濁分再服三服者第二第三服以紙覆令密勿令泄氣欲服以銅器於熱湯上暖之若於鐺中勿令器中有水氣方云再服三服者要令力勢相及並視人之暴羸病之輕重以為進退增減之不必悉依方説也古今諸家丸方一十八首廣濟療傳尸骨蒸殗殜肺痿疰忤鬼氣猝心痛霍亂吐痢時氣鬼魅瘴瘧赤白暴痢瘀血月閉痃癖疔腫驚癇鬼忤中小兒吐乳大人狐貍等病吃力伽丸方吃力伽白朮是也光明砂訶黎勒皮麝香當門子香附子丁子香沉香蓽茇檀香青木香安息香犀角屑各二兩薰陸香蘇合香龍腦各半兩上十五味搗篩白蜜和為丸每朝取井花水服如梧子四丸於淨器中研破服之老小一丸以蠟裹一丸如彈丸緋絹袋盛當心帶之一切邪鬼不敢近千金不傳冷水暖水臨時量之忌五辛生血物以臘月合神前藏之密器中勿令泄藥氣神驗千金耆婆萬病丸療七種癖塊五種癲病十種注忤七種飛尸十二種蠱毒五種黃病十二時瘧疾十種水病八種大風十二種𤸷痹並風入頭眼暗膜膜及上氣咳嗽喉中如水雞聲不得臥飲食不作肌膚五臟滯氣積聚不消擁閉不通心腹脹滿連及胸背鼓脹氣堅結流入四肢或復又心膈氣滿時定時發十年二十年不瘥五種下痢疳蟲蛔蟲寸白蟲諸蟲上下冷熱久積痰飲令人多睡眠消瘦無力蔭入骨髓便成滯疾身體氣腫飲食嘔逆腰腳痠疼四肢沉重不能久行久立婦人因産冷入子臟臟中不淨或閉塞不通胞中瘀血冷滯出流不盡時時疼痛為患或因此斷産並小兒赤白下痢及胡臭耳聾鼻塞等病服此藥以三丸為一劑服藥不過三劑萬病悉除説無窮盡故稱萬病丸以其牛黃為主故一名牛黃丸以耆婆良醫故名耆婆丸方牛黃麝香犀角硃砂雄黃並研芫青去頭翅足熬本方七枚黃連人參禹餘糧大戟炙芫花熬茯苓乾薑桂心桑白皮當歸芎藭芍藥甘遂熬黃芩蜀椒汗細辛巴豆去皮心別熬搗前胡桔梗紫菀蒲黃葶藶子熬防風各一分蜈蚣三節炙石蜥蜴一寸炙上三十一味並令精細上牛黃麝香犀角硃砂雄黃禹餘糧巴豆別研余者合搗篩之以白蜜和更搗三千杵極熟密封之除破日平旦空腹以酒服三丸如梧子微下三五升惡物為良若猝暴病不要待平旦無問早晚即服以吐利為度若不吐利更加一丸或至三丸五丸須吐利為度不得限以丸數病強藥少即不利吐若其發遲以熱稀粥一杯發之若吐利不止即以酸飯兩三口止之服藥忌陳臭生冷酢滑黏食大蒜豬魚雞狗馬驢肉白酒行房七日外始得一日服二日補之得食新米韭菜汁作羹粥臛飲食之三四頓大良亦不得全飽産婦勿服之吐利以後常須閉口少語於無風處溫床暖室將息若旅行猝暴無飲以小便送之若一歲以下小兒有疾者令乳母服兩小豆亦以吐利為度近病及猝病皆用多積久疾病即少服常取微溏利為度崔氏無黃芩桑白皮桔梗防風猝病欲死服三丸如小豆取吐利即瘥猝得中惡口噤服二丸如小豆和暖水一合灌入口令下令微利即瘥五注鬼刺客忤服二丸如小豆不瘥後日更服二丸男女邪病歌哭腹大如妊身服二丸如小豆日三夜一服間食服之貓鬼病服小豆三丸不瘥更服蠱毒吐血腹痛如刺服小豆二丸不瘥更服以瘥止瘧病未發前服三丸未瘥更服諸痰飲者服三丸如小豆不瘥更服冷癖服三丸如小豆日三服皆間食常令微溏利為度宿食不消服二丸如小豆取利癥瘕積聚服二丸如小豆日三服皆間食以利瘥止拘急心腹脹滿心痛服三丸如小豆未瘥更服上氣嘔逆胸中滿不得臥服二丸不瘥更服大痢服小豆一丸日三疳濕以一丸如杏仁和酢二合灌下部中服小豆二丸瘥水病服三丸如小豆日再間食服之瘥止人弱隔日服頭痛惡寒服小豆二丸覆取汗傷寒天行病服二丸小豆一日三間食服小便不通服小豆二丸不瘥明日更服之大便不通服三丸如小豆大又納一丸下部中則通耳聾聤耳以綿裹如棗核塞耳中瘥鼻衄服二丸如小豆無不瘥癰腫疔腫破腫納一丸如麻子日一敷之根自出亦服二丸瘥犯疔腫血出以豬脂和塗有孔納孔中瘥止癘瘡以酢泔洗訖取藥和豬脂塗之漏瘡有孔以一丸如小麥納孔中和豬脂敷痔瘡以藥塗綿納孔中別易瘥止瘰癧以酢和塗上瘥癬瘡以布揩令汁出以酢和塗上日一易瘥止胸背腰脅腫以醋和敷腫上日一易之服二丸如小豆諸冷瘡積年不瘥者以酢和塗之亦餅貼之惡刺以一丸納瘡孔中即瘥蝮蛇螫以少許內螫處若毒入腹心煩悶欲絶者服三丸如小豆大蠍螫以少許塗之蜂螫以少許敷之瘥婦人諸疾胞衣不下服二丸如小豆大小兒驚癇服一丸如米許以塗乳令嗍之看兒大小量之小兒客忤服一丸如米和塗乳頭與嗍之以意量之小兒乳不消心腹脹滿服一丸如米許塗乳頭令嗍之取瘥又大麝香丸療鬼注飛尸等萬病皆療之方麝香三分牛黃真珠並研附子炮鬼臼莽草炙犀角屑礬石熬令汁盡細辛桂心獺肝炙藜蘆各二分蜈蚣炙蜥蜴炙各一枚地膽熬斑蝥熬杏仁去尖皮熬各五十枚丹砂二兩研雄黃一兩研礜石八分泥裹燒半日芫青熬亭長熬各七枚並去足翅巴豆去心皮熬上二十三味合搗別搗巴豆杏仁如泥蜜和更搗三千杵丸如小豆每有病以飲服一丸日再漸至三丸尤妙毒蟲所螫摩之以知為度若欲入毒疫癘鄉死喪家及鬼神廟冢墓處以絳囊盛之男左女右肘後系之又以少許塗人中臥不魘魅神驗忌如常法又小麝香丸主療與大麝香丸同方麝香三分雄黃研丹砂研各四分細辛乾薑桂心芍藥各五分莽草炙犀角屑梔子仁各三分附子炮烏頭炮各五枚去皮巴豆五十枚去心皮熬蜈蚣一枚去頭足炙上十四味並搗篩蜜和更搗一千杵丸如小豆每服三丸至五丸日三一切尸注心痛皆主之忌生血物生蔥生菜蘆筍豬肉冷水神驗一方有當歸一兩崔氏溫白丸療癥癖塊等一切病並治之方紫菀吳茱萸菖蒲柴胡厚朴炙桔梗皂莢去皮炙茯苓桂心乾薑黃連蜀椒汗巴豆去心皮熬人參各三分本方各二分烏頭十分炮上十五味合搗篩以白蜜和更搗二千杵丸如梧子大有病服一丸至二丸不知稍增至三丸五丸以知為度主心腹積聚久癥癖塊大如杯碗黃疸宿食朝起嘔吐支滿上氣時時腹脹心下堅結上來搶心旁攻兩脅徹背連胸痛無常處繞臍攪痛狀如蟲蛟又療十種水病八種痞塞反胃吐逆飲食噎塞五淋九種心痛積年食不消化或婦人諸疾斷緒不生帶下淋瀝或痎瘧連年不瘥又療一切諸風身體頑痹不知痛癢或半身不遂或疼痛或眉發墮落又療七十二種風三十六種遁尸注或癲癇或婦人五邪失心夢與鬼神交通四肢沉重不能食飲昏昏默默只欲取死終日憂愁情中不樂或恐懼悲啼飲食無味月水不調真似懷孕連年纍月羸瘦困弊遂至於死或歌或哭為鬼所亂莫之知也但服此藥者莫不除愈臣知方驗便合藥與婦人服之十日下出癥癖蟲長二尺五寸三十枚下膿二升黑血一升青黃汁五升所苦悉除當月有子臣兄墮馬被傷腹內有積血天陰即發羸瘦著床命在旦夕與藥服下如雞肝黑血如手者二百餘片白膿二升赤黃水一升其病即除臣知方驗敢不獻上忌生冷酢滑豬雞魚犬牛馬鵝肉五辛油麵豆糯米陳臭等物仲景三物備急丸司空裴秀為散用療心腹諸猝暴百病方大黃乾薑巴豆各一兩去皮心熬別搗如脂上藥各須精新好藥搗篩蜜和更搗一千搗丸如梧子或小豆服三丸老小量之為散不及丸也若中惡客忤心腹脹滿猝痛如錐刀刺痛氣急口噤停尸猝死者以暖水苦酒服之或不下捧頭起灌令下咽須臾瘥如未更與三丸以腹中雷鳴轉即吐下便愈若口已噤亦須折齒灌之令入尤妙神驗忌蘆筍豬肉冷水肥膩又理中丸療三焦不通嘔吐不食並霍亂吐痢不止者並主之方人參乾薑白朮甘草各三兩炙上四味搗篩蜜和如梧子空腹以飲汁服十五丸忌桃李雀肉海藻菘菜延年駐車丸主赤白冷熱血痢腹痛者方黃連六兩乾薑當歸阿膠各三兩上四味搗篩以三年米醋煮膠令消和藥衆手拈丸如梧子每以飲下三十丸日再服亦療産婦下痢不止者服之甚驗忌豬肉冷水黏膩等物救急五香丸療諸毒疰氣心腹脹滿大小便不通鬼疰心痛不可忍方牛黃研犀角屑各三分升麻沉香薰陸香當歸桂心青木香麝香研雄黃研如粉鬼箭羽巴豆去心皮熬訶黎勒皮硃砂研檳榔仁乾薑吳茱萸甘草炙豆蔻各四分桃仁去尖皮熬附子炮各五分上二十一味搗篩蜜和丸如梧子以暖水服三丸至五丸如不利更服以利為度此方甚驗人久不傳忌海藻菘菜豬肉冷水生蔥蘆筍生血物等必效玉壺丸主萬病與麝香丸同效方雄黃研硃砂研巴豆去心皮熬附子炮去皮特生礜石燒半日研藜蘆各三兩炙上六味搗篩蜜和丸如小豆以飲服二丸得利病瘥小兒黍粟一丸以意量之又青木香丸療一切氣腹脹滿心痛氣冷食不消方青木香檳榔仁各六分芍藥枳實炙訶黎勒皮各五分桂心四分大黃十二分上七味搗篩蜜和丸如梧子飲下十五丸以意增減之常令溏利甚效又五補七宣者麗正殿修書學士李公所傳公名子昭字云卿趙郡人幼志道法以棲名山往來茅嵩山經三十載云五補七宣丸方人參茯苓地骨皮乾地黃牛膝等分上五味搗篩蜜和丸如梧子空腹以酒飲下三十丸稍稍增至五十丸日再此是五補丸服至五日十日及半月日覺氣擁即服七宣丸服經二三日覺氣散還服五補丸若病候未退即稍稍增之常自審以取調適終須五補及七宣丸並須合服之夫人所疾皆因風不宣散即成擁緩熱風若氣不流行即成痃癖冷氣轉生衆病皆因此由尋其本源都為不間將理覺虛則補覺風氣擁即利利即腰背更虛且凡是利藥皆急服便透過未能蓄泄諸病凡是補藥皆滯服未見效先覺風氣發動明知宣補必藉兼行故其人授餘二法名曰五補七宣所以安七魄鎮五臟堅骨髓養神明久服長生百病日去發黑行及奔馬又七宣丸方大黃十五兩枳實炙青木香柴胡訶黎勒皮各五兩桃仁六兩去尖皮熬甘草四兩炙上七味搗篩蜜和丸如梧子以酒服二十丸稍加至五十丸病在下空腹服病在上食後服之以宣利為度增減以意量之若風氣結聚宿食不消兼沙石皮毛在腹中服經七八日乃盡出下似牛涎魚腦等若病深痼則須半月或一月專服之不用五補丸若積年腰膝疼痛寒冷如冰石腳氣衝心憒悶將死頭旋暗倒肩背重悶心腹脹滿胸膈閉塞風毒腫氣連及頭面及大小便或利澀脾胃氣不理不能飲食夜臥腳轉筋脈掣痛恍恍然眠寢不安等疾以飲服之盡瘥此藥功效不可盡説如前十數種病則須服七宣丸自外輕病不妨與五補丸兼服循環不輟補養無限不問男女老小並可服餌但須量氣力細察候之加減服若是初生孩子可與三丸五丸稍稍加之取通利其二方當須經久常服不限春秋冬夏朝夕行止勿間藥性甚善禁如常法近效大麝香丸療積年心痛尸疰蠱毒癥癖氣承心肋下有塊溫瘴毒氣精魅邪氣或悲或哭蛇蠍蜂螫等方麝香研牛黃研藜蘆炙硃砂研芍藥當歸茯苓桔梗鬼箭羽金牙研烏頭炮桂心吳茱萸貫衆各一分雄黃一分半研乾薑人參大蟲骨各二分炙蜈蚣二寸去足蜥蜴半枚去牙炙巴豆二十枚去心皮熬上二十一味搗篩蜜和丸如梧桐子飲下三丸如未下以熱飲投之即利三行後以酢飯止之即定然後煮飯蔥薤食之忌冷水豬肉如蛇蠍蜂螫取一丸研和塗之即瘥精魅狐貍之屬拋磚瓦或如兵馬行夜發者是鬼魅無早晚每日服二丸只三兩日即定仍每日燒一丸熏身體衣服無忌以三五丸用緋絹袋子盛帶左臂上避大蟲毒蛇精魅鬼氣等病又犀角丸療癰腫腸癰乳癰發背一切毒熱腫服之腫膿化為水神方犀角屑十二分川升麻黃芩防風人參當歸黃耆乾薑一作干藍蓼實一方無黃連甘草炙梔子各四分大黃五分巴豆二十四枚去心皮熬上十四味如法搗篩蜜和更搗三千杵丸如梧子以飲服三丸至五丸以利為度或不利投以熱飲如利以冷漿水粥止之未瘥每日服一丸以意量之腫消散為度若下黃水或腫輕皮皺色變即是消候忌如藥法效驗不可論之又黃連丸療痢無問冷熱並主之方黃連一兩茯苓二兩阿膠一兩上三味搗篩以水消膠和衆手丸曝乾有痢空腹以飲下十五丸日再以瘥止甚效又加減麻仁丸療積年患氣不能食飲兼食不消化風氣冷氣熱氣衝上痃癖氣並乳石氣發動並療之服經三四日自覺有效方蜀大黃錦紋者四兩人參二兩大麻仁二兩訶黎勒皮四兩上四味搗篩依法以蜜和丸每服十丸二十丸增減以意量之以溏利病除亦不損人雍州王長史常服三十餘年八十歲萬病皆無百無所忌補理腰腳服經七八日腰腎先冷者即下膿水腰腳輕健以酒飲下之並得又三黃丸療五勞七傷消渴不生肌肉婦人帶下手足寒熱主一切熱方春三月用黃芩四兩大黃二兩黃連四兩夏三月用黃芩三兩大黃一兩黃連四兩秋三月用黃芩六兩大黃一兩黃連二兩冬三月用黃芩六兩大黃一兩黃連三兩上三味隨時月搗篩蜜和丸如梧子日服七丸諸病悉除古今諸家散方六首千金小金牙散療南方瘴癘疫氣腳弱風邪鬼注方金牙五分研牛黃一分研天雄萆薢黃芩蜀椒汗由跋雄黃研硃砂研烏頭桂心莽草炙麝香研各二分葳蕤細辛犀角屑乾薑各三分蜈蚣一枚長六寸者炙黃連四分上十九味治下篩為散合牛黃麝香搗三千杵以溫酒服五錢匕日三夜二以知為度以絳袋盛男左女右帶一方寸匕省病問孝不避夜行塗鼻人中闢鬼惡毒氣晨昏霧露亦塗之佳崔氏五香散療疰忤邪氣或熱或寒時氣在骨節間似瘥似劇兼主百病方沉香丁香麝香薰陸香鬼箭羽當歸豆蔻仁各四分牛黃鬼臼橘皮金牙各三分燒犀角屑羚羊角屑大黃各六分升麻桔梗桃仁去尖皮熬光明砂研安息香各二分研上十九味搗篩為散以湯飲酒隨病服一方寸匕日再服病瘥即停亦可蜜丸如梧子服十丸又備急散療猝中惡心痛脹滿欲吐短氣方大黃二兩桂心四分巴豆一分去皮熬研上三味搗篩為散取一錢匕以湯七合和服當吐下即愈甚妙紫雪散療腳氣毒遍內外煩熱口中生瘡狂易叫走及解諸石草藥毒發邪熱猝黃等瘴疫毒癘猝死溫瘧五尸五注心腹諸疾腋緩刺切痛蠱毒鬼魅野道熱毒小兒驚癇百病方黃金一百兩寒水石石膏各三斤一本用滑石玄參一斤羚羊角屑犀角屑沉香青木香各五兩丁香一兩甘草八兩炙上十味切以水三斗煮取一斗去滓取硝石四升芒硝亦可用朴硝十斤投汁中微火煎以柳木篦攪勿住手候欲凝入盆中納硃砂三兩麝香一兩急攪即成霜雪紫色以水和一二分服之以意加減一劑十年用之神妙腳氣乳石天行熱病等服之若神千金翼有磁石三斤滑石一斤升麻一斤丁香用四兩朴硝用四升麝香用二分仙人煉絳雪療一切病肺氣積聚咳逆嘔吐膿血丹石毒發天行時氣一切熱病諸黃疸等心風昏亂心怯健忘四肢煩熱頭痛眼赤大小便不通煩悶不安骨節疼痛赤白痢血痢熱毒痢宿食不消化心腹脹滿出氣不得下一切諸毒藥腳氣等飲酒多醉困久痢不瘥孩子驚癇等以上和水服之産後一切諸病墮胎和酒服之方朴硝十斤升麻三兩大青桑白皮槐花各二兩犀角屑羚羊角屑各一兩蘇方木六兩竹葉兩訶黎勒山梔子三十枚檳榔仁二十顆硃砂半大兩研上十三味以水二斗漬一宿煎取一斗去滓入鍋納朴硝煉煬攪勿住手候欲凝出於盆中攪入硃砂麝香訖雪成收於垍器中密封有疾量取之和水服之以利病除身輕目明四肢調適療一切病神驗老小量之上云入硃砂麝香未見分兩近效腎瀝湯煮散主除風下氣強腰腳明耳目除痰飲理營衛永不染時氣諸風疾方黃耆芎藭茯苓五味子防風澤瀉獨活玄參人參牛膝各六兩麥門冬去心地骨皮各八兩桂心甘草三兩炙丹參五兩上十五味切如大豆分作二十四貼貼著生薑一兩切杏仁十四枚去尖碎以水三升煮一貼取一升去滓澄清取九合頓服每日一貼晚間以氣下心胸空妙十服以後身力不可當常須護惜將養之以飲食補之每年春夏秋冬服一劑勝服腎氣丸二十劑永不患風氣先有諸病自然除瘥張中丞自服以來神效不可言以為乳石力不可比今服不闕效驗妙方云腎瀝湯恐須用豬腎湯煎古今諸家膏方四首廣濟神明膏主諸風頑痹筋脈不利療癬諸瘡癢方前胡白朮白芷芎藭並切椒去目吳茱萸各一升附子三十枚去皮切當歸細辛桂心各二兩切上十味以苦酒漬一宿令浥浥然以成煉豬膏一斗微火煎十沸以來九上九下候附子白芷色黃絞去滓膏成病在外摩之在內以酒服棗核大疥癬等瘡皆療之並去諸風病亦摩折傷被打等崔氏云藥滓酒浸服之亦大療諸病崔氏陳元膏會稽太守思翊昧死再拜上書皇帝陛下思幸得典郡視事六年處地下濕身病苦痹飲食衰少醫療不瘥命在旦暮蒼梧道士陳元賣藥於市思取藥摩之日至再十五日平復思男嘗墮馬苦為腰痛天陰雨轉發思取元膏摩之復愈思妻年四十五苦心腹積聚得病三年思復從元取膏摩之六日下宿食即愈思銓下郭少苦頭眩思取膏摩三日鼻中下水二升所病即愈思知元藥驗謹取元本方奉上當歸三兩一方隴西者生地黃二斤搗取汁附子三兩細辛二兩桂心一兩天雄三兩去皮乾薑二兩丹砂一兩研芎藭二兩雄黃二兩半研烏頭三兩苦酒三升白芷一兩松脂半斤不中水豬脂十斤煉去滓上十五味㕮咀以地黃汁苦酒漬一宿取豬脂納諸藥微火煎之令十五沸膏成去滓納硃砂等末熟攪勿令婦人雞犬孝子惡疾不具足人小兒等見有人若胸脅背痛服之七日所下狀如雞子汁者二升即愈久有人苦脅下積聚如杯摩藥十五日即愈又有人苦臍傍氣如手藥摩之去瓜中黃穰者升許即愈有人患腹切痛時引背痛數年以膏摩之下如蟲者三十枚即愈又有婦人若月經內塞無子數年膏摩少腹並服如杏子一枚十日下崩血二升即愈其年便有子又療風搔腫起纍纍如大豆以膏摩之五日即愈老少患腳膝冷痛摩之五日便愈又有人若頭項痛寒熱瘰癧摩頭及病上即愈又有人患面目黧黑消瘦是心腹中病服藥下如酒糟者一升余即愈內外諸風及腹中積聚可服之百病無不愈所療人無數不可悉記又烏膏療一切瘡引膿生肌兼殺瘡中蟲方烏麻油一升黃丹上好者二兩羅之蠟一兩煉淨濾薰陸香乳頭者一兩末松脂半兩末以上並大升兩上五味緩火煎油三分減一下鐺待冷乃納黃丹更上煎之又三分減一又停待冷次納薰陸香末上火煎候銷盡又納蠟及松脂看膏稍稠即點於鐵上試斟酌硬軟適中乃罷先問所患瘡如熱即除薰陸及松脂瘡如久不瘥此涉於冷即依方合其貼杖瘡者油若一升地黃汁半合和煎黃丹二大兩蠟一小兩余準上法此膏不須硬也近效蓮子草膏療一切風耳聾眼暗生髮變白堅齒延年本是婆羅門方蓮子草汁三升生巨勝油一升生乳一升不食糟者甘草一大兩末上四味和於鍋中煎之緩火熬令魚眼沸數攪之勿住手看上沫盡清澄濾不津垍器中貯之云本方有青蓮蕊六分龍腦花三分鬱金香二分並末先煎諸藥三分減一次下汁及油等膏成每欲點即仰臥垂頭床下一孔中各點如小豆許久乃起有唾唾卻勿咽之起訖即啜少熱湯飲點經一年白髮盡黑禿處並出韓庶子處得每用驗古今諸家煎方六首廣濟阿魏藥煎方阿魏四分豆蔻仁七顆細研生薑十二分人參八分甘草八分炙鱉甲十二分炙藕汁二升訶黎勒七枚去核牛膝半斤白蜜一升地黃汁二升上十一味下地黃等汁煎次下藥末微火煎攪勿住攪候如餳於不津器盛每取一匙酒和服之又鹿角膠煎療五勞七傷四肢沉重百事不任怯怯無力昏昏欲睡身無潤澤腰疼頑痹腳弱不便不能久立胸脅脹滿腹中雷鳴春夏手足煩熱秋冬腰膝冷疼心悸健忘腎氣不理五臟風虛並悉療之方鹿角膠二斤搗碎作四分於鐺中熬令色黃紫蘇子二升以酒一升研濾取汁生地黃一斤取汁生薑一斤汁黃牛酥一升白蜜三斤上六味先煎地黃汁蘇子汁生薑汁等二十餘沸次下酥蜜又煎三五沸次以蜜並膠末下之攪令相得膠消盡煎即成矣以器盛之空腹以酒調二合服之日再此藥補五臟益心力實骨髓生肌肉理風補虛耳聰目明腰腳甚效驗一兩劑強健披覽十倍常時忌羊血蕪荑又主冷氣益氣力溫中下氣蒜煎方剝了蒜二升牛乳五升牛膝一大斤末上三味以蒜納牛乳中煎之候蒜消盡攪勿住手下牛膝末煎成於器中貯之食前以酒和兩匙服忌羊血又地黃煎主婦人丈夫血氣勞骨熱日漸瘦悴方生地黃汁二升甘草三兩炙末豉心一升蔥白切一升牛酥半斤藕汁二升白蜜一升上七味以小便六升煮蔥豉等取二升絞去滓次下地黃藕汁更煎取三五沸下酥蜜攪勿住手候似稀餳以器貯之每服一匙漸至三匙成煎桑枝熬煎湯調和服之尤妙桃仁湯亦良小品單地黃煎主補虛除熱散乳石癰疽瘡癤等熱方生地黃隨多少取汁於銅鉢中重湯上煮勿蓋釜令氣得泄煎去半更以新布濾絞去粗滓穢又煎令如餳成矣此用地黃鬚肥大味濃者作煎甘美東南地黃堅細味薄作煎咸不美近效地黃煎療肺氣咳嗽補心肺令髭發不白方生地黃汁二升麥門冬汁五升生薑汁五合紫菀三兩貝母款冬花甘草炙各三兩上七味切以水七升煮取三大升去滓卻入鍋中下地黃汁麥門冬薑汁等三十沸下蜜一升煎如餳成矣盛不津器中冷含如棗許增加量之一方有人參三兩古今諸家酒一十二首並代茶飲列於下千金天門冬酒療五臟六腑大風洞泄虛弱五勞七傷癥結滯氣冷熱諸風癇惡疾耳聾頭風四肢拘攣猥退歷節風萬病皆主之久服延年輕身齒落更生髮天門冬與百部相似天門冬味甘兩頭方百部細長而味苦令人利上一味搗取汁一斗漬曲二升以糯米二斗候曲發準家醞法釀之春夏極冷下飯秋冬稍溫如人肌下飯酒熟取清飲一盞常令酒氣相接勿至醉吐慎生冷酢滑雞豬魚蒜特忌鯉魚亦忌油膩此是一斗法餘一石二石亦準此以為大率服藥酒十日覺身體癮疹大癢二十日更大癢三十日乃漸止此是風氣出去故也四十日即覺身心朗然大快似有所得五十日更覺大快當風坐臥覺風不著人身中諸風悉盡用米法先淨淘曝炕令乾臨欲用時更別取天門冬汁漬米干灑炊余汁拌飯甚宜密封取天門冬汁法淨洗心皮水寸切搗押各三四遍令滓干如草乃止此酒初熟味酸仍作臭泔腥氣但依式服之久停則香美余酒皆不及也封四七日佳凡八九月即少少合至十月多合擬到來年五月三十日以來相續服之春三月亦得合入四月不得合服酒若得散服得力倍速散方如左天門冬去心及皮曝乾搗篩以上件酒服方寸匕日三加至三匕久服長生凡酒亦得服又大金牙酒療瘴癘毒氣中人風冷濕痹口喎面戾半身不遂手足拘攣歷節腫痛甚者少腹不仁名曰腳氣無所不療方金牙一斤燒白朮附子側子天雄蓯蓉茯神當歸防風芎藭黃耆薯蕷細辛桂心茵芋地骨皮五加皮杜仲萆薢狗脊葳蕤白芷厚朴枳實炙桔梗黃芩遠志去心蔓荊子各三兩人參二兩獨活半斤石南二兩磁石十兩燒丹參牛膝各五兩薏苡仁一升麥門冬一升去心生石斛八兩生地黃切二升蒴藋四兩上三十九味並切用絹袋盛以酒八斗漬七日溫服一合日四五夜一石藥細研如粉別絹袋盛共藥同浸藥力安和主治極多凡是風虛四體小覺有風疴者皆須將服無不治者服者一依方合之不得輒信誣人大言浪有加減忌如常法又鍾乳酒療虛損通順血脈極補益下氣方鍾乳五兩碎附子三兩炮石斛五兩甘菊花三兩蓯蓉五兩上五味銼以生絹袋盛用酒三斗漬經五日每服二合日再稍加至一升千金翼五精酒主萬病發白反黑齒落更生方黃精四斤天門冬五斤去心松葉六斤白朮四斤枸杞五斤洗上五味皆生者納釜中以水三石煮之一日去滓取汁漬曲如家釀法酒熟取清任性飲之長年補養忌鯉魚桃李雀肉等又白朮酒方白朮二十五斤上一味㕮咀以東流水兩石五斗於不津器中漬之二十日去滓納汁於大盆中夜候流星過時抄已姓名置盆中如是五夜汁當變如血取以漬曲如家醞法造酒熟取清任性飲之十日萬病除百日白髮反黑齒落更生面有光澤久服長年忌桃李雀肉等此酒至誠有靈風病服之百神衛人又枸杞酒方枸杞一百斤上一味切以東流水四石煮之一日一夜去滓令得一石汁漬曲釀之如家醞法酒熟取清置不津器中取乾地黃桂心乾薑商陸澤瀉蜀椒末各一升六味以絹袋盛納酒中漬密封口埋入地三尺堅牢覆上二十日沐浴整衣冠向仙人拜訖開之其酒當赤如金色平旦空腹服一盞或半升為度十日萬病皆愈二十日瘢痕皆滅惡疾人以一升水和半升酒分為五服服之即愈若欲食少者取河中青白石如棗杏仁大者半升以水三升煮一沸以酒半合置中須臾即熱可食也崔氏蒼耳酒療大風惡疾及一切諸風乃至骨髓中毒風令人充悅方蒼耳和莖葉花實取銼一石八月收牛膝根一升松葉二斗商陸根二升白色者鼠黏根一斗上五物皆銼訖量之以水兩石五斗煮取六斗汁如釜小可分煮之即分三斗汁將浸曲一斗二升高量其曲加於常法五分為藥力費曲故也餘三鬥汁留將拌饙料糯米一石二斗分作五酘淨淘干漉以上並大斗第一酘一日炊四斗米取藥汁九升拌饙熟細切生地黃三斗和米下之第二酘三日炊三斗米取藥汁七升拌饙熟與杏仁一斗去皮尖碎和搗如泥下之第三酘五日炊二斗米取藥汁六升半拌饙熟取木麻子一斗搗碎和下之第四酘七日炊二斗米取藥汁四升半拌饙熟取胡麻一斗搗碎和下之第五酘九日炊一斗米取藥汁三升拌饙下之上以前五酘法須候米消盡即炊酘之未必要須隔日其酒如米少味薄更炊一二斗米下之使味足然後去糟取清依常法飲半升不能者可量性多少常使有酒氣逼夜飲最是所宜此酒縱非風疾飲之補養益精神令人充健又烏麻地黃酒療風虛補不足除百病已試大效方六月六日曲四升淨王斯油麻六斗五升出州赤色者是如無別用巨勝替之以脫去皮乾曝脫烏麻法以冷水浸經一宿出之置筲箕中漉水令盡舂之即皮自脫去耳生地黃四斗冷熟湯洗待水氣盡便切之更取生地黃一石以水一石和煮粗布絞去滓即取汁六斗又以蠟及麻子塗甕內蒸之令乾前三味總內甕中浸之丹參生石斛牛膝杜仲萆薢生薑各二斤人參八兩上七味切以生絹袋盛同納前件熟地黃汁甕中浸封閉七日外更取烏豆四大斗摩使光淨分作四度微熬令香取無灰重醞酒二斗八升三度淋豆豆一熬三淋淋訖並去豆總計十二度淋豆取淋酒別器中盛然後更寫曲汁等物及諸藥並出在大甕中以物閉頭及更將此酒先重蒸甕看冷暖還納曲汁及藥等安在甕中其日即用八斗精糯米炊作飯如常釀酒法酘酒即以淋豆酒投在甕中封閉經一兩宿看米消盡又炊四斗糯米飯酘之此後更封閉經七日其酒即熟任性飲多少量之不限時候常微微覺身潤夜中稍加少許或汗出佳避風及忌房室特禁毛桃芥生菜熱面並酢蒜牛肉冷物醞初酒法待此酒熟即將此酒更重醞上曲依當家常用法每一斗曲用熟水一斗一升浸炊酒飯即量熟湯多少用沾飯如凡釀酒法更不得加生水每一斗米酒為佳釀重醞酒法待此酒熟即將酒二斗八升淋豆上每一斗曲以熟水一斗浸其酒米每一斗饙料以四斗清酒淋其饙然後炊飯使熟更不得加水其所洗甑洗手盆甕等皆須用此酒還投釀甕中釀藥酒法上欲和藥酒時先置五斗許藥在甕底然後加五斗許飯每次如此斟酌至半即納藥袋其藥袋上亦使藥飯相參以至於盡然始閉封封閉藥酒甕法上封閉甕頭用紙七重布一重其釀酒室唯造酒得入自外貓犬婦人不得輒入室中又枸杞酒療五內邪氣消渴風濕下胸脅氣頭風本方作痛堅筋骨強陰利大小便填骨髓長肌肉破除結氣五勞七傷去胃中宿食利耳目衄血吐血風症補中逐水破積瘀膿血石淋長髮傷寒瘴癘毒氣煩燥滿悶虛勞喘吸逐熱破血及腳氣腫痹悉主之方糯米一石黍米亦得曲計常釀酒米一石用曲一斗此藥加五升彌佳未用之枸杞根二十斤刮去赤皮半寸銼之以水一石漬經三日煮取汁五斗生地黃二十斤洗去土細切和米炊之秋麻子三斗微蒸以枸杞湯淋取汁香豉二斗以枸杞湯煮取汁上四味地黃和米蒸之三物藥汁總合得五斗地黃濕即四斗分半漬米饙半及曲和釀飯即總和一酘密蓋甕口經二七日壓取封泥復經七日初一度一釀用麻子二斗多即恐令人頭痛服酒忌生冷酢滑雞魚面蒜油膩白酒房室等服訖一二七日將息又地黃酒療虛羸令人充悅益氣力輕身明目方雍州高長史服用效生地黃一石二斗搗絞取汁四斗杏仁一斗去尖皮兩人者熬令黃搗末大麻子一斗熬搗末糯米一石曝乾曲一斗五升淨刮曝乾細銼上五味先以地黃汁四斗漬曲待發炊米二斗作飯冷暖如人肌酘曲汁中和之候飯消更炊米一斗酘之如前法又取杏仁麻子末各一升二合半和飯攪之酘曲汁中待飯消還炊米一斗杏仁麻子末各一升二合半一依前法酘之如此凡八酘訖待酒沸定封泥二七日取清溫服一升漸加至二升日再服之令人頓能食久服去萬病婦人服之更佳令人有子近效五加酒方五加根莖細銼五斗六月六日曲末三斗黍米一石糯米亦得上三味以水五斗共五加同下於大釜中以木度深淺與水平刻之即更添水一石五斗並前計兩石即下火煎旋旋急火取藥汁減下至木刻處即得以火盆安淨筐筐中安淨布單兼滓漉著筐中其汁在盆中唯有五斗且別盛密封蓋之又重取所漉者五加滓以水煮之如別有五加添和同煮更佳取此汁用洮米拌飯炊之如常炊法用前五加濃汁漬曲且炊米五斗釀之餘五斗分為兩酘如常造酒法酒熟壓漉蜜封頭每服一盞暖飲之漸加勿令醉又遠志十兩末之下釀中益妙玄參及蛇皮肉亦得其糟與己下食之尤佳又代茶新飲方黃耆通草各二斤茯苓乾薑乾葛各一斤桑根白皮一斤鼠黏根三斤濕加一斤生乾地黃枸杞根洗忍冬十二月採枝莖葉陰乾濕加五兩薏苡仁各十兩菝葜八兩麥門冬去心葳蕤各五兩上十四味並揀擇取州土堅實上者刮削如法然後稱大斤兩各各別搗以馬尾羅篩之攪令勻調重篩務令相入不令偏並別取黃白楮皮白皮根相兼細切煮取濃汁和溲令硬軟得所更於臼中搗別作一竹棬子圍闊二寸半厚二分以下臨時斟量大小厚薄作之此亦無定衆手依摸捻成餅子中心穿孔日曝乾百餘餅為一穿即以葛蔓為繩貫之竹作篾亦得挂之通風陰處妙若須煮用以炭火上炙令香熟勿令焦臼中搗末任隨時取足煎以代茶大都濃薄量之著少鹽煮之頻揚之即滑美著鹽橘皮蓽茇亦佳除風破氣理丹石補腰腳聰耳明目堅肌長肉緩筋骨通腠理頭腦閉悶眼睛疼痛心虛腳弱不能行步其效不可言若患腳氣肺氣疝氣咳嗽入口即愈患消中消渴尤驗主療既多不復一一具説但服之立取其驗禪居高士特宜多飲暢腑臟調適血脈少服益多心力無勞飢飽飲之甚良若臘月臘日合之十年不敗解飲食相害成病百件肘後凡飲食雜味有相害相得得則益體害則成病以此致疾例皆難療所以病有不受藥療必至於死也今略疏其不可啖物不須各題病名想知者善加慎之諸鳥獸陸地肉物忌法白犬血腎不可雜白雞肝白鵝肝白羊肉不可雜雞肉犬肝不可雜烏雞狗兔肉豬肉不可合烏梅食一云不可合羊肝兔肉不可雜獺肉及白雞心食白馬黑頭者不可食麋肉不可合蝦蟆及獺生菜食麋脂不可合梅李食麋肉不可雜鵠肉食羊肝不可合烏梅白梅及椒牛腸不可合犬血肉等食白馬青蹄肉不可食白豬白蹄青瓜班班不可食雞有六翮不可食烏雞白頭不可食之殺人鹿白膽不可誤食食豬肉不可臥稻穰草中雄雞肉不可合生蔥芥菜食雞鴨子不可合蒜桃李子鱉肉山雞肉雀肉不可雜牛肝落地塵不著不可食暴脯不肯燥及犬炙不動見水而動者不可食祭肉自動及酒自竭並不可飲食也鳥獸自死口不開翼不合不可食鳥獸被燒死不可食病人不可食熊肉及猴肉山羊肉不可合雞子食之半夏菖蒲忌食羊肉雞子不合鯉魚巴豆忌豬肉蘆筍商陸忌白犬肉細辛桔梗忌菜白朮忌食桃李甘草忌食菘菜牡丹忌胡荽常山忌蔥茯苓忌酢天門冬忌食鯉魚黃連桔梗忌食豬肉藜蘆忌食貍肉凡蠅蜂及螻蟻集食上而食之致瘻病也凡飲水漿及酒不見影者不可飲之丙午日勿食雉肉壬子日勿食豬五臟及黑獸肉等甲子日勿食龜鱉鱗物水族之類又療猝得食病似傷寒其人但欲臥七日不療殺人按其脊兩邊當有陷處正灸陷處兩頭各七壯則愈又療中虛冷不能飲食食輒不消羸瘦四肢尫弱百病因此而生方薤白一斤枳實三兩炙大棗十二枚擘粳米二合豉七合上五味以水七升煮薤餘五升納諸藥煮取一升半分三服瘥止又方豉心一升熬末麥蘖曲各一兩熬蜀椒一升汗乾薑一升末上五味搗篩以蜜拌食後酒服之方寸匕又方曲半斤熬麥蘖五升半熬杏仁一升去尖皮熬上三味搗篩蜜和末食後服如彈丸一枚漸增之又方大黃芍藥芒硝各一斤上三味末之以蜜三斤於銅器中湯上煎可丸服如梧子十丸日再服又方曲一斤熬吳茱萸一升乾薑十兩上三味搗為末服方寸匕又療脾胃氣弱谷不消兼不復受食方大麻仁三升大豆黃二升並熬香上二味搗篩以飲服一方寸匕漸加服又療飽食訖便臥得病令人四肢煩重默默欲臥方大麥蘖一升熬乾薑二兩上二味搗為末服方寸匕日三良又療食生冷雜物或寒時衣薄當風夜食便臥不消心腹煩滿痛脹急或連日不化方燒地令極熱即激薄覆取汗愈深師療食飽煩悶但欲臥而腹痛方曲熬令香黃上一味搗為末服方寸匕大麥蘖亦佳千金翼凡六畜五臟著草自動搖及得酢咸不變色又隨地不汙又與犬不食皆有毒殺人也凡食飲有毒澆地地墳起皆殺人凡肉在器中蓋密氣不泄者皆殺人凡脯肉熟肉不用深藏密氣不泄殺人若中此毒者皆犬糞灰水服方寸匕良古今録驗療新中雜食瘀實不消心腹堅痛方取水三升煮白鹽一升令消分服取吐必瘥備急席辨刺史云嶺南俚人毒藥皆因食得之多不即覺漸不能食或更心中嘈脹並背急悶先寒似瘴微覺即急取一片白銀含一宿銀變色即是藥也銀色青是藍藥銀色黃赤是菌藥久久毒入眼眼或青或黃赤若青是藍藥若黃赤是菌藥俚人有解療者畏人得法在外預合或言三百頭牛藥或言三百兩銀藥余住久與首領親狎知其藥並是常用俚人不識本草乃妄言之其方如後初得俚人毒藥未得余藥且令定方生薑四兩甘草三兩炙上二味以水六升煮取二升平旦分二服訖後別方療之又療之方常山四兩白鹽二匕上二味以水一斗漬之一宿以月盡日漬之月一日五更以土釜煎勿令奴婢雞犬見之煮取二升平旦分再服服訖少時即吐以銅盆盛之看若色青以杖舉得五尺不斷者即藥未盡一二日後更進一劑又方都婪藤十二兩此藥嶺南有土人識俚人呼為三百兩銀藥甚細長有高三尺微藤生切上一味以水一升酒二升和煮取二升分三服服訖藥毒逐大小便出十日慎毒食不瘥更服以瘥為度肘後云黃藤又療腹內諸毒方都婪藤黃藤各二虎口長三寸並細銼上二味以酒三升合罌中密封以糖火圍四邊燒令三沸待冷出之溫常服令有酒色無禁忌若不獲已欲食俚人食者先取甘草一寸炙令熟嚼咽汁若食著毒藥即吐便是藥也依前法療之若經含甘草而不吐非也宜常收甘草十數片隨身帶之自防也嶺南將熟食米及生食甘蔗巴蕉之屬自更於火上炮炙燒食之永無慮也若被席上散藥臥著因汁入肉最難主療可常自將淨席隨身及匙箸甘草解毒藥行甚妙肘後無黃藤張文仲白黍不可合飴糖蜜共食黍米不可合葵共食白蜜不可合菰首食菰首不可合生菜食病人不可食胡荽芹菜及青花黃花菜妊身勿食桑椹並鴨子五月勿食韭十月勿食椒二月三日四月八日勿食百草二月勿食小蒜四月勿食胡荽謹按仲景方云正月勿食生蔥二月勿食蓼三月勿食小蒜四月八月勿食葫五月勿食韭五月五日勿食生菜七月勿食茱萸八月九月勿食薑十月勿食椒食駿馬肉不飲酒殺人也馬鞍下肉不可食馬黑脊而斑臂亦勿食食馬肝中毒方取牡鼠矢二七枚兩頭尖者是水和研飲之仲景同又食諸六畜鳥獸肝中毒方取發剪之長半寸挼土作溏沾二升合和所銼發飲之須臾發皆貫所食肝出也謹按發誤食之令人成發症為病不可療今和發土飲之豈得有此理否可詳審之別有方法也又方服頭垢一錢匕立瘥仲景千金同又方清水投豉絞取汁飲數升瘥止又凡物肝臟自不可輕啖自死者彌勿食之諸心皆勿食之為神識所舍使人來生獲報對又食生肝中毒方服附子末方寸匕日三須以生薑湯服之不然自生其毒又禽獸有中毒箭死者其肉有毒可以藍汁大豆解射罔也又食鬱肉及漏脯中毒方取犬矢燒末以酒服方寸匕又方搗生韭絞取汁服一二升冬月連根取和水洗絞之用薤亦佳凡肉閉在密器中經宿者為郁肉茅屋溜下沾脯為漏脯並有大毒又食黍米中臟干脯中毒方濃煮大豆汁飲數升即解兼療諸肉及漏脯毒又食自死六畜諸肉中毒方搗黃柏末以水和方寸匕服未覺再服瘥又凡六畜自死皆是遭疫則有毒人有食疫死牛肉令病洞下亦致堅積者並宜以利藥下之良又食諸菜肉脯中毒方燒豬骨搗下篩水服方寸匕日三四瘥千金同又方燒笠子末服方寸匕日三又食馬肉洞下欲死者方豉二百粒杏仁二十枚上二味合於炊飯中蒸之搗丸服之至瘥仲景同又甘豆湯冷飲之諸毒悉解諸不可及也辨魚鱉蟹毒不可食及不得共食肘後云凡魚頭有正白連珠至脊上不可食也魚無腸膽不可食魚頭黑點不可食魚頭似有角不可食魚無鰓不可食鯷魚赤目須不可食魚不可合烏雞肉食生魚目赤不可作繪食魚不可合鸕鷀肉食鯷魚不可合鹿肉食之鯽魚不可合豬肝及猴肉食青魚不可合小豆藿食魚汁不可合自死六畜肉食青魚鮓不可合胡荽及生葵麥醬食鯉魚鮓不可合小豆藿蝦不可合雞肉食蝦無須及腹下通黑及煮之反白皆不可食鯉魚不可合白犬肉鯉魚不可合繁蔞菜作蒸鱉目凹不可食鱉壓下有如王字不可食之鱉不可合雞鴨子食之鱉肉不可合莧菜食之亦不可合龜共煮之龜肉不可合瓜及飲酒蟹自相向及足斑目赤者不可食之病人不可食鯷魚鮪魚等妊身不可食鱉及魚鱠桂天門冬忌食鯉魚又療食蟹及諸肴膳中毒方濃煮香蘇飲汁一升解本仲景方又人有食蟹中毒煩亂欲死服五蠱黃丸得吐下皆瘥夫蟹未被霜多毒熟煮乃可食之或云是水莨所為彭蜞亦有毒蔡謨食之幾死又療食諸餅臛百物毒方取貝齒一枚含之須臾吐所食物瘥千金同又方搗韭汁服一升冬以水煮根服千金云服數升又方掘廁旁地作坎深一尺以水滿坎中取故廁籌十四枚燒令燃以投坎中乃取汁飲四五升即愈千金同又諸饌食直爾何容有毒皆是以毒投之耳既不知是何處毒便應煎甘草薺苨湯療之漢質帝食餅魏任城王啖棗皆致死即其事也食魚中毒及食鱠不消方五首古今録驗療食鯸鮧傷毒欲死方取鮫魚皮燒之無皮壞刀裝取燒飲服之䱜魚皮也食諸鮑魚中毒亦用之千金同千金療食魚中毒方煮橘皮停冷飲之又療食魚鱠及生肉住胸膈中不化吐不出便成癥瘕方厚朴炙大黃各二兩上二味以酒二升煮取一升頓服立消人強者倍大黃用三兩酒取二升再服肘後療食鱠過多冷不消不療必成蟲瘕方馬鞭草搗絞取汁飲一升即消去亦宜服諸吐藥吐之千金同刪繁療食魚鱠不消生瘕常欲須鱠者方獺骨肝肺干藍大黃各分蘆根鶴骨各七分桔梗五分乾薑四分桂心斑蝥二十枚炙上九味搗篩蜜丸酒服十丸至十五丸日再瘥食椒菜瓠中毒方四首肘後蜀椒閉口者有毒食之戟人咽使不得出氣便欲絶又令人吐白沫並吐下身體冷痹療方煮桂飲汁多益佳又飲冷水一二升又多食蒜又上漿飲一升又濃煮豉汁冷飲之一二升又急飲酢又食椒不可飲熱飲熱殺人又療中苦瓠毒方煮黍穰濃汁飲之數升此物苦則不可食恐作藥中毒也千金療菌毒方掘地作坎以水沃中攪令濁名地漿飲之又療食菜中毒發狂煩悶吐下欲死方取雞毛燒末以飲服方寸匕瘥解一切食中毒方三首千金論曰凡人跋涉山川不諳水土人畜飲啖誤中其毒素不知方多遭其斃豈非枉橫耶然而大聖久設其法以救活之正為貪生樂藥忽而不學一朝逢遇便自甘心終不識其所以今述神農黃帝解毒方法好事者可少留意焉又論曰甘草解百藥毒此實如湯沃雪有同神妙有人中烏頭巴豆毒甘草入腹即定中藜蘆毒蔥湯下咽便愈中野葛毒土漿飲訖即止如此之事其驗如反諸掌要使人皆知之然人皆不肯學誠可嘆息方稱大豆汁解百藥毒臣試之大懸絶不及甘草又能加之為甘豆湯其驗尤奇有人服玉壺丸吐嘔不已以百藥與之不止藍汁入口即定如此之事皆須知之此即成規更不須試練也解毒方中條例極多若不指出一二學者不可猝知余方例爾又療諸食中毒方飲黃龍湯及犀角汁百無不治也若飲馬尿亦良又療食飲中毒方苦參三兩上一味切以酒二升半煮取一升頓服之取愈古今録驗療諸食毒方取桑黃心破作一斷著釜中令水出三寸煮取二斗漉澄清微火煎得五升宿不食服之日三合則吐瘕未瘥更作羸者滅之酒醉過度恐腸爛及喉舌生瘡方三首千金療猝大醉恐腸爛方作湯著大器中漬之冷復易之酒自消夏月亦用之佳肘後同又方絞茅根汁飲二升又療連月飲酒喉咽爛舌上生瘡方大麻子一升黃芩二兩上二味搗末以蜜和丸含之飲酒連日醉不醒方九首肘後療飲酒連日醉不醒方蕪菁菜並少米熟煮去滓冷之納雞子三枚或七枚調勻飲之二三升無雞子亦可單飲之又方取水中螺螝若螺蚌輩以著蔥豉椒薑煮如常食法飲汁數升即解又方搗生葛根汁及葛藤餅和絞汁飲之無濕者乾葛煎服佳干蒲煎服之亦佳又方粳米一升水五升煮使極爛漉去滓飲之尤良千金療酒醉不醒方葛根汁飲一二升無多少取醒止又方本方治飲酒不醒九月九日菊花末飲服方寸匕又方小豆葉陰乾一百日末服之日方寸匕良又方五月五日取井中倒生草陰乾末酒服方寸匕佳又病酒方取豉蔥各一升以水四升煮取二升飲之瘥止飲酒令難醉方一首千金飲酒令無酒氣方干蕪菁根二七枚三遍蒸乾末之取兩錢匕飲酒後水服之飲酒積熱方二首肘後飲酒積熱遂發黃病方雞子七枚苦酒漬之器中密封內井底一宿出當軟取吞之二三枚漸至盡驗千金治飲酒房勞虛受熱積日不食四體中虛熱飲酒不巳入百脈心氣虛令人錯謬失常方酸棗仁半升人參白薇枳實炙知母栝蔞芍藥各二兩茯苓三兩一云茯神甘草一兩炙生地黃八兩上十味切以水一斗煮取三升分三服斷酒方一十五首千金斷酒方酒七升著瓶中熟硃砂半兩著酒中急塞瓶口安豬圈中任豬喙動經七日取盡飲之永斷又方臘月鼠頭灰柳花等分黃昏時酒服一杯又方正月一日酒五升淋碓頭搗一下取飲又方故氈中葈耳子七枚燒作灰黃昏時暖取一杯酒咒言與病狂人飲勿令知之後不喜飲酒又方白豬乳汁一升飲之永不用酒又方刮馬汗和酒與飲之終身不飲酒又方大蟲屎中骨燒末和酒與飲又方鸕鷀矢灰水服方寸匕永斷又方故紡車弦燒灰和酒與飲之又方驢駒衣燒灰酒服之又方自死蠐螬干搗末和酒與飲永世聞酒名即嘔吐神驗又方酒客吐中肉七枚陰乾燒灰服之又方酒漬汗鞋替一宿旦空腹與飲即吐不喜見酒又方白狗乳汁酒服之又方臘月馬腦酒服之服藥過劑及中毒方一十一首前後服藥過劑及中毒多煩悶欲死方刮東壁土少少以水一二升和飲之良又方水和胡粉稍稍飲之又方青粳米取其瀋汁五升飲之又方搗蘘荷取汁飲一二升冬月用根夏月用莖葉又方屋霤下作坎方二尺深三尺以水七升灌坎中攪揚之令沫出取沫一升飲之未解更作又方搗藍青絞汁數升飲之無藍以青布水洗飲之又方燒犀角水服一方寸匕備急服藥失度腹中苦煩方飲生葛汁良或乾葛煎湯服之肘後同又方雞子黃三枚吞之良又雞子清飲之又服豬膏良又方服諸石藥過劑者白鴨矢水和服之瘥肘後同又方大黃三兩芒硝二兩以水五升煮取三升分三服得下便愈肘後用地黃汁五升煮不用水解諸藥草中毒方二十九首肘後療食野葛已死者方以物開口取雞子三枚和以灌之須臾吐野葛出又方取生鴨就口斷鴨頭以血瀝口中入咽則活若口不開取大竹筒以一頭注其胸脅取冷水注筒中數易注之須臾口開則可與藥若甚者兩脅及臍各筒注之甚佳又方飲甘草汁但唯多更善又鉤吻與食芹相似而其所生之地旁無他草莖有毛誤食之殺人方薺苨八兩㕮咀以水六升煮取三升服之又此多生籬埒水瀆邊絶似茶人識之無敢食但不知之必是鉤吻按本草鉤吻一名野葛又云秦鉤吻乃併入藥用非此又一種葉似黃精唯花黃莖紫亦呼為鉤吻不可食故經方引與黃精為比言其形色相似也備急療諸藥各各有相解者然難常儲今但取一種而兼解衆毒求之易得者方甘草濃煮汁多飲之無不生也又食少蜜佳又方煮桂多飲之又服蔥涕佳又方煮大豆汁服豉亦解又方煮薺苨濃汁飲之祕方猝不及煮便嚼食之亦可散服此藥在諸藥中並解衆毒又方藍青皮子亦通解諸毒可預蓄之急則便用之凡此諸藥飲汁解毒者雖危急亦不可熱飲之待冷則解毒熱則不解毒也集驗療中諸毒藥及葛未死但聞腹中煩冤剝裂作聲如腸胃破斷狀目視一人成兩人或五色光起須臾不救方取新小便和清邊久屎一升絞取汁一升頓服氣已絶但絞口與之入腹便活也已死萬一異活但數與屎汁也又療中藥毒方取灶中當釜月下土末服方寸匕千金中百藥毒方甘草薺苨大小豆汁藍汁及實汁根汁並解之又中狼毒毒方白蘞鹽藍汁並解之又中藜蘆毒方雄黃蔥汁並解之又中巴豆毒方黃連菖蒲小豆藿汁大豆汁並解之又中躑躅花毒方梔子汁解之又中芫花毒方防風防己甘草桂枝汁並解之又中射罔毒方藍汁大小豆汁竹瀝大麻子汁六畜血貝齒屑蚯蚓屎藕芰汁並解之又中半夏毒方以生薑汁乾薑解之又中大戟毒方菖蒲汁解之又中烏頭天雄附子毒方用大豆汁遠志防風棗飴糖解之又中杏仁毒方用藍子汁解之又中茛菪毒方薺苨甘草升麻犀角蟹汁並解之又解諸毒雞腸草散方雞腸草三分藍子一合芍藥二分甘草四分炙薺苨四分墳土一分升麻四分當歸二分上八味為散以水服方寸匕多飲水佳若為蜂蛇等衆毒蟲螫以針刺螫上血出著藥如小豆許於瘡中令濕瘥為射罔箭所中削竹如叉股長一尺五寸以綿纏澆水沾令濕取藥納瘡中隨瘡深淺令至底止有好血出即瘥若服毒藥水服毒解痛止愈又解一切藥發不問草石始覺惡即服方生麥門冬八兩去心蔥白八兩切豉三升上三味以水七升煮取三升半分三服又療一切諸藥毒方甘草三兩炙以水五升煮取二升納粉一合更煎三兩沸納蜜半兩分服以定止又解毒藥散方薺苨一分藍葉花二分七月七日取葉並花陰乾上二味搗末以水和服方寸匕日三又中毒方取秦燕毛二枚燒灰以水服之千金翼療藥毒不止解煩悶方甘草二兩炙切白梁粉一升蜜四兩上三味以水三升煮甘草取二升去滓納粉湯中攪令調下蜜煎令熟如薄粥適寒溫飲一升千金同解諸蛇蟲毒方六首千金蛇虺百蟲毒方並用雄黃巴豆並麝香乾薑解之又蜈蚣毒方桑汁及葉根汁解之又蜘蛛毒方藍青解之又蜂毒方蜂房及藍青解之又斑蝥芫青毒方豬膏大豆汁戎鹽藍汁鹽湯煮豬膏巴豆並解之又馬刀毒方清水解之辨五大毒一首古今録驗辨藥有五大毒不可入口方經曰夫藥有大毒不可入口鼻耳目即殺人一曰鉤吻生崖二曰鴆狀黑雄雞生山谷中一名雉三曰除命赤色著水懸其子生山海中四曰海薑狀如龍赤色生海中五曰鴆羽狀如鸛雀黑頭赤足遇其毒解之則活猝無藥可飲小便解金鐵等毒方八首肘後療金毒已死方雞矢半升淋取一升飲之可再三千金云雞子清並屎白燒豬脂和服又方吞水銀一兩即金出又方鴨血雞子並解之千金云及尿汁又中雄黃毒方防己解之又礜石毒方大豆汁解之千金又云白鵝膏集驗療服金屑死未絶者知是金毒方以水銀一兩瀉口中搖動令下咽喉入腹金則消滅成泥即出可三與服則活千金解金銀銅鐵毒方取鴨屎汁解之又鐵毒方磁石解之惡毒瘴氣毒風腫毒方四首千金療惡氣瘴毒百毒方用犀角羚羊角雄黃麝香解之又主喉腫邪氣惡毒入腹方升麻射干並解之又主哽腫毒方用五香紫檀解之又甘草湯主天下毒氣及山水露霧毒氣去地風氣瘴癘等毒方甘草二兩上一味以水二升煮取一升分服
